年不下祝融峰如何一滴曹溪水肯墮紅蓮一葉中當他臨去秋波轉亦是禪家悟道門支那邱瓊山過一寺見四座俱畫西廂邱訝而問曰空門安得有此僧曰老僧從此悟禪邱問何處僧答曰怎當他臨去秋波那一轉邱公風流之士故此僧現風流身而為説法今夫愛為衆生性命之根本亦為曠劫輪轉之原因故佛法所許者正也其所禁者邪也華嚴經云菩薩性不邪淫於自妻知足不求他妻此為在家者言之至為出家者言之則無論正淫邪淫必俱斷之楞嚴經云心不除塵不可出縱有多智禪定現前如不斷必落邪道若不斷修禪定者如蒸沙石欲成其飯男對佳麗之女人眼角偷看女見俊俏之男子心頭欽慕身雖不其心已矣非待竊玉偷香同床共枕而後始為也是以耶穌有抉目之針馬太福音云凡見婦而懷欲者中心已與之矣若爾右目陷爾於罪則抉而棄之寧喪爾體之一全身見投於地獄何似世尊垂斷心之訓四十二章經云有人患不止欲自除陰佛謂之曰若斷其不如斷心心如功曹功曹若止從者都息邪心不除斷何益佛為説偈曰欲生於汝意意以思想生二心各寂靜非色亦非行佛言此偈是迦葉佛説明道乃曰我心中無妓宋二程子同赴人宴座上有聲妓伊川勃然而起明道怡然明日會書齋伊川怒氣未解明道笑曰昨日座上我心中無妓今日書齋汝心中有妓慧嵬則云我心若死灰高僧傳云晉僧慧嵬戒行澄潔有天女來意欲局就嵬曰我心若死灰何勞以革囊見試女乃凌雲以上歎曰海水可竭須彌可傾彼上人者其志堅貞盡十方世界是隻清淨眼祇是色塵一點遮却妄分好醜這個好醜即屬境緣殊不知境緣無好醜好醜起於心大圓鏡裏本無好醜芍藥花開菩薩面棕櫚樹長夜叉頭影鏡而鏡終不言我是菩薩我是夜叉若道此鏡非妖即怪當下撲破爾看菩薩夜叉好醜之相在什麼處秪如釋迦世尊之定中退彼魔女釋迦世尊修道雪山六年苦行功行圓滿將成正覺詣菩提樹下坐吉祥草上天魔波旬發大恐懼遣其四女方正無倫來世尊前呈諸姿態欲壞梵行世尊入慈心定四女皆變為老醜之狀相顧羞愧而退維摩居士之方丈侍以天女維摩詰長者方丈天女侍奉所謂維摩天女原同色者也文殊菩薩之在坊過一月文殊菩薩三處過夏一月在魔宮殿一月在長者家一月在坊既度一夏却入世尊會中解制迦葉尊者極為不平欲白椎擯出才拈椎乃見百千億文殊迦葉盡其神力推不能舉世尊遂問迦葉汝擬貶那個文殊迦葉無對羅什三藏之進宮女生二子鳩摩羅什三藏天竺僧也秦主姚興迎之入闕待以國師興進宮女一交而生二子諸僧欲效之羅什在衆僧前聚針盈鉢舉匙食之不異常食乃謂衆曰若能效我乃可蓄室云大顛禪師之處紅蓮妓元曉大師之宿瑤石寡四壁畫西廂之寺僧枯木倚寒巖之庵主昔有婆子供養一菴主經二十年常令一個二八女子送飯給侍一日令女子抱定菴主云正伊麼時如何菴主答云枯木倚寒巖三冬無暖氣女子歸舉似婆子婆子云我二十年只供養得個俗漢遂遣出燒却菴介庵朋禪師頌此話云橫盡三千條貫更無情罪可斷除非法外凌遲不用差官驗定廣德善士之升月光而趺坐見三國遺事弩肹聖人之得水液而浴身見三國遺事皆是修得大圓鏡智者也此等人雖在聲色中其動心耶賢臣盛朝讀書上寺慵齋叢話云有詩僧與縉紳相唱酬者頗多儒生讀書者皆上寺雖或有毀瓦劃墁之弊而儒釋相賴者亦不少又云世宗揀集賢儒臣申高靈等數人賜暇讀書于津寬寺其後洪益城徐達城李明憲等數人讀書于藏義寺又叔度放翁藩仲伯勝四李讀書于驪興神勒寺成宗復設弘文館蔡耆之許獻之曹太虛權叔強楊斯行俞克己等受命讀書于藏義寺又云釋卍雨者幻庵之高弟自幼力學內外經典無不探討精究其意又能於詩詩思清絶與牧隱陶隱諸先生相唱酬我朝不崇釋教名家子弟不得祝髮以故緇徒無知書者而師名益著四面學者如雲集賢之士皆就問榻下為儒釋士林之表人皆敬之我伯仲氏嘗讀書于檜巖寺師年九十餘容貌清癯氣體尚強檜軒逸稿檜軒者朝鮮世宗朝時集賢殿學士柳義孫也余一日訪柳瑾石儂居士于一石書莊瑾謂余曰子見卍雨和尚之詩與筆乎余曰未也瑾出檜軒逸稿及其所借尹暉家藏之海宇奇觀以示余蓋檜軒為瑾之十六世祖也和匪懈堂安平大君瑢瀟湘八景詩注云按集賢殿副修撰李永瑞序匪懈堂嘗於柬書堂古帖得宋寧宗八景詩寶其宸翰拓其詩畫其圖名曰八景詩仍取麗代之能於詩者陳澕李仁老二子之作系焉又於當世之善詩者請賦五六七言以歌之學佛人雨千峯亦詩之千峯蓋亦以詩鳴於釋苑者也云云詩各親筆中朝人翁正春以八分書其首曰海宇奇親世宗二十四年壬戌八月又帖籤書云千峯時年八十六附帖中諸詩有檜軒柳義孫警齊河演節齋金宗瑞學易齋鄭麟趾玩易齋薑碩德阜隱安止雍齋安崇善大田李甫欽景素南秀文淵氷辛碩祖翠琴軒朴彭年太虛亭崔恆梅竹堂成三問保間齋申叔舟鈴平君尹季童居昜金孟希賢堂李永瑞已上皆集賢殿學士千峯釋卍雨等列題千峯非徒詩思清絶亦其筆法遒美今録其詩云邸下手中卷人間席上珍粧䌙書畫妙披味送清晨谷口雨初霽山頭霧欲生幾多花柳巷歌吹樂升平樹杪一竿日江千數口家因風問漁叟莫是太公耶淡煙橫絶壁斜日照空庭鍾響出林表闍梨應念經千里蓴方美東吳客太忙拿舟葦間去蕭瑟朔風長一夜湘江雨三秋楚客心心應懸魏闕通昔動哀音月色清無比湖光湛不流騷人意何限楓葉政矜秋繞岸沙平布隨陽雁欲來相呼遵禮讓人世所欽哉斷岸雲籠浦殘山雪滿林江天多暮景想像興難禁詩是有聲畫斯文光焰長差差續貂客句句不成章柳方善贈雨千峯十四韻詩云卓錫興天寺禪家奕葉孫君王加禮貌卿相謹寒暄早透曹溪學兼探闕里言工詩曾破的説法每逢源胸次長江濶詞華湛露繁齊驅陶隱駕優入幻庵門釋苑名逾重儒林望更尊已能遺月指肯復鬪情幡寂靜為師樂奔馳喪我存鼠侵藤欲絶羊踏菜難蕃精進功雖晚皈依意自敦眼思離鏡象身愧縛塵喧玉帶寧嫌重金鎞庶可援願尋香穗去一宿達真源慵齋叢話韓明澮在孕七月而生四體猶未成形一家欲不舉乳媼裹以絮置密室久而方成既長骨骼奇偉少時讀書山寺一日冒夜行山谷中有虎擁護而行公語之曰遠來相送足見厚意虎有俯首跪伏之狀天且明乃去又嘗遊靈通寺有一老僧貌奇古密語曰公之頭上有光赫奕皆貴徵也不出明年公必得志慵齋叢話黃守身兒時遊學山寺世祖在潛邸時適至于寺見公與儕輩讀書皆招之使誦四韻詩以觀應對公最先誦音節琅琅上甚奇之後上即位問黃喜諸子仕者幾人銓曹對以年少上曰少者莫是興天寺誦詩兒耶特命除職慵齋叢話云學專上人號一菴其為人純謹無他表裏如一雖知作詩而所占無警句雖知內典而不深究根本雖不入山修道而亦無浪迹好與人棋而常不勝亦不為慍與人無貴賤一與之語即成心交至如申高靈李延城朴平陽成謹甫柳太初薑晉山徐達城洪益城李陽城成夏山昆弟任西河李平仲金福昌皆其至交而高靈尤愛護之一日夏山設宴慰高靈佳賓滿座歌妓擁後高靈愀然不樂曰若有一菴吾可罄歡夏山伻人請邀少焉一菴欣然入室彎袖而舞高靈與座客皆解頤終日罄歡而散及拜禪宗判事入院之日簪珥盈門人皆榮之雖無文名者亦皆與之交退老于文化貝葉寺使華往訪者不絶至今年過九十而身猶康強也豫嘗作句曰棋無面象終難勝詩失先聯不自由高靈聞之曰此正實録也謹甫嘗作一菴詩曰上人學佛者揭一名其菴吾徒學孔子還慚德二三時人以為善名狀也一菴求詩於縉紳間所藏詩卷連床盈篋而一時精抄之詩皆萃於此矣盧思慎次晉山韻贈學專上人云呂枕五十年一覺空倣佛欲知夢幻境試問瞿曇佛晉山世緣盡思皈衣欲拂昨夜夢山林眼前無俗物白雲生杖屨豈復戀朱紱尚玄曰自古來儒釋之交際以詩文為媒介互相唱酬亦盛世之風流韻事也秪如新羅崔致遠贈金川寺主人詩云白雲溪畔創仁祠三十年來此住持笑指門前一條路才離山下有千歧又贈智光上人云雲畔結精廬安禪四紀餘笻無出山步筆絶入京書竹架泉聲緊松櫺日影踈境高吟不盡瞑目悟真如高麗朝沖奯初以南省正元脫身往松廣寺修真崔怡為知申事專政以書遺茶香使請書報師曰豫已絶俗何須書往復為怡且以詩贈之即次云瘐鶴靜翹松頂月寒雲輕逐嶺頭風箇中面目同千里何更新煩語一通僧惠文字彬然工於詩一時名士多從之遊與李奎報交遊文死奎報作哀詞補間齋集開泰寺僧統守真或有作守其處學博識精奉勑勘大藏經正錯如素所親譯河直講千朝作詩并以芥子一袋見寄師即次韻答之曰芥子吾宗所極論須彌巨海總能吞惠來經榻知何意即事談玄報佛恩真老宿道談今為五教都僧統補間集又云三重空空性不檢好詩酒居不離京師雖晚歲喜與少年輩遊酩酊吟哦嘲花弄草以自放也嘗過布川留詩讚石彌勒云金色巍巍丈六身青山獨立幾經春我來稽首何無語曩劫同修是故人後庾壯元碩以中道按廉過此見之代彌勒戲書云腰上僧形下俗身長安桃李眼迷春莫言曩劫同修善吾黨曾無破戒人空空聞之作解嘲詩上相國崔公云昔過布川院間留一首詩多談彌勒在戲答使人疑公絶到俗以饒語者為多談朝鮮徐四佳居正東人詩話云圓鑑國師俗姓魏名元凱高麗時人登甲科官至樞密出家嘗有詩曰誰知雞足山中老曾是龍頭會上賓老髠亦有自負之語東人詩話又云禪林詩其氣象不同然談論禪旨隱然於言意之表者蓋寡宋洪覺範有一聯云夜久雪猿啼嶽頂夢回清月上梅花蓋言聲色俱空之妙千峯雨上人卍雨也有一聯云檜老千峯色鍾寒平夜聲時輩不甚重之陶隱李先生李崇仁也獨愛之曰此謂釋氏法案聲色俱空語也東人詩話又云僧幻庵名混修書法妙絶得晉體一時求書者坌集然所書必觀詩文心肯然後始下筆廣平李侍中仁任得尹泙畫十二幅屏風令茂松尹會宗作詩倩幻庵筆庵曰詩欲傳後非牧老李穡不可世有牧老而敢題屏幛者僭也即折簡邀牧老于方丈牧老曰若邀老物當用安樂寺衆煎茶牧老既至即帶口號賦十二絶筆勢生風隨賦輒令幻庵書之至藤王閣末句曰當日江神知我否何時更借半帆風幻庵投筆大呌曰政用王勃本色事此最警絶如牧老直詩聖也書訖遂成三絶廣平珍藏之後雲庵澄公清叟重修長城縣白巖寺樓請名於三峯鄭先生道傳三峯名以克復以記之使其徒絶澗倫師受楷於幻庵庵曰此非吾所書也牧老在也而敢為長文大作歟即令沙彌偕絶澗往牧老請名若記牧老訊絶澗澗曰寺在二水間而水合于寺之源東西分流又合于樓前為淵然後出山牧老曰然則可名雙溪樓操筆記之文無加點其末有云豫老矣明月滿樓無由宿其中恨不少年為客耳幻庵受而書之嘆曰唐人詩有明月雙溪水春風八詠樓少年為客處今日送君遊之句此老政用此語而無釜鑿痕真妙手也牧老竟坐詩案事叵測亦未必非幻庵輩為崇也高麗僧義砧精於杜詩柳泰齋嘗從遊受學杜詩我成廟命以諺文注解杜詩間有迃曲處皆砧所傳諛間瑣録泰齋寄詩云十年南北苦相思有底浮生苦別離何日更參方丈去焚香細讀杜陵詩本集朝鮮讓寧大君禔題僧軸云山霞朝作飯蘿月夜為燈獨宿孤巖下猶存塔一層名僧之詩如涵虛法諱得通亦云己和和尚答李相國貴齡所惠扇子云散盡塵緣任意遊水天空濶歲華流多君料得吾家味寫出炎天便是秋清虛休靜禪師次韻別李方伯云早脫紅塵網招提獨閉門今逢千里客來破萬山雲出野麟無族皈巖鶴失羣梨亭從此別對月更思君又朴上舍草堂云浮雲富貴非留意蝸角功名豈染情春日快睛春睡足臥聽山鳥百般聲上滄海滄海楊士彥也見士彥子楊萬里遊金剛山録云秋風兮吹衣夕鳥兮爭還美人兮不來明月兮空山浮休善修禪師次李相國韻贈文道人云客裏還逢客談懷日欲傾心間能外世年老已忘形磨業塵緣靜凝神道眼明想知常宴坐返照自心經泗溟又號松雲惟政大師萬景臺上漢陰左相李德馨云滄海遙空霽景解望窮懷抱却悽然人稀古郭秋燕緑日下高春野色玄身落遐荒頭已白夢尋青桂月空妍何時黃鶴碧雲裏清梵燒香臥洞天又奉寄李水使舜臣詩云征南節度大將軍威振蠻荒靜海氛節入生辰重九日月明歌吹動轅門又洛下臥病上西崖相公柳成龍云一落黃雲戌七年猶未皈鼓鼙秋夢少京洛雁書稀鏡裏容華改愁中歲月遲明朝渡江水惆悵又相違按西崖集步泗溟大師見寄韻回贈云栖栖君莫恨卒卒我難皈方外知心久夢中見面稀秋高楓落盡天濶雁來遲蓮社平生約差池到老遲又泗溟大師集謹奉洛中諸大宰乞渡海詩云年來做錯笑餘生數月荷衣滯洛城愁病平分送春恨歌吟半惱憶山情浮杯謾道堪乘海飛錫初羞誤説兵為國重輕諸老在願承珠唾賁東行按此詩即師奉使日本作李德馨送松雲赴日本詩云紛紛蛙吹自為多誰識搏風九萬賒道可適幾心要細言能驚俗氣須和此間有味無人會難處輸君與世誇記得老師回棹日盡傳殊域伏降魔金宗直號估蹕齋泊報恩寺下贈住持云報恩山下日曛黃繫纜尋僧踏月光棟宇已成新法界江湖猶攬舊詩腸上方鍾動驪龍舞萬竅風生鐵鳳翔珍重旻公亦人事時將菜把問舟航按報恩寺即驢州神勒寺薑淮伯寄證明師詩云人情蟬翼隨時變世事牛毛逐日新想得吾師禪榻上坐看東海碧粼粼崔岦號簡易次韻文殊僧卷云文殊路已十年迷有夢猶尋北郭西萬壑倚空雲遠近千峯開戶月高低磬殘石竇晨泉滴燈剪松風夜鹿啼此况共僧那再得官街七日困泥蹄李達湖寺僧卷次韻云東湖停棹暫經過楊柳依依水岸斜病客孤舟明月在老僧深院落花多春愁黯黯連芳草鄉夢超超隔海波獨坐計程關塞外不堪殘日聽啼鴉柳夢寅號於于堂送性敏上人遊九月山云阿達曾聽內苑鍾晴雷殷壑玉龍春古檀應閲唐堯曆遺廟難尋太白峯佛墮瑞毫輝老石仙留翠髮高松憑渠割取煙霞界脫潁新詩當劍峯碧巖大師法諱覺性奉呈槎川李公秉淵云閻浮擾擾耳無聞偶作無心出峀雲世既棄僧僧棄世后翁槎老好為羣僧處能號白谷有詩集二卷呈白洲相公詩云信宿曾遊寺風光記往年曉雲濃滿峽春雨細鳴泉深樹鶯聲老幽庭草色鮮悠悠生別意把筆寫新篇呈東溟先生詩云十里湖沙兩岸村偶携黃卷到柴門相逢説盡無生話燕子東風日欲昏蓮潭大師名有一字無二近世名僧也餘事好詩與文有林下録二卷樊巖蔡相國名濟恭字伯規撰其影贊曰短其眉小其眼色即是空仰其鼻尖其口食即是空蓮花淨淨潭水空空安用相為相維空空遵其戒研其業道得於真鍊其精遊其神心得於真丹青莫狀形外有真七分清和庶幾蓮潭之真云云今於林下録中選録數首讀者見此一斑可窺全豹也次尹翰林名孰時謫海南入長春洞韻云南國秋風內翰過飽看山水聖恩波粹容淨似沖宵鶴妙解精如擇乳鵝明月滿時潮水大白雲斷處海山多知君詩得江山助萬木丹楓作錦坡又次尹翰林云吟鞭和睡洞門過冬柏陰中九曲波香積秋羹烹木鱉伊蒲午饌灼桑鵝老僧入定西歸遠逐客登樓北望多愧我機鋒輸佛印難將一轉壓東坡注云木鱉蹲鴟也桑餓桑菌也東坡訪佛印了元元方説法學人滿座元曰內翰何來此間無坐處坡曰欲借和尚四大為座元曰山僧有一轉語若言下即答當從所請不能則解玉帶與我坡許之元曰四大本空以何為座坡擬議解玉帶長春曹詞伯來訪云儒釋相逢處相爭半日樓塞北千人帳江南萬斛舟注云顏氏家訓云江南人不信塞北有千人帳塞北人不信江南有二萬斛舟今儒釋不相信如此朴御史自耽羅出陸云繡衣返自瀛幾日泛重溟百櫓蒼生活三山聖化明有無高氏穴觀否老人星却笑千年事徒緣採藥行濟州有高夫梁三姓所出穴又南極老人星照故人多長壽者近代海南大芚寺蓮坡又號兒菴惠藏和尚嘗作述懷詩曰麻衣曾不下山扃慚愧如今道未成柏樹功夫誰得力蓮花世界但聞名狂歌每向愁中發清淚多因醉後零坐罷蒲團還失笑莫將吾輩算天氓尚玄曰世以北詩之柏樹蓮花等語頗有議評甚至有斥之以外道者無乃過激之論也此不過是用功上自嘲自勉之辭也蓮坡和尚豈謗佛毀法云乎哉金阮堂正喜誦此詩于前清翁覃溪方綱覃溪以為與己志氣相合因介阮堂寄贈復初齋集十卷覃溪文集伴以真影一件以訂神交云大芚寺之草衣意恂和尚亦近世詩僧也與金阮堂丁酉山名學淵茶山之子交遊多唱酬之作其奉和酉山見寄詩云霜天渺渺雁回頭千里含書碧海秋南北襟懷常阻展中間歲月幾翻周寺樓賞雪連三夜苕水納涼共一舟陳迹依俙如可忘新詩觸忤更添愁又次韻答李匡廬云白雲深處小茅堂寄在徵明水一方芳樹禽棲幽響軟空庭春去落花香久從像外研心性懶向人間話暖涼竹院休言偷半日山僧已被笑顛狂又其早過斜川古寺遺址詩云輕霞冉冉曙光晴旭日娟娟上赤城朝冷煙從溪面起岸高人在樹顛行林深尚見餘花發春盡猶聞好鳥聲惆悵龍門山下路寶坊遺與野人耕繼草衣而起者即故仙巖寺住持張基林法號錦峯和尚是也和尚餘事性好吟詩一時名士多與唱和不幸今秋示寂于麗水之故里其詩皆散失無存稿余偶翻檢海東佛報載有數首其敬呈猊雲先生云江南勞久夢京口幸尋臨笑語春風動鬚眉臘雪侵筆多醒世道誠亦感人心梅下開尊酒泠泠寫舊襟又南山永慕齋送別李海石云城北春燈幾往從城南煙樹正芳濃相酣落日雨中酒行訪名園雲外峯老去何嘗多感慨間來不妨轉踈慵海天縹眇成連去底處雙橋又更逢甲寅春余嘗與錦峯映湖兩禪師聯袂往訪徐中觀于城北洞草廬共賦今只記得拙詩録之以寓紀念之懷云棲心物外覺身輕花下逢君一暢情塵世是非由我見山林經濟足民生遙看匹練吳門色城北洞有曝灑綿布處忽聽飛笳漢塞聲賴得浪仙為伴侶不妨春雨滯東城日本使來求高麗藏吾友六堂學人崔南善氏有志史學乙卯春間渡往東京為圖書館之生活者幾年餘專意搜得彼我昔日文物交通之迹還揭其論于每日申報題曰東都繹書記余得之譯于左原文交用諺漢文故譯之高麗版大藏經麗藏之在乎佛乘上之地位非吾之所更呶呶也蓋自東漢至趙宋千餘年間翻譯雖云寢備而但以繕寫為流通僅於宋元間始有印藏至今九百年間其刻出為二十餘次雖然以包含之整備校勘之周密流傳之古遠完全故麗藏居第一等所謂現在藏本無善於此板無古於此板者也唯此無上大藏以漢譯藏經之絶對的標準周比嚴勘遼宋日本等所有一切新舊譯傳而作佛典結集唯一之基本其所關係於法運通塞者果然重大矣法雨之餘瀝以百濟釋子之功潤彼桑土之當初則經論戒律幡蓋塑像等一切皆仰于百濟固無論已一自與唐直接交通之路開求法者多往唐以後則至如經卷多自彼土直傳玄昉鑑真等之前後持皈之纍千卷佛乘實作大藏渡來日本之濫觴若以印藏言之宋太祖雍熙三年奫然之得來官板宋藏者為其始也高麗藏之入日本之起初雖不可考而料必屬於麗朝末葉也顯宗朝之初刻藏及宣宗朝之再刻藏則無所聞而惟高宗朝所成之海印藏為其所傳聞流入矣日本亦於後宇多天皇高麗忠烈王時僧行圓承敕願之旨從事於開刊藏經未果而寂其後南北朝時當高麗末葉亦為著手歷五十餘年亦不得成功而止適於此時至善絶佳之高麗藏渡來覺難企及遂變刻藏之意而傾注全力於高麗本之請求麗末以來彼求藏之僧連續來留者皆以此也當時如威權隆隆於九州一帶之大內氏者藉稱其先本百濟人以結特殊之誼好而願得一切經者屢矣其與我不得交好者則介大內氏其他而百方圖得矣日本之最煩請渴求高麗藏乃在本朝太宗以後即彼室町幕府時代求經之使遠十年而來善鄰國寶記中載我世宗四年請求之書先是需釋氏之書皆得如願今復有不盡之求聞貴國藏經板非一正要請一藏板安之此方使信心輩任意印施若能運平等之慈盲自他之別則豈非深福源增壽嶽之一端耶云云雖是請分餘件而其無厭之欲可謂甚矣又其再翌年答書所需者即大藏之板也其餘珍寶積如山嶽又何用哉云云其要求之切何等冒沒廉隅可笑然所需大藏經板只是一本云云而被拒絶母論也雖積如山嶽之珍寶藏經前則無用云云非是一時之放言此實當時彼人之實情也彼人之心願誠求是此物又我之珍幣厚貺亦此物應酬殆煩劇有為印成數十部之事亦有齋往之專使作怒濤之駭魄之事見世祖五年遺彼之書貴國與敞邦雖阻滄溟世講鄰好自寡人即位函遣信使益致殷勤禮宜報聘肆於年前冬十月遣僉知中樞院事宋處儉大護軍李宗實齋大藏經一部法華經二部金剛經二部金剛經十七家解二部圓覺經二部楞嚴經二部心經二部地藏經二部起信論二部永嘉集二部證道歌二件趙學士書證道歌二部高峯禪要二部翻譯名義二部成道記二部並土儀小鍾雲板二隻銅鐵五部磬子五隻石燈盞五隻以下布木皮藥等若干略表忱偕貴使秀彌前去不幸海上遇颶風使船未知漂往何處副使船則沈沒唯貴使船得脫泊對馬島遣其船主與三郎報云書契與禮物俱失茲用心惻聊達事由儻漂船護到貴境惟望矜恤護還或其遺尸漂著涯岸亦令收瘞且於琉球地面遍行訪尋萬一寓泊存活刷還為幸云云而知之也雖非番番如是往往一次輸往如是多數之經論珍藏寶襲矣則五百年抑佛錮法之間自我散佚之書反為遺存於彼固宜矣日本現存之藏經不知其為幾許而可推東京之增上寺為最完全之收藏據其三大藏目録之緣起則我成宗時大和圓成寺僧榮弘將來藏於其寺矣增上寺是德川氏置家廟之地故彼慶長十四年我光海主元年德川家康償與食邑若干地於圓成寺而取此麗藏并其同貯之宋元兩藏移置增上寺者也先於此本者係是永嵩禪師自高麗齋皈云之京都建仁寺本而我憲宗三年毀於火今僅存四十九卷云此外有石田三成所寄附云之高野山本小田川隆成所寄附云之三井寺本及讚岐法然寺本等而又缺落散佚者處處有之如常陸古剎清音寺原藏之一切經因寺運之衰散之四方為好奇家之所分藏余於吉田東伍氏處見其一部壯紙平刷卷子貼連納于長方小漆匱者也匱樣漆態認其為自我輸送時之原物矣若欲收容一切經應須纍百同樣之匱子然則一舉印出五十部當時我人之煩苦可察也不知何以故相傳麗藏之板本滅絶緣山三大藏緣起以為高麗喪亂亦委煨燼云云縮刷藏經緣起而彼板亦久亡今則其經亦無存云云雖至近年蓋信其為亡失矣一自關係於東學黨參與於一進會之怪僧武田範之之論説及工學博士關野貞之調查報告書出然後始能確知其現存無恙矣料昔我無敬事釋教之念之當時厭避式年請求之煩苦故以此等説流傳之也善鄰國寶記引嘉靖中禮曹鄭顯答大內義隆書因喪亂經書散佚而曰然則今彼土遺失已久惜哉云云者豈非其為一證者乎麗藏之與影響於日本佛乘頗有深大者非徒使日本之刻藏許久不敢生心而至其後年僅成天海本黃蘗本等刻藏之功然而其匡謬訂訛之最高標準則仍恆以麗藏為之自明治十三年京都弘教書院用五號活字印成之縮刷藏經以其內容之豐富對校之特長許以現存者中最善之件而其基本則乃增上寺之麗本也始自明治三十五年京都藏經書院印成之卍字藏經則以往昔僧徵忍盡平生之願力而成就之明麗兩藏對校本作基礎而稱為麗明對藏亦是藏經書院起自明治三十八年結於大正元年之大日本續藏經則實應看以上本之續編者也雖非日本之事近在上海所成之頻伽藏蓋翻印日本之縮藏者則便是高麗藏之支那重刊也非徒日本通一般而言之麗藏以前無完藏麗藏以後亦無完藏也其因仍覆刊麗藏本之一部分者亦多目録類之刊行洵不止一二其外我景宗七年翻刊之貞元新定釋教目録三十卷英祖十三年獅谷白蓮寺所刻之一切經音義百卷同二十二年高野山北室院所刻之續一切經音義十卷等亦是其中之一二又此三種者久已遺佚於漢土元明藏皆不能收入而麗藏獨存之珍書也故前清黎庶昌以公使駐札日本之時得此本寫真翻印而未就事見於楊守敬之日本訪書志蓋嘗論之高麗板一切經藏為現存佛乘之最完全最古遠實天下無雙之寶吾人所有幾多世界的矜耀之中特有光色之一件也如是之豐功妙果結就於我先人之手法燈慧光之所以待吾人可謂特殊深大也後之人迷塞懶散不能修潤此不能光大此亦不能以弘願大力布施於普世而徒任其古煤新炭前仍後蘊殆不相關其有無佛日之晦濛豈可云無其故嗚呼昔年也將宋官板國前本國後本中本丹本東本北本舊宋本等所有一切大界衆經而貫會融通之成就護法弘道之無上寶筏今日也甚至自家大德之妙迹寶撰一任其散亡不問其下落昔年也二百餘年之間三次疊行勘校雕刻十五萬板之巨役今日也上下八百年間四方分貯莫大之印本亦一無能保其古完昔年與今日一一比對之時不得不以熱淚吊麗本一切經麗本一切經自身是世界的絶寶也故不得不然也以若如彼之世界的絶寶許久蒙受如彼之忽待間視也故尤不得不然也祐世僧統終不能再見乎守其大德果然不復出乎發其幽闡其微亦須人補其遺續其後亦待人濟濟之叢林乃無如法珍之一尼姑者乎亦無如楊文會之一居士者乎昨年閲讀新聞雜志朝鮮總督府印出海印藏經三部分納宮中及其他諸處云云其日此記終附日本弘教書院縮印大藏經緣起夫佛經之翻譯自漢魏至隋唐經律論大備而未有一定詮次唐玄宗開元十七年沙門智升著開元釋教目録二十卷詮次經律論及諸師撰述五千四十八卷以千字文定函號是大藏定數之始也爾來歷朝大藏詮次以開元録為模範嗚呼漢明之夢感一動五千餘卷遂傳宇內王侯士庶書寫鏤刻以莊嚴其福慧宋元之間官私刻板其多及二十餘副云而罹元末兵燹悉皈灰塵至明僅有南北二藏南藏者太祖所刻在于南京官庫北藏者太宗所刻藏于北京城中是以得之亦不容易也浙之武林更刻方册大藏無幾而其板亦漂滅萬歷年間有密藏禪師者發願刻方册大藏普募緇素無不響應紫柏憨山等碩德為之羽翼陸光祖馮開之等諸宰官為之贊成其募緣疏成實萬曆十四年而創刻於五臺者十七年矣無何藏師匿迹而去代之總事者為幻余禪師師亦尋遷化始與藏師與事者四十人至萬曆二十九年其人存歿半而其刻未能半云蓋全藏終功不知在何歲也辛苦勤勞亦可想矣爾來海內緇素得閲大藏是密藏師之賜也舶載於本邦頗多鐵眼禪師所翻刻亦此本也惜哉其所見止南北宋元四本其校訛非不詳密古本不存無對校脫誤之由我邦皇統一系萬世不易欽明天皇朝佛教東漸遂以篤敬三寶為憲法列聖羣臣護法之迹昭昭於正史是以書寫之大藏或鎮巨剎或納神庫千有餘年之古寫本現今存在亦不少矣雖至後代朝廷屢行寫經之事崛川天皇嘉保三年三月十八日令僧俗一萬人一日寫一切經見于中右記順德天皇建曆元年四月草三日以一萬五千僧一日寫一切經見于一代要記而刻藏之事以崛川天皇康和四年三月刻一切經云云見于園大曆為始世間今不存其本寬永年間大將軍德川家光公令天海僧正刻活字大藏經自寬永十年三月十七日始至慶安四年三月十七日歷十二年終其功全部六千三百二十三卷所印刷千四百五十三部云其活字其經今猶存於寬永寺寬文間鐵眼禪師翻刻明藏六千七百七十一卷至于今續續刊刷流布海內然上來刻本未盡校證世以為憾寶永年間京師獅子谷忍澄上人嘗發疑於明藏及閲高麗藏大有所得於是更發對校大藏願一日奮然曰大廈之傾一木何支今也發見明藏之脫誤而校訂之任一身何堪不如與衆謀之乃寄書于三緣山增上寺招致同志者十餘人於獅子谷始從事對校然建仁寺有藏規不許出於閫外會近衛基熙公大感澄上人有此舉特諭建仁寺令許上人所請實寶永三年丙戌也是歲二月起業至七年四月竣其功校凡三次每次換人遇有異同則注於行間故獅子谷所藏明本即是宛然高麗大藏也及文政九年丙戌越前丹生北郡絲生鄉淨勝寺主順惠上人就建仁寺校讎明藏寫所缺五百卷補焉歷十一年其業始成此本今在增上寺昔者高麗國王皈依佛法慨嘆支那大藏屢經改刻誤謬甚多遍聚宋朝官板及本國所傳國前本國後本中本丹本東本北本舊宋本等使大德校正之刻以傳四方是麗藏所以勝他本也而彼板亦久亡今則其經亦無存云我邦之麗藏天下至寶也聞建仁寺麗本其寺第百九十世永嵩禪師欲修堂宇募緣彼土之日所齋歸也天保八年丁酉九月二十六日罹災今則僅存四十九卷由是觀之麗本全存者獨止增上寺所藏乎本寺三大藏者大檀越征夷大將軍德川家康公所寄附也高麗藏六千四百六十七卷舊為大和國忍辱山圓成寺所藏傳云後土御門天皇文明年間寺主榮弘所請慶長十四年大將軍與食邑百五十石請之宋藏五千七百十四卷宋理宗嘉熙三年安吉州思溪法寶資福寺所重雕舊為近江國伊香郡菅山寺所藏傳云後宇多天皇建治元年乙亥寺主專曉所請慶長十八年大將軍以食邑五十石及山林請之元藏五千三百九十七卷元世祖至元二十七年杭州路餘杭縣白雲山大普寧寺以思溪福州二本所校刻舊為伊豆國走湯山修禪寺所藏慶長十五年大將軍與食邑四十石請之實希世之珍尤當祕惜嗚呼昔時傳道之龍象願力深重冒流沙熱風凌南海激浪支竺之間來往不絶梵土經卷無所不齎而支那歷朝王臣盡力財於翻譯事業其崇敬之至其成功之偉固非思量所及也本邦諸師奉敕求法支那也所請來本則官府保護之是以梵漢既佚者今猶存於本邦蓋諸佛菩薩願力所聚天龍八部冥護所加被孰其不仰之乎哉曩緇素相謀設弘教書院創四藏對校之事自明治十三年四月至十八年七月盛業告竣其間屢移處頗有似密藏師創工於五臺後移於徑山又與事人前後出入有類密藏師匿迹念雲師接管刻場然對校之業印刷之功併得全了是無他聖天子泰平恩德護法善神本誓冥助所致也後閲此大藏者宜信守奉行而令法久住世間焉附頻迦精舍校刊大藏經緣起昔如來以一大事因緣出現於世説法四十九年開示悟入佛之知見涅槃而後諸菩薩阿羅漢衆結集大教垂為三藏靈文昭灼普利人天洵希有之盛典也中國漢明帝時大法東漸騰蘭偕來首譯四十二章及遺教等經是為梵漢流傳震旦之始厥後支安諸彥勇於弘法譯寫既富流播益廣蓋不惟高僧哲士互標遞顯即我女界如東晉洛陽尼道馨亦於東寺講法華維摩經一時聽者如市蓋此土夙稱最盛以故智人踵起無論男女皆知信樂佛乘敬禮三寶有由來矣魏晉而下以迄前清歷代護法之君亦無不於萬幾餘暇棲神內典鐫印藏經弘𫾻妙法後宮妃衆尤多捐金鑄像貢珍鏤板假非神指淵微詎能覃敷若是之至乎自世風日下道德衰頽人尚競爭俗趨詐偽賢智之士莫不亟思援手竊以為居今之世欲拯拔澆漓締造勝因發忠義之菩提證金剛之慧果非我佛之方便善巧因機逗引又奚從而措手耶迦陵祖籍法蘭謂佛蘭西國人生長華夏早失怙恃迭經憂患艱苦之餘頗涉文字自適哈同氏歐司愛君矢志勤敏經營拮據迄今三十年節約贏餘稍稱饒裕然性樂佛法雖處塵勞志募清淨邇三十年前始拓基滬瀆倣搆秖園營精舍一區額曰頻伽蒔花種竹鑿石引泉小闢亭池以娛清暇誠始願所不及也輒思人生世間如白駒過隙古云世界如牢浮生若夢轉眼報盡輪回六道人世之苦大抵如斯故嘗請法天台詢道浮玉雖幸略聞法要猶自惟障深慧淺欲求解脫非得佛慈加被曷克超三界而證須摩由是日課彌陀皈心淨土頂禮普門遊心法界書寫大方廣佛華嚴經轉讀法華楞嚴圓覺維摩諸大乘妙典惟舊藏經籍卷帙繁重檢閲良難工巨價昂在家熏修二衆尤難購置每於執卷興望洋之咨披函起數寶之歎稱憾久之嗣從日本購得弘教書院小字藏經較之舊刻頗為便利惟字迹過細高年展閲未免苦耗目力爰發宏誓願輸私財倣弘教本翻印而字體放大期於閲者無分老少咸得覩茲照世明燈焉時我師從海外皈來駐錫頻伽聞余願言擊掌讚歎曰善哉是真不可思議功德也概自佛典湮晦宗教陵夷上焉者勤自修下焉者墮魔外而無所研究此所以數千年來佛理不彰為世詬病若得此大藏經流通學界誠衆生之福田種因得果受用無窮今君能發前人未發之偉舉將來功成出版卷帙簡便字體明朗雖多至八千餘卷而裝貯不過四箱無慮巨剎第庵在家出家皆可隨意購讀悉心研究啓發靈明擴充智慧增進道德咸在斯矣並亟願任其事於是籌措經費預算工程及紙墨各項出版時日約計十萬金為期兩稔即堪集事廣延居士大德開館校印時己酉當隆照三年也冬月也經始以來昕夕孜孜日以觀成為念迄今寒暑四易聿獲告竣雖中經世變物價騰貴校計經費較前預算溢出幾倍終賴我佛宏慈衆生之福得成巨舉流通十方報如來之洪恩副鄙人之私願而尤賴余外子哈同君信願俱足助此經費自始至終同心擔荷併承諸居士大德協力勤績得以告厥成功所有功德謹以回向菩提普願法界衆生同入無邊華藏莊嚴性海是則鄙人一瓣心香永永無盡以祝萬方者也中華民國二年當大正二年也三月頻伽精舍主人迦陵羅詩氏法名大綸熏沐敬述烏目山僧宗仰按即迦陵氏之師也所述頻伽精舍校刊大藏經緣起有曰挽近宗風衰歇慧命如縷緇流鈍置勞塵紛舛勝因所肇轉在扶桑以不慧所知彼中增上淺草二寺庋有宋元明麗諸藏其所留存尚有數本前此印行大概以明為斷自明以後別有續藏今此校刊擬資彼土弘教書院本而加增減益以本朝龍藏乾隆二年續入之一千一百二十七卷且更旁搜幽採廣徵遺佚以求完善中略弘教刊本奄有宋元明韓諸藏之長韓藏多唐代輸往之書古尚可貴矧其析疑辨異取舍決定著有校正別録高麗沙門守其奉敕撰尤不可廢也云云現安城郡青龍寺住持洪月運和尚舊名大虛曩遊支那求法受戒轉輾至上海客於留雲禪寺與彼處諸名宿交遊乃支那宣統年間也時有一日本僧失名揭載所謂朝鮮海印寺藏經板雕造緣起於滬上各報即如李居仁夾川人也身雖薄寒性度溫良恆以里胥為己任者鄉人目為仁胥焉有唐大中戊戌年秋催王租於聚落暮皈還家乃於路上得一狗兒蓋三目也率豢家中其為狗也逈出庸格形如獅子性若賢人日惟一食事主甚勤出從五里拜送入迎五里隨侍以歸由是愛而念之撫而恤之及至三年甲子秋狗子無疾而坐視日而死居仁庀棺以埋具奠以祭如喪家豚也越丙寅冬十月居仁亦死初到門觀有一王面開三眼頭冠五峯手擎寶笏身著緋衣脣如激丹齒如齊貝高踞牙床左右從官皆烏官朱服者牛頭惡卒馬面羅剎森衛嚴列如世國王所行之狀也得見居仁王即下堂而執手曰嗟嗟主人何至於此也吾頃適被冥論衣毛帶尻居謫三霜賴主人之遇善善來復職感不自抑矣今忽相省敢妄其德耶扶引上階居仁始悟其由乃拭淚曰賤子素是不學無知者將何以控辭奉招於冥府乎伏願大王示教利喜王曰善哉仁者諦聽吾説以供冥聖居仁俯首聽命而後隨使入冥府則閻王問曰汝在人間作何因緣答曰居仁自少為官使無暇植善矣將欲作大事因緣承命天夭永慨于懷王曰使來近前居仁趨進座下王曰汝欲何事而未遂以直言之居仁曰賤子伏聞法寶之至貴將欲刊板宣布而未能焉往有志願終無事實以此悶懼大王即庭揖曰願須登殿少歇一時居仁固辭大王即命判官名除鬼籙與僚佐步至門外慰而拜送焉居仁退至三目王所王預令設席以待使之登坐雍容敘話載叮載囑曰主人萬萬莫以事大為慮還家貿紙就於文房寫成勸疏題曰八萬大藏經勸功德説云云納官踏印置之居家佇待我皈則我將以巡撫於人間也於是居仁唯唯而退欠伸而覺乃一夢也夜述勸文打印待之及丁卯之春三月既望新羅國公主姊妹同時行疫臥病在床曰父王急詔大藏經化主來若不爾者女等從此永訣王即宣旨國中夾州太守已知其事召居仁傳乘上京都直赴門丁謁者入通公主曰善來化士近無餘患否我是三目鬼王也與君有約故來此也又語國王曰此人頃入冥府冥府勸送陽界刻經流傳者願國王作大檀越助成大事為何如若爾則非徒我公主無患國祚永固王亦享壽矣王拜命曰可而後又與居仁有惜別之態現身而去焉公主等還得本心即起而拜白於父王母后曰冥界尚能做善事况陽界仁國乎父母其毋忽哉王曰諾於是待化主甚善盡傾私儲以施之申命內外集諸良工巨濟島繡經於梓莊金而塗漆運鎮于伽倻山之海印寺設十二度慶讚之會焉此皆冥府之使然實非鬼王之私意者也居仁之夫婦考壽康寧俱登樂邦云噫陽法之為寶也無處不寶也明矣何則冥王寶之而善治陰界人主寶之而舉得民情天王寶之而長年快樂覺皇寶之而垂仁萬品云云説文載於大藏後跋欽差茅國器迦陵氏得讀此文乃發誓願印成大藏謀及洪月運和尚欲資海印本終以事大費巨遂至罷議而購覽弘教書院之縮本藏經以作基本云云月運和尚為頻伽藏校刊證師之一人焉詳知其顛末為我言之如是蓋夾川李居仁之事迹實為迦陵氏發心印經之動機云云朝鮮諸寺購來頻伽藏者頗多皆因月運和尚為之紹介也尚玄曰李居仁刊板事迹無乃順應理貞兩大士創寺事迹之誤傳者歟順應理貞兩大士入中國求法還國時新羅哀莊王王后患發背遣中使告之師授以五色線其使還報於王王依言試之患差王感之創立海印寺海印藏板成於高麗具有明文朝鮮人無能明之者但以一篇俚言野説作為緣起信為真實以若天下無雙之至寶遭彼等間尋常之待遇此六堂氏之所以熱淚吊之者也印大藏經高僧督役朝鮮世祖大王之時以高僧名者曰弘濬上人曰信眉大師曰守眉和尚曰學祖曰學悅等諸師也皆被祖之知遇或命校刊經論或命重創寺宇今此海印印經之役兩眉與焉見于印經跋文其文如左印大藏經五十件臣聞我佛如來初成正覺乃曰奇哉衆生具有如來智慧德相但以妄想執著而不證得豈憫其人人具足於清淨無漏之性而無明所覆輪轉六趣歟此牟尼出世之本懷而無怪乎直説喻説而其文之至於千萬軸之多者也雖然法不自弘由人而弘則其法之行不行又在於時君世主之信不信如何爾至於履至尊之位躬上聖之資研窮性命之理極乎道德之懿而又有以洞明三藏妙契真乘推我佛慈濟之道思與億兆蒼生捨邪皈正同植德本躋之于仁壽之域則是乃明君義辟出於尋常萬萬者之所為而千百年罕遇之盛際也天順紀元丁丑之冬上傳旨于桂陽君臣璔領中樞院事臣尹師路議政府左贊成臣申叔舟判中樞院事臣李仁孫臣權攬吏曹判書臣韓明澮承政院都承旨臣曹錫文等若曰豫以否德承天地祖宗之靈位于臣民之上幸與卿等而共際會亦非小種善根惟佛教之流于震丹其來已久其説之載于文又莫若藏經之專幸其刊板具在於海印寺近歲士民之好善者印成全部然間被國家賜于日本存者無幾豫欲印就若干部分置于名山福地上為先王先后暨祖考之靈以資福吉於冥冥下為法界含靈以至昆蟲草木之微幽明共利普及無際且凡事始厥為難今因肇功成至五十部將遍鎮于我僧藍之大處卿等其措置當務之次第以聞臣璔等奔走惟謹其經畫本末巨細悉謀於慧覺尊者臣信眉判禪宗事臣守眉禪師臣學悅隨即啓于上下承政院移于各道分其地之廣狹以定出紙之多寡命副知通禮門事臣尹贊宗簿注簿臣鄭垠往慶尚道預為區辦與判禪宗事臣守眉海印住持臣竹軒仍督其務且諭監司臣李克培監總之遂用明年春閏二月創役至其年四月日告訖於是命臣守溫跋其後臣謂諸佛出興唯為一大事王者握符膺籙以興于世則亦惟欲救民而已故佛為三界之師以導其迷君為萬民之主以濟其生是雖有出世之異其發誓願廣度無邊之志則佛與王者一也恭惟我主上殿下曩在潛邸親遭大難掃除姦凶天與人歸大命以集其盛德大業實我東方未有之聖主也然即位以來不自滿暇切切求理民安而猶恐不安時和而猶恐不和且謂自古聖帝明主之治天下國家也莫不崇三寶仗大乘以之福國利世延洪業於無強以無忘世尊正法付囑之遺意於是特成大典弘揚真化蓋後之千有餘歲去之萬有餘里而我聖上精神心術之妙慈悲廣大之量與佛同一機也或問於臣曰世之名好學善讀者不過數十卷而止今三藏之書充於棟宇而不可極矣孰能遍觀而盡究其説乎臣應之曰夫妙明圓覺之體徹乎古今以無所變通於凡聖而無所異是蓋無迷無悟無此無彼者也楞嚴經曰一人發真歸元十方世界悉皆消殞是則當我聖上發意之初即已轉大法輪而與佛剎微塵衆生同徵於無上菩提之智矣又豈必人人之目此而後為功德哉是不可以常情而所能度也天順二年六月日嘉善大夫行忠佐衛上護軍臣金守溫拜手稽首謹跋成永嘉集先王遺命朝鮮世祖大王二年丁丑九月印成禪宗永嘉集御定口訣慧覺尊者信眉等譯御製跋文曰昔者我皇考世宗欲得見證道歌注解命我遍求不得求之中國亦不得遺命汝終是事豫常録置左右豈敢忘之壬申冬豫赴京心求諸處幸得琪注證道歌而還中因迍難未遑顧此藏之珍之護若頭目幸蒙天之力克靖大難化家為國天子錫命威加外夷國內寧謐此豈豫之智力全是三寶密加之力而况世尊以正法付囑國王大臣流通真化今正是時負荷既重愧德不逮若身若心保無退倦世事紛擾萬幾方浩經綸數年未即宣揚不吊無常遄至大哀忽臻撫膺慟哭將焉所及割愛薦靈宜先轉經今為亡哀印成大藏經華嚴經各一件法華經楞嚴經翻譯名義各百件地藏經懺法各十四件寫成法華經地藏經起信論梵網經行願品各一件粧潢亡哀手書金剛經一件續寫亡哀手書法華經一卷一件又請慧覺尊者信眉演慶住持弘濬等校定涵虛堂金剛經説義入之五家解為一書又請校定永嘉集諸本同異又與僉知中樞院事金守溫入涵虛堂説義於永嘉集又集證道歌彥琪注宏德注祖庭注為一書命印成各百件上為皇考皇妃及祖宗列位早證正覺次為亡子永離八苦速免三界超出二乘圓成十力之願嗚呼有生者必有死樂極則悲必來世尊有説曰生無不死愛合必離此三界之所以為三界也豫當寬懷乃能保世汝亦破相能離惑業願仗三寶威神冥陽合此法利世之觀此者足知豫心之哀金守溫跋傳曰仁者壽又曰大德必得其名必得其祿必得其壽夫有盛德之實而享其祿其名其壽者理之常而其或有盛德於己而不能必祿位名壽於天則是乃理之變而天道之不可度者也天順紀元之初載東宮邸下寢疾既彌留一國臣民棲惶奔走醫藥禱祀靡所不至越其年秋九月有日殂于本宮之正寢我主上殿下哀痛罔極為追冥福手書金剛般若經正文以為字本永嘉集舊注間有得通小釋者採入證道歌合彥琪宏德祖庭三解親率永膺大君臣琰桂陽君臣曾密城君臣琛河城尉臣鄭顯祖僉知中樞院事臣金守溫藝文館直提學臣韓繼禧等讎校楞嚴法華等又命僧弘濬信眉等校正金剛經得通説義東師列傳云師忠州人也初在尚州四佛山著金剛經説誼書二本臨終命弟子洪預等一本燒之一本埋之未久其埋處忽生瑞氣洪預以聞世祖大王以其本送于明時景泰年間也參考以來行于世永嘉集同異下於鑄字慵齋叢話云初太宗於永樂元年謂左右曰凡為治必須博觀典籍吾東方在海外中國之書罕至板刻易以剜缺耳難盡刻天下之書豫欲範銅為字隨所得而印之以廣其傳誠為無窮之利遂用古注詩書左氏傳字此鑄字所由設也名曰丁亥字東閣雜記云上命依中朝設書肆於京都南山之下即今之鑄字洞以昭格署鍮器及破毀寺剎之鍮鍾鍮鈸鑼等器鑄字印書且令不拘公私著力興造是即永樂丁亥年也名其字曰丁亥字世宗又於庚子年以所鑄之字大而不整改鑄之其樣小而得正由是無書不印名曰庚子字甲寅年又用為善陰隲字鑄之比庚子字差大而字體甚好又命世祖書綱目大字世祖時為首陽大君遂範銅為字以印綱目即今所謂訓義也壬申年間文宗更鎔庚子字命安平書之名曰壬申字乙亥年世祖改鎔壬申字命薑希顏書之名曰乙亥字至今用之其後乙酉年欲印圓覺經命鄭蘭宗書之字體不整名曰乙酉字成宗於辛卯年用王荊公歐陽公集字鑄之其體小於庚子而尤精名曰辛卯字又得中朝新板綱目字鑄之名曰癸丑字大抵鑄字之法先用黃楊木刻諸字以海浦軟泥平鋪印板印著木刻字於泥中則所印虛凹而成字於是合兩印板鎔銅從一穴瀉下流溢分入凹處一一成字遂刻剔重復而整之刻木者曰刻字鑄成者曰鑄匠遂分諸字貯於藏匱其守字者曰守藏年少公奴為之其書草唱準者曰唱準皆解文者為之守藏列字於書草上移之板曰上板用竹木破紙填空而堅緻之使不搖動者曰印出匠其監印官則校書官員為之監校官則別命文臣為之始者不知列字之法融蠟於板以字著之以是庚子字尾皆如錐其後始用竹木填空之術而無融蠟之費始知人之用巧無窮也正宗時即定奎章全韻義例云有新定玉篇以生生字整理字印頒甲寅取字典本木刻三十二萬字藏于內閣是謂生生字丙辰編整理通考以生生字本範鑄三十萬字是謂整理字各印一百件翻譯名義乃姑蘇法雲所撰釋經之指南世所不傳者也出內藏一秩并印百件且模木板大藏一部注華嚴一件地藏經懺法各十四件又命戶曹參議臣薑希顏判司宰監事臣成任行司憲掌令臣趙瑾行校書郎臣任擇前行副司直臣安惠前津寬寺住持大禪師臣文炯前長安寺住持大禪師臣克仁金書法華經一件墨書法華經地藏經梵網經起信論行願品各一件以義昌君臣玒右承旨臣韓繼美監掌之皆親製跋語係于經後上曰成經本欲開人天眼世之人既及就秩皆甲函鎖鐍積于庋閣誠無謂也今豫則不然於是如上諸經裝潢既訖即散于大衆昔永樂十五年太宗文皇帝撰名稱歌曲為善陰隲諸書暨印佛典散施於五臺山顯通寺于時祥光瑞氣照耀天地傳諸史策流動天下我聖上法施之心即文皇帝之遺意也臣謂父子之道天性也父之欲慈其子子之欲孝其親皆發於至誠慘怛之餘而非由外鑠我也世子元良之德孝友之美流聞四方主鬯承祧之有在而永奉兩宮之歡者而忽不永其天年臣民之所慨念歔欷而飲泣者寧可復道况我殿下至性慈愛之心乎宜其尊信釋教以植德本而無所不用其極之至也若夫天人禍福不齊之理則雖諸儒千萬世不決之論而區區小臣尤為之痛悼而永憾者也是年九月上浣通政大夫僉知中樞院事集賢殿直提學兼春秋館編修官臣金守溫奉教謹跋薑孟卿申叔舟韓明澮韓繼美韓繼禧任元濬等諸臣跋文煩不具録刊經都監用漢諺文朝鮮世祖大王八年癸未刊經都監雕印御譯妙法蓮華經上進箋文如左刊經都監都提調輸忠衛社同德佐翼功臣綏祿大夫鈴川府院君臣尹師路等謹將新雕印御譯妙法蓮華經粧潢投進臣師路等誠惶誠恐頓首頓首上言竊以法非本妙因滯粗而自妙心非本真假逐妄而立真蓋由無始執有漏惑非顛倒地為顛倒人在解脫場失解脫者輪六道而不息溺四流而長漂惟我能仁據彼堪忍事恆河之諸佛得值為師窮法界之衆生等觀如子逮夫魔飛夜樹覺滿晨星慧日高升初大山之先照慈雲漸靄始小草之咸滋應其根隨利鈍之差示其化區半滿之別至蓮華會刊枝葉繁放東方之一光全彰智境起無量之三昧廣闢慧門引化城之疲商涼朽宅之火戲衣自繫於珠寶久慨孤貧父將付於家珍謬生下劣燈明同二萬之號本覺之體斯存藥王燃八十之光精持之力已表三周九喻詞義宛然百界千如指陳攸遠逮大車之既駕乃廣莂之可行開種種之階方便雖張於幻緒入圓圓之海旨趣皆歸於實相現今當來佛護念而常説初中後善語巧妙而莫京惟大教之流通待熙朝之顯發曠歷綿古允屬當時恭惟我主上承天體道烈文英武殿下睿智日新多能天縱飛金輪而御宇調玉燭以綏邦治踰六代之隆德跨九皇之盛聽國政之多暇崇釋典以凝神究七覺之幽微洞三空之邃奧經自七軸之記實為百部之冠羅什受筆於五天初擇梵本溫陵掩關於一世獨抱遺經縱斯道之賴存尚蒙士之未曉委翻寶偈專事宸襟分語絶意絶之間句讀既正核喻合法合之別科判畢陳演伽陵之仙音妙暢密義敷貝多之真諦穩播玄猷心譯直據於漢文口訣曲宣於國諺雖萬幾之沓至恆一志之不分契理彌深覃思備至發揮妙賾若瑞景之麗高穹祛釋宿疑類層氷之泮巨壑香河縱其辨帝網重其輝諸儒博考於書林人肆講喙開士繼討於苪院各寫蘊腸言言務契於佛心句句易曉於俗耳闡揚祕藏誘掖羣迷啓定室之要關登覺山之捷徑盡未來際蓋常轉於法輪通無邊方實普懸於智鏡于斯時也釋梵拱衛紫氣滿於空中佛天感通白衣現於山上事光簡策慶浴華夷臣等學小管蠡才乏遊夏預殊勝席侍清淨幢承天語之如綸捧雷音之振地執簡末至徒師聖人之顯模鏤梓廣傳堪為稀代之彝典隨所下部即便董工鐫琬琰而畢刀整縑素而就卷臣等伏以甘露普灑一味均霑四衆齊修萬靈實依鴻基峻極體固須彌之山鳳曆增延越數微塵之劫臣師路等誠惶誠恐無任激切屏營之至前件妙法蓮華經一部七卷謹隨箋上進以聞天順七年九月初二日都提調輸忠衛社同德佐翼功臣綏祿大夫鈴川府院君臣尹師路等謹上箋奉教雕造都提調輸忠衛社同德佐翼功臣綏祿大夫鈴川府院君臣尹師路都提調推忠佐翼功臣輔國崇祿大夫議政府左贊成南原府院君臣黃守身提調推忠佐翼功臣崇祿大夫禮曹判書延城君臣朴元亨提調推忠佐翼功臣正憲大夫戶曹判書總中外度支事昌寧君臣曹錫文提調推忠佐翼功臣資憲大夫兵曹判書茂松君臣尹子雲提調資憲大夫工曹判書世子左副賓客臣金守溫提調推忠佐翼功臣嘉靖大夫仁順府尹原城君臣元孝然提調嘉靖大夫工曹參判臣成任提調嘉靖大夫中樞院副使臣韓繼禧提調嘉善大夫中樞院副使臣薑希孟副提調通政大夫承政院都承旨兼尚瑞尹弘文館直提學知製教充春秋館修撰官兼判奉常寺事知吏曹內直司樽院事臣盧思慎副提調通政大夫僉知中樞院事臣尹贊使通政大夫判宗簿寺事臣李季專使通政大夫判軍資監事臣南倫使通政大夫行禮賓寺尹臣金達全使通政大夫行成均直講臣安寬厚使中訓大夫行成均司藝臣申松舟副使中訓大夫世子輔德知製教兼春秋館記注官臣尹弼商副使通德郎守副知通禮門事臣金永堅世祖大王九年甲申刊經都監雕印御譯禪宗永嘉集上進箋文如左刊經都監都提調推忠佐翼功臣崇祿大夫議政府左贊成南原府院君臣黃守身等謹將新雕印御譯禪宗永嘉集粧潢投進臣守身等誠惶誠恐頓首頓首上言竊以逮夫盛唐有曰玄覺風趨八表輻湊三吳振策曹溪密印少室核諸論於百部提宏綱於十章發文字之性離顯空有之體寂摳衣請益必飭慕志之儀檢身修行先戒驕奢之習奢摩即因中之止毗婆是果上之觀沉動捨於二邊調心之法備矣事理冥乎一旨中道之諦歷然剖析察於幾微充擴極乎廣大象兔偕濟通造於河牛鹿分乘畢出於宅詞簡而約理圓而該恭惟主上承天體道烈文英武殿下卓冠羣倫光膺寶曆慈悲在念九類咸入於度門利樂為心四境共躋於壽域克廣唐虞之化載崇乾竺之宗乃茲靈編首徹英眄逈通真際聿暢微言淬刃離硎盤錯之根迎解明銅出匣妍𡟎之貌自分赫舉五輪之指端點成兩卷之口訣遂使希有之妙集重為不朽之聖經爰命儒臣載加於宣譯并置釋子亦得以討論闢梵館於春坊飫天厨於日下言語曲循於氓俗清濁要叶於宮商出入百千之所詮闡明卅三之直旨重重一一若帝網衆寶之交輝剎剎塵塵如玄曦瑞景之普照誠指南於來學不迷北於販禪永惟大法之流旋入貞材之鏤臣等叨承寵命獲奉衍揚研精實愧於寡聞翻錦竊遵於親斷今模印既訖具函以盛式憑殊勝之因仰祝綿長之業臣守身等誠惶誠恐無任激切屏營之至前件禪宗永嘉集一部二卷謹隨箋上進以聞天順八年正月初五日都提調推忠佐翼功臣崇祿大夫議政府左贊成南原府院君臣黃守身等謹上箋奉教雕造都提調以下諸臣姓名與進法華經時同故略之是年四月刊經都監雕印翻譯金剛經及心經上進箋文如左刊經都監都提調推忠佐翼功臣大匡輔國崇祿大夫議政府右議政南原府院君臣黃守身等謹將新雕印翻譯金剛經一卷心經一卷粧潢投進臣守身等誠惶誠恐頓首頓首上言竊以道冒十方佛乘所以最上德洽四國王者所以宅中蓋欲推無外之仁必先藉不壞之法有聖簿伽梵演大修多羅妙喻金剛號稱般若入城乞食將發意於圓成著地袒肩乃翹誠於護念杜色想之六入斷種現之二疑既執喻而情忘斯空澄而智現文成三十二品理撰八萬餘門實如來誠諦之言皆諸佛正偏之旨欽崇至道允屬熙朝矧翻宣之盛功待聖明而必舉恭惟主上承天體道烈文英武殿下夙資德本洞達真乘等福慧於世雄配聖哲於大梵十善施物則之懿多能彰天縱之才兼覺悟於羣迷用發揮於祕義特垂口訣責委翻筵要因口以曉心遂轉華以為諺臣等猥以謭資仰承隆命雕造既訖模印就編教闡難思將此緣之殊勝曆延無極祝洪業之綿長臣守身等誠惶誠恐無任激切屏營之至前件金剛經一卷心經一卷謹隨箋上進以聞天順八年四月初七日都提調推忠佐翼功臣大匡輔國崇祿大夫議政府右議政南原府院君臣黃守身謹上箋奉教雕造都提調以下諸臣姓名與前同而惟提調資憲大夫戶曹判書臣金國光為變動耳夫當相著相者衆生之所以隨於煩惱見相非相者諸佛之所以證於涅槃由其積聚為義則有陰之名由其識所依寓而生入之號由其取於限別遂立界之説皆因心之迷相轉轉遊涉三科之義所由設也自譯此經逮唐迄今造疏著解代各有人法藏之注獨得其宗上命孝寧大君臣補率臣繼禧就為宣譯又得大宋沙門仲希所述顯正記科分章疏逐句消釋極為明備據疏分節釐入各文之下但希所據本非今所行時有不同大君與名緇詳加讎校既克脫稿亟令入梓模印廣布嗚呼衆生顛倒徒知相之為相而不知相之非相佛憫如此先顯五蘊以總其綱申之以十二處廣之以十八界其曰色不異空者為愚空之流也其曰空即是色者為愚色之人也無非欲使像法衆生空一切之相成萬法之智也惟我主上殿下以此經緇素常習故特令敷譯蓋憫晨昏致誦而不知其所以誦即釋迦如來哀此衆生終日遊相而不知其相之意也其開覺人天入佛知見之旨聖聖同揆嗚乎至哉天順八年二月仲浣嘉靖大夫仁順府尹臣韓繼禧謹跋佛説阿彌陀經御製譯解天台智者大師説天順八年甲申歲朝鮮刊經都監奉教雕造忠毅衛校尉行忠佐衛中部副司正臣安惠書世祖大王十年乙酉刊經都監雕印御譯圓覺經上進箋文如左刊經都監都提調推忠佐翼功臣大匡輔國崇祿大夫議政府右議政南原府院君臣黃守身等謹將新雕印御定口訣翻譯大方廣圓覺修多羅了義經粧潢投進臣守身等誠惶誠恐頓首頓首上言切以真如寂滅視不見而聽不聞妄識紛拿粘難解而縛難脫緣二門之趣入分十界之異馳我釋迦文號薄伽梵重重主伴六雙大士之互陳種種根機二十諸輪之畢舉提究竟果示本起因清淨法行諸佛同於實際圓成妙性衆生具於真源由執認於四緣遂專迷於一性顛倒展轉則空華舟岸之委明行相謬乖則作止任滅之曲辨義無微而不照理無廣而不包乃滿藏之圓音而大乘之頓説恭惟主上承天體道烈文英武殿下握符御極記莂臨朝丕闡徽猷欽崇至教既博綜於羣籍獨深達於竺墳思廣甘露之門更布慈雲之廕煥日新之盛德發天縱之多能楷定口訣於契經發揮心法於了義特降斯典俾導靈詮臣守身等香海微漚儒林末葉叨將寡昧獲預選掄愧齷齪之真容敢對揚於金地譯筆始訖於出藁刊板已得以成編奉進燕間用資乙覽翻華作諺續佛慧於無窮頌聖瞻天祝報曆於罔極臣守身等誠惶誠恐無任激切屏營之至前件大方廣圓覺修多羅了義經一部十一卷謹隨箋上進以聞成化元年十九日都提調推忠佐翼功臣大匡輔國崇祿大夫議政府右議政南原府院君臣黃守身謹上箋奉教雕造都提調以下諸臣姓名與前同尚玄曰余嘗拜見御譯圓覺經其體裁如左大方廣圓覺修多羅了義經終南山草堂沙門宗密疏御定口訣慧覺尊者臣僧信眉孝寧大君臣補仁順府尹臣韓繼禧等譯此外又有御譯首楞嚴經寶蓋山安養寺住持洪月運和尚將其所藏一部躬自負來以示於余閲之則缺上進箋文不能知其雕造年月也給田福泉香火供資世祖大王九年甲申二月幸福泉寺寺在俗離山御製願文曰天順八年二月二十八日因巡狩詣俗離山之福泉寺率宗勳政府六曹百寮將相入極樂殿法場供養三寶兼為相見慧覺尊者信眉禪德斯智大禪師學悅學祖等師作朝鮮永世福田願我等從此至于究竟不復退轉廣漠佛道普覺人天推我勝緣令我祖宗列位速證菩提三際眷屬及法界含靈俱得解脫佛末法遺教弟子承天體道烈文英武朝鮮國王是時金守溫從幸有記文惜不得見大設法會三日而罷傳教于戶曹給田二百結米三百石又令刑曹屬臧獲三十口俾為香火之資見清權遺輯清權孝寧大君之號也製文覺寺菩提結誓世祖大王十年甲申五月命創圓覺寺于漢城中部慶幸坊越明年乙酉正月甲子十六日圓覺寺大鍾成己巳二十一日幸鑄鍾所命撞新鍾其聲雄遠上嘉之賞賜有差大圓覺寺鍾銘并序崔恆撰天以雷以震萬物佛以鍾以警萬衆玄化固無方也然非大壯之雷則不能鼓羣動真教亦無邊也然非大音之鍾則何以覺大夢乎是知蕩激大千周流六虛暢神化者莫疾乎聲而流洪韻者莫良於金也鍾之為用大矣哉恭惟承天體道烈文英武殿下應千一升九五開闔乾坤陶鑄虞唐屯亨否泰德洽化隆猶病博濟罙懷永圖念能仁氏之道慈以與樂悲以拔苦隨機普度厥教莫弘庶可憑依福利邦家越踐祚十載龍集甲申命建圓覺大叢林于都中遂鎔精金五萬斤鑄大鍾懸于雲雷之閣昭法器也範陰陽而均侈弇回祿而率職蜚廉效力百靈交應數圍倐成綰以修索負以空虡亦時乃考一吼若震清音潼容乎九霄威響砰隱乎三界於是四生竦息萬類諦聽非唯明知之人聞聲知受觀受悟法激昂奮勵勇猛精進耳貪騃者懺悔以遷善聾瞽者感動而知方心源自淨識浪安流以至上極有頂下彌空輪天仙飛行陸海神識亦皆撥冥蒙祛塵滯滌廣劫之瑕減長夜之苦焉是則佛之所以假法器撞法音使其張皇慈心引曳悲念者無大於鍾而我后所以體至仁濟羣生流通像教闡揚玄風洞達于幽冥清寧于幅員者亦於是鍾乎永賴矣噫我后之心即我佛之心也其心其化則不鳴而鳴非化非心則鳴而不鳴鍾以化鳴化以鍾流而萬法一心夫豈苟哉臣拜手稽首而獻銘銘曰大雄大道大無邊大慈大悲度大千一音四時牖人天大鳴萬劫猶天然聖教東流知幾年我聖乃今心獨傳云何博濟無黨偏拔與也須依金仙誕物玄猷開福田巨搆崒嵂撑重玄萬靈奔走洪燼煽紫焰燭天虹夜連穹窿贔屭千鈞懸擬諸玄像虛而圓孕虛蓄雄時以宣霹靂乍作崇岡顛一杵萬井驚昏眠蕩彼波旬招靈仙十方龍象駢聖賢聽此更造精進筵一切湯火苦熬煎聽此便濯清冷淵洪纖隨扣應乃全善根以植惡以捐法鼓法螺同周旋神通妙用莫之先我后我佛心共圓昭揭化日須彌顛法音大振彌坤乾恆沙飛塵玉曆綿四月癸未初七日圓覺寺成設慶讚會赴會僧一百二十人披覽御定口訣翻譯圓覺修多羅了義經飯外護僧二万八日幸圓覺寺大設法會以落之十一日幸圓覺寺誡文曰凡我同契之人既生淨信勿生妄惑妄惑生處皆是緣塵緣塵之聚重濁成山畢竟限礙輕清無日若欲除之畚鍤并用猶如大海羅蚊同飲悉得充足勿為自棄欲蠲漂沉菩提結誓其在茲焉承天體道烈文英武朝鮮國王李瑈御製圓覺寺碑文金守溫奉教撰成任奉教書薑希孟奉教篆龔惟我主上殿下在位甲申功成治定禮秩樂和邦家間暇民物阜康上乃遊神至道恭默玄教思與億兆羣生共植德本同躋壽域如來一代所説三藏十二部中唯大圓覺真頓教真詮萬機之餘親定口訣漢諺交宣將使國人皆得聞大乘之道是年夏四月庚戌孝寧大君補於檜巖東岡竪石鍾厝釋迦舍利仍設法會講圓覺經是夕如來現相空中神僧經行壇上瑞氣彌布放光照耀甘泉普洽舍利分身八百餘粒五月甲寅補具靈迹奉舍利以聞殿下與王妃頂禮于含元殿舍利又分身四百餘粒百官上箋稱賀乃大赦中外傳旨議政府若曰仁賢劫千聖迦文氏為第四道冒十方智周一界説法度生其道流至支那八萬四千餘部而圓覺一經乃本起究竟之果豫就譯名句發揮其義將以流布適伯父孝寧大君開闡法會諸佛如來現顯神變至於如此五濁像季遇此稀有宜乎營興福舊剎名之圓覺用寓最上法文之義何如羣臣拜手稽首曰敢不祇若王之休命寺在國都慶幸坊周圍二千餘步初我太祖康獻大王定鼎漢陽寺為曹溪宗本社宗既共罷寺亦尋廢為公廨者垂四十年矣越六月乙卯殿下親幸于茲周覽白嶽鎮北木覔拱南厥位面陽厥址爽塏宜建大剎即命臣補等提調監蒞其後先搆假屋於艮隅始造佛像忽見黃雲覆于屋上空花繽墜五色咸備補等馳啓殿下御勤政殿受羣臣賀肆赦賜百官爵一級九月甲子寺之正殿上瑞氣騰湧上薄青霄屬于含元殿羣臣又上箋稱賀殿下大赦於是役徒坌集勿亟而勤四衆施捨唯恐或後至十月乙卯告訖以楹計者總四百有奇佛宇中峙賜額大光明殿左為禪堂右為雲集有門曰寂光之門次外曰般若之門次外曰解脫之門棲鍾有宇曰法雷之閣供辦有厰曰香積之寮鑿沼東偏植之芙蕖西開苑樹以花卉正殿之後庋置藏殿曰海藏之殿又建窣覩婆十有三層安分身舍利及新譯圓覺經殿堂寮舍倉庫厨𣞺各得位序規模宏敞金碧焜煌壯麗輪奐之美鮮有其儷至於楗椎道具恆用什器悉瞻悉備明年四月八日命召諸山韻釋大設法會轉新譯圓覺經落之殿下親詣道場令侍從臣僚及殊方來聘者皆入瞻禮于時五雲紛郁天花交雨白龍夭嬌雙鶴翩翩于雲際休祥遝至萬目咸覩特賜寺僧米布又明年四月八日以窣覩婆成設法會殿下親幸又有天花瑞氣舍利之異又有白氣騰上分為數道橫亘空中宛轉成輪重疊無盡日光黃薄僧尼道俗瞻仰膜拜者以億萬計及還宮學生耆老教坊皆獻歌謠都人士女填咽街巷抃舞踴躍歡聲如雷殿下降赦賜百官爵一級百僚合辭請曰臣等伏覩創大伽藍建大法幢設大法會奇祥異瑞不一而足實曠古罕聞非唯佛菩薩道化難思抑我殿下至德凝道默契最上乘之致也請文于石以示永世乃召臣守溫筆之守溫承命悸栗不敢以辭伏惟主上殿下天縱聖智卓冠百王曩在潛邸明炳幾先平定禍亂昭受景命即位以來勵政圖理不遑暇食修德行善敦化正俗雨暘時若民和歲豐登于至治威加海外僻遠之方梯航絡繹盛德隆功致治之美三五以還蔑以加矣重念羣黎長夜昏瞀輪回諸趣無有出期乃依了義經親自演釋期於易曉頒布中外於國都中又建大剎使億萬蒼生近佛慈化去邪歸正咸為善俗同入如來薩婆若海臣庶百工罔不歡抃子來趨事鼕鼓不勝不數月而告成於呼宸謨睿猷上答佛囑下孚輿望百神協順兩儀效靈自經始以來嘉祥駢集景貺肹蠁猗歟盛哉我覺皇普濟神通之化我聖上至誠感道之妙豈臣之管見所可得而名言耶然臣沗備陪從覩茲勝美敢不鋪張贊揚使鏗鍧炳耀於無窮謹拜手稽首獻銘曰於皇我后勇知天錫炳幾定難亨屯拯溺人與天歸景命維僕奄臨大東勵精圖乂祖述憲章三五與配業業兢兢無時豫怠善政善教在宵十歲風淳俗厚熙熙盛際乃念蚩蚩同一性體飄墮迷途罔知攸濟惟此圓覺諸法本母乃譯乃訣章分句剖諄諄之教等于金口竪鍾設會宗室之首正法弘宣如獅子吼靈應疊現聞于我后我后曰咨來汝卿士如來神化不可思議遇此殊勝喜慶何比舊有寺基在國都中盍圖重修用揚玄風規畫依次悉自宸衷乃命臣補乃董厥工民競子來不日歇功殿閣寮廡檻砌房櫳翬飛鳥革既枚既實有塔在庭如多寶出鈴鐸語空寤衆聽諦盛會再闡鑾輿再詣奇祥異瑞雜畓繽紛凡有耳目孰不歡忭邦之四民又彼殊俗萬口一辭齊呼共躍我后神聖應五百期武功文治千載一時我后聰明洞達玄教四智之化十善之效曉我羣迷如夢而覺我后大慈方便載施載建塔廟載使民知正果獲成邪因獲離以先覺覺同躋圓覺法施無窮澤利斯博曷昭厥美貞珉是托大圓覺寺碑陰記成宗二年辛卯立碑正憲大夫議政府右參贊兼藝文館大提學知成均館事同知經筵事臣徐居正奉教撰嘉靖大夫禮曹參判兼同知春秋館事藝文館提學臣鄭蘭宗奉教書蓋聞玉毫垂相而靈迹顯于西方金人入夢而正法流於東土自迄今千數百年靡不崇奉然大覺妙旨微密難言像季衆生津梁易迷苟非大聖人作君師深契空桑弘揚教則聞大道覺真源今日之善根修將來之勝果恭惟我惠莊大王信旁窮經典幾政之暇親定圓覺經口訣而釋之又建大剎俾都下四衆不出門奉慧光開人天善者嗚呼至哉羣臣請立石紀迹命判中樞府事臣金守溫撰其事未幾宮車晏駕襄悼大王就位天今我主上殿下紹述先猷命刊經都監若曰我烈祖既有盛德大功濟復闡玄化用敷遺後人其事迹之詳具載于碑尚今未立維豫小子功又命臣居正等記事之顛末益未樹之事者以傳不朽於是都提調臣韓明澮等監蒞鐫刻旬月乃成用樹于解脫門內之東臣切伏念法王之度生聖王之治世其揆一也惟我惠莊大王既能集之又能體佛之大道以為道其盛大之迹後之休有非臣蕪拙所得罄僅次其梗概于石之陰云造成都監都提調孝寧君臣補臨瀛君臣璆永膺君臣琰輸忠靖難同德佐翼功臣大匡輔國崇祿大夫領春秋館事世子師高靈府院君臣申叔舟輸忠衛社協策靖難同德佐翼功臣大匡輔國崇祿大夫上黨府院君兼判江原黃海平安都體察使臣韓明澮推忠佐翼功臣大匡輔國崇祿大夫議政府左議政監春秋館事世子傅綾城府院君臣具致寬興祿大夫永順君臣溥提調輸忠佐理佐翼功臣崇政大夫判中樞府事兼判禮曹事世子二師仁山君臣洪允成崇德大夫青城尉臣沈安義崇政大夫知中樞府事兼五衛都總府都總管臣金崇憲大夫銀川君臣穳崇憲大夫玉山君臣躋推忠佐翼功臣正憲大夫議政府右參贊茂松君臣尹子雲正憲大夫同知中樞府事臣金國光推忠佐翼功臣正憲大夫商山君臣黃孝源推忠佐翼功臣正憲大夫禮曹判書原城君臣元孝然推忠佐翼功臣正憲大夫西原君臣韓繼美正憲大夫戶曹判書臣盧思慎執事通政大夫僉知中樞府事行忠佐衛上護軍臣鄭自源通政大夫僉知中樞府事行義興衛上護軍臣洪孫通政大夫僉知中樞府事行忠佐衛上護軍臣薑允通政大夫僉知中樞府事行忠武衛上護軍臣安道通政大夫僉知中樞府事行龍讓衛上護軍臣權良通政大夫僉知中樞府事行龍讓衛上護軍臣安克思通政大夫判繕工監事臣任克己通政大夫判軍資監事臣柳季折衝將軍行龍讓衛上護軍臣金折衝將軍行龍讓衛上護軍臣金子省中直大夫繕工監正臣李保功將軍行忠武衛副護軍兼宣傳官臣李約東威將軍行義興衛右部司直臣睦將軍行義興衛中部副司直臣老忠毅校尉右部司直臣趙奉訓郎行東部令臣安後道刊經都監都提調輸忠衛社協策靖難同德佐翼保社炳幾定難翊戴功臣大匡輔國崇祿大夫上黨府院君領經筵春秋館事兼判兵曹事臣韓明澮推忠佐翼功臣大匡輔國崇祿大夫領議政府事領經筵藝文館弘文館觀象監事茂松府院君臣尹子雲輔國崇祿大夫行判中樞府事兼知經筵成均館事臣金守溫提調崇祿大夫行護軍臣金溉推忠定難翊戴功臣崇祿大夫西平君兼知經筵事臣韓繼禧推忠定難翊戴功臣崇祿大夫議政府左贊成兼判義禁府事知經筵事弘文館大提學判吏曹事宣城君臣盧思慎推忠定難翊戴功臣資憲大夫花川君兼五衛都總府都總管臣權瑊推忠定難翊戴功臣嘉靖大夫行承政院都承旨兼經筵參贊官尚瑞院正弘文館直提學春秋館修撰官雞林君臣鄭孝常嘉靖大夫坡城君臣尹贊副提調折衝將軍行龍驤衛司直臣趙祉執事禦侮將軍行龍驤衛司猛臣金孟鏻禦侮將軍行虎賁衛司猛臣禦侮將軍行虎賁衛副司直臣林昌禦侮將軍行義興衛司猛臣趙嶺禦侮將軍行衛司猛臣李禦侮將軍行虎賁衛司正臣李有仁保功將軍行虎賁衛司果臣成繼性禦侮將軍行虎賁衛副司果臣李十一年丙戌七月甲申十五日圓覺寺白玉佛像成迎入含元殿設點眼法會稗官雜記云光陵朝京城創圓覺寺塑立佛有倭使見之曰凡佛皆坐此佛獨立焉是行步象也寺其不久乎至燕山時毀是寺黜佛於外歷三四寺行步之言果中矣燕山主十年甲子以圓覺寺為聯芳院妓坊中宗七年壬申毀撤圓覺寺以其材分賜燕山時毀家諸人實録漢陽寶塔如來舍利世祖大王甲申五月孝寧大君補於楊州檜巖寺設圓覺法會得釋迦如來分身舍利進獻六月王命於漢城中部慶幸坊興福寺舊址創圓覺寺越明年乙酉功畢又建塔安舍利故實録云丁亥四月癸卯二十八日圓覺寺塔成設燃燈會以落之金守溫撰大圓覺寺碑又建窣覩婆十有三層安分身舍利及新譯圓覺經又云明年四月八日以窣覩婆成設法會殿下親幸云云尚玄曰或云塔自元國來非也蓋塔之石質與楊州健元陵之神道碑開城鳳鳴山正陵高麗恭愍王妃魯國大長公主之陵之屏風石皆相同乃朝鮮産之大理石也或云寒水石亦云蠟石塔之簷廡亦朝鮮式其繪刻工術亦極巧緻最下三層皆刻羅漢神將之變相自第四層始刻佛菩薩像有文可記者正南第四層三世佛會第五層華嚴會第六層消災會正東第四層彌陀會第五層多寶會正北第四層龍華會第五層法華會第六層楞嚴會正西第四層靈山會第五層圓覺會其餘諸層字皆刓沒不可讀塔之最上三層落在地下此有二説一云壬辰兵亂欲移去日本以其太重故止之一云中宗壬申毀圓覺寺時命移建本塔于楊州檜巖寺撤下三層忽有白雲繞塔之異攸司奏聞王命止之前韓光武年間毀撤塔傍之民家作塔公園圍以甓墻栽以花卉燃電氣燈夜明如晝遊人遝至有如當初舍利放光之時也金剛山禮法起真身金剛山故號法起道場而摩訶衍為其獅子座也朝鮮相傳世祖大王幸金剛山長安寺欲往摩訶衍至青鶴峯下距表訓寺一弓之地有兩歧路左去摩訶衍右去圓通菴有能仁菴忽聞空中有聲呼曰汝是小乘羅漢之後身豈能足踏大乘菩薩之真身祖向空對曰千万人皆從此路過何獨不許我過空中又曰汝為世主與尋常人有異故也祖乃先入圓通菴羅漢道場齋沐祈禱發大乘心更取他路迃回以達摩訶衍云云西山大師金剛山長安寺新鑄鍾銘序山之根東連日本水之源西接天竺吾東方山水之美未有如金剛者焉也禪剎之精且潔者亦未有如長安剎也剎在山之西爽塏居最屋宇壯麗清修苦節之徒如八表雲之從龍焉常住衆不下二百自新羅為山之本社至于我世祖大王親幸是山禮法起真身云云又洛山寺新鑄銘序金守溫撰云太上大王在位十二年東巡登金剛山禮曇無竭月精寺見文殊童子月精寺者即謂上院寺也朝鮮相傳世祖大王嘗患惡疾滿身有瘇瘡幸五臺山文殊道場虔誠祈禱幸月精寺御臨上院屏却侍衛脫下御衣浴於溪上忽見有一小沙彌從林間過去祖呼之來命使洗體愈暢異常視之瘡已愈祖乃致謝又託曰汝若逢人慎勿言手洗玉體童子曰王若逢人亦勿言親見文殊因忽不見祖大驚異命畫工圖寫其所見之相好而奉安焉今上院寺童子文殊像即是也世祖入上院寺佛殿將行禮拜忽有一貓口銜御衣止之祖異之即出命索之佛桌下果得一刺客斬之故上院寺有養貓田蓋自此時始云王宮內素多貓設穽捕之而不許斬殺而具容貌疤記放其貓于廣州奉恩寺前舞童島此法始于普雨之時故劃給貓田五十頃屬于奉恩寺以為飼貓之資矣世祖嘗飯僧于上院寺親臨觀之與衆僧共坐有小沙彌捧鉢遞飯至世祖前輒曰李居士請喫飯衆僧驚駭罔知攸措世祖獨大喜賜沙彌三品職令纏紅帶世傳今俗兒童之纏紅帶者即其濫觴云云蓋所謂親見佛菩薩者古亦有其事三國遺事云長壽元年唐武后年號孝昭新羅即位始創望德寺將以奉福唐室望德寺已見於文虎王之時今系孝昭王代誤矣六年丁酉設落成會王親駕辦供有一比丘儀彩踈陋局鬧立於庭請曰貧道亦望齋王許赴床杪將罷王戲調之曰住錫何所僧曰琵琶岩王曰此去莫向人言赴國王親供之齋僧笑答曰陛下亦莫與人言供養真身釋迦言訖湧身凌空向南而行王驚愧馳上東岡向方遙禮使往尋之到南山參星谷或云大磧川源石上置錫鉢而隱使來復命遂創釋迦寺於琵琶嵓下創佛無寺於滅影處分置錫鉢焉二寺至今存錫鉢亡矣智論第四云昔有罽賓三藏行阿蘭若法至一王寺寺設大會守門人見其衣服粗弊遮門不前如是數數以衣弊故每不得前便作方便假借好衣而來門人見之聽前不禁既獲預坐得種種好食先以與衣衆人問何以爾乎答曰我比數來每不得入今以衣故得此座得種種食宜以與衣爾事可同按讚曰燃香擇佛看新繪辦供喚僧喚舊知從此琵琶嵓上月時時雲掩到潭遲光陵厭世意欲斷髮朝鮮相傳世祖大王幸金剛山初至斷髮嶺上望見山色秀麗世念皆灰即欲斷髮左右諫阻祖曰既已發心不可輒止遂斷頭部中心之髮因名其嶺今俗剃百會髮者自此始云蓋俗呼頔門曰百會穴按輿地勝覽斷髮嶺在天磨山距淮陽府一百五十里諺云俗人登此嶺見金剛山者思欲斷髮出世故名云云兩説未知孰是按懶隱保郁和尚所述金剛山榆岾寺續事迹記云故老相傳多訛不真如斷髮嶺斷髮拜岾嶺一步一拜實是前朝王將軍之事也即高麗太祖也世皆云光廟之類也燕山汰僧命如懸絲按海東佛祖源流釋淨心號碧溪金山崔氏遠嗣龜谷又入明傳臨濟宗下總統和尚法印而來恭讓時辭退後因沙汰長髮蓄妻孥入黃嶽山山在黃澗郡隱居于古紫洞勿罕里云云又按東師列傳近世海南大興寺釋梵海所撰碧溪和尚入黃嶽山長髮避世是當朝鮮太宗大王沙汏佛法之時云云尚玄曰碧溪和尚既是高麗恭讓時人則與龜谷同時也何云遠嗣龜谷愚謂遠字非以年代距離言之而似以居地距離言之也又朝鮮太宗之時雖有減宗之事而並無沙汏之舉則東師列傳未知何據也俗離山法住寺住持徐震河禪師為余言曰記得曾見虛應堂集普雨和尚文集有自燕山朝至中宗朝凡四十餘年沙汰佛法之語云云按燃黎室述記燕山主在位時荒淫無度以圓覺寺作妓坊又按自廢朝燕山朝以後都城寺剎皆廢為公府兩宗托虛名於清溪寺在廣州清溪山號為禪宗云云然則於其中間停廢禪科驅逐僧尼不言可想也虛應集中沙汰之説即指此事者歟又按燃黎室述記有云燈明寺學祖在直指寺寺有好圓柿每進二馱于內殿內殿即燕山君之慎妃也密啓曰敝寺距京都僻遠願令本宮奴子歲來受兩三馱輸進妃下懿旨曰此甚易事但慮樹果歲或實有不實如值不實之年而宮奴往徵依數馱載則永為無窮之弊矣其長慮如是由是觀之燕山慎妃因好佛故學祖和尚如是通奏決非在沙汰時者之所為也然則太宗或燕山時沙汰云云之説並屬無據慵齋叢話云成宗時嚴度僧之禁州郡推刷無度牒者長髮還俗中外寺剎皆空云云碧溪之長髮晦迹或在此時歟蓋碧溪若為恭讓時人則距碧松年代太遠若為成宗時人則又距龜谷太遠則佛祖源流所云遠嗣龜谷之遠字即以年代距離言之也碧溪心印分傳兩人尚玄曰碧溪之法脈有可疑者非但此也按海東佛祖源流碧溪和尚隱居黃嶽將啓手足傳禪于碧松傳教于淨蓮淨蓮名法俊講法華經世稱俊法華又許端甫清虛堂集序道峯靈照國師入中原得法眼永明之傳宋建隆間返本國高麗大闡玄風以救末法祖師西來之旨始有所宣揚而東土蒙伽梨者乃獲襲臨濟曹洞之風其有功於禪宗也詎淺鮮哉師之正法眼藏傳于道藏神範歷清涼道國龍門天隱平山崇信妙香懷瀣玄鑑覺照頭流信修凡六世而得普濟懶翁翁久在上國博參諸善知識圓通即詣蔚為禪林之師表傳其法者南峯修能為嫡嗣而正心登階正心淨心音通實繼之即碧松智嚴之嗣也碧松傳于芙蓉靈觀得其道者唯稱清虛老師為最杰云師諱休靜家本安西少習儒家言已通大義辭章彬彬然視決科若承蜩者逮遊頭流忽發大願投芙蓉門下披剃受法流通八教徹三觀中略師莊持大法遍棲名山臘已屆七十矣宣銀鼓於寶坊轉金輪於香地盡破羣迷獨竪玄拂道峯普濟之教至此而益弘明矣中略噫金言將剖玉㲲俄灰秖樹息陰慈航失棹人天之慟曷有極耶鍾峰政公聞師之訓而興起者傷智幢之已折悼戒寶之久沉裒集遺文以寓永慕入涅槃之夕招囑門人曰吾師之遺草吾不獲繡梓而遽爾淪逝將負初心爾等毋忘我誡俾卒其事則吾亦瞑目於九原矣且謂居士於此教有微勝因以辨文為托其門人惠球來踵居士之門道亡師言為請居士曰果哉蓋有由焉吾先子視清虛猶執友不肖在少日蓋嘗於簡札覩之矣頃歲西遊獲見老師於逆旅親聆妙諦頓割蓬心師以身後碑文屬於僕僕襟裾士也於竺教枘鑿焉何足模其行乎爾師之托其聞乎是歟感念先故不敢固辭因敘其師法相傳之迹而略述師之梗槩以歸之云云又按許端甫所撰有明朝鮮國慈通弘濟尊者四溟松雲大師石藏碑銘序自象教之東被三韓也教律並倡圓漸分門數千年來蒙伽梨者人人各自誇握牟尼之寶矣唯牧牛普照國師江月懶翁王師獨得黃梅宗旨蔚為禪林之冠鉗鎚一震万人皆廢俾涅槃妙心正法眼藏祕傳於青丘之域豈不異哉普濟懶翁五傳為芙蓉靈觀而清虛老師稱入室弟子其慧觀妙悟有出於前輩實近代之臨濟曹洞也厥後嗣法者不無其人而緇門盛推四溟大師謂可繼西山之傳或庶幾乎哉下略銘曰維薄伽梵倡法竺乾涅槃妙心燈以燈傳真丹真丹震旦音通之東逖我三韓疇承永明江月獨圓嗣其末照西山最先慧炬晨朗智鏡宵懸于于上足其指百千只詡鍾峯能筏迷川云云合以觀之許端甫氏既於佛法亦不茫昧且與西山四溟兩師深相知故西山以身後之碑文屬之四溟以卷首之辨文托之矣且許氏序特敘兩師師法相傳之迹而以碧溪為懶翁之法孫又以懶翁為法眼永明之宗派豈於平素有所承受者歟甚有可疑者焉蓋受鍾峯之託而請文于許氏者惠球其人是也法脈系統如是失敘何不即請改正而仍梓而刊之乎蓋因許氏位高自詡之故惠球不敢煩瀆也何以知其然也試觀下文中觀大師名海眼撰泗溟堂松雲大師行迹有曰秪如小弟子海眼烏石嶺望州亭邊末席下穢滓者也而大師之室中節適弟子惠球丹獻等與八表黌侶相為之議曰清虛是能仁六十三代臨濟二十五世直孫也永明則法眼宗也牧牛子則別宗也江月軒則分派於平山本碑中吾師之傳於臨濟昭穆失次若後世盲聾乎智者愈久而愈傳無乃有駭耳目者乎以海眼雖乏外孫虀臼且有董狐直筆持其本碑再三為請故越三十一年蒼龍龍集白龍龍月射兔日謹書以是推想則可知其時之情况也雖然朝鮮初葉懶翁法𣲖為較盛以有高峯及涵虛兩師為當時禪門之宗匠名聲頗高門徒亦多故也太古門徒雖云不少一脈相傳命如懸絲碧溪得碧松淨蓮淨蓮亦號白霞兩人然後法裔始昌大矣按碧松堂行録有示法俊禪伯逢君贈與鏌鎁釰勿使鋒𨦵生緑苔五蘊山前如見賊一揮能斬箇箇來之偈以此觀之可知法俊亦禪教兼修者也金守溫遭國子擯斥朝鮮金守溫字文良號乖崖世祖使公赴北京尋梵字不傳東方者甘露寺住持中華名釋也聞公東國大儒預設椅桌為置筆硯鵝溪紙於其上公入門見壁有墨梅即染筆題曰曹溪黃梅甘露墨梅若以色見不是般若住持下庭叩頭秋江冷話公兄釋祖世傳信眉即公兄也為和尚雄文巨筆一時無敵居俗離山成佛福泉石鍾藏舍利旱則禱雨成宗九年親行養老禮於國學臺官啓曰金守溫誠孔門之罪人不當與於斯禮請出之上以問于政院政院對曰守溫上書世祖朝自願出家成佛願從臣兄慧覺尊者信眉為僧云云仍逃之山寺故臺言如此乃命守溫勿與於禮尚玄曰吾為乖崖作解嘲詩曰悉達求法參仙人仲尼學禮問老子牧隱上書抑異端蓮社念佛誰敢鄙栗谷出家耽釋教泮宮謁聖不為耻惠化門通北去人蕩平碑下東流水梅堂受知逃世為僧金時習號梅月堂五歲能屬文號神童世宗聞之命招于承政院知申朴以昌試之曰童子之學白鶴舞青空之末公對曰聖主之德黃龍翻碧海之中世宗召其父日省教曰豫欲親見恐駭人聽宜鞱晦教養待年長學業成就將大用即賜帛五十匹使自運公遂各綴其端曳之以出由是聲震一國既蒙睿獎益懋遠業端宗乙亥方讀書于三角山即閉戶大哭盡焚其書發狂逃世托迹沙門名臣録公所談論不失儒家宗旨至如禪道二家深究病根而喜作禪語發闡玄微雖老釋深於其學者莫敢抗其鋒自以聲名早盛而一朝逃世心儒迹佛取怪於時故作狂易之態以掩其實士子有欲受學者逆擊以木石或彎弓將射以試其誠入居水落精舍修道煉形見儒生則言必稱孔孟口不道佛法人有問修煉事亦不肯説師友名行録狂吟放浪玩弄一世雖逃世於禪不奉其法世以狂僧目之行過市肆或凝眸忘歸植立移刻或便旋衢路不避稠視羣兒指笑爭擲瓦礫以逐之名臣録世祖嘗作法會於內殿公亦被揀預忽凌晨逃去不知所之遣使踵之則故陷街里溷穢中露半面而已諸比丘推以為神師服事頗勤一日合辭請曰弟子等奉大師久尚斳一教大師清淨法眼終以付誰諸生迷方願受金篦之刮請益堅公曰若大開法筵公具袈裟法衣坐跏趺緇流坌擁合掌羅跪方聳聽公曰可牽一牛來衆莫測所以牽牛繫庭下公又曰將芻朿來令置牛後大笑曰爾等欲聞法是類矣人之迷冥無識者俗謂之牛後置芻緇衆赧然而退龍泉談寂記或有語金守溫坐化之事公曰乖崖平生多欲必無此事假有之坐化於禮不貴吾但知曾子易簀子路結纓而死之為貴也不知其他秋江冷話僧學祖亦公之族而為僧者不下於公每與之抗二日同行山中時雨初霽路傍有野豕所掘葛根成坎處頗深積潦滿坑公曰余欲入此潢潦中翻轉而出若能從我乎即與同入潦中翻身而出公一身及衣服無一沾濕處學祖則濁潦滿面衣服盡濕公笑曰爾焉能效我乎月汀漫筆辛丑年間時年四十七食肉長髮為文以祭祖父略曰帝敷五教有親先罪列三千不孝為大愚騃小子似續本支沉滯異端末路方悔遂娶安氏女為妻人多勸之仕終不應放曠如舊未幾妻沒復還山作頭陀形秋江冷話癸丑終于鴻山無量寺年五十九遺戒無燒葬權厝寺側三年啓殯面如生以為佛竟茶毗之為之立浮圖名臣録有四方志一千六百紀山紀志二百又有詩卷李耔讀其文曰佛迹而儒行者也眉叟記言明天淵者元末翰林學士元亡剃頭為僧名來復字見心而其鬚如故高皇帝召之怪問之對曰削髮除煩惱留鬚表丈夫我朝梅月堂亦為僧而不去鬚曰削髮逃塵世留鬚表丈夫未知其有慕於來復而效之歟抑亦暗合歟二公節槩亦略相似可謂奇事溪谷漫筆金時習出家嘗居雪嶽五歲庵自號雪岑著法華經拈頌又注十玄談要解序曰玄談十篇乃佛祖玄關非沒量漢莫能覬覦其門戶同安常察禪師向關裏揬入慈悲忒𢞀開示迷途不妨益衆生知見山僧重畫蛇安足葛藤上更加枝蔓然月不因指癡兒不能見兔不尋蹄饞靈不能得理會此談必因指蹄見月得兔了還我葛藤徠成化乙未桃節哉生霸清寒苾芻雪岑注于瀑泉山中後又有悅卿注字樣栗谷失恃出家耽釋李珥字叔獻號栗谷世傳栗谷生長於江陵之蓬坪早失所恃日夜號泣一日偶閲釋氏書深感死生之説且悅其學簡便清淨有欲謝人事之意十九歲入金剛山貽書留別諸友仍棲山寺戒定堅固至忘寢食居無何覷破釋氏近理亂真處遂盡棄其學專心吾道二十三謁退溪李滉于陶山退溪與月川趙穆書曰李生珥明爽多記以見後生可畏公有獻退溪詩曰溪分洙泗派峯秀武夷山活計經千卷生涯屋數間襟懷開霽月淡笑止狂瀾小子求聞道非偷半日間月川稱玩不已退溪曰詩不如其人又致書于公曰聖遠言湮異端亂真程張朱諸先生其時若不能無小出入而旋覺其非非天下之大智大勇其孰能脫洪流而返真源也哉往聞人言足下讀釋氏書而頗中其毒心惜之久矣日者之來見我也不諱其實而能言其非吾知足下之可與適道也所懼者新嗜靡甘熟處難忘五穀之實未成稊稗之秋遽及也行狀李潤雨言公庶母性悖無道初年出家蓋以此後於石潭見其庶母感其恩德變作良善人金長生沙溪言公之入山實耽禪教兩説不同如此燃黎述記公十餘歲文章已成有重名父惑於嬖妾不得於父出家雲遊禪號義菴緇徒尊之以為生佛以竹兜子肩擔而行年二十長髮應舉為一時儒林領袖異議者以此貶之亦不怪也初以生員詣泮宮謁聖掌禮閔福訾以沙門不許日至晚榜中皆失色公神彩自若未嘗少變涪溪記聞宣祖元年為弘文館校理公上疏曰臣髫年求道學未知方泛濫諸家罔有底定生丁不辰早喪慈母以妄塞悲遂耽釋教因昧本心走入深山從事禪門逮周一年賴天之靈一朝覺悟纍然歸家慙憤求死自古中釋氏之毒未有如臣之特深者當是時自分為世所棄便欲躬耕讀書以送天年臣父惜臣雕蟲末技強令求名遂作舉人應舉不撤區區之意只求升斗之祿以救飢寒耳豈期好官倘來謬恩橫被歷職郎署出入華省自顧初心不寒亦栗請命解臣職退之畋畝勉力為學以修舊愆上答曰自古豪傑之士未免佛氏所陷溺不可以昔日耽釋之小失輕遞論思重任且悔過自新其意可嘉宜勿讓癸未記事日月録大司諫宋應溉疏略曰李珥本一緇髠也斷棄其親得罪人倫若論其罪先儒固有定論化身還俗豢養權門初選上舍館中多士不許謁聖賴沈通源遣其子鏵奔走先後乃得行之及其出身為沈義謙所薦拔得踐清顯結為腹心死生以之中間自稱向學文之以詞藻自附於當時云云時應溉朝回出彈文示其甥申欽象村時年十八問爾意如何欽覽徐對曰李某負當世重望緇髠等語似已甚耳應溉默然羣從譁然欽之見擯於東人始此象村諡狀尚玄曰按此乃朝鮮黨人之始也宣祖當時官場之中黨於沈義謙者謂之西人黨於金孝元者謂之東人茲後又分所謂四色黨派即東人西人南人北人東人亦稱少論西人亦稱老論南人又稱午人西人之中又有老西少西功西清西之派南人之中又有清南濁南詩南碧南之名北人之中又有大北小北中北骨北肉北皮北清北濁北之黨皆各有所主張之義理世守勿替罔或變改在朝焉互相詆軋在野焉不通婚嫁垂三百餘年遂爾頑固難破黨性焉遺傳人格焉薰成古今天下未有如是可驚可歎可笑可耻之歷史也許倜諫王擊供沮祭朝鮮儒臣最斥佛者有二許氏一為世宗朝之許倜一為世祖朝之許琮也筆苑雜記許倜嘗為持平諫官也世宗晚年頗作奉佛之事欲於僧寺親祭忌辰公諫不納即率吏隸擊破支供以沮其行遂亡匿俟上怒霽乃出許琮字宗卿號尚友堂世祖簡文臣分習天文地理公屬天文學研窮步天之法適有日食之變公書啓推步其末並論上好佛法喜遊畋畝之失凡六事世祖以為有志有才命加一資後以兼藝文講書世祖曰汝是前日言事者歟公申論前啓之意世祖欲試其守摘疏語以詰曰十旬不返以麵代犧豫無是失而以夏康梁武比豫何也佯加威怒命捽下杖之侍者罔測天意無不股栗失措世祖又取匣劒橫膝命力士崔適曰候吾拔劒盡匣即斬之徐徐拔劒光閃閃照人末垂露公猶確然不動略無懼色隨問而對音吐洪暢世祖還納劒匣中曰真丈夫也世祖分授諸名臣釋經誦之名儒老師皆不免至公則曰如某不喜佛其勿授之行狀又有二鄭一洪皆世祖朝人而其行狀與許琮殆相似也鄭麟趾以領相論儒釋是非忤旨付處黜待之罰數月召還朝野僉載鄭蘭宗美風儀襟度豁然早為世祖器重一日問周易圓覺經優劣公曰佛氏妖書何得與三聖經比並乎世祖震怒命力士捽下撞之公神色自若名臣録洪逸童字日休號麻川嘗於上前論佛事上佯怒曰當殺此虜以謝佛氏命左右取劒來公論辨自若左右佯以劒撫頂者再亦不顧視無懼色上壯之曰汝能飲乎公曰樊噲漢士也項王他主也巵酒彘肩不敢辭况聖賜乎賜酒一銀盆健倒上曰頗畏死乎公曰當死則死耳敢以生死易其心乎上喜賜貂裘一領筆苑雜記李鼊闢佛焚像免罪朝鮮成宗大王二十年仁粹大妃韓氏造佛像送于淨業院儒生李鼊等取而焚之大妃請治鼊罪王辭曰儒生闢佛可賞不可罪况自內聞之而命推儒生非人君之政也大妃不能強尚玄曰黃海道信川郡九月山廢興林寺昔有鐵佛像有一儒者稱以闢佛取而銷之忽自像之臀部片片爆飛皆成小佛相好畢備一手指天一手指地其人懼而止竟得暴疾死月精寺僧奉安其佛并其小佛于本寺月精寺近猶殘存數軀人有見之者又挽近二十年以來耶穌教徒耶穌新教徒至寺院有指佛為魔鬼之偶像肆其斥罵者有唾於佛面者甚至有毀傷佛像之肢體者寺僧無力任其所為莫敢奈何矣蓋耶穌教十誡之中有勿拜偶像之一節耶穌教出埃及記十誡一曰我外勿置他神二曰勿拜偶像三曰勿妄稱耶和華之名四曰守安息日五曰恭敬父母六曰勿殺人七曰勿姦八曰勿偷益九曰欲害汝鄰勿作妄證十曰母貪人宅第妻室及一切所有此與佛教十戒一不殺生二不偷盜三不邪四不妄語五不綺語六不兩舌七不惡口八不貪九不嗔十不癡大同小異守十戒則生天堂之説皆亦相似雖然余見耶穌舊教即加特力派塑安聖母瑪利亞像于寺院禮拜堂而其教徒亦佩釘死十字架之耶穌像則此非偶像而何何獨於佛謂之偶像而斥之耶將為何辭以辨之余知其將曰耶穌新教改良舊宗並與聖母以及耶穌一切無像以為主義也云云余惟天壤之間所有學術宗教以及一切事物無一不依生人之情理而建立者也夫天地百物作像象之者曰偶像見舊約今造像拜像有關係上不得已者存何也即如世人眷屬親友互相贈遺寫真肖像時時展看以伸紀念之情假使有人道見其父之銅像焉有不拜者乎是情理上關係之不得已者也若有偉大事業之家絶世勳功之人或圖畫其形於麟閣雲臺或鑄立銅像於通衢大道使之矜式於一國之中瞻敬於千載之下是歷史上關係之不得已者也又於貨幣鈔票印章刻雕名君賢相之面貌使用於萬民之手者是技術上關係之不得已者也祠廟之神像寺院之佛像令其信徒攝心對象是宗教上關係之不得已者也今儒教敬奉木造之神主筆寫之真影者也景教敬奉聖母抱兒之像及耶穌釘死之牌者也佛教敬奉三十二相八十種好之塑像者也况乎世尊金口親宣圓覺經云若佛滅後施設形像心存目想生正憶念還同如來常住之日景教亦云上帝聖靈無形無像而造人特肖己之像夫法身無相真佛無形是空也三十二相八十種好是色也空即是色色即是空於色於空何可執著但為後世表法而已傳燈録云趙州從諗禪師示衆云金佛不度爐木佛不度火泥佛不度水真佛在裏坐丹霞天然禪師在慧林寺遇天寒師取木佛燒之人或譏之師曰吾取舍利人曰木頭何有師曰若爾者何責我耶有道流在佛殿前背坐僧曰道士莫背佛道士曰本教中云佛身充滿於法界向什麼處坐得有一行者隨法師入佛殿行者向佛而唾師曰汝沒分曉何以唾佛行者曰將無佛處來與我唾第二十三祖鶴勒那尊者年七歲遊行聚落覩民間祀入廟叱之曰汝妄興禍福幻惑於人歲費牲牢傷害斯甚言訖廟貌忽然而壞由是鄉黨謂之聖子嵩嶽破竈墮和尚隱居嵩嶽山塢有廟甚靈殿中唯安一竈遠近祭祀不徹烹殺物命甚多師一日領侍僧入廟以杖敲竈三下云咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落故號曰破竈墮和尚據是言之佛教之中何嘗重視偶像不過是為凡愚之夫令生渴仰之心故設形像耳然為佛子者忘其自性清淨法身之佛去拜一切神鬼等像求福求子者譬如衣藏寶珠乞食他方者也訓導對策拿問竄配朝鮮成宗大王二十年春正月兼掌令李承健承命設鄉試於黃海道還言臣發策問本道惡疾救治之方永柔訓導權季同對策曰供佛則可救此言有害名教故不取也上乃教曰季同之辭豫甚憤焉當朝家舉賢之日不陳堯舜之道鼓唱浮屠之法是欲使豫如梁武之捨身唐宗之膜拜而後已乎仍命憲府拿致季同竄于極邊又飭該曹勿復度僧又一本云成宗二十年己酉掌令李承健回自黃海道啓曰臣於解圍發策問本道衆弊咀呪救治之方永柔訓導權季同對曰唯供佛可以救之此人心術不正其言有害名教故黜之上曰釋氏蠧國害民人所共知凡有知者在所當辟而季同身居師表之地背儒侫佛欲以其教為救民之方左道惑民莫此為甚其令憲府鞫之且手書下教曰豫常恨緇徒蔑棄天常耗蠧民財將欲絶其根株扶植世教而今者儒生當朝家舉賢之日不陳堯舜之道鼓唱浮屠之法是欲使豫如梁武之捨身唐宗之膜拜而後已乎宜令有司推鞫屏諸遐裔尚玄曰李承健發策之日滿場應對之士讀其文必也崇殷周而鄙漢唐貶蕭曹而薄姚宋箇箇蘆淄川人人賈長沙唯權季同與衆不同為一葉青吾今以詩代之曰苦海蒼生奈爾何茫茫生死任風波誰知彼岸回頭處青眼篙師唱棹歌狂儒取經責諭放送朝鮮中宗大王四年己巳自廢朝燕山以後都城寺剎皆廢為公府兩宗托虛名於清溪寺號為禪宗冬十二月有狂儒數人到寺持經帖而來寺僧日精令寺奴尋其蹤誣謂寺中執用鍮器將七馱而來呈訴捕盜廳將入啓搜其家只有佛經數帖而已俱以實啓命致儒生於政院責諭放之還其經於寺以儒而取經雖無行檢本非怪事而僧徒幻出飛語誣人以罪至煩聖聽其罪難赦臺諫侍從欲正其誣妄之罪而上意留難末流之弊識者憂之陰崖雜記五年庚午三月二十八日興大寺舍利閣災命推鞫儒生及傍近居民寺本新羅古剎我太祖悼神德王后之薨命厝寺內仍創舍利閣嵽高五層嵬立都中且藏寶物佛經于其中自燕山朝廢為分司僕寺中宗即位因為公廨先是火焚其寺只遺舍利閣至是大妃命中使移佛經于內需司儒生尹衡等本無賴或劫奪凌辱之翌日夜初鼓火始起光焰撑空火雲蔽天都城內雖窮谷幽竇之中纖微畢照上初疑姦人欲藉以作亂內間洶洶久而乃定上大怒指為儒生所為即命囚中學西學儒生及寺四方十家內儒生與居民于禁府以不即捕囚譴責禁府官特罷經歷金俌令領相金壽童承旨李希孟往治獄無驗必欲得情於刑獄之下臺諫三公公卿連日伏閣以為儒生不宜以取佛經偏疑火燒亂施刑杖上愈拒之終施刑訊果無驗尹衡等以首謀杖八十付處其餘或杖或停舉臺諫又論自上不當照律尹衡又不宜杖命免之陰崖雜記尚玄曰朝鮮以來崇儒抑佛至是極矣儒藉辟佛目無王法猶能免罪洵非一朝一夕之故其所由來者久矣雖然儒之謂狂亦猶僧之謂妖也遂以狂儒為題作詩曰無賴儒生古亦稀成羣作隊逞狂威淨業院中焚像去興天寺裏劫經歸縱使眼前無釋氏何曾心上有王妃劍山刀樹千般説佛法元來世法依經國大典僧尼條例朝鮮睿宗大王即位元年己丑頒經國大典其禮典之度僧條例有云為僧者三朔內告禪宗或教宗試誦經心經金剛經薩怛陀報本曹私賤則從本主情願啓聞收丁錢正布三十匹給度牒卷三朔者族親鄰近告官還俗當差知而不告者並罪度牃借者與者依懸帶關防牌面律論尚玄曰護軍裕餉防民為僧當時廟算然也故頒此樣條例若依是法其不識字如曹溪六祖慧能大士者必不能成佛其為私賤如朝鮮六祖靈觀大師者必不能作祖也雖然曹溪六祖聞他人之誦經而能悟道朝鮮六祖無本主之情願而亦出家此其所謂官不容針私通車馬者歟度僧條例雖云苛嚴為僧者依然如故明宗五年詔曰良民日漸減縮軍卒困苦之狀莫甚於此時此非他故民有四五子則厭憚軍役之苦盡逃為僧以此僧徒日繁軍額日蹙至為寒心此等之弊高麗時亦然然則何有於法哉不如聽民之為僧者而使盡其為僧之道也若為僧者不依本分裁汰之可也懲罰之可也又經國大典寺社條例有云陵寢至近之地創寺剎者嚴禁陵官不禁者重勘英宗庚寅下教按貞陵願堂興天寺造成記云洪武丁丑葬神德王后于貞陵又於塋域之東創寺曰興天追冥福也太祖召謂臣近權近曰豫化家為國之日惟神德內助實多奄爾遷逝豫甚悼焉冀其利往創立茲寺又欲追擇福國利物永世無窮爾宜為文垂示于後敬陵願堂正因寺記云陵園有寺何也蓋嗣王宮追孝先王側近陵寢制為仁祠以崇三寶以導冥遊也自漢唐以來英君誼辟莫不皆然乃帝王報本追遠無所不用其極之道也光陵願堂奉先寺記云大王大妃懿旨以為稽諸古制先王陵寢之所必有精藍之設又云寺則既立然距陵寢岡巒相隔宜搆真殿于寺側使大行在天之靈亦得遂皈依之敬以和樂冥遊乃立影殿于寺東名曰崇恩殿英陵願堂神勒寺記云大王大妃殿下懿旨若曰先王見父王于夢將欲創寺英陵之下仙馭遄回奄棄臣民未及營締今先王在天而我等不亟從事於遺旨其何以奉先王於地下乎即命韓明澮韓繼禧等令母遠寢園擇定置寺之處又云神勒寺去先王塋域甚邇鍾鼓之聲可達云云等然則祖宗遺制陵寢之側必建佛寺務令近邇今法與古全然相反不寧唯是英宗世孫正宗大王創建龍珠寺於隆陵莊祖之陵至近之處以為願堂矣蓋朝鮮以後所創寺剎無一非為陵園願堂而設者也按慵齋叢話陵室之傍有齋社自昔然也如健元陵顯陵有開慶寺齊陵有衍慶寺厚陵有興教寺光陵有奉先寺敬陵昌陵有正因寺遷英陵於驪州改神勒寺為報恩寺以為齋社獨獻陵無社蓋因太宗遺教也士大夫亦於墓傍作齋菴非崇釋教欲令僧徒禁護墓山也云云慵齋此言未免掩耳偷鈴也試思之王家陵寢之置齋社是為禁護山陵耶抑為薦度先靈耶士大夫家齋菴亦復如是而已又經國大典寺社條例有云凡寺社勿新創唯重修古基者告兩宗報本曹啓聞至于今時朝鮮總督府不許新創寺庵但許重修古基者亦依行是法也輿地勝覽寺社事迹京幾道加平郡雲嶽山懸燈寺事迹云普照國師在望月山圓通菴望見雲嶽山中三夜放光往訪其處則藤蘿之下觀音一殿巍然獨存玉燈懸在殿南石塔之上而火不滅矣於是國師創寺而名之曰懸燈又云新羅法興王時中國使天竺僧摩羅訶彌騎白象傳經法于海東王迎于北漢州摩羅訶彌舉錫東指白雲生於石山遂跣足入其山王為建大伽藍封其山曰雲嶽按新羅真國王或真平王時西域三藏毗摩羅真諦農伽陀佛陀僧伽等三人與安含法師始到雞林譯佛經而不知其所終此所謂法興時摩羅訶彌疑是真興時毗摩羅之傳訛而無據也又云我太宗十一年涵虛祖師自三角山圓覺寺往五神山過雲嶽山西迷失道有白鹿前行隨之踰山度壑得巨林不見其鹿見一古殿在林間殿側有塔塔間有吟曰並日刀口是前身因果既盡又果因師因感悟重建其寺為三大君願堂因奉其位室賜三百結按涵虛築有照燈寺願堂主為洪相國涉仙請普説之文則此可為事實也崇禎甲申後再癸未龜巖老禪文信重建火寺壬辰九月下浣志大施主嘉善大夫兼八道僧大將教宗判事玄楫江華傳燈寺在吉祥山有檀君時三郎城祭天壇遺迹又有史庫朝鮮時代藏歷代實録寺之佛殿頗稱傑搆大正五年住持鞠蓮月得朝鮮總督府寄附金一新修補往年寺曾為士匪所據日兵剿討欲放火燒寺月和尚哀求得免又推還山林十五萬坪寺賴以保月和尚之於傳燈無異重創之主也豐德敬天寺在扶蘇山寺有石塔十三層刻十二會相人物聳動形容森爽其制作時巧天下無雙諺傳元脫脫丞相以為願剎晉寧君薑融募元朝工匠造此塔至今有脫脫薑融畫像輿地勝覽前韓光武九年日本使臣田中光顯移去本塔寺今廢長湍寶鳳山華藏寺事迹云牧隱李公嘗撰指空碑曰西國滿王之子禪賢號指空元泰定間重譯數十國而來見天子于難水之上論佛法稱旨歲給衣糧曰吾不為是也去而東遊高句麗禮金剛山法起道場未幾趣還燕以有旨云云壽峴文集中有華藏寺重建記其文曰寺在畿甸長湍府寶鳳山觀其舊藏梁上短識洪武十八年己丑麗王創淨剎于繼祖菴蘭若遺基額曰華藏乃指空所命也先是麗王嘗聞指空之風采傾心渴求而引見之所言皆從蓋創淨剎立願堂亦從指空之謨而為之也故寺有麗王畫像恭愍王自寫像指空塑像使人仰慕之亦有指空所齋來之貝葉經一夾牛頭旃檀香一條洎我孝廟在潛藩入燕取降真香錫寺僧由是寺多奇物焉東有指空定慧靈照之塔本寺有白地金書法華經稱為稀珍指空和尚帶來牛頭旃檀及貝葉經一卷藏于本寺傳為法寶不幸近今亡失此物近世人趙秋齋名秀三遊華藏寺有詠貝葉經長篇詩云藏經閣上風日好寺僧請余觀佛寶清晨灑掃亞字房盤托出紅錦囊囊中八百貝多葉五軸均分一尺長編以素絲飾楠木祖師手澤鑑毫芒蜀繭吳綾較柔滑蕉葉竹皮俱生疆兩頭草行行七字當中底意加三行蠅頭大小鳥迹如端嚴決非凡人書眼生口呿讀不能有時瞪然視諸僧僧亦唯唯色慚忸只云橫書仍橫讀譬如兩瞽執一畫終日摩挲妄見解不辨紙上畫何物心靈但知生光怪更有栴檀似牛頭聞言一爇通九幽真香如意真珠襖被人盜去今何求我惜真詮方咄咄爾愛外物空咻咻憶昔祖師齎來時行童侍者皆聞知胡不當年譯漢字使我坐聽爾讀之恭愍王自寫像今年為盜所失旋即覔還寺僧當思所以永久保存之道也水原龍珠寺在花山朝鮮正祖十四年命創此寺為顯隆園之齋宮顯隆園今為隆陵即正祖皇考莊祖之陵刻大報父母恩重經凡三版本藏于本寺以寓追慕之孝思見于本寺事迹即如御製花山龍珠寺奉佛祈福偈寺為顯隆園齋宮而建也小子竊取大海量墨須彌聚筆書寫此八萬四千普眼法門之經義乘教謹述偈語以效三業供養一業謂身至誠敬禮二業謂口發言稱美三業謂意正意想念用修報恩福田謂父母有養育之恩若能供養恭敬是名報恩福田初序分一普告人天慧日大聖尊威德叵思議椎鍾告四洲牖衆登十地注略二正宗分七一大地宿因寶花飛曼陀員樹生忉利東土宿吉慶喬山開新寺注略二供養七寶九秋瞻博節工祝奏蕆事金銀及玻璃瑪瑙與硨磲寺建於九月按禮記月令是月也菊有黃華梵語瞻博是也下注略三莊嚴萬偈清淨廣嚴飾重重壯佛居我有優曇鉢萬四千大書注略四應運發祥果然金輪聖應期來作求叶檀風噓七燈蓮雨沃三車注略五福德無量乳海無量福敷錫自初生如稻麻竹葦十乘剎七盈乳海海之數有七乳海居其一謂世有一海其味如乳也下注略六諸佛護佑毗盧遮那光迦陵頻伽聲齊發愛戴願弘誓保佑明注略七菩薩願力復次諸世雄一一皆佛情我知真如是法力照無邊注略三結偈分二一淨土極樂甘露遍淨界秋月滿長天一曲阿蘭若王城上由旬甘露秋月淨界長天皆贊美之辭阿蘭若華言間靜處由旬華言限量有三等不同上八十里中六十里下四十里如須彌山高八萬四千由旬雙持山高四萬二千由旬之謂也龍珠寺距王城八十里二恆沙寶籙於焉現菩提導之躋梵春作偈頌佛恩報果占溱溱注略注末有署弘濟方形印萬機餘暇亦方形印豫即祚二十年乙卯仲夏署奎章之寶方形大印又按國朝編年正宗二十年丙辰此以即位之年計之者也三月以偈字帖替除夕重午禳辟符書下御製文曰佛乘大報父母恩重偈警切剴摯導羣生以躋極樂與吾儒報本尊倫之旨義如溪心之印月豈比於除夕重午雲觀拓頒之禳辟符自今兩明日明日疑即名日之誤代貼此偈以印本遍與之如是我聞佛諦十恩為人勸繞須彌千匝造經典萬卷不如以八種梵音告衆各各為爺娘得生天上快樂齊發願仍命以曩謨三滿多沒馱喃唵秫帝律尼娑縛訶十六字父母往生淨土真言付雲觀印刊以替符貼之進云云世傳正宗大王初欲沙汰佛法適有長興寶林寺僧法名寶鏡者進獻佛説大報父母恩重經乙覽之餘宸心大有所感觸者於是命寶鏡為八道都化主創龍珠寺仍為八路都僧統兼龍珠寺都總攝且刻恩重經板本藏之本寺云水原萬義寺在舞鳳山辛禑時我太祖自義州舉義回軍僧神照在麾下與定大策焉恭讓王時特賜功牌封奉福君使主是寺仍給奴婢土田傳于恭孫輿地勝覽龍飛御天歌云僧神照初居雉嶽山覺林寺天台宗寺剎也豪勇過人及從上畎獵戰陳皆得隨侍雖不食肉每當進膳常親割開國後以功封奉利君按麗史照乃恭愍王之幸僧又按懶翁集照係天台宗僧也竹山郡七賢山七長寺事迹高麗慧照國師入中國為宋太祖師傅還國創本寺化度七惡人故山稱七賢寺稱七長師壽八十三示寂宋帝勑賜諡號定覺道首慧照國師使太子少傳金顯撰行迹碑銘立碑于弘濟館之左立九層舍利塔於右乾隆二十年和月子圓一識云故略而録之以俟後考按高麗大覺國師七長寺禮慧照國師影詩云空門功業許誰同千乘摳衣味道風據是則慧照似非帝師而乃王師也權近送裴仲員修撰曬史序本朝高麗也有海東數百年初藏國史于伽倻之海印蓋慮後世遭亂而墜失也伽倻在國最遠而險海印在伽倻最僻而深阻故國家雖有變而亂未嘗及焉祖宗之慮遠矣比者制倭失律深寇州縣伽倻幾不守洪武己未秋移輸于善之得益辛酉秋踰嶺而北又輸于忠之開天今癸亥夏賊又逼忠之旁縣七月又自開天移于竹之七長寺地之險遠不足恃而賊之敢深入乃若此嗚呼可以觀世變矣果川清溪寺在清溪山自燕山廢主以後都城寺剎皆廢為公府兩宗托虛名於本寺號禪宗卞季良詩石路千崖畫香煙一室清客來求煮茗僧坐自翻經樹老何年種鍾殘半夜聲悟空人事絶高臥樂無生輿地勝覽果川三聖山即冠嶽山三幕寺事迹新羅元曉義湘尹弼結第修道故人名其山曰三聖後道詵立五百裨補以鎮山川氣脈是山在其數內無學國師相定國都於漢陽以外白虎勢急形危多有奔動之氣乃立寺其上曰虎壓以鎮之創菴其前曰獅子以威之埋犬其傍曰四犬隅以留之始興古襟川縣安養寺在三聖山寺之南麓有高麗太祖所建七層甎塔金富軾撰碑字缺今廢安城青龍寺在瑞雲山高麗懶翁和尚創建朝鮮思侃禪師重創忠清道忠州開天寺在淨江山高麗歷朝實録初藏於陝川海印寺因倭寇移于善山得益寺又移于此寺又移于竹山七長寺恭讓一年以其地近海倭寇易至復藏于此我世宗朝以修高麗史皆輸于京輿地勝覽忠州德周寺在月嶽山下諺傳德周夫人建此寺因名之輿地勝覽清州銅檣在城內龍頭寺寺廢而檣存高十餘丈世傳初設州時用術者言建此以表行舟之勢李承召詩卓蓋亭亭百尺長行人指似為倣徨誰移銅柱蠻溪上恐是金莖漢苑傍根入泉源連地軸頂橫雲表插天潢昔人建此非無意要與雄州鎮一方龍頭寺鐵幢記早聆幢竿所製餝佛門之玉樓幡蓋由來粧寶殿之神斾其猶鶴翔碧空龍躍青霄立之者旁發信心望之者必傾丹願固知伏魔鐵杖挫賊霓旌頃有堂大等金苪宗者也州里豪族鄉閭冠族偶因染疾忽約佛天仰祈則敬造鐵幢俯擔則莊嚴玉剎然而難停逝水易沒黃泉已間數歲遲延隔時容易於時從兄堂大等八字缺金希一等彼為還源此繼頽綱遂令鑄成三十段之鐵筒連立六十尺之鐵幢穿雲耀日貫霧倚空魯氏雲梯難攀龍蓋甘寧錦纜未敵繅繩可謂奉往心深興情切植金剛之不朽管玉剎之無窮缺略幢竿始立天半可及巧成物像莊嚴兄弟兩家合修善業鑄之植之無窮永劫當寺釋紬大德檀越兼令金布一金寬謙等監司上和尚信前侍郎孫熙大以外字多缺故略之奇俊大司學院郎中孫仁謙維峻豐高麗光宗年號三年大藏壬戌二十九日鑄成前翰林學生金遠撰并書公州東鶴寺在雞龍山寺有招魂籍記首書弘暐端宗御諱次書瑢安平大君瑜錦城大君友直瑜之子鄭悰皇甫仁金宗瑞及其他一切死難之人蓋東鶴寺即祖宗朝為冤死人施供之設故也成三問遺集公州雞龍山岬寺徐居正記略曰山之頂出泉常見躍金魚下有龍潭黝黑可愕山之陰安育王塔輿地勝覽公州麻谷寺在泰華山寺有一塔以銅為冠以蓋之世傳此塔之蓋為貴物云云尚玄按本寺事迹寺以麻谷為名者有二説焉一以為初創之人新羅普照禪師道行高詣參學者多如谷中之麻故名一以為寺本麻姓賊所據之地驅逐他處而創寺故名二皆不類焉吾有一説未免杜撰蓋無染國師入唐得麻谷寶徹禪師心印而還住熊川今公州也之聖住寺寺本名烏合因國師故改聖住則或時來住本寺所可推想也則因思慕其師名以麻谷者歟慶尚道尚州大乘寺在四佛山三國遺事云竹嶺東百里有山屹然高峙真平王新羅九年戊申原本作九年甲申誤矣故今改正之忽有一大石四面方丈雕四方如來皆以紅紗護之自天墜其山頂王聞之命駕瞻敬遂創寺巖側額曰大乘寺請比丘失名誦蓮經者主寺灑掃供石香火不廢號曰亦德山或曰四佛山比丘卒既葬冢上生蓮高麗僧真靜遊山記曰山之坤維有寺名白蓮社庭之左右有米井又有義湘説法臺棕笠錫杖尚在善山桃李寺在冷山新羅沙門呵道所居諺傳阿道見新羅王道還到山下見山腰冬月桃李盛開遂建此寺因名焉輿地勝覽金山直指寺事迹碑銘并序撰者失名寺在金山黃嶽山之東南號直指創寺時能如大師不用圭臬測之以手直指開基處故寺之得號以此云爾或傳黑胡阿度創一善冷山桃李寺時同時開基者也而本寺事迹碑毀以失其文俱不可稽也蓋黑胡阿度俱在新羅訥祗王朝而倡本國佛法云爾世傳能如大師當麗祖仁同之役以神力濟之又能預告克敵之期麗祖統合後作大伽藍于茲以報師優賜田土財寶以為貺釐之具自是惠宗定宗光宗賜賚相踵所以崇奉是寺甚至命學士林民庇撰寺記集王右軍字刻之石能如弟子信弘慧眼等八人繼居之以金字寫經五百九十三函函皆髹漆黃金飾作海藏堂以安之殿宇之侈龍象之盛蔚然為東方第一道場凡僧髠之三昧其道為國師者無不由是寺而發迹焉入本朝以寺之北岡有吉地安恭靖大王御胎仍賜田隸于寺以寵之已而有學祖大師被光廟殊遇住是寺而經紀修葺故言有功德於是寺者皆以能如學祖兩大師為首焉壬辰之亂寺蕩為灰燼山人仁守明禮等發願重修繼而有妙衍尚元信洽寶鑑道慧覺淳等幹其役七十年間首尾用力殿閣之數供佛之具悉復舊貫其榜曰殿者八曰閣者三曰堂者十二曰寮者四曰莊者三曰門者四其正室三百五十二楹厨廊倍之山內二十餘庵皆屬焉諸比丘之營葺可謂勤勤耳寺僧嘉善呂詳欲記其本事顛末鳩材伐石謁余以請文余念茲寺在勝國則協贊神謀筆基于此逮乎本朝長衛胎室為育慶之基則靈異之迹利益之功豈他山寺比也寺之屢廢而旋興者亦以是夫遂敘其事繼之銘曰墨道海藏經始之迹兮何其茫然無可記作之者能繼之者祖兮惟歷歷若前日事雙松蒼蒼兮不老與茲寺兮終始崇禎紀元後五十四年辛酉七月立義興麟角寺在華山洞口有石壁矗立俗傳昔麒麟挂角于壁因為名有閔漬所撰僧普覺碑輿地勝覽尚玄按普覺者高麗高宗王時封為國尊法名見明字晦然後易名一然翰林閔漬奉敕撰碑門人沙門竹虛奉敕集晉右軍王羲之書金泉古知禮青巖寺道詵國師創建寺之上有修道庵其石佛是道詵所造頗有靈驗朝鮮虛靜和尚碧巖法嗣重創本寺晦庵大師聚衆千餘盛弘華嚴明治四十五年本寺災比丘金大雲時為住持發誓願為化主募化檀施一新重建堂舍殿宇壯麗雄偉猊雲散人撰碑比丘珍梓書咸陽靈源寺在智異山頭流志云寺於康熙壬寅火事迹無考或傳古祖師靈源創建寺僧相傳靈源祖師即臨濟玄禪師嗣法新羅智異山和尚者是也或云寺在萬水洞最深源故名靈源萬曆間芙蓉清虛青梅三祖師相繼住錫得道故方丈有三影殿額者以此康熙乙巳比丘戒坦重搆境致滋爽為禪教翼北大正二年寺又災田琴巴住持李南坡金包光白初月諸比丘等募緣重建壯麗宏敞甲於南方猊雲散人崔東植撰上梁文咸陽上無住庵在智異山高麗崔滋補間集云僧無己自號大昏子於此山一衲三十年每冬夏不出卷肚皮束于帶索春秋鼓肚遊山日食三四斗一坐必浹旬起行則朗吟作偈山中七十餘庵每食一庵輒留一偈無住庵偈云此境本無住何人起此堂惟餘無己者去住本無妨語若踈易而寄意高深殆寒拾之流歟咸陽碧松寺在智異山鏡巖記云碧松大師以正德庚辰入智異山搆草庵居之後人增創為大蘭若因以碧松名屬咸陽郡師遍相地理助道名區無過於此遂開法界前後悟心者七人近世有瑞龍和尚者京域士族也居本寺以律行稱故官隸不敢肆侵虐寺以是賴安焉河東郡七佛庵在智異山花開谷世傳駕洛國首露王子七人從玉寶禪師本云玉寶仙人出家先入伽倻山後移智異山結雲上院坐禪得道故後人改名七佛而額曰東國第一禪院云云院有亞字禪室溫突作亞字形其凸畫為坐禪之處而凹處為行徑世傳新羅曇空和尚所造本院事迹云新羅秪摩王八年己未曇空禪師造此溫突而此是阿道輸入佛法之前故未能確信堂宇屢經重建而溫突則一無變改火道不滯高低高謂凸處低謂凹處均溫是為聖人不思議之迹云朝鮮中宗九年明嘉靖三年甲申碧松禪師之弟子有秋月祖能禪師者發大憤志參無字話晝則於亞字禪室翹足而參夜則負大石而下雙磎禮六祖塔又負而還每見有大虎陪後首擎以助疲力一日翹足之時忽足坼而血流於後夜分透徹祖關時中宗三十七年嘉靖二十一年壬寅八月七日也適時門前有大檜樹一株無風自折響振山谷警發大衆於後三年十二月八日夜子時示寂以遺囑聚土石藏舍利後人欲改塔輒有虎吼終不能改龍蛇之變浮休善修禪師來住本院隆慶二年戊辰因重創之道光八年戊子金潭長老與法資大隱和尚自靈巖道甲寺而來本院結一夏後憂我海東戒律之失其傳依經求戒誠禱佛前至第七日一道祥光注大隱和尚之頂自此禪律並揚至庚寅本院災金潭長老與大隱和尚化緣重建悉依舊制前韓隆熙元年丁未土匪之亂禪衆四散至庚戌春更議會衆大開禪社又有徐起龍禪師修葺堂宇煥然改觀尚玄曰朝鮮人居室溫突之制未知創自何代按海東繹史引舊唐書高麗傳既係舊唐書則所謂高麗傳者即高句麗傳也云高麗其所居必依山谷皆以茅草葺舍唯佛寺神廟及王宮官府乃用瓦其俗貧窶者多冬月皆作長坑下燃熅火以取暖注云按長坑今溫突之制遼志女真裕穿土為床熅火其下而寢食起居其上即坑也顧炎武曰北人以土為床而空其下以發火謂之炕舊唐高麗傳冬月皆作長坑下燃熅火以取暖此即今之土坑也但作坑字由是觀之溫突之制創自北方灼然可知今北道人寢食起居土炕之上尚有女真遺風且北方天候每多寒凍故其防禦之事亦必較早也今露西亞人暖突緣屋壁為之其制甚便即此可見民居生活制度隨方發達各異也昔秦時阿房成蜀山兀今朝鮮有溫突而四山兀近年以來有森林令禁伐嚴密於是京城都會之地多用煤炭以代火水溫突之制從此應有多少所變遷也山清大源寺在智異山鏡巖記云天王智異山最高峯之名一腳走艮從東委蛇起伏止晉西百里羣峯擁庵兩川襟合古有法界曰平原寺劫換有雲卷大師創蘭若是為大源蓋晉西水源無大於此而後人取道之大源出於天故殿曰天光樓曰雲影極壯麗為嶺以下第一講堂庵後石塔十層藏舍利七十七個往往放光大正三年甲寅一月十二日本寺災住持比丘趙永泰一新重建遂復舊觀清道雲門寺在雲門山三國遺事云本郡古籍裨補記諺傳記載寶壤祖師入中國傳法來還次西海龍王邀入宮中念經施金羅袈裟一領兼施一子螭目今俗謂龍種曰螭目蓋出此典為侍奉而追之囑曰于時三國擾動未有歸依佛法之君主若與吾子歸本國鵲岬創寺而居可以避賊抑亦不數年內必有護法賢君出定三國矣言訖相別而來還及至茲洞忽有老僧自稱圓光抱吊匱而出授之而沒按圓光以陳末入中國開皇問東還住嘉西岬而沒於皇隆計至清秦之初無慮三百年矣今悲歎諸岬皆廢而喜見壤來將興之故告之耳於是壤師將興廢寺而登北嶺望之庭有五層黃塔下來尋之則無迹再陟望之有羣鵲啄地乃思海龍岬之言尋掘之果有遺磚無數聚而蘊崇之塔成而無遺磚知是前代伽藍墟也畢創寺而住焉因名鵲岬未幾太祖統一三國聞師至此創院而居乃合五岬田束五百結納寺以清泰四年丁酉賜額曰雲門禪寺以奉袈裟之靈蔭螭目常在寺側小潭陰隲法化忽一年亢旱田蔬焦稿壤敕螭目行雨一境告足天帝將誅不法螭目告急於師師藏於床下俄有天使到庭請出螭目師指庭前梨木乃震之而上天梨木萎摧龍撫之即蘇一云師呪之而生其木近年倒地有人作楗椎安置善法堂及食堂其椎柄有銘初師入唐回先止于推火之奉聖寺適太祖東征至清道境山賊嘯聚于犬城有山岑臨水峭立今俗惡其名改云大城驕傲不格太祖至于山下問師以易制之述述術音通師答曰夫犬之為物司夜而不司晝守前而忘其後宜以晝擊其北太祖從之果敗降太祖嘉乃神謀歲給近縣租五十碩以供香火是以寺安二聖真容因名奉聖寺後遷至鵲岬而大創終焉師之行狀古傳不載奉化今榮州郡覺華寺高麗李仁老破間集云太白山人戒膺大覺國師嫡嗣也幼時寓僧舍讀書大覺隔墻聞其聲曰此真法器也勸令祝髮在門下日夕孜孜鑽仰優入閫奧繼大覺弘揚大法四十餘年為万乘敬仰常不離輦轂纍請歸太白山創覺華寺大開法施四方學者輻湊日不減千百人號為法海龍門又高麗崔滋補間集云無礙智國師戒膺講道外遊刃於文章睿王邀入大內苦請留師作偈云聖敕嚴明辭不得巖猿松鶴別江東多年幸免魚吞餌一旦翻為鳥在籠無限旅愁宮裏月有時歸夢洞中風不知何日君恩報瓶錫重回對碧峯即往太白山卜居將終焉上復遣使徵之屢詔不受順興今榮州郡浮石寺在太白山今鳳凰山新羅義相國師創建傳大教之處高麗圓融國師名決凝者住錫是寺寺之無量壽殿及祖師殿皆係麗代建造工術雄美今朝鮮總督府出國費修補之以圖保存舊迹本寺有華嚴經板本字細而無疏鈔蓋其造成疑在圓融國師時也全羅道長城淨土寺今白羊寺在白巖山高麗鄭圃隱詩求詩今見白巖僧把筆沉吟愧不能清叟起樓名始重牧翁作記價還增煙光縹眇暮山紫月影徘徊秋水澄久向人間憂熱惱拂衣何日共君登白嵓山淨土寺事迹序云上人麟淨其所居淨土石窟其所參究祖師西來意日一食人不見其下山叟初不識渠識渠者云然忽携淨土事迹謁叟言將鏤板以壽傳俾叟借一臂力視其籍綢繆付囑自覺儼以下轉藏設會自至正以下乞文莊嚴自鄭三峯以下犂然若指掌叟謂麟淨有寺則不可無籍有籍則不可無爾爾去乎獨無爾乎爾又何憂若必言其究竟虛幻則叟亦不能自保奈爾何進退安用我為但叟所問於淨則有之爾方從事爾之太上一著雖形骸亦且外之猶戀戀於形骸之所寄芻狗之陳迹較其傳於瞥眼間此所謂色空不相離世出世無別法者耶寺曾叟讀書僧有所請叟不能恝又次其橋樓圃翁韻使尾録于籍詩曰分燈借榻定誰僧往事庵栖入夢能黃鳥啼邊雙岸合丹楓叢裏一樓增正疑雪壁雲頭矗更得氷溪月下澄人世漸如遼柱鶴杖藜非復昔年登道光二十九年己酉仲秋日江上病叟奇正鎮識奇正鎮號蘆沙順天仙巖寺在曹溪山弘文館提學希庵蔡彭胤撰重修碑云聖上朝鮮肅宗二十四年戊寅仙巖寺若休大師作圓通閣於舍之北明年造聖像一軀又三年造五十三栴檀像洎影又明年修大法堂以及五十殿併易其漫漶陊剝者既已事使來齎狀以乞辭惟吾東方多山佛氏之居若其石置然最初曰皇龍寺其盛也以羅之慈藏道詵二國師先後之也聞之古記詵之西學於唐也得遇大德焉所裨補之區凡三千有五百湖南之三巖在焉曰朗州之龍巖曰晞陽之雲巖而其一為升平之仙巖蓋歸而相之巖在府治西四十里曹溪之山虎穴之陰側立十尋其上有古仙人爛柯之迹云於是立大道場其東鐵佛一寶塔二浮圖三有石鍾高十餘尺大數圍光怪不常宋元祐中寺圮高麗義天大師還自中國慨然復之曰夫道詵師以法眼觀三界其有以待之矣越三百六十五年當我宣廟丁酉火于兵石鍾傷惟鐵佛寶塔浮圖文殊殿曹溪門者巋然久之敬岑敬俊文正三大老復復之為若殿若圭若樓閣方丈以環之峙大法堂其中皆按其故也獨古之所嘗殿而覆石鍾曰彌勒也者今其地為大法堂至于休師大集厥功鳩緣捐橐首尾八年舉其所將墜而究其所未卒者使百有餘年之後輪奐如初蓋誠心護之代興而有光於前者也故衆稱曰護巖子嗚呼創之難守之不易若師其可謂能守矣耳寺有朋飲之風歲時尤盛頃年枕肱大禪師作默言會以新其俗師其徒之肖者也嘗宴處燒香日課貝多一葉持律猶三尺從而化者甚衆余嘗識方丈山性能大師能為余道護巖子如此狀之者浩然大師系之辭曰浮屠之來其遠矣在晉咸安惟元祀東入漢山西秦使流布三韓此其始孰為左符雞林記入唐者藏詵其嗣曰香曰行曰如是并海以左山若水在在鬪齧角而猗所以分裂無時已何以已則之如斯小江南西曹溪峙有巖刺天上如砥是為無量大福地乃刳林巒列慳祕其麗萬數朱丹被包山絡澗戢戢只無平不陂崇不圮或劫於灰兵於燬後有其人承前趾統三中葉其師義越我中興三開士經之印之印慧思疏之闢之鏡靈址耽耽嶪嶪靘而邃霧蓊雲霱波濤詭國師有真香火備鐵佛吐光龍象喜更有百年休師至躬檀越及同志曰五大師詒圖事微我翼之而誰俟執大願心斃年紀舊殿而修新閣備範軀以成鏤像次其軋其昧爛其賁不亟不遲功乃遂載揚妙鈴馳玄軌嚮風讚歎無遠邇上與齊厥美下為衆生諗厥自謂來者無廢墮無騫無虧以無愧嘉善大夫行經筵參贊官春秋館承政院都承旨兼修撰官藝文館直提學尚瑞院正李震休書全州景福寺在高達山亦云孤大山寺之飛來堂有普德大士畫像輿地勝覽高麗李奎報記普德字智法嘗居高句麗盤龍山延福寺一日忽謂弟子曰句麗惟尊道教不崇佛法此固必不久矣安身避亂有何處所弟子明德曰全州高達山是安住不動之地寶藏王二十六年丁卯三月三日弟子開戶出見則堂已移於高達山距盤龍一千餘里也明德曰此山雖奇絶泉水涸枯我若知師移來必并移舊山之泉矣上同高麗大覺國師義天到飛來方丈禮普德聖師真影詩涅槃方等教傳授自吾師兩聖橫經日本注云元曉義相受涅槃維摩經於師高僧獨步時隨緣任南北在道勿迎隨可惜飛房後東明古國危云云我海東涅槃宗普德元曉師資傳授以此為證又按東文選釋元曉撰涅槃經宗要序云原夫涅槃之為道也無道而無非道無住而無非住是知其道至近至遠證斯道者彌寂彌喧彌喧之故普震八音遍虛空而不息彌寂之故遠離十相同真際而湛然由至遠故隨教逝之綿歷千劫而不臻由至近故忘言尋之不過一念而自會也今是經者斯乃佛經之大海方等之祕藏其為教也難可測量良由曠蕩無涯甚深無底以無底故無所不窮以無涯故無所不該統衆典之部分歸萬流之一昧開佛意之至公和百家之異諍遂使擾擾四生僉歸無二之實性瞢瞢長睡並到大覺之極果極果之大覺也體實性而亡心實性之無二也混真妄而為一既無二也何得有一真妄混也孰為其實斯則理智都亡名義斯絶是謂涅槃之玄旨也但以諸佛證而不住無所不應無所不説是謂涅槃之至教也玄旨亡而未嘗寂至教説而未嘗言是謂理教之一昧也爾乃聽滿字者咸蒙毛孔之益求半偈者不顧骨髓之摧造逆罪者信是經而能滅斷善根者依茲教而還生矣所言大般涅槃者若其具存西域之音應謂摩訶般涅槃那此土譯之云大滅度欲明如來所證之道體周無外周遍有情廣包遠濟莫是為先依莫先義故名為大大體大用無二無別既無彼岸可到何有此岸可離無所離故無所不離乃為大滅無所到故無所不到方是大度以是義故名大滅度所言經者大聖格言貫十方而一揆歷千代而莫二法而且無常故名為經正説之前先敘時事以之故言序品第一茂長禪雲寺在禪雲山寺下濱海之處多産沉香世傳新羅黔丹禪師所理留與後孫用於佛事云云按朝鮮李晬光芝峯類説云俗稱黔丹禪師即真鑑也崔致遠撰其碑序曰禪師形貌黯然衆號黑頭陀是也吾聞諸老僧言如此益山彌勒寺在龍華山有石塔極大高數丈百濟武王之所造也三國遺事云第三十武王名璋母寡居築室於京師南池邊池龍交通而生小名薯童器量難測常掘薯蕷賣為活業國人因以為名聞新羅真平王第三公主善花一作善化美艷無雙剃髮來京師以薯蕷餉閭里羣童羣童親附之乃作謠誘羣童而唱之云善化公主主隱他密只嫁良置古薯童房乙夜矣卯乙抱遣去如童謠滿京達於宮禁百官極諫竄公主於遠方將行王后以純金一斗贈行公主將至竄所薯童出拜途中將欲侍衛而行公主雖不識其從來偶爾信悅因此隨行潛通焉然後知薯童名乃信童謠之驗同至百濟出母后所贈金將謀計活薯童大笑曰此何物也主曰此是黃金可致百年之富薯童曰吾自小掘薯之地委積如泥土主聞大驚曰此是天下至寶君今知金之所在則此寶輸送父母宮殿何如薯童曰可於是聚金積如丘陵詣龍華山師子寺知命法師所問輸金之計師曰吾以神力可輸將金來矣主作書并金置於師前師以神力一夜輸置新羅宮中真平王異其神變尊敬尤甚常馳書問安否薯童由此得人心即王位一日王與夫人欲幸師子寺至龍華山下大池邊彌勒三尊出現池中留駕致敬夫人謂王曰須創大伽藍於此地固所願也王許之詣知命所問填池事以神力一夜頽山填池為平地乃法像彌勒三會殿塔廊廡各三所創之額曰彌勒寺真平王遣百工助之至今存其寺三國史云是法王之子而此傳之獨女之子未詳尚玄曰世傳馬韓武康王之所造者疑是百濟武王之誤也錦山寶石寺在進樂山新羅憲康王十一年丙午祖丘祖師肇基云南原實相寺在古雲峰郡新羅時屬康州在智異山寺有大唐新羅國康州瑩原寺國師秀徹和尚楞伽寶月靈塔碑康熙五十三年四月日重建門人弟子比丘飲光碑字頑缺文理不續而其可譯者有如景福二年蕤賓四日召其徒曰吾將行矣缺略言已化去亨齡七十九歷夏五十八缺略門人欵休遂日踰海缺略銘詞曰云云缺略縷褐之飾布衣之極一枚幻軀六箇凶賊他或師能語得缺略祖西堂藏父南嶽陟化衆十方為師一國言叶王心感融佛力尚玄按實相寺本名瑩源寺新羅時屬禪宗高麗時為台宗所估至朝鮮寺頽圮康熙十九年碧巖大師之高足枕虛律戒和尚改建扶安來蘇寺新羅惠丘頭陀所創有大小二蘇來故名鄭知常詩古徑寂莫縈松根天近斗牛聊可捫浮雲流水客到寺紅樹蒼苔僧閉門秋風微涼吹落日山月漸白啼青猿奇哉厖眉一老衲長年不聞人間喧寺有不思議方丈新羅僧真表寓居之所有木梯高可百尺緣梯而下乃得至方丈其下不測之壑鐵索引屋釘于巖俗傳海龍所為井邑靈隱寺在內藏山成任定慧樓記麗季智嚴始居焉本朝信庵能繼其蹤白其業與其徒海印師同住凡數十年輿地勝竟羅州興龍寺在錦江之北高麗太祖莊和王后吳氏祖富父多憐君世家州之木浦多憐君娶沙工于連位女德交生后后嘗夢浦龍來入腹中驚覺以語父母共異之未幾太祖以水軍將軍出鎮羅州泊舟木浦望見洲上有五色雲氣至則后浣布太祖召幸之以側微不欲有娠宣于寢席后即吸之遂有娠生子是為惠宗面有席紋世謂之𮂨主於其地建大寺曰興龍寺前有泉名浣紗諺云即吳氏浣布之泉輿地勝覽羅州普光寺在錦城山寺記云新羅善德王時僧安信住錦城山維摩窟精進二十二年後捨身千尋岬下忽有五色雲來擁向西而去輿地勝覽靈巖道甲寺在月出山道詵所嘗居也有碑字缺不可讀寺下洞口有二立石其一刻國長生三字其一刻皇長生三字康津無為寺在月出山開運二年僧道詵所創歲久頽毀今重營因為水陸社輿地勝覽白蓮社尹淮記全羅道康津縣有山崛起清秀突兀際海岸而上曰萬德山之陽有佛氏之宮顯敞宏豁俯瞰滄溟曰白蓮世傳創始於新羅氏重於高麗圓妙師至十一代無畏師恆為法華道場號東方名剎云云本寺事迹云白蓮寺在萬德山新羅時建高麗僧圓妙重修我世宗朝僧行乎又重修有塔有碑有三浮圖又有萬景樓明遠樓南臨大海滿洞皆松柏篠簜冬柏樹交加蒼翠四時如春真絶境也長興寶林寺在迦智山有新羅司馬金頴所撰普照禪師塔碑銘世傳印度有迦智山寶林寺支那亦有迦智山寶林寺合本寺共為三寶林云長興天冠山在府南五十二里舊號天風或云支提極高險往往有異氣如白煙世傳此山為天冠菩薩道場蓋據華嚴經菩薩住處品云東南方有處名支提山從昔已來諸菩薩衆於中止住現有菩薩名曰天冠與其眷屬諸菩薩衆一千人俱常在其中而演説法長興天冠寺在天冠山僧靜明記通天下一氣也泄為川瀆積成山嶽嶺之南濱海之地古鳥兒縣之境有天冠山尾蟠荒隅首浸大洋起伏穹窿距數州之壤其氣積之成之者乎有靈通和尚嘗夢北岬從地而湧所持錫杖飛過山頂至北岬而植焉於髣佛植杖處剪榛莽而創伽藍今天冠寺是也海南大興寺大芚寺志玩虎尹佑鑒定袖龍賾性兒菴惠藏留授一草衣意詢編輯騎魚慈弘縞衣始悟校正大芚寺者大興寺也在海南縣南二十里大芚山中原初創建蓋在新羅之末而年紀荒遠未有明文輿地勝覽云海南縣大芚寺在縣南三十里頭輪山中梁天監十三年甲午即新羅法興王時阿度和尚始創道場也兒菴和尚云海南者古之百濟地也百濟之始行佛法雖在枕流王元年晉孝武大元九年漢山之外不創佛宇其後佛法旋廢二百餘年至法王元年隋文帝開皇十九年始下禁殺之令繼創王興寺在今扶餘白馬江之上至唐貞觀八年百濟武王三十五年王興寺告成為南土佛寺之鼻祖則凡我湖南諸寺皆貞觀八年以後之所建今乃曰大芚寺為蕭梁時所建可乎其誤一也梁天監十三年即百濟武寧王十四年也八良嶺大幹龍以酉今之全羅道寸土尺地未嘗為新羅所得新羅法興王安得施令於鄰國使之創寺於茲山哉其誤二也梁天監十三年即法興王元年也法興王十五年梁武帝大通二年既誅異次頓有白乳之異肇行佛法金富軾記之詳矣自己國內猶於十五年始行佛法而鄰國佛寺倒於元年創建非怪事乎其誤三也阿度和尚有二其一秦王苻堅之時秦建元十年始至句麗小獸林王即位之四年為創伊弗蘭寺在平壤以處之此中國之阿度也其一新羅毗處王時即照智麻立干句麗之阿度和尚與侍者三人至新羅毛禮之家住數年無病而死兩阿度相距之間百有餘年此句麗之阿度也先阿度邈矣勿論後阿度亦云不可何以故毗處王元年即齊高帝建元元年也下距梁天監十三年為三十六年己未至甲午毗處王在位二十二年而阿度南來不過數年而死則梁天監十三年阿度之骨霜已久矣又安能承王命而遠涉鄰國以創佛宇哉此又山家之笑話其誤四也二十餘字之間四誤並發何以立矣大抵百濟之崇佛教不及新羅則湖南佛寺多在新羅統一之後也百濟之亡在唐高宗顯慶五年至高宗之末百濟郡縣漸為新羅所吞則大芚寺之創建要在新羅之末今不可考稽之古記是寺之創蓋在道詵國師東謁憲康之後竹迷記云道詵東還乃唐僖宗乾符二年新羅憲康王元年乙未也詵於是年四十九歲告之于朝謀之于密先建五百剎大芚亦在五百之數尹佑案竹迷記此説本亦猜度然憲康之時新羅佛教大興道詵得以此時馳聘其説廣建寺剎况其胎生在於靈巖故坤維禪院稠密大芚之為此時所創無疑也又按高麗學士崔惟清撰道詵國師碑銘道詵之生在唐文宗太和元年則憲康王元年正是四十九歲然道詵本無入唐之事此云東還之後告于朝廷謬矣然崔碑云憲康大王遣使奉迎留止禁中師每以玄言妙道開發君心者皆廣建寺塔圖興佛教之説也湖南諸寺考其事實太半是憲康真聖孝恭時所創建者然則竹迷記所言未必違於實矣時有淨觀尊者創建山菴善行頭陀繼而修之挽日庵古記云宋文帝元嘉三年丙寅之歲百濟久爾辛王七年新羅淨觀尊者創建是庵其後八十三年即梁武帝天監七年戊子歲也百濟武寧王八年有善行頭陀重建是庵慈弘案百濟枕流王元年胡僧摩羅難陀始自東晉越海至百濟創寺漢山今廣州度僧十人然其後佛法旋廢至南都扶餘之後法王始行佛教已見上安得久爾辛王武寧王之時已有所謂挽日庵哉淨觀善行之創建是庵實事也其稱宋元嘉梁天監者後人之假飾也將謂新羅僧乎新羅此時無大芚也將謂百濟僧乎百濟此時無佛法也其為唐末之僧不既明乎下逮南宋淳祐年間高麗真靜國師實至芚寺駐錫北庵厥有遺器至今流傳北庵記云庵中有古銅器數十事即杯匜之屬其款識皆雕龍穴二字每宗師初至本庵必以此器供養龍穴龍穴在大芚北二十里德龍山中高麗真靜國師天因本自萬德山白蓮社移住龍穴庵稱龍穴大尊宿見天因文集又或駐錫於北庵故龍穴古器傳留在是也天因本以奕世卿相之子二十登第文章震耀一世而一朝落髮於蓮社受鉢於圓妙晚年襲為國師賾性案龍穴古器年久鏽破不堪供養數十年前愚魯首座僧鎔之為小鍾千年古器今不可問可勝歎哉意洵案天因遊四佛山記云高宗二十九年歲在辛丑少卿崔滋出守尚州聞其奇異始尋訪焉此宋理宗淳祐元年也故知天因為淳祐間人高麗之末宗風凌夷異術參錯太古普愚和尚身入中原得臨濟正脈六傳其燈至于西山衣鉢傳于大芚大芚者我東禪教之宗院也領藝文館事李穡撰太古古銘曰普愚姓洪氏考諱延門下侍中至正丙戌師年四十六遊燕都至湖州石屋清珙禪師深器之遂以其袈裟表信石屋臨濟十八代孫也佛祖源流云太古下一世幻庵混修二世龜谷覺雲三世碧溪正心四世碧松智嚴五世芙蓉靈觀六世清虛休靜即西山大師尹佑案西山衣鉢傳授事實並見表忠條西山門徒千有餘人其拈香入室者上應列宿功存社稷風振叢林厥有二徒克昌厥後曰逍遙太能鞭羊彥機數百年來門戶以大弘文館大提學白軒李景奭撰逍遙大禪師銘曰師俗姓曰吳法諱曰太能湖南潭陽人也生於嘉靖之四十一年時乃壬戌之高秋九月依真師於白羊十三祝髮服玄旨於黃檗億兆知名歷參南國受大藏於浮休再訪西山悟本源之清淨己丑十一月二十一日示寂行年九旬少二禪臘七袟加三慈弘案逍遙之門得其禪宗者曰肱肱懸辨萬歷四十四年丙辰生傳其教宗者曰海運敬悅拈香逍遙之室者凡三十餘人佛祖源流曰鞭羊諱彥機姓張氏竹州人萬歷辛巳七月生幼從玄賓受具壯歸西山盡傳心法南遊遍參諸禪老以充其學常住楓嶽或妙香講法甲申五月十日示寂法臘五十三尹佑案鞭羊之門楓潭最昌拈香鞭羊之門者凡三十餘人楓潭之門月潭雪霽月渚道安尤益蕃衍金剛由有鞭羊碑事迹詳焉大芚之十二宗師皆出其門華嚴大會首尾相承潮音撼頭輪之嶽雲會咽枕溪之樓遂使八路緇林歸依大芚咸以為宗第一楓潭大宗師第二醉如大宗師第三月渚大宗師第四華嶽大宗師第五雪巖大宗師第六喚醒大宗師第七碧霞大宗師第八雪峯大宗師第九霜月大宗師第十虎巖大宗師第十一涵月大宗師第十二蓮潭大宗師十二宗師既立根基芚寺講會遂成典例經師之廣聚龍象者必以是為歸萬化圓悟燕海廣悅雲谷永愚懶庵勝濟影波聖奎雲潭鼎馹退庵泰瓘碧潭幸仁錦洲福慧玩虎尹佑朗巖示演兒庵惠藏已上為十二大講師芚寺舊迹失於兵燹始於崇禎之末爰作竹迷之記異説紛興後生以惑竹迷記云大芚寺者新羅法興王十五年大行佛法至真興王時阿度創是寺又云開基於梁武帝大同十二年真興王五年甲子賾性案竹迷記者我西山大師親徒中觀海岸之所撰佛祖源流云中觀少稱神童使太古清風復振此世其時中觀在智異山中專憑寺僧之説書之如此意洵案法興之時阿度之骨已霜矣况於真興之時乎輾轉支吾無一而當於理也尚玄曰凡假託阿度之創建者若見此駁案則當閉口也或稱慈藏重建大芚或稱道詵親見一行東振西觸無一可信竹迷記云慈藏法師入唐求法既別圓香而還大芚寺與皇龍太和月精諸伽藍一時重建其後道詵入唐辭一行而歸也大芚寺亦入東方山水圖三千八百裨補所之點又云一行見東方山水圖謂道詵曰山川若此宜為戰場捉筆點之曰人若有病針灸則愈今我落點處建寺立塔可以裨補汝國青木下有王隆者居焉明年必生貴子將為三韓之主待八年後贈此書可也詵東還一一如教賾性案慈藏之自唐還在善德女王十二年唐貞觀十七年而皇龍寺已自真興王十三年梁武帝之時為新羅之大剎下至真平善德之世每設百高座講經説法今乃云慈藏東還之後始乃重建可乎皇龍既然則大芚重建之説亦孟浪矣况貞觀之時百濟未亡新羅之僧何以建寺於茲山乎意洵案一行之死明在唐玄宗開元十四年見佛祖通載道詵之生明在唐文宗太和元年已見上今乃云道詵親見一行非怪事乎高麗太祖之生又在於唐僖宗乾符三年而開元丁卯茶毗之僧乃云王隆明年生貴子非怪事乎野竪雜説俱收並蓄將安用矣道岬寺道詵碑銘大提舉李景奭撰曰萬乘加國師之稱一行有天人之許道岬古記云道詵十三歲入唐一行候於館下曰公真天人也遂與為輩行交道詵盡得其道東還本國建寺立塔慈弘案佛祖通載明云唐玄宗開元十四年丁卯十一月己丑禪師一行示寂于華嚴寺一行之迹始行於中宗末年而開元十一年一行製黃道儀十四年一行死首尾了然又按高麗史高麗太祖年十七時道詵復至其家教以陳法此唐昭宗景福元年也自開元丁卯下至景福元年為一百六十七年道詵雖神靈將何以上見一行下見麗祖乎道詵逢見一行之説元是齊東野人不稽無根之談而道岬碑記載之如此豈不惜哉高麗崔惟清撰道詵碑銘初無入唐之説此信文也崔碑云道詵於唐昭宗光化元年新羅孝恭王二年示寂壽七十二此時高麗太祖年三十一則唐僖宗乾符三年麗祖生矣所謂明年生貴子之語豈不符合乎江原道鐵原寶蓋山深源寺既踞勝地亦號名剎前韓隆熙元年丁未土匪放火佛殿寮舍悉歸灰燼劉蓮叟禪師奮發志願粵三年己酉重建大房三十二間又於大正五年丙辰設計營造佛殿至明年夏可以竣工云鐵原寶蓋山石臺庵松都之東百八十里許有山曰寶蓋也峯蠻羅列林壑深邃中有一奇峯巋然獨存者乃歡喜峯也峯下三里許有一蘭若名曰石臺也中有地藏靈像神變莫測靈應無窮諸人等慎不可以一種石像見也其高三尺容顏甚妙而左手擎珠自然隨色辨來端者也其不由雕琢而成蓋可知也左肩中有橫理長寸許乃當年獵士者李順碩箭鏃之痕也古記云昔有獵士順碩二人射一金豬則所射之穴鮮血點地而從歡喜而去士追至望其所止之處則不見金豬但見石像在泉源中而頭面已出其身尚隱左肩中有所射之箭故二人大驚即拔其箭而欲出其體則體不動如泰山二人愕然俱立誓云大聖既已哀憐我等為欲度脫現此神變若明日出坐泉邊之石上我等當出家修道已而退翌日來見之像出坐于石上二人即出家于唐開元八年庚申率其徒三百餘人創是蘭若二人於林下纍石為臺常坐臺上精進故因名石臺其後二人捨身騰空而去傳云二人之冢一在峯頂一在峯下至今不見其冢也古人常傳云曾有人於其石像所安之處欲搆堂宇而輸材則其夜忽有巨石大如屋者不知所從來在石像邊所輸之材皆擲在山谷云云當初石像湧出之地今所謂井是也昔楓嶽道人長老文日世所稱見性得道者也嘗與門徒曰我曾在上國時廬山景福寺長老謂余曰汝國有三山住此三山者永不墮三惡途三山者寶蓋楓嶽五臺是也余信其言而與兩三道侶遍踏於四名山因入此山至深源寺而望見歡喜峯峯下祥光觸天瑞氣盤空慧風歘起曇雲爛熳鍾磬之聲隱隱落落於雲外余心悅而急到其所則乃地藏石像化現之靈應也心自異之欲設聖齋而就井淘米之時石像變現大身放慈光明遍照山河大地即於光中徹見三千大千世界而我自慶快不食不言而入定者三日矣由此觀之則寶蓋之全體乃地藏真身常住説法之處也是山斡事沙門中悅者乃文日長老之門人曾得聞其靈異之事傳於後世人也宰相羅公到此山欲辨真偽而問其古迹僧曰古迹無而但傳説如是耳公曰然則後世何足信哉即於其夜現見神人狀若天王者怒叱曰汝何人欲辨真偽也此地非汝所可留處宜速下去公於是大懼而其夜步出下至深源寺宿焉其餘種種靈異之事不可勝記也於戲諸佛菩薩以大慈悲為體現一切者皆為度脫衆生之大權方便惟我大聖為獵士現豬身亦如是也余大德十一年丁巳秋入此山到深源寺下馬而携杖登石臺其程蓋十里也一夜留宿而設供然後凌晨乃還于時所經山路草木之上都無一滴之露至乘馬之處則始有露如雨從者見異之是皆大聖之靈應也悅師方重創是庵之日壁上所塗之半幅紙古記與順碩等創是蘭若始末具得并採古老所傳之説及凡所見聞之事請余記之余信其請而以病筆總其大槩而記其始末云爾大德十一年丁巳八月日宣授朝列大夫翰林學士三重大匡檢校僉議政承右文館大提學監春秋館事驪興君默軒字法喜居士閔漬記蔚蔚珍天竺山佛影寺記新羅古碑云唐永徽二年義湘法師自東京沿海入丹霞洞登海雲峯北望歎曰西域天竺山形髣佛移於海表也又見澗上生五佛影益奇之尋流而下登金塔峯則下有毒龍湫也法師為龍説法請施地欲建剎龍尚不順法師強以神力呪之於是龍忽發憤穿山裂石而去法師即填湫而建剎焉震方特建青蓮殿三間及無影塔一座以裨補之額曰天竺山佛影寺法師儀鳳初又入西山創浮石覺華等寺周遊天下十有五年一日還入佛影寺至仙槎村一老翁喜曰我佛皈矣自此里人傳曰佛皈寺是山根於白巖山故俗亦謂之白巖山也且是寺也東有三角峯下有坐忘臺有五龍臺南有香爐峯青螺峯鍾巖峰西有芙蓉城鶴巢臺北有金塔峰義湘臺元曉窟龍穴皆寺之勝景也法師住九年元曉法師亦從遊焉俄而二法師偕往洛山參大悲像因入金剛山結摩訶衍云然則天竺山佛影寺者法師初想天竺之舊號也白巖山佛歸寺者後人追慕法師之新號也故山與寺各有二名今人多有棄舊從新者其辜負之聖意也甚矣華嚴論云義湘法師者過去金剛寶蓋如來後身也元曉法師者現在華嚴地位大權菩薩也是故此二聖遊焉則其叢林之名實貴亦重矣今之人尤不可不察也洪武三年庚戌八月日翰林學士柳伯儒書佛影寺還生殿記昔光山白先生克齋除蔚珍縣令下車三月橫得癘疾忽然而卒夫人李氏悶懼而問曰此境有可禱精舍否一吏曰有寺在西名曰佛影殿古而像靈也夫人趣令輿棺就寺之塔夫人於佛前焚香泣祝曰妾夫之亡命則已矣若橫夭則伏祈覺天之濟跪至三日夜夫人假寐有一梵魔魅披髮而走曰今以覺天光中解十歲冤結更不復祟矣夫人驚悟開棺視之則奄然還生不勝歡喜即以塔寮為歡喜寮佛殿為還生殿因寫金字蓮經七軸而答佛恩噫唐之食荷比丘六日還生者蒙佛力也梁之劉氏女之七日還生者蒙法力也杜氏子之三日還生者蒙天力也誠之所感古今一轍拘虛世俗豈可擬議於其間哉永樂六年戊子八月日通訓大夫行安東府判官李文命謹識近年以來雪耘禪師施獻士田護持伽藍安處徒衆勤於參學四方禪者多往依止焉三陟三和寺在頭陀山釋息影庵記新羅末有三神人各率僚伍甚衆集于茲相與謀議若古諸侯會盟之禮者久之乃去土人因名其峯為三公頃有闍崛山品日祖師遂往即其所建佛寺亦以三公揭榜太祖高麗太祖龍飛爰敕茲寺籍名録案俾傳後嗣異矣夫神人占位示其兆祖師搆基應其祥及神聖王會和三土其效應著明用是更寺目曰三和寺與地勝覽襄陽明珠寺在滿月山高麗高僧惠明大珠二禪師造恩津灌燭寺石觀音像成翌年高麗穆宗十年丁未唐景德四年來創此寺合取二師之名而名寺云淮陽府金剛山在長楊縣東三十里距府一百六十七里山名有五一曰金剛二曰皆骨三曰涅槃四曰楓嶽五日怾怛白頭山南條也自會寧府之大羅漢峴至甲山東為頭里山永興西北為劍山府之西南為分水嶺西北為鐵嶺通川西南為揪池嶺至長楊之東高城之西為此山自分水嶺至此凡八百三十餘里山凡一萬二千峯巖嶅骨立東臨滄海杉檜參天望如畫圖有日出月出二峯可見日月之出內外山共有百八寺表訓正陽長安摩訶衍榆岾最為名剎云新羅敬順王以國弱勢孤謀舉土降高麗王子曰國之存亡必有天命宜與忠臣義士收合民心自固力盡而後已豈宜以一千年社稷一朝輕以與人王曰孤危若此勢不能全至使無辜之民肝腦塗地吾所不忍乃遣使請降於高麗王子哭泣辭王徑皈此山倚巖為屋麻衣草食以終其身崔瀣高麗朝人送僧序深山窮谷人迹罕得至固宜有異物於茲萃焉故為張道陵之學者以某山為第幾洞天是某真君所治於是慕追厭世鍊養而不粒食者往往棲息其中以忘返焉豫雖惡其不近情也以有我爾之殊亦不甚與之辨也極天之東濱海有山俗號楓嶽僧徒謂之金剛山其説本自華嚴之書書有海東菩薩住處名金剛山之文豫未嘗讀是書未知果此山耶近有以普德庵僧所撰金剛山記來示豫者就讀之則皆不經誕説無一足信者於中云佛金像五十三軀自西域浮海以漢平元始四年甲子至山因而立寺夫佛法東流始於漢明永平八年乙丑而行東國又始梁武大通元年丁未其後乙丑有四百一年之久苟信彼説是中原寥寥未知有佛六十一年以前東人已為佛立廟其最可笑者他如是也中略雖然聞古學空之人入此山中勤勵志行而證其道者比比有之云輿地勝覽又云斷髮嶺在天磨山距府一百五十里諺云俗人登此嶺見金剛山者思欲斷髮出世故名拜岾在金剛山西距府一百六十四里李穀東遊記至正己丑秋將遊金剛山踰天磨嶺宿山下長楊縣蓐食登山雲霧晦冥今遊楓嶽者以雲霧故不見而還比比有之同遊皆有憂色默有禱焉距山五里許雲霧稍薄日光穿漏及登拜岾天朗氣清山明妬刮所謂一萬二千峯歷歷可數也凡入此山必由此岾登岾則見山見山則不覺稽顙故曰拜岾舊無屋纍石而為臺以備憩息至正丁亥今資政院使薑公金剛奉天子之命天子謂元順帝來鑄大鍾閣而懸之于岾之上旁廬桑門以主撞擊屹然金碧光射雪山亦山門一壯觀也毗盧峯即金剛山主峯有岩石又因嵐霧斑駁凝如雪色山名皆骨者以此金剛臺在表訓寺北石壁千仞人不得攀緣有二黑鳥為巢其上居僧指為玄鶴普德窟在萬瀑洞中有觀音閣鑿絶壁架板立銅柱於外以搆小屋三楹於其上拘以鐵鎖釘于巖石浮在空中人登則搖中置佛函飾以珠玉外施鐵網以防手摸諺傳高句麗安原王時僧普德所創萬瀑洞中普德窟側有一題刻金石心如木偶人如四十年不出山門者余於退雲見之佳悟退士李裕元贊云云尚玄按退雲大師近世名僧住錫楓嶽警策桑門正陽寺在山之正脈高麗太祖登此山曇無竭現身石上放光太祖頂禮仍創此寺按里鄉見聞録今劉伊齋之堂兄劉兼山居士編輯近世釋城麒住正陽寺嘗撰勸往歌一篇凡一千一百八十餘句言多切實勸世人諸惡莫作衆善奉行往生極樂年示三十而歿云云表訓寺在萬瀑洞諺云新羅僧能仁神林表訓創此寺寺乘云新羅文武王十年表訓祖師初創天順三年朝鮮世祖命修古碑有元皇帝與太皇太后施錢帛之文寺門右有刻石元朝人梁載所撰常住分糧記高麗侍中權漢功所書也長安寺在表訓寺下堂殿及佛像皆中國工人所造李穀碑聖天子元順帝龍飛之七年皇后奇氏以元妃生皇子既而備壼儀居于興聖之宮顧謂內侍曰豫以宿因蒙恩至此今欲為皇帝太子祈祝永命非託佛乘其何以哉凡其所謂福利者靡所不舉及聞金剛山長安寺最為殊勝祝釐報上莫茲地若也越至正三年出內帑楮幣一千錠俾資重興永為常住用明年又如之又明年如之集其徒五百施衣鉢作法會以落其成乃遣宮官資政院使臣龍鳳載本末于石以詔方來遂命臣穀以為之文謹按金剛山在高麗東距王京五百里兹山之勝非獨名天下實載之佛書其華嚴所説東北海中有金剛山曇無竭與一萬二千菩薩常説般若者是已昔東方人未之始知而指為佳山爰自新羅增飾塔廟於是禪龕遍於崖谷而長安寺居其麓為一山之都會也蓋創於新羅法興王而重興於高麗之成王噫後法興四百餘年而成王能新之自成王至今亦將四百餘年矣而未有能興復者比丘宏左見其頽廢與其同志誓於所謂曇無竭曰所不新茲寺者有如此山即分幹其事廣集衆緣取材於山鳩食於人僦面雇夫隴石陶瓦先新佛宇賓館僧房以次相完而備中略為屋以間計之一百二十有奇佛殿經藏鍾樓三門僧寮客位至於庖湢之美皆極其輪奐像設則有毗盧遮那左右盧舍那釋迦文巍然當中萬五千佛周亞圍繞居正殿焉觀音大士千手千眼與文殊普賢彌勒地藏居禪室焉阿彌陀五十三佛法起菩薩翊盧舍那居海藏之宮皆極其莊嚴藏經凡四部其一銀書者即皇后所賜也華嚴三本法華八本皆金書亦極其賁飾云云下略長安寺梵王樓所懸內需司帖文有吏讀處用圈點以標識之吏讀者官府公牘所用語讀也右帖文為奉慈教知委事本寺有奉安物件事體莫重而年來寺弊繁滋寺樣漸殘乙仍于依慈教下送自官員看審是如乎參以回告之説具由人啓後進上物程柏子石茸白鞋常鞋木物特為折半蕩減事已有傳教教是置當自戶曹行關而本寺段以入山初到境受弊最苦寺弊姑無論論以關防亦甚踈虞其中籃輿軍負持軍及題名石刻木刻之弊為尤甚大小使行自有區別而此外如有如前濫乘侵苦之弊以此帖文憑據禁斷為其他公私行人之廉價討食勒奪草鞋木物等種種弊端亦為一切禁斷為有矣又或頑不聽從是去等這這即告于本司以為隨現重治地為如是申飭之後萬一現發於無時摘姦則寺僧頭目亦常捉上重治不飭之地方官段置入啓論罪此意方自該曹回啓如是乎先為下帖公附依此知悉惕念舉行宜當者右長安寺首僧此準戊申十月日距今六十九年前也尚玄曰由上帖文可知朝鮮寺剎昔日情弊也昔某官人至金剛山促發山僧擔輿登山任其喘息少無憐意二僧謀曰今吾兩人死則一也盍與波俱并乘輿漢墜死于千仞之真珠潭至今山中傳為美談前韓光武三年己亥長安寺海光殿及梵王樓災越三年壬寅重建海光殿六十六楹梵王樓三十楹頗極宏麗蓋本寺僧崔震虛薑錦虛今名大蓮林碧荷金蓮潭鄭靜虛玄懿龍等協力同事克奏厥功寺立一碣頌外護人其文如左崇祿大夫金公漢宗遺迹碑碑前面記通川失畓一顧復之百世香火公恩永存碑後陰記大功德大內侍女尚宮林氏筵奏奉審錦虛璟奎光武八年甲辰十月日大正四年丙辰英國戈登女史自日本來楓嶽模刻景教碑唐太宗時立于大秦寺者立于長安寺之傍其意蓋在援佛入景誠可笑也寺僧等任其所為而不之禁亦可責也春川清平山文殊院高麗李資玄所居有真樂堂重修記金富轍撰釋坦然書筆力遒徑朝鮮明宗時普雨禪師住持是寺為之重修其清平寺重修記云朝鮮普雨和尚衰惟盛母成乃壞子修舊圖新可應子母余以禪林病葉幸遇聖朝重興兩宗之後歲次乙卯之秋退老是寺寺實創久盡為朽落越丁巳之春欽奉慈旨兼募衆緣凡諸寮舍一皆重新惟能仁寶殿依舊改椽而已事雖同綴麻而完錦功可侔鍊石而補天嗚呼自有天地幾萬年而乃遇永玄初創本寺之唐僧也自有永玄幾百年而又有今日也靜言思之雖巧曆有不可思算者也茲記隨喜檀施姓氏以為後來之龜鏡鱗蹄五歲禪院江漢黃景源記雪嶽山在麟蹄縣東一百里其上有院曰鳳頂由鳳頂而下三十里有院曰五歲東峯先生金時習避世之所也先生五歲通大學號神童王聞之召入禁中試以詩賜帛還家聲振一國稱五歲而不名云初上王在寧越也成三問朴彭年等六臣謀復上王事發覺同日論死先生佯狂陷廁中而逃之入雪嶽山遂斷髮隱於浮屠及其卒也山中人因以五歲名其院云云又本寺相傳高麗初雪頂禪師之姪五歲童子得道之處故名五歲云云尚玄曰徐震河禪師為余言金時習居五歲庵嘗撰法華經拈頌其自序有云吾居五歲取傲世之意云云蓋五歲與傲世音讀同故云然則以五世名禪院者非因金先生也明矣黃記非是黃海道海州神光寺在北嵩山元順帝初被謫于西海大青島時為魏王名阿木哥遊遍西海之山川至州之北嵩山下見草中放光異而尋之有一佛在草中遂禱之曰若獲冥祐還宮登極則當創寺以報恩其後還宮登極之二年其佛見於夢曰何相忘耶覺而異之遂大傾中國之財力以造神光寺壯麗甲於東方帝遣太監宋骨兒率工匠三十七人與高麗侍中金石堅密直副使李壽山等監董營建安嶽燃燈寺事迹碑銘并序寺號燃燈者何也自漢明時西土釋教肇入之後有燃燈佛師始來東土卜築於楊山郡安嶽古號西十里地仍以倡明禪教焉時人咸以佛師所住用以名寺焉寺之所創其來久矣厥後時移事往遺址獨存高僧釋子之收淚而咨嗟者不知其幾載矣至大唐貞觀十三年高句麗光宗朝此處有誤有自無何來梵僧其號杖錫到此喟然長嘆曰佛精所住無處無之而惟燃燈寺實是神仙換骨之場緇流煉精之地也固不可一日荒廢而今之頽棄乃至於此欲尋佛師設壇施教之迹其孰從而求之千峯帶愁萬水如咽有誠沙門疇不汗顏無財檀越亦皆懷慙此所以余之不可不刻意重修者也遂乃飛錫千村廣募財帛坪坤靈而聘智召大冶而運巧鑿池開基之際忽然有物鏗轟而出乃石碑一片大如食盤者也其碑有曰漢明帝永平十五年創建云雖不具載其受賜田結奴婢之事及局內廣狹地形而十字所載有若觀火乃知佛師創築果為永平之十五年也簿籍無所憑廢興無所考也而此碑之得乃在今日者豈非神慳而鬼祕之使佛師遺迹得以不泯於此也茲以梵僧驚嘆撫玩益自悲喜神施鬼役浹一旬而功告成法天再廓佛日重明永平遺迹恍然再覩永平遺教得以再振高僧道流之養性頤心者罔不以此為皈庶將万載不朽浩劫長存而夫何廢興無常倚杖相尋粵在康熙三年朝鮮顯宗七年丙辰無端回祿巨剎燒盡鬼土焦面不見竅板受荷之奔菩薩燃身絶無焦頭爛額之救佛師遺化蕩然為燼嶺猿哀號谷鳥悲鳴而已時宰柳頲拭淚尋迹鋭意重搆遍召沙門授以勸疏使之鳩財營繕而越三載丙午乃得禪僧堂訖功焉法堂則後之甲子冬乃增其舊制而宏大三越丙寅乃畢工而落成焉冥府殿則因郡居折衝將軍行龍讓衛副護軍李校弼勸至甲戌秋造成十王像越六歲己卯乃畢宮殿則至庚辰丹雘焉大鍾則戊辰春授勸文庚午春畢鑄而懸諸南樓焉其所以克復舊墟再造神宮者微諸公之功伊誰之賜諸公盛德猗歟休哉以寺之分界言之則界至東南二三里許四仙臺焉其內則并皆供佛之位田也東南則自佛峴至柔峴西限古靈崢乃牟尼佛敕之文殊常説妙法之崢也南限檢山嶺及歡喜崢乃圓成悲智菩薩振錫棲落之門檢察人間善惡之崢也北限兄弟崢乃慈氏提花兩大菩薩助成佛教之崢也東有遮日崢乃燃燈佛師説法度生之時八部來聽之日祥雲密布瑞日蟠空之崢也噫肇創年久又經兵火倘微記迹之文誰識再造之功樹碑所以志之也銘曰維此燃燈因佛獲名永平肇宅貞觀再營云胡中葉天忽降禍萬間禪宮三月楚火時宰柳公鳩財重設物若天來工似鬼役華搆依昔嵬觀光前久矣師教千載永傳茲銘一偈用示羣賢讚曰山名九月並生東寺號燃燈繼佛月照長空光不滅燃燈暗室照無窮觀察使兼巡察使李公寅丙邑宰通政大夫李公碩寬溫陽後學方珣撰序銘書靜影堂月松大師行習嘉善三南勳釋平仲篆康熙三十九年庚辰五月日立黃州郡正方山兼千聖山成佛寺事迹碑銘并序西山六世門人水月裁玄撰并書篆額我東自是宇內別乾坤也五嶽四瀆之外而多名山異區古稱三神皆在東土杜老所謂方丈三韓外者亦有以徵之矣今茲正方山在國之西前臨鯨波之𡷸後擁疊嶂之控挽直是一夫當關萬夫莫開山以之名焉寺稱成佛是固復性之號而亦曰千成山多其人而名之也在昔道詵國師創設叢林道場嶽瀆流峙之勢國門關防之形有以燭照於慧眼要作千百世鎮護之地豈特為誦法桑門棲息緇流而止哉踵茲興者懶翁殿宇賁彩傳匙植松遺迹宛然可掬設僧寮舍者二十餘戴禪冠者千計諸庵子石塔十五在內在外者亦倣佛梵唄相同金碧交映寺之雄偉與之無倫也洎乎隆慶垂末漸覺傾墜存者一二殿物盛而衰固其數也崇禎壬申朝廷命元帥築斯城參學義禪應募禪堂東山大師新創安國寺仁祖丙戌回祿告妖於極樂方其烈焰之極熾也釋雙均騰身峻甍巨落西宇火不及佛安東宇均亦於樓板間容身獲活儘奇矣哉庚寅大雄彥澤補搆此殿體勢變前內四五禪寮繼是漸成肅宗甲子道行造丈六幀皈敏鑄大鍾一口重四百斤斯數物亦一寺嵬觀也己丑弼同設六甲造冥府像辛丑秋眉建堂邀安又有環山村氓願納良畝使紹隆三寶奉香火祝聖壽於萬歲則此寺之重於一時者槩可知也今朝家增修粉雉以巖扃鐍鎮守厥道侶之戒談禪乘亦有如靜大師者出焉陰贊聖朝中興之鴻業豈不由於禮寺僧光飾美也哉銘略雍正王穆世月立牛峯聖居山開聖寺鄭知常詩百步九折登巑岏家在半空惟數間靈泉澄清寒水落古壁暗淡蒼苔斑石頭松老一片月天末雲低何處山紅塵萬事不可到幽人獨得長年間輿地勝覽平安道平壤永明寺在錦繡山即牧丹峯浮碧樓之西今浮碧樓者本是永明寺樓也見東文選麒麟窟之上高麗睿宗詩清江西壁聳蓮空物像超然擬閬風繞郭峯巒爭縹眇滿林花木鬪青紅雨天輪楫填樓下月夜笙歌泛水中今見罩紗神考迹感傷依舊意無窮郭輿詩佛宇相連舊帝宮松楸千古有遺風琉璃殿屋凝空碧錦繡簾旌照水紅夜靜船橫清鏡裏月明樓倚畫屏中十年一幸經三日滿目煙波趣不窮輿地勝覽尚玄曰甲寅春乾鳳寺僧借永明寺開堂説法士女雲集吾因有感賦六言一絶曰紅粧歌舞何處白業工夫此間誰識蓮花世界徒誇錦繡江山平壤從古為風流之場故及之永明寺舊為九梯宮未知何代捨宮為寺按國史高句麗小獸林五年創省門伊弗蘭二寺廣開土王二年創九寺於平壤然則永明之寺或在九寺之一數歟順安法興寺在法弘山金富軾記法興古寺但不知創之之時或云昔有僧名法興者肇基之是以號焉厥後道茀而園荒垣夷而屋圮人莫得而居之山僧澄悟好學識道理名高乎當世者也欲重修詣闕下願奏請而不能自達於是臣上書以聞時近臣鄭襲明從事西京則教曰向者此京人為妖僧妙清所詿誤負固不服于周官之法以臣召君犯春秋之義遂命元戎攻城致討不唯凶徒自投羅網抑我士卒殞命矢石積日纍月逝川寢遠猶恐浮魂落魄受苦長夜擬憑佛事以資津濟可與澄悟相地宜作新之以稱我哀矜之意襲明承制官給其費命下官執事移古寺北十步許地經營之始於癸卯年春三月至乙巳年春工既訖功自佛堂僧寢以至庖厨庫廄凡八十間繚垣無慮長一百五十餘丈上送齋文香物俾梵唄熏修十日以落之昔唐太宗皇帝詔於舉義以來交兵之處立寺剎仍命虞世南褚遂良等七學士為碑銘以紀功德矣今茲之事亦太宗皇帝之用心也宜備書之以示厥後云云寧邊普賢寺在妙香山高麗金富軾奉宣撰記曰妙香山普賢寺探密宏廓二師之所始作也探密本姓金氏黃州龍興郡人年二十五出家刻意苦行一衲一鉢非大寒則不履日一食確乎戒勤乎學就名師傳華嚴教觀於契丹太平八年戊辰歲顯宗十九年入延州山營蘭若以居宏廓探密之猶子以重熙七年戊寅歲靖宗四年來而為弟子志一而氣合德充而聲宏學者聞風輻湊地不足容以重熙十一年壬午歲靖宗八年於東南隅一百許步擇地築精舍凡二百四十三間名其山曰妙香其寺曰普賢自後奉佛翻經日夜無時二師歿弟子相續住持其佛事無不承權輿咸雍三年丁未歲文宗二十一年上聞而嘉之命有司錫土田下略時大金皇統元年歲次辛酉仁宗十九年七月十一日記初創事迹如上所述以後則宋紹聖三年丙子高麗肅宗元年達寶和尚再創之元順帝至正二十一年辛丑高麗恭愍王十年懶翁和尚住持此寺此是第三創也明英宗正統十四年己巳朝鮮世宗三十一年海正法師重創此是第四創也尚玄曰按明宗大王時普雨禪師妙香山普賢寺重創勸善文今夫山妙香暨夫寺普賢探密宏廓二祖師之所修真鳴道之地達夫智圓兩高僧之所重新福國之處也維嘉靖十有一年壬辰中宗大王二十七年虎頭之初丙丁童一窺羌雲閣而云燒云云此當第五創而本寺事迹埋沒無録故今補入之此文所云達夫疑即達寶而智圓則未詳崇禎七年甲戌仁祖十二年又遭回祿而虛白堂明照大師碧巖堂覺性禪師重創此是第五創也乾隆二十六年英祖三十七年辛巳秋九月寺又失火巨大寶剎一時成灰寧邊府使元重會特令南坡堂陸坦大師香嶽堂慧信大師重新之此是第六創也寧邊妙香山安心寺高麗國平壤道延山府妙香山安心寺石鍾之碑推忠保節同德贊化功臣三重大匡韓山府院君領藝文春秋館事臣李穡奉教撰今上守位之十又一年夏五月釋覺持自香山來披緇衣躡屩告近臣曰沙門臣覺持願有奏吾師之師即西天指空沒有舍利吾師懶翁舍利持實感慕焉與義州万戶張密直侶及其室康氏樹石鍾于香山安心寺厝二師舍利略同神勒上院之制焉鑱石示後非文無由非上命又無由也幸為小僧入奏近臣無為持留意者持奔告于門下侍中曹昌寧昌寧上言持之志勤乞上可之秋八月十二日右副代言潘德海傳旨于臣穡曰香山石鍾汝其文之石謹妃又使檢校門下評理薑仁富來諭曰吾於安心寺為吾兒世子祈福卿其知之持師踴躍而來曰先生早賜吾文幸甚豫問其告我所欲書者持師曰持事吾師自西京廣法寺始至正戊戌歲也吾師為王師住檜巖修造殿宇持與於方丈室之役玄陵禮陟臺評檜巖密邇國都士女絡繹恐廢業請徙之便於是師行召持曰汝其從我至驪興神勒寺入寂丙辰五月十五日也與覺悟守塔三年情猶未已又留數月而後去吾思吾與吾師相遇於西京以及吾師所化多矣而師沒之後無所瞻禮豈能不悲哉吾將以舍利耀其心目使一方之人事舍利如事吾師焉况香山為普賢菩薩住處與金剛諸山並稱而其高也壓遼左鄰長白獨為南界智異之匹乎吾師道德之大彌六合而無所欠入纖塵而無所餘何擇於方所哉在持肉眼見此山之形勢想吾師之風彩誠不上下此吾師之必於是山置吾師舍利也山中寺院三百餘所而必於安心寺者少林故事吾輩警策也又曰指空名禪賢父諱滿摩竭提國王嗣法普明尊者吾師名慧勤號懶翁殘缺嗣法平山處林禪師先生銘二師浮圖已書之矣於吾石鍾幸併著之獨潤筆庵凡七所皆先生作為吾師也志林於金剛山勝明於雉嶽山覺明於小白山覺寬於四佛山志先於龍門山勝哲於九龍山覺清於此山妙覺舊基是已吾師法服所鎮凡九所燕都開堂帝賜袈裟一瑪瑙拂一在金剛山正陽寺玄陵賜袈裟一直綴一鉢一在檜巖寺袈裟鉢拂並一在神勒寺袈裟拂並一在臺山袈裟一在見性菴袈裟杖並一在威鳳寺袈裟一在廣法寺寺在平壤袈裟直綴杖坐具並一在此山普賢寺舍利無算散在名山四衆奉養供養者多矣何暇枚舉持之志亦非他也上報四重恩下濟三途苦而主上萬萬歲后妃齊年世子千秋公卿士庶益福損災胎卵濕化出邪入正三韓四境永絶外侮盡十方三世入普賢解脫境界持之願也穡曰大哉願也自世教衰倍師畔道者比肩而繼踵夫曷故焉使世教興臣之於君子之於父資之於其師皆於其師及其師指空也則家國其庶乎推此道也天下平矣若其舍利也出於身歟出於心歟抑無所從出而自出歟銘曰西天指空東國懶翁同心異迹舍利昌明世乃大驚角立碩德巍巍妙香壓于衆岡賢聖之域伐石為鍾舍利在中流福罔極我君永年我妃祿延我儲育德樂職惟臣守業惟民澤洽于國惟此願力惟此願心臣作銘詩重在祝釐時万時億大明洪武十七年歲次甲子九月日咸鏡道咸興雪峯山歸州寺太祖大王讀書堂重建事迹碑云咸興之東十里許歸州洞雪峯山下有寺寺傍有堂即我太祖康獻大王龍潛時讀書之所而咸山志所謂碧溪潺湲砌石尚存者此也纍經兵燹堂妃址存越在中世有僧曰德淳者構小齋表遺墟而年代寢遠棟宇傾頽巋然一堂久未重修其在致隆聖迹之道豈非大欠缺乎今本宮別差臣門而益成乃能慨然於此以改創之意馳報內司以轉聞于九重聖上聞之興感即命內司以助雕繪之具益成秖承明命殫誠經紀於是自臣營鳩功敦事繕修畢舉判官臣金宗衍亦優補財力又書堂額則咸之民莫不歡抃而自來蓋不日而功告成一邦士庶拭目改觀無復有前日之嗟惜焉下略嘉善大夫咸鏡道觀察使金演撰朝鮮肅宗四十二年丙申九月日歸州寺重建紀迹碑云昔我太祖康獻大王龍潛時讀書于咸山之東十五里歸州洞雪峯山下伊時緇徒亦闢蘿而處焉噫茲山實基王迹國初建寺護衛聖址按歸州寺寺法云本以石茸峰下淨水寺而朝鮮太宗即位元年辛巳改額雪峯山歸州寺祗奉肅廟正廟兩聖御製宸翰尊以閣之佛家倚重即與釋王寺相甲乙者也洎戊寅臘月遽遭回祿一剎蕩燼讀書堂御筆閣幸賴獨存誠是王靈攸暨道啓業已上徹內司亦為懇至越明年春余承按使之命及其陛辭聖旨申申以重搆溫綸蒞茲未幾內帑錢三千五百緡空名帖五百張白木紙束合價錢九百十兩零一時頒下自此命倕選遣牌校度材伐石近取諸洞許多冗費則卿宰牧伯體上眷庇閭里士庶仰聖惠究各盡誠力樂為普施巨創董功至於十五箇月而告成新搆佛龕禪院為三百餘間役錢所入二万八千九百餘金猗歟聖上遹追之恩涵育之澤更瞻聖址增重道場復舊沛上父母亦莫不攢手顒祝托叉顛末如右遂為之銘曰宸顧北土前聖所址永奠守護西教釋氏生靈蒙福海左右區禪劫難逃嘻烏夜投重宸曰咨締搆不遲往欽來宣帑金先施財幣坌集匠石爭趨一新改觀鞏固基址聖德如海慈航泛彼攻珉紀概現光仰止正憲大夫行觀察使兼兵馬水軍節度使都巡察使咸興府尹金炳地撰通訓大夫行咸興府判官咸興鎮兵馬節制都尉兼守城將沈宜斗書明宗復禪科明心宗謹按朝鮮僧科沿襲麗制而至于世宗并合諸宗為禪教兩宗之後僧試科目判下定式禪則傳燈録及拈頌集教則華嚴經及十地論見於世祖時所撰經國大典成宗大王最惡僧侶指為耗損民天者王之二十四年癸亥頒大典續録其度僧之條曰軍額敷盛間勿許度僧違者囚一族督現又慵齋叢話成廟嚴度僧之禁州郡推刷無牒者長髮還俗中外寺剎皆空云云而無廢撤僧科之舉燕山君十年甲子即行科之式年子午卯酉為式科之年巡而於其年以圓覺寺為妓坊以禪宗之興天寺教宗之興德寺皆作公廨僧科自然停止燕山十一年見廢中宗即位二年丁卯又當式年而不行僧科僧科遂爾廢止中宗薨明宗立時年尚幼母后尹氏文定王后攝政謀興佛教詔求名僧時江原監司鄭萬鍾疏薦禪僧普雨襄陽神興寺僧或云麟蹄百潭寺僧大張佛法復立兩宗禪科給僧度牒以靖陵奉恩寺為禪宗光陵奉先寺為教宗自明宗七年壬子始為禪科初試而會試講經製述賜牒略倣文武科按靖陵志云我東自三國時崇尚佛教高麗朝尤盛設科取人之法與國子試同國初亦因之逮至中葉遂廢不行及普雨得志復立禪科其取試與文武科同日開場遣夏官考選釋子能通經教者授甲乙丙三等之科名曰大選大選與文武大科同參學者以製述再舉入格者曰中德中德與文武重試同其出榜賜牌一如文武科及普雨死遂廢其科沙門處能奉恩寺重修記云國初設禪教兩宗於陵寢窒皇之外特設僧科例如國試同日開場命遣夏官考選釋子之通經者特授甲乙丙三等之科曰大選大選者即儒家之大科也次以製作間有拔擢者曰參學參學者即儒家之小科也由大選而再入格者曰中德中德者即儒家之重試也而寺宇在靖陵者曰奉恩即禪宗也在光陵者曰奉先即教宗也禪以例文教以比武禪教并行斯道之蔚興哿矣盛哉白谷集附當時禪宗初試選佛場榜竊以混沌未死本無是非之眼性覺必明必有取捨之心由是万類繁興妄生愚智之量一真煙滅競起利鈍之情致令天下將囂囂焉終莫之能救於是聖君特憂之不得已設科舉之法使其愚智利鈍自露於一文一藝之中若輕重妍𡟎難逃於衡鑑之上豈偶然哉真天地間古今儒釋至公無私之道也冀諸滿庭高人既遇聖明幸獲勝場當須各盡己才以應無私之選也若目千經偈腹萬卷詩出衆茂器自然函蓋相符倘或學無三餘才乏七步液樠散材必懷苟得陰借他手則取過非輕必見放黜須榜示預禁末論者借述借書者永永停舉代作代書者永永停舉自述借書者一試年停舉右榜出示於選佛場前張挂仰滿庭高人遵依禁令無得相欺倘落禁律後悔何及故茲曉示各令通知明宗二十年乙丑文定王后升遐僧普雨流濟州杖死二十一年丙寅嘉靖四十五年兩司啓罷兩宗禪科國朝寶鑑按釋處能白谷集云粵在嘉靖甲子朝議革除僧科廢僧科在嘉靖丙寅而非在甲子當從國朝實鑑故禪教之不振者百有八年於斯矣普雨興佛教普法雨尚玄曰普雨禪師僧中之傑也才學俱優得蒙道薦幸遇機會挽回佛運百廢俱興其曰復立兩宗禪科者自燕山君末年中宗初年廢止不行者至普雨而更立也其曰給僧度牒者自成宗時軍額敷盛間勿許度僧者至普雨而弛禁也其曰八道寺剎一時鼎新者自成宗嚴度僧之禁州郡推刷無牒者中外寺剎皆空者至普雨而更新也雖然當時儒焰極盛羣起交攻一則曰妖僧普雨二則曰妖僧普雨文定升遐普雨竄死僧科亦廢至是佛法命如懸絲賴有清虛休靜泗溟惟政皆以禪科中選之人道德勳業並美雙隆卒得扶持朝鮮佛教推究其源亦未始非普雨之開端也普雨遭際具録如左僧普雨以設無遮大會為僧俗所拜敬聞于闕內上罔文定王后因之得勢大張佛事設兩宗禪科普雨自稱得道居處大內尹元衡尹后親族見普雨大異之謂人曰普雨因禪學而悟心知止而未至於定其誣妄多類此石潭日記大臣三司廷論普雨之罪不從館學儒生請誅妖僧普雨屢疏未得請空館出去上日遣承旨史官招諭儒生令就食堂儒生無就者朝廷招朝官之父兄使各勸諭子弟就館如此幾月餘靖陵志云栗谷李珥論妖僧普雨疏曰今茲普雨之事舉國同憤欲磔其肉以至國子抗疏兩司交章玉堂進札纍日不已而天聽逾邈一國臣民罔不駭然自失皆曰殿下不信舉國之公議而護一妖僧臣竊伏痛以殿下之明聖乃因普雨而受此名也夫以為普雨負弒逆之罪殿下有釋怨之失者此固過激之論而臣未敢盡信也至若殿下以普雨為無罪臣竊怪歎亦未敢信服焉此教一出三尺童子亦皆竊笑竊恐大哉王言宜不若是也宮禁密事雖可諉之妄聞若其暴殄天物誑惑士女僭造乘輿屈辱至尊萬目之所見者皆可以謂妄聞乎眉睫至近而不見則宮中之事安知國人皆知而殿下有所未知乎衆怒不可遏民口不可防而殿下牢拒至此何也且殿下信以普雨為無一毫之罪乎普雨得行其志今幾年矣廣張罪福欺罔君上罄渴內帑貽患生民驕矜自聖奉己奢僭有一於此罪當罔赦殿下尚以為無罪何耶以殿下聰明剛斷貶竄權幸曾不少假而至於誅一妖僧乃獨留難臣誠愚昧未喻其理豈有國人皆曰可殺而無罪者乎又曰以臣之愚反覆思之而得一説夫以慈聖憂國之志祝釐之誠不能拒絶普雨之譸張者垂二十年矣一朝賓天而遽爾誅戮則似非慈聖平日之心而殿下以為生之仁當諒暗之日豈肯以刑辟加人哉殿下遲回隱忍之心臣亦有所妄料矣殿下既不能快從公論亟施天刑則何不竄逐遐裔以示與衆同棄之意乎夫如是則可以少慰一國臣民之心亦可以少減譸張誑惑之勢而殿下好生惡死之心亦無少怫焉殿下以為何如哉殿下方以為無罪而臣進竄逐之説士林方指弒逆而臣進降罪之説固當上忤殿下之旨下缺士林之望矣若臣愚忠則必欲全殿下之仁心而保其國家之元氣故雖得罪於殿下而莫之自恤也栗谷全書靖陵志又云虛應集詩一卷禪偈雜著一卷文一卷普雨所著咸鏡道御史王希傑狀啓因北方人聞僧普雨與逆琉之奴為僧者同居安邊黃龍寺草菴琉亡命來到使之穴處聞大索之奇雨懼禍及移住釋王寺琉奴無應松持小紙授雨雨覽訖曰近無吉日汝可退居數日貸米設聖齋于深谷者非一而貸米之僧尚在釋王寺云云政府請付有司推之傳曰欲害雨者造言判然矣勿推兩司及大臣請推問不允吏曹判書宋世珩獨啓極陳普雨權重驕悍一國之人仰戴奔趨如君父而無一人為言者恐有不測之禍歷數所行悖惡之事屢數百言不允東閣雜記初普雨廣張佛法居處僭擬又設無遮會于檜巖寺其費萬計至是明宗二十年乙丑文定王后升遐之後因臺啓儒疏臺諫與太學生金忠甲等連章請誅命出于外母令出入京山乃竊鋪馬而逃被獲於麟蹄命流于濟州撮要牧使邊協因事杖殺之石潭日記普雨恣為譸張異教大盛四月八日將行無遮大會於檜巖寺所供幾竭國力八道僧俗奔走嗔咽時四月初七日也文定王后遽以是日薨僧俗驚惶潰散當初粉米數千餘斛作飯其色赤如血染人甚怪之事竟不成苔泉日記尚玄曰栗谷疏中今茲普雨之罪舉國同憤欲磔其肉等之用語何等酷毒今人見之不覺鼻酸且其所云舉國同憤者不過儒臣儒生而已普雨之設無遮大會京外士女奔波填咽與其謂舉國同憤寧可謂舉國同情也當時檜巖法會之狀况今有苔泉日記之證據普雨號虛應又號懶庵非凡庸流之妖僧乃善知識之傑僧也道眼既明機智且敏應運而得其時奉佛而行其道儒臣疾視羣起攻之竄死絶島豈不惜哉據離幻松雲惟致之別號也之跋文足證其道行觀懶庵之法語可知其宗旨也懶庵雜著跋惟我大師生吾東方偏小之域有得乎百世不傳之緒而今之學者賴之而得其所歸使斯道終不滅絶微斯人靈嶽風流少林曲子幾乎息而無聞無迹此論之可謂千古獨來獨歸者也蓋師之稟資獨出近古道充獨行而非仁義道德則不敢陳於人前亦非至人乎凡與人開懷卷舒若石火如獅子踞地無敢當其鋒者或唱或酬或長吟或短引或辭或文隨扣而鳴其聲音若出金石片言隻字無非針規緣於散秩學者病焉門人太均窮尋蘊奧入室得髓大意謀報罔大之恩而謹取遺稿若干為之上下篇遂入梓而使能永年偉哉功乎然而其所鳴者豈止此哉或遺之散之而莫之盡採惜其不盡傳之耳嗚呼斯文雖傳而若非其人安知斯人之志之所存古人所謂千載之下子雲可也後之覽之者切莫草草焉萬歷元年四月日寒山離幻謹跋檜巖寺住持大禪師天齡書直指寺住持中德惟致校普雨禪師示小師法語一日有小師問於病僧曰和尚常示我等云汝等諸心皆是虛妄浮心切莫以為真實未審離此心別有真心否弟子等竊謂凡諸心心皆是真心上之妙用唯此心外更無他心也若離此心更有真心為我等輩略垂鞭影使有取捨余即以偈示之曰汝雖以諸心曰真心上用應非真妙用乃其虛影像若執此影像以為真實心影像滅去時此心定亦滅何以故如斯為汝聊説破妄心自無形攬塵而成體正如鏡中像又如水上波迷水若執波波寧心即滅迷鏡執彼像像滅心即亡知濕性不壞了鏡體常明波浪本自空影像自歸寂故知佛鏡智遍界而遍空凡夫妄身心如影亦如像是執末為本認妄以為真此所謂不了認賊為其子阿難執此心被如來呵斥若也妄心起都莫隨他去若能如是修臨終得自在天上與人間隨願而往生又問學人未遇迷不覺悟之時悟從何隱忽遇善友開示得悟之後迷從何去以其迷悟而有得失之名乎曰三界無別法但是一心作一切諸妄境皆因動念生念若不自生諸境即無體返窮其動念念亦自空寂即知迷無失又知悟無得是無住真心不增亦不減譬如演若達迷頭自狂走忽然狂得歇頭非因外來縱不得歇狂何曾有遺失又曰和尚常示衆云汝等諸人何不頓悟一念不生即名為佛乎若悟此旨不從地位漸次便登妙覺去也凡諸聞者無不驚愕自生障礙云博地凡夫無始所造業果大如須彌何但了一心便斷煩惱即得佛果此真誑人魔説也耳不堪聞心可信受耶曾不采聽返生疑毀伏望莫更此説以招人謗曰若執心境實人法情不空縱經萬劫修終不證道果若頓悟無我深達其物虛能所即俱消何憂其不證昔有二比丘同時犯殺維摩一言中俱得悟無生何况信佛法諦了自心者業雖大如山如日消霜雪又問既然如是所造殺盜妄一切諸業其不修斷乎曰諦觀殺與妄從一心上起當處自便寂何須更修斷是以了一心自然境如幻何故得如斯為汝而更示彼諸一切法皆從心上生心既本無形法何曾有相問吾等每因師説已能得知真心以靈知為心不空無住為體離幻實相為相矣不知妄心亦有體相否若無則已矣如有則妄心以何為心以何為體以何為相也曰凡夫之人諸妄心六塵緣影以為心無相空空而作體攀緣思慮用為相此汝緣慮能知心元無自體是前塵境來則生境去滅隨境有無虛出入因境起心全境心因心知境全心境各自無性但因緣因緣之法本無實正如鏡上形非形又如水中月非月喜汝學道有分明詳問真心與妄心問即心是佛心佛無相正同虛空實非見聞之所及奈何教中多有稱見道見佛之説也曰約本智發明斯假稱名見非眼所能覩唯證乃自知若能離斷常即見自身清見身清淨處即見佛清淨乃至見諸法悉皆非他物無非是諸佛亦無非是法何故理如斯以一心普遍若或一微塵云不是佛者即成翳理障不入普眼門又將假名論更為汝等示如來法為身但應觀法性法性非所見又非情所知所謂法性者陰陽四時是此即諸佛身無非第一義倘能知此理是名為見佛佛道非二物以一隅知三問既心佛無二心外無佛見佛是心則何故經中説化佛來現以應羣機乎曰如來淨法身無出亦無沒但從真起化示現有往還故不來相來亦不示相示不來而即來如水月頓呈不示而即示似行雲忽現是皆心感現豈不真見化衆生機若熟自心見佛臨是知淨業成開眼見佛身亦知惡業熟合眼見地獄比如福德者執礫礫變金貧窮無福兒遇金金變礫礫非金金生金非礫礫現金生是心生礫現是心現轉變皆自我金礫何從生汝諸懷疑徒急須知斯旨法席施布七日食齋麗史云時俗喪祭專尚桑門法鄭夢周始令士庶倣朱子家禮立家廟奉先祀慵齋叢話曰羅麗崇佛至于我朝遺風未殄士大夫為其親屬皆設齋又設法筵於殯堂行忌祭者必邀僧飯之又曰新羅高麗崇尚釋教送終之事專以供佛飯僧為常逮我本朝太宗雖革寺社奴婢而其風猶存公卿儒士之家例於殯堂聚僧説經名曰法席按懶翁及涵虛集多對靈小參之法文皆此法席之佛事又於山寺設七日齋富家爭務豪侈貧者亦因例措辦耗費財穀甚巨親戚朋僚皆持布物往施名曰食齋又於忌日邀僧先饋然後引魂設祭名曰僧齋成廟崇正學闢異端凡干佛事臺諫極言其弊由是士大夫家畏憲章物議雖遭喪忌俱依法行祭不供佛僧其因仍不廢者惟無賴下民然不得恣意為之云云又按世宗朝臣申槩號寅齋又號養拙堂學問精深文章典雅為世推宗及卒以遺命不作佛事由是觀之當時卿士送死之時例作佛事於此可證也又按星湖僿説今諺謂父曰古佛蓋高麗遺俗也麗時佞佛父母忌日招僧誦經謂之僧齋仍稱父曰古佛尊之之辭也尚玄曰朝鮮王室祭奠亦用桑門之法國初以來陵園祭物不用肉類但供素膳用黃蠟燭又粢盛用佛器所以各陵齋社有造泡寺造豆腐以供祭膳之寺也香飯寺之名稱也陵寢素祭之法定于黃喜之手蓋襲麗朝之舊禮也後世兩司啓請罷之而朝議以為國典應有深意竟不能改義庫納蠟兩司啓諫朝鮮宣祖大王七年甲戌三月命納義盈庫黃蠟五百斤于內外間莫知所用或云將用於佛事兩司請勿納諫院啓曰黃蠟殿下欲用何處耶所需若正則不可不用如出於傍蹊曲徑則不可妄用請加三思如其正也則亟示聖意以解羣惑如不可宣示則請收入內之命上怒答曰內用之物非下人所敢仰問又啓曰殿下所用有司莫不供進宮中別無許多用蠟之處此必出於邪歧曲徑故臣等憂聖志不能無惑欲防微杜漸耳昔者司馬光平生所為未嘗有不可對人言者今臣等方以正心誠意望於殿下而只此一事不敢宣示則未知幽獨得肆之地其能不愧屋漏乎請自今以後勿進非正之供洞示聖懷若青天白日使羣下得以仰見也上曰該司之物在豫量用而已非羣下所敢容言也昔梁武口苦索蜜不得不料再見於今日也李珥率同僚辭職曰昨承聖教辭意太厲至以侯景比臣等臣等不勝驚愕戰栗之至傳曰未有府庫財非其財者也該司之物固是殿下之所有殿下用以正則羣臣當奉承之不暇尚敢有一言乎若用之以不正而君舉將歸不法則雖該司亦當覆逆况言官安敢默默乎近者外間喧播之説或以為將造佛像或以為將興佛事聽者疑信未定之際水銀黃蠟入內之命適下於此日人心獨疑臣等聞此言豈無疑懼之念乎第以聖學高明似不惑於異教故不敢信其必然茲敢仰問將以昭聖明之無惑而絶羣疑耳殿下當內省于心有則改之無則加勉而已祕諱之密峻拒之嚴一至於此何也昔者舜造漆器諫者十人武王嗜鮑魚太公不進曰禮鮑魚不登爼此豈愛敬不足而然哉誠以忠臣愛君以德敬君以禮逢迎承順不害愛敬故也殿下以一言之不敢承順輒加震怒何不以虞臣太公之事反觀而自省乎上尤怒答曰今觀啓辭尤不足以滿一笑假使崇奉異教自古流來胡像亦多新造何為未知聞於何人乎豫欲拿鞫而辨之因此而尤可見人心之澆薄此豫所無心於斯世絶意於有為也五月慈壽宮尼以內命往金剛山作佛事為有司所紏囚于淮陽獄於是館學儒生士疏請廢淨業院且言黃蠟所用不正上手書答曰在首善之地講論者道義也期待者程朱也宜益動心忍性切磋琢磨敬義夾持表裏交養為他日真儒上輔寡君下澤斯民治隆俗美則吾道之衰異端之盛不足慮也何必如太武之誅沙門毀佛寺之為哉且曰黃蠟非用於佛事以前日入內之黃蠟還下于該司尚玄曰昔高麗儒臣崔承老李穡等有闢佛疏言皆得當事理條暢非如朝鮮儒臣齷齪言論逼迫狀態雖為君上亦無奈何此乃朱學發達之結果如是鑒乎麗末之金子粹許應鄭道傳金貂及成均生員朴礎等之斥佛疏可知其由來也雖然宣祖大王之答儒疏真聖君之言也若使宣祖依疏行事則非徒如太武之誅沙門毀佛寺之為也不幾如摩哈麥特執劒脅迫之行也臣不如君於此信之爰賦兩絶以志其事五度封章啓諫時宮中用蠟惹人疑如何逼得君王惱斯世無心絶有為慈壽宮尼奉命來金剛山寺獻供回莫言身繫長楊獄名上蓮花九品臺芙蓉法脈恰似六祖靈山會上世尊拈花迦葉微笑涅槃妙心正法眼藏輾轉授受西天祖師有二十八而菩提達磨來傳心印于東土以衣鉢相傳為信至于六祖慧能大士鉢止不傳六祖以後分為二派五宗自是兒孫滿地而海東禪源出自曹溪新羅之時傳得九派高麗之初法眼一派為獨盛焉全于麗末太古普愚懶翁慧勤皆入支那傳臨濟宗朝鮮以還兩家兒孫共奉一宗太古傳之幻庵混修幻庵傳之龜谷覺雲龜谷傳之碧溪正心碧溪傳之碧松智嚴碧松傳之芙蓉靈觀芙蓉傳之清虛休靜浮休善修如六祖下之南嶽讓青原思焉分二大派而又分為千枝萬派故世謂芙蓉禪師海東六祖也懶翁傳之無學自超無學傳之涵虛守伊涵虛之後兒孫遂絶雖然過去五百年間朝鮮寺剎但知指空懶翁無學三師而反忘太古幻庵蓋因無學王師之勢力使然也涵虛清虛扶宗樹教海東佛法至于麗末有二甘露門焉太古國師懶翁王師二人既有法力又有勢力當時僧徒盡出其門麗史云恭愍王封普愚為王師時僧徒求住寺者皆附普愚于請王曰自今禪教宗門社寺注持聽師注擬寡人但下除目耳於是僧徒爭為門徒不可勝計懶翁為王師住檜巖寺設工夫選五教兩宗諸山衲子選其所自得請呈監玄陵使懶翁主之遂為朝鮮佛宗之祖懶翁一傳而得無學無學為太祖師又一傳而得涵虛涵虛著圓覺經疏鈔金剛經説義於宗門大有功焉朝鮮世祖時名僧弘濬信眉斯智學悅學祖等諸師料皆涵虛之法派也何以知其然也以世祖命此諸師校正涵虛之書故太古之派命如懸絲六傳而得清虛清虛為宗門中興之祖以若道行又樹大功又著禪家龜鑑禪教釋等法語為世所重朝鮮佛教不墜于地者賴有師焉吾故曰順道阿道其始焉者也涵虛清虛其終焉者也奉使東鄰政公奮忠朝鮮宣祖大王三十七年甲辰松雲大師惟政奉使日本越明年乙巳刷還捕虜男婦三千餘口從古以來此士相傳泗溟大師之入日本也遭遇毒蛇鐵馬之威脅師皆能以法力制服之云云此係野説本不可信今見僧就惠所記而始知其説不為無根録之于左以供參考就惠記云大師自經倭變之後隱遁於伽倻山海印寺甲辰正月二十三日遭法師西山涅槃奔喪至京郡楊根娛嬪驛被上命招末由奔喪乘馹至京師上下教曰咨爾惟政狂彼倭寇實我仇敵六載兵塵萬民憂苦豫心不安爾其往見倭酋詳探賊情因通和好而還也大師拜命而退即治行李是年春三月初四日啓程具威儀器服資糧禮待之節一依使臣前例二十日至東萊候風登舟渡海自對馬島復開洋前進數月而達倭都倭人盛儀以待去都三十里設錦繡步障左右列立金銀屏屏間直寫倭國人所製詩辭大師於道上瞥然看過悉記其詩及至館與倭接伴使論其國中詩品輒能盡誦屏間詩無一差錯使者驚異之告于其王其王欲試其道術掘坑十餘丈以惡象毒蛇充入坑中布琉璃其上使羣形畢露有若縱橫於流水之面者令人戄然邀大師入坐大師亦疑其為水擲念珠知其琉璃而後入坐倭益服其智翌朝將見於倭王倭王立鐵馬以通路其下熾炭火四圍使大師緣鐵馬而入大師即西向默禱青天白日有片雲來自朝鮮大雨旋下炭火皆滅倭羣臣見者莫不驚怖曰此神僧也生佛也輒以上品金輦舁入內庭設大宴師事之所言皆從大師托以盤遊郡國賞玩山川周遊倭境探盡其國物情人心至乙巳四月將還倭王及羣臣上下各奉貨寶以為贐大師悉却不受首言交和寧國之事以求清正之頭次及刷還被虜人民倭君悚然即令刷出壬癸以來被虜者男女并三千餘口具舟糧以送使與俱還七月十三日還京祇肅上大加褒賞特賜一品秩大師不得已入謝恩命留三日乞退還入伽倻山云僧就惠所記尚玄曰金字寶藏録云惟政臨發之時告別於其師休靜休靜受以符水道術惟政到日本日本人欲脅降之投之毒蛇毒蛇馴伏不敢咬害置之炕鐵炕鐵冰冷等語今據大芚志云金字寶藏録實係後人追造不足憑據兒菴和尚名惠藏大芚寺僧也嘗云泗溟之赴日本在甲辰三月初三日自京城離發而西山之寂在甲辰正月草三日安得以道術臨別付囑乎按松雲奮忠録奮忠紓亂録松雲自經倭變隱於伽倻山海印寺甲辰春聞西山之訃奔喪至楊根娛賓驛意外承召入京遂不得往哭香山直發日本之行安得受符水學道術若是乎此誤也青泉申公維翰云毒蛇炕鐵馬背語涉誕妄且脅降之説似非實際是時家康家康姓德川氏代豐臣秀吉執政者本意在和而不在脅既已掃蕩秀吉而一反其所為則焉有乞和於鄰國而辱其來使者乎此録此録謂金字寶藏録出於塗聽之談詳見奮忠録今乃曰泗溟親記之不亦妄乎此誤也云云按泗溟堂集師在日本時與圓光元佶仙巢承兌諸僧多有唱酬而家康氏之子有意禪學求師偈語由是觀之實係和衷濟事少無受脅情迹而後人捏造所謂金字寶藏録將謂實事妄也誤也八道都總攝義兵大將弘濟尊者泗溟大師紀績碑銘并序碑在乾鳳寺嘉善大夫江原道觀察使兼兵馬水軍節度使巡察使原州牧使原任奎章閣直閣知製教南公轍撰通政大夫行寧越都護府使兼原州鎮管兵馬使僉節制使討捕使許晊書并篆金剛山自毗盧分為二岐斷髮嶺以西曰內岾鴈山以東曰外岾內岾之表訓寺是西山大師施教之地也外岾之乾鳳寺是泗溟大師募義之地也二子者雖出於浮屠而西山以其節泗溟以其功故地以人而重寺之名於是乎甲于國中按圖志唐乾元間山人貞信設道場奉彌陀觀音兩菩薩像於此號為乾鳳寺寺舊藏師畫像及願佛銀塔香爐鐵杖橇鞋珊瑚念珠各一金袈裟一襲而世傳如來牙事尤神奇其説近於述異而所謂石塔者至今尚存山中人皆言或有瑞氣為虹云師名惟政本姓任氏密州密陽人也世世有簪纓及長從恩師中德落髮於寺之樂西菴而師事西山大師學蓮花經六萬九千餘言萬曆二十年倭寇朝鮮休靜自妙香山募僧徒為義兵與提督李如松大破倭兵于平壤斬首二千級昭敬王召見行在親畫墨竹圖以賜之仍命為八道都總攝義兵將及車駕還都執政大臣多主和議休靜請於上曰臣老且病願以兵事付弟子惟政乞骸骨歸昭敬嘉其志許之命惟政乘馹至京師遂率其衆朝廷謂日本人素好佛道宜遣惟政以成和遂賜一品命服以使臣禮送之師至日本乃以三途五戒説三字缺略平秀吉其言皆以清淨不殺為宗時豐臣氏已死而德川氏代為關白執政矣此文云云誤也大芚志兒菴惠藏辨之詳矣於是和事成將還贖得被虜男女三千餘口先是新羅慈藏法師入西竺唐土之誤得如來牙十枚後為倭所掠去師乃懇辭乞還以藏于寺即石塔是也儒與佛異教學士大夫嘗譏斥之不欲同中國曰慈悲與仁義異旨而見性不若格致習靜有違誠敬毫釐之差去聖人之道遠甚雖然觀於西山與師之所樹立則其於君臣父子之義何如哉彼冠儒衣儒細究性理高談仁義而無其實者不可同日而語也佛名而儒行者吾道而已矣儒名而佛行者異端而已矣問之則是校之則非吾當退之矣當朝廷與日本搆和也賢人君子進無可死之地則高潔其身可也西山之去吾知其必有以也如師者不與之同其去而又為之力贊其議何也蓋西山近於經而其節高泗溟近於權而其功博然和議之成當時之士多主其事雖非師而不患其不成也况日本崇信佛教堯舜孔孟之道所不可化則事固有因其勢而導之者又師之忠信可以行二字缺略之邦而快人之心此豈區區遊説之士所可得而國家之享有其利者今三百年矣然則西山之退身守道泗溟之屈志濟物各有其義而其忠於為國一也同時從西山學者又有海眼與靈奎海眼起義嶺南靈奎嘗與趙文烈公憲從死錦山之役者也密州舊有師妥靈之祠穆陵時賜號曰表忠及我聖上即祚以來尤起感於西山泗溟之事嘗就寧邊故祠而表章之本朝專尚儒術未嘗廣度僧尼崇侈寺剎而二聖之眷眷於此者徒以忠義為獎也豈不盛哉余按關東以本寺遺迹論移禮部又將請於朝施行而其徒有以紀績之碑來屬者遂捐錢百緡而施之作募緣文五軸以相其役銘略董功南漢性師效勞朝鮮仁祖大王二年甲子徵沙門覺性為八道都總攝領緇徒監築南漢山城三年而告訖賜報恩闡教圓照國一都大師號并錫衣鉢焉尚玄曰高麗時代敬事三寶凡出家者皆免徭役今列其例成宗元年上柱國崔承老上封事曰有善會者規避徭役出家居山文宗十四年制曰今有避役之徒托號沙門高宗十四年崔忠獻聽術者言數興徭役侵耗諸寺僧徒怨之遂至作亂忠宣王元年五月教曰僧人既已出家固當上不拜君王下不拜父母况其餘乎自今僧俗相拜者重論如法雖居家庸僧勿差官役恭愍王八年御史臺啓曰鄉役之吏公私之隸規避賦役托迹桑門手持佛像口作梵唄橫行閭里消耗資産其害匪輕並令捕捉悉還本役從之惟恭讓王三年發京畿交州西海道民丁及諸道僧築京都內城命判三司裴克廉監之此為僧徒赴役之始此時儒學始起排佛彈僧之章奏日至故待遇稍減而非有定制役僧也至于朝鮮李太祖受禪之初經營新都于雞龍山朝議以為當國家初創之時難用民力僧徒多遊食者可用僧徒聞之自願赴役者多至數千人內願堂住持僧祖生領率之太祖嘉賞及築都漢陽祖生等亦赴役焉今仁祖朝擢拔覺性領率緇徒築南漢城似乎利用其幹能而究其實則為役僧徒也今夫修治道路橋梁以便人民之通行佛氏之訓也故或有修行之僧從事於此者按慵齋叢話有慈悲僧者好修橋梁路井等事又城外之四大院普濟院在東大門外弘濟院在沙峴北郊濟川亭在漢江北江上沙平院在漢江之南沙郊世祖命僧之有才幹者修之又箭串橋纛島通路亦僧所搆伐万石越大川作橋橋跨三百餘步安如屋宇行人如履平地云云又按桐巢漫録肅宗五年己未發諸道僧兵築江華墩臺云云則僧之可用如是今此南漢山築城之役實屬巨創若非碧巖其人亦難奏功也城役告訖不過十年乃有清亂大駕蒙塵播遷此城時碧巖大師在智異山華嚴寺檄起義僧為勤王之舉至中途聞已為城下之盟痛哭退還旋奉敕使日本之命雖不果行迹其生平卓行偉烈可與西山泗溟並駕齊驅况其傳持休師心印燈燈相續遂與清虛法脈作海東佛宗之兩大派嗚乎偉哉師之道行勳功如是故孝宗大王待以師禮見其降札之辭意則可知其恩遇之隆摯也答性老師禪案頃於日者之便忽得上人之札展紙開緘塵心俗慮一切頓開如我汩沒風塵之客健羡何言山門法界爽快殊勝酷熱炎蒸均是一也勉加餮飯日者之札爾時即欲修謝而役役之羈誠難解脫為此不果可歎可歎不料今者復惠遠問感荷不已高弟處能法號白谷之書適到一時文法脫俗字劃分明可尚可尚煩不宣聊將不腆之物以表厚意領情是望兩宗判事宗宗分擔尚玄曰海東僧職新羅有大書省小書省大都維那州統郡統國統大國統非常職也兩街僧録司高麗有住持僧統等職朝鮮初葉革兩街僧録司置禪教兩宗判事分擔宗務焉按新羅真興王十三年高句麗惠亮法師來歸新羅王以亮為僧統此為海東僧職之始其後真平王時高僧智明以戒律為大大德善德王時慈藏律師膺大國統之職統率天下僧尼州統郡統蓋統率於國統者也書省赤位舍人等職猶如僧正僧都也兩街僧録司主掌宗教之儀式人事者也遞至高麗凡係僧職承襲羅制降及麗末於太古國師及懶翁王師法號之中始見扶宗禪樹教教四字此蓋統括禪教而言而懶翁王師特膺禪教都總攝之法職恭愍王二十一年判曹溪宗事覺雲龜谷見於李穡重刊傳燈録序朝鮮初葉世宗六年裁減佛教諸宗只置禪教兩宗於是高麗之判曹溪宗事為朝鮮之判禪宗事天順元年世祖二年守眉大師以判禪宗事奉命重修靈巖月出山道岬寺見妙覺和尚碑是為其證判教宗事雖不見於文書之中而於成宗時頃有禪宗都會所興天寺教宗都會所興德寺則其有判教宗事之僧職亦可推知也至明宗朝禪宗則置於靖陵之奉恩寺教宗則置於光陵之奉先寺各其寺之住持兼帶判事之職傳録有證碧松堂野老行録之末云嘉靖三十九年明宗十五年五月上浣判教宗事都大師兼判禪宗事都大禪師奉恩寺住持休靜謹撰大抵判禪宗事即是判曹溪宗事而判教宗事即是判華嚴宗事也此見於慶聖堂休翁行録之末云隆慶戊辰宣祖元年良月下浣判大華嚴宗事判大曹溪宗事休靜謹書由是言之嘉靖末隆慶初禪教兩宗之判事兼任於清虛休靜一人之身雖然職權之分界依然各別不能以是謂為統轄僧侶也休靜大師於萬歷二十年即宣祖壬辰被命八道十六宗八道禪教兩宗都總攝之時統轄僧侶之權限始實現矣清虛之後松雲惟政碧巖覺性白谷處能等諸師亦為禪教都總攝雖然都總攝之職權注重於統率僧軍南漢北漢兩處緇營其他陵園史庫等重地所在寺剎置總攝號僧將此等謂之軍炮寺剎軍炮或謂軍泡軍者僧軍也泡者造泡也處理宗務雖是虛名奉恩寺之禪宗判事奉先寺之教宗判事依然存在與南北漢及龍珠寺總攝隨事會判至于近世其例尚多即所謂五紏正所也五糾正所見後八道總攝道德重望朝鮮宣祖大王二十五年壬辰朝家置僧統以香山舊僧官休靜道德重望招為八道十六宗都總攝統率僧侶故妙香為八道十六宗之本山也香山普賢寺有八道十六宗都總攝之門按香山影堂清虛堂休靜祠版書八道禪教都總攝又按白谷處能禪師廣州奉國寺新創記兼八道禪教十六宗都總攝臣僧處能拜手謹記時甲寅仲秋日云云由是觀之十六宗者八道禪教兩宗共為十六故曰八道十六宗都總攝也仁祖大王二年甲子天啓四年碧巖覺性大師為八道都總攝領率緇徒築南漢山城後於山城之開運寺置都總攝次於北漢山城之重興寺亦置都總攝正宗十四年庚戌乾隆五十五年創龍珠寺置八路都僧統京畿水原府華山龍珠寺都總攝自是共為五紏正所五紏正所者廣州奉恩寺楊州奉先寺南漢開運寺北漢重興寺水原龍珠寺是也紏正所者即律寺也謂糾察僧侶之過失而正之如慈藏律師在通度寺統治僧尼一切規猷皆師主之派遣巡使歷檢外寺試礪僧失之事也今夫南北兩漢之總攝統率僧軍號令諸寺龍珠寺又以隆陵齋社之故正宗大王高其寺格以曾經南北兩漢之總攝者為龍珠寺總攝定為規例至李太王初年南北兩漢僧侶訴于朝家遂命各以本寺之僧為本寺之總攝而此三寺遂與禪教兩宗判事之奉恩奉先兩寺勢位均等莫相上下故用均權之法以五寺合為五糾正所而凡係宗事三寺總攝兩宗判事於都會所都會所無一定處或於京山尼院為之云合席判之五糾正所分轄區域奉恩寺轄江原道寺剎奉先寺轄咸鏡道寺剎南漢轄忠清慶尚兩道寺剎北漢轄黃海平安兩道寺剎龍珠寺轄全羅道寺剎惟京畿道寺剎在五糾正所合同區域故不與焉而京城東郊水落山之興國寺西郊鞍峴山之奉元寺為兩公員所輔翼五糾正所故或稱七糾正所又有道糾正所柒谷架山天柱寺為慶尚道糾正所順天松廣寺為全羅左道紏正所金溝金山寺為全羅右道紏正所餘道倣此其他寺剎僧職名目不一其規即如安邊雪峰山釋王寺置僧統總攝都有司住持各一人僧統謂之事判總攝與都有司謂之理判住持寺中之本官也理事兼判故亦可兼行總攝僧統之職僧統何以謂之事判假使每年十月十一日朝鮮太祖誕辰紀念祭日自朝家派員內需司員獻祭之時僧統例為亞獻官主祭之官其職務近於事邊故總攝何以謂之理判以其主祭指空懶翁無學三師之影其職務專在理邊故大邱八公山桐華寺置綏陵香炭封山守護總攝兼桐華寺僧風紏正都僧統海南大芚寺今大興寺置表忠祠守護兼八道禪教十六宗都糾正都總攝一人表忠祠守護兼八道僧風糾正都僧統一人表忠祠守護兼八道僧風糾正禪教兩宗都有司一人表忠祠守護兼八道僧風糾正禪教兩宗都院長一人由是觀之總攝與僧統本無階級之高下而推原其始則慈藏律師統率一國幾萬僧而嚴立法規是有一統之義而純乎理邊也清虛大師總攝八道十六宗而領率軍兵是寓兼攝之義而近乎事邊也今此八道都總攝八道都僧統何其多也未免濫設雖然有時地因人重有時人因地顯以表忠祠守護之故能為八道都總攝能為八道都僧統是則尊敬其祠之資格而非視其守護人之資格也明矣餘寺之總攝僧統亦如是而已南漢山寺守城緇營朝鮮以來崇儒抑佛若干僧徒不敢喘息一自壬辰之役僧軍奏功之後僧徒對朝家示有用之才朝家認僧徒為不棄之物於是思所以安處之道驅使之方命使僧徒築南漢城即其一例而寓僧於兵之制度乃出焉僧軍之制度出而禪教之宗事退青山白雲之間聽彼梵宮鍾磬之聲霜月秋夜之中雜於軍營刁斗之響乃使袈裟錫杖龍象之衆遂作介胃棍棒豼貅之隊時勢之變亦難思議也按南漢志憲宗十二年丙午廣州留守兼守禦使洪敬謨編云按仁祖甲子築城時以僧覺性為八道都總攝專任城役南漢志城史又云仁祖甲子秋七月命築山城以李曙為總戎使主其事曙廣召諸名僧覺性應聖等各總其徒分地賦功召募八道僧軍且令城內各寺分掌八道赴役僧軍供饋等事故各寺始有主管各道義僧立番及僧總節制中軍主將之名蓋城內九寺自甲子始而望月最古玉井次之其餘七寺皆新創東林最後靈源又晚置皆任守城事九寺各藏軍器火藥開元寺在東門內多藏佛經仁祖丁丑秋有一葉船漂泊西湖舟中無人惟藏大藏經册函函上有七字曰中原開元寺開刊湖人進于備局轉達于上上曰人不引舟舟忽自到此亦靈性是册既出於中國開元寺則吾東寺剎有同名者尋問而授之永為護藏可也時八路中以開元為名者只有此寺故以金襴袱十襲裹之別遣使藏于此寺顯廟丙午火起開元寺之火藥庫勢甚烈餓頃忽反風滅火肅宗甲戌冬火作五間樓閣幾為灰燼忽大雨如注火即自滅樓中所藏軍物一無有傷人皆異之漢興寺在開元東麓地頗爽豁國清寺在西門內樓前有池傳言寺居富谷故多富僧仁祖甲子築城僧覺性首創二寺名以漢興國清人莫知其意丙子後始悟漢與汗同音金國是年改號為清仁祖異之賜賚覺性甚厚望月寺在長慶後麓古有望月菴九寺中最為古剎麗時漢陽有壯義寺太祖建都時毀之其佛像及金字華嚴經一部金鼎一坐移藏于此長慶寺天柱寺玉井寺東林寺以上并城內寺水鍾寺在早谷山寺居高頂東臨龍津世祖嘗幸是寺掘地得泉又得小鍾故云奉恩寺在楮島南順懷世子願堂也寺僧每年九月二十日行忌辰祭多位田寺舊多古迹三經兵火今無餘唯小鍾自見星寺移來成化所鑄以上并城外寺營制此段但録僧軍仁祖丙寅改築南漢山城仍設總戎廳改稱守禦廳正宗朝乙卯守禦京廳出鎮南漢山城留守兼守禦使僧軍總攝一人僧中軍一人教鍊官一人哨官三人旗牌官一人十寺城內九寺及東門外靈源寺合十寺原居僧軍一百三十八名赴操義僧三百五十六名列在京畿江原三南黃海每年分六運立番兩朔英宗朝丙子三十二年罷義僧立番收其雇錢給原居僧代其番六道義僧番錢七千三十九兩三錢七分上略按僧番錢三南及京畿海西關東六道各寺僧徒之入番于山城者後為停番代納雇錢而支放於各寺守城僧徒者也中略義僧錢僧軍雇役之物也右此三錢戶庫錢保障庫錢及僧番錢合稱三錢也係是軍錢故屬之軍需焉兵房所各道義僧番錢自兵房所隨捧每間朔一千四十三兩四錢式上下上下謂頒給也於僧軍而此錢亦是軍錢故屬之兵房所錢七千五十九兩五錢七分三南等六道僧番雇錢京畿各邑錢一百三十八兩三錢四分忠清道各邑錢五百六兩四錢三分全羅道各邑錢二千八百三十五兩五錢九分慶尚道各邑錢三千三百四兩黃海道各邑錢六十九兩四錢三分江原道各邑錢二百九兩兵房所雇僧錢六千二百六十四兩四錢一年六等例下三百九十兩四等添給各樣例下一百九十八兩一錢七分僧金按僧倉守禦使李世白以空名帖空名帖者以同知僉知等空名官誥給附稍裕之村老而徵發錢穀故俗謂麥同知者指此也得若干穀年年分糶取耗其後築倉儲之亦屬軍餉軍餉大米三百九石九斗五升九合六勺太大豆七十四石六斗六升一合四分每年歲入米三百十六石七斗四升二合太十八石八斗三升八合合折米三百二十五石十一斗六升一合以還耗即糶糴之利息中入二百八十石十二斗一年僧軍支放下守總兩營釐革義僧錢教守總南營謂南漢屬守禦營故北漢屬總我廳故疑即正宗下教義僧之除番徵錢即我先大王之軫隱恤瘼之聖德也在昔徵番之時一僧資裝一寺傾産賣器賣田徵鄰徵族繡啓此謂錦衣御史之啓請道狀此謂道監司之狀啓之為民瘼者輒以此為言於是乎斷自宸衷錢以代番使六路緇髠舉獲安堵之樂行之多年有利無害聖教若及於為民除瘼之事與良役並稱此豫侍傍承聆至于今莊誦不忘者也近因僧力在處凋殘以冗費則比昔無異全減而辦出則到今益復艱辛或有寺而無僧可徵或有僧而無錢可責甚至於村巷平民替當僧役一年二年莫可收拾今若謂之除番之為曠惠不思所以拯救則此豈隨時變通仰承德意之道乎今茲道啓中除穀營屯一欵僧亦民也苟利於民何穀可惜而僧之為斃非止嶺南則以今楞然之穀簿何處討得幾千萬包逐道設屯又况如營屯田多有已試蔑效者乎至於兩營營費之量減雖足為汰冗食之要道畢竟守城僧卒不可無接濟之需則些少除革無甚關緊若於此不大更張彼許多緇徒懸望之餘能無抑鬱嶺南外義僧所在諸道別般矯救之方付之道臣而南北漢支用之資則庶可自此釐刷此豈豫惠鮮之政概所以仰體我先大王軫隱恤瘼之聖德也尚玄曰南漢總攝本自廣州留守兼守禦使擇可堪僧報于禮曹又自禮曹移咨兵曹奏蒙下批者也雖然有時亦自禮曹直行任命此不過是末季破格也今有其例禮曹釋月初為南漢大鎮下八道都僧統僧大將兼僧風紏正都總攝盡心察任者光緒十七年辛卯十二月日南漢僧軍之設始於仁祖甲子具如上敘而北漢緇營又設於肅宗辛卯按北漢志云肅宗辛卯三十七年四月始築城九月役訖城周七千六百二十步將臺三大門四暗門十城役分給三軍門訓鍊都監禁衛營同營廳屬于經理廳置將校吏卒及僧營城餉自宣惠劃送城堞軍器自訓局禁衛御營三軍門設置分守置經理監而句管英宗二十三年罷經理廳令屬于總戎廳專管北漢緇營本部在屯興寺名壯鎮營僧營僧大將一員以八道都總攝兼中軍左右別將千總把總左右兵房各一人教鍊官旗牌官中軍兵房各二人五旗次知一人都訓導別庫監官各一人射料軍十人書記二人通引二人庫直三人册掌務板掌務各一人吹手二人各寺僧將十一人首僧十一人義僧三百五十人分定各道一年分六次上番僧聖能跋曰惟此北城之築實出於肅廟為萬世深遠之謨而既築之後議論多端近年以來便置之度外無復如當時諸相公此謂相臣李濡等也之極意規畫亦安知前功之不歸於盡棄耶賤僧猥被諸相公使令拋却山門本分竭力奔走於此事者已三十年矣才卸重擔將還故山謹録山城事十四條名之曰北漢志與新總攝瑞胤上人商議以付剞劂氏略識卷末如此云爾乙丑英宗二十一年十一月上浣山人聖能識尚玄曰南漢築城統率僧徒者有僧覺性碧巖大師應聖等北漢築城奔走竭力者有僧聖能蓋覺性應聖聖能皆名僧也聖能智異山華嚴寺僧也嘗鐫大華嚴經矣嘗修方丈山丈六殿矣智異山華嚴寺覺皇殿也又嘗樹通度寺娑婆教主釋迦如來靈骨舍利浮圖碑乞文於蔡希庵彭胤見本碑銘矣能師又紹介護巖子仙嚴寺若休大師也於蔡希庵具見順天仙巖寺重修碑嗚呼聖能其誠於佛事者也勤於王事者也又能成人之美者也蔡碑俱作性能者聖能之誤也當以北漢志中自署其名者為是也北漢寺剎之見于北漢志者即如重興寺在登岸峰下古寺有三十餘間乃築城後增建為一百三十六間太古寺在大古臺下即重興寺左岸高麗僧普愚住此扁以太古倣永嘉體作歌一篇及死李牧隱穡撰碑銘築城後總攝僧聖能即普愚遺址經紀創寺凡一百三十一間仍名以太古以下十二寺皆略三角山太古寺重創上梁雍正三年乙巳英祖元年三月十五日記云城內十一寺所任重興寺僧將自儀首僧克休露積寺僧將嘉善懷秀首僧漢旭西巖寺僧將嘉善元湜首僧肯信慶興寺僧將通政泰堅首僧會還國寧寺僧將嘉善厚真首僧青空圓覺寺僧將通政熙淑首僧漢平扶旺寺僧將通政戒淳首僧六宗普光寺僧將通政贊允首僧智暹保國寺僧將就起首僧就察龍巖寺僧將嘉善有空首僧善贊書記孝明孔漢奉聖菴重建上梁文咸豐十年三月十二日上梁寶曇居士撰文略云第伏覩三角山道場更兼寓一營門軍制執戈衛社壯哉清虛師壬辰之忠烈有遺列堞峙糧遠矣鹿川相李濡辛卯之規畫斯在遂令伽藍鎮保障之重緇衲修介胃之容其為關係國家不比尋常寺剎建牙吹角總攝三百六十州僧軍獻水供香奔走八萬四千家士女此中外之所瞻仰公私之所皈依者也下略李太王己卯十一月北漢僧倉所在軍器什物及各項錢穀諸處屯土內外山基址移屬武衛所見承政院日記最後北漢屬于經理營其證如左經理營釋月初為八道僧風紏正北漢都總攝兼僧大將差定盡心察任宜當者光緒十九年癸巳四月日李太王甲午更張之時南北漢總攝並皆廢止北道沿郡在家僧村海東僧史有一奇事即北邊之在家僧是畜妻食肉俱為無礙可謂朝鮮之真宗也咸鏡北道慶興慶源會寧富寧鍾城穩城等沿邊各郡特有一種僧侶羣聚居生于山谷中自成村落其所居村落名山門每一山門必有公共佛殿一處婚喪之禮行於寺中男子造麥藁黃紙女人織麻絲細布亦為耕稼以資生活為世所賤不通婚嫁其所由來有二説焉一説朝鮮仁祖丙子清兵來圍南漢當時結有約條大乳女三千人牝馬三千匹待其需要之時入送于寧古塔清祖發祥之地故朝家於北邊沿郡募故女真之遺族充當其選號曰在家僧血脈法脈兩俱相續以別良俗不令雜處劃定村落使自增殖其俗女裝以護乳故特繫衣帶于乳部以下云云又一説高麗尹瓘驅遂女真其殘落者造寺院以安處之使之奉佛族居為僧云云尚玄曰已上二説並屬無據惟有一事最為真實按高麗圖經在家和尚不服袈裟不持戒律白紵窄衣束腰皂帛徒跣以行間有穿履者自為居室娶婦鞠子其於公上負戴器用掃除道路開始溝洫修築城室悉以從事邊陲有警則團結以出雖不間於馳逐然頗壯勇其趨軍旅之事則人自裹糧故國用不費而能戰也聞中間契丹為麗人所敗正賴此輩其實刑餘之役人夷人以其髠削鬚髮而名和尚耳云云由是觀之在家僧史當以高麗圖經所言為是也震默指影稱釋迦真震默大師名一玉萬頃佛居村人嗣法西山其生平神異之迹不可勝記海南大芚寺沙門草衣恂公輯録口碑之遺傳者名曰震默祖師遺迹考其略曰先師年七歲出家讀內典於全州之鳳棲寺夙慧英達不由師教明核重玄既剃染為沙彌時寺有佛事主事者以師年少而有淨行差為擁護壇奉香之任行之未久有密迹神將顯告於主事之夢曰我等諸天皆衛佛之神祇也焉敢返受佛禮亟令改換奉香使我得以安於晨夕師奉養老母於倭幕村全州地師居村後之日出庵及夫母歿祭之以文曰胎中十月之恩何以報也膝下三年之養未能忘矣萬歲上更加萬歲子之心猶為慊焉百年內未滿百年母之壽何其短也單瓢路上行乞一僧既云已矣橫叉閨中未婚小妹寧不哀哉上壇了下壇罷僧尋各房前山疊後山重魂歸何處嗚呼哀哉云師嘗棲于邊山之月明庵每夜有一點星光耿耿遙遙於東野之外審而得之乃清涼山木鳧庵全州地之佛燈也師遂移錫改木鳧為遠燈庵此地本是羅漢道場十六尊者常與師侍奉燈光之遠照於月明者蓋羅漢之所以啓發師意也師嘗於途中獨行遇一沙彌與之同行至樂水川邊沙彌啓曰小僧先渡測其淺深遂露足輕輕而涉師將厲之身淹水中沙彌徑來扶出始知見戲於羅漢一偈記之曰寄汝靈山十六愚樂村齋飯幾時休神通妙用雖難及大道應聞老比丘羅漢具云阿羅漢釋迦如來所度之弟子也初佛以無上法授迦葉尊者又屬十八大阿羅漢令各福利人天所謂住世十八尊者是也十八者加二尊謂第十七提密多羅尊者第十八賓頭盧尊者今云十六海東諸寺塑畫者舉皆十六羅漢所言愚者羅漢偏證我空之理超越分段生死雖具騎馬縛龍之力自謂神通不可及終不能回入於境智混融之大道是謂愚於大法故謂之愚法小乘也師晚節常住鳳棲寺去寺不遠之地有鳳谷先生者當時儒賢也嘗從先生借綱目貯鉢囊自擔而行先生使人隨後覘之行且披閲手一卷看了拋地又拔一卷手之拋之如是至寺門盡拋不顧而入他日先生謂師曰借書而拋於地何也師曰得魚者忘筌先生逐篇舉難無不洞悉師嘗住上雲庵神足輩以乞糧遠出月餘乃返師面上蛛網膝間塵堆為之掃塵掇絲通名拜謁師曰爾還一何速耶天啓壬戌完府之松廣寺鴻山之無量寺同時塑像並請師坐證師皆不往各授一物置諸證壇以旌運觀之用曰只須恁麼兩寺尊像必當善成後勿率爾改塗且戒之曰量寺化僧點眼前慎勿出寺門外於是二僧受戒敕信而歸一如所教松寺以拄杖卓于證壇連日夜孤立不倚量寺以數珠安于證席珠常呱呱自轉矣鴻山民有以三千金獨當三尊之塑費者常言來參而過期不來化僧因其候望不覺出於門外忽被甲士打之而死師嘗吟偈子曰天衾地席山為枕月燭雲屏海作樽大醉居然仍起舞却嫌長袖挂昆崙師一日沐浴淨髮更衣曳杖出門沿溪而行植杖臨流而立以手指水中己影而示侍者曰遮個是釋迦佛影子也侍者曰這是和尚影師曰汝但知和尚假不識釋迦真遂負杖入室疊足跏趺而坐召謂弟子曰吾將逝矣恣汝所問弟子曰和尚百歲後宗乘嗣誰師默然良久曰何宗乘之有弟子再乞垂示師不得已而言曰名利僧也且屬靜老謂休靜也遂怡然皓寂尚玄曰宛然和尚假何道釋迦真假滅真非滅元來是幻身世壽七十二縣記中有此三字法臘五十二即癸酉也鳳谷先生日記中有曰聞玉師化去云此僧墨名而儒行不勝痛悼癸酉十月二十八日仁祖元年禁僧入城朝鮮仁祖大王元年癸亥夏五月申禁僧尼入城及市井騎馬毀仁慶宮其納石納基而升資者悉削其資先是僧性智以風水出入士大夫家看山剋擇終乃為主光海廢主所悅寵幸無比占一第於新闕近地畜沙彌方外遊髠出入無恆宛然一伽藍也乃獻營建新闕之議象村集承旨韓孝仲一日退朝見術僧性智於闕中咄咄還家極陳土木營建之弊性智及妖巫福同出入宮中之狀福同無鬚髭貌類婦人語音亦雌聲著婦人服出入營中為中齊禮揚主震怒下嚴旨并推政院主以言者猶不深罪未久復授承旨下吏相謂曰直言承旨來矣韓公行狀尚玄曰僧性智風水術之淵源得於僧能皓其説見青鶴集雲鶴門人龍岑居士關西趙汝籍撰汝籍宣祖時人其書云歲甲寅按其年分則當光海主甲寅梅窗曹通遠松棲李彥休雲鴻李思淵已上三人皆當時之羽流也入金剛山靈源洞宿於小菴菴有一僧松絡草衣貌如寒玉眼如晨星自云西蕃僧遍遊天下到本國者才數月矣在中國時名稱性圓在朝鮮名稱能皓食松子柏葉及六天氣水也自以佛法神力周遊無礙也號洞見堂一見梅窗便托深契永夜懸燈細論玄理余趙汝籍其時適隨後參聽高論明日寢尚未起有一僧自外入謁皓曰汝近日得無殺人乎其僧曰自聞命之後地眼差開寧有是事皓曰汝用術太繁無名貪貨禍將及身慎之慎之其僧曰葬地之法有一端不知處同是吉地而或用之福或用之禍或小發或大發何也皓曰地如好田地人若五穀種種粟則粟生種禾則禾生不可種粟而求禾不可種禾而求粟必也先別人品之為禾為粟然後方可與之且有傷心之穀種雖種負郭之田何可望生成之理乎且夫春夏秋冬之異氣有寒暑之別種穀於春田必有生成種穀於冬田則安有生成乎且如春陵一莖九穗之嘉禾乃受上天靈氣凡夫聖人之間出者亦上天之所種耳嘗聞中國之人豐沛市中多將相天將啓將相之業故既降天子而又播將相之種於其地也仍厲聲曰性智汝俗僧斯速退去吾方與佳客穩話其僧告別而去尚玄又曰前有燕山主以圓覺寺為妓坊荒淫無度中宗反正御位之初毀撤圓覺寺分賜燕山時毀家諸人又罷禪教兩宗黜于清溪寺後有光海主信術僧之言興徭役斂民財仁祖反正御位之初禁僧毀宮前後二事如出一轍焉朝鮮時代之禁令每有不出城門者即如成宗二年辛卯六月驅逐巫覡於城外又正祖元年丁酉夏禁巫女入城仁祖元年癸亥五月禁僧尼入城又正祖二年戊戌禁僧徒入城等是也所不可曉者豈城門之外獨非王土而亦無關於王法歟既以巫覡為惡也驅逐巫覡於城外城外之民何罪既以僧尼為惡也申禁僧尼入城城外之民何罪因疏撤院首相奏對朝鮮顯宗大王二年辛丑春正月命罷城內慈壽仁壽兩尼院仁壽院係是文定王后所創東閣雜記云明宗四年己酉文定王后方崇佛事命搆新仁壽宮于舊淨業院基因副提學俞綮之疏也領議政鄭太和曰此是歷代帝王所未有之舉然自前後宮之老而無依者多住尼院後宮亦有出居者此難處也王曰今則無有也仍命禮官詣慈壽院奉出列聖位牌依奉恩寺例即令埋安于淨地右參贊宋浚吉入賀兩尼院撤廢之舉且曰朱子以毀僧寺作書堂為一舉兩得尼院一處乃北學舊基以毀院材瓦仍設北學則好矣王從之今泮宮之一西齋是也白谷大覺登階録諫廢釋教疏云恭惟我太祖大王殿下應天啓運削惡除凶當鴻號四七之符御龍飛九五之位訪得無學定都漢陽中略迄于成宗中宗嗣承休命傳此風規特設僧科例同國試成宗中宗惡僧最甚禁度僧廢僧科白谷謂此兩代特設僧科誤也及于明宗宣祖敢勤厥訓秪服斯嚴睿聖仁祖大王殿下蓮藏之詮菩薩之道存而不革中略夫慈壽仁壽兩院在宮掖之外即先后之內願堂也奉恩奉先兩寺在陵寢之內即先王之外願堂也所以限內外者亦男女有別故也此非一朝一夕之創也實是先王先后之制也與國同興與國同亡有成則國之慶也有毀則國之殃也故大雅曰人之云亡心之憂矣兩院廢則殿下之憂也小雅曰瓶之罄矣惟罍之耻兩寺廢則殿下之耻也今兩院盡廢放黜尼衆兩寺盡棄削沒奴婢岧嶤寺院帶殷墟之慘清淨僧尼含楚囚之悲珍像雕容傷心於巷婦方袍圓頂拭淚於閭兒殿下之寬有何所忌而黜先后內願堂之尼衆乎殿下之富有何所乏而削先王外願堂之奴婢乎云云見經送寺英祖敕教朝鮮英祖大王二十九年癸酉秋八月教曰頃見故講書院有楞嚴經此非所以教吾孫之道也其令送置北漢重興寺尚玄曰朝鮮太祖在潛邸時發誓願成大藏置釋王寺又與幻庵禪師願成大藏置瑞雲寺又於即位之後與羣臣同願印成大藏安于海印寺古塔中又於演福寺請無學國師為轉藏佛事以為福國利民之資世祖大王特於禁中設置刊經都監御定口訣廣譯佛經亦為福利而已按佛書置于宮中有祖宗故事見于普雨和尚華嚴經跋語即如恭惟我王上殿下即明宗大王也睿智日新多能天縱德過二祖之盛治踰七宗之隆聽國政之多暇覽釋典而興敬乃於世主妙嚴一品知神衆乘權護世之妙應及此五十三善知識讚頌見善財尋師求法之高蹤非但上心慶知其所未知感見其所未見而已於是益信其法力神功密有助於邦家而使為君為子於天下者皆蒙利樂於無窮之世也特發欽明之聖敬上以為慈殿聖躬萬世下以為萬民恆心常樂謹依祖宗故事隱命工人如法書之畫之盛以琅函安於寶藏以示尊敬之意於九重之中其居九重而目是事者孰不感聖上至孝之大而至仁之深也云云太祖以後歷代祖宗置佛書于內禁以遺子孫今英祖則黜佛書于外寺不欲遺於子孫可見王者之所尚各異也破龜頭石壓俗離山俗離山之名者也法住寺之大者也龜頭石之奇者也秋波禪師法名弘宥英祖時人著有遊記備述其事今録其文曰癸未重陽余為見伯氏西行道空林出洞外數百步望之有數峰岌然入雲霄間甚奇峻余意其為俗離山而未之知顧謂從行僧普潤曰是必俗離也俗離吾所願一遊雖非俗離有山如此可不登乎吾見此山而歸吾伯氏聞之亦必喜矣前遇一老夫荷鎌而過問曰彼俗離耶老夫曰然師何以知之曰人而拔萃者其易知乎山亦然湖西之山俗離名最高而此湖西地吾見而知之曰人之類甚多山亦然惟子擇之湖西之山安知無高於俗離者乎因相視而笑余曰至山中幾里曰就徑則三成紆行四十里然徑路險又有峻嶺不若從紆而行余乃就大路而去踰弓項嶺嶺低而路坦老人之指人路信矣行二十里有大川是自俗離洞門流出者也又行十數里越所里項峙始達洞門洞門寬平茅黃而可坐溪清而可掬乃與從行普潤小憩啜點既而徐行委蛇而入無數峰巒矗矗然若劍戟森列中有基址平正廣濶左右羣巒縈紆擁抱若龍幡而鳳舞寺於其中號曰大法住其殿宇之宏麗木石之工巧不負所聞層殿五重鐵幢之高石甕石槽之大銅鎕火臺之雄實他處所無日曛矣遂宿禪堂冷氣徹骨通宵不成眠黎明出門有登上峰之意行至福泉福泉即我世祖大王祝釐之所也基址端妙爽朗巖屏之圍斫石之功有過於前創願室秖奉世廟親筆雲漢至今宛然因感歎吟一絶曰松帶千年色巖開太古顏招提聖迹在頻看淚痕斑出門外緣東崖上一臺立二塔一學祖塔一秀庵塔秀庵法諱信眉世祖與眉師書札亦珍藏是寺其敬待可想少坐塔傍望觀焉惟文藏一峰為後岡所遮不可得見其餘峯巒皆歷歷指點若遊蓬萊者登正陽寺歇惺樓則一萬二千峯皆入眼中復回福泉取左徑行數里至中獅子庵庵乃元宗大王命建至今爇香亦藏御書及下賜珍寶等物頃歲遇災立屋已數年尚未覆瓦吁可惜矣所謂最上峯文藏此去二成極力欲登而是時天不晴風勢甚惡且崖徑甚危棧道極險潤以坐不垂堂之義苦止之余亦惴惴然不敢進從潤而歸日已傾矣主香初頭陀辦午飯以待之哺訖心猶不厭又登水晶峯峰高可萬丈俯視寺宇危不可正覷但扶樹而觀之其羅絡寮舍若小碁列局上上有石龜不鐫而形自肖其項乃為唐人所斷噫噫悲哉欲久遊而高峯入雲若身在虛空心悸足酸不可久留乃捫蘿以下至夜臥席上席若動搖蓋積畏尚存也翌明出寺門立虹橋上回看山若戀我我亦不能忘山賦成一律有曰一笻隨意好林泉到底風光入眼前霜著溪楓疑紫玉嵐浮岸柳似寒煙何來玉笛驚人夢自有黃花伴客眠寄語空門諸釋子莫將死句坐多年截斷龜頭壓勝山氣又續又毀具如下文曰俗離山世號小金剛金剛擅名寰宇中原人至有生東國一見之願而此山與之長弟焉則其奇勝可知耳第舊迹荒昧但傳荒誕惟世祖大王嘗南巡至此其見於乖崖金守溫之記者詳矣大谷先生隱居山下每乘輿獨遊其發於吟咏者多矣然則此山尤當如帝王之尊而亦有南嶽雲谷之致爾山勢皆面西有一麓翔舞馳下峙為水晶峯峯上有龜石舉頭西向國史云中原人來見以為中原財帛日輸東國者此龜之致也遂斷其頭其背有十層浮圖世傳亦斷頭時一並所建以壓勝云爾其頭崇禎癸巳沃川郡守李侯斗陽諭總攝僧使續之歲乙巳忠清兵馬節度閔公震益來見浮圖而聽説於居僧即諗于觀察任公義伯復毀去之余未知中原財帛在何時日輸於東乎亦未知其後果能不如是否乎今節度之毀之也非欲其財帛之復輸也只是掊破荒唐之説解人疑惑則斯不為不善者矣昔日建此者乃敢兀然高峙欲與文藏天王爭其雄長而居人遊客瞻仰誇耀者不知其幾百年矣今按使節度獨立不懼去之如掃塵埃非獨識趣有過人者亦豈我列聖建用皇極之致也略記顛末以備山中之故事云崇禎丙午二月日恩津宋時烈記宋浚吉書尚玄曰海東名山裨補之説始于新羅道詵禪師或沉鐵甕於實相寺在古雲峯今南原郡或埋鐵像於智利山或竪羣塔於開天寺在古綾州郡皆所以鎮壓山水背逆之氣者也後之術士亦效倣之即如朝鮮明宗朝普雨和尚住持廣州修道山奉恩寺僅十餘年佛法大興當時儒者甚忌嫉之及普雨死遂使切斷奉恩寺之主山而祛其首堀開雞岾村之案山而除其足以泄地氣之聚以防佛道之興其為迷信一至於此不由不令人笑其愚也秖如俗離山之龜頭中原人斷之李郡守續之閔兵使毀之宋尤庵讚之何多事乎甚可笑也昔在新羅永深融宗佛陀諸大德等傳得占察法于真表律師還俗離山於吉祥草生處創寺名曰吉祥遂作占察法會道場至高麗亦行之不衰蓋此占察律宗係是朝鮮佛家所創而俗離山為其道場故記其顛末于左真表者百濟人也家在金山世事弋獵後入深山以刀截髮苦到懺悔舉身撲地志求戒法誓願要期彌勒菩薩授我戒法也夜倍日功繞旋叩榼心心無間念念翹勤經于七宵詰朝見地藏菩薩手搖金錫為表策發教發戒緣作受前方便感斯瑞應勇猛過前二七日滿有大鬼現可怖相而推表墜于嵓下身無所傷匍匐就登石壇上加復魔相未休百端千緒至第三七日質明有吉祥鳥鳴曰菩薩來也乃見白雲若漫紛然更無高下山川平滿成銀色世界兜率天主逶迤自在儀衛陸離圍繞石壇香風花雨一時交集須臾慈氏徐步而行至于壇所垂手摩表頂曰善哉大丈夫求戒如是至于再至于三蘇迷盧可手攘而却爾心終不退乃為授法表身心和悅猶如三禪意識與樂根相應也四萬二千福河常流一切功德尋發天眼焉慈氏躬授三法衣瓦鉢復賜名曰真表又於膝下出二物非牙非玉乃籤檢之制也一題曰九者一題曰八者各二字付受表云若人求戒當先悔罪罪福則持犯性也更加一百八籤籤上署百八煩惱名目如來來疑受誤戒人或九十日或四十日或三七日行籤苦到精進期滿限終將九八二籤參合百八者佛前望空而擲其籤墮地以驗其罪滅不滅之相若百八籤飛逗四畔唯八九二籤卓然壇心而立者即得上上品戒焉若衆籤雖遠或一二來觸九八籤拈觀是何煩惱名抑令人重覆懺悔已正將重悔煩惱籤和九八者擲其煩惱籤去者名中品戒焉若衆籤埋覆九八者則罪不滅不得戒也設加懺悔過九十日得下品戒焉慈氏重告誨云八者新熏也九者本有也囑纍已大仗既回山川雲霽於是持天衣執天鉢猶如五夏比丘徇道下山草木為其低垂覆路殊無溪谷高下之別飛禽鷙獸馴伏步前又聞空中唱告村落聚邑言菩薩出山來何不迎接云云則人民男女布髮掩泥者脫衣覆路者氈罽氍毹承足者花絪美褥填坑者表咸曲副人情一一迪踐有女子提半端白㲲覆于途中表似驚忙之色回避別行女子怪其不平等表曰吾非無慈不均也適觀㲲間皆是狶子吾慮傷生避其誤犯耳原其女子本屠家販買得此布也自爾常有二虎左右隨行表語之曰吾不入郛郭汝可導引至可修行處則乃緩步而行三十來里就一山坡蹲跪于前時則挂錫樹枝敷草端坐四望信士不勸自來同造伽藍號金山寺焉神僧傳系曰表公變行一日千里果得慈氏為授戒法此五十受中何受耶通曰近上法見諦自誓也發天眼通是證初二果也非諦理現觀而何專據石塔與多子塔前自誓同也或曰所受籤檢以驗罪滅之相諸聖教無文莫問諸天傳授或魔鬼所為不可為後法乎通曰若彰善疸惡利益不殊彌勒天主是天傳授非魔必矣諸聖教中有懺罪求徵祥證其罪滅不滅然其佛滅度彌勒降閻浮説瑜珈豈可不為後世法耶十誦律云雖非佛制諸方為清淨者不得不行也釋真表完山州今全州牧萬頃縣人或作豆乃山縣或作那山縣今万頃古名豆乃山縣也負寧傳釋表之鄉里云金山縣人以寺名及縣名混之也父曰真乃末母吉寶娘姓井氏年至十二歲投金山寺崇濟石記作順濟法師講下落彩請業其師嘗謂曰吾曾入唐受業於善道三藏然後入五臺感文殊菩薩現受五戒表啓曰勤修幾何得戒耶濟曰精至則不過一年表聞師之言遍遊名嶽止錫仙溪山不思議庵該鍊三業以亡身懺悔得戒初以七宵為期五輪撲石膝腕俱碎雨血嵓崖若無聖應決志捐捨更期七日二七日終見地藏菩薩現受淨戒即開元二十八年庚辰三月十五日辰時也時齡二十餘三矣然志存慈氏故不敢中止乃移靈山寺一名邊山又楞伽山又勤勇如初果感彌力力勒音通現授占察經兩卷此經乃陳隋閩外國所譯非今始出也慈氏以經授之耳并證果簡子一百八十九介謂曰於中第八簡子喻新得妙戒第九簡子喻增得具戒斯二簡子是我手指骨餘皆沉檀木造喻諸煩惱汝以此傳法於世作濟人津筏表既受聖莂來住金山每歲開壇恢張法施壇席精嚴末季未之有也風化既周遊涉到阿瑟羅州島嶼間魚鱉成橋迎入水中講法受戒即天寶十一載壬辰二月望日也或本云元和六年誤矣元和在憲德王代去聖德幾七十餘年景德王聞之迎入官闥受菩薩戒嚫租七萬七千石椒庭列嶽皆受戒品施絹五百端黃金五十兩皆容受之分施諸山廣興佛事其骨石今在鉢淵寺即為海族演戒之地得法之領袖曰永深寶宗信芳體真珍海真善釋忠佛祖源流永深作永心又下文石記寶宗作融宗等皆為山門祖深則真傳簡子住俗離山為克家子作壇之法與占察六輪稍異修如山中所傳本規按唐僧傳云開皇十三年廣州有僧行懺法以皮作帖子二枚書善惡兩字令人擲之得善者吉又行自撲懺法以為滅罪而男女合匝妄承密行青州接響同行官司檢察謂是妖妄彼云此搭懺法依占察經撲懺法依諸經中五體投地如大山崩時以奏聞乃敕內史侍郎李元撰就大興寺問諸大德有大沙門法經彥琮等對曰占察經見有兩卷首題菩提登在外國譯文似近代所出亦有寫而傳者檢勘羣録並無正名譯人時處搭懺與衆經復異不可依行因敕禁之今試論之青州居士等搭懺等事如大儒以詩書發冢可謂畫虎不成反類狗者矣佛所預防正為此爾若曰占察經無譯人時處為可疑也是亦擔麻棄金也何則詳彼經文乃悉壇深密洗滌穢瑕激昂懶夫者莫如茲典故亦名大乘懺又云出六根聚中開元貞元二釋教録中編入正藏雖外乎性宗其相教大乘殆亦優矣豈與搭撲二懺同日而語哉如舍利弗問經佛告長者子邠若多羅曰汝可七日七夜悔汝先罪皆使清淨多羅奉教日夜懇惻至第五夕於其室中雨種種物若巾若帊若拂若刀錐斧等墮其目前多羅歡喜問於佛佛言是離塵之相割拂之物也據此則與占察經擲輪得相之事奚以異哉乃知表公翹懺得簡聞法見佛可謂不誣况此經若偽妄則慈氏何以親授表師又此經如可禁舍利問經亦可禁乎琮輩可謂攫金不見人讀者詳焉讚曰現身澆季激慵聾靈嶽仙溪感應通莫謂翹勤傳搭懺作橋東海化魚龍參照關東楓嶽鉢淵藪石記此記乃寺主瑩岑所撰承安四年己未立石真表律師全州碧骨堤郡今金堤縣都那山村大井里人也年至十二志求出家父許之師往金山藪順濟法師處容染濟授沙彌戒法傳教供養次第祕法一卷占察善惡業報經二卷曰汝持此戒法於彌勒地藏兩聖前懇求懺悔親受戒法流傳於世師奉教辭退遍歷名山年已二十七歲於上元元年庚子蒸二十斗米乃乾為糧詣保安縣即扶安縣也入邊山不思議房輿地勝竟扶安來蘇寺新羅惠丘頭陀所創有大小二乘來以五合米為一日費除一合米養鼠師勤求戒法於彌勒像前三年而未得授記發憤捨身嵓下忽有青衣童手捧而置石上師更發志願約三七日日夜勤修扣石懺悔至三日手臂折落至七日夜地藏菩薩手搖金錫來為加持手臂如舊菩薩遂與袈裟及鉢師感其靈應倍加精進滿三七日即得天眼見兜率天衆來儀之相於是地藏慈氏現前慈氏摩師頂曰善哉大丈夫求戒如是不惜身命懇求懺悔地藏授與戒本慈氏復與二栍一題曰九者告師曰此二簡子者是吾手指骨此喻始本二覺又九者法爾八者新熏成佛種子以此當知果報汝捨此身受大國王身後生於兜率如是語已兩聖即隱時壬寅四月二十七日也師受教法已欲創金山寺下山而來至大淵津忽有龍王出獻玉袈裟將八萬眷屬侍往金山藪四方子來不日成之復感慈氏從兜率駕雲而下與師受戒法師勸檀緣鑄成彌勒丈六像復畫下降授戒威儀之相於金堂南壁乃於甲辰六月九日鑄成丙午五月一日安置金堂是歲大曆元年也師出金山向俗離山路逢駕牛乘車者其牛等向師前跪膝而泣乘車人下問何故此牛等見和尚泣耶和尚從何而來師曰我是金山藪真表僧豫曾入邊山不思議房於彌勒地藏兩聖前親受戒法真栍欲覔創寺鎮長修道之處故來爾此牛等外愚內明知我受戒法為重法故跪膝而泣其人聞已乃曰畜生尚有如是信心况我為人豈無心乎即以手執鎌自斷頭髮師以悲心更為祝髮授戒行至俗離山洞裏見吉祥草所生處而識之還向溟州海邊徐行次有魚鱉黿鼉等類出海向師前綴身如陸師蹯而入海唱念戒法還出行至高城郡入皆骨山始創鉢淵藪開占察法會住七年時溟州界年穀不登人民飢饉師為説戒法人人奉持致敬三寶俄於高城海邊有無數魚類自死而出人民賣此為食得免死師出鉢淵復到不思議房然後往詣家邑謁父或到真門大德房居住時俗離山大德永深與大德融宗佛陀等同詣律師所伸請曰我等不遠千里來求戒法願授法門師默然不答三人者乘桃樹上倒墮於地勇猛懺悔師乃傳教灌頂遂與袈裟及鉢供養次第祕法一卷占察善惡業報經二卷一百八十九栍復與彌勒真栍九者八者誡曰九者法爾八者新熏成佛種子我已付囑汝等持此還歸俗離山山有吉祥草生處於此創立精舍依此教法廣度人天流布後世永深等奉教直往俗離尋吉祥草生處創寺名曰吉祥永深於此始設占察法會律師與父復到鉢淵同修道業而終孝之師遷化時登於寺東大嵓上示滅弟子等不動真體而供養至于骸骨散落於是以土覆藏乃為幽宮有青松即出歲月久遠而枯復生一樹後更生一樹其根一也至今雙樹存焉凡有致敬者松下覔骨或得或不得豫恐聖骨湮滅丁巳九月特詣松下拾骨盛筒有三合許於大嵓上雙樹下立石安骨焉云云此録所載真表事迹與鉢淵石記互有不同故刪取塋岑所記而載之後賢宜考之無極記無極翁者名混丘即撰三國遺事之一然禪師之高足也心地繼祖釋心地辰韓第四十一主憲德大王金氏之子也生而孝悌天性沖睿志學之年落采從師拳勤于道寓止中嶽今公山適聞俗離山深公傳表律師佛骨簡子設果訂法會決意披尋既至後期不許參列乃席地扣庭隨衆禮懺經七日天大雨雪所立地方十尺許雪飄不下衆見其神異許引入堂地撝謙稱恙退處房中向堂潛禮肘顙俱血類表公之仙溪山也地藏菩薩日來問慰洎席罷還山途中見二簡子貼在衣褶間持回告於深深曰簡在函中那得至此檢之封題依舊開視亡矣深深異之重襲而藏之又行如初再回告之深曰佛意在子子其奉行乃授簡子地頂戴歸山嶽神率二仙子迎至山椒引地坐於嵓上歸伏嵓下謹受正戒地曰今將擇地奉安聖簡非吾輩所能指定請與三君憑高擲簡而卜之乃與神等陟峯巔向西擲之簡乃風揚而飛時神作歌曰礙嵓遠退砥平兮落葉飛散生明兮覔得佛骨簡子兮邀於淨處投誠兮既唱而得簡於林泉中即其地搆堂安之今桐華寺籤堂北有小井是也本朝睿王嘗取迎聖簡致內瞻敬忽失九者一簡以牙代之送還本寺今則漸變同一色難卞新古其質乃非牙非玉占察經上卷敘一百八十九簡之名一者求上乘得不退二者所求果現當證第三第四求中下乘得不退五者求神通得成就六者修四梵得成就七者修世禪得成就八者所欲受得妙戒九者所曾受得戒具以此文訂知慈氏所言新得戒者謂今生始得戒也舊得戒者謂過去曾受今生又增受也非謂修生本有之新舊也十者求下乘未住信次求中乘未住信如是乃至一百七十二皆過現世中或善或惡得失事也第一百七十三者捨身已入地獄已上皆未來之果也一百七十四者死已作畜生如是乃至餓鬼修羅人人王天天王聞法出家值聖僧生兜率生淨土尋見佛住下乘住中乘住上乘得解脫第一百八十九等是也上言住下乘至上乘得不退今言上乘得解脫等以此為別爾皆三世善惡果報差別之相以此占看得與心所行事相當則為感應否則為不至心名為虛謬則此八九二簡但從百八十九中而來者也而宋傳但云百八籤子何也恐認彼百八煩惱之名而稱之不揆尋經文爾又按本朝文士金寬毅所撰王代宗録二卷云羅末新羅大德釋沖獻太祖以表律師袈裟一領戒簡百八十九枚今與桐華寺所傳簡子未詳同異讚曰生長金閨早脫籠儉勤聰惠自天鍾滿庭積雪偷神簡來放桐華最上峰里鄉見聞録有俗離山熙彥守一兩師行迹實是名僧故特尾録之熙彥者明川良民也十二歲出家入七寶山雲住寺十三歲落髮居雲住幾二十年性至勤手自捆屨晝夜不息片刻不休三十一歲始以所業草履貿細布十五六匹三度來販於京中及關西得細布一擔負還至安邊元山地弛擔憩于路上忽棄其所負直走皆骨山便斷穀蓋頓悟也悟道之後與衆混迹不為崖異人未之奇也皆以為凡流中斷穀者碧巖師覺性一見異之曰天下高僧也與之相友由是知名其為道以孤高刻苦為主參禪入定之後晝夜跏趺兀坐不臥不睡一衲無冬夏不換至死無袴只以一幅巾掩下體平生無一言僧俗有往來者但合掌曰成佛其意蓋以勸人學道成佛也初不能文悟道之後覺性叩之多知經語云光海朝設水陸齋於山中聞其道高製賜錦繡袈裟使者置于前合眼不視良久手推而逸去嘗至智異山寺入定兀坐屢十年寺僧悶其飢以飯進之終不食僧徒密以釜底燒飯和水置于師傍不使知之始食之夜還其器而去必置飯主之室前人以為他心通云晚至俗離山法住寺為土窟而居之晝夜兀坐三十餘年而終死時亦坐化年八十餘茶毗之夕大風振山云余至俗離山寺見熙彥守一覺性畫像問三師中誰人最高寺僧曰彥師最高問其事迹有信玄者吉州人也與之同鄉且居此寺見其就化故略言其始終如此天倪録天倪者西嶽禪師頓認門人也頓認善詩文天倪為集二卷刊行竹石徐尚書序之守一禪師者嶺南釋子也居於蔚山某寺有道術多異事寺僧極敬畏之寺無徒弟而甚貧同寺僧數百人互供其食每當飯時輒傍所供食之僧而就座有若人相報知者焉未嘗一錯人以此知其他心通焉晝多合眼而眠夜登寺後小麓靜坐不眠夜未深寺僧或時相訪作語而歸一夕謂諸僧曰今夜爾輩勿或來訪我夜將半有少年闍梨四五人同往訪之遙望禪師與一衲對坐而兩人語聲隱隱衆爭趨之其相對一衲即化大虎見闍梨輩大吼逐之聲振山谷衆大驚奔還一師笑止其虎曰汝勿如此汝勿如此虎便還上禪師座前衆又潛往望之對坐者非虎乃僧也人莫知其故一師狀貌豐碩魁傑一見可知其非常人堪輿者金應斗少時親見之為余言如此天倪録湖南佛汙老峯理解朝鮮顯宗大王三年壬寅五月全羅監司李泰淵啓言道內諸寺佛像出汗大司諫閔鼎重號老峰奏曰佛像皆用木為質加漆塗金故每當潦節濕氣陰結點滿冬節不寒收斂不嚴則霧露所蒸鬱而成此深山老僧之所常談而今乃強為心出汗惑亂民聽請泰淵重推所汗佛像破碎尚玄曰佛像出汗高麗時亦有之按李相國奎報撰王輪寺丈六金像靈驗收拾記以古今舉國人所嘗親見者言之國將有變丈六先出汗示之丈六出汗則左右補處泥塑像及石刻華嚴經中凡如來世尊佛菩薩字亦皆霑濕餘字則否焉云云今因諸寺佛像出汗之狀啓道臣書奏曰狀啓引出一篇物理化學之解釋至若新羅皇龍寺設置之鐵鑄丈六佛像淚流至踵老峯當以何理解之又如朝鮮育祥宮奉安之木造位兩神主身鬪背面肅宗大王有兩後宮曰大嬪張氏誕生景宗大王宮號大嬪今京城測候所即其迹也曰淑嬪崔氏誕生英祖大王宮號育祥今在北嶽山下後世合安兩位神主于育祥宮主身相鬪背面不見不得已安分大嬪宮老峯又將以何理解之乎何不以八字打開曰見怪不怪其怪自止大抵佛汗之解不為無理而其所汗佛像破碎之語自是排佛者之口氣也已佛像亦有邪像正像不可不知蓋造像時善知識僧始終證明如法安置然後可成攝心對象之正佛若不然者非徒無靈雜魔來附易成邪佛今舉其例高麗翰林閔漬金剛山榆帖寺記曰本寺奉安五十三尊像即日月氏國乘鐵鍾來之金人後有一僧見其尊像久為香火所薰而黑庶乎洗露金容沸灰湯而洗之忽雷雨暴作五雲籠塞其五十三尊皆飛騰梁上而列焉於中三佛騰空去莫知所之其僧忽發狂疾而終此乃僧之無禮所自取歟厥後主社者淵沖歎佛數之欠缺特鑄三像而安焉舊佛皆斥而不容其夕告于沖師之夢曰莫以他像間於此座後乃知向之所失三佛所在之處其二在九淵洞萬仞石壁上人力可及者下而還之其不可及者至今存焉其一在水晶寺北絶壁上寺僧連梯以下之奉安于其寺後又移在船巖越二十四年丁亥襄州守裴裕奉安于舊列焉或人問於余曰大正五年丙辰春有盜持去榆岾寺佛像十七尊現今殘存三十三尊而未聞如何之報又京城博物館有一軀古代銅鑄塗金之觀音像製造巧妙相好豐盈美術評價十萬圓云欲試看其變色與不烹之於釜中數日埋之於地下一月鑊湯爐炭皆所經過而亦未聞如何之説佛像何靈於沸湯洗之之僧而何恕於持去賣佛之盜乎對曰時來風送藤王閣運去雷攻薦福碑成住壞空各有數在月氏金像乘鍾浮海到泊安昌可謂時來也為盜所竊賣運去也新羅皇龍寺九層塔造成鎮國時來也凡十三次雷震復修至于高麗終壞于蒙古兵運去也且奉安佛像于殿裏榻座㡡帳以莊嚴之香飯花果以供養之則人人皆生尊敬之心陳列於博物之館賣買於古董之鋪則以物品看之人人易生慢忽之心報應亦如是一切惟心造而已雖然佛像嚴於僧而寬於盜者亦有至理在其中何也湖海奇聞云有一禪師將遷化伽藍神主寺之神告曰師負常住常住謂三寶也絹一匹索還了去師曰我自不用絹云何負欠神曰某時用紙一幅今計息應償絹一匹師曰今盜用常住者不少都不聞取償何獨見索神曰彼輪回六道中人自來酬償不煩往索大師已出三界今若不取無從追覔師以衣鉢付寺主而終然則衆生一動靜一物事暗中自有神目如電皆應記本計息可不悚然哉且譬之世法執法官吏如辨護士者犯於贓罪則少無假貸照律更嚴以其知而故犯官不容針也近世南湖永奇和尚少有癩疾受苦惱幾至死輾轉行乞至寶蓋山有僧勸念觀世音菩薩則病可愈遂借一室一心精勤晝夜不輟一日夢白衣女人呼與言視之其姊也以手遍摩病處清爽無比覺而見膿血盡流病若失自是發心剃染出家守戒精嚴人呼律師師嘗於廣州奉恩寺募緣刊刻華嚴經板忽有京城一富家孀婦來謁讚歎稀有多施米布如是數四末乃自薦薦枕師佯應之曰且待佛事告畢婦喜佛事才畢師逃避寶蓋山寺婦自死為鬼常伺其便師適移安他寺之一大佛像于其所住寺見舊佛不相容其夜擲之于外蓋鬼附之也鬼現于前阻擾梵行還其佛像鬼怪如故惟師入定則不敢侵師終疲弱為其所死人謂師之宿債云信眉柏庵流通佛書信眉大師法號慧覺尊者道行甚高世祖大王待以師禮命使校正涵虛堂金剛經説義入之五家解為一書校正禪門永嘉集諸本同異又集證道歌彥琪注宏德注祖庭注為一書印刊行之刊經都監諺譯諸經師皆與焉師又譯解諸師法語以廣流通余今略録其法語以驗當時禪界所揚之宗風云爾皖山正凝禪師示蓮山法語慧覺尊者信眉譯解師見蒙山來禮先自問云爾還信得及麼山云若信不及不到這裏師云十分信得及要持戒持戒易得靈驗若無戒行如空中架樓閣還持戒麼山云持五戒師云此後只看個無字不要思量卜度不得作有無會且莫看經教語録之類只單單提個無字於十二時中四威儀內須是惺惺如貓捕鼠如雞抱卵無令斷續未得透徹時當如老鼠咬棺材相似不可改移時復鞭起疑云一切含靈皆有佛性趙州因甚道無意作麼生既有疑時默默提個無字回光自看只這個無字要識得要捉敗佛祖得人憎處但信我如此説話驀直做將去決定有發明時節斷不誤爾云云蒙山和尚示衆高麗寶鑑國師碑中吳蒙山異禪師作無極説附海舶以寄之師默領其意自號無極云云疑即此蒙山也若有來此日甘寂寥者捨此世緣除去執著顛倒真實為生死大事肯順庵中規矩截斷人事隨緣受用除三更外不許睡眠不許出街不許赴請未有發明不許看讀非公衆請不許閲經如法下三年工夫若不見性通宗山僧替你入地獄古潭和尚法語古潭寂照玄明禪師浙人嘗住龍門寺入楊根小雪山參太古和尚受袈裟禪棒古潭亦見懶翁集中若欲參禪不用多言趙州無字念念相連行住坐臥相對目前奮金剛志一念萬年回光返照察而復觀昏沉散亂盡力加鞭千磨萬鍊轉轉新鮮日久月深密密綿綿不舉自舉亦如流泉心空境寂快樂安然善惡魔來莫懼莫歡心生憎愛失正成顛立志如山安心似海大智如日普照三千迷雲散盡萬里青天中秋寶月湛徹澄源虛空發焰海底生煙驀然嗑著打破重玄祖師公案一串都穿諸佛妙現無不周圓到伊麼時早訪高玄機味完轉無正無偏明師許你再入林巒茅庵土洞苦樂隨緣無為蕩蕩性若白蓮時至出山駕無底船隨流得妙廣度人天俱登覺岸同證金仙蒙山和尚法語略録普濟尊者法語附示覺圓上人按釋鑑稽古略續集明洪武四年辛亥係有覺原禪師師諱慧曇字覺原天台人族姓楊依法果寺大均出家習律於高麗教公云云略休休庵主坐禪文休休庵者懶翁和尚入江南遊方時結一夏之處也夫坐禪者須達乎至善當自惺惺截斷思想不落昏沉謂之坐在欲無欲居塵離塵謂之禪外不放入內不放出謂之坐無著無依常光現前謂之禪外撼不動中寂不搖謂之坐回光返照徹法根源謂之禪不為逆順惱不為聲色轉謂之坐燭幽則明愈日月化物則力勝乾坤謂之禪於有差別境入無差別定謂之坐於無差別法亦有差別智謂之禪合而言之熾然作用正體如如縱橫得妙事事無礙謂之坐禪略言如是詳舉非紙墨能窮那伽大定無靜無動真如妙體不滅不生視之不見聽之不聞空而不空有而非有大包無外細入無內神通智慧光明壽量大機大用無盡無窮有志之士宜善參究急著精彩以大悟為入門㘞地一聲後許多靈妙皆自具足豈同邪魔外道以傳受為師資以有所得為究竟者哉示覺悟禪人法語普濟尊者普濟尊者者即懶翁和尚也念起念滅謂之生死當生死之際須盡力提起話頭話頭純一起滅即盡起滅即盡處謂之寂寂中無話頭謂之無記寂中不味話頭謂之靈即此空寂靈知無壞無雜如是用功不日成之尚玄曰慧覺尊者以諺文譯解諸禪師法語獨多取與懶翁有關係之人又尊者之承命校正涵虛和堂金剛經説義亦係懶翁法孫之撰述余于是知慧覺尊者疑亦涵虛派故其所流通者亦多取其邊之書也支那元末之禪界以宗匠見推者有高峯妙竺源盛千巖長石屋珙平山林諸禪師而其語録之盛行于我海東者惟高峯禪要至如石屋語録盛行支那見李崇仁撰太古和尚語録序而不行於海東者亦一怪事也其他禪書如大慧書狀高麗普照國師時已有流行之證碧巖録亦行于朝鮮至有黃州心源寺之開板印行嘉靖五年則在慧覺尊者及碧松智嚴禪師之時所提唱者也柏庵大師法諱性聰嘗於浦海邊見大船來泊視其所載即大明平林葉居士所校刊華嚴經疏鈔及大明法數會玄記金剛記起信記四大師所録與淨土寶書等一百九十卷也師乃大驚異暨其徒衆頂禮虔奉發信心刊諸經自辛酉至乙亥十五年間分刊五千板子為澄光雙溪兩藏寶所大設千燈佛事以落之曾未百年舉國之印閲法寶者捨舊從新如渴赴河焉師又自注緇門三卷著述私集二卷經序九首淨土讚百詠並行于世信眉柏庵流通佛書朝鮮禪教受益實多仁嶽蓮潭訓詁私記虎岩淨之高弟蓮潭有一雪坡彥之後學仁嶽義沾皆近古之大講師也兩師裒集由來教門碩德晦庵虎庵默庵雪坡等師受授之諸經論講等説又參以己意各自成書名曰私記或曰私集以資訓詁夫經有疏疏有鈔私記者乃又疏鈔之疏鈔注釋之注釋雖至禪門拈頌亦皆有私記縱義解之廣博引東語與西語奈説破之嫌忌變活句為死句今之佛門學人非兩師之私記則殆不知為講學之工南僧主蓮潭北僧主仁嶽惟恃私記之誦不務自得之妙是所謂終日數他寶自無半錢分也亦可謂摘葉尋枝遺其根幹涉流拂派忘其本源也有一例于此近有一僧號稱講師者訪一居士于京師居士亦頗知佛書相與談法居士忽從案上信手抽出楞嚴經一卷來質問一節之疑義僧辭以不知又問他一節僧又不知居士怪而問之曰和尚講師也豈不曾讀此經無乃過謙耶僧實告之故曰熟處是私記生處是經文今教生處熟故暫難解説也云云此與近世之儒林學者講究朱子之集注而反忘孔聖之大經同一弊病也采永氏刊佛祖源流獅嵓采永清虛禪師之八世法孫也刊行海東佛祖源流其後跋曰猗歟盛哉釋教之興始於西方普照萬邦其來也彌且久矣蓋佛之為道語大而無外語小而無內巍巍蕩蕩包含万有所以經纍劫而植勝緣歷千變而不生滅者也以淺見薄識豈敢容喙於其間而竊有所歎惜者何則觀瀾而不知其源察枝而不究其根可乎傳道之統記俗家之世譜良以是也顧我禪宗上自現劫以還拘留佛受莊嚴劫第十尊毗舍浮之心印展至于迦葉迦葉之高足真歸於叢木房中授之釋迦以至四七二三南嶽臨濟中間大手名曹不為若干其受授心法詳載於道原之傳燈念常之通載達磨之別録歷歷可考至於我東則一切祖師傳法淵源上接達磨而尚無顯刻使末學後禪不知某祖之為某師之祖某師之為某祖之孫茲豈非吾家之一大欠事而竊有所歎惜者也耶昔懶翁法嗣無學祖師深用悶然刊出傳鉢之源流次第付諸簇子以傳之而事在國初故肇於佛祖止於指空懶翁其後我月渚大師重刊簇圖始及本朝而起於太古至於玩虛松雲玩虛松雲之外名師大德之遺漏不傳者多矣可勝歎哉采永以月渚之裔未嘗不慨然於是而欲繼述先志自壬午春周遊八路收集諸派可記之文鳩聚鋟梓如干之財積年經紀以至今夏與諸山碩德會于全州府終南之松廣博採公議考諸傳燈定其序次其間祖師之不可泯沒而無嗣可接者則以散聖載録而附於卷端合成一部册子名曰佛祖源流始克刊行斯乃法家之盛舉矣噫曾所未遑於前者幸而得成於今日其亦有時而然歟茲印千有餘秩播送諸宗俾作不朽之傳極知僭越無所逃罪然其牖後傳遠之道亦未必無小補云爾乾隆二十九年甲申孟秋日月渚之五世孫錦波門人獅巖采永謹識尚玄曰佛祖源流版本藏于松廣寺曹溪山松廣寺有大講師曰碧潭和尚法名幸仁為浮休七傳之法孫碧潭謂獅嵒清虛派之佛祖源流獨於清虛派收録偏多而於浮休派則收録稍狹頗有不憤之意遂燒燬其板本云云志安採集五宗綱要朝鮮時代無論儒釋若於學説有所著論必依前人之述不創自己之見今志安禪師之五宗綱要亦其一也按其序曰蓋枝無無本之枝派無無本之源一法分為兩宗兩宗亦為五𣲖其枝派有本源固可知也夫大覺世尊多子塔前分半座是第一處傳心殺人劒也靈山會上舉拈花是第二處傳心活人刀也娑羅雙樹間槨示雙趺是第三處傳心殺活同時也此個消息自迦葉以來人傳一人而至于曹溪曹溪下有二人焉一曰南嶽懷讓宗其活而開雜話鋪也二曰青原行思宗其殺而開真金鋪也此乃一法分殺活兩宗者也原下出一宗曰曹洞嶽下出四宗曰臨濟曰雲門曰溈仰曰法眼此乃兩宗分為五派者也五派之家盡向無中唱出妙曲改聲換調名相頗多散在諸篇故學者未窺其奧而病矣喚惺和尚採集諸篇中要義曰五宗綱要余欲繡梓宜圖不朽而正其偽補其闕於雲門三句引青山叟之解於曹洞五位引荊溪師之注通其義顯其要皆依前賢之述而少無胸臆之見也踞師位執拂柄者外是則無以辨驗宗風矣若有箇漢透徹本源則伊麼葛藤也無著處前之採集今之書梓烏頭養雀恐招其謗爾北海涵月序禪門五宗綱要臨濟宗明耀用赤手單刀殺佛殺祖辨古今於玄要驗龍蛇於主賓操金剛寶劒掃除竹木精靈奮獅子全威震裂狐狸心膽要識臨濟宗麼晴天轟霹靂平地起波濤三句三玄三要四料揀四賓主四照用四大式四喝八棒等皆略之雲門宗明截斷劒鋒有路鐵壁無門掀斷露布葛藤剪却常情見解迅雷不及思量烈焰寧容湊泊要識雲門宗麼拄杖子𨁝跳上天盞子裏諸佛説法三句抽顧一字闕巴陵三句等皆略之曹洞宗明向上權開五位善接三根橫抽寶劒斬諸見稠林妙協弘通截萬機穿鑿威音那畔滿目煙光空劫已前一壺風月要識曹洞宗麼佛祖未生空劫外正偏不落有無機偏正五位功勳五位曹山三墮洞山三種滲漏洞山唱道三綱要等皆略之溈仰宗明體用師資唱和父子一家脅下書字頭角崢嶸室中驗人獅子腰折離四句絶百非一槌粉碎有兩口無一舌九曲珠通要識溈仰宗麼斷碑橫古路鐵牛眠少室三種生略之法眼宗明唯心言中有響句裏藏鋒髑髏常干世界鼻孔磨觸家風風柯月渚顯露真心翠竹黃花宣明妙法要識法眼宗麼風送斷雲歸嶺去月和流水過橋來六相略之德韶國師四料揀約佛妙證理智斷應聞聞放證應聞不聞收證斷不聞聞明證智不聞不聞瞎證理圓悟禪師五家宗要全機大用棒喝交馳劒刃上求人電光中垂手臨濟北斗藏身金風體露三句可辨一鏃遼空雲門君臣道合偏正相資鳥道玄途金針玉線曹洞師資唱和父子一家明暗交馳語默不露溈仰聞聲悟道見色明心句裏藏鋒言中有響法眼五家改聲換調展拓妙門易俗移風千方百面盡向無中唱出曲為初機若是俊流不留朕迹掀翻露布截斷葛藤然則千兵易得一將難求入草尋人聊通一線機前有準擬向即乖句下無私動成窠臼靈鋒寶劍覿面堂堂滯殼迷封不堪種草汾陽十八問汾陽云大意除實問默問難辨須識來意餘者總有時節言説淺深相度秪應不得妄生穿鑿彼此無益雖是善因而招惡果切須子細請益問僧問馬祖如何是佛祖云即心是佛趙州云殿裏底呈解問僧問龍牙天不能蓋地不能載時如何牙云道者合如是察辨問僧問臨濟學人有一問在和尚處時如何濟云速道速道僧擬議濟便打投機問僧問天皇疑情未息時如何皇云守一非真偏僻問僧問芭蕉盡大地是個眼睛乞師指示蕉云貧子遇餿飯心行問僧問興化學人皂白未分乞師方便化隨聲便打探拔問僧問風穴不會底人為什麼不疑穴云靈龜行陸地爭免曳泥蹤置問問僧問雲門瞪目不見邊際時如何門云鑒故問問僧問首山一切衆生皆有佛性為什麼不識山云識不會問僧問玄沙學人乍入叢林乞師指示沙云你聞偃溪水聲麼僧云聞沙云從這裏入擎簷問僧問老宿世智辨聰總不要拈出還我話頭來宿便打借問問僧問風穴大海有珠如何取得穴云罔象到時光燦爛離婁行處浪淘天實問問僧問三聖學人只見和尚是僧如何是佛是法聖云是佛是法汝知之乎假問問僧問徑山這個是殿裏底那個是佛山云這個是殿裡底審問問僧問老宿一切諸法本來是有那個是無答云汝問甚分明何勞更問吾明問問外道問佛不問有言不問無言世尊良久外道云世尊大慈大悲開我迷雲令我得入默問問外道到佛處無言而立佛云甚多外道云世尊大慈大悲令我得入徵問問僧問睦州祖師西來當為何事州云你道為何事僧無語師便打凡有學者偏僻之問或蓋覆將來辨師家眼目或呈知見擎頭帶角一一識之盡皆打得只為當面識破或貶或剝明鏡當臺是何精魅之可現何有老狐能隱本形者也尚玄曰喚惺五宗綱要是引人天眼目及禪家龜鑑等書不費絲毫氣力但加明機用明截斷明向上明體用明唯心等字上述西山五家之風下屆白坡三句之圖此所謂以一桶水注一桶水者歟吾人在世間凡行住坐臥應事接物一語一默一動一靜無非佛法無非禪道乃至演説家之縱雄辨催眠術之用暗示等皆從此中出但吾人馳鶩外物不為返照故日用而不自知耳若人細玩汾陽十八問則可悟得也白坡手鏡配對三句臨濟頌三句三禪在句中老師為手鏡拖照揚宗風禪家龜鑑五宗綱要皆云臨濟三句非特臨濟宗風上自諸佛下至衆生皆分上事若離此説法皆是妄説也故老和尚以此三句為禪文手鏡拖照諸家章疏發揚其諸宗之宗風也老師姓李氏貫全州派出璿源以德興大院君為十一代祖諱亘璇號白坡法嗣禪宗於清虛老和尚為二五世孫大開禪門盡得奧旨故人稱祖師重來此見解同祖老師嘗題額其所居室曰少林窟字曰少林叟此稱號同祖也金阮堂先生舊供本達磨像與老師像極肖因以達磨像為老師像題其像側曰隻履西歸報身東現歟遠望似達磨近看即白坡以有差別入不二門流水今日明月前身此像亦同祖也有此三絶聳觀千古垂裕後昆孰不蒙賜云云此乃白坡法孫雪竇有炯和尚讚美其師之言也禪文手鏡臨濟三句圖説白坡和尚自撰臨濟三句者一代禪教詮旨無不該攝故名曰蘊總三句是故法海惟精禪師曰佛祖受用不出此三句喚惺師翁曰臨濟三句非特臨濟宗風上自諸佛下至衆生皆分上事若離此説法皆是妄説是知三世諸佛歷代祖師乃至天下善知識所留言句必不離此三句也是故凡欲尋究禪門語句者必須先求人天眼目五宗綱要禪門綱要為先究此三句義相昭然無疑然後當於拈頌傳燈四集等語句以此三句一一拖照言言句句了然昭著於心目如物得稱衡錙銖莫逃矣古人不然不知此三句是禪文正稱但將己見隨文斟酌故率多昧却佛祖言頭立腳處而往往有隔靴搔癢之失也噫古人錯答一字尚墮野狐今日老漢既以盲杖摘埴安得句句無謬自惟不入地獄何由能報佛恩自以為法忘軀豈避彌天罪逆橫按寶劒敢為圖形三句總括禪文語句願與同胞一目頓見自己與諸佛祖安身立命處而直入大圓覺海續佛慧命於五濁界中矣三句圖示本頌從深至淺者宗師如次上中下三士普接也今圖逆次者欲順學者從淺至深故此以三句為三禪即一愚意見禪門綱要意恂著述四辨漫語東師列傳草衣禪伯傳云師名意恂字中孚號草衣又曰一枝菴姓張氏羅州人正宗丙午四月初五日生同治四年乙丑七月初二日示寂申櫶撰碑云丙寅八月二日逝世壽八十法臘六十五師十五出家投南平雲興寺剃染于碧峯敏性和尚十九登月出山夜坐望月心胸開通往參知識學通三藏拈香於玩虎法師受禪于金潭禪師遊覽智異金剛漢拿之仙界飽參洌水丁若鏞紫霞申緯海居洪奭周秋史金正喜石梧尹致英之文苑不可匿者名聲也猶可露者巴尾也始搆隱身之巢一枝菴也後結容膝之窟驡菴也復立終身之幕快年閣也受沙彌戒者四十許人受菩薩戒者七十餘人受禪教雜工者數百餘人立浮屠於大芚之南麓李松坡喜豐作其塔銘建碑于塔右申養石觀浩申觀浩即申櫶作其碑銘文集四卷四辨漫語一卷流傳於世格外義理辨昔者白雲端和尚動用舉指必稽往古嘗曰事不稽古謂之不法變古易常乃今人之大病此言真可依而行之也古者但有格外之言未有格外禪之名但有義理之言未有義理禪之名中古師家欲曉學者而始言之曰凡不由言教以心傳心謂之祖師禪此之傳受逈出教格之外亦可名格外禪凡開言而説義因言而證理謂之如來禪是由言教義理而悟入亦可名義理禪此格外禪義理禪之所以立名之始也故約人名如來禪祖師禪約法名義理禪格外禪此乃古叢林傳來之通談其於義理穩涉無欠近得六隱老六隱謂白坡也之所判言依一愚而變易一愚之所依言從虎蓮虎謂虎巖蓮謂蓮潭而變易虎蓮之所從一愚以三處傳心合為祖師禪而配臨濟第一句今以今以指手鏡也分座為但殺無活以為如來禪配第二句以拈花示衆謂兼殺活以為祖師禪配第一句此非言則依於一愚而義則反於一愚耶虎蓮二老亦以三處傳心為祖師禪而配第一句不以分座為如來禪以開説義理為如來禪約人法而雙名二禪一如古叢林而無殊今以今以者指白坡也如來禪為格外禪却駁古人配之義理曰壓良為賤然則義理二字但來縛於賤貶之新熏而更不升用餘處耶殊不知義理二字總貫於三句二禪而亦為通天下之公文隨其用處義理無窮如潔靜精微易學之義理也圓融無礙華嚴之義理也元亨利貞乾之義理也常樂我淨佛之義理也不由言教直佩祖印格外禪之義理也佛祖之權實玄要之影形有以總入於説聽之中而否顯無隱者此又義理禪之義理也此配如來禪之義理也非今人今人指白坡也所謂但新無本而賤貶之義理也格者非言教義理之格式耶夫世尊迦葉三處授受皆不在於言語教格之內則謂之格外固其當然若如來禪則不然世尊先自立名又從而釋名曰入佛地位自證聖智三種樂為諸衆生作不思議事是名如來禪古德頌靈山會上如來禪問答何曾別有玄永嘉曰頓覺了如來禪六度萬行體中圓又古德以報身主法身賓之所共説聽為如來禪如上佛祖之指名演義斷不可言格外也既安名字從演義理亦名義理禪有何不可夫虎蓮以上諸老宿依一愚風法師而為準繩一愚風法師依古洪二師古塔主洪覺範浮山遠仰山寂汾陽風穴諸古德而為準繩既有反於一愚則已上諸師亦不可謂不反矣反於古而行於今曾未之聞也此正白雲所謂變古易常今人之大病者也下略祖師禪如來禪義理禪辨白坡草衣優曇雪竇震河諸師皆於殺活玄要上俱有辨論而非文字所可知者故皆略之言以二禪配五宗則臨濟宗具足機用故為祖師禪正脈雲門但明截斷而未能現説機用故未及臨濟宗然則離機用外別有截斷隨波離截斷隨波外別有機用乎是誠執言而迷義者也且機用現説則有之不現説則不有乎然則世尊未曾現説機用是世尊無機用也卅三祖師未曾現説機用是祖師無機用也既皆無之所傳宗旨以何為法印乎若言雲門未曾無乎機用以其不現説故不及於臨濟云則是佛與祖師皆不及於臨濟而不足為祖宗也又言溈仰宗但明體用而未明向上真金鋪尚不及於曹洞宗之洞明向上而窮盡真金鋪其向上之明不明真金鋪之窮不窮何從而知其層隔之如此詳細耶於此後末世時跛腳眇目之阿師輩如來禪祖師禪機用之全不全歷歷洞明而詳悉之彼密受懸記而來飽參百丈古佛洞明大事為一千五百衆所宗事之善知識者都不知有具機用之祖師禪僅知得如來禪真金鋪之半面乎况且仰山是第二祖阿難尊者後身西天羅漢時時特來問法呼為小釋迦然猶不知如來禪之向上嗚呼苦哉小言之害道也夫阿難三入祖門而其為仰山則號謂小釋迦溈山赫赫為小釋迦之師傅以為不知祖師禪之機用僅以如來禪真金鋪之半面竊吹於五宗之中打而推之於曹洞宗之腳下豈不大可冤枉哉始也洞山參溈山問無情説法之義溈山竪起拂子洞山曰學人不會乞師指示溈山曰父母所生口終不為子説洞山猶不會因蒙溈山教往參雲嵓而有契先是雲嵓亦參溈山聞悟絶滲漏之義後為洞山之師洞山受之雲嵓以立曹洞宗旨是則曹洞宗之淵源濫觴於溈山也後人都不知此而但看人天眼目一書妄判二宗之優劣如此倒置無稽之甚也今引宗門語録所載數則因緣一為溈仰宗雪屈馬祖一喝百丈耳聾黃蘗吐舌百丈得大機黃蘗得大用仰山始言之古今天下有一人不然其言者乎若自未得機用安知人之得與不得乎先是溈山聞香嚴擊竹頌曰此子徹也仰山往勘所悟香嚴呈去年貧未是貧今年貧始是貧之頌仰山曰如來禪許間師弟會祖師禪未夢見在香嚴又呈頌曰我有一機瞬目視伊若人不會別喚沙彌於是仰山報溈山云且喜間師弟會祖師禪溈仰宗中果無祖師禪此二尊宿何以如此弄現耶又法眼云若見諸相非相則不見如來者是祖師禪是則法眼亦曾説言祖師禪今言法眼但明唯心而攝用歸體故亦但知如來禪而未及於溈仰宗如此諸説從何人學得來誰之所傳抑復自證之心印上所流出耶蓋是當何之言也大抵以二禪配五宗有何勝善好道理如此委曲穿鑿耶縱使一知半解如有所得但當照古而反照之希令密契而已反此不為每欲別立己見特逞神奇於混圓無礙之中鑿開層節穿生孔竅或於一行之內層節重重數句之間孔竅礨礨將殺活機用字無節而不貼以照用同不同無竅而不納終以方圓不合曲直相背散落而終不粘節離披而竟還脫竅於是法門之全體都成瘡瘢禪道之活用總屬死門譬如一領之天衣無縫變作百結之鶻臭破衫於是好個靈慧之學者一被靠倒於葛藤之窠竟難回轉於荊棘之場左縈右纏陳爛沒膝前堆後積榼𣜂齊身蒼耳蒺藜罥之皆能刺足鹿床烏喙吞之便可腐腸靈竅漸塞慧識難通豈不大可傷惜也哉大凡佛祖之所由言句莫不由此全機大用而為教為禪教乘之十二部公案之千七百未有一字離機用而獨立者若只向許多章句之內隨隱現而執定有無是滯於文而迷失其義者也先庭掃灑逐條證正掃灑先庭録又名禪門證正録猊雲散人序昔曹溪牧牛子倡修禪社真覺國老緝拈頌龜谷祖尚玄曰著拈頌説話者乃真覺之弟子覺雲也非龜谷覺雲也凡云龜谷者皆當作覺雲者也著説話以來東方禪學赫如旭日天下宗之繼以清虛老禪家龜鑑喚醒老五宗綱要等書如燈剔炷益以光大逮夫白坡老把臨濟三句箋詁拈頌圖刊手鏡其説一時盛行偶因中孚漫語之出疑膜交蔽學者病之曹溪山優曇和尚法名洪基慨然之一為掃灑先庭和尚之禪系承於枕溟老枕溟即白坡之禪門高弟也一為矯救末學乃著證正録引古證今據真辨惑禪門源流乃得澄清禪門名實乃得真正法喻并彰本末雙符佛祖心印格外妙諦於斯載伸光線云云又按雪竇和尚禪源溯流有優曇子述掃灑先庭録謂禪文手鏡污穢先師之門庭自為掃灑之意也云云優曇和尚自序云若論禪門之旨以心傳心者知之不得心印者不能知之譬如皇城之事親見者知之不得目擊者不能知之既不能知而我能知見者妄也嗚呼考我東方祖語契彼中華祖文遠比肩而無違永爭衡而有傳也今之學者或觀禪録而自悟或講心聲而他聞可以對會祖文傳燈録人天眼目拈頌五宗綱要不參差古釋也禪門綱要拈頌説話一切禪門總不出臨濟三句而三句辨釋備盡於禪門綱要故龜谷先祖每推之曰一愚夫已説了何用更商量其餘未盡之釋備於説話然則欲學禪門先識臨濟三句欲識三句孰讀禪門綱要欲識其餘釋應熟讀説話也於綱要説話之外別有所釋違於古釋者何固不信之執也愚今但參差於古釋者引證而辨正之夫三處傳心禪門之源源清則流清義理禪格外禪如來禪祖師禪禪門之名名正則實正殺人刀活人劒禪門之喻説機關喻極則法極下略初三處傳心説以下亦略録之如來三處傳心第一分半座説話云殺人刀又云沒分外第二舉拈花説話云活人劒又云正法眼藏付囑有在第三示雙趺説話云泥連示趺熊耳留履此是第三傳心又云茶毗後品流通去在故傳燈録本師釋尊章中分半座舉拈花示雙趺次第録之此西域傳心之源也達磨三處傳心一覔心了不可得説話云悟得諸佛法印會得祖師禪所謂二祖之為二祖者也二三拜得髓説話云親承入室克紹家業故傳衣付法也三手携隻履説話云此六代傳也故傳燈録達磨章中同如來三處傳心而次第釋云第一覔心不得第二三拜得髓第三熊耳留履云此為震旦傳心之源也此上佛祖三傳皆第一句祖師禪格外禪也然則迦葉第三傳作榜樣慧可第三傳作榜樣也或或字指白坡也以如來分半座為第一句祖師禪殺人刀為第二句如來禪又以諸緣斷否問答為達磨之初傳不知傳燈拈頌不載之義如是誤辨於是禪源一濁如來禪祖師禪殺人刀活人劒等千派萬流一時渾濁愚今所清者但引祖文古釋以辨之功在祖文何在於我哉以下皆略之禪源溯流翻案護短雪竇禪師名有炯白坡四世法孫著禪源溯流翻駁四辨漫語及掃灑先庭録而歸是於禪文手鏡其論禪源溯流之義曰禪者三禪源者向上一竅然向上一竅通最初末後二句最初句為向上一竅可知末後句為向上一竅者古德云末後句至於圓極則與最初句何以異哉又云要識末後句看取未生時溯有溯遊溯洄二義流有順流逆流二義謂最初直視此事最初句次説三句則此自最初句溯遊而順流也若説三句末後結示此事末後句則此逆流而溯洄至末後句向上也四辨漫語説説者如屏山李純甫鳴道集説先釋正義以下但録雪竇正義其餘皆略之禪有詮旨之異古德云禪是佛心教是佛語又云若人得之於心則三藏十二分教乃至市井間談鶯吟燕語皆是教外別傳禪旨失之於口則拈花微笑却為教迹此約禪旨也又古德云諸佛説弓諸祖説弦又云教也者諸佛菩薩所留經論禪也者諸善知識所述句偈此約禪詮也然則諸家所述是禪詮也若其禪旨離名絶相心行尚無處言語豈有途到這裏三世諸佛歷代祖師嘴都盧地今依禪詮説有三種一祖師禪二如來禪三義理禪上標下釋標約法之深淺釋約悟之先後如來禪者普曜經菩薩於二月八日見明星悟道號曰天人師以所悟之道是如來悟底故名如來禪悟後施設戈甲為人天説法故云人天師也臨濟云第二句薦得與人天為師一愚釋云如來寂滅場中初成正覺悟道現千丈盧舍那身四十一位法身大士人及宿世根熟天龍八部天一時圍繞如雲籠月説華嚴時此是施設戈甲是第二句故云人天為師祖師禪者達磨云真歸祖師在雪山叢木房中待釋迦傳持祖印壬午歲心得同時祖宗旨是祖師傳底故名祖師禪臨濟云第一句薦得與祖佛為師一愚釋云此句下薦得徑踏毗盧頂上直佩祖師心印故云與祖佛為師然則一禪悟有先後自分深淺也故梵日國師云世尊見明星悟道自知所悟之法猶未臻極遊行數十日復尋訪祖師始傳得玄極之旨世尊如上悟之受之以是而傳之三處第一分座殺人刀亦名真金鋪是傳如來悟底也故説話釋慧可第一斷緣云得如來禪第二拈花活人劒亦名雜貨鋪是傳祖師傳底也故説話釋第二慧可覔心不得云得祖師禪然則如來禪祖師禪即是殺活而但如來禪祖師禪者就能悟能傳之人以立名也殺人刀活人劒真金鋪雜貨鋪者約所悟所傳之法取譬以立名也於中刀劒二字言其殺活之優劣真雜二字言其殺活之單兼也世尊第三示趺説話雖無殺活齊示之言雙趺意不無是殺活齊示也慧可第三三拜得髓説話雖無二禪齊得之言三拜意不無是二禪齊得也自迦葉傳至西天四七唐土二三人傳一人刀劒並用殺活自在此所謂持王子寶刀用本分手假殺人活人得大自在者也故無有二禪優劣之分矣自六祖以還分傳殺活如南嶽得活人劒青原得殺人刀又分為五派斯道大行天下其派有源其枝有本義理禪者一日祖曰吾有一物無名無字汝等喚作什麼荷澤云諸佛之本源神會之佛性祖曰向汝道無名無字便喚作本源佛性他日雖把茆蓋頭作得個知解宗徒知解是義理故名為義理禪也臨濟云第三句薦得自救不了古德云死句下薦得自救不了禪家龜鑒釋云死句亦名參意有語路意路意謂有語路則語忌十成故謂之死句有義路則義理宛然故謂之義理禪也又大慧答張侍郎書云才見涉理路入泥入水為人底便欲掃除云如忠國師説義理禪教壞人家男女此以涉理路為人底為義理禪也其釋第三句風云吾與子一説一聽一問一答早落第三句一愚云落草為人隨病與藥此第三句所以為義理禪上殺活二禪亦名為格外禪以殺活二禪為義理標格之外也故古云約法名義理禪格外禪約人名如來禪祖師禪意謂約法名義理禪格外禪就此格外禪又約人名如來禪祖師禪也非謂二種禪約人法有二也如説話云圭山云禪者具云禪那此云思惟修亦云靜慮斯皆定慧之通稱也上義理禪當此看則教外別傳一味禪也當此拈頌而看則是教格之外別傳禪也且道如來禪祖師禪同別如何如來禪者山山水水法法全真也祖師禪者和根拔去了沒巴鼻也上格外禪中又如來祖師二禪不同然義理格外之禪雖殊所傳之法體一也以密傳心受沒理路語路則為格外禪顯存知解有語路理路則為義理禪也如楞嚴云知見立知是無明本知見無見斯則涅槃云云也故圭山云但顯密有殊非謂所傳之法體有異上釋正義竟下破邪解先説四辨漫語後辨掃灑先庭録節節反駁繁不具載禪文再正録徐震河禪師述昔者白坡大師作禪文手鏡草衣和尚製四辨謾語優曇和尚著掃灑先庭録即禪門證正録皆駁禪文雪竇和尚撰禪源溯流袒護坡師今者震河禪師又述禪文再正録為最後發箭其文如左古來談禪約人約法各有二種義理格外約法名者如來祖師約人名者立此兩重諸説之同異白坡老總非之開合兩重特申己見云禪有三種一祖師禪二如來禪合名格外禪三義理禪將臨濟三句為準繩而如次配於三禪臨濟云若第一句薦得堪與祖佛為師第二句薦得堪與人天為師第三句薦得自救不了其三句之配既對三根故理應如此古之兩重立名約人則合之約法則開之是知格外乃如來祖師之法未委義理是何人之法為凡夫法耶為賢聖法耶若無約人而空立一法為義理禪反不如各開人法為四種禪也胡乃一法二人有人法不齊之失耶若以佛祖落草之談為義理禪則義理不是別法自是如來之法也祖師之法也明矣臨濟為對三根立三句名所示法門隨句應異云何大凡下語一句中須具三玄一玄中須具三要有玄有要有權有實有照有用清風法師總釋中云句言句之句玄要在句第三句權實在玄第二句照用在要第一句各有攸當不應莽鹵別釋第一第二句至第三句云吾與子即今一説一聽一問一答指上初二句所釋早落第三句了也又云如將三要印向爛泥裏搭却痕縫全彰轉名三句玄要在其中據此則除却格外中所具之法如來祖師二禪別無義理之法但為言句有異也何以如來祖師二禪獨配於格外可謂日用而不知者也請陳管見夫義理格外中皆具二禪義理格外是能具如來祖師是所具之禪能具虛位而但從能示師能悟資邊立名所具即就所示師所悟資法體上立名不可將所具即目能具謂宗師對機之時不陳言迹或下沒道理之一句或良久棒喝之類舉之伶俐漢直下承當呈其悟地不用多言或微笑舉手而應之此機傳受之法非情識言辭之所可議度直超義理之格故名格外禪若以老婆心説玄談要曲盡其意學者隨語生解或學而知思而得習而成則此機傳得之法宛有名相義理詮旨之迹可借功熏修證之路故名義理禪也然此傳受之法不可一同宗師欲試眼目或迷蹤蓋覆落草説去根利則不滯其迹即入格外而悟去設以棒喝示之根鈍則墮落義理而得入故古德云隨言生解則拈花微笑却為教迹得之於心則乃至世間言語皆為教外別傳之旨故知所悟之法體二禪本無格外義理之異所以有異從傳受邊立名也即與死句活句之名名異義同故古德云死句下薦得自救不了活句下薦得與祖佛為師也禪家龜鑑云死句者亦名參意有語路理路故活句者但參句也説話又云無語中有語名為死句有語中無語名為活句也故習禪者看話時但參格外莫入義理也格外義理之辨如上所釋未委如來祖師二禪據何而立名白坡老云若對上機一一言句了沒巴鼻永脫今本頭角如佛也安祖也安之類此但祖門中所用之言句故名祖師禪或對中機所示言句即權明實了不可辨如佛也打祖也打法法全真之類此亦祖門中事以法法全真之言宛同如來所説萬法一心之言故貶之名如來禪此但辨二禪法體之不同未的言約人立名之本意也雪竇老云如來所悟之法故二月八日見星悟道故名如來禪如來悟道已尋訪真歸祖師所傳得底故名祖師禪此老則卞明二禪所從之淵源有超師之見而以如來獨當釋迦祖師但為真歸此法非三世佛祖通用之禪也愚則未知二禪之名始自何時以現文詳之亦自臨濟三句中出來何也其第一句云與佛祖為師第二句云與人天為師人天師豈不是如來佛之師豈非祖師乎蓋悟得第二句法則但見性成佛而已悟得第一句法方為諸佛之師故云祖也真歸之稱祖亦以此也此非以法名人約人立名之有證處乎然則前老所説人勝於法人則如來祖師法則禪也愚則法勝於人也禪能作佛作祖故也依主依士二釋之有異若配三根雖格外中悟有頭角者是如來禪中根也解礙亦亡則是祖師禪上根也義理禪中雖有如來祖師之法體皆情識上悟修故總為下根也此下論述教格及殺活等説數千言向下文長付之來日尚玄曰朝鮮叔世儒家有湖洛理氣之爭禪門有臨濟三句之辨引古證今呶呶數千言何其壯也雖然在乎儒則其範圍不出於章句注釋之訓詁在乎禪則其疵病難免於文字義理之知解也朝鮮一代儒與禪僧但襲前人之已述切忌自己之創作究其所以則不外乎朱學之弊害而禪門亦受其影響自是以後儒家更不出薛聰崔沖其人佛家更不出大覺普照其人也朝鮮叢林相傳以為白坡和尚文字見性文字見性誠千古初聞之一種奇語也夫教外別傳初不立文字亦不依言語况可以文字能見性乎况可以言語能見性乎禪文手鏡出來以後草衣爭辨之優曇證正之雪竇左袒之震河再正之自是以還朝鮮禪界評優判劣聚訟紛如動輒則曰臨濟雲門是祖師禪曹洞溈仰法眼是如來禪南陽忠是義理禪荷澤會是知解宗云云白坡禪師所證境界吾未敢知而後來行於世者文字禪而已説其法者口頭禪而已朝鮮禪門心性説之辨爭固已肇始於默庵與蓮潭之時按蓮潭大師林下録心性論序此一卷默老與不佞共論心性於乙未秋間者也諸佛衆生之心各各圓滿未曾一個者默之論也各各圓滿者元是一箇者愚之論也默詩云我今任獨歸勿行行處去即自得之論也愚詩云先聖皆同説後生孰敢違即齊文定旨也凡所相爭者或有兩是之事今此兩論法門大關節一是則一非但以吾兩人之各自為是不可定也噫道喪人亡埃風渺茫焉得有通方之士説理如理説事如事者作於今世楷定去取耶實有望於朝暮遇之然是非雖不可定居今之世談此事者亦罕其人學者倘或仍此究其心性之所歸則此論豈不為升高行遠之一助也耶云云蓮默二師乃就此點默主諸佛衆生之心各各圓滿者未曾一個之説蓮主諸佛衆生之心各各圓滿者元是一個之説往復辨論積成卷軸今按松廣寺抄示默庵心性論始末按年譜抄來丙戌六月二十一日立柏庵先師碑八月移住隱寂庵心性論始役也乙未八月移住甘露庵心性論三卷成了也丙申秋移住碑殿庵頭流山慧庵懶庵兩丈丈猶云長老也心性論復書來也乙巳住普照庵初夏鏡嵒自七佛平惠庵之亂惠庵玧臧本在順天大興寺後移求禮華嚴寺開講壇千五百衆隨之四十里相屬為全羅道觀察使趙某所搆誣啓竄濟州惠庵門徒等上辨伸理反竄趙某于濟州師自濟州還相逢海上惠庵責之又仁嶽義沾上其師惠庵書甲辰之事不忍言也云云者即指此亂也又叢林相傳以為惠庵乃喚醒和尚轉世以償其宿冤云云負糧而來住東方丈而心性論傾心討論過半月而去同年孟冬初二日華日敬賢兩丈引燒心性論三卷於上禪庵泉隱寺也十年收集之功思之則可惜鏡嵒無乃為華日敬賢之使也云云華日敬賢盡焚心性論爭訟之端遂熄今白坡草衣等之諸師辦論禪文絮屑張皇返涉義解易生迷惑恨無華日和尚其人亦取此甲乙之書並付彼丙丁之火以絶誵訛豈不清淨也雖然蓮潭默庵白坡草衣優曇雪竇震河諸師皆有深造乎教理禪旨其所爭之點在乎毫釐之間不欲相下真所謂其爭也君子者歟阮堂歡堂為禪悅文自古文章曠達之士每多好佛隨喜禪悅即如支那晉之謝靈運習鑿齒陶淵明唐之蕭瑀李白顏真卿白樂天柳宗元宋之蘇軾坡黃廷堅張商英楊大年遼之耶律楚材元之趙孟俯明之劉基是也在海東則高句麗之王高德新羅之崔致遠高麗一代名士之好佛者不可勝數而如金剛居士李䫨清平居士李資玄等其尤著者也逮于朝鮮古時有乖崖居士金守溫近世有金正喜薑瑋劉鴻基李淙遠等皆好談禪矣金正喜官侍郎慕清朝人阮藝臺自號阮堂又號秋史晚稱老果此外尚有數十別號其書法遒而怪自成一家昔楓嶽僧愚隱和尚常言書之壞者秋史帖僧之壞者善知識云云蓋謂其異於衆也阮堂之詩曰覃研齋遺稿今録其芋社然燈云草衣老衲墨參禪燈影心心墨影圓不剪燈花留一轉天然擎出火中蓮又留贈草衣禪云眼前白喫趙州茶手裏空拈梵志華喝後耳門飲箇聻春風何處不山家阮堂居士與白坡璇和尚互訂神交以道義相切磋見其證白坡書論其妄證凡十五件饒有當仁不讓之槩焉文長不録薑瑋號慈屺又號秋琴著有古歡堂集今録其摩訶衍寺名雲公贐維摩經一部詩二首其一云天上人間富貴仙修持幾劫淨名禪如今法喜為妻日坐擁螺鬟萬二千楓嶽有一萬二千峰故云其二云阿彌陀佛非聾漢念念彌陀奈爾何空山雨雪無人境驀地相逢是自家劉大癡居士京城人名鴻基號磅礡齋又號如如好談禪金古愚玉均徐韋山光範朴春臯泳孝李隨如淙遠李蕙田鼎煥朴白拈齊絅吳亦梅慶錫吳石年慶潤吳筠廷慶林昆仲三人金石芝永漢金友蓮永汶兄弟韓東湦世鎮及李杞堂熙穆等諸居士從而問道一時禪風盛行京城古愚韋山等諸貴紳本紈袴公子肉食之人及問禪道乃發智慮東遊日本盱衡時勢決意革新時有二僧屬革新派一是梵魚寺之李東仁入于日本寓居寺院逢古愚等因以屬焉後還京城主閔藝楣泳翊家具俗衣冠出入大內忽為閔杓庭台鎬所招去不知下落一為百潭寺之卓夢聖法名覺地俗名鼎植本講師也逢金古愚於華溪寺如舊相識結心交從遊日本死於東京今佛影寺之李雪耘及百潭寺之張大愚皆其法資也甲申政變其結果也蓋以其所學之佛理直欲應用於世法究其源委實劉居士有以啓之故當時有白衣大臣之物望焉及事變作居士逃避不知所終居士初究煉丹之學後歸參玄之門並無師授能自判云李隨如居士隨從如如學得禪道故自號云居士深信佛道篤好禪旨其一平生惟與一公案相戰有好潔癖凡一開閉門必洗淨其手及病且死其禪門友雲谷居士崔翼軫為之備辦後事忽又延三年之壽至辛亥年而歿臨終時作鬪魔之狀云方德權居士號鶴山孟山人於順川郡山寺靜坐參究凡十二年人問何為者輒曰學醫也而未嘗隻字道及于佛蓋密行而混俗者也在村孰課詩書聞有人誦禹徹清居士所述禪偈即和之曰至道妙無形強名未易名有誰知所啞無物假其鳴影散六根淨心虛一鏡明大千渾是夢默默不言情使其人傳示禹禹畫一圓相送之方居士又作偈來相見居士窺知其弄虛頭禪不交一語但授偈還去其偈曰師悟圓頓妙儂沒方便良空空還色色圓圓又方方指天無人會孤月上蒼蒼見月因忘指忘指月亦忘云云金甘山居士亦曾出家遊方飽參有禪眼者也得見方居士偈語心甚異之遂往參謁與之一宿苦乞一言鶴山居士輒書偈授之曰一理元來萬法宗三教自是異而同若知一切終歸一一可貫之上下中時癸卯歲鶴山年六十三其容貌猶如五十許之一野老云甘山為余誦方居士所述諸偈頌如左念頭忘却還忘身便是一生癡呆人到得破顏微笑處十方現色總吾親捲盡浮雲已坼東飄然一陳自清風斯間美景任誰領知己二三携手同答人問道作有誰有我更無誰於我於誰總是其滿船載酒超然去笑待東山月出時衣食元非性到于極地生笑來初有意哭盡已忘情本是無形迹何能有響聲休論衣食性色與味同行欲知驅魔策直抵無為關無物人何窺不攻也自還嘗見靜而得未聞勇者百千方便門返好無方便一鏡萬形錯不如無鏡面念頭忘却有關無關似二非二不還自還靜有念處動或失猛四大俱暖何患十冷吾心方便佛祖方便清淨寂滅那用鏡面人心惟危道心惟微雖有聰明易眩易迷允執精一乃歸本源精一維何先斷本源色聲味香所感者先然我夫子教被三千習氣已盡真情乃見真情既見實相自現臨水觀月入海求珠蒸沙成飯枉費工夫萬仞高臺一步難登步步相仍萬萬可升維昔祖師原是上根或恐煙火有礙六門所以出家割愛斷恩離羣絶世惟是道存往諸緣業太虛雲過寂寂滅滅何難正果是法非法竟是一法一法万法不如無法風風寒寒歷歷艱艱靜靜安安淨淨乾乾悠悠蒼天明明我思幽兮明兮此何人斯百章夢言佛教精神月窗居士近世人也姓金氏名大鉉世居漢城為貢吏少孤而家稍饒事母孝幼聰慧十歲已通詩書學究無敢為其師者故負笈尋賢師遍閲儒道二家書年踰不惑始得讀楞嚴經大好之遂盡棄其所學而專意研究佛乘其所著書頗多臨終盡焚之惟遺字學正典一部及述夢瑣言百章其精神骨髓皆從佛學中出來雖然全篇之中不著一個佛字以避時謗而鞱晦之亦可見其苦心焉蓋朝鮮人好説夢觀乎諸禪師碑狀無有不夢而生者然而研究夢事至于月窗居士而始大成矣今就百章摘録若干紹介居士之夢哲學于世人云爾述夢瑣言自敘曰月窗居士海東人也素性愚拙不喜交遊每於夜靜開窗對月獨坐悠然因自號其室曰月窗一日頽臥窗下仍成一夢睡覺而向人言夢聽者茫然乃記其説志厥所見名曰述夢瑣言謂其言瑣屑不足為醒覺者道云爾知常章世人以覺為常以夢為幻夢者不覺之名覺者不迷之稱夢若是幻在夢者可謂不常覺若是常出夢者始可謂常世謂大丈夫者果能知其何者是常何者是不常乎常者不變不幻苟知身中有不變不幻之物則可謂知常妄幻章以覺視夢所行皆是妄作所見皆是幻境故曰幻妄夫在夢者知不能見於幻思不能及於覺而反以出夢之説指為虛誕悲夫壽夭章一元者天地之夢一世者人物之夢一元大夢也一世小夢也萬物之生有萬歲千歲者有百年十年者有暫生暫死者壽是長夢夭是短夢未覺之前壽雖萬千即一萬千年長夢中物夫一夜之夢或有如多年之久者或有如瞬息之暫者長短雖異均是一幻覺來付諸一笑在夢者尚且眷眷不捨嗚呼迷矣自成章夢中亦有天地萬物其天地萬物來入吾夢歟抑吾往見天地萬物歟夢與甲乙飲酒而甲乙不夢是未嘗來未嘗往皆我自心所成互夢章世人或以生為真而以死為幻或以生為寄而以死為歸以死為幻則死是生者之夢以生為寄則生是死者之夢夫生不覺則其生非真死不覺則其死非歸知生則知死知死則知歸知歸者出於生死之夢求我章以覺為我夢者是誰以夢為我覺者是誰以生為我死者是誰以死為我生者是誰覺不知夢則覺是夢之幻夢不知覺則夢是覺之幻生不知死則生是死之變死不知生則死是生之變夢覺互幻死生相變而求我於其間未得真實處世無一人疑到於此者吁一世方在夢裡也耶非夢章或曰生者自無而忽有死者自有而忽無或曰死者或有或無亦有亦無或曰久且泯滅是皆情識妄度不知無生無死之理者也夫忽夢忽覺而知其有能夢能覺者有夢無夢而知其有或夢或不夢者夢或冥然而知其有冥然者則死生大夢也寤寐小夢也知夫小夢依於大夢而有無焉則知大夢依於非夢而隱現矣業命章自然成就不由人力者儒謂之命釋謂之業謂命者任天也謂業者勸人也知業力所成則益勸於善明戒於惡自心自修命由自造積善有慶積惡有殃善惡業也慶殃命也在人為業在天為命自修而不怨者知業由自作順受而不憂者知命有已定余嘗點檢夢事一榮一辱俱不自由似乎有命而一物一事皆我心造全夢世界即我一念渙然有省始知古人不憂之義悟空章梵書云始成正覺山河大地一時銷隕頗疑其説莫知其理嘗見夢中亦有山河人物耽著繫戀宛然為實忽然醒覺即時銷隕耽著繫戀之想已空於心山河人物之像亦空於眼出夢之覺且然而况出世正覺也哉圈局章夢中人千思萬慮所計不出夢外池中魚千周萬回所見只在池內為其圈套中所局也俗學之悟解大同而無別超等之見者為學問所局不局者鮮矣顛倒章未夢之前不見夢中身已覺之後不見夢中身未生之前無有此身已死之後無有此身身是畢竟無者也未夢之前已有此心已覺之後亦有此心而能夢能覺心是畢竟有者也是知未生之前已有此心已死之後亦有此心而能生能死焉世人勞此心以養此身而不知因此身以養此心是可謂顛倒者也髮影章蜮射影而中毒鳥銜髮而夢飛是知虛者亦我無情者亦我苟知無情而虛者亦我則實者即虛虛者即實寤者即夢夢者即寤死生非二物我即一知性非情故知物俱性無我章人皆曰我我是甚麼以軀殼為我則夢中之我非軀殼也以精神為我則情識變化時以何為我以見聞覺知為我則聞聲時眼是誰見色時耳是誰雖然歷歷孤明勿形段者存乎其中叩之即應不知者歷劫不遇知之者常現在前難莫難於此道易莫易於此道世人胡為乎不以為易而自以為難嗟哉畫女章畫中美女可愛而不足為情塑像威儀可敬而不足為㤼夢裡繁華可想而不足為慕知其非真故真情不動真情不動故回頭即忘其於世事非不隨應而視如畫偶夢幻其物何能入吾心印吾心哉始焉受之終焉染之生為夢兆死作業識歷劫轉展莫能解脫皆吾自取非物之咎差別章一世羣生之數不知其幾億萬而各有一生之夢又不知幾百千矣幾億萬物之幾百千夢其數不可量不可説而亦各不同所以不同者以其心識之差別也心差別則業差別業差別則報差別報差別則世界差別是知世界之多亦不可量不可説也以不可量不可説之差別泯然歸一者其惟純覺乎一心章海中萬物其數不億是一水所化域中萬物其數不億是一氣所化夢中萬物其數不億是一心所化苟知夢中萬物是一心則世界亦一心知世界是一心則三千大千亦一心知三千大千是一心則三千大千亦一夢是知我與萬物俱是夢中物山河大地亦是空中華物我與世界既是一心所化則一心又為何物所化不應心外又有一心能化是心若有能化所化者便非一心既云一心則盡虛空界惟是一心而已我幻章世上人以身為我而不知其夢中人亦有我夢中人自以為我而不知其床上人亦自我謂皆我則虛實不相倫分彼此則夢覺非二人是知夢覺皆幻而所謂我者亦幻也苟知我者亦幻可以出夢嗚乎微哉各夢章十人同寢各成一夢有天地萬物焉有榮辱壽夭焉夫一室之中半夜之間開闢十世界久暫之不齊情境之差別如是而甲夢中人不知有乙夢世界乙夢中人不知有甲夢世界蓋其幻見不出境外也世人之不信有三千大千無足怪矣出夢章或問曰夢中能知為夢所幻可以破幻出夢歟曰一切諸夢皆為幻迷為其所迷故不知其幻若知夢境是幻幻境本空則心無貪著而想念銷落想念鎖落則真體自在而靈知獨存靈知獨存則幻境自壞何以故應物而於物無心行事而於心無事湛若止水照若明鏡惺惺寂寂孤明現前夢自醒矣鏡照章或曰親疏平等視父親與路人同愛憎平等視恩人與仇讎均是非平等堯桀無分貴賤平等上下無別是禽獸之道也曰水濁則無影非無影影不現也神昏則無夢非無夢夢不明也心愚則無情非無情情不分也禽獸之愚頑如濁水之影如昏迷之夢而情識不能分別是大不平等也夫物之差別即物之理物既差別則應待不得不隨以差別如鏡照物像隨其差別而現影不忒是謂平等照苟知物像差別而鏡照平等天下事雖有億萬差別而我心照應自有平等夢覺章未覺人雖識通古今智周萬物秪是夢中人何以故夢中人惟知有夢中世界不知有夢外世界若夫覺夢者能思夢中事能知夢外事夢前夢後無不明知不然何足為覺見性章心中有念謂之掉舉掉舉者夢於散亂心中無記謂之頑空頑空者夢於昏沈有亦為夢無亦為夢夢者變幻而不自在也非無記故謂之正念正念者一念也一念而至於無念寂然不動無知而知無住而住念念未嘗在夢是為見性覺義章夢有多相故覺有多義真如性者體本清淨用本覺照謂之本覺本覺為無明所迷謂之不覺知其所迷如夢初醒謂之始覺了達心源謂之究竟覺神通妙化謂之妙覺究竟者復其本覺少無未盡之謂也妙覺者本覺自是至妙無量功德無不具足之謂也夫夢有深淺覺有大小入夢轉深至於冥頑尤難覺悟噫衆生莫不皆有本覺之性而甘心長夢以夢為常以覺為非常嗚呼迷矣形影章飢者夢取飽者夢與夢者念想之影也形端影正形斜影曲心術之昏明邪正工夫之真偽淺深無不可驗於夢不可徒以虛幻視之而已迷旨章心中無物如鏡無垢心中無念如鏡無染心空念空而夢亦空學者有悟於斯庶幾諒余述夢之旨哉海峯智峯現宰官身東師列傳海峯聲贊傳云師全州人猿岩山遠燈庵居遠燈舊名木鳧庵震默祖師嘗在扶安月明庵每夜燈光晃朗尋其燈光則自木鳧來照安十六應真於法堂應真以神力懸燈遠照也故改名遠燈其山窟下建羅漢堂安應真者久矣有愚僧移建于穴外壬午年寺災癸未秋更建于穴外修其舊基有石文曰我昔常遊遠巖山影落漢陽作宰身我去五十年湖南觀察使甲午以前海峯僧甲午以後金聲根甲午五月十三日遠巖山遠燈寺僧聲贊書藏于十六間石函中甲申六月吉日全州威鳳僧統道內輪回通文曰遠巖山遠燈庵即十六應真窟也當初安于窟內後有竺典外道移安窟外云後果竺典移外更安內今年重修次開基則有書云云如上今監司監司即觀察使姓金名聲根兒名兒名謂乳名也巖字贊遠號海士乙未三月生以此告于使使謂金觀察使使往則瑞氣徹天助力建堂云云使道吏民稱呼官長曰使道都監董差於龍雲親作上梁文告功化主湖山海峯其寺近村人今知其事者多矣東師列傳智峯禪伯傳云師名祐祈號智峯楊州人出家於三角山道詵菴剃染於竺紘師拈香於恩師孝仁慈愛夙著山野鑄造錫罐每幸行時負水施渴人雲峴大監大監即大人之稱雲峴大監即大院君居雲峴宮故稱喫其水一杯賜判書職例書即尚書也原文作贈判書職而則職者該當於死者故改以賜人不稱職人不稱職者謂不以判書呼之也他日更呼曰智峯判書汲一杯水來此後人皆曰智峯判書行表忠祠總攝行寂滅宮五臺山中臺之佛殿曰寂滅宮總攝表忠祠重創時全羅按察使授龍雲智峯二大師都監董差帖差帖即官誥也建祠告功示寂數年有歲貢使入燕京有大官引至其家示其幼孫男臂有紋曰海東智峯問此是山名耶人名耶地名耶曰東土京山僧名也早晚幾許曰三四年曰德行何如曰僧之第一人稱菩薩賜判書職大官喜不自勝欵待而別朗伯和尚法號樂安者東萊金井山梵魚寺僧也本寺舊有二百七十餘種之雜役僧衆不堪其苦朗伯發誓願為宰官以除此弊遂於山下大道之傍種苽以施飢者捆屨以施行人亦造其他種種善業如是十年自知功行圓滿集衆告別曰我死之後幾十年有官人來此寺除雜役者即我也切須記之遂投身施餓虎死後果有慶尚道巡察使巡郡至梵魚寺見山川風物宛如舊遊自然感發於心召問寺僧本寺弊端悉蠲除之時有朗伯臨滅時受囑之僧細述奇緣詢之施身餓虎之日即己之生日也於是異之其巡察使即趙曮諡文翼公者而寺中有碑但勒名無記事栗峯禪師杖嚇羅漢大師諱青杲字拈花號栗峯俗姓白氏湖南順天人也考諱時皓妣文氏夢擎落日既而有娠以乾隆三年戊午正月八日誕生大師大師成童頴悟絶倫學不由師謙仁好施舉指非凡人皆異其器也十九乾隆二十一年投無垢大俊禪師得度明年乞具於雲月淑敏大師受禪於喚菴卓戒禪師而遂請益於青峯巨岸大師三藏奧義非不精通惟雜華玄旨最善遊刃不離言教深悟別傳岸老歎曰余講死句子投活句可謂茜絳藍青者此也遂傳心印焉大師意謂金剛實菩薩淨土欲闡大猷捨此奚適仍卓錫於摩訶衍隨緣應機如明鏡之照物而道韻所響衆集如鯽樵蘇春爨忘形乞法大師惟以平等觀調禦之會下有崇小乘者必施威呵禁大師一日坐方丈有一沙彌飄然作禮引迎大師至廁屋不現大師默認其羅漢之變戲詰朝荷錫向羅漢閣有僧十餘環途揖啓言去夜鄙等夢有象沙彌瞿然相告曰摩訶衍老師必來壞我等像矣爾曹當力諫免禍也鄙等覺來驚異之故兹懇乞冀垂慈恕大師笑謂曰小乘智寡機劣抱此癡怯即還丈室焉且值年荒衆憂啾啾大師領衆登前麓十錫指衆曰此處可有辦道具矣衆爭趨而視之果有山蔘數根遂採歸易貿穀粟為資道料大師客松廣寺時有一被魅者乍瞻光範狂性頓愈后寓通度寺葺萬灰之廢天王遣天童致敬大師孤居闕傭丁潛慮菜疇之失耕嶽神命山豬而耕之自是遠近道俗之耳目者皆欽大師如活佛出世也偉哉大師乎其離欲也金玉等糞壤其立節也王公不以屈其忘我也塗割并無心其為法也軀命視鴻毛質而言之大師真如來使人菩薩間生也至道光三年癸未正月晦日大師召諸門人曰吾將返源矣汝等勿藏骨纍我法身偈曰不去西方國蓮池已出蓮雲煙都盡處日月淨當天言訖遂右脅而化世壽八十六法臘六十七行狀蓮社法侶筆降觀音距今四十餘年前漢城之諸居士等結妙蓮社念佛精進忽感觀世音菩薩應降筆端説法成書名曰濟衆甘露據其觀世音菩薩妙應示現濟衆甘露緣起云同治壬申歲冬十一月妙蓮社法侶諸人設精進會于三角山之甘露菴專念菩薩聖號以期瑞應赴感示現儼臨法筵命甘露法主宣説苦海慈雨品翌年癸酉春再會甘露菴説十種圓信品其秋於海印長者家説普光蓮花品其冬於湛然壇説一切圓通品於寶蓮淨室説如是偈讚品甲戌春重會甘露菴説妙現授記品其夏於如是觀説返本還源品其秋於三聖菴説無盡方便品光緒乙亥春於鎮國寺説不可思議品重於湛然壇説轉不可説品其夏重於如是觀定品命名俱承慈旨凡閲四載七處開壇十一雲集乃成一部全經越三年丁丑冬行將校刻流通孚佑帝君帝君謂呂純陽降無相壇作辨首之序猗歟盛哉今剞劂告藏歲戊寅春正月海東三韓印伽居士敬識觀世音菩薩妙應示現濟衆甘露序呂純陽降筆書之生佛本無二致性相原在一貫有緣則隨感乃覺機用之妙諦無念則隨圓可知法體之真詮慧月之金光何增減於生死苦海願雲之寶氣豈出沒於涅槃正路莫言法會之已散於靈山常聽梵音之不斷於妙界繫我嘗聞大機於黃龍直印如來之心印諸士獲承圓法於白衣乃觀祖師之祕觀洋洋大訓無非濟沈之寶筏慈航諄諄雅説總是與樂之金函玉軸雖大慈大悲大願之心丁寧教誡何若是其懇懇本無去無來無住之體隨緣感應必如彼其昭昭勿謂像季儼然正法之時奚言古今宛如總持之會弘之在於人莫恐沈滯於凡類邪見演之當斯時勿失因緣於熙運佳辰一讀一讚不覺手指之升降參觀參究難禁眼淚之縱橫衆生之歸大法之運歟回首南海時時仰賀住駕震丹欣欣辨序誓續慧命報答大恩丈夫之事情牽業海顛倒失性閻羅之因惟願法眼銘刻心頭始終俱圓於一念感應長通於三昧分憂佛祖之導化永證人天之眼目是所三世區區之望亦為一心切切之祝無相壇飛鸞時純陽子題尚玄曰妙蓮社法侶後竟從事陰隲之文感應之説其所刊布流通者有衆香集南宮桂籍桂宮志覺世真經三聖寶典及過化存神等書而念佛之法侶變為學仙之道流矣附呂純陽純陽初學仙而終歸佛其系派則自德山宣鑒而嵓頭全豁而玄杲彥而黃龍誨機純陽得法於黃龍機呂巖真人字洞賓京川人也唐末三舉不第偶於長安酒肆遇鍾離權授以延命術自爾人莫之究嘗於廬山歸宗寺書鍾樓壁曰一日清間自在身六神和合報平安丹田有寶休尋道對境無心莫問禪未幾道經黃龍山覩紫雲成蓋疑有異人乃入謁值龍擊鼓升堂龍見意必呂公也欲誘而進厲聲曰座傍有竊法者呂毅然出問一粒粟中藏世界半升鐺裏煮山川且道此意如何龍指曰這守尸鬼呂曰爭奈囊有長生不死藥龍曰饒經八万劫終是落空亡呂薄訝飛劍脅之劍不能入遂再拜求指歸龍詰曰半升鐺裏煮山川即不問如何是一粒粟中藏世界呂於言下頓契作偈曰棄却瓢囊戚碎琴如金不戀汞中金自從一見黃龍後始覺從前錯用心龍囑令加護指月録乾鳳萬日彌陀法會三國遺事云新羅景德王十四年乙未康州今晉州也善士數十人志求西方於州境創彌陀寺約萬日為契時有阿干貴珍家一婢名郁面隨其主念佛九年歲在乙未正月二十一日禮佛撥屋梁而去至小伯山墮一隻履就其地為菩提寺至山下棄其身即其地為第二菩提寺榜其殿曰郁面登天之殿蓋此為東土蓮宗之始焉至于今時以往生為宗旨者金剛山之乾鳳寺是也按乾鳳寺事迹記本寺創在新羅法興王七年即梁天監十九年庚子也初創時寺名圓覺即古城縣也越唐肅宗乾元十五年戊子此乃乾元元年戊戌之誤也今考正之有發徵法師設彌陀萬日會至二十九年丙子績功匪懈三十一人騰空而去寺中相傳七月十七日三十人騰空而去距寺五里許有棄身處即其地燒之今云燒身臺者是也有遺骨藏石堆中今本寺住持云云坡和尚方經營石塔以安之高麗列山縣時更名西鳳稱乾鳳者乾隅有鳳石故又名焉附新羅念佛宗諸師白月兩聖成道記云白月山在新羅仇夫郡之北本注云古之屈自郡今義昌郡頭注云義安郡嘗作義昌縣忠烈王八年改義安為義昌監務升縣令以賞元世祖東征供道之勞今慶尚道昌源府是也峯巒奇秀延袤數百里真巨鎮也古老相傳云昔唐皇帝嘗鑿一池每月望前月色滉朗中有一山嵓石如獅子隱映花間之影現於池中上命畫工圖其狀遣使搜訪天下至海東見此山有大獅子嵓山之西南二步許有三山其名花山其山一體三首故云三山與圖相近然未知真偽以隻履懸於獅子嵓之頂使還奏聞履影亦現池帝乃異之賜名曰白月山望前白月影現故以名之然後池中無影山之東南三千步許有仙川村村有二人其一曰弩肹夫得一作等父名月藏母味勝其一曰怛怛朴朴父名修梵母名梵摩鄉傳云雉山村誤矣二士之名方言二家各以二士心行騰騰苦節二義名之爾皆風骨不凡有域外遐想而相與友善年皆弱冠往依村之東北嶺外法積房剃髮為僧未幾聞西南雉山村法宗谷僧道村有古寺可以栖真同往大佛田小佛田二洞各居焉夫得寓懷真庵一云壤寺今懷真洞有古寺基是也朴朴居琉璃光寺今梨山上有寺基是也皆挈妻子而居經營産業交相來往棲身安養方外之志未嘗暫廢觀身世無常因相謂曰膄田美歲良利也不如衣食之應念而至自然得飽暖也婦女屋宅情好也不如蓮池花藏千聖共遊鸚鵡孔雀以相娛也況學佛當成佛修真必得真今我等既落彩為僧當脫略纏結成無上道豈宜汩沒風塵與俗輩無異也遂唾謝人間世將隱於深谷夜夢白毫光自西而至光中垂金色臂摩二人頂及覺説夢與之符同皆感嘆久之遂入白月山無等谷今南藪洞也朴朴師占北嶺獅子嵓作板屋八尺房而居故云板房夫得師占東嶺磊石下有水處亦成方丈而居焉故云磊房鄉傳云夫得處山北廟蘭洞今復名朴朴居山南法精洞磊房與此相反以今驗之鄉傳誤矣各庵而居夫得勤求彌勒朴朴禮念彌陀未盈三載景龍三年己酉四月八日聖德王即位八年也日將夕有一娘子年幾二十姿儀殊妙氣襲蘭麝俄然到北庵鄉傳云南庵請寄宿焉因投詞曰行途日落千山暮路隔城遙絶四鄰今日欲投庵下宿慈悲和尚莫生嗔朴朴曰蘭若護淨為務非爾所敢近行矣無滯此處閉門而入記云我百念灰今無以血囊見試娘歸南庵傳曰北庵又請如前夫得曰汝從何處犯夜而來娘答曰湛然與太虛同體何有往來但聞賢士志願深重德行高堅將欲助成菩提爾因投一偈曰日暮千山路行行絶四鄰竹松陰轉邃溪洞響猶新乞宿非迷路尊師欲指津願惟從我請且莫問何人師聞之驚駭謂曰此地非婦女相污然隨順衆生亦菩薩行之一也况窮谷夜暗其可忽視歟乃迎揖庵中而置之至夜清心礪操微燈半壁謂念厭厭及夜將艾娘呼曰豫不幸適有産憂乞和尚排備苫草夫得悲矜莫逆燭火殷勤娘既産又請浴弩肹慚懼交心然哀憫之情有加無已又備盆槽坐娘於中薪湯以浴之既而槽中之水香氣郁烈變成金液弩肹大駭娘曰吾師亦宜浴此肹勉強從之忽覺精神爽涼膚金色視其傍忽生一蓮臺娘勸之坐因謂曰我是觀音菩薩來助大師成大菩提矣言訖不現朴朴謂肹今夜必染戒將歸聽之既至見肹坐蓮臺作彌勒尊像放光明身彩檀金不覺扣頭而禮曰何得至於此乎肹具敘其由朴朴嘆曰我乃障重幸逢大聖而反不遇大德至仁先吾著鞭願無忘昔日之契事須同攝肹曰糟有餘液但可浴之朴朴又浴亦如前成無量壽二尊相對儼然山下村民聞之競來瞻仰嘆曰希有希有二聖為説法要全身躡雲而逝天寶十四年乙未新羅景德王即位此下疑脫十四年古記云天鑑二十四年乙未法興即位何先後倒錯之甚如此聞斯事以丁酉歲遣使創大伽藍號白月山南寺廣德二年古記云大曆元年亦誤甲辰七月十五日寺成更塑彌勒尊像安於金堂額曰現身成道彌勒之殿又塑彌陀像安於講堂餘液不足塗浴未周故彌陀像亦有斑駁之痕額曰現身成道無量壽殿議曰娘可謂應以婦女身攝化者也華嚴經摩耶夫人善知識寄十一地生佛如幻解脫門今娘之桷産微意在此觀其投詞哀婉可愛宛轉有天仙之趣嗚呼使娘婆不解隨順衆生語言陀羅尼其能若是乎其末聯宜云清風一榻莫豫瞋然不爾云者蓋不欲同乎流俗語爾讚曰滴翠嵓前剝啄聲何人日暮扣雲扃南庵且近宜尋去莫踏蒼苔污我庭右北庵谷暗何歸已暝煙南窗有菌且流連夜闌百八深深轉只恐成喧惱客眠右南庵十里松陰一徑迷訪僧來試夜提三槽浴罷天將曉生下雙兒擲向西右聖娘三國遺事按㵢溪俞好仁遊松都録朴淵龍王堂更上百步左右兩崖各安石佛一軀俗傳夫得朴朴又按瞻慕堂林藝遊天磨録過觀音窟沿流四五里間清川白石比比可坐東西兩岸安石佛各一軀東曰弩肹夫得西曰怛怛朴朴往在丙寅開城儒生擊破朴朴惟夫得存焉云云然則天磨或是古之白月未可知也景德王代康州今晉州一作剛州則今順安今順安當作榮川今榮州郡是也善士數十人志求西方於州境創彌陀寺約萬日為契時有阿干貴珍家一婢名郁面隨其主歸寺立中庭隨僧念佛主憎其不職每給穀二石一夕春之婢一更春畢歸寺念佛俚言已事之忙大家之春促蓋出乎此日夕微怠庭之左右竪立長橛以繩穿貫兩掌繫於橛上合掌左右遊之激勵焉時有天唱於空郁面娘入堂念佛寺衆聞之勸婢入堂隨例精進未幾天樂從西來婢湧透屋梁而出西行至郊外捐骸變現真身坐蓮臺放大光明緩緩而逝樂聲不徹空中至今有透穴處云已上鄉傳按僧傳棟梁八珍者觀音應現也結徒衆一千分明為二一勞力一精修彼勞力中知事者不守戒墮畜生道為浮石寺牛嘗馱經而行賴經力轉為阿干貴珍家婢名郁面因事至下柯山感夢遂發道心阿干家距惠宿法師所創彌陀寺不遠阿干每至其寺念佛婢隨往在庭念佛云云如是九年歲在乙未正月二十一日禮佛撥屋梁而去至小伯山墮一隻履就其地為菩提寺至山下棄其身即其地為二菩提寺榜其殿曰勗面登天之殿屋脊穴成十許圍雖暴雨密雪不霑濕後有好事者築金塔一座直其穴安承塵上以志其異今榜塔尚存勗面去後貴珍亦以其家異人托生之地捨為寺曰法王納田民久後廢為丘墟有大師懷鏡與承宣劉碩小卿李元長同願重營之鏡躬事土木始輸材夢老父遺麻葛履各一又就古神社諭以佛理斫出祠側材木凡五載告畢又加臧獲蔚為東南名藍人以鏡為貴珍後身議曰按鄉中古傳勗面乃景德王代事也據徵徵字疑作珍下亦同本傳則元和三年戊子哀莊王時也景德後歷惠恭宣德元聖昭聖哀莊等五代共六十餘年也徵先面後鄉傳乖違然兩存之闕疑讚曰西鄰古寺佛燈明春罷歸來夜二更自許一聲成一佛掌穿繩子直忘形三國遺事尚玄曰今此文中據徵本傳及徵先面後云云之徵字似指發徵者也文武王代有沙門名廣德嚴莊二人友善日夕約曰先歸安養者須告之德隱居芬皇西里或云皇龍寺有西去房未知孰是蒲鞋為業挾妻子而居莊庵棲南嶽大種力耕一日日影施紅松陰靜暮窗外有聲報云某已西往矣惟君好住速從我來莊排闥而出顧之雲外有天樂聲光明屬地明日歸訪其居德果亡矣於是乃與其婦收骸同營蒿里既事乃謂婦曰夫子逝矣偕處如何婦曰可遂留夜宿將欲通焉婦靳之曰師求淨土可謂求魚緣木莊驚怪問曰德既乃爾豫又何妨婦曰夫子與我同居十餘載未嘗一夕同床而枕況觸污乎但每夜端身正坐一聲念阿彌陀佛號或作十六觀觀既熟明月入戶時升其光跏趺於上渴誠若此雖欲勿西奚往夫適千里者一步可規今師之觀可云東矣西則未可知也莊愧赧而退便詣元曉法師處懇求津要曉作錚觀法誘之莊於是潔己悔責一意修觀亦得西升錚觀在曉師本傳與海東僧傳中其婦乃芬皇寺之婢蓋十九應身之一三國遺事羅時有觀機道成二聖師不知何許人同隱包山鄉云所瑟山乃梵音此云包也機庵南嶺成處北穴相去十許里披雲嘯月每相過從成欲致機則山中樹木皆向南而俯如相迎者機見之而往機欲邀成也則亦如之皆北偃成乃至如是有年成於所居之後高嵓之上常宴坐一日自嵓縫間透身而出全身騰空而逝莫知所至或云至壽昌郡今壽城郡捐骸焉機亦繼踵歸真今二以師名命其墟皆有遺趾道成嵓高數丈後人置寺穴下太平興國七年壬午有釋成梵始來住寺敞萬日彌陀道場精勤五十餘年屢有殊祥時玄風信士二十餘人歲結社拾香木納寺每入山採香劈析淘洗攤置箔上其木至夜放光如燭由是郡人頂施其香徒以得光之歲為賀乃二聖之靈感或嶽神攸助也神名靜勝天王嘗於迦葉佛時受佛囑有本誓待山中一千人出世轉受餘報今山中嘗記九聖遺事則未詳曰觀機道成搬師𣛻師道義有匱岩基子陽成梵今勿女白牛師讚曰相過踏月弄雲泉二老風流幾百年滿壑煙霞餘古木低昂寒影尚如迎搬音般鄉云雨木𣛻音牒鄉云加乙木此二師久隱嵓叢不交人世皆編木葉為衣以度寒暑掩濕遮羞而已因以為號嘗聞楓嶽亦有斯名乃知古之隱倫之士例多逸韻如此但難為蹈襲豫嘗寓包山有記二師之遺美今并録之三國遺事尚玄曰按朝鮮世宗大王時併合佛家諸宗為禪教兩宗而僧科教宗則試以華嚴經及十地論然則教宗云者其實華嚴宗也又按清虛浮休兩大師以來歷代祖師皆以弘通華嚴圓頓之旨為教門之止皈焉喚惺霜月晦菴雪坡默菴蓮潭諸大師之設華嚴會具載寺録者不一而足華嚴經之末尾有普賢菩薩行願品以往生淨土為衆生回向之法門矣朝鮮教宗宗華嚴而多以彌陀為回向法會其有效則於此者歟今諸寺一則曰結華嚴山林二則曰結華嚴山林然則彌陀宗旨攝行於華嚴而已至夫乾鳳寺之萬日念佛會當以特別論發徵和尚創之聳虛和尚繼之最近代之碧梧和尚繼之碧梧之法嗣前法興寺住持鄭萬化和尚繼之皆善成就香觀居士撰碧梧禪師塔碑云我聞諸佛法善惡莫思量及覩佛萬行有善面無惡我聞祖師禪飢飯困來睡及覩諸律師有戒而無惰千棒與萬喝我只有一法不依不了義不作護人語有善度衆生有戒度自己是名圓真實堅固不動轉圓覺大道場發徵萬日會第二是康州第三為聳虛傳至碧梧師上承清虛嗣慈悲以為用勤苦以為體玉柱擎天屹香象截流渡獨擔大願力勇往大信志善男與信女次第證往生一切人非人立地成樂土上座萬化公復設第五會實師以啓之迄今代不乏維昔西方界七處九會成五會只一處盛哉未曾有金剛山千仞東海波萬里寶月掃坌穢祥飈息颶浪伐石為穹碑螭覆神龜趺嵯峨鎮山門頂禮千萬今乾鳳寺住持李雲坡和尚又為承辦念佛之會於是乾鳳為東方彌陀道場之大本山矣參禪狗子無佛性話釋迦世尊於靈山會上拈花示衆迦葉微笑遂以傳心自是教外格外無法之法故世尊付法偈曰法本法無法法法何曾法今付無法時無法法亦法禪家公案話頭即所謂無法之法也世謂禪門有千七百公案而海東禪侶以趙州從諗禪師無字為話頭之王蓋緣傳心法要大慧書狀蒙山法語太古語録懶翁語録禪家龜鑑等禪書多説僧問趙州狗子還有佛性也無州云無故也近世於妙香山有一禪僧曰白雲首座者素不識字而參狗子無佛性話苦修多年遂得至山河牆壁俱無障礙之境界一日遊方至四佛山大乘寺指佛像問講衆曰那個是什麼曰佛像雲又拈木枕問曰這個是什麼曰木枕雲擲木枕于衆前曰遮一羣鈍奴雲還香山將其所至境界質於蓮峯和尚峯固講僧也使雲入鐵甕以試之果然乃謂曰爾已聖矣從此再不要舉話食肉行任汝所欲俱無不可雲首座從其言行之然本參話頭不舉自舉力廢之三年始得不舉從前境界再不現前始知為蓮峯所教壞然悔之晚矣昔太古普愚禪師常示人必云雖是了悟無智人前切忌道著須遇本色宗師者以此也可不鑒戒哉説教龍師創釋辭法佛家法門禪講各殊禪門則曰上堂示衆少參晚參統以言之則曰説禪夫説禪者無有定法只在當人隨機施設凡舉話拈頌乃至揚眉瞬目竪指伸拳良久默然行棒用喝擲杖竪拂無非格外玄要之旨甚至有曰依經説法三世佛冤不依經論亦同魔説云者乃禪家之體式也至教家則必依經論講演旨義昔晉之支遁法師講經多會宗遺文為守文者所陋謝安聞而歎曰是如九方臯之相馬略玄黃而取神駿者也九方臯善相馬秦穆公求千里馬使九方臯相之歸言得之穆公問其毛色種類對曰牝而黃及至則乃牡而黑也又唐之法藏大師於長生殿講演新譯華嚴經以殿隅金獅子為喻喻法界無盡之理武后大有所悟賜號賢首菩薩戒師云云是講經者善説法要以感悟人為貴而不專在乎讀經也今日時代在各寺剎及布教堂冬夏結制之時多設華嚴法會諸法師輪遞説教九旬之內安居期限必也沒讀八十一卷且讀且釋期限促迫走讀走釋使聽法者不知何義僧家謂之部帙法門疑即高麗時代轉經佛事之濫觴也而此釋讀之法創於龍巖和尚龍巖法名慧彥俗姓趙氏羅州人也乾隆四十八年癸卯生嘗侍栗峯和尚入金剛山榆岾寺百日祈聖夢萬二千峰化為金蓮栗峯和尚坐於花中以獅子座并眼鏡授之自是信益堅龍巖又有二弟子曰布雲潤聚大雲性起皆順天人有音聲相法音流暢聞者怡悅大揚其師釋辭之法遂成諸山説教體制又於釋讀講演之時每至要節法師必唱南無阿彌陀佛法筵聽衆亦皆隨唱一以誦佛名號一以警衆昏沉或云德寺龍巖和尚創此方便疑亦金剛之龍巖也近有非之者以為説教念佛各有其時不合并行雖然已成習慣終難改之京內僧迹佐野書請朝鮮李太王三十二年乙未夏四月命弛僧侶入城之禁先是日本日蓮宗僧佐野前勵來此上書於總理大臣金弘集請弛僧侶入城之禁金弘集筵奏而有是命翌年丙申秋七月諸山僧侶與日本僧共設法壇于京城苑洞北一營之內行無遮法會數日京城士女爭來觀之余亦在衆中隨喜或有帶忿忿之色然者曰緇髠入城已是可憎况於禁門咫尺敢設法會乎或有帶欣欣之色然者曰朝鮮僧侶數百年間作門外漢今日始得披雲覩天從此佛日可再輝矣越三年戊戌春僧侶又被逐客之令其時僧侶頭戴竹編之圓形笠裝束與俗人異時有郊祀之禮幸圜丘壇適有一開運寺僧從布帳隙探頭仰瞻巧與天眼通上問臣僚彼何人斯由是警務使即發嚴令申禁僧尼入城不久是令又自解弛時亦人民皆行斷髮自是僧俗衣冠遂相混矣冠俗服俗僧侶外風先是朝鮮僧侶多衣緇壞色長衫或有衣白者而極少數僧帽有十餘種在寺中時著𩮀編帽繩編帽草編帽絹製帽或毗盧冠不一其制出外行時僧著竹編笠又有軍笠漆冠圓頂僧將所戴松雲遺制尼著松絡以草根編織者沙彌著辨即曲冠俗呼辨今之僧侶在寺及外出所著衣履與俗人同更無分別耳朝鮮山家舊俗僧尼所穿鞋履共有三種一曰草履甚屬粗製履之圍籬履之兩頰俗呼圍籬只排六總排編寸繩作圍籬者俗呼曰總總之義猶馬之態也又用草繩作龍箝紀俗謂旋繞者曰箝紀龍箝紀即龍捲義必用龍箝紀者亦有其義謂穿此履雖或踏蟲蟻亦可免殺生之罪過云此草履呼六波羅蜜以履圍籬有六總故假以名之也二曰麻鞋三曰雨屐雨屐者以麻鞋為上體以木屐作下齒者也高麗文宗十年制曰釋迦闡教清淨為先遠離垢陋斷除貪欲今有避役之徒托號沙門殖貨營生耕畜為業估皈為風進違戒律之文退無清淨之約袒肩之袍任為酒罌之覆講唄之場割為蔥蒜之疇通商買賣結客醉娛喧雜花院穢臭蘭盆冠俗之冠服俗之服憑托修營寺院以備旗鼓歌吹出入閭閻搪突市井與人相鬪以致血傷朕庶使區分善惡肅舉紀綱宜令沙汰中外寺院其精修戒行者悉令安住犯者以法論又恭愍王元年壬辰二月宣諭曰為僧者必須度牒不許居家云云尚玄曰按拾得詩我見出家人總愛喫酒肉此合上天堂却沉歸地獄念得兩卷經欺他市俗豈知俗士大有根性熟云云豈彼沙門欲欺俗而冠俗之冠服俗之服者歟夫出家人剃其髮者所以示斬斷塵緣也緇其衣者所以示破壞色相也具法服威儀者所以示別於俗人也雖然如彼破戒之僧徒恆懷混俗之主義則何堪與論於佛制也哉今之僧侶非徒冠俗之冠服俗之服亦為姓俗之姓名俗之名按以釋為姓者始於道安道安晉僧也與名士習鑿齒相友善隨苻堅入關時沙門萬數各隨其師為姓名安曰師莫如佛世尊也沙門宜以釋為姓後見增一阿含經乃云四河入海無復異名四姓出家同稱釋氏安言與經暗合世益重之以其有關於法律上財産相續及民籍上名義記載等之事項故不得不爾一般世人不諒其由乃謂五百年壓賤之餘故務欲混俗以邀平等待遇云云余則以為大抵僧侶持戒修行則皆可為人民之師表也何止區區於平等待遇雖然受人之待遇非在於冠服姓名而仍在於道德律行也義相大師之棕笠錫杖宛在四佛山見輿地勝覽普照國師之袈裟長衫留傳松廣寺世人見之皆以為寶非貴重其衣與杖也以尊敬其德與行也故為僧者四分律文百丈清規莫但口誦各自躬行然後可以為人之師也理判事判寺剎內情朝鮮寺剎之內有理判僧事判僧之區別名稱理判者謂凡參禪講經修行弘法之僧也俗所謂工夫僧事判者謂凡營産立業辦事處務之僧也俗所謂山林僧山林者即幹辦一切産業事務之謂也理事二者闕一不可非理判僧則不能以續佛慧命非事判僧則不能以護持伽藍也以昔言之清虛浮休碧巖白谷諸大師皆以理判兼事判者也開運南漢重興北漢傳燈龍珠諸寺總攝皆以事判制理判者也蓋前日者各寺僧衆事判者多如春林理判者稀若曉星末法時代勢固爾也至於今日則無論本寺末寺為住持候補者必須添附修行履歷書于認可申請書若於履歷無受戒課經安居安居即結夏結冬守制之謂也雖然今之所謂安居未皆如法不過具文而已等事則府道不認其有相當之資格故事判僧難為住持雖然理判僧為住持者往往有僨公誤事者以不善世務故也昔若休和尚以事判僧而善守護仙巖寺愚隱和尚以事判僧而能重創榆岾寺若此兩和尚者可謂理事雙融也又按前日朝鮮僧規凡係處分寺中財産及營辦法會其他一切事務有主掌僧集會寺衆發言收議俗謂寺中公事者即是也然後執行此即所謂圓融産林本稱山林今易以産林圓融産林者共通也一自寺法施行以來處理一切事務歸於住持獨斷三職輔佐三職謂監務監事及法務此即所謂住持獨産林唯視住持其人之公不公如何耳獨産林者專制也然則寺中産林獨與圓融何勝何劣字示其義不難判別昔高麗末各寺住持濫取寺中常住錢糧務營産業或擁婢妾驕傲已甚故至朝鮮太祖太宗革除其弊減田汰僧而佛法於是乎衰矣獨産林之為大弊害今引一例楊州郡之逍遙山寺即自在庵本係名山殊勝道場祈禱佛事四時不絶寺仍貧寒僅得支持聞諸山下居人之言縱有檀衆不肯施助因主掌僧獨産林故恐其皈之私槖不為寺中公用云云禪家龜鑑曰賣佛營生曰被袈裟賊囊橐主義奉佛賣佛朝鮮寺剎僧家生活有二種名凡係檀家之嚫供附諸寺中之公用者曰圓融産林歸於一個僧之私槖者曰獨産林不可不知假使有一個僧以知識名者則男女信徒拈香懺悔因受偈文及佛名而供祝佛事皆信賴焉曰某和尚是我法師亦或供給其一生之衣食住此則所謂爾以財施我以法施衲子下山如是化緣僧家謂之施主鍛鍊鍛鍊謂鑄造也施主鍛鍊僧家不齒焉此等法師聽其法門口不絶布施功德之聲言必稱因果禍福之説阿諂檀越鍛鍊鑄造究其主義誘導財施肥其私槖是可名為奉佛賣佛也夫布施功德因果禍福固是佛説雖然譬如雪山香草牛食之則成乳以利人蛇食之則成毒以害人也朝鮮以來僧巫並稱屢見於史蓋有所因是可耻也天台寒山禪師有詩云語你出家輩何名為出家奢華求養活繼綴族姓家美舌甛脣觜諂曲心鉤加終日禮道場持經置功課爐燒神佛香打鍾高聲和六時學客春晝夜不得臥秪為愛錢財心中不脫灑見他高道人却嫌誹謗罵驢屎比麝香苦哉佛陀耶又拾得詩云後來出家子論情入骨癡本來求解脫却見受驅馳終朝遊俗舍禮念作威儀博錢沽酒喫翻成客作兒出家而愛財色者可不鑒戒哉今有真善知識之行履略論三個榜樣録之于左仙巖寺近世有海鵬大師天姿豪縱頗有黃檗希運禪師之氣槩每逢人士皆爾汝之一日金秋史學士與諸友會于江亭設宴賦詩師適見之曰汝等之詩腐臭不堪試見吾詩即呼曰萬里黃金國千層白玉樓混世界歌舞盡大地風流諸人愕然京山某寺設國齋邀十法師説法師以次當説遂升座良久曰大哉法界玄玄妙便下座齋罷上問一宮人曰誰是善説法要者對曰海鵬和尚七字法門最為簡明上讚歎不已乃賜金銀彩縀無算命其宮人往傳鵬師而致意焉師罵宮人曰汝侍奉宮壼輔翼聖化是汝之職今於法會吾説七字而已汝乃上聞恩賜金寶致損國財汝是蠹國病民者也不顧徑去上不得已敕令順天郡守傳命輸給師遂納其財寶于仙巖寺以充修葺之費云東師列傳虛舟和尚本南僧也虛舟本松廣寺僧也禮真派系默庵奇峯即其法祖奇峰受學于默庵以禪講名于世與權彜彜相國敦仁最交好憲宗壬寅松廣寺災奇峰來京謁權公得空名帖幾百張歸付授戒弟子龍雲重創伽藍應權貴召再遊京山所到之處四衆雲集不著之衣自生不食之供並臻師到處衣食成山皆散施衆僧云若非夙植善根何得如是受戒者受懺者受法者受業者四衆合掌啓請如在靈山拈花示衆泣者笑者皆得寶歸信受奉行幻翁和尚雖住京山能離財色戒行清淨宮中諸檀越女繡成佛像奉安于華溪寺邀師説法師曰經云出佛身血為五逆罪之一汝等諸人以針刺佛身阿鼻地獄在所難免諸檀越家聽此言已悚然汗下師良久曰雖然如是誠心造像功德亦不無其各安心信受奉行諸檀乃喜震河和尚為我言之眷屬觀念出家入家眷屬者徒衆之謂也即如釋尊有常隨衆千二百五十人釋迦譜云耶舍長者朋黨五十人優樓頻螺迦葉師徒五百人伽耶迦葉師徒二百五十人那提迦葉師徒二百五十人舍利弗師徒一百人大目犍連師徒一百人此千二百五十人並先事外道勤修纍劫而無所證承佛化導即得證果於是感佛之恩一一法會常隨不捨故諸經首列衆皆云千二百五十人俱者以此也非但佛有眷屬孔子之七十二弟子耶穌之十大弟子亦皆可謂之眷屬而此眷屬皆慕其師之法道而常隨侍左右者也非復阿私朋比之謂也朝鮮僧家之諺曰出家人有諸離奇之事以無家之人而常處殿宇之中以無田之人而一日猶三食背棄自己之父母而喜附他人為其眷屬云云等也如人出家從以落髮者謂之恩師從以受學者謂之法師從以受戒者謂之戒師從以參問者謂之禪師而其養成之責是乃恩師之擔荷焉今依僧家慣例恩師所有之財産其得度受養之弟子享有相續之權假使一恩師有數弟子則任其恩師之處分隨宜分給恩師遺命之法田弟子有自由處分之權恩師死亡若無遺言之境遇亦歸其弟子處分田産弟子絶則奉納寺中為常住用如是相傳以成規式蓋不如是不能續佛慧命實至妙之法也雖然今之為僧者有兩籍一僧籍即居住寺庵屆出而承認許者也二民籍即自出家生緣俗家定籍中登録者也自此發生遺産相續權之問題若死亡僧生前有遺言處分財産則無論已若不然則死僧之徒弟與死僧之生緣俗家親族間必生紛爭之端若以由來習慣上言之則徒弟有相續之權若以現行法律上言之則載籍之俗家親族欲享財産相續之權難於處理者必此事也雖然僧家眷屬之觀念比俗家之愛族黨一層尤甚一寺之中各有派黨眷屬愈多勢力愈盛人我之山更高煩惱之海轉深此所謂出一家入一家何有於清淨無為之道哉若夫真出家人以法界為家以法身為親也梵魚一方臨濟宗旨此段專論現代宗旨及僧風甲寅冬余得閲日本人高橋亨所撰朝鮮佛教宗派遞減史論今譯其大意明治四十四年四十三年之誤現海印寺住持李晦光與日本曹洞宗締結聯合條約而李晦光實以圓宗宗務院代表者赴之也所云圓宗者出於宋永明寺延壽之宗鏡録稱以圓宗為禪教兼修宗門而自數年前朝鮮僧侶自作之宗名也然而梵魚寺之韓龍雲白羊寺之朴漢永等以筆頭惹起慶南全南之反對運動自稱臨濟宗此因朝鮮雖有禪教兩宗而畢竟禪教法系本出於臨濟嫡傳之所以也尚玄曰當其初也朝鮮僧侶於其宗旨莫適所從稱號淨土亦無一言前韓光武十年丙午元興寺管理署廢奉元寺僧李寶潭華溪寺僧洪月初等設立佛教研究會于元興寺以淨土為宗旨銅地鍍金制一會章為八角形刻六字文淨土宗教會章分給會員每僧尼名下收金五十錢以充會費設會緣起如左佛教研究會僧侶等請願內部書本僧等參會於日本淨土宗已為經年而開教使特令京鄉僧侶創佛會設學校計圖研究新學問上教育方針故兹以請願照亮後特許伏望光武十年二月五日佛教研究會都總務李寶潭以外京山各寺九人略內部許可同年二月十九日所願既云研究學問開發教育務圖慈悲修善如或籍教生弊隨其現發當有相當處理事發文諸道首寺通文明進學校學徒起送件惟我佛教自中夏至東方于今數千年法綱衰弛僧侶之困迫未有如今日也為韓國僧侶者孰無憤冤之心哉况今多般異教處處蜂起各自宗崇而破毀佛教奪其田畓附屬學校而以為學費云言念及此誠極痛駭若此不已無窮患亂不意之變從此而起池魚之殃將及於大小寺剎究其原因則我僧侶不達於世界上學問等間於事物上之所致也今者日本淨土宗開教使井上玄真氏見韓國佛教之衰弛慨歎不已曰若欲濟弱扶強興旺佛法權用新學問為最云云故仍設研究會普通科學校而稟承政府之認許矣則吾道興旺之秋在於今日也故募集京城附近寺剎之青年僧侶自陰曆三月初一日始業而以研習佛教妙理興新學異道之書及他邦殊俗之等語等為其目的也貴寺既是道內首寺剎則行將設立本會之支院及學校又以國內僧侶不可不一次調查故兹以馳通照亮後於貴寺及所管各寺伸明知委令悉聞知所有僧數成册報來一無漏落自貴寺為先學徒二員今四月晦日內裏糧起送于本院學校鍊習佛教與新學問勵精刷新修其自強之實則解脫劫運復其自由之楷必有其理嗚呼吾儕僧侶自察勉之期有實效切切為要再學徒年齡自十三歲至三十歲紙筆墨書册等自本會擔當光武十年四月十日此時華溪寺僧洪月初與奉元寺僧李寶潭迭為佛教研教會長設立學校徵徒斂錢丙午六月十四日警務使朴承祚奉承敕教來于元興寺解散攝理金越海及其他僧侶寺宇全部委托于明進學校使之教育學生李寶潭洪月初勤實保管丁未六月二十五日各道寺剎代表者五十餘人開總會李寶潭辭免佛教研究會長及明進學校長之任而李晦光被選交承設立圓宗亦皆同事前韓隆熙二年戊申三月六日各道寺剎代表者僧侶五十二人開總會于元興寺設立圓宗宗務院推李晦光為大宗正金玄庵為總務又置諸部于院內教務部長陳震應為之不來學務部長金寶輪金之淳相繼為之庶務部長金石翁薑大蓮相繼為之人事部長李晦明金九河相繼為之監查部長朴普峰羅晴湖相繼為之財務部長徐鶴庵金龍谷相繼為之高等講師朴漢永為之以圓宗為號者蓋以諸寺代表僧侶會議共立故取其圓融無礙之意也並非取宗鏡之圓宗亦非取華嚴之圓宗者也當時既立圓宗之後僧侶之中或有識者私相議曰若有人問圓宗之出處將何以對之或者曰可舉高麗大覺國師之圓宗以對之云云殊不知大覺圓宗係是文類之書名而弘通華嚴者也於此可知圓宗之立初無所依據者也附屬臨濟亦自坐觀前韓隆熙年間妙香山普賢寺僧等附屬本寺于日本臨濟宗妙心寺妙心寺派僧古川大航來普賢寺一切管理皆皈其手矣皈依真宗亦多影從大正元年辛亥華溪寺僧洪月初金抱應等率京山僧三十指往京都皈依真宗本派本願寺謁大谷法主行得度式是舉也乃真宗開教士巖常圓之運動云云締結曹洞亦任運動諸寺代表僧侶既立圓宗之後欲得宗務院認可送圓宗代表者李晦光于日本任其運動乃與曹洞結約如左朝鮮全體韓圓宗寺院衆韓曹洞宗韓完全且永久韓聯合同盟韓韓佛教韓擴張韓事朝鮮圓宗宗務院韓曹洞宗院韓顧問韓依囑韓事曹洞宗務院韓朝鮮圓宗宗務院韓設立認可韓得韓韓斡旋韓勞韓取韓事朝鮮圓宗宗務院韓曹洞宗韓布教韓對韓韓相當韓便利韓圖韓事朝鮮圓宗宗務院韓曹洞宗務院韓韓布教師若干員韓招聘韓韓各首寺韓配置韓一般布教及青年僧侶教育韓囑托韓韓又韓曹洞宗務院韓必要韓因韓韓布教師韓派遣韓韓時韓朝鮮圓宗宗務院韓曹洞宗務院韓指定韓韓地韓首寺韓或寺院韓宿舍韓定韓韓一般布教及青年僧侶教育韓從事韓韓事本締盟韓雙方韓意韓不合韓韓廢止變更或改正韓為韓事本締盟韓其管轄處韓承認韓得韓韓日韓韓韓效力韓發生韓明治四十三年十月六日朝鮮圓宗代表者李晦光曹洞宗宗務代表者弘津説三然則稱號淨土皈依真宗設立圓宗締結曹洞附屬臨濟或隨聲附和或同事運動要之無非借勢恃力何以末後反對激起實因反感於同一禪宗而曹洞係是他派臨濟則是自家宗旨之歷史忽明黨派之暗鬪隨起朴漢永陳震應金鍾來等以文字以言説激起諸方訂以庚戌十月五日陰歷開會于光州之澄心寺及期而無來集者不能至於成行於是諸人再起遊説乃以翌年辛亥正月十五日又開總會于順天松廣寺來會者則全羅南道及智異山一帶之僧衆也是時決議設立臨濟宗臨時宗務院于松廣寺而投票選舉管長仙巖寺之金擎雲白羊寺之金幻應俱以德望票數相同屢選屢同末乃別定選法以擎雲師為定而以年邁力衰故不果出來權以韓龍雲為之代理亦設臨濟宗布教堂于光州府內如是行之殆有年餘至壬子閏五月五日又開第二總會于河東雙溪寺寺乃第一總會時所定之臨濟宗出張所也伊時諸寺代表來會之僧為百有餘指議決廣揚臨濟宗旨選派五人韓龍雲金鶴傘張基林金鍾來任晚聖往梵魚寺勸誘入宗梵魚寺辭以初不見請於組織總會即松廣寺之會不欲聽從於是約以移設臨濟宗臨時宗務院于當寺梵魚寺然後從之是約也韓金任三僧為主蓋從多數為之者歟自是以來梵魚一方臨濟宗旨便成寺是東萊草梁大邱京城等四個處設布教堂以臨濟宗冠其稱號時寺剎令已為頒布三十本寺亦已法定三十住持次第承認故當其制定寺法也以宗旨稱號齊一事為一大問題於住持總會五月二十八日在元興寺開會南黨即臨黨則以梵魚寺住持吳惺月為中堅而提出臨濟宗旨之意見北黨即圓黨則以李晦光為領袖而內定別立宗旨之機先以揣知總督府之命意所在故總督府命意果是何哉左記二證用藉參考先此住持總會揭載官報之件即如朝鮮僧尼韓法階稟承例一斑明治四十五年四月中頒布者僧尼韓法階韓其行解學德韓表彰韓韓一種徽號韓韓