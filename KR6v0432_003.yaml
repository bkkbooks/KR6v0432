或以事功或以異行如是各各擅其所長形成所謂禪教兩宗今列三十本山住持其他重價禪講諸僧所行履略驗其宗旨則經教者最多而其日用或念佛或誦經誦呪而參禪者則極少其例如左惟長老幻應自幼少實行其傳講也承嗣鏡潭大師其修道也獨坐雲門孤庵菴在白巖山頂兩坡雪坡白坡之後又出律師卅山之中共推宗匠六十年間影不出山三千里內名已滿世用心慈悲固自著於相好持戒精嚴亦可見於威儀右白羊寺前住持金幻應藏海曇雲靈山法雨海曇和尚所居曰靈鷲山通度寺花木禪房間譜朝鮮宗史師著有朝鮮禪教略史云金剛戒壇重尋新羅律派右通度寺徐海曇瑞龍龍虛海東福田律行清淨萬口雲騰律虎虎隱山中叢林戒德馨香四方風從近年於統營海中有溺死者其家設水陸齋于海岸請師主法忽見死尸自外海漂向齋場而來於是師之戒德聞于諸方雙磎華嚴大安等寺爭設戒壇請師為和尚阿闍梨右玉果觀音寺金瑞龍安城瑞雲山青龍寺李龍虛海印寺朴虎隱已上諸僧言其行履以教為宗戒律為最僧中震河法界泰山華嚴十地之妙義決擇了然法相八識之微旨分析該當久主講壇師於楓嶽之新溪乾鳳兩寺主講故得弟足之多再正禪文可見宗眼之明師嘗遊方至梵魚寺寺固禪窟也衆僧欲試師之禪眼請師説法師遂升座橫按拄杖良久乃曰大凡參學之道要參活句莫參死句時有僧問死句活句俱不問如何是不死不活句師云近前來僧來師痛打一杖師云遮個是會麼僧無語以嗔作佛事若宋之明教大師以畫為餘事如麗之懶翁和尚不離俗離其俗離俗塵常住法住是法住法位右俗離山法住寺前住持徐震河二震虛和尚金剛寶石堅固梵行崔震虛住金剛山長安寺李震河住進樂山寶石寺而李震虛師特長於講涅槃經兩萬愚禪師孤雲野鶴無為間性右孤雲寺住持李萬愚麻谷寺住持金萬愚住東鶴寺東宣和尚西教老宿住持五十三像之榆岾坐鎮萬二千峯之楓嶽右金剛山榆岾寺住持金東宣曹溪禪社錦溟講席松寺之中松廣寺也獨能授徒楓巖之後果不乏人右曹溪山松廣寺金錦溟順天仙巖清昊僧家身不貧道不貧定知世修福慧行亦禪坐亦禪倘有日用威儀右順天仙巖寺住持金清昊直欲擎雲獨步丹霄不要撈月再向碧潭寫經篤志匹敵古之大隱和尚持戒淨行比齊今之幻應長老金海本貫自是首露王之後裔松寺總會時乃臨濟宗之管長右仙巖寺金擎雲全觀虛師篤求實事出柳京風流人家入楓嶽清淨法界宗講雜花名震叢林右金剛山表訓寺全觀虛大乘雪翁師住四佛山大乘寺清虛雲孫講授僧徒是繼龍湖四佛之席近世四佛山有龍湖幻鏡兩師相繼主講四方學者雲集交遊道友可擬虎溪三笑之圖四佛近處醴泉郡有張淨蓮金靖濟金水月等諸居士篤敬三寶與師交好為方外心友右大乘寺李雪翁東隱師學能禪能講西來祖意是同是別或觀活鱍鱍之梵魚而久遊金井金井山梵魚寺是禪剎師遊其寺主講席亦離間寂寂之東鶴而時上楊州師本籍在東鶴寺而時來楊州奉先寺主講右東鶴寺李東隱月華現相海印發光師本籍海印寺往來楓嶽止住雪峰雪峰山釋王寺受恩養於德海知識德海和尚嘗於香山之觀音像前百日間長立精進聽講授於震河和尚風靡叢林月落華溪師於丙辰秋寂于高陽華溪寺右釋王寺徐月華寺之華嚴僧之震應圓教宗風始於緣起而師祖霜月能弘通之禪門拈頌集于真覺而師祖龍潭始提唱之師善華嚴師善拈頌兩宗旨義一印心法右智異山華嚴寺陳震應朴漢永法名映湖是堂號雞林赫居世之後裔龜巖少林窟之嫡傳淳昌郡龜巖寺在靈龜山寺有少林窟白坡和尚在此修道著禪文手鏡轉傳心法于雪竇而雪乳而至于映湖禪師有慧竇如雪竇大師吮法乳於雪乳和尚調伏其心若百里奚之牧牛演説是法如九方臯之相馬改良佛教以為己任涉獵俗典不遺餘力現執學林之教鞭用勤緇門之警策右淳昌龜巖寺朴漢永法名宗憲山門紀綱住持中延禪師白羊寺中興祖之舊寺承繼幻應長老之後席右長城白羊寺住持宋宗憲雲坡莊嚴發徵浮圖萬日念佛會乃梧化之餘波乾鳳寺之碧梧萬化兩師曾設萬日念佛會雲坡繼之晴湖住持奉恩禪剎九品往生願是蓮宗之發心右杆城乾鳳寺住持李雲坡廣州奉恩寺住持羅晴湖標準正鵠住持威鳳前者振聲前住持李振聲後者朗應雪嶽魔境有物礙膺應和尚在雪嶽誦觀世音為魔所纏如蛇扼其喉云月寺望月寺誓心以刀斷指法鏡之法幻鏡之幻法鏡受教於幻鏡講伯法即是幻幻即是法若執是法只是像法倘證如幻俱皆影像非心非鏡無物無塵影像不除靈光獨露右全州威鳳寺前住持趙朗應應今住持郭法鏡達師蘭若金龍寺開山祖雲達禪師慧翁蒲圍雲裏金龍宜有變化林下石虎可無活動右雲達山金龍寺住持金慧翁月山秪林海印景雲承繼萬應住持三寶化導東京之人歸依西方之佛右含月山祇林寺前住持金萬應今住持金景雲翠雲其名白月其業長春洞裏冬柏常翠大好性靈詩料頭輪嶺上暮雲多白可比心事行履右海南頭輪山大興寺住持白翠雲法海莆龍慧溟大鵬龍和尚號鵬農繼金慧溟為住持落髮于明珠古剎不失髻珠住錫于月精本寺倘見識精其性也剛敢憚人過於當面其行也潔遠離女色於自心尋繹戒律本源紹承慈藏師之遺烈吟詠詩偈餘事髣佛賈浪仙之清韻右月精寺住持洪莆龍已上諸僧觀其行履以教為宗講學為主或兼説禪而屬於文字非專門參究者也不自晦光必欲明心出家入山修教攻禪厥初蹤迹若浮雲頗有行腳僧之風味最後因緣到望月楊州道峰山望月寺始博晦光佛之稱譽下道峯住俗家時僧尼入城之禁令既已解除故和尚入京城住其檀越家從此雲水之行履為彼煙火之羈絆諸寺代表者選舉之臨時宗正卅山會議所管理之多年院長圓宗以還怨府是處我心匪石不可轉也衆口鑠金亦可畏也雖失東隅尚收桑榆之未晚不遇寒歲焉知松柏之後凋右海印寺住持李晦光既名大蓮不是小草舞勺之年隨實父于杆城其父晉州人謫居杆城云落䰂之時投虛師于楓嶽長安寺崔震虛是其恩師兼為法師海光殿長安寺之海光殿及梵王樓重建築工役化主功德藏經板補裝釘佛事監督勞績印經以補充闕書印海印藏經千四百卷補充楓嶽正陽寺闕書內下大施買田以寄附海印以印經之餘財買田以寄附海印寺局司壇歲收百斗米外護美舉手握龍珠事事如意頭戴寶鏡寶鏡大師是龍珠開創祖色色現像三十本寺聯合事務委員長之初任七千法侶中央學林設立者之代表右龍珠寺住持薑大蓮靈山九河聖海一味聖海九河和尚之師既然蒞寺統衆可無通方度人右鷲棲山一名靈鷲山通度寺住持金九河已上三僧言其行履以教為宗事功為主聞桐華南坡之主旨發蓮宗西方之願心明理而達達城之人皆欲親近判事以公公山之僧無不悅服右達城八公山桐華寺住持金南坡雪晴銀海乃呈色相一如月印石潭不見晦應三昧八公草木三寶雨露右永川八公山銀海寺前住持朴晦應今住持池石潭雪月皎皎存普照之境松風瑟瑟傳無限之韻十六祖師之遺基久已寂寞三百僧衆之雄剎倘復振興右曹溪山松廣寺住持李雪月錦山古郡寶石本寺先朴徹虛後李徹虛見若透徹圓同太虛右錦山寶石寺前住持朴徹虛今住持李徹虛嶽雲長暗山月初生教宗甲剎可無教化光陵願堂或有光明右楊州雲嶽山奉先寺住持洪月初江華蓮月寺傳香燈前住持金香嚴救伽藍於放火保山林於伐木右江華傳燈寺住持鞠蓮月九月九峰一峯一月檀君古廟神雲騰騰九月山有三聖祠大倧教人奉敬之荷師舊壇荷隱大師講授之壇僧風寂寂右九月山貝葉寺住持薑九峰牧丹山花紅似錦一世混醉香雲大同江水碧於藍盡日間繫龍船法運豈能久晦佛日或可永明右平壤錦繡山永明寺前住持崔香雲李晦明今住持薑龍船平原深山流漳浩波觀法興不興在人弘不弘右平原弘山法興寺住持韓漳浩關西香山海東檀特影海隱湮普峯突兀清虛本寺臨濟宗僧官不容針私通車馬右妙香山普賢寺前住持裴影海今住持朴普峯戒鏡喚虛大鍾和應清月溪邊好雪峯境右安邊雪峯山釋王寺前住持崔喚虛高和應今住持薑清月南溟法海北道津梁瞻彼盤龍想古靈鷲右咸興雪峯山歸州寺住持田南溟已上諸僧言其行履以教為宗名雖相老年則尚少生緣安東教迹竺西落俗髮於雲達金龍受佛學於琴巴在龍既有文辭且多巧思編輯雜志汲汲於啓發愚昧揭布革論諄諄於改新規範右金龍寺權相老龍雲主意豹霧隱變倘有見於馬丁之改舊教非無得乎鸞聖之唱真宗為先破壞然後建立西域教有史以來初請嫁娶僧尼寧憚破佛律儀中樞院獻議之後更去建白統監乃説殖民政策俱見上編之末其心大苦其情亦急刊行新論朝鮮佛教維新論發表改良之思想譯述大典佛教大典準備布教之材料右百潭寺韓龍雲已上二僧言其行履以教為宗改革為主精金浮而寶雲乾鳳寺金寶雲行履堅而石霜法住寺張石霜金鍾來而警世龜岩寺金鍾來白鶴嗚而聞天道甲寺白鶴嗚初月白而包光靈源寺白初月金包光一雲出於何山榆岾寺金一雲甲寺金何山玩海上之鯨鵬乾鳳寺全玩海大安寺李袖鯨松廣寺金浩鵬古鏡中之胡漢通度寺尹古鏡翠庵山門松標松廣寺吳翠菴雪耘本分草料佛影寺李雪耘禪已上諸僧言其行履以教為宗講説為主南坡學南宗智山有智人重創靈源寺復繼震河席右智異山靈源寺李南坡今俗離山法住寺住持惺月惺惺蒼天蒼蒼住持禪剎殆近十年想得衆心建立教堂凡有四處務揚宗風右東萊梵魚寺住持吳惺月若不普明心地焉能打破牢關顧寺名而思義豈無無染之師麻谷通俗諦而度人倘如如滿之接香山右公州麻谷寺前住持張普明靈峯禪師京城士族坡平尹氏其求法也數度往來于江南支那南方其卓錫也多年止住于關東楓嶽榆岾發明一法對治衆病右榆岾寺尹靈峰直觀病體心病與身病非同亦非異有根若難除急須當體觀當體即病所住處觀空不滅觀有不生觀空不滅觀病病消此是何物權立號曰靈峯直觀不因師悟萬中希有達摩老祖苦口叮嚀又云直觀密印虛玄希夷賢者難測愚夫詎知緣有三種下緣病消中緣心滅上緣物格物格見宋張九成與大慧問答機緣千聖不傳之真妙訣萬病通治之大靈丹以近生緣俗家故住牛庵陽德牛頭菴而課小兒倘非枯木寒巖謂方寒巖冬無暖氣顧今通方禪界共推龍城謂白龍城為巨擘或因月似彎弓少雨多風龍城禪師每自詡此八個字曾為其機緣句霽山金道峯康應海金南泉金修得到水水山山各宛然否慧月申性月朴混虛梁滿空宋撈得住萬古碧潭空界月否已上諸僧言其行履以禪為宗有舞風堂寄浮雲鄉姓云平安朱氏迹行清淨白業露地能信宿冬月亦跣足衣著百結食無一飽眼若曙星坐如山嶽有問法門者勸念阿彌陀僧著絹衫而與誡告云是牛皮之可慚路有紙錢而不拾遺本非魚目之不明右朱舞風水月師者火木漢也僧家謂火頭曰火木漢火木漢亦謂負木漢發迹于天藏聞法于鏡虛初誦大悲呪後入徑截門能行難行參實悟實在世離世出家作家不識文字而慧解泉涌常守梵行而蹤迹雲遊普陀洛伽在支那浙江寧波府去參大士像而中途未就松風蘿月西間島地名皈作間道人而長年獨坐右全水月已上二僧言其行履以禪為宗苦行為最今由上述比較諸方禪教僧數三十本山前後住持五十許人屬于禪者不過三四而其餘人並屬于教若舉朝鮮全部僧數七千人而言之則十之八九皆屬于教而不禪不教者實占多數也近世禪界有鏡虛和尚者始發迹于洪州之天藏菴遍歷松廣仙巖青巖海印通度梵魚及楓嶽諸寺頗揚禪風世傳所謂鏡虛悟道歌篇長不能具録而其最末四句曰忽聞人語無鼻孔頓覺三千是吾家六月燕巖山下路野人無事太平歌世人謂鏡虛和尚有辨才其所説法雖古祖師無以過之雖然蕩無拘檢至犯淫殺不以介意世之禪流爭相效之甚至倡言飲酒食肉不礙菩提行盜行淫無妨般若是謂大乘禪云云欲為掩飾其無行之過者滔滔皆是蓋此弊風實自鏡虛始作俑也叢林以是指為魔説余未敢知鏡虛禪師悟處見處而若以佛經禪書論之則似非是嘗見指月録大慧宗果禪師示真如和尚云學般若人隨順塵勢定為魔所攝持又於隨順境中強談道理謂煩惱即菩提無明即大智步步行有口口談空自不責業力所牽更教人撥無因果便言飲酒食肉不礙菩提行盜行無妨般若如此之流邪魔惡毒入其心腑都不覺知欲出塵勞如撥油救火可不悲哉等語令人不能無疑於鏡虛之所謂大乘禪當以叢林之所斥者為是又見楞嚴經云在彼定中諸善男子見色陰消受陰明白於明悟中得虛明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若非聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行穢因魔力故攝其前人不生疑謗等語亦可照破鏡虛之大乘禪也汾陽善昭顛濟和尚及蜆子和尚或雖食肉當以別論不可援以為禪法也朝鮮一代流行禪書有傳燈録拈頌集禪宗永嘉集蒙山和尚法語大慧書狀高峯禪要禪家龜鑑鞭羊機松雲政評注而著語而今佛教中央學林教科書中加入碧巖録蓋此録昔已流通于朝鮮叢林何以知之余見朝鮮紙印本古板碧巖録係是嘉靖五年在黃州心源寺開板者據是足知朝鮮禪界舊多提唱碧巖録之實證也今自朝鮮寺剎禪教兩宗三十本末寺派遣聰慧青年之僧侶留學于京城之佛教中央學林此所謂十方同聚會箇箇學無為此是選佛場心空及第歸者也此等佛子學成之日各歸本山分化諸方提唱碧巖録扶起臨濟宗是余之所希望也是余之所希望也寺剎階級本未關係按各本山本末寺法第二章寺格云寺格分為本寺末寺之二種而本寺只限於何何寺一個寺末寺亦分山內末寺山外末寺之二種山外末寺又分二種以何何郡何何寺為首班地以何何郡何何寺為方等地是也末寺亦依其創立之由緒法脈之關係區分三種一直末寺謂直屬於本寺者二孫末寺謂直屬於直末寺者三曾孫末寺謂直屬於孫末寺尚玄曰按朝鮮寺剎本無階級惟視勢力而為輕重即如各陵齋社皆在京城至近之地首禪宗之奉恩寺倚靖陵之勢力首教宗之奉先寺倚光陵之勢力皆所謂造泡寺剎也南北兩漢寺剎倚緇營之勢力江華傳燈寺倚史庫之勢力皆所謂軍炮寺剎以其勢力皆能號令於各寺又有各宮願堂寺剎僅得免其雜役之侵外他一切寺剎隸于內需司及禮曹而無勢力任人侵虐矣今之三十本山一依定法施行階級等分行政有條雖有千萬波旬無如之何其佛運之再回也歟住持資格老少履歷按各本山本末寺法第三章住持云本寺住持之資格須要具備四事者一年齡為滿四十歲以上之事二具足比丘戒更為受持菩薩戒之事三法臘為十夏以上之事四修學為大教科卒業以上之事也末寺住持之資格亦要具備四事者一年齡為滿二十五歲以上之事二具足比丘戒更為受持菩薩戒之事三法臘為五夏以上之事四修學為四教科卒業以上之事也尚玄曰釋迦如來悟道於雪山須達長者築祗洹精舍以處之惠能大士傳法於黃梅韶州信士修寶林古剎而迎之從諗和尚應郡人之請開趙州之東院義玄禪師為州官之邀闢臨濟之道場惟視道德之成就為寺菴之住持古法如是而已豈有關於年齡之老少哉釋迦如來三十成道六祖大師三十見性又當何如哉朝鮮禪祖太古禪師年三十八參無字話打破牢關懶翁大師年三十一入支那蒙平山指空兩師之印可西山大師二十一歲參芙蓉禪師得印可松雲大師年三十二參西山言下大悟若此四人生在今世俱不得為本山住持也住持資格年齡制限甚無謂也雖然世愈降而法愈末安得太古懶翁清虛松雲其人為住持哉然則不得不依世法隨其學事之履歷從其人望之老鍊選任住持之為得計也歟今世朝鮮僧侶老少思想各異爰分四段以表示之甲保守思想者禪門巨擘教林義虎佛學瞻富道行高潔或行化諸方或坐斷高峯以守古德之風儀每歎後進之態度此派謹守真理佛教者也乙改進思想者鑑世界之文化潮流依人民之智識程度講學布教改良革新打破舊習慣建立新宗教希望見真大師或日蓮上人之事業此派以下皆主通俗佛教者也丙調和思想者宗教倫理保守舊慣講學布教參的時宜導報四恩住持三寶丁混俗思想者形雖依於三寶志則在於五欲禪講工夫上少用力世俗事為邊多留意以道化俗勿言用俗變道可慮甲多在老年比丘之部分乙與丙多在中年比丘之部分丁多在青年比丘之部分也薦僧報府乃依前例現行法令寺剎住持任期三年法侶公薦選定住持申請就職受認可然後始得施行本寺住持就職則受朝鮮總督認可末寺住持就職則受地方長官認可此依前朝舊例為之者也按經國大典朝鮮睿宗元年頒行者也諸寺住持兩宗謂禪教兩宗也擬數人薦望禮曹移文吏曹磨勘差遣三十朔而遞如有所犯兩宗報禮曹核實治罪犯姦者并坐薦僧云云則寺剎僧徒𨽻于禮曹而但差批僧職之權屬于吏曹雖然此非頒行經國大典時始定之也其以前固已如是定之此有一證按筆苑雜記世宗朝人許誠性執嘗為吏曹判書奉公守正關節不到嫉人干請必反其意有一朝官例遷當補外寄請官南道乃授平安道邊郡在北方也一文士請為華職乃授外教外教卑職也興德寺僧一雲權詐多智計欲住斷俗寺誣公曰聞西都永明寺山水之勝欲往一住若斷俗寺則吾事去矣數日批下一雲住斷俗寺雲大笑曰已墮吾術中禁妻住寺是守清規按各本末寺法第十一章懲戒住妻子於寺剎內者止宿女人於寺中者處於謹慎之懲戒云云尚玄曰修行僧不犯色戒況於清淨道場之中率妻居住今兹寺法非禁帶妻禁其帶妻住居寺中寺剎之外則固無礙也僧侶娶妻自古已然按雞林志云僧住持修行者或犯戒律配白黑二山輕亦斥遣籍其子孫仍髠受差役僧娶婦者不得居寺又按高麗史顯宗王二十二年己巳六月徵有妻僧充重光寺役徒朝鮮僧齋叢話卷第八云舊有僧舍在湖南皈厚署之後岡世稱十六羅漢有靈驗香火不絶有僧尚雲居其寺娶妻生子憲府鞫之罰僧還俗云云其他史乘僧侶娶妻受罰者屢見不一見現世多主僧尼嫁娶之論者可見末法比丘不重戒律也今夫世間宗教實有多種規模各別有多妻者有一妻者有無妻者一多妻教即儒教回回教等禮記檀弓云舜葬於蒼梧之野蓋三妃未之從長妃娥皇次妃女英次妃癸比鄭注云帝堯時立四妃象后妃四星其一明者為正妃其三小者為次妃帝堯因焉舜不告而娶不立正妃但三夫人而已夏后氏增以三三而九為十二人殷人又增有三九二十七合三十九人周人上法帝嚳亦立正妃又三二十七為八十一人以增二十九并后為百二十一人其位后也夫人也九嬪也二十七世婦也八十一女御也禮記昏義所謂御妻也御猶進也侍也周禮天官以陰禮教六宮注云鄭司農云陰禮婦人之禮六宮後五前一王之妃百二十人后一人夫人三人嬪九人世婦二十七人女御八十一人鄭玄謂六宮謂后也婦人稱寢曰宮隱蔽之言后象王立六宮而居之亦正寢一燕寢五教者不敢斥言之謂之六宮若今稱皇后為中宮矣周禮天官九嬪注云嬪婦也昏義曰古者天子后立六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治以明章婦順故天下內和而家理也不列夫人于此宮者夫人之后猶三公之於王坐而論婦禮無官職內則曰夫婦之禮惟及七十同藏無間故妾雖老年未滿五十必與五日之御妻不在妾御莫敢當夕注云天子御妻八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕凡十五日而遍五日之御諸侯一娶九女夫人及二媵各有姪娣此六人當三夕次二媵當一夕次夫人專一夕凡五日而遍也白虎通云卿大夫一妻二妾士一妻一妾孔子出妻而亦有妾按情史云或問孔子有妾乎觀孔叢子載宰豫對楚昭王夫子妻不服綵妾不衣帛據此則孔子亦有妾矣評曰人知惟聖賢不溺於情不知惟真聖賢不違於情支那人娶妻之多始自二帝三王遞及隋唐與元明洎清帝王之家每有後宮數三千人以為常事百姓之家以其財力之多寡為衡而漫無限制德國人花之安曰古之聖王惟縱一己之欲而定為多妻之制乃又懼婦女之各不相容也於是更以能不妬嫉為婦女之美德儒家之書妻有七去之條曰無子去曰妬去又孟子曰不孝有三無後為大此言有妻無子者必當娶妾冀其生子以供奉祖宗之香火為妻者不當有妬忌之心也此謝安石之夫人劉氏所謂關睢等詩作自周公如使周母為之決不為此也惟我海東則自古王家嬪御之制悉倣支那不要多言至若士庶蓄妾之事始于麗季其明證則按高麗史忠烈王元年二月大府卿朴褕上疏曰我國男少女多而尊卑止於一妻其無子者亦不敢蓄妾異國人謂元人也來娶妻無定限臣恐人物皆將北流令臣僚許娶庶妻隨品降殺其數至於庶人得娶一妻一妾其庶妻所生之子得仕于朝皆比嫡子怨曠以消人物不流戶口日增矣婦女聞者咸怨且懼時宰相有畏其妻者寢其議不行云云雖然權貴宰臣能蓄妓妾矣按星湖集説官妓我國妓種本出於楊水尺楊水尺者柳器匠也麗祖攻百濟時所難制之遺種也素無貫籍賦役好逐水草遷徙無常惟事田獵編柳為器販鬻為業後李義旻之子至榮遂籍其名於妓妾紫雲仙而徵賞不已至榮死崔忠獻以紫雲仙為妾計口賦斂滋甚故遂降於丹兵矣後隸邑籍男為奴女為婢多為守宰昵寵故飾容粧習歌舞目之以妓妓樂漸熾上下媟不可復禁我朝因之列邑皆有醜穢之風往往掩耳國初有欲罷之議許文敬稠沮之曰奉使之臣必將劫奪良女其害尤甚遂不果朝鮮時代則文獻備考云太宗大王十三年癸巳命庶孽子孫勿敘顯職因右代言徐選之請也初太祖欲立文德王后康氏所生之芳碩為世子鄭道傳南誾李稷等附芳碩忌諸王子謀去之太宗誅道傳等如唐太宗故事徐選與道傳有隙乘機逞憾道傳庶孽也故倡為庶孽子孫勿敘顯職之議選罷朝而歸解其朝衣其妻問曰今日朝廷有何事選曰以余陳達防塞庶孽其妻失色曰公其無嗣乎後果如其言此見朝野僉載宣祖大王初年庶孽申蕢等一千六百餘人上章籲冤宣廟覽之感動乃下教曰微子商王之庶子而孔子稱仁子思孔子之庶孫而道統自傳葵藿向日不擇旁枝人臣願忠豈必正嫡後世正祖大王時有一書名葵史辨護庶孽此則朝鮮公卿大夫蓄妾之證也且以今俗觀之無論何等社會所屬之人資財少裕則必蓄妾以為第一之行樂無上之受用乃至有蓄八妾之多者俗所謂八仙女遂以成俗此皆儒教之風化也故余謂儒屬多妻之教也朝鮮習俗有一怪事凡於婚配忌避元嗔元嗔者即十二地支中云有冤對相沖今舉其例子年生者與未年生者寅年生者與酉年生者辰年生者與亥年生者丑年生者與午年生者卯年生者與申年生者巳年生者與戌年生者男女同年生者亦忌婚配云有不祥之事互為元嗔而有訣法曰鼠忌羊頭角牛嗔馬不耕虎嫌雞嘴短兔恨猴不平龍憎豬面黑蛇驚大吠聲者是也今此忌字嗔字嫌字恨字憎字驚字皆即形容兩間元嗔殺氣有元嗔殺者配為夫妻則生忌嗔嫌恨憎驚等事以致反目俗云踈薄妻拒夫而不納謂之內踈薄夫對妻而不見謂之外踈薄一家庭內有如是事金叉屢當問數之卜錢玉閨時行解殺之巫事凡係此類雖屬迷信而細究之不無大關係於女俗也若以常情推測之則朝鮮人家夫妻不和大概不出二種原因一約定婚姻之權惟任父母之命而當事者不得當面看善故子都之美男易得無之醜婦道蘊之巧妻常伴凝之之拙夫謝道蘊初適王凝之甚不樂叔父謝安曰王郎逸少子汝何恨乎鮮有舉案之孟光難得畫眉之張敞也一妻兒之所望者良人而已若其良人卜有房中花妾之專寵朝鮮俗諺謂少艾之妾曰花草則其妻兒寧無路下石佛之背面朝鮮俗諺夫若卜妾則其妻之情雖路下石佛亦可背面若以佛理解釋之則是相當於冤憎會苦愛別離苦八苦一曰生苦二曰老苦三曰病苦四曰死苦五曰求不得苦六曰五陰盛故七曰冤憎會苦八曰愛別離苦楞嚴經云汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏綿惟殺盜淫三為根本以是因緣業果相續由是觀之世間因緣毋論善惡無非業定若不除去根本無明難免此苦故余為之頌冤憎相會愛相離世世纏綿業果隨欲得休除如是苦勿生貪戀及嗔癡亞剌非亞回回教祖摩哈默特年二十五娶麥加都城富室之寡婦加地亞者再娶寡婦名掃達者又娶七歲幼女名阿言謔者及其終身凡娶妻十一人雖然回回教之定例準人民娶四妻摩哈默特因娶妻過多自犯其所定之律法不可以責人遂於可蘭經摩哈默特所自製之回回教經書也添入一説曰先知乎先知摩哈默特所自謂也賜汝多妻逾衆信徒此為先知應享之格外利權也凡受汝財禮之女人汝家所有之婢媼以及順服先知之信女如汝願娶皆可娶之不限其數云云印度之孟加拉省古廉人中多娶之風最盛一個婆羅門人可娶五十妻雖以七十歲之老翁亦可娶十歲之童女朝鮮亦有此風古廉人之多娶不過欲多得女家之奩贈相傳有一人曾娶百妻皆於成親收受奩財之後即棄之於嶽家去而之他若非嶽家多送禮物來接之則不再見之也已上所列儒與回回皆多妻之教也亞米利加洲有母婁門多妻之教姑略焉二一妻教即基督教景教舊約創世紀云耶和華神以土造男名曰亞當又取亞當之一脅骨造一女人名曰夏娃為之作偶景教家曰上帝始造男女使男人離其父母與妻相合為一身此自然之正理也逮後人欲日侈洪水以前已有多妻之人雖猶太列聖之中如亞伯拉罕雅各輩亦沾染其惡習無怪民間富貴人家之競尚多妻矣摩西耶教之先知也在世之時此風最盛而摩西定律不為設法禁之反準行之故申命記云人娶妻後知妻有疵而厭棄之則作離書付於其手出之可也至耶穌降生之後始知多妻之習慣故馬太福音第五章云若人出其妻當與之以離書惟我語爾凡非以淫故而出其妻者則使之有淫行也人若娶被出之婦亦淫行也又馬太第十章云但創造之時神造之為男為女緣此人當離父母好合其妻而二者將為一體夫如是不復為二乃一體矣然則神所耦者人不可分之也又馬太第九章云耶穌離迦利利至猶太境約但河外羣衆從之耶穌在彼醫其中之病人勃利塞人就而試之曰人無論何故出妻可乎耶穌答曰經載造物之主原始造人乃造一男一女又云人可離其父母與妻好合二人成為一體此豈爾未讀乎如是夫婦不復為二乃為一體故天主所耦者人不可分彼衆曰然則摩西命與離書出之何也曰摩西因爾心忍容爾出妻但元始則不然我語爾若非為淫故出妻而他娶者即犯姦也娶被出之婦者亦犯姦也門徒謂耶穌曰人於妻女此寧勿娶耶耶穌曰此言非衆人所能受惟蒙賜者能之蓋有生而閹者有被人閹者又有為天國自閹者此言誰能受則受之現今歐米景教之國一妻之俗蓋自耶教廣布之後始焉而舊教之神父必守童貞倫敦教之牧師娶與不娶視其當人自願誓約希臘教之黑神父不準娶妻而白神父還可娶妻皆是後來成規而非耶穌所定之律法也神父牧師不娶妻者即耶穌所云為天國自閹之義也故吾謂耶穌一妻之教也三無妻教而兼一妻教即佛教佛成佛前亦娶三妃法苑珠林云因果經云太子至年十七王集諸臣而共議言為訪索婚有一釋種婆羅門名摩訶那摩其人有女名耶輸陀羅顏容端正聰明智慧賢才過人人禮備舉有如是德故索為妃太子雖納為妃常與妃行住坐臥未曾有世俗之意但修禪觀又普耀經云時諸力士釋種長者啓王若太子作佛斷聖王種王曰何所有玉女宜與太子為妃以權方便令當試之王告左右梵志入迦夷衛國編瞻周行覩一玉女淨猶蓮花是執杖釋種女名俱夷見太子奇異才術以女俱夷為菩薩妃又年十七王為納妃簡選數千最後一女名曰裘夷端正第一神義備舉是則宿名賣華女也雖納為妃久而不接婦人情欲有附近心太子却之婦不敢近諸女咸疑太子不男太子以手指妃腹曰却後六年爾當生男遂以有娠又五夢經云太子有三妃第一妃姓瞿曇氏是舍夷長者女名水光其婦名餘明婦居近邊城生女之時日欲將沒而餘明照其家內皆明國主字之瞿夷此言明女即是太子第一妃也第二妃生羅雲名耶檀亦名耶輸其父名移施長者注按瑞應本起經及智度論並云羅睺羅是第二耶輸生依五夢十二遊經等云第一妃生十二遊經前無如是説復闕流通恐是西方諸羅漢別集釋前卷已會之本第三妃名鹿野其父名釋長者太子以三妃故白淨王為立三時殿注云依西方一年立為三時春夏冬不別立秋用四月為一時故云三時殿也別有二萬婇女以娛樂太子據是則太子出家之前為納三妃又有二万婇女情欲淡泊謂之革囊臭穢一無所犯至若以手指腹六年生子亦是千聖所無之事也然則釋尊為太子時雖有多妻其實無妻此亦千聖所無之事也太子出家成佛之後所説律法有二段焉一則不許有妻出家比丘是也一則但許一妻在家居士是也今略比丘尼及優婆夷也其不許有妻則如大般若波羅蜜多經云舍利子白佛言世尊諸菩薩為當要有父母妻子諸親友耶佛告舍利子或有菩薩無有妻子從初發心乃至成佛常修梵行不壞童真其許有妻則佛告舍利子或有菩薩具有父母妻子眷屬而修菩薩行又云或有菩薩方便善巧示受五欲食色利名睡厭捨出家修行梵行方得無上正等正覺即如維摩經所云長者維摩詰居毗耶離城雖為白衣奉持沙門清淨律儀雖處居家不著三界示有妻子常修梵行又云示有妻妾婇女而常遠離五欲淤泥又如無量壽經云世間人民父子兄弟夫婦家室中外親屬當相敬愛無相憎嫉有無相通無得貪惜言色溫和莫相違戾其但許一妻則如華嚴經第二離垢地品性不邪淫菩薩於自妻知足不求他妻他人妻妾護女親族媒定及為法所護尚不生貪染之心何况從事况於非道云今夫耶教尚有為天國自閹者又有為天國不娶之教士以此例彼不可獨於佛目之以厭世消極無妻絶種之教也佛教之比丘之不娶妻亦如耶教之教士而已豈有他義哉雖然有妻無妻於修道上有懸殊者存焉何也如傳燈録云有一俗士問西堂智藏禪師曰有天堂地獄否師曰有曰有佛法僧寶否師曰有更有多問盡答言有曰和尚恁麼道莫錯否師曰汝曾見尊宿來耶曰某甲曾參徑山和尚來師曰徑山和尚向汝怎麼生道曰他道一切總無師曰汝有妻否曰有師曰徑山和尚有妻否曰無師曰徑山和尚道無即得俗士禮謝而去朝鮮現行各大本山大本山首寺也本末寺法第六十條云帶妻食肉之僧侶不許受持比丘戒又第八十七條云若止住妻子於寺剎之內又止宿女人於寺中者處於謹慎之懲戒寺剎之內不許住妻以是解釋則寺剎之外似無礙也但帶妻食肉者不許受持比丘戒以此觀之帶妻之事雖似默許但不認為行解具足之比丘也蓋比丘者具足二百五十戒清淨律儀比丘二百五十戒則以戒為先菩薩十戒則以戒殺為首此是出家法侶所當受持者也華嚴經所云於自妻知足不求他妻大般若經所云具有父母妻子眷屬而修菩薩行無量壽經所云父子兄弟夫婦家室中外親屬當相敬愛維摩經所云雖處居家不著三界示有妻子常修梵行示有妻妾婇女而常遠離五欲云云等皆是吾人在家居士之所當奉行者也儒與回回為多妻教而納出之權但在男偏與今男女同權之法漸相違背蓋被耶教之所壓倒也惟吾佛教包括多妻一妻及無妻而其義最廣其理甚博也原夫婚嫁之禮節不過宗教之形式雖然母論何教精神形式並行然後其教生命可以永存譬之於人有肉身而靈魂棲止無靈魂而肉身死去也今於朝鮮儒耶及佛三教並行而儒教有交紅絲巹杯之婚禮式耶教有著黃金指環之婚禮式而儒式則支離繁瑣耶式則簡易便當儒式則費用奢華耶式則省略節儉儒式之於我朝鮮人生産程度多有不合之點故識者寧欲從耶式之簡便以改儒式之繁瑣也朝鮮佛教衰退頗久一般人民以為佛教者屬於僧尼專有之權而俗人奉佛則慮其滅種絶嗣惟以飯僧供佛作來生之福為極則之目的殊不知在家奉佛之信士信女於一佛弟子四部大衆佛之弟子有四部衆出家男曰比丘女曰比丘尼在家男曰優婆塞女曰優婆夷但出家僧尼能離財色專心修道故為在家男女之師表而已占有二部也方今之時佛教復興從此以往朝鮮全域在在處處布教之堂星羅碁布奉佛之人如麻似粟佛徒婚嫁之禮當依佛式行之按朝鮮世祖大王諺譯流通之釋譜詳節月印千江之曲云過去普光佛普光佛或云定光佛即燃燈佛時善慧仙人即釋迦牟尼佛教導五百外道之迷誤者此五百人願為弟子各各奉獻銀錢一個靈山會上蒙佛授記之五百弟子即此五百人爾時燈明王燈明王即普光佛出世時之國王也欲請普光佛供養出令國中好花勿賣持來王所善慧仙人聞之歡喜往有花處逢賣花女俱夷俱夷即悉達太子妃亦即耶輸夫人也俱夷持有七莖花欲應王令藏置瓶中善慧精誠至極感花涌出善慧欲買其花俱夷曰將奉大闕獻上于佛故不能賣善慧曰以五百銀錢願買五枝花俱夷問曰將用何處善慧答曰供養于佛俱夷又問供佛何用善慧答曰欲成一切種智濟度衆生俱夷思惟是男子精誠至極不惜寶貝乃謂曰將進此花惟願我生生為君子妻善慧答曰我修善行求無為道生死因緣不能聽許俱夷曰不從我願則不得花善慧曰將從汝願而但我愛布施不違人意汝勿毀我布施之心俱夷曰如君子言我女子也不能持往故今寄託二枝花奉獻於佛令生生勿失我願也爾時燈明王領率臣民以種種供養出城迎佛獻供名花諸人供養已畢善慧先獻五枝花皆留空中作花臺復獻二枝花亦留空中王及天龍八部歎未曾有普光佛讚歎授記曰爾過阿僧祇劫此云無數劫當得成佛號釋迦牟尼佛又按大方廣佛華嚴經入法界品第三十九之十六勝日身如來出世時有威德主太子即釋迦牟尼佛與具妙德童女即耶輸夫人結婚拜佛故事尚玄曰以上二事作為表法余今擬定佛式花婚儀節如左主禮法師引導新郎新婦向佛跪坐各有陪導立於兩側郎婦焚五分香唱三歸依法師唱導郎婦隨唱郎婦俱向佛三拜後各皆起立靜聽法師以梵音聲而説頌言今此水月道場覺皇教堂優婆塞某氏名優婆夷某氏名優婆塞優婆夷或可代以清信士清信女約既結於伉儷禮將成於婚姻謹遵如來因行時之故事共誓必求無為道之大願恭行七枝花之獻供伏請十方佛之證明唱已即令新郎奉五枝花先獻于佛次令新婦奉二枝花經由郎手又獻于佛皆法師接遞插佛前花瓶娘婦俱向佛三拜後皆起立主禮法師問新婦云我以如來因行故事作為表法今問於汝汝可一一真實對答汝自今日託身於某為其妻配能從其願同修善行求無為道不尊重父母不恭敬師長不友睦親族不愛恤貧窮哀愍孤獨能大慈悲不惜布施不承事供養三世諸佛能不退轉能無疲倦不新婦合掌答云俱皆情願主禮法師問新郎云菩薩性不邪淫汝於自妻知足不不求他妻不他人妻妾護女親族媒定及為法所護不生貪染之心不此亦依華嚴經第二離垢地品中語新郎合掌答言我於自妻知足不求他妻餘亦奉教主禮法師乃使新郎加花冠于娘頭此是威德太子妙藏光明寶冠之表法又被紅裳于娘身以手授受亦可此是威德火焰摩尼寶衣之表法郎婦三拜于佛大衆起立異口同唱如來十大發願文四弘誓願及讚佛偈法師告禮畢郎婦先出會賓隨散財産保管提出目録前朝之末佛教益衰寺有財産任人侵奪即如陰城那守朴準禹以本郡聖住寺所有土地附屬學校事請願于內部丙午三月一日江華郡普昌學校長李東暉以本郡鎮海寺所有土地附屬學校事請願于學部又李東暉以積石寺所有畓九石五斗落田十一斗落及柴場全部附屬學校事請願學部而承認丙午五月十九日黃州郡守朴元教以毀撤本郡境內寺剎瓦材使用於本郡義務學校寺有土地附屬學校補用於教育經費事請願于學部丙午四月二十一日江西郡守以本郡境內寺剎瓦材等物及所有土地并屬學校事請願于內部楊州郡東興學校長鄭寅琥以水落山德寺所有土地及塔坪所在聖寺土地并屬學校事請願于學部丙午六月十三日高原郡守以本郡大乘寺所有土地附屬學校事請願于學部丙午七月二十五日金化郡守以水泰寺所有土地附屬學校事請願于學部如是情弊不一而足于時華溪寺僧洪月初奉元寺僧李寶潭等設立明進學校于元興寺聚集諸山青年僧徒教授普通新學爰舉諸寺財産被侵事情訴冤于內學兩部乃發訓令于十三道觀察府以防其斃隆熙二年七月內訓二六三號各地方寺剎所有財産保護之件各地方寺剎之所有田畓及山林本以遠近士民慈善的寄附金及古今僧侶誠心鳩聚之金額買置而千餘年或幾百年守護保管者也挽近以來地方官憲不顧物權之所屬稱以補用於教育實費有移付寺有財産於學校等弊非徒各寺僧侶轉相疑懼由此而生誤解故兹以訓令其訓諭管下各府郡嗣后地方官憲母得檀將寺有田畓及山林移屬他處可也尚此訓辭一一指飭于各寺剎使一般僧侶善為知悉輕少之事亦無遺漏雖一僧無有不聞不知之弊可也按明治四十四年七月八日寺剎令施行規則凡係寺剎所屬土地森林建物佛像石物古文書古書畫梵鍾經卷佛器佛具及其他貴重物品本寺住持作目録書提出於朝鮮總督為可尚玄曰按朝鮮寺剎所有土地有四種名一曰佛香畓畓義如字即王家恩給之田結以為供佛香火者故名例如大本山安邊郡釋王寺朝鮮太祖以願堂故賜給田民環寺五里之內土地山林民丁并皆劃給本寺宣祖壬辰大兵將至一寺僧衆蒼皇奔散有一個深心僧將本寺田民之契券盛之甕中埋藏寺後及亂平僧衆歸寺開甕視之其契券為雨漏濕氣腐壞殆盡惟殘一小部分可考山下居民耻為奴婢隱之不言因作己物故寺有田結十失八九其所餘者歲收米僅三百石今猶保存者此也尚玄曰羅國時代諸山寺剎之有奴婢亦猶朝鮮時代各郡鄉校之有奴婢也蓋自案崇重師道俾以威供於役使籍隸寺中耕作寺田寺若凋殘僧衆衰弱奴婢跋扈不可復制往往摧燬本籍寺之事碑以掩其為奴之耻例如水原葛陽寺本有高麗光宗時惠居國師之碑後為寺奴所毀幸其碑文之印本留傳寺下村孔氏家而記有毀碑之事實云云然則朝鮮寺剎古碑之失於寺奴之手者不知其凡幾也或云前日朝鮮男寺當牌當牌猶云當道本皆寺奴故稱居士而見僧則自稱小七拜敬恭如奴之見其主也此説似確耳又有有結無土者例如大本山廣州郡奉恩寺所有田結甚多至于後世佛教漸失勢力寺有田土小作人等兩班作人凌侮寺僧不納稅租寺僧苦之告于王家還納土地代以無土之結劃得結米年三百石以無契券故後并失之二日影畓祖師及禪僧影堂年一次致祭之田結故名三曰祭位畓無論僧俗寄附寺中年一忌祭之田結故名四曰法畓法師所遺田産之名在籍寺僧一門一派世世相傳粥飯養活之田結故名門派斷絶則屬寺中為公有之田寺法以前漫無統紀多有姦僧擅賣土地并及古物例如大本山黃州郡成佛寺本屬富裕十餘年前有一惡僧盜賣淨盡今之僧徒無可資活又大本山平原郡法興寺寺法認可最初住持李順永者姦弄變賣寺有田土逃身還俗楊平郡龍門山菩提寺舊有古鍾一事稀世之物前韓隆熙三年退俗僧鄭華三為名者賣渡于京城倭將臺下東本願寺別院僧尼分限給付度牒按各本未寺法第八章僧規第一欵分限凡出家者定師僧入寺行得度式受度牒後享有僧尼之分限度牒樣式第號度牒何府郡面寺止住某人徒弟大正年月日於某山某寺得度氏名年月日生右依本末寺法第條為藏持護信證授與之者大正年寺印月日何府郡本山何寺住持某職印按前朝初葉經國大典有度僧條其後禮典增度牒式如左禮曹牒學生某年甲本某官父某職某外祖某職某本某官本曹啓過準禪宗教宗同呈該某處住某職某狀內男某願納丁錢出家為僧名某伏乞出給度牒據此照遵舊例具本於某年月日某承旨臣某奉教依允敬此移關該司收訖丁錢合給度牒者年月日牒判書押參判押參議押正郎押佐郎押行解履歷學設兩科朝鮮僧侶謂學科曰履歷按各本末寺法第八章僧規第二欵行解戒律禪定謂之行智慧謂之解僧尼將具足戒定慧者也故分普通科及專門科之二種修此三學普通科或在寺內又或入普通學校修之為可專門科則在本寺或末寺專門道場設備之處修學專門科之學科又分必修科目隨意科目之二種必修科目之學科及所修年間如左第一沙彌科一個年或有以三個年為限之寺剎此則加入沙彌律儀緇門警訓禪林寶訓受十戒朝暮誦呪般若心經初心文發心文自警文第二四集科二個年禪源諸詮集都序大慧書狀法集別行録節要並入私記高峯禪要第三四教科四個年有以二年六箇月為限者首楞嚴經大乘起信論金剛般若經圓覺經第四大教科三個年有以三年六個月為限者加入十地論禪家龜鑑妙法蓮花經華嚴經禪門拈頌景德傳燈録前條規定以外之科目則任其本人之根基以為隨意所修之科目尚玄曰按釋迦如來為童子時通達世間一切事業學了五明印度有五明之學一聲明二工巧明三醫方明四因明如今之論理學五內明乃至四韋陀經典算數武藝無不通之即如今之普通學科專門學科也然後出家修心悟道成等正覺二祖慧可大師自幼志氣不羣博涉詩書尤精玄理後覽佛書超然自得乃嘆息曰孔孟之學禮術風規莊易之書未盡妙理棄之去從達磨大師傳持心印然則先通世間之學後入于出世間之道者自是佛祖之遺範也雖然今世幼年僧侶攻究俗學者舉多還俗佛志未立世味嘗新故也如是等輩根性下劣本非為法出家乃是謀生托身者也退亦佳矣不足為惜今由僧學科目觀之專注重於教宗義理之學而不致力于禪門參究之法是亦朝鮮佛教之現象也受白羯磨始入禪堂受白羯磨此謂受戒百丈語録夫語須辨緇素須識總別語須識了義教不了義教語了義教辨清不了義教辨濁説穢法邊垢揀凡説淨法邊垢揀聖從九部教説向前衆生無眼須假人雕琢若於聾俗人前直須教渠出家持戒修禪學慧若是過量俗人亦不得向伊與麼説如維摩詰傅大士等類若於沙門前説他沙門已受白四羯磨訖具足全是定慧力更向他與麼説名非時語説不應時亦名綺語若是沙門須説淨法邊垢須説離有無等法離一切修證亦離於離云云今兹寺法云得度後年齡至二十以上者可得受持比丘戒但帶妻食肉之僧則不許受持比丘戒非具足了比丘戒者不得受持菩薩戒具足了比丘戒者得入禪堂安居夏安居始於四月十五日終於七月十四日冬安居始於十月十五日終於一月十四日皆以陰曆言之以結制安居九十日為法臘一歲法臘依夏安居之數為計算但得本寺之特許亦得加算冬安居於法臘被紅袈裟最上法階按各本末寺法第八章僧規第三欵法階法階之名稱等級如左大禪中德禪師大禪師授於專攻禪宗者大禪中德大德大教師授於專攻教宗者凡授法階在本寺中每年一試授與法階於合格者有大禪師大教師之法階者得稱堂號法階證書樣式初授法階登録第號何府郡面山寺止住某徒弟何某年月日生右依本末寺法第條授大禪法階者年月日寺印何何本山何寺住持何某升授法階登録第號何府郡面山寺止住大禪何某年月日生右依本末寺法第條升授中德法階者年月日寺印何何本山何寺住持何某但最上階大禪師與大教師韓韓法階者間韓添入公許稱堂號五字韓又按各本末寺法第八章僧規第三欵衣制僧尼衣冠匹對法階而被著之其色別地質及制式等如左本寺住持不拘法階得被最上級之衣冠大禪師大教師法冠毗盧冠袈裟紅色有紋絹紬九條乃至二十五條長衫紫色有紋絹紬長衫形但道服有後別幅尚玄曰按高麗時僧之法衣以紫為貴故有賜紫沙門之稱又按高麗圖經云國師之稱蓋如中國之有僧職綱維也其上一等謂之王師王見則拜之皆服出水衲袈裟長袖偏衫金跋遮下有紫裳烏革鈴履人物衣服能略與中華同三重和尚長老律師之類也服紫黃貼相福田袈裟長袖偏衫下亦紫裳位在國師之下講説經論傳習性宗擇聰慧辨博者為之阿闍梨大德位降三重和尚一等分隸教門職事其服短袖偏衫壞色挂衣五條下有黃裳國師三重不過數人而阿闍梨一等一等人數極衆未究厥旨沙彌比丘自幼出家未經受具壞色布衣亦無貼相戒律即高方易紫服以第遷升乃有衲衣蓋高麗僧衣唯以磨衲為最重耳按三國史新羅諸寺成典成典謂官制也僧職有襟荷臣赤位青位等之稱號疑亦以被著法衣分別色地定其位階者也又按三國遺事有孝昭王敕不著黑衣若為僧者不令入鍾鼓寺中之文推此可知羅僧法衣本係黑色也至高麗及朝鮮則按星湖僿説人謂我東宜色尚青黑出自道詵麗祖崇信道詵至矣然其訓要十條亦不及此忠烈王元年太史局言東方木位色當尚青而白者金也國人多裼以白紵木制於金之象也請禁白色從之又不及道詵恭愍王六年司天監于必興上言玉龍記即道詵記云我國始乎白頭終于智異其勢水根木幹之地以黑為父母以青為身今後文武百官黑衣青笠僧服黑巾大冠女服黑羅以順風土從之余意玉龍之説後來多添益詵若有此説宜僧徒之先遵而白衲白巾今古不變何也天下衆水同皈于海五嶽山脈莫非木幹然殷人尚白而享國五百年箕子白馬朝周亦可證也不變舊制東俗因之厥享國乂千歲安在乎木之受制耶禮不忘本我東之白衣其義實叶不但不必改亦不當禁也按遺教三昧經佛在世時衆僧被服惟著純真死人雜衣弊帛自後起比丘羅旬踰每行分衛謂乞食也輒飢空還佛知其宿行使衆僧分律五部服食亦五種令其日隨一部中行遂制儀則各舉所長各其服色曇無窟多部通達理味開道利益表發殊勝著赤袈裟薩和多部博通敏達導以法化應著皂袈裟葉維部精勤勇快攝護衆生應著木蘭袈裟彌沙塞部禪思入微究暢幽玄應著青袈裟摩訶僧伽部勤學衆經敷説義理應著黃袈裟自爾以後便大得食何以故是羅旬踰前世無德之所致也阿難問佛言羅旬踰前世無德云何得作沙門佛言此羅旬踰宿世為賢者子作人疾妬見沙門來分衛輒逆門戶言大人不在沙門後過餘家沒牽通適見他人布施飲食歡喜行會便復念言我亦欲作沙門故今窮困如此尚玄曰若從此制則禪宗僧應著青袈裟教宗僧應著黃袈裟也舉揚宗旨導報四恩按谷本末寺法第九章布教布教目的舉揚宗旨善導衆生修養信念務報四恩四恩者心地觀經所云父母恩君王恩衆生恩及三寶恩尚玄曰夫四恩者曰君王恩曰父母恩曰衆生恩曰三寶恩為教師者宣揚佛旨指導人民將如何以報君王恩如新羅圓光法師教貴山項世俗五戒事君以忠臨戰無退後果如其教此可以為法也將如何以報父母恩曰以孝道報父母恩即如大舜之德曾子之行與夫養口體養志立身揚名以顯父母乃至氷鯉雪笋懷橘扇枕等世間之孝儒書詳之今不必多言而世或有以佛為蔑倫絶嗣不孝莫甚者不可不辨朝鮮中葉芙蓉靈觀大師清虛休靜禪師之師也其言曰出家者遁世以求其志變俗以達其道變俗則不與世典同禮遁世則宜高尚其迹達三乘開人天拯五族拔六親猶如反掌也是故雖離乖天屬之重而不違其孝云云此即出世間之孝也孝至拯拔五族六親而極矣奚止立身揚名以顯父母而已哉蓮宗寶鑑云念佛乃諸法之要孝養為百行之先孝心即是佛心孝行無非佛行欲得道同諸佛先須孝養二親故願禪師云孝之一字衆妙之門佛語以孝為宗佛經以孝為戒言中不昧口出戒光直下分明頓開心地夫孝者有在家之孝有出家之孝在家之孝者父母愛之喜而不忘父母惡之勞而不怨承順顏色以盡養生出家之孝者割愛辭親餐微契本深入無為之理上酬罔極之恩趣解脫之要途報慈親之捷徑非但未來獲益亦於現世成功所以如來子夜踰城道圓雪嶺盧能白金遺母法繼黃梅然而以法斷恩應思報德是以迦維省父忉利寧親至於貧乏無依理合躬親給侍是故畢陵迦起盡心之戒忍大師有養母之堂陳睦州織屨供親朗法師荷擔遊學然則出家者以法味為甘旨不忘返哺之心以佛事為勤勞未遺世諦之禮非但一世父母而多生父母皆報不惟一身父母而法界父母皆度同登覺岸豈非周公之配天普示迷津故逾考叔之純孝出家之孝其利博哉如或因緣未和父母不聽宜盡在家之孝修出世之因若能即俗而真亦有成佛之路覬反嬰兒之行無虧膝下之嚴復雙親顧復之勞致一乘圓滿之地遂使在家菩薩行解無礙出俗高人因斯可鑑其有局於事佛不能盡於事親覩兹有感于中可以克全其孝嗚呼光陰易往父母難忘有親在堂如佛在世以此報親之德圓成念佛之功如父母喜歡則諸佛喜歡此心清淨則佛土清淨可謂野色更無山隔斷月光直與水相通將如何以報衆生恩一切衆生同業相感依報共受同此佛土皆有佛性既無彼此焉有親踈墨之兼愛耶之博愛孔之仁愛其猶病諸惟我佛道能報其恩將如何以報三寶恩在家出家修道行道千百公案八萬法門開示悟入佛之知見惟一事實餘二非真將此深心以奉塵剎是則名為報佛之恩監務法務分掌職司按各本末寺法第四章職司本寺職員置監務一人監事一人法務一人是謂本寺三職管掌事務法要監務從住持指揮總理事務法要而住持不在之時則代理住持之職務監事為東班長而指揮監督書記並附屬員掌理庶務及會計事務法務為西班長而指揮監督書記並附屬員掌理法儀會式及其他一切法務書記從上職之指揮分掌庶務會計法務附屬員無論東班西班依舊慣例凡知賓知殿典座等之名目存而不改從上職之指命各各從事於其主務本章三職監務監事法務依山內比丘僧之公選定其候補者而本寺住持任命之書記及附屬員本寺住持就山內比丘僧中選任之末寺要置職員之時須得本寺之承認準據本章之規定得置必要之職司尚玄曰住持事繁輔佐人多檀徒信徒外護俗衆按各本末寺法第十二章攝衆以寺剎之外護員具備二要件事者稱為檀徒一信心堅固為財施之事二一家之葬祭追福委託之事以寺剎之外護員信心堅固為財施者稱為信徒尚玄曰支那朱子酷信風水三遷父墓此之遺風沾染朝鮮儒宗之人勢力之家或移轉僧舍而營墳或占奪民山而遷墓五百年間其害甚巨到今思之墓地禍福迷信等説既已自破葬式觀念亦隨以變今試言之其葬於土也不過埋骨於北邙青山纍纍冢墓之間其葬於火也能為薦魂於西方淨土種種光明之中淨穢勝劣奚啻霄壤佛家檀徒葬祭追福委託寺剎實有幸也朝鮮佛式葬儀其法如左尸多林儀文五方佛幡南無東方滿月世界藥師尊佛惟願大慈接引新圓寂某靈青琉璃世界中法主振鈴梵唱此文歸命阿彌陀佛大衆齊聲共唱以下倣此南無南方歡喜世界寶勝如來佛惟願大慈接引新圓寂某靈赤琉璃世界中歸命阿彌陀佛南無西方極樂世界阿彌陀佛惟願大慈接引新圓寂某靈白琉璃世界中歸命阿彌陀佛南無北方無憂世界不動尊佛惟願大慈接引新圓寂某靈黑琉璃世界中歸命阿彌陀佛南無中方華藏世界毗盧遮那佛惟願大慈接引新圓寂某靈黃琉璃世界中歸命阿彌陀佛十二佛南無西方極樂世界大慈大悲阿彌陀佛惟願金臺寶座乘空而來接引此身往生淨土法主唱歸命阿彌陀佛大衆唱南無西方極樂世界大慈大悲阿彌陀佛惟願便隨佛號脫此界身信受奉行安樂國土歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願觀音勢至引導而行隨上善人遊歷佛國歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願經行寶地遊戲園林大悟三空不聞八苦歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願阿維越地是不退心識彼無生達無生忍歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願金沙瑩水寶樹浮空悟四總持得六波羅蜜歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願遇無量壽得無量光自在優遊光相齊等歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願親近智者同上善人得遇如來便聞授記歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願得不動智成自在身五分香燃六度圓滿歸命阿彌陀佛南無西方極樂世界大慈大悲阿彌陀佛惟願還同諸佛大化人天以清淨身演淨妙法歸命阿彌陀佛南無西方極樂世界大慈大悲觀世音菩薩摩訶薩南無西方極樂世界大慈大悲大勢至菩薩摩訶薩惟願觀音勢至大願流行指授花臺令生淨土茶毗作法削髮沐浴洗手洗足著裙著衣著冠正坐施食入龕起龕舉火下火唱衣拾骨起骨碎骨散骨等皆有偈頌最後誦無常戒及法性戒無常戒夫無常戒者入涅槃之要門越苦海之慈船是故一切諸佛因此戒故而入涅槃一切衆生因此戒故而渡苦海靈駕汝今日逈脫根塵靈識獨露受佛無上淨戒何幸如也靈駕劫火洞然大千俱懷須彌巨海磨滅無餘何況此身生老病死憂悲苦惱能如遠違靈駕髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處靈駕四大虛假非可愛惜汝從無始以來至于今日無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅諸法從本來常自寂滅相佛子行道已來世得作佛諸行無常是生滅法生滅滅已寂滅為樂歸依佛陀戒歸依達摩戒歸依僧伽戒南無過去寶勝如來應供正遍知名行足善逝世間解無上士調御丈夫天人師佛世尊靈駕脫却五陰殼漏子靈識獨露受佛無上淨戒豈不快哉豈不快哉天堂佛剎隨念往生快活快活西來祖意最堂堂自淨其心性本鄉妙體湛然無處所山河大地現真光義湘祖師法性戒法性圓融無二相諸法不動本來寂無名無相絶一切證智所知非餘境真性甚深極微妙不守自性隨緣成一中一切多中一一即一切多即一一微塵中含十方一切塵中亦如是無量遠劫即一念一念即是無量劫九世十世互相即仍不雜亂隔別成初發心時便正覺生死涅槃相共和理事冥然無分別十佛普賢大人境能仁海印三昧中繁出如意不思議雨寶益生滿虛空衆生隨器得利益是故行者還本際叵識妄想必不得無緣善巧捉如意歸家隨分得資糧以陀羅尼無盡寶莊嚴法界實寶殿窮坐實際中道床舊來不動名為佛附安骨通語朝鮮涵虛得通和尚人生斯世未免形纍脫此形骸快如沖虛今者穴石以安之石鍾以覆之無奈籠野鶴而駐飛馹乎自道觀之凡人之遺體沉之可也埋之可也藏之可也露也藏也沉也埋也無施不可以世觀之沉之露之其情也薄埋之藏之其情也厚情之厚者名為孝情之薄者名為不孝不孝招咎孝也招慶宜人子之區區於此也迹此觀之為人子者凡於亡人之遺體其可忍視而不埋藏者乎藏則不無喚什麼作靈駕面目若喚此骨頭作靈駕面目面目安在若道不是此之骨頭從什麼處得來切忌道法身是常無生無滅色身無常有生有滅而於法身色身作兩般見解若作這般見解未免截虛空作兩片既然如是畢竟作麼生斷看不見道吾今色身即是常身法身若是常身法身天不能蓋地不能載劫火不能壞太虛不能容我今觀此頑石穴不滿尺餘鍾不過一仞還收得廣大難容底法身麼若收此中不得向什麼處安著還有道得者麼良久云如無山僧自道去也以杖指石龕云向這裏安安訖云靈駕平生使得父母所生底一把骨頭既向這裏安著正當恁麼時合談什麼話良久云利海毛孔元無礙芥納須彌有甚難無縫塔樣今猶在不須向外空尋覔一自鍾鎮此山後山與此鍾作知音直饒山倒為平野此鍾此鍾應不泯應不泯畢竟承誰恩力以杖擊石三下附新羅蛇福葬母元曉下語京師萬善北里有寡女不夫而孕既産年至十二歲不語亦不起因號蛇童下或作蛇卜又巴又伏等皆言童也一日其母死時元曉住高仙寺曉見之迎禮福不答拜而曰君我昔日馱經牸牛今已亡矣借葬何如曉曰諾遂與到家令曉布薩授戒臨尸祝曰莫生兮其死也苦莫死兮其生也苦福曰詞煩更之曰死生苦兮二公輿歸活里山東麓曉曰葬智惠虎於智惠林中不亦宜乎福乃作偈曰往昔釋迦牟尼佛娑羅樹間入涅槃于今亦有如彼者欲入蓮花藏界寬言訖拔茅莖下有世界晃朗清虛七寶欄楯樓閣莊嚴殆非人間世福負尸共入其地奄然而合曉乃還後人為創寺於金剛山在慶州東南額曰道場寺每年三月十四日行占察會為恆規福之應世唯示此爾諺多以荒唐之説託焉可笑讚曰淵默龍眠豈等間臨行一曲沒多般苦兮生死元非苦華藏浮休世界寬三國遺事褒賞善行三職評定按各本末寺法第十章褒賞凡僧尼有七善行之時本寺三職監務監事法務評定而受住持認可得行褒賞一沙彌又比丘精勤學業為他人之模範者二於教化上有顯著之功勞者三有修築伽藍之功勞者四救助貧民有設授産方法之功勞者五道路橋梁盡力修繕便益公衆者六心行節儉篤行投資於公益事業者七愛護山林勉勵植樹為造林之模範者糾明非為七目懲戒又按各本末寺法第十一章懲戒為糾明僧尼之非行而使歸於端正設其戒目一褫奪度牒二收奪法階三降級法階四停止説教五停止托鉢六謹慎七譴責尚玄曰按禪門規式始定于百丈大智禪師法諱懷海名曰百丈清規師曰吾所宗非局大小乘非異大小乘當博約折中設於制範務其宜也於是創意別立禪居凡具道眼有可尊之德者號曰長老如西域道高臘長呼須菩提為長老等之謂也既為化主即處于方丈同淨名之室非私寢之室也不立佛殿惟樹法堂者表佛祖親囑受當代為尊也所裒學衆無多少無高下盡入僧中依夏次安排設長連牀施椸架挂搭道具臥必斜枕牀脣右脅吉祥睡者以其坐禪既久略偃息而已具四威儀也除入室請益任學者勤怠或上或下不拘常準其闔院大衆朝參夕聚長老上堂升座主事徒衆雁立側聆賓主問酬激揚宗要者示依法而住也齋粥隨宜二時均遍者務于節儉表法食雙運也行普請法上下均力也置十務謂之寮舍每用首領一人管多人營事令各司其局也主飯者目為飯頭主米者目為米頭主菜者目為菜頭主園者目為園頭他皆倣此或有假號竊形混于清衆并別致喧撓之事即堂維那撿舉抽下本住挂搭擯令出院者貴安清衆也或彼有所犯即以拄杖杖之集衆燒衣鉢道具遣逐從偏門而出者示耻辱也詳此一條制有四益一不污清衆生恭信故業不善不可共住準律合用梵壇法治之者當驅出院清衆既安恭信生矣二不毀僧形循佛制故隨宣懲罰得留法服後必悔之三不擾公門省獄訟故四不泄于外護宗綱故四來問居聖凡孰辨且如來應世尚有六羣之黨况今像末豈得全無但見一僧有過便雷例譏誚殊不知以輕衆壞法其損甚大今禪門若稍無妨害者宜依百丈叢林格式量事區分且立法防姦不為賢士然事可有格而無犯不可有犯而無救惟百丈禪師護法之益其大矣哉云云百丈禪規有罰無賞山寺法有賞有罰分衛托鉢公證携帶各本末寺法第十三章雜則僧尼欲托鉢者以師僧及法類連署請願於本寺受免許證牌携帶為可年齡未滿二十歲者不許托鉢受了免許者紊亂風紀法儀之時繳銷免許托鉢者須要如法裝束自午前八時至正午十二時為限午後則從事勤行一如作法托鉢行裝則用禪宗所著之衣冠朝鮮禪宗衣冠本無定制今見此條未知以何為標準也尚玄曰今言托鉢古云乞食亦云分衛上古乞食以初日分斯則時勝此時則求乞不難若太早太遲非時乞食欲施即無不施又愧便成惱他乞之不得無餐又飢是惱自也按寶雲經云乞食之法一日只限七家無多貪故又云成就十法名乞食一為攝受諸有情二為次第三為不疲厭四為知足五為分布六為不耽嗜七為知量八為善品現前九為善根圓滿十為離我執肇法師乞食四意一為福利羣生二為折伏驕慢三為知身有苦四為除去滯著禮節應器常在左脅出時當外向以食來還當以內向靈嶽石樹道人前清康熙時人乞食偈入里乞食當願衆生入深法界心無障礙入里者分衛化道不擇貧富貴賤隨分而乞也當願者言乞食以度生為本也當與老成人俱若無人俱當知所可行處到人門戶宜審舉措不得失威儀家無男子不可入門若欲坐先當瞻視坐席有刀兵不宜坐有寶物不宜坐有婦人衣被莊嚴等不宜坐欲説經當知所應説時不應説時如來五時説法重在時字孔子學而時習之亦重在時字若非時説者雖聖經賢傳如金屑之貴落眼成翳故制不得説與我食令爾得福附凡乞食不得哀求苦索乞食佛祖行道之法式也自古相傳至尊至貴若乃哀求則與丐者何殊所以化導不行者為有此輩耳云云不得廣談因果望彼多施行護不得邪命教化擊發俗人令其惠施佛制乞食肅恭儀表日限七家次第行道離簷三尺空詣懷抱隨分納些毋論多少端默容靜説即顛倒而况廣談起諸貪惱多得勿生貪著少得勿生憂惱不得專向熟情施主家及熟情菴院處索食飢逢香飯固佳哉珍重應知內自裁縱使相邀踈禮節丈夫斷不食嗟來朝鮮自古來乞糧僧名曰棟梁僧棟梁出處見於高麗李相國集白雲居士李奎報之文集王輪寺丈六金像靈驗收拾記云今夫都城之北有寺曰王輪是海東宗新羅元曉大師嘗撰華嚴疏世人名為華嚴海東疏故稱海東宗曉嘗居芬皇寺故亦稱芬皇宗然則芬皇宗及海東宗即華嚴宗也曉公之所撰乃晉譯華嚴經疏故有疏序晉譯華嚴經疏序釋元曉撰原夫無障無礙法界法門者無法而無不法非門而無不門也爾乃非大非小非促非奢不動不靜不一不多由非大故作極微而無遺以非小故為大虛而有餘非促之故能含三世劫波非奢之故舉體入一剎那不動不靜故生死為涅槃涅槃為生死不一不多故一法是一切法一切法是一法如是無障無礙之法乃作法界法門之術諸大菩薩之所入也三世諸佛之所出也二乘四果之所聾盲凡夫下士之所笑驚若人得入是法門者即能不過一念普現無邊三世復以十方世界咸入一微塵內斯等道術豈可思議然依彼門用看此事猶是一日出三門外十人共坐堂內徑然之域有何奇特况乎須彌入於芥子者稊米入於太倉也方丈內乎衆座者宇宙內於萬物也內入甚寬何足為難乎哉若乃鳳凰翔于青雲下觀山嶽之卑河伯屆乎大海顧羞川河之狹學者入乎此經普門方知曾學之齷齪也然短翮之鳥庇山林而養形微鮝之魚潛涓流而安性所以淺近教門亦不可已之耳今是經者斯乃圓滿無上頓教法輪廣開法界法門顯示無邊行德行德無畏而示之階階故可以造修矣法門無涯開之的的故可以進趨矣趨入彼門者即無所入故無所不入也修行此德者即無所得故無所不得也於是三賢十聖無行而不圓三身十佛無德而不備其文郁郁其義蕩蕩豈可得而稱焉所言大方廣佛華嚴者法界無限大方廣也行德無邊佛華嚴也非大方無以廣佛華非佛華無以嚴大方所以雙舉方華之事表其廣嚴之宗所言經者圓滿法輪周聞十方無餘世界遍轉三世無際有情極軌窮常故名曰經舉是大意以標題目故言道大方廣佛華嚴經也恆轉法輪之大伽藍也寺有毗盧遮那丈六金像一軀聞昔有二比丘曰巨貧曰皎光同發願欲鑄成金像作俗諺所謂棟梁者其所謂棟梁者凡浮圖之勸人布施營作佛事之稱也朝鮮棟梁僧有擊木鐸者多誦千手呪修行者亦為之有擊銅鈸唱回心曲松雲大師所作者惟身貧道又貧者為之俗呼韓韓僧是象銅鈸之聲而為名亦即新羅大安大安之遺風也會玄記云唐初海東元曉者姓薛氏東海相州人也丱髮之年慧然入法隨師稟業遊處不常勇擊義圍雄橫文陳仡仡然桓桓然進無前却彼土謂之萬人之敵嘗與相法師入唐厥緣既差息心西往無何言語狂逸舉措乖踈同居士入酒肆倡家若志公持金刀鐵錫或製疏以講雜華或撫琴以樂祠宇或閭𨶒寓宿或山水坐禪任意隨緣都無定驗時國王置百座講仁王經遍搜碩德本州具以名望舉進之諸德惡其為人𧮂王不納未幾王發使入唐求金剛三昧經節王召大安聖者粘次焉大安不測之人也形服特異每在市擊銅鉢唱言大安大安之聲故號之也安曰速將付元曉講得餘人則否時曉在湘州謂使者曰此經以始本二覺為宗為我備角乘將案几在兩角之間置其筆硯始終於牛車上造疏成五卷又造略疏三卷於黃龍寺敷演王臣道俗雲擁法堂乃宣吐有儀解紛可則復唱言曰昔日採百椽時雖不預會今朝橫一棟處唯我獨能時諸名德俯顏慙色伏膺慙悔焉初曉示迹難知化人不定或擲盤而救衆或噀水以撲焚或數處現形或六方告滅亦杯渡志公之倫也又有元曉撰金剛三昧經論序云夫一心之源離自無而獨淨三空之海融真俗而湛然湛然融二而不一獨淨離邊而非中非中離邊故不有之法不即住無不無之相不即住有不一而融二故非真之事未始為俗非俗之理未始為真也融二而不一故其俗之性無所不立染淨之相莫不備焉離邊而非中故有無之法無所不作是非之義莫不周焉爾乃無破而無不破無立而無不立可謂無理之至理不然之大然矣是謂所斯經之大意也良由不然之大然故能説之語妙契環中無理之至理故所詮之宗超出方外無所不破故名金剛三昧無所不立故名攝大乘位一切義宗無出是二是故亦名無量義宗且舉一目以題其首故言金剛三昧經也朝鮮之內有惡種僧俗呼黨聚此黨聚僧名雖為僧其實賊也黨徒既多祕密共濟五逆惡罪六羣粗行無所不犯勿論飲酒食肉不憚殺人行盜亦有頭領號令指揮不居寺庵常處閭閻多行乞糧以為其業西北三道黨聚最多若逢真僧劫之入黨不入亦打是辱之也入之亦打是課之也故行腳僧畏避如虎若欲禁戢必依寺法嚴查其籍欲行乞者携帶公證又請官憲如法檢查則彼惡僧無所逃也和請舞鼓新式廢止各本末寺法第七章法式法式作法恪遵從來舉行之清規但和請鼓舞鑼舞作法舞等一切廢罷尚玄曰按新羅真鑑國師為我海東梵唄之祖自是以後輾轉相承音聲度人亦不少矣惟此一道京山為盛京山法侶不務禪講而惟梵唄是尚梵音集一卷為十年之工夫凡有法式之時打鼓鳴鑼作旋風舞又唱梵歌悠永清和此所謂和請鼓舞鑼舞作法舞者是也蓋作此法以悅檀施非但京山朝鮮寺剎並皆行之而梵唄之善者推京山僧為宗矣一自寺法施行以來一切廢止和請鼓舞殊不雅觀固所當禁雖然魚山調亦隨之而作廣陵散是可惜也朝鮮僧家從古以來遺傳一種行化之法如一寺剎被災掃蕩謀欲建立時聚羣僧多至五六十人不等作一團派謂之建立亦云羣衆派亦云金鼓以其鼓進金退一如軍法故名善舞踊者善打法鼓者善鳴法鑼者善戲謔者善書記者各有名目即云化主鼓手炮手花童舞童等遍行閭里及諸寺剎次第募緣高僧碩德皆樂為之例如金剛山之愚隱和尚寺重創化主也寺災師募緣重建未及落成而又災師又再建之退雲禪師四十年影不出山之講僧也亦嘗為花童焉未知此法出自何時疑即出自西山泗溟僧軍以後而至于近年並皆自廢矣天竺老胡昔傳祖印支那蕭梁元魏之時南印度香至王第三子菩提達磨航海而至寓止嵩山之少林寺終日面壁而坐凡九年乃得慧可密傳心印不立文字不依言語直指人心見性成佛此即圭峰禪師所謂西域傳心多兼經論無二途也但以此方迷心執文以名為體真如生滅故達磨善巧揀文傳心謂傳心於慧可也已下其傳法之機緣也標舉其名心是名也默示其體知是體也喻以壁觀令絶諸緣時問斷滅否答雖絶諸念亦不斷滅問何以證驗云不斷滅答了了自知師即印云只此是自性清淨更勿疑也如是心印輾轉傳授至于六祖慧能大士以後又分二派五宗支那禪宗於是大興而羅麗諸師一一傳其學朝鮮今日禪教兩宗九百寺剎七千僧尼無非為達磨之兒孫也印度高僧今付佛骨維大正二年八月二十日南印度錫蘭島高僧達磨婆羅來到京城草一日夜道俗男女數十餘人設歡迎宴于南山町之花月樓達磨和尚即於席上奉將如來舍利一顆傳附朝鮮佛教代表者爾時代表朝鮮佛教者乃金剛山榆岾寺沙門金錦潭和尚是也時金錦潭和尚為三十本山會議所院長來住京城覺皇寺昔印度五十三佛自來榆岾寺為東土像法之始今榆岾寺僧代表佛教時印度佛骨又來相傳真可謂千古奇緣也達磨婆羅和尚自言伊曾遊歷𨵙伽聖地按𨵙伽即古師師國得此舍利而藏之以待有緣之人云云於是朝鮮全土六千僧尼及諸檀越施納金錢改建覺皇寺於京城府壽松洞禪教兩宗三十本山聯合布教堂大正三年十二月二十九日奉安舍利是日也六花鋪地萬香繚空伎工之吹打如奏天樂信童之歌唱直擬梵讚龍天歡喜士女奔波瞻敬禮拜莫不讚歎余遂為之詩追詠達磨和尚來傳舍利之事曰碧眼旋毛黑老胡達磨元不後先殊九年面壁傳心印先達磨也一夜登樓付骨珠後達磨也東照佛光緣上有後達磨也西來祖意教中無先達磨也叢林從此成佳話也合雙雙載畫圖附東來佛骨及舍利史達城郡八公山桐華寺金堂塔奉安世尊舍利三國史新羅真興王十年己巳梁大清三年梁遣使送佛舍利王使百官奉迎於興輪寺前三國遺事則云新羅真興王己巳梁使沈瑚送舍利若干粒舫山居士許薰撰金堂塔記略曰本寺奉安釋迦世尊舍利乃蕭梁太清己巳遣使沈瑚於新羅送佛舍利一函時則真興王即位之十年王謂有緣剃髮為僧自號法雲其孫真平王即位之四年壬寅分安舍利於諸剎而獨本寺所安者一千二百餘顆仍為福國之願堂洎唐咸通癸未景文大王奉為閔哀大王又安舍利七粒於本寺創立石塔憲康大王元年乙未即唐乾符二年釋三剛移塔于金堂以奉安焉梁山郡鷲棲山通度寺金剛戒壇奉安世尊舍利本寺事迹新羅善德王時慈藏律師入唐終南山雲際寺謁文殊菩薩像精勤七日他文皆云五臺山文殊菩薩化作梵僧以世尊頂骨及舍利百枚緋羅金點袈裟一領貝葉經一卷授之師以貞觀十七年還國住芬皇寺經行數年丙午歲與善德王共行到鷲栖山築金剛戒壇周回四面皆四十尺其中以石函置之其內以石床安之其上以三種內外函列次奉安云一函則安三色舍利四枚一函則安齒牙二寸許一枚一函則安頂骨指節長廣或三寸或二寸許數十片以貝葉經文置其中以蓋石覆之四面上下三級七星分座四方四隅八部列立上万蓮石以鍾石冠之乃建大雄殿寂滅宮法堂因號通度寺按本文通度寺者鷲栖山氣像通于西域國五印度故名云云未免牽強愚以為創寺築壇通方度人之意也萬歷壬辰舍利及靈骨失之於兵火之中東萊玉白居士在被虜中完璧而回其時域中多故未暇還安矣萬曆三十一年癸卯松雲大師乃判曹溪宗事命門人敬岑泰然道淳等幹事嶺伯外護重修還奉云云又梁州通度寺釋迦如來舍利記略録李穡撰洪武十二年己未秋八月草又四日南山宗通度寺住持圓通無礙辨智大師沙門臣月松奉其寺歷代所藏慈藏入中國得釋迦如來頂骨一舍利四毗羅金點袈裟一菩提樹葉若干至京謁門下評理李得芬丁巳四月外賊來欲得舍利住持月松窖藏之又恐其掘發也負之而走己未閏五月十五賊又來又負之登寺之後岡明日遂奉以來李公入白于內因張氏之難作不果者一月贊成事臣睦仁吉商議臣洪永通啓于上前太后謹妃皆致瞻禮太后又施銀盂寶珠命內侍參官朴乙生奉安于松林寺李公重修是寺設落成會故也妙香山普賢寺娑婆教主釋迦世尊金骨舍利浮圖碑略録金剛退隱國一都大禪師禪教都總攝賜紫扶宗樹教兼登階普濟大師病老休靜謹撰并書恭惟我賢劫尊釋迦牟尼佛乃天竺國淨飯王太子也住世成道證真常法身已久矣訣曰釋迦姓也此云能仁慈悲利物義牟尼字也此云寂默智慧冥理義悲智並運故生死涅槃俱不住然佛專以利物為己任故於十方界現水月應身窮劫度生無厭爾既登補處生兜率天名護明大士方度天衆普耀經亦云釋迦從兜率降王宮身放光明足踏蓮花四方行七步指天指地作獅子吼示三方便云乃周昭王二十六年甲寅歲也太子號悉達此云吉也能文武善陰陽凡及人天事法不習而自然一一神解父王愛極限七日欲傳位也太子日遊四門見悲喜事生出家心父王聞而駭之令國人尤加衛護痛禁出入只與淨居天人通焉一夜逾城而出時年十九也初入檀特山捨二種定遂入象頭山坐六年苦行見明星悟道號天人師時年三十也既而鹿野苑中為憍陳如五人輩證道果俄就靈鷲山説大法因住世四十九年以微妙正法眼藏付大迦葉并敕阿難副二傳化無令斷絶各付法偈後至拘尸羅熙連雙樹下右脅纍足泊然而寂復從棺起為母説法因説無常偈諸行無常是生滅法生滅滅已寂滅為樂已而金棺從座而起以三昧火自焚其身舍利如雨數至八斛四斗乃穆王五十三年壬申歲也吁今佛之住世羣生有感應万德身無感則入三昧定而已非于往來也其前際降生也出家也成道也説法也此等法老婆將葉止兒啼耶其後際拈花也分座也涅槃也示趺也此等法老父治狂子耶醫師留藥去他鄉耶當時舍利則會上菩薩緣覺聖衆及人天八部神衆各分受持散入微塵諸剎建塔安鍾供養者不知其幾可惜無緣國土人則當此時不見不聞如舍衛三億家後漢永平八年帝感一夢使臣傳教而已唯嶺南通度寺神僧慈藏古所安釋迦世尊金骨舍利浮圖頗多神驗竟使千門入善又令一國興仁可謂世之尊寶也不幸至萬曆二十年日本海兵入國之南焚之蕩之億兆為魚肉禍及浮圖其寶將為散失悶鬱之際適義僧大將惟政領兵數十盡心呵護得完全然政不無後慮故以金骨舍利二函密使于金剛使病老安焉病老竊念金剛山近水路後必有此患安金剛非長久計也向海兵之撥浮圖全在金寶不在舍利也取舍利後視舍利如土也然則不可寧修古基而安鍾焉其一函則還付于政政然其計受函即還古基而安焉其一函病老自持謹入太白山妙香山一名曰太白山欲建浮圖靜獨力無何命門人智正法蘭之輩幹事使安鍾二禪子至誠廣募不數月鍊浮圖而安之美矣其功德蓮經壽量品中已開列余何贅焉且我東方初無君間不列諸侯神人檀君出興於太白神檀樹下為始祖王與堯並立也然則太白始胎乎一國王使朝鮮人民永脫東夷之號終安于三界師亦使東方羣氓不失成佛之因此非山之靈也耶偉哉非徒山重國亦重也非徒國重人亦重也於諸品秩則唯政禪子不下於慈藏法師也太白山不下於靈鷲山也翌日正蘭二禪子開設浮圖為成大齋病老升座法席謂諸人曰今日會中其有丈夫還知世尊不入塔廟中者麼若知佛不在塔廟中則堪受人天供養爾古人問堅固法身宗師答曰山花澗水今日病老咄舉輦曰諸大衆參禮世尊若舉釋迦真身則至寂至妙至大至小無為無不為百億衆聖之讚歎如量空也八萬魔軍之毀謗如繫風也雖然今日會中有益有損還知麼信者敬佛故決登樂岸不信者謗法故必落苦海如儒傳所謂出乎爾者反乎爾咄各回光自斷看昔孔夫子答商太宰問曰西方大聖人不治不亂蕩蕩乎民無能名焉云則可謂唯聖能知聖也休靜今年八十四歲精神恍惚眼昏手戰拘於外人之懇撰文書石文字俱荒不免後譏惶惶愧愧惟通達君子幸恕焉萬曆三十一年三月初吉建娑婆教主釋迦如來靈骨舍利浮圖碑略録通度寺宣教郎守司諫院正言知製教蔡彭胤撰李震休書權圭篆佛氏之行于天下也久矣曰常現又曰不常現其尤靈之者曰常現而不常現云嶺南之梁州通度寺舊有金剛戒壇安釋迦世尊靈骨舍利浮屠我聖上肅宗三十年甲申性能大師謀於衆曰有而佛無而佛寶顧今鍾泐而壇缺無顯刻非所以尊之也曰我友雲真熙大師閣以先之其啓我矣僉曰唯師於吾師之門功德多有嘗鐫大華嚴經矣嘗修方丈山丈六殿矣今日之事亦唯師於是早夜以圖易其泐而增治其缺且樹之碑丐余辭中略發其簦左其手曰通度之古籍也右其手曰清虛大師休靜之文也按之曰唐貞觀十年新羅律師慈藏求法中國謁文殊像於五臺山北臺一坐不起十日夢藏而授偈明朝化身來以佛頭骨指節舍利付之曰此世尊信具也今以傳汝羅之南偏有鷲棲之山其下神池毒龍所宅汝其皈壇而安之是為通度寺高麗忠宣王十五年指空大師浮海而來升壇説法萬人咸集若聞鬼神明洪武十年丁巳海寇入梁州窺取舍利月松大師窖之尋負而走追之急天且黑雨作得脫語具牧隱李先生記中粵萬曆二十年宣廟壬辰海寇大入嶺以南實受兵虔劉而焚劫之者雖戒壇不得免焉會泗溟大師唯政以義僧將至力完之慮有後弊密盛以大小二函使遺休靜師于金剛山靜策曰豈以南為迫於賊耶兹山亦東并海非萬全之所夫以鷲山之勝而文殊之所命也不幸而有不戒者彼觀其意所攫金珠非信寶則莫如仍舊壇而修之便遂以一函還政既而曰葛盤太白山葛盤太白山乃旌善郡薩那寺也非靜師之太白也昭其靈也其忽諸乃命二門人奉其一函而西為文而刻之由是有西南二浮圖焉下略崇禎甲申後六十三年丙戌二月日立達城郡毗瑟山龍淵寺浮圖奉安世尊舍利釋氏舍利藏於是寺者蓋有其由焉通度本傳云慈藏法師西遊天竺奉佛頂骨舍利而東還大唐太宗貞觀十七年癸卯新羅善德王時藏之於梁州之通度寺龍蛇之亂賊毀塔發之松雲移檄以禍福怵之賊恐懼完皈之而經亂之餘未暇還安於通度寺甲辰之夏松雲奉承王命日本之行仍為願佛而去還未幾松雲示寂舍利留在雉嶽山覺林寺寺在原州門人清振移奉於此寺之北麓設塔藏之歲癸丑五月五日塔成高五尺五寸而恐違西山之遺意一顆還安於通度寺蓋不忘本也龍淵寺釋迦如來舍利浮屠碑相國權瑎撰崇禎紀元後丙辰四月日立平昌郡五臺山月精寺十三層塔奉安世尊舍利奉安舍利開建寺庵第一祖師傳云祖師姓金氏諱慈藏善德王即位戊戌三國本史云五年丙申西浮大洋命寄剎木心懸寶洲入於大唐周遊寰宇歷參知識然後始入五臺於北臺帝釋所立文殊像前藉草為座精修一旬夢見文殊像摩頂授梵語偈曰鉢羅佉遮那嚩哩哆伽那曩伽休舍喃哆哩盧舍那師受偈已覺終夜誦之明早忽有梵僧來謂曰昨夜有何事乎師曰文殊像授梵語偈不解其義甚恨之梵僧譯之曰了知一切法自性無所有如是解法性即見盧舍那因謂曰欲求佛法無過此偈又以緋羅金點袈裟一領白玉鉢盂一座珠貝金葉經五貼全身舍利百枚佛頂骨佛指節骨等授之曰并是本師釋迦信物可慎護之又曰卿之本國皇龍寺世尊與迦葉宴坐論法之地林池座石尚在卿知之乎如佛所説則當有造塔立像之因云上出元曉所撰本傳又曰卿之本國溟洲之地亦有五臺山一萬文殊常住真身之所也卿還本國可往親參已上出臺山本記也後當見卿於太白山葛蟠之處言訖而滅梵僧即文殊化身也追慕不已乃往大和池池邊有精舍石塔池龍之所創也師坐塔前有老人從池而出曰道人求何事乎師曰求菩提耳老人即池龍也便起作禮問塔事云又曰皇龍寺護法是吾長子受梵王之命往護其寺卿還本國若於是寺立九層塔國之太平在於此也奉獻珠玉等寶而還出元曉所撰記一云是池龍出而言曰解梵偈僧真文殊也合授我供向海上東南而往願師亦受我七日供養師於是從請受供然後還國出臺山本傳記以貞觀十七年癸卯而還善德王封為大國統令住芬皇寺貞觀十九年依大和池龍之言立皇龍寺九層塔以彼五臺梵僧所授舍利安于塔之心柱因住皇龍寺云云後往江陵今溟州也五臺山登地爐峯奉安佛腦及頂骨立碑於伽羅墟碑則隱而不現以記其迹因創月精寺建十三層塔奉安舍利三十七枚於塔心今傳優婆毱多之舍利者誤也出元曉所撰傳一云師既還國以梵僧所授佛衣佛鉢菩提腦骨等入安皇龍寺仍留其寺而供養焉欲面見文殊尋往溟州五臺山到今月精寺地假立草菴留至三日于時是山陰沉不開未審其形而去後又復來創八尺房而住者凡七日已上出臺山本傳記後於大松下今寒松汀是也一居士忽現與師清談良久而謂曰昔日之約卿識之乎言已即滅師於是自責曰居士昔日五臺山梵僧化現耳向空頂禮即向太白尋葛蟠處見大蟒在大樹下謂侍者曰此文殊所諭之地即授戒移蟒於山下創院曰薩那今名淨嚴寺從此院而南去一千許步有神仙洞又創蘭若曰上薩那往來兩寺以待文殊云云大德十一年二月日宣授祖列大夫翰林直學士匡靖大夫咨議都僉議事延英殿大提學司修史判文翰署事閔漬記太白山淨嚴寺塔俗謂水瑪瑙塔亦云葛來塔奉安世尊舍利按淨巖寺事迹云慈藏律師入唐求法參謁圓香法師後抵五臺山北臺雲際寺帝釋所立文殊像前三七日精勤忽有梵僧授梵語偈即以緋羅金點袈裟一領珠貝葉經五貼全身舍利百枚佛頂骨指節骨齒牙念珠等貞觀十七年癸卯還本國浮西海西海龍王奉入本宮以紫檀木鴨枕獻曰師之本國皇龍寺者迦葉佛與釋迦佛宴坐石吾之長子往護其寺即以瑪瑙無數片載船到蔚津浦以龍王神力藏于此山將為佛塔修補之寶師以梵僧之説龍王之囑具聞善德王王與羣臣禮拜供養拜師為國統一如師奏建皇龍寺九級塔而藏舍利次竪月精十三層塔而藏之因開中臺而安佛顱次創大和而藏之次啓太白山三葛盤地而建寶塔藏舍利佛指節齒牙佛掌骨念珠貝葉經又立獅子山石塔而藏舍利後建通度戒壇亦藏佛頂骨舍利袈裟其餘名勝大地建塔鎮脈三韓為一干戈永息雨順風調此所謂福國佑世者也伊後法師再住水多寺即大和也天安郡華山廣德寺塔奉安世尊舍利華山廣德寺事實碑晉陽後人柳邈運撰觀瀾散人朗善君書謹按廣德寺者處於錦湖之間居於華山之陽蓋華山宗於白頭祖於崑崙山之從來豈偶然而已也月都之世有慈藏法師者慨然祖燈之騰灰吁嗟佛日之晦彩思覺萬衆念垂千劫飛錫西指忽遇金師浮雲東皈乃傳寶訣得西天三昧之法骨為東土二字之道體奉真身舍利百餘枚貝葉圓詮數百函得真骨牙齒及僧伽梨拂麈三千佛織造錦畫幀三座金銀字華嚴法華長壽梵網維摩恩重諸大部經來安于嶺南之通度寺殊同白馬始來東京無異黑師初入南都青海之知有佛氏黔首之知有世尊自此而世尊之法至是而傳佛氏之教由是而明其亦盛矣粵六年太和壬子又有珍山法師者親承慈藏之傳奉釋迦真身舍利齒骨一箇僧伽梨一領拂麈一柄華嚴等諸經二件持歸於廣德寺佛庵安鏡若心不正之人見之則其面必倒照世謂照心鏡今失之此廣德寺之始而藏師之得山公山公之托華山其所以邂逅者其所以棲遲者豈非天授神助而相待於此者乎噫噫兩師開創之功稱誦至今娓娓不厭者良有以也后十三年會昌甲子珍山示寂則多奇祥異徵遂建石鍾焉云云新羅文聖王十三年春入唐使阿餐元弘賫佛經并佛牙來王出郊迎之云云智異山世尊舍利塔三處一大華嚴寺塔以石築造塔臺上安四石獅子以為柱中有石像合掌而立頂戴七層舍利塔世傳中間石像乃新羅時緣起祖師為其母冥福者故塔臺即名孝臺云云本寺事迹云新羅僧慈藏建造釋尊舍利塔七層二山之老嫗峯下有法界塔想取華嚴法界之義以為名也三大源寺塔按世尊舍利塔重修記云方丈山大源菴殿前有十層古塔實我本師釋迦世尊舍利塔廟也樹立既久傾欹破壞無人修葺居過之歎夥頤矣故兹不佞慨然發願鳩財重新爰撤十層得七十二枚舍利大者如菉豆小者似黍粒五色交雜瑩潤照人自其夜祥光亘天巖洞如晝又有滅庵太欽禪師雍正甲辰五月改正等字與今重樹年月亦相符合吁可異也更築基址本月十五日分奉舍利于第三層及五七層中表以三軀金佛塔樣倣舊蓋由殿居塔上塔在殿下有大失尊卑故也事既竣余往香山留十年獲覩先祖師西山和尚金骨舍利浮圖建立碑文簽録本師出家成道焚香建塔等事迹詳悉無遺仍寫一件敬奉殿楣又志不肖營幹數語于後以為瞻禮者之考證云爾乾隆甲辰五月十五日慧月沃印謹識已上所載三舍利塔時或放光則其光線必為聯絡故人謂三塔舍利應是同源云爾杆城郡金剛山乾鳳寺佛牙石塔泗溟大師紀績碑江原監司南公徹撰名越府使許書金剛山自毗盧分為二歧斷髮嶺以西曰內岾鴈門以東曰外岾內岾之表訓寺是西山大師施教之地也乾鳳寺是泗溟大師募義之地也二子者雖出於浮屠而西山以其節泗溟以其功故地以人而重寺之名於是乎甲于國中按圖志唐乾元間山人貞信設道場奉彌勒觀音菩薩像於此號為乾鳳寺寺舊藏師畫像及願佛銀塔香爐鐵杖橇鞋珊瑚念珠各一金袈裟一襲世傳如來牙事尤新奇其説近於述異而所謂石塔者至今尚存山中人皆言夜或有瑞氣為虹云師名惟政本姓任氏密州人也世有簪纓長從恩師中德落髮於寺之樂西菴而師事西山大師休靜學蓮華經萬歷二十年倭寇朝鮮休靜自妙香山募僧徒為義兵與提督李如松大破倭兵于平壤昭敬王命為八道都總攝義兵將車駕還都朝議主和休靜薦政自代乞骸骨歸朝廷遣惟政于日本於是和事成先是新羅慈藏法師入西竺得如來牙十枚後為倭所掠去師乃懇辭乞還以藏于寺即石塔是也云云報恩郡俗離山法住寺世尊舍利碑銘并序山僧汝寂慶秀撰略云新羅中葉釋尊舍利來入東方施於名山皆僧建塔而此山則舍利一顆奉安於寺中閲千載而完然如昨信士白貴善捨家資竪塔於寺之白虎白虎謂左置也因立碑紀之云爾崇禎紀元後七十五年四月日肅宗三十六年庚寅康熙四十九年麟蹄郡雪嶽山鳳頂庵塔奉安世尊舍利世傳慈藏律師親奉世尊舍利七枚安于菴之西石臺上七層塔塔之東大石面鐫世尊舍利塔五大字往往現瑞云海南大興寺世尊舍利塔大芚志云舍利塔在羅漢殿庭中竹迷記云世尊舍利所藏三國遺事記載前後所藏舍利國史云真興王大清三年己巳梁使沈湖送舍利若干粒善德王代貞觀十七年癸卯慈藏法師所將佛頭骨佛牙佛舍利百粒佛所著緋羅金點袈裟一領其舍利分為三一分在皇龍寺一分在大和塔一分并袈裟在通度寺戒壇其餘未詳所在壇有二級上級之中安石蓋如覆鑊諺云昔在本朝相次有二廉使禮壇舉石鑊而敬之前感修蟒在函中後見巨蟾蹲石腹自此不敢舉之近有上將軍金公利生庾侍郎碩以高廟朝高麗高宗授旨指揮江東仗節到寺擬欲舉石瞻禮寺僧以往事難之二公令軍士固舉之內有小石函函襲之中貯以琉璃筒筒中舍利只四粒傳示瞻敬筒有小傷裂處於是庾公適畜水精函子遂奉施兼藏焉識之以記移御江都四年乙未歲也古記或稱百枚分藏三處今惟四爾既隱現隨人多少不足怪也又諺云其皇龍寺塔災之日石鑊之東面始有大班至今猶然即大遼應曆三年癸丑歲也本朝光廟四載也塔之第二災也曹溪無衣子留詩云聞道皇龍炎塔日連燒一面示無間是也自至元甲子已來天朝使差本國皇華爭來瞻禮四方雲水輻湊來參或舉不舉真身四枚外變身舍利碎如沙礫現於鑊外而異香郁然彌日不歇者比比有之此末季一方之奇事也唐大中五年新羅文聖王入代朝使元弘所將佛牙今未詳所在後唐同光元年癸未本朝太祖即位六年入朝使尹質所將五百羅漢像今在北嵩山神光寺大宋宣和元年己亥睿宗十五年入貢使鄭克永李之美等所將佛牙今內殿置奉者是也相傳云昔義湘法師入唐到終南山至相寺智儼尊者處鄰有道宣律師常受天供每齋時天厨送食一日律師請湘公齋湘至坐定既久天供過時不至湘乃空鉢而歸天使乃至律師問今日何故遲天使曰滿洞有神兵遮擁不能得入於是律師知湘公有神衛乃服其道勝仍留其供具翌日又邀儼湘二師齋具陳其由湘公從容謂宣曰師既被天帝所敬嘗聞帝釋宮有佛四十齒之一牙為我等輩請下人間為福何如律師後與天師傳其意於上帝帝限七日送與湘公致敬訖邀安大內後至大宋徽宗朝崇奉左道時國人傳圖讖曰金人敗國黃巾之徒黃巾謂道士也諷日官奏曰金人者佛教之謂也將不利於國家議將破滅釋氏坑諸沙門焚燒經典而別造小船載佛牙泛於大海任其隨緣流迫于適有本朝使者至宋聞其事以天花茸五十領紵布三百匹行賂於押船內史密授佛牙但流空船使臣等既得佛牙來奏於是睿宗大喜奉安于十員殿左掖小殿常鑰匙殿門施香燈于外每親幸日開殿瞻敬按麗史睿宗十五年庚子宋宣和二年五月戊辰迎入佛骨于禁中初王字之使還宋帝以金函盛佛牙頭骨以賜置外帝釋院至是置山呼亭云云此與三國遺事所記小異至壬辰歲移御時亡失復得至庚午出都之亂顛沛之甚過於壬辰十員殿監主禪師心鑑亡身佩持獲免於賊難達於大內大賞其功移授名剎今住氷山寺是亦親聞於彼無極記云按此録義湘傳云永徽初入唐謁智儼然據浮石義湘所創寺也本碑湘武德八年生丱歲出家永徽元年庚戌與元曉同伴欲西入至高麗謂高句麗有難而回至龍朔元年辛酉入唐就學於智儼總章元年儼遷化咸亨二年湘來還新羅長安二年壬寅示滅年七十八則疑與儼公齋於宣律師處請天宮佛牙在辛酉至戊辰七八年間也本朝高廟入江都壬辰年疑天宮七日限滿者誤矣忉利天一日夜當人間一百歲且從湘公初入唐辛酉計至高廟壬辰六百九十三歲也至庚子年始滿七百年而七日限已滿矣高麗王子僧統釋煦大覺國師逃入宋求法還本國界上表請擅行之罪其文有曰臣某言臣聞香城大士慕四句而灑血忘疲雪嶺高人聞半偈而投骸不惜苟專求於正法固難遵於憲章臣某中謝伏念臣覺苑微流秪林末葉慶三寶勃興之世值四方靜謐之朝爰念前修常思遊學想玉華之茂範始愧當仁顧浮石之流風終慙䇿蹇往者無貪性命不憚艱危涉萬里之洪波參百城之善友備尋真教全賴聖威以至慈恩賢首之宗台嶺南山之旨濫傳爐拂謬事箕裘始同學步之人已類知還之鳥擅行之罪雖陷於嚴科聞道之心實甘於夕死今奉敕賜聖考御容并諸佛舍利五十五善知識像花嚴大不思議論等諸宗教藏五千餘卷於今月十二日中略離明州十九日放洋已到國境云云恭愍王十五年夏四月辛旽與宰樞延廣州天王寺佛舍利置王輪寺戊寅王率百官往觀之施黃金綵帛又賜僧布八百匹朝鮮世宗元年己亥明帝求興天寺所藏舍利金漸啓曰僧竺丘為臣言石塔所藏舍利四枚自新羅以來世世寶藏且有靈異願得留鎮法門上曰僧徒容有是言然於國體則不可天子求舍利當以本土寶藏者進獻以表至誠況石塔舍利天子所知豈可以是靈異舊物匿不以獻上欺天子乎乞得舍利或云分身舍利亦云變身舍利尚玄曰按吳書赤烏四年有康居國丞相子姓康名僧會棄俗皈緇以遊化為己任行至建康營立茅茨設像行道瓶中乞舍利吳主孫權因此建塔立寺即建初寺度人為僧尼云云此為乞得舍利之濫觴也在我海東乞得舍利事迹最多具録于左高麗大瑜珈桐華寺住持五教都僧統普慈國尊贈諡弘真碑銘云師至元四年自興德寺移住俗離寺加僧統甲戌移住佛國寺丙子至元十五年到通度寺乞得舍利數枚常置左右復分身多矣每有乞之者輒與之亦不減數高麗平章事法喜居士閔漬撰國清寺金堂主佛釋迦如來舍利靈異記有云宣宗時大覺國師始立天台六山因卜地於松山西南麓二一創國清寺為六山根本造立釋迦三尊以為堂主常演妙法歷代賴其福利及國家中否寺亦隨廢中興已來方始重營而未復舊基故議未及於像設今國統愴其佛座久虛誓欲竭力造成亦有大禪師而安捨納白銀十斤而未獲幹辦之人越皇慶二年癸丑夏始聞上護軍盧祐篤敬三寶又能幹事遂請而付以兹寺亦納白銀十餘斤盧公樂從如石投水果能不日而成巍巍金像如從地而湧出焉觀者莫不嘉歎及乎將安腹藏道俗十餘人會于其家諸物既備舍利猶闕又無可覔之處相對咨嗟而已會中有一信士鄭天甫者勃然而起曰今國統洎諸施主所為若是真善佛身舍利何求不獲乎盧曰然即於所常挂壁白衣像前令鋪尺許皂羅焚香三禮舉頭見之已有舍利一粒瑩然而出衆皆驚躍相與就看轉轉增多遂至無數其色種種青白玄黃燦爛盈目盧曰若有赤者五色備矣其言未終赤色者已出連至四箇於是觀者莫不流涕嘆息皆知佛境無隔功德不虛矣國統聞之不勝慶悅乃作長偈以讚之豫欲觀是像往見盧公乞舍利處正是市邊陋屋囂塵穢氣四面交集於中亦現如是靈瑞是真佛力不思議也嘗見經中所説云法身如虛空法界即如來果如所説若非法身與虛空同體不垢不淨無去無來者今此舍利何從而出乎且色空無二淨穢無別於是可見矣但未知所感之誠謂獨在於盧鄭兩公歟抑亦在於初發誓願納財之處乎豫謂比之於鼓革木桴手四者俱至然後能發其聲斯亦或如革木或如桴手共致之耳李穡撰梁州通度寺釋迦如來舍利記云洪武十二年己未秋八月草又四日南山宗通度寺住持圓通無礙辨智大師沙門臣月松奉其寺歷代所藏慈藏入中國所得釋迦如來頂骨一舍利四毗羅金點袈裟一至京謁門下評理李得芬時有外賊來欲得舍利故李公聞舍利至入白于內今張氏之難作不果者一月贊成事臣睦仁吉商議臣洪永通啓于上前太后謹妃皆致瞻禮而太后又施銀盂寶珠命內侍參官朴乙生奉安于松林寺李公重修是寺設落成會故也國中檀越無問貴賤智愚奔波禱舍利分身李公得三枚尹侍中得十五枚檜城君黃裳之夫人趙氏得三十餘枚天磨山諸衲子得三枚聖居山諸衲子得四枚黃檜城親得一枚月松適出檀越乞舍利而去月松不盡知也砥平縣彌智山龍門寺記云首陽大君即朝鮮世祖也因母后現夢造二佛八菩薩像丁卯七月世宗大王二十九年明正統十二年安于龍門寺明年戊辰四月初八日設慶讚法會大君與夫人即貞善王后也俱親往祈祝大君立誓于佛前曰此會若無靈應於法將退矣與僧十員立于佛前限七日一心精勤至第六夜卓上有鏗然之聲學祖曰吾佛降靈矣大君不勝驚喜親開香盒中有六枚舍利晃然放光時夜將半猶如白晝渾界作金色三日乃歇大君泣淚曰吾佛慈悲靈應果若是乎遂為願剎朝鮮金乖崖守溫撰大圓覺寺碑銘云世祖十年甲申夏四月庚戌孝寧大君補於檜岩揚州檜巖寺也東岡竪石鍾厝釋迦舍利未詳所從來而疑或指空奉安者歟仍設法會講圓覺經是夕如來現相空中神僧經行壇上瑞氣彌布放光照耀甘泉普洽舍利分身八百餘粒五月甲寅補具靈迹奉舍利以聞殿下與王妃頂禮于含元殿舍利又分身四百餘粒百官上箋稱賀乃大赦中外命建圓覺寺又建窣覩姿塔也十三層安分身舍利及新譯圓覺經云云韓繼禧撰興天寺新鑄鍾銘序云孝寧大君進釋迦如來分身舍利二十五枚上與慈聖王妃禮於內殿又分身安于含元殿又分身越丙辰大君又得又進王妃禮於內殿又分身丁巳上親製伽陀被之管絃偕王妃供養於含元殿又分身前後所得分身舍利總一百又二檜巖會中人自取去不知其幾上大歡喜肆赦發大誓願親自翻譯楞嚴經率宗親政府六曹臺省諸將為祖宗及一切含靈造如來像一軀又為中宮世子造一軀又夢觀音地藏二菩薩相對之異乃造二像既成各安舍利於中妥靈于禪宗興天寺之舍利閣上同王妃禮拜於寶座燎香供養金守溫撰洛山寺鍾銘序云世祖大王在位之十二年幸洛山寺瞻禮觀世音大士相于時舍利分身五彩晶瑩朝鮮阿育王塔尚玄曰按三國遺事按古傳育王命鬼徒每於九億人居地立一塔如是起八萬四千塔於暗浮界內藏於巨石中今處處有現瑞蓋真身舍利感應難思矣云云朝鮮之雞龍山岬寺頭輪山之大興寺大屯志云阿育塔大小二塔在挽日菴庭中長興郡之天冠山信川郡之九月山靈巖郡之月出山清道郡之雲門寺麟蹄郡雪嶽山神興寺之西臺皆有育王天真塔或隱或現時有放光之瑞若非佛緣之土豈能若是乎吊三武帝沙汰之厄法輪轉東衆星拱北無顏色而開白眼者惟儒道兩教而道尤甚焉蓋以其教理雖似相近實未能及其萬一故猜忌之心於是生焉隨其時君之趨向肆其敵害之毒謀是謂三武一宗之厄三武謂元魏太武帝宇文周武帝及唐武宗也一宗謂後周柴世宗也雖然暫遭沙汰之厄每得反動之勢愈往愈盛著於史乘班班可考至我海東則在高句麗末王之時道佛相敵高僧碩德盡徙百濟未幾國亡道教亦熄高麗之時僅存一縷而不敢喘息朝鮮時代有昭格署但傳形式未敢謂教今試歷舉佛運之厄如左道肆忌嫉佛遭沙汰第一元魏太武帝信宰相雀皓及道士寇謙之汰沙佛法不五六年崔寇族死文帝大興之第二宇文周武帝信道士衛元嵩沙汰佛法不五六年元嵩貶死隋文繼興之第三唐武宗信道士李德佐趙皈真沙汰佛法不久疽發背崩趙皈真賜死宣宗復興之第四後周柴世宗沙汰佛法未幾宋太祖大興之第五宋徽宗道君皇帝信道士林靈素崇道教改佛為大覺金仙未幾賜林靈素死詔復佛號欽宗追毀道士之官階道請角法佛常優勝漢明帝永平十五年正月五嶽道士褚善信等上表請決釋道二教勝劣帝乃於白馬寺火驗釋道二教之經道經盡燬釋經盡存自是天下靡然歸佛梁大寶元年是年北齊文帝受東魏禪建元天保文帝甚信佛從沙門僧稠受菩薩戒大興三寶初金陵道士陸修靜之徒為梁武所棄走入魏地其道稍盛及齊文事佛甚厚靜等忌之詣闕請與釋氏角法詔沙門法上當之法上舉曇顯勝其術於是詔禁道教道流遂絶迹齊境唐高祖武德九年太史令傳奕七上疏請廢佛帝頗惑之以奕疏頒示諸僧于是法琳作破邪論惠乘著辨正論明槩撰決對論李師政述內德論並奏之帝覽諸論悟奕黨道毀佛元順帝至元十八年十月二十日僧道二家辨析命燒毀偽道藏經印板立石書其事聖旨焚毀諸路偽道藏經之碑翰林院臣唐方楊文郁王構趙與李謙閻復李鑄李磐王磐奉勑撰正奉大夫樞密副使臣商挺奉勑書光祿大夫中書左丞相監修國史臣耶律鑄奉勑篆額至元二十一年三月初三日詔遣資德大夫總制院使兼領功德使司事相哥諭翰林院戊午僧道持論及至元十八年十月二十日焚毀道藏偽經始末可書其事于石臣監等謹按釋總統合台薩哩所録事迹昔在憲宗皇帝朝道家者流出一書曰老君化胡成佛經及八十一化圖鏤板傳布其言鄙陋誕妄意在輕蔑釋門而自重其教罽賓大師蘭麻總統少林長老福裕以其事奏聞時上居潛邸憲宗有旨令僧道二家同詣上所辨析二家自約道勝則僧冠首而為道僧勝則道削髮而為僧僧問道曰汝書為諭化胡成佛且佛是何義道對曰佛者覺也覺天覺地覺陰覺陽覺仁覺義之謂也僧曰是殆不然所謂覺者自覺覺他覺行圓滿三覺圓明故號佛陀豈特覺天地陰陽仁義而已耶是時上特語近侍曰吾亦先知仁義是孔子之語謂佛為覺仁覺義其説非也道士又持史記諸書以進欲出多説僥幸取勝帝師板的達發合師八即發思八曰此是何書道曰前代帝王之書上曰汝今持論教法何用攀援前代帝王帝師曰我天竺亦有此書汝聞之乎對曰未也帝師曰我為汝説天竺頻婆羅王贊佛偈曰天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者當其説是語時老子安在道者不能對帝師又問汝史記有化胡之説否曰無又問老子所傳何經曰道德經曰此外更有何經曰無道德經中有化胡事否曰無帝師曰史記中既無道德經中又無其為偽妄明矣道者辭屈尚書姚樞曰道者負矣上命如約行罰遣近臣脫歡將道者樊志應等十有七人詣龍光寺削髮為僧焚偽經四十五部天下佛寺為道流所據者二百三十七區至是悉命歸之道教提點甘志泉所據吉祥院其一也據而弗歸至元十七年夏四月僧人復為徵理長春宮道流謀害僧録廣淵聚徒持梃歐擊僧衆自焚廩舍誣廣淵遣僧人縱火且聲言焚米三千九百餘石他物稱是事達中書省辨其誣甘志泉王志真欵伏詔遣樞密副使孛羅及諸大臣覆按無異詞志泉志真就誅劓刵流竄凡十人仍徵所聲言米物如其數歸之僧衆有道家偽經尚存為言者聞諸皇太子十八年九月都功德使司脫因小演赤奏台往年所焚道家偽經板本化圖多隱匿未毀其道藏諸書類皆詆毀釋教剽竊佛語宜皆甄別於是上命樞密副使與前中書左丞文謙祕書監友直釋教總統合台薩哩太常卿忽都于思中書省容省使都魯在京僧録司教禪諸僧及臣等詣長春宮無極殿偕正一天師張宗演全真掌教祁志誠大道掌教李德和杜福春暨諸道流考證真偽翻閲兼旬雖卷帙數千究其本末惟道德二篇為老子所著餘悉漢張道陵後魏寇謙之唐吳筠杜光庭宋王欽若輩撰造演説鑿空架虛罔有根據詆毀釋教以妄自尊崇復愛慕其言而竊為己有假陰陽術數以示其奧裒諸子醫藥以誇其博往往改易名號傳注訛舛失其本真文所載符呪妄謂佩之令人商賈倍利子嗣蕃息伉儷諧和如鴛鴦之有偶將以媒亂而規財賄至有教人非望佩符在臂則男為君相女為后妃入水不溺入火不焚刀劒不能傷害之語其偽妄駁雜如此留之徒以誑惑愚俗自道德經外宜悉焚去臣等同辭以聞上曰道家經文傳訛踵謬非一日矣若遽焚之其徒未必心服彼言水火不能焚溺可姑以是端試之俟其不驗焚之未晚也遂命樞密副使孛羅守司徒和禮霍孫等諭張宗演祁志誠李德和杜福春等俾各推擇一人佩符入火自試其術四人者奏言此皆誕妄之説臣等入火必為灰燼實不敢試但乞焚去道藏庶幾澡雪臣等上可其奏遂詔諭天下道家諸經可留道德二篇其餘文字及板本化圖一切焚毀隱匿者罪之民間刊布諸子醫藥等書不在禁限今後道家者流其一遵老子之法如嗜佛者削髮為僧不願為僧者聽其為民乃以十月壬子集百官于憫忠寺焚道藏偽經雜書遣使諸路俾遵行之臣磐等聞老氏之為道也以清淨為宗無為為本謙沖以處己損抑以下人非有貪欲好勝之事厥後枝分派列徒屬寢盛襲訛成偽誇誕百出清淨一變而為污穢無為一變無所不為如漢之文成五利致身求仙恍惚誕幻帛書飯牛之詐黃金可成之妄一旦敗露為武帝所誅三張之徒以鬼道惑衆倡亂天下為皇嵩嵩曹魏所滅宋王浮昔居上清寶籙宮與女冠為姦林靈素自稱神霄紫府仙卿禳大水不驗並為徽宗誅竄而死逮金末年復有麻被先生鐵笠李二人以姦謀祕計出入時貴之門肆為污之行咸受顯戮歷代以來若此之類不可勝數追惟禍亂之源姦宄之本率皆假符籙以神其教託偽經以警其俗橫肆巧誣倡為詭狀詆毀聖教寇攘內典固已悖老氏不爭不盜之禁矣及陷刑辟皆是孽自內作復將誰咎哉且夫釋氏之教宏濶勝大非他教所擬倫歷百千世聖帝明王莫不尊崇東扶乘西極昧谷氷天桂海山河大地昆蟲草木胎卵濕化有情無情百千萬類皆依佛蔭生息動止於天地之間故天上天下惟佛為尊超出乎有生之表歸極乎無礙之真智周三界神妙諸方澤及大千功用不宰其大有如此者慈航所至無溺不援法雨所霑有生皆潤憫世人之沉淪幻海顛覆迷津展轉多生流連纍劫將使之脫凡企聖蠲弊崇真故神光破沉晦之門大覺指無生之路其仁有如此何意狂謀輒形妬忌雖積毀銷骨衆煦漂山法體圓成初無小玷譬如盲人之毀日月何傷日月之明井蛙之小河海奚損河海之大多見其不知量也欽惟聖天子識超四諦道慕三乘參無象之真空傳法王之心印所以尊崇之禮皈向之誠矯百偽以從真黜郡邪而歸正有不容不嚴者焉况乎筆墨勸妖術誤世恣為欺誑鼓蕩群愚若不大為改革則邪説肆行枉道惑衆其如天下後世何凡天下之理有善有惡有正有邪有真有偽常混然而同處雜然而並行自非稟上聖之資誕生知之性智出庶物明照群情則紅紫之亂朱窪之變雅是孰得而辨明之哉由是言之聖天子匡濟真圖翼扶大法之功至矣槩諸聖不可有加矣于以鑿含靈之耳目開正途之荒穢使般若之光永乎無際劫遍滿恆河沙界延洪聖壽於無疆衍綿儲君之福利鼎祚於億萬年之久者庸有既乎是可述也臣磐等敬為之書以貽後人俾為老氏之學者有所警焉辨兩文公排斥其論儒者之斥佛莫如唐之韓文公宋之朱文公而韓之應聲者有歐陽文忠公朱之同情人有程明道程伊川張橫渠等今云兩文公者舉一而例諸也支那唐宋諸儒之闢佛者皆效韓歐程朱固無論已而我朝鮮受其影響亦莫不以韓歐為據即如鄭道傳之佛教雜辨見東文選猶有文戰之風味至於李鼊之焚像尹衡之劫經等直是武斷之粗行亦不得見於宋儒者也又如宣祖大王答館學儒生闢佛疏曰在首善之地講論者道義也期待者程朱也宜益動心忍性切磋琢磨敬義夾持表裏交養為他日真儒上輔寡君下澤斯民治隆俗美則吾道之衰異端之盛不足慮也何必如太武之誅沙門毀佛寺之為哉又如肅宗大王九年下教曰豫嘗讀韓文之佛骨表因見何蕃傳又見宋之陳東歐陽修之事迹千載之下令人起敬豫欲以此三人立小祠於成均之傍欲令今日諸生有所觀感大臣儒臣皆無異辭云云反辨支那太虛禪師曰佛教自東漢至初唐為印度中國過渡之時代自梁至唐初為中國佛教各宗派之創闢時代唐初為佛教大成時代自陳隋至唐末為中國佛教之全盛時代過兹以往即為鎖關為守成為漸衰為衰極之時代矣抑唐代以前道教徒妬佛教之蒸蒸日上每興狂詆佛教諸大師亦不惜與之明辨折諍故又宜名之曰佛道之競爭時代從五代而度入宋明則便為儒釋之競爭時代矣然兩文明相遇不競爭則不足以調和道教初無文明之價值故幾經折挫之後便深形不競唯儒佛兩教各以正當之旗鼓高邃之學理愈競爭而愈光榮自宋明以來殆如金丹換骨一氣同宣其根柢上已不能復離而二之也其所以致此之理由固何在哉蓋儒之與佛皆具有高妙深廣之真理者使其儒之為真儒也既知佛理之深廣高妙未有不心折神服五體投地於佛者故朱晦翁曰儒者欲待看通佛典再來闢佛佛典未看通早被佛降服去矣如人在關河上行不知不覺便行入番界斯言也誠明言也非親身歷閲過者不能道其隻字晦菴流覽佛經至繁極博此語其一生之供狀乎然儒者不欲與佛競爭則已耳苟欲與佛相競而辭以闢之必曰研究佛理深知佛故庶足以搗其中堅攻其要害否則鮮有不如昌黎之見窮於大顛者然待其既知佛理之深廣高妙又鮮有不如晦菴之供狀者佛者之於儒亦復如是此佛之與儒所以愈競爭而愈調和愈別異而愈通融也今試將有唐以來佛教之關係更略陳之中國佛教自唐初各宗派大成之後降至晚唐禪宗之風彌暢真言俱舍三論成實頭陀諸宗漸歸湮役而戒律淨土入各宗兼帶行之專修已少天台華嚴慈恩三宗雖尚足相雄並峙經過五代離亂亦多散失獨禪宗經惠能道一百丈諸祖之後化溢山海氣吞河嶽煥然燦然若梅花之瓣一裂成五曰臨濟曰曹洞曰溈仰曰雲門曰法眼道香芬馥慧照輝皇殆有眼耳鼻舌者所不能自掩也故有宋有明之間儒釋之競爭與調和關係於禪宗者獨多焉禪宗之衰也漸於南宋甚于元明明之末葉有紫柏憨山密雲諸尊宿又稍稍振起而淨土之有蓮池教觀之有幽溪蘊益雪浪交光龍象濟濟殆與陽明諸賢同一氣運生者今則禪剎滿禹域欲少觀古德之遺風餘韻亦不復可得矣儒者之闢佛始于韓愈然愈雖工于文章而性情剛愎見識淺陋當世之人鮮有信尚其説者宋時歐陽修特負學者之碩名因愛韓愈之文章泛重其品行學識至頌其闢佛諸説與孟子同功九州學者於是乎競以闢佛為第一急務若非闢佛則不足以為儒生者不能求學識於文章之外求文章於學識之中文章學識混而不知辨此當時學者之大謬也張商英儒而深于禪者嘗著論曰護法論條列韓歐闢佛諸説而深斥之至夫周程朱張輩非韓歐吠影吠聲之比空谷論嘗略揭其淵源與心術其學問之得自佛固不容掩也然以朝三暮四之技弄後人於不覺無過乎晦菴試原其學佛而排佛之意蓋欲後世學者莫窺其學問之自來以崇拜其為天人為神聖而不敢踰越其識見而已但其心雖苦其志實愚天下之聰明豈一手所能障也至夫陸王諸子其造詣之高明精微實較程朱為尤故其得于佛而似于禪者亦尤之蓋程朱雖浸于佛而禪宗一道則尚徜徉乎門外陸王則言到行到較之古禪德亦不多讓其示別於佛實似之者愈深防之者愈甚所以自衛有不得不然者耳要之儒得佛而益明佛得儒而益通宋明之際之佛教以僧界之形式論之較隋唐為衰以儒佛之精神論之實由變而通由通而轉盛耳何耶蓋宋明之學説皆合儒佛為一爐而冶出者其言語文字上雖落落不合其意思理想上固莫不息息相通者也雖謂其衛儒而排佛者皆衛佛而排佛者蔑不宜也雖謂其學于儒者皆學于佛者蔑不宜也故曰宋明為佛教之變時代云逮乎前清其衰也始真衰矣逮乎近今其衰也始衰而瀕于亡矣從全球運開泰西文明過渡東亞中國之政教教術莫不瞪焉其後佛教實後而尤後者中國今之佛教固早失代表全亞之勢力矣夫佛教渡入亞洲時代之後亞洲諸國雖皆為佛教國而或僅保其餘喘或祗承其緒流或但傳其皮相唯我中國輝皇俊偉發揚光大獨能概佛教之全體大用而無遺斯亦足豪矣然僧侶之自局為化外竪儒之相歧為異端以致影響未能大著效功不甚足觀浸及今日大有江河日下之勢也第宋明而下佛儒道三教均漸有一道同風之概而入於睡眠態度要亦致衰之一原因歟今社會思潮復雜激刺既深醒覺亦多吾佛教其庶幾蹶而復興乎世界時代最近三十年中日本僧侶之四出傳教歐美各洲皆已有佛迹流入且研究佛學者實繁有徒印度嘗設有一摩訶菩提會大正二年八月來京城傳佛舍利之錫蘭島僧達磨婆羅即摩訶菩提會之記者也入會者不下數十萬抑多歐美人其大勢固已駸駸然趨入世界之時代矣又云印度大乘經典散失已久摩訶菩提會長嘗致書金陵楊文會仁山居士擬邀中國之精于大乘者詣彼學習梵文取中國諸大乘經典轉譯入印度今而後之佛教勢必日趨于通便精闢凡有學問頭胸者皆能言其理趣心其信仰而不復局於僧界之一部分可斷言矣中國佛教之不發達以佛學局於僧界以僧界局於方外阻之也雖然中國而著宗教史捨佛教必無足紀述中國而著學術史周秦之後捨佛教必無足顏色晉唐六七百年間學界中稍可人意者僅一文中子而已然此亦據儒學一方面而言之耳若兼佛學言之雖較之春秋戰國時亦不稍減故斯時也乃中國學術史上最衰之時代亦中國學術史上最盛之時代宋明之際已具如前論庸可以僧界局方外拘哉其以僧界局方外拘者皆取形式而不取精神者耳然今日之中華民國既度入世界時代政教學術無不一變佛教固非變不足以通矣宋明之際一變而儒學益以明佛學益以通今能乘世界之思潮再一變之古今東西之政教學術皆將因之而愈明云云尚玄曰高麗崔瀣曰不知佛無以為儒不知儒亦無以為佛此誠達論也但今之儒者掇拾程朱之語録仰吸韓歐之唾餘固守四百年前之思想動輒曰攻乎異端斯害也已佛之一字掩耳不聞雖然現今佛之聲教遍滿世界如城東之老嫗雖欲不見佛面得乎如天上之衆生雖欲不聞法鼓得乎高麗末世儒風始起高麗忠烈王三十年元大德八年五月置國學贍學錢贊成事安珦以其餘資付博士金文鼎送江南畫先聖及七十子之像又購祭器六經諸子史以來至是珦以密直副使致仕李㦃典法判書李瑱為經史教授都監於是禁內學館及內侍三都監五庫願學之士七館十二徒諸生橫經受業者以數百計又諛聞瑣録云高麗安文成公珦嘗作詩書于學宮曰香燈處處皆祈佛絲管家家盡禮神獨有一間夫子廟滿庭春草寂無人慨然以興起斯文為己任納臧獲百口于成均館卒後配享文廟六月國學大成殿成初元耶律希逸以殿宇隘陋甚失泮宮制度勸王重新文廟以振儒風至是乃成王詣國學忽憐林元從之七館諸生具冠服迎謁于道獻歌謠王入大成殿謁先聖命密直使作入學頌林元作愛日針以示諸生忠宣王即位之戊申元至大元年十一月辛未王在金文衍家百官會梨峴新宮王下教曰一大成至聖文宣王百代之師春秋釋奠朔望祭享諸儒聚會宜加精潔一儒宗弘儒侯薛聰文昌侯崔致遠並宜加號忠肅王元年甲寅元延祐元年教曰化民成俗必由學校邇來成均館不勤教誨諸生皆棄其業朔望之奠二丁之祭辭以他故而不與焉有乖先王之典其令祭酒每行奠謁務崇修潔諸生不與者徵白金一斤以充養賢庫又十二年乙丑冬十月教曰其祭文宣王十哲七十子本國文昌侯弘儒侯務致蠲潔恭愍王元年元至正十二年八月始開書筵教曰元老大臣大夫士輪番入侍進講經史法言恭愍王六年元至正十七年春正月命修中外學校冬十月諫官李穡等請行三年喪從之恭愍王十五年元至正二十六年十二月郭永錫元中書檢校謁文廟見學舍荒頽謂館伴李穡曰吾聞貴國自古右文何至是耶穡曰國學火于辛丑王方務息民至於宮禁尚未營葺此乃開城府學也王聞而甚慚恭愍王十六年元至正二十七年以判開城府事李穡兼大司成增置生員又擇經術之士金九容鄭夢周朴尚衷朴宜中李崇仁等皆兼學官先是館生不過數十穡更定學式每日坐明倫堂分經授業講畢論難忘倦於是學者坌集程未性理之學始興時經書至東方者唯朱子集注耳夢周講説發越超出人意聞者頗疑及得胡炳文四書通無不吻合諸儒尤加歎服穡亟稱之曰夢周論理橫説竪説無非當理推為東方理學之祖夢周迎日縣人為人豪邁絶倫有忠孝大節少好學不倦精研性理之學深有所得時俗喪祭專尚桑門法夢周始令士庶倣朱子家禮立家廟奉先祀又內建五部學堂外設鄉校以興儒術朝鮮五百年間凡設學校國學鄉校而養士御經筵而講道及釋奠祀聖科舉取士之制悉依麗氏之法尚玄又曰自堯舜禹湯文武以至伊傅周召箕微等諸聖之遺法統以言之曰儒教况孔子祖述堯舜憲章文武乎故今以箕子之來朝鮮斷為儒教輸入之始云爾支那自堯舜以來洪範五行之説殆為學述之質幹尚書云鯀湮洪水汩陳其五行帝乃震怒不卑洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸敘其子既以其道陳於周武王矣則其來化朝鮮之民亦應以此道教導之乃無疑之事蓋洪範九疇所謂五行五紀稽疑庶徵無非陰陽曆數吉凶卜筮風雨休咎之事按文獻備考涵虛子曰箕子率中國五千人入朝鮮其詩書禮樂醫巫陰陽卜筮之流皆從往焉以是驗之朝鮮之人沈痼於陰陽五行術數之説從古已然即自箕子洪範流傳者耳見後星湖洪範説高麗儒教始於講經終於科試朝鮮時代亦復如是儒之為教政治性質十有八九凡國學鄉校所養之士皆為將來出而事君立身揚名之準備者故儒教亦謂名教其所蘊養者箇箇皆是崇王而黜伯是古而非今輒曰仲尼之門五尺之童羞稱五伯又曰非先王之法服不敢服非先王之法言不敢言如是膠守不識活用借如今世欲使去瓊宮瑤臺而處土階茅茨則是不可能之事也欲使棄厚祿套大禮服之時裝而用山龍文華蟲章之法服則亦不相當之事也一代自有一代之文物制度居今之世必欲行古之道不通之甚古之一儒者對人言曰若人平生能行論語中一句之訓則可為君子人也對曰吾平生實行論語中三句之訓而猶未為君子人問何三句對曰食不厭精膾不厭細狐貉之厚以居此語雖涉戲謔蓋為譏諷世之業儒者口堯舜語孔孟而無其實耳支那歸熙甫云今科舉所舉千二百人讀其文莫不崇王黜霸貶蕭曹而薄姚宋信如所言是朝家三年之中例得臯夔周孔千二百人豈有是哉佛云末法時代有教理而無行果末季之弊儒佛同轍也海東儒教至高麗鄭夢周始振興之其講性理也祖朱子設鄉校也師朱子創祭禮也倣朱子朝鮮五百年間儒風悉依鄭氏之遺法雖名儒輩出而講道論理要不出程朱之範圍其曰理氣曰禮説等朱説之外無他事焉若有一字新説則輒斥為異端間有見識卓越之人稍為改訂經書之一二句讀亦必科之以斯文亂賊故五百年間儒學界在黑洞之中矣朝鮮儒者之尊朱子甚於尊孔子猶如朝鮮禪者之尊祖師甚於尊佛何以然也蓋諸佛書所云比丘比丘尼之丘字非孔聖之諱乎雖然儒家不能令改之而青巖寺定慧大師本號晦菴以其與朱子同號儒論羣起不勝其勢焰終乃改稱晦堂驗此一事可以證之也溯考朝鮮一代若論儒之有保守之性者李退溪先生是也崇考亭黜姚江儒之有經世之學者柳磻溪李星湖丁茶山三先生是也儒之能自創己見者則韓藝翁先生是也儒之能發明真理者李東武先生是也今列五人之略傳于後柳馨遠號磻溪字德夫文化人文化人者謂籍貫也後四倣此寬之後光海壬戌生公生才二歲能悲哀號慕不食肉三四歲凡遇日用事物必問本末至其極處草木禽蟲皆不忍傷害五歲通算數就學於伯舅李監司元鎮姑夫金判書世濂一讀輒誦七歲讀禹貢至冀州翻然起舞問之對曰不圖二字之尊重至於此也十歲善屬文通經傳百家論難出人意表李金二公歎曰此等才古或有之耶十三四歲慨然有慕聖賢之志專心為己之學於舉業不屑也丙子避虜亂將王父母母夫人及兩姑以行王父年老三家家屬仗公一丁男時年十五有強盜出山谷攔道一行懼公挺身曰人孰無父母爾無震驚我父母行裝從汝取去盜感其言散去甲申以後連遭喪故南歸于扶安縣愚磻洞居焉公書室在松臺下竹林中藏萬卷書竹扉常掩麋鹿晝行公顧而樂之曰古人云靜而後能安能慮旨哉言乎每月夜彈琴而歌歌用周詩音用漢語聲律若出金石其襟韻飄灑真天下之高士也丁未有唐船漂泊耽羅皆福建人不剃髮公往見操漢音問中朝事有能文者鄭喜曾勝等流涕言永曆帝保有南方四省今為永曆二十一年云取裝中曆書示之果然公悲喜作詩公所著有隨録四十餘卷又有正音指南武經四書輿地全志郡縣制理氣總論論學物理經説問答記行日録續綱目疑補東史綱目條例東國歷史東國可考朱子纂要東國文獻紀效新書節要書説書法參同契抄地理羣書等諸書皆經國濟民之書也洪啓禧作傳曰居最濱海常置大船四五制極便利畜駿馬日可行四百里藏良弓美箭鳥銃數十以教家僮及村氓至今愚磻一里多有以善炮名者嘗裒聚水路朝天記及漂海人所録以記諸站某處夷險歷歷如指掌至於文藝詞章兵謀師律陰陽律呂天文地理醫藥卜筮算計方譯之類亦皆旁通而天下山川之險易道路之通塞海外蠻夷之俗無不周知雖道釋異端之説亦必深究而別其是非十年苫塊已嬰奇疾癸丑春卒年五十二有白氣亘天見者異之特贈執義磻溪隨録二十六卷今行于世英祖十三年其孫柳薰之所刊行者其隨筆大概田制田制後録田制考説田制後録考説教選之制教説考説任官之制任官考説職官之制職官考説祿制祿制考説兵制兵制後録兵制録考説續編諸書李瀷字子新號星湖驪江人肅宗辛酉生幼聰穎絶人博覽羣書及仲兄剡溪潛罹禍無意於世棄舉業從兄玉洞遊慨然有求道之志除監役不就年八十三卒所著有治水辨洪範説朔望明魄後天圖説著卦考啓蒙翼傳日月蝕黃赤道潮汐曆月歲差律準量衡貢舉選舉學制用人朋黨均田田制水利賦稅戶口糶糴兵制奴婢釋放錢斃政治更張等説凡於改革舊制無有餘力又尊慕退溪先生編道東録李先生禮説四七新編四書三經心近家禮小學疾書及藿憂録僿説稻譜鄉居要覽並遺集等書公嘗曰百世無善治由於三孽尊君抑臣自嬴政始漢不能革用人尚閥自魏瞞始晉不能革文辭科式自楊廣始唐不能革三孽不去不足以言治三者之中科舉尤害公於天文星算律曆無不精通考井田法與洪範洛書相通之義命門人安順菴鼎福撰東史綱目星湖先生所著洪範説云洪水之世堯舜臨上大禹受命治之皇天眷顧錫以洪範九疇九疇者洛書也天既以此錫之豈更有可錫之九數耶何以為證洛書之位生數之二與成數之八分明相易而洪範二五事之肅乂哲謀聖與八庶徵之肅乂哲謀聖亦為相應範與書之初非兩物可知也孔子曰河出圖洛出書聖人則之天之錫人非如人之口耳相傳如河之出圖伏羲演之為卦此便是這物洛之為範亦猶是也然則洛書自一至九凡九字即洛書本文洪範之自初一曰至威用六極合六十五字乃大禹演出者其實一事也範之排列位次不過依洛書而為之其二八互易之類明有脈絡可尋此豈偶然而然者耶或疑大禹洪範不見當時而歷殷至周因箕子而始闡然帝典曰有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞禹汝平水土惟時懋哉惠疇即天錫之九疇也遂因平水之功命為司空使宅百揆命稷播穀食貨之任也命契敷教司徒之任也命臯為士司寇之任也此九疇之中八政之概也中略東史所録只舉八條而又失其五後人摸索不著強以五倫當之非也洪範之絶於天下行於東土自箕子始箕子豈不能曉其先後之序耶五行五事之外首先當施者八政也八政之急先當設者非司寇之任耶東俗所傳三條不過如此東人以為八政之外別有八教者訛傳而無人辨得出也後張良得之為漢家草創之制意者前代樹國定亂時規模如此而箕子述之也以箕子而設洪範何物不備自此東俗相傳尚有可驗如平壤四區之田的是殷制而通國白衣亘古不變天子失官學在四夷非虛語也婚禮之作自殷王始故歸妹之六五曰帝乙歸妹泰之互體為歸妹故泰之六五亦曰帝乙歸妹其丁寧裕後如此殷制尚白故賁之六四曰賁如皤如白馬翰如匪寇婚媾婚媾白馬自殷始也按麗史忠宣王尚元公主幣用白馬八十一匹饌用本國油蜜果皆婚媾之常例今閭里之婚必用白馬古俗不廢據洪範八政此舊司徒之職也以此求之苟非箕子當時遺教此俗何從而有之乎此亦禮失求野之一證也丁若鏞字美庸號茶山英祖壬午生又號俟庵又號洌樵其儒學經濟實磻溪後之一人而其學術淵源出於星湖者也公每稱星湖曰夫子正祖己酉生員文科以抄啓文臣庚戌與金履喬同薦翰林因崔景嶽臺疏不赴試後膺召試又不供職配湖沿旋放壬子正月與韓致應同擢本館録明年升同副承旨又以與兄若鍾共看西學事乙卯七月左遷金井察訪放歸即除谷山府使丁巳復除承旨及正祖升遐純祖辛酉坐兄若鍾西學獄披謫康津戊寅放還凡十九年丙申卒年七十五贈吏判諡文度公識博古今志存民國凡名物度數百家技藝無不精通文章經學亦超絶世倫真曠世之偉才古來罕覩之碩儒也遭世迍邅在謫數十年所著書甚富有諸經講義與猶堂集疆域考牧民心書欽欽心書雅言覺非物名考醫學要鑑等數百卷皆經世濟民之術至言要道之攸在也韓錫地字平仲號藝翁初號藝菴清州人英祖己丑生于咸興仕止殿參家居著書有明善録曰致知上中下篇辨謬上中下篇闡奧上中下篇書凡九篇屢十萬言不蹈前人之窠臼別出自己之機杼格物致知闡發幽奧年九十五卒先生卒後約百年出李濟馬東武子創四象學説在儒學界始放大光明焉朝鮮總督府設立經學院于舊成均館置大提學一人副提學二人祭酒五人司成若干人直員若干人京城及十三道置講師各一人各郡鄉校亦置直員各一人獎勵儒學務期實用明治四十四年六月十五日朝鮮總督府令第七十二號尚玄曰今世皆以孔子之道為政治學哲學不認定以宗教大正四年八月十六日朝鮮總督府令第八十三號頒布布教規則認神道佛道及基督教為宗教而儒教不與焉今之世界文運大進政治宗教判為兩途非復昔日混一之觀蓋支那者儒教原産之國而亦幾千年儒教之國也今則異前其據如左國務院呈孔教不能為國教文中華民國三年即當大正三年為呈明事定孔教為國教一事海內士夫之交請贊同者儳焉不可終日而反對者流則謂國教定於一尊有損個人之信仰自由必啓宗教之紛爭慘禍其交請主持者亦儳焉不可終日二者均持之有故言之成理雖其主張各異要皆為奠定國基範圍人心起見與夫異教相攻甲説乙駁者純然不同惟政府於此二者之間熟察國家趨勢橫覽世界潮流竊以為神權作用既不宜於人類進化之時期而政教分離又已成為列強所行之政策則與其定國教於憲法實不如許國民以自由此非僅亦政府大公無我之心而其實即為維持世界之用此中意指請略撮陳夫其所謂國教者即全國國民所奉宗教之謂大凡創一宗教者其制行必堅固卓絶其宅心必仁恕慈厚而又附會之以天堂地獄之説緣飾之以普度衆生之詞故其人得成為教主其言得著為教規其衣鉢之傳嬗愈綿亦信徒之歸依愈衆篤信死守相習成風只求其宗教之能亘古長存雖赴湯蹈火毀身滅體而亦不惜靈魂信仰之作用其力有如此者姑無論怪力亂神胥聖人所不語詩書易禮咸載治平之大經孔子無一有類於宗教家也即使有一二遺言能依附以明道比例以説教而當此科學昌明宗教多門之日執全國人而與談神道夫既有所不能強他教徒以崇拜一宗勢亦徒滋其擾則請定孔教為國教與國教必定於一尊之説之非諳於時勢者也中國數千年來毫無宗教之爭誠為歷史上一大特色而究其所以不啓紛爭之故則以諸子百家各成學説雖間有黨同伐異出主入奴者亦只成為學説之派別而無關於教門之爭持雖歷朝君相備為孔子之尊崇然因其學説之有政治而尊之故能於一國之中合佛教徒道教徒而各相安以無事使歷朝因尊孔之故而即明定孔教為國教恐歐洲新舊教相仇之戰十字軍翼教之戰早已演成慘劇於中國矣夫異教相爭之禍歐人既已痛定思痛而日籌所以補救之方而我乃為之特樹門墻獨標教幟不為前車之殷鑒不思來軫之方遒則將來之妨害安寧貽患社會並即因之以攪亂世界和平者寧復可為思議乎況在今日之民國為五族所共和即以漢滿民族而論其崇奉釋迦回回天主耶穌各教者是否於國內潛伏有勢力在若一旦定孔教為國教則彼釋迦回回天主耶穌各教徒其將默爾而息抑將羣起以爭此不可不預為慮及者也而况漠北之蒙古崇信佛教喇嘛天西之藏衛皈依紅黃兩派西北之回疆又專為穆罕默特之信仰蒙藏回三者其土為我國之領域其人為我國之人民均屬被治於我國法律之下若一旦定孔教為國教則試問對於蒙藏回三省信教問題是否使其棄舊所有佛回等教而專信孔教抑或僅存孔教為國教之虛名而使之崇奉其原有之教如前之一説不惟事實上不能辦到並即立起蒙回藏分裂之端如後之一説則政府既為統一國教起見又何取乎有名無實之政策由此觀之則孔教之不能定為國教與國教之不能定於一尊彰彰明矣且夫宗教之在今日其於政治上早已不成問題而猶或利用之者則以宗教所至之處即為國力所至之處也云云由是觀之支那之人今亦洞知宗教之所以為宗教政治之所以為政治尊重人民信仰之自由顧慮國家利斃之關係與南宋諸儒大為不同是亦世界之潮流之所使然也夫四象學説人稟性情李東武先生者全州人咸興望族世業儒其祖進士攀五嘗夢見一龍馬濟大川而來入其家覺而公誕焉時憲宗大王三年丁酉三月十九日也乳名濟馬因以行于世字務平號東武有大志好讀書十餘歲通經史散家財濟窮困周遊四方觀風察俗名聞于朝金大將基錫薦于朝招為別選軍官旋授鎮海縣監不一年棄之去李太王丙戌土匪猖獗轉入北道陷咸興府殺害長吏時公適家居府中吏民輿而迎之請靖匪亂公以威德執匪魁延道伯咸鏡一道賴以全安以功授高原郡守不久又棄去庚子九月二十一日卒于咸興公有二子長曰龍海次曰龍水門人金永寬韓稷淵宋賢洙韓昌淵韓台彬魏俊赫等栗洞契局葬公于府西士里栗洞之原從公之生營也公於經術宗韓藝翁先生而其格物致知窮理盡性出自易學著有東武遺稿格致考東醫壽世保元等書創四象學説蓋其學即心理也性理也生理也醫理也若人擴充其學則萬事可以治善用其情則百病可自安實濟衆之津筏先生自跋東醫壽世保元曰萬室之邑一人陶則器不足也百家之村一人醫則活人不足也必廣明醫學家家知醫人人知病然後可以壽世保元云云誠仁人之言也亦知人之水鏡蓋性相之妙理莫如周易而哲學之應用亦莫如四象嗚呼東武子其殆聖者乎四端論人稟臟理有四不同肺大而肝小者名曰太陽人肝大而肺小者名曰太陰人脾大而腎小者名曰少陽人腎大而脾小者名曰少陰人人趨心欲有四不同棄禮而放縱者名曰鄙人棄義而而偷逸者名曰懦人棄智而飾私者名曰薄人棄仁而極欲者名曰貪人五臟之心中央之太極也五臟之肺脾肝腎四維之四象也中央之太極聖人之太極高出於衆人之太極也四維之四象聖人之四象旁通於衆人之四象也太少陰陽之臟局短長四不同中有一大同天理之變化也聖人與衆人一同也鄙薄貪懦之心地清濁四不同中有萬不同人欲之濶狹也聖人與衆人萬殊也太少陰陽之短長變化一同之中有四偏聖人所以希天也鄙薄貪懦之清濁濶狹萬殊之中有一同衆人所以希聖也聖人之臟四端也衆人之臟亦四端也以聖人一四端之臟處於衆人萬四端之中聖人者衆人之所樂也聖人之心無欲也衆人之心有欲也以聖人一無欲之心處於衆人萬有欲之中衆人者聖人之所憂也然則天下衆人之臟理亦皆聖人之臟理而才能亦皆聖人之才能也以肺脾肝腎聖人之才能而自言曰我無才能云者豈才能之罪哉心之罪也浩然之氣出於肺脾肝腎也浩然之理出於心也仁義禮智四臟之氣擴而充之則浩然之氣出於此也鄙薄貪懦一心之欲明而辨之則浩然之理出於此也聖人之心無欲云者非清淨寂滅如老佛之無欲也聖人之心深憂天下之不治故非但無欲也亦未暇及於一己之欲也深憂天下之不治而未暇及於一己之欲者必學不厭而教不倦也學不厭而教不倦者即聖人之無欲也毫有一己之欲則非堯舜之心也暫無天下之憂則非孔孟之心也太陽人哀性遠散而怒情促急哀性遠散則氣注肺而肺益盛怒情促急則氣激肝而肝益削太陽之臟局所以成形於肺大肝小也少陽人怒性宏抱而哀情促急怒性宏抱則氣注脾而脾益盛哀情促急則氣激腎而腎益削少陽之臟局所以成形於脾大腎小也太陰人喜性廣張而樂情促急喜性廣張則氣注肝而肝益盛樂情促急則氣激肺而肺益削太陰之臟局所以成形於肝大肺小也少陰人樂性深確而喜情促急樂性深確則氣注腎而腎益盛喜情促急則氣激脾而脾益削少陰之臟局所以成形於腎大脾小也肺氣直而伸脾氣栗而包肝氣寬而緩腎氣溫而畜肺以呼肝以吸肝肺者呼吸氣液之門戶也脾以納腎以出腎脾者出納水穀之府庫也哀氣直升怒氣橫升喜氣放降樂氣陷降哀怒之氣上升喜樂之氣下降上升之氣過多則下焦傷下降之氣過多則上焦傷哀怒之氣順動則發越而上騰喜樂之氣順動則緩安而下墜哀怒之氣陽也順動則順而上升喜樂之氣陰也順動則順而下降哀怒之氣逆動則暴發而並於上也喜樂之氣逆動則浪發而並於下也上升之氣逆動而並於上則肝腎傷下降之氣逆動而並於下則脾肺傷頻起怒則腰脅頻迫而頻蕩也腰脅者肝之所住著處也腰脅迫蕩不定則肝其不傷乎乍發喜而乍收喜則胸腋乍濶而乍狹也胸腋者脾之所住著處也胸腋濶狹不定則脾其不傷乎忽動哀而忽止哀則脊曲忽屈而忽伸也脊曲者腎之所住著處也脊曲屈伸不定則腎其不傷乎屢得樂而屢失樂則背顀暴揚而暴抑也背顀者肺之所住著處也背顀抑揚不定則肺其不傷乎太陽人有暴怒深哀不可不戒少陽人有暴哀深怒不可不戒太陰人有浪樂深喜不可不戒少陰人有浪喜深樂不可不戒皋陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬三復大禹之訓而欽仰之曰帝堯之喜怒哀樂每每中節者以其難於知人也大禹之喜怒哀樂每每中節者以其不敢輕易於知人也天下喜怒哀樂之暴動浪動者都出於行身不誠而知人不明也知人帝堯之所難而大禹之所吁也則其誰沾沾自喜乎蓋亦益反其誠而必不可輕易取舍人也雖好善之心偏急而好善則好善必不明也雖惡惡之心偏急而惡惡則惡惡必不周也天下事宜與好人做也不與好人做則喜樂必煩也天下事不宜與不好人做也與不好人做則哀怒益煩也哀怒相成喜樂相資哀性極則怒情動怒性極則哀情動樂性極則喜情動喜性極則樂情動太陽人哀極不濟則忿怒激外少陽人怒極不勝則悲哀動中少陰人樂極不成則喜好不定太陰人喜極不服則侈樂無厭如此而動者無異於以刀割臟一次大動十年難復此死生壽夭之機關也不可不知也太少陰陽之臟局短長陰陽之變化也天稟之已定固無可論天稟已定之外又有短長而不全其天稟者則人事之修不修而命之傾也不可不慎也太陽人怒以一人之怒而怒千萬人其怒無術於千萬人則必難堪千萬人也少陰人喜以一人之喜而喜千萬人其喜無術於千萬人則必難堪千萬人也少陽人哀以一人之哀而哀千萬人其哀無術於千萬人則必難堪千萬人也太陰人樂以一人之樂而樂千萬人其樂無術於千萬人則必難堪千萬人也太陽少陽人但恆戒哀怒之過度而不可強做喜樂虛動不及也若強做喜樂而煩數之則喜樂不出於真情而哀怒益偏也太陰少陰人但恆戒喜樂之過度而不可強做哀怒虛動不及也若強做哀怒而煩數之則哀怒不出於真情而喜樂益偏也喜怒哀樂之未發謂之中發而皆中節謂之和喜怒哀樂未發而恆戒者此非漸近於中者乎喜怒哀樂已發而自反者此非漸近於節者乎擴充論太陽人哀性遠散而怒情促急哀性遠散者太陽之耳察於天時而哀衆人之相欺也哀性非他聽也怒情促急者太陽之脾行於交遇而怒別人之侮己也哀情非他怒也少陽人怒性宏抱而哀情促急怒性宏抱者少陽之目察於世會而怒衆人之相侮也怒性非他視也哀情促急者少陽之肺行於事務而哀別人之欺己也哀情非他哀也太陰人喜性廣張而樂情促急喜性廣張者太陰之鼻察於人倫而喜衆人之相助也喜性非他嗅也樂情促急者太陰之腎行於居處而樂別人之保己也樂情非他樂也少陰人樂性深確而喜情促急樂性深確者少陰之口察於地方而樂衆人之相保也樂性非他味也喜情促急者少陰之肝行於黨與而喜別人之助己也喜情非他喜也太陽之耳能廣博於天時而太陽之鼻不能廣博於人倫太陰之鼻能廣博於人倫而太陰之耳不能廣博於天時少陽之目能廣博於世會而少陽之口不能廣博於地方少陰之口能廣博於地方而少陰之目不能廣博於世會太陽之脾能勇統於交遇而太陽之肝不能雅立於黨與少陰之肝能雅立於黨與而少陰之脾不能勇統於交遇少陽之肺能敏達於事務而少陽之腎不能恆定於居處太陰之腎能恆定於居處而太陰之肺不能敏達於事務太陽之聽能廣博於天時故太陽之神充足於頭腦而歸肺者大也太陽之嗅不能廣博於人倫故太陽之血不充足於腰脊而歸肝者小也太陰之嗅能廣博於人倫故太陰之血充足於腰脊而歸肝者大也太陰之聽不能廣博於天時故太陰之神不充足於頭腦而歸肺者小也少陽之視能廣博於世會故少陽之氣充足於背膂而歸脾者大也少陽之味不能廣博於地方故少陽之精不充足於膀胱而歸腎者小也少陰之味能廣博於地方故少陰之精充足於膀胱而歸腎者大也少陰之視不能廣博於世會故少陰之氣不充足於背膂而歸脾者小也太陽之怒能勇統於交遇故交遇不侮也太陽之喜不能雅立於黨與故黨與侮也是故太陽之暴怒不在於交遇而必在於黨與也少陰之喜能雅立於黨與故黨與助也少陰之怒不能勇統於交遇故交遇不助也是故少陰之浪喜不在於黨與而必在於交遇也少陽之哀能敏達於事務故事務不欺也少陽之樂不能恆定於居處故居處欺也是故少陽之暴哀不在於事務而必在於居處也太陰之樂能恆定於居處故居處保也太陰之哀不能敏達於事務故事務不保也是故太陰之浪樂不在於居處而必在於事務也太陽之交遇可以怒治之而黨與不可以怒治之也若遷怒於黨與則無益於黨與而肝傷也少陰之黨與可以喜治之而交遇不可以喜治之也若遷喜於交遇則無益於交遇而脾傷也少陽之事務可以哀治之而居處不可以哀治之也若遷哀於居處則無益於居處而腎傷也太陰之居處可以樂治之而事務不可以樂治之也若遷樂於事務則無益於事務而肺傷也太陽之性氣恆欲進而不欲退少陽之性氣恆欲舉而不欲措太陰之性氣恆欲靜而不欲動少陰之性氣恆欲處而不欲出太陽之進量可以進也自反其材而不莊不能進也少陽之舉量可以舉也自反其力而不固不能舉也太陰之靜量可以靜也自反其知而不周不能靜也少陰之處量可以處也自反其謀而不弘不能處也太陽之情氣恆欲為雄而不欲為雌少陰之情氣恆欲為雌而不欲為雄少陽之情氣恆欲外勝而不欲內守太陰之情氣恆欲內守而不欲外勝太陽之人雖好為雄亦或宜雌若全好為雄則放縱之心必過也少陰之人雖好為雌亦或宜雄若全好為雌則偷逸之心必過也少陽之人雖好外勝亦宜內守若全好外勝則偏私之心必過也太陰之人雖好內守亦宜外勝若全好內守則物欲之心必過也太陽人雖至愚其性便便然猶延納也雖至不肖人之善惡亦知之也少陽人雖至愚其性恢恢然猶式度也雖至不肖人之知愚亦知之也太陰人雖至愚其性卓卓然猶教誘也雖至不肖人之勤惰亦知之也少陰人雖至愚其性怛怛然猶撫循也雖至不肖人之能否亦知之也太陽人謹於交遇故恆有交遇生踈人慮患之怒心此心出於秉彜之敬心也莫非至善而輕於黨與故每為親熟黨與人所陷而偏怒傷臟以其擇交之心不廣故也少陰人謹於黨與故恆有黨與親熟人擇交之喜心此心出於秉彜之敬心也莫非至善而輕於交遇故每為生踈交遇人所誣而偏喜傷臟以其慮患之心不周故也少陽人重於事務故恆有出外興事務之哀心此心出於秉彜之敬心也莫非至善而不謹於居處故每為主內做居處人所陷而偏哀傷臟以其重外而輕內故也太陰人重於居處故恆有主內做居處之樂心此心出於秉彜之敬心也莫非至善而不謹於事務故每為出外興事務人所誣而偏樂傷臟以其重內而輕外故也太陰之頷宜戒驕心太陰之頷若無驕心絶世之籌策必在此也少陰之臆宜戒矜心少陰之臆若無矜心絶世之經綸必在此也太陽之臍宜戒伐心太陽之臍若無伐心絶世之行檢必在此也少陽之腹宜戒夸心少陽之腹若無夸心絶世之度量必在此也少陰之頭宜戒奪心少陰之頭若無奪心大人之識見必在此也太陰之肩宜戒侈心太陰之肩若無侈心大人之威儀必在此也小陽之腰宜戒懶心少陽之腰若無懶心大人之材幹必在此也太陽之臀宜戒竊心太陽之臀若無竊心大人之方略必在此也朝鮮古代神教已行檀君神教朝鮮檀君教有二途一為神教奉事桓因天是也一為仙派傳承廣成子是也按大倧教書神檀實紀云檀國檀君桓因桓雄桓儉一云檀因檀雄檀君是為三神上元甲子十月三日桓儉以神化人持天符三印降于太白山檀木下乃設神教而教民時人民被化歸者如市有神市之稱乃置三千團部開天二百二十五年戊辰十月三日國人推戴神人為壬儉是為檀君國號檀稱號倍達娶匪西岬河伯女為后生太子扶婁當洪水命彭虞治山川奠民居神志掌書契高矢治田事一百四十七年庚寅自太白移都平壤改國號朝鮮一百九十一年甲戌遣太子扶婁往夏禹氏塗山會封支子于扶餘以余守己為濊君長使其子九人分掌諸郡以裶天生為南海上長設祭天壇壇在江華摩尼山築三郎城後徙都唐莊京京在信川今莊莊坪是也二百十七年庚子三月十五日入阿斯達山今信川九月山化神御天開天二百十七年在君位九十三年傳不知幾世歷一千二百十二年太白阿斯達皆有祠參考三國遺事古朝鮮王儉朝鮮三國遺事云魏書云乃往二千載有壇君王儉立都阿斯達經云無山亦云白嶽在白州或云在開城東今白嶽宮是開國號朝鮮與高避堯作高同時古記云昔有桓國謂帝釋也尚玄曰桓國是桓因之誤帝釋名桓因庶子桓雄數意天下貪求人世父知子意下視三危太伯可以弘益人間乃授天符印三箇遣往理之雄率徒三千降於太伯山頂今妙香山神壇樹下謂之神市是謂桓雄天王也將風伯雨師雲師而主穀主命主病主刑主善惡凡主人間三百六十餘事在世理化中略神雄生子號曰壇君王儉以唐高即位五十年庚寅唐堯即位元年戊辰則五十年丁巳非庚寅也疑其未實都平壤城始稱朝鮮又移都於白嶽山阿斯達又名亐一作方忽山又今彌達御國一千五百年周虎王即位己卯封箕子於朝鮮壇君乃移於唐藏京後還隱於阿斯達為山神壽一千九百八歲人間百年為帝釋天一晝夜然則一千九百八歲尚未滿二十晝夜也參考青鶴集青鶴上人者朝鮮羽流也姓魏名漢祚有弟子雲鶴雲鶴又有弟子曰龍岑居士趙汝籍朝鮮宣祖時人撰青鶴集一日魏先生青鶴上人登九月山翠窟子問曰檀君何以遷唐莊里先生曰檀君有才子四人曰夫婁夫蘇夫吳夫餘夏后會諸侯於塗山夫婁奉使入朝九夷猰㺄之亂夫餘會集中外國討平之國有疾病夫吳醫藥而活之山多猛獸夫蘇火獵而攘之是四王子功冠當世業垂後辟者也帝堯九年之水大禹八年之治洪水滔天泛濫登萊之海浿水漲溢平壤沈潛四王子來登是山相土地之宜都于唐莊里今三聖祠之地今觀其水勢東走原土乾燥日後若茸津潮生馬嶺石立此地重為王者之宅矣此段編于歲乙酉宣祖十四年之下參考神志祕詞按星湖僿説云神志祕書不知誰作安鼎福順庵注曰權攬應制詩注云神志檀君時人也世號神志仙人云如稱錘極器稱幹扶踈梁錘者五德地極器百牙岡朝降七十國賴德護神精首尾均平位興邦保太平若廢三諭地王京有衰傾尚玄曰三諭地疑即三國遺事所謂三危太伯也檀君世紀扶餘高句麗百濟新羅渤海濊貊東沃沮沸流肅慎三韓定安遼金皆其苗裔也神檀實紀已下倣此檀君疆域東至大海南踰鳥嶺西渡遼河北跨黑水族統源流檀君之裔曰倍達檀君之世人民號檀為倍達今音轉為朴達種族分為五派一曰朝鮮族二曰北扶餘族三曰濊貊族四曰沃沮族五曰肅慎族教化源流東方始無君長神人率其屬三千降于太白山檀木下謂之神市立為君是為檀君海東樂部太白檀歌檀君以神設教其神有風伯雨師雲師主治人間三百六十六事古紀檀君立教主穀主命主刑主病主善惡以男女父子君臣衣服飲食宮室編髮蓋首之制化之古紀太古自黑水至漢南有九小國各保一方曰畎族曰干族曰方族曰黃族曰白族曰赤族曰玄族曰風族曰陽族是謂九族檀君以神教化之古史東方檀君首出以神聖之化教民厚勤濟濟為強族教名扶餘曰代天教新羅曰崇天教高句麗曰敬天教高麗曰王儉教每十月拜天續宛委餘編我東倧教誤指為仙教然實檀君設教也東事類考國有玄妙之道實乃包含三教接化羣生且如入則孝於親出則忠於君魯司寇之旨也處無為之事行不言之教周柱史之宗也諸惡莫作諸善奉行竺乾太子之化也崔致遠鸞郎碑序及三國史主神有統治全世界之無量智能而不見其形體坐於最上之天在地上者皆其驅使小神又扶餘族論曰宗教拜天滿洲志歷代祭天箕子為周武王陳洪範九疇其三八政三曰祀所以報本追遠而交神明也箕氏之世神人大順民知所從而方內泰寧及衛滿之季神人無主神事志扶餘十月大會禱天神歌舞鼓吹名曰迎鼓濊貊每十月祭天晝夜歌舞名曰舞天馬韓每十月農事畢國邑各立一人主祭祭天神名曰天君高句麗每歲三月十月大會祭天名曰東盟百濟每歲四仲月祭天名曰郊天新羅因三韓俗以十月祭天晝夜聚飲鼓瑟歌舞踏地為節高麗十月二日燃燈事天神遼每歲十月用豫和樂祭天神金承遼俗於三月九日拜天射柳已上神檀實紀現代倧教前韓光武八年丙午羅哲吳赫等復創檀君神教改稱大倧教倧字義上古神人明治四十五年壬子金教獻柳瑾等刊行三一神誥大正三年甲寅金教獻柳瑾等博考舊史纂輯神檀實紀仍刊行之大正五年丙辰大倧師羅哲入于九月山三聖祠自經死殉教也以遺囑推金教獻繼為大倧師尚玄曰檀君神教實與佛經中所言天者大體相似欲界凡有六天而其第一天名四天王天東方天西方天南方天北方天修十善業者四十二章經云佛言衆生以十事為善亦以十事為惡同等為十身三口四意三身三者殺盜淫口四者兩舌惡口妄言綺語意三者嫉恚癡如是十事不順樂道名十惡行是惡若止名十善行得生天國第二天名忉利天居須彌山頂有三十三天宮故亦名三十三天忉利天主名釋提桓因譯云能作天主即帝釋天王亦云帝釋菩薩經云四天王天有五大神常隨侍側半月三齋八日十四日十五日四天王常以八日敕諸使者汝等按行世間視察人民孝父母敬沙門識心達本源曰沙門及長老受齋持戒布施者使者奉教具戒善惡聞惡不悅言善則喜十四日王常遣太子按行天下十五日四天躬自履歷然後詣善法殿具啓帝釋聞惡則憂言善則樂桓雄天王受天之符降生人間主命主病主刑主善惡等三百六十餘事則與經説相符又桓因天主也桓雄天神也桓儉受天命之神人三神一體教化人民彼耶穌教所云聖父聖子聖神為三位一體又云耶穌以天主之獨生子受天主命降生救世又以十誡銘為生天之因與修十善業生欲界天節節對照一一類似若以年代計之則檀君降生已為四千年而耶穌降生不滿二千年檀儉之久倍於耶穌而早已有此等神話真可謂奇中之奇者也經云觀世音菩薩三十二應身若諸衆生欲為天主統領諸天我於彼前現帝釋身而為説法令其成就若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為説法令其成就若諸衆生樂為人主我於彼前現人王身而為説法令其成就檀耶俱以天主之子受命降生救世度人抑亦菩薩之現身歟檀君仙派按青鶴集金蟬子曰卞沚記壽四聞録者記吾東道流之叢有曰桓仁真人桓仁料是桓因之誤受業于明由明由受業于廣成子古之仙人也桓仁為東方仙派之宗桓雄天王桓仁之子也繼志述事又主風雨五穀三百六十餘事以化東民檀君繼業化行千年九夷共尊之立為天王篷亭柳闕而居陶髮跨牛而治主世一千四十八年入阿斯達山即九月山也檀代方言呼九曰阿斯呼月曰達仙去子孫蕃衍當其時大國九小國十二大抵皆檀氏也其後有文朴氏居阿斯達山韶顏方瞳能傳檀君之道永郎者向彌山人也行年九十有嬰兒之色鷺羽之冠鐵竹之杖逍遙于湖山遂傳文朴之業馬韓時有神女寶德者御風而行抱琴而歌貌若秋水之芙蓉是承永郎之道焉新羅初有瓢公者瓢公疑是瓠公之誤自東海乘瓢而來為羅國名宰煮玉而食茹木而衣呼風喚雨驅禽喝獸其終也入雪嶽山是則仙家別派也駕洛國居登王時有嵒始仙人者自七點山而來貌瀅寒玉語類梵音見王於招賢臺曰君以自然為治則民以自然成俗饋以太牢辭不受索楓香桔梗而餐此則瓢公之流派也勿稽子者羅時名臣有功不賞携琴入斯彛山春居林木冬居穴室孝恭王時玉龍子見之于楓嶽山稚顏雪膚提壺而歌以問年考之幾八百歲矣是則七點之裔也玉寶高者學金山人李純者皆習隱高士也是乃寶德之分派也大世仇柒泛舟南海元曉道詵托身西教是乃勿稽之餘韻崔致遠精敏文章卓越諸人十二入唐二十八東還與僧定玄賢俊為道友其所經過處若慶州之南山剛州之氷山陝州之清香智異之雙溪皆其勝也晚入伽倻山不出是得大世仇柒之餘風其後清平山之李茗頭流山之郭輿是亦一派也崔讜韓惟漢是亦同德也惠勒阿道黑胡翯仙皆釋門之高人取襲其影光者僧丁皓者故典書李伯搏之弟也雖托迹山門而希慕仙真下居漢陰山啖果喫蔬自號慕真堂嘗過降州亭遇一少年清談亹亹令人爽襟自號柏林居士姓名韓湜遂題詩壁上曰曾見先朝李種辰東風二十四回春題詩華表千年柱灑淚青山一掬塵楓岸曉鍾神勒寺煙沙晚笛廣陵津秋風緩擊滄滄枻樓上無人識洞賓仍步入江霧中後考金孟隱逸録韓湜者高麗明宗時人以其父順為鄭仲夫所害故入山學道云此段文編于歲戊子宣祖二十一年之下又按青鶴集中雲鶴先生事迹門人龍岑居士趙汝籍撰有曰朝鮮明宗大王十四年七月初八日申時雲鶴先生生于麟蹄玄高村年五歲妣新平李氏移于新溪栗灘東先生從焉年才十六便有雲林高趣且得先君遺書而不求仕宦專意窮格萬歷乙亥宣祖八年夏四月坐于家前槐木亭讀周易忽有一優婆塞從傍竊聽良久曰吾遍八路閲人多矣未有如君者君可謂入道者袖出一卷授之曰持此入山則師友善類先生問居住姓名不告而去後問諸師席則乃東海中修然子孫文載也先生入淡定山中居焉歲壬午宣祖十五年賣藥錦嶂江江邊逢一人頭戴弊陽子竹笠杖丁公杖一見先生便出肝膽半晌探討遂訂期於五臺山麒麟臺果如其期往則七個仙人列坐巖上先生瞻拜於七人七人含笑攬袖各告其道號而不告姓名居前者則金蟬子錦嶂江所遇者也其次彩霞子翠窟子鵝蕊子桂葉子花塢子碧落子也此七人者抱高世之才達天人之物不遇於時遁迹江湖遊天下而夷漢無阻焉同師事青鶴上人青鶴上人者我東甲山人也姓魏名漢祚字仲炎少從百愚子能格物致知長逢華客楊雲客俱學異術然後遍遊諸國道觀山林晚而東還卜宅於青鶴洞故曰青鶴上人於是七人引先生訪青鶴洞同師事魏先生魏先生號先生曰片雲子余即片雲之門人也余於戊子歲宣祖二十一年以落榜舉子失意還歸路遇片雲於楮灘初不相識先生便呼曰關西趙汝籍胡為棲棲余乃驚異之遂師事焉負笈立雪于今六十年矣一自先生沒後但恐高人蹤迹永為泯沒故提掇向來耳聞目睹若干事迹而記青鶴上人曰湖南金蟬漢拿之英關西翠窟鴨緑之靈燕人彩霞陽和後身楚人花塢曹彬還魂遼東鵝蕊羽林之星女真桂葉河魁之宿惟彼太原之碧落塞上猛虎之精海西片雲雲中白鶴之魂也燕山時有惠孫者號百愚子字裕後居金城菩提津邊為人玄默終日如愚然窮義理達冥契知來數已往之事學通見遠聞之術實為前後無雙之士第以族寒家貧混迹農商終致鳥沒空山惜哉百愚子嘗有詩曰間望浮雲知世事靜觀潮水悟天機可見其胸中灑落自然之態也歲壬寅魏先生召諸子曰吾可以謝絶世事正月十五日晨起徘徊仍步入大蘭山霧中遂不復還諸子皆散去金蟬片雲從曹先生彩霞片雲曾入燕京逢曹玄志即楊雲客門人也曹曰中原將為氈裘之域故吾方擇地求居而聞朝鮮漢拏山自古兵禍不到處今將轉向朝鮮矣遂與偕來南入濟州行至茂朱德裕山曰此可便居何必漢拿築室同居採藥織履以為食曹先生字通遠號五竹居士亦號梅窗金蟬子姓李名彥休字弘道其父與祖世有隱德為道家真骨金蟬後改號松棲片雲號雲鴻又改雲鶴諱一曰思淵一曰挺元一曰承祖字胤夫姓李與松棲同貫也歲甲寅五月梅窗松棲雲鴻入智異山採藥宿於李芳普之貞心齋芳普修道力穡又多儲藥物頤養精氣真仙家風味也三人淹留纍月因往同遊湖山過松岡寺有詩曰長廊一磬諸僧飯古殿殘燈衆佛眠過草溪黃芚津芳普又有吟曰人影半迷踈樹岸蟬聲遙挂夕陽枝至身彌島芳普又吟曰蘆洲旅雁聲中白楓岸鳴蟬響外紅梅窗皆稱善至日洞巖間有題詩曰穿雲一路不分明客到山門獨鶴迎丹岸雨添瑤草畫碧崖風落玉碁聲間花老柏千年在亂石飛泉百道爭世有名區人不識孰能於此養心精芳普擊節歎曰如我輩不敢執鞭於其門也松棲曰吾函丈青鶴之所作也先生佳作甚多且如三日浦邊晨沐髮四王峰上夕飛笻又曰衣濕洛東江上雨履穿薛罕嶺頭雲又曰三過萬二千峰月惟有松風澗水知之句諸子皆莫及先生嘗稱洪漢仁天摩山詩有出塵之態其詩曰朝上白雲峰頂觀暮投巖下孤雲宿夜深僧靜客無眠杜宇一聲山月落梅窗過伊川熊耳灘轉入戲靈山採藥松棲有詩曰人蔘採盡採當歸神莫抽莖石耳肥落日鍾聲何處寺雲生半壁一燈微梅窗松棲雲鴻入金剛山靈源洞宿於小菴菴有一僧松絡草衣貌如寒玉眼如晨星自云西蕃僧遍遊天下在中國時名稱性圓在朝鮮名稱能皓所食松子柏葉及六天氣水也自以佛法神力周遊無礙也號洞見堂一見梅窗便托深契永夜懸燈細論玄理余其時適隨後參聽高論蓋雪嶽楊雲客跨風御雲流遊諸天下潛九泉通神參化故謂之天遁青鶴魏漢祚御神駕風揮拓八極觀風察俗知人知鬼故謂之地遁松棲謂之仙遁梅窗謂之人遁雲鴻謂之神遁洞見謂之佛遁梅窗與皓連床露腳夜以繼日所吟亦多皓之詩曰菊帶秋霜垂艷色梅當臘雪放寒香又曰月當晦夜千江黑春到陽城百草青未幾皓與松棲往湖南珍島郡得小艇浮海南去入花臺地無儒佛無文武之處梅窗告別而去尚玄曰按首楞嚴經佛告阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙彼諸衆生堅固服餌而不休息食道圓成名地行仙以藥餌駐一期之壽而不能輕舉名地行堅固草木而不休息藥道圓成名飛行仙餐黃精松柏之類久而身輕名飛行堅固金石而不休息化道圓成名遊行仙煉金石還丹之類化骨易形撮土點石以遊戲人間名遊行堅固動止而不休息氣精圓成名空行仙乘陰陽運止以調氣固精遺形涉空名空行堅固津液而不休息潤德圓成名天行仙鼓天地咽津液氷雪婥妁不交世欲與天無異名天行堅固精色而不休息吸粹圓成名通行仙吞吸精色服虹飲霧粹黛潛通名通行堅固呪禁而不休息術法圓成名道行仙能以術法述道自然名道行堅固思念而不休息思憶圓成名照行仙澄凝精思久能照應名照行或存想頂門而出神繫心臍輪而煉丹皆思憶圓成也堅固交遘而不休息感應圓成名精行仙內以坎男離女匹配夫妻外即採陰助陽攝衛精氣名精行堅固變化而不休息覺悟圓成名絶行仙存想化理心隨邪悟能大變化其行絶世名絶行是等皆於人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣云云由此十種仙觀彼十二人楊雲客魏青鶴金蟬子彩霞子翠窟子鶴蕊子桂葉子花塢子碧落子片雲子曹梅窗及僧能皓一一行履如燭照焉今朝鮮人十之八九好談祕訣亦信追數玄武發書太乙通精奇門遁甲術數之書為所愛好未始非此等人之遺風也五斗米教按漢末張魯在蜀奉五斗米教蓋張氏世為天師即支那仙派也三國遺事高麗即高句麗本記云麗季武德貞觀間國人爭奉五斗米教唐高祖聞之遣道士送天尊像來講道德經王與國人聽之即二十七代榮留王即位七年唐武德七年甲申也回回教朝鮮世宗大王九年丁未夏四月壬戌禮曹啓回回之徒衣冠殊異人皆視之以為非我族類羞與為婚既為我國人民宜從我國衣冠不為別異且回回大朝會頌禮宮停罷從之基督教西學或天主學基督教初入之時名稱曰西學或天主學朝鮮相傳宣祖朝時李廷龜號月沙為辨誣使入明徐閣老光啓贈遺天主教書籍持還此為西教書籍東來之嚆矢又仁祖九年辛未崇禎明四年歲貢使鄭斗源入北京見天主教師陸若漢得書籍及望遠鏡時辰鍾等物而來英祖十七年辛酉譯官安國麟等入北京見西洋人戴進賢等得日月交食表等書來正宗七年清乾隆四十八年西曆一千七百八十三年歲貢使李承薰入北京謁天主教師葡萄牙國人湯亞立山入教領洗還授其所學於李德祚而漸傳於京畿地方至正祖十四年天主教信徒尹保魯隨特使赴北京謁湯亞立山請派西洋人教師一名未得達其志其後羅馬法王以朝鮮定為北京駐在神父之傳教區域北京主教命派清國人神父周文謨來京城傳教適值國禁尹保魯被斬刑周文謨避往忠清道內浦等地潛伏信徒家密事傳教按佛文朝鮮教會歷史則朝鮮憲宗二年丙申清道光十六年西曆一千八百三十六年佛蘭西國天主教宣教師毛五芳自北京教會派來朝鮮天主教即加持力教韓韓韓又云基督舊教以其教皇在羅馬故亦云羅馬教此教稱呼宣教師曰神父先是有一神父派來者至遼東中途病死云云到鴨緑江換著土服間關入境時有朝鮮信徒為導引者晝伏夜行至原州地隱居于陶民之家至今朝鮮域內之陶民多信天主教者以同業相引之故也李太王三年丙寅清同治五年西曆千八百六十六年禁天主教國太公執政時二十三年丙戌西曆一千八百八十六年北美合衆國耶穌教宣教師牧師元斗祐長老教派韓韓韓韓韓韓韓亞扁薛羅美美教亦云監理教派韓韓韓韓韓來越明年丁亥英吉利國倫敦宗古聖教亦基督教宣教師佉五富來前韓光武元年丁酉露西亞國希臘教亦基督教宣教師亦稱神父尼骨羅來前韓隆熙二年戊申西曆一千九百九年英吉利國耶穌教救世軍正領今之大佐許嘉斗獨逸國天主教宣教師亦稱神父謝禹越相繼而來設會傳教耶穌教亦云基督新教即布路太斯坦攄韓韓韓韓韓韓教譯云反抗教也以馬丁路得反抗羅馬教皇而改立之故也此教稱宣教師曰牧師曰長老天主與耶穌不是別教乃同一基督教也耶穌基督韓韓韓韓韓韓是救世主之名稱故或云耶穌教或云基督教其實則耶穌基督一人所創之一教也自獨逸人馬丁路得改教分立之後始有新舊之稱舊教則有教皇新教則無今朝鮮人謂舊者為天主教新者為耶穌教也倫敦教亦屬新教而多守舊規故宗古之稱所以加焉希臘教即所謂奧吐獨施教也露國人所奉基督教之別稱其教之所以少異者露國皇帝例兼教皇之職而不許國民信奉他教也獨逸乃新教之國而非乂乃得攄省有加特力教會沙禹越神父乃其教會所派者也已上各教內規之異點不可枚舉而以其外觀之顯著者言之舊教之神父必守童貞而許飲酒吸煙新教之牧師許帶妻而不吸煙飲酒倫敦教之牧師飲酒吸煙與舊教同但其娶妻與不視其自誓希臘教神父有白黑之稱號白可娶妻黑則不許至於各教服裝除米國新教之牧師與常人同外其他皆著黑色長袍腰繫紅帶或有或無戴帽亦別尚玄曰我東古有檀君神教羅麗以佛為教朝鮮始行儒教中葉以後西教輸入一因書籍蓋西教書舊約輕世金書等天國界説較儒言天簡易明白又其他如天文曆算地球圖説海國圖志兵學農方等書較期三百周璇璣玉衡山海經職方志天機大要兵學指南朝鮮中葉以後軍制專用明將戚繼光之兵學指南不可同年而語也於是當時名士等輩丁若鍾丁若鏞丁若銓諸昆季李家煥李承薰黃嗣永李身逵等目寓而心醉二因物品諸人具覩望遠鏡時辰鍾自來火等物既驚其新案且歎其奇妙遂有西學之名詞天主教不曰教而曰天主學蓋指目為西洋之學術故此言西教隱播狀况也三因勢力國禁既弛通商互市傳教一欵載在約章朝鮮既無治外法權遇有教案藉端生事外國教士干涉獄訟地方官憲謹聽其命於是平民多入西教依賴勢力計圖自衛此真可謂為淵驅魚也四因平等凡入西教舉皆稱號姊妹兄弟京畿嶺湖之兩班社會不喜打破尊卑階級入其教籍者稀如晨星而往昔被侵受虐之兩西人最歡迎西教今平壤府為朝鮮耶穌教之總本山者職是故也五因教育耶穌教會設立學校教育信徒若論其學課科程則除英語算術地志歷史外國歷史外聖經禱文占其太半禮拜堂之傳道師欲博無等雄辨家之名譽討論會之演説生擬倣有志政治家之意氣逮夫分離政教崇尚科學以若現時之狀態非復昔年之風潮前日無階級之宗教反受有階級之批評今日有教育之社會不比前日無教育之程度也近世有對西學而稱東學者距今八十年前慶州人崔時亨以侍天主造化定永世不忘万事知之十三字呪文布教世人謂之布德名之東學先是大神師崔濟愚初名福述慶州之稼亭里人也忽有異僧至自金剛山榆岾寺贈書一卷自云祈佛百日而天所遺崔濟愚遂入梁山通度寺聖山祈天前後凡九十六日乃得感通天帝云云其教利用時讖之所謂弓弓乙乙作為符呪誘惑人民甲子三月十日崔濟愚被逮于大邱獄慶尚道觀察使徐憲淳奉朝命斬之而其徒多潛伏者至甲午死灰復燃聚黨作亂東學今各分裂而有天道教侍天教青林教等名稱又有對東學而稱南學者其教以吟哦唹咿唔五音分配於宮商角徵羽五音金木水火土五行君臣民物事五品用此五音而詠而歌而舞而蹈故亦謂詠歌舞蹈教先是忠清南道古連山郡人金恆始從李雲奎得道其高弟又有清州人權一清云云前韓隆熙三年己酉其徒河相易改稱大宗教又有太乙教亦云吽哆教者近年湖南有薑甑山名一淳者年二十八入金溝郡金山寺於寺之東麓露坐百日遂得道焉號稱金山寺彌勒佛像所化之身死登天堂為太乙元君云云奉其教者面北設玉皇上帝之靈位用牛頭足祭供以法水一碗迎神誦草三字呪文曰吽哆吽哆太乙天上元君吽哩哆㖿都來吽哩喊哩娑婆呵若有緣者一日二日三日四日五日六日乃至七日可得上帝現前各人所見各異爾時謂之承顏則幽冥可以交通神佛可以坐致亦能降筆作詩與文亦降天藥無病不療修煉功滿則得洞見遠方若在咫尺爾時謂之開眼云云尚玄曰弓弓乙乙者吟哦唔咿者吽哆吽哆者已上三者各立一團迷於預言浮於虛榮蕩柝家産而不之惜變賣田産而曰雖盡賣喫猶是吾土腐敗人氣而不之恤其教理以信讖言為根本腐敗人氣無有過於此者猶自稱為儒佛仙合一之教此真其愚不可及也蓋其信妖讖則恰似漢末之張角託天書而起黃巾賊明末之徐鴻儒用幻術而創白蓮教也其發妖言則又如高麗伊金之自稱彌勒後身朝鮮遠香之自稱龍女婦人也至於誦呪降靈等法亦被攝于佛之密教陀羅尼宗或真言宗而亦有邪正之殊不可同年而語也繼此儒佛仙合一之教東學南學近又有主唱儒耶佛統合之教者究其目的以為諸教規模雖殊而其根本理諦則同故不必角立而為會通創設一宗云云余以為與其謂統合教寧可謂組合教也總結天人一體説之神教未免三界欲天人天因果之初級心身二元論之理學焉知五陰妄心之原因大倧教説三神一體天主天神神人基督教説三位一體聖父聖子聖神佛教説三身即謂法身毗盧遮那佛或云大日如來報身盧舍那佛有千丈身化身釋迦牟尼佛丈六金身一即三三即一儒耶言天凡有四種第一種則以形體言天者也如蒼天天覆等是也第二種則以主宰言天者也如天帝皇天等是也第三種則以命運言天者也如孔子曰天喪斯文也孟子曰吾之不遇魯侯天也等是也第四種則以義理言天者也如天理天道等是也佛家言天亦有四種第一種謂世間天如萬民仰戴君上如天故曰天子是也第二種謂生天亦世間天即欲界六天四天王天忉利天亦名三十三天須焰摩天兜率陀天樂變化天他化自在天色界十八天梵衆天梵輔天大梵天以上初禪三天少光天無量光天光音天以上二禪三天少淨天無量淨天遍淨天以上三禪三天福生天福愛天廣果天無想天以上四禪四天無煩天無熱天善見天善現天色究竟天以上五不還天無色界四天空處天識處天無所有處天非想非非想處天以上四空天是也第三種謂淨天出世間天即四果須陀洹果斯陀含果阿那含果阿羅漢果及辟支佛此云獨覺即緣覺也是也第四種謂義天出世間天或云性天佛並超三界而過之故曰天中天又曰天上天下惟我獨尊又曰如來來無所來去無所去應供應受一切世間諸天人供養正遍知或等正覺無所不知名正遍知無上正覺名等正覺明行足諸惑斷盡覺行圓滿過去未來現在三世皆明善逝已出世間永不退轉永不復還世間解了解一切世間因果一切衆生國土無上士於一切衆生之中在最上之地位調御丈夫具有大丈夫之力調御制伏一切衆生天人師不獨度脫世間之人類而已亦為諸天之師佛覺知一切諸法世尊具有以上十德為一切世間所尊重而至形體之天即彼蒼者佛謂虛空而並不謂之天也儒耶諸教俱言天為造化之主宰佛説法華經亦云帝釋天主為天地萬物造化之主又云大梵天王為一切衆生之父雖然未免為三界世間之天福樂雖多報盡還墜猶如汲井輪仰空箭也佛教謂天地與我同根萬物與我一體天地根於我心故同也萬物體於我心故一也楞嚴經云諸法所生惟心所現一切因果世界微塵因心成體又云色身山河虛空大地咸是妙明真心中物又云有漏世界十二類生胎生人畜龍仙其類充塞卵生魚鳥鶴蛇其類充塞濕生含蠢蠕動其類充塞化生轉蛻飛行其類充塞有色衆生休咎精明其類充塞無色衆生空散銷沉其類充塞有想衆生神鬼精靈其類充塞無想衆生精神化為土石金石其類充塞非有色衆生諸水母等以蝦為目其類充塞非無色衆生呪詛厭生其類充塞非有想衆生彼蒲盧等異質相成非無想衆生土梟等附塊為兒及破鏡鳥以毒樹果抱為子子成父母皆遭其食其類充塞本覺明妙覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生故有空性化迷不息有世界生則此十方微塵國土今天文學家言無數星辰皆是國土非無漏者皆是迷頑妄想安立衆生共同業感故世界能安立當知虛空生汝心內猶如片雲點太清裏况諸世界在虛空耶汝等一人發真歸元十方虛空皆悉銷殞華嚴經云火輪依地輪地輪依水輪水輪依風輪風輪依虛空虛空無所依而無量世界皆依虛空建立楞嚴經云覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界火騰水降交發立堅濕為巨海乾為洲灘以是義故彼大海中火光常起今科學家言地本火球旋轉不息于大氣中絞成水陸地球中心依然是火火星為活世界有人造之運河月球為死世界無物吸之空氣此與佛説世界則成住壞空衆生則生老病死循環輪轉終而復始節節相符欲免此苦惟有悟自心達本源而已大倧教言兒生之時三神冥祐基督教言人之生也天賦靈魂儒家書云惟皇上帝降衷下民生理學言男有精蟲女有胚珠交感入胎胎兒成形須五個月始能完具今據佛經首楞嚴經則言衆生生起之理曰性覺妙明本覺明妙性覺必明妄為明覺覺明為咎覺非所明因明立所所妄既立明理不踰真明妙理本無能所元一圓融清淨寶覺由所妄既立遂成隔礙故云明理不踰也以是因緣聽不出聲見不超色以不踰故見聽六根於是妄局色香味觸六妄成就色香六塵於是妄染由是分開見聞覺知覺知六識於是妄分同業相纏即胎卵類以父母己三者業同故相纏而有生根塵識三為業性故發起妄業合離成化即濕化類不因父母但由己業或合濕而成形或離異而托化如獄鬼等見明色發妄見所明而顯發妄色此由心生境也明見想成因明起見而因境生想此由境生情也異見成憎境違故成憎也同想成愛心順故成愛也流愛為種三愛交注曰流愛為輪回根本故即如佛謂阿難曰一切衆生實本真淨因彼妄見有妄習生因此分開內分外分內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉禮光潤心著行男女二根自然流液諸受雖別流結是同也納想為胎三想同投曰納想為傳命之媒故交遘發生吸引同業藉交遘而發生由同業而吸引此受生托質之始也生羯羅藍遏蒲曇謂始生凝形也等胎卵濕化隨其所應卵惟想生胎因情有濕以合感化以離應情想合離更相變易所有受業逐其飛沉以是因緣衆生相續或情變為想合變為離無定業也或卵易為胎濕易為化無定質也故所受業報或升或沉無定趣也又佛經云男子精蟲其色青女子精蟲其色黃又毗婆論云中陰中陰者謂受生前之業識而此業識即衆生之佛性無始無終不生不滅者也入胎之時母最後餘血一滴父最後餘精一滴和合成就又據佛書言人胎成形之次第曰人之身形由於業識依於父母而成肉體託生不淨故此人身即成不淨初七日成迦羅邏二七日成阿浮陀三七日成俾尸四七日成阿那五七日成五節六七日成四節七七日復生四節八七日復生二十八節九七及十七日復生脊骨十一七日復生三百骨十二七日復生八百節十三七日復生九百筋十四七日復生百肉丸十五七日復生血十六七日生膜十七七日生皮十八七日成皮色十九七日業所生風遍處處二十七日成九竅二十一七日生一萬七千腠二十二七日成堅身二十三七日有力二十四七日生九萬九千毛孔二十五七日成一切身分具足凡二十七七日計一百七十五日即為五個月近世醫學家以顯微鏡照見人畜之身或不淨水中各有無數蠕動微蟲云云今人但説科學家之新發見而不知大雄氏之已説破也按佛家觀水呪云吾觀一滴水八萬四千蟲若不誦此呪如食衆生肉又楞伽經云一切肉與蔥及諸韭蒜等種種放逸酒修行當遠離以彼諸細蟲於中極恐怖又僧伽吒經云人將死時諸蟲怖畏互相噉食受諸苦痛又佛經云人身凡有八萬戶蟲此身即為八萬戶蟲之所食噉近世西洋人心理學書云心身之關係分為三種一為二元論即以心身為各自獨立之原質者是也二元論中又有二説甲則以為二者均係物質乙則以為一係物質一係靈性甲説行於古代文明未開之時乙説行於中世紀後以迄於近世二為一元論即以心身為一為體一為用者又據惟物論云思想感情及行為均由神經系統中一機關而生信斯言也則思想全屬腦筋之機能猶收縮之為筋肉之官能泌溺之為腎臟之官能也斯説行於近世至今漸衰惟心論此為古代希臘柏拉圖之所唱以為人之身體悉由精神所管領獨逸人海魯伯爾乃襲此説立惟心的心理説為最後之大家三為一元二面論於身心以外別立一原素以為心身二者均不過為其作用此論最後出荷蘭人斯比諾塞唱導之英人倍根丹麥人黑甫溪古亦採此説以為心的作用非由腦筋而生但不論何等心的作用皆有特殊之神經的狀態與之相應此近日新心理學已上所列心身二元論心身一元論唯物論唯心論及一元二面論等諸學説此佛所謂世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義者也心身問題若非依佛學之圓滿界説無以解決蓋四大五陰因緣和合成此身心本皆虛妄無有實法可從把捉雖然我此清淨六根眼耳鼻舌身意對外境界攀緣分別生心動念住色生心乃至住聲香味觸法生心故云三界唯心萬法唯識又華嚴經云應觀法界性一切唯心造又起信論云依一心法有二種門一者心真如門二者心生滅門是二種門皆各總攝一切法以是二門不相離故心真如即不變者也心生滅即隨緣者也心真如者即是一法界大總相法門體所謂心性不生不滅真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相心生滅者依如來藏故有生滅心謂自性清淨心名如來藏因無明風動作生滅故云依如來藏有生滅心所謂不生不滅與生滅和合非一非異名為阿梨耶識阿梨耶及阿賴耶皆梵語也梁真諦三藏譯為無沒識唐玄奘法師譯為藏識但藏是攝義無沒是不失義義一名異也此識有二種義能攝一切法生一切法五濁楞嚴經云佛告阿難則汝身中堅相為地潤濕為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔名之為濁汝濁五重亦復如是劫濁汝見虛空遍十方界空見不分覺非空色由無明一念不覺妄見空相以生發遍迷故有空無體以不分故為雜於見有見無覺為雜於空此無明初起混芒之相也相織妄成是第一重名為劫濁劫云時分即無明業相能見相境界相三細之初不覺心動之相也無明初起之時無明業相以依不覺故心動説名為業覺則不動動則有苦果不離因故能見相以依動故能見不動則無見境界相以依能見故境界妄現離見則無境界見濁汝身現縛四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁真性廓湛本無見覺由四大縛結以成根隔故見覺生而廓湛壅四大旋而覺知生是為相織見相即轉相現相煩惱濁又汝心中憶識誦習即智相相續相執取相計名字相之四粗之相也性發知見性之內分發六知根容現六塵容之外分現六塵境離塵無相離覺無性相織妄成是第三重名煩惱濁根境煩搆以惱湛性煩惱即六粗前四相也智相依於境界心起分別愛與不愛故相續相依於智故生其苦樂覺心起念相應不斷故執取相依於相續緣念境界住持苦樂心起著故計名字相依於妄執分別假名言相故衆生濁又汝朝夕生滅不停即造業相也知見每欲留於世間業運每常遷於國土即隨趣受生此所以為衆生也相織妄成是第四重名衆生濁即六粗中起業相也起業相依於名字尋名趣相造種種業故命濁汝等見聞元無異性見聞自湛圓而分故衆塵隔越無狀異生衆塵隔圓融之體故無端成異性中相知自性觀之同一真常故用中相背自用觀之互起生滅故同異失準相織妄成是第五重名為命濁即六粗中業繫苦相也業繫苦相以依業受果不自在故五陰色受想行識五者成體蔭蔽妙明曰五陰一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入眼耳鼻舌身意六根吸色聲香味觸法六塵名六入從十二處六根六塵名十二處即如眼色處耳聲處鼻香處舌味處身觸處意法處也至十八界六根六塵六識各分其界共成十八即如眼色為緣生眼識界耳聲為緣生耳識界鼻香為緣生鼻識界舌味為緣生舌識界身觸為緣生身識界意法為緣生意識界等也因緣和合虛妄有生因緣別離虛妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得云何五陰本如來藏妙真如性色陰譬如有人以清淨目觀晴明空唯一晴虛逈無所有其人無故不動目睛瞪以發勞則於虛空別見狂華復有一切狂亂非相色陰當知亦復如是是諸狂華非從空來非從目出是故當知色陰虛妄本非因緣非自然性受陰警如有人手足晏安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是是諸幻觸不從空來不從掌出是故當知受陰虛妄本非因緣非自然性想陰譬如有人談説酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是如是酢説不從梅生非從口入想踏懸崖與説相類是故當知想陰虛妄本非因緣非自然性行陰譬如暴流波浪相續前際後際不相踰越行陰當知亦復如是如是流性不因空生不因水有亦非水性非離空水是故當知行陰虛妄本非因緣非自然性識陰譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是如是虛空非彼方來非此方入若彼方來則本瓶中既貯空去於本瓶地應少虛空若此方入開孔倒瓶應見空出是故當知識陰虛妄本非因緣非自然性五陰本因同是妄想色陰本因汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虛妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想受陰本因即此所説臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虛明第二妄想想陰本因由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想行陰本因化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想識陰本因又汝精明湛不搖處名恆常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用開合此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虛無第五顛倒微細精想五陰邊際是五受陰五妄想成汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併銷事非頓除因次第盡五陰魔事次第銷除色陰銷除汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩地如明目人處大幽黯精性妙淨心未發光此則名為色陰區宇若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本受陰銷除色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虛明妄想以為其本想陰銷除受陰盡者雖未漏盡心離其形如鳥脫籠已能成就從其凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寐言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本行陰銷除想陰盡者是人平常夢想銷滅寤寐恆一覺明虛靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑒明來無所黏過無蹤迹虛受照應了罔陳習唯一精真生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超衆生濁觀其所由幽隱妄想以為其本識陰銷除行陰盡者諸世間性幽清擾動同分生機倐然隳裂沈細綱紐補特伽羅補特伽羅譯云有情造業酬業深脈感應懸絶於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虛靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇若於羣召已獲同中銷磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虛無顛倒妄想以為其本識陰若盡則汝現前諸根互用眼可聞聲耳可見色從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信一信心二念心三精進心四慧心五定心六不退心七護法心八回向心九戒心十願心十住一發心住二治地住三修行住四生貴住五方便具足住六正心住七不退住八童真住九法王子住十灌頂住十行一歡喜行二饒益行三無嗔行四無盡行五離癡亂行六善現行七無著行八尊重行九善法行十真實行十回向十回向亦名十願一救護一切衆生離衆生相回向二不壞回向三等一切佛回向四至一切處回向五無盡功德藏回向六隨順平等善根回向七隨順等觀一切衆生回向八真如相回向九無縛脫回向十法界無量回向四加行心一暖地二頂地三忍地四世第一地菩薩所行金剛十地第一歡喜地第二離垢地第三發光地第四焰慧地第五難勝地第六現前地第七遠行地第八不動地第九善慧地第十法雲地已上共五十五位即修行成佛之次第也等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得已上所述係是教家行相至若禪家不歷位次階級惟論見性成佛故永嘉玄覺禪師證道歐云住相布施生天福猶如仰箭射虛空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地古人云四十二地孰非如來地四十二地孰非凡夫地渾崙擘不開與汝兩文錢但得本莫愁末如淨琉璃含寶月我今將此如意珠自利利他終不歇江月照松風吹永夜清宵何所為巫女賽神扇舞三佛朝鮮古代以巫事鬼神尚祭祀人皆敬畏之後世民智漸為發達乃知諸淫祀之無理遂從以賤巫矣新羅南解王名次次雄三國史云新羅稱王曰居西干辰言王也或云呼貴人之稱或曰次次雄或作慈充金大問云次次雄方言謂巫也世人以巫事鬼神尚祭祀故畏敬之遂稱尊長者為慈充高句麗琉璃王十九年新羅始祖五十七年秋八月高句麗郊豕逸王使託利斯卑追之至長屋澤中得之斷其腳筋王怒曰祭天之牲豈可傷也遂坑殺二人九月王疾巫曰託利斯卑為祟王使謝之即愈高句麗次大王三年秋七月王田于平儒原白狐隨而鳴王射之不中問於師巫曰狐者妖獸非吉祥況白其色尤可怪也然天不能諄諄其言示以妖怪者欲令人君恐懼修省以自新也君若修德則可以轉禍為福王曰凶則為凶吉則為吉爾既為妖又以為福何其誣耶巫言為誣遂殺之高麗仁宗九年日官奏近來巫風大行淫祀日盛請令有司遠黜羣巫詔可諸巫患之斂銀瓶百餘賂權貴奏曰鬼神無形其虛實恐不可知王然之弛其禁又二十四年追復拓俊京門下侍郎平章事召還其子孫官之以巫覡謂俊京為祟故也時王有疾故遣內侍奉説決金堤郡新築碧骨池堰從巫言也高麗忠烈王二年十二月有人投匿名書曰貞和公主失寵使女巫呪咀元公主高麗忠肅王四年僉議左政丞判三司事薑融之妹為巫食松嶽祠大護軍金直邦以其所善巫代之融不可直邦罵融曰汝是官奴何驕乃爾高麗忠惠王四年八月出內帑布百匹加斂近侍宴於新宮樓有一嬖人白王曰知人室家莫若盲人巫女上若求美女當問此輩王即命惡少侵虐盲巫又嬖人閔渙分遣惡少諸道誅求或徵巫匠業中貢布高麗辛禑王八年固城妖民伊金自稱彌勒佛惑衆巫覡尤加敬信城隍祠廟撤去其神敬伊金如佛以祈福利又十三年令兩府下至巫覡術士出馬有差以充進獻以上國史高麗史中旱則聚巫禱雨亦屢見不一見朝鮮俗傳官府收巫稅布甚重每官差到門呌呼隳突一家蒼皇奔走具酒食以勞乞緩程期如是者間日或連日苦害多端適歲時優人男巫作此戲于御庭於是命除其稅優亦有益於民矣至今優人尚傳其戲以為故事稗官雜記尚玄曰前者夏旱則各州郡官例行祈雨祭於名山大川又於聚落集巫覡盛水於瓶插以楊枝作禱雨之事此祈觀世音菩薩法雨救世之事也各郡鎮山有神堂每春秋以巫賽神漕倉納米畢將發運船先期賽神以祈冥佑皆用巫為之京外鄉邑時設特別賽神會選擇廣場聚巫賽神或五日七日不等俗呼別神人民集亦為娛樂之戲凡賭博金錢皆所不禁俗謂之亂場開放巫女賽神之時有立足於劒刃之上而亦無害者俗謂巫之神術使然蓋巫以神傳巫神欲發其人先病或遇賽神之場自舞一回則病若失而得巫術故凡人聽鼓樂而發舞興者俗謂之有神痘神之稱其來久矣前者鄉俗家有染痘之兒則用紙作旗書曰江南戶口別星司命旗懸于門扉別星者使臣也謂古有使於江南者初傳痘神故云未知出於何典以為痘神有生死人之權能故謂之司命也兒病十許日痘疥黑落則謂之出場於是設祖筵以送痘神俗謂之拜送而例用巫覡為之筵唱倡夫之歌聚觀之人擲施金錢因以成俗一自牛痘施種以來所謂痘神應徘徊於牛欄之中也朝鮮近世男巫為倡前者每三年子午卯酉之年設式科登進士第者身著鶯衫老者著蘭衫頭戴幞頭騎馬而行一雙優人吹笛前導榮旋鄉里謂之唱榜到門而亦次第訪問親友之家謂之率倡遊街蓋此倡優或唱歌或鼓琴或空中步繩索或地上翻筋斗用此種種技藝以博纏頭矣一自甲午距今二十年前更張以後率倡永絶賽神嚴禁從此巫風頓息今則散在於演戲之場以李御史裴裨將沈清江華容道燕之腳兔之肝等歌曲為其謀生之技業矣及至近年所謂林聖九之革新團文秀星之藝星座等新派演劇及廣橋妓生組合茶洞及漢南無夫妓組合等演奏會出來之後倡優輩之舊派演劇顧客漸少耳巫女賽神之時手搖金鈴又持彩扇扇畫三佛旋旋作舞而時唱佛號亦呼法雨和尚者蓋有所自出世傳智異山古嚴泉寺有法祐和尚者秋波泓宥禪師撰嚴泉寺鐘閣上梁文勢扼嶺湖咸陽為都護府之鎮勝占智異嚴泉得大伽藍之名孤雲子之所棲法祐師之攸創千峯簇攢一水縈紆巖巒之雄高則雁宕風斯下道場之明淨而鷲靈美豈專既奠法殿之宏規爰諏鐘樓之機搆筮陰陽於筠璞敕栗桷於倕般輸岱山之奇材寫崑丘之美石事皆從而順矣不日成之衆亦樂而為焉如雲集也一閣功訖六偉唱騰兒郎偉拋梁東西南北上下云云按秋波師是英祖時人則嚴泉寺之廢在百有餘年前也頗有道行一日間居忽見山澗不雨而漲尋其來源至天王峯頂見一長身大力之女自言聖母天王聖母天王即智異山神見朴全之龍巖寺重創記謫降人間與君有緣適用水術以自媒耳遂為夫婦搆屋居之生下八女子孫蕃衍教以巫術今山下有百巫村云搖金鈴舞彩扇唱阿彌陀佛呼法祐和尚行於坊曲以為巫業云云故世之大巫必一至智異山頂賽祝而接神京巫必至豐德郡德勿山賽祝於崔瑩將軍之廟而接神俗謂入山亦云身賽又按續頭流録濯櫻金馹孫撰登天王峯之上有板屋乃聖母祠也祠中安一石塑為白衣女像未知聖母是何人或曰高麗王太祖母為生育賢王能統三韓故尊祀之或至于今嶺湖之間要福者歸之奉以為祀仍成楚越尚鬼之風遠近巫覡憑兹衣食之云云按頭流志聖母祠在天王峯頂板屋三間下釘甚堅恐為風所搖也聖母乃石像粉黛頂有缺劃劍痕李太祖康獻大王殲倭于引月驛餘衆窮蹙登山謂神不助己斫之李承休帝王韻記聖母命詵師注云今智異天王聖母乃指高麗太祖威肅王后也麗人習聞仙桃聖母之説欲神其君之系創為是説承休信之筆之韻記此不可必徵浮屠天然者關西之韻釋也勇力絶倫詩調清越自妙香山來歷覽頭流萬壑至聖母廟憤其祀即曳出神軀碎投巖下夜宿神座裂幢作鞋南下藏神寺成汝信記其事其後愚民改造神像祀如初晉陽舊志盲者逐鬼鼓誦千手筆苑雜記云士大夫家每歲初祈福若繕修營造等事禳災必用盲瞽五六七人讀經其所祝者皆星辰真君之類盲瞽祈福禳災不見於古人不行於中國但我東時俗相傳故事耳慵齋叢話云讀經盲類皆剃髮也世人稱曰禪師有老盲金乙富居廣通橋畔以卜筮為業人爭問之事多差違婦人輩皆曰廣通橋禪師言凶則吉矣金參判賢甫其子赴試賢甫取文章觀之曰汝文甚鄙不得中選及榜出則其子高中同僚笑曰廣通橋禪師言凶則吉矣又云盲人讀經專倣蛙聲亦一種聲音也又云古時都中有明通寺盲人所會也朔望一會以讀經祝壽為事高者入堂卑者守門重門畫戟人不得入尚玄曰盲人賣卜讀經具如上述究其所由自古已然今俗盲人扶一枝杖行坊呌呼曰問數問卜於余時有愚夫愚婦請邀問數給與卜錢盲則占之凡鬼祟之病厄運之災編謅一場問卜者懼請禳之時聚衆盲打鼓讀經其所讀者即仙家之玉樞經佛門之千手經八陽經高王經等而細聽之則字句太半舛訛此禪師之號所以加於盲瞽者歟讀經禳災新羅密本法師誦藥師經而捉妖狐惠通和尚誦真言而治毒龍之遺意也剎令頒布果蒙外護寺剎令韓明治四十四年法律第三十號第一條韓及第二條韓依韓韓敕裁韓得韓韓兹韓公布韓韓明治四十四年六月三日朝鮮總督伯爵寺內正毅制令制令第七號寺剎令第一條寺剎韓併合移轉韓韓又韓廢止韓韓韓韓時韓朝鮮總督韓許可韓受韓韓可韓其基址韓又韓名稱韓變更韓韓韓韓時韓亦同韓第二條寺剎韓基址韓及伽藍韓地方長官韓許可韓受韓韓韓韓韓傳法布教法要執行韓及僧尼止住韓目的以外韓使用韓韓又韓使用韓韓韓得