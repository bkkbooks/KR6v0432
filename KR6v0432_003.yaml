義壬儉壬王之義桓儉桓與韓音相類韓大之義例如大田曰韓韓君尼斯今或尼今今與儉類熊韓古記云神與熊化男女生王儉韓與儉音相類羅良國之義讀韓韓新羅月明師兜率歌彌勒座主陪立羅良此謂彌勒座主陪立之國也或云羅良即下來之義不如國義之圓良巴新羅方言謂韓韓韓日本方言假字神大神大與王音相似君熊奈良古代國都之稱也若以朝鮮語比之則新羅時稱國曰羅良又如稱東京曰徐伐或稱徐耶伐今變徐蔚之類三巴大極形曰朝鮮真書漢文之名稱例如云韓韓曰人等日本真名漢文之名稱例如云韓曰比登等朝鮮假字末樓下韓韓韓貴人之稱例如大監末樓下即云閣下其實稱貴夫人之言例如夫人末樓下南飛鍋乫非脊者斤個等日本假字麿貴公子自稱也奈遍鍋其他萬葉假名等朝鮮口訣阜隱字偏旁是字下畫為字上部廠崖字上部仒於字右部多字上部尼字下部日本假名阿字偏旁伊字偏旁宇字上部江字右部於字左部多字上部仁字右部朝鮮吏讀段乙仍于向事行下向教是事日本候文段候間度候也御承知相成侯也朝鮮借字借訓字借音字薪薪韓韓如云悵悵此則取訓成義沓沓韓韓如云鬱鬱此則取音成義等日本宛字譯即謂當處字殘念齒搔等由是觀之日本與朝鮮俱皆失却固有之文何謂也日本則失神代之文日本有神代之文字朝鮮則失檀代之文而被漢文之來侵語音硬化故欲為調和方言屢經變通進化日本則始自方言而真名而萬葉假名而平假名而片假名而終至候文及宛字而止朝鮮則始自方言而真書而吏讀而口訣而終至諺文而止俱皆假借漢字以為之用而其進化之規模第次亦有不謀而同者焉七諺文淵源一世宗創造御製訓民正音序禮曹判書臣鄭麟趾有天地自然之聲則必有天地自然之文所以古人因聲制字以通萬物之情以載三才之道而後世不能易也然四方風土區別聲氣亦隨而異焉蓋外國之語有其聲而無其字假中國之字而以通其用是猶枘鑿之鉏鋙也豈能達而無礙乎要皆各隨所處而安不可強之使同也吾東方禮樂文物侔擬中夏但方言俚語不與之同學書者患其旨趣之難曉治獄者病其曲折之難通昔新羅薛聰始作吏讀官府民間至今行之然皆假字而用或澀或窒非但鄙陋無稽而已至於言語之間則不能達其萬一焉癸亥冬我殿下創制正音二十八字略揭例義以示之名之曰訓民正音象形而字倣古篆因聲而音協七調三極之義二氣之妙莫不該括以二十八字而轉換無窮簡而要精而通故智者不崇朝而通愚者可浹旬而學以是解書可以知其義以是聽訟可以得其情字韻則清濁之能辨樂歌則律呂之克諧無所用而不備無所往而不達雖風聲鶴唳雞鳴狗吠皆可得而書矣遂命臣等詳加解釋以喻諸人庶使觀者不師而自悟若其淵源精義之妙則非臣等之所能發揮也恭惟我殿下天縱之聖制度施為超越百王正音之作無所祖述而成於自然豈以其至理之無所不在而非人為之私也夫東方有國不為不久而開物成務之大智蓋有待於今日也歟尚玄曰鄭氏以創造諺文之事歸美於君上矣雖然凡文物久則變變則通自是進化之原則也則可斷言俚語崔疏見下俗字申序見下蒙字等為造諺之基礎古篆梵字等為作字之模型漢文字母為發音之標準也二委巷俚語崔萬理上疏謂前此吏讀雖不外於文字有識者尚且鄙之思欲以吏文易之而況諺文與文字暫不干涉專用委巷俚語者乎借使諺文自前朝有之以今日文明之治變魯至道之意尚肯因循而襲之乎必有更張之議者此灼然可知也三東方俗文訓民正音圖解敘淳州申景濬舜民撰曰東方舊有俗用文字而其數不備其形無法不足以形一方之言而備一方之用也正統丙寅我世宗大王製訓民正音其例取反切之義其象用交易變易加一倍之法其文點畫甚簡而清濁闢翕初中終音聲燦然具著如一影子其為字不多而其為用至周書之甚便而學之甚易千言萬語纖悉形容雖婦孺童騃皆得以用之以達其辭以通其情此古聖人之未及究得而通天下所無者也諸國各有所用文字高麗忠肅王時元公主所用畏吾兒字未知其如何而以九象胥旅獒文者觀之皆不免荒亂無章則正音不止惠我一方而可以為天下聲音大典也然聖人制作之意至微且深當時儒臣解之而未盡後世百姓日用而不知聲音之道既明者將復晦矣賤臣何敢與知其蘊奧之萬一而管規而蠡測為此圖解以寓於戲不忘之意而已四畏吾兒文按高麗史忠烈王以後世尚元公主元公主用畏吾兒文仍為宮庭用語迄于朝鮮時代宮中尚有其語即如御用之飯膳呼曰水剌又著黃衣戴草笠之御用樂手名曰元內吹亦云吹螺赤或卒花赤赤者即兒哈赤或花赤之類也即如奴兒哈赤者皆蒙語也又國置蒙譯以為交際申叔舟善蒙語奉命製諺文概可想見蒙語之勢力至朝鮮猶不衰也按支那疆域沿革考元其先蒙古也即韃靼一部又按東洋大歷史蒙古其始祖出自印度謂烏桓也其後元世祖奇握溫忽必烈經畏吾西征七年盡定西域易前代地名以蒙古語改稱回鶻為畏吾兒隸馬哈木又按朝鮮世宗實録云九年丁未夏四月壬戊禮曹啓回回之徒衣冠殊異人皆視之以為非我族類羞與為婚既為我國人民宜從我國衣冠不為別異自然為婚矣且回回大朝會頌祝之禮宮停罷從之蓋回回者即今支那新疆南山之回部古云回鶻亦名回紇至于元朝改稱畏兀兒或云畏吾兒然則元公主所用畏吾兒語料即回回語而系屬韃靼語族也回回之徒其自元國移來高麗仍世居成聚落至于朝鮮不改衣冠不變其教者歟其云禮宮者疑即回回教之禮拜堂而其云大朝會頌祝者疑亦回回教徒禮拜之儀式也蓋蒙古世祖成吉思汗征服印藏崇奉喇嘛教以發思巴為帝師雖然當時印土之回回教亦駸傳于蒙人矣五蒙古韻會世宗甲子諸儒臣等奉命詣議事廳以諺文譯韻會又申叔舟撰東國正韻序有蒙古韻與黃公紹韻會韻會依蒙古韻造之者也見崔世珍四聲通解入聲亦不用終聲何耶等語方便子柳僖曰諺文雖創於蒙古而成於我東又曰世宗大王命詞臣依蒙古字樣質問明學士黃纘以製訓民正音云云李瀷星湖僿説云我東諺字創於世宗朝丙寅凡有音者莫不有字人稱倉箍以來未始有也元世祖時巴思八者得佛氏遺教制蒙古字平上去入四聲之韻分脣舌喉齒牙半脣半齒七音之母字苟有其音者一無所遺凡中國之字以形為主故人以手傳而目視也蒙字以聲為主故人以口傳而耳聽也然全無其形又何能傳而不泯今無以得見其詳若推例為文字可以通行於天下後世與我之諺文同科意者明初必有其法也我國之始制也設局禁中命鄭麟趾成三問申叔舟等撰定時皇朝學士黃瓚罪謫遼東使三問等往質凡往返十三度云以意臆之今諺文與中國字絶異瓚何與焉是時元亡才七十九年其事必有未泯者瓚之所傳於我者抑恐外此更無其物也按高麗忠烈王時公主妬寵作畏吾兒字達于元欲人之不曉也史云回鶻書于慎行云宋嘉定三年畏吾兒國降於蒙古唐之高昌也居甘州即西域國名而奉佛教者也巴思八所傳既云佛教而元世之通行則公主之所作字非此而何然則與今諺字不過形別而意同者歟凡中國書有音而無字者過半凡諺舌喉齒開合清濁隨口異聲何故或有或無今諺文反切凡十四母其有母而無其切亦四條俗所謂入聲也其舌帖上齶一條我國亦無字侵覃鹽咸四韻與真文等同切我所謂入聲中國無有只有兒二兩字其蕭爻尤三韻一字二音此不可曉也意者五胡以後歷元魏華音變盡北方之音有然者耶我俗西邊多濁聲都中泮村亦然北民移濟州故其音與北相類可以為驗西域之字無音不備則屋沃以下入聲十七韻外恐更別無其音而其得於瓚者如此則此又發思八餘意又可想可謂後出益工但其字形全沒意義惟以一點二點為別一點者出於舌端為正音二點者皆出於舌右旁偏音也其凡例今無所考六附蒙古字來歷按元史蒙古至元八年改國號曰大元世祖中統二年高麗元宗二年特命帝師發思巴製蒙古文字其字僅千餘其母凡四十有一其相關紐而成字者則有韻關之法其以二合三合四合而成字者則有語韻之法而大要則以諧聲為宗也至至元六年詔頒天下略曰國家未遑制字因用漢楷及畏吾字以達本朝之言一代制度實為未備自今璽書頒降者并用蒙古新字云云又按釋鑑稽古略續集至元七年詔頒大元國字帝思發師八獨運摹畫作成稱旨即頒行朝省郡縣遵用迄為一代典章云云七蒙古字亦出於梵字趙石墨鐫本曰蒙古字法皆梵天伽盧之變也與佛真言相類云云按伽盧者即謂佉樓書亦即梵書也梵語字典云佉樓書玄應音義第十七云應言佉路瑟吒謂北方邊處人書也百論疏上之下云毗婆娑云瞿毗婆羅門造梵書佉盧仙人造佉盧書大婆羅門造皮陀論即韋陀論本行集經第十一云梵天所説之書佉盧風吒書隋言驢脣又云外云昔有梵王在世説七十二字以教世間名佉樓書世間之敬情漸薄梵王貪吝心起收取吞之惟阿漚阿優兩字從口兩邊墮地世人貴之以為字王故取漚字置四韋陀首以阿字置廣主經初八諺文字法一倣漢字古篆按御製訓民正音鄭麟趾序癸亥冬我殿下創制正音二十八字略揭例義以示之名之曰訓民正音象形而字倣古篆云云又崔萬理上疏謂創作諺文有駭觀聽儻曰諺文皆本古字非新字也則字形雖倣古之篆文用音合字盡反於古實無所據云云二附篆來歷按支那歷史黃帝史官蒼頡或云蒼頡古之王者在包歷前或云在炎帝之世或云在神農黃帝之間然當以黃帝史官為信見鳥獸蹄迒之迹初造書契蓋依類象形故謂之文如犬馬草木等文其後形聲相益即謂之字如一切有偏旁之字見説文敘然包犧作十言之教見鄭康成六藝論八卦即為古文易緯乾鑿度是黃帝以前支那已有文字而包犧所畫八卦絶類巴比倫之尖箏文巴比倫磚文稱尖箏文亦名楔形文西國紀元前六千年巴比倫有磚文凡書十二部紀其國之古事言洪水乃一神所造洪水之前有十皇相繼凡四十三萬年云此與支那古代十紀之説相符近日西人著書言包襁氏之八卦即巴比倫之楔形文今易緯乾繫度解八卦正作古文古天字古地字古風字古山字古水字古火字古雷字古澤字夫天地山澤水火風雷等物均世間至大至常之現象為初作記號者所必先或包犧氏與巴比倫分支極早其他之文均未作而僅有此八文歟倉頡所造諸文又絶類古埃及之象形書二種文字截然各異而相隔數千年其一種所轉變耶其起源各不相蒙耶今日支那地學未興金石未出不能知也支那文字之可考者自周始周禮保氏教國子先以六書一曰指事指事者視而可識察而見意上下等字是也二曰象形象形者畫成其物隨體詰詘日月等字是也三曰形聲形聲者以事為名取譬相成江河等字是也四曰會意會意者比類合誼以見指撝武信等字是也五曰轉注轉注者建類一首同意相受考老等字是也六曰假借假借者本無其字依聲託字令長等字是也及周宣王太史籀著大篆篆字本義為引筆而著於竹帛因李斯所作謂為篆書而謂史籀所作曰大篆其後篆書曰小篆十五篇與古文或異其後諸侯力政不統於王言語異聲文字異形尚玄曰莊子徐無鬼篇云孔子在楚翻二經又孟子曰楚人欲其子之齊語也秦始皇帝初并天下丞相李斯乃奏同之罷其不與秦文合者李斯作倉頡篇中車府令趙高作爰歷篇太史令胡母敬作博學篇統謂三倉皆取史籀大篆或頗省改所謂小篆也是時天下事繁嫌篆書不便始皇又使下杜程邈作隸書隸書者謂苟趍省易施之於徒隸自此秦書有八體一曰大篆二曰小篆三曰刻符刻於符上四曰蟲書以書幡信五曰摹印六曰署書以題封檢七曰殳書以題兵器八曰隸書漢興元帝時史遊作急就篇解散隸體作草書各字相連者謂之草不連者謂之章今人楷書即兼章與隸以為之者也王莽頗改古文時有六書一曰古文謂為孔子壁中書二曰奇字古文之別體三曰篆書即小篆四曰左書即秦隸書五曰繆篆即秦摹印六曰鳥蟲書即秦蟲書綜三倉與武帝時司馬相如凡將篇元帝時黃門令史遊急就篇成帝時將作大匠李長元尚篇平帝時黃門侍郎楊雄訓纂篇凡五千三百四十字後漢安帝時太尉南閣祭酒許慎作説文解字分五百四十部九千三百五十三文於是天地鬼神山川草木鳥獸蛇蟲雜物奇怪王制禮儀世間人事莫不畢載後人能知古人製文字之原者賴有此也此段皆據説文敘九諺文字母一漢文字母源於梵文按御製康熙字典序曰古文篆隸隨世遞變至漢許氏始有説文重義而略於音故世謂漢儒識文字而不識字母汪左之儒識四聲而不識七音七音之傳肇自西域以三十六字為母縱為四聲橫為七音而後天下之聲總於是焉嘗考管子之書所載五方之民其聲之清濁高下各象其川原泉壤淺深廣狹而生故于五音必有所偏得則能全備者鮮矣此歷代相傳取音者所以不能較若晝一也自説文以後字書善者於梁則玉篇於唐則廣韻於宋則集韻於金則五音集韻於元則韻會蒙古韻會於明則洪武正韻皆流通當世衣被後學二諺文字母倣於漢梵朝鮮刊行真言集右真言集一部為龍巖肅與其高足白嚴俶編纂錢行板藏和順縣萬淵寺以炎燼今為映月奎就加修正重鋟者也云昔高僧了義始撰三十六字母而玉篇字彙諸書皆效字母音釋反切四聲清濁無不詳盡至洪武正韻字字母為三十一至於我朝依字母製述諺文以之譯解諸經謂刊經都監諺譯諸佛書高低四聲以點多少有無分之清濁全次諺字單復邊辨之又水觀居士跋云諸方各有文字以紀音聲而中國獨以相類音注之故多淆偽晚有神珙師及溫國文正為之反切指掌尚患疑濫近世又為侏離所雜學士大夫難言之惟我東諺書與西土梵文最為精巧初終清濁粲然可睹是書以梵文為綱以東諺漢字反覆相紐各極其趣使是書行於中國雌霓之讀必不使隱侯變色焉正祖二十四年孟夏重刊楊州道峰山望寺藏版或記云元魏時釋神珙始顯等韻之學等韻者以音聲洪細別之為一二三四等各等又分開口呼合口呼內聲外聲齊齒撮口按世謂北魏人神珙始傳西域三十六字母然珙所著反紐圖自敘併及唐憲宗元和韻譜則非北魏人乃唐元和以後人也又無所謂字母者而有釋守溫撰字母之言則字母非珙所傳也明矣星湖僿説云韻之四聲譜自沈約字之反切自神珙後世字書務便考閲部分偏傍然亦可因反切而該等韻又或記云唐昭宣帝天祐四年唐亡是歲唐末釋守溫撰三十六字母圖一卷釋氏奉為專習反切之法至宋中葉始盛傳齋遺稿字母辨云中國古無字母翻切法只緣章句嚴整自叶律呂故或以中聲或以終聲相諧者成韻此南朝沈約所以創為韻譜也惟西域梵學因聲該教音調最精而北朝魏世西僧了義傳梵語一切字音初聲相類者立字母而括之蓋梵語在華嚴經者有四十八母而了義所創有見溪以下三十六母華音之細別不及梵語者此可見矣自是以來華人始解初聲與中終二聲迭相經緯之法而經傳字音遂有翻切蓋字有直音則直用一字音同者注之字無直音相當者須用一字母一韻母相翻相切然後方得相當之音則用二字注之如顏師古陸德明所用皆是法也傳至宋世古音漸變有一母而分者有二母而混者於是邵子之經世韻法作矣但字書諸家不深曉其義只據三十六母而併其混者如南宋末黃公紹韻會三十五母大約可見蓋宋元之際有減為三十二母者至明洪武正韻則又減為三十一母明末西洋人利瑪竇等東來所用字音又止二十三母我東則世宗御製訓民正音本據洪武正韻字母所以通詳漢語也其俗用之方言則又減為十四母而已蓋無論華音東音各自有古今之異不但方域風氣之所拘則字母之舊密今踈舊多今少亦其自然而然者耳所謂十四母者非訓民正音本有此法自四聲通考老朴輯覽四聲通解以下國人所私用者不過十四初聲則字母之自減可知也訓民正音既遵洪武正韻定為字母三十一初聲而自譯華語以外俗用者十四初聲也又定三十二中聲而自譯華語以外俗用者十九中聲也又反用初聲定十三終聲而自譯華語以外俗用者八終聲也尚玄曰初撰漢文字母三十六字者凡有三人各異其名或曰了義或曰神珙或曰守溫年代又異或云北魏人或云唐末釋以余觀之了義神琪似是一人何以知之真言集序云了義真言集跋云神琪故至釋守溫未能臆斷姑存疑以俟後考三人之中未詳孰是而漢文字母撰於西域僧手後為我東諺文初聲之標準則明矣三梵字起源梵書悉曇章梵書之作始於大梵天王而言梵者具云梵摩此云清淨以梵天離欲光潔自在故也西域之言稱梵者昔光音天下降因以久住而為人種則本是梵胤故云梵又印土人與梵天言音相同故云梵又云悉曇本是婆羅賀摩天王所作此云遍施或云字母亦云初章亦名成就也云何謂遍施等以十二轉聲遍人三十四字施生一切字如母生子故謂之字母也二十字母梵章中悉曇最在第一故云初章亦為生子之根本類如此方由三十六字而生諸字故云成就也梵書字母之總有十二轉聲二十五牙舌脣齒喉五音九會音亦云超音四助音總合五十字而其中十二轉字遍入於五音九會音等三十四字之中添書變音真言集敘又按近世印度史論梵文之起源曰西洋紀元前四百年於印度人中已有文字之發明而但未及供給衆用矣至四世紀頃僅為普及於邊都野地名以北之地是謂北方文字為梵字之起源此後亦於邊都野以南之地有巴亞里文字之起源是謂南方文字尚玄曰佛書華嚴經有十二字母瑜珈金剛頂經亦有五十字母且一切佛經南北方文字俱有可見印度文化之多端耳尚玄曰綜合已上諸條觀之造諺次第不難知也但字體倣古篆云者大有疑義何以然也大小篆中不無一二類似諺字者雖然諺文反切紐關之法合畫諧聲之規非復如梵諺間關係之酷類也鄭麟趾崔萬理等所謂字倣古篆者以皆儒者故諱言梵字而曰古篆也故至於後世實事漸露即如東閣雜記所云諺文字體倣古篆梵字者是指漢文古篆及西域梵字兩事乎何模糊若是雖然較昔兩人已加一事矣至於文獻備考云芝峰類説李晬光著云我東諺書全倣梵書而後造字倣梵之真相始露出無餘矣星湖先生謂字形全沒意義惟以一點二點為別云云者亦不審之説也余今引悉曇章中梵字與我諺字其形與音相類似者數例諺字𠼝去韓囉去韓攞平韓佉平韓韓舍去韓韓韓韓梵字諺字韓韓韓韓諺云副韻或云拗音梵字梵云超音或和會聲諺文之音聲倣於蒙古韻會諺文之字母倣於洪武正韻又蒙古字變於佉樓漢字母肇自西域則或為遠因或為近因余故曰諺文字法源出梵天也四滿蒙譯學元孛朮魯中羽韻會序曰許氏立説而文有類沈約譜聲而韻有書元魏用翻母而字有攝書家資焉劉辰翁韻會序曰鄭夾漈謂梵音行於中國而吾夫子之經不能過跋提河一步者以字不以聲也南宋末昭武黃公紹編韻會文獻通考小學説曰自漢佛法行於中國又得西域胡書能以十四字貫一切音文省而意廣謂之婆羅門書與八體六文之義殊別韻學本源云西域梵字悉曇章悉曇即悉怛陀康熙字典云等韻者梵語悉曇此云字母是一切文字之母梵語毗佉囉此云切韻是一切文字之根本亦曰悉檀一説悉曇章此云遍施亦云初章亦云成就所生十二轉聲助音五聲超音亦云和會聲已上諸字皆略右梵字十二轉聲十二字助音四字五聲二十五字超音九字合五十字出佛書蓋西域語也旁用漢字以華語譯之也注用訓民正音朝鮮人以方音譯之也正音旁點即平聲無點上聲二點去入二聲各一點正音本例也蓋漢字本以古篆而變今天下莫不通行而外國亦各有其國所用之字如西漢時西域安息國橫行為書記橫行者胡書體也宋時西夏趙元昊自製蕃書形體方正類八分而書頗重復以教國人記事金初無文字及獲契丹漢人始通契丹漢字於是烏野謀良虎谷神等學之謀良虎兩日盡通遂與斡本等立法定制頒女真大字後熙宗又頒女真小字大抵用此亦以譯經史太祖完顏旻時也元世祖至元六年行新制蒙古字元古無字帝師胡僧八思馬始製此字因號帝師八思馬亦曰八思巴即班爾恆拔思發也土波國即西藏也人敏悟過人年十五自其國來見世祖于蕃邸即被尊寵中統元年以為國師授玉印統天下釋教年二十三後住楊州平山堂事見佛祖通載元雖行蒙古字然往來書多用畏吾兒字畏吾兒古回鶻也高麗忠宣王妃薊國公主來自元妬趙妃專寵作畏吾兒字書付隨從濶濶不花濶濶二人如元達于皇太后今安南國字體綰結難分日本亦用四十八字但以漢字依聲用之耳至於梵字或云如來所製此未可知然我訓民正音淵源大抵本此而終不出於梵字範圍矣朱子嘗曰南海諸蕃書煞有好者字畫遒徑如古鍾鼎欵識諸國各不同風氣初開時此等事到處皆有開其先者不獨中國也所謂南海諸蕃見於宋史者如安南三佛齊真臘占城渤泥是也其地又西近天竺梵教所行則西南諸國皆有國字信矣北則蒙古女真字是已蓋金人既通契丹漢字金主命谷神依倣漢人楷字因契丹字制度合本國語製女真小字謂谷神所製為大字而今胡清碑刻錢文印字往往亦用其字則北亦有國字信矣清太祖時命額爾德尼與噶蓋共製國書而大海正證之曰清書大海又作對音切字不復用蒙古字惟本國正音雖曰後出而字樣簡潔便於日用東方之有國字自此始焉而其視三國以來所用薛聰吏讀用漢字依聲不通者相去遠矣但去今不滿四百年其字語音已有不能曉者亦猶漢字古用三十六母後又減四為三十二而洪武正韻則又減為三十一也又法苑珠林云造書凡三人長曰梵其書右行次書佉盧其書左行少者倉頡其書下行梵書右行者自左而右也書佉盧左行者自右而左也二者皆橫行也惟倉頡下行者自上而下是縱行也鄭樵華梵論曰諸蕃文字不同而多本於梵書梵書左旋其勢向右華書右旋其勢向左華以正錯成文梵以偏纏成體華則一音該一字梵則一字或貫數音華以直相隨梵以橫相綴華有象形之文梵亦有之字略華有省文之字梵亦有之字略華有同聲而借之字梵亦有之字略華有協音而借之字梵亦有之字略云云蒙語老乞大十二字頭文字皆略之蒙即蒙古也蒙語即元音也元有天下女真在其城內而女真今為清人故前後言語文字相通而清人初亦因其舊俗及其太祖命製清書行之而蒙別行于蒙古矣我朝鮮交鄰爰習老乞大漢清蒙三學書名各以方言翻之聖上英祖大王四十年甲申司譯院提調韓翼謨以蒙語鹵莽建白使蒙學行副司直李億成清學前判官邊翰基就正于清人在燕京偶逢蒙古人許夢閎者始得十二字頭字有首尾音分陰陽觸類推衍曲暢旁通可謂捷徑南針既梓行之明五月本學權知李學源序之旁用我訓民正音隨聲附之已上韻學本源尚玄曰十二字頭外其他所謂阿利噶禮字形繁故略之而但示翻譯以證朝鮮諺文為蒙文之脫胎蓋阿利噶禮字者看上下陰陽字切音韻用字旁有圈者俱陽聲清聲有點者俱陰聲濁聲諺字右旁圈與點亦皆略之韓韓韓韓切音韓切音看上下陰陽字用韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓輕舌音韻用韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓尚玄曰蒙文行法與我諺文相類字法亦多相似者又聞蒙僧梵唄與朝鮮僧家現行梵唄相同云然則音調亦同推可知也今按譯院有蒙語老乞大又有清語老乞大新釋蓋清學課習之書其曰老乞大者始出於崇禎丙子以後我朝鮮人東還者因語生解初無原本依倣故自初不免生澀聖上英祖大王三十六年庚辰咸興譯學金振夏因開市赴會寧留與寧古塔筆帖式質問音義辨明字畫徑庭者改之差謬者正之翌年開市復質皆以為與今行話吻合乙酉本院都提調洪鳳漢建白梓于平壤提調洪啓禧序之院中舊用三譯總解以三國志衍義文字翻解無甚同異訛舛而老乞大則新釋之出始得無礙今之清學即經國大典所云女真學也用女真字輿蒙古字略異凡漢字及我訓民正音俗稱諺字者並自右而左以成行而清蒙字則自左而右以成行其源蓋出梵字梵字左旋其勢向右故也又漢字及我諺字一音各一字而清蒙字則或二音合為一字或三四五音合為一字又梵字終聲或在初聲之上或在初聲之右而清蒙字則終聲必在初聲之下又按聖上十三年丁巳本院都提調金在魯以蒙語老乞大經前後赴燕質正令該學李世烋撰出捷解蒙語而老乞大本文所列物名尤緊更令李喜大玄文恆質于蒙人仕燕者而書寫官李最大刻之辛酉安命説序之云已上韻學本源女真鞋靼高昌即畏吾兒回回西蕃等諸國字皆略之十諺字沿革世宗三十一年己巳崔恆譯洪武正韻名東國正韻同時申叔舟撰四聲通考中宗十二年丁丑崔世珍撰四聲通解二卷二十二年丁亥崔世珍又撰訓蒙字會同時人柳崇朝撰經書諺解時又有翻譯朴通事老乞大皆漢語書名也皆諺文後最古撰述自是以來諺文漸變英祖二十三年丁卯朴性源與譯官李君彥取三韻通考懸華音於字下一依崔世珍四聲通解命名曰華東正音通釋韻考英祖二十六年庚午申景濬撰訓民正韻圖解英祖二十七年辛未洪啓禧撰三韻聲彙二卷正祖二十年丙辰御定奎章全韻彙以四聲命文臣丁若鏞詮次以進純祖二十四年甲申柳僖撰諺文志一卷李太王殿下六年已巳薑瑋著擬定國文字母分解尚玄曰上諸書中獨柳僖諺文志為最後書而詳於沿革富於研究故余多取之云爾諺文志鄭先生東愈工格物嘗語不佞子知諺文妙乎夫以字音傳字音此變彼隨變古叶今韻屢舛宜也若注以諺文傳之久遠寧失真為慮况文章必尚簡奧以簡奧通情莫禁誤看諺文往覆万無一疑子無以婦女學忽之又歎曰奇耦之分謂韓韓及韓韓在廣韻前謂西域字母初來時清濁之混謂廢雙形初聲在通釋後吾安能與後通釋之人論及先廣韻之字哉乃不佞與講辨既數月歸著一書名諺文志先於初中終聲列前書沿革繼以論斷末列全字立成萬有二百五十縱橫為行使人一閲盡得之以示後進理會者寡遂投巾衍十五六年因失之獨自悵恨又五六年及今借得四聲通解更繹舊紀間易新見復以成一本至其立成字圖苦太遲遲刊落之時甲申仲夏上旬西陂雨中書此序文也諺文雖創於蒙古成於我東實世間至妙之物比之文字其精有二文字則制以六義為形散亂不可以一例推萬狀諺文則以中係初以終係中各有條脈縱橫整齊婦人孺子咸能頓悟其變化殆如大易之爻錯綜往來無不各從其次序此體之精也文字則古人諧聲之外偏旁之加漸久漸多古人轉注之外後來詞客任意變讀以協其押韻如字彙所引諸詩賦令人湣眩恆起訟辨諺文則若移動全部則已欲誤一字之形得乎欲改一字之音得乎此用之精也但其綴文成章不能如文字之神而通之然今人之尊文賤諺者豈以其不能成章歟特以覺之難易尊之賤之故可咍爾諺文之制本應律樂欲察初之清濁終聲之平入間間犯至微至眇之界苟非蠶絲牛毛之學不能使密合徒以微眇之本理一壞於蒙韻之無入聲再壞於東俗之廢濁聲三壞於婦女之只事十四母猶足以釋文無反切互訛之弊通情無言語誤看之慮况今儒士窺玩其度數之井井合乎天成之妙寧自知手之舞足之蹈之也律呂音調可聽而不可見今以筆墨形容之亦奇哉人心圓人舌捷所呼之聲兼諸禽獸尚多百倍筆墨之巧寧不能備傳其聲如畫工之肖其像也今於人所呼之聲闕其一非吾至妙也疊其一亦非吾至妙也但恨余維音曉曉見而知之者尚鮮孰謂諺文易悟而可賤也嗟乎余為此書秪以待後之子雲而已耶此跋文也韻會三十五字母明黃纘著角徵宮次宮商次商羽半徵商半徵商全清見韓端韓幫韓非韓精韓知韓影韓次清溪韓透韓滂韓敷韓清韓徹韓曉韓全濁羣韓定韓並韓奉韓從韓澄韓匣韓不清不濁疑韓泥韓明韓徵韓娘韓喻韓來韓日韓次清次音魚韓心韓審韓么韓次濁次音邪韓禪韓崔世珍曰魚即疑音娘即泥音么即影音敷即非音不宜分二而韻會分之蓋因蒙韻內魚疑二母音雖同而蒙字即異也泥娘么影非敷亦同但以泥娘別論決然不以為同則未可知也洪武正韻三十一字母明高皇帝命詞臣依毛晃韻書作洪武正韻五音角徵羽商宮半徵半商七音牙音舌頭音重脣音輕脣音齒頭音正齒音喉音半舌音半齒音全清見韓韓端韓韓幫韓韓非韓韓精韓韓照韓韓影韓韓次清溪韓韓透韓韓滂韓韓清韓韓穿韓韓曉韓韓全濁羣韓韓定韓韓並韓韓奉韓韓從韓韓牀韓韓匣韓韓不清不濁疑韓韓泥韓韓明韓韓微韓韓喻韓來韓韓日韓韓全清心韓韓審韓韓全濁邪韓韓禪韓韓字下諺注在右者本字音也在左者即母也字母者為字之母也胡僧了義始撰三十六母正韻省為三十一母字母本三十六而知徹澄娘敷并於照穿牀泥非合為三十一以見字音韓可為韓音之標準故仍以作韓音之母凡諸韓音之字皆使隸於見字而為之子然舉見字為母者非有取本字之義也雖公字為母而見字為子可也諸母倣此此段引華東正音通釋訓民正音十五初聲我世宗大王命詞臣依蒙古字樣質問明學士黃纘以製韓韓韓尼韓池韓梨韓眉韓非韓時韓異韓箕之俚釋韓治韓皮韓之韓齒韓屎韓別有吹脣訓民正音不製全濁之形使加旁邊於全清其理與雙形同而為字簡捷然因以致字音全廢濁聲也旁邊説見下正音通釋十七初聲朴性源著韓韓韓角韓韓徵韓變徵韓韓韓商韓韓韓即徵母商韓韓宮韓變宮無吹脣音近日東俗除雙韓喫韓二字之外都無全濁之聲蓋由古人簡省諺晝之故也龍飛御天歌無全濁字而旁加二點於其次清字並以使讀者審點而呼之正音通釋亦只有全清次清不濁之字而全清則旁加次清則旁加不濁則旁加全濁則於其全清之字旁加使讀者審圈而呼之二法俱已令人易忽况有四聲通考之例平聲無點上聲旁加二點去聲入聲並旁加一點於是乎龍飛御天歌及反譯之旁點自歸疑眩矣又有三才圖會其圖詞合平仄之例平作仄作於是乎正音通釋之黑白圈又歸混亂矣後進淺學因四聲通考及三才圖會之點圈不關字音也並不審於龍飛御天歌反譯正音通釋之點圈只從本字而呼之若書諺語則全濁從韓韓之邊文字則一廢全濁之聲正音通釋之害一至於是不可不先復諺文之形乃能復文字之呼然習謬已久東俗之全濁殆如華俗之入聲恐難卒回也國初詞臣撰龍飛御天歌後以諺文證傳四聲通考高靈君申叔舟著三才圖會元王圻作柳氏校正初聲二十五母此下則柳僖之研究案也柳氏者方便子自謂也角徵羽商宮變徵變宮牙舌脣齒喉全清見韓端韓幫韓精韓次清溪韓透韓滂韓清韓全濁羣韓定韓並韓從韓不濁魚韓泥韓明韓日韓喻韓來韓影韓次全清匪韓心韓曉韓次全濁俸韓邪韓匣韓尚玄曰初聲之韓忽見於訓蒙字會凡例曰凡物名諸字或一字或兩字指的為名者一皆收之其連綴虛字為呼者如水扎子韓韓云云再見於華東正音通釋凡例曰韓韓韓此三者出聲相近不必異制云云三見於柳氏諺文志曰若微母則雖釋以韓韓本不濁無可以吹脣翻譯翻譯謂朴通事老乞大皆漢語書名凡例所云今之呼韓亦皈於韓者而通釋所以合韓即韓於韓者故今特去之云云初聲之韓韓通釋云華音韓者韓韓之間音韓者韓韓之間音東俗並無二者子何以存焉曰謂韓韓華音以字音言也今余此志雖間間發明以字音初非為字音設也只欲寫盡人口所出之聲而已寧以東俗無韓韓之字而諺文亦隨廢之乎夫韓固韓韓之間也往時華使來此見年少宰相問有大韓人韓乎則宰相不達韓聲答云大韓臣韓有三耳以是為至今傳笑此可見韓聲之近於韓聲也余所以升為齒音不濁者若韓與韓須觀制字之意韓韓之下承一空竅謂方呼韓與韓而吹氣脣竅以作飄揚之聲也我東前日亦曾有此聲故訓民別出之至朴性源時正音通釋已無之耳豈韓韓之間乎尚玄曰訓民本意韓母非專為吹脣而設按龍飛御天歌譯義薄韓韓京韓韓韓虎韓韓云云又韓字制諺文後三十年成宗乙未德宗仁粹王后內訓諺譯有心韓韓村韓韓等則韓見其字為初聲之時發音似韓母為終聲之時發音似口終者也雖然或因書字變體而偶爾亦難保必不也中聲例正音通釋中聲十一形調民正音三韻聲彙並同三韻聲彙洪啓禧所作韓阿韓也韓於韓余韓吾韓要韓牛韓由韓噬不用終聲韓伊只用中聲思不用初聲又有韓吾阿之合韓牛於之合又有右旁加韓亦伊蒙古韻蒙古韻略元朝撰即韻會所用又有韓呼同韓韓由余之合韓要也之合翻譯朝鮮譯院以諺文翻出漢語老乞大朴通事二書又有韓余吾之復韓阿吾之復韓也吾之復韓也要之復韓應牛之復韓伊牛之復此並蒙韻以為終聲韓形者今譯人謂折腰中聲正音通釋從翻譯今華俗謂燕人語止為士吾吾之復韓為韓要吾之復此亦折腰中聲李信齋令翊謂當又有韓信齋之言今俗呼韓韓八或謬為韓韓八乃此音柳氏校正中聲正例十五形韓韓韓韓韓韓韓韓韓韓韓韓韓韓中聲變例一形韓每於全字右旁加之東俗不明於多混韓如兒事等字從今俗誤呼如阿些亦或混一如韓土今讀為韓土由其聲本在韓一之間讀者當知之申高靈四聲通考曰韓讀如韓之間韓如韓之間韓韓韓韓韓韓一則如韓韓韓韓韓韓一之間韓則如韓韓之間然後庶合華音此因燕京餘音而言也諺文為制初不關於餘音且吳楚之音本務明白而已北音務在緩弛故作餘音也訓民正音只有十一形韓韓及右旁加韓使之臨時制用故三韻聲彙以三形韓韓韓為重中聲然韓韓制法重耳為聲初無重復舍形究聲不過與韓韓類故今各插入於其類之下又人口所呼更有韓韓之聲蒙韻字亦有音韓韓者故亦以添入至若右旁加韓雖亦非重復但其於凡字無不可加者自與十五形不類故今拔為變例韓韓等字獨不能加韓可見其自韓韓等變出也蒙韻又有韓形然其讀則與韓無別不過與初聲之疑與魚影與么耳今不用焉譯正音通譯同華音之韓韓韓韓韓韓今華俗之韓韓並真讀以重復之聲所以謂折腰中聲蒙韻四聲通考四聲通解皆同雖以作終聲以理究之非中非終直是一字復音耳諺文寫之當作兩字如朝鮮當云韓韓韓今不必有此中聲以亂天成之排行故並去之李信齋令翊所云韓形乃韓形之按頤也其聲極為糢糊不必為此無用之聲創立前人所無之字故不從焉今雖不從猶存此論要以見奇耦對待之理無往不具也夫中聲讀法哀而安者曰平聲厲而舉者曰去聲先安後厲且其引也緩者為上聲直而高且其引也有限者為入聲古今韻書務分乎此至於諺文只以備口出之聲初無平上去之可論故今並不及之尚玄曰我朝鮮純方言中有音同而義異者蓋隨其發音之長短即生其意義之殊異例如短音韓則成夜之義長音韓韓或韓韓口則成栗之義短音韓則成馬或斗之義長音韓韓或韓韓則成村或言之義短音韓則成目之義長音韓韓或韓韓則成雪之義短音韓韓則成家庭之義長音韓韓韓則成假定之義短音韓韓則成女壻之義長音韓韓韓則成社會之義諸如此類不一而足古昔諺文之上聲即今之長音而平去入三聲即今之短音也若欲字字加點于左以標四聲則豈不誠煩弊也哉是故當知今世用韓以標長音實為至便省事者也昔時教科書中聲點或用或不用仁粹王妃內訓諺譯無四聲標崔世珍訓蒙字會設而不用英祖甲子本小學諺解有四聲加點之凡例矣雖然諺字點標實為了解漢字之四聲而設者故平聲之漢字亦為諺字之平聲其他上去入三聲亦隨而然也至于後世厭其煩贅自歸廢棄而漢字韻書層列四欄平聲上聲去聲入聲彙以四聲注以諺音東音華音加方圓圈例如東韓韓而其一字互見四聲者一字互見他韻者等各用符號以標識之正宗丙辰御定之奎章全韻即其證也御定奎章全韻義例云我東韻書之彙以三韻別置入聲有非韻本四聲之義今以平上去入比類諧音增為四格此奎章全韻之承命詮次者也編字次第倣古韻書字母為次之法以諺書反切按序排定而一字之諸韻互見者同字而音義各殊者華音東音之逐字異讀者標以傍識之匡以圈加之諺注以分析之皆依華東正音之舊而尤致詳焉一字互見四聲者平聲標上聲標去聲標入聲標一字互見他韻者注部首字加匡一韻而字同音義異者注以諺音東音則同而華音母義異者標以小圈調別義而書華音加匡華音則遵正音之字母叶通解之諺翻東音則辨以七音律以字母各字之下以諺書分注華東亦各加匡韻法自六經始兩漢諸儒莫不用韻太玄易林是也至沈約拘以四聲古韻失其傳而叶音之稱昉於吳棫韻補朱子取之以釋毛詩離騷今略為抄附至於通韻之辨有若聚訟而證之古樂府杜韓詩最有可據以次附于各韻之下東冬江相通支微齊佳灰相通魚虞相通真文元寒山先相通爾豪肴相通歌麻相通庚青蒸相通侵覃鹽咸相通上去入倣此自今科試許押入聲增韻而又有新定玉篇以生生字整理字印頒奎韻之彙以四聲蓋自定廟宸衷而命文臣丁若鏞詮次者也終聲例正音通釋終聲八韻訓民正音三韻聲彙並同韓役韓隱韓末之俚釋韓乙韓音韓邑韓衣之俚釋韓凝通考蒙韻翻譯通解並同東陽等韻字以疑母為韓終不用韓形韓即通釋標凝者但通釋去其甬通解謂支合微齊魚模皆灰合隊歌麻遮分麻韻字當以喻母韓為終蕭爻尤從蒙韻蒙古韻蕭爻合豪尤藥韻字並以微母韓為終讀法於蕭爻如中聲韓於尤如韓於藥如韓與韓通考通解同藥韻字以匪母韓為終讀法同韓蕭爻尤則從蒙韻按折腰中聲未知創自何時但據藥韻似在胡元以後有入聲則不當又著韓韓若謂著韓韓又著韓則猶非陽韻之例又唐以前詞賦蕭爻尤多通魚模矣如陸雲押流與俱柳州押魚與濤通考入聲除一藥韻字餘並以影母韓為終讀如無終字而微吞餘音通解去之通考支韻內齒音諸字如支絺痔施士等以日母韓為終讀法無終而微接餘音反譯及通解並去之通釋亦去之但於日母諸字以己為終耳通考及楞嚴經金剛經諺解三經四書諺解並無心母韓終通解注語及東醫寶鑑物名始有至申湜家禮解則遂無韓終也柳氏校正終聲正例六韻韓韓韓韓韓韓終聲變例一韻韓每於全字之下及下左邊著之或問東俗質曷等韻諸字並讀以韓終子云韓為韓韓何其駭也曰質物之韓東音之謬也在華音則本皆韓終申高靈四聲通考今可據也通考凡例云入聲之為入聲以其牙舌脣之全清為終聲而促急也又云今以韓韓韓為終聲然直呼以韓韓韓則又似所謂南音故逐字書俗音諸韻用韓藥韻用韓於反切下以別之蓋申氏所論皆指華音而其時吳楚尚有入聲故曰南音淮以北則無之故曰俗音王弇州所謂大江以北漸染胡音者也黃公紹韻會卒等字屬屋韻閣榼等字屬葛韻此以北音無入聲而不分至此也通考成於世宗末年其後七十餘年崔世珍作四聲通解其凡例云入聲韓韓韓三聲漢俗皆不用之唯南音之呼多有用者其云多有用者者以其時吳楚亦染胡音也唯其不盡用入聲崔氏不慣故遽據東音以韓當韓耳所以然者韓音本非入聲北俗尚間間用之如支韻內日母諸字至今著韓讀之崔氏云多用者必聞此等故也華人既無入聲矣寧獨於韓有改韓事乎今俗婦女諺文以韓代韓殊不知韓未嘗為終聲所以用於聯兩語者也如通解釋篷云韓韓韓謂舟之席也舟釋韓也非韓也席釋韓也非韓也但以聯意而自生出一個韓音故書之當犯三箇字址經書諺解皆如是書去不知其理徒怪突如則或屬之上以代韓或屬之下以代雙形如韓即謂濁聲並失其所處矣諺文之制本非如文字可以二三字相通則韓韓互用果非末失乎已上柳