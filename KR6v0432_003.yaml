識還鄉之事望乞慈悲指示迷途夕可大師曰善哉問也三世諸佛祖總是指路人從此南去南海正面水月院有一善士住彼名關大悲汝可往問之夕可大師又曰汝且南詢我今西皈端坐合掌泊然示寂大衆茶毗收舍利奉藏于塔藏珠禮辭師塔輾轉南行一時忘了到海南地見田間有一婆子施禮問曰容出家人問道正面水月院何處去婆云汝云出家汝家何處南海共有十一面那個是正面既云水月千江有月那個是真月珠不能對婆又曰遮裏是海南不是南海一字不差南北懸隔道不遠汝汝自遠道珠聞言始知誤了曰謝指示遂轉而北至南海歷路訪見岩寺考其事迹昔朝鮮李太祖受麗氏禪登極之後因諸臣議放諸王氏于海島中為庶民諸王氏喜爭登舟移岸至中流使善泅者穿穴船底船將沉有僧人與王氏有素者在海岸舉手呼之王氏即口占一聯呼謂僧曰一聲柔櫓滄波外縱有山僧奈爾何僧痛哭而返今牛頭山見巖寺即其處也太祖憐之特賜田百結又命賜金書妙法蓮花經三部每年十月降香為王氏薦冥福珠見海山鬱蒼猿鳥悲鳴皆似助其哀珠不勝吊古之情遂足成王氏之詩曰一聲柔櫓滄波外縱有山僧奈爾何地下若逢龍女佛蓮花妙法也應多自此發向水月院至洞門外有一白衣人坐柳樹陰賣胡餅藏珠便問賣與我胡餅白衣人曰只管將錢來藏珠問大悲在院未君或知否白衣人起立整襟而對曰我知大悲在水月院待還珠和尚久矣和尚可往見之遂去藏珠入院覔大悲不見忽聞空唱曰昌平平昌海南南海珠還合浦是汝自家珠聞此偈始大悟而如夢方醒乃知前賣餅者即大悲也而亦知三度改名皆有所因逸素批曰此一篇小傳中靈山夕可是主中主也玉果觀音南海大悲是主中賓也索寶老僧文喜長老是賓中賓也以性傳性其先本靈山人喻還鄉自是兒孫事祖父元來不出門也將頭覔頭而今問靈山僧喻佛在靈山莫遠求靈山只在汝心頭也是以明顯暗也先敘金倫之聽經築樓官居合浦引出珠僧之問法指路珠還合浦是以實陪虛也未到薩那先有鵑樓之感淚將向水月不勝牛山之吊情一是去國一是失家是正襯也自昌平而平昌自海南而南海一是誤路一是正道是反襯也聖德之迎像禹氏之迷路昌平禹成海幼時往鄰郡母家皈家迷失道誤住江原道平昌遂為流乞後至京城寄傭於一賣藥鋪乃娶室營産登進士第又逢其兄始知為昌平人禹進士今居京城之佳洞年可五十餘歲有聾疾慈藏之瑪瑙塔指空之般若樓太祖之置見巖寺端宗之登子規樓是實事也定林寺中之黃面僧水月院外之白衣人昌平路上之老翁海南田間之婆子皆假人也珠喻佛性是骨子也得珠失珠藏珠還珠是影子也道喻智慧是骨子也迷道指道行道得道是影子也其始也有異僧之四句偈妙在含糊説去不知是吉是凶其終也聞空唱之四句偈妙在和盤托出乃悟其因其果以憂得之憂者多戒慎得之本也以樂失之樂者多放逸失之本也遇喜則藏喜者慈愛也與樂之本也故安置寺中也遇悲則還悲者哀憫也拔苦之本也故還皈故鄉也殷氏得懷胎而感虔禱者是動機也老僧知握拳而索還珠者是發機也文喜許剃髮而勤參學者是接機也夕可説迷路而乃涕泣者是投機也大悲則對面而不相逢者是收機也昌平平昌海南南海毫釐有差天地懸隔是喻迷悟顛倒唯在一念成佛道僧渡李無能忠清道槐山郡成佛寺在成佛山寺舊頽圮覺淵寺僧雙杖禪師法號山海名繼奉者募緣重創之時己卯歲也雙杖禪師因精進身忽飛墮兩足內曲拄雙杖行故名牧牛歌無能者李四也以愚故名湖西槐山郡大學村一農家子也八歲上入家孰習漢文十五而冠焉厭頭痛之苦不著網巾為掩上頭髻之俗名常戴程子冠近世朝鮮儒冠之名故鄉里人起別號曰李脫網時其父聘雪城高叟為西席無能始讀孟子七篇有時浴乎槐江之水曾點之胸襟灑落有時驅牛明德山之下牧童之風致宛然一日高師謂無能曰聖賢有言正衣冠尊瞻視今汝不巾不襪馬牛襟裾如是慣了將來焉能行于世乎其自今日整齊衣巾端坐讀書可也無能難違師教對曰謹遵師乃著馬尾網巾魔迷妄愆頭暈便作穿三升布襪三乘無明雞眼又生忍耐苦痛跪坐而讀大學朝鮮田舍有農夫穿三乘襪跪坐而讀大學之俗語蓋此況極不自由之事也高師問無能曰夫文理者貴自得之汝試道看此文之義如何無能對曰師乎大學之道在明明德此豈指大學村之道路在明德山下云乎哉高師笑曰爾言似亦然也汝且看朱子集注大學者大人之學也明明之也明德者人之所得乎天而虛靈不味以具衆理而應萬事者也但為氣稟所拘人欲所蔽有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之以復其初也此即大學之綱領也然則汝欲為大人當如是修去也無能曰此外更無簡約之注解乎高師曰有王陽明先生注曰虛靈不昧衆理具而萬事出心外無理心外無事故又曰無善無惡是心之體有善有惡是意之動知善知惡是良知為善去惡是格物較朱注直捷簡明雖然從王學者難免斯文亂賊之科律莫為舉論無能聞此言更覺頭疼用手緩其網繩且問曰師乎誰則創造網巾者高師曰朱天子明太祖朱元璋創造也無能曰頭外則朱天子之網巾束縛之腦中則朱夫子之網巾束縛之有此內外之束縛人無以活為也高師掩無能之口曰是何言斯大事出矣日之夕矣牛羊下來無能往明德山下驅牛去望見槐江正是野水無人渡孤舟盡日橫少焉有一老僧從彼岸上傴傴僂僂步一步前來認得是成佛寺重創化主雙杖禪師也放下拄杖藉草而坐無能遙施一禮問曰師今欲渡不禪師曰子豈渡我是我渡子無能曰師在彼岸我在此岸我之彼岸師之此岸師之彼岸我之此岸既無彼岸可到何有此岸可離師欲度我向何處著此岸即是彼岸即是禪師曰不著此岸不著彼岸不著中流如是而著相見大笑雙杖禪師為無能作牧牛歌曰牧牛兮明德山之阿兮白石燦兮流水清兮牛兮牛兮食肥草兮牛兮牛兮勿食稼兮牛兮鼻孔本來撩天為甚鼻孔還却穿了二十解書劍西遊長安城政值前韓建陽元年時勢變遷百度維新無能夤緣得仕農商工部為主事之職一日忽自思曰枳棘之林非鸞鳳之所栖大丈夫焉能繫縛于此區區之名利乎周遊世界觀風察俗研究學術豈非男兒之事乎明日遂辭職還覺心神爽然自此專攻英佛漢日等語學蓋為遊學之準備也前韓光武四年支那北方拳匪闖發斥殺外人各國聯合軍攻陷北京此時有佛國人前來朝鮮雇募運送人夫數百名無能之同窗友有任運者被雇為監督兼通譯之任董率人夫從天津往北京戰地矣任運雖在佛陳不改朝鮮之面目著網巾戴漆笠彼處西洋人等見而怪之或以手按其笠頂或以指彈其網頭遂作陳中之一笑具矣既有水土之不服亦因飲食之不適任運罹於疾疫往紅十字病院受佛國醫士之診察斷以腦病入院治療其病院之看護婦乃英國籍之趙恩夫人也慈悲之心行現於外表照顧甚親切時時來到病床之前殷勤慰安雖胞姊妹無以過之一日兩人入於酬語任韓韓韓韓韓韓韓韓韓魔談撥遏來赴佛安世夫人佛語韓韓韓韓韓韓韓趙韓韓韓韓韓韓韓韓韓韓韓儂無我衰世應拜賴佛安世韓韓佛語韓韓韓韓韓韓趙韓韓韓韓韓韓韓韓韓韓韓韓韓迷時多任蠢儒是避匿英傑你誰依任先生韓韓韓英語韓韓韓韓韓韓任韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓靈談我以是避匿仍屆理隨喜拜投於大恩佛我安就夫人韓韓英語是佛語韓韓韓韓韓韓韓趙韓韓韓韓韓韓韓韓韓韓儒味以害腐懸頭翳匿韓韓韓頭痛韓韓韓韓韓韓任韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓韓理礙事我以害腐慧頭翳匿我已頓悟㘞爾韓韓合韓韓韓韓頭痛韓韓合韓韓韓韓韓韓韓韓韓韓韓韓合韓韓趙韓韓韓韓韓韓韓韓韓韓韓韓韓韓儒語妄韓以是底故崇我以定克定克兩字備用漢韓生覺韓韓韓韓韓網巾韓韓韓韓韓韓韓韓韓任韓韓韓韓韓迂腐故祟韓韓韓韓韓此下避煩直譯之任運因帶微笑而語曰夫人如能容恕敢問一句無禮之話趙恩夫人曰好也請言之任運曰西洋女人有束腰之俗能不感苦痛乎趙恩曰不不猶如高麗安人之纏頭也任運曰今度來此處觀之則支那女子因裹足之故兵亂猝至不能逃避坐而死者十居八九是可憐悶者也趙恩曰然也夫孰不有同情哉繼問曰我曾得讀林樂知先生所著高麗女俗則高麗安女子常被幽囚於內室時或出門亦著蒙頭云果然乎不任運對曰往時朝鮮女子社會果嘗受此苦痛矣雖然今已開放其出門時用陽傘代蒙頭也趙恩曰女界風氣如是漸開甚屬好事遂稱謝別去任運病愈自北京還無能往訪之任運具述冠巾受耻之事無能回思舊時纏頭之苦痛亦不覺啞然失笑任運從北京琉璃廠購得一部唐板圓覺經一部指月録因作土儀之贈無能持來置諸架上一日間居無聊披覽圓覺經有云爾時世尊告清淨慧菩薩言一切障礙即究竟覺雪堂行禪師頌云枯樹雲充葉凋梅雪作花擊桐成木響蘸雪嘆冬苽長天秋水孤鶩落霞得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及怒癡俱是梵行衆生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫法界海慧照了諸相猶如虛空此名如來隨順覺性但諸菩薩及末世衆生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實彼諸衆生聞是法門信解受持不生驚畏是則名為隨順覺性徑山果禪師頌云荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛師答林少瞻云但將此頌放在上面却將經文移來下面頌却是經經却是頌如此做工夫看莫管悟不悟心頭休要忙亦不可放緩如調弦之法緊緩得其所則曲調自成矣琅琊寶覺禪師嘗問講僧曰如何是居一切時不起妄念對曰起即是病又問如何是於諸妄心亦不息滅對曰息即是病又問如何是住妄想境不加了知對曰知即是病又問如何是於無了知不辨真實對曰辨即是病覺公笑曰汝識藥矣未識藥中之忌也寶覺禪師則為之偈曰黃花熳熳翠竹珊珊江南地暖塞北春塞遊人去後無消息留得雲山到老看無能由是知佛法之廣大無外便有十分傾向之心隨又披閲指月録見五祖法演禪師垂語曰譬如水牯牛過窗靈頭角四蹄都過了因甚尾巴過不得高峯原妙禪師頌云等間放出這牛兒頭角分明舉似誰若向尾巴尖上會新羅鷂子過多時無能於此不覺聯想山海禪師之牧牛歌遂從此時佛語等學拋置一邊而從事於研究佛心或放浪山水而吟詠或遊行市井而間談十二時中四威儀內騰騰任運任運騰騰有詩三首以見其意其一牧牛歌任運騰騰一個江湖有髮僧八萬法門聞指月百千公案讀傳燈空花生處看真妄道果成時驗愛憎四十九年何所得依然還我李無能其二宋永明壽禪師有物外山居詩余步其韻而反其意云爾靜閙何關決我疑長安大道且平夷城中亦有山中境心外原無物外詩九陌曉鍾搖舊夢萬家春樹亂新枝除非一隻沙門眼肯許知音得子期其三自家幽境轉能深不用逃形物外尋山色溪聲參活句鶯吟燕語聽真心俗機還向紅塵息世慮都從白業沉多少間人相見處清風明月是吾襟
