body:
  text: 完山李能和尚玄居士輯述東州崔南善六堂學人校閲三國麗鮮國史考據李能和尚玄居士著者自號生長于槐山之田舍齠齔之齡見一老僧松形鶴骨道氣可掬兩手雙杖傴僂而來捧勸善文募化檀緣重創本郡成佛山之道德菴家父與之談論佛法命我禮雙杖禪師捨我名獻于佛祈福壽我竊疑佛道是何物焉我年雖幼頗能解讀而鄉曲苦無書籍佛典禪録無由得見一日偶閲事文類聚至釋道卷得六祖慧能大士謁黃梅呈偈機緣菩提本無樹明鏡亦非臺本來無一物何處惹塵埃心頗好之作奇特想自是遇有佛之一字之書玩味之不暇時值開港通商外國之人集漢城家父從仕外務衛門我時來省覲仍留學京師立志欲周遊世界先學數外國語與彼外人交遊之際未嘗不留意於政教風俗如是虛度光陰不覺年至不惑始知此非究竟之法乃歸依佛既歸依佛不由不考究朝鮮佛教之所自來焉按自古來海東佛法可謂極盛而無教史之可考如藏寶物於漆室之中余于是有憾焉爰以發心輯述佛史其在三國則考據三國史三國遺事在高麗則高麗史東國通鑒麗史提綱在朝鮮則國朝寶鑑大東野乘等書仿史紀編年之法又得古人文集高僧碑狀訛者辨之誤者正之彙成一書名曰朝鮮佛教通史不拘體裁意在流通如一燈能破千年暗照見漆室之寶藏足矣世之讀是書者庶幾諒我之苦心哉出西域三千年歷史印度亞利安族為世界最先進之人種梵書為世界最古之文字韋陀因明等論為世界最名之哲學雪山希瑪拉耶山為世界最高之山峯有如是等最第一事天運湊會地氣育靈挺生一聖中之聖人曰釋迦牟尼佛佛之為教乃一心之理即萬法之源如大海之納河川如太虛之容方圓事事無礙理理圓融無適無不適無當無不當仁者見之謂之仁智者見之謂之智可謂母教也亦可謂祖教也至夫世尊出現入滅傳述不同多有異説今從此土相傳之年時以周昭王二十六年甲寅四月八日誕降十九出家三十成道以周穆王五十三年壬申入滅為斷高句麗大丞相王高德遣沙門義淵入北齊見法上和尚問佛入滅年時法上所答如右此土從其説也蓋西域佛法以東漢明帝永平七年始通支那此以帝夢金人遣使西域之年言之而自支那秦晉之時輸入高句麗百濟新羅而歷高麗遞朝鮮綿歷三千年分布十四宗俱舍宗成實宗三論宗攝論宗地論宗涅槃宗天台宗法相宗真言宗戒律宗淨土宗華嚴宗禪宗及西藏喇嘛宗溯其源而涉其流觀此書則瞭若指掌焉參考三國佛教略史日本島地默雷織田得能合著凡例云佛出世入滅年時傳述不同古來已有三十三種之異説三十三種者南條博士令知會雜志第十四號所圖示其他一説石村氏自蒙古源流得來者令知會雜志十五號中揭載孰是孰非殊難斷定然本邦舊來相傳之説揭於見真大士化身十一卷以穆王壬申涅槃為定本史即據此編以定年時其他難為考證之諸説則以衆聖點記敬王丙辰三十五年之説為特有據西洋紀元前四百八十五年其説與緬甸敬王庚申三十九年説最相近與菩遊拉魯氏之敬王戊午元王庚午間西洋紀元四百八十三年至四百七十一年元凝誇目氏之敬王癸亥西洋紀元前四百七十八年博士馬庫斯彌由拉魯氏之敬王甲子西洋紀元前四百七十七年諸説亦近似惟與西藏之靈王乙卯西洋紀元前五百四十六年錫蘭之敬王丁巳西洋紀元前五百四十四年二説相遠而亦似有價值者若從敬王丙辰之説則與穆王壬申相差至四百六十四年也然其事關重大不易取捨今以本邦舊來相傳之年時穆王壬申入滅為本位更參衆聖點記敬王丙辰入滅作年時論附於印度史尾以備參考佛降誕月日亦有異説本行經因果經佛祖通載皆為二月八日瑞應本起經菩薩本起經佛祖統紀釋氏稽古略等悉是四月八日今從多分取四月八日之説佛出家成道年時亦有異説或云十九出家二十四成道或云二十五出家三十成道或云二十九出家三十五成道今亦從多數取十九出家三十成道之説佛成道月日諸説亦不一今從俱舍寶疏之和會取二月八日尚玄曰據今印度摩訶菩提會記録則以今年為佛誕第二五三九年入涅槃後第二四五九年然則是當周頃王二十六年乙未西洋紀元前六百二十四年與此土所行佛誕年時有四百二年之差也入東方二百句品題昔高麗一然禪師嘗撰三國遺事分別部類各立題目系敘事實今余纂輯佛史也亦倣其例又效大藏一覽之體裁特揀要點立二百題以寓提綱評唱二意使讀是書者相其題而知其品焉大覺世尊應化隨緣挺生印度宣布大教慧日光明照破諸暗正法眼藏摧伏羣邪如是佛法自印度而入支那自支那而入朝鮮上下一千五百餘年間帝王卿相尊崇之士庶人民信奉之為惟一之宗教吾人於此不可不研究佛教由來之歷史也第一經教創興時代高句麗小獸林王時高僧順道及阿道相先後自苻秦將經像來百濟枕流王時高僧摩羅難陀自東晉來以佛書教子弟是為海東佛教之始高句麗末崇道教踈佛法國遂以亡百濟以佛法傳日本是為佛教史上最特色者也新羅法興王從異次頓之謀斷行奉佛自是以來創寺度僧造像起塔求法高僧不絶於道造疏大士崛起於國二百七八十年之間無經不來無宗不傳法華會上佛放大光明照東方世界始信佛緣盡在我東矣故以麗濟羅三國中世以後五百年判為經教創興時代也第二禪宗蔚興時代新羅憲德王以後至高麗初大約二百年間為禪宗蔚興時代蓋當時之求法高僧皆學禪宗緣支那佛教宗勢亦爾故也此等禪師得法歸國皆為國王之師表又為佛門之領袖法道既高勢力亦有當時佛教禪為獨權教下諸宗盡為所掩講經之僧寥寥無聞如秦世儀焉佛教自入東土之後以此為變遷狀態之一大轉機也第三禪教並隆時代高麗自初葉至末季大約四百年間為禪教並隆時代高麗太祖遇僧道詵以為國師聽其言以為治國之要有垂訓曰我國家大業必資諸佛護衛之力是故創立禪教寺院差遣住持焚修使之各治其業云云歷代諸王遵守罔替所以麗代佛教獨盛也新羅佛教雖云極盛宗派門戶無有分別至高麗初照準儒科始設僧選於是各宗始有區別中世以後每稱兩宗五教焉第四禪教統一時代朝鮮初葉世宗之時併合諸宗只存兩宗禪教是也至宣祖時清虛大師出而禪教之統一始現其實矣然則朝鮮之初百五十年為禪教衰微時代其後三百五十年為禪教統一時代而仍亦衰微不振矣第五禪教保守時代明治四十四年朝鮮總督寺內正毅頒布寺剎令七條分別區域置三十本寺各轄末寺此三十寺皆於禪教兩宗之名下制定寺法置聯合機關以判宗事設中央學林以養法侶一以保守歷史的宗旨一以施行時宜的教育今以後之朝鮮佛教判為禪教保守時代然則禪教其將振興乎在於其人抑更墮落乎亦在於人帶如來之使命者其責顧不重歟禪源流派皆自曹溪禪宗淵源始自釋迦付囑迦葉密傳心印正法眼藏輾轉授受至于曹溪六祖六祖以後又分二派五宗海東禪源亦皆出於曹溪羅麗兩代海東之僧入于支那佩祖師心印而歸者不可勝記至于最後太古普愚嗣法石屋清珙懶翁慧勤嗣法平山處林珙林兩師皆臨濟宗故朝鮮佛教實傳曹溪之正脈者也羅麗諸師入唐傳心者如左神行禪師海南大興寺諸德所撰大東禪教考玩虎尹佑鑒定兒庵惠藏留授袖龍頤性草衣意恂編輯紺泉尹洞跋云右大東禪教考紫霞山房所編摩也按紫霞山房者丁若鏞也詳見後大芚志注曰神行禪師海東佛祖源流云新羅兵部侍郎金獻貞撰神行碑在晉州斷俗寺又寂照塔注云憲德王十三年北宗神行先導南宗道義繼至云云朝鮮李陸號青坡智異山日課見遊智異山録云智異山斷俗寺西有神行禪師碑銘皇唐衛尉卿金獻貞撰元和八年九月日立云云柳夢寅號於于堂遊頭流録斷俗寺有碑乃新羅兵部令金獻貞所撰僧神行碑銘李唐元和八年建也石理粗惡其高不及大鑑高麗坦然碑數尺文字不可讀云云等今綜合諸證以俟後考焉道義禪師西堂廢嗣新羅金薳撰普照禪師靈塔碑在長興迦智山寶林寺云初道義大師者受心印於西堂西堂名智藏馬祖之弟子後歸新羅説其禪理時人惟尚經教與習觀存神之法未臻其無為任運之宗以為虛誕不之崇重有若達摩不遇梁武也由是知時未集隱於山林付法於廉居禪師居雪山偣聖寺此疑倍聖或信聖寺之誤傳祖心闢邪教我禪師往而事焉淨修一心求出三界以命非命以軀非軀禪師察志氣非偶素槩非常付玄珠授法印至開成二年丁巳僖康王元年與同學貞育虛懷等路出滄波西入華夏參善知識歷三五州知其法界嗜欲共同性相無異乃曰我祖師所説無以為加何勞遠適心足意興五年春二月隨平盧使歸舊國化故鄉普照禪師熊津人也崔致遠撰智證國師碑洎長慶初有僧道義西泛睹西堂之奧洪居士注云長慶五年己巳道義行化楓嶽雪嶽至文德二年己酉又云憲德王十三年北宗神行先導南宗道義繼至智光侔智藏智藏西堂法名而還始語玄契洪注云師東還以前東人不知有禪故云始語玄契者言直指人心見性成佛如馬祖一喝百丈得大機黃檗得大用等是也禪門寶藏録至元卅年癸巳高麗真靜國師天頙所述云智遠僧統問道義國師云華嚴四種法界外更有何等法界五十五善知識行布法門外更有何等法門即此教以外謂別有祖師禪道云者乎道義答曰如僧統所舉四種法界則於祖師門下直舉正當理體氷消一切耳正理拳中法界之相尚不可得於本無行智祖師心禪中文殊普賢之相尚不可見五十五知識行布法門正如水中泡耳四智菩提等道亦猶金之礦耳則諸教內混雜不得故唐朝歸宗和尚對一大藏明得箇什麼之問但舉拳頭智遠又問然則教理行果信解修證於何定當何等佛果得成就乎義答曰無念無修理性信解修證耳祖宗示法佛衆生不可得道性直現耳故五教以外別傳祖師心印法耳所以現佛像者為對難解祖師正理之機借現方便身耳縱多年傳讀佛經以此欲證心印法終劫難得耳智遠起禮曰素來暫聞佛莊嚴教訓耳佛心印法窺覷不得來乃投師禮謁云海東七代録又高麗李齊賢撰寶鑑國師師名混丘普覺國師一然之法嗣也碑銘云敻彼心宗逾海而東厥派惟九道義其首繩繩仍昆代有哲人又李奎報撰龍潭寺叢林會膀云夫祖駕西來心法之行乎中國尚矣然猶未及於三韓暨新羅王子道義國師航海入唐求法於地藏和尚得而東還遂入定陳田寺密傳心印然後禪轍始輾于東土矣及我太祖肇基王業篤崇禪法於是創五百禪宇于中外以處衲子間歲設禪大會於京師李奎報西普通寺談禪榜云本朝間三載設談禪大會於普濟寺亦聖祖之貽範也苟利社如此則雖別開談席茲暢真源可也何必待三年而又何揭普濟寺而已耶遂以是聞於上上亦悅而肯之尋敕有司盡其經費敞大會于三大禪宇曰普濟曰廣明此寺預其一焉所以鎮北兵也九山釋子先其會一年各以其山門占斷外方之伽藍而開法會涉冬節是謂之叢林按禪記梵云盆陀婆那此云叢林因祖師舍那婆斯所住故名之也今之叢林豈其遺法耶真鑑國師滄洲鑒嗣師法諱慧昭俗姓崔氏全州金馬人也貞元元年詣歲貢使求為榜人寓足西泛行至滄洲謁神鑒大師投體方半大師怡然曰戲別匪遙喜再相遇遽令削染頓受印契若火沾燥艾水注卑原然徒中相謂曰東方聖人於此復見禪師形貌黯然衆不名而目為黑頭陀元和五年受具於嵩山少林寺琉璃壇側既瑩戒珠復歸橫海聞一知十茜絳藍青雖止水澄心而斷雲浪迹粵有鄉僧道義先訪道於華夏邂逅適願西南得朋四達參尋證佛知見先歸故國禪師即入終南登萬仞之峯餌松實而止觀寂寂者三年後出紫閣當四達之道織芒屩而廣施憧憧者又三年於是苦行既已修他方亦已遊雖曰觀空豈能忘本乃於大和四年來歸大覺上乘照我仁域興德大王飛鳳筆迎勞曰道義禪師鄉已歸止上人繼至為二菩薩昔聞黑衣之傑今見縷褐之英強天慈威舉國欣賴寡人行當以東雞林之境成妙吉祥之宅也後創雙溪寺居焉請益者稻麻成列惠哲國師西堂藏嗣新羅崔賀撰碑云師諱惠哲字體空俗姓朴氏京師人也以元和九載秋八月駕言西邁詣龔公山地藏大師似是智藏大師之誤即第六祖付法於懷讓讓傳道一一傳大師也大師開如來藏得菩薩心久坐西堂多方誨爾來我者略以萬計莫非知十之學禪師曰某生緣外國問路天池遠不中華故來請益儻他日無説之説無法之法流於海表幸斯足也大師知志既堅稟性最悟一識如舊密傳心印於是禪師已得赤水所遺靈臺豁爾如大虛之寥廓也未幾西堂終乃虛舟莫留孤雲獨逝天南地北形影相隨所歷名山靈境略而不載也到西州浮沙寺披尋大藏經日夕專精晷刻無廢不枕不席至于三年文無奧而未窮理無隱而不達以違親歲積宣法心深遂言歸君子之鄉直截乾城之浪開成四祀春二月方到國也是日也羣臣同喜里閈相賀曰當時璧去山谷無人今日珠還川原得寶能仁妙旨達摩圓宗盡在此矣無染國師麻谷徹嗣新羅崔致遠撰白月葆光之塔碑云西學也彼此俱為之而為師者何人為役者何人豈心學者高口學者勞耶故古之君子慎所學抑心學者立德口學者立言則彼德也或憑言而可稱是言也或倚德而不朽可稱則心能遠示乎來者不朽則口亦無慙乎昔人為可為於可為之時師法諱無染於圓覺祖師達磨祖師為十世孫俗姓金氏洎長慶初正朝使王子昕艤舟唐恩浦請寓載許焉既達之罘山麓行至大興城南山至相寺遇説雜花者猶在浮石時師曾在浮石寺從釋澄大德學華嚴故云有一醫顏耆年謂黑色老人也言提之曰遠欲取諸物孰與認而心而謂爾也師舌底大悟自是置翰墨遊歷佛光寺問道如滿滿佩江西馬祖印為香山白尚書樂天空門友者而應對有慙色曰吾閲人多矣罕有如是新羅子矣他日中國失禪將問之東夷耶去謁麻谷寶徹和尚馬祖弟子服勤勞無所擇人所難己必易衆目曰禪門庾異行徹公賢苦節嘗一日告之曰昔吾師馬和尚訣我曰春花繁秋實寡攀道樹者所悲吒今授若印異日徒中有奇功可封者封之無使剜復云東流之説蓋出鉤識則彼日出處善男子根殆熟矣六祖云吾去七十年有二菩薩一在家二出家俱從東方來同時建立吾宗締搆伽藍昌隆法嗣鉤識謂此若若得東人可目語者謂以心傳心也畎導之俾慧水丕冒於海隅為德非淺師言在耳吾喜若來今印焉冠禪侯于東土往欽哉則我當年作江西大兒後世為海東大父其無慙先師乎無何徹師化去師於會昌五年來歸帝命也國人相慶曰連城璧復還天實為之地有幸也門弟子名可名者僅二千人索居而稱坐道場者曰僧亮曰普慎曰詢乂曰僧光諸孫詵詵厥衆濟濟可謂馬祖育龍子東海掩西河焉按禪門寶藏録高麗天頙禪師所撰云海東無染國師無舌土論問有舌無舌其義云何答仰山云有舌土者即是佛是故應機門無舌土者即是禪是故正傳門如何是應機門答知識揚眉動目而示法此皆為應機門故有舌况語言也問如何是無舌土答禪根人是此中無師無弟也問若然者何故古人云師資相傳耶答章敬云諭如虛空以無相為相以無為為用禪傳者亦然以無傳為傳故傳而不傳也問無舌土中不見能化所化者與教門如來證心中亦不見能化所化云何別耶答教門之至極如來證心名曰海印定三種世間法印現而永無解是則有三種世間迹也今祖代法者等間道人心裏永不生淨穢兩草故不荒三種世間草亦無出入迹所以不同也淨則真如解脫等法穢則生死煩惱等法也所以古人云行者心源如深水淨穢兩草永不生又佛土者前服定慧之衣入燃燈火內令放却定慧之衣立玄地故有蹤迹祖土者本來無脫不脫不著一條線故與佛土大別也西山大師禪教釋云新羅文聖大王問無染國師曰禪教高下為寡人辨釋答百僚阿衡各職其職帝王拱默廟堂之上萬姓以安王聞之大悅無染國師別集禪門寶藏録引無染國師行狀云無染國師問法性禪師教禪何別其答與此同梵日國師鹽官安尉三國遺事云崛山祖師梵曰大和年中入唐遍遊叢席得法於鹽官鹽官名齊安馬祖弟子也以會昌七年丁卯還國創崛山寺而傳教海東七代録云新羅真聖大王宣問禪教兩義師云我本師釋迦出胎説法各行七步云惟我獨尊後踰城往雪山中因星悟道既知是法猶未臻極遊行數十月尋訪祖師真歸大師始傳得玄極之旨是乃教外別傳也故聖住和尚無染國師居聖住寺常扣楞伽經知非祖宗捨了却入唐傳心道允和尚披究華嚴經乃曰圓頓之旨豈如心印之法亦入唐傳心此非其根本未能信之別旨耳智證大師寂照塔碑崔致遠撰云道不可廢時然後行及興德大王纂戎宣康太子監撫去邪醫國樂善肥家有洪涉大師去西堂證心來南嶽休足傳燈録新羅洪陟大師法嗣有興德大王宣康太子氅冕陳順風之請龍樓慶開霧之期顯示密傳朝凡暮聖變非蔚也興且勃焉試較其宗趣則修乎修沒修證乎證沒證其靜也山立其動也谷應無為之益不爭而勝於是乎東人方寸地靈矣能以靜利利海外不言其所利大矣哉爾後觴騫河筌融道無念爾祖實繁有徒或劒化延津或珠還合浦為巨擘者可屈指焉西化謂入唐也靜衆寺名無相無相大師燒香求法衣草食土唐玄宗禮敬殊甚柳宗元起影堂李商隱為碑銘其門人保唐無住亦名僧也常山慧覺馬和尚字慧覺金雲卿之弟益州金鎮州金者是禪譜云黃梅子金生石也東歸則前所敘北山義道義南嶽陟洪陟而降及徹國師惠徹慧目育無可考智力聞智力名也雙溪照真鑑國師慧照新興彥忠彥湧巖體覺體珍丘休玄昱覺休雙峯雲覺雲孤山日品日兩朝國師聖住染無染菩提之宗惠雲即無染嗣德之厚為父衆生道之尊為師王者賢溪山智證大師始發蒙于梵體大德稟具于瓊儀律師終上達也深玄于惠隱嚴君即法師受默于楊孚令子即禪師法胤唐四祖為五世父道信之傍出東漸于海遡流數之雙峯子法朗法朗恐是法明之誤孫信行曾孫遵範玄孫惠隱末孫大師也朗大師從大醫四祖道信法諡大證按杜中書正倫纂銘遠方奇士異域高人無憚險遠來至珍所則掬寶歸止非師而誰第知者不言復藏于密能撢祕藏惟行大師然時不利兮道未亨也乃浮于海聞于天肅宗皇帝躬貽天什曰龍兒渡海不憑筏鳳子沖虛無認月師以山鳥海龍二句為對有深旨哉東還三傳至大師智證畢萬之後斯驗矣其世緣則王都人金姓子號道憲字智詵父贊瓌母伊氏長慶甲辰歲現于世中和壬寅曆歸于寂澄曉大師道允禪師法嗣新羅國師子山興寧禪院今原州師子山法興寺教諡澄曉大師寶印之塔碑銘并序朝請大夫守執事侍郎賜紫金魚袋臣崔仁渷奉教撰崔潤奉敕書大師諱折中德巖人也父光幢母白氏以寶曆二年四月七日誕生生有異姿不曾兒戲年七歲覩禪侶之乞食者因慕出家遂辭二親於是俱逝至五冠山寺謁珍傳法師爰於摩頂之時便契息心之旨年十有五直詣浮石因聽雜花尋方廣之真詮究十玄之妙義至十九於某寺受具足戒聞楓嶽潭寺有道允和尚遠遊華夏才返故鄉特詣禪扉敬投五體和尚曰靈山別後記得幾生邂逅相逢來何暮矣大師既蒙入室因師事焉和尚謂道允也曩於中國先謁南泉以此南泉承事於江西江西繼明於南嶽南嶽即曹溪之嫡子也其高峻可知矣所以大師從此服膺不離左右得嗣東山之法後謁慈忍禪師禪師才見摳衣便如舊識謂曰相逢之晚便指眼前水瓶曰瓶非瓶時如何答曰汝名什麼大師答曰折中禪師云非折中之時阿誰答曰非折中之時無人如此問慈忍禪師云名下無虛士折中不奈何閲人知幾個如汝所以十六年久住禪院深探理窟遂踐忘言之境終歸得意之場中和二年前國統大法師威聞大師之萍迹無處安之谷山寺奉納住持大師携衆往居焉遠方來者朝三暮四雨驟霧馳桃李無言稻麻成列獻康大王遽飛鳳筆徵赴龍庭仍以師子山興寧禪院隸于中使省屬之定康大王欽崇竺教不下前朝屢遣王人遠伸鑽仰此際運當喪亂時屬艱難大順二年師避地於尚州之南真聖大王特降綸言遙祈法力大師後住芬嶺郡之桐林無何避災至銀山禪院暫停杖屢大王遣斧壤縣副守張連説專賫茗香遠奉銀山云常欽王佐之才冀表國師之禮大師辭焉至于乾寧二年三月九日忽告門人曰三界皆空萬緣俱寂吾將逝矣汝等勉旃守護禪門無隳玄旨以報祖佛言訖坐滅報年七十五積夏五十六門下弟子茶毗得舍利一千粒紫氣侵天天衆飛來拾其舍利弟子潔賫舍利得到桐林高起石墳安其金骨傳法弟子宗弘靖智一千來人抗表闕下願樹豐碑孝恭大王賜諡曰澄曉大師塔名寶印之塔仍命翰林學士前禮部侍郎朴仁範撰碑文也其仁範綏惟奉命且未修文今上疑即景明王也申命下臣式揚高烈龍德四年歲次甲申四月十五日文已成而以國家多事時隔二紀忽遇四郡煙消一邦慶幸天福七年歲在甲辰六月十七日立崔奐規刻字碑多闕略綴拾成文道詵禪師桐裏哲嗣師俗姓金氏新羅靈巖人也或云太宗大王之孫也母薑氏夢人遺明珠一顆使吞之遂有娠既乳育敻異凡兒年十五頴悟夙成遂祝髮隸月遊山華嚴寺讀習大經學徒百千駭服稱神唐文宗開成十一年新羅文聖王八年丙寅年二十矣忽自念曰大丈夫當離法自靜安能兀兀守文字間耶于時惠徹大師傳密印於西堂智藏禪師開堂於桐裏山師摳衣請學凡所謂無説之説無法之法虛中授受廓爾超悟年二十三受具戒於穿道寺後於曦陽縣白鶴山玉龍寺愛其幽勝改葺堂宇灑然有終焉之志宴坐忘言三十五載憲康大王遣使奉迎留止禁中師每以玄言妙道開發君心未幾不樂京輦懇請還山忽一日召門弟子曰吾將行矣乘緣而來緣盡則去理之常也何足悲傷言訖跏趺而寂時唐昭宗光化元年新羅孝恭王二年戊午三月十日也享年七十二立塔于寺之北岡遵遺命也孝恭王贈諡曰了空禪師塔曰證聖慧燈新羅智異山和尚臨濟玄嗣景德傳燈録云師一日示衆曰冬不寒獵後看便下座新羅五觀山海東佛祖源流五觀作五臺順支禪師仰山寂嗣景德傳燈録云本國號了悟大師僧問如何是西來意師竪拂子僧曰莫遮個便是師放下拂子問以字不成八字不是是什麼字師作圓相示之有僧於師前作五花圓相師畫破別作一圓相德山鑒禪師會下新羅僧德山示衆云今夜不答話問話者三十棒時有僧出禮拜師便打僧曰某甲話也未問為什麼打某甲師曰爾是甚處人僧曰新羅人師曰未踏船舷好與三十棒法眼云大小德山話作兩橛圓明云大小德山龍頭陀尾通曉大師住於五臺依此碑文五臺疑即崛山也有二弟子一曰朗圓大師一曰朗空大師皆封國師通曉大師於唐文德二年夏示寂弟子開清朗圓之名修寶塔立豐碑焉附朗圓大師高麗國溟州普賢山地藏禪院故國師朗圓大師悟真之塔碑銘并序太祖檢校尚書前守執事侍郎左僕射兼御史大夫上柱國知元鳳省事賜紫金魚袋臣崔彥撝奉教撰沙餐檢校興文監卿鳳省待詔臣仇足達奉教書大師諱開清俗姓金氏辰韓雞林人也其先東溟冠族本國宗枝考有車母復寶氏以大中八年四月十五日誕生大師面如滿月脣似紅蓮才有童心靜無兒戲八歲而初為鼓篋十年而暗效橫經甘羅入仕之年學窮儒典子晉升仙之歲才冠孔門此時特啓所天懇求入道父許之即為負笈蒹以擔書既持浮海之囊遂落掩泥之髮尋師於華嚴山寺問道於正行法師法師知此歸心許令駐足其於師事備盡素誠志玩雜華求棲只樹高山仰止備探鷲嶺之宗學海棲遲勤覽猴池之旨大中末年受具足戒於康州嚴川寺官壇既而遠聞蓬島中有錦山乘杯而歘涉鱉波飛錫而尋投鹿苑棲禪之際偶覽藏經披玉軸一音得金剛三昧十旬絶粒先修正覺之心三歲餐松冀證菩提之果勤參之際忽有老人瞻仰之中翻為禪客粲然發玉皓爾垂霜謂大師曰師宜亟傍窮途先尋崛嶺彼有乘時大師出世神人悟楞伽寶月之心知印度諸天之性大師不遠千里行至五臺謁通曉大師大師曰來何暮也待汝多時因見趨庭便令入室心深求法禮事師甚一棲道樹之旁幾改蓂階之序所以始傳心印常保髻珠不出巖巒唯棲雲水大師年德皆至耄期不任極倦誨人兼疲看客教禪師事同法主勤接來徒牛頭添上妙之香麈尾代玄談之柄可謂猶如洪州大寂地藏誘引之門有若魯國宣尼子夏代師資之道者矣文德二年夏大師歸寂和尚墨巾倍增絶學之悲恆切忘師之恨所以敬修寶塔遽立豐碑兼以常守松門幾遭草寇誥茲洞裏惟深護法之懷堅操汀邊志助棲禪之懇爰有當州慕法弟子閔規閼餐欽風志切慕道情深早侍禪扉頻申勤欵仍捨普賢山寺請以住持大師對曰深感檀那有緣則住逡巡移入便副禪襆橫剃丘原遐通道路又以高修殿塔逈啓門墻來者如雲納之似海深喜吉祥之地慧月當軒共依功德之門慈雲覆室亦有知當州軍州事大匡王公苟息鳳毛演慶龍額呈祥趨理窟而探奇詣禪山而何異人中師子扣山陰玩月之門天上麒麟投剡縣棲霞之舍本國景哀大王聞大師德高天下名重海東恨闕迎門遙申避席仍遣中使崔映高飛鳳詔遠詣鴦廬請扶王道之危仍表國師之禮此際大匡齊携僚佐直赴禪關共陳列賀之儀皆罄羣黎之慶况復鄰州比縣典郡居官冠蓋相望道路不絶大師此時暫移慈蓋來止郡城尊州帥之勤王讚邑人之奉佛川南止觀長流福慧之泉嶺外言歸仰見清涼之月才臻舊隱忽患微疴漸至危焉潛知去矣以同光八年秋九月二十四日示滅於普賢山寺法堂俗年九十有六僧臘七十有二門人號奉色身假肂于當寺西峯石室去寺三百來步中略上足弟子神鏡聰靜越皛奐言惠如明然弘琳禪師等俱棲慧苑共守禪林飫法乳以年深想慈顏以見遠中略冀記大師之言説遠示無窮流吾道之朝宗傳於不朽由是門徒捧表頻扣金門衆懇聞天達於玉扆今上聖文世出神武天資三驅而克定三韓一舉而齊成一統今則高懸金鏡普照青丘所以振恤黎民已致中興之運歸依釋氏皆披外護之具以此錫諡曰朗圓大師塔名悟真之塔朗空大師新羅翰林學士崔仁渷撰白月棲雲之塔碑云大師法諱行寂俗姓崔氏父諱佩常母薛氏師以太和六年十二月三十日誕生大中九年於福泉寺官壇受其具式詣屈山謁通曉大師升堂入室咸通十一年投備朝使金緊榮同舟入唐懿宗皇帝問大師曰遠涉滄溟有何求事大師對敕曰貧道幸獲觀風上國問道中華今日叨沐鴻恩得窺盛事所求遍遊靈迹追尋赤水之珠還耀吾鄉更作青邱之印天子厚加寵賚甚善其言乾符二年師至成都府巡謁靜衆精舍禮無相大師影聞石霜慶諸和尚啓如來之室演迦葉之宗道樹之陰禪流所聚大師殷勤禮足曲盡虔誠仍棲方便之門果得摩尼之寶俄而追流衡嶽參知識之禪居遠至曹溪禮祖師之寶塔四遠參尋無方不到中和五年來歸故國至於崛嶺重謁大師文德二年四月大師寢疾至於歸化付囑傳心者惟在大師一人而已孝恭大王驟登寶位欽重禪宗以大師獨步海東高標天下乃遣僧正法賢等聊飛鳳筆徵赴皇居大師乃以天祐三年秋九月初忽出溟郊方歸京邑至十六日登祕殿孤坐禪床大王整被冕服待以國師之禮有親從上殿者四人曰行謙邃安信宗讓規讓規行超十哲名蓋二禪探玄鄉之祕宗論絶境之幽枝頻回麈尾甚悅龍顏新羅雲住和尚雲居膺嗣傳燈録云問諸佛道不得什麼人道得師曰老僧道得曰諸佛道不得和尚作麼生道師曰諸佛是我弟子曰請和尚道師曰不是對君王好與二十棒師因僧問如何是諸佛師師云文殊聳耳法鏡大師雲居膺嗣有晉高麗國踊巖山五龍寺故王師教諡法鏡大師普照慧光之塔碑云大師諱慶猷俗姓張氏咸通十二年四月十一日誕生光啓四年受具於通度寺靈宗律師遄達西津聞雲居道膺和尚道冠楞伽功高善逝為寶樹之王者作禪林之主人慶猷逈微麗嚴利嚴共海東謂之四無畏大士也和尚曰聞言識士見面知心萬里同居千年一遇中缺於是潛付慧燈密傳法要遂曰吾道東矣慶猷一人起豫者商於是乎在中缺乃於天祐五年七月達于武州之會津中缺貞明七年二十三日示滅于日月寺法堂俗年五十有一僧臘三十有三大鏡大師雲居膺嗣高麗上柱國崔彥撝撰碑云大師法諱麗嚴俗姓金氏光啓年間入唐洪府行行西上禮見雲居膺大師謂舊戲匪遙相逆於此運斤之際猶喜子來昔吾師問義不休為仁由己屢經星紀寒苦彌堅已抵驪淵得認探珠之契仍登鳥徑方諧採玉之符大師雖則觀空豈能忘本忽念歸歟之詠潛含暮矣之愁欲別禪尻先陳血懇膺大師謂曰飛鳴在彼且莫因循所冀敷演真宗以光吾道保持法要知在汝曹可謂龍躍天池鶴歸日域其於來往勿失其時以此傳大覺之心佩雲居之印重超鯨水再至鯷岑此時天祐六年七月達于武州之升平捨筏東征抵于月嶽雖謀宴坐不奈多虞窺世路以含酸顧人間而飲恨雖攀依水石而漸近煙塵路出奈靈行臻佳境望孫峯而隱霧校小伯以棲霞爰有知基州諸軍事上國康公萱寶樹欽風禪林慕道竊承大師遠辭危國來致樂郊因傾蓋以秪迎每褶齊而致問歸依禪德倍感玄風具聞天升今上聞大師道冠中華名高兩地遽飛鳳筆徵赴龍墀越弋年歘出巖扃來儀玉輦師以同光七年十一月二十八日示疾明年二月十七日善化指令吊贈禮重國師諡曰大鏡大師師居彌智山菩提寺真徹大師雲居膺嗣高麗崔彥撝撰碑云大師法諱利嚴俗姓金氏年十二往迦耶岬寺投德良法師備探三藏中和六年受具足戒於本寺道堅律師乾寧三年遇入浙使崔藝熙大夫方將西泛迹而西所以高挂雲揚遽超雪浪不消數日得抵鄞江于時師聞雲居道膺大師禪門之法胤也不遠千里直詣玄關大師謂曰一別匪遙再逢何早師云未曾親侍寧道復來大師默而許之潛愜玄契所以服勤六載寒苦彌堅大師謂曰道不遠人人能弘道洞山之旨不在他人法之中興惟我與汝吾道東矣念茲在茲師不勞圯上之期潛受法王之印天祐八年乘查巨浸達于羅州之會津捨筏東往爰有金海府知軍府事蘇公律熙選勝光山仍修堂宇傾誠願海請住煙霞桃李無言稻麻成列一棲真境四換周星大師雖心愛禪林遁世無悶而地連賊窟圖身莫安所以亂邦不居於是乎在十三年道出沙火得到遵嶺永同郡南靈覺山北尋謀駐足乍此踟蹰緇素聞風歸心者衆矣今上高麗太祖聞大師道高天下聲蓋海東想對龍頤頻飛鶴版大師便逐皇華來儀帝壤上重光大業仰止高山所以修葺泰輿請停慈蓋粵以明年二月中特遣前侍中權説太相朴守文迎入舍那內院虔請住持無何逈餝蘂宮高敷蓮座待以師資之禮恭披鑽仰之儀其後大師注目山川欲擇終焉之地長興三年下教於開京西北海州之陽為搆精舍寺名廣照請師居之清泰三年八月十七日中夜大師化於當寺法堂俗年六十有七僧臘四十有八洞真大師踈山仁嗣名慶甫字光宗姓金氏靈巖鳩林人也父良益位閼粲母朴氏咸通九年七月三日夜夢白鼠䘖青琉璃一顆而來遂人語曰此物是稀代之奇珍乃玄門之上寶懷須護念出必輝光因有娠虔心齋戒如來出世之月二十日誕生師志在其親心期即佛父母乃曰人所欲者天所從之遂泣而許直往夫仁山寺落髮因棲學藪未樂禪山迅足空留宅心尚住魂交之夕金仙摩頂提耳乃授之方袍曰汝其衣之所以衛身而行乎且此地非心學者棲遲之所去之不亦宜乎師即以形開坐以待旦乃詣白雞山謁道乘和尚請為弟子修菩薩道入如來家覩奧之眼曾開知幾之心既悟以為非智無以護其法非戒無以防其違年十有八稟具於月遊山即智異山之月遊峯華嚴寺復往白雞山辭大師師笑而聽去自爾遊有泛覽學無常師歷謁聖住無染大師崛山梵日大師談柄才揮玄機了見遂於景福元年壬子春出山翽翽並海飄飄爰傾入漢之心乃告凌波之客許之寓載欣以同行已過秦橋旋臻漢地雲心訪道浪迹尋師乃詣撫州踈山謁匡仁和尚仁若曰格汝鯨海龍子耶大師玄言遂揚祕説爰咨許以升堂因以入室方資目擊既得心傳仁公大喜因謂曰東人可與語者惟子遂執手傳燈因心授印自是僧之真者必詣境之絶者必搜去謁江西老善和尚和尚乃欲聽其言觀其行因謂曰白雲鎖斷行人路答曰自有青山路白雲那得留和尚以大師捷對不羈揚言無礙乃送之曰利有攸往時然後行適值歸舟因以東還天祐十八年夏達全州臨陂郡而屬道虛行之際時不利之初粵有州尊都統甄太傅萱本自善根生於將種方申壯志雖先擒縱之謀暨謁慈顏乃倍瞻依之志歎曰遇吾師而雖晚為弟子以何遲避席拳拳書紳慥慥遂請住州之離地南福禪院大師曰鳥能擇木吾豈匏瓜乃以白雞山玉龍寺為樂道之所遂言於太傅許之移而住焉孝恭大王奉以遺風繼之先志注精心而亹亹祈法力以孜孜奄棄人間已歸天上文明大王陟降致美蒞祚重光聯華弘天竺之風握鏡照海邦之俗仍飛鳳筆佇降象軒越三年龍集協洽四月二十日太師將化盥浴已命衆悉至乃遺戒曰我既將行衆其好住言訖入房倚繩床趺坐儼然示滅于玉龍上院存父母體八十春入菩薩位六十二夏追諡洞真大師塔號寶雲顯德五年金廷彥奉教撰文留唐不還洪州百丈明照安禪師疏山仁嗣師本新羅人自百丈統衆所度弟子道亘等凡七人各從參嗣僉化一方景德傳燈録留唐不還郢州芭蕉山慧清禪禪南塔涌嗣新羅人也上堂如人行次忽遇前面萬丈深坑背後野火來逼兩畔是荊棘叢林若也向前則墮在坑塹若也退後則野火燒身若也轉側則被荊棘林礙當恁麼時作麼生免得若也免得合有出身之路若也免不得墮身死漢師謂衆曰我年二十八到仰山參見南塔見上堂曰汝等諸人若是個漢從娘肚裏出來便作獅子吼好麼我於言下歇得身心便住五載景德傳燈録留唐不還杭州龍華寺真覺大師靈照雪峯存嗣高麗人萍遊閩越升雪峯之堂冥符玄旨居唯一衲服勤衆務閩中謂之照布衲問菩提樹下度衆生如何是菩提樹師曰大似苦練樹曰為什麼似苦練樹師曰素非良馬何勞鞭影後湖守錢公卜杭之西開創報慈院延請開法禪衆翕然依附尋錢王建龍華寺延金華傅大士靈骨道具置焉命師住持晉天福十三年丁未閏七月二十六日終於本寺壽七十八塔于大慈山景德傳燈録留當不還泉州福清院玄訥禪師雪峯存嗣高麗人也初住福清道場傳象骨之燈學者皈慕僧問如何是觸目菩提師曰闍梨失却半年糧曰為什麼失却半年糧師曰只為圖他一斗米問如何是清淨法身師曰蝦蟇曲蟺問教云惟一堅密身一切塵中現如何是堅密身師曰驢馬貓兒曰乞師指示師曰驢馬也不會問如何是物物上辨明師展一足示之師住福清三十年大闡玄風終於本山景德傳燈録新羅清院和尚九峯虔嗣僧問奔馬爭毬誰是得者師曰誰是不得者曰恁麼則不在爭也師曰直得不爭亦有過在曰如何免得此過師曰要且不曾失曰不失處如何鍛鍊師曰兩手捧不起景德傳燈録新羅臥龍和尚雲蓋元嗣問如何是大人相師曰紫羅帳裏不垂手曰為什麼不垂手師曰不尊貴問十二時中如何用心師曰猢猻喫毛蟲景德傳燈録新羅瑞嵓和尚谷山藏師問黑白兩亡開佛眼時如何師曰恐爾守內問如何是誕生王子師曰深宮引不出景德傳燈録新羅泊嵓和尚谷山藏師問如何是禪師曰古冢不為家問如何是道師曰徒勞車馬迹問如何是教師曰貝葉收不盡已上景德傳燈録季夢遊撰靜真國師圓悟之塔碑銘云大師諱兢讓俗姓王氏公州人也母金氏夢流星入懷而有娠過期而誕生大師年至鼓篋日甚帶經訓詩禮於鯉庭聽講論於鱣肆頗勤三絶謂隘九流乃懇白於慈母嚴君固請許於出家入道投於本州南穴院如解禪師因為剃髮便以留身志在朝聞學期日益遂以乾寧四載於雞龍山普願精舍稟持犯然後遊方遂謁西穴院揚孚禪師禪師豁青眼以邀迎推赤心而接待於是持其由瑟鼓在孔門既多知十之能或展在三之禮服膺不怠就養惟勤俄嘆曰急景如駒流年似箭若局牛涔之底未浮鼇海之波難詣寶洲焉窮彼岸乃以光化三年伺鷁舟之西泛逐鵬運以南飛匪踰信宿之間獲達江淮之境才越天塹將往雪峯到飛猿嶺上遇搬米禪徒同路而行一時共歇徒中有一僧指枯椿曰枯木獨占定春來不復榮大師接曰逈然塵境外長年樂道情於是衆皆歎伏無不吟傳遂濟于台嶺謁遍禪居詣於谷山謁道緣和尚是石霜之嫡嗣也乃問曰石霜宗旨的意如何和尚對云代代不曾承大師言下大悟遂得默達玄機密傳祕印大師呈偈于和尚曰十個禪子同及第榜頭若過總得間雖然一個不回頭自有九人出世間和尚覽之驚歎以梁龍德四年跳出谷山路指幽代躬踐清涼親瞻妙德後唐同光二年七月回歸達于全州喜安縣浦口庇影山中鞱光廡下議徙康州伯嚴寺泊巖是伯嚴之誤是西穴故師所修創移住也宛秀東林之境堪傳西域之宗越以天成二年就以居焉新羅景哀王遣使寓書曰恭聞大師早踰溟渤遠屆曹溪傳心中之祕印探頷下之明珠繼燃慧炬之光廣導迷津之路禪河以之汩汩法山於是峨峨冀令雞嶺之玄風播在鳩林之遠地則豈一方之倚賴實千載之遭逢仍上別號曰奉宗大師焉清泰二年念言弘道必在擇山決計而已備行裝猶豫而未謀移發忽爾雲霧晦暗咫尺難分有神人降謂大師曰捨此奚適適須莫遠於是衆咸致惑固請淹遲大師確然不從便以出去有虎哮吼或前或後行可三十里又有一虎中路相接左右引導似為翼衛至于曦陽山麓血餘印迹方始回歸大師既寓鳳嵓尤增雀躍營搆禪室誘引學徒寒燠未遷竹葦成列清泰乙未大師來詣京師太祖見而異之叩問法教應對如流懊見大師之晚一心敬仰四事傾勤太祖晏駕惠宗繼位大師馳章慶賀逮伸祈祐未暇締緣雖崆洞之請有期奈蒼梧之巡不返逮于定宗繼明御宇離隱統天常注意於釋門冀飫味於禪悅敬加大師尊號為證空大師大師自棲輦轂屢換星霜化導之功已成肥遁之身是退越以周廣順三年秋還歸故山焉至顯德三年秋八月十九日忽告衆曰吾西學東歸將踰三紀擇山而住誘引後來借以青山白雲導彼迷津失路每或披尋王渴資國福緣今風燭水泡未能以久難將作矣吾欲往焉各執爾心勉遵佛訓又謂傳法之首逈超禪師曰爾宜搆室繼以傳燈言訖而泊然坐滅享年七十九歷夏六十上聞之震悼哭諸寢焉乃遣左僧維大德淡猷元尹守殿中監韓潤弼等吊以書賻以穀又遣諡號塔名使元輔金俟嵓副左尹前廣平侍郎金廷範等贈淨諡曰靜真大師圓悟之塔仍命有司寫真影一鋪錦緣金軸不日而成并題贊述仍令右僧維大德宗乂正輔金瑛正衛兵部郎金虛祐等充追真影使兼營齋遂使飾終之禮若矣尊師之道焯焉新羅大嶺和尚谷山藏嗣僧問只到潼關便却休時如何師曰只是途中活計曰其中活計如何師曰體即得當即不得曰體得為什麼當不得師曰體是什麼人分上事曰其中事如何師曰不作尊貴師因僧問如何是一切清淨師曰截瓊枝寸寸是寶析栴檀片片皆香景德傳燈録雲門偃禪師會下新羅僧雲門問僧汝是甚處人云新羅人師云將什麼過海云草賊大敗師云為什麼在我手裏云恰是師云一任𨁝跳僧無對師休去景德傳燈録新羅龜山和尚長慶稜嗣有舉相國裴公休啓建法會問看經僧是什麼經僧曰無言童子經公曰有幾卷僧曰兩卷公曰既是無言為什麼却有兩卷僧無對師代曰若論無言非唯兩卷高麗元宗國師投子同嗣翰林學士金廷彥撰碑略云觀夫日出扶桑作人間之瞻仰佛生天竺為世上之歸依俾君子之邦學法王之道所謂道非心外佛在身中故道之尊為導師德之厚為慈父爰因象迹遂示它心光如水上之蓮皎若星中之月實大師其人矣大師尊稱璨幽字道光俗緣金氏雞林河南人也考諱容妣李氏夢有一神人告之曰願言為母為子為佛為孫故託妙緣敬敷慈化因有娠以咸通十年龍集己丑四月四日誕生年甫十三遂言於父曰雖乏惠柯秪期覺樹父許之即落髮出家伏承尚州公山三郎寺融諦禪師論道玄玄化人赫赫願為弟子遙禮禪師禪師若曰格汝見今日之來儀認他時之利見吾宗禪和尚法號審希真一佛出世為東化主見在慧目山即廣州高達院汝宜往師事之大師便詣慧目允叶服膺增修學道之心倍勵習禪之志未幾精窮妙理高悟玄機行覺路以雖通仗律儀而斯在年二十二受具於楊州三角山莊義寺於是忍草抽芽之後戒珠瑩色之初尚以問道忘疲尋師靡懈時本師移住光州松溪書院大師遠携笻杖持詣松溪申禮足之素衷謝鑄顏之玄造師謂曰白雲千里萬里猶是同雲明月前溪後溪嘗無異月爰因識識只在心心而已大師告以遠遊泛覽師笑而聽去大師以景福元年春適有商舶入漢者遂寄載而西遂往舒州桐城縣謁投子祥和尚法號大同是石頭山法孫翠微無學大師之嫡胤也見大師蓮目殊姿玉毫異相乃曰其有東流之説西學之求者則可以與言道者唯子矣大師於是悟微言於舌底認真佛於身中豈止於承善逝之密傳奉淨名之默對而已矣大師將辭投子和尚因謂曰莫遠去莫遠去大師答云雖然非遠近要且不停留和尚曰既驗心傳何須目語爾後旁求勝友歷謁高師或索隱於天台或探玄於江左適值歸舟因而東渡貞明七年秋七月達康州德安浦徑詣鳳林歸覲真鏡大師師曰適當今日深喜相逢別飭禪堂俾升談座聽西訪之真法慶東歸之妙緣從容謂曰人有老少法無先後爾其佩如來之密印演迦葉之祕宗宜住三郎寺為禪伯矣大師應奉而住更三冬遙詣玉京入覲太祖大王大王以大師玄道周行法身圓對仍請住天王寺遂從之住焉居則化矣而以慧目山乃霞嶠偏宜於宴坐雲溪甚愜於禪居移而住焉後定宗大王奉師號為證真大師又以服冕奉為國師處處結香火之緣慥慥結師資之禮仍獻踏納袈裟并諸道具大師潭心有月嶽頂無雲一心宣妙覺之風千眼示大慈之化上乃大喜乃於天德殿高敞法筵偕願海之千波爇心香之一炷大師才麾麈尾乍動龍頤有僧問如何是向上一路大師曰不從千聖得又問既不從千聖得從上相傳從何而有大師曰只為不從千聖得所以從上相傳又問與麼即二祖不望西天達磨不到唐土大師曰雖不從千聖得達磨不虛過來於是人天感心賢聖歡喜顯德五年歲集敦祥秋八月五日大師將化盥浴訖房前命衆悉至于庭乃遺訓曰萬法皆空吾將往矣一心為本汝等勉旃心生法生心滅法滅仁心即佛寧有種乎如來正法其護之勗之哉言畢入房儼然趺坐示滅於當院應東身者九十春服西戒者六十九夏上聞之慨禪月之早沉嗟覺花之先落降之星使吊以鵠書追諡元宗大師塔號惠真敬造真影一幀仍令國工攻石封層冢門人等號奉色身竪塔于慧目山西北岡遵像法也高麗雪嶽令光禪師天龍機嗣僧問如何是和尚家風師曰分明記取問如何是諸法之根源師曰謝指示景德傳燈録高麗道峯山慧炬國師法眼益嗣始發機於淨慧之室本國主思慕遣使來請遂回故土國主受心訣禮待彌厚一日請入王府上堂師指威鳳樓示衆曰威鳳樓為諸上座舉揚了諸上座還會麼倘若會且作麼生會若道不會威鳳樓作麼生不會珍重師之言教未被中華亦莫知所終景德傳燈録高麗靈鑒禪師法眼益嗣僧問如何是清淨伽藍師曰牛欄是問如何是佛師曰癲漢著景德傳燈録高麗國僧三十六人入支那謁永明壽禪師親承印記佛祖通載高麗圓空國師入吳越國謁永明壽禪師傳其心印見師碑文高麗道峯靈照國師入中原得法眼永明之傳宋建隆年間返本國大闡玄風以救末法見許端甫撰清虛堂集序靈照疑即慧炬姑兩存之竹山七長寺有慧照國師事迹而與靈照慧炬之事迹近似高麗大覺國師七長寺禮慧照國師影云空門功業許誰同千乘摳衣味道風大抵高麗上世有禪寂宗即法眼永明宗派也廣慈大師惠哲國師法孫有唐高麗國武州谷城縣桐裏山大安寺教諡廣慈大師碑銘并序太相前守禮賓令守元鳳令兼知制誥上柱國賜紫金魚袋臣孫紹奉教撰若夫擊虛發聲苟應就悟之能呵實藏聲豈是處迷之術門縱濶而不可得透岸雖眤而難以獲逾至理在中守株者無由見性真宗非外窺管者莫以傳心曩植曠劫之道芽方鑄多生之法器是以運開一千甲子始遇聖明歷周五百星霜再逢賢哲或稟七淨而傑出或蘊十旨而挺生自古既稀至今為貴留全雙美者即我大師也大師法諱允多字法信京師人也其祖考等皆族盛簪纓門專孝義家記而亂來拋墜聲譽而耳口聞言其妣朴氏受性溫和為人貞潔自幼未嘗於俗味洎長勤修於佛事逮其嶽降分娩等間由孝感而易為若霜堇之出疾時以咸通五年四月五日誕生大師初放蓬矢之日雙柱絶倫將辭錦褓之年三亭轉麗遨遊而居止有方禮度而顛沛無虧扇枕之令譽早著鄉閭捶灰之捷詞風馳遐邇春秋財當八歲有志三歸忽造二親願別蝸門要投禪教父母益為鞠養倍前猶是縈紆未能允許大師然曰出家修道利益不無直饒公子之錦衣豈勝山僧之毳衲哀鳴重沓咨告再三深認成情固難橫奪登時一諾則自辭膝下步而雲遊四海行住唯伴孤影炎涼倐歷數年自此周回跋涉於遼東逶迤遠詣於桐裏參覲和尚俯相面目顧眄形容數日後侍奉上方和尚曰心專石也穿志切泉俄涌道非身外即佛在心宿習者覺於剎那蒙昧者滯在萬劫如來説喻為情鈍則開語為根利則略言汝自好看不在吾説也於迦耶岬新藪受具後但繁心猿無縱意馬戒瓶方擊油鉢不欹轉鞭志於晝宵綱砥心於瞬息不戶不牗見大道不崑不海得神珠芳聲既震於四方法侶遠自於八表法祖西堂傳於徹徹傳於先師如如傳於吾師即西堂曾孫也大師傳法化於西堂却不勞於西學割世緣於東城真善誘於東人學無學之宗終資祇夜師無師之旨必籍修多使弄一心者能信一音纏九結者漸歸九業多多方便而引導輕輕威力而折摧化緣周於鯷岑蹤迹遍於桃野不忘其本却歸故山才輕兩宵忽有山賊入寺擬劫衣物直到上方大師遌然而無銎不動禪座被威鋒之辟惡扶慧刃之降魔賊徒無衝突大師自知罪過言訖禮拜走散見此模樣不免思惟至夜化夢有一戰將入於殿內見勿陀耶七軀末座向大師書視兩忍字睡覺驚訝起來盥嗽端坐偶言曰也大奇也大奇白日狐疑了不料清宵蝶夢成古人有言一忍得長樂者一忍住世久好重忍兩字豈徒然哉大師因此永獲安禪久居僧首洞達禪旨超然聖言離聲色裏出是非關衲子盈門慕義投仁雲趨霧聚參禪學道虛屆實歸孝宗大王趨向谷風遐飛綸翰願開慧眼以祐國祚于時羅運傾否兵火頻起弓裔亂紀甄萱盜名天命有歸國朝新造神聖大王乘時聖主間代明君富安邦撫俗之宏機通護法契理之神術萬機之暇留心玄門自微時飽聆大師之聲價因遺郎官賫御札入山而請曰仰德日久願接梵儀師已老矣恐難行腳何妨騎乘一詣九重大師曰老僧由來未嘗騎馬至於齡年山僧亦是王民何敢方命以錫杖芒鞋步至輦下上大喜令止儀賓寺安頓數日後召入上殿勿趨上下床接之待以賓禮羣臣竦然上問曰古師云心即佛心何如大師答曰若到涅槃者不留於佛心問佛有何過即得如此答曰佛非有過心自無過問曰朕受天之佑救亂誅暴何以則生民保乂對曰殿下不忘今日之問國家幸甚生民幸甚問曰大師以何德行化遵衆生對曰臣僧自救不了何敢解脫他縛此日玉音琅琅不憚雲興之問大師四辨亹亹無礙瓶瀉之答若具載文繁括而略録伏念今上大王威齊兩曜蒞政而道叶乾坤德秀重瞳治民而令無邪黨歸依五衍豈異於中印匿王尊仰三禪有同於西天戒日正法興邦之代修文植本之君尊美斯今罕見振古大師三禮而退命安置興王寺黃州院旭郎官遙仰清風平傳尺牘願為弟子冀效從師遂寂滅而數年山間而復况內議令皇甫崇太常忠良日監大師之供饋如執侍者之職大師益不安一日諗于上曰麋鹿野縱甘伏丘壑猥承御命來住王域恐懼情深軒鶴梁鵜未足喻也伏望許從微情俾雲歸古山魚遊深壑為賜大矣上許之令歸桐裏古山命本道守相晝給田結奴婢以供香積不忘外護之風每展八行之禮差官往來絡繹于道崇奉之盛未曾有也至開運二年荒落為辜二月二日召衆有言曰生也有限滅而未定吾今欲行各自珍重佛言波羅提木叉是汝大師吾亦以此言囑汝汝等遵行吾不死矣令焚香念佛合掌奄然而逝俗年八十二僧臘六十六於是緇徒號慟歎津梁之已摧禪伯咨嗟見法輪之永閉至於飛禽憫然走獸悽愴平日爽耳之潺湲澗水變作哀聲多年悅耳之靉靆山雲皆成慘色感動蠢植毫楮寫周遂以其時事申聞尋蒙朝令建塔本山財出官廩役以近民莊嚴周密雕琢甚妙上首門人等復告于朝曰先師臣某幸蒙知遇國恩罔極生死俱榮而塔上之銘闕焉恐先師臣平日樹立之道行漸至湮沒伏乞睿澤許樹豐碑者爰命微臣延揚禮化紹才非七步學昧五車直言而否歎朱生斤斧而有稱禰氏事不獲已抑綴為文銘曰偉哉開士了達真筌法門杳杳至理玄玄化符海外道尊日邊雲歸深洞月落澄淵波瀾意氣平等心田今朝示滅何處談禪雞山崒嵂鴨水逶迤土地有緣棲遲在斯解虎道峻救蟻恩垂石臻聽講樹向來儀兩楹忽夢隻履俄遺無法可説有稱廣慈清淨三業蕩除六塵歸棲桐裏際會金人依俙提拔倣佛波輪玄談浩瀚大慧精神將登彼岸劫火焚薪介衆安仰哀號蒼旻可久可大萬歲不磷爰述不朽聊記貞珉光德二年歲次庚戌十月十五日鐫字文旻佛日普照國師高麗中葉之人諱知訥於升平府今順天郡松廣山創修禪社立曹溪宗師資傳授十有餘代實海東禪宗之特樹旗幟者矣教林結果乃於雜花佛教有十三宗曰俱舍宗曰成實宗曰三論宗曰攝論宗曰地論宗曰涅槃宗曰天台宗曰律宗曰淨土宗曰惟識宗曰真言宗曰華嚴宗等是也惟禪之一宗乃是格外無法之法其餘皆依經論立宗創於支那盡傳海東而海東教下諸宗之中始終光大者其惟華嚴宗乎新羅元曉法師製華嚴經疏大弘圓頓之教義相大師傳智儼學歸國弘通勝詮法師入唐親承華嚴於賢首講下歸傳經疏於義相大師詮又於開寧葛嶺寺以石髑髏為徒衆講説華嚴智通法師著華嚴錐洞記法海大德講華嚴經於皇龍寺決言大德講嚴華經於崇福寺見崔致遠崇福寺碑沙門梵修入唐得新譯後分華嚴經澄觀義疏清涼國師疏無染國師及惠哲國師皆就浮石寺學華嚴經蓋浮石寺自義相以後為華嚴宗本寺也智異山華嚴寺亦自緣起及義相兩師以來為華嚴宗剎道詵國師讀習大經于慈寺賢俊大德結華嚴經社于茲寺而石壁之刻華嚴經亦于茲寺矣高麗太祖二十三年開泰寺成設落成華嚴法會親製疏文麗初坦文決凝智宗海麟爛圓等皆講華嚴相繼為國師大弘本宗文宗三十一年丁巳三月甲寅幸興王寺轉新成金字華嚴經大覺國師入宋就杭州慧因寺源公晉水淨源講下稟受大經厥後以傳燈為己任因住興王寺講演雜華周於十遍見刊定成惟識論單科序蓋興王寺高麗時闡揚華嚴之宗剎也師序圓宗文類云夫華嚴之為教也一真妙蘊滿藏雄詮窮遍照之心源罄普賢之行海誠生靈之大本稱性之極談者歟自景煥龍宮風行像季聖賢繼踵述作連鑣有終南祖師杜順尊者歎曰大哉法界之經也自非登地何能披其文見其法哉吾設其門以示之於是著法界觀門以授智儼尊者儼師得之變之為五教演之為十玄及乎賢首祖述於前清涼憲章於後始可謂能事畢矣故講大經者咸以儼藏即智儼法藏也清涼三家義疏永為標準而旁用諸家補焉自我海東浮石尊者義湘大師求法之後圓頓之教主盟諸宗者四百餘年矣我國家一統三韓僅二百載光揚三寶誘掖羣迷纍朝敦外護之緣當世協中興之化緬承付囑實在休明每年春秋於大內會慶殿請百法師設看大藏經會道場佛事又三年一度置仁王般若百座大會齋僧三萬人以為恆式而諸宗義學未始不以論議為先容也但以至理幽微羣言汗漫問答之際援引頗難况近世吾宗好異之輩棄本逐末臆説紛然遂令祖師玄旨壅而難通者十七八焉精於教觀者豈不為之太息矣主上知其然乃集義學俾議纂修略彼廣文為茲要覽以類鳩集離為二十二卷施於新學可以省功或因要略以通疏鈔以得經旨因經旨以證理性則孰為廣乎孰為略乎在吾靈覺耳達識深於佛者方感吾君之恩而戴佛祖之德也書成奏上特賜名曰圓宗文類仍命下臣為之序引臣牢讓未獲聊述端倪謹序尚玄曰圓宗文類今於此土不可得見而日本現存卷第卷第之印本二卷在續藏經中猶未為全部也余久得圓宗文類第一卷寶而藏之核其纂修之體裁則如圓宗文類卷第一諸部發題類臚列二十五篇文即諸經論疏序文等皆唐時君臣及諸沙門所撰關係於華嚴經者居多其中有沙門元曉述起信論疏序卷末録校書諸師卷末第一頁祕書省楷書臣鄭先書興王寺弘教院講賢首教觀義學沙門賜紫臣道鄰詳校興王寺弘教院講賢首教觀義學沙門賜紫臣慧宣詳校興教寺住持傳賢首教觀圓覺景哲演奧慈應利生弘濟首座賜紫臣理琦重校卷末第三頁興王寺弘教院講賢首教觀義學沙門賜紫臣縕秀詳校興王寺弘教院講賢首教觀義學沙門賜紫臣道鄰詳校興王寺弘教院講賢首教觀義學沙門賜紫臣景宜詳校佛日寺寶王院講賢首教觀義學沙門賜紫臣覺之詳校興王寺弘教院講賢首教觀義學沙門賜紫臣惟儼詳校興王寺弘教院講賢首教觀義學沙門賜紫臣慧宣詳校真觀寺道樹院講賢首教觀義學沙門賜紫臣承諝詳校妙智寺德海院講賢首教觀義學沙門賜紫臣精瑩詳校佛日寺龍臺院講賢首教觀義學沙門賜紫臣稟賢詳校奉先寺住持傳賢首教觀義學沙門賜紫臣樂真詳校松川寺住持傳賢首教觀義學沙門賜紫臣詳校歸信寺住持傳賢首教觀義學沙門賜紫臣應闡詳校花嚴寺住持傳賢首教觀義學沙門賜紫臣俊韶詳校海印寺住持傳賢首教觀義學沙門賜紫臣處元詳校興教寺住持傳賢首教觀圓覺景哲演奧慈應利生弘濟首座賜紫臣理琦重校佛日寺住持傳賢首教觀性圓景哲演奧慈應利生弘濟首座賜紫臣處淵重校興王寺住持傳賢首教覲兼講天台教觀南山律鈔因明等論等觀普應圓明福國慈濟廣智開宗弘真祐世僧統臣義天編定尚玄曰以上諸師皆宗華嚴而有疊録者似為校經慎重重復而然也大覺國師集又曰豫自二十二歲始講貞元新譯華嚴經并疏共五十卷其年轍軸自後講演未嘗有廢云云以是觀之大覺國師可謂海東華嚴中興宗祖也繼大覺而弘通華嚴者有太白山覺華寺無得智國國師戒膺和尚焉按金富軾撰興王寺弘教院華嚴會疏茲者伏見興王寺者文宗仁孝大王發願創造莊嚴佛事大覺國師宣揚教理作大利益厥後近三十年教義浸衰莫有能繼弟子虔尋遺志思有以重興請國師高弟子戒膺及學徒一百六十人於弘教院始自今月某日起約三七日修設華嚴法會仍令長年聚會演説大覺之後又有佛日普照國師諱知訥者創立禪宗兼弘華嚴師立有三種門曰惺寂等持門曰圓頓信解門師著有圓頓成佛論曰徑截門故其勸人持誦常以金剛經立法演義則意必六祖壇經申以華嚴李論唐李通玄長者華嚴論也大慧語録相羽翼云云麗末鄭道傳號三峰送友雲詩序華嚴宗師友雲北入燕都南遊江湖所至尊宿許之儕輩推之拈偈贈詩及東還大為玄陵知遇住于大公山之符仁寺實巨剎也未幾邀至松京法王寺為華嚴宗師扶樹宗風開悟後學僅一期辭去韓山牧隱先生首為歌詩贈其行其門人義砧以先生之命來徵序文云云至于朝鮮世宗六年併合諸宗只存兩宗僧科之典曰禪教兩宗每三年選試禪宗則傳燈拈頌教宗則華嚴十地論各取三十人然則所謂教宗乃云單存華嚴可也清虛休靜從芙蓉靈觀受華嚴而亦曾為華嚴宗判事之職浮休善修稱為華嚴宗主松雲惟政讚浮休大師曰傳如隸之華嚴云云碧巖覺性謁孝宗大王龍潛時於安州論核華嚴宗旨義孝宗大王大稱賞之楓潭義諶入鞭羊之室盡得清虛之傳駐錫於金剛寶蓋兩山日把華嚴等百數十卷正其差謬著其音釋然後三乘奧義煥然復明前後開度悟解者指不勝屈月潭雪霽諸經旨綮融會貫通尤愛華嚴拈頌口不轍誦大開後學迷途聞其旨而傳其妙者蓋數十百人月渚道安參楓潭盡得西山之密傳甲辰入妙香山講究華嚴大義世稱華嚴宗主每舉揚宗風座下聽衆常不下數百人柏庵性聰嘗於浦海邊見大船來泊視其所載即大明平林居士所校刊華嚴經疏鈔師乃驚異刊刻流布華嚴之學於是大備喚醒志安設華嚴大法會於金山寺衆凡千四百人登堂竪拂為衆説法衆皆歡喜得未曾有雪坡常彥深究華嚴清涼疏鈔摘抉隱科一卷并著鉤玄記一卷蓮潭有一著華嚴遺忘記四十卷晦菴定慧久講華嚴大闡宗旨默菴最訥纂集華嚴品目仁嶽義沾著華嚴私記闡明教理無用秀演白坡亘璇枕溟翰醒荷隱例珂龍湖海珠圓華德柱函溟太先諸大法師皆稱華嚴宗主至于今日諸山法侶大教之科以華嚴經為極則者有所由來吾故曰教林結果乃於雜花云爾華嚴經刊板考新羅末葉於智異山華嚴寺覺皇殿石壁刻華嚴經已述於前而高麗初於太白山浮石寺刻藏三種華嚴經六十華嚴八十華嚴四十華嚴板本共計六百七十四枚本宗之偉功遠圖推此可以想見也伽倻山海印寺雖有高麗時所造大藏經板本而字形既大卷帙笨重亦無演義疏鈔印出奉安可以作法寶用而不便於携帶課讀也朝鮮世祖大王時刊經都監譯刊諸經字形又大亦無譯刊華嚴之事蓋因其卷帙浩汗役巨事大故也雖然尚有以私力辦之者如東文選華嚴經跋薑碩德撰凡經書疏以明其義板以壽其傳苟無此二事道之寓諸文字者固無以顯揚流通此義學之徒所深病也吾東方清涼疏板乃高麗大覺國師西遊趙宋時獲之今已歸日域按大覺國師集有寄日本國諸法師求集教藏疏而其文殘缺不能知其委細今讀此文乃知華嚴經清涼疏送于日本也學者無復得見爰有禪師信浩遂立刊板志告齊靖申公孝昌齊靖與其男自謹辦材鳩工才刊二百四十五板齊靖已捐館矣於是三韓國太夫人安氏深慨盛舉不啻一簣之虧為大檀門復續厥緒以祈兩宮萬歲金枝永茂於是慶貞公主孝寧大君暨同室鄭氏盡心扶樹以竟大事又有判樞成公達生從而贊助其他隨喜者無算及此主幹良緣者苾芻覺頓也前後所雕共一千四百七十板就廣州治西青龍山清溪禪寺搆堂藏之額曰雜華以垂無窮此華嚴經板為朝鮮第一回造成者而今不知落處可勝惜哉柏庵法諱性聰大師所刻成者為第二回康熙二十年辛酉柏菴大師於荏子島浦邊見海舶忽自至滿載佛書就中得華嚴經演義抄本康熙己巳春赴樂安郡澄光寺刻於木板印刷流布康熙壬申春大設華嚴法會自是以後方廣之旨益闡明矣第三回雕造華嚴經板者雪坡法諱常彥大師是也按雪坡大師碑銘并序正祖二十年即清嘉慶元年丙辰原任領議政樊嵓蔡濟恭撰并書曰庚寅乾隆三十五年澄光寺火所藏華嚴八十卷板一無遺師嘆曰於斯而不盡心其敢頂禮如來於是鳩材剞劂人天助力春始夏訖其晦䵝者惟師之口是賴焉板既完新建閣峙諸靈覺寺在安義郡傍前數日有虎咆後僧又夢神人告曰此可藏如來大經云方經之安於閣也有瑞光蟠空會者咸異之師目為此偶然也已云云華嚴閣新建記安義郡靈覺寺吾東有疏華嚴尚矣無演義鈔昔康熙二十年辛酉六月二十一日海風大作有巨艦一艘自無何而來泊湖南之靈光荏子島中無一人滿中所載有佛家經論無慮千函萬軸皆唐册也聞唐人商販佛經則此乃商船為風所漂人則躲避得免船獨漂至於此也沿海諸剎收而藏之時曹溪柏菴和尚聞之移錫于靈光佛岬寺廣搜諸剎得皇明葉居士所會編演義華嚴八十卷和尚大喜如獲重寶奉歸樂安澄光寺鍥梓留鎮一任諸方學者之印讀吾東演義鈔之流布自此昉也歷八十餘年至曩年庚寅十月十一日夜板閣遇災八十卷板子盡為煨燼噫法無增減隨人興替歟亦今末劫衆生得締重板之功德歟今雪坡和尚以華嚴宗主親丁此際豈可因悟而不動於慮耶命諸門人均鳴化緣十方檀越翕然景從傾箱倒顱如恐居後甲午春董剞劂之役竣功于其夏以此寺以名山巨剎跨嶺湖之間諸方來印之道里均也乙未春立閣而藏之閣中佛像佛前香火之供具并時就緒嗚呼非大威法力冥資我和尚道德感人其成就烏得如是之易哉是宜表而記之以詔後世而最初東來之由後學罕知故兼書于初頭也乾隆四十七年壬寅陽月上浣蓮潭有一記本閣所藏華嚴經板本共三千一百四十一枚尚玄曰至于今日諸山法侶皆用此書以之講學嗚呼雪坡大師真不愧為華嚴菩薩也第四回華嚴經板雕成于哲宗七年丙辰清咸豐六年也藏于廣州修道山奉恩寺其事迹如左華嚴經板殿新建記法身無相真理非言非言故曰言語道斷無相故曰體相空寂既曰言斷體空則亦何有所説之經所居之宮然則今謂之經板也法堂也從何以經之營之乎然佛愍衆生無相而現相無言而示言佛有真應報化之身經有權實頓漸之教此所以有佛有經也况遮那有十華藏微塵數大人相華嚴有十三千大千世界微塵偈乎故無盡身雲遍布則法雨漫天難思教海瀾翻則恩波動地人天仰其化而發其心龍神慕其德而戴其頂於是乎如來宮殿廣博嚴麗彌勒樓閣周匝照耀不可説摩尼種種莊嚴阿僧秪珠網重重垂布流光如雲華影成幢故有佛則有經有經則有宮殿樓閣今板閣之作亦由斯也往於康熙己巳柏庵大師得華嚴大經於海舶刊於澄光鬱攸為災板本灰燼厥後乾隆甲午雪坡長老奮然慷慨再續靈覺歲久字刓叢林病焉噫禎祥啓運龜筮協從豈人力哉有南湖奇師以斯經重刊壽傳發願立誓與印虛性維霽月寶性雙月性濶諸開士僉議相謀共會於廣州奉恩寺或募緣而行化或知物而幹事招來良工付之剖劂大內傾帑財而為檀越首重臣割俸祿而作外護賓四衆奔走服役八肱翕然影從乙卯秋始役越明年丙辰秋竣功豈塵裏之經有待空中之書不墜歟抑如來遺此人於閻浮得締鍥梓之大事因緣與檀越同享大功德不專美於古人歟其所謂原始要終順成合勢殆若四河之同歸大海也圖所以護梓之計寺之兌隅占得爽塏青島先顧白鶴後飛爰諏吉日載拓靈區郡工雲委山靈度材衆役雷動海神驅石斧者斧之鋸者鋸之人既肘趨事皆頤指於是兀然寶殿鳥革翬飛華比兜率屹如砥柱何啻魯靈光之徒矚壯麗可擬秪陀園之清心戶堂蓋此殿大用則納無量剎土於一毫之中以一而含多轉大千經卷於微塵之內即小而現大娑婆與華藏染淨融通衆生與諸佛因果交徹制度則以一真法界為基址六度萬行為垣墻三十七助道品為階砌十八不共法為柱梁六神通八解脫為窗牗四無量七聖財為門鍵禪定為池塹智慧為樓臺四辨為鈴鐸十力為寶幢八萬波羅密為欄楯百千陀羅尼為龕宮真如菩提為茵褥法空涅槃為床座此殿一興萬善畢備庶可以上延國祚下裕羣生仍茲頌祝曰於我聖上克纘丕緒允叶重華龍圖鞏固東漸西暨混一金沙誕膺永命仙李長春萬壽無疆一新寶鼎再清黃河社稷靈長麟抱龍種聖子神孫繩繩瓜綿風雲相際雨暘時若不老後天大地共春黎庶於變百靈來王一切萬類皆入法界無量回向崇禎紀元後二百二十九年丙辰九月九日北海華隱護敬謹識海東金剛法起道場大方廣佛華嚴經諸菩薩住處品第三十二云爾時心王菩薩摩訶薩於衆會中告諸菩薩言佛子海中有處名金剛山從昔已來諸菩薩衆於中止住現有菩薩名曰法起與其眷屬諸菩薩衆千二百常在其中而演説法清涼疏云金剛山謂東海近東有山名為金剛雖非全體是金而上下四周乃至山間流水砂中皆悉有金遠望即謂全體是金又海東人相傳此山往往有聖人出現然晉本謂晉本華嚴經此處當其第九以與第十莊嚴窟俱在海中故而今居此者意是八方之內東北方攝故若不然者何以正説八方忽然語海又晉本海中有二住處一名怾怛那現有菩薩名曇無竭譯云法起有萬二千菩薩眷屬言怾怛者具云昵怾多此云踊出金剛語體踊出語狀曇無竭者此云法生亦云法勇亦云法尚今言法起與生勇義同即常啼友也菩薩眷屬十倍今經或前譯之誤東國輿地勝覽云金剛山名有五一曰金剛二曰皆骨三曰溫槃似是涅槃之誤四曰楓嶽五曰怾怛山凡一萬二千峯此其所以表菩薩眷屬萬二千者歟巖嶅骨立東臨滄海杉檜參天望如畫圖又云正陽寺在表訓寺北即山之正脈故名地界高逈山之內外諸峯一一盡覩諺云高麗太祖登此山曇無竭現身石上放光太祖率臣僚頂禮仍創此寺故寺後岡曰放光臺前嶺曰拜岾岾又有真歇臺高麗李穀長安寺碑云謹按金剛山在高麗東距王京五百里茲山之勝非獨名天下實載之佛書其華嚴所説東北海中有金剛山曇無竭與一萬二千菩薩常説般若者是已又金剛山都山寺李穀記云海東山水名於天下而金剛山之奇絶又為之冠且以佛書有曇無竭所住之説遂謂人間淨土天子謂元順帝與奇皇后之使降香幣絡繹于道而四方士女不遠千里牛載馬馱背負首戴供養佛僧佛祖源流指空行迹云西天提納薄陀尊者華言禪賢號指空泰定間見天子元帝於灘水之上論佛法稱旨歲給衣糧師辭曰吾不為是也去而東遊高麗禮金剛法起道場尋有旨趣還燕京朝鮮西山大師金剛山長安寺新鑄鍾銘序云世祖大王親幸是山禮法起真身月氏金人乘來鐵鍾高麗翰林閔潰撰金剛山榆岾寺事迹記新羅第二主南解王元年即前漢平帝元始四年甲子月氏國月氏即印度也五十三金人乘鐵鍾來至于金剛山東面安昌縣前高城郡浦口縣宰盧偆聞之率隸屬往尋之隨鍾聲至洞門見池邊有榆樹鍾挂于樹枝金人列坐池岸遂以其事歸奏國王王乃驚異駕幸瞻敬歸依即於其地創寺安之因樹以名其寺曰榆岾焉云云尚玄曰金剛山在江原道按江原道本朝鮮屬國濊貊之地後新羅併之置溟朔二州分領郡縣又按金富軾三國史新羅南解王次次雄十六年北溟人耕田得濊王印獻之云云則當時之金剛山及嶺東之地屬于新羅也明矣月氏金人之來若云事實則泊于安昌縣浦口轉入金剛山不亦宜乎或人難曰新羅第二主南解王時濊貊之地已屬新羅云何後世猶患濊貊其見于書紀者即如善德王十四年皇龍寺九層塔成釋安弘撰東都成立紀新羅第二十七代女王為主有道無威九韓侵苦建九層塔則鄰國之災可鎮第九層濊貊云云又崔致遠撰無染國師碑昔武烈王即金春秋為乙粲時為屠濊貊乞師計將真德女君第草八代王也命升見昭陵皇帝唐太宗也面陳奉正朔易服章天子嘉許云云等抑有何説余答曰濊貊與句麗其先同出夫餘故句麗亦稱云貊矣則安弘之紀無染之碑所稱濊貊即句麗也非濊貊尚存在也又崔致遠智證大師碑西晉曇始始之貊此亦指句麗也或人又問濊貊即句麗有何證據余曰前韓隆熙元年吾之老父博考諸書嘗著漢文大韓地志書名如是著作者取堂李源兢版尾署名如是書已照例押收今雖不得見之余猶記得其中所載濊貊沿革曰濊北夫餘王解夫婁東徙江陵之國名也解夫婁既徙江陵而夫餘之地仍稱濊貊句麗之先亦出夫餘故句麗亦稱濊貊貊之別種有小水貊句麗貊梁貊梁貊者至王莽時為句麗所滅春川謂之貊國者西漢之末其土人號稱樂浪地據春川故仍稱貊國也貊是樂浪別稱非有二國也文獻備考貊國都在今春川府北十三里昭陽江北洌水丁若鏞云按昭帝始元合郡之後漢廷命吏來治平壤或遣國人分治春川其後國人遂據春川以自雄別為一國而亦稱樂浪也東儒皆以春川為貊國疑此樂浪立國者原是貊人故遂謂之貊國也歟又百濟史云溫祚王十七年新羅赫居世五十五年春樂浪來侵焚慰禮城十八年冬十一月王欲襲樂浪牛頭山城至臼谷遇大雪乃還丁若鏞云按今之春川本名牛首州一名牛頭州漢武帝使彭吳通牛首州即此州也今昭陽江北有大村曰牛頭其北又有泉田有謂貊王古都此則樂浪國之遺墟也又春川南界水村有曰方牙兀者譯之即臼谷也總之濊貊之本在北夫餘其以江陵春川分屬濊貊者不核之言也後漢書云夫餘國在玄菟北千里南高句麗東挹婁西鮮卑本濊地也魏志云夫餘庫有玉璧圭瓚傳世以為寶其印文言濊王之印國有故城名濊城蓋本濊貊之地而夫餘王其中魏書云豆莫婁國在勿吉北千里舊北夫餘也本濊貊之地句麗東明王本紀云夫餘王解夫婁時其相阿蘭弗諫曰東海之濱有地曰迦葉原七壤膏腴宜五縠可都也遂移都國號東夫餘其舊都有人不知所從來自稱天帝子解慕潄來都焉新羅史云南解王十六年王莽時北溟人耕田得濊王印獻于新羅按濊貊者北夫餘之地也後世謂之豆莫婁東抵大海四千餘里地荒天寒人不可居至今尚無村落安有五穀阿蘭弗所云東海之濱必當求之於咸興以南沿海之地也又按迦葉與何瑟河西其聲相近迦葉原者今之江陵也東海之濱土宜五穀者非江陵而何漢魏諸史蓋馬嶺東之人皆稱濊人其論疆域相接每以江陵為濊者江陵舊為濊王之所都也江陵之得濊名非以是乎又按魏晉諸史皆云夫餘王印文曰濊王之印而江陵之民耕田得印乃是濊王之印則此為解夫婁之舊印又無疑也後漢書云句驪一名貊耳有別種依小水為居因名曰小水貊出好弓所謂貊弓是也句麗史云琉璃王三十三年命烏伊摩離領兵二萬西伐梁貊滅其國進兵襲取漢高句麗縣魏志云濊南與辰韓北與沃沮接東窮大海今朝鮮之東皆其地也按解夫婁既徙江陵濊人流徙者雜居嶺東之地而解夫婁實為濊王故偏以江陵為濊凡我嶺東之地北自咸興南至江陵本皆箕子朝鮮之域而其得濊名肇自解夫婁之時也蓋解夫婁之初徙亦嘗服屬於衛氏夫婁既卒濊君南閭乃畔右渠率二十八萬口詣遼降漢以其地為滄海郡數年乃罷則江陵之濊遂無名矣滄海郡之名始於此時東人以張良東見滄海君為江陵之君非也又按昭帝始元五年玄莬徙居句麗自單大嶺已東沃沮濊貊悉屬樂浪則江陵非嶺東地乎濊貊者江陵也春川明在嶺西此非雙舉江春之文也又按新羅史北溟人得濊王印獻于新羅已在王莽之時則江陵之無君長久矣此時唯咸興之濊猶時君長故漢人謂之不耐濊其必名之曰不耐濊者所以別之於江陵濊也賈耽郡國志云新羅北界溟州蓋濊之古國句麗之東南濊之西古貊地蓋今新羅北朔州按春川為貊之説昉於賈耽郡國志然賈耽每外國使至訪問疆域録之為書茲口耳之學不足信也漢武帝時遣彭吳伐取牛首州此時亦無貊國之名賈耽之志絶無所據也又按樂浪當時屢侵百濟而考其疆域明是春川春川一郡既屬樂浪又何餘地容此貊國哉若使貊國果在春川密接昵比莫如百濟或侵或和必有事實其見於史者僅有新羅儒理王十七年秋九月華麗不耐二縣人連謀率兵犯北境貊國君以兵要曲河西敗之王喜與貊國結好又百濟責稽王十三年秋九月漢與貊人來侵之文然此皆樂浪之別稱非二國也蓋漢者晉人也此時晉吏或至樂浪同侵百濟也後二年晉永康元年樂浪服于新羅見軾史又四年晉永興元年樂浪太守陰遣刺客殺百濟王汾西王考其時代則所謂漢貊明是樂浪並詳樂浪考但春川已自蜀漢之時屬于新羅忠萱事見前樂浪之治已徙西鄙此云貊人非春川之人也蓋濊貊之本本於夫餘據後漢書濊傳云其耆舊自謂與句麗同種言語法俗大抵相類魏志亦云耆老自謂與句麗同種言語法俗大抵與句麗同衣服有異男女皆著曲領解夫婁本自北扶餘東徙者也高句麗朱蒙亦自北夫餘而南徙則嶺東之濊其非句麗之同種乎江陵濊人之本係解夫婁之部落可謂確然而有證矣尚玄又曰漢武帝已祀金人於甘泉宮則漢明帝永平以前支那已有佛迹但未行布耳以此榆岾例彼甘泉未有不可若以年代先後之故如崔瀣氏之嚴斷則吾未知其當也高麗崔瀣送僧序云近有以普德菴僧所撰金剛山記來示余者於中云佛金像五十三軀自西域浮海以漢平元始四年甲子至山因以立寺夫佛法東流始於漢明永平八年乙丑而東國又始於梁大通元年丁未其後乙丑有四百一年之久苟信彼説則是中原寥寥未知有佛六十一年前東人已為佛立廟最可笑也蓋金剛者自是佛法常住之性地心王自證之當體也李牧隱詩金剛不壞有我性世界毀滅山向空中藏李詩曰榆岾寺中榆樹長鍾浮西海天茫茫金人五十又三軀直指樹下開天堂考時按籍信難信事出誕怪仍荒唐竺乾神變自絶世海路况可通舟航東人口乳口梵唄白頭誰不求西方三登此山免三塗此語堅確齊金剛金剛不壞有我性世界毀滅山向空中藏云云者殆近之矣故吾著是書冠之以海東金剛者意在乎是仍係之以詩曰不離兜率降毗嵐乘鐵鍾來且莫談結坐草田依道樹現身榆岾建伽藍看雲客自歸青嶂撈月人應向碧潭始到金剛堅固地五三知識一時參露王玉后石塔載到尚玄曰駕洛佛法可記者有五事而自印度直輸入者也云何為五一金首露王建國之明年幸新畓坪相宅都之處曰此地秀異可為十六羅漢住地何况自一成三自三成七七聖住地固合于是云云之事二阿踰陀國公主許黃玉載來石塔之事林泰輔駕洛史云國號之伽羅伽倻呵囉等皆印度之方言云云林氏之説不為無理而阿踰陀國王之舟送公主及金首露王之岾望王后後生七子學道成仙七佛也之事駕洛佛法特放異彩而於史傳之中埋沒無聞是可惜也三呵囉國首露王不能禁制玉池毒龍魚山羅剎請佛説法如北天竺耶乾訶羅國王故事之事按三國遺事引古記云萬魚寺者古之慈成山也又阿耶斯山當作摩耶斯此云魚也傍有呵囉國昔天卯卯疑卵誤下于海邊作人御國即首露王當此時境內有玉池池有毒龍焉萬魚山有五羅剎女往來交通故時降電雨歷四年五穀不成王呪禁不能稽首請佛説法然後羅剎女受五戒而無後害故東海魚龍遂化為滿洞之石各有鍾磬之聲云云三國遺事中魚山佛影編于祈願感通之部此云稽首請佛説法者蓋祈佛驅害者也四首露王子七人入山成道智異山之七佛菴即其處也七佛事迹頭緒甚亂次第援證如左駕洛國首露王事迹考云阿諭陀國公主許皇玉既配與首露王為后誕生十子以元子居登為嗣后言于王曰妾悲吾姓之不傳於東土也王亦憐之乃錫二子傳母姓於後其餘七子則志絶塵寰從寶玉仙入伽倻山學道乘仙此云伽倻山者伽倻國之山也昔崔孤雲實隱于智異山而史云伽倻山與此同一筆法也晉陽志云七佛菴一名真金輪有玉浮仙人隱此吹玉笛新羅王尋其聲乃金輪寺也於是率七子與仙同遊七子成佛自為梵王故神興寺名上有梵王村其下有天妃村妃即王妃金海金氏世譜中金海遺迹云長遊寺一名佛母寺許王后弟寶玉仙卜幽長遊之處後銍知王建寺名曰長遊高麗金富軾三國史云羅人沙餐新羅儒理王九年設官凡有十七等其第八曰沙餐恭汞子玉寶高入地理山今之智異山雲上院學琴五十年自製新調上院曲一下院曲一南海曲二倚嵓曲一老入曲七竹菴曲二玄合曲一春朝曲一秋夕曲一吾沙息曲一鴛鴦曲一遠岾曲六比目曲一入實相曲一幽谷清聲曲一降天聲曲一凡三十曲傳之續命得續命得傳之貴金貴金先生亦入地理山不出羅王真興王也恐琴道斷絶以伊餐允興為南原守俾傳其業允興遣安長清長二人詣山中學之貴金祕不盡傳允興親往致禮然後傳其所祕飄風等三曲安長傳其子克宗克宗製七曲克宗之後業琴者亦多製音曲有二調一平調二羽調共一百八十七曲蓮潭一和尚七佛菴上梁文曰至若斯庵拓雲上之舊基揭壁間之今名一山正脈之函藏萬壑靈氣之輻湊昔在新羅之代神文臨朝爰有頭流之仙玉浮其號迹似浮丘子道則毗耶翁飛玉笛之一聲警金闕之七子踰城半夜舍萬乘之尊榮入山六年悟三界之夢幻洽同悉達太子頓成佛來奚論弄玉公主但隨鳳去於是一竿建剎七佛命名古往今來幾經滄桑之變革時移事換多見風雲之遷更然而神祇攸扶聖迹不泯盤陀石下一柄玉簫尚存無縫塔中七枚舍利宛在一面影池不竭想當時母后之來窺世傳王與其妃想見七子來臨山下王所住處曰梵王村妃所住處曰天妃村七子傳告父母曰子等出家不合匱面然山下有池可窺吾影其母窺影恍如對面遂名影池云千年枯樹猶生徯他日仙翁之再到世傳玉寶仙人留語枯樹生時當再來到云所以十方聚會常啓選佛之場八部森嚴永護修真之所今據已上諸文駕洛之寶玉玉寶玉浮之稱號又似新羅之阿道我道阿度之事迹皆以一人而有多稱疑混難辨蓋古時凡弄琴吹笛者皆稱仙人非徒稱玉寶為仙亦稱于勒為仙矣雖然細究之則成道之七人非新羅王子也寶玉玉寶訛倒者也仙佛世人之互稱者也具有其據嵩陽金善臣撰頭流全志智異山一名頭流山云從般若峰南十里有七佛庵舊額雲上院稱東國第一禪院始羅新羅亦云始羅二百十年有新文王子二人與宮母五人入此成道故改今名後五十九年而至景德王徵士玉寶居之六百八十二年即洪武四年而重創慎庵記云余嘗見臺山事迹新文王子二人一曰孝明一曰神聖詣五臺參化身文殊而孝明入承神聖為王未有宮母得道之説金海金氏譜首露王子十人一為儲二錫為許氏嗣餘七人志絶塵寰從寶玉仙入伽倻山學道成仙必此也蓋寶玉之寶字倒而已仙佛世人之互稱也自伽倻山入雲上院悟心佛故後人慕之七佛名菴者也毗盧法殿清虛尊者手筆記文在東有藥師石佛甚靈偉西則高僧堂後有玉寶臺西北岡有浮休祖師齒牙塔其下有秋月能禪師浮圖金處士記晉陽志所云玉浮仙人即玉寶仙人之訛誤也新羅王尋笛聲率七子與仙同遊七子成佛自為梵王新羅史中並無如是事乃即伽羅首露王與其七子之事也三國史所云羅人沙餐恭汞子玉寶高入地理山雲上院學琴五十年二傳而至貴金貴金既為新羅真興王時人以是溯推則玉寶高可為新羅訥秪王時人也是時駕洛未亡而智異山又在駕洛境內以新羅之人而學琴于駕洛山中是為疑問且以玉寶仙之吹笛及于勒師之奏琴等事觀之則伽倻樂學已為發達可知也已且玉寶高之琴豈能無師自學乎又其所製新調三十琴曲似皆譜詠金王聘迎玉后故事比如關雎之讚文王太姒之德離騷之歌虞舜皇英之事其云降天聲曲似指首露天卵下降之事也南海曲似指許后浮海來泊之事也倚巖遠帖等曲似指王命神鬼干就乘帖遠望公主之事也玄合鴛鴦比目等曲似指王與公主合婚之事也春朝秋夕等曲似指金王玉后花朝月夕琴瑟友之之事也老人曲似指王與后享高壽之事也上院中院下院竹菴幽谷清聲等曲似指王子七人山顛水涯逍遙翱翔與仙同遊之事也吾沙息曲方言也故難強解入實相曲似指七王子學道成佛證入實相之事也智異山華嚴寺陳震應禪師著有智異山志頗多參考者故録之于左智異山古書或云地利山余常疑智異之命名十五年前靈源寺幻明老人處見一古書名曰朝鮮名山菩薩住處記其中有曰智異山文殊菩薩與八萬眷屬常住説法云云於是積年疑念一時撲落智異之稱恍然覺悟此山全體都是文殊一身也現今諸方禮懺皆稱五峯聖主七佛祖師大智文殊師利菩薩華嚴疏云文殊專主般若六祖金剛經序云般若以無住為體妙有為用又古書云般若諸佛之母又牛頭山無著文希禪師入五臺山親見文殊作偈讚之曰廓周沙界聖伽藍滿目文殊接話談言下不知開活眼回頭只見舊山巖云云又德山宣鑑禪師逢賣餅老婆三世心都不可得點那個心之言下罔知所措老婆即文殊化身云云據上諸説對照現今智異之諸般名稱如合符契此下一一別配此山總稱智異云者上云大智文殊師利六字中摘智利二字為名其義則此山為文殊常住處故也然則智利為正名而今云香異者後人取音同而改之上字是而下字誤也古書云地利者下字是而上字誤也上字取今名下字取古名合於正名而無誤也智異山大華嚴寺東二十里有般若峯上云文殊專主般若故也般若峰上有上佛墓下佛墓兩石冢鏡巖集云道詵國師理兩鐵佛以鎮走脈云云以愚料之或佛母之誤傳耶上云般若諸佛之母故也般若峯下有妙皇臺般若峯相望之地有無住菴上云般若以無住為體妙有為用故也般若峯西有吉祥峯文殊此云妙吉祥故也吉祥亦稱老嫗峯文殊或現老婆身故也吉祥峯下有大華嚴寺例如支那清涼山五臺山大華嚴寺也又吉祥峯下有文殊洞洞門有九萬里文殊洞相對之白雲山麓有五峯山吉祥峯相望之地有無著臺又吉祥峯越便之地有七佛菴上云無著禪師入五臺山親見文殊故有無著臺上云文殊菩薩與八萬眷屬常住説法云云文殊化身萬文殊又有八萬眷屬合為九萬故有九萬里也現今智異山上峯稱天王峯峯下神社稱聖母社者高麗朴全之所撰龍巖寺記云智異山主聖母天王故也又聖母天王云者三國遺事所云仙桃聖母之類也然以愚料之亦有所以智異山神即文殊化身文殊七佛之祖師義同七佛之母故云聖母或般若諸佛之母故云聖母也又稱天王者文殊或現天王身故也又世傳智異山神以老嫗現身故吉祥峯亦稱老嫗峯天王峯下又有聖母社云云豈非文殊化身賣餅老婆之謂歟如上杜撰難免具眼者大笑然但據現今愚夫愚婦之稱號之實而述之初無臆説於其間唯考據君子幸一覽之云云五駕洛國銍知王為世祖許黃玉后奉資冥福創王后寺之事也三國遺事云首露王聘迎許后同御國一百五十餘年然于時海東未有創寺奉法之事蓋像教未至而土人不信服故本記無創寺之文逮第八代銍知王二年置寺於其地又創王后寺至今奉福焉兼以鎮南倭具見本國本記云云順道阿道傳經創寺高句麗小獸林王二年壬申秦王苻堅遺僧順道送佛像經文高句麗佛法始此又後二年秦僧阿道來海東高僧傳云順道來後四年神僧阿道至自魏存古文小獸林王五年乙亥春二月創省門寺伊弗蘭寺以置胡僧順道阿道三國史云高句麗始創肖門寺省門寺之誤以置順道又創伊弗蘭寺以置阿道此海東佛法之始尚玄曰海東高僧傳釋阿道或云本天竺人既云胡僧則本天竺人也或云從吳來或云自高句麗入魏後歸新羅未知孰是金富軾三國史云新羅訥祇王時支那劉宋時沙門墨胡子自高句麗至一善郡郡人毛禮於家中作窟室安置其後毗處王時照智王麻立干有阿道和尚與侍者三人亦來毛禮家儀表似墨胡子住數年無病而死其侍者三人留住講讀經律往往有信奉者金富軾云此據金大問雞林傳所記書之也奭韓奈麻金用行我道和尚碑所録殊異三國遺事云新羅本記第四云第十九訥祇王時沙門墨胡子自高句麗至一善郡郡人毛禮或作毛録於家中作堀室安置時梁遣使賜衣著香物訥祗在晉宋之世而云梁遣使者恐必有誤君臣不知其香名與其所用遣人齎香遍問國中墨胡子見之曰此之謂香也焚之則香氣芬馥所以達誠於神聖神聖未有過於三寶若燒此發願則必有靈應時王女病革使召墨胡子焚香表誓王女之病尋愈王喜厚加賚貺俄而不知所歸又至二十一毗處王時有我道和尚與侍者三人亦來毛禮家儀表似墨胡子住數年無疾而終其侍者三人留住講讀經律住往有信奉者按我道本碑金用行所撰者歟云我道高麗謂高句麗人也母高道寧正治間曹魏人我崛摩我姓也奉使句麗私之而還因而有娠師生五歲其母令出家年十六歸魏省覲崛摩投玄彰和尚講下就業年十九歸寧於母母謂曰此國于今不知佛法爾後三千餘月雞林有聖王出大興佛教其京都內有七處伽藍之墟一曰金橋東天鏡林二曰三川岐三曰龍宮南四曰龍宮北五曰沙川尾六曰神遊林七曰壻請田皆前佛時伽藍之墟法水長流之地爾歸彼而播揚大教當東嚮於釋祀矣道稟教至雞林寓止王城西里今嚴莊寺于時味鄒王即位二年癸未也詣闕請行教法世以前所未見為嫌至有將殺之者乃逃隱于續林今一善縣毛祿家祿與禮形近之訛古記云法師初來毛祿家時天地震驚時人不知僧名而云阿頭彡麼彡麼者乃鄉言之稱僧也猶言沙彌也三年時成國公主疾巫醫不效敕使四方求醫師率然赴闕其疾遂理王大悅問其所須對曰貧道百無所求但願創佛寺於天鏡林大興佛教奉福邦家耳王許之命興工俗方質儉編茅葺屋住而講演時或天花落地號興輪寺毛祿之妹名史氏投師為尼亦於三川岐創寺而居名永興寺未幾味鄒王即世國人將害之師還毛祿家自作冢閉戶自絶遂不復現因此大教亦廢至二十三法興大王以蕭梁天監十三年甲午登位乃興釋氏距味鄒王癸未之歲二百五十二年道寧所言三千餘月驗矣據此本記與本碑二説相戾不同如此嘗試論之梁唐二僧傳及三國本史皆載麗濟二國佛教之始在晉末大元之間則二道法師以小獸林甲戌到高麗高句麗也明矣此傳不誤若以毗處王時方始到羅則是阿道留高麗高句麗也百餘歲乃來也雖大聖行止出沒不常未必皆爾抑亦新羅奉佛非晚甚如此又若在味鄒之世則却超先於到麗甲戌百餘年矣于時雞林未有文物禮教國號猶未定何暇阿道來請奉佛之事又不合高麗高句麗也未到而越至于羅也設使暫興還廢何其間寂寥無聞而尚不識香名哉一何大後一何大先揆夫東漸之勢必始于麗濟而終乎羅則訥祇既與獸林世相接也阿道之辭麗抵羅宜在訥祇之世又王女救病皆傳為阿道之事則所謂墨胡者非真名也乃指目之辭如梁人指達磨為碧眼胡晉調釋道安為漆道人類也乃阿道危行避諱而不言名姓故也蓋國人隨其所聞以墨胡阿道二名分作二人為傳爾况云阿道儀表似墨胡則以此可驗其一人也道寧之序七處直以創開先後預言之而傳失之故今以沙川尾躋於五次三千餘月未必盡信書自訥祇之世抵乎丁未無慮一百餘年若曰一千餘月則殆幾矣姓我單名疑難詳又按曇始傳始以大元末到海東義熙初還關中則留此十餘年何東史無文始既恢詭不測之人而與阿道墨胡難陀年事相同三人中疑一必其變諱也讚曰雪擁金橋凍不開雞林春色未全回可憐青帝多才思先著毛郎宅裏梅海東高僧傳云按古記梁大通元年三月十一日阿道來至一善郡天地震動師左執金環錫杖右擎玉鉢應器身著霞衲口誦花詮初到信土毛禮家禮出見驚愕而言曰曩者高麗高句麗也僧正方來入我國君臣怪為不祥議而殺之又有滅垢玼從彼復來殺戮如前汝尚何求而來耶宜速入門莫令鄰人得見引置密室修供不怠適有吳使以香獻原宗王王不知所用遍詢國中使者至問法師師曰以火燒而供佛也其使偕至京師王令法師見使使禮拜曰此邊國高僧何不遠而王因此知佛僧可敬敕許頒行又按高得相詩史曰梁氏遣使曰元表責送沉檀及經像不知所為咨四野阿道逢時指法相注云阿道再遭慘害神通不死隱毛禮家則梁吳之使莫辨其詳又阿道之迹外同黑胡子何哉然自永平至大通凡四百十餘年高句麗興法已百五十餘年而百濟已行一百四十餘年矣若按朴寅亮殊異傳云阿道十六入魏覲省其父崛摩遂投玄彰和尚就業十九年歸寧於母又承母命來寓新羅王闕西里時當味鄒王即位二年癸未矣師請行竺教以前所不見為怪至有將殺之者故退隱于續村毛祿家今善州也逃害三年成國宮主疾病不愈遣使四方求能治者師應募赴闕為療其患王大悅問其所欲師請曰但創寺於天鏡林吾願足矣王許之然世質民頑不能歸向乃以白屋為寺後七年始有欲為僧者來依受法毛祿之妹名史侍亦投為尼乃於三川岐立寺曰永興以依住焉味鄒王崩後嗣王亦不敬浮圖將欲廢之師還續村自作墓入其內閉戶示滅因此聖教不行於斯盧新羅一名斯盧厥後二百餘年原宗興像教自味鄒至法興凡十一王矣阿道出現年代前却如是其差舛並是古文不可取捨然若當味鄒時已有弘宣之益則與順道同時明矣以其中廢而至梁大通乃興耳故並出黑胡子元表等敘而觀焉尚玄曰阿道事迹彙考諸書殆同亂麻難尋其緒即如阿道阿度毛禮毛祿墨胡黑胡梁使吳使等名號及與味鄒訥祇等年代多有差舛既曰古文不可取捨姑置勿論當時麗濟創興佛法已有百四五十年此之風潮豈獨不及於鄰比之新羅哉然則最初傳法于新羅者有墨胡子或黑胡子及我道或阿道又有正方滅垢玼等矣然童頭謂禿頭也異服謂袈裟及壞色衣等議論奇詭無上正法劣根之人聞之驚怪少見多怪輒加誅戮阿道之來于毛禮家禮出見驚愕忌諱畏避情境如畫雖然自是厥後已結佛種之因隱信潛奉者亦不乏其人在朝則曰慈悲王照智王智證王諸王之美諡應即信佛之證據也新羅諡法始于智證之薨年已上諸諡皆法興之世追上者也明矣三王皆在佛法入羅之後法興王三國史云至是王亦欲興佛教云云細究亦字之意繼美追蹤之義躍然紙上也及近臣異次頓是也法興王欲興佛教羣臣以為不可近臣異次頓曰請參小臣以定衆議王曰欲興佛道而殺不辜可乎對曰若道之行雖死無憾王召羣臣議僉曰今僧徒童頭異服議論奇詭從之恐有後悔異次頓獨曰夫有非常之人然後有非常之事今佛教淵奧不可不信王曰衆人之言牢不可破而汝獨異言下吏將奏之次頓臨死曰我為法就刑佛若有神吾死必有異及斬血從斷處湧色白如乳東國通鑒在野則曰毛禮或毛祿度羅傳法者必主毛禮之家以其已有接引之總故及毛祿之妹史氏或史侍是也至是王與異次頓始決意而公然行之也其云墨胡子者的是西域僧也吾於往年始得親見梵僧達磨婆羅乃驗墨胡黑胡決非自號乃是他人以其貌黑而起名者也况有明文高句麗創肖門寺伊弗蘭寺以置胡僧順道阿道又阿道或云本天竺人其云胡僧又天竺人是阿道為梵僧之證據也沙門一然能以墨胡阿道斷為一人而不能斷其為西域僧也又按自阿道來麗之年高句麗小獸王四年新羅奈勿王十九年至新羅訥祇王元年僅為四十四年則諸書所云訥祇王時沙門墨胡子自高句麗至一善郡者即是阿道辭麗抵羅也惟此年代與事實最相符合至金用行我道本碑及朴寅亮殊異傳皆以道為高句麗人而入魏省親投玄彰和尚受法歸稟母命歸于新羅當味鄒王二年癸未高句麗中川王十四年云云是在阿道來麗之前百十餘年又古記梁大通元年新羅法興王十三年高句麗安藏王八年三月十一日阿道來至一善郡云云是又在阿道來麗之後百五十餘年均不可憑信也梁傳曇始宣教句驪海東高僧傳釋曇始關中人也自出家多有異迹足白於面天下咸稱白足和尚以晉太元末年高句麗廣開土王五年貴至經律數十部往化遼東乘機宣化顯授三乘立以歸戒梁僧傳以此為高句麗聞法之始云云按師行迹東涌西沒中涌邊沒令人罔測不可捉摸來化遼東宣法音於句麗復歸關中挫暴威於赫連始之貊國如漢葉騰能入虎檻感魏拓拔曇始其殆化現之菩薩也高句麗佛法雖自順道阿道始而無如曇始顯授三乘立以皈戒之明文梁僧傳以此為高句麗聞法之始必有所以也既云曇始來化遼東而謂高句麗聞法然則當時遼東即為高句麗推可知也尚玄曰按神檀實紀大倧教郡司教金教獻編修發行有平壤及浿水辨所述地志頗有可據故今引證以資博考焉平壤及浿水辨唐書安市城去平壤五百里鳳凰城亦稱王儉城地志又以鳳凰城稱平壤未知此何以名焉又地志古安市城在蓋平縣東北七十里自蓋平東至巖河三百里自秀巖河東至二百里為鳳凰城若以此為古平壤則與唐書所稱五百里相合然吾東之士只知今平壤言箕子都平壤則信言平壤有井田則信言平壤有箕子墓則信若復言鳳凰城為平壤則大驚若曰遼東復有平壤則叱為怪駭獨不知遼東本朝鮮古地肅慎濊貊東夷雜種盡服屬於朝鮮又不知烏剌寧古塔後春等地本高句麗舊疆嗟呼後世不詳地界則妄把漢四郡地盡局之於鴨緑江內牽合事實區區分排乃復覔浿水於其中或指鴨緑江為浿水或指清川江為浿水或指大同江為浿水是朝鮮舊疆不戰自蹙矣此其故何也定平壤於一處而浿水前却常隨事迹吾嘗以為漢四郡地非特遼東當入女真何以知其然也漢書地理志有玄菟樂浪而真蕃臨芚無見焉蓋昭帝始元五年合四郡為二府元鳳元年又改二府為二郡玄菟三縣有高句驪樂浪二十五縣有朝鮮遼東十八縣有安市獨真蕃去長安七千里臨芚去長安六千一百里金崙所謂我國界內不可得當在今寧古塔等地是也由是論之真蕃臨芚漢末即入於扶餘挹婁沃沮扶餘五而沃沮四或變而為勿吉變而為靺鞨變而為渤海變而為女真按渤海武王大武藝答日本聖武王書有曰復高麗之舊居有扶餘之遺俗以此推之漢之四郡半在遼東半在女真跨踞包絡本我幅員蓋可驗矣然而自漢以來中國所稱浿水不定厥居又吾東之土必以今平壤立準而紛然尋浿水之迹此無他中國人凡稱遼之水率號為浿所以程里不合事實多舛者為由此也故欲知古朝鮮高句麗之舊域先合女真於境內次尋浿水於遼東浿水定然後疆域明疆域明然後古今事實合矣然則鳳城果為平壤乎曰此亦或箕氏衛氏高氏所都則為一平壤也唐書裴矩傳言高麗本孤竹國周以封箕子漢分四郡所謂孤竹地在今永平府又廣寧縣舊有箕子墓戴哻冠塑像明嘉靖時燬於兵火廣寧人或稱平壤金史及文獻通考俱言廣寧永平皆箕子封地以此推之永平廣寧之間為一平壤也遼史渤海顯德府本朝鮮地箕子所封平壤城遼破渤海改為東京即今之遼陽縣是也以此推之遼陽縣為一平壤也愚以為箕氏初居永廣之間後為燕將秦開所逐失地二千里漸東益徙如中國晉宋之南渡所止皆稱平壤今我大東江上平壤即其一也浿水亦類此高句麗封域時有嬴縮則浿水之名亦隨而遷徙如中國南北朝時州郡之號互相僑置然而以今平壤為平壤者指大同江曰此浿水也指平安咸鏡兩界間山曰此蓋馬大山也以遼陽為平壤者指蓒芋濼水曰此浿水也指蓋縣山曰此蓋馬大山也雖未詳孰是然必以今大同江為浿水者自小之論耳唐儀鳳二年以高句麗王臧高句麗寶藏王高臧為遼東州都督封朝鮮王歸遼東仍移安東都護府於新城以統之由是觀之高氏壤土之在遼東者唐雖得之不能有而復歸之高氏則平壤本在遼東或為寄名與浿水時有前却耳漢樂浪郡治在遼東者非今平壤乃遼陽之平壤及勝國王氏高麗遼東乃渤海一境盡入契丹則僅畫慈鐵兩嶺而守之並棄先春鴨緑而不復顧焉而况以外一步地乎雖並三國其境土武力遠不及高氏之強大後世拘泥之士戀慕平壤之舊號徒憑中國之史傳津津隋唐之舊迹曰此浿水也此平壤也已不勝其徑庭此城之安市為鳳凰惡足辨哉熱河日記渡江録尚玄又曰高句麗小獸林王二年佛教始輸入爾時句麗之都在平壤東黃城後二十一年即廣開土王二年創九寺於平壤又後三年廣開土王五年晉僧曇始來化遼東然則其謂平壤在遼陽不為無據也按高句麗始祖朱蒙都訖升骨城卒本其地在今興京界內至琉璃王二十一年移都國內城其地在今楚山北隔江之地東北距丸都不過二百餘里至山上王十三年自國內城移都丸都城其地在今滿浦堡北鴨緑江隔水之地高山之上疑在紅石山上句麗再都被屠滅故不能久居至東川王二十一年始築平壤城移其廟社尋亦移居歷九十六年至故國原王十二年還移丸都城甫二年又還平壤之東黃城歷八十五年至長壽王廣開土王之子十五年又移平壤城蓋自山上王十三年以後句麗之都或在丸都或在平壤水渡七僧誘敗隋軍高麗高句麗也古記云隋煬帝以大業八年壬申領三十萬兵渡海來征按是時隨將宇文述于仲文等乘勝追乙支文德東濟薩水去平壤城三十里因山為營文德遺仲文詩曰神策究天文妙算窮地理戰勝功既高知足願云止仲文述等引軍還為方陳而行文德出軍四面鈔擊且戰且行秋七月至薩水隋軍半濟麗軍自後擊其後軍將軍辛世雄戰死於是諸軍俱潰不可禁止云云又按輿地勝覽安州牧七佛寺在北城外諺傳隋兵陳于江上欲渡無舟忽有七僧到江邊六僧褰裳而涉隋人見之謂水淺揮兵爭渡而溺尸滿于川水為之不流因建寺為名列置七佛以像七僧尚玄曰或人問於余曰佛以慈悲濟渡衆生本無人我之相何有冤親之別今見安州七佛事迹則人我相矣冤親別矣何有於慈悲濟渡之義乎余對曰江風自吹不能俱便於上下之船天雨自下豈能遍擇於榮枯之苗其理亦復如是而已請以今時之戰為喻彼歐羅巴交戰諸國皆奉耶穌基督之教者也德意志即獨逸國亦云普魯斯亦云日耳曼人禱於天主願獲勝捷露西亞亦云俄羅斯國人祈於上帝欲得冥佑露勝則云天眷露而棄德乎日勝則云帝厚德而薄露乎曰不不露勝乎則是露人智力為優故也德勝乎則是德人之智力為優故也勝敗固任天演智力仍恃自運而已上帝之力何有於其間哉雖然新羅設行瑜珈道場能覆唐兵之船神印師明朗行文豆婁法干四天王寺唐之大兵再遭核船精誠所格或能感神高麗願成大藏經板高麗顯宗為祈禳退治契丹兵雕成大藏經板藏于大公山符仁寺乃為蒙古兵所燬不免獺狚之炬大運所在豈可回天或人轉其意而問曰佛家以不殺生為十戒之首不殺生不偷盜不邪淫不妄語不兩舌不惡口不綺語不貪不嗔不癡是為十善修此十善為生天之因地球上所産之動物若使生而無滅則一雌一雄所産之子孫轉瞬之間可占全世界之面積而有餘即如人類生産最遲者也二十五年而增加一倍以此比例則一夫婦之子孫經千年後已屏足而立於地球矣况乎動植之孳生速率遠非人類所能比者乎動物之中生命最長生産最遲者莫如象象自三十歲至九十歲可以産子計最少數一牝牡産六子經七百五十年則當得象一千九百萬頭矣自餘百物皆可類推也何能以有限之地面容無限之品類乎故不得不殺余對曰楞嚴經云則諸世間胎卵濕化隨力強弱遞相吞食我負汝命我還汝債此即佛教家觀察衆生業果相續之法理固如是弱之肉強之食大魚中魚食中魚小魚食雀捕螳螂人抱雀生存競爭優勝劣敗即科學家研究天演陶汰之公例亦如是兩家學説折衷論之業果相續之慧觀天演陶汰之達論非敢曰矛盾寧可謂調和個中精義融通無礙略述諸例如下出世間法三世因果洞然明白故自身嚴守戒律不行殺生而化度衆生脫生死苦海登涅槃彼岸以為目的此所謂衆生界不盡我願不盡者也雖然驅除害蟲撲殺狂犬養雞豚獵麋鹿弋鴻鴈網魚鱉食其肉以養口體衣其皮以禦寒凍此世間法之不得已者也然則彼等禽獸昆蟲各以自業受吞食殺害之報罹天然陶汰之網到此之時佛亦無奈何即所謂佛不能度無緣衆生亦不能盡衆生界者也生存競爭天演公例人與人間尤甚劇烈在社會則朋黨傾軋相殺相害例如漢明之黨錮朝鮮之士禍等是也在世界則敵對衝突相鬪相殺例如秦時之長平坑卒今日之歐洲戰亂等是也若以佛法觀之即所謂同業相感者也若以天演言之即所謂優勝劣敗者也雖然昨日説定法今日説不定法我世尊之金言世尊因外道問昨日説何法世尊曰説定法外道曰今日説何法世尊曰説不定法外道曰昨日説定法今日何説不定法世尊曰昨日定今日不定吾劒亦能殺人亦能活人古祖師之玄言高麗末懶翁禪師入支那江南參平山處林禪師山問曰大德從何方來翁曰大都來山曰曾見什麼人來翁曰曾見西天指空和尚來山曰指空日用何事翁曰指空日用千劍山曰指空千劍且量將汝一劍來翁以坐具打山山倒在禪床大呼云這賊殺我翁扶起云吾劍亦能活人亦能殺人新羅圓光師乞師修表進新羅真平王憂高句麗屢侵封疆欲請隋兵以征敵國命圓光法師修乞師表圓光曰自存而滅他決非沙門之行然貧道在大王之土地費大王之衣食敢不唯命是從乃述以進又官人貴山項請一言為終身之戒師曰佛有菩薩十戒汝等為人臣子恐不能行今有世俗五戒一曰事君以忠二曰事親以孝三曰交友以信四曰臨戰無退五曰殺生有擇殺生有擇者春夏及十齋日不殺是擇時也不殺使畜謂牛馬雞犬不殺細物謂肉不足一臠是擇物也貴山項兩人謹受教克守其戒後果戰死朝鮮休靜公勤王下山來壬辰兵亂宣祖大王西幸龍灣西山大師休靜杖劍進謁宣祖教曰世亂如此爾可弘濟耶師泣而拜遂起義僧赴難成功扈駕還都明提督李如松送詩以賀之曰無意圖功利專心學道禪今聞王事急總攝下山巔並立三教寵臣進策高句麗寶藏王二年癸卯唐貞觀十七年遣使于唐求道教先是蓋蘇文告王曰三教譬如鼎足闕一不可今儒釋並興而道教未盛請遣使於唐求之王奉表陳請帝遣道士叔達等八人兼賜老子道德經王喜館於佛寺按三國遺事高麗高句麗也本記云麗季武德貞觀間國人爭奉五斗米教唐高祖聞之遣道士送天尊像來講道德經王與國人聽之即第二十七代榮留王即位七年唐武德七年甲申也明年遣使往唐求學佛老唐帝高祖也許之及寶藏王即位亦欲興三教時寵相蓋蘇文説王以儒釋並峙而黃冠未盛特使於唐求道教時普德和尚住盤龍寺憫左道匹正國祚危矣屢諫不聽乃以神力飛方丈南移于完山州孤大山而居焉即永徽元年庚戌六月也又本傳云乾封二年三月三日也未幾國滅今景福寺有飛來方丈是也已上國史大安八年辛未祐世僧統高麗大覺國師到孤大山景福寺飛來方丈禮普德聖師之真有詩云涅槃方等教傳受自吾師云云至可惜飛房後東明古國危跋云高麗藏王謂高句麗寶藏王也惑於道教不信佛法師乃飛房南至此山後有神人現於高麗馬嶺告人云汝國敗亡無日矣具如國史餘具載本傳與僧傳又到盤龍寺延福寺禮普德聖師飛房舊址云飛房靈迹瞻南地舊隱遺蹤禮此間浮石芬皇曾問道慨然長想未知還已上大覺國師集又按唐書云先是隋煬帝征遼東有裨將羊皿不利於軍將死有誓曰必為寵臣滅彼國矣及蓋氏擅朝以蓋為氏乃以羊皿是之應也又按高麗高句麗也古記云隋煬帝以大業八年壬申領三十萬兵渡海來征十年甲戌高麗王時高句麗第二十六代嬰陽王二十五年也上表乞降時有一人密持小弩於懷中隨持表使到煬帝船中帝奉表讀之弩發中帝胸帝將旋師謂左右曰朕為天下之主親征小國而不利萬代之所時右相羊皿奏曰臣死為高麗高句麗也大臣必滅國報帝王之讎帝崩後生於高麗十五聰明神武時武陽王國史榮留王名建武或云建成此云武陽未詳徵人為臣自稱姓蓋名金位至蘇文乃侍中職也唐書云蓋蘇文自稱莫離支猶中書令金奏曰鼎有三足國有三教臣見國中唯有儒釋無道教故國危矣王然之奏唐請之太宗遣叔達等道士八人國史云武德八年乙酉遣使入唐求佛老帝許之據此則羊皿自甲戌年死而託生于此則年才十餘歲矣面云寵幸説王遣請其年月必有一誤今兩存之也王喜以佛寺為道館尊道士坐儒士之上道士等行鎮國內有名山川古平壤城勢新月城也道士等呪敕南河龍加築為滿月城因名龍堰城作讖曰龍堰堵且云千年寶藏堵或鑿破靈石俗云都帝嵒亦云朝天石蓋昔聖帝時騎此石朝上帝故也蓋金又奏築長城東北西南時男役女耕至十六年乃畢及寶藏王之世唐太宗親統六軍來征又不利而還高宗總章元年戊辰右相劉仁軌大將軍李績新羅金仁問等攻破高句麗擒王歸唐附海東道教源流按文獻通考唐高祖時高句麗遣使請道教詔沈叔安持天尊像並道士至其國講五千文開釋玄宗自是始崇重之化行於國有類釋典按三國史高句麗寶藏王三年王遣使于唐求道教帝時唐太宗貞觀十七年也遣道士叔達等八人兼賜老子道德經王喜館於佛寺按高麗史文宗七年癸巳宋皇祐五年秋七月戊午禮司奏謹按唐書玄宗天寶八載閏六月庚寅上親謁大清宮册聖祖玄元皇帝等五尊號御含元殿受羣臣上策大赦天下乞依此制每閏月朔御便殿視朝制可又睿宗二年丁亥宋徽宗大觀元年也閏八月庚子始置元始天尊像於玉燭亭令月醮又按宋史云高麗王城有佛寺七十區而無道觀大觀中朝廷遣道士往乃立福源院置羽流十餘輩又按高麗道經云高麗道士之服不以羽衣用白布為裘皂巾四帶比之民俗特其袖少褒裕而已又云福源觀在王府之北大和門內建於政和門前榜曰敷錫之門次榜曰福源之觀嘗聞殿內繪三清像而混元皇帝鬚髮皆紺色偶合聖朝圖繪真聖貌像之意亦可嘉也前此國俗未聞虛靜之教今則人人咸知歸仰云又云臣聞高麗地濱東海當與道山仙島相距不遠其民非不知向慕長生久視之教第中原前此多事征討無以清淨無為之道化之者唐朝之興尊事混元始祖故武德間高麗謂高句麗也遣使自請道士至彼講五千文開釋玄微高祖神堯奇之悉從其請自是之後始崇道教踰於釋典矣大觀庚寅天子眷彼遐方願聞妙道因遣信使以羽流二人從行遴擇通達教法者以訓導之王俁篤於信仰政和中始立福源觀以奉高真道士十餘人然晝處齋宮夜歸私室後因言官論列稍加法禁或聞王享國日常有意授道家之籙期以易胡教其志未遂若有所待然高麗國經乃徐兢撰按高麗史毅宗十六年三月諫官伏閣請罷別貢王酷信陰陽祕祝之説每於行在集僧道數百人常設齋醮糜費不資帑藏虛竭別貫即齋醮之費也按東文選高麗時薦福于佛寺之文曰疏如慶讚法華經法席疏水陸齋疏等是也醮祭于道觀之文曰青詞如冬至太一青詞乾興殿太一青詞王本命青詞北斗青詞福源宮行誕日醮禮青詞神格殿行中元醮禮青詞上元下元等醮青詞三清青詞靈寶道場青詞太陰獨醮青詞昭格殿行祈雨兼星變祈禳醮禮青詞摩利山塹城江華醮禮青詞等文皆是也高麗恭愍王十九年明洪武三年帝遣道士徐師昊來祭山川按朝鮮東國輿地勝覽昭格署在北部鎮長坊有三清殿掌三清星辰醮祭置令一人別提參奉各二人鎮長坊有三清洞洞中有星祭井按慵齋叢話云昭格署皆憑中朝道家之事太一殿祀七星諸宿其像皆被髮女容也三清殿祀玉皇上帝太上老君普化天尊梓潼帝君等十餘位皆男子像也其餘諸壇設四海龍王神將冥府十王水府諸神題名位版者無慮數百矣獻官與署員皆白衣烏布致齋以冠笏禮服行祭祭奠諸果餐餅茶湯與酒焚香百拜道流頭冒逍遙冠身被斑爛黑衣鳴磬二十四通然後兩人讀道經又書祝詞於青紙此謂青詞者歟而焚之其所為有同兒戲而朝廷仕職虛奉祓社一祭所入其費不資余作詩曰南宮學士髮星星白服鳥巾苦乞靈却怕朋僚爭指笑老君來禮老君庭又云宮中誕兒有捲草之禮誕生之日綯藁索懸于室門扉上命大臣多子無災者三日齋于昭格殿設醮祭尚衣院供五色彩縀各一匹男則幞頭袍笏烏靴金帶女則叉簪背子鞋履等物陳于老君前以祈遐福夜分祭畢獻官吉服令人擔布段冠服前導詣闕至室門外陳列卓上焚香再拜內人受之而入獻官捲藁索納諸袋中貯諸漆函以紅袱裹之出門外謹封其函授內資寺正正奉之而行納于其司庫內若女則內贍司主之甲寅春元子誕生余為獻官行此事慵齊姓名成侃今俗亦有此風人家生兒綯藁索橫懸于大門男則用辣椒俗云苦椒女則用炭片夾于索目三個日間禁忌外人入來名曰禁索至第三朝洗兒作白飯藿羹各盛三小碗設於産室兒側以禱于三神賜兒福壽按徐四佳居正筆苑雜記云或問於豫曰中國則佛教道教並行而道教尤盛我東佛教雖盛而道教絶無豫曰我東有昭格署摩尼山江華塹城醮祭之類是也乃道家之一事士大夫家每歲初祈福若修繕營造等事禳災必用盲瞽五六七人讀經其所祝者皆星辰真君之類供費不資謂我東不行道教者非料事者也盲瞽祈福禳災不見於古人不行於中國但我東時俗相傳故事耳胡僧難陀度僧漢山百濟枕流王元年晉孝武帝太元九年胡僧摩羅難陀至自晉百濟佛法始於此越明年百濟創佛寺於漢山度僧十人尚玄曰按大芚志大芚志及大東禪教考按其著者雖云袖龍讀性草衣意洵同為編輯而其實則皆茶山丁若鏞謫居康津時纂述者也何以知之按大東禪教考跋云右大東禪教考一卷紫霞山房所編彙也在昔三邦鼎峙而竺教之流入參差未齊其流入之最晚熾之最盛者雞林是已及其混一之後麗濟通盛乃善乃遍末學寡陋不考其實冒昧為説者多是編也其禪家之禹鼎歟紺泉尹洞跋紺泉者即康津茶亭尹洙也亦即茶山之居停主人也自改其名為尹洞變茶山為紫霞山房者蓋諱其以儒者而著僧史之事也百濟枕流王元年胡僧摩羅難陀始自東晉越海至百濟創寺漢山今廣州度僧十人然其後佛法旋廢至南都扶餘之後法王始行佛法云云然則此時百濟之都在廣州而此云漢山似指南漢山也雖然北漢山亦不過隔一葦之地則所謂漢山未可確知是南是北且按古史漢山多指北漢而言今若欲明漢山所在非先考慰禮城百濟舊都之位置與沿革及漢城志則不可知也家父所著地志書名及著者名已見前有可考據者故今引證如左慰禮沿革慰禮城者百濟始祖首都之地也溫祚即優台之子而優台者北夫餘王解夫婁之孫也漢成帝鴻嘉三年與其兄沸流率十臣南渡浿帶二水遂至漢山都慰禮城越十三年徙都漢南即河南慰禮城今之廣州古邑也南慰禮雖已成都北慰禮益加修營蓋當時以為南北二京溫祚王既卒之百十年百濟始築北漢山城今之京城北坊也北慰禮故址蓋在今京城東北十里之地三角山之東麓今人誤謂之漢陽古縣乃鄭麟趾地理志以今稷山指為河南慰禮城非也百濟史云溫祚王八年漢成帝元延二年靺鞨賊來圍慰禮城王閉門不出經旬賊糧盡而歸王簡鋭卒追及大斧峴在今平康一戰克之按此時靺鞨樂浪連歲侵寇以其慰禮城在漢水之北與二寇密接故也此云靺鞨者咸興之濊人也樂浪者春川之士酋也慰禮城之在漢陽東北審矣其謂之慰禮者方言凡匡郭之四圍謂之圍哩慰禮圍哩聲相近也樹柵築土以作匡郭故謂之慰禮也百濟史云溫祚王十三年漢哀帝元年夏五月王謂臣下曰國家東有樂浪北有靺鞨侵軼疆境少有寧日勢不自安必將遷國豫昨出巡觀漢水之南土壤膏腴宜都於彼以圖久安秋七月就漢山下立柵移慰禮城民戶八月遣使馬韓告遷都九月立城闕畫定疆域北至浿河南限熊津西窮大海東極走壤走壤今春川也按溫祚當時明自漢北移都漢南漢水即洌水則慰禮城之本在漢北確然無疑又百濟史每以漢陽為北漢山郡北漢山者對南漢山而立名也但以本紀初年有河南慰禮城一語故後之人遂求慰禮城於漢水之南所以轉輾迷晦而終不能有所指的也百濟史云溫祚王元年沸流溫祚兄溫祚與千臣南行渡浿帶二水至漢山已上溫祚元年事登負兒嶽三角山望可居之地沸流欲居海濱十臣烏干馬黎等諫曰惟此河南之地北帶漢水東據高嶽南望沃澤西阻大海其天險地利難得之勢作都於斯地不亦宜乎沸流不聽分其民歸彌鄒忽忽城也今仁川文鶴山以居之溫祚都河南慰禮城按登嶽以下乃溫祚王十三年事史臣追記其建國立都之本故遂以載之於元年也慰禮城者明在漢水之北其云河南慰禮城者以其移慰禮之民戶而冒故名也其始也溫祚兄弟並力築慰禮城而居之至其十三年北困於靺鞨東敗於樂浪徙居漢水之南以避二寇之侵軼蓋以慰禮城在漢水之北與二寇連陸故必至移都而沸流貪魚之利而取彌鄒忽今仁川溫祚覽關防之固而取河南今廣州古邑宮村於是移慰禮之民以實漢南之柵仍名之曰河南慰禮城百濟史云溫祚王十七年漢哀帝元壽元年春樂浪來侵慰禮城又云二十七年馬韓二城降移其民於漢山之北又云四十一年春二月發水漢東北諸部落人年十五歲以上修營慰禮城按漢水東北部落者今楊州平邱龍津兔院等地也慰禮城之在今漢陽城東北不既明甚乎百濟史云蓋婁王五年漢順帝七年春二月築北漢山城又云責稽王元年晉武帝太康七年冬徵發丁夫葺慰禮城按此文知北漢山城非慰禮城也書築書葺筆法各殊凡有事舊城曰修曰葺惟新起之城曰築某城蓋慰禮城溫祚王之所築而屢經焚毀故曰葺北漢山城蓋鹵王之創建新築故曰築當時漢城必有南北兩城也蓋鹵王時句麗來圍漢城先拔北城移攻南城則非兩城之證乎又按北漢山城者謂依此漢山而為城非謂其城於山上也今京城北坊是也今之北漢山城乃康熙年間所築在三角山上非百濟之古城也金富軾地志云漢陽郡本高句麗北漢山郡按漢陽古縣即今京城北坊漢陽洞是也惠化門外未十里有古城遺痕今人指之謂漢陽古縣者豈非慰禮城之古址乎當時但樹柵而築土故今有痕而無石也鄭麟趾地志云稷山縣本慰禮城百濟始祖溫祚王開國建都後高句麗取之改為蛇山縣新羅因之按溫祚王渡浿帶二水以都慰禮稷山之北惟浿帶二水乎溫祚王發漢水東北之民以修慰禮稷山在漢水之東北乎溫祚王避靺鞨樂浪徙都漢南稷山其與靺鞨樂浪鄰乎北史隋書明云百濟始立國於帶方故地稷山豈亦帶方故地乎又按徐居正稷山濟源樓詩序略曰此百濟氏之古都其曰濟源者得不以百濟之源源於是乎噫客館之一小樓本無可名故當時仍無題榜即濟源二字假使金石遺文舊有傳授執此二字命之曰百濟古都太武斷也若然錦山之濟源驛不得為百濟之舊都乎二百里外山川土壤不可望而知之則登負兒嶽相稷山又何説也其所以定為慰禮無他證據惟三國史是憑也今考三國史明自漢北移於漢南徐公何曾夢見此史乎鄭徐所記未免謬戾但其故老相傳必有其因不可悉歸虛妄也據百濟史蓋鹵王知有句麗之亂先遣太子文周使之南奔及蓋鹵遇害文周徙都態津稷山者文周王暫駐之地也蓋自漢城南距態津稷山居中暫駐此縣北探舊都之消息南管新都之事務於理宜然也漢城志漢城百濟蓋婁王之所開荒今京城漢陽洞即其故址也百濟史云漢順帝七年春二月築北漢出城按溫祚王十四年築城於漢江西北分漢城民輿地勝覽以此為漢城之始殆不然也百濟史漢城之傍有阿且城輿地勝覽漢江之上有長安城溫祚王所築蓋此城也漢城若為溫祚王所築則不當曰蓋婁王築之也金富軾地志云漢陽郡本高句麗北漢山郡鄭麟趾地志云南京留守官楊州本高句麗北漢山郡一云南平壤城輿地勝覽云漢城府本高句麗北漢山郡百濟溫祚王取之築城近肖古王自南漢徙都焉按洌水丁若鏞曰溫祚王十四年句麗琉璃王未離卒本即鴨水以南未踐一步奚暇置北漢山郡為溫祚所取乎此皆諸史家不核之言也漢陽本漢郡帶方之故地而其破荒者百濟也至蓋婁王始築漢城尋為句麗所焚乃金志以後每以漢陽指為句麗之郡不亦謬乎又溫祚王十四年所築漢江西北之城乃百濟史所謂阿且城與覽所云長安城在今廣津之峨嵯山上非漢城也其云漢江西北者今平丘渼陰之江通稱漢江也至近肖古王二十六年乃自漢南徙都漢城自是厥後或居漢南或居漢北百濟史云近肖古王二十六年東晉簡文帝元年冬王與太子率精兵三萬侵高句麗攻平壤城句麗王力戰拒之中流矢死王引軍退移都漢山按此云移都者自河南慰禮城北遷于漢城也百濟始弱避寇南渡及其疆域既廣兵力既強反足以東侵新羅北困句麗於是乃渡漢水據其北以號令四國也漢山者漢城山今之漢陽洞是其故址也金富軾地志云溫祚以漢鴻嘉三年癸卯自卒本夫餘至慰禮城立都稱王歷三百八十九年至近肖古王十三世取高句麗南平壤古記云取句麗南平壤移都漢城按百濟史蓋自溫祚王時已得浿河之南此指遂安谷山浿河上流之地凡定疆界撫飢荒皆至浿河之南即今之遂安谷山尚不得為高句麗之所有况漢陽之城是百濟根本之地腹心之藏乃謂之本句麗之南平壤可乎平壤原有二城東曰東黃城南曰長安城古記之云南平壤謂平壤之南城也當時偶墮其城遂云取之非真據之為京邑也蓋近肖古王二十六年既攻平壤又移都漢山此自是二事金志合作一事遂以漢陽為句麗之南平壤夫平壤句麗之南京也伊時故國原王移都東黃句麗何嘗失平壤於百濟百濟何嘗取漢山於句麗哉百濟史云辰斯王枕流之弟八年晉武帝太元十七年句麗王談德來攻北鄙王聞談德能用兵不得出拒漢水北諸部落多沒焉阿華王枕流之子四年冬王欲報浿水之役談德之難親率兵七千人過漢水次於青木嶺松嶽下會大雪還軍至漢山城按此二文知近肖古之後未嘗久都北漢也此時王居漢南故漢水之北謂之北鄙若阿莘王在漢北則豈可云親率兵過漢水乎其不在漢北明矣至蓋鹵王末年句麗焚燒漢城而百濟南遷漢城為百濟之舊京百濟史云蓋鹵王二十一年宋廢帝三年秋九月句麗王巨璉率兵三萬來圍王都漢城王閉城門不能出戰麗人分四道夾攻又乘風縱火焚燒城門王迎數十騎出門西走又云麗兵攻北城七日而拔之移攻南城王出逃按此云漢城者北漢城也南漢本無南北二城又南漢之西即阻大江無由出門西走也北城者慰禮也南漢者漢城也其後五十餘年漢城及漢北州郡猶屬百濟武寧王既卒後三十餘年漢城之事不見史册百濟史云武寧王七年冬高句麗攻漢城進屯橫嶽下王出師退之二十三年梁武普通四年王幸漢城徵漢北州郡民築雙峴城按此時武寧王徵漢北州郡民築雙峴城則漢水以北猶屬百濟未嘗為句麗有也尚玄曰百濟之自漢南移都漢城在近肖古王枕流之父二十六年至枕流王二年創寺漢山之時不過十四年之久且不見枕流王居漢南之明文則創寺之漢山不可斷為廣州如大芚志所云也愚謂創寺漢山者非在漢山之上而在漢城之中蓋漢山者州名也非山也以佛教在輸入之初故其所創寺院必在王城至近之地如高句麗小獸林王創九寺於平壤今平壤寺洞句麗舊都有古寺址故至今人尚呼寺洞又永明寺亦在今之平壤城邊但永明為九寺之一數不乎則未可知也又如新羅當佛教輸入之初七處伽藍一曰金橋東天鏡林二曰三川岐三曰龍宮南四曰龍宮北五曰沙川尾六曰神遊林七曰壻請田等處皆創寺在王京之內今慶州也今就北漢山之事迹言之真興王十六年冬十月王巡幸北漢山拓定封疆今有真興王巡狩碑在三角山之南麓高峰之上人呼碑峰北漢山有狼迹寺即今之僧伽寺按李預撰重修僧伽窟記案崔公致遠文集昔有新羅代狼迹寺僧秀台飫聆大師之聖迹尋選勝于三角山之南面開巖作窟刻石模形大師道容益照東土朝家如有乾坤之變水旱之災民所可疑之事禱以禳之無不立應故遣使春秋設齋各三日歲初兼獻襯衣用為恆例云云漢山古有壯義寺新羅太宗王六年己未創建按三國遺事初與百濟兵戰於黃山之役長春郎罷郎死於陳中後討百濟時見夢於太宗曰臣等昔者為國亡身至於白骨庶欲完護邦國故隨從軍行無怠然而迫於唐帥蘇定方之威逐於人後耳願王加我以小勢大王驚怪之為二魂説經一日於牟山亭又為創壯義寺云云又按朝鮮慵齋叢話世宗大王時洪益城徐達城李明憲等數人讀書于藏義寺云云則寺之廢在乎朝鮮之中葉矣三角山舊有息菴高麗大覺國師留題一詩曰講徹香林香林講天台十不二門訪息菴崎嶇松徑撥煙嵐當年龍井攀高論見景思人悵不堪豫於元豐元祐之間訪道江南曾訪餘杭龍井寺與辨才大師終日講論天台宗彼有兩菴與此略同不覺思久也三角山舊有仁壽寺大覺國師禮文殊聖像詩云五臺現化非徒爾三角分身豈偶然唐帝回鳴鳳輦吾君纍此早留篇自德宗以下代代行幸文宗有詩一篇三角山今有津寬寺高麗津寬祖師所創故名云云朝鮮太祖建水陸社於此寺以薦祖宗冥福其社已廢不知何時三角山中心地有寺名曰重興高麗忠惠王二年元至正元年辛巳普愚禪師因檀越蔡河沖金文貴邀請來住大張梵宇闡揚禪風師又卓菴於東峯扁曰太古倣永嘉體作太古菴歌一篇時發長歌住了五年六年丙戌師年四十六入燕都至湖州霞霧山謁石屋清珙禪師具陳所得且獻太古菴歌珙問空劫已前有太古耶無太古耶曰空生太古中珙師微笑云佛法東矣遂以袈裟表信八年戊子春師東還本國挂錫重興寺十六年丙申恭愍王封為王師禮遇隆摯洪武十五年壬戌十二月二十三日入寂于楊根之小雪山賜諡圓證樹塔于重興寺之東峰曰寶月升空作石鍾藏舍利李穡作碑文權鑄書之尚玄曰百濟摩羅難陀始創寺度僧於漢山羅麗兩代遂為佛法常住之地太古愚公住錫留塔而漢山遂為朝鮮佛子第一紀念之地矣朝鮮肅宗時築北漢山城城內共有十餘寺曰重興寺太古寺露積寺西巖寺慶興寺國寧寺圓覺寺扶旺寺普光寺保國寺龍巖寺及奉聖庵等癸丑春余登漢山禮太古國師舍利塔遂留一絶曰白雲飛盡晝陰移寂靜還如太古時唯有愚公來作祖諸山羅列是孫兒謙益齎梵本之律文彌勒佛光寺事迹云百濟聖王七年丙午既是丙午則非七年乃四年也今考正之沙門謙益矢心求律航海以轉至中印度常伽那大律寺學梵文五載洞曉竺語深攻律部莊嚴戒體與梵僧倍達多三藏齎梵本阿曇藏五部律文歸國濟王以羽葆鼓吹郊迎安于興輪寺召國內名釋二十八人與謙益法師譯律部七十二卷是為百濟律宗之鼻祖也於是曇旭惠仁兩法師著律疏三十六卷獻于王王作毗曇新律序奉藏于台耀殿將欲剞劂廣布未遑而薨尚玄曰百濟戒律之宗傳此方者失却本源傳日本者還有實證按元亨釋書云善信尼司馬達等之女也敏達十三年從惠便高句麗僧出家同伴二女共剃髮一禪藏梁人夜善之女二慧善錦織之女大臣蘇馬子營精舍迎三尼供養用明二年信白馬子曰出家之人以戒為地願赴百濟受戒學崇峻元年百濟威德王三十四年戊申馬子付信百濟使求法發遣三年春信等三尼自百濟皈住櫻井寺又按和漢三才圖會云崇峻元年蘇我馬子大臣請百濟僧等問受戒之法是日本僧之始也日本佛教略史云崇峻元年四月善信尼等來百濟學戒律三年受十戒六法而皈是日本戒律之始又按日本高僧傳釋觀勤百濟國人研究三論旁通外學推古十年壬戌冬十月受選來朝勑居元興寺擇俊秀者就勒學書甲申年有比丘殺害祖父帝召羣臣曰夫沙門者皈敬三寶從事戒法何無慚慎作此惡逆朕甚愧之僧尼犯罪者悉捕刑之乃詔諸寺索惡比丘一時僧尼多逢稽疑勒上表曰佛法自至東漢經三百歲傳之百濟已一百年百濟先主聞日本天皇睿聖敏明貢上佛像經論未滿百歲是以僧尼不習法律所以作大逆職而斯由也今聞聖制惶懼不知所如伏願除大逆者其餘悉赦勿罪是所憲章之正仁政之及也帝重詔曰道人犯法何以誨世俗自今以往應置僧正僧都檢校僧尼勒任僧正高句麗德積為僧都是本朝立僧綱之始也云云吳音法明誦經對馬日本人維摩會緣起大織冠官名鎌足姓藤原氏執政時百濟禪尼法明來于對馬吳音誦維摩經因名吳音曰對馬讀此乃吳音之起源也云云又按元亨釋書法明尼百濟人齊明二年百濟義慈王十五年丙辰內臣鎌子連寢病百方不瘥明奏曰維摩詰經因問疾説大法試為鎌子連讀之帝詔讀之未終卷病即愈王臣大悅贊曰東晉有尼道馨説維摩經聽者如市然者尼之有講者尚矣而明一讀未畢沉疴早差其為效豈不愈哉爾後淡海公於植槻場創維摩會移興福寺于今轉盛豈明之餘烈乎云云又按添上郡興福寺所記維摩會於講堂行之大織冠有疾既危時有百濟國尼法明者曰讀誦維摩經中問疾品可愈也仍令僧讀之果平愈其後處處修維摩會云云蓋日本有漢音唐音吳音之別今見日本人讀佛書經名必用吳音倘是法明之遺法也歟雖然法明既云百濟之人則吳音何自而來究未可知也按日本高僧傳元興寺僧福亮及法隆寺僧智藏者皆本吳國人而隨高句麗僧慧灌學習三論宗旨者也則日本人之以吳音誦經料必出於此時此人也今繫二人之史傳于左和州元興寺沙門福亮傳釋福亮姓熊凝氏本吳國人來朝出家從高麗慧灌僧正習稟三論兼善法相又入支那謁嘉祥師重研本宗住元興寺熾唱空宗敕任僧正齊明四年百濟義慈王十七年戊午大織冠鎌足公於山科陶原家新建精舍延亮講淨名經是南都維摩會之權輿也吳音必始於此時也和州法隆寺沙門智藏傳釋智藏者吳國人福亮法師在俗時之子少隨慧灌僧正於元興寺習究空論之旨又入唐國質餘蘊歸住法隆寺講誘衆僧白鳳元年詔任僧正不記其終大安寺道慈元興寺智光禮光藏之徒也又釋神泰受三論於福亮居元興寺為衆開講名侔智藏有弟子宣融一人宗付相續至于六世矣扶桑佛教始自百濟海東三國俱傳佛法而百濟以最初之佛法傳于日本是為百濟佛法之特色具載史乘即百濟聖王三十年壬申日本欽明天皇十三年西洋紀元後五百五十二年冬十一月遣怒唎斯致等於日本贈佛像經卷日本書紀云欽明天皇十三年冬十月百濟聖王遣西部姬氏達率斯致契等獻金銅釋迦像一軀彌勒石佛及幡蓋經論若干卷且貽書勸之曰是法於諸法中最為殊勝周公孔子尚不能知能生無量福德成就無上菩提云云日本佛法實始于此從是以後代有賢聖入唐及宋傳得諸宗歸國弘通今依日本佛教略史所載列舉諸宗緣起如左三論宗推古天皇三十三年高麗謂高句麗沙門惠觀至日本弘三論宗於元興寺是日本開宗之始又三論宗自唐傳至凡有三次一曰惠觀僧正傳二曰智藏僧正傳智藏是惠觀之法孫越海入唐傳受三論史失其年代三曰道慈律師傳道慈智藏之弟子也文武天皇大寶元年入唐總傳六宗以三論為本宗歸朝之後於大安寺弘通之於是名哲繼踵西大寺玄睿律師法隆寺道詮律師等最其翹楚至中古唯流傳東大寺餘皆滅今則全無矣此時又傳成實宗爾後以成實附屬三論不別立宗故謂之附屬宗法相宗孝德天皇白雉四年元興寺沙門道昭入唐就玄奘三藏學法相宗歸國後弘之於元興寺法相宗總有四傳一道昭傳弘於元興寺謂之南寺傳二齊明天皇四年智通智達兩師入唐就玄奘及慈恩學歸而弘傳三其後五十五年文武天皇大寶三年新羅僧智鳳智鸞智雄三師奉敕入唐學於濮楊大師歸朝弘傳四其後十三年當元正天皇靈龜二年玄昉入唐亦學于濮楊歸朝弘於興福寺謂之北寺傳就中以北寺傳為相宗之正義爾後數百年本宗獨榮於南部以對峙睿山之天台高野山之真言而中世以後漸行衰退名閣巨藍杳然絶迹維新後再興之以現今法隆寺興福寺為本寺寺院凡存二十五所華嚴宗聖武天皇神龜七年唐沙門道璿齎華嚴宗章疏來其後新羅沙門審詳講説之華嚴宗大興道璿律師雖齎華嚴章疏來而未講敷至天平十二年因良辨法師之請審詳始開宗講説聖武天皇大為崇敬以東大寺為本寺盛弘通之其後千有餘年高僧接踵尤極隆盛最後衰微屬於他宗明治十九年更為重興本寺本宗凡統轄末院二十三寺戒律宗孝謙天皇勝寶六年唐沙門鑑真來化真自唐來經十二年遭六次大難至是始達帝及聖武上皇率諸王百官迎之於東大寺真乃築壇於大佛殿前行授戒式帝已下受戒者四百餘人戒律始盛未幾創戒壇院於東大寺之西隅此為戒壇院之始後又於下野藥師寺及築前觀音寺建戒壇是稱日本三戒壇也佛教傳日本以來至是二百三年其間雖受戒於百濟學律於大唐又有律師來朝者然諸緣尚有所缺未行壇法鑑真來始行之故推鑑真和尚為日本傳律之高祖真所傳者四分律也後創招提寺為本寺盛弘戒律其後漸衰戒律殆至拂地鳥羽天皇時中川實範上人中興之尋興正菩薩又提倡於西大寺至今諸宗雖尚傳戒受律而彼三戒壇則久廢絶矣天台宗桓武天皇延曆二十四年唐順宗永貞元年八月最澄自唐歸朝最澄謁天台山國清寺道邃和尚受學天台宗又於越州龍興寺謁順曉阿闍黎傳受真言宗於唐興縣謁儼然禪師稟承禪宗歸朝後帝詔弘天台宗初鑑真和尚賫來天台章疏而未敷講至是始立為宗故天台宗以傳教大師最澄為開祖也日本台宗有三派曰天台宗開祖即傳教大師本寺為延曆寺末寺下院中院有三千五百七十所曰寺門派以傳教之法孫智證大師為開祖師入唐受台宗歸而弘通於三井園城寺謂之寺門派現有寺院六百五十三處曰真盛派後土御門天皇文明年中真盛上人出睿山住江劦板本西教寺宏弘念佛是為真盛派末寺有四百二十所真言宗平城天皇大同元年唐憲宗元和元年空海自唐歸空海在唐受真言教有青龍寺慧杲阿闍黎帝敕於和泉國植尾山寺弘通之至嵯峨天皇誠篤敬信密教大興空海又傳來一切有部律世稱真言律宗者是也先是真言宗傳來已久專一弘布則始於弘法大師繼嗣弘法衣鉢者有十師第十師一號源仁仁門下有二傑一名益信開仁和寺廣澤派之始祖也二名聖寶開醍醐寺小野派之始祖也廣澤又分為六小野亦分為六是為真言十二派然皆事相上之區別非教旨上之分派也教上之分派則有新古二義古義者高野山也新義者興教大師覺鍐出自廣澤六派中於紀州根來寺傳法院別立一家者是也根來者尋毀於豐臣秀吉智豐兩山智積院長谷寺繼其武而興明治九年諸山合併以東寺為本寺一宗總轄寺宇一萬一千二百七十四所融通念佛宗崇德天皇天治元年宋徽宗宣和六年大原沙門良忍奉敕開融通念佛宗良忍尾州富田人年十三登睿山稟台教於沙門良賀嘉保二年入大原山松林院永緣室又從永竟受密灌兼諳練音曲究淨土法音遂依大原創來迎寺張顯密教開聲明梵唄古今習聲明梵唄者皆祖述於師云融通念佛宗者取融通一切功德而攝於彌陀名號中之義以立名也其宗要則往生成佛之極功唯在稱念彌陀一句名號其本山為攝津之大念佛寺末院有三百五十七所淨土宗二條天皇長寬四年宋孝宗乾道元年圓光大師源空出黑谷空居洛東吉水唱專修念佛朝野靡然歸之是為日本淨土宗之始祖日本之淨土宗所謂支那善導派也根本分四派曰鎮西派是聖光房辨阿於築後善導寺開之曰西山派是善惠房證空於西山粟山野建光明寺弘之曰長樂寺派是隆寬建圓山長樂寺別出之派曰九品寺派是覺明創洛北九品寺別開出之此四皆圓光大師之高弟也此中九品長樂二派已亡鎮西西山二派尚繁盛其中西山派又分西谷小谷深草東山四派而以光明寺為本寺總轄之其寺院現有一千零七十四所鎮西派又分關東三派曰白旗藤田名越又分京都三派曰三條一條小幡共六派其中彌滿全國者彼所謂知恩院增上寺等十八檀林者亦此派所攝後柏原天皇敕以知恩院為淨土宗之總轄慶長以後以增上寺為十八檀林之長明治維新之後分為東西二部三河以西為西部知恩院轄之遠江以東為東部增上寺轄之後至明治十七年廢止其例以知恩院增上寺淨華院知曇寺金戒光明寺為五本山輪次為管理長後又復其故以知恩院為管轄本所其寺院總有七千二百二十八處禪宗土御門天皇建仁元年宋寧宗嘉泰元年源賴家創建仁寺延沙門榮西為開祖西備中人十四落髮登睿山研究台教十九入伯耆大山傳受密乘仁安三年入宋得天台新章疏三十餘部及文書若干卷而歸授與座主明雲文治三年再入宋謁黃龍八世孫靈菴敬禪師承臨濟正宗建文二年歸朝將軍源賴家服其德躬為大檀越大贊弘布是為日本臨濟禪宗之開祖禪宗在支那有五家七宗之支派傳於日本者僅有三派一臨濟宗是榮西禪師歸朝後創建仁寺弘之其後於京都鎌倉各搆五山十剎明治十三年定為十派曰天龍寺建仁寺東福寺相國寺南禪寺妙心寺大德寺建長寺圓覺寺永源寺是也十派總有六千二百二十三寺二曹洞宗是後堀河院時道元禪師入宋所傳授歸朝後立永通寺弘通之曹洞宗立二本寺分五派二本寺者永平寺及總持寺是也總持寺為道元四世法孫紹瑾所建五派者總持寺第二世紹碩下所分之派曰大源通幻無端大徹實峯是也此宗總有一萬三千七百四十二寺三黃檗宗是後光明帝時明黃檗山隱元禪師來日本建萬福寺於山城國菟路弘通之有六百四十八寺已上三派為日本禪宗真宗後堀河天皇元仁元年真宗開祖親鸞見真大師於常陸國稻田製教行信證文類為開宗本書此宗以弘彌陀真實之教之意故名真宗即依他力以回向之信心作往生淨土之真因以信後相續之名稱為報答佛恩之行業無有宗規聽許蓄妻噉肉亦無戒律倫理綱常悉如俗子此宗今分十派曰本願寺派文永九年親鸞季女覺信尼及孫如信等於洛東大谷創寺龜山天皇賜以久遠實成阿彌陀本願寺之號而以如信為本願寺第二世主文明九年移於山科天文元年移於大坂爾後經歷紀劦鷺之森泉州堺攝州天備等天正十九年轉移今之堀川其寺凡有一萬零四百二十七曰大谷派其初同於本願寺至十一世顯如之長子光壽更於鳥丸作本寺稱為又本願寺者是也有八千八百五十四寺曰佛光寺派親鸞弟子真佛住持之所當時京都有五條坊門者是也其寺有三百三十七曰高田派親鸞於下野高田創專修寺付於弟子真佛至寬正年中真惠移寺基於伊勢一身田者是也末寺有六百二十六曰本邊派即江劦錦織等元係天台宗親鸞重興之而改真宗者是也末寺有五十四曰興正寺派文明年中佛光寺經豪與其徒數人歸本願寺蓮如其所建寺號興正寺以屬於本願寺明治九年新立一派者是也寺院有二百五十二曰出雲路派京師元有出雲路親鸞之子善鸞之所住也其後遷於越前今立郡清水頭村所謂毫攝寺是也末寺有四十四曰山元派越前橫越村證誠寺是也末寺有十所曰證成寺派在越前鯖江末寺有四十四曰三門徒派越前中野專照寺是也末寺有三十已上十派總為真宗也日蓮宗後深草天皇建長五年沙門日蓮唱法華宗蓮係安房人幼而活潑英邁夙有才名登睿山習學台宗深達用顯妙義於是排餘宗創立一宗日蓮宗者依能弘人而立名也又依所弘之經亦云法華宗宗義者以立定安國論為指歸以稱妙法蓮花經題目即感得常寂光妙土而全一生成佛之本懷此宗現有八派曰日蓮以身延山久遠寺為本山稱曰日蓮宗攝末寺三千六百八十五曰妙備寺派是天授五年日什所立轄寺五百八十九曰興門派是日興之所開以本門寺等八寺輪為管長統寺二百九十八曰八品派有本能寺等五本山輪置管長管下寺三百三十三曰本成寺派在越後蒲原郡祖為日印管下有一百八十寺曰本隆寺派亦屬日印管下有十四寺曰不受不施派文祿年中妙覺寺日興唱之元祿年中禁止其派明治九年許開之并復妙覺寺之號有信徒教會十四所曰不受不施講門派祖稱日和與不受不施派其義稍異明治十五年得官許亦無寺院教會時宗後宇多天皇建治二年沙門一遍提唱時宗遍字知真伊豫人學台宗於睿山讀止觀諸經所讚多在彌陀乃傾心淨土專念之教文永三年從西山聖達受念佛宗旨於是自開一宗後於相模國藤澤創本寺正應二年卒於攝津兵庫觀音寺年五十一時宗者一名六時往生宗以晝夜六時修善導往生禮讚為往生業因之故也其宗義在專修念佛本山即相刕藤澤法淨光寺此寺住職通稱遊行上人別號阿彌陀佛欲住本寺必遍遊諸國勸念佛及現住入寂乃還寺為住職以是為通規分十二派於清淨光寺本立管長末寺有四百八十九已上所列十五宗派共為日本佛教之全體也明治元年三月禁神佛混淆廢寺僧別當職五年二月廢僧位僧官三月置教部省廢女人結界之制又降特旨以本願寺東本願寺專修寺興正寺佛光寺錦織寺各住職為華族四月置教導職是月解禁止僧侶食肉娶妻之官制六月置諸宗管長九月使僧侶稱姓氏又廢修驗宗名歸入天台真言是月始置大教院於東京紀尾井坂尋遷之增上寺十一月除各總本山外盡廢無檀無住之寺六年正月廢談法説法之名稱使皆號為説教七年正月定僧尼族籍十二年八月廢教導職委宗權於管長判別政教且令制定諸宗宗制寺法台宗法融稟宗荊溪天台智者大師嘗謂法華為一乘妙典蕩化城之執教釋草菴之滯情開方便之權門示真實之妙理會衆善之小行歸廣大之一乘遂出玄義曰釋名辨體明宗論用判教相之五重也名則法喻齊舉謂一乘妙法即衆生本性在無明煩惱不為所染如蓮花處于淤泥而體常淨故以為名此經開權顯實廢權立實會權歸實如蓮之花有含容開落之義花之蓮有隱現成實之義名以召體體即實相謂一切相離實相無體故宗則一乘因果開示悟入佛之知見可尊尚故用則力用以開廢會之義有其力故然後判教相者以如來一代之説總判為五時八教五時者一佛初成道為上根菩薩説華嚴時二為小機説阿含時十二年三彈偏折小歎大褒圓説方等時八年四蕩相遣執説般若時二十一年五會權歸實授三乘人及一切衆生成佛記説法華涅槃時八年八教者謂化儀四教即頓教漸教祕密教不定教也化法四教即藏教生滅四諦通教無生別教無量圓教法華圓理也教理既明非觀行無以復性乃依一心三諦之理真俗中三諦也示三止三觀以法華經為本經以智度論為指歸以涅槃經為扶疏以本品般若經為觀法也一一觀心念念不可得先空次假後中離二邊而觀一心如雲外之月者此乃別教之行相也破一切惑莫盛乎空建一切法莫盛乎假究竟一切性莫大乎中故一中一切中無假無空而不中空假亦爾即圓教之行相如摩醯首羅天之三目非縱橫並別故龍樹菩薩智度論偈云因緣所生法我説即是空亦名為假名是名中道義先是北齊惠文依智度論悟此三觀妙理以授南嶽慧思慧思傳之智顗智顗大闡明之至于中唐荊溪尊者復崛起而中興之海東台宗源於荊溪朝説之般若經疏序曰陳隋間天台智者遠稟龍樹立一大教九傳而至荊溪荊溪復傳而至新羅曰法融曰理應曰純英故此教播於日本而海外盛矣釋門正統續高僧傳大唐西明寺沙門道宣撰沙門波若者俗姓高句麗人也陳世歸國在金陵聽講深解義味聞皇併陳遊方學業十六入天台北面智者求授禪法其人利根上智即有所證謂曰汝於此有緣宜須間居靜處成滿妙行今天台山最高峯名為華頂去寺將六七十里是吾昔頭陀之所彼山只是大乘根性汝可往彼學道進行必須深益不須愁慮衣食其即遵旨以開皇十八年往彼山所曉夜行道不敢睡臥影不出山十有六載大業九年二月忽然自下初到佛隴上寺淨人見三白衣擔衣鉢從須臾不見至於國清下寺仍密白善友同意云波若自知壽命將盡非久今故出與大衆別耳不盈數日無疾端坐正念而卒于國清春秋五十有二送龕山所出寺大門回輿示別眼即便開至山仍閉是時也莫問官私道俗咸皆歎仰俱發道心外視靈瑞若此餘則山中神異人所不見固難評矣天台智者開宗之先海東之人已有親稟慧思者宋高僧傳卷第十八感通篇第六之一陳新羅國玄光傳神僧傳釋玄光者海東熊州人也少而頴悟頓厭俗塵決求名師專修梵行逮夫成長願越滄波求中土禪法於是觀光陳國利往衡山見思大和尚開物成化神解相參思師察其所由密授法華安樂行門光利若神錐無堅不犯新猶劫其有染皆解稟而奉行勤而罔忒俄證法華三昧請求印可思為證之曰汝所證真實不虛善護念之令法增長汝還本土施設善權好負螟蛉皆成蜾螺光禮而垂泣自爾返錫江南屬本國舟艦附載離岸時則綵雲亂日雅樂沸空絳節霓旌傳呼而至空中聲云天帝召海東禪師光拱手避讓唯見青衣前導少選入宮城且非人間官厨羽衛之設也無非鱗介參雜鬼神或曰今日天帝降龍王宮請師説親證法門吾曹水部蒙師利益既登寶殿次陟高臺為問而談略經七日然後王躬送別其船泛洋不進光復登船船人謂經半日而已光歸熊州翁山卓錫結茅乃成梵剎同聲相應得法者蟄戶爰開樂小回心慕羶者蟻連倐至其如升堂受莂者一人入火光三昧一人水光三昧二人互得其二種法門從發者彰三昧名耳其諸門生譬如衆鳥附須彌山皆同一色也光末之滅同知攸往南嶽祖搆影堂內圖二十八人光居一焉天台國清寺祖堂亦安海東佛祖源流亦云玄光嗣行真惠思和尚證法華三昧天龍聽講元曉義相華嚴初祖海東華嚴宗淵源據高麗大覺國師之詩史則當以智異山華嚴寺創祖緣起祖師為最初之祖詩云偉論雄經同不通一生弘護有深功三千義學分燈後圓教宗風滿海東尚玄曰此詩首句之同字疑是罔字之誤然而無實迹可考若以公評言之不可不推元曉義相兩師為華嚴初祖也元曉之學或得於盤龍之普德大覺國師到盤龍山延福寺禮普德聖師飛房舊址詩云浮石芬皇曾問道慨然長想不知還蓋浮石指義相芬皇指元曉也或得於靈鷲之朗智三國遺事云元曉住磻高寺常往謁智智令著初章觀文及安身事心論曉撰訖使隱士文善奉書馳達其篇尾述偈云西谷沙彌稽首禮東嶽上德高巖前吹以細塵補鷲嶽飛以微滴投龍淵均未可知而見其髑髏悟心之機緣按指月録元曉入唐將訪道名山跋涉間關夜宿冢間渴甚引水掬取穴中得泉甘涼黎明視之乃髑髏也大惡吐之忽猛省歎曰心生則種種法生心滅則髑髏不二如來大師曰三界惟心豈欺我哉遂不復求師即還本國疏華嚴經大弘圓頓之教云云則元曉之學殆若自得者然所著經疏早播唐土皆稱華嚴宗主探玄記云元曉法師造此經疏立四教等也懸談云唐初海東法師亦立四教一三乘教如四諦緣起經等二三乘通教如般若深密經等三一乘分教如梵網經等四一乘滿教如華嚴經等義相於永徽初入唐終南山師事智儼傳華嚴歸本國於太白之浮石原州之毗摩羅伽倻之海印毗瑟之玉泉金井之梵魚智異之華嚴等十寺弘傳大教又因勝詮自唐還得賢首疏益明經旨教授十大弟子悟真智通表訓真定真藏道融良圖相源能仁義寂等會玄記云義相乃海東華嚴之初祖也海東華嚴始祖浮石尊者讚同知中樞院事朝議大夫檢校司空守禮部尚書翰林學士承旨知制誥充史館修撰官朴寅亮撰公諱義想新羅人也其遺芳餘美動滿大宋史傳三韓諺記豫公隙乘間披玩圖籍歷代高僧皆有讚頌惜哉浮石一聖未有人讚之惟新羅翰林學士崔公致遠有靈遊畫像讚十六句然此以舉佛山石體寺僧能現夢中之事述之似未盡浮石之餘美攬筆為文輒讚其德曰海印三昧舍那獨尊稱法界性開一乘門大雲覆世甘露滌煩付囑祖祖宣布言言雞貴義持鴻才傑出多能不羣九聖之一求無上師入終南室學了師亡往虛歸實善妙有色愛戀求歡見心匪石反誓行檀金鱗負艦利涉海瀾巨石浮空蓋護寺山十山遊講磨肩爭集衆石傾聽點頭如答西芥東針六師同葉前燈後燈十聖傳法手撰文義呪投火煙二百餘字燼餘有全字字投水行行編貝三十餘句屈曲成偈總華嚴義為法界圖煥然標的燦若璣珠寸紋知錦一毛知鳳略掇清芬輒成讚頌尚玄曰朴寅亮以崔致遠所撰靈遊畫像讚未盡浮石之美為憾雖然崔公已有別撰見于求禮郡智異山華嚴寺事迹中即崔致遠所撰海東浮石尊者義湘諱日之文曰譬夫燧人鑽木照天下之昏冥夏禹濬川通域中之滯塞則乃發揚智炬啓導情波使明真者免慮倀倀潤學者無憂浩浩傳燈妙業雅符變燧之功歸海真宗實賴決河之力然則於我東國耀佛華之光熖闢方廣之源流者其惟祖師之慧化乎伏惟大德高挺嶽靈深涵海量童年慕道壯志辭家捨華胄之簪裾標法門之冠冕始以教分頓漸義有淺深每嗟四郡之遐陬未達一乘之奧典乃言曰就室之火為小見照庭之日為大智是以務學不如務求師古之遺訓豈可孔匏徒繫魏瓠虛捐自追小魯之蹤遂決入秦之計時也濊戎貊寇烽舉柝驚言指道塗動多榛梗然而既切為山之志獨懷背水之心不憚艱危遠涉虎狼之國能逃災害豈憑羊鹿之車直泛重溟高登彼岸於龍朔二載唐高宗壬戌年詣終南山至相寺以儼和尚為嚴師以藏和尚為益友受業則若翻瓴水傳宗則如走坂丸有滯必通無幽不測悟百千偈敵三十夫執柯而既遂伐柯學海而終能至海十年精練萬里流傳振龍樹之餘芳播雞林之遠俗顯敷妙義遍諭羣迷披聵以法雷開矇以智月遂得慈航廣濟化人而永謝愛河法太長驅救物而皆離燬室一自寂滅為樂虛空是宗每懷慥慥之誠但想循循之誘不陟鷲頭之嶺自達妙音能持鵲尾之爐競尋懿躅高山仰止何日忘之是以弟子性起等悲切藏舟感深入室同成社會用報法恩每值忌辰仰談遺教伏願祖師大德兜率陀之天上汲引衆流摩竭提之國中照臨法界海融智慧雲覆慈悲傳佛心而盡玩雜華舉寶手而長攀聖果劫灰雖盡香火無窮又智異山華嚴寺事迹中崔致遠所撰故終南山華嚴大宗主儼和尚社會文曰蓋聞商老西河尼父之遺風廣振玄歸北海季長之妙道遐宣是知傳教之宗唯以擇師為本則彼六籍之源流甚隘五常之疆畛非遙猶資一弄之評必俟三隅之返矧乃大雄奧旨上界真宗若非洞達方言何以闡揚圓教僅同九譯方演一乘則昔鶴林示寂滅之期金棺掩耀龍樹誦玄微之義玉軸騰芳捈祕寶於淵居化群生於沙界乃有法領則躬尋聖典去涉兌郊覺賢則首唱妙音來儀震城遂識雜花之殊號始翻貝葉之正文由是遠從典牛之朝近至媧皇之運仰惟開士繼有異人述微言則琢玉爭新編奇迹則貫珠靡絶其於博喻不可殫論然而仰測良緣遐尋善誘契彼東流之説諭其西學之徒使我蓬海一隅桑津四境金爐耀掌遠傳薝蔔之香玉鏡澄心盡曉芭蕉之喻者乃臣唐故終南山至相寺智儼和尚附大教於我先師想義相大德之慧力也伏惟和尚風篁激爽霜桂標貞運既呌於半千義能探於第一加以學包內外識貫古今五天之祕籍幽典敷弘有裕四海之沉疑宿滯剖析無遺遂能挺秀於中華仍得流徽於外裔門人法藏和尚與我先師大德同叩玄揵深窺妙門無僧因升堂入室之談有曇衍出戶面墻之論自攝齋請益當仁之意互興及摻言歸求友之聲共切藏和尚濬資先訓廣集異聞常假箋函寄傳章疏則足以見儼師誘掖益友切磋之厚也天周二十星後有傳業弟子大德決言大德賢俊等高然智燭繼照慧燈山玉海珠豈假求珍之遠青藍絳茜新成受采之深乃相與揚言於衆曰祖祖流傳師師授記閲遺文而究玄理窺曩海而悟幽宗一言見心千載如面然則至於恤貧擢賤尚感厚恩况乃發瞽披聾難量慈化每推誠於念祖宜盡禮於尊師豈可為我國先師則已興良會為他方法祖則不致妙筵縱欲觀空寧宜棄本遂自中和四年唐僖宗甲辰也發大誓願每至南呂孟旬奉為故終南和尚及天竺翻經演偈之尊宿與中國編章撰疏之法師謹選精廬同開講席高談聖教仰報法恩伏願清涼山中迭耀奇相兜率天上齊成勝因修定力以濟衆緣假餘光而照末學使龍宮密藏早傳上本之金言鯷壑遐陬遍誦大乘之寶偈舉足而永離前淖修身而得接後塵生也有涯固難期於泡沫歿而不朽唯共託於香花設至灰現鯨池塵飛鰈海燈燈紹熖終祛北境之昏冥葉葉傳芳不墜東林之誓約者也已上見智異山華嚴寺事迹中華嚴寺陳震應禪師曰有社會文而無列祖名或者後世高麗大覺國師所定洪圓寺華嚴九祖其有據於此者歟今本文中終南和尚及翻經演偈之尊宿與中國編章撰疏之法師云云者豈非大覺所定之九祖耶義信馱竺經於法寺報恩郡俗離山大法住寺本末寺法云寺之初創在新羅二十三世真興王十四年癸酉至今計有一千三百六十餘年之久初創之年義信和尚往天竺求法白騾馱經而來住故稱法住寺尚玄曰按新羅真表律師創建寺宇傳授簡子占察之法高麗名僧慈靜國尊亦曾留錫朝鮮信眉守眉兩大師亦發迹于是碧巖大師遺有修道之事迹蓋俗離山洵朝鮮有名之伽藍也其見于古書者即如高麗太祖天授元年命王子證通國師重葺是寺肅宗六年辛巳九月幸是寺問母弟義天之疾設仁王經會飯僧三萬又按麗史忠烈王七年辛巳受元世祖之命命上洛公金方慶元元帥忽敦茶丘等東征日本王幸金海以餞之及其還駕駐蹕于茲寺拜香祝釐於珊瑚殿仍呼萬歲恭愍王十年辛丑十月紅賊十餘萬來侵十一月王與魯國公州幸福州今安東賊陷京城翌年壬寅正月安祐李方實金得培等大破紅賊收復京城八月王幸法住寺取看舍利與袈裟通度寺所藏者恭愍王時辛旽假僧儀寵幸諂諛賢良重足太古王師慨然思危上書論旽曰國之治真僧得其志國之危邪僧逢其時願上察之遠之宗社幸甚後旽冒據阿衡殲戮朝臣師以遂事不言逮丙午冬知旽薑毒還印章辭位入兜率山雲遊至全州普光寺寓錫戊申夏旽流言欲置師死地陰謀詭計無所不至其言甚急玄陵不得已從之旽用事錮師于俗離山師木食怡然無怨色一夕起定曰死矣夫辛旽可憐愍者己酉三月玄陵海之遺僧録司員惠琪請還小雪洪武四年辛亥七月辛旽覬覦非分玄陵誅之曰我師豈妄語哉云云又朝鮮太祖大王龍潛時親設百日祈祝於上歡菴世祖大王親臨福泉寺見信眉學悅學祖等諸禪師設三日法會仁祖甲子碧巖大師重葺英祖三十六年設宣禧宮願堂哲宗二年辛亥三月禮曹奉教成給判下完文節目雜以吏讀文雖俚俗以此一段足可推見朝鮮各寺從來被侵之情斃故不憚張皇録其全文如左報恩郡法住寺判下完文節目有吏讀處用圈點以標識之吏讀者官府公牘所用語讀也禮曹為完文成給事忠清北道報恩俗離山大法住寺即三韓古剎而世祖大王駐蹕之所元宗大王願堂純祖大王胎室守護列聖祖御筆奉安宣禧宮願堂之寺也關係所重非比尋常而英廟朝癸未年因宣禧宮手本本寺義僧等役義僧役者謂南北漢守城軍也及凡千大小雜役一並蠲除事奉承判下自本曹成給完文且各處責應物種永為革罷事亦自巡營成節目遵行又有本邑除役完文而歲月寢久令飭漸弛土豪邑屬一向有誅求之斃貧寒僧徒不勝其侵漁之患是在如中梵宇年久頽廢僧徒漸就凋殘莫重守護不得舉行云以若奉護所重名山舊剎不可一任其頽敗物力措劃之節僧徒奠接之方自本曹托其事實論報廟堂矣今三月初四日大臣備局堂上引見入侍時領議政權敦仁所啓內即見禮曹所報則以為報恩俗離寺本以大剎且有奉護所重而年久頽敗若不及今重修勢將空虛空名帖七八百張請即劃給以為修葺之地云矣本寺既有御筆奉安胎封守護之所重不可一任其頽廢且名山舊剎修繕之時朝家之許給空名帖亦多已例今亦以四百張成給之意分付該曹何如大王大妃殿答曰本寺所重異於他剎而所請既如是加給數百張可也事批下教是置本寺修葺之物力伏承筵教有此特劃之舉而為念本寺守護之重及僧徒奠接之方恩澤曠絶山門增重其在營邑奉行之道何不極力助成乎空名帖分送各道以為拮據措施之地亦令本寺僧徒募緣于各道是在果本寺重修之舉緇徒軫恤之澤專為安接守護之地而係是筵稟定奪則事體尤為自別且除雜役禁遊客等節自營邑別成完文而其所奉行宜有十分惕念是如乎逮此矯救之時如無申明之舉則來頭更侵之斃難保其必無先自營邑雜役以至各項誅求為斃之端及京外使星各處出使遊人過客藍輿擔負繩鞋討索之習一切嚴禁為旀京外使星之歷抵本寺也下屬之憑藉侵漁亦係難支之痼瘼一體禁斷之意關飭本道後合行節目條列成給為去乎今此曹飭有非循例舉行之事如是之後如或不遵而若有一毫更侵之斃有所入聞則斷當有別般論處之舉除尋常惕念舉行宜當向事本寺守護之著實在於僧徒之奠接當初定式非不嚴截而飭弛弊生寺敗僧殘專由於責應之多端雜役之橫侵義僧等役及諸般大小雜役一並蠲除為齊本寺既是奉護重地則事體與他自別和尚之名從今革罷守護僧統自本寺另擇可堪僧望報本曹成出帖文周年遞改以為著意守護嚴立寺規為齊僧統既為差出則不可無行用印信自本曹造成以給為齊官用燻造燻造俗語也即大豆蒸燻搗作圓塊為造醬科以太太謂大豆出給於本寺使之作燻之斃已自營邑革罷今不必更論而至於山果山菜以山中所産每於當節一二巡封納於本邑係是弊端自營邑一並革除為齊鄉校書院鄉廳等三所亦有山果山菜例納之事而既罷官納則校院鄉廳非所可論並革除為乎矣日後或有因循求索有所現發則冒禁之齋任齋任即鄉校之任員鄉所鄉所即鄉廳之任員輔佐郡守所謂二衙難免罪責惕念禁斷為旀僧徒假置切勿酬應俾免重勘為齊郡司作廳作廳即書吏廳通引通引即郡守之知印官奴使令皆衙役名等廳良中亦有山果山菜例給之事而既除官納與校院之所納則官屬各廳之捧尤非可論永為革罷為旀如是之後不遵申飭如或私自求索則這這這這謂一一也嚴治各別禁斷為齊自寺中每年秋都書員郡廳書吏之捧稅者也有燻造一石例納之事而此是殘僧之斃端永為革罷為去乎此後稱以流來之例更欲徵索嚴治懲勵為齊境內及各處士夫家與遊人過客之以松茸松蘭木笻繩鞋素饌山果山菜等屬求索於本寺僧徒者亦一大弊瘼殘僧之左右見侵豈可支當乎其為嚴禁在所不已且本邑以士夫家之求索洗踏砧搗衣砧等屬勿為更侵之意傳令民間亦成節目揭付寺壁矣近來境內士夫家之侵索此物依舊為之云此亦一切嚴禁為旀雖一砧之微物如或依前求索如前酬應則士夫家奴子重治除良朝鮮之俗士夫兩班犯罪則捕治其家奴所任僧所任謂當寺之任職難免重罪並只惕念舉行為齊通引官奴使令等廳良中僧徒以契防契防者即納錢而買情之事也通引廳二兩官奴廳二兩五錢使令廳三兩式式之意謂每各也僧徒之自願每年秋自各廳捧用云其時如無渠輩之所請豈有自願契防之理乎事極駭然自今革罷為去乎又或有如前更侵之事報于營門嚴刑徵礪為齊巡審行次入于本寺時出站下屬及本邑帶率下人等一從人把色目定其名數每名時糧饌價並參分式自備出站前各其頭目照數持來逢授於首僧以為朝夕之供為乎矣如是定式之後雖一器飯一隻鞋暗地徵索則自營邑斷不饒貸各別嚴繩為旀僧徒段置切勿私自應求俾免重罪為齊京外使星歷抵本寺時亦為定數出站為旀糧資價之自備一如巡審行次時定式施行俾無抵罪之弊為齊京外使星各處出使及遊人過客藍輿擔負之節官長處切勿舉行為旀繩鞋討索之弊一切嚴禁為齊本寺所重與他逈異而既有判下完文且有廟堂申飭營邑奉行尤宜自別此外如有一分為弊端則隨事革祛以為專意守護永久勿替之地為齊未盡條件追後磨鍊為齊咸豐元年三月日行禮曹判書臣尹定鉉奉教五臺佛宮山中明堂按三國遺事臺山事迹相地者曰國內名山此地最勝佛法長興之處云云新羅慈藏律師入唐五臺謁文殊化身授佛骨及袈裟謂曰卿之本國溟州之地有五臺山一萬文殊常住真身之所也卿還本國可往觀參後慈藏還國往江陵五臺山登地爐峯奉安佛腦及頂骨因創月精寺建十三層塔即大和塔奉安佛舍利三十七枚於塔心今人相傳上院寺中臺寂滅寶宮即藏師奉安佛腦之處云閔漬記五臺山聖迹并新羅淨神太子孝明太子傳記夫五臺之為山也始自白頭逶迤南來屈曲百返轉而為金剛為雪嶽又再轉而走百有餘里巋然參天而立飄然一丈夫號令於百萬軍中如也即曰毗盧峯下有群峯羅列於前若怒若吼奇峯異區不可悉數而舉其大概而論之則東有滿月西有長嶺南有麒麟北有象王中有地爐故曰五臺山而皆諸佛菩薩常住之處也昔者慈藏法師奉安佛腦及頂骨於中臺地爐峯茲是靈瑞間起置衛回測或至齋日時燭光明新羅王子淨神孝明兩太子遊到河西府今江陵郡世獻角干家一宿翌日踰大嶺到省烏坪纍日遊玩太和元年丁酉八月初五日新羅本記自法興王已未私立至真德王五年始行中國年號兄弟二人同入是山而隱其徒一千人已失兩太子并皆還國淨神太子到中臺南麓真如院地東南畔見青蓮開即於其地結草菴而居孝明太子自真如院東北去六百餘步北臺南山下見青蓮開亦結草庵而居兄弟二人一心敬禮往東臺而見阿閦如來為首一萬觀世音菩薩真身常住登南臺而見八大菩薩為首一萬地藏菩薩真身常住登西臺而見無量壽如來為首一萬大勢至菩薩真身常住至北臺而見釋迦如來為首一萬彌勒菩薩真身五百大阿羅漢真身常住到中臺而見毗盧遮那如來為首一萬文殊菩薩真身常住又於真如院中見文殊大聖每日寅朝出現化作三十六形或作佛面形或作佛眼形或作佛手形或作佛足形或作萬佛形或作萬燈光形或作寶塔形或作金鼓形或作金鍾形或作金輪形或作金樓形或作金橋形或作金甕形或作金鉤形或作金田形或作銀田形或作金杵形或作五色圓光形或作五色光明形或作吉祥草形或作青蓮花形或作出雷形或作家中米湧出形或作家中五色光形或作地神湧出形或作神通形或作金鳳形或作金烏形或作雀鳥形或作青蛇形或作白象形或作遊豬形或作馬産形或作牛産獅子形或作雞産鳳形兩王子見是神變每朝新汲于筒水煎茶供養一萬文殊夜則各還本庵而修道歲久年深國人漸知兩王子所住之處以省烏坪改名為京坪至唐則天嗣聖十九年壬寅新羅王薨而無子國人欲迎兩王子將軍四人先到孝明前呼萬歲有時五色雲現光燭于國者七日七夜群臣尋其光到山以迎淨神位而請留孝明不得已而嗣王位新羅本記云孝昭王無子國人立神文王第二子金志誠立王三十六年元年壬寅是為第三十三聖德王也以唐神龍元年乙巳八月初三日王親率軍民而到山始開真如院造安泥像文殊以比丘五員等長讀華嚴經號為華嚴結社每歲春秋各納倉租一百石鐙油一石又於本院座地二結外復納牟尼砧占伊岾之外柴地五十結柏子地六結自院西行六千步許在也淨神留而修道常服于筒之靈水故肉身騰空而飛渡流沙江到於鬱珍大國入掌天窟夜誦隨求多羅尼窟神現身出曰我居此窟三千年也今日始聞隨求真詮願聽受菩薩戒淨神依請授之翌日其窟忽無甚怪之因留二十日然後乃去還到是山入神聖窟精修五十年於是三十三天衆每日下來聽法淨居天衆亦來獻茶又四十聖衆在空中高十尺許而擁衛所持錫杖每日三時作聲三畫所住之室故當鍾鼓以知時忽一日文殊大聖以水灌頂得道果聖德王又於東臺北角下創觀音房內安圓像觀音又以青地畫成一萬觀世音常以精衆五員晝讀八卷金剛光明經仁王般若大悲心呪夜念觀音禮懺號為圓通結社南臺南面創地藏房內安圓像地藏又赤地畫成八大菩薩為首一萬地藏亦以精衆五員晝讀地藏經金光般若夜念占察禮懺號為金剛結社西臺南面創彌勒房內安圓像無量壽又以白地畫成無量壽如來為首一萬大勢至亦以精衆五員晝讀法華經夜念彌陀禮懺號為水精結社北臺南面創羅漢房內安圓像釋迦又以黑地畫成釋迦如來為首一萬彌勒菩薩五百大阿羅漢亦以精衆五員晝讀佛報恩經涅槃經夜念涅槃禮懺號為白蓮結社中臺真如院仍前所安泥像文殊置於後壁又以黃地畫成一萬文殊并三十六化形亦以精衆五員晝讀華嚴經大般若經夜念華嚴禮懺號為華嚴結社以寶叱徒房改名為華嚴寺內安圓通像毗盧遮那三尊及大藏經亦以精衆五員長年轉讀大藏經夜念神衆又趁年行百日華嚴會號為法輪結社以為五臺五社之本社又於文殊岬加排佛下院以為山內六社都會之地亦以精衆七員晝夜長開禮念神衆以河西府道內八州之稅為如上各寺福田凡三十七員四事供養之資則君王之壽遠文武之協和萬民之歡樂百穀之豐登罔不在茲也寶叱徒淨神太子兒名也孝信居士親見五類聖衆事迹居士高麗時公州人也世號為幼童菩薩化身也家居時奉母甚勤其母非肉不食一日為母求肉操弓而出見五鶴射之鶴皆飛去唯落一羽居士拾其羽而將還以羽遮眼見諸行人皆作畜生之相於是肉不可得為憂因作是念但自割身作熟食而獻則可矣即自割股為其血多就川而洗適有奉使者過而見其川水皆赤尋到其源見居士而問之居士説其由使臣録其事聞于王王亦嘉其孝懇命有司給米趁一年一百石以為養母之資仍以孝終為限居士既孝終捨家為院因名為孝家既出家行遍慶州界未覔可居之地循海而行到溟州地以其羽遮眼見之人相不變者益多於是遂欲留居而路逢一老嫗問曰何地可居耶老嫗曰過西嶺有向北之洞言訖不知所在然後乃知觀音化身也依其言往入省吾坪之洞到慈藏祖師所曾住處今月精寺而住焉居未幾忽有五僧并來而問曰汝所持來袈裟一幅安在居士未悟曰曾以羽而見人相者是也於是出進其羽一僧取而置於袈裟缺處非羽乃布也準於闕幅五僧既去始認五類大聖之化身也五臺聖者北臺釋迦東臺觀音中臺文殊西臺大勢至南臺地藏是也於是寺有五尊像最為奇妙庭中有八面十三層石塔內安世尊舍利三十七枚出通度寺戒壇記亦出事林廣記而塔前有藥王菩薩石像手捧香爐向塔而踞古老相傳云是石像從寺南金剛淵而湧出塔亦製作甚妙罕有其比而又多靈異只今山中烏雀不敢飛過其上為衆靈所衛可知也居士沒後信義頭陀繼來重創義公即梵日國師十聖弟子中之一也厥後荒廢積年而水多寺長老有緣重營而住緣亦非常人也由是號為四聖所住之寺也細記云五臺山者佛聖真身常住之所也月精寺者五類大聖現迹之地况是寺亦為是山之喉吻故我太祖肇開王業依古聖訓每歲春秋各納白米二百石鹽五十石別修供養而用資福利遂以為歷代之恆規自經兵火以來國步多艱供養屢絶寺亦頽圮已甚沙門而一見之慨然發歎既已彈力修葺來謂余曰是山之名聞於天下所有稽古皆羅代鄉言非四方君子所可通見雖欲使人人能究是山之靈異豈可得乎若他日或天使到山而求觀古記則其將何以示之哉願以文易其鄉言使諸觀者明知大聖靈奇之迹如日月皎然耳豫聞其言以為然雖自知為文不能副其意亦重違其情而筆削云爾大德十一年二月日宣授祖列大夫翰林直學士匡靖大夫咨議都僉議司事延英殿大司學提修史判文翰署事閔漬記雙溪祖塔海東福田曹溪沙門惠勤號猊雲散人新羅文昌侯崔致遠之後家世湖南發迹於曹溪山之仙巖寺從景鵬法名益運大師學既嫺俗典近日僧史多出其手真無愧于其祖也往年作智異山雙溪寺六祖頂相塔放光論刊於海東佛報故今略録其文嶠南河東之雙溪寺即禪宗第六祖大鑑惠能大師頂相寶塔奉妥之所也蓋稽頂相之東來于今一千一百九十餘年每有放光燭朗洞天必於半夜人靜所以近居者罕見遠望者輒多瞻見歲在癸丑春二月初八日是乃六祖靈誕令節設齋之夜山中法侶禮懺諷經燃燈炷香一道光明倐從塔殿煒煌如炬直爍天衝溪泉嵓嶂昭如白晝蠅頭之文禽獸之數瞭然咸覩五分法香滿庭芬馥見聞歡喜得未曾有中路於戲惟我鰈域半島雖曰海外褊邦羅麗之際佛法輸入文殊大士親捧如來頂相及佛牙佛舍利佛袈裟傳于慈藏法師佛頂奉藏於溟州之五臺山新羅僧金大悲取奉六祖頂相歸藏於康州雙溪寺豈非佛化祖蔭偏有因緣者耶云云尚玄曰按雙溪寺在智異山之花開谷即所謂谷中雪天葛花盛開之地也五臺之寂滅宮奉安佛頂之處可以比其幽太白之葛來塔瑪瑙塔藏佛舍利處無以過其勝新羅三法和尚初創蘭若六祖頂相奉藏于塔必在此時真鑑國師得其遺基創玉泉寺新羅憲康王賜額雙溪寺建六祖影堂是必因其奉安頂相之故而崔碑不明言之蓋亦有所諱者在故也六祖臨終預記東人之取首蓋以我海東為指歸處也而其指歸處在智異山則智異山其為有緣之地無疑矣嗚呼智異之雙溪實我海東之福田也蓋雙溪先有真鑑國師後有孤雲先生以為雙絶如錦上添花山輝而川媚也西山大師智異山雙磎寺重創記曰古之洞精儒釋博達內外者脫履功名一瓢忘貧與天地並立與神明同往或與無位真人為之遊或與無始終者為之友不得已而後應之則育萬物和天下以隻手能致君於堯舜之上視之猶如反掌焉自憂其憂自樂其樂奚暇非儒非佛非佛非儒相讎而相非乎我東崔孤雲與真鑑是其人也孤雲儒也真鑑釋也真鑑建剎始鑿人天之眼目孤雲立碑廣出儒釋之骨髓吁二人之心一種沒絃琴也其曲也若春風之燕舞其調也若緑柳之鶯歌一經一緯一表一裏而相資耳自漢唐宋以來碎儒釋之虛名樂天地之大全芒乎芴乎超然獨不顧者其唯此二大人歟然世遠人亡名存事去精剎凋殘枳棘之林龜碑剝落樵人之手嶺猿哀嘯谷鳥悲鳴而已嘉靖庚子春山之道士仲暹者杖屨其間摩挲古碑喟然太息曰昔者神禹之九鼎周室之石鼓漢庭之仙人晉家之銅駝是皆物之之類而或一時寶不寶者必有物之遇不遇如何耳今孤雲之碑雖云至寶而反為不寶之物是不遇之故也以其重修事進于朝廷大臣咸曰可然後禮曹馳立禁標以五里許勿使火伐三年之內居民自化惡鳥革音落花流水宛如昔日焉於是重葺八詠樓三間碑前碑後築石以臺之引流以塘之月夕風朝賞蓮看竹而獨自逍遙焉山之雲水釋慧修者亦深信正法以三寶為己任者也癸卯夏概見真鑑之古剎志欲重創廣募檀越不數年中先立大殿次建金堂與東西二方丈因設落成之會明年又設兩堂之會吁巋然殿閣狀若天宮也於是八詠樓之清風更醒于孤雲之骨雙溪水之明月再騰于真鑑之禪燈也或息心之人萬里風趨或養氣之士六合雲歸落霞蒼茫之外湖上孤峰半有半無白雲紅樹之邊一雙青鶴間往間來此亦雙磎寺之大觀也嗚呼已隱之月隻手捧之者暹也既盲之目金篦刮之者修也何也使學佛者得如真鑑然後知儒之所以為儒使學儒者得如孤雲然後知佛之所以為佛故曰知真鑑者莫如孤雲知孤雲者莫如真鑑也世無孤雲仲暹是也世無真鑑慧修是也然則上二士鳴於前下二人傳於後甚矣前後相應遠近相照也亦可謂千載之下子雲朝暮遇之也雖然名者實之賓非孤雲真鑑之所取也善言儒者非也善言釋者非也善言儒與釋非也者亦非也何也求其實而已夫嘉靖己酉春記擇里志云麗末韓惟漢挈家隱於嶽陽洞朝廷以物色拜官召之惟漢逃隱不知所之或云為仙雙磎寺有崔孤雲畫像沿溪石壁多刻孤雲世傳崔孤雲為仙云矣朝鮮宣祖辛卯寺僧拾紙於石上有十絶句其一首曰東國花開洞壺中別有天仙人推玉枕身勢倐千年如孤雲書法山中有萬壽洞青鶴洞而萬壽今九品臺青鶴今梅溪也其十絶句之第二首曰明月初生處清風不動時子規聲入耳幽興自應知第三首曰萬壑雷聲起千峯雨色新山僧忘歲月唯記葉間春第四首曰明月雙溪水清風八詠樓昔年為客處今日送君遊與地勝覽崔致遠在雙溪寺寄皓源上人詩曰終日低頭弄筆端人人杜口話心難遠離塵世雖堪喜爭奈風情未肯闌影鬪晴霞紅葉徑聲連夜雨白雲間吟魂對景無羈絆四海深機憶道安尚玄又曰雲上七菴花開雙溪即佛氏之靈山寶林亦仙家之洞天福地也雲上院即今之七佛菴有東國第一禪院之額花開谷有新羅國仙永郎來遊之事迹普陀洛山大士聖窟世傳洛山大聖住處三國遺事云昔義湘法師始自唐來還聞大悲真身住此海邊窟內故因名洛山蓋西域寶陀洛伽山此云小白華乃白衣大士真身住處故借此名之齋戒七日浮坐具於水上龍天八部侍從引入窟內參禮空中出水精念殊一貫獻之湘領受而退東海龍亦獻如意寶珠一顆師捧出更齋七日乃見真容謂曰於座上山頂雙竹湧生當其地作殿宜矣師聞之出崛果有竹從地湧出乃作金堂塑像而安之圓容麗質儼若天生其竹還沒方知正是真身住處也因名其寺曰洛山師以所受二珠鎮安于聖殿而去後有元曉法師繼踵而來欲求瞻禮初至於南郊水田中有一白衣女人刈稻師戲請其禾女以稻荒戲答之又行至橋下一女洗月水帛師乞水女酌其穢水獻之師覆棄之更酌川水而飲之時野中松上有一青鳥呼曰醍醐和尚忽隱不現其松下有一隻脫鞋師既到寺觀音座下又有前所見脫鞋一隻方知前所遇聖女乃真身也故時人謂之觀音松師欲入聖窟更覩真容風浪大作不得入而去高麗獻宗恭殤王元年宋慈恩宗僧惠珍來置于普濟寺珍常曰為欲見普陀洛伽山聖窟而來請往觀之朝議竟不許麗史觀音窟在五峯山我翼祖李太祖之曾祖與貞淑王后詣此祈嗣夜夢有一衲衣僧來告曰必生貴子其名善來未幾度祖生遂以善來名之輿地勝覽翼祖與崔妃禱于洛山觀音寺而生度祖小字善來東閣雜記輿地勝覽襄陽洛山寺在五峯山新羅僧義湘所建殿上安栴檀觀音一軀歷代崇奉頗有靈異我世祖幸此寺以殿舍隘陋命新之極宏壯高麗僧益莊記襄州東北降仙驛之南有洛山寺寺之東數里許巨海邊有窟其高可百尺其大可容萬斛之舟其下海灣常出入為不測之壑世稱觀音大士所住處也窟前距五十許步海中有石上可鋪一席出沒水面昔新羅義湘法師欲親覩聖容乃於石上展坐拜稽精勤至二七日尚未獲覩便投身海中東海龍扶出石上大聖即於窟中伸臂而授水精念珠曰我身未可親覩但從窟上行至雙竹湧出處是吾頂上於此可營一殿安排像設也龍亦獻如意珠及湘師受珠而來有雙竹湧立乃於其地創殿以龍所獻玉造像安之即茲寺也我太祖立國春秋遣使設齋三日以致敬焉厥後書於紳今以為恆規水精念珠及如意珠藏於是寺傳寶之癸丑歲天兵攔入我疆是州於雪嶽山築城守禦城陷寺奴取水精念珠及如意珠埋於地而亡走上告于朝兵退遣人取之藏於內殿世傳有人到窟至誠拜稽則青鳥出現明宗丁巳庾資諒為兵馬使至十月到窟前焚點拜稽有青鳥含花飛鳴落花於其頭上世以為稀有云云庾資諒詩海崖高絶處中有落伽峯大聖住無住普門封不封明珠非我欲青鳥是人逢但願洪波上親瞻滿月容朝鮮世祖大王亦曾親幸洛山寺瞻禮聖像洛山寺新鑄鍾銘并序輔國崇祿大夫中樞府知事臣金守溫奉教撰嘉靖大夫行虎賁衛大護軍臣鄭蘭宗奉教書我佛如來之設教也必有像廟之嚴所以因衆生之目視而生其信必有鍾鼓之設所以因衆生之耳聽而警其心蓋欲衆生由六塵之外感以修六根之功德也我太上大王在位之十二年東巡登金剛山禮曇無竭並海而南親幸是寺與王大妃及我主上殿下瞻禮觀世音大士相于時舍利分身五彩晶瑩太上大王發大誓願命禪德學悅重創以為我殿下資福之剎追念大願繼述益虔寺既成凡百餘間極其壯麗百用皆備而鍾其一焉嗚呼不由色相無以視衆生圓滿之體不緣聲塵何以發衆生清淨之覺然則楗槌道具非止節十二徒之作止實山門之法器衆生之警築也况我太上大王聖德神功卓越千古之盛美我主上殿下以聖繼聖重光大烈之偉績不可不銘彛鼎而勒鍾鼓以埀耀於罔極也銘曰六根皆同六塵發凡聖升沉由此決我佛如來三覺圓建大伽藍創法物金聲玉振遍法界法界衆生驚夢識首楞會上二十五一一圓通諸菩薩觀音大士覺所覺聞思修兮功第一我願令此大鍾音如彼無礙慈悲力慵齋叢話云洛山寺僧海超出入吾門一日來求供佛之具有本有本慵齋家屬在旁曰高架棟宇塗以丹雘塑泥木為像晝夜虔誠以飼之有何利益僧即應聲答曰高架棟宇塗以丹雘斫栗木為主四仲之月虔誠以飼之有何利益有本不能對尚玄曰今因洛山窟之大聖參禮引起栴檀佛像義相建寺安栴檀像一具又因慵齋家之來僧酬答引起栗木神主故書栴像栗主創始之來歷以考儒佛之制度焉儒家之栗木主論語哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗朱子注曰古者立社各樹其土所宜木以為主也宰我言周所以用栗之意如此豈以古者戳人於社故附會其説歟子聞之曰成事不説遂事不諫既往不咎尹氏注曰古者各以所宜木名其社非取義於木也宰我不知而妄對故夫子責之也云云則後世以栗木為神主之俗疑即周人以栗立社之濫觴而朝鮮人之立祠堂祭神主出於朱子家禮則朱子家神主以栗木為之蓋無疑之事按慵齋叢話有曰奉祀君子將營宮室必先立祠堂以奉先世神主此朱文公家禮也自三國高麗以來專奉釋氏家廟之制不明士大夫皆不以禮自圃隱文忠公高麗末鄭夢周倡明道學嚴立祭祀之儀然後家家立祠堂始傳家舍於嫡嗣始重嫡庶之分無子者必取族子以為嗣國家大享用孟月士大夫時享用四仲月是為有序又按碑官雜記俄叔楮撰我國文廟制度文廟之制中國則塑像本國則用位版惟開城平壤二府之學安塑像亦元時自中國來者嘉靖丙戌年間皇帝明世宗皇帝令天下毀孔子及配享諸賢像用栗木作位版朝鮮習俗用深山中雞犬聲不聞處之栗木為神主王家以智異山栗木為神主故雙溪寺為主材栗木守護寺剎佛家之栴檀像指月録云世尊在忉利天九十日為母説法優填王思慕世尊命匠雕栴檀像三十二相之中惟梵音聲相未能成就及世尊下忉利天像亦出迎世尊三喚三應自三喚自三應乃云無為真佛實在我身佛家以此為最初像又佛世尊金口親説佛滅之後施設形像按圓覺經圓覺菩薩白世尊言若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界世尊告圓覺菩薩言若佛滅後施設形像心存目想生正憶念還同如來常住之日云云佛家塑像非但金屬亦用泥土趙州禪師示衆云金佛不度爐木佛不度火泥佛不度水真佛內裏坐耽沒羅洲尊者道場法住記云十六羅漢各有住處而六跋陀羅尊者梵語跋陀羅華言好賢此尊者與九百阿羅漢多分住在耽沒羅洲相傳耽沒羅洲即謂耽羅今濟洲島也濟州島中有一座山名曰漢拏山顛有白鹿潭深無底即古昔之噴火口蓋如長白山頂之有天池也漢拏山之南奧臨海有一澄潭白石平鋪紅花照耀真別有天地謂之靈室奇嵓潭之四圍石立無數天然人狀土人呼為將軍石若人馬雜踏其地則雨而洗之金秋田居士名弘祚壽山人曾已親歷其境為余言之甚悉按輿地勝覽濟州尊者菴在漢拏山西嶺其洞有石如僧行道狀諺傳修行洞云云尊者菴疑即以跋陀羅尊者故名耳其所謂五百將軍石疑亦五百羅漢石之訛稱也世傳耽羅乃三聖入寂之地漢拏山頂有石碑書云三聖入寂之地云云昔普雨大師及喚醍禪師皆被謫于此亦皆不還故人謂二聖已驗云近有一比丘尼俗姓安名蓬廬觀者前韓隆熙元年丁未十二月二十八日剃染于海南之大興寺越明年戊申正月初五日入于島中建寺而奉安佛像四月八日佛誕日設齋慶讚島民少見多怪遂作亂甚至欲殺之尼乃避身漢拏山登絶頂不食者七日行至一處無力輒倒挂於懸崖之上忽有數千羣鳥銜衣救之亦一異事也尼後建觀音寺勤於化衆云金剛壇戒律宗威儀新羅善德女主時慈藏律師金氏真骨蘇判三級之爵茂林公之子早喪二親厭離塵華棄妻子捨田園為元寧寺獨處幽險不避狼虎修枯骨觀以荊棘圍之裸坐其中動輒被刺頭縋梁上除祛昏睡時闕台輔王屢徵不赴王乃敕曰不就斬之藏聞曰吾寧一日持戒而死不願百年破戒而生事聞王許令出家敕與門人僧實等十餘輩入唐五臺山親受文殊記莂架巖為室於終南山靜修三載靈應日著歸國於皇龍寺演菩薩戒本七日七夜天降甘露雲霧淹靄覆所講堂四衆服異朝延議曰佛法東漸雖幾百年其於住持修奉儀軌闕如不為綱理難以肅清啓敕以藏為大國統凡僧尼一切規猷總委僧統主之於是藏為僧尼半月説戒冬春總試令知持犯置員管維持之又遣巡使歷檢外寺砥礪僧失嚴飾經像以為恆式一代護法於斯盛矣如孔子自衛返魯樂正雅頌各得其宜當此之際國中之人受戒奉佛十室八九祝髮請度歲月增至乃創通度寺築戒壇金剛戒壇以度四來此三國遺事所謂慈藏定律者而通度寺之戒壇實為海東律宗本源之地也按慈藏律師貞觀十年入唐續高僧傳云貞觀十二年入唐居終南山雲際寺三年貞觀十七年歸國其律學之淵源必應出於南山宗主道宣律師故今記道宣略歷以照看之道宣律師武德七年居終南山苧麻蘭若製行事鈔貞觀四年行般舟三昧感天童給侍貞觀十九年隨玄奘法師為譯經顯慶二年居西明寺時為上座撰續高僧傳傳中有慈藏傳乾封二年示寂則貞觀十年以後慈藏入唐之時道宣已為道成德立可能師授律學而其撰慈藏傳竟無一言及之甚可疑也雖然李穡撰通度寺釋迦如來舍利記書曰南山宗通度寺云云則必有所見而然也華嚴壁經教家事業湖南求禮郡智異山大華嚴寺世傳梵僧煙起之所創而煙起不知何代人煙起或云緣起高麗大覺國師遊華嚴寺留有二絶一留題智異山花嚴寺寂滅堂前多勝景吉祥峯上絶纖埃倣徨盡日思前事薄暮悲風起孝臺花嚴寺有佛舍利七層寶塔緣起石像合掌戴塔以資其母之冥福故呼塔之石臺為孝臺云云二花嚴寺禮緣起祖師影偉論起信雄經華嚴同不通一生弘護有深功三千義學分燈後圓教宗風滿海東然則因師演唱圓教寺名華嚴亦未可知也新羅義湘大師十剎傳圓教華嚴寺居其一焉唐儀鳳二年新羅文武王十七年湘師承王命以石板刻華嚴經留于本寺又於唐嗣聖八年神文王十一年湘師以唐賢首法師所述探玄記講華嚴經於本寺之海藏殿新羅憲康王元年道詵國師重修本寺俱載寺乘至于朝鮮中葉碧巖大師覺性住錫茲寺孝宗大王即位元年特升寺格為禪宗大伽藍肅宗大王二十七年為大華嚴寺又為禪教兩宗大伽藍矣則華嚴寺為我海東華嚴大教根本紀念之地也本寺舊有石壁刻華嚴經不幸為兵燹所殘燬千古偉迹遂以埋沒今人考案録之于左智異山大華嚴寺新羅時代華嚴石壁經考稻田春水述尚玄居士譯全羅南道求禮郡馬川面華嚴寺之覺皇殿夙聞有華嚴石壁經斷片現存今蒙本寺陳震應師之厚意得其拓本併合資料略述愚見至其不足之點乞大方諸賢之指教焉一朝鮮總督府月報第四卷第九號所載金石文目録中其二十五項求禮華嚴寺石刻華嚴經所在全羅南道求禮郡馬川面華嚴寺年時相傳新羅末全羅南道求禮東北十里許智異山華嚴寺有華嚴經石片陰刻者當初是佛堂之石經矣今則崩壞堆積於堂內佛座之下相傳為新羅末之鐫刻二朝鮮藝術之研究續編明治四十三年中朝鮮總督府囑託關野博士朝鮮遺迹調查略報告有如左記華嚴寺華嚴經石刻斷片約數千個本寺佛殿壁以石造而刻此華嚴經者為壬辰兵火所破壞云現今則數千之斷片堆積於覺皇殿下保護之道不為完全有散逸之虞其斷片之大者殆不出一尺係是新羅時代之製作而其法與我寧樂朝自新羅善德王朝至憲德王朝時代之寫經如合符節三新增東國輿地勝覽卷之四十求禮縣華嚴寺在智異山麓僧煙氣不知何代人建此寺中有一殿四壁不以土塗皆用青壁刻華嚴經於其上歲久堂壞文字刓沒不可讀茲述支那華嚴經譯本之來歷支那通行之譯本共有三種第一東晉安帝義熙十四年西紀四一八年佛馱跋陀羅譯出者通稱六十華嚴第二唐則天武后嗣聖二年西紀六八五年實叉難陀譯出者通稱八十華嚴第三唐德宗貞元十三年西紀七九七年三藏般若譯出者稱貞元經又四十華嚴是也今於殘存之石經陳震應師有所調查云有義熙本及貞元新經二種余姑從此説然而其石質則軟滑之蠟石係是智異山中之所産帶淺青色而其中混薄赤煉瓦色云有説者曰此則經殿罹火時燒焦變色者云又考石經之字體則於線罫中恭楷書之筆迹雖各異其大體則與右軍書法多酷似處經字頗極精巧書法刀法兩者毫無瑕瑾真可謂無二之珍寶也且考其雕造石經之年代則華嚴寺事迹及其他可證憑之史料一不發見矣故余雖費慮於推定其年代不能遽下斷案惟綜合各種材料欲試臆測今見華嚴經社願文唐僖宗光啓二年七月五日朝臣宗親為憲康王追薦冥福結華嚴經社崔致遠孤雲先生撰願文別大德賢俊崔致遠之母兄誦華嚴經遵唐僧均諒故事上言勸誘羣臣寫經薦福有敢言鍊石補天惟願撮塵裨嶽云云等語王憲康王弟定康王也嘉納之擇侍書中善書者命寫華嚴經淨眼品第一宣旨遣使捧經就席復有上宰舒發金公林甫國戚重臣蘇判順憲金一等寫義熙本經國統及僧録等寫貞元新經北宮長公主捨財裝經成十帙云云由此觀之雖無雕刻石經之事迹現存殘石中既有義熙本及貞元新經二種以此點推測則賢俊之上言為其動機而雕造在其後不遠之期間可知也已然經文字體與真鑑國師碑在慶尚南道河東郡智異山雙溪寺崔致遠書近似故余則想像以為石經之成在於新羅末期即自定康王朝至敬順王朝也西紀八八六年乃至九三五年姑以存疑更待他日之校正稻田春水石壁經考至此而完尚玄曰緣起祖師之弘宗義相大師之傳教道詵國師之習經讀習大經賢俊大德之結社以至青石刻經碧巖住錫從初至今闡揚大教大華嚴寺名不虛得今陳震應禪師號東海子屬西山派霜月之後住華嚴之大寺繼碧巖之高躅器宇軒昂有丈夫之相聲音雄壯若洪鍾之鳴總持如阿難陀辨才似富樓那法門龍象佛家泰斗方丈雖寬物情自隘其開拈頌法會屬余撰文如左智異山大華嚴寺拈頌會發起文竺西佛教轉傳自震旦海東禪宗肇興於新羅厥有雙峯乃嗣四祖二世曰法朗和尚五傳為智證國師北山儀為九派之首南嶽陟膺兩朝之師無染傳麻谷之心印惠哲開桐山之道場雙溪慧昭嗣神鑒禪師是為曹溪之玄孫用建影堂孤山梵日對真聖大王始説雪山之皈祖待傳心印皆是馬祖派無非獅子兒洞山價雲居膺之法嗣不乏石霜諸雪峯存之宗派亦多靈源寺之智異和尚稟宗於臨濟會下道峯山之慧炬國師發機於法眼室中半千禪剎鎮高麗山川裨補一國三十僧徒承永明印記分化各方當時佛教界即名禪寂宗佛日普照創立定慧社禪風永扇通稱曹溪宗無衣子採輯古人公案録成拈頌之集覺雲氏此乃真覺弟子覺雲也非龜谷覺雲稟受先師法言撰述説話之書及到高麗之末世又有臨濟之嫡傳懶翁勤佩平山之法印三世赫赫勢若注水太古愚被石屋珙之信衣六傳微微命如懸絲至七世而出西山靜浮休修如六祖之有南嶽讓清源思兩派一源千門萬戶從以海東之禪宗派萃於湖南之智異山燕谷當時玄覺師試九山之衆此是前於貞雙僧科之上書高麗燕谷寺玄覺禪師碑載求禮邑志景宗四年己卯建王融撰柱國張信元書鶴洞近處白業人建七佛之菴早已名於第一禪院之揭額五聖定位於青梅大師七人悟心於碧松名剎其中有華嚴大寺自前為禪教道場自新羅煙起元曉義湘道詵洞真賢俊高麗洪慶定仁祖衡以至朝鮮中葉之浮休碧巖近世之聾巖中峰蒙庵抱虛惠庵懶庵機巖圓華等諸宗師皆闡禪教之處文殊菩薩八萬眷屬常住説法般若之峯高聳天半緣起祖師三千弟子同參分燈圓教之風廣被海東世尊舍利之塔巋然悲風起於孝臺覺皇石壁之經壞矣古迹留於殘片道詵與高麗定仁王師重復創築伽藍之中興祖華嚴寺高麗時凡四創按高麗護法外紀光宗王以洪慶禪師繼廣宏規文宗朝遂許三道耗穀大建八寺各九庵仁宗王以定仁王師重修忠宣王命祖衡王師更修紺殿皆祝釐願堂故云云義相及朝鮮浮休和尚先後弘傳雜花之大宗師賢俊大德曾結經社自是願堂於雞林朝靈觀等師亦設禪會于彼別院之燕谷寺碧巖建幢白谷繼席慥冠師法號龍潭霜月之嗣創拈頌之會智泉不隱設會在泉隱寺允臧公法號惠庵傳綴輯之書禪潮始流此華嚴寺江湖福田乃孝廟肅宗兩朝御賜之大伽藍今震應師人天眼目即龍潭惠庵五世嫡傳之善知識龍潭惠庵畸庵霽月應庵及震應為五世故擇華嚴伽藍開拈頌之法會共推震應和尚為講演之宗師大正六年之春陰曆二月之望千江水月之夜正好供養諸天雨花之時不妨舉拈八方衲子相率負笈而來一堂禪衆共成折床之會挽回朝鮮之佛運扶起臨濟之禪宗茲憑修禪之大會恭伸祝釐之微誠天下泰平帝王長壽家國興盛野老謳歌惠通印訣真真言宗按唐玄宗開元四年天竺善無畏三藏來開元八年金剛智三藏率不空三藏又自天竺來皆傳龍樹菩薩之密教時稱善無畏金剛智不空為開元三大士祈禱禁呪形影感驗此為支那真言宗之始也新羅惠通入唐謁無畏三藏請業藏曰嵎夷之人豈堪法器遂不開授通不謝去服勤三載猶不許通乃憤悲立於庭頭戴火盆須臾頂裂聲如雷無畏來視之以手指按裂處誦神呪瘡合如平日有瑕如王字文因號王和尚深器之傳印訣通以文武王五年還國海東密宗惟惠通一人學有淵源可謂真真言宗也又按大藏經新羅靈妙寺僧不可思議撰大毗廬遮那經供養次第法疏二卷此為不空三藏之宗派也神印之名創於海東而即真言宗之一別派也天竺支那其法雖傳此名俱無蓋此宗即密教之宗如來一代時教廣博浩瀚要不出於顯密二門顯謂諸教經律論密謂諸部陀羅尼新羅朝明朗法師字國育入唐以還因受海龍之請赴龍宮得神印祕法龍王以黃金一千斤奉施及歸舍其宅為寺以其金鍍飾像光耀殊特故名金光寺師以神印多行祕法遂為神印宗宗主會唐兵犯境邊報日急王請問朗奏曰狼山之南有神遊林設四天王寺開瑜珈道場王如其言以退唐兵三國遺事云總章戊辰王文虎王法教與金仁問金欽純等至平壤會唐兵滅麗唐帥李績獲高臧王還國獻俘于帝時唐之遊擊諸將有留鎮而將謀襲我者即謂上元元年甲戌二月劉仁軌為雞林道總管以伐新羅者王覺之發兵之明年高宗使召仁問等時仁問留唐宿衛讓之曰爾請我兵以伐麗害之何也乃下圓扉鍊兵五十萬以薛邦為帥欲伐新羅時義相師西學入唐來見仁問仁問以事諭之相乃東還上聞王甚悼之會羣臣問防禦策角干金天尊奏曰近有明朗法師入龍宮傳祕法而來請詔問之朗奏曰狼山之南有神遊林創四天王寺於其地開設道場則可矣時有貞州使奏報曰唐兵無數至我境回槧海上王召明朗曰事已逼至如何朗曰以彩帛假搆宜矣乃以彩帛營寺草搆五方神像以瑜珈名僧十二員明朗為上首作文豆婁祕密之法時唐羅兵未交接風濤怒起唐船皆沒於水後改劫寺名四天王寺至今不墜壇席國史云改創在調露元年己卯後年辛未唐更遣趙憲為帥亦以五萬兵來征又作其法船沒如前是時翰林郎朴文俊隨仁問在獄中高宗召文俊曰汝國有何密法再發大兵無生還者文俊奏曰陪臣等來於上國一十餘年不知本國之事但遙聞一事爾厚荷上國之恩一統三國欲報之德新創天王寺於狼山之南祝皇壽萬年長開法席而已高宗聞之大悅乃遣禮部侍郎樂鵬龜使於羅審其寺王先聞唐使將至不宜見茲寺乃別創新寺於其南待之使至曰必先行香於皇帝祝壽之所天王寺乃引見新寺其使立於門前曰不是四天王寺乃望德遙山之寺終不入國人以金一千兩贈之其使乃還奏曰新羅創天王寺祝皇壽於新寺而已因唐使之言因名望德寺或系孝昭王代誤矣王聞文俊善奏帝有寬赦之意乃命強首先生作請放仁問表以舍大遠禹奏於唐帝帝見表流涕赦仁問慰送之仁問在獄時國人為創寺名仁容寺開設觀音道場及仁問來還死於海上改為彌陀道場至今猶存按國史唐嗣聖十一年金仁問卒于唐武后震悼命使送柩還本國云云今與此不符姑存之密本法師應詔入內誦呪所持杖飛入寢內捉一狐善德王疾乃愈明朗神印宗之法裔廣學大緣二大師為高麗太祖祈禳海賊之災太祖立現聖寺於開城作密教之根本道場麗朝時天竺沙門弘梵室哩縛日羅齎至羯磨壇經贊襄密宗至于麗季密教猶盛按李齊賢撰金書密教大藏序云佛之書入中國譯而為經數千萬卷所謂陀羅尼者中國之所不能譯也非唯中國為然自竺域之人亦不得聞而解之以謂惟佛與佛乃能知之蓋其義奧其辭祕祕故不可聞奧故不可解不可解則人敬之篤不可聞則人尊之至尊之至敬之篤其感於人也必深矣靈異之迹宜乎多也昔之人知其若此裒而纂之成九十卷名之曰密教大藏刊行于世則茲九十卷者數千萬卷之根柢也我主上殿下萬機之暇留神乎釋典其於密教信之尤切發內帑之珍泥金以書之奉翊大夫判內府寺事上護軍臣羅英秀實幹其事於是以舊本校于諸經或乙或竄而是正之又增求其所未收得四十卷與舊合一百三十卷令工書者分部而寫之粲然如列宿之交光衆卉之敷榮真法寶也既成因命臣齊賢為序臣腐儒也其文不足以稱旨然而竊念佛氏之道以慈悲喜捨為本慈慈仁之事也喜捨義之事也然則其為書之大旨亦可概見矣所謂數千萬卷者以萬乘之勢為之非難其書既多其費亦廣未免浚民以充其用甚非佛氏之意也今者主上殿下不傷民財不費民力簡而得其要速而致其精可謂得佛氏之意而功德豈易量哉嗟嘆不足拜手稽首謹書至于朝鮮之初悉焚讖緯諸書太宗大王十七年真言宗之真經神呪亦在所禁僅有請雨施食之儀至中葉諸大法師復修印訣未能確立本宗門戶凡作佛事必資灌頂章句神力加持以獲成就若造像經密教集即真言集等書皆朝鮮諸師纂集流通者而至其密教儀軌則皆闕如今得真言集重刊緣起舉例如左大哉真言之為法寶也蕩蕩乎不能可以名焉巍巍乎不能可以語焉靈山演妙天雨四花印土談真地搖六震分形千億垂化萬方何則諸佛之舍利閣而菩薩之靈妙家也千經之骨髓而一心之元鑑也龍宮之祕藏而病患之醫士也故高焉之如太虛深焉之如巨海體不可以極其邊用不可以窮其際虛含衆妙而橫該十虛量應羣機而竪窮三際一見於眼人天同慶一歷於耳水陸咸欣盡發菩提咸皈極樂刀山劍樹變為寶林鑊湯爐炭化成塗香其驗至明也其德極高也昔青丘有識裒集一帙鐫金剛之奇嶽作禪門之指南其為功德豈不優哉噫厥後以來法運既衰人根由之信力不無人傳刻歲久字刓遂使靈文懸千斤不即斷者幾何學者求之不得而病焉蓋亦有年矣有道人慧澄及印珠等空門篤信白業時聞亦與余有恩一日來告余曰佛頂心及諸真言成佛之捷徑出世之要津功愈日月德勝乾坤願募衆緣鳩工鋟梓今幸間暇盍書一本以貽學者乎余辭曰作字未工放筆亦久雖不得無心其無筆力乃何明師固請不已余惟求道之要只在緣文尋意豈拘於字之工拙乎輒忘鄙拙勉從其請字多俗作當未免識者之誚然無害於義而小有補於初學故改書于一部皆以古法書之而無一毫自述之意庶得刊行廣施善根圓滿願我主上三殿萬歲無窮先王先后超生淨域聖日佛日長明不盡金輪法輪常運無窮風調雨順歲稔時康萬國欣慶四邊寧靜十方抱識同為極樂之化生法界含靈共作彌陀之海衆次願受持讀誦及見聞隨喜者鐫鍊一士執勞運力者現增福壽當證菩提能度無數百千衆生云云校正兼書大禪師雪訔隆慶三年己巳仲夏全羅道同福地無等山安心寺重刊大賢學記唯唯識師惟我海東唯識宗祖大賢大德其人是也按三國遺事新羅瑜珈祖大德大賢住南山茸長寺寺有慈氏石丈六賢常旋繞像像亦隨賢轉面賢慧辨精敏決擇了然大抵相宗銓量旨理幽深難為剖析賢獨刊邪謬暫開幽奧恢恢遊刃東國後進咸遵其訓中華學士往往得此為眼目云云蓋此即指大賢所著成唯識論學記八卷而言也又新羅僧之屬於本宗者據海東佛祖源流云知光三世為瑜珈師又按宋高僧傳有新羅圓測及順璟皆屬法相之宗列録如下宋僧贊寧所撰唐京西明寺圓測傳云釋圓測者未詳氏族也自幼明敏慧解縱橫三藏奘師為慈恩基師講新翻唯識論測賂守門者隱聽歸則緝綴義章將欲罷講測於西明寺鳴鍾召衆稱講惟識基慊其有奪人之心遂讓測講訓奘講瑜珈還同前盜聽受之而亦不後基也逮高宗之末天后之初應義解之選入譯經館衆皆推挹及翻大乘顯識等經測充證義與薄塵靈辨嘉尚仙方共駕所著惟識疏鈔詳解經論天下分行焉大周西明寺故大德圓測法師佛舍利塔銘并序貢士宋復撰并書法師諱文雅字圓測親羅國王之孫也三歲出家十五請業初於常辨二法師聽論天聰警越雖數千萬言一歷其耳不忘於心正觀中太宗文皇帝度為僧住京元法寺乃覽毗曇成實俱舍婆娑等論暨古今章疏無不間曉名聲藹著三藏法師奘公自天竺將還法師預夢婆羅門授果滿懷其所證應勝因夙會及奘公一見契合莫造即命付瑜珈成唯識等論兼所翻大小乘經論皎若生知復被召為西明寺大德撰成唯識論疏十卷解深密經疏十卷仁王經疏三卷金剛般若觀所緣論般若心經無量義經等疏羽翼祕典耳目時人所以贊佐奘公使佛法東流大興無窮之教者也法師性樂山水往依終南山雲際寺又去寺三十餘里閴居一所靜志八年西明寺僧徒邀屈還寺講成唯識論時有中天竺三藏地婆訶羅至京奉敕簡召大德五人命與譯密嚴等經法師即居其首後又召入東都講譯新華嚴經卷軸未終遷化於佛授記寺實萬歲通天元年七月二十二日也春秋八十有四以其月二十五日燔於龍門香山寺北谷便立白塔在京學徒西明寺王慈善法師大薦福寺大德勝莊法師等當時已愚禮奉無依遂於香山葬所分骸一節盛以寶函石槨別葬於終南山豐德寺東嶺上法師嘗昔往遊之地墓上起塔塔基內安舍利四十九粒今其路幾不通矣峭壁嶄絶茂林鬱閉險僻藏疾人迹罕到埋光蔽德徒有歲年孰知歸仰由是同州龍興寺仁王院廣越法師勤成志願以太宗政和五年四月八日乃就豐德分供養并諸佛舍利又葬於興教寺奘公塔之左創起新塔規範基公之塔一體無異并基公之塔即舊而新之金輪寶鐸層搆雙聳矗如幻成其下各環以廣廡神像崇邃左右以附奘公焉俾至者景慕起信不知何時而已也及於塔之前創修獻殿六楹落成慶讚之日不可求能成文者丐余直序其事繫之以銘銘曰貝葉西來兮其功大教流中區兮斯永賴法匠有憑兮誠際會香山迢遙兮閟幽宮豐德峻阻兮藏靈蹤後人依歸兮何適從有越作緣兮神助力雙塔屹立兮基是式以附奘公兮豈窮極終南相高兮峻倚天盛德巍然兮銘石鐫來者瞻仰兮千萬年尚玄曰據上二文圓測法師雖新羅人始終在唐初不還歸本國者也雖然按三國遺事有孝昭王時圓測法師是海東高德以牟梁里人故不授僧職之文或者測師學得奘公惟識之微旨後暫還鄉里因其不遇再入唐土以終焉者歟三國遺事附竹旨郎亦作竹曼亦名智官第三十二孝昭王代竹曼郎之徒有得烏一云得烏谷級干隸於風流黃卷追日仕進隔旬日不見郎喚其母問爾子何在母曰幢典如今奴呼主稱上典也牟梁益宣阿干以我子差富山城倉直馳去行急未暇告辭於郎郎曰汝子若私事適彼則不須尋訪今以公事進去須歸享矣乃以舌餅一合酒一缸率左人鄉云皆叱知言奴僕也而行郎徒百三十七人亦具儀侍從到富山城問閽人得烏失奚在人曰今在益宣田隨例赴役郎歸田以所將酒餅饗之請假於益宣將欲偕還益宣固禁不許時有使吏侃珍管收推火郡能節租三十石輸送城中美郎之風味鄙宣暗塞不通乃以所領三十石贈益宣助請猶不許又以珍節舍知騎馬鞍具貽之乃許朝廷花主聞之遣使取益宣將欲洗浴其垢醜宣逃隱掠其長子而去時仲冬極寒之日浴洗於城內池中仍合凍死大王聞之敕牟梁里人從官者並合黜遣更不接公署不著黑衣若為僧者不合入鍾鼓寺中敕史上侃珍子孫為枰定戶孫標異之時圓測法師是海東高德以牟梁里人故不授僧職今由孤雲先生記録之文見求禮智異山華嚴寺事迹中可斷圓測法師去來之事即如崔致遠所撰故翻經證義大德圓測和尚諱日文曰觀夫曉日出乎嵎尼尼疑夷之誤光融萬像春風生乎震位氣浹八埏遂能破天下之冥成地上之實然後烏飛迅影回輪昧谷之深虎嘯雄威轍扇商郊之遠是知義因仁發西自東明嘗譬人材何殊物性然而善逝之遺化也竺乾現相震朝傳音故且天域僧來為唐祖者多矣海鄉人去作漢師者鮮焉而得旭日開心浚風調力烏山先照寒土皆融稟奇鋒於外鄉懸朗鑑於中國者惟我文雅大師其人也追惟大德馮鄉士族燕國王孫夙種善芽行攀勝果為鰈海之龍子是雞林之鳳雛繇是襁褓出家早辭塵勞梯航觀國遠艐天庭學寧限於七洲語將通於六國果能天言鼓舌而重談華音海會印心而優探梵義若楚材歸晉如趙璞入秦遂得行高十地之中名達九天之上文皇識寶遽度以為僧武后尊賢實重之如佛每遇西天開士則徵東海異人俾就討論因資演暢是以談經則必居其首撰疏則獨斷于心捿幽則靈感荐臻升座則法音隨應大矣哉囊無輟照衢有餘斟既東流之妙義無窮抑西學之迷羣有託垂拱中則天吾君慕法纍表請還聖帝埀情優詔顯拒故其來也是避秦之賢胤其去也為輔漢之慈靈自是我國釋門高山仰止修業若四河歸海發言如萬籟吟風諸德會議曰故文雅大師功踰倐忽而神遷異壤骨瘞空山但思鵬運扶搖莫見鶴歸華表彼弟子分骸起塔我同人杜口忘機雖觀無二之宗慮缺在三之義况芝蘭設喻久而彌芳木李編詩永以為好既奉嚴師之訓盍修尊祖之儀乃搆忌辰仰追慈祐伏願高遊佛土遠護仁方騰竺嶺之大音出龍宮之上本使法生法滅共燭因緣無我無人永隆功德歸墟縱涸願海常流謹疏宋高僧傳宋左街天壽寺通慧大師賜紫沙門贊寧等奉敕撰唐新羅國順璟傳釋順璟者樂浪郡人也本土之氏族東夷之家系故難詳練其重譯學聲教蓋出天然况乎因明之學奘師精研付受華僧尚未多達璟之克通非其宿植之力自何而至於是歟傳得奘師真惟識量乃立決定相違不定量於乾封年中因使臣入貢附至于時奘師長往向及二年其量云真故極成色定離眼識自許初三攝眼所不攝故猶如眼根良以三藏隱密周防非大智不明璟為宗云不離於眼識自許初三攝眼所不攝故猶如眼識也如此善成他意時大乘基公覽此作便見璟所不知雖然終仰邊僧識見如此故歎之曰新羅順璟法師者聲振唐蕃學包大小業崇迦葉惟執行於杜多心務薄拘恆馳聲於少欲既而蘊藝西夏傳照東夷名道日新緇素飲揖維彼龍象不少海外於此量作決定相違基師念遠國之人有慈利慧搪突奘師暗中機發善成三藏之意惜哉璟在本國稍多著述亦有傳來中原者其所宗法相大乘了義教也見華嚴經中始終發心便成佛已乃生謗毀不信或云當啓手足命弟子輩扶掖下地地則徐裂璟身俄墜時現生身陷地獄焉于今有坑廣袤丈餘實坎𮃼然號順璟探落迦也系曰曲士不可以語道者束其教也是故好白者以黑為污好黑者以白為污焉璟怒心尤重猛利業增如射箭頃墮在地獄列高僧品次起穢以自臭耶通曰難信之法易速謗誚豈惟一人乎俾令衆所知識者直陷三途乃知順璟真顯教菩薩也况乎趙盾為法受惡菩薩乃為法亡身斯何足怪君不見尼犍外道一一謗佛而獨使提婆生陷後於法華會上受記作佛靜言思之高麗唯識宗師有王師韶顯僧統祐翔國尊彌授等諸人而大覺國師亦於本宗有所著書王師韶顯字範圍俗姓李氏門下侍中子淵之子也從智光國師海鱗落髮受學宣宗時為僧統住玄化寺師於寺之南創廣教院仍以新雕經板置于院之中別造金堂一所并繪盧舍那及奘玄奘基窺基二師像自太康九年至師之末年搜訪慈恩所撰法華玄贊惟識述記等章疏三十二部共計三百五十三卷考正其本募工開板私其紙墨印造流通以廣法施謹按大宋高僧傳玄奘師為帷識開祖窺基乃守文述作之宗奘苟無基則何以祖張其學乎始知凡將入於性相義門者捨慈恩之學則罔至其極矣頃自唐文皇太宗以新羅王表請宣送瑜珈論一百卷於是應理圓實之學漸盛于斯土及乎曉法師導之于前賢大賢大統踵之於後燈燈傳焰世世嗣興然而去聖寢遠遺文訛舛者多矣師常疚于懷以其祖門章疏大行於世使學者知本宗之有坦途惟師之力也可謂扶曉矣而方軌齊鶩焉文在金溝金山寺高麗大覺國師有悼慧德王師詩云福慧二嚴全刳心在講宣澆漓千載教弘護一生緣內院因初滿南洲報已遷何管撥雲霧坐見道安天道安法師得天眼通遙見兜率天大覺國師又撰成惟識論單科序云聽惟識論於玄化寺祐翔大師又就餘杭慧因寺源公講下稟受大經東京顯聖寺琳法師門咨決斯論厥後以傳燈為己任因住興王寺講演雜華周於十遍而退隱于伽倻山海印寺愛林泉之樂萌著述之心泛覽百家將利其器以謂起信惟識二論是性相兩宗之樞要學人之所宜盡心者矣然起信論亦嘗粗習但於惟識未盡其功而恐溺彼繁辭迷其要義於是尋研本記斟酌舊科刊而定之勒為三卷倘同志者持科玩論先熟正文後治疏鈔則惟識之旨庶幾乎易見矣瑜珈大士景照字空空其遊刃空門已可謂法王而又餘事工於詩李奎報兔角菴記大崇恩福元寺高麗第一代師圓空碑李穀撰云武宗皇帝歸崇佛乘肇興梵剎于都城之南仁宗皇帝踵而成之以皇慶之元年畢其功乃命諸方韻釋自其年冬開堂講法高麗瑜珈教師圓公領其徒入居之駐錫凡二十九年至元庚辰二月十八日示寂于無虧之堂越五年甲申秋其嗣法高弟玄印等三十餘人成其浮圖又謀載道于石謁文於豫中略公諱海圓俗姓趙氏咸悅郡人父檢校監門衛大護軍奕母完山郡夫人李氏生而端莊天姿慈祥舉止異凡父母嘗曰此兒若不為大官當為大福田年甫一紀投金山寺大師釋宏剃髮學其法日有所進儕輩莫敢望甲午春登選佛科住佛住寺大德乙巳安西王聞高麗僧戒行甚高請于成宗遣使招致之公應其命入覲仍從安西王于朔方北俗不事耕種以畜牧為生食肉飲汁而衣其皮公居其間再寒暑寧忍飢絶不如葷持戒律益勤王愈重之丁未冬奉武宗之旨率徒弟食公廩春秋時巡則令扈駕仁廟繼極命居是寺恩遇益豐道譽益著逮天歷初賜楮幣二萬五千蓋所以寵異之也本國之王大加尊禮疏請遙住百濟金山寺賜號曰慧鑑圓明遍照無礙國一大師封重大匡祐世君榮耀宗門冠於一時公處心寬和行己威重人之見者莫不愛敬於其所謂唯識之論已通大意不與人諜諜爭辨人亦不敢難性且好客無貴賤邪正待之如一賓軒常滿談空説有亹亹忘倦入不償資香積或不繼而囊鉢蕭然沒之日無遺資焉享年七十有九嗚呼真所謂福田歟豫於元統癸酉偕計而來寓公別院報恩僧房故知公孰今之來公殆已踰年而其徒散而之四方豫不能不慨然且憫其學佛者惟事豪奪山門而不知耻曾不如印師輩既能復而有之痛其喪事之緩而克成之不惟能繼其志而報其恩又推其行而垂之無窮是宜銘云云高麗國俗離山法住寺慈淨國尊碑銘并序正順大夫密直司左副代言判繕工寺事進賢館提學知製教臣李叔琪奉教撰奉常大夫典校副令直寶文閣臣金元發書并篆臣謹按釋氏典佛出世一大事因緣騰之口曰教融之心曰禪禪或可以心傳教尤難於口演能口講而演義開發浚蒙為內三學都壇主惟慈恩國一大師是已師諱子安後因夢感改彌授俗姓金氏系出一善郡考皇漢磾追贈奉順大夫典客令妣皇文氏公進之女封和義郡夫人離胎未數日母死隨娣氏以成事甫九歲始就師學詩書一聞輒誦聰敏絶倫十三投元興寺宗然堂下剃度受具習經論十九登選佛場上品科得住國寧寺二十九拜三重大師主講唯識論一宗耆師碩德咸執經座下共歎希代之彥弱齡博學荷擔宗乘為一時標準以三重主法前古未曾有而師為之二住熊神寺別批為首座三住莊義寺又加僧統四住俗離山法住寺詣殿下申聞下山大將軍金子廷出傳王旨末法大宗匠曠劫難遇請撰經論章疏流通於世開蒙後進自承命以來手不釋卷講論無間暇弘揚一代教為己任撰述經論之解凡九十二卷五住重興寺至太尉大王忠宣王也即祚之年戊戌五月下批為釋教都僧統重興寺住持行智圜明大師六住瑜珈寺上之在燕都也尤信向大般若經令宿衛臣僚常夜誦之由是殿下一行皆誦大般若經嘗一日於上國講主講釋難信解品諸講師云此無釋解者上遣使於師請撰解又請述心地觀經記皆即疏記附使封獻諸講覯止爭相讚美服其稀有上心益加崇信七復莊義寺戊申四月下批為大慈恩宗師開內三學都壇主大莊義寺住持五教都僧統廣智妙辨佛覺普明大師開內三學都壇主缺略己酉為崇教院教學癸丑下批為大慈恩宗師三重大匡兩街都僧統菩提薩陀摩訶國一大師祐世君別頒一品俸祿甲寅春延慶宮百八萬僧齋日萬僧致齋百八日也上手獻兩街都僧統新鑄印乙卯封為內殿懺悔師三學法主德慧圓證藏通玄辨國一大師命立懺悔府別鑄銀印專管僧政始差五教二宗共議寺事丁巳加封佛海澄圓弘慈廣智大導師戊午備法駕邀入大旻天寺講院講三家章疏辛酉以法住寺為下山所又移住桐華寺甲子奉崇為悟空真覺妙圓無礙國尊乙丑復住法住寺至丁卯十二月吉早命入室修書上主上封印付尚州牧使金永厚重封日將䀯蕭然坐逝至八日茶毗于寺之西北缺略塔于珊瑚殿東隅享年八十八受臘七十五師為人略無緣飾因性循理遵道而行居常以寅粥午飯度日過中不食凡住重興寺十八年不因邀請一不踐權貴之門日翻海藏內書經論無一不貫穿乃至餘書外典亦皆涉臘強記學不厭教不倦恆存誘掖後進之心雖末學童蒙請講某書歡然受請即講不問隆寒酷暑居處便否因以四方學者雲集霧從冀蒙餘潤一國公卿士大夫子弟之為佛學者多出堂下平生事業率如此上聞訃悼惜差官辦後事贈諡慈淨國尊塔號普明今上膺內禪之元年秋八月命小臣文之臣叔琪聞命栗惶不知所裁屏營隕越之地謹盥手拜稽為之銘曰法王出世如優曇花心燈外燭智鑑內磨主張三學福利王家七十五臘霈茲恩波棄閻浮界歸兜史陀骨藏不露名震瑜珈王立白塔青山之阿命臣勒石文拙無華濡毫當撰周慞孔多至正二年壬午九月日高麗國大瑜珈桐華寺住持五教都僧統普慈國尊贈諡弘真碑銘奉翊大夫副知密直司事國學大司成文學士臣金烜奉教撰正議大夫密直司左承旨判祕書寺事文翰學士充史館修撰官知制誥臣金恂奉教書師諱惠永俗姓康氏聞慶郡人也考內園丞兼直翰林院諱子元妣洪氏朝散大夫戶部侍郎充史館修撰官仁衍女也師生於戊子歲年至十一投首座沖淵堂下剃髮于南白月寺十七中王輪寺選佛場初住興德寺己未歲批授三重大師仍為乙丑選座主中統癸亥加首座至元四年移住俗離寺己巳加僧統卒中贊柳公璥請白衣禮懺師旁引經文撰解一卷傳為龜鑒甲戌移住佛國寺丙子到通度寺乞得舍利數枚常置左右復分身多矣每有乞之者輒與之亦不減數是年移住重興寺命留京輦凡九年嘗獻詩乞退云戀君可忍辭金闕臨老長懷潄石泉日月瞻光無遠邇願歸林下祝高年乙酉移住瑜珈寺庚寅領寫經僧衆一百員到大元國大都以金字法華經為贄拜見世祖皇帝特承勞慰寓慶壽寺厲衆嚴肅無不敬服一日萬安寺堂頭以種種幢蓋莊嚴道場請師講仁王經師升座演説快若懸河四衆景仰如見佛日至翌年以金泥寫大藏經畢帝乃嘉之賜遺甚厚遣使伴還本國師之顯美於大國為所敬重如是曾賈勇於自家射工穿葉又遊心於諸法理入忘筌壬辰上封師為國尊命近侍內衣直長閔頔往迎於瑜珈寺師愕然不悅意欲避之緣督強起十月入京師上命大將軍黃元吉持內馬出天壽寺迎入崇教寺別院二十二日册為國尊法號普慈二十六日於壽寧殿上率群臣行納五拜之禮又加五教都僧統命住桐華寺癸巳三殿朝覲請師駐錫成道寺主法至元三十一年五月十九日師示微恙會下明德問疾師云但飲食不調且對衆從容談笑自若至二十四日寅末喚侍者修遺書封印付囑行李別監崔洪旦振身端坐舉揚華嚴經十地品俄頃泊然而逝色貌鮮白三日不改大地遍白二月初二日茶毗于龍首山南岡拾靈骨立塔於桐華寺享年六十七法臘五十六時上適赴會同朝在上都覽遺書震悼贈諡弘真塔號真應師天稟秀拔聰敏過人慈悲為體矜恕為心嚴毅寡辭慢無彼此但隨處講授後進為業嗚呼真一國所尊之法王也其平生德感靈應不為不多皆真攬細事又恐落於怪誕此不具載門人金山寺住持僧統孝棹等瀝袞悰而漏滴重泉呈行狀而陳情九闥煩傳鴻迹請立龜趺爰命小臣俾揚景行於不朽第虞淺藝具述真猷之未當然有敕義不辭難強顏撰之以實銘曰衆生差別妄見生滅覺雄出現隨機演説權實頓漸同軌殊轍慈恩奧旨尤難析理慈氏傳之無著得髓奘基宣布洎于東土哲人相總稱為八祖師其嫡嗣不愧於古道彌輿蓋學通內外福利無窮邦家所賴以仁接物去華取實匿己之長護人之失隨處弘真學者咸歸惟德是依稽展摳衣強膺厥命位是心非真風大扇佛日增輝預識其時示寂如始天容亦慘物色含悲黃龍壁松率居神畫新羅真興王二十七年皇龍寺成有率居者畫老松於壁體幹鮮皴枝葉盤屈鳥雀往往望之飛入及到蹭蹬而落畫久色漫寺僧以丹青補之鳥雀不復至又芬皇寺斷俗寺佛像皆率居手迹世稱神畫此後以繪事見於佛史者如左興輪寺壁畫普賢新羅第五十四景明王時興輪寺南門及左右廊廡災焚未修靖和弘繼二僧募緣將修貞明七年辛巳五月十五日帝釋降于寺之左經樓留旬日殿塔及草樹土石皆發異香五雲覆寺南池魚龍喜躍跳擲國人聚觀歎未曾有玉帛稻粱施積丘山工匠自來不日成之工既畢天帝將還二僧白曰天若欲還宮請圖寫聖容至誠供養以報天恩亦乃因茲留影永鎮下方焉帝曰我之願力不如彼普賢菩薩遍垂玄化畫此菩薩像虔誠供養而不廢宜矣二僧奉教敬畫普賢菩薩於壁間至今猶存其像三國遺事衆生寺觀音像新羅古傳云唐帝有寵姬美艷無雙謂古今圖畫鮮有如此乃命善畫者寫真畫工傳失其名或云張僧繇則是吳人也梁天監中為武陵王國侍郎直祕閣知畫事歷右將軍吳興太守則乃中國梁陳間之天子也而傳云唐帝者海東人凡諸中國為唐爾其實未詳何代帝王兩存之其人奉敕圖成誤落筆污赤毀於臍下欲改之而不能心疑赤志必自天生功畢獻之帝目之曰形則逼真矣其臍下之志乃所內祕何得知之并寫帝乃震怒下圓扉將加刑丞相奏云所謂伊人其心且直願赦宥之帝曰彼賢直朕昨夢之像畫進不差則宥之其人乃畫十二面觀音像呈之協於所夢帝於是意解赦之其人既免乃與博士芬節約曰吾聞新羅國敬信佛法與子乘桴于海適彼同修佛事廣益仁邦不亦益乎遂相與到新羅國因成衆生寺大悲像國人瞻仰祈禳獲福不可勝記三國遺事高麗忠宣王二年十二月甲寅贊成事裴挺以王旨如元獻畫佛又忠肅王八年夏四月王春三月忠肅王薨此王謂忠惠王也遣三司右尹金永喣如元獻畫佛畫鑒云高麗國畫觀音像甚工其原出於唐尉遲乙僧筆意流而至於纖麗又因樹屋書影宋湯載云高麗國畫觀音像甚工其原出於唐尉遲乙僧筆意按尉遲乙僧外國人作佛像甚佳用色沉著堆起絹素高麗恭愍王善畫畫達磨折蘆渡江圖普賢六牙白象圖賜龜谷覺雲禪師李牧隱作贊慵齋叢話恭愍王畫格甚高今圖畫署魯國大長公主真及興德寺釋迦出山像皆其手迹云云又長湍華藏寺藏有恭愍王自寫真影一軸亦奇寶也春川清平寺帝釋幀亦係恭愍王所畫也朝鮮明宗大王時普雨和尚撰清平寺帝釋幀重修記懶菴雜著云天下之物雖有萬不一凡為人之所以為貴者造物亦必惜之雖遇可棄之時若有神祕自無終棄於不捨之地茲畫也乃高麗玄陵宸翰之妙出誠千古絶代之至寶山無老眼捲置佛座之下幾致朽盡越戊午夏李某一國之名畫士也李某者即李君吾也懶菴集中清平寺彌陀幀重修記云昔殿前承旨庾公乃中朝一代詞林之重寄天賦之裕亦盡四六之藝而志專內外之護暫輟經國之筆乃繪西仙之像以化東人之心然凡物非自靈也必人貴而敬之然後靈物非自行也必人舉而用之然後行是畫也中失貴舉之者空擲佛卓之下久矣曾不知其幾歲月也越戊午夏李君吾東國名畫士也以事來寺得見是畫於不期之地乃驚嘆曰吁真天下之妙筆何乃至於此極也即拭塵土重補敬安于金殿上令人禮敬焉欽承慈旨來監丹雘于是寺休筆之餘忽見是畫於不圖底地乃喟然驚嘆曰真世神筆不遇知者空擲板下若非頂眼曷識天筆即拂塵重粧敬焚牛首躬挂金壁令人瞻禮焉三十三天之相像髣佛如雲裏之秋月百福莊嚴之間錯依俙若煙中之寶山於是雲欣水悅僧顛俗倒凡諸見聞者莫不興敬真今所罕有之勝因緣也此豈非所謂造物惜之而使李君重光寶簇於今日者也嗚呼美哉正宗朝創建水原龍珠寺使金弘道檀園作佛殿幀畫排鋪精巧其妙入神至今猶存尚玄曰朝鮮以還儒家者流輒以玩物喪志為戒凡屬圖寫美術皆賤視而不為之何况貴重古畫哉儒教殘餘之果在仕途則四色戰之碁翻而已在經學則一朱注之膠守而已白月碑字金生名筆新羅宣德王時有金生者父母微不知世系自幼能書平生不攻他藝又好佛隱居不仕年踰八十猶操筆不休隸行草皆入神學者傳寶之宋崇寧中高麗學士洪灌奉使入宋館於汴京時翰林待詔楊球李革奉帝敕書圖簇灌以金生行草一卷示之二人笑曰天下除右軍焉有妙筆如此者灌屢辨之終不信近元學士趙孟俯跋金生所書昌林寺碑曰字畫深有典型雖唐人名刻未能遠過之觀宋元三學士之評則金生隸行草三法稱為入神非虛譽也釋端目集金牛字書白月禪師碑本在奉化郡駝子山石南寺寺廢碑存久矣榮川郡守李沆寶惜其筆正德四年八月移置于榮川郡子民樓下元明以來華使之東渡者每多印歸以為至寶故至有渡江先問金生字之詩此即榮川邑志所謂明使朱之蕃來朝鮮地先問白月碑因印千章而去者也其後民以為苦斃折腰埋地肅宗十九年復現出云云輿地勝覽忠州北津崖有金生寺生修頭陀行居是寺因以為名又忠州有金生面諺傳金生生地故名其他沙門之善書者新羅真興王時靈普和尚善書與金生筆法相伯仲元和八年新羅東溪沙門靈業書斷俗寺神行禪師之碑又金大定十二年高麗沙門機俊奉宣書斷俗寺大鑑國師之碑皆筆力遒徑高麗坦然禪師亦善書清平山文殊院記其筆迹也高麗王子僧圓鏡筆迹在楊州檜巖寺大定甲午歲西都叛謂妙清反於平壤也西北路梗金使至從春州路導迎金使入寺禮像設訖聚觀書一人曰貴人筆也一人曰此山人書蔬笋之氣頗存時有僧在其傍以實告二人皆喜其言中乃題詩曰王子膏梁氣半存山人蔬笋尚餘痕顛張醉素無全骨却恨當年許作髠高麗末頃幻庵混修禪師善晉帖書長城白羊寺雙溪樓李穡記之幻庵書之美工術石窟刻佛像新羅舊都石窟菴佛像在穹窿形中央安釋迦像座身長一丈一寸於周圍奠三十六軀之肉雕佛菩薩像其技巧結搆為東洋美術之第一昔有愚僧住持是寺於穹窿外面琢石作屋蓋形遂破真面目竟至雨水滲漏侵濕佛像殊不美觀今總督府不惜重費修繕而保存之蓋石窟在佛國寺之東偏海邊佛像東向而坐今欲考究造像之緣起及其工技自何而來須要先知佛國寺之事迹三國遺事大城孝二世父母神文王代牟梁里一作浮雲村之貧女慶祖有兒頭大頂平如城因名大城家窘不能生育因役傭於貨殖福安家其家俵田數畝以備衣食之資時有開士漸開欲設六輪會於興輪寺勸化至福安家安施布五十匹開呪願曰檀越好布施天神常護持施一得萬倍安樂壽命長大城聞之跳踉而入謂其母曰豫聽門僧誦唱云施一得萬倍念我定無宿善今茲困匱矣今又不施來世益艱施我傭田於法會以圖後報何如母曰善乃施田於開未幾城物故是日夜國宰金文亮家有天唱云牟梁里大城兒今託汝家家人震驚使檢牟梁里城果亡其日與唱同時有娠生兒左手握不發七日乃開有金簡子雕大城二字又以名之迎其母於第中兼養之既壯好遊獵一日登吐含山捕一熊宿山下村夢熊變為鬼訟曰汝何殺我我還啖汝城怖懅請容赦鬼曰能為我創佛寺乎城誓之曰喏既覺汗流被蓐自後禁原野為熊創長壽寺於其捕地因而情有所感悲願增篤乃為現生二親創佛國寺為前世爺娘創石佛寺請神琳表訓二聖師各住焉茂張像設且酬鞠養之勞以一身孝二世父母古亦罕聞善施之驗可不信乎將雕石佛也欲鍊一大石為龕蓋石忽三裂憤恚而假寐夜中天神來降畢造而還成方擾起走跋南嶺爇香木以供天神故名其地為香嶺其佛國寺雲梯石塔雕鏤石木之功東都諸剎未有如也古鄉傳所載如上而寺中有記云景德王代大相大城以天寶十年辛卯始創佛國寺歷惠恭世以大歷九年甲寅十二月二日大城卒國家畢成之初諸瑜珈大德降魔住此寺繼之至于今與古傳不同未詳孰是讚曰牟梁春後施三畝香嶺秋來獲萬金萱室百年貧富貴槐庭一夢去來今大華嚴佛國寺事迹現存於日本奈良華嚴宗東大寺今略記其重創年時如左一創梁大通二年戊申新羅法興王二十七年始基二創陳宣帝大建六年甲午新羅真興王三十六年重興三創唐高宗咸亨元年庚午新羅文武王十年創無説殿講華嚴四創唐明皇天寶十年辛卯新羅景德王十年重創尚玄曰據是則金大城創佛國寺云者係是重創也五創唐僖宗光啓元年丁未新羅真聖王元年六創宋仁宗天聖二年甲子高麗顯宗十五年七創南宋孝宗乾道八年壬辰高麗明宗二年毗盧殿極樂殿重創八創元仁宗皇慶元年壬子高麗忠宣王四年九創明英宗正統元年丙辰朝鮮世宗十八年十創明弘治三年庚戌朝鮮成宗二十一年十一創明世宗嘉靖四十三年甲子朝鮮明宗十九年十二創清順治十六年己亥朝鮮孝宗十年據是則金大城創佛國石佛二寺而寺以石佛為名疑即今石窟之佛像者是也其云茂張像設其云雕石佛等語事實尤確也天神降造之説雖云不可信新羅當時工技之術極為巧妙景德王命造萬佛山送于唐代宗代宗歎其天造推此可知人巧亦能造此像也按新羅善德王時造皇龍寺九層塔以無善工故請於百濟而景德王時工術發達至奪天造疑其淵源出於百濟百濟聖王時當新羅法興王時送佛工寺匠等於日本則百濟之工匠自來已有名矣但百濟武王造彌勒寺塔像新羅真平王遺百工助之此則為女壻之助役也非為百濟無工而遣之也今全羅道故百濟地也其人皆精巧善竹木細工實有百濟工術遺傳之魂也附新羅高麗時代佛教的遺迹關野貞演述密教第三卷第一號大正二年四月草日發行譯本今日欲以新羅高麗時代之佛教的遺迹為題而演説焉抑朝鮮自李朝以來排斥佛教其結果佛教的藝術亦衰只建築外殆無可觀之遺物今就三國高麗即佛教最發達極勢力之時代之遺迹言之朝鮮之佛教距今千五百四十年前高句麗小獸林王二年始入其次入于百濟新羅其後新羅一統高句麗百濟而為新羅統一時代其次又為高麗時代今分朝鮮佛教發達之時代如下一三國時代二新羅時代三高麗時代四朝鮮時代而三國時代支那南北朝之藝術初入高句麗次入百濟新羅又自南朝別從海路及其影響於三國故佛教之隆盛達其頂點新羅則法興真興二王百濟則聖王之時也其潮流為日本佛教形成推古時代矣三國時代之佛教與支那南北朝之佛教與日本推古時代之其者共為連鎖也又距今千二百五十年前即自新羅統一他二國之後支那之唐之文化輸入以來唐代發達之藝術影響所及者大形成新羅統一時代之藝術即自太宗王武烈王文武王至景德王惠恭王之頃支那則當唐太宗高宗乃至玄宗之頃日本則當天智天皇乃至聖武天皇孝武天皇之時代建築及其他藝術進步多大雖然降自千五十年前有漸衰之風即于此頃失其雄大之風而現一種變換之趣味與其云雄大也寧云纖巧優美此則新羅國民之性質現于美術之上者如是故也自今九百八十年前新羅亡而高麗起光宗文宗之時佛教大為發達大覺國師其他有名高僧輩出建興王寺演福寺及妙香山普賢寺等此時代之藝術固新羅之繼統而其發達亦有多少之異而有一種之特色距今九百年乃至九百八十年前間即自高祖至文宗之頃其最極隆盛之時也後自八百年頃隨其時代漸降漸衰而概言之則高麗時代佛教可云盛矣要之通此三時代總由社會之狀態而技術流于纖弱者也自爾又五百年前高麗亡而朝鮮起除世祖外歷朝皆排斥佛教故大為衰退建築之外殆無可見之遺物也又與此同時自日本太閣謂豐臣秀吉也龍巳之役而亦自滿洲之方頻頻侵入故三國以後僅得殘存之物亦終以破壞雖幸有再建之者而回復新羅高麗時代其者之事終不可能也今就遺物以見之三國時代則如前述受了南北朝之影響而有不劣于彼者然而建築云者一無遺存然於日本之法隆寺等處猶得見其當時之遺物若以此為受了三國時代之影響則由此而可得知三國時代之建築之為如何也雕刻之方則幾分殘餘舉其重者以言則於慶州新羅故都西嶽之麓發見一彌勒像其半身埋於土中者為四十二年其頭部與兩手俱缺惜哉此與日本法隆中宮等寺所存之者殆同樣式係是距今千三百年前之物而為現今朝鮮所存最古之石雕刻物也又有銅像彌勒昨年入于朝鮮總督府之手此像高三尺許凡皆完全與支那之北魏或法隆寺之像同一性質而約千三百五十年以前之物也又昨年屬于京城博物館之金銅彌勒像則較前者更一層優美而殆近千三百年之物也外又有小者京城博物館有十軀個人所持者有十軀皆與支那之北魏我推古朝之物同一性質由是瞭然於三國時代受了南北朝之感化而來及日本之事也新羅統一時代之物則比較於前猶多遺存者建築則無木造而有石或煉瓦煉瓦朝鮮人謂之甓而支那人則謂之甎之物雕刻則石又銅或鐵而其他有浮屠石燈籠墓碑鍾等今就其中建築以言則塔為主慶州芬篁寺有九層之塔今惟存三層距今千二百八十年前所建之物而其材料則安山巖之煉瓦大者也即倣支那隋唐時代之煉瓦塔而用石造之者也其形初層大而二層以下漸小四方有門口左右有立石刻二王之像全似隋時代之物蓋支那南北朝之物入于隋而為完全而一方則別起新樣式至于後遂得勢力矣然而此塔則初唐時代之物而一方為南北朝之風又一方將成唐代之風而即與隋式殆同性質畢竟朝鮮其發達較支那多少遲後者也又前於三國之馬韓之古都益山有朝鮮石塔中最大者疑本九層而今惟存六層其初層有方二十七尺高五十尺許全體之形狀釣合實好個物也又舉新羅時代成造之最巧者以言則有二焉智異山華嚴寺之舍利塔與慶州佛國寺之多寶塔是也舍利塔則成以壇二層而其上建塔三層下壇四方刻天人像上壇四隅有石造獅子而此中央之像是慈藏法師云此是緣起祖師之誤統以言之與其云雄大寧可云纖巧也佛國寺之多寶塔元來此寺最多有新羅時代之遺物而對此多寶塔有釋迦塔並立於本堂謂佛殿也前面左右此多寶塔非如前者無石獅子而以四角之石柱支其塔焉統言之有木造而石模之風然千百六十一年前即景德王十年所建者而今猶完全要之如前所述失其雄大之風而寧為纖巧優美也又慶州之北四里朝鮮四十里淨慧寺有十三層之石塔初層大而二層以上忽急小如斯十三層之物日本則於多武峯只有一木造之者也又有煉瓦塔即甓塔也舉其一例安東有二焉一為五層一為七層與芬篁寺之塔殆有同樣之風屋脊蓋以瓦朝鮮有五六個屬于此種之塔皆可云支那隋唐時代之模倣也又有石與甎混作之塔蓋用粗頑天然之石而以石灰塗其表面者形之上有三五七九十三層等又有如佛國寺多寶塔之形者而其形態手法無一非好好成造者也又浮屠即墓塔之例新羅時代則頓少前在原州興法寺之廉巨塔為八角而似石燈籠其中收藏舍利是則唐之會昌四年即千七十一年前所建者也次雕刻則有石鐵銅之三種而就中石刻者多遺存佛國寺後一里許之山有石窟菴天井則石而造於穹窿之上覆土其上是倣支那之石窟而作之者也而支那則北京之西北大同之石佛寺及洛陽龍雲多有石窟皆鑿開天然之巖石而造之者也此石窟菴則用御影石以倣造者也然而內部則為圓形中央安置丈六釋迦像於蓮座之上其周圍之壁雕有十大弟子梵天帝釋天十一面觀音等像其門口作有四天王六神將等像此則受了唐之感化而造之者而其優麗豐美之氣象實可目為今日朝鮮遺存雕刻中之最傑作也又銅刻之大者慶州有三個其中二個在佛國寺一則彌勒一則彌陀之像他一個在柏栗寺是則藥師之像也又有小者昨年旅行於金剛山榆岾寺之佛殿內發見四十四軀小佛像皆新羅時代之物而其大者可方一尺三四寸今有如是多數之佛像聚在一處可珍貴也又京城博物館有十數個人私藏之小佛像四五十軀統以言之受了唐時代之感化而失雄大之風而流於纖巧也又石燈籠則俗離山法住寺有四個而其中火袋刻四天王像者與對立雙獅子以代竿石者并最優皆約千百五六十年前之物也又華嚴寺佛國寺廢開天寺亦有好個石燈而亞于法住寺之物次就鍾言現今遺存者有二個一是慶州奉德寺之鍾直徑為八尺於朝鮮為最大之鍾雖由技術上見之通朝鮮日本支那而少其類自今千百四十二年前鑄造即日本之寶龜二年也鍾之緣飾有寶相花之模樣又其周圍浮雕天人之像他一個在五臺山之上院寺昨年發見讀有開元十三年之銘文徑可三尺較前者雖小而古五十年許皆表出朝鮮鍾固有之特色日本亦有三十許之朝鮮鍾尾上之鍾三井寺圓滿院之鍾宇佐八幡之鍾皆其也朝鮮鍾之特色云者一龍頭有旗插之特色二鍾之上下之端有緣飾之特色三以帶作乳廓之特色四乳廓之間有天人等像之浮雕之特色也墓碑亦有多少其中有名者則智異山雙溪寺真鑑國師之碑而唐光啓三年即千二十五年前所建立有新羅崔致遠之撰并書其形式與支那之碑少異而現出一種特別之風大概新羅之藝術品則如前言傳得唐時代之形式而由多少國民之特性而為朝鮮化者也次言高麗時代此時代則自九百八十年前終於五百年前頃也於新羅之遺風加以宋元之感化更混以此時代之特色矣又至此時代木造建築始現出來可注意者也昨年之調查始有發見者即太白山之浮石寺義相國師創立之無量壽殿及祖師堂二者也無量壽殿比較的為大建築似我鎌倉時代之物而現最優雅穩健之特色之傑作也又其內部安置之木雕丈六釋迦如來之像亦高麗時代唯一之木雕佛也祖師堂則小建築上可見之點雖少而壁有四天王菩薩像等之描畫此亦高麗時代唯一之繪畫也石造者塔為主前時代之物則四角者多此時代以來則六角八角等塔出來矣今京城鐵道管理局之官舍內所有淨兜寺五層石像自其中文書出知其為自今八百八十二年前建築之物全體自新羅時代之物見之則技術為劣此外平壤停車場前六角七層塔永明寺之八角五層塔妙香山普賢寺之九層塔重熙十三年開城玄化寺之七層塔等為最重要者又全羅南道綾州之多塔峯有數十個羣塔此等之塔三層五層七層九層不等而其形有方者有圓者又有如算盤球之樣次浮屠即墓塔原州真空大師塔九百八十年前成造臺石有龍之雕刻塔之側有碑高麗太祖撰文集唐太宗之書故為有名之物次驪州廢高達院元宗大師慧真塔宋開寶八年八百三十八年前成造下之石臺雕有乘龜背之龍又塔身有四天王之雕刻又浮屠之最精巧者則原州法泉寺智光國師之玄妙塔是則遼太平元年自今八百二十八年前成造自塔下至其頂上一面充之以雕刻以現最富麗之氣象而技術則稍劣又雕刻存在者少而其多者是石雕其稀者是鐵又木雕也昨年發見惟一傑作之木雕即由浮石寺之無量壽殿中見出釋迦之尊像此當日本鎌倉時代之物而帶有多少古調石雕者多而以技術言之劣於前代之物其最大者恩津灌燭寺之彌勒之大像也腰以上一以下一及兩肩各一合以四石造成以技術言之則少可取之點自今八百年前之物也立像而高有六十五尺他則大概刻付於巖石者也次石碑則多數而多見之又當時之鍾則京城有遺存者而其多數則來于日本京城博物館所有興天寺鍾京城本願寺別院之鍾此經本在楊樓龍門山之菩提寺前韓隆熙三年己酉退俗僧鄭華三以千二百圓之價賣之開城南門樓上古演福寺之鍾等最優本願寺別院之鍾是朝鮮與支那之風折衷者也開城之鍾元式也鍾多來日本而朝鮮自國則少有者何故也應亦有多少倭寇之關係也最後可一注意者伽倻山海印寺有高麗大藏經之板木之事也牧藏于大廈庋棟之中皆整理得好了各板木之端作以金具似是凡六百五十年前之製作也現今芝增上寺之高麗版大藏經即其印刷者也要之三國時代則受了南北朝之感化新羅時代則受了唐之影響此新羅時代亦可謂朝鮮藝術之黃金時代而末乃失却雄大之風而朝鮮獨特之纖巧之風起來矣又高麗時代則於新羅時代與宋元更加以高麗之特色以發展之後終以衰然而其遺物則石為主木銅及鐵等則稀少今與日本比較以見之石之物則於日本頗乏而木造之建築木造之塑像乾漆等雕刻及紙與絹上所寫之繪畫則極為豐富然而朝鮮則自三國至高麗時代遺存之者謂之絶無可也此非但朝鮮為然也支那亦同樣日本何故多其遺物是有種種之關係一國體之關係也即日本為萬世一系本無革命等事亦無外國之侵掠故寺院等亦少燒燬破壞等事朝鮮則反是革命常起亦有外患每當其時名剎等被燒故也二日本則宗教上變動比較的少故也支那朝鮮則新宗教起則排斥舊宗教而其所關之寺院之建築佛像佛畫工藝品等亦從以破壞故支那朝鮮所起之宗教皆來日本保其餘命而其佛教的遺物美術品等亦隨之而來日本始得保存其完全也完山造萬佛驚歎唐帝三國遺事云新羅景德王聞唐代宗皇帝優崇釋氏命工作五色氍毹又雕沉檀木與明珠美玉為假山高丈餘置氍毹之上山有巉巖怪石澗穴區隔每一區內有歌舞伎樂列國山川之狀微風入戶蜂蝶翱翔燕雀飛舞隱約視之莫辨真假中安萬佛大者逾方寸小者八九分其頭或巨黍者或半菽者螺髻白毫眉目的皪相好悉備只可倣佛莫得而詳因號萬佛山更鏤金玉為流蘇幡蓋菴羅薝葍花果莊嚴百步樓閣臺殿堂榭都大雖微勢皆活動前有旋繞比丘像千餘軀下列紫金鍾三虡皆有閣有蒲牢鯨魚為撞有風而鍾鳴則旋繞僧皆仆拜頭至地隱隱有梵音蓋關棙在乎鍾也雖號萬佛其實不可勝記既成遣使獻之代宗見之歎曰新羅之巧天造非人巧也乃以九光扇加置巖岫間因謂之佛光四月八日詔兩街僧徒於內道場禮萬佛山命三藏不空念讚密部真詮千遍以慶之觀者皆歎服其巧讚曰天將滿月四方裁地湧明毫一夜開妙手更煩雕萬佛真風要使遍三才蔥嶺毒龍無漏去度釋無漏姓金氏新羅國王之次子也少附海艦達于中華欲遊五竺禮佛入塔既渡沙漠涉于闐已西至蔥嶺入大伽藍其中比丘皆不測之僧也問漏攸往之意未有奇節而詣天竺僧曰舊記無名未可輒去此有毒龍池可往教化如其有驗方利涉也漏依請登池岸唯見一胡麻乃據而坐至夜將艾雷電交作其怪物吐氣蓬勃種種變現眩曜無恆漏瞑目不搖動久之乃有巨蛇驤首于膝上漏悲閔之極為受三皈而去復作老人形來致謝曰蒙師度脫義無久居吾三日後捨鱗介苦依得生勝處此去南有盤石是弟子捨形之所亦望間預相尋遺骸可矣漏默許之又曰必須願往天竺者此有觀音聖像禱無虛應可祈告之得吉祥兆可亦勿疑漏乃立於像前入於禪定如是度四十九日身嬰虛腫略無傾倚旋有鼠兒猶彈丸許咋左脛潰黃色薄膿可纍斗而愈漏限滿獲應群僧語之曰觀師化緣合在唐土心存化物所利滋多足倦遊方空加聞見不可強化師所知乎漏意其聖賢之言必無唐發如是却回臨行謂漏曰逢蘭即住所還之路山名蘭乃馬前記遂入其中得白草谷結茅棲止無何安史兵亂肅宗訓兵靈武屢夢有金色人念寶勝佛於御前翼日以夢中事問左右或對曰有沙門行迹不羣居于此山恆誦此佛號召至帝視之曰真夢中人也及旋置之內寺供養纍上表章願還舊隱帝心眷重未遂皈山俄云示滅焉一日忽於內門右闔之上化成雙足形不及地者數尺閽吏上奏帝乘寶輦親臨其所得遺表乞歸葬舊隱山之下即時依可遣中使監護送導先是漏行化多由懷遠縣因置廨署謂之下院喪至此神座不可輒舉衆議移入構別堂宇安之至今真體端然曾無變壞已三神僧傳續文獻通考云無漏新羅僧也玄宗一夕夢沙門身金色誦寶勝如來名以問左右對曰賀蘭白草谷有新羅僧名無漏者常誦此佛頗有神異帝乃召見於行在喜曰真夢中所見僧也遂與不空胡僧並留於行宮托以祈禱寂時合掌凌空去地尺許而逝欲歸藏舊谷送至懷遠縣下院輒舉不動遂以香泥塑全身留下院見神僧傳尚玄曰無漏和尚蓋神僧也求法西域未達其志惜哉此外又有三神僧如下釋地藏俗姓金氏新羅國王之支屬也心慈而貌惡頴悟天然于時落髮出家涉海徒行振錫觀方至池陽覩九子山心甚樂之乃徑造其峯而居焉藏嘗為毒螫端坐無念俄有美婦人作禮饋藥云小兒無知願出泉而補過言訖不見視坐左右間沛然流衍時謂為九子山神為湧泉資用也至德年初有諸葛節率村父自麓登高深極無人唯藏孤然閉目石室其房有折足鼎鼎中白土和小米烹而食之羣老驚嘆曰和尚如斯苦行我曹山下列居之咎耳相與同構禪宇不纍載而成大伽藍本國聞之率以渡海相尋其徒且多無以資歲藏乃發石得土其色清白不磣如麵而其衆食其土其衆請法以資神不以食而養命南方號為枯稿衆莫不宗仰龍潭之側有白墡硎硎取之無盡一日忽召衆告別罔知攸往但聞山鳴石隕扣鍾嘶嗄跏趺而滅年九十九其尸坐于函中洎三稔開將入塔顏貌如生舉舁之際骨節若撼金鎖焉見神僧傳續文獻通考云金地藏新羅國僧至德間渡海居青陽九華山嘗以巖間白土雜飯食之人以為異年九十九忽召徒衆告別但聞山鳴石隕俄示寂趺於函中洎三稔將入塔顏色如生舁之骨節皆動若撼金鎖焉全唐詩金地藏新羅國王子至德初航海居九華山九華山録化城寺在九華山寺宇甚佳唐時新羅王子金地藏修行之地金地藏塔又在寺後周必大省齋集謁金地藏塔詩攀蘿度險捷猱猿石角鈎衣履纍穿莫訝遠尋金地藏也曾徐步玉階前三才藻異屠粹忠金地藏贊食飯雜泥開函見骨峯何取九生不滿百僧金師新羅人居睢陽謂録事參軍房琬云太守裴寬當改琬問何時曰明日午敕書必至當與公相見於郡西南角琬專候之午前有驛使兩封牒到不是琬以為謬也至午又一驛使送牒來云裴公改為安陸別駕房遽命駕迎僧身又自去果於郡西南角相遇裴召問僧云官雖改其服不改然公甥姪各當分散及後敕至除別駕紫紱猶存甥姪之徒各分散矣見神僧傳釋無相新羅國人也彼土王第三子玄宗召見隸於禪定寺號無相遂入深蹊谷巖下坐禪有黑犢二交角盤礡於座下近身甚急毛手入其袖其冷如氷捫摸至腹相殊不傾動每入定多是五日為度忽雪深有二猛獸來相自洗拭裸臥其前願以身施其食二獸從頭至足嗅匝而去往往夜間坐床下搦虎鬚毛既而山居稍久衣破髮長獵者疑是異獸將射之復止復搆精舍於亂墓間成都縣令楊翌疑其幻惑乃追至命徒二十餘人曳之徒近相身一皆戰栗心神俱失頃之大風卒起沙石飛揚直入廳事飄簾捲幕楊翌叩頭拜伏喘不敢語懺畢風止奉送舊所相至成都也忽有一力士稱捨力伐柴供僧廚用相之弟本國新為王矣懼其却回其國危殆將遺刺客來屠之相已冥知之矣忽曰供柴賢者暫來謂之曰今夜有客曰灼然又曰莫傷佛子至夜薪者持刀挾席獨坐禪座之側逡巡覺壁上似有物下遂躍起揮刀巨胡身首分於地矣後門素有巨坑乃曳去𫞬之復以土拌滅其迹而去質明相令召伐柴者謝之已不見矣嘗指其浮圖前柏曰此樹與塔齊塔當毀矣至會昌廢毀正與塔齊又言寺前二小池左羹右飯齋施時少則令陶浚之果來供設其神異多此類也以至德元年卒壽七十七見神僧傳惠超新羅人年近弱冠入唐不久入竺遍歷五天凡十年復歸唐住五臺山五十四年海往陸歸著有往五天竺國傳見惠琳一切經音義超初師事金剛智三藏後又師事不空三藏以大乘瑜珈金剛性海曼殊室利千臂千鉢大教王經序為證皆在譯場多有筆授超蓋真言宗也見遊方傳叢書大日本佛教全書第八十一册大正四年九月刊行廣函求法高僧傳云釋阿離那一作耶跋摩一作新羅人也初希正教早入中華思覲聖蹤勇鋭彌增以貞觀年中離長安到五天住那蘭陀寺多閲律論抄寫貝莢痛矣歸心所期不遂忽於寺中無常齡七十餘繼此有惠業玄泰求本玄恪惠輪玄遊復有二亡名法師等皆忘身順法觀化中天而或夭於中途或生存住彼寺者竟未有能復雞貴與唐室者唯玄泰師克返歸唐亦莫知所終天竺人呼海東云矩矩吒醫説羅矩矩吒言雞也醫説羅言貴也彼土相傳云其國敬雞神而取尊故戴翎羽而表飾也讚曰天竺天遙萬疊山可憐遊士力登攀幾回月送孤帆去未見雲隨一杖還海東高僧傳云釋阿離耶跋摩神智獨悟形貌異倫始自新羅入于中國尋思請益無遠不參𣊟屆冥壑凌臨諸天非唯規範當時亦欲陶津來世志切遊觀不彈遠邈遂求法於西竺乃遐登於蔥嶺搜奇討勝歷見聖蹤夙願已圓資糧時絶乃止那爛陀寺未幾終焉是時高僧惠業住菩提寺玄覺玄照至大覺寺此上四人並於貞觀年中有此行也共植勝因聿豐釋種遙謝舊域往見竺風騰茂譽於東西垂鴻休於罔極非大心上輩其何預此乎按年譜似與玄奘三藏同發詣西國但不知第何年耳釋惠業器局沖深氣度凝遠巉巖容儀戍削風骨直辭邊壤遽入中華遂於貞觀年中往遊西域涉流沙之廣漠登雪嶺之嶔岑每以清暉啓曙即潛伏幽林皓月淪霄乃崩波永路輕生徇法志切宣通遂往菩提寺觀禮聖蹤又於那爛陀寺寄迹棲真久之請讀淨名經因檢唐本淹通淪貫梁論下記云在佛齒樹下新羅僧惠業寫記傳云業終于是寺年將六十餘矣所寫梵本在那爛陀寺焉海東高僧傳釋惠輪新羅人梵名般若跋摩唐云惠申自本國出家翹心聖境泛舶而凌閩越涉步而屆長安寒暑備受艱危罄盡奉敕隨玄照法師西行充侍飛梯架險既至西國遍禮奇蹤寓居菴摩羅波國信者寺淹注十載近住次東邊犍陀羅山茶寺資産豐饒供養餐設餘莫加也其北方胡僧往來者皆住此寺蜂屯雲集各修法門輪既善梵言薄間俱舍來日尚在年向四十矣具如義淨三藏求法高僧傳中海東高僧傳釋玄恪新羅人嶷然孤硬具大知見性喜講説赴感隨機時人指為火中芙蓉也常嘆受生邊地未覩中華聞風而悅水道乃屆敻自東圻遂含西笑心慙中畫志要歷參比猶月行午夜任運而轉或層嵓四合鳥道齊雲或連氷千里風行雲臥遂與玄照法師相隨至西乾大覺寺遊滿𦦨之路賞無影之邦負笈精研琢玉成器年過不惑遇疾乃亡玄照者亦新羅之高士也與恪同科始終一揆未詳所卒復有新羅僧二人莫知其名發自長安泛舶至室利佛逝國遇疾俱亡海東高僧傳釋大梵新羅人法名薩婆慎若提婆唐音一切智童稚深沈有大人相不茹葷不嬉遊嘗泛舶如唐學問靡常闡奧窮微高宗永徽中遂往中印度禮菩提樹如獅子遊行不求伴侶振五樓之金策望三途之寶階其所遠冒難危歷覽風土亦未能盡道便向大覺寺挂錫詳檢經論備省方俗後還震旦敷宣法化玄績乃著巍巍乎其有成功矣海東高僧傳釋玄遊新羅人叶性虛融稟質溫雅意存二利志重詢求乘杯泝流考室幽壑入唐禮事僧哲禪師摳衣稟旨哲思慕聖蹤泛舶西域適化隨緣巡禮略周歸東印度遊常隨附鳳因住於彼慧炬夙明禪枝早茂窮涯盈量虛往實歸誠佛家之棟梁實僧徒之領袖既而舟壑潛移悼陵谷之遷貿居諸易晚惻人世之難常薪盡火滅復何可追義淨三藏嘉爾幼年慕法情堅既虔誠於東夏復請益於西天重指神州為物淹留傳十法而弘法竟千秋而不秋雖捐軀異域未返舊都彼之功名落落如此安得不挂名竹帛以示將來遂著求法高僧傳豫偶觀大藏閲至於斯志深嚮慕遂抽繹而書之海東高僧傳贊曰此上數人邈居青徽徑入中華追法顯玄奘之逸迹朅來絶域視如里巷比之奉使張騫蘇武之類乎釋元表本三韓人也天寶中來遊華土仍往西域瞻禮聖迹遇心王菩薩指示支提山靈府遂負華嚴經八十卷尋訪霍童禮天冠菩薩至支提石室而宅焉浙東沙門曇噩述新修科分六學僧傳云唐元表高麗人天寶中西遊中國且將往天竺巡禮聖迹遇心王菩蔭語以支提山即天冠菩薩所住處於是頂戴華嚴經八十卷南造閩越而居先是此山不容人居居則必多霆震又多猛獸毒蟲不然鬼魅惑亂於人曾有未得道僧輒居一宿為山神驅斥明朝止見身投山下數里間表齋經棲泊澗飲木食後不知出處之蹤矣于時屬會昌搜毀表將經以華櫚木函盛之深藏石室中逮宣宗大中元年丙寅保福慧評禪師素聞往事躬率信士迎出甘露都尉院其紙墨如新繕寫今貯在福州僧寺焉見宋高僧傳中唐高麗元表傳高麗圓應國師俗姓李氏諱學一字逢渠西原侶安人也父應瞻不仕母李氏年甫八歲斷葷血十一依真藏法師落髮十三受具足戒後謁渚水惠含禪師因師指示洞明禪旨又嫺經律論無所不究尤長於大般若也宋神宗元豐七年甲子赴廣明選佛場優遊於西域中原傳華嚴學天台教觀時睿王飽聞師之道德宋徽宗崇寧四年加三重大師宋道君二年戊子加禪師政和四年甲午加大禪師宣和四年王召師於內殿願拜為王師師牢讓不受後大臣亦勤勸師不得已受命於是上便行拜師後不及册禮而登遐四月仁王即位七月七日遣中使以書致意越明年如之師具狀辭免至于再三十二日備禮儀册為王師十六日上幸行明慶殿伸弟子之禮百官拜賀金天會四年丙午乞歸老雲門上不允謂安南瓊巖距京師不遠許兼住自便往來十一年己酉九月十九日封王師印十月十九日入雲門寺四方學者輻湊二十八日師盥漱整衣跏趺端坐焚香祝願畢教門弟子言訖幾於入寂時門人相與言曰今日是重世俗所大忌俗有重喪日是日忌避亦不棺斂死尸師遂乃得脈息平正今日不死可副汝等請飲食起居如平日至十一月十五日復示疾十二月九日五鼓剃頭整浴説遺偈五陰雲一片散滅盡無餘惟有孤輪月清光蓋太虛跏趺叉手端坐不動門人跪侍至脯時已化矣門人賫遺狀印寶及遷化事狀乘驛奏聞上聞訃音至震悼數歎輟朝三日遺內臣金景元護葬事越明年正月二十四日遣使備禮册為國師贈諡圓應又遣使致祭二十七日其徒以肩輿舁坐身闍維于清道池谷寺之東麓三十日收骨頭有重骨餘皆栓索鈎連有五色焉二月十五日封陵于慈仁縣板嶽山之南閲世九十三臘八十二夏門人具其師之行奏以立碑事仁王命彥頤臣撰碑辭不獲命據行事之大略強序而銘之曰云云見雲門寺事迹得牛眠地建美黃寺有明朝鮮國全羅道靈巖郡達磨山美黃寺事迹碑銘并序崇政大夫行兵曹判書兼知經筵弘文館大提學藝文館大提學知春秋館成均館事世子左賓客閔黯長孺撰顯祿大夫朗善君兼五衛都總府都總管俁書并篆余讀西方書至華嚴經諸菩薩住處品未嘗不掩卷而嘆曰哉我東方淨土之業蓋亦有冥契者存曇無竭之標一萬二千般若之軀者如此月氏之印五十三鐵鍾之迹者又如此夫金剛之為山也見在於莊嚴星宿之間與人鳥須彌得為無上菩提之境則其表靈也宜其炳琅而光大也乃者湖南達磨山美黃寺之創迹抑何奇之甚也有唐開元十三年乙丑新羅景德王八年此乃聖德王二十四年之誤也八月二十日忽有一石船來泊于山底獅子浦口天樂梵唄之聲迭發於船中漁人欲泊而察之則船輒遠義照和尚聞之與張雲張善二沙彌暨村主于甘香徒一百人同往齋沐虔禱石船乃至岸鑄成金人一軀執櫓而立張以繡帆就而觀之其中有金函具鎖鑰盛以玉軸金字華嚴經八十縳法華經七縳毗盧遮那文殊普賢四十聖衆五十三善知識十六羅漢等畫幀又有金環黑石各一枚香徒等齋經下岸方議奉安之地黑石即柝而生青黑牸牛一頭忽長大是夕金人入和尚夢曰我本于闐國王也遍歷諸國求安經像望見山頂有一萬佛現相兹故來此爾宜馱經以牛牛臥不起處即安經之所也和尚乃以經載牛而行初臥一壤而復起至山峽而復臥大吼曰美因而斃焉初臥之壤創一蘭若今通教寺是也後臥之峽營一剎以安聖經及神像顏之曰美黃美取牛之聲也黃取人之色也奇乎異哉世稱神山輒歸之三韓達磨以方丈之枝素饒真境故有此聖迹靈蹤之來應焉當時石牛金人之事恍惚窅茫非世耳之所可剽者而年代考證不啻八字打開且貝葉金軀幀像等物故宛然也竊念諸佛出興皆為一大事所謂一大事不外乎方便今茲塊然者豈自生公點頭中來而角者豈從雪山會上仍倣騰蘭馱來故事也耶金神之夢感者亦有阿難流通教海之遺意焉至於至元間南宋之達官君子望風馳想致令圖寫而去則亦足為叢林吐氣此俱可以書諸貞珉標之永永者也余於張天覺之理白香山之筆皆蔑蔑如而重上人遠來之意因其所述而詮次之又有感於循物假物之義云爾銘曰石耶牛耶不可思金耶人耶不可知神無方而化無涯嘻噫崇禎紀元後六十五年壬申九月立碑杜忍浮雪功熟水懸空中新羅善德女主啓祚年初王都南內之香兒有陳氏之子名曰光世生而穎悟解自天然羣童戲嬉不侔凡流或西向移晷或林間燕坐逢僧則悅豫見殺則嚬戚遂往佛國寺投圓淨師鳩車之齡落髮竹馬之齒通玄法名浮雪字曰宜祥霜松潔操水月虛襟戒珠光而全定門幽而靜器宇沖遠識度通敏嶺南高德咸用器之外示僧法之服內弘龍猛之學矣既已慟繫匏瓜參方耆宿忽與同志靈照靈熙相友彼皆慈恕立身恭和成性心非道外行在説前貴寡欲而息求好端居而簡務者也挂棹南海托迹頭流經洞四含論精五明餌松花而觀寂食練實而樂道奄過三祀挂巾天冠畢坐五臘飛錫楞伽周遊覽罷歷銓奇境因就法王峯底遂葺草廬一間額曰妙寂是乃妙入禪寂之稱也三士同巢一心為道杜口禪那撩關摩竭十載緣消三生夢斷學已窮於滿字行乃潔於圓珠各述養真詩一章靈照首唱曰占得幽居地萬松嶺上菴入禪看不二探道喜成三采玉人誰到含花鳥自喃蕭然無外事一味法門參靈熙繼吟曰雲收歡喜嶺月入老松菴慧劒精千萬心源蕩再三洞天春寂寂山鳥曉喃喃咸佩無生樂玄關不用參浮雪怡然繼和曰共把寂空雙去法同棲雲鶴一間菴已和不二歸無二誰問前三與後三間看靜中花艷艷任聆窗外鳥喃喃能令直入如來地何用區區久歷參尋念五臺乃文殊道場也要往拜之啓足向北因宿杜陵白蓮池仇無冤之家家之翁乃清信居士也素尚清虛求道甚切一聞緒餘不覺吐舌迎之上座欵若舊識鋪陳之物飲膳之味無不盡禮世所云稀團欒竟夜翌日黎明春雨泥濘上道無便淹留信宿况乃主翁問法之情老而彌篤久而尤堅隨問而答日夜往復宛若馬鳴之智辨龍樹之懸河人神胥悅遠近同歡蠅手屈膝如獲至寶主有一女名曰妙花蓋夢見蓮花而生也色貌才藝獨步一時惠而柔如嚴而節操雖生長白屋人罕見之是日聞説法之音神忽慨然悲啼莫已恰似阿難之摩登襄王之巫神昵押左右未嘗暌離誓從即夕永遂于飛殄身無怨若見棄去斯決殞命已矣父母愛女之故稽首法師惟願濟度千祈萬祝於日於夜浮雪抗志金石方堅未敢為欲所醉詎能色塵所迷深恐愛緣妨道之戒又念菩薩慈悲之意大禮未備一言宜告誠無昧於嚼蠟比蓮花之著水熙照二師本以道懷失朋西陲無顏上洛行色慘憺寫偈以贈靈照先成曰但智成空見偏悲涉愛緣雙行常合矣一道自天然月運因雲駛風飄識幡懸干將如在手安為色留連靈熙繼和曰一簣成臺力九臯翹足緣修行破竹爾得道著鞭然未免三生纍冤家一念懸他年瓶返水追後迹相連浮雪禪師亦以圓融話步韻而答曰悟從平等行無等覺契無緣度有緣處世任真心廣矣在家成道體胖然圓珠握掌丹青別明鏡當臺胡漢懸認得色聲無罣礙不須山谷坐長連長連牀也遂把松茶引滿相屬以與訣曰道不在緇素道不在華野諸佛方便志在利生道侶遠參飽餐法乳來警老夫師之軒昂身在塵勞心懸物外精修三業廣行六度解通內外語涉典章四鄰歡心八表引領求醫之士風趨服藥之人輻湊聾騃盡醒枯稿悉潤法施敷揚十有五年妙指書帳法胤二人男曰登雲女曰月明是皆吉夢所感之稱也釋氏抱送之離也容儀詳正勤節高猛學不加思解自生知見影追風聞一知十遊三藏之教海玩六籍之詞林至人降迹物不疵癘風雨順時禾穀豐登計日不足計年有餘本縣高人李公承桂上舍金公國寶等結為方外之交相與間中之樂忘老少一內外日與講論義理風雨雪霜不轍音信譬遠公之賞蓮喻韓子之留衣於是毛塵人事掃委二兒別搆一堂精鍊舊業傷財劫賊本由六門除滅二見返聞聞性一真獨露非假方便陽不能行故稱病夫粥藥須人利便無氣潛做工夫決意成道慕毗耶之杜口戀少林之面壁期及五秋解徹明星再淨餘塵重崇智嶽頓轡於華嚴法界宴坐於圓覺妙場只自怡悅莫能説破昔日同胞熙照二師參禮日久遍遊名山隨緣受用重到杜陵清信之家居士與波夷仙化已久無能問者忽逢端正男女才冠簪者問浮雪安否之寄宣昔日同友之緣相顧泫然入白浮雪乃曰余喜聞故人之歸沈疴頓除氣宇清泰可於正堂設鋪安坐具膳享彼是格外道人博物君子承之奉之勿逆勿怠即起歡迎相敘舊情根塵明敏朗月神錐二子之心謂蒙上人法力厥父疾愈五體投地敬愈天屬浮雪云取三瓶盛水來試工夫生熟挂於梁上各打一瓶熙照二人瓶水俱碎雪亦打之瓶碎水懸因謂二人曰靈光獨露逈脫根塵體露真常不拘生滅幻身隨生滅遷流者似瓶之破碎真性本靈明常住者如水之懸空公等遍參知識久歷叢林豈不攝生滅為真常空幻化守法性乎欲驗來業自由不自由便知常心平等不平等今既不然曩日返水之戒安在雙行之誓邈矣因偈示云目無所見無分別耳聽無聲絶是非分別是非都放下但看心佛自歸依于時天雲密布天樂盈空端坐一念示同蟬蛻香飛海表花雨天中二師追慕舉龕闍維飄火雨滴靈珠收舍利入寶瓶瘞于妙寂南麓建浮圖因設冥陽之會湖南士庶雲集道場渭北禪講風驅靈嶽時道文道全法海法雲皆是法中龍象世間師表迅流清辨頑石點頭法會未罷聖嗣二人同時祝髮結屋星居淚沾檟樹神想蓮池輕生若節閲筌蹄于九丘為法忘軀探幽旨于八藏戀其父同塵之德懷燃燈續佛之心優遊寶所沐浴毗尼鍊得般舟三昧繼念淨土九蓮跳丸歲月恨迫桑榆遍告州縣道儒普召山門釋子示涅槃相開方便門耹風普會黑白蟻慕月明氏全身乘紫雲忽向西天登雲師印手拂碧瑤流書寶偈云覺破三生夢身遊九品蓮風潛清智海月上冷秋天輦路盈仙樂瑤池駕法船般舟三昧熟極樂去怡然書罷斂容含笑長皈祥光滿室異香一夏遠近見聞稱讚道路利益甚深功德無窮其母妙花壽考百有十年將啓手足捨家為院以浮雪為名山門碩德以二子名名菴至今有登雲月明云爾浮雪居十傳世俗五戒光師隨機新羅真平王二十二年高僧圓光還自隋為時人所重沙梁部人貴山與項友善相謂曰我輩期與士君子遊而不正心修身恐不免招辱盍聞道於賢者乃詣光曰俗士顓蒙無所知識願賜一言為終身之誡光曰佛有菩薩戒其別有十若等為人臣子恐不能行今有世俗五戒一曰事君以忠二曰事親以孝三曰交友以信四曰臨戰無退五曰殺傷有擇若等行之無忽貴山曰他則既受命矣但不曉殺傷有擇師曰春夏月及六齋日不殺是擇時也不殺使畜謂牛馬雞犬不殺細物謂肉不足臠是擇物也過此惟其所用但不求多殺此可謂世俗之善戒貴山等曰謹受教不敢失墜後二年秋八月百濟侵新羅新羅王遣將軍乾品武殷率衆逆戰少監貴山項亦赴焉武殷遇伏墜馬士卒錯愕不知所為貴山大言曰吾嘗聞諸師曰臨戰無退豈敢奔竄以墜師教乎乃以馬授其父武殷即與項力鬪害數十人諸軍因以奮擊百濟敗績貴山項金瘡滿身而死王與羣臣迎於阿那之野臨尸痛哭以禮殯葬追贈貴山奈麻項大舍又新羅太宗王二年金歆運伐百濟戰死之歆運奈勿王八世孫少遊花郎文弩之門徒衆有言及戰死留名者歆運為之慨然流涕有激厲思齊之志同門僧轉密曰此人赴敵必不還也時實際寺僧道玉語其徒曰吾聞佛者上則精術業以復性次則起道用以益他我形桑門無一善可取不如從軍殺身以報國乃著戎服改名驟徒詣兵部請從軍及戰突陳力鬪亦死之太宗王六年創漢山州壯義寺以資長春罷郎罷郎一作羆郎冥福初新羅與百濟兵戰於黃山之役長春郎罷郎死於陳中後討百濟時見夢於太宗曰臣等昔者為國亡身至於白骨庶欲完護邦國故隨從軍行無怠然而迫於唐帥蘇定方之威逐於人後耳願王加我以小勢大王驚怪之為二魂説經一日於牟山亭又為創壯義寺壯義寺遺址在京城彰義門外尚玄曰貴山項臨戰不退忠孝兼全孔子曰戰陳無勇非孝也歆運道玉起道用以益化春郎罷郎魂亦從軍乃得冥資仗佛威神以報國恩孰謂佛道厭世絶倫此蓋謂不知應用者言也新羅三寶麗王寢謀三國遺事云高麗王將謀伐羅乃曰新羅有三寶不可犯也何謂也皇龍寺丈六并九層塔與真平王天賜玉帶遂寢其謀周有九鼎楚人不敢北窺此之類也皇龍寺丈六像緣起新羅第二十四真興王即位十四年癸酉將築紫宮於龍宮南有黃龍現其地乃改置為佛寺號黃龍寺三國遺事又云玉龍集及慈藏傳記皆云新羅月城東龍宮南有迦葉佛宴坐石其地即前佛時伽藍之墟也今皇龍寺之地即七伽藍之一也宴坐石在佛殿後面嘗一謁焉石之高可五六尺來圍僅三肘幢立而平頂真興王創寺已來再經災火石有坼裂處寺僧貼鐵為護乃有讚曰惠日沉輝不記年惟餘宴坐石依然桑田幾度成滄海可惜巍然尚未遷既而西山契丹大兵已後毀塔煨燼而此石亦夷沒而僅興地平矣至己丑年周圍墻宇至十七年方畢未幾海南有一巨舶來泊於河曲縣之絲浦今蔚州谷浦也檢看有帖文云西竺阿育王聚黃鐵五萬七千斤黃金三萬分別傳云鐵四十萬七千斤金一千兩恐誤或云三萬七千斤將鑄釋迦三尊像未就載船泛海而祝曰願到有緣國土成丈六尊容并載模樣一佛二菩薩像縣吏具狀上聞敕使卜其縣之城東爽塏之地創東竺寺邀安其三尊輸其金鐵於京師以大建六年甲午三月寺中記云癸巳十月十七日鑄成丈六尊像一鼓而就重三萬五千七斤入黃金一萬一百九十八分二菩薩入鐵一萬二千斤黃金一萬一百三十六分安於黃龍寺明年像淚流至踵沃地一尺大王升遐之兆或云像成在真平王之世者謬也別本云阿育王在西竺大香華國生佛後一百年間恨不得供養真身斂化金鐵若干斤三度鑄成無功時王之太子獨不預斯事王使詰之太子奏云獨力非功曾知不就王然之乃載船泛海南閻浮提十六大國五百中國十千小國八萬聚落無不周旋皆鑄不成最後到新羅國真興王鑄之於文仍林像成相好畢備阿育此翻無憂後大德慈藏西學到五臺山感文殊現身授訣仍囑云汝國黃龍寺乃釋迦與伽葉佛講演之地宴坐石猶在故天竺無憂王聚黃鐵若干斤泛海歷一千三百餘年然後乃到而國成安其寺蓋威緣使然也與別記所載符同像成後東竺寺三尊亦移安寺中寺記云真平六年金堂造成善德王代寺幼主真骨歡喜師第二主慈藏國統次國統惠訓次廂律師云今兵火已來大像與二菩薩皆融沒而小釋迦猶存焉讚曰塵方何處匪真鄉香火因緣最我邦不是育王難下手月城來訪舊行藏三國遺事皇龍寺九層塔緣起新羅第二十七善德王即位五年貞觀十年丙申慈藏法師西學乃於五臺感文殊授法詳見本傳文殊又云汝國王天竺剎帝利種王預受佛記故別有因緣不同東夷共工之族然以山川奇嶮故人性矗悖多信邪見而時或天神降禍然有多聞比丘在於國中是以君臣安泰萬庶和平矣言已不現藏知是大聖變化泣血而退經由中國大和池邊忽有神人出問胡為至此藏答曰求菩提故神人禮拜又問汝國有何留難藏曰我國北連靺鞨南接倭人麗濟三國迭犯封陲鄰寇縱橫是為民梗神人云今汝國以女為王有德而無威故鄰國謀之宜速歸本國藏問歸鄉將何為利益乎神曰皇龍寺護法龍是吾長子受梵王之命來護是寺汝歸本國成九層塔於寺中鄰國降伏九韓來貢王祚永安矣建塔之後設八關會赦罪人則外賊不能為害更為我於京畿南原置一精廬共資豫福豫亦報之德矣言已遂奉玉而獻之忽隱不現寺中記云師於終南圓香禪師處受建塔因由貞觀十七年癸卯三月十六日將唐帝所賜經像袈裟幣帛而還國以建塔之事聞於上善德王議於羣臣羣臣曰請工匠於百濟然後方可乃以寶帛請於百濟匠名阿非知受命而來經營木石伊干龍春一云龍樹幹蠱率小匠二百人初立剎柱之日匠夢本國百濟滅亡之狀匠乃心疑停手忽大地震動晦冥之中有一老僧一壯士自金殿門出乃立其柱僧與壯士皆隱不現匠於是改悔畢成其塔剎柱記云鐵盤已上高四十二尺已下一百八十三尺慈藏以五臺所授舍利分安於柱中並通度寺戒壇及大和寺塔大和寺在河曲縣南今蔚州亦藏師所創也以副池龍之請樹塔之後天地開泰三韓為一豈非塔之靈蔭乎讚曰鬼拱神扶壓帝京輝煌金碧動飛甍登臨何啻九韓伏始覺乾坤特地平三國遺事東都成立紀海東名賢釋安弘撰云新羅第二十七代女王為主雖有道無威九韓侵苦龍宮南皇龍寺建九層塔則鄰國之災可鎮第一層日本第二層中華第三層吳越第四層托羅亦云乇羅第五層鷹遊第六層靺鞨第七層丹國第八層女狄第九層濊貊三國遺事天賜玉帶緣起新羅第二十六白淨王諡真平大王大建十一年己亥八月即位身長十一尺駕幸內帝釋宮亦名天柱寺王之所創踏石梯三石并折王謂左右曰不動此石以示後來即城中五不動石之一也即位元年有天使降殿庭謂王曰上皇命我傳賜玉帶王親奉跪受然後其使上天凡郊廟大祀皆服之讚曰雲外天頒玉帶圍辟雍龍袞也相宜吾君自此身彌重惟擬明朝鐵作墀三國遺事新羅景明王五年高麗太祖四年王遣金律聘高麗麗王問曰聞三大寶丈六金像九層塔并聖帝帶也三寶未亡國亦未亡塔像猶存不知聖帶今猶存耶律對曰臣未嘗聞聖帶也麗王笑曰卿為貴臣何不知國之大寶律慚還告王王問羣臣無能知者時有皇龍寺僧年過九十者曰聖帶是真平大王所服歷代傳之藏在南庫王遂開庫風雨暴作白晝晦冥不得見乃擇日齋祭然後見之其帶粧以金玉其圍甚長非常人所可束也國人以真平王是聖骨之王稱曰聖帝帶三國遺事高麗太祖二十年夏五月政丞金傅獻鐫金安玉排方腰帶長十圍六十二銙即新羅寶藏殆四百年世傳聖帝帶也王受之命元尹弋萱藏于物藏國史尚玄曰新羅國寶新羅君臣猶不知之麗王何能知之蓋麗王固天授非常之人也胸中久抱統一三韓之經綸偵知新羅國情如是其神一興一亡於是可判麗王敬事佛法僧三寶者也故亦能敬畏新羅國之三寶寢其謀而不犯之然丈六之像層九之塔後竟為王之所有玉帶亦歸王之庫內可謂有志者事竟成也麗祖亦於西京建九層塔以擬之後世東西兩京之塔像皆被蒙兵之燒燬亡失國寶可勝惜哉月師作歌怪日即滅三國遺事云新羅景德王十九年四月十九日二日並現浹旬不滅王召月明師命開壇作啓而禳之明奏云臣僧但屬於國仙之徒只解鄉歌不聞聲梵王曰既卜緣僧雖用鄉歌可也明乃作兜率歌賦之日怪即滅師善吹笛常月夜吹過門前大路月駛為之停輪因名其路曰月明里蓋新羅人尚鄉歌良志之塑靈妙寺丈六像也傾城士女爭運泥土作風謠廣德作願往生歌忠談師作理國民歌及讚耆婆郎歌得烏谷作歌而慕竹郎信忠作歌而帖柏樹永才作歌而化賊盲兒作歌而得眼融天師慧星歌真平王代第五居烈郎第六實處郎一作突處郎第七寶同郎等三花之徒欲遊楓嶽有彗星犯心大星郎徒疑之欲罷其行時天師作歌歌之星怪即滅日本兵還國反成福慶大王歡喜遣郎遊嶽焉歌曰舊理東尸汀叱乾達婆矣遊烏隱城叱肹良望良古倭理叱軍置來叱多烽燒邪隱邊也藪耶三花矣嶽音見賜烏尸聞古月置八切爾數於將來尸波衣道尸掃尸星利望良古彗星也白反也人是有叱多後句達阿羅浮去伊叱等邪此也友物北所音叱彗叱只有叱故三國遺事釋良志未詳祖考鄉邑唯現迹於善德王朝錫杖頭挂一布袋錫自飛至檀越家振拂而鳴戶知之納齋費袋滿則飛還故名其所住曰錫杖寺其神異莫測皆類此旁通雜譽神妙絶比又善筆札靈廟丈六三尊天王像并殿塔之瓦天王寺塔下八部神將法林寺主佛三尊左右金剛神等皆所塑也書靈廟法林二寺額又嘗雕磚造一小塔并造三千佛安其塔置於寺中致敬焉其塑靈廟之丈六也自入定以正受所對為揉式故傾城士女爭運泥土風謠云來如來如來如哀反多羅哀反多矣徒良功德修叱如良來如至今土人春𣑩役作皆用之蓋始于此像初成之費入穀二萬三千七百碩或云改金時租議曰師可謂才全德充而以大方隱於末技者也讚曰齋罷堂前錫杖間靜裝爐鴨自焚檀殘經讀了無餘事聊塑圓容合掌看三國遺事文武王代念佛僧廣德嘗有歌云月下伊底亦西方念丁去賜里遣無量壽佛前乃惱叱古音鄉言云報言也多可支白遣賜立誓香深史隱尊衣希仰支兩手集刀花乎白良願往生願往生慕人有如白遣賜立阿邪此身遺也置遣四十八大願成遣賜去三國遺史孝昭王代竹旨郎之徒得烏谷隸於風流黃卷初述宗公為朔州都督使將歸理所時三韓兵亂以騎兵三千護送之行至竹旨嶺有一居士平理其嶺路公見之歎美居士亦善善美音通公之威勢赫甚相感於心公赴州理隔一朔夢見居士入房中室家同夢驚怪甚翌日使人問其居士安否人曰居士死有日矣使來還告其死與夢同日矣公曰殆居士誕於吾家爾更發卒修葬於嶺上北峯造石彌勒一軀安於冢前妻氏自夢之日有娠既誕因名竹旨壯而出仕與庾信公為副帥統三韓真德太宗文武神文四代為冢宰安定厥邦初得烏谷慕郎而作歌曰去隱春皆理米毛冬居叱沙哭屋尸以憂音阿冬音乃叱好支賜烏隱貌史年數就音墮支行齊目煙回於尸七史伊衣逢烏支惡知作乎下是郎也慕理尸心未行乎尸道尸蓬吹叱巷中宿尸夜音有叱下是老人獻花聖德王代純貞公赴江陵太守今冥州頭注云冥溟音通行次海汀晝膳傍有石嶂如屏臨海高千丈上有躑躅花盛開公之夫人水路見之謂左右曰折花獻者其誰從者曰非人迹所到皆辭不能傍有老翁牽牸牛而過者聞夫人言折其花亦作歌詞獻之其翁不知何許人也便行二日程又有臨海亭晝膳次海龍忽攬夫人入海公顛倒躃地計無所出又有一老人告曰故人有言衆口鑠金今海中傍生何不畏衆口乎宜進界內民作歌唱之以枝打岸可見夫人矣公從之龍奉夫人出海獻之公問夫人海中事四頭注云四疑曰七寶宮殿所膳甘滑香潔非人間煙火此夫人衣襲異香非世所聞水路姿容絶代每經過深山大澤屢被神物掠攬衆人唱海歌詞曰龜乎龜乎出水路掠人婦女罪何極汝若悖逆不出獻入網捕掠燔之喫老人獻花歌曰紫布巖乎邊希執音乎手母牛放教遣吾肹不喻慚肹伊賜等花肹折叱可獻乎理音如信忠挂冠孝成王潛邸時與賢士信忠圍碁於宮庭柏樹下嘗謂曰他日若忘卿有如柏樹信忠興拜隔數月王即位賞功臣忘忠而不第之忠怨而作歌帖於柏樹樹忽黃悴王怪使審之得獻之大驚曰萬機鞅掌幾忘乎角弓乃召之賜爵祿柏樹乃蘇歌曰物叱好支柏史秋察尸不冬爾屋支墮米汝於多支行齊教因隱仰頓隱面矣改衣賜乎隱冬矣也月羅理影支古理因淵之叱行尸浪阿叱沙矣以支如支貌史沙叱望阿乃世理都之叱逸烏隱第也後句亡由是寵現於兩朝景德王王即孝成王之弟也二十二年癸卯忠與二友相約挂冠入南嶽再徵不就落髮為沙門為王創斷俗寺居焉願終身立壑以奉福大王王許之留真在金陵後壁是也南有村名俗休今訛云小花里按三和尚傳有信忠奉聖寺與此相混然計其神文之世距景德已百餘年况神文與信忠宿世之事則非此信忠明矣宜評之又別記云景德王代有直長李俊高僧傳作李純早曾發願年至知命須出家創佛寺天寶七年戊子年登五十矣改創槽淵小寺為大剎名斷俗寺身亦削髮法名孔宏長老住寺二十年乃卒與前三國史所載不同兩存之闕疑讚曰功名未已鬢先霜君寵雖多百歲忙隔岸有山頻入夢逝將香火祝吾皇盲兒禱眼景德王代漢岐里女希明之兒生五稔而忽盲一日其母抱兒詣芬皇寺左殿北壁畫千手大悲前令兒作歌禱之遂得明其詞曰膝兮古召旀二尸掌音毛乎支內良千手觀音叱前良中祈以支白屋尸置內乎多千隱手叱千隱目肹一等下叱放一等肹除惡支二千萬隱吾羅一等沙隱以古支內乎叱等邪阿邪也吾良遺知支賜尸等焉放冬矣用屋尸慈悲也根古讚曰竹馬蔥笙戲陌塵一朝雙碧失瞳人不因大士回慈眼虛度楊花幾社春月明師兜率歌景德王十九年庚子四月朔二日並現浹旬不滅日官奏請緣僧作散花功德則可禳於是潔壇於朝元殿駕幸青陽樓望緣僧時有月明師行于阡陌時之南路王使召之命開壇作啓明奏云臣僧但屬於國仙之徒只解鄉歌不聞聲梵王曰既卜緣僧雖用鄉歌可也明乃作兜歌賦之其詞曰今日此矣散花唱良巴寶白乎隱花良汝隱直等隱心音矣命叱使以惡只彌勒座主陪立羅良解曰龍樓此日散花歌桃送青雲一片花殷重直心之所使遠邀兜率大仙家今俗謂此為散花歌誤矣宜云兜率歌別有散花歌文多不載既而日怪即滅王嘉之賜品茶一襲水精念珠百八箇忽有一童子儀形鮮潔跪奉茶珠從殿西小門而出明謂是內宮之使王謂師之從者及玄徵而俱非王甚異之使人追之童入內院塔中而隱茶珠在南壁畫慈氏像前知明之至德與至誠能昭格于至聖也如此朝野莫不聞知王益敬之更贐絹一百匹以表鴻誠明又嘗為亡妹營齋作鄉歌祭之忽有驚飈吹紙錢飛舉向西而沒歌曰生死路隱此矣有阿米次肹伊遣吾隱去內如辭叱都毛如云遺去內尼叱古於內秋察早隱風未此矣彼矣浮良落尸棄如一等隱枝良出古去奴隱處毛冬乎丁阿也彌陀剎良逢乎吾道修良待是古如明常居四天王寺善吹笛嘗月夜吹過門前大路月馭為之停輪因名其路曰月明里師亦以是著名師即能俊大師之門人也羅人尚鄉歌者尚矣蓋詩頌之類歟故往往能感動天地鬼神者非一讚曰風送飛錢資逝妹笛搖明月住姮娥莫言兜率連天遠萬德花迎一曲歌忠談師景德王御國二十四年五嶽三山神等時或現侍於殿庭三月三日王御歸正門樓上謂左右曰誰能途中得一員榮服僧來於是適有一大德威儀鮮潔徜徉而行左右望而引見之王曰非吾所謂榮僧也退之更有一僧被衲衣負櫻筒一作荷簣從南而來王喜見之邀致樓上視其筒中盛茶具已曰汝為誰耶僧曰忠談曰何所歸來僧曰僧每重三重九之日烹茶饗南山三花嶺彌勒世尊今茲既獻而還矣王曰寡人亦一甌茶有分乎僧乃煎茶獻之茶之氣味異常甌中異香郁烈王曰朕嘗聞師讚耆婆郎詞腦歌其意甚高是其果乎對曰然王曰然則為朕作理國安民歌僧應時奉敕作歌呈之王佳之封王師焉僧再拜固辭不受安民歌曰君隱父也臣隱愛賜尸母史也民焉狂尸恨阿孩古為賜尸知民是愛尸知古如窟理叱大肹生以支所音物生此肹喰惡支治良羅此地肹捨遣只於冬是去於丁為尸知國惡支持以支知古如後句君如臣多支民隱如為內尸等焉國惡太平恨音叱如讚耆婆郎歌曰咽鳴爾處米露曉邪隱月羅理白雲音逐于浮去隱安支下沙是八陵隱汀理也中耆郎矣貌史是史藪邪逸烏川理叱磧惡希郎也持以支如賜烏隱心未際叱肹逐內良齊阿耶柏史叱枝次高支好雪是毛冬乃乎尸花判也永才遇賊釋永才性滑稽不纍於物善鄉歌暮歲將隱于南嶽至大峴嶺遇賊六十餘人將加害才臨刃無懼色怡然當之賊怪而問其名曰永才賊素聞其名乃命作歌其辭曰自矣心米貌史毛達只將來吞隱日遠烏逸過出知遣今吞藪未去遣省如但非乎隱焉破主次弗史內於都還於尸朗也此兵物叱沙過乎好尸曰沙也內乎吞尼阿耶唯只伊吾音之叱恨隱陵隱安支尚宅都乎隱以多賊感其意贈之綾二端才笑而前謝曰知財賄之為地獄根本將避於窮山以餞一生何敢受焉乃投之地賊又感其言皆釋劒投戈落髮為徒同隱智異不復蹈世才年九十矣在元聖大王之世讚曰策杖歸山意轉深綺紈珠玉豈治心緑林君子休相贈地獄無根只寸金百濟薯童武王名璋聞新羅真平王公主善花美艷剃髮來京作謠誘羣童唱之云善化公主主隱他密只嫁良置古薯童房乙抱遣去如尚玄曰二日並現以今看之自是空氣凝積太陽反射之所成則月明師奏歌適當其融解之時也彗星自有行度融天師作歌亦逢其行去之會也雖然楞嚴經云一切衆生輪回世間由二顛倒分別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見云何名為同分妄見此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中或有三兩百國或一或二至於三十四十五十若復此中有一小洲祇有兩國唯一國人同感惡緣則彼小洲當土衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦日食謂適見于日月之災也珮玦謂妖氣近日如環珮之象彗孛飛流芒氣四出曰孛絶迹而去曰飛光迹相連曰流負耳虹霓陰陽之氣或背日如負旁日如耳或明而為虹曕而為霓種種惡相但此國見彼國衆生本所不見亦所不聞不常見者人以為怪故古聖人以日食星隕為災異無如今時科學發達照見天體預報隱現也雖然哀哭而城崩大喝而日退古有明文月融諸師能有感天之誠力或有動天之神通俱未可知也龍王獻舞迷雲盡散三國遺事云新羅第四十九憲康大王之代自京師至於海內比屋連墻無一草屋笙歌不絶道路風雨調於四時於是大王遊開雲浦在蔚山郡王將還駕晝歇於汀邊忽雲霧冥曀迷失道路怪問左右日官奏云東海龍所變也宜行勝事而解之於是敕有司為龍創佛寺近境施令已出雲開霧散因名開雲浦東海龍喜乃率七子現於駕前讚德獻舞奏樂其一子隨駕入京輔佐王政名曰處容王以美女妻之欲留其意又賜級干職其妻甚美疫神疫神即所謂熱病神欽慕之變無人夜至其家竊與之宿處容自外至其家見寢有二人乃唱歌作舞而退歌曰東京明期月良夜入伊遊行如可入良沙寢矣見昆腳烏伊四是良羅二肹隱吾下於叱古二肹隱誰支下焉古本矣吾下是如馬於隱奪叱良乙何如為理古時神現形跪於前曰吾羡公之妻今犯之矣公不見怒感而美之誓今已後見畫公之形容不入其門矣因此國人門帖處容之形以闢邪進慶王既還乃卜靈鷲山東麓勝地置寺曰望海寺亦名新房寺乃為龍而置也又幸鮑石亭南山神現舞於前左右不見王獨見之有人現舞於前王自作舞以像示之神之名或曰祥審故至今國人傳此舞曰御舞祥審或曰御舞山神或云既神出舞審象其貌命工摹刻以示後代故云象審或云霜髯舞此乃以其形稱之又幸於金剛嶺時北嶽神呈舞名玉刀鈐又同禮殿宴時地神出舞名地伯級干語法集云于時山神獻舞唱歌云智理多都波都波等者蓋言以智理國者知而多逃都邑將破云謂也乃地神山神知國將亡故作舞以警之國人不悟謂為現瑞耽樂滋甚故國終亡尚玄曰處容之舞傳之麗鮮久而不亡按高麗史忠惠王四年八月庚子王率二官人登妙蓮寺北峯張樂天台宗僧中照起舞王悅命宮人代舞王亦起舞又命左右皆舞或作處容戲又按朝鮮世宗大王以處容舞之曲折改撰歌詞名曰鳳凰吟為廟廷正樂世祖大王增其制合樂而奏之矣詳見朝鮮樂學軌範雪山真歸是佛祖師朝鮮禪宗所崇奉者是祖師禪以祖師禪為極則故傳持與悟得優祖而劣佛在禪宗則與其謂佛教寧可謂祖教也祖師禪者佛成道後訪見雪山真歸祖師傳持祖印得祖宗旨名祖師禪此之學説有所由來高麗天頙禪師撰禪門寶藏録引海東七代録所云新羅梵日國師答真聖王問禪教兩義援證達磨密録者為之濫觴朝鮮近世雪竇禪師法名有炯據是説而撰禪源溯流引證分釋自是以後海東禪侶奉為金科玉律更無為異議者略録其書如下佛見明星悟法猶未甚深遊行數十日傳得祖師心新羅梵日國師因真聖王問禪教兩義答曰世尊見明星悟道復知所悟之法猶未臻極遊行數十月尋訪祖師始傳得玄極之旨謂如來悟底名如來禪祖師傳底名祖師禪也是故如來禪劣於祖師禪數十月清虛禪師禪教釋亦作月然當作日達磨云真歸祖師在雪山叢木房中待釋迦傳持祖印壬午歲心得同時祖宗旨以壬午臘月八日成道而成道後數十日傳持祖印則尚在臘月晦前故為壬午歲若過數十月則非壬午也法華云我始坐道場觀樹及經行於三七日中思惟如是事今數十日遊行至叢木房亦順經中觀樹及經行三七日思惟也然禪云尋訪祖師傳持祖印經云思惟如是事此是禪教之所以異也如來悟底名如來禪者普曜經云菩薩於二月八日成道號人天師菩薩者約成道前言也若約成道後則轉得佛號是為釋迦牟尼佛也二月八日者世尊出世與周同時則周以子月為歲首前亥月終壬午歲至子月為癸未正月故丑月為二月即周穆王三年癸未二月八日也成道道即所悟之法能悟之人是如來而今約所悟之法兼能悟之人故名如來禪禪是所悟之心法也天人師者以成道後施設方便為人天説法故云人天師臨濟云第二句薦得與人天為師一愚釋云如來在寂滅場中初成正覺現千丈盧舍那身四十一位法身大士及天龍八部一時圍繞是第二句故云與人天為師謂初成正覺即如來悟底是第二句薦得也法身大士人天龍八部天云云成正覺後施設戈甲説華嚴時也故云與人天為師香嚴曰去年貧未是貧今年貧直是貧仰山曰如來禪即許師兄會祖師禪未夢見在一愚云此是能所二知俱忘成就如來禪為人天師之榜樣謂香嚴悟底是第二句薦得故云成就如來禪如是悟之施設方便堪與人天為師故云為人天師之榜樣祖師傳底名祖師禪者慧可問達磨今付正法即不問釋祖傳何人得何處達摩曰天竺則諸祖傳説有篇吾今為汝説示頌曰真歸祖師在雪山叢木房中待釋迦傳持祖印壬午歲心得同時祖宗旨此即所謂達磨密録真歸祖師文殊菩薩如是化現為七佛祖師也此能傳之人雪山及叢木房傳法之處壬午歲傳法之時祖印是所傳之法今約所傳之法兼能傳之人故名祖師禪也禪是所傳之心法也祖宗旨即向上一竅人人本具箇箇圓成不從人得故傳持向下祖印之時祇自心得此宗旨也壬午歲者孔子曰行夏之時夏以寅月為歲首自漢武帝太初曆後至今行夏時以今所行言之故丑月為壬午臘月也臨濟云第一句薦得與祖佛為師一愚云此句下薦得徑踏毗盧直佩祖師心印故云與祖佛為師謂直佩祖師心印故名祖師禪徑踏毗盧向上則是悟本分故新薰佛祖立下風為侍者故云為佛祖師問真聖既問禪教兩義則答中世尊悟道豈非教義耶答豈不聞道古德云得之於心則乃至世間粗言細語皆為教外別傳禪旨失之於口則拈花微笑却為教迹然則世尊悟道得之於心故為如來禪也若謂不然世尊悟道不得於心耶故知真聖雖問禪教兩義意實問禪豈不知四十九年説是為教也故梵日答中世尊悟道明如來禪祖師傳旨明祖師禪也問世尊悟道祖師傳底皆是心得為禪果如所言其失之於口為教者經云如證説華嚴華嚴中何法為如來悟底何法為祖師傳底耶答風釋第二句云於此辨得見理無邊事相無外具正知覺説話云教説事事無礙禪行事事無礙故知説理事無礙是如來悟底事事無礙是祖師傳底也已知如來祖師二禪之所以得名且道名下之義如何説話拈頌説話云如來禪者山山水水法法全真也祖師禪者和根拔去了沒巴鼻也上標舉法體下類指經法如經云若見諸相非相即見如來云者是如來禪法眼云若見諸相非相即不見如來云者是祖師禪也上別指經文下通類佛法又佛法有頭角邊謂之如來禪佛法無頭角邊謂之祖師禪也又古德云天地地天天地轉水山山水水山空云者是如來禪天天地地何曾轉水水山山各宛然云者是祖師禪也此約世法檀國桓因乃天帝按佛經三十三天即忉利天居須彌山頂天主名釋提桓因即帝釋號玉皇上帝於靈山佛授記曰汝於來世當得作佛號無著世尊有寶鏡照四天下人皈依三寶持齋者來生其天見法華經注釋忉利天者欲界六天中之第二而主治此世界之天也又按古今記桓因天也桓雄神也檀君即桓儉也神人也是謂三神云云此與佛經所云帝釋名號相同風俗考云帝釋者天竺語上帝之稱古寺出於僧侶之手故釋為帝釋決非巫風祀者也國內寺剎必奉安帝釋桓因之位亦此意也已上朝鮮俗書三一神誥大倧教書天訓所謂蒼蒼非天玄玄非天天無形質無端倪無上下四方虛虛空空無不在無不容神訓所謂神在無上一位有大德大慧大力生天主無數世界造甡甡物鐵塵無漏昭昭靈靈不敢名量聲氣願禱絶親見自性求子降在爾腦真理訓所謂真妄對作三途曰感息觸觸字也轉成十八境惑等語皆逼近佛書非但此也俗巫賽神即俗所謂星主賽神檀實紀云今民家每十月農事畢以新穀蒸大甑餅兼設酒果而賽神者曰成造成造者成造家邦之意此檀君始教民居處之制造成宮室故人民不忘其本必以降檀月報賽神功也時唱帝釋亦念佛號檀國始祖天神人三而為一東方厥初初無君長有神人降于太白山檀木下國人立以為君國號檀檀君名儉蓋桓因天帝也桓雄天神也桓儉神人也人民被其教化歸之者如市故亦稱神市焉駕洛國始祖稱天帝所命金首露王降卵于龜旨峯自言曰皇天命我御是處惟新家邦首露王后西域阿踰陀國公主許氏語王曰其父母夢中同見皇天上帝謂曰駕洛國元君首露王者天所降而御大寶故送我作配云云高句麗始祖稱天帝子初扶餘王解夫婁無子祭山川求嗣至鯤淵得石中小兒金色蛙形名曰金蛙立為太子後其相阿弗蘭曰夢天帝謂我曰將使吾子孫立國於此汝其避之遂勸王移都于東海之濱國號東扶餘其舊都有人自稱天帝子解慕漱來都焉及解夫婁薨金蛙嗣得女子於太白山南優勃水問之曰我是河伯之女柳花與諸弟出遊解慕漱誘入熊心山下鴨緑室中私之即往不返父母責我無媒而從人遂謫於此蛙異之幽於室中為日所照引身避之日影又逐而照之因有娠生一卵蛙棄之與犬豕不食棄之路牛馬避之棄之野鳥覆翼之蛙欲剖之不能母裏置暖處有男子破殼而出骨表英奇年甫七歲善射扶餘俗謂善射為朱蒙故名之蛙諸子忌欲殺之朱蒙逃至淹水無梁祝曰我是天帝子河伯外甥逃難至此魚鱉成橋朱蒙得渡至卒本扶餘沸流水上都焉國號高句麗因姓高新羅始祖為地仙子朴赫居世出於林間之卵其后閼英生於井中之龍仙桃聖母隨喜佛事真平王朝有比丘尼名智惠多賢行住安興寺擬新修佛殿而力未也夢一女仙風儀婥約珠翠飾鬟來慰曰我是仙桃山神母也喜汝欲修佛殿願施金十斤以助之宜取金於豫座下粧點主尊三像壁上繪五十三佛六類聖衆及諸天神五嶽神君羅時五嶽謂東吐含山南智異山西鶴龍北太伯中父嶽亦云公山也每春秋二季之十日叢會善男善女廣為一切含靈設占察法會以為恆規本朝屈佛池龍託夢於帝請於靈鷲山長開藥師道場以平海途其事亦同惠乃驚覺率徒往神祠座下堀得黃金一百六十兩克就乃功皆依神母所諭其事唯存而法事廢矣神母本中國帝室之女名娑蘇早得神仙之術歸止海東久而不還父皇寄書繫足云隨鳶所止為家蘇得書放鳶飛到此山而止遂來宅為地仙故名西鳶山神母久據茲山鎮祐邦國靈巽甚多有國已來常為三祀之一秩在羣望之山第五十四景明王好使鷹嘗登此放鷹而失之禱於神母曰若得鷹當封爵俄而鷹飛來止機上因封爵大王焉其始到辰韓也生聖子為東國始君蓋赫居閼英二聖之所自也東國通鑒新羅始祖赫居世五年春正月立閼英為妃初龍見於閼英井右脅生女兒有老嫗異而養之以井為名及長有德容始祖納為妃有賢行能內輔時人謂之二聖故稱雞龍雞林白馬等雞屬西故也嘗使諸天仙織羅緋染作朝衣贈其夫國人因此始知神驗又國史史臣曰軾金富軾自言也政和中嘗奉使入宋詣佑神館有一堂設女仙像館伴學士王黼曰此是貴國之神公知之乎遂言曰古有中國帝室之女泛海至辰韓生子為海東始祖女為地仙長在仙桃山此其像也又大宋國使王襄到我朝祭東神聖母女有娠賢肇邦之句今能施金奉佛為含生開香火作津梁豈徒學長生而囿於溟濛者哉讚曰來宅西鳶幾十霜招呼帝子織霓裳長生未必無生異故謁金仙作玉皇三國遺事朝野輯要云新羅始祖赫居世也初朝鮮遺民分居山谷為六村落閼川楊山突山高墟觜山珍支茂山大樹金山加里明活山高耶是為辰韓六部漢宣帝地節元年高墟村長蘇伐公望見楊山麓蘿井林間有白馬跪拜狀東國通鑒蘿井林間有馬嘶云即視之馬忽不見有大卵剖之嬰兒出焉及年十三歲六部人以其生神異立為君稱赫居世居西干方言尊長之稱以大卵如匏辰人謂匏為朴以朴為姓一説乃桃山聖母所誕聖母本中國帝女得仙術來東為神赫居世五年娶閼英為妃又二十一年築京城號曰金城又云多婆那國在倭國東一千里其國王娶女國王女有娠七年生大卵以帛裹之置櫝中載船浮海祝曰到有緣之地立國至辰韓阿珍浦有嫗開見之小兒在焉初來時有鵲飛鳴故去其鳥以昔為氏解櫝而出故名脫解南解王以女妻之及儒理王將薨曰先王顧命曰無論子壻以年長且賢者繼位遂傳於脫解是為新羅第四王東國通鑒云新羅南解王五年春正月王以長女妻昔脫解昔脫解本多婆那國人國在倭國東北一千里初其國王娶女國王女為妻有娠七年生大卵王以不祥棄之女裹以帛置櫝中浮海任所之初至金官國海濱人怪之不取轉至辰韓阿珍浦口有老嫗繩之開櫝有兒存遂養之及壯身長九尺風櫝秀朗智識過人以櫝始來有鵲飛鳴省鵲以昔為氏以解櫝而出名脫解云云脫解王夜聞金城始林樹間有雞鳴聲視之有金色小櫝挂樹枝白雞鳴於下取櫝開見有小男兒收養之名曰閼智出於金櫝故姓金氏因名其林曰雞林閼智七世孫昧鄒助賁王女無子昧鄒代立是為金氏開國之始也東國通鑒新羅脫解王九年春三月王得小兒閼智養以為子王夜聞金城西始林間有雞聲遲明遺瓠公視之有金色小櫝挂樹梢白雞鳴於下瓠公還告王使人取櫝開之有小男兒在其中姿貌奇偉王喜曰此豈非天祚我以胤乎名閼智閼智鄉言小兒之稱以其出於金櫝姓金氏有雞怪改始林名雞林因以為國李瀷星湖僿説曰三國之際櫝出卵生之類都不可信余既有成説按輿地勝覽引崔致遠釋利貞傳云伽倻山神正見母主乃為天神夷毗訶所感生大伽倻王𢞓窒朱日金官國王𢞓窒青裔二人則𢞓窒朱日為伊珍阿豉王之別稱青裔為首露王之別稱也又釋順應傳大伽倻國月光太子乃正見十世孫父曰異瘤王求婚于新羅迎伊粲比枝輩之女而生太子則異瘤乃𢞓窒朱日之八世孫與駕洛古記不合致遠新羅人為人作傳亦必據傳述而書之獨不知有金卵之説者耶意者荒裔之地未有信史愚俗喜談鬼佛家多捏誣新羅之末禪道大行誕怪之説流行不禁或云如此或云如彼不獨甲之非實乙亦難據致遠無識筆之於書疑亂後人何足責哉金庾信首露之後也而新羅博士薛因宣撰其碑云軒轅之裔少昊之胤羅人亦自謂金天之後朴居勿撰三郎寺碑亦然故其傳引此謂與新羅同姓新羅之金始於閼智生於始林之金櫝與金海之卵生何干又豈與伽倻感神者相涉又豈與少昊相涉而混為之同姓句麗朱蒙即天神解慕漱之子而至廣開王與高雲敘族雲句麗之支而自云高陽氏之苗裔或謂句麗高辛之後或云始祖沸流王乃北扶餘王解扶婁庶孫其父優台生子二人長曰沸流次曰溫祚其説多歧將何適從蓋新羅至真興王始修史高句麗始有留記百卷至嬰陽王約為新集百濟至契王始有書記其間許多年都未有信史東方之有人民久矣恐無氣化若是其多也其金海許后耽羅三女之類假饒有是不過飄海偶至者云云尚玄曰離騷經所云東皇太一是似指我海東之神又秦漢時方士等每稱東海中有三神山是亦指我海東者也世稱金剛為蓬萊智異為方丈漢拿為瀛洲漢拿山南濱海石壁有刻文云徐市過此智異山神聖母天王為風水之祖朴全之龍巖寺記甌嶺異人授道詵國師風水之法是即智異山神聖母天王云云及巫術之源世傳聖母天王配嚴川和尚生八女皆為巫云是則仙桃聖母之類也金剛山毛人著初發心文之野雲和尚在金剛山每夜見毛人來就爐火雲師度之云及楊蓬萊士彥皆仙類也然則我朝鮮非徒為佛緣聖地亦可謂神宅仙窟也金馬人雅善梵唄聲金馬人者新羅興德大王時真鑑國師也師於貞元元年隨歲貢使入唐至滄洲謁神鑒大師受印契大和四年來歸入智異山花開谷創玉泉寺即今之雙溪寺居數年請益者稻麻成列殆無錐地大中四年正月九日囑衆坐化侍御史崔致遠奉教撰碑銘并序有曰師雅善梵唄金玉其音側調飛聲爽快哀惋能使諸天歡喜永於遠地流傳學者滿堂誨之不倦至今東國習魚山之流者佛祖通載云陳思王曹植字子建每讀佛經留連嗟玩以為至道宗極轉讀七聲升降曲折之響世皆諷而刖之遊魚山聞有聲特異清揚哀婉因效其聲為梵唄競如掩鼻晉書云謝安能作洛下諸生詠有鼻疾故音濁名儒愛其詠或掩鼻效之效玉泉餘響豈非以聲聞度之之化乎據是則師為海東梵唄之祖也繼其後而善梵唄聲者東師列傳云慈行禪師名策活姓張氏靈巖玉泉人出家於頭輪山禪師受具於玩虎講師拈香於中和德弘大師受律及禪於三如師之壇受梵音於好訓和尚同治元年壬戌正月初三日入寂世壽八十一法臘六十五法相短小智行博大尤善於梵聲掩鼻之規玉泉之響重興於一時炷香而請益者填門塞路見人慈愛未嘗以尊卑貴賤親踈之人皆謂之慈行大師其所音聲度人有龍淵雲坡等數十百人有到岸大允者棆木梵唄甲于一時入滅於迦智山云云湖南長興郡迦智山寶林寺有梵音宗譜板本朝鮮近世梵唄源流盡在乎是一見了然梵音族派序梵音之傳其來久矣西竺則妙音菩薩獻樂供佛於靈鷲中華則魏曹子建摸拓清音於魚山至於我東方有真鑑大師尤善梵唄金玉其音大化當世自此以後玉泉餘響綿綿不絶於幾千年矣至清虛大師第四世孫雲溪堂法敏禪師頗得其妙傳之慧鑑慧鑑之後出數十餘人皆以聲教鳴於一方故嶺湖兩南法事莫不有其徒之盛作畢萬之後可驗於此也寶林老魚山大輝即慧鑑之高弟也亦有弟子弟子弟子亦有弟子弟子蠢蠢如螽斯之盛而所病為其後者專昧其祖孫相傳之源派雖出一人之後分居南北如視路人可不惜哉輝也收拾其遠近散亡以明昭穆之分目之曰梵音族派一以欲不忘其本所自來一以欲不孤其類而以至於吉凶間護為扶跋者列示于后赤兔孟夏龍巖增肅序梵音宗譜重序觀夫萬派分流討源則同千林森列尋根則一倘昧根源難辨枝派此梵音宗譜之所以作也自西域中夏洎于我東各有其源而具載前序中今不疊床蓋吾東聲教相傳者莫非真鑑之胄而羅麗間承承之迹古也不可考至于國初嗣祖模梵國融魚山大振聲化歷七嬗而至名現雪湖魚山出雲溪堂敏禪師非但聲教之巨劈兼通內外書史實專青寒於藍水者也晚恨聲業不如心學乃參西山第二世友雲玄禪師學究禪教遂為一方宗師自此雖撤聲教之藩籬然而掩鼻之徒恆滿門下得其妙音而出乎類者慧鑑大魚山也今寶林輝長老又出於鑑之門下為諸徒之上首爰發迷源之歎乃經歷諸方博訪同宗録成梵音宗譜已請序于龍巖大師以辨之將事刊勒其門人法泉致翰師繼至以為雲溪堂先師本以魚山為宗師以繼西山之後又得鑑師茲魚山弟子而序中不盡其由想必觀者致疑曰魚山何以為西山之裔耶西山亦業魚山耶此疑不無不為重序以明之乃訪余於秋城之玉泉使記顛末余與此師於師門昆季間也不敢以不才辭謹書此以歸之上即位二十六年戊辰浴佛日有一序有一蓮潭和尚之名立規一奉事師宗極己孝敬者二同宗一派和昌友愛者三遠近同風至寬至厚者四持齋身心慈悲作法者第一世嗣祖模梵國融第二世出世魚山應俊第三世魚山惠雲第四世出世魚山大輝第五世魚山演清第六世魚山尚還第七世魚山雪湖第八世雲溪堂出世法敏第九世魚山慧鑑雲溪堂法敏禪師以聲教之世繼則模梵之第八世以禪教之世繼則西山第二世友雲堂守玄大師之第一指也慧鑑法弟澄光寺徇映弟子有敏有平慧鑑弟子秩鳳岬寺采清佛會寺贊浩開天寺性覺大興寺竺察定林寺大輝澄光寺怡真豐湜美黃寺始明興國寺體雲仙巖寺融學再芳金塔寺演機華嚴寺覺輝大光寺道認大輝弟子秩開天寺弘卞寶林寺性玉文玉維摩寺了怡修仁寺弼英寶林寺汝安法泉寺致翰天冠寺快俊萬淵寺捗明美黃寺覺慧珍島雙溪寺天性寶林寺罡仁學明道日鳳林寺明現雙鳳大芚寺巨宇寶林寺月正玉堅敬岑隆海覺禪弟子秩華嚴寺頴寬講澄桂森福寬泰安寺朗行仙巖寺敬鑑鵬日會心妙云善聰感明致間致云即慧信淑玉行華嚴寺頴寬傳之德洪洪傳之鷲峯悟幻幻傳之忍菴正悟悟傳之肯庵長老老傳之抱月永信始明弟子就碁演機弟子本塔幹清尚玄曰海東魚山固以新羅真鑑國師為始祖然而羅麗之間承承之迹既不可考則難保其無變調也現今安城郡青龍寺住持洪月運和尚求法入支那遍遊南北久之乃還據其言曰朝鮮梵唄倣佛蒙古僧侶所唱之聲云云然則高麗時代與遼金元佛化相資梵音之變或在其時也朝鮮僧家有以梵唱為專門業者其傳授師名為魚丈以梵音集作教科書雖然此非真鑑遺法松廣寺無用秀演禪師撰新刊梵音集刪補序足以為證其文如下梵音之作權輿於曹魏而我東真鑑老入中華模還而後玉泉遺響雷震山應蛙音之陋一變而倣佛乎支那印度焉今則法墜人踈音亦隨之敢以布鼓唐突天雷者滔滔皆是可言哉然而方丈之音蔽一國耳堪傾乎其所詠句偈則多托於禪法律三藏之中或出於當其時名彥之手而口訓手傳烏焉莫分人雖欺聖可欺乎小大設筵供佛天神祇之際諸聖若見其過則人無開口者吁可畏哉某上人方丈之徒其人端其音雄可謂拔萃者慨其聲教波頽心欲會其異執正其訛舛而不自用期以請諸聲徒之傑然者刪其繁補其闕是者仍之非者改之分為三軸既又乞余考證而序其顛末余以不才讓之固而之人之請堅其甚余不顧鄰人之走敢效西子焉云云然則海東習魚山之流者效玉泉餘響其始焉者也方丈之音蔽一國其中焉者也華嚴寺抱月信師宗傳最遠其終焉者也梵唄一道始終不離於智異山以音聲度人其亦緣有所在歟玉龍子權弄堪輿術玉龍子道詵國師也師嘗駐錫於光陽之白雞山玉龍寺故號玉龍子世人皆曰玉龍子從唐一行禪師得地理法而還本國遍相地脈開創寺院建設塔像今據高麗崔惟清道詵禪師本碑並無入唐之説且道詵與一行相距年代稍遠不可能為其弟子也五山説林朝鮮車天輅撰云道詵國師説者以為唐一行之弟子誤也一行乃玄宗時人也道詵乃與王太祖父王隆一時王太祖高麗正與趙宋相並然則與道詵相去不啻數百載其曰一行之門人者豈非妄乎道詵堪輿術之淵源見於崔碑不容疑也崔惟清撰碑云始師之未卜玉龍也於智異山甌嶺卓庵止息有異人來謁座下曰弟子幽棲物外近數百歲矣緣有小技可奉尊師倘不以賤術見鄙他日於南海汀邊當有所授此亦大菩薩救世度人之法也因忽不見師奇之尋往所期之處果遇其人聚沙為山川順逆之勢視之顧見則其人已無矣其地在今求禮縣華嚴寺之下師夜宿華嚴晝見沙勢日日謄書祕録土人稱為沙島村云師自是豁然益研陰陽五行之術雖金壇玉笈幽邃之訣皆印在胸次於是為王太祖啓聖期於化元定成命於幽數其原皆自吾師發之朴全之龍巖寺重創記曰昔開國祖師道詵因智異山主聖母天王密囑曰若創三巖寺三韓為一云云甌嶺異人即智異山神也筆苑雜記徐四佳居正撰云道詵出家入山修練有天仙下降授天文地理陰陽之祕又入唐學唐一行法世傳圖讖皆詵所傳也近得唐本星曜一帙有曰高麗國師賦而議論精微非詵不能為也然其所與議論者耶律楚材則時之相距甚遠是可疑也安知高麗國師者密傳詵術不傳於東方而傳於中國乎徐四佳疑道詵耶律相距之遠而不疑一行道詵相距之遠是更可疑也高麗太祖遺訓之中地德之説實居其半是皆詵師權弄術法付囑國王以作佛事者也按筆苑雜記山水之説昉於後漢青烏子著葬經者也陶侃郭璞踵而成之唐有楊筠松宋有胡舜申皆碌碌小儒不足語道理者喜為山家禍福之説一以方位山水之善惡以定子孫吉凶牽合附會瑣屑叢冗誕妄至甚云云堪輿之説見於佛家者於支那則指月録引外紀云六祖至曹溪寶林覩堂宇湫溢不足容衆欲廣之遂謁里人陳亞仙曰老僧欲乞檀那一坐具地亞仙曰和尚坐具幾許濶祖以坐具示之亞仙唯然祖展坐具彌布曹溪四境四天王各現其方亞仙曰和尚法力廣大他日興造願存祖墓餘願盡捨為寶坊然此地乃生龍白象來脈只可平天不可平地寺後興建一依其言先是西國智藥三藏經其地謂林巒泉水宛如西天寶林宜建一梵剎一百七十年後當有無上法寶於此演化得道者如林宜號寶林韶州牧侯敬中表聞建寺時梁天監三年祖之來適符其記傳燈録云司馬頭陀自湖南來謂百丈懷海禪師曰頃在湖南尋得一山名大溈是一千五百人善知識所居之處丈曰老僧住得否司馬頭陀參禪外蘊人倫之鑒兼窮地理諸方創院多取決焉對云非和尚所住丈云何也對云和尚是骨人彼是肉山設居之徒不盈千丈云吾衆中莫有人住得否對云待歷觀之時華林覺為第一座丈令侍者喚來問云此人如何陀令謦咳一聲行數步對云此人不可又令喚溈山祐祐時為典座陀一見云此正是溈山主也丈是夜召祐入室囑云吾化緣在此溈山勝境汝當居之嗣續吾宗廣度後學時林聞之曰某甲忝居上首祐公何得住持丈云若能對衆下得一語出格當與住持即指淨瓶問云不得喚作淨瓶汝喚作什麼林云不可喚作木棎也丈不肯乃問祐祐踢倒淨瓶丈笑云第一座輸却山子也遂遣祐往溈山住持於海東則其最古者無如崔致遠所撰新初月山崇福寺碑碑云金城之離日觀之麓有伽藍號崇福者乃先朝謂景文大王也嗣位之初載奉為列祖元聖大王號丹敬信景文王之九世祖也園陵追福之所修建也與畫金界須達陀長者布金買園宜闓玉田王者之葬用玉匣故洎貞元戊寅元聖大王十四年也冬遺教窀穸之事因山綱目注帝者之葬因其山不復起墳是命擇地尤難乃指淨居寺也將安祕殿幽殿時獻議者有言昔遊氏之廟子遊之廟孔子之宅猶皆不忍終毀人至于今稱之則欲請奪金地無乃負須達陀須達陀此譯給孤獨即作秪桓精舍者此謂金元良也大捨之心乎冥葬者地所祐天所咎白虎通云天以高為尊地以厚為德案冥葬則地增其厚故為所祐天減其尊故為所咎不相補矣而蒞政者譏議也曰梵廟也者所居必化無𨓏不諧故能轉禍基為福場百億劫濟其危俗靈隧也者俯硂坤脈五行之氣運行於地中猶人之血脈運行於皮膚也仰揆乾心揆度也二十八宿與列星羅乾心各有分主地故也必在苞四象苞包同抱也四象少陽老陽少陰老陰皆地師定山之形也于九原禮記云晉獻子曰從先大人於九京注謂晉大夫之墓地在九京京蓋原字之誤千萬代保其餘慶則也法無住相禮有盛期易地而居順天之理但得青烏善視豈令白馬悲嘶梁高僧傳云相傳之外國國王嘗毀破諸寺惟招提寺未毀一夜白馬繞塔悲嘶即啓王王即停壞因改招提為白馬寺且驗是仁初本𨽻戚里誠宜去卑指威卑也就峻指德峻也捨舊捨舊寺也謀新新基或新陵也使幽庭據海域之雄淨剎擅雲泉之媺則我王室之福山高峙彼侯門之德海安流斯可為知無不為各得其所豈與夫鄭子産之小惠魯恭王之中輟同日而是非哉宜聞龜筮協從可見龍神歡喜遂遷精舍爰創玄宮兩役兩役指玄宮精舍二事也庀徒百工蕆事其改創紺宇則有緣之衆相率而來張袂不風植錐無地霧市奔趨於五里雪門和會於一時至於撤瓦抽椽奉經載像迭相授受競以誠成役夫之走步未移釋子之宴居已就其成九原陵也則雖云王土且非公田於是括以邇封求之善價益丘壠餘二百結酬稻穀合二千莒東俗以五畝減百弓為結除一斗為莒也按括以云云籠取邇封四山厚買僧家永為千秋松柏之地也益丘云云以王家二百餘結益之丘陵其中年年收合二千莒稅永為先陵酬本之用費也旋命所司與王官之邑共役榛徑分蒔松埏墓道也云云據是則風水禍福之説固已行於新羅也而皇龍寺創九層塔則九韓來伏之説為之濫觴也至于高麗則以道詵祕記之故靡然風從而陵墓擇地罕見其事麗朝二十八王之陵寢皆在開城城西鳳鳴山中一域之內則未甚擇地於此可知其他相宅創寺皆以風水屢見不一見即如道詵見王隆新羅真聖女主九年遂與登鵠嶺究山水之脈上觀天文下察時故曰此地脈自壬方白頭水母木幹來落馬頭明堂君又水命宜從水之大數作宇六六為三十六區則符應天地之大數明年必生聖子宜名曰王建王建太祖二十六年召大匡朴述熙親授訓要曰諸寺院皆是道詵推占山水順逆而開創者也道詵云吾所占定外妄有創造則損薄地德祚業不永文宗十年作長源亭於西江餅嶽之南道詵明堂記云西江邊有君子御馬明堂之地自太祖統一丙申之歲至百二十年就此創搆國業延長至是命太史令金宗允等相地搆之鄭知常嘗有詩云岧嶤雙闕枕江濱清夜都無一點塵風送客帆雲片片露凝宮尾玉鱗鱗緑楊閉戶八九屋明月捲簾三四人縹渺蓬萊在何許夢闌黃鳥囀天春肅宗六年冬十月崔思諏尹瓘等還奏云臣等就盧原驛海村龍山等處審視山水不合建都唯三角山面嶽之南山形水勢符合古文古文謂道詵祕記也請於主幹中心大脈壬坐丙向隨形建都制可丙申以始創南京告宗廟社稷山川仁宗六年八月王幸西京命行從宰樞與妙清白壽翰相定新宮于林原驛地妙清等曰臣等觀西京林原驛地是陰陽家所謂大花勢若立宮闕御之則可并天下金國報贄自降三十六國皆為臣妾七年西京新宮成十年修西京宮闕妙清作太一玉帳步法自言禪師道詵傳之康靖和靖和傳之於我毅宗十一年五月甲申幸觀靜寺相風水十二年八月甲寅太史監候劉元度奏白州兔山半月岡實我國重興之地若營宮闕七年之內可吞北虜於是遣平章事崔允儀等相風水還奏曰山朝水順可營宮闕王然之命造宮殿賜闕名重興殿額大化術者私語曰此道詵所謂庚方客虎掩來之勢創闕於此恐有危亡之患十月幸白州入御重興闕受賀于大化殿是日天地昏黑大風拔木王頗疑之多方祈穰高宗四年十二月丁未崔忠獻信用術人李知識之言壞乾元寺以禳北兵又營新闕于南嶽二十一年秋七月甲子遣內侍李百全奉安御衣于南京假闕有僧據讖云自扶蘇山分為左蘇曰阿斯達是故楊州之地若於此地營宮闕而御之則國祚可延八百年故有是命四十六年夏四月命營假闕於三郎城江華及神泥洞先是王召術士郎將白勝賢問延基之地對曰幸穴口寺談揚法華經又創闕于三郎城以試其驗敕兩府令勝賢與校書堂景瑜判司天事安邦悅等論難利害勝賢以數馬馱道籙佛書陰陽圖讖左抽右取詭辨不窮瑜等不能折其談鋒王皆從之忠烈王三年秋七月觀候署言謹按道詵密記稀山為高樓多山為平屋多山為陽稀山為陰高樓為陽平屋為陰我國多山若作高屋必招衰損故太祖以來非唯闕內不高其屋至於民家悉皆禁之今聞造成都監用上國規模欲作層樓高屋是則不述道詵之言不遵太祖之制者也天地剛柔之德不備室家唱隨之道不和將有不測之災可不慎乎昔晉獻公欲作九層之臺荀息纍十二博碁更纍九雞子其上以諫曰一失社稷危於此也遂壞其臺唯王察之王納其言忠惠王後三年王信術士言欲撤崇教寺寵僧翯仙問其故王曰書雲觀云此地有寺逆臣必生豫恐曹頔復生是以毀之對曰自穆宗時已有此寺其間逆臣有幾恭愍王六年二月己酉命李齊賢相宅于漢陽築官闕僧普愚以讖説王曰都漢陽則三十六國朝王惑其説故有是命是年閏九月乙巳司天少監于必興上書言玉龍記云我國始于白頭終于智異其勢水根木𠏉之地以黑無父母以青為身若風俗順土則昌逆土則災風俗者君臣百姓衣服冠蓋樂調禮器什用是也今後文武百官黑衣青笠僧服黑巾大冠女服黑羅又於諸山栽松茂密凡器用鍮銅瓦器以順風土從之十五年夏四月乙卯鷹揚軍上護軍金元命鑿溝于市北街自言將以壓朝廷也術家曰徑市鑿溝武勝文衰時元命黨辛旽恐臺諫文臣發其姦用術家語以壓之十六年夏四月辛旽相地于平壤時旽以道詵記松都氣衰之説勸王遷都王方惑於影殿之役不樂聞旽不復言十八年秋七月下教曰昔我太祖每當四仲之年巡駐三蘇豫亦將幸平壤巡金剛山駐駕忠州先是辛旽密令侍中李春富請移都忠州王怒旽托言東京濱海可畏以解之乃下是令恭讓王二年秋七月書雲觀上書曰道詵密記有地理衰旺之説宜幸漢陽以休松都地德乃遺評理裴克廉往修宮闕尚玄曰高麗一代以信陰陽地德之説故王居不作層樓民家禁作高屋君臣百姓服色器具以至植林亦順風土皆術數之勢力為之也此等思想遺傳至今朝鮮之人惑於風水財帛藏聚之説喜作家屋於污下之處今以漢城松都平壤等都會之地觀之稍屬爽塏之墟謂高燥明爽之地也以賤賣故盡為西洋人所占雖然彼富而此貧惡在其信風水乎入于朝鮮墓地禍福之説尤盛即如龍飛御天歌云太祖新羅司空李翰之後也世居全州至于穆祖太祖之高祖也避仇徙居江陵道三陟縣又轉徙于咸吉道宜州湧珠里今德源府既而歸于元移居斡東之地慶興府南十二里許赤池中有圓峯高三十五步圍九十步四面沮洳人未易通行穆祖德陵在其峯上於其葬中國人來相之太祖為諸軍事時使吉州按撫使李原景往視之其鎮撫白忠信與原景同就擒者素知地理謂原景曰此陵有子孫興王者五山説林云太祖生於永興外祖第黑石里即今濬源殿是也桓祖太祖之父也太祖之曾祖曰翼祖東閣雜記云翼祖與崔妃禱于洛山觀音寺而生度祖小字善來太祖之祖曰度祖按輿地勝覽云度祖少時夢見赤池白龍來訴黑龍欲奪其居請助戰度祖明日往射正中其腰客龍流血滿於赤池故名曰射龍淵桓祖之喪太祖在咸興欲得福地而葬之未遇卜兆之人一日樵童往于山見有二僧先在山上下其山而或坐或立長者曰下者雖應地法不過將相稍上者當世出王侯樵童潛聞其語走告太祖祖馳追回卜得其地長者懶翁也少者無學上人也北路陵殿志所記與此略同而無長者懶翁少者無學之語王師妙嚴尊者無學塔銘序卞季良撰云癸酉太祖即位之二年也太祖欲相士建都命師隨駕師辭太祖謂師曰古今相遇必有因緣世人所卜豈若道眼巡幸雞龍山及新都漢陽師皆扈從旬五志云初上於雞龍山下相宅始役夢一神人曰此乃奠邑所居非君之基亟去無留上即撤之移鼎于漢陽道詵圖讖有代王者李當都漢陽之語故麗朝種李於漢陽李樹茂盛則輒斫去以壓之至是果驗五山説林云太祖得無學待以師禮仍問定都之地無學卜漢陽以仁王山作鎮白嶽南山為左右龍虎堪輿家以在左之山為青龍在右之山為白虎鄭道傳難之曰自古帝王皆南面而治未聞東向也無學曰不從吾言垂二百年當思吾言太祖又問千秋萬世後藏弓劒之所無學乃卜一地曰殿下子若孫世世皆葬于此可也即今健元陵也即東九陵又一説定虜衛崔山者世居是地甚富厚乃獻其宅于太祖曰某稍識卜地之法此當帝王因山之相太祖從之遂改搆甲第于別處因給田一百結云蓋崔山獻之無學卜之今有崔將軍之墓石云按山水祕記云擇都者若信聽僧言則稍有延存之望若鄭姓人出而是非之則傳不五世篡奪之禍生世才二百板蕩之亂至慎之慎之山水祕記乃新羅高僧義相大師之所著預知八百年後之事若合符契豈非聖僧耶以今觀之祕記所謂僧言乃謂無學也鄭姓人者乃鄭道傳也八域志云太祖使僧無學定都邑之地無學自白雲臺尋脈到萬景臺名也西南行至碑峯新羅真興王碑所立之處曰碑峰見一石刻有無學誤尋到此六字即道詵所立也無學遂改路從万景正南行直到白嶽山下見三脈合為一坪遂定宮城之址即高麗時種李處也筆苑雜記云初定漢都時河崙云道詵記有漢水入明堂之語宜建母嶽南疑今衍禧宮之基址日者李陽達曰華嶽之南實是太地亦不害漢水入明堂之説衆議不決陽達曰道詵記云西有孔巖又有丹書石壁孔巖則於二地皆在西須覔丹書可決及得丹書於仁王洞石上字畫磨滅漫不可識然得此定議太宗十七年教曰遷都之日河崙深信讖書欲定都母嶽豫獨不信乃定漢陽睿宗大王元年日官上言英陵世宗之陵坐局所直之宿有不應古經者宜改建玄宮以膺丕休睿宗下羣臣議皆曰改葬古矣葬故有闕則尚且改葬况今風水之司有言必有所稽不可不從睿宗分遣宰相求擇厥地羣臣啓曰驪興之北有一大洞岡巒列勢主對粲然法曰山頓水曲子孫千億以臣等所相陵寢所安無右於此睿宗傳旨于朝曰可以成化五年己丑遷世宗梓宮于驪州襄事既訖金守溫神勒寺記石潭日記云普雨久作奉恩寺住持欲移中廟陵寢于寺側以固其寺之勢乃誑惑文定謂宣陵近處有吉兆請遷中廟山陵于其地文定信之元衡逢迎脅持大臣大臣安瑭等依阿不敢違遂成遷陵之計將於文定百歲之後使得同兆而地勢卑下每年江水漲入文定之喪不得已更卜他處物議皆欲遷陵而以再遷為難而止象村集云光海主八年建仁慶宮於仁王山下先是僧性智以風水出入士大夫家看山剋擇終乃為主所幸至是獻營新闕之議尚玄曰國有風水之司在高麗則曰太史曰觀候署曰書雲觀在朝鮮則曰書雲觀曰日官曰相地官專掌陰陽術數之事一則曰道詵密記二則曰道詵密記而無學普雨性智等亦用道詵之術具如已上所載堪輿之説多出沙門矣上有好之者則下必有甚焉者朝鮮以來士大夫家以祖先之墓地作子孫之福田埋一尸之白骨占數里之青山尋飛龍之上天或屢遷而不憚得金龜之沒泥亦爭訟而未息飛龍上天金龜沒泥皆相地者所言山水之形勢也一自共同墓地規則施行以後大正三年此風始止矣或問於余曰朝鮮以後則士大夫崇儒斥佛故於道詵普愚無學普雨性智皆加以妖僧之號而奚獨信其風水之説乎余對曰彼士大夫固崇奉朱子者故信水風亦必以朱子遷葬父墓狀議帝陵之事為朱子年譜云紹興十四年甲子時朱子年十五葬父獻靖公於崇安五夫里之西塔山乾道六年庚寅時朱子年四十一正月葬祝孺人於建陽縣崇奉里後山天湖之陽名曰寒泉塢壙記七月遷葬父獻靖公墓其遷墓記云府君將沒欲葬崇安之五夫卒之明年遂窆其里靈梵院側即西塔山時某幼未更事卜地不詳既懼體魂之不獲其安乃以乾道六年七月五日遷於里之白水鵝子峯下年譜行狀云公卒之明年某奉其柩葬于建寧府崇安縣五夫里之西塔山而碩人別葬建陽縣崇泰里後山鋪東寒泉塢然公所葬地勢卑濕懼非久計乃卜以慶元某年月日奉遷于武夷鄉上梅里寂歷山中峯僧舍之北朱子凡三葬其父為今士大夫家信風水遷先墓之模範朱子山陵議狀云臣蓋聞之葬之為言藏也所以藏其祖考之遺體也以子孫而藏其祖考之遺體則必致其慎重誠敬之心以為安固久遠之計使其形體全而神靈得安則其子孫盛而祭祀不絶此自然之理也是以古人之葬必擇其地而卜筮以決之不吉則更擇而再卜焉近世以來卜筮之法雖廢而擇地之説猶存士庶稍有事力之家欲葬其先者無不廣招術士博訪名山參互比較擇其善之尤者然後用之其或擇之不精地之不吉則必有水泉螻蟻地風以賊其內使其形神不安而子孫亦有滅絶之憂甚可畏也其或雖得吉地葬之不厚藏之不深至於穿鑿已多之處地氣已泄雖有吉地亦無全力而祖塋之側數興土功以致驚動亦能挻災此雖術家之説亦不為無理云云由是觀之朱晦庵之信風水亦已惑矣古者之葬只言葬具之厚薄不論地德之吉凶即如孟子葬其母弟子充虞敦匠事告孟子曰棺木若以美然孟子曰古者棺槨無度中古棺七寸椁稱之自天子達於庶人非直為觀美也然後盡於人心不得不可以為悅無財不可以為悅得之為有財古人皆用之吾何為獨不然且比化者無使土親膚於人心得無𭞆乎吾聞之君子不以天下儉其親此是孝子之心固然也又墨子薄葬節財之道亦不為無見也又莊子將死弟子欲厚葬之莊子曰吾以天地為棺椁日月為連壁星辰為珠璣萬物為齎送吾葬具豈不備耶何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏也此是達觀者之言也唐之呂才曰古之葬者皆於國都之北兆域有常處此即如今之北邙山共同墓地也若言必得牛眠之地以封馬鬣之冢然後子孫以之昌盛家宅以之安寧則彼歐美鐵血宰相之雄才石油大王之富豪是何墓地風水之發福乎清朝詩人袁枚號隨圓又號倉山不信風水之説人言黃巢李闖俱因毀墓而敗非風水之驗否枚口號一詩曰寄語形家莫浪驕葬經一部可全燒汾陽祖墓朝恩掘依舊榮華歷四朝今言宗教家之葬法各異埃及人之木乃伊葬基督教人之必土葬皆因死骨還魂之信念而然也至若佛家觀念又別四大和合而生諸法從緣生四大分離而死亦從因緣滅即圓覺經所謂髮毛爪齒皮肉筋骨髓腦垢色皆皈於地唾涕膿血津液涎沫痰淚精氣大小便利皆皈於水暖氣皈火動轉皈風四大各離今者妄身當在何處者也佛式則以火葬為清淨非同儒家妄信附骨之魂能禍福其子孫也馬祖大師之弟子越州大珠和尚有言云生人持孝自有感應非是白骨能有感應此乃盡情盡理之談若非佛家不能如是見解也吾今斷言曰道詵禪師之弄堪輿術不過是作佛事之一方便此可驗於甌嶺老人之言也附道詵禪師事迹辨誤先列諸文後斷四案道詵傳高麗沙門宏演撰云初道詵入唐學於一行禪師盡傳其術求還本國一行謂道詵曰我於高麗有緣聞高麗山川多背本主故或作九韓或作三韓內外逆賊連綿不絶此天地血脈不調之病也於是一行拔筆向三韓山水圖中擇三千八百區件件落點曰人若有病即尋血脈或針或灸則病即愈山川之病亦然今我落點處建寺立佛立塔立浮圖則如人之針灸名曰裨補也道詵受教退還一一如教此從圓香國師與慈藏律師酬語之事偷襲而來月出山道岬寺道詵國師碑銘并序夫以金山建剎永垂頭陀之名河水浮杯猶傳和尚之號矧乎玄關啓鍵參造化而通神紺宇開場擁休祥而流福實合貞珉之昭揭敢緩顯刻之重新國師法諱道詵新羅朗州人也母曰崔氏家于聖起山之僻村生於真德王之季歲青瓜孕秀同巨迹之感心白足稟精鍾淑氣而拔俗神鳩護持於叢林靈鷲覆翼於平野傳貝葉於月南年末舞象隨使槎於海內運際攀龍歷踐禹貢之山川親覩唐家之文物接延英之溫諭帝夢金人卜大行之新陵神授白馬斯蓋天賦之特異豈但地術之偏能萬乘加國師之稱一行有天人之許金箱玉笈究幽經而貫穿赤縣黃圖窮法眼而纖悉乞東還以振策演北學以濟時察地形之類舟鎮其首尾創伽藍而設塔遍於遐邇天花絶一點之緣嶽松基半千之業惟茲月出之道岬不啻日觀之奇峯山疊巒重宛千佛之列像嵓危石動知一國之著名魚口想文殊之遠尋龍淵聞普賢之來住雲窗霧戶依俙十二之樓潮梵風幡輝映三千之界意在利益民物期使鞏固邦基高謝世人之填門逈臨方丈而挂錫六塵既息探妙道於乾竺三昧斯臻闡真乘於祇樹金剛太白舉屬慈航黃壤穹蒼遙懸寶鏡如來不隔過去猶存法雨一施而普霑兵火再逼而自滅浩劫雲衛獨龍宮之巋然古碑苔侵致龜頭之剝落緇流興歎碧璋含愁縱靈迹之流傳赫若前日倘銘辭之缺闕曷示後人鳥革翬飛曾賴老宿之改搆鸞翔鳳翥可廢舊鑱之更修其徒玉習夙奮禪林廣募檀越三經歲籥罄至誠而愈堅重到京都索拙文而彌切雖逼幼婦之語寧孤上人之祈銘曰獨神乎神熟覺其覺難以知知難以識識碑無碑有何損何益久而愈尊今復如昔大匡輔國崇祿大夫議政府領議政兼領經筵弘文館藝文館春秋館世子師李景奭撰正憲大夫禮曹判書兼知經筵春秋館事弘文館提學世子右賓客吳竣書資憲大夫刑曹判書兼知義禁府春秋館事藝文館提學世子左賓客金光煜篆崇禎丙子四月日始癸巳四月日立陰銘并序靈嵓郡有月出山山之奇秀蓋一道國師道詵郡人也山有寺曰道岬世傳師所創大明天順元年丁丑有信眉守眉兩師者重創焉藝文提學尹公士昀為之記天順丁丑去今壬辰一百九十餘年矣寺有詵師碑不知立始何代碑已磨滅玉習師者重刻焉白軒李相國為之銘習師又請余志碑陰余嘗見天中記記鳩林鳩林志天中聞天下久矣詵師厥生奇異又名聞天下智知未來成麗祖一統五百載之基所謂通釋氏天眼者豈可以一術稱哉亦異矣銘曰月出嵓嵓惟嶽降神降神伊何生師道詵師之始生異諸常人母漂食苽歆而有娠及生棄之鳩覆翼之見而異之收之育之師生新羅事傳至今嵓曰國師里曰鳩林鳥覆后稷寒氷之置惟此鳩林厥異何異古有神僧詵師非是猗歟詵師龍象之傑術無不通青烏其一夢感唐帝有詔來徵入于中國一行是承師得妙訣復還東國爰相松嶽載祀五百師有法眼通觀百千吉凶隆替知于未然師曰東國地形如舟舟不有鎮其無漂流地形水然鎮其可已東國之土千百餘里無遠無邇師無不歷創寺建塔以鎮嶽瀆月出有寺寺名道岬月出之山師之所生道岬之寺師之所營師雖去矣烏得無情寺有片石記寺之迹今已剝落其徒復刻相國是撰絶妙之辭重虛其諸續銘于碑通訓大夫行弘文館校理兼知製教鄭斗卿撰尚玄曰道詵禪師生於新羅之末世以圖讖術數籠絡王祖遂使盡高麗一代之君臣上下無不信敬亦因此而崇奉三寶無敢怠慢師可謂以術數開方便門而為佛事者也嗚呼詵亦僧中之傑也哉今其傳記各説不同附會編謅一人傳虛萬人傳實為之辨誤如左一則曰高麗沙門宏演所撰高麗國師道詵傳以師為得地理法即堪興術也於唐一行禪師者此乃誤訛之第一著也何者按唐沙門一行從善無畏三藏從西域來者學密宗又善曆數玄宗甚尊重之開元十五年新羅聖德王二十五年示寂自是計至唐文宗太和元年新羅興德王元年道詵示生之歲為百十年只此一證許多訛誤可得自正也二則曰李白軒景奭道詵國師碑文所謂傳貝葉於月南年末舞象隨使槎於海內運際攀龍歷踐禹貢之山川親覩唐家之文物接延英之溫諭帝夢金人卜大行之先陵神授白馬斯蓋天賦之特異豈但地術之偏能萬乘加國師之稱一行有天人之許云云等語皆從道詵國師實録中寫出者也今見實録如下師年十三落髮於本州之月嵓寺寺在月山寺之上道岬寺之北世稱月南寺者蓋訛也一堂之學者或莫之先雖老師之精明者莫不推服焉寺設水陸道場以師為頴悟使管匙筯時唐帝夢遇金人授大行幽宮之兆曰此乃東國朗州真人道詵所占覽而異之使使東來物色求之泊舟于朗州德津橋訪到月嵒寺適值水陸齋會梵衆呼道詵曰持匙筯來唐使認之果靈標超異道眼星耀真天上石麒麟乃持錦段遍及梵衆而故設詭辭謂師曰吾所持者缺不及爾爾可就吾舟任爾自取師曰物已固矣吾以年少不及何以就舟唐使強之師不獲已隨而往唐使即紿載之半月而泊彼岸至皇都館賓院有竈下卒呼師曰天子將卜先皇帝幽宮召爾來爾但請得御廄病白馬而騎之馬行而所止處為善馬起又前厥而不起處為最善可持吾戒勿忘師異之急就視之無所見翌日天子坐延英殿召師入師蒲伏行不敢仰視帝呼而起之曰朕惟大行幽宮未卜夙夜不寧前以物色求爾遠涉至此爾何以教朕師固稱不敢帝曰朕夢遇金人指爾卜定今果致爾爾無辭也師起而拜曰臣生年十三未嘗學堪輿之術又無遊覽之富然既煩天子之辱命臣敢以死告請得御廄病馬之色白者以騎之帝許之時日官相師之來集者以千數及師之來見其眇小一沙彌莫不曰童子何知師自得竈下之戒深自負若有物陰助之騎白馬尋龍脈一如其戒至一處馬若趑趄不肯前師接轡周視曰此地可用而未甚善更前數十步馬竟蹶而不起師下馬顧視良久曰此最善允合天子幽宮隨而後者咸噴噴稱嘆曰所見果高明真神人也禮部準奏竟安弓劒因山甫畢特拜國師禮遇備至寵賜隆重一行禪師者中國之高僧就候之館下曰公真天人也遂與為輩行交師既稟生知且得一行學問就博見解愈精中國人冢宅之推占多出其法眼久之力求東還天子許之此之實録本係後人臆造之謊説也其撰録者自署周覽山水歷訪古迹者以其自愧編録無據之事故故為隱姓埋名以避後人之譏評也李景爽鄭斗鄉諸氏不考年代遠近差謬引以為實斯乃古今文人之通患也三則曰崔氏漂女得食青苽感生師之説實是和順郡人相傳之高麗真覺國師之生迹而遂相混訛附會為詵師之事者也華嚴寺震應和尚為吾言之甚悉四則曰最可信者其惟高麗上柱國崔惟清所撰師碑也即門人珙寂等懼先師之景行不傳䘖涕奉表乞為紀述乃命瑞書學士朴仁範為碑文竟未鐫于石之語也門人獻其師之行狀學士奉王命而撰碑此可為國乘而崔氏撰文亦必據朴碑之實迹必是無疑之事而並無道詵入唐學于一行之説然則道詵於法則得之桐裏惠徹於術則得之甌嶺異人也明矣至於高麗史之中新羅真聖王九年乙卯歲桐裏山祖師道詵入唐得一行地理法而還云云此乃史臣不為詳考年代但依傳説而書之者也四山碑銘伉儷之文按新羅時以文章名世者厥有三人焉曰強首曰薛聰曰崔致遠強首文武王十三年王曰強首能以文辭致意於中國及麗濟二邦我先王請兵於唐以平麗清者雖曰武功而亦有文辭之助焉則強首之功豈可忽也乃授沙餐職加歲俸租二百石又金春秋之子仁問久繫唐獄文武命強首作請放仁問表以舍人遠禹奏於唐帝帝見表流涕赦仁問慰送之強首之能文推此可知也初強首母夢見人有角者有娠及生頭後有高骨父以兒就示相者曰吾聞伏羲虎形女媧蛇身神農牛頭臯陶馬口自古聖賢其相有異今觀兒首角而又黶相法面黶無好頭黶無惡此必英物乎父還謂其妻曰兒子骨法非常好養之及壯知讀書通曉義理父欲試其志問曰學佛乎學儒乎對曰佛世外教也願學儒遂就師讀孝經曲禮爾雅文選所得愈高嘗娶冶家女父母將以禮改娶之強首不可父怒曰兒有時名以微者為偶不亦耻乎強首曰嘗聞古人之言曰糟粳之妻不下堂貧且賤非所耻也強首神文王十二年卒王禮葬之賻贈優厚其妻盡供喪事乏食欲還鄉里王聞之賜租百石辭曰妾賤者也夫在之日受國恩多矣今縱未亡豈敢再辱厚賜乎遂不受而去薛聰神文王十二年王擢薛聰高秩聰字聰智父元曉嘗為沙門淹該佛書既而返本自號小性居士娶瑤石宮寡婦人生聰聰生而明敏既長博學能以方言解九經義訓導後生又製吏讀用於公牘王嘗燕居引薛聰謂曰今日宿雨初歇薰風微涼高談善謔可以舒鬱子必有異聞盍為我陳之聰曰唯臣聞昔花王之始來也植之香園護以翠幕當三春而發艷凌百花而獨出於是艷艷之靈夭夭之英無不奔走上謁忽有一佳人名曰薔薇朱顏玉齒鮮粧靘服伶俜而來綽約而前曰妾聞君王之令德願薦枕於香帷王其容我乎又有一丈夫名曰白頭翁布衣韋帶戴白持杖龍鍾而步傴僂而來曰僕在京城之外大道之旁竊謂左右供給膏粱雖足巾衍儲藏須有良藥故曰雖有絲麻無棄菅蒯不識王亦有意乎王曰丈夫之言亦有道理而佳人難得將如之何丈夫曰凡為君者莫不親近老成而興昵比夭艷而亡然而夭艷易合老成難親是以夏姬亡陳西施滅吳孟軻不遇而終身馮唐郎潛而皓首自古如此吾其奈何花王謝曰吾過矣於是王愀然作色曰子之言諷諭深切請書之以為戒崔致遠憲康王十一年春三月崔致遠捧帝詔還自唐致遠沙梁部人精敏好學年十二隨海舶入唐求學其父謂曰十年不第非吾子也致遠至唐尋師力學十八登第調宣州溧川縣尉遷侍御史內供奉時黃巢反高駢為兵馬都統以討之辟致遠為從事以委書記之任其表狀書啓多出其手其檄黃巢有不唯天下之人皆思顯戮抑亦地中之鬼已為陰誅之語巢不覺下牀由是名振天下及還王留為侍讀兼翰林學士守兵部侍郎知瑞書監事致遠自以西學多所得欲展所蘊而衰季多疑忌不能容出為太山郡太守真聖女主八年春二月致遠進時務十餘條主嘉納之以為阿餐致遠自西事大唐東還故國皆值亂世自傷不遇無復仕進意自放於山水間營臺榭植松竹枕藉書史嘯咏風月若慶州南山剛州氷山陝州清涼寺智異山雙溪寺合浦縣月詠臺皆其遊玩之所後挈家隱伽倻山與母兄浮圖賢俊及定玄師結為道友以終老焉致遠西遊將還同年顧雲以詩送別曰十二乘舟渡海來文章感動中華國十八橫行戰詞苑一籌射破金門策蓋心有所服云致遠十二入唐二十八還國故云巫峽重峯之年絲入中國銀河列宿之歲錦還東土雖然以賈生之才調上治安疏而返謫長沙抱屈子之忠誠著離騷經而行吟澤畔雞林黃葉知新羅之將亡鵠嶺青松謂高麗之將興也所著四六集一卷桂苑筆耕二十卷文章艷麗又有崇福寺碑真鑑國師碑智證大師寂照塔碑銘及無染國師白月葆光塔碑銘東人謂之四山碑銘其文皆六朝伉儷之體而無一字不來歷詞達而意圓實為海東碑文之祖而亦為禪宗之史也兩街僧録左右其司僧官之設始自支那按北齊天寶中國十統有司卷宜甄異之於是宣帝以法上法師為大統餘為通統又梁陳之間有國統州統國都州都僧都僧正都維乃等名總屬昭玄曹曹即領僧尼之官名魏獻文五年昭玄都統曇曜奏曰民間可平歲入栗於僧曹號僧秪栗遇凶年則出以賑飢民兩街之名始見於唐唐代宗詔兩街僧徒於內道場禮萬佛山新羅景德王所獻者見三國遺事又唐懿宗咸通三年敕兩街四寺各置戒壇十四年敕兩街迎法門寺佛骨入內宋哲宗元祐三年高麗僧統義天入宋帝敕兩街迎之宋高宗建炎元年命沙門法道住左街天清寺為國祝祐明太祖洪武十一年置僧録司海東僧職之設始自新羅真興王十一年庚午以安藏法師為大書省一人又有小書省二人明年辛未以高句麗惠亮法師為國統亦云寺主寶良法師為大都維那一人及州統九人郡統十八人等至慈藏法師更置大國統一人蓋非常職也亦猶夫禮郎為大角干金庾信為太大角干也後至元聖大王元年又置僧官名授法典以大舍一人史二人為司棟僧中有才行者為之有故即替無定年限後世紫衣之徒即律寺之別也按三國史新羅職官志有諸寺成典即如四天王寺成典襟荷臣一人位自大阿餐至角干為之上堂一人位自奈麻至阿餐為之赤位一人青位二人位自舍知至奈麻為之史二人奉恩寺成典襟荷臣一人稱副使一人大舍二人史二人永興寺成典大奈麻一人史三人其他奉聖寺感恩寺奉德寺靈廟寺亦各有成典職名大同小異已上職名景德惠恭哀莊三王之時或改稱或復古而煩不具録兩街僧録亦自新羅始而未知何代也其見于書者新羅定康王元年七月五日為憲康大王追薦冥福結華嚴經社願文云國統及僧録等寫貞元新經見華嚴寺事迹高麗太祖二十一年西天竺僧弘梵大師來王備兩街威儀法駕迎之慧目山元宗國師碑文云厥有大弟子兩街僧總三重大師昕弘等又國史云靖宗十二年十二月百官詣乾德殿賀成平節成平節王生日也僧録司奏自今每遇節日國家設祈福道場於外帝釋院七日百官於興王寺東西兩京四都護入牧於所在佛寺行之以為恆式從之文宗二十一年興王寺成命兵部尚書金陽右街僧録道元等擇有戒行者一千赴會仍令常住崔沖奉先弘慶寺記有左右兩街都僧録通真光教圓濟弘道大師逈兢恭愍王五年夏四月封普愚為王師立府於廣明寺曰圓融置官屬左右司尹丞舍人注簿左右寶馬陪指諭行首置官屬左右司者疑即屬於左右兩街僧録司也十四年十二月以辛盹提調僧録司事其他散見於諸師碑銘中者不可勝記煩不具引至于朝鮮世宗六年決行減宗而亦廢僧録司矣合而觀之兩街僧録司蓋統攝僧衆而主管一切佛事及賓館威儀之職掌者也僧遺魚及變化金蛙鷲棲山通度寺之慈藏菴側有一石竇可容一拇指中有一雙蛙子青身金口時或為蜂變化莫測雖熱鍋之上跳踉自在寺僧謂此金蛙都不出山門之外有一官人不信其説捕其蛙置盒中而嚴閉之手捧而歸道中開視之則無有也世傳其蛙乃慈藏律師以神通蓄之者云輿地勝覽云吾魚寺在迎日縣世傳新羅僧元曉與僧惠空捕魚而食遺矢水中魚輒活指之曰吾魚搆寺因名尚玄曰按三國遺事僧惠空居恆沙寺時元曉撰諸經疏每就師質疑或相調戲一日二公沿溪掇魚蝦而啖之放便於石上公指之戲曰汝屎吾魚故因名吾魚寺或人以此為曉師之語濫也云云其文如左釋惠空天真公家傭嫗之子小名憂助蓋方言也公嘗患瘡濱於死而候慰填街憂助年七歲謂其母曰家有何事賓客之多也母曰家公發惡疾將死矣爾何不知助曰吾能右之母異其言告於公公使喚來至坐床下無一語須臾瘡潰公謂偶爾不甚異之既壯為公養鷹甚愜公意初公之弟有得官赴外者請公之選鷹歸治所一夕公忽憶其鷹明晨擬遣助取之助已先知之俄頃取鷹昧爽獻之公大驚悟方知昔日救瘡之事皆叵測也謂曰僕不知至聖之托吾家狂言非禮污辱之厥罪何雪而後乃今願為導師導我也遂下拜靈異既著遂出家為僧易名惠空常住一小寺每猖狂大醉負簣歌舞於街巷號負簣和尚所居寺因名夫蓋寺乃簣之鄉言也每入寺之井中數月不出因以師名名其井每出有碧衣神童先湧故寺僧以此為候既出衣裳不濕晚年移止恆沙寺合迎日縣吾魚寺諺云恆沙人出世故名恆沙洞時元曉撰諸經疏每就師質疑或相調戲一日二公沿溪掇魚蝦而啖之放便於石上公指之戲曰汝屎吾魚故因名吾魚寺或人以此為曉師之語濫也鄉俗訛呼其溪曰芼矣川瞿旵公嘗遊山見公死僵於山路中其尸膖脹爛生蟲蛆悲嘆久之及回轡入城見公大醉歌舞於市中又一日將草索綯入靈廟寺圍結於金堂與左右經樓及南門廊廡告剛司此索須三日後取之剛司異焉而從之果三日善德王駕幸入寺志鬼心火出燒其塔唯結索處獲免又神印祖師明朗新創金剛寺設落成會龍象畢集唯師不赴朗即焚香虔禱小選公至時方大雨衣袴不濕足不沾泥謂明朗曰辱召殷勤故茲來矣靈迹頗多及終浮空告寂舍利莫知其數嘗見肇論曰是吾昔所撰也乃知僧肇之後身也讚曰草原縱獵床頭臥酒肆狂歌井底眠隻履浮空何處去一雙珍重火中蓮曹溪山松廣寺洞口池中有僧魚俗傳普照國師相察山勢知其靈勝將建佛寺而山本緑林之窟欲以道力逐之倚杖往覘之羣賊來縛餽以鮮魚蓋辱之也師少無顧忌盡吞其魚久之瀉出活躍水中賊以為神謝罪移去他處今池中之魚皆其遺種云云尚玄按寺本古之吉祥寺新羅時有僧慧鄰者始創而居之厥後高麗普照國師使門弟子守愚遍求結社之地愚師入此山得廢寺僅一百間居僧不滿三四十指於是與道侶天真廊照兩人同心戮力經營之九載功畢云云然則謂慧鄰遺魚則可也若謂普照則不當也朝鮮中葉亦有與此髣佛之事即震默祖師傳云師一日見衆少年獵于川烹鮮于溪邊師俯視鼎中曰好個魚子無辜而受鑊湯之苦一少年曰師欲喫魚羹麼師曰善喫少年曰這一沙鑼盡喫師擡銅沙鑼灌口頓呷衆人曰佛戒殺生豈僧耶師曰殺則非我活之在我解衣背水而瀉之無數銀鱗從後門出活躍水面師曰好個魚子遠遊江海勿再罹鑊湯之苦衆人解網而去仙飛花洎長生枯樹太白山之浮石寺新羅義相大師之所創建也寺之祖殿安大師像祖殿簷內有禪扉花或云仙飛花世傳義相大師臨涅槃時植杖于此又遺言曰我去後當復生芽觀其榮枯驗我生死朝鮮李退溪滉有詩曰琢玉亭亭倚寺門僧言卓錫化靈根杖頭自有曹溪水不借乾坤雨露恩光海主時鄭造為慶尚監司巡至此寺見此樹曰仙人所杖吾亦欲杖遂巨斷而去自後二莖抽長齊簷仁祖反正時鄭造被誅人皆異之疑為斷杖之報肅宗庚子榮川朴弘俊官執義兒時讀書是寺辨詰釋家之誕妄僧以退溪詩鄭造誅告之朴曰李詩但述僧言而非信之也鄭造之誅不過藉論我今折了以破萬衆之惑遂斫而斷之朴竟無恙其後又生芽而今三枝如前尚在也虛白集香山僧明照詩浮石義湘所植善悲花次李滉韻曰飄然遊戲海西門執錫還歸卓此根劫外春風花爛漫何緣天地養生恩余聞其事不禁嚮往亦次其韻曰劫外春風吹寺門一枝仙樹本無根榮生枯死令人惑折取還為報佛恩擇里志云松廣寺鍾樓前有水閣前有一樹昔普照大師臨化時曰此樹我去後必枯若更生枝葉則知我再生今年千而不生枝葉人以刀括皮則內津津有生氣若真枯則必朽倒而至今挺直如常又虛白集松廣寺感牧牛子詩云緬思當日事風化四方埀香樹同生死浮雲共去留休光千載重明德萬年優真相今何在曹溪咽不流松廣寺天子庵有雙樹挺然對立其大盈抱枝皆下垂如人用一指撼其樹之體幹其樹杪亦微搖據寺僧言普照國師入金國化度金太子收為門徒同來松廣卓庵而住故名天子庵太子住菴三日而悟道處曰三日菴是為湛堂國師普照與湛堂各以栴檀錫杖倒植天子庵前今其樹乃二錫杖之所生長者云云創寺金山甄萱信佛甄萱者羅末之一鄉村武夫也乘時之亂崛起尚州按三國史地理尚州為新羅畿邑則似非今之尚州占據完山為後百濟王在位三十餘年萱尚州加恩縣人本姓李父阿慈介以農自活後起家為將軍有四子皆知名於世初萱生父耕野母餉之置于林下虎來乳之鄉黨異之及壯體貌雄奇志氣倜儻多智略時真聖女主淫昏盜賊並起萱潛懷異志嘯聚亡命劫掠王京西南州縣所至響應遂據武珍州自立為王萱頗信佛道洞真大師自唐還達全州依萱萱師事之按輿地勝覽甄萱創金山寺云云雖然據國史無萱創寺之明文而於新羅敬順王九年春三月萱子神劍幽其父於金山佛宇云云然則萱之當時寺固已存在者矣又按三國遺事真表律師年二十七歲於上元元年庚子詣保安縣今扶安郡入邊山不思議房房今在來蘇寺勤求戒法於彌勒像前寶應元年壬寅四月二十七日地藏慈氏兩聖現前地藏授與戒本慈氏復與二簡子一題曰九者一題曰八者慈氏告師曰此二簡子者是吾手指骨此喻始本二覺又九者法爾八者新熏成佛種子以此當知果報汝捨此身受大國王身後生於兜率師受教法已欲創金山寺下山而來至大淵津忽有龍王出獻玉袈裟將八萬眷屬侍往金山藪四方子來不日成之復感慈氏從兜率駕雲而下與師受戒法師勸檀緣鑄成彌勒丈六像復畫下降受戒威儀之相於金堂南壁至於甲辰六月九日鑄成丙午五月一日安置金堂是歲大曆元年也云云然則創金山寺者非甄萱乃真表律師也定都鐵原弓裔稱尊新羅真聖女主五年世達寺僧善宗叛投北原賊梁吉善宗即弓裔也弓裔憲安王庶子初以五月五日生于外家屋上有素光屬天如虹日官奏曰此兒以重午日生生而有齒且光焰異常恐將不利於國家宜勿舉王敕中使抵其家殺之使者取於襁褓中投之樓下乳婢竊捧之誤以手觸眇一目抱而逃竄劬勞養育年十餘遊戲不止乳婢告曰子之生見棄於國豫不忍竊養以至今日子之狂如此若為人所知豫與子俱不免為之奈何弓裔泣曰若然吾逝矣無為母憂祝髮為僧號善宗及壯不拘檢僧律軒輊有膽氣嘗持鉢赴齋有烏䘖牙籤落鉢中視之有王字祕不言頗自負見國家衰亂政荒民散州縣叛者幾半遠近羣盜蜂起謂乘亂聚衆可以得志投竹州賊魁箕萱萱侮慢不禮善宗鬱悒不自安潛結萱麾下元會申烜等為友投北原賊梁吉吉善遇之委之以事分兵百餘騎使東略地於是出雉嶽山石南寺行襲酒泉奈域鬱烏御珍等縣皆降之真聖王九年弓裔以王建為鐵圓郡太守建漢州松嶽郡人初建父隆器宇宏大有并吞三韓之志娶韓氏築室松嶽之南王隆漢州松嶽郡人初名龍建字文明是為世祖貌魁偉美鬚髯器宇宏大有并吞三韓之志嘗夢見一美人約為室家後自松嶽往水安城道遇一女惟肖遂與為婚不知所從來故號夢夫人或云以其為三韓之母遂姓韓氏是為威肅王后世傳高麗王氏為龍種者以王隆婚配之異故也僧道詵來憩門外樹下嘆曰此地當出聖人隆聞之倒屣出迎相與登松嶽道詵俯察仰觀就為書一封授隆曰公明年必得貴子既長可以與之書祕世莫知也及期果生建于其第神光紫氣繞室充隆竟日盤旋狀若蛟龍幼而聰明龍顏日角方頤廣顙器度雄深語音洪大寬厚有濟世之量建年十七道詵復至請見曰足下值百六之會三季蒼生待公弘濟因告以出師置陳地利天時之法望秩山川感通保佑之理至是投弓裔乃授是職新羅孝恭王二年秋七月弓裔移都松嶽郡冬十一月作八關會五年弓裔自稱王裔怨宗國常語人曰新羅請兵於唐滅高句麗吾必為高句麗報讎嘗南行見興州寺壁前王畫像拔劒擊之八年弓裔立國號摩震紀元武泰設百官秋七月弓裔定都于鐵圓移青州千戶實之十五年弓裔改國號泰封改元水德萬歲弓裔自稱彌勒佛頭戴金幘身被方袍以長子為青光菩薩季子為神光菩薩出則常騎白馬以綵飾其鬃尾使童男童女奉幡蓋香花前導又命比丘二百餘人梵唄隨後又自述經二十餘卷其言妖妄皆不經之事或正坐講説僧釋聰謂曰皆邪説怪談不可以訓弓裔怒以鐵椎打殺之新羅神德王四年弓裔殺其妻康氏康氏以弓裔多行非法正色諫之弓裔惡之曰汝與他人姦何也康氏曰安有此事弓裔曰我以神通觀之以烈火燒鐵杵撞其陰殺之並其兩兒時弓裔誣搆叛罪日殺數百將相遇害者十有八九常自云我得彌勒觀心法能知婦人陰私若有觀我觀心者便行峻法遂煆造三尺鐵杵有欲殺者燒之以撞其陰煙出口鼻而死由是士女股栗怨憤日甚一日急召王建入內弓裔方檢點被殺者所沒金銀寶器床帳之具怒目熟視建曰卿昨夜聚衆謀叛何耶建顏色自若囅然而笑曰烏有是哉弓裔曰卿莫紿我我能觀心所以知也我將入定以觀了説其事乃合眼負手仰天良久時掌奏崔凝在側佯墜筆下庭取之因趨過建微語曰不服則危建乃悟曰臣實謀叛罪當死弓裔大笑曰卿可謂直也即以金銀粧鞍轡賜之曰卿勿復誑我新羅景明王二年夏六月丙辰泰封諸將立王建為王國號高麗初建年三十夢見九層金塔立海中自登其上至是年三月唐商客王昌瑾忽於市中見一人狀貌瓌偉鬚髮皓白頭戴古冠被居士服左手持三尺瓷碗右手擎一面古鏡方一尺許謂昌瑾曰能買我鏡乎昌瑾以二斗米買之其人散與乞兒而去疾如旋風昌瑾懸其鏡於市壁日光斜映隱隱有細字可讀其文曰三水中四維下上帝降子於辰馬先操雞後摶鴨此謂運滿一三甲暗登天明理地遇子年中興大事混蹤迹沌名姓混沌誰知真與聖振法雷揮神電於巳年中二龍見一則藏身青木中一則現形黑金東智者見愚者盲興雲注雨與人征或見盛或視衰盛衰為滅惡塵滓昌瑾初不知有文及見之謂非常獻于弓裔弓裔令有司與昌瑾物色求其人彌月竟不能得唯東州勃颯寺有鎮星塑像如其狀左右亦持碗鏡昌瑾喜具以狀白弓裔歎異之令文人宋含弘白早許原等解之含弘等曰三水中四維下上帝降於辰馬者辰韓馬韓也巳年中二龍見一則藏身青木中一則現形黑金東者青木松也謂松嶽郡人以龍為名者之子孫可以為君主也王侍中有王侯之相豈謂是歟黑金鐵也今所都鐵圓之謂也今主初盛於此殆終滅於此乎先操雞後摶鴨者王侍中御國之後先得雞林後收鴨緑之意也三人相謂曰王猜忌嗜殺若告以實不獨吾輩為𦵔醢王侍中必遇害乃詭辭告之至是將軍洪儒裴玄慶申崇謙卜智謙等夜詣建第密謀推戴不欲令夫人柳氏知之謂曰園中豈無新瓜可摘乎柳氏佯出潛入帳中諸將曰自三韓分裂羣盜競起今主奮臂大呼遂夷滅草寇三分遼左據有太半立國定都將二紀餘今不克終縱虐太甚淫刑以逞殺妻戮子誅夷臣僚民墜塗炭疾之如讎桀紂之惡無以加也廢昏立明天下之大義請公行殷周之事建作色拒之曰吾以忠義自許王雖暴亂安敢有二心以臣伐君斯謂革命豫實不德敢效湯武之事乎恐後世以為口實古人云一日為君終身為主况延陵季子曰有國非吾節也乃去而耕焉吾豈過季子之節乎諸將曰時難遭而易失天與不取反受其咎國中民庶受毒痡者日夜思欲復之且權位重者並遭虐殺略無所遺今之德望未有居公右者公若不從吾等死無日矣况王昌瑾鏡文如彼豈可違天死於獨夫之手乎建拒之甚堅柳氏遽從帳中出謂建曰舉義伐虐自古而然今聞諸將議妾猶奮發况大丈夫乎今群心忽變天意有歸矣手提甲領以被之於是諸將扶擁而出黎明坐於積穀之上行君臣之禮令人馳且呼曰王公已舉義旗矣奔走來赴者衆先至宮門鼓噪以待者亦萬餘人遂即位於布政殿建元天授泰封王弓裔聞變驚駭曰王公得之吾事已矣以微服出北門亡去遁于巖谷信宿飢甚偷竊麥穗而食尋為斧壤民所害今安邊之三阞咎有弓裔被害處尚玄曰甄萱弓裔皆以梟獍之輦能崇奉佛道何故也蓋當時人民惟知佛道之為尊故御下服衆之道非敬信佛道則不可故因其勢而利用之也麗祖之言足以為證按麗史提綱云天授十九年冬十二月創廣興現聖彌勒內天王開泰等寺先是王患齊民多避役為僧崔凝請除佛法王曰新羅之季佛氏之説入人骨髓人以為死生禍福皆佛所為今三韓甫一人心未定若遽除佛法必生反側矣特垂十訓麗祖護法高麗太祖二十六年夏四月王召大匡朴述熙親授訓要共有十節而其關於佛法者三其一其二其六其一曰我國家大業必資諸佛護衛之力是故創立禪教寺院全國創五百禪林開城起九個大禪剎差遣住持焚修使之各治其業後世姦臣執政徇僧請謁各業寺社爭相換奪切宜禁之其二曰諸寺院皆是道詵推占山水順逆而開創者也道詵云吾所占定外妄有創造則損薄地德祚業不永朕念後世國王公侯后妃朝臣各稱願堂或增創造則大可憂也新羅之末競造浮圖衰損地德以底於亡可不戒哉其六曰燃燈所以事佛八關所以事天靈及五嶽名山大川龍神也後世姦臣建白加減者切宜禁止吾亦當初誓心會日不犯國忌羣臣同樂宜當敬依行之云云自有此訓以後終高麗之世二十七王罔或違越敬事三寶凡受菩薩戒設經道場燃燈飯僧不可勝舉可謂世世蕭帝家家蓮社上自王公戚里宰輔巨室以至閭巷人民惟佛之外無所事也佛陀之教於斯為盛究皆基於王祖之訓要而王祖之訓要悉依道詵之密記也齋八關事龍神及天高麗太祖天授元年十一月高麗設八關會有司言前主每歲仲冬大設八關會以祈福乞遵其制麗王從之遂於闕庭置輪燈一座列香燈於四旁又結兩綵棚各高五丈餘呈百戲歌舞於前其四仙樂部龍鳳象馬車船皆新羅故事百官袍笏行禮觀者傾都王御樓觀之歲以為常東國通鑒臣等按史臣自謂八關之戒本佛氏之教也曰不殺生曰不偷盜曰不淫泆曰不妄語曰不飲酒曰不坐高大床曰不著香華曰不自樂觀聽關者閉也謂禁閉八罪不犯也中略昔新羅真興王聽僧惠亮之説始行八關之會今高麗太祖自謂得國必資諸佛之護衛燃燈以事佛八關以事天靈五嶽山川龍神以之定朝儀為國家大事終高麗之世以仲冬為八關之月誓無犯國忌君臣同樂李知白乃以復行八關為却敵之策崔沆乃以請復八關為先務文克謙乃以仲冬有忌為國之災亦獨何哉能知此會之不經而毅然革罷之者一成宗之外無聞焉可勝歎哉云云尚玄曰新羅八關會初為戰死士卒而設也新羅真興王遣將居柒夫等攻高句麗取竹嶺以西十郡其時惠亮法師自高句麗來歸新羅為國統亮勸王設八關會為戰亡士卒薦冥福今史臣等所謂八關之前五即佛氏之五戒也後三亦比丘之戒律也雖然既云八關所以事天靈五嶽山川龍神則此之八戒非所相當且何不曰事佛而特曰事天靈等乎然則所謂八關非但指其禁閉八罪也亦即謂媚事八部天龍及諸土地神即護法善神之齋會也關字包含境域如山川水陸等及災難如三災八難等兩意所以為水陸戰死士卒追薦冥福以祈超脫災厄難關升遷安樂剎土也後世之設水陸齋會者即古八關會之遺意也又按高麗史毅宗二十二年三月戊子王御覲風殿殿在西京下教頒令一崇重佛事一歸敬沙門一保護三寶其次則曰二遵尚仙風昔新羅仙風大行由是龍天歡悅民物安寧故祖宗以來崇尚其風久矣近來兩京八關之會日減舊格遺風漸衰自今八關會預擇兩班兩班謂文武也家産饒足者定為仙家依行古風致使人天咸悅云云由是觀之則天靈及五嶽名山大川龍神統謂之仙者也則燃燈所以事佛之會也八關所以事仙之會而攝於佛事者也講百座設獅子據地高麗元宗五年甲子秋七月己亥宣旨曰自聖祖以來全仗佛教密護延基夫仁王般若偏為護國安民最勝法文如經所説百獅子等法寶威儀乃道場之急具也往者移都時謂避兵亂移都江華時也獅子座不能輸入及乎法筵儀不如法金俊為寡人親朝欲設仁王法會印成是經新舊譯各一百二部造獅子座一百彩畫粧飾至於供具衣物無不精備忠誠深重云云按新羅真平王三十五年秋七月隋使王世儀至新羅皇龍寺設百高座邀僧圓光等説經此為海東百座説經之嚆矢也云云尚玄曰説法之座必用獅子者蓋亦有所據也按大涅槃經師子吼菩薩品云爾時佛告一切大衆師子吼菩薩今於我前欲師子吼善男子如師子王自知身力牙齒鋒芒四足據地安住巖穴振尾出聲若有能具如是諸相當知是則能師子吼真師子王晨朝出穴頻伸缺呿四向顧望發聲震吼為十一事何等十一一為欲壞實非師子詐作師子故二為欲試自身力故三為欲令住處淨故四為諸子知處所故五為羣輩無怖心故六為眠者得覺悟故七為一切放逸諸獸不放逸故八為諸獸來依附故九為欲調大香象故十為教告諸子息故十一為欲莊嚴自眷屬故一切禽獸聞師子吼水性之屬潛沒深淵陸行之類藏伏窟穴飛者墮落諸大香象怖走失糞諸善男子如彼野干狐也雖逐師子至於百年終不能作師子吼也若師子子始滿三年則能哮吼如師子王善男子如來正覺知慧牙爪四如意足六波羅蜜滿足之身十力雄猛大悲為尾安住四禪清淨窟宅為諸衆生而師子吼摧破魔軍示衆十力開佛行處為諸邪見作歸依所安撫生死怖畏之衆覺寤無明睡眠衆生行惡法者為作悔心開示邪見一切衆生令知六師謂六種外道師非師子吼故破富蘭那等驕慢心故為令二乘生悔心故為教五住諸菩薩等生大力心故為令正見四部之衆於彼邪見四部徒黨不生怖畏故從聖行梵行天行窟宅頻伸而出為欲令彼諸衆生等破驕慢故缺呿為令諸衆生等生善法故四向顧望為令衆生得四無礙故四足據地為令衆生具足安住尸波羅蜜故師子吼師子吼者名決定説一切衆生悉有佛性如來常住無有變易善男子聲聞緣覺雖復隨逐如來世尊無量百千阿僧祇劫而亦不能作師子吼十住菩薩若能修行是三行處當知是則能師子吼諸善男子是師子吼菩薩今欲如是大師子吼是故汝等應當深心供養恭敬尊重讚歎是師子座之出處也故凡説法者當師子吼也高麗選佛初設僧科僧科之設始於高麗按法印國師碑金廷彥撰師名坦文居運州伽倻山普願寺龍德元年高麗太祖天授四年置海會選緇徒之制云云此可為僧科之嚆矢又按圓空國師碑崔沖撰師名智宗顯德初光宗大王立皇極崇法門徵雪嶺之禪俾伸角妙選丹霞之佛明示懸科師雄入議圍首闡理窟衒疊雙之絶藝彰纍百之高名光宗九年顯德五年始用翰林學士雙冀雙冀從後周來議置科舉以詩賦頌及時務策試取進士則僧科亦應設於此時也浮石寺圓融國師決凝生於光宗峻豐十五年宋乾德二年甲子年至二十八歲成宗十年赴選佛場捿獲選經大德是可為僧科之證後於靖宗二年丙子正月辛卯創凡有四子者許出家於靈通嵩法普願桐華等寺戒壇試所業經律論又宣宗元年甲子普濟寺僧貞雙等奏九山門參學僧徒請依進士例三年一選從之自是以後高僧碩德皆從選舉中出來如沙門知訥普照國師年二十五以大寶二十二年壬寅舉僧選中之沙門慧諶真覺國師號無衣子雖不經選道行甚高高宗即位制授禪師又加大禪師不經選席直登緇秩自師始也沙門承逈圓真國師明宗素聞師之道行及於抄選詔有司特加鈔録此不拘凡例也是年秋宗門耆宿輩皆固勸於是赴廣明寺選佛場又圓證國師太古普愚二十六歲寅緣入華嚴選既中探索經義窺其壼奧云云等也至于朝鮮僧科之制蹈襲高麗由來之規經國大典試僧條曰禪宗則試傳燈録拈頌集教宗則試華嚴經及十地論明宗大王時奉恩寺設禪科普雨和尚實主其試清虛松雲皆中禪科世傳普雨出試題曰清淨本然云何忽生山河大地松雲答案亦云清淨本然云何忽生山河大地及普雨死永廢禪科實明宗朝二十年也越王求書以復台教支那天台宗一脈至荊溪尊者傳于新羅法融法融傳之理應理應傳之純英見于朝説之般若經序而後支那人求書於高麗以復台教循環報應頗有可感也按吳越王傳初天台教卷經五代之亂殘燬不全吳越王俶遣使至日本高麗而求之至是宋太祖建隆元年高麗光宗四年高麗遣沙門諦觀持論疏諸文至螺溪謁寂法師一宗教文復還中國螺溪以授寶雲寶雲以授法智法智大肆講説遂專中興教觀之名云云尚玄曰觀師著書行于支那轉傳日本藏版于台宗東睿山其書名曰天台四教儀高麗沙門諦觀録書末附傳如下諦觀法師傳統紀云法師諦觀高麗國人初吳越王因覽永嘉集同除四住之語以問韶國師韶曰此是教義可問天台義寂即召問之對曰此智者妙玄位妙中文唐末教籍流散海外今不復存於是吳越王遣使致書以五十種寶往高麗求之其國令諦觀來奉教乘而智論疏仁王疏華嚴骨目五百門論等禁不令傳且戒觀師於中國求師問難若不能答則奪教文以回觀師既至聞螺溪善講授即往參謁一見心服遂禮為師嘗以所製四教儀藏於篋人無知者師留螺溪十年一日坐亡後人見故篋放光開視惟此書而已由是盛傳諸方大為初學發蒙之助云諦觀法師死於支那遂使高麗台宗絶脈所以大覺國師義天入天台山謁智者塔述文發誓曰本國昔有諦觀者傳得教觀今承襲久絶豫發憤忘身尋師問道云云大覺求法始興台教高麗有始興宗者而疑亦即天台宗借山名宗又大覺為天台宗始祖故云始興歟高麗大覺國師諱煦字義天文宗第四子也以宣宗二年乙丑宋元豐八年遼大安元年逃入宋求法以三年丙寅還國天台賢首南山慈恩曹溪及西天梵學一時傳了而其弘通之者尤致力於天台教觀也按高麗閔漬所撰國清寺釋迦如來舍利靈異記云在我太祖創業之時行軍福田四大法師能兢等上書云聞大唐國有會三歸一妙法蓮華經及天台智者一心三觀禪法與聖君合三韓成一國風士相合若求是法流行則後嗣龍孫壽命延長王業不絶常為一家矣于時未暇求得貽謀後嗣至宣廟朝大覺國師入唐時則宋而非唐也此云入唐者麗人謂支那曰唐也始立天台六山因卜地於松山西南麓創寺亦曰國清支那天台山下有國清寺故今亦曰國清為六山根本天台宗所屬共有六寺而以國清為本山云云大覺國師自製新創國清寺啓講辭曰緬維海東佛法七百餘載雖諸宗競演衆教互陳而天台一教明夷于代昔者元曉菩薩稱美於前諦觀法師傳揚於後爭奈機緣未熟光闡無由教法流通似將有待伏遇我先妣仁睿國母纍生奉法積劫修因經紀精藍取國清之宏制發揚妙法移佛隴之高風大願未終神遊俄逝伏惟我主上承祧出震守道居尊遵聖善之願懷受能仁之付囑繼成先志實切孝思云云金富軾所撰大覺國師碑丁丑夏五月住持國清寺初講天台教是教舊已東漸而中廢師自問道於錢塘立盟於佛隴思有以振起之未曾一日忘於心仁睿太后聞而悅之經始此寺肅祖繼之以畢功師於此之時依文而顯理究理而盡心止觀圓明語默自在拔盡信書之守破惡取空之執一時學者瞻望聖涯捨舊而自來幾一千人盛矣哉世之議台宗者謂師百世不遷之宗云云南嵩山寺碑云煦一日與太子熙文宗弟三子後為肅宗謁太后偶語及之曰天台三觀最上真乘此土宗門未立甚可惜也臣竊有志焉太后深垂隨喜熙亦願為外護煦入宋詣天台山謁智者大師浮圖述發願文誓於塔前曰嘗聞大師以五時八教判釋東流一代聖言罄無不盡本國昔有諦觀者傳得教觀今承習久絶豫發憤忘身尋師問道今已錢塘慈辨講下承稟教觀他日還鄉盡命傳揚其求法初還募可與弘道者德麟翼宗景蘭連妙各率其徒齒於弟子太后尋舊大願欲起伽藍弘揚宗教定其號曰國清大願未集仙駕上天肅祖繼而經營功既畢詔師兼住法駕親臨落成一宗學者及諸宗碩德無慮數千百人聞風競會師升座振海潮音演未曾有一宗妙義無上根機多得中道無上法忍肅祖又尋大願欲創今所謂天壽寺以奉教觀經始未畢龍馭遺弓睿考肯堂而肅祖願大成中略太后肅宗睿考暨今上發自至誠隨喜外護繼志述事使妙法常住云云高麗台教當以大覺國師為其始祖者此也南嵩山仙鳳寺海東天台始祖大覺國師之碑銘并序朝散大夫翰林侍讀學士左諫議大夫尚書吏部知制誥賜紫金魚袋臣林存奉宣撰門人天壽寺義學月南寺住持妙悟三重大師臣僧德麟奉宣書并篆上御宇十年歲在大淵獻壯月七日詔臣存撰海東天台始祖大覺國師之碑銘即具表辭以不能而不獲命敢再拜稽首而言曰嘗聞毗盧遮那華藏世界其中所顯諸佛世界窮劫不可説惟此裟婆世界其佛毗盧遮那則凡在大千世界者在毗盧遮那法中為最親近况為大事因緣出顯於世西天竺國去此不遠則大雲之遍覆一雨之同霑宜無不被者自新羅大法東漸洎我太祖創萬世之業西天國三藏摩睺羅不召自來於是知大法之將興益憑願力耆定神功貽厥孫謨以弘揚佛道為首務故涉五代及宋嘗選名僧越海求法而機根所局僅得其一宗之旨來傳於其徒者有矣至於代佛出世猶假問道祖家風轉大法輪者如優曇鉢花乃一得而見之師文祖第四子母仁睿太后諱釋煦字義天二聖與師夙植善緣妙契一時師生而有異稍長行藝儼若成人年十一承文祖宿志投景德國師剃度受賢首教觀景德卒與其徒講學不止又廣命諸宗學者相與講論凡有所得亦非凡老師宿德之跂及文祖二十三年賜號祐世授職為僧統於是擬於萬乘欲堊道場發獅子吼演説百千法門度人天無量之衆則將以己之所得者質之於人以取信於時故嘗請入宋求法文祖心許未降指揮洎宣祖即位屢請不已宣祖難之議於羣臣咸以為大弟之重不宜越海肅祖在藩邸嘗一日同謁大后偶語及之曰天台三觀最上真乘此土宗門未立甚可惜也臣竊有志焉大后深垂隨喜肅祖亦願為外護宣祖三年師知時至更請求法雖羣議沮之二聖似欲從之於是浩然決乘桴之計四月八日絶海洋初抵密州界哲宗聞之迎置京師啓聖院御垂拱殿迎見禮遇備至師請遍參名德於是詔華嚴法師有誠來止別院使與遊處相從夫聖人不憚屈己以兼人之善故孔子師萇弘師襄老聃郯子之徒師自密州詣京聞有知一法持一行者無不遍致咨問及此固請以弟子之禮致謁是日往返問答賢首天台判教同異及兩宗幽妙之義曲盡其説後日詣相國寺參圓照禪師宗本圓照升堂説法繼而説偈云誰人萬里洪波上為法忘軀效善財想得閻浮應罕有優曇花向火中開又詣興國寺參西天三藏天吉祥問西天事甚詳閲月上章請往杭州華嚴座主淨源講下受業以償素志詔從之差主客員外郎楊傑伴行過金山謁佛印禪師了元稀世之遇如夫子見溫伯雪子目擊而道存到杭州參源公法師法師見法器非常恨相逢之晚以傳道為事且餘杭山水甲於天下諸宗之老遺世宴坐視天下為多見師割愛忘勢萬里求法則雖積道藏德膠其口而不傳者猶且倒廩傾囷羅列而進故諸宗法義多得於此越明年宣祖述母后意表請遣師還國遂詔到闕辭還師欲登道慈辨大師從諫著詩一首贈手爐如意師在本國聳聞慈辨高誼之日久矣既至杭特請慈辨講天台一宗經論每與主客及諸弟子聽受故今有是付囑既抵京皇帝又御垂拱殿迎見留數日遂復入辭到杭州源公法師日講華嚴大義講畢贈以爐拂以為付法之信次詣天台山謁智者大師浮圖述發願文誓於塔前曰嘗聞大師以五時八教判釋東流一代聖言罄無不盡本國古有諦觀者傳得教觀今承習久絶豫發憤忘身尋師問道今已錢塘慈辨講下承稟教觀他日還鄉盡命傳揚及到明州往育王廣利寺謁大覺禪師懷璉仁宗尤重此老以為福田今歸老於此屬師至升堂説法甚契本來既浮杯達國界上表乞擅行之罪回詔大加褒獎迎致撫慰禮貌之盛殆不勝言師之往求法非至遍參歷問記在靈府其所求來經書太半本朝所未嘗行者臨行主客謂諸禪講諸公曰自古聖賢越海求法者多矣豈如僧統一來上國所有天台賢首南山慈恩曹溪西天梵學一時傳了真弘法大菩薩之行者此真實義諦非溢美之言也昔孔子自衛返魯然後樂正雅頌各得其所國師自宋返國然後諸宗之教各得其正况天台一宗雖或濫觴於諦觀智宗輩而此土未立其宗學者久絶法華經云日月燈明佛出現於世説四諦十二緣六波羅蜜佛告舍利弗如來但以一佛乘故為衆生説法無有餘乘若二若三然不離此座直了二三會之圓妙一法其觀已備於瓔珞空假名及中道第一義諦補處大士金口親承如來滅後五百餘年異端並作龍樹菩薩作智度論發明中道故荊溪云况復三觀本宗瓔珞一家教門遠稟佛經以法華為宗骨以智論為指南自龍樹至荊溪世歷九祖其教大行於中國寥寥四百餘年此土未立宗教何哉蓋如來久默遺旨是將有待師以命世大任之才其於諸宗之學靡不刳心而其自許以為己任者在於賢首天台兩宗者當其時節因緣故其求法初還所上表云涉萬里之洪波參百城之善友備尋真教全賴聖威以至慈恩賢首之宗台嶺南山之旨濫傳爐拂謬事箕裘於是募可與弘道者德麟翼宗景蘭連妙各率其徒齒於弟子大后尋舊大願欲起伽藍弘揚宗教定其號曰國清大願未集仙駕上天肅祖繼而經營功既畢詔師兼住法駕親臨落成一宗學者及諸宗碩德無慮數千百人聞風競會師升座振海潮音演未曾有一宗妙義無上根機多得中道無生法忍肅祖又尋大願欲創今所謂天壽寺以奉教觀經始未畢龍馭遺弓睿考肯堂而肅祖之願大成以永庇于三韓且今者四方兵動蒼生墮於塗灰唯此海內晏然無虞雞鳴狗吠達乎四境男耕於野女織于室不失其富壽此豈人力哉繫國師當去佛既遠之後不惜身命遠求法寶傳之無窮而太后肅宗睿考洎今上發自至誠隨喜外護繼志述事使妙法常住而為諸佛之所護念為諸天之所擁衛之力也耶師卒贈册為國師定諡曰大覺先是肅祖欲以二字為師之號懇讓曰大覺佛之德何敢濫而據焉卒不受及是使有司議諡復出二字昔靈公死卜葬沙丘得石槨有銘曰靈公奪而埋之則夫靈公之為靈公也久矣以是觀之今師之為大覺亦已久矣而又師求法在杬州主客曰昨日惠松子粥時有淨慈本長老至遂與喫長老悚然曰豫數年前宿龍山寺夢有神人與一碗粥問之曰從東方不動佛國來今日之粥無異夢中所見夫師之所證知見皆不可思議境界則其所顯於事者亦復如是也大禪師順善禪師教雄流清皆師之法孫相謂曰我之宗門此土未行遇師首唱而力創如達磨大師為震旦禪那始祖今未有碑記其事後世有所歸咎哉一達其語契上尊德樂道欲光揚遺德之意詔碑於南崇山寺立之傳法孫相續而住勿絶傳揚其遺教銘曰欲説法空則不可測空則是色欲執假名亦豈可窮色則是空行如是觀名為中道循而教之圓覺普照三世諸佛由此塗出大覺西遊教觀東流是故詔立始祖之碑嵩山高高碑興山宜門人天壽寺大德高麗國五冠山大華嚴靈通寺贈諡大覺國師碑銘并序金紫光録大夫檢校太尉守司徒中書侍郎同中書門下平章事判尚書禮部事修國史上柱國臣金富軾奉宣撰朝散郎尚書工部侍郎賜紫金魚袋臣吳奉宣書并篆額上嗣位之四年乙巳秋七月庚午大覺國師門人僧統澄儼等具師之行事以聞曰吾先師即世久矣而碑銘未著懼其德業有所磨滅而不記惟上哀憐之使之裒撰以示久遠上曰於乎師於余為從祖而遺功餘烈炳然可觀其可蓋而不章乎遂授臣富軾以行狀曰汝其銘之臣讓不獲命退而敘曰以臣觀之師於聖人之道可謂性得而生知者也何以知其然哉自少知學不為紛華盛麗之所移及其出家當道衰學廢之時獨能背馳於時態追古聖賢而祖述之不幸短命而其所樹立如此子思有言自誠而明者其是類乎師諱釋煦俗姓王氏字義天後以名犯哲宗諱以字行我太祖大王四世孫而文王第四子也母仁睿太后李氏夜夢若有龍入懷而有身焉至乙未秋九月二十八日生於宮中時有香郁然久而後歇師少超悟讀書屬辭精敏若宿習兄弟皆有賢行而師傑然出鋒頴上一日謂諸子曰孰能為僧作福田利益乎師起曰臣有出世志惟上所使上曰善母后以前夢貴徵竊惜之而業已受君命叵如之何乙巳五月十四日徵景德國師於內殿剃髮上再拜之許隨師出居靈通寺冬十月就佛日寺戒壇受具時春秋十一歲而學問不息已能成人嘗夢人傳澄觀法師書自是慧解日進至年甫壯益自勤苦早夜矻矻務博覽強記而無常師道之所存則從而學之自賢首教觀及頓漸大小乘經律論章疏無不探索又餘力外學見聞淵博自仲尼老聃之書子史集録百家之説亦嘗玩其菁華而尋其根柢故議論縱橫馳騁袞袞無津涯雖老師宿德自以為不及聲名流聞時謂法門有宗匠矣丁未七月乙酉教書褒為祐世僧統師嘗有志如宋問道聞晉水淨源法師以慧行為學者師託舶賈致書以修禮源公知師非常人即復書相招由是欲往滋甚至宣王在位第二年是宋元豐七年春正月入內誠請上會羣臣議皆以為不可師於上前與羣臣言聖賢忘軀慕道如玄奘往西域義相入中國苟安安而不務求師非所以出家本意其言懇切繼之以泣上感激意許之而羣臣議確依違而罷至明年四月庚午夜留書上王及太后率弟子壽介微服至貞州寓商客船發上聞之驚差遣官僚與弟子樂真慧宣道鄰從之五月甲午至大宋板橋鎮知密州朝奉郎范鍔迎勞即附表具陳所以來朝之意皇帝命主客員外郎蘇注廷導之秋七月入京師啓聖寺以中書舍人范百祿為主數日召見埀拱殿待以客禮寵數渥縟明日表乞承師受業優詔從之遂見華嚴有誠法師先此皇帝聞僧統之來詔兩街預選高材碩學堪為師範者兩街推薦誠師至是僧統摳衣下風欲行弟子之禮誠師三辭而後受之乃進曰某甲海外之鄙人也虛襟求道之日久未有所得願師慈憫開我迷雲答古佛刳心而為法至有求一文一句而捨轉輪王位今上人能之可謂難矣願同志一乘同修萬行以遊花藏海者吾之願也於是僧統請問云云歎曰辭旨婉切善啓重關非法王之真子即義相之後身復承朝旨與主客員外郎楊傑出京師沿汴達淮泗侵尋以至餘杭詣大中祥符寺謁源公如見誠公之禮源公儼然而坐僧統進曰某甲仰慕道誼以日為歲不憚險艱百舍求謁願開金口玉音以卒覺悟源公曰昔慧思一見智顗即知靈山之舊今僧統之來焉知非夙緣耶不須膝行為禮請講以所聞於是誠投道應如芥就針有問有答盡其春容源公因知州蒲公宗孟之請入南山慧因院開講圍譯經僧統施錢營齋以延學徒甚衆源公於前所居三處各置賢首教藏并祖師像至此又欲辦焉而未能楊公知其意與知州及諸僚力營之僧統亦捨銀置教藏七千五百餘卷及還國又以金書大經三本歸之以祝聖壽慧因本禪院改為講院特免租稅朝廷為僧統故也會國王上表乞令歸國遂詔趣赴京請源公同舟講學不轍以元祐元年後二月十三日入京再見淹五日朝辭至秀州真如寺見楞嚴疏主塔亭傾圮慨然歎之以金屬寺僧修葺楊公曰璿公今日始遇知音吳興章衡記其事云僧統可謂篤厚好學君子矣夏四月復入慧因院源公傳道訖正坐焚香云願僧統歸廣作佛事傳一燈使百千燈相續而無窮遂授經書爐拂以為信非特僧統資源公而道益進源公名所以益高以僧統揚之也禮辭源公行至天台登定光佛隴觀智者塔親筆願文禮於塔前誓傳教于東土楊公志之沙門中立立石始自密至京以及吳越往來凡十有四月所至名山勝境諸有聖迹無不瞻禮所遇高僧五十餘人亦皆咨問法要若源公雅所望以為五十慧林善淵戒律則擇其元照梵學則天吉祥紹德此皆卓然可尚故資其所長者已及將歸禪講宗師各率徒學之悉備此真重法大菩薩者也然非是始學以己所得與諸師相試故來耳其所贈詩若祐世師三韓王子西求法鑿齒彌天兩勍敵其為時賢推尊類皆然也夏五月二十日隨本國朝賀回使放洋二十九日上及左右無不感動皇帝所贈金繒國王太后寄送財寶以巨萬計舉施諸道場及所聞法諸師師誕年肇基既成多歷年國家每議其主而難其人至是宣演教理盡妙窮神學者海會得未曾有上及羣臣怠不講故官勝私褚亡散幾盡遂重購求書于中國以及契丹日本又於辛未春南遊搜索所得書無慮四千卷皆塵昏蟫斷編簡壞舛俱收並拾包匭以歸請置教藏司於興王寺召名流刊正謬缺使上之鉛槧不幾稔間文籍大備學者欣賴甲戌春二月初入洪圓寺其教學如故居興王初順王寢疴召師言寡人嘗願作大伽藍額號洪圓今病篤殆不自濟若嗣君不相忘師其同心以終吾願師涕泣曰臣敢盡心力死生不易至於既成乃命住持焉夏五月退居海印寺溪山自適浩然有終焉之志獻王再徵不能致乙亥冬十月八日肅祖即位數遣近臣齎書迎之固辭又教曰不穀之望師可謂切矣非止高山景行寤寐增想而鶺鴒在原義重匪他雖不能往屢以誠請拂衣高蹈曾不我顧古之達者非夷非惠與時卷舒冀或一來副我意焉師翻然曰備禮厚辭義不可拒乃赴都復居興王寺教學如初丁丑夏五月住持國清寺初講天台教是教舊已東漸而中廢師自問道於錢塘立盟於佛隴思有以振起之未曾一日忘於心仁睿太后聞而悅之經始此寺肅祖繼之以畢厥功師於此之時依文而顯理究理而盡心止觀圓明語默自在拔盡信書之守破惡取空之執一時學者瞻望聖涯捨舊而自來幾一千人盛矣哉世之議台宗者謂師百世不遷之宗詎不信哉戊寅夏四月庚寅上命第五子侍之師手落其髮今都僧統是也辛巳春二月上以洪圓寺九祖堂成請師熏修以落之前世為祖譜不一今以馬鳴龍樹天親佛陀光統帝心雲華賢首清涼為九祖師所定也秋八月遘疾隱几而坐或觀心或持經不以疲憊自止門人請修佛事曰事佛久矣上遣中使問體名醫處方俵寶衣名於諸寺為之請福疾革親來慰問曰恐有不可諱願聞其所欲言者曰所願重興正道病奪其志伏望至誠外護以副如來遺教則死且不朽冬十月五日壬辰右脅而化享年四十七僧臘三十六是前或夢寶幢崩摧于地上聞之慟命有司賵賻有加册為國師諡曰大覺十六日癸卯茶毗收遺骨以十一月四日辛酉安厝於五冠山靈通寺之震方從本教也佛法以梁大通元年丁未肇入新羅後一百餘年義相元曉作是二師者以聖種性為大宗師末光所燭餘波所加皆得以出其黮暗而造其高明及去聖云遠法隨而弛世所謂名士者心蕩乎名智昏乎利學益浮淺獵典籍磔裂文句置之齒牙間呶呶以自好後來者承誤習謬往而不返師於是疾習俗之蔽蒙也道德之鬱滯也激昂奮勵以明道救蔽為己任黜其曲學示之妙蘊剖發延覆扶起窳情雷霆以震動之雨露以溥灌之間雖有心服而悅隨者而羣邪疾正謗毀沸騰以道自處恬不動心終而翕然寢變於正異時僻見妄執者革面遷慮務為根本之學亦嘗言曰禪家所謂不藉筌蹄以心傳心則上上根智者也脫或下士以口耳之學認得一法自以為足指三藏十二分教芻狗也糟粕也又鳥足觀者不亦誤乎乃勸學楞伽起信等經論又天性至孝善事父母不怠及其亡則窮思畢情以營功德至自燒臂後值諱日亦如之又鑒識洞然樂善不倦每與縉紳先生燕見應對其言論不出聖人之道又其文辭平淡而有味故士大夫承風而披靡稍厭雕琢而趣雅正焉至於俗吏虎臣不以文學自業及他道異術相背如仇讎者一見其貌聞其言則莫不竦然自服恨相值之晚後睿考覩畫像徘徊感慕親製讚詞二百字師適宋時泗上禮僧伽塔上有光明如燈火天竺寺禮觀音放素光赫赫然又在海印寺講經堂宇忽動有驚起者睿考在東宮被疾詣師為讀金剛般若經至乙夜光自口出燭於戶牖傳所謂神異感通者豈是歟又不忘興福或告永新前路是百郡之所出入舊有院館而壞亡即指使門人作新之名館曰指南院曰兼濟至睿考錫以土田始師之幼太后謂言吾願於興王內別開為若異日行道之所伻來卜地至後營搆號之薦福其他所成佛像經文亦不能盡書師既為一國尊親有大政事必款密咨決故所與上論列國家事甚多而有陰德於人民亦厚世莫得而盡知師欲立言以垂不腐而志莫之遂嘗以羣言汗漫撮其精要類別部分名曰圓宗文類又欲會古今文章有補於教以為釋苑詞林而未及參定至後乃成故去取失當門人集所著詩文殘篇斷藁存者無幾紬次為二十卷此皆卒爾落筆非將以貽後也故於生前有以其文寫而刻之者取其板焚之當時北遼天佑帝聞其名送大藏及諸宗疏鈔六千九百餘卷其文書藥物金帛至不可勝計燕京法師雲諝高昌國阿闍梨尸羅嚩底亦皆尊嚮以策書法服為問遼人來使者皆請見以土物藉手而拜吾使入遼則必問師之安否最後日本人求文書於我其目有大覺國師碑志其名現四方為異國所尊又如此師嘗召臣先兄釋玄湛與之遊甚歡相知之分非啻期牙臣由是得以一謁容色晬清若觀青天白日辱賜之坐語自晝窮夜試問易老莊一二大義臣偶能言之他日數稱之曰湛師弟亦才士也居無何師入滅噫士為知己者用假令死而可作離布髮而藉足亦所欣慕焉况以文字挂名於碑石之下豈不為榮幸也哉而學術固陋辭語陋澀訥不能發幽德之潛光以示來裔是所恨焉其銘曰義相西學傳佛圓音元曉獨見窮幽極深或出或處吻然同心香薰霧潤學者林林道與世喪日薄月渝有狂東走無知北遊迷不知復放不知求邪熾正滅不塞不流否終則傾異人挺生不留富貴而趣高明誰謂宋遠水道乃行索焉而獲為焉而成理無不盡事無不融遊觀自在浩不可窮攝諸剎海於一毛中不動一步周行虛空橫流湯湯獨為之防道其百派東至于洋始則不信狺狺衆狂終隨而革磨淬發光惟君之哲其尊其師問道之要謀事之疑陰毗密贊幾格清夷飄然遠舉則挽留之其道之大如天如地淵源之深固不敢議其出於時土苴而已如膚寸雲澤彌萬里厥徒叩閽稽首敷臆冀書之碑以揚宏則上曰其然乃命臣軾臣拜獻辭詒厥罔極高麗國大聖日興王寺故國師詔諡大覺大和尚墓志銘并序朝散大夫祕書少監知製誥賜紫金魚袋臣朴浩奉宣撰我大覺國師法諱釋煦字義天為避西宋國諱多用字爾文宗仁孝聖王之第四子妣仁睿太后夢感黃龍以娠焉乙未歲九月二十八日誕生而有非常之相年跨十一文考異其頴悟詔靈通寺故景德國師為親教而出家就佛日寺戒壇受具則夙習警矣一代宗乘無不自解洎景德歸寂師繼法門而當世之學佛者有戒律宗法相宗涅槃宗法性宗圓融宗禪寂宗師於六宗并究至極外及六經十略之書各發醇趣故文考褒為廣智開宗弘真祐世僧統順宗宣宗恩禮甚厚纍加法號大遼天祐皇帝再宇經籍茶香金帛以結信緣忽元豐乙丑歲師以微行越海西遊宋境而主客郎中楊傑被詔導引自密水至汴河直上宸殿且訪丞相既而歷問六宗中錚錚者則淨源懷璉芳其慧琳從諫等五十餘人也此輩還識我國師胸襟之妙蘊乎越明年言還本國者定有所以也宣宗以文考創成興王寺從來無主掌詔國師為住持而演講橫亘禪教顯密者有年矣爾后仁睿與宣宗升遐師以安居海印寺洎我聖上之登極也增友睦而興佛事急命中使召徵而再住興王寺昔者太后以盛域本無天台性宗啓願創立國清寺將欲興行其法始拓基址而今上告成丁丑歲五月詔國師兼持文考嘗欲許我聖上投佛而為繼體事重未果其志即以國師捨俗今則上以同年生第五愛子零染而為我國師哲資以酬疇昔之願由是助我國家之盛業者至矣今年十月三日再為國師是月五日國師怛化而上聞之震悼尋輟朝命有司備禮茶毗已遷靈骨於靈通寺東山築石室以肂焉偉矣哉國師處世之萬化我聖上追崇之衆美暨國師門下傳六宗之濟濟者先於國史亦載塔碑此不具書略述大槩其銘曰師之德足以繼諸佛師之化足以益衆生師之行足以扶正道師之智足以發大誠而銘之以此足以流其光明正德郎祕書郎賜緋臣高世儞奉宣書辛巳歲大宋建中靖國元年大遼乾統元年十一月四日刻石尚玄曰高麗台宗有二派焉曰天台疏字宗曰天台法事宗按大德五年沙門教雄翼宗之弟子也以國清寺講師發明經論傳法學徒數年于茲鬱而復發窒而復通至乙卯歲為國清寺住持授大禪師庚申歲京師旱詔至日月寺主講妙法蓮華經以祈雨講藥草喻品一地一雨之比大雨云云其云疏字宗疑即教雄發明經論傳法學徒者也又按麗史宣宗九年壬申六月壬申王太后設天台宗禮懺法于白州見佛寺約一萬日云云天台宗旨本有法華懺法圓妙國師修法華三昧求生淨土一依天台三昧儀長年修法華懺蓋一萬日即三十年也以此長期行禮懺法必有多數法師相繼主法矣其云法事宗者疑即修行法華禮懺法佛事者也或謂台宗有山內山外之稱疑此則是而究其宗旨與疏字法事無關者也疏字法事兩宗之名至于朝鮮之初尚不泯絶矣此下具述天台宗系派及本宗所屬道場卒國清寺住持了説演妙弘真慧鑑妙應大禪師墓志銘師諱教雄字應物鎬京人其先朴氏年九歲投長慶寺禪師釋贊落髮大安五年於佛日寺受戒性自少精敏學祖心印禪法比壯通念曉析叢林中無不推美贊禪師沒謁雙峯寺禪師翼宗為師會大覺國師肇立台宗募集達摩九山門高行釋流方且弘揚教觀開一佛乘最上法門宗禪師樂聞其教遂就學焉師亦隨之自以為其時於是學智者大師所説五時八教三諦三觀之旨固已不離其傳名聲大振乾統九年國家始闢台宗大選使國師主盟別白善否升黜之詳而師褒然為舉首答在上上品授大德五年授大師赴太選辨師又在上品詔為國清寺覆講師發明經論傳法學徒數年于茲天台宗旨鬱而復發窒而復通無何宗禪師入寂門弟以身徇利皆紛竟適他唯師守正不為勢遷時有一宗長以師傑然獨立不禮於其門為疾將害之而未果適乘時執事貶住洪州白嵓寺寺在山谷間虎豹之害往往有之師恬然自若住七年許行益修德益進非但發揮宗旨旁探華嚴瑜伽性相言諦以至儒墨老莊醫卜陰陽之説無不窮其源而涉其流一日往遊伽耶寺見瑜伽論百卷廢古藏中俯仰嘆息負而還歸讀之尤謹師之用心而后可知已天慶五年中圓明國師聞之謂師之德行可以範儀於當世以薦帝左右睿考於是授三重大師仍轉華藏寺是歲大旱於長齡殿説法會以祈雨命吾師與大禪師嗣宣為主伴演揚蓮花六比權實之源渙然氷釋未始有畛域睿考聽而悅之賜貼袈裟各一領藏經道場賜紫己亥歲轉住三乘寺明年授禪師又賜官誥一道及衲掩脊一領上即位賜紫繡貼袈裟一領仍轉月峯寺又轉外帝釋院至乙卯歲轉住國清寺仍授大禪師賜滿繡袈裟一領并官誥一道庚申歲京師旱詔至日月寺主講妙法蓮花經以祈兩至講藥草喻品一地一雨之比大雨越皇統二年七月十六日疾坐龍樹院西閣嗽日焚香與門弟子言溫溫如平常俄而入室向西端坐而化年六十七以八月初五日闍毗于城西青枀西岑十月十四日葬骨於城東若頭山鷲頭寺東南峯銘曰塊然獨立置其滑涽惟寂惟寞自本自根心傳迦葉一笑彌溫深造自得目擊則存後遊台嶺入不二門了悟玄鏡見曉衆昏釋林楨幹教海淵源鑱之于石誓不可諼門人禪師四員三重九員重大師大師大德道官入選學徒并一百三十有四人皇統二年壬戌十月十四日謹志高麗崔滋撰萬德山白蓮社圓妙國師碑如來為一大事因緣出現於世廣演羣經然猶大小權實莫能一貫逮乎機與時會如癰欲潰然後極唱妙蓮攝九界三乘入一佛乘久默之懷乃暢而無復餘蘊自雙林滅度玄綱解紐惟龍樹大士病之發明宗極破一切異論開三觀妙門惠文惠思祖述相繼而智者大師天縱妙悟再揚木鐸至於章安結集之二威傳授之尤溪述之毗陵記之憲章大備可舉而行本朝有玄光義通諦觀德善智宗義天之徒航海問道得天台三觀之旨流傳此土奉福我國家其來尚矣至如開普賢道場廣勸禪誦蓋闕如也惟師當宗教寢夷之日立大法幢駭未聞之俗生無根之信使祖道中興施及無限非承本願力應生季末為如來所使行如來事者安能如是哉師諱了世字安貧俗姓徐氏新繁人也父必中為戶長母徐氏同鄉人也以大定癸未十月誕生生而頴悟容儀魁偉自齠年有老成氣度十二出家依江陽天樂寺沙門均定為沙彌始學天台教觀時學士林宗庇知江陽一見而器之以為佛法有賴矣二十二中僧選專志宗乘遍參講肆不數年間洞曉指歸已為一家雋望承安三年戊午春上都設法會于高峯寺名緇雲集異論蜂起師登座一吼衆皆讋服莫敢枝梧以天性好山水雖迹名教非其志也是年秋與同志十餘輩遊歷名山初止靈洞山長淵寺開堂演法丕勤誘進請益成蹊時曹溪牧牛子在公山會佛岬聞風暗契以偈寄師勸令修禪云波亂月難顯室深燈更光勸君整心器勿傾甘露漿師見而心愜徑往從之然為法友助揚道化居數年牧牛子移社於江南師亦隨而南焉自智異山道過南原歸正寺其住持玄恪夢有人告曰明日三生持法華師來宜淨掃迎之主人如教掃門庭具殽饌以待師乘晚果至玄恪具説所夢又師屢夢智者衆講妙宗或在華長庵安禪不動竟服魔魅或山神指劃寺基或龍巖社道人希亮夢金蓮座待師等異夢靈怪頗多然此非所宜言故不悉云泰和八年戊辰春寓居日生山藥師蘭若見溪山清絶堂宇頽圮乃事修葺嘗宴坐一室陶神沙觀忽自念言若不發天台妙解永明壽二百病何由逃出因自警悟及講妙宗至是心作佛是心是佛不覺破顏自後樂説妙宗辨慧無礙抑籲衆修懺懇至精猛日禮五十三佛十二遍雖祈寒酷暑未嘗懈倦禪流號為徐懺悔耽津縣有信士崔彪崔弘李仁闡等來謁師曰今法侶漸盛山居甚隘吾郡南海山側有古萬德社基地位清勝可創伽藍盍往圖之師往見而肯之以大安三年辛未春矢厥謀命門人元瑩之湛法安等幹事募工營構凡立屋八十餘間至貞祐四年秋告成説法會以落成九年春帶方守卜章漢聞師道韻請以管內白蓮山為道場師率其徒往焉見其地阻且無水意欲徑還偶拔一石清泉忽迸乃異之留數年十一年癸未崔彪等奉書請云本有業儒者數人自京師來參師許以剃度授與蓮經勸令通利自是遠近嚮風有信行者源源而來寢為盛集以壬辰夏四月八日始結普賢道場修法華三昧求生淨土一依天台三昧儀長年修法華懺前後勸發誦是經者千餘指受四衆之請遊化緣僅三十妙手度弟子三十有八人凡創伽藍并蘭若五所王公大人牧伯縣宰尊卑四衆題名人社者三百餘人至於展轉相教聞一句一偈遠結妙因者不可勝數師自遁影山林五十年未嘗踏京華塵土未嘗親導鄉黨親戚事性少緣飾純厚正直目不邪視言不妄發夜不炳燭寢無絪辱所謂檀襯悉頒施貧乏方丈中惟三衣一鉢而已每禪觀誦授之餘誦法華一部念準提神呪一千遍彌陀佛號一萬聲以為日課常自謂一門教海浩汗學者迷津乃撮綱要出三大部節要鏤板流行後進多賴焉上聞而嘉之越丁酉夏賜號禪師厥後屢降綸旨歲時錫賜公府一所師於乙巳年夏四月以院門佛事付上首弟子天因退居別院肅然坐忘專求西邁是年六月晦日齋時呼監院告言老僧今日困暑口爽小有遠行信速為我造竹禪床來床成謂諸老宿曰此床舉措輕便試坐便有快處至七月三日就客室示微疾倚臥唱云諸法實相清淨湛然言之者失理示之者乖宗吾法華一大事隨分妙解惟此而已又唱元曉澄聖歌云法界自身難思議寂然無為無不為至以順彼佛身心故不必獲已生彼國每坐臥袞袞唱念不轍至六日澡浴更衣坐定彌日此暮呼天因使前囑佛乘大義已仍曰商行寄金吾去無患矣天因問云未審氣息小異昔如何答云吾欲回向久矣但盛暑非宜待立秋停留至今即口授令書寶志偈云雞鳴丑一顆珠明已矣至未了之人聽一言只這如今誰動口帖禪床前露柱吟咏自若至七日丑時命侍者擊磬集衆索水盥潄著法服升座跏趺面西而坐告衆云五十年山林朽物今日行矣各自努力為法勉旃天因問云臨終在定之心即是淨土更欲何之師云不動此念當處現前我不去而去感應道交實非心外言訖即斂念結印如入禪定就視之已化矣享齡八十三臘七十顏色鮮白異常手足柔軟頭頂久暖是日耽津守率胥吏十餘人馳詣圓寂所命畫手朴輔寫遺像又有近邑四衆五十餘人爭前瞻禮無不墮淚哀敬焉上聞之悼命有司册為國師諡曰圓妙塔曰中真特遣貴人賫教書即其社追獎申命臣滋撰辭于碑銘略林桂一撰萬德山白蓮社靜明國師語集序云國師諱天因系出朴氏燕山郡人也弱齡頴悟博聞強記以能文稱舉秀士入賢關以直赴第一生失意春官士林皆為歎惜即謝世與同舍生許迪前進士申克貞拂衣長往抵萬德山參圓妙國師既零染因造謁松廣諶和尚得曹溪要領而還舊山祇服師訓誦蓮經始開普賢道場涉二稔歸隱智異山又移錫毗瑟山屏迹修真纍歲乃還後國師傳天台教觀慧解果發機辨風生及國師既耄欲令繼席師即脫身避之上洛功德山會今相國崔公滋守洛創米麵社以邀之師將老焉國師再遣人強迫且讓云何背絶之甚卒不得已來主院門從衆望也丁未冬避胡寇入象王山法華社示微疾上遣中使以書遺藥餌明年孟秋初七付法門人圓皖仍囑曰吾沒後無厚葬立塔無謁有位求碑銘但就棄地茶毗耳是日退寓山南龍穴菴掩關絶事淡如也八月四日召門弟曰吾當行矣為書寄崔相國及鄭參政法弟天吉至五日浴靧更衣升座厲聲云大丈夫衝天氣焰於何處用侍者問四土淨境現前未審遊戲何土答惟一性境又告衆云病僧絶粒十餘日腳甚無力然得法身冥資腳力稍健將此腳力天堂亦得佛剎亦得五蘊廓清三界無迹説一偈曰半輪明月白雲秋風送泉聲何處是十方無量光佛剎盡未來際作佛事言訖而逝年四十四臘二十四弟子正觀夢遊何方似有人大呼云因和尚已得上品下生矣其他瑞異多在行狀李齊賢撰開城妙蓮寺重興碑略曰我忠烈王與齊國大長公主尊信佛氏謂入佛之道法華經最邃暢經之義天台疏悉備卜勝地入精舍翻經以求其道講疏以研其義天以祀釐於天子邀福於宗祐者也堂搆于至元二十年之秋明年之夏而落成開山者師子菴老宿洪恕實惟其人洎圓慧國師干盟結社而恕又副之三傳而至無畏國師學者益臻自忠烈王既重席於圓慧攝齋於無畏而忠宣王尤重其禮凡所以光護院門禪教列剎莫敢望焉前乎無畏者曰禧曰因後乎無畏者曰芬曰璉曰泓曰焰及今堂頭曰吉皆以釋林之選相繼而維持香火鍾魚無替于是順菴旋公圓慧之嫡嗣無畏之猶子天子錫號三藏命駐燕都大延聖寺後至元丙子降香東歸言於忠肅重興妙蓮寺圓慧國統釋無畏圓慧法弟撰祭文云噫大道之豐夷乎在哲人之有無惟師之雄偉兮乃間世而降塵區妙齡頴悟兮博通三部擇法眼明兮善別精粗初主白蓮兮重興祖道卒為國統兮德與名俱及還源日兮從容解脫朴全之撰靈鳳山龍岩寺重創記無畏國統下山所龍巖寺乃在於晉陽屬縣班城東隅靈鳳山之中也昔開國祖師道詵因智異山主聖母天王密囑曰若創立三巖寺則三韓合為一國戰伐自然息矣於是創三巖寺即今仙巖雲巖與此寺是也故此寺之於國家為大裨補古今人之所共知也然以經始代遠又住持者無恆故屋宇頽圮像設剝落大藏朽壞皆將掃地矣惟我國統妙齡試選僧捷上上科即脫身名韁循山住菴有年矣上聞師所行以大德六年壬辰夏特遣中使秪候金光軾迎師于月出山白雲菴命主於願剎妙蓮社焉至十年丙午冬上法號為白月朗空寂照無礙大禪師明年丁未夏瀋王與父王欲共行摳衣之禮封為王師進法號曰佛日普照靜慧妙圓真鑑大禪師於是上欲以名藍為下山所時金藏寺無主而殘師意以為幸再三申請為下山所即改造金堂並以紫磨金薄修治主佛彌勒如來補處兩菩薩像有僉議贊成事大學士李㦃作記焉至大元年戊申秋瀋王即祚之日請龍床並坐又進禪教各宗山門道伴總攝提調之號仍委差共議事己酉冬上命移住國清寺以五臺水巖槽淵安樂瑪瑙等五寺屬于是寺為下院也仍立都監以修之師盡捨噠嚫創造金堂並成主佛釋迦補處兩菩薩像皆飾以滿金倩僉議政丞大學士驪興君閔漬記而榜之閔漬撰國清寺金堂主佛釋迦如來舍利靈異記云宣宗時大覺國師始立天台六山因卜地於松山西南麓創國清寺為六山根本造立釋迦三尊以為堂主常演妙法歷代賴其福利及國家中否寺亦隨廢中興以來方始重營而未復舊基故議未及於像設今國統愴其佛座久虛誓欲竭力造成亦有大禪師而安捨納白銀十斤而未獲幹辦之人越皇慶二年癸丑始聞上護軍盧祐篤敬三寶又能幹事遂請以付茲寺亦納白銀十餘斤盧公樂從如石投水果能不日而成巍巍金像如從地而湧出焉以下院五寺非其志也皆還其本也至二年庚戌上復命移住瑩原寺然以其寺為前代國統下山所故師欲辭之而未即果遂亦改創金堂洎諸廊廡及皇慶二年癸丑夏六月今上嗣位至冬十一月承父王之命復册師為國統加法號曰大天台宗師雙弘定慧光顯圓宗無畏國統焉陽村權近撰水原萬義寺祝上華嚴法華會衆目記水原之東數十里有寺曰萬義裨補古剎也壞廢既久鞠為榛莾皇慶間天台珍丘寺住持大禪師混其來觀遺址重營以新三藏旋公繼而主之申啓于上判屬妙蓮門人相傳世紀已遠實為天台作法之社收租有田執役有軀嗜利之徒亦欲得焉比者天台曹溪互差住持厥後曹溪仍欲奪而有之訟于法司時議以為寺有田口所以供三寶非以為主僧之利兩宗交爭徒以有此也是不如無乃以臧獲若干口悉屬水原府而以本寺還屬天台今主上繼統中興更新庶政或遵祖宗之法崇重三寶俾贊王化時有天台龍巖寺住持大禪師重大匡奉福君神照神照初居原州覺林寺嘗被玄陵寵昵之恩及棄羣臣思慕追福久而益力洪武戊辰師旅方興國家安危變在呼吸時照公在完山李侍中朝鮮太祖麾下能與將相共定大策舉義回軍以安宗社以開今日中興之業上心是嘉越庚午秋八月特賜功牌將萬義寺及其奴婢使永傳于法孫又給寺田七十結以瞻供佛飯僧之用照公於是益感上賜思所祝釐以報萬一乃貨囊鉢所貯白銀一錠辛未正月特設七日消災道場壬申二月又張法會衣服座具帶襪咸備嘉羞異膳供具豐潔啓聞于上受押佛疏邀請大天台宗師國一都大禪師玄見等韻釋三百三十指皆一時天台碩德也外護前洪濟寺住持大禪師一等一百九十指諸執事監院禪師覺恆等一百九十指初展華嚴三昧懺儀繼講妙法蓮華經環師疏解歷三七日而訖其所以壽君福國濟生利物之願可謂博矣吾家尊永嘉君親承上命奉香而來豫陪几杖參叩盛事一日照公囑記端末以示于後洪武二十五年蒼龍壬申仲春下浣朝鮮歷代實録云太祖甲戌即位之三年也以天台宗僧祖丘為國師飯僧百人于內殿行國師封崇禮仍賜鞍馬朝鮮尹淮撰萬德山白蓮社重創記全羅道康津縣南有山崛起清秀㟮屼際海岸而止曰萬德山之陽有佛氏之宮顯敞宏豁俯瞰滄溟曰白蓮世傳創始於新羅氏重新於高麗圓妙國師傳至十一代無畏國師恆為法華道場號東方名剎暨島匪陸梁負海奧區鞠為丘墟寺亦隨其盛衰惟我朝鮮聖神繼作海嶽清寧風塵不驚乃有天台領袖都大禪師乎公乎公謂行乎也遊陟白蓮寺見其荒圮駐錫長吁奮發興廢復古壽君福國之誓願囑其徒弟信諶等誘掖諸善檀越量度經營且遣信諶奉書于孝寧大君請為大功德主大君於是欣然相許不謀而同施錢財出氣力人競樂趨不遠而至長興府人前都官佐郎曹隨康津縣安逸戶長薑溫為最先焉經始於庚戌之秋訖功於丙辰之春佛殿僧寮幾復升平之舊作法祝釐逮將軼古而過之師俗姓崔氏文憲公之裔孫孤竹士族也蚤世出家戒行高絶頓悟妙法緇衲景仰太宗恭定大王嘗營雉嶽山覺林寺設大會以落之聞師名徵主斯席卞季良撰原州覺林寺重創慶讚法華法席疏云覺林精舍曾是玉趾所臨法華真詮實惟金口之説宜當寶地庸展勝筵又搆大慈菴於長領山下韓昭頃公之塋之側命為住持今上踐祚以判天台宗事召師師遺落世塵不久輒棄去遁于山野其雅尚類此性純孝事其母生養死葬務盡其心非他釋子比頭流山之金臺安國天冠山之修淨皆其所新而白蓮其最後者大君知某與師有舊因俾某略記始未故不敢辭若夫大君與乎師下至緣化檀越罄未來世同躋佛土受諸快樂將自此而始附始興宗尚玄曰高麗有始興宗疑即天台宗而借山名為宗也故附之於此按趙宗著撰升平府曹溪山松廣寺嗣院事迹碑有云曹溪山松廣寺為東方第一道場在勝國時至借山名設曹溪始興兩宗中分一國名藍而誇之然則曹溪宗之借山設宗既已明了而始興宗之借山為名亦有傍證天歷元年戊辰臘月既望天台末學浮庵無寄撰述釋迦如來行迹頌天台始祖龍樹大士云有聞無智慧亦不知實相譬如大暗中有目無所見有慧無多聞亦不知實相譬如大明中有燈無所照有聞有智慧是所説應受無聞無智慧是名人身牛今有浮庵長老無寄早投於白蓮社第四世真靜國師之嫡嗣釋教都僧統覺海圓明佛印靜照大禪師而安堂下落髮披剃法名雲默學通一家文義赴於選席中上上科得窟嵓住持之名高步名途一旦唾棄猶斃屣也乃遊歷金剛五臺等名山勝地竟到始興山卓一庵而棲遲以誦蓮經念彌陀畫佛書經為日用者垂二十年矣餘力搜尋佛典祖文撰述本師行迹頌並注乃成兩軸以啓童蒙利莫廣焉噫娑婆世界成住壞空劫數長短三界五趣壽福優劣苦樂差別如來方便隨類示現四土三身五時説法年月次第諸經部內半滿遍圓本迹權實乃至滅後遺法流行隆夷處近及後進學者修行入道方便之規如明鏡當臺無一毫差真可謂吾祖所云是所説應受者明矣善哉未曾有也其文辭之格吾欽衽無間然矣時天歷三年高麗忠肅王十六年庚午十二月八日萬德山白蓮社沙門豈跋隆慶五年朝鮮宣祖四年辛未三月日頭流山金華道人義天書義天亦天台宗僧也觀乎浮庵長老之履歷無非天台宗僧之行相且作跋者書跋者亦皆係天台宗僧聲應氣求瞭然可睹而但不知始興山在何處惜豈師落筆作文不書某郡始興山遂使千載之後有此猜疑搜尋可為為人作傳狀者鑑戒也高麗末葉始興宗有勢力與曹溪宗爭屬名藍見於文字上者如左水原萬義寺權近撰記所云寺有田口天台曹溪互差住持兩宗交爭之事亦可作此案之傍證也廣通普濟禪寺碑銘并序李穡撰見東文選上忠肅王也之四年歲在丁巳冬十月朔門下判事漆原府院君臣尹桓侍中清原府院君臣慶復興守侍中廣平府院君臣李仁任判三司事鐵原府院君臣崔瑩贊成事判版圖司事臣睦仁吉三司左使臣李希汝贊成事判禮儀司事臣楊伯淵商議臣梁伯益贊成事判典工司事臣李成桂朝鮮太祖等署狀申言恭惟主上殿下春秋鼎盛聖敬日躋奉宗廟御邦家天地生育之私霜露怵惕之感夙夜于懷嚴恭寅畏雖甚聖德蔑以加矣臣等冒昧奉職惟懼弗戡先王付託之重以報於殿下也至正辛巳歲先王年十二朝京師寵遇無對歲己丑尚宗親衛王之女親迎于北庭數千里之地歲辛卯受命釐東制封承懿公王歲乙巳二月十六日公主薨羣臣獻號曰仁德恭明慈睿宣安王太后四月壬辰葬于正陵訃既告制贈徽懿魯國大長公主哀之也故加等焉歲甲寅九月二十三日先王薨羣臣獻號曰敬孝大王十月庚申葬于陵廣通普濟禪寺蓋所以追二陵冥福之所而載事之石先王嘗求諸中原石至矣而工役方殷繇是未刻也今董役官陟山君臣朴元鏡密陽君臣朴成亮等言功訖矣乞文之石臣等竊謂臣穡為文臣修韓修書臣仲和權仲和篆宜為謹昧死請教曰汝穡嘗以文墨事我先考發揚盛德垂示罔極汝之職也其慎之哉臣穡隕越自度不足以稱塞明旨然敢不奉教謹按本寺舊𨽻始興宗屢改其額曰光巖曰雲巖載於山川裨補之記峯曰舞仙水曰酒池皆有所指云先王通釋典尚禪宗乃曰法本無二况寺院乎遂以曹溪天和寺隸始興宗曰無敢復顧光巖也以光巖寺隸曹溪宗曰無敢復望天和也爭端於是絶矣列之十剎於次為第一既而名其舊曰光巖題其額曰廣通普濟禪寺蓋欲利澤之及於物無所不通而無所不濟也由是觀之趙碑所謂在勝國時設曹溪始興兩宗中分一國名藍而誇之云者豈不相符乎從此亦可知始興宗忠宣王時已有之而天台宗僧浮庵長老必到始興山卓庵而棲遲者亦必有由蓋因山屬台宗故也高麗初多傳法眼派西域佛法始入支那象教漸興多執名相梁魏之時天竺沙門達磨渡來始傳禪旨喻以壁觀令絶諸緣達磨初到梁後至魏於嵩山少林寺終日面壁而坐如是九年時人謂之壁觀婆羅門二祖慧可問法磨曰外息諸緣內心無喘心如墻壁可以入道不依言語不立文字直指人心見性成佛達磨六傳而至慧能大士禪宗大興二派五宗氣勢凜凜掀天動地海東佛法亦復如是新羅末葉始傳禪宗達磨以後破頭四祖道信黃梅五祖弘忍及曹溪下南嶽馬祖臨濟溈仰洞山雲門法眼及丹霞石霜德山巖頭雪峰玄沙九峯諸派次第皆傳而益州無相黃梅下資州智詵後郢州慧清溈仰嫡傳洪州明安洞山派杭州靈照雪峰法嗣等得法之後仍留彼土一世宗仰非徒海東之光亦為天下之福其佩祖師心印還歸本國者多為國師既有法力又有勢力於是禪派壓倒他宗此為海東佛教宗旨遷變之一大關鍵於僧史上班班可考除智證國師為道信派外曹溪之後則無染惠徹洪陟真鑑覺體忠彥梵日等皆屬南嶽下馬祖派行寂朗空泊巖元宗真徹等皆屬石頭派而羅末麗初則傳法眼宗者最多亦猶麗末鮮初之傳臨濟宗也即如景德傳燈録高麗道蜂山慧炬國師始發機於淨慧法眼文益之室本國主思慕遣使來請遂回故地國主受心訣禮待彌厚原州賢溪山居頓寺圓空國師光宗時人入吳越國謁永明寺壽禪師壽問曰為法來也為事來也師云為法來曰法無有二而遍沙界何勞過海來到這裏師曰既遍沙界何妨過來壽公豁開青眼優待黃頭便解髻珠即傳心印峻豐二年光宗年號抵國清寺膜拜淨光大師天台宗師光亦開連榻靡間升堂思欲伯喈書附於重耳經傳於尹令尋以大定慧論天台教受授師見師碑文佛祖通載宋太祖末年開寶八年杭州慧日永明智覺禪師法諱延壽示寂師著宗鏡録一百卷高麗國王覽師言教遣使賫書敘弟子禮奉金縷袈裟紫晶數珠金澡灌等彼國僧三十六人親承印記歸國各化一方上述圓光國師疑即三十六人之一數也清虛堂集序明萬曆四十年壬子孟陽川毗耶居士許端甫撰道峯靈照國師入中原得法眼永明之傳宋建隆間返本國大闡玄風以救末法中略師之正法眼藏傳于道藏神範歷清涼道國龍門天隱平山崇信妙香懷瀣玄鑑覺照頭流信修凡六世而得普濟懶翁云云尚玄曰按懶翁行狀師祝髮于功德山妙寂菴了然禪師後入燕都法源寺參西天指空和尚得法又往淨慈寺見平山處林禪師出言契合平山付以衣法云云並無與頭流信修有關係之處雖然許端甫必有所據今姑存疑以俟後考又按傳燈録杭州龍華寺真覺大師靈照高麗人而終於本寺云云則許氏所云靈照非此人也又傳燈録高麗道峯山慧炬國師始發機於淨慧之室本國主思慕遣使來請遂回故地國主受心訣禮待彌厚云云且靈照慧炬或名或字字義相對所云道峯靈照國師疑即道峯慧炬國師人時地三俱合故普照後始設曹溪宗高麗中世佛日普照法諱知訥學無所承自創禪宗初因六祖壇經而意自得初居昌平清源寺偶一日於學寮開六祖壇經至曰真如自性起念六根雖見聞覺知不染萬像而真性常在乃驚喜得未曾有起繞佛殿頌而思之意自得也後得大慧語録而眼忽開後師隱智異山上無住菴嘗言豫自普門已來十餘年矣雖得意勤修無虛廢時情見未忘有物礙膺間至居智異得大慧普覺禪師語録云禪不在靜處亦不在閙處不在日用應緣處不在思量分別處然第一不得捨却靜處閙處日用應緣處思量分別處參忽然眼開方知是屋裏事於此契會自然不礙膺云云此所謂遠師壇經近友書狀者也移居松廣山吉祥寺結定慧社大揚禪風熙宗即位命號改為曹溪山修禪社山名曹溪必從訥師得法之源者也昔支那曹山本寂禪師慕曹溪名其所居曰曹山即其例也曹溪設宗始見于此爾後真覺國師為曹溪山第二世修禪社主見帥碑銘圓鑑國師為第六世修禪社主覺儼專者稱王師大曹溪宗師為普照後十三世太古普愚為大曹溪嗣祖懶翁慧勤稱大曹溪宗師幻菴混修亦稱大曹溪宗師古樗粲英稱曹溪僧龜谷覺雲為判曹溪宗事曹溪都大禪師無學自超稱大曹溪師蓋高麗中世以後禪派無論出於何宗稱曹溪宗猶曰禪宗此乃佛日普照國師威德法化之所使也松廣寺修禪社曹溪宗源流如下升平府曹溪山松廣寺佛日普照國師碑銘并知公州事副使兼勸農使管句學士將仕郎兼禮部尚書賜紫金魚袋臣金君綏奉宣撰文林郎神號衛長臣柳伸奉宣書禪那之學源出於迦葉波達磨得之來化震旦傳之者以不傳而傳修之者以無修而修葉葉相承燈燈并耀一何奇也暨乎去聖彌遠法隨而弛學者守陳言迷密旨棄本而逐末於是乎觀察悟入之路茅塞文字戲論之端鋒起而正法眼藏幾墜乎地於此有人焉獨能背浮偽之俗慕正真之宗始於尋詮而詣理終於修定以發慧既得乎己兼施諸人使禪風寢而復振祖月晦而更明若然者可不謂迦葉之嫡孫達磨之宗子善繼善述者乎繄我國師是已師諱知訥京西洞州今瑞興郡人也嘗自號為牧牛子俗姓鄭氏考光遇國學學正妣趙氏開興郡夫人生而多病醫理不效考乃禱佛誓以出家疾尋逾年甫八歲投曹溪雲孫宗暉禪師祝髮受具戒學無常師唯道之從志操超邁軒軒如也二十五以大定二十二年壬寅舉僧選中之未幾南遊抵昌平清源寺住錫焉偶一日於學寮開六祖壇經至曰真如自性起念六根雖見聞覺知不染萬像而真性常自在乃驚喜得未曾有起繞佛殿頌而思之意自得也自是心厭名利每欲棲遁林壑艱恬以求其道造次必於是越大定二十五年乙巳遊下柯山寓普門寺因讀大藏得李長者華嚴論重發信心搜抉而索隱嚌嚅而味情前解轉明乃潛心圓頓觀門亦欲導末學之迷為之去釘拔楔適有舊識禪老得才者住公山居祖寺邀請懇至遂往居焉廣迎諸宗拋名高士輩刻意勸請習定均慧夙夜無數者纍稔矣至承安二年戊午春與禪侶數子一鉢尋智異山隱居上無住庵境致幽寂甲天下真安禪之住所也於是屏黜外緣專精內觀磨淬發鋭沿尋窮源時有得法瑞相數事語繁不載師嘗言豫自普門已來十餘年矣雖得意勤修無虛廢時情見未忘有物礙膺如讐同所至居智異得大慧普覺禪師語録云禪不在靜處亦不在閙處不在日用應緣處不在思量分別處然第一不得捨却靜處閙處日用應緣處思量分別處參忽然眼開方知是屋裏事豫於此契會自然不礙膺讐不同所當下安樂耳由是慧解增高衆所宗仰五年庚申移居松廣山吉祥寺領徒作法十有一年或談道或修禪安居頭陀一依佛律四方緇白聞風輻湊蔚為盛集至有捨名爵捐妻子毀服壞形命侶而偕來者王公士庶投名入社亦數百人師以道自任不以人之譽非動其心性且慈忍善接後流雖或悖謬忤意猶能憫念攝護情不理止若慈母之於嬌子然其勸人誦持常以金剛經立法演義則意必六祖壇經申以華嚴李論大慧語録相羽翼開門有三種曰惺寂等持門曰圓頓信解門曰經截門依而修行信入者多焉禪學之盛近古莫比師又善攝威儀牛行虎視燕居謹飭無惰容止至於執勞任力恆在衆先億寶山之白雲精舍積翠庵瑞石山之圭峯蘭若祖月庵皆師之所作而往來修禪者也上自潛邸素重其名及即位命號改為曹溪山修禪社御親書題榜既又就錫滿繡袈裟一領以褒異之篤敬光護之誠他無等夷初師之來南遊也與同學諸子約曰吾欲遁名結香社以定慧為事於子等何如曰末法恐非其時師乃慨然長歎曰時却可遷心性不變教法興衰乃三乘權學之見耳智者應如是乎衆皆服曰然他日結同社必號定慧及在居祖寺果立定慧社仍述勸修定慧結社文償初志也移社松廣亦循其名後以鄰寺有同稱者因受朝旨易焉所謂修禪社也名雖異而義則同也師之志在定慧如此大安二年春二月因薦母設法筵數旬時謂社衆曰吾住世語法不久宜各努力俄三月二十日示疾凡八日而終預知也前一夕就浴室沐浴侍者請偈因設問師從容答話夜艾乃入方丈問答如初將曉問今是何日曰三月二十七日也師具法服盥漱云這個眼不是祖眼這個鼻不是祖鼻這個口不是娘生口這個舌不是娘生舌令擊法鼓集衆策六環錫杖步至善法堂祝香升座如常儀乃振錫舉前夕方丈中問答語句因緣云禪法靈驗不可思議今日來到這裏欲為大衆説破去也爾等不昧一著子問來老漢亦不昧一著子答去顧視左右以手摩之曰山僧命根盡在諸人手裏一任諸人橫拖倒曳有筋骨底出來便伸足踞于床隨問而答言諦義詳言辨無礙具如臨終記最後有僧問昔日毗耶淨名示疾今日曹溪牧牛作病未審是同是別師云爾學同別來乃拈拄杖數下云千種萬般總在這裏因執杖踞床不動泊然而逝師生於高麗毅宗十二年戌寅即宋高宗紹興二十八年金海陵王正隆二年門徒設香燈供養七日顏色如生鬚髮漸長茶毗拾遺骨骨皆五色得舍利大者三十粒其小者無數浮屠于社之北麓上聞之慟諡曰佛日普照國師塔曰甘露閲世五十三齡受臘三十有六年生平所著如結社文上堂録法語歌頌各一卷發指宗旨咸有可觀或曰死可大故也師能委命乘化優遊自肆是其中必有大過人者也然語之至道則未也何以言之蓋老子貴知如我希莊周欲行不崖異古之為道者與人同耳其肯自為詭異奇偉之迹以取人知耶至如世尊號法中王神通作用遊戲自在及其雙林宴寂則曰吾今背痛將入涅槃遂右膝纍足而化又唐隱峯禪師倒立而化妹有為尼咄曰老兄平生不循法律死便熒惑於人今師之開堂示衆已多矣死之日而乃復更鳴鼓集衆升座説法踞床告滅其於道不為疣贅乎答不然夫道之用無方而人之行不同故曰天下一致而百慮殊途而同歸若所云者知其一未知其二也且歷代禪門諸祖臨終囑法必顯神異僧史載之詳矣至於後之諸師升堂説法而就化若興善寺之惟寬上堂説偈安坐而化若首山省念遺偈剋日上堂説法安坐長往若瑞峯之志端剃髮澡身升堂辭衆安坐而化若大寧之隱微上堂説偈而化皆可譏耶嗟乎像季之人多疑而少信非有先覺之士以善巧方便開示勸導生欽慕心雖欲發趣聖道斯亦難矣觀師之心亦接機利物之一端也師歿之明年嗣法沙門惠諶等具師之行狀以聞願賜所以示後世者上曰俞乃命小臣文其碑臣業儒而未至者也而况於佛心祖印方外之談乎但迫明命無由以辭茲扣竭於謏聞敢形容於盛美其銘曰指以摽月兮月不在指言以説法兮法不在言三乘諸部兮隨機差別徑截直入兮唯有一門牟尼示花兮迦葉破顏達摩面壁兮慧可斷臂心傳心兮不二法與法兮齊致真風兮未殄何代兮乏人師之身兮雞出籠師之心兮鏡無塵柯山兮啓途松社兮蛻駕定水淡兮湛無波慧炬光兮光不夜庭柏兮答祖意池蓮兮演真宗四衆繞兮雜沓一音暢兮春容觀死生兮如幻豈真妄兮殊科噫師之振錫兮邁像都融風吹柳絮兮雨打梨花大金大安三年辛未十二月日殿前寶昌刊大金崇慶二年癸酉四月日內侍昌樂宮録事臣金振奉宣立石高麗國普照禪師勸修定慧結社文恭聞人因地而倒者因地而起離地求起無有是處也迷一心而起無邊煩惱者衆生也悟一心而起無邊妙用者諸佛也迷悟雖殊而要由一心則離心求佛者亦無有是處也知訥自妙年投身祖域遍參禪肆詳其佛祖垂慈為物之門要令我輩休息諸緣虛心冥契不外馳求如經所謂若人欲識佛境界當淨其意如虛空等之謂也凡見聞誦習者當起難遇之心自用智慧觀照如所説而修則可謂自修佛心自成佛道而親報佛恩矣然返觀我輩朝暮所行之迹則憑依佛法裝飾我人區區於利養之途汩沒於風塵之際道德未修衣食斯費雖復出家何德之有噫夫欲出離三界而未有絶塵之行徒為男子之身而無丈夫之志上乖弘道下闕利生中負四恩誠以為耻知訥以是長歎其來久矣歲在壬寅正月赴上都普濟寺談禪法會一日與同學十餘人約曰罷會後當捨名利隱遁山林結為同社常以習定均慧為務禮佛轉經以至於執勞運力各隨所任而經營之隨緣養性放曠平生遠追達士真人之高行則豈不快哉諸公聞語曰時當末法正道沉隱何能以定慧為務不如勤念彌陀修淨土之業也余曰時雖遷變心性不移見法道之興衰者是乃三乘權學之見有智之人不應如是君我逢此上乘法門見聞薰習豈非宿緣而不自慶返生絶分甘為權學人則可謂辜負先祖作最後斷佛種人也念佛轉經萬行施為是沙門住持常法豈有妨礙然不窮根本執相外求恐被智人之所矣此下問答其要不出於修心訣及看話決疑録故中略之今時行者多云但得念佛往生然後何有哉不知九品升降皆由自心信解大小明昧而發現也經中以解第一義諦觀進行者為上品豈以聰明靈利之心甘為鈍根不解第一義但稱名號哉萬善同歸集云九品往生上下俱達或遊化國見佛應身或生報土覩佛真體或一夕而便登上地或經劫而方證小乘或利根鈍根或定意散意是知古今達者雖求淨土以深信真如專於定慧故知彼色相莊嚴等事無來無去離於分齊唯依心現不離真如不同凡夫二乘不知轉識現智故見從外來取色分齊故也如是則雖曰同生淨土愚智行相天地懸隔何如現今學大乘唯心法門專於定慧免墮凡小心外取色分齊之見也若是祖宗門下以心傳心密意指授之處不在此限琪和尚云能悟祖道發揮般若者末季未之有也故此勸修文中皆依大乘經論之義為明證略辨現傳禪門信解發明之由致並出生入死淨穢往來之得失欲令入社修心之人知其本末息諸口諍辨其權實不枉用功於大乘法門正修行路同結正因同修定慧同修行願同生佛地同證菩提如是一切悉皆同學窮未來際自在遊戲十方世界互為主伴共相助成轉正法輪廣度羣品以報諸佛莫大之恩仰惟佛眼證此微誠普為法界羣迷發此同修定慧之願嗚呼衆生之所以往來者六途也鬼神沉幽愁之苦鳥獸懷獝狘獝休必切輕舉貌狘許月切走貌之悲修羅方嗔諸天正樂可以整慮趣菩提者唯人道能為耳人而不為吾末如之何也已矣知訥曩閲大乘歷觀了義經論所説無有一法不歸三學之門無有一佛不籍三學而成道也楞嚴經云過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法是故我輩今結佳期預伸密誓當修梵行則仰慕真風不生自屈以戒定慧資薰身心損之又損水邊林下長養聖胎看月色而逍遙聽川溪而自在縱橫放曠逐處消時猶縱浪之虛舟若凌空之逸翮現形容於寰宇潛幽靈於法界應機有感適然無準矣豫之所慕意在斯焉若修道人捨名入山不修此行詐現威儀誑惑信心檀越則不如求名利富貴貪著酒色身心荒迷虛過一生也諸公聞語咸以為然曰他日能成此約隱居林下結為同社則宜以定慧名之因成盟文而結意焉其後偶因選佛場得失之事流離四方未遂佳期者至今幾盈十載矣去戊申年早春契內材公禪伯得住公山居祖寺不忘前願將結定慧社馳書請豫於下柯山普門蘭若再三懇至豫雖久居林壑自守愚魯而無所用心也然追憶前約亦感其懇誠取是年春陽之節與同行船禪者移棲是寺招集昔時同願者或亡或病或求名利而未會且與殘僧三四輩始啓法席用酬曩願伏望禪教儒道厭世高人脫略塵寰高遊物外而專精內行之道符於此意則雖無往日結契之因許題名字於社文之後雖未一會而蘊習常以攝念觀照為務而同修正因則如經所謂狂心歇處即是菩提性淨妙明匪從人得文殊偈云一念淨心是道場勝造河沙七寶塔寶塔畢竟碎為塵一念淨心成正覺故知少時攝念無漏之因雖三災彌綸而行業湛然者也非特修心之士成其益也以此功德上祝聖壽萬歲令壽千秋天下泰平法輪常轉三世師尊父母十方施主普及法界生亡同承法雨之所霑永脫三途之苦惱超入大光明藏遊戲三昧性海窮未來除開發蒙昧燈燈相續明明不盡則其為功德不亦與法性相終始乎樂善君子留神思察焉時明昌元年庚戌季春公山隱居牧牛子知訥謹志至承安五年庚申自公山移社於江南曹溪山以鄰有定慧寺名稱混同故受朝旨改定慧社為修禪社然勸修文既流布故仍其舊名雕板印施耳大乘禪宗曹溪山修禪社重創記今順天松廣寺特進三韓三重大匡金紫光祿大夫開府儀同三司守大師門下侍郎同中書門下平章事修文殿大學士上柱國監修國史判吏部事太子太師致仕臣崔詵奉教撰入內侍通議大夫尚書右承興威衛大將軍知禮部事臣崔瑀奉教監集晉右將軍王羲之書升平郡管內富有縣曹溪山者故之松廣山也修禪社者古之吉祥寺也新羅時有僧慧璘者始創而居之厥後星霜纍換風飄搖遷棟朽榱崩堂宇略盡雖村夫野叟之居不穀於此矣仁廟朝山僧釋照將欲創成大剎鳩材集工而不幸身沒其所成立更皆以為墟迫二十餘年時曹溪名僧知訥逃名投山始入公山清涼崛專修禪觀從而學者成市以其人衆而地狹不可以居乃使門弟守愚遍歷江南求結社安禪之地愚師偶入此山周覽形勢有廢寺焉僅一百間居僧不指三四十然是土也境勝而地肥泉甘而林茂真可謂修心養性集衆作福之所也於是與道侶天真廓照兩山人同心戮力自丁巳年經始伐木輦土經之營之凡立屋八十餘間佛宇僧寮齊堂厨庫無一不備九載功畢是大金泰和五年以其年十月初一日受朝旨約一百二十日設慶讚法會開堂設禪點破大慧禪師語録夜則安居靜慮申華封之祝以落成焉於戲師之作是道場也可謂希有矣自如來入滅二千年後當鬪諍牢固之時凡浮圖者流頓漸名相各執所長是非其所非彼我鬪諍求名利虛遺寸陰故全精觀照修心見性之法掃地盡矣師獨背馳於時態發憤忘食轉不退輪宴處山中二十餘年然世之非者始而驚終而翕然隨以定四方之利意尚行離世別有息心了義之徒如烏之集樹如鳥之歸鳳百川之注海由是觀心修道之風再弘於季末矣至如道侶夢船師端諶師湧巖仁敏師念佛岬正誠佛菴解空彌屹寺可休居祖寺得才本社覺純富有縣安逸爵修等皆以觀心定念之故至於終時蕭然坐化豈非吾師所化然哉非特如是長城縣白巖寺僧曰性富者平生以梓匠為業聞法發心以念佛為事至於此寺皆其手所成錦城安逸戶長陳直升與妻皆亦發至心禁酒斷葷受持般若心經因施白金一十斤以為營造之費以至於南方州府富者施財貧者盡力以成梵宇金碧煥爛如地湧出上聞而嘉之乃易山名曰曹溪社名修禪仍以御筆題額以褒之師俗姓鄭氏衣冠之子也齠齓之時頴脫不羣素有山林之趣遂辭闈投大禪師宗暉剃度至壬寅歲選佛場優中科品未幾捨名韁出京輦逍遙乎塵垢之外味乎人之所不味成就如是功德是皆宜書况上有命不敢牢辭故敘寺成之始末如此若夫曹溪山洞壑之勝槩老不能往見故闕而不書時大金泰和七年十月日記升平府曹溪山松廣寺嗣院事迹碑通訓大夫行弘文館修撰知製教兼經筵檢討官春秋館記事官趙宗著撰興祿大夫朗善君兼五衛將都總府都總管俁書正議大夫朗元君兼五衛將都總府副總管儼篆自湖以南僧蘭之以巨麗稱者指不勝屈而曹溪山松廣寺為東方第一道場如蔥嶺之雙林震旦之廬阜則未有不居此寺而為名僧者十六國師故不説在勝國時至借山名設曹溪始興兩宗中分一國名藍而誇之本社凡號為王者師者必住是寺故自懶翁無學亦留傳授之迹則其時之重此社可見而他山寺莫敢望焉牧老禪覺銘及諸僧志可概也新羅僧惠璘創小庵而居之高麗仁宗時山僧釋照將欲大其剎鳩亢工材而未果就至明宗時佛日普照國師在公山會佛岬使其徒守愚遍求安禪之所愚得此寺於空山荒茀之中經始於承安二年至五年庚申國師移社于此仍廣其居百有餘椽九載訖功即金泰和五年王聞之改其山名寺號又賜法服以寵異之山舊名松廣易以曹溪寺舊號吉祥改以修禪者朝旨也後改稱松廣寺者仍山之舊號也或稱定慧者普照慈覺發願之始名也普照歿後傳真覺清真真明晦堂慈精圓鑑湛堂妙明慈圓慈覺覺儼淨慧弘真高峯弘真以上皆為國師而凡十六世承法嗣院不絶實是叢林罕觀之盛迹也楓嶽妙香以奇勝聞天下而至於禪法嗣承之重則無敢與此寺抗豈非普照肇基而然也古語曰地因人顯詎不信歟普照自號牧牛子其學無所承授嘗登方丈智異山也無住庵內觀有得金君綏碑亦言無常師唯道之從蓋澄什杯志之類也寺之東有十六祖影堂説者以擬東林十八賢影堂而又以普照為空門中散聖云近世有浮休善修繼居是寺傳碧巖覺性翠微守初三師皆闡揚道法增飾院宇比諸國師時為尤盛而宗脈則有殊焉自臨濟十八傳而為石室清珙麗朝太古普愚得珙之傳又六傳而為浮休則此為如來正眼而非得於牧牛之傳者也亦如懶翁無學之宗塔於此舍焉翠微正嫡柏菴性聰方斯治院有悟性文解藍茜近祖而遠接牧老之風豈非水雖異源歸海則同耶是社從此益顯而不替於永劫者亦可以卜矣聰師恐本寺實迹久而忘泯欲刊之石請文於余余雅不樂為桑門文字而顧念吾儒索莫比甚無擔荷者而師能於其道誠且勤乃爾道無論彼此固當如是其志可尚也已遂樂為之書崇禎紀元戊辰後五十一年戊午十月日曹溪山第二世故斷俗寺住持修禪社主贈諡真覺國師碑銘并序奉宣述夫自有心法已來凡衲子之鼻孔遼天者源其靈堂孰不欲與霜月爭潔耶然至於宗門之名品升降則有不能大忘情者於是有以此為嫌遂深遁巖谷潛修心要切不欲嬰其名纍而名自逼逐者孰是歟如我國師當之矣况自妙齡業已從事於文章未幾旋擢賢關則學非不精也命非不遇也若小忍須臾便登桂籍長驅前途不失為名士大夫而反割棄垂就之名猶以不早落染為恨其超然出世之心亦於此可驗求之於古蓋法融天然之比也國師諱慧諶字永乙自號無衣子俗姓崔氏名實羅州和順縣人也考諱琬鄉貢進士母裴氏夢天門豁開又夢被震者三因而有娠凡十有二月乃生焉其胞重纏又如荷袈裟狀及坼兩目俱瞑經七日乃開每飲乳後輒轉身背母而臥父母怪之父早卒從母乞出家母不許勉令業儒然常念經持呪久乃得力喜毀斥淫巫妖祠或往往救人病有效承安六年辛酉舉司馬試中之是年入太學聞母病遂還鄉侍疾於族兄裴光漢家念入觀佛三昧母夢諸佛菩薩遍現四方覺而病愈裴氏夫婦亦同此夢明年母即別世時普照國師在曹溪山新開修禪社道化方盛師徑造參禮請營齋薦母因乞剃度國師許之是夜河舅夢師之亡母升天始師之謁國師也國師見之以為僧更見則非也先是國師夢雪竇顯禪師入院心異之明日師來參由是益奇焉師嘗居鰲山坐一盤石晝夜常習定每至五更唱偈甚厲聞十許里略不失時聞者以此候旦又居智異山金堂庵宴坐堂上雪積沒頂猶兀坐如枯株不動衆疑其死撼之不其刻苦如此非夫與道凝精外生死遺形骸者孰至是哉乙丑秋國師在億寶山師與禪者數人方往謁憩山下距庵千餘步遙聞國師在庵中喚侍者聲師作偈其略云呼兒響落松蘿霧煮茗香傳石徑風及參禮舉似此話國師頷之以手中扇授之師呈偈曰昔在師翁手裏今來弟子掌中若遇熱忙狂走不妨打起清風國師益器之又一日隨國師行國師指一破鞋云鞋在遮裏人在什麼處答曰何不其時相見國師大悅又舉趙州狗子無佛性話因續舉大慧杲老十種病問之衆無對師對曰三種病人方解斯旨國師曰三種病人向什麼處出氣師以手打窗一下國師呵呵大笑及歸方丈更密召與語乃喜曰吾既得汝死無恨矣汝當以佛法自任不替本願也泰和戊辰欲命師嗣席即退安圭峯師固辭遂去智異山絶迹滅影者數載大安庚午國師入寂門徒聞于上承勑繼住師不獲已入院開堂於是四方學者及道俗高人逸老雲奔影騖無不臻赴社頗隘康朝聞之命有司增搆遣中使督役遂闢而廣之又遣使就賜滿繡袈裟磨衲各一領并茶香寶瓶因求法要師撰心要以進今行于世自是公卿貴戚四嶽方伯聞風慕道或遙禮為師或親趨下風者不可勝紀凡禪講之負氣屈強自謂莫己若者及一見莫不愕然改容猶師事之不暇也今門下侍中晉陽崔公聆師風韻傾渴不已屢欲邀致京輦師竟不至焉然千里相契宛如對面復遣二子參侍凡師之常住資具莫不盡力營辦至於茶香藥餌珍羞名果及道具法服常以時餉遺連亘不絶今上即位制授禪師又加大禪師其不經選席直登緇秩自師始也參政崔公洪徹於未相時嘗掌司馬試師出其門下未幾公入相師住曹溪相國稱弟子願登名社裏以書致意其略曰佛光樂與於白學士親授大乘嵩嶽欣迎於賀祕書密契妙旨師答之略曰我昔居公門下公今入我社中互為賓主換作師資聞者傳以為勝事貞祐己卯詔住斷俗寺纍辭不允明年入院然以本社為常棲之所癸巳仲冬在本社示疾晉陽公聞之大驚遂聞于上遣御醫某診視春徙處月燈寺麻谷入室師曰老漢今日痛甚谷曰為什麼如此國師以偈答曰衆苦不到處別有一乾坤且問是何處大寂涅槃門師竪起拳頭云遮個拳頭也解脫禪汝等信否遂展掌云開則五指參差掘拳云合成一塊開合自在一多無礙雖然如是未是拳頭本分説話作麼生是本分説話即以拳頭打窗一下呵呵大笑甲午六月二十六日召門人囑事謂麻谷曰老漢今日痛忙答曰未審道什麼師云老漢今日痛忙谷茫然師微笑跏趺而化明日茶毗於月燈寺之北峰拾靈骨還本山上聞之震悼贈諡真覺國師乙未仲炎葬于廣原寺之北遂立浮圖上賜額曰圓照之塔享壽五十七臘三十有二自師之示疾生緣處山石崩落又羣雀滿洞飛鳴者十餘日嗚呼其異哉平生冥感神異則有龜受戒蟾聽法慈烏合籌特牛跪途等事皆世所傳門徒所記又非儒者所説故於此不詳云師性沖和碩實既自儒之釋凡內外經書無不淹貫故至於談揚佛乘撰著偈頌則恢恢乎遊刃有餘地矣不如是安能迹不踐京師而坐享一國所仰若是哉噫真可謂禪門正眼肉身菩薩者歟嗣法禪老夢如亦法王也請逸庵居士鄭君奮草具行録以立碑請於晉陽公公曰和尚住世利人多矣樂石不可不立遂聞于上命小臣為之銘其詞曰微笑已後傳心者誰於我三韓國師得之生荷袈裟其兆已奇果得正眼超視當時自見是性傳人曰辭不有傳法迷者何資上堂舉話亹亹其説舌是佛心心是佛舌默固自然談亦可悅身遁深巖名從何泄學者邇追雲蒸雨下左右扣之應接靡暇曾不放我片時間坐五教來參熏染般若列嶽躬趨痛求入社王公遙揖謂若親炙三十二臘膏液所及有許多人飽飫周洽法棟云摧萬眼同泉上甚悼哀玉色慘然贈終孔縟寵典靡愆仍命小臣豐碑是鐫此山寧騫此石不遷李奎報奉教撰臥龍山慈雲寺王師贈諡真明國師碑銘并序金丘撰國師諱混元俗姓李氏遂安縣人也考師德官至京市署丞妣金氏閣門秪侯閲甫之女也夢飲甘露因而有娠生而穎悟知敬佛乘年甫十三投舅氏品日雲孫禪師宗軒披剃受具聰慧絶人學通內外遂為崛山叢席之首中禪選上上科雅志山林誓不踏名途策杖遊方初謁雙峯辨青牛服勤數載因得其閫奧次詣曹溪無衣堂下大為器許又嘗師事清真國師所至相從稟受曲折盡得其骨髓故於古人公案洞曉其指皈遊刃玄關得樂説辨才柱國晉陽公嚮師道行奏加三重大師又奏請住定慧社無何以領衆不無憂纍抵書晉陽公固辭尋例加禪師師既不欲作住持人但隨處演道故世稱法主而不名焉乙巳歲晉陽公創禪源寺大張落成會請師主盟明年丙午師領精鍊衲子二百赴京師入禪源高王將批為大禪師晉陽公撰疏進門各請開堂遂升座嗣清真數日上幸臨先獻金襴袈裟跪呈請疏師説法稱旨上大悅師雖居輦下志在雲壑數請還山上不許至壬子八月清真臨滅以院門事屬師上於是命住曹溪為第四世仍命中使陪往曹溪以冬十二月入院再扇牧牛之風丙辰秋請禪源法主旦公自代得便雲水然朝家以福利為望尊禮不衰至戊午歲上欽師道德欲以不臣禮事之命立封崇都監仍命斷俗寺遣中使禮部郎中崔鐸迎之師不欲受教中使陳主上渴仰之誠師強起西上上使迎勞入慈雲寺時久旱其夕忽霈雨中外慶嘆既而請摳衣之禮己未五月十一日册為王師上欲親行師禮因不豫寢之俄而上仙元王即祚遹追寧考禮遇殊加以臥龍寺為下山所師懇乞退休至于再三上曰朕欲留師親蒙法蔭師意確切竟不可違冀無以遠邇渝意永福三韓延入大內親行師禮手自進饌從容接話至晚乃辭輒命中使護行以庚申十月下山入院上堂公入門殿閣凌空舉目溪山似畫人云倦鳥知還天遣老龍憨臥諸仁者龍既臥矣慈雲何在良久云行到水窮處坐看雲起時四方學者雲臻説法利生凡一十二年殿宇之頽廢者皆重新之人謂開山景空大師復來矣王舅大禪師鏡智小投陽山圓真國師祝髮敬重於師事以門人之禮因受朝旨移籍於崛山為品日孫住斷俗寺常來禮覲其為尊勝所敬重類如此至元八年辛未十二月一日在方丈示偈云今朝臘月一看看三十日到來正念無忘失至七日示微疾十日晨侍僧問訊師舉佛眼鳥從空裏飛入向心中住答話如常作上國王書并封印信付侍者至申時更衣著伽梨坐禪床叉手當胸端然示寂顏如傅粉屈伸如生十六日茶毗于寺之後洞門人奉遺書并印信乘傳申聞上震悼加封國師贈諡真明塔曰寶光下教晉州牧副使戶部侍郎薛昂襄後事壬申二月十七日浮圖于寺之西岡享年八十一受臘六十有八師慈心濟物謙巽下人行無緣飾言不覆藏談劇有味使人歡然不倦愛而敬之平生居處未嘗暖席所止惟以闡揚宗教為己任至於作為偈句圓轉尖新皆有所發明警悟後學師之行己之大略如是豫嘗受法乳之恩無以為報况上有命俾文於樂石敢以辭語蕪譾為辭茲因泚筆而銘之曰百億剎外有一梵宮不著精彩八面玲瓏祖祖常住匝地清風西乾中夏洎于海東品日倡演開寶藏鍵唯照鑑覺相繼大闡絳茜青藍我師丕顯甘露瑞徵鍾自聖善法器既誕悲智常滿千聖北面一時右袒謙巽接物席未常暖迹雖却行名固先款朝野并推為王者師萬乘屈尊摳衣丐慈弓墮鼎水日升咸池兩朝作範福利旁施妙用縱橫人天所宗法雨既足龍臥臥龍攀沐鱗潤學者雲從年至九九晦影藏蹤臨程浩歌其曲如何白雲空濶一鳥飛過火中浴了鵠塔嵯峨靈光萬古照破山河高麗國義興華山曹溪宗麟角寺迦智山下普覺國尊碑銘并序一然禪師既屬曹溪宗又按碑文有住禪月社開堂遙嗣牧牛和尚之語師之法脈不可不屬于普照之後也夫清鏡濁金元非二物渾波湛水同出一源其本同而末異者在乎磨與不磨動與不動耳諸佛衆生性亦如是但以迷悟為別孰云愚智有種以至愚望大覺勢絶霄壤及乎一回機便同本覺自迦葉微笑達磨西來燈燈相續直至于今者皆以此也傳其心得其髓回慧日於虞淵曜神光於桑域者惟我國尊有焉國尊諱見明字晦然後易名一然俗姓金氏慶州章山郡人也考諱彥弼不仕以師故贈左僕射妣李氏封樂浪郡夫人初母夢日輪入屋光射于腹者凡三夜因而有娠泰和丙寅六月辛酉誕焉生而俊邁儀表端嚴豐準方口牛行虎視少有出塵志年甫九歲往依海陽無量寺始就學而聰警絶倫有時危坐盡夕人異之興定己卯就陳田長老大雄剃度受具於是遊歷禪肆聲價藉甚時輩推為九山四選之首丁亥冬赴選佛場登上上科厥後寄錫于包山寶幢庵心存禪觀丙申秋有兵亂師欲避地因念文殊五呪以期感應忽於壁間文殊現身曰無住居明年夏復居是山妙門庵庵之北有蘭若曰無住師乃悟前記住是菴時常以生界不減佛界不增之語參究之一日豁然有悟謂人曰吾今日乃知三界如幻夢見大地無纖毫礙是年批授三重大師丙辰加禪師己酉鄭相國晏捨南海私第為社曰定林請師主之己未加大禪師中統辛酉承詔赴京住禪月社開堂逄逄疑遙字之誤嗣牧牛和尚至至元元年秋纍請南還寓居吾魚寺未幾仁弘社主萬恢讓師主席學儷雲臻戊辰夏有朝旨集禪教名德一百員設大藏落成會於雲海寺請師主盟晝讀金文夜談宗趣諸家所疑師皆剖釋如流精義入神故無不敬服師主仁弘十一年是寺創搆既遠殿宇皆頽圮又且湫隘師並重新恢廓之仍奏于朝改號仁興宸書題額以賜之又於包山東麓重葺涌泉寺為佛日社上即祚四年丁丑詔住雲門寺大闡玄風上日深傾注以詩寄云密傳何必更摳衣金地逢抬亦是奇欲乞璉公邀闕下師何長戀白雲枝辛巳夏因東征駕幸東都詔師赴行在及至路請升座倍生崇敬日取師佛日結社文題押入社明年秋遣近侍長作尹金頵賫詔迎至闕下請於大殿喜溢龍顏勑有司館于廣明寺入院日夜半有人立方丈外曰善來者三視之無有也冬十二月乘輿親望咨問法要明年春上謂羣臣曰我先王皆得釋門德大者為王師德又大者為國師在否德獨無可乎今雲門和尚道尊德盛人所共仰豈宜寡人獨蒙慈澤當與一國共之於是遣右承旨廉承益奉綸旨請行闔國尊師之禮師上表固讓上復遣使牢請至三仍命上將軍羅裕等册為國尊號圓徑沖照册訖四月辛卯迎入大內躬率百僚行摳衣禮改國師為國尊者為避大朝國師之號也師素不樂京輦又以母老乞還舊山辭意甚切上重違其志而允之命近侍佐郎黃守命護行下山寧親朝野嘆其希有明年母卒年九十六是年朝廷以麟角寺為下安之寺勑近侍金龍儉修葺之又納土田百餘頃以賁常住師入麟角再闢九山門都會叢林之盛近古未曾有也越己丑六月示疾至七月七日手寫上大內書又命侍者作書寄相國廉公告以長往因與諸禪老問答移晷是夜有長星大尺圍隕于方丈後翌日乙酉晨起興浴而坐謂衆曰今日吾當行矣不是重日耶云不是曰然則可矣令僧撾法鼓師至差法堂前踞禪床封印寶命掌選別監金成固重封畢謂曰適值天使來見老僧末後事有僧出問釋尊示滅於鶴林和尚皈真於麟嶺未審相去多少師拈拄杖卓一下云相去多少進云伊麼則今古應無墮分明在目前師又卓一下云分明在目前進云三角麒麟入海中空餘片月波心出師云他日皈來且與上人重弄一場又有僧問和尚百年後所須何物師云只遮個進云重與君王造個塔樣又且何妨師云什麼處去來進云也須問過師云知是般事便休又有僧問和尚在世如無世視身如無身何妨住世轉大法輪師云隨處作佛事問答罷師云諸禪德日日報之痛癢底不痛癢底糢糊未辨乃拈拄杖卓一下云這個是痛底又卓一下云這個是不痛底又卓一下云這個是痛底是不痛底試辨看便下座皈方丈又坐小禪床言笑自若俄頃手結金剛印泊然示滅有五色光起方丈後直如幢其端煜煜如炎火上有白雲如蓋指天而去時秋暑方熾顏貌鮮白支體瀅澤屈伸如生遠近觀者如堵丁亥闍維拾靈骨置于禪室中門人賫遺狀印寶乘傳以聞上震悼遣判觀候署事令倜展飾終之禮又命按廉使監護喪事仍降制諡曰普覺塔曰靜照十月辛酉塔于寺之東岡享年八十四臘七十一師為人言無戲譃性無緣飾以真情遇物處衆若獨居尊若卑於學不由師訓自然通曉既入道穩實而縱之以無礙辨至古人之機緣語句盤根錯節渴施陂險處扶剔疏鑿恢恢焉遊刃又於禪悅之餘再閲藏經窮究諸家章疏旁涉儒書兼貫百家而隨方利物妙用縱橫凡五十年間為法道稱首隨所住處皆爭景慕唯以未參堂下為耻雖魁傑自負者但受遺芳餘潤則莫不心醉而自失焉養母純孝慕睦州陳尊宿之風自號睦庵年及耄期聰明不少衰教人不倦非至德真慈孰能如是乎初龍劒之來也馬山驛吏夢人曰明日當有天使修曇無竭菩薩住行過此明日果至以師之行己利人觀之是夢豈虛也哉其餘異迹奇夢頗多恐涉語怪故略之師之所著有語録二卷祖圖二卷大藏須知録三卷諸乘法數七卷祖廷事苑三十卷禪門拈頌事苑三十卷等百餘卷行于世三國遺事亦係師著而此不及門人雲門寺住持大禪師法珍狀師之行聞于上上令撰辭臣學識荒淺不足以光揚至德故過延數年請既不已命亦難忤謹為之序而銘之曰勝幡西振舌覆大千唯是法印密付單傳竺乾列宿中夏五葉世隔人同光光相按曹溪一派東侵扶桑孕生智日我師克昌去聖逾遠世道交喪不有至人羣生安仰惟師之出本為利他學窮內外機應萬差曉了諸家搜玄索妙剖釋衆疑如鏡斯照禪林虎嘯教海龍吟飇起雲合學儷駸駸拔陷拯淪玄功蓋代五十年間被人推戴上將請益思共元元册為國尊尊中又尊寶藏當街慈航當渡窮子始皈迷津是赴長星忽墜法棟已摧去來由己其去何催真空不空妙有非有絶迹離名然後可久上命既迫臣無以辭把龜毛筆當沒字碑劫火洞燒山河皆燼此碑獨存斯文不磷宣授朝列大夫遙授翰林直學士正獻大夫密直司左承旨國學大司成文翰侍講學士充史館修撰官知制誥知版圖司事世子右諭善大夫賜紫金魚袋臣閔漬奉敕撰元貞元年乙未八月日門人沙門竹虛奉敕集晉右軍王羲之書門人內願堂兼住持通奧真靜大禪師法珍立石有元高麗國曹溪宗慈氏山瑩源寺寶鑑國師碑銘并序李齊賢撰近世有大比丘推明佛祖之道以開來學曰普覺國尊其徒數百千人而能鑽堅挹深妙契啐啄者惟寶鑑國師為然國師諱混丘字丘乙舊名清玢俗姓金氏考贈僉議平理諱弘富清風郡人也娶黃驪閔氏女禱于福靈寺觀音像以忠憲王二十七年己亥七月二十七日誕焉幼與羣兒戲聚瓦石為塔廟休則面壁若有思念形貌端嚴性又慈祥故親戚目為小彌陀十歲投無為寺禪師天鏡祝髮以九山選首登上上科棄去從寶覺學自詭非睹閫奧不止始普覺夢一僧來自謂五祖演詰朝師往謁心獨怪之及是歎其敏而勤語衆曰吾夢有徵矣洎嗣席開堂其帥衆繩講規若畫一而雍容間雅過之忠烈王賜伽梨法服纍下批至大禪師德陵即政特授兩街都僧統加大師子王法寶藏海國一之號皇慶癸丑德陵謝位處永安宮屢遣中使輿而致之從容談道或至日暮於是諗國主以祖宗舊例册命師為悟佛心宗解行圓滿鑑智王師兩王同摳衣請益前古未有既數年乞退甚懇許之因命住瑩源寺本禪院元貞中為智者宗天台宗所有以師故始復其舊矣至至理二年冬十月感疾移席于松林寺修遺書封印付侍者越三十日盥浴説法別衆其略曰荊棘林中下腳干戈叢裏藏身今日路頭果在何處白雲斷處是青山行人更在青山外既乃還方丈據床而逝師沈厚寡言學無不窺為詩文富贍有語録兩卷歌頌雜著二卷新編水陸儀文二卷重編拈頌事苑三十卷行叢林間中吳蒙山異禪師嘗作無極説附海舶以寄之師默領其意自號無極老人報年七十三僧夏六十三王聞訃追悼贈諡寶鑑國師塔曰妙應仍命臣某書其德行于碑臣聞佛氏喜言福智修己而物應者也缺一於二不足以自立寧能信於人乎師凡七增秩六錫號九歷名藍再住內院為一國釋林之首受兩王函丈之禮人無異論咸謂之宜非所謂福智二嚴者疇克如是哉其刻石傳示後世臣可以無愧矣銘曰敻彼心宗逾海而東厥派惟九道義其首繩繩仍昆代有哲人守正矯失雲門之一博學篤行麟角之明顯允鑑智侯其嫡嗣淵乎其懷卓乎其才爰踵其惠王諱于禰于祖既主宗盟諸方盡傾旁涉書史研精究理奮筆為文秋濤春雲王于休貌寵以嘉號匪惟寵之北面以師釋林慶賴師不自大挂錫雲山陰福區寰慧晷忽匿王心是惻俾臣作銘揚芬億齡匪學斯悖匪思斯憒有緇其衣勗哉我希曹溪山修禪社第五世慈真國師碑碑在高興郡佛臺寺李益培奉命撰師諱天英俗姓梁氏考宅椿妣金氏高宗二年乙亥六月十三日誕生十二年己丑詣曹溪真覺國師得度年甫十五二十年癸巳赴談禪法會儕輩推為座元二十三年丙申赴禪選中上上科既而擺撥名塵一杖南遊時清真國師盛化曹溪徑造參扣慧能增明又從真明國師咨稟法要自是道譽日振廣聞遐邇三十三年丙午歲柱國晉陽公創禪源社大張禪會遂奏達黈聰乃命中使金巨卿邀迎真明國師為法主而又召致國內高名緇徒三千師亦赴筵朝士趨風惟恐其後尤為晉陽公所敬重公奏授三重大師三十五年戊申奏加禪師仍令住斷俗寺三十六年己酉晉陽公創昌福寺設會落成請師主盟三十七年庚戌上命師主禪源社三十八年辛亥柱國崔公沆建普濟寺別院招集九山禪侶請師主盟三十九年壬子清真順世上命真明住曹溪以師為禪源法主四十三年丙辰秋真明國師乞退休而舉師自代上命師嗣曹溪制加大禪師迎入禁中御手供饌命差中使韓瑛衛行八月二十八日乘舟南下九月十九日入曹溪大張宗綱於是玄徒歷至佛日再中忠烈王十二年丙戌二月十二日受請而抵高興郡佛臺寺喚長老云老漢欲歸汝等好住因索得紙筆修上國王書及廉洪兩相書畢淨髮更衣著伽梨坐小禪床有僧出問牧牛子道不昧一著子和尚還不昧也無師云昧與不昧總不干他事又有僧問脫却殼漏子向什麼處相見師云問求道吾去復云時將至矣不須多語生也如著袴死也如脫裙那個是著脫底人良久云不見牧牛子道千種萬般總在這裏言訖泊然而化顏色如平生二十九日門徒號奉色身茶毗于豆原縣之東峯收拾遺骨三月六日奉還曹溪上聞之震悼時遣通禮門通事舍人薑就下書豫具誄贈諡慈真圓悟國師御筆書諡軸又遺日官春正文瑞英于門徒賜塔號靜照仍命二員鑑護喪事六月九日奉安于大原寺西岡有雙虹之瑞氣一起自曹溪南峯頂一跨塔之前峯皆貫至塔所享壽七十二法臘五十七住錫曹溪凡三十年曹溪山修禪社第六世圓鑑國師碑銘并序奉祿大夫國學大司成文翰學士承旨臣金鳴奉教撰國師諱法桓後改為沖止自號安庵俗姓魏氏定安人也考諱紹戶部員外郎妣宋氏吏部員外郎子沃女也師生於丙子十一月十七日眉面秀異九歲始就學凡經書子史過目即誦又善屬文十九登壯元弟奉使日域顯國美於異邦少有出塵之志時圓悟國師主法於禪源社師造堂即零染受具乃策杖南遊歷參講肆去留為叢林重輕師初不欲作住持人蓋慕太原孚之玄風也至年四十一始住金海縣甘露社有一禪德進師前請詩師云春日花開桂苑中暗香浮動少林風今朝果熟沾甘露無限人天一味同茲詩膾炙人口遠近聞之想見其像自師入院宿德風馳後進住雲丙戌二月圓悟順世大衆舉師次繼席狀聞于上命員外侍郎金浩淡請師入院師於是年四月十六日入院開堂而嗣圓悟為第六世住院七年更光普照之遺軌乃奏請田之表復土如舊其略曰舜厥聰明湯其齊聖盛業四於三王休光隻於千古上國聞師之風嘉師之德遣宮使迓師乘馹至中夏皇帝親自迎迓待以賓主之禮褒以師傅之恩舉國仰德萬民歸仁授金襴袈裟碧繡長衫白拂一雙皆道具也至壬辰八月初旬師示微疾癸巳四月七日疾彌重十日晨起淨髮更衣謂門人曰有生有死人世之事吾當行矣汝等好住門人請偈句師乃偈曰閲過行年六十七及到今朝萬事畢故鄉歸路坦然平路頭分明未曾失手中才有一枝笻且喜道中腳不跌萬湖長老問承師故鄉歸路在什麼處師云著眼看曰看是什麼道師云知即得言訖泊然而逝顏色鮮白屈伸如生是月草日茶毗拾骨骨有五色互相明顯瑞氣亘天彌月不已上聞之震悼下敕書誄書慰門徒仍贈諡曰圓鑑國師塔曰寶明浮圖于曹溪北洞師壽六十七臘三十九師性本寬裕心情純朴愛人救物稟自天然觀師之平生大槩可謂於世出世具足無虧真大丈夫也嗚呼美哉門人等請於上立碑奉行狀聞于上命臣文之臣宿承慈誨又其高誼景行耳目所詳不可以辭語蕪淺為辭故勉強而撰焉其銘曰清淨摩尼圓潔無虧隨方各現物不能欺名如意寶動有靈奇誰其似也惟我國師有德從釋牧牛正嫡住諸叢林俱為上客隨處養恬優遊自適為衆所推繼圓悟席荷擔重器闡揚宗旨學者雲從景仰高致朝野歸崇丐以物理慮遠防微脫人禍機緒餘所庇民富國肥道尊德茂所嫌者壽明月墜空白日沉煦道隨而微天不我祐紀美鐫珉傳之不朽大元延祐二十九年甲寅八月日門人大禪師靜眼等立石海東曹溪山修禪社第十世別傳宗主重續祖燈妙明尊者贈諡慧鑑國師碑銘并序李齊賢撰粵若大浮圖出處語默皆非苟也出處係乎時語默存乎機所以發明其道以覺後覺者也故慧鑑國師其若時者乎諱萬恆俗姓朴氏考進士諱京升熊津郡人師以儒家子為僧幼頴悟能自強於學長益不怠赴九山選中魁科拂衣往楓嶽夏滿移棲智異山飢不重味寒不襲裘脅不至席者纍稔迹晦而名彰忠烈王命住三藏社其師曹溪圓悟和尚亦諭之乃往後歷主朗月雲興禪源等社凡經指授若聵而聆若酗而醒弟子至七百士大夫摳衣入社者不可勝計中吳異蒙山見其文偈嘆賞不已賡和十數仍貽書致古潭之號皇慶癸丑大尉王宴居永安宮安車卑辭邀至京城時方聚禪教名流日以次講論師至棒喝風生辨若懸河王喜甚行同輿手奉饌加法號別傳宗主重續祖燈妙明尊者袈裟衣裙帽襪先銀幣五十鎰以贐師還山悉以付常住不皈於私延祐己未七月遘疾將移棲遍告山中前一夕南峯大木自仆赤祲亘山谷至八月十八日剃浴更衣修遺書自占葬地夜艾喚侍者撾鼓按伽梨據禪床聲偈告別其略曰廓清五蘊真照無窮死生出沒月轉空中吾今下腳誰辨玄蹤告爾弟子莫漫捫空禪者景瑚問以去住之意則有何處不相逢渡河不用筏等語拍膝叉手含笑而化闍維塔于寺之艮岡壽七十一臘五十八訃聞王惻悼贈諡慧鑑國師塔曰廣照之塔初母鄭氏夢天降翠暮有童子肥肉如冰玉就視之遂合掌躍入鄭氏懷中及寤如納斗大石胞中砭樂之不效以己酉八月六日誕師因名幕兒洎示寂帶方郡民名白太者夢師登翠幕天去怪而明日奔至寺師已逝銘曰師之德溫而直淵而塞師之學博以約精以確海印其心獅子其音曹溪其任挺普照之鑰振圓悟之鐸斫蒙異之堊道之所存王者屈尊重幣華軒賁于門釋子旁午湊我法乳法乳斯普萬彙時雨匪晦而隱害富其匪作而奮疇究其蘊既善諸身克利于人刻名貞珉焜耀千卷王師大曹溪宗師一印正令雷音辨海弘真廣濟都大禪師覺儼尊者贈諡覺真國師碑銘并序維至元十四年乙未王師覺儼尊者示滅間五年其徒元圭等聞于上曰吾師之行實不可使堙晦願碑而識之於是上命臣為文臣既受命竊謂之曰古之達者以身世為蘧廬視名位如弊屣况所謂浮屠氏夢幻有為住持無相清淨寂滅而不可名言雖極稱頌於師乎何有然其徒之所以痛慕者師之化必有以感于心吾王之所以信崇者師之道必有以補于理可不敘乎昔我太祖肇造邦家凡可以贊毗王化保祐民生者靡所不為謂佛氏其化仁於吾東方政教為允迪遂廣置仁祠以居其徒粵禪若教各以其法福于國禪視教為尤盛主道場者非其人不敢處為其所以尊崇之意既已昭然尚慮後之或怠為信誓十條而詔其一曰敬信三寶自時厥後必舉其徒之德尊者禮事而為之師代有成規禮儀浸備恭惟我主上勵精圖理宵旰憂勤凡所施為率由舊章咨于相府訪諸宗門若曰眇沖嗣位適值時艱恐無以臨涖將以僧中碩德者尊拜為師以輔于理用光祖訓疇歟僉曰無如覺儼尊者前代尊崇號稱其德乃命有司遂拜為王師時住佛岬寺以年高道阻未敢屈致畫像瞻禮俾益齊李侍中為讚大備物儀使還師所以申師之禮誠敬篤至師奉國書乃曰老僧嘗荷前代誤恩濫居師位今又辱重命深有兢慙第以香火之勤庶幾奉福耳實上即位之二年壬辰也師諱復丘自號無能叟固城郡人也判密直右常侍文翰學士承旨李公諱尊庇之子師之族系內外爀世今略其譜大浮屠也母夫人常持誦大乘佛經常夢一居士盛冠服而前曰我已來矣因而有娠洎至元庚午九月十五日而生資質明朗不類塵凡稍長知敬佛乘嬉遊之具必模樣道場規矩年甫十歲就曹溪圓悟國師剃落受具未幾圓悟順寂以遺矚從大禪師道英孜孜請益十年而學通叢林推為衆首庚寅秋中禪選上下科時年二十一所見已超然志道厭煩雲遊訪道塊處觀心徜徉乎泉石搖裔乎雲林誓不踏名途慈覺國師師之二師也待之甚禮嘗以學徒委諸師師曰有得於己然後傳諸人吾固不敢遂往白巖寺與同志十餘人蚤夜參究十又餘年住月南松廣大道場前後四十餘年其間福國利生之事與夫褒崇錫賜之寵蓋不可遽教而又師之糟粕也故不書晚住佛岬寺王命也謂其徒曰往宿此山夢有人拜且曰師宜住此心竊異之今而驗矣乃作頌曰君賜筽城佛甲山人言倦鳥已知還殷勤薦祝如天壽從此邦基萬古安其惓惓於君國之意亦可見矣乙未移寓白巖寺夏六月示疾七月二十七日疾小間緘書辭于國王宰府請邑官封印信更衣涕沐具法服命侍者擊鼓坐小禪床乃云即心即佛江西老非佛非心物外翁鼯鼠聲中吾獨往涅槃生死本來空儼然而化紫雲滿洞顏如傅粉翌日門人號奉茶毗于寺之西峯函還佛甲寺冬十二月上遣使吊慰諡曰覺真國師塔曰慈雲春秋八十六夏七十六為人簡默清淳端平直諒緑頂厄眉丹脣皓齒望之灑然如神仙就之溫然如父母口不臧否心存敬恭平生方丈不留一物其祖派則繇普照至師凡十三世門人之秀者禪源白華迦智麻谷而下等千有餘人內姪杏村侍中村杏即李巖也為今之名宰相吾輩所矜式杏村之弟吏部尚書於吾為同年友豫又一參籌室厥後屢奉辱書深以為幸故於師之銘不揆鄙拙幸而為之辭其銘曰高而不危吾師之為卑以自牧吾王之福大道歧分本乎一原相須以濟介祉于世於萬斯年輝後光前刻斯于石伊糟伊粕悠悠茫茫庶乎不忘時維至元十九年己亥暮春下浣文翰學士春秋館承旨僉侍中霽亭李益齊奉命謹書尚玄曰朝鮮今稱三寶寺剎一曰佛寶大本山通度寺是也以新羅時慈藏律師入唐得佛骨及佛袈裟還安于本寺故二曰法寶大本山海印寺是也以高麗大藏經板本藏于本寺故三曰僧寶大本山松廣寺是也以高麗普照國師以後真覺清真沖鏡真明晦堂慈真慈靜圓鑑慈覺湛堂妙明慧鑑妙嚴慈圓慧覺覺儼復菴淨慧弘真高峯和尚以上諸人海東佛祖源流作十六祖師燈燈相續懶翁王師幻菴國師無學王師亦住本寺故松廣在我海東實為靈山道場亦為曹溪寶林也參考附松廣寺湛堂國師本寺相傳湛堂本係支那之人而失其事迹云云余按釋鑑稽古略續集元順宗至正三年癸未係有湛堂法師而師曾遊高麗年條又相符故録其行迹以供大方之參考焉湛堂法師諱聖澄字湛堂號越溪會稽孫氏子母薑氏夢日輪而生從石門袾律師祝髮受具深通止持作犯之義依佛鑑銛公習天台教觀謁雲夢澤公深加器重奏復天台國清講額遊高麗求天台遺書吳越大旱師率衆説法禱雨格應歲飢民死無以斂乃掩其遺骸作水陸大會普度之至治間馳召入京問道於明仁殿被旨居青塔寺校正大藏特賜金斕衣賜號佛海大師後皈天竺之雲外齋還越之佛果篤志淨土修一心三觀者七晝夜屢感瑞應一日師揖衆曰今日則有明日恐無光陰其可把玩乎次日黎明端坐而逝壽七十八臘六十四留龕七日顏貌如生所著有金剛集注心經消災經注彌陀經句解仁王經如意輪呪經科等並行於世僧傳朝鮮以還普照法脈遂至斷絶而浮休善修禪師之兒孫實主本寺修傳碧巖覺性性傳翠微守初初傳柏庵性聰聰傳無用秀演演傳影海若坦坦傳楓巖世察察有高足曰默庵最訥曰應庵朗允曰霽雲海澄曰碧潭幸仁此四門派實繁有徒矣影海和尚法名若坦高興人姓金氏十歲出家於楞伽寺以得牛長老為恩師十七初見無用和尚十八削髮受戒受讀經法刻苦參究如是十年始為入室持滿應世聲香遠播曾設華嚴會於松廣寺問津者盈千指師年八十七歲甲戌清乾隆十九年正月初二日示微疾至三日子夜沐浴更衣告衆畢朗吟一偈曰凝圓一相誰能嘎濶步乾坤露裸裸踏著自家不懷珍獨尊獨貴唯稱我呵呵呵是什麼淨灑灑沒可把端坐而逝闍維於香爐峰下十道放光一片超骨遠近見聞莫不加敬塔于二處楞伽及松社楓巖和尚法名世察俗姓密陽朴氏肅宗十四年十二月十六日生于順天郡之壯安里童真出家得度于桐華寺之哲雄長老受業于無用及影海兩師而竟傳海和尚之衣鉢對衆宣揚英祖己卯春師因大會傳賜衣鉢于默庵應庵丁亥七月八日入寂于普照庵闍維得白舍利二粒樹塔于北麓以奉安焉聖燈寶幢戟巖禳鎮輿地勝覽長湍郡五冠山聖燈菴權近記云建文元年朝鮮定宗元年己卯冬十有一月辛未松都承旨臣文和以王命召簽書中樞院事臣近傳旨若曰五冠山聖燈菴蓋自前朝太祖王氏始置豫在潛邸圖新厥屋逮茲有成施以土田奴婢爾宜文之垂示永久臣近俯伏受命而退謹稽菴之舊籍五冠山之西峰有石屹立尖利如戟人謂之戟巖其山脊迤邐而西折而南接乎松嶽王氏太祖統一三韓肇建都于松嶽之陽術士進言戟巖突起乃當地脈第二順龍肺肝衝天而立是為三災發作之所若欲禳之宜以立石幢於是就其陽於巨石之上樹石柱四方列如屋置長明燈以鎮戟巖之災且以明君相繼忠臣不絶為願故王氏世世令大府寺供其燈油政和戊辰侍中尹碩相忠肅王至順庚午侍中韓偓相忠惠王皆與兩府諸公添其油錢列名于板洪武癸亥侍中曹敏修等又與兩府出米若布以續其用韓山李穡為文以記簽書柳𪻎等又為作屋是聖燈之世世所重乃如此今我主上殿下以元良之德勇智之資惟忠惟孝佐太上王弘濟多艱誕膺天命式啓朝鮮億萬年之業嘗在潛邸以賢與長謳歌悉歸益崇謙德率履不越惟有利於國家是圖是力乃於戊寅孟春殆新茲庵及秋八月遂承太上王命即傳寶位明良相遇更新政化庶續咸熙四方無虞聖化之效蓋不誣矣其所重營佛宇三楹挂以新畫釋迦三尊十六羅漢弟子五百聖衆都會之像東付翼室三楹所以寓僧也西付三楹所以為爨也納田百結奴婢十六口所以續聖燈而永金輪也嗚呼王氏始置此燈子孫相傳歷五百年而遇維新之朝鮮所以光賁法事益圓且滿則其所以益利邦國者大且久聖壽之長國祚之長當如此山此燈同垂罔極而不拔矣尚玄曰據高麗太祖訓要諸寺院皆是道詵推占山水順逆而開創者也朴全之龍巖寺記昔道詵曰若創立三巖則三韓為一戰伐自息於是創龍巖寺靈巖郡月出山雲巖寺光陽白雞縣山仙巖寺升平府曹溪山云云又世傳雲峯郡實相寺池中沉鐵甕亦是道詵所為以壓山水之氣者云云大抵高麗寺院一則曰風水二則曰風水皆係道詵之推占即所謂裨補者也而至此戟巖立幢明燈鎮禳災害亦一創例也灌燭巨像湧石琢成像在恩津今論山郡朝鮮人凡呼石佛像曰彌勒而此像非彌勒乃觀音也按明珠寺事迹高僧慧明六珠二師造灌燕寺石觀音像成云云故稽古高麗光宗之十九年己巳沙梯村女採蕨于盤藥山西北隅忽聞有童子聲俄而進見則有大石從地中聳出心驚怪之歸言其女壻壻即告于本縣自官核奏上達命百官會議啓曰此必作梵相之兆也令尚醫院遣使八路敷求掌工人成梵相者僧慧明應舉朝廷擢工匠百餘人始事於庚午訖功於丙午凡三十七年也尊像既具欲安道場遂千餘人並力齊運而先頭至連山地南村二十里因名其村曰牛頭也慧明雖成神像而方以未立為慮適到沙梯有一雙童子戲造泥土為三段佛像即平地而先立其本積沙土而次立其中又如是而竟立其末慧明熟視大悟欣然還來一如其規乃立厥像蓋童子即文殊普賢化為指教云佛像身長五十五尺五寸圍三十尺耳長九尺眉間六尺口角三尺五寸火光五尺冠高八尺大蓋方廣十一尺小蓋六尺五寸小金佛三尺五寸蓮花枝十一尺或塗黃金或飾紫金於是乎四方風聞萬姓雲集敬禮者如市故名其前流曰市津也立畢天雨大注洗滌體像瑞氣盤鬱至三七日眉間玉毫之光照輝乾坤時中國僧智眼望氣從來而禮之曰嘉州有大像亦東向而立光明同時相應云名以灌燭也自是之後祥瑞之氣時從梵相出直透半空外八表緇素之徒一邦貴賤之輩無不敬奉焉者昔在唐亂賊兵至鴨緑江此像化為蘆笠僧褰衣渡江衆知其淺驅入水中溺死者過半矣唐將以劒擊之所戴蓋冠自爾破缺國家太平則滿身光潤瑞氣盤空凶亂則遍體汗流手花無色尚玄曰按此石像若成於高麗光宗之時則與支那趙宋相當而其後則有遼金元所謂唐亂者疑即蒙古兵亂蒙古即元而所謂僧渡鴨江誘溺賊兵者亦疑即薩水七僧誘渡隋兵之事之混訛也悲院施衆惜乎不廣高麗毅宗二十二年三月下教曰國家特立東西大悲院及濟危寮以救窮民然近來任是官者率非其人故或有飢饉不能存者疾病無所依附者未能收集救恤又忠惠王四年癸未三月罷習射場屬東西大悲院聚城中病人救藥贍衣食從僧翯仙之請也云云蓋大悲院者施藥貧病之機關也此因時君篤信佛教布施功德所由設也雖然不過行於都城不能推廣普及全國如今時之慈惠醫院此真所謂惠而不知為政者歟朝鮮時代亦有此舉關於佛家者録之如下都城築造餘話朝鮮總督府編輯官小田省吾氏詳考朝鮮歷代實録以作之者也一僧徒助工役而且盡力於救護之事併合以前則朝鮮僧侶在乎社會之水準以下矣雖然朝鮮之初佛教盛佛徒亦有相當之地位故彼等元來雖屬方外之民及乎國都經營之大事業興不忍默過大奮盡力其中最有名者祖生宗林坦宣三人是也祖生太祖時為內願堂住持太祖最初經營新都于雞龍山朝議以為當國家草創之時不可輒用民力僧徒多遊食者可以使役各宗僧聞此事乃自奮募僧徒志願赴役者多至數千人祖生引彼等謁太祖各蒙恩賞其後彼等僧徙亦與於漢陽築都之役蓋太祖四年九月太廟宮闕新成放還丁夫重秋穫也僧徒無關於農事故彼等留役宗林領率之宗林太祖時之都僧統也前判事尹安鼎嘗役所謂板橋院於廣州之板橋里院在水原之北約五十里之地點南方諸郡徵發丁夫往來者多若有途中罹疾病者則自該院醫治療養疾愈者給與糧米使之行此真篤志之事而全係私設之事業間接助工役者實不少時右政丞金士衡以此上聞賞賜米豆鹽醬具載實録十餘萬人夫一時羣集漢陽故雖屬春寒尚峭之節候癘疫大行時華嚴宗僧坦宣毫不畏忌盡心於救恤之事後坦宣雲遊嶺南新寧等地及世宗朝再起工役又擢用之從事救護疾病軍人二世宗期之救護事業與當時之慘狀世宗期都城修築時鑑於太祖期之經驗徵集三十萬之軍丁亦大努力於救護之設備矣然而欲知當時對一般人民關於救療衛生設有如何之機關在乎漢陽為先官設則有惠民局活人院此二者後變名為惠民署活人署載在經國大典詳説於東國輿地勝覽惠民署在南部太平坊掌醫療民庶疾病及教習醫女云云恰如今日之慈惠醫院者也活人署東在光熙門外燕禧坊西在敦義門外阿峴城中患疫者皆就治療云云即如今日之避病院者也此外尚有私設之濟生院是頗有由緒其設立者則太祖朝相臣趙浚及金士衡兩人為救濟窮民之惱於病苦者所設之慈善的事業東文選一三此等係是在來之機關也由實録觀之世宗期都城修築時特於都城東西四處置救療所掌救護疾病軍人而其從事於實務者乃惠民局及濟生院之醫員以若少數不堪繁務故下令郡守縣令令三郡縣之軍丁作一團領率上京之時各各帶同醫員數人亦携藥材以來入京之後一從局醫之指揮蓋總轄此救療之事業者惠民局提調韓尚德是也彼率專屬醫員六十人以當其事前節所述之坦宣大師率僧徒三百名救療軍人之疾病內科傷折外科云云又此時病疫大熾其利用活人院亦無論已而就此救療事業之全體呂稱許衡二人當其監督之任如斯其整備盡力於救護而既係多數之軍人故領率之郡守縣令雖知其有疾病軍人而怠於送致救療所者有之故準其未送之人數加嚴罰於各其守令然統計各道軍人死亡總數達於八百七十二人畢役之後世宗及太上王意外聞死者之多命兵曹率醫員巡行城之周圍救其患病飢餓者又令收瘞死體之暴露於郊外者更命漢城府遍行搜查城外十里之間且對此等死者悉有賻贈下略三工役與美談太祖都城築造時全羅道珍原郡之民徵發於工役途中得病其女聞報罔知攸措曰吾女身既無兄弟吾當躬往省父庶幾得生還即日男裝出發行途見路傍病臥者輒入視之到板橋院發見其父收容同院命迫旦夕喜不自勝盡心看護遂扶父還鄉里其孝行達上聞賞賜綿布此女名都里莊道場媚神失之太多尚玄曰高麗一代崇信佛道消災祈福必設法會諸佛菩薩及諸經道場則不可不謂所當行者而至曰神衆道場曰文豆婁道場曰摩利支天道場曰止風道場曰禳星道場曰功德天道場等名目不可勝數初自無神漸進而至於多神其末流之斃不至不崇信巫覡詛咒之術不敬拜鬼狐精靈之妖則不止也夫儒教事多神者也景教事一神者也至於佛教最上乘以無神為究竟義者也人類始生説有兩派古言人類之始者為宗教家今言人類之始者為生物學家宗教家者隨其教而異各以其本羣最古之書為憑世界各古國如埃及巴比倫印度希伯來及支那等各自有書詳天地剖判之形元祖降生之事顧各國所説無一同者昔之學人篤於宗教每多入主出奴之意今則稍衰但用以考古而至於生物學家者創於此世紀以內最著者英國人達佑仁之種源論其説本於考察當世之生物與地層之化石條分縷析觀其會通而得物與物相嬗之故由古之説則人之生為神造由今之説則人之生為天演其學如水火之不相容今姑就宗教邊言之世界各國之宗教無一不源於神話神話何自而生大凡厥初生民由野蕃以成部落養生之事次第而備而其造文字必在生事略備之後其初族之古事但憑口舌之傳其後乃繪以為畫伏羲氏之八卦巴比倫之楔形文埃及之象形文印度之古梵字等是也再後則畫變為字字者畫之精者也故一羣之中既有文字其第一種書必為紀載其族之古事必言天地如何開闢神聖如何降化往往年代杳邈神人雜糅不可以理求也雖然既係其族至古之書則其族之性情風俗法律政治莫不出乎其間而此等書常為其族之所尊信此則古代神話之所由來胥文明野蠻之種族莫不然也夫鬼神之事今人不能不笑古人之愚然非愚也蓋初民之意觀乎人類無不各具知覺然而人之初生本無知覺者也其知覺不知從何而來人之始死本有知覺者也其知覺又不知從何而去即如禪家所云生從何處來死從何處去也於是疑肉體之外別有一靈體存焉其生也靈體與肉體相合而知覺顯其死也靈體與肉體相分而知覺隱有隱現而已無存亡也於是有人鬼之説既而仰觀於天日月升沉寒暑迭代非無知覺者所能為也於是有天神之説俯觀乎地出雲雨長草木亦非無知覺者所能為也於是有地示之説人鬼天神地示均以生人之理推之而已其他庶物之變所不常見者則謂之物魅亦以生人之理推之而已此等思想太古已然也一多神教即儒教按支那古代之神話則有盤古氏開闢天地之説及史紀三皇本紀十紀之説一九頭紀二五龍紀三攝提紀四合雔紀五連通紀六序命紀七循蜚紀八因提紀九禪通紀十流訖紀此與巴比倫磚文所載洪水之前有十皇相繼四十三萬年之説符合也後有天神即如周禮春宮疏青帝靈威仰赤帝赤熛怒白帝白招拒黑帝汁光紀黃帝含樞紐及日月星辰司中司命風師雨師皆天神之名也地示山海經南山經所列之鬼神及中山君所云泰熏池武羅靼騷經所引湘君湘夫人河伯洛妃等皆地示之名人鬼左傳齊之彭生鄭之伯有周之杜伯燕簡公之莊子儀皆見人鬼者也物魅周禮所云方良即魍魎管子所云涸澤之精曰慶忌涸川之精曰縯等皆庶物之變所不常見者也支那蓋自上古至于春秋原為鬼神術數之時代及于老子遂一洗古人之面目九流百家無不源於老子後世以黃老之學並稱之黃帝為陰陽術數之祖也與儒教並行而鬼神術數之教及黃老之學為支那孔教之前提也堯舜禹湯文武周公之禮樂法度即孔子之所祖述所憲章而郊祀祀天神之祭宗廟祀祖先神社稷祀土地百穀神柴望祀嶽瀆神等祭享之禮皆孔教之所行即韓愈所謂郊焉而天神假假與格同廟焉而人鬼享吾所謂道也者是也此乃帝王之事也南宋朱子創立家廟神主之法以祭祖先此乃庶人之事也朝鮮儒教專倣朱子故曰孔教即為多神之教也二一神教即基督教及回回教按歐洲列國之古史則上古草昧之時日月河海之神巖石樹木之精即其人民所敬奉者也耶穌基督出於亞洲之猶太國創天主教謂天帝賦人之靈魂故教人以奉惟一之天神其創世紀云天主以六日之功造成天地萬物摶土為人男曰亞當女曰夏娃為世初祖此與支那盤古氏開闢天地及混沌氏搏土成人之説相同先知摩西於蘇來山見上帝受默示此為朝鮮天道教之藍本云云亦皆上古所傳之神話也一自景教流布歌洲之後始得掃除古來多神之教俗而為今一神之教矣後耶穌五百年摩哈默特起於亞洲之亞拉非亞創回回教其奉天主為獨一無二之神與耶穌教同三無神教血兼多神教一神教即佛教佛教之前提印度舊有婆羅門教即事梵天之教也何謂婆羅門印度舊時種族有四一曰娑羅門種即淨行也謂守道潔白即祭司也二曰剎帝利種即王種也釋迦世尊出於此族三曰吠奢種即商賈也四曰戌陀羅種即農人也阿含部經謂四種人皆從梵天生印度梵文婆羅門人以為梵天所傳故名四韋陀書亦自以為梵天所製一曰阿由韋陀譯云壽也謂養生繕性也二曰殊夜韋陀譯云祠也謂享祭祈禱三曰婆磐韋陀譯云平也謂禮儀占卜及一切武事也四曰阿達婆韋陀譯云術也謂異能技數梵呪醫方此四韋陀婆羅門人守為經典至佛之前一千年頃婆羅門人智識大進學説羣起統彙羣言約分三派一曰僧佉派二曰吠世史迦派三曰尼犍陀弗咀囉派僧佉派者梵云僧佉此譯為數即智慧數也數度諸法根本從數起論名為數論此師所造金七十論其學統分二十五諦曰自性大我慢五大地水火風空五惟色聲香味觸五知根眼根耳根鼻根舌根皮根五作根舌根手根足根男女根大道根心平等及神我吠世史迦派者此譯為勝造六句論名為勝論其學説名為勝宗十句義一曰實九種地水火風空時方我想二曰德二十四種色味香觸數量別體合離彼體此證覺樂共欲瞋勤勇重體液體潤行法非法行三曰業五種取業捨業屈業伸業行業四曰同五曰異六曰和合七曰有能八曰無能九曰俱分十曰無説五種未生無已滅無更互無不會無畢竟無尼犍陀弗咀囉派者譯云離繫子苦行修勝因其學説為十六諦苦行生天為婆羅門之舊説矣尼犍子十六諦曰聞慧八天文地理祘數醫方呪術及四韋陀書合而為八修慧八修六天行事星宿天修長仙行其後分為六種苦行外道皆尼犍子派也一自餓外道謂其修行不羡飲食長忍飢餓執此苦行以為生天之因二投淵外道謂其修行寒入深淵忍受凍苦執此苦行以為生天之因三赴火外道謂其修行常熱炙身甘受熱惱執此苦行以為生天之因四自坐外道謂其修行常自倮形不拘寒暑露地而坐執此苦行以為生天之因五寂默外道謂其修行尸林冢間以為主處寂默不語執此苦行以為生天之因六牛狗外道謂其修行自記前世從牛狗中來即持牛狗戒訖草噉污執此苦行以為生天之因所謂印度九十六種外道者乃六師各有弟子十五人以六乘十五得九十更加六師共為九十六者也已上三宗之説盛行於印度而四韋陀宗旨即曰人當事天尼犍子則明生天之道可以我力成之吠世史迦則又一切皆以我之業力與外境離合而成僧佉則更明除我之外別無境界三泒學説與其學理層遞而進相引而上如曲線然佛初出家亦修其説後悟知其非究竟法乃捨棄去遂成正覺一洗上諸外道之説支那太虛禪師無神論無靈魂物造主一切皆以無為究竟今世界學者本自由平等之真理大都主張無神説然亦有主張有神説以言自由平等之理者則泰西宗教家是也蓋今世學者欲一洗現社會之習俗使循天然的而達到自由平等之實際泰西宗教家乃以地球人類皆上帝愛子無階級無界限所賦之自由幸福莫不平等之説附會之此則一神教以神為萬物之造主俾人類同隸於一尊之下而消滅一切等級界域者也但亦有以神為靈魂者其説之能助人道之進化促世界以大同有二義焉一曰有靈魂説之足以祛厭世思想也蓋人之懷厭世思想者以浮生百歲為歡幾何况不如意之境遇常多於如意之境遇於是遂生厭棄人世之心此皆不知有靈魂之咎也苟確知吾有靈魂體魄有生死靈魂無生死凡吾所造德慧罪惡之別業皆將與世界一切衆生之共業隨因感果乘萬化而遞嬗於無窮初不能同體魄而消滅則便知世無可厭自然汲汲以整飭身心改善社會期別業共業俱進於淳良完美以享受永遠之安樂矣二曰有靈魂説之足以破人我執見也夫世之雖信有靈魂而信之不堅確者則謂縱有靈魂轉生他世彼時我既不憶為我固已不啻他人也我亦窮吾心之所欲盡吾力之所及以自求一身數十年之快樂足矣奚用悲天憫人為廣大悠久之地球計其長安遠治太平大同之道乎若確信有靈魂而不疑者其理想必大異乎是僅易一軀殼隔數十歲月我則不憶為我則萬劫以來千生以往更可知也以今生之我視來生之我既不啻他人則以過去之我視現在之我以未來之我視昔之我可知均不是他人也同一我也以三世分之互以其現在之我而視夫過去未來之我竟無一非他人者我既可以為他人他人亦可以為我人我之見於是不破自破莊子齊物曰物各自是而非他物各有自故天下無非自各有他故天下無是無非無是物論斯不齊自齊用證斯説寧不信乎凡是皆有神説也但有神特方便説耳以語真理結果之所在則必以無神為究竟何則夫人類之有聖人不唯人類之不幸抑亦聖人之不幸也衆生之有佛不唯衆生之不幸抑亦佛之不幸也真聖人必日以希望人類不生聖人為究竟真宗教亦必日以希望世界不用宗教為究竟人類如何可以不生聖人人人皆聖人人類中聖人斯無從出生世界如何可以不用宗教衆生皆成佛世界之宗教自然退歸無用衆生未能皆成佛人人未能皆聖人此人類之所以有聖賢世界之所以有宗教也信如是則人世之有聖賢有宗教吾又安得不謂之人類與衆生之不幸以之轉纍聖人與佛同陷於不幸哉故有神説特隨機引導之方便法門耳世尊法久後要當説真實開方便門示真實相必仍以無神説為究竟也故余絶對的主張無神説世界果有造主乎此一大疑問也愈作學理之研究此疑問愈不能解決夫有神説之可利用者以有堅確不拔之信仰心耳疑之莫決信何能堅設因不信有造物主而轉疑天賦自由平等之説則不唯不足助人類之進化保世界以大同將反為人類與世界之障礙也此人間世之不可有造物主之神説者抑極端之平等主義充其量之所及三綱五倫皆在廢除之例而持造物主神説者其言造物主之權力能力都無限量生殺豫奪賞罰苦樂均可操縱之於股掌間無論何人胥不能不恭敬之愛戴之以仰其鼻息而博其歡心否則便為大逆不道須永墮地獄其剝奪人之自由使人不能自治自立不平等孰甚耶此而頌之曰慈父真不啻膜拜於專制魔王之下而稱之曰聖人也况聖人亦大同平等世之可以無者乎此人間世不容有造物主之神説者且自由平等人類天性上所本具之真理也正不必假途於造物主之神説始足引起社會之信仰謂豫不信試以造物主之神説與自由平等之説同時鼓吹其感化於自由平等之説及感化於造物主之神説孰衆孰寡可立決也此人間世不必有造物主之神説者然僅就自由平等之説以言不可有不容有不必有造物主之神説但明自由平等之説不能與造物主之神説并存耳人將名之曰自由平等之無神主義彼持造物主之神説者亦可以有造物主之無自由平等主義相為抵制則仍不能折服彼持有神説者之心也不從根本上以解決世界果有造主乎之一疑問則無神論終成虛設也是亦快箭離絃發而不能已者乎天空中無數之恆星行星衛星遊星果有造物主以造乎地球上無數之動物植物礦物氣物果有造物主以造乎吾姑置不問僅就人類以詰之曰人類之體魄及靈魂既盡為造物主之所造何不盡造為聰明正直健全善良之人體力智力一般平等皆得圓滿之自由共享安樂之幸福顧乃或善或惡或智或愚或強或弱而使人類造種種之罪惡受種種之苦惱耶人類既盡為上帝之愛子何以不盡居之以天國遊之以樂園而必使之生於罪惡苦惱之地球逼其受種種磨折待其恭敬歸向乃攝歸天國否且罰入地獄耶上帝既要人恭敬歸向乃肯攝歸天國何以不盡人皆造成恭敬歸向之心俾自然恭敬歸向而必俟人之勸導其恭敬歸向耶凡是皆深不可解者且聞別有所謂魔鬼者其力能與上帝抗常反對上帝人之不恭敬歸向上帝信從魔鬼者死後必罰入地獄夫此魔鬼者是否係上帝所造若曰非上帝所造則上帝既有所不能造其所造者亦必有限將如百工技藝各造其所能耳此而可謂之造物主則人中之百工技藝又孰不可謂之造物主也况魔魂既非上帝所造必另有一造魔鬼者魔鬼之力能抗上帝則造魔鬼者之能力必較上帝為尤巨又安知人類及上帝非皆屬於造魔鬼者之所造乎設為魔鬼乃自然而有不由造成則何以萬物不能自然而成而必待上帝之造乎若曰魔鬼亦係上帝所造則上帝既能造之何不能制之乎但罰信從魔鬼者入地獄何不罰魔鬼入地獄乎抑上帝之權力本能罰魔鬼入地獄乃故意留此魔鬼以擾害人類乎此又不可解中不可解者雖質之主張造物主之神説者亦將莫知所答啞然失笑况上帝之造此不平等不自由不安樂不美善而如監牢如桎枯如豕圈如地獄之世界罪惡苦惱盈積其中其將以為功耶抑將以為罪耶其果惠人者耶抑果虐人者耶夫上帝對於人類之心理亦汝能恭敬我我能安樂汝汝不恭敬我我能苦惱汝與帝王之順我者富貴逆我者滅亡同一設心耳由是觀之則世界萬萬不可有造物主不容有造物主不必有造物主而絶對的無造物之神可決然無疑也然猶有未盡者則世界既無造主果自何而有耶此一問題未能徹底解決是也夫世界者真性之緣起無盡者也有光明世界有黑暗世界有苦惱世界有安樂世界有莊嚴世界有醜陋世界有清淨世界有惡濁世界光明安樂莊嚴清淨之世界以覺為其總因黑暗苦惱醜陋惡濁之世界以迷為其總因吾人今所處之世界黑暗苦惱醜陋惡濁之世界而以迷為其總因者何為之迷譬如有一象於此明眼人覩之象則象耳無所爭執也忽有二盲人欲以手摸探象之真相模象之耳者則執為象如箕模象之尾者則執為象如帚分別兩端執之一往以盲傳盲遂無不被其紿運轉密移迷生於不覺故有人我分別執之一往焉而殺機起有愛惡分別執之一往焉而盜貪起有男女分別執之一往焉而欲起惟殺盜三為根本執之一往焉於是世界相尋衆生相續業果相輪而緣起無盡有遠因有近因有多因有一因相似相續一人一宗一團體一世界綜錯紛披窮無所極斷根本之緣息分別之執則迷者可轉而至於覺黑暗苦惱醜陋惡濁者可轉而至於光明安樂莊嚴清淨矣故無情世界有情衆生皆於明通公溥之真性中動如夢幻之念造如夢幻之業如夢幻而出生如夢幻而消滅焉曷相稍假力於神哉浸假而有所謂上帝者亦如夢幻而出生之一物耳烏足以云萬物之造主哉以必無之理而強人以必信其信之者非迷信而何嗚乎造物主非造物主其迷之郵乎迷無為有迷非為是斯誠迷之大者迷因不破覺因不立此余所以斷斷然不惜辭而闢之也余之此言余知閲者將疑余雖不主張有造物主之神説而實一主張有靈魂之神説者故余當進論靈魂之有無以窮無神説之究竟吾人果有靈魂乎曰有不唯吾人有之即動植飛潛之類亦莫不有之也然虛幻無實但妄執與習氣而已非真有一物而可字之曰靈魂也智者當以譬喻得解試方言之如有一人於此都無所好亦無所思不存增愛清淨空寂若無意念者一旦忽好吟詩橫生妄執念念相續遂成慣習耳中目中所聞見者無非詩料口中鼻中所流露者無非詩聲心中腦中所經營者無非詩思他人觀之如癡如醉而自若不覺者即妄執與習氣也妄執忽起習氣隨生習氣既深妄執強甚此妄執與習氣靈魂是也唯執故不散惟習故不斷不散不斷猶波浪相激以前浪之動引起後浪之動動動不已引引無盡靈魂亦猶前波後浪相引之動力耳夫波浪前後相引之動力豈真有一物可指哉唯此妄執與習氣不散不斷實作輪回之本為生死之根乘萬物之化而遞嬗於無窮真性寂然不覺念動動動不已妄執隨生執之一往成為習氣自從無始有妄執以來愈執愈甚愈習愈深愈化愈離愈變愈雜萬物乃樊然淆亂隨業發現成住壞空相尋於無既有能破斯妄執斷斯習氣者則於真性仍未嘗稍異其寂然矣然真性非曰如木石之無識無念也特晶瑩炳靈圓融絶對不可思議不可名狀非妄執習氣之比耳猶夫好詩之人一日忽斷其好詩之執革其好詩之習不可謂其人便都無知覺力用也不寧唯是其執既斷其習既革方將無所不可為無所不能為又豈僅不癡於詩而仍不妨吟詩哉故靈魂者但有言説都無實義唯迷斯有唯覺斯無幻迷滅故魂亦無幻魂無故真性常寂是之謂無造物主無靈魂無神之究竟義是之謂自性自度之真諦然世之主張無神説者非自今日始亦非一人之私言也顧有神之説多出自宗教家世遂有以神與宗教視同一體者但余遍覽古今東西之主張無神主義者其理論類皆不能完全美滿反由宗教之學説而獲其究竟焉故余嘗謂世界之宗教有多神有一神有無神無神之宗教維何則佛教是也但世之研究宗教學者僉謂凡宗教皆有靈性常有幽界與神與人之關係兩種必要之特點而余乃以無造物無靈魂之無神説謂出於佛教然則佛教其非宗教乎殊不知余之所取於佛教者乃佛教之最上乘究竟義耳若通盤論之佛教實兼有多神一神無神之性質者也若但就佛教之最上乘與究竟義而論實不可以尋常之宗教性質限之其發揮無神之真理最為透徹如廓然無聖即心是佛平等法界無聖無凡一切衆生皆具佛性心佛衆生三無差別究竟菩提歸無所得諸説皆人間世絶無僅有之一種窮高極深之哲學也故具上乘資質而學佛者皆尊重己靈不為佛障訶之罵之甚至於棒之燒之俾自性真光透天透地蓋非如是不能與佛智齊平臻於究竟也是寧小根小草所能窺其涯岸者哉抑余常有一種理想今觀世界大勢趨向政教與之同時進化宗教界亦必起大改革創多數之新宗教與舊宗教相劇戰盡推翻一神多神之宗教而公擇一最聖與道德學理合為一物者之宗教而共奉之由之愈演愈進世界底於大同則政治既歸無治宗教亦復無教即無神之佛教亦於以得兔忘得魚忘筌而不復存其名詞矣無衆生相無世界相無文字相無語言相無無相無無無相凡現社會之所謂有者胥一切皆可以無之不特無神已矣企心玄致者幸共參焉尚玄曰太虛禪師無神之論不過一時救斃之見亦不可謂真理所在以其不出四見故也今引古人之言證之如左宋丞相張商英無盡居士嘗以三教大要質疑於大洪報恩禪師曰清涼國師華嚴疏第三卷所云西域外道不出四見此方儒與道道謂老子亦不出四見何謂也願師明示報恩禪師答曰西域外道宗多塗要其會歸不出有無四見而已謂有見無見亦有亦無見非有非無見也蓋不即一心為道則道非我有故名外道不即諸法是心則法隨見異故名邪見如謂之有有則有無如謂之無無則無有有無則有見競生無有則無見斯起若亦有亦無見非有非無見亦猶是也夫不能離諸見則無以明自心無以明自心則不能知正道矣故經云言詞所説法小智妄分別不能了自心云何知正道又曰有見即為垢此則未為見遠離於諸見如是乃見佛以此論之邪正異途正由見悟殊致故也故清涼以莊老計道法自然能生萬物易謂太極生兩儀一陰一陽之謂道以自然與太極為因及一陰一陽為道能生萬物則是邪因計一為虛無則是無因嘗試論之夫三界惟心萬緣一致心生故法生心滅故法滅推而廣之彌綸萬有而非有統而會之究竟寂滅而非無非無亦非非無非有亦非非有四執既亡百非斯遣則自然因緣皆為戲論虛無真實俱是假名矣至若謂太極陰陽能生萬物謂儒也常無常有斯為衆妙之門謂道也陰陽不測是謂無方之神雖聖人設教示悟多方然既異一心寧非四見何以明之蓋虛無為道道則是無若自然若太極若一陰一陽為道道則是有常無常有則是亦有亦無陰陽不測則是非有非無先儒或謂妙萬物謂之神則是非物非物則亦是無故西天諸大論師皆以心外有法為外道萬法惟心為正宗蓋以心為宗則諸見自亡言雖或異未足以為異也心外有法則諸見競生言雖或同未足以為同也雖然儒與道之聖人固非不知之乃存而不論耳良以未即明指一心為萬法之宗如西天外道皆大權菩薩示化之所施為橫生諸見曲盡異端以明佛法是為正道此其所以為聖人之道順逆皆宗非思議之所能知矣古人有言緣昔真宗未至孔子且以繫心今知理有所歸不應猶執權教然知權之為權未必知權也知權之為實斯知權矣是亦周孔老莊設教立言之本意一大事因緣所成始所成終也然則三教一心同塗異轍究竟道宗本無言説非維摩大士孰能知此意也云云已上打破儒以太極陰陽為因老以自然為因並破耶教以天為生因皆不出於有無四見已下打破佛教中人亦有有無等諸見解差以毫釐謬以千里惟明眼人始能不惑即如教家不信禪機反笑其愚生間葛藤今論一例馬祖一喝百丈耳聾黃蘗吐舌臨濟禪師傳持心印尋常接人多用喝法師嘗曰吾有時一喝如金剛王寶劒有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用一喝之中機用具足等間儕輩莫測其意趙宋時臨濟宗派東京淨因繼成禪師同圓悟法真慈受并十大法師禪講千僧赴太尉陳良弼府齋時徽宗皇帝私幸觀之有善華嚴者賢首宗之義虎也對衆問曰吾佛設教自小乘至圓頓掃除空有獨證真常然後萬德莊嚴方名為佛嘗聞禪宗一喝能轉凡成聖與諸經論似相違背今一喝若能入吾宗五教五教謂小乘教始教終教頓教及圓教也是為正説若不能入是為邪見諸禪師視淨因繼成禪師淨因曰如法師所問不足勞三大禪師之酬淨因小長老可以使法師無惑也師召善華嚴善應諾師曰法師所謂華嚴宗五教愚法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空義也如我一喝非惟能入五教至於工巧伎藝諸子百家皆悉能入師震聲喝一喝問善曰聞麼曰聞師曰汝既聞此一喝是有能入小乘教須臾又問善曰聞麼曰不聞師曰汝既不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲銷汝復道無道無則原初實有道有則而今實無不有不無能入終教我有一喝之時有非是有因無故有無一喝之時無非是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱亡道有之時纖塵不立道無之時橫遍虛空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善華嚴乃起再拜師復謂曰非惟一喝為然乃至一語一默一動一靜從古至今十方虛空萬象森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界惟心萬法惟識四時八節陰陽一致謂之法性是故華嚴經法性遍在一切處有相無相一聲一色全在一塵中含四義事理無邊周遍無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在善華嚴又問曰如何是向上一路師曰汝且向下會取善曰如何是寶所師曰非汝境界善曰望禪師慈悲師曰任從滄海變終不為君通尚玄曰現今世界文明國之宗教不出於儒教景教及佛教而其所奉者或為多神或為一神或為無神具如上述又如野蠻未開之國尚有崇拜土木禽獸之神者故別附宗教形式比較圖以供諸方閲者之參考焉附宗教形式比較圖教別崇拜之神崇拜禮式修行方法信徒義務歸結方所世界各教多神或一神禮拜祈禱代人祈禱神界土石樹木神犧牲供養設誓修慈善事冥界禽獸神戲樂供養誦經盡力人事空界宮殿器物神洗罪想處地水火風神天堂山川神虛空神罔象神日月星辰雲雷雨雪等神司吉凶等神人身神祖先神天神天主尚玄曰朝鮮人所崇拜之神及其禮式照上兩所記之者幾盡有之就中尤崇祖先之神以栗木造神主時奉祭祀此西洋人所謂朝鮮人之祖先教者也佛教自性三寶禮拜懺悔弘法利生淨土平等一尊供養財供養身供養心供養法供養發願廣行善業即心是佛持戒變化惡俗廓然無聖讚歎研教救度苦厄平等法界無聖無凡歌詠觀心𠫵禪念佛誦呪作觀一切衆生皆具佛性隨喜心佛衆生三無差別行法究竟菩提歸無所得回向一宋儒謂祖源禪師曰佛氏常以因果驚恐愚俗之流言如人善定生天堂如人惡必入地獄六道輪回三塗業報如斯虛誕惑人之甚佛徒豈知人命終後氣化一陳清風身為一壞黃土一生已休有誰再來祖源禪師答曰無因無果天堂地獄盡屬虛偽人生一世死則歸無氣化清風身為黃土如君之説既無因果易經有曰積善之家必有餘慶積不善之家必有餘殃既無因果何言慶殃如無因果報應人生一世而已正好放蕩縱意行非死後不過化陳清風然則清風無情本無知覺程明道曰孝子祭祀祖考來格者是至誠有感必遵如斯之説祖考來格還是清風來格還是靈性來格若是靈性來靈性已成風若是清風來清風本無情莫是祖考死後性化無情之風子孫祭他之時復變靈性受祭之後還化清風如是往來變化真是奇怪之風明道又云鬼是往而不返之義既是往而不返子孫至誠感格又是有反真可笑了伊川云鬼神是二氣之良能陽氣生天為神陰氣下地為鬼如君既言因果是假堂獄非真陽氣生天為神陰氣下地為鬼又墮因果感應之內可歎俗儒不悟妙性非有非無不生不滅妄生斷滅自昧本真已上儒與禪問答上蔡謝氏良佐曰人死時氣盡也豫問明道有鬼神否明道曰道無爾怎生信道有爾但去尋討看橫渠云這個是天地間妙用這裏有妙理於若有若無之間須斷直得去不是鶻突自家要有便有要無便無始得鬼神在虛空中塞滿觸目皆是為他是天地間妙用祖考精神便是自家精神李屏山居士純甫曰明道之説出於未能事人焉能事鬼橫渠之説出於精氣為物遊魂為變是故知鬼神之情狀上蔡之説出於盛哉鬼神之德洋洋乎如在其上在其左右三子各得聖人之一偏耳竟墮於或有或無若有若無之間不覺鶻突豫觀聖人之言各有所主大抵有生有死或異或同無生無死非同非異人即有形之鬼鬼即無形之人有心即有無心即無耳聖人復生不易吾言矣已上儒與佛者之説鬼尚玄曰儒家者流皆主斷滅之説即謂但知現在世之事而已至如過去世及未來世之事非儒者之所欲究也此佛所謂斷見外道也今夫宗教之主持斷滅不説因果者其教亦隨以滅觀於老墨之教可知焉已蓋老子之教主放任自然有破壞而無建立故可以備一家之哲學不可以為千古之世教宜其滅絶也墨子之教主兼愛而尊天敬鬼然有天志墨書篇名而無天堂之福有明鬼墨書篇名而無地獄之罪是人之從墨子者苦身焦思而無報違墨子者放僻邪侈而無罰也故上下之人均不樂之而其教遂亡諸教之盛衰亶在乎教理也明矣今夫儒教之曰天命曰天性曰天理曰天人相與之際董仲舒天人策曰道之大原出於天韓愈原道亦皆認天為造化之主宰其説與景教同而但其言性者概多包含道德義理等義稍費解釋非如佛教之言心性景教之言靈魂之單純直捷也其言命者亦多包含命令運數因緣等義佛家所謂業緣也非盡如世俗所謂生命之命也且其言天者亦無界説雖謂現生之性命是天之所賦而不明言其受生之因由亦不言死後歸屬之處是即以不明為天以不知為天故子貢曰夫子之言性與天道不可得而聞也者此也儒教之言鬼神則論語曰敬鬼神而遠之又曰子不語怪力亂神又曰非其鬼而祭之諂也又曰未能事人焉能事鬼是認鬼神於有無之間而不為尊事之矣故墨子曰儒以天為不明以鬼為不神者也支那近日儒教哲學者章炳麟之説曰孔子所以凌駕千聖邁迹百王者獨在天為不明及無鬼神二事也荀子儒效篇云非天之道非地之道人之所以道也此所以儒者窮極高遠測度深源之義也若夫天體彼蒼蒼者非有形質蓋天本無物故無字從天詘之以指事因下民所見不得無所指名故強以顛義引申之曰天爾雅曰天者顛也六經言天帝者是周公以前之書而孔子刪述未或更改若曰道曰自然而已矣郊祭大報天而主日萬物之生皆賴日光熱而非有賴乎天故假言曰帝其真即日也日雖昭昭大明而非有福善禍之志况乎無形質之天也哉惟孔子明于庶物察于人倫知天為不明知鬼神為無遂以此為拔本塞源之義而萬物之情狀大著矣何以知無鬼神曰斫卉木磔羊彘未聞其有鬼神彼人固不得獨有也人之所以有知者分于父母之精蟲胚珠是也二者又攝引各質點以為我有使成官骸而七情益擴故成此知識由于兩精相搏以生神明也斯如雨水相觸即便生浪水猶精浪猶神而兩水之所以相觸者亦先有其浪則父母交感之神也兩味相和乃生雋永及精氣相離而死則神亦無存譬之水既淤堙浪即無有兩味化分尋索雋永了不可得故精離則死死則無知其流定各質久則合于他物或入草木或人胎卵未有不化者此精氣為物也氣不聚者散而從于空氣渙然飄泊此遊魂為變也夫焉有精化既離而神識能獨存者乎圓覺經云我今此身四大和合髮毛爪齒皮肉筯骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處庵提遮女了義經云若能明知地水火風四緣畢竟未曾自得有所和合以為生義若知地水火風畢竟不自得有所散是為死義是佛家亦以各質相摩而生各質相離而死而必言即合即離生死一致則為遁辭矣云云尚玄又曰今以佛理難彼儒説一切衆生從無始來妄識分別輪轉生死四大和合名之為生四大分離名之為死妙明真心常住不滅今彼儒言人所以有知者分于父母之精蟲胚珠兩精相搆以生神精云者小學之童亦知此理但未知者是精蟲胚珠之所自出也今言精蟲胚珠受之父母父母之精蟲胚珠受之祖父母如是逆溯窮尋其源未委其源究竟何狀若如基督之言天賦初人之靈魂而後世人之靈魂皆初祖亘古所遺之分子抑有説焉何以故彼云天主全智全能無怪其能造靈魂也今若言蟲珠無從自有且言神識生有死無即是所謂斷滅見也圓覺經所云四大各離妄身何在者但謂虛妄之身相滅非謂妙明之性相滅也水猶精浪猶神亦是錯喻蓋覺性似海妄身如漚故圓覺經云即知此身畢竟無體和合為相實同幻化四緣假合妄有六根六根四大中外合成妄有緣氣於中積聚似有緣相假名為心此虛妄心若無六塵則不能有四大分解無塵可得於中緣塵各歸散滅畢竟無有緣心可見彼之衆生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅譬如磨鏡垢盡明現即此可知彼幻滅者是塵垢之幻身也非幻不滅者是本明之真性也又依佛説天地萬物皆從心想中所生者則雖無情之物不可云無佛性也如磁石之引針琥珀之拾芥人蔘之忌鐵胡桃之制銅皆有好惡生克之理不可得謂無覺性也故圓覺經云有性無性齊成佛道楞嚴經有世界衆生生起相續之理即如想澄成國土知覺乃衆生又如異見成憎同想成愛流愛為種納想成胎交遘發生吸引同業故有因緣此謂胎生必父母己三緣和合然後有生故知神識精蟲乃非二物識是生因精是生機精如種子識如昧性展轉流注迷入六趣悟得七果七常住果謂菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智平州僧遁為金國祖按高麗史睿宗十年宋政和五年遼天慶五年春正月生女真完顏阿骨打稱皇帝更名旻國號金是為金太祖或曰昔我平州僧今俊遁入女真居阿之古村是為金之先或曰平州僧金幸之子克守初入女真阿之古村娶女真女生子曰古乙太師古乙生活羅太師活羅多子長曰劾里鉢季曰盈歌盈歌最雄傑得衆心盈歌死劾里鉢長子烏雅朿嗣位烏雅朿卒弟阿骨打立先是睿宗四年六月東蕃使裊弗史顯等來朝奏曰昔我太師盈哥嘗言我祖宗出自大邦至于子孫義合歸附今太師烏雅朿亦以大邦為父母之國又於睿宗十二年三月阿骨打遺雅只等寄書稱兄弟曰自我祖考介在一方以契丹為大國高麗為父母之邦小心事之云云尚玄曰非徒金國之先出自高麗渤海與遼之先亦皆出於高句麗矣何以知其然也按釋鑑稽古略續集宋政和四年大遼天慶四年女真阿骨打十三年秋八月叛遼女真金也世本新羅人號完顏氏完顏猶漢言王也世為酋長服屬大遼二百年世襲節度使至龕福下四世妻女真女生二子長曰胡來胡來生三子長曰核里次曰蒲剌朿季曰楊割楊割與盈歌音相同楊割生三子長曰阿骨打次曰吳乞馬季曰思改思改生粘罕女真至楊割太師始雄諸部丙子歲蕭解里嘯聚遼捕之遂投生女真界遼命楊割圖之楊割但斬解里遺長子阿骨打獻首級於遼自此楊割內恃有功陰懷異志楊割死阿骨打元年會遼主天祚掊剝是嗜上下荒淫其相李儼蕭奉先輩庸瑣貪婪阿骨打承其父楊割富庶之餘兵強馬壯力有異圖先是女真之地東北鄰於五國五國之東接大海出名鷹自海東來者謂之海東青小而俊健能擒鵝鶩爪白者尤以為異遼人酷愛之天祚嗣位責貢尤苛逼其國人窮取以獻女真至五國戰鬪而後得女真苦之且沿邊諸帥邀求賂遺無虛日不勝其擾諸部怨叛於遼潛結阿骨打舉兵謀亂至是甲午年秋八月阿骨打始叛用粘罕胡捨為謀主銀朮割移烈婁宿闍母等為將帥甲馬二千犯混東江之東寧江府天祚遣兵禦之皆敗遂失寧江州阿骨打將兵轉戰而前乙未年秋八月遼主天祚下詔親征女真路出長春軍中一夕戈甲有光遼相張琳曰唐莊宗攻梁矛戟夜有光郭崇鞱曰火出兵入破賊之兆天祚喜而信之十一月進戰兵潰天祚一日一夜走五百里退保長春女真乘勝遂併渤海遼陽等五十四州遼志由是言之滿清之愛新覺羅氏之祖亦出於我東矣真覺師集禪門拈頌高麗真覺國師法諱慧諶自號無衣子俗姓崔氏羅州和順縣人參謁佛日普照國師得法機緣具載碑文之中師集述禪門拈頌共成三十卷與景德傳燈録並美遂為海東禪家宗寶之書其自序有曰詳夫自世尊迦葉已來代代相承燈燈無盡遞相密付以為正傳其正傳密付之處非不該言義言義不足以及故雖有指陳不立文字以心傳心而已好事者強記其迹載在方册傳之至今則其粗迹固不足貴也然不妨尋流而得源據末而知本得乎本源者雖萬別而言之未始不中也不得乎此者雖絶言而守之未始不惑也是以諸方尊宿不外文字不吝慈悲或徵或拈或代或別或頌或歌發揚奧旨以貽後人則凡欲開正眼具玄機羅籠三界提拔四生者捨此奚以哉况本朝自祖聖會三已後以禪道延國祚智論鎮鄰兵而悟宗論道之資莫斯為急故宗門學者如渴之望飲如飢之思食余被學徒力請念祖聖本懷庶欲奉福於國家有裨於佛法乃率門人真訓等採集古話凡一千一百二十五則并諸師拈頌等語要録成三十卷以配傳燈所冀堯風與禪風永扇舜日共佛日恆明海晏河清時和歲稔物物各得其所家家純樂無為區區之心切切於此耳第恨諸家語録未得盡覽恐有遺脫所未盡者更待後賢貞祐金國年號十四年丙戌仲冬海東曹溪山修禪社無衣子序玄曰拈頌集三十卷不過採集前人之述作而已不足為貴今師所作曹溪録鈔數編詩歌間曠自在可以見其證道之深雖古祖師無過於此也寓轉物庵五峯山前古巖窟中有一庵名轉物我棲此庵作活計只可呵呵難吐出缺脣垸折腳鐺煮粥煎茶聊遣日踈慵不掃復不芟庭草如雲深汲膝晚起不知平旦寅早眠不待黃昏戌不洗面不剃頭不看經不持律不燒香不坐禪不禮祖不禮佛人來怪問解何宗一二三四五六七莫莫莫密密密家醜不得外揚摩訶般若波羅蜜對影池邊獨自坐池底偶逢僧默默笑相視知君語不應余夢見大悲菩薩謂余曰子能正印否豫應之曰將印來菩薩舉手作提勢通身放光遍照天地遂步虛而往豫亦從之及覺乃作讚曰稽首觀世音大悲老婆心手提無文印印我鼻孔深豈唯印無文身亦無處深而常不離此清風散竹林示湛靈上人求六針眼針塵中有大經如何看不了速撥律陀眼早開迦葉笑鬱鬱澗邊松青青原上草咄咄咄漏逗也不少耳針莫逐五音去五音令汝聾觀世音安在圓通門不封磬搖明月響砧隱白雲春噁噁噁好與三十棒鼻針香處勿妄開臭中休強塞不作佛香天况為尸注國鐺中煎緑茗爐上燒安息呵呵呵甚處求知識舌針不貪法喜羞况嗜無明酒莫説野狐禪終日虛開口默入獅子窟語出獅子吼須知語默外更有那一句身針莫咬一粒米莫挂一條絲恐失家常飯復染娘生衣壺中一天地劫外四威儀汝若不如是何名出家兒意針忘懷墮鬼窟看意縱猿情更擬除二病未免野狐精水任方圓器鏡隨胡漢形直饒伊麼去猶較患聾盲海陽信士十餘人到庵求法舉瑞巖主人公話因説七偈主人公諾聽我針最好堅除殺盜淫火聚刀山誰做得都緣是汝錯行心主人公諾聽我諭到處逢人須慎口口是禍門尤可防維摩默味宜參取主人公諾聽我辭十惡冤家速遠離惡自心生還自賊樹繁花果反傷枝主人公諾聽我語旦暮浮生能幾許昨日虛消今日然生來死去知何處主人公諾惺惺著十二時中常自覺從來身世太無端夢幻空花休把捉主人公諾心耶佛非佛非心亦非物畢竟安名喚作誰喚作主人早埋沒咄座右銘菩薩子菩薩子常自摩頭深有以摩頭因得深思量出家本意圖何事僧其相貌俗其心可不慙天而愧地粗行狂言任汝為鑊湯爐炭何回避得度時辭家詩志慕空門法灰心學坐禪功名一墮甑事業恨忘筌富貴徒為爾貧窮亦自然吾將捨閭里松下寄安眠真一上人來言曰某乙賦性散亂未能調攝或於靜處捺伏則便落昏沉惟此二病是患請得法偈為對治方實際本來湛寂神機自爾靈明任運忘懷虛浪何關沉掉兩楹惺惺無忘曰真寂寂不分是一但能不負汝名何用別求他術孤憤歌兒時作人生天地間百骸九竅都相似或貧或富或貴賤或妍或醜緣何事曾聞造物本無私乃今知其虛語耳虎有爪兮不得翅牛有角兮不得齒蚊虻有何功既翅而又觜鶴脛長兮鳧脛短鳥足二兮獸足四魚巧於水拙於陸獺能於陸又能水龍蛇龜鶴數千年蜉蝣朝生暮當死俱生一世中胡奈千般萬般異不知然而然夫誰使之使上以問於天下以難於地天地默不言與誰論此理胸中積孤憤日長月長銷骨髓長夜漫漫何時曉頻向書窗啼不已代天地答萬別千差事皆從妄想生若離此分別何物不齊平息影庵銘身動而行人見其迹心動而行鬼見其迹身心俱不動人鬼無以覔况本無身心何曾有動靜若了如是是真息影大人銘并序余曾讀契經至惡事向自己好事與他人之語吟玩不已以謂寬腸大肚者之所行也因以居懷每當疑謗之間未嘗與人辨之但微笑而已乃作大人銘以自勉焉銘曰菩薩所養如拭塵巾攬垢在己推淨與人我雖不肖以是自珍不知我者視我如塵含垢忍耻內不失真願言同學聞者書紳大法寶海印藏經板釋迦世尊入涅槃後迦葉阿難初為結集成經藏律藏至于後世加入論藏謂之三藏三藏經典或稱大藏亦云海藏今世界大藏經共有八種而其六種皆用漢文漢魏六朝隋唐漸次譯出唐智升之開元釋經目録藏經定為五千零四十八卷共為六百億三萬一千八百八十字又據至元法寶勘設同總録之統計則譯經始自後漢明帝永平十年至至元二十二年約千三百年從事翻譯有百九十四人共成千四百四十部五千五百八十六卷海東前後所得藏經如左三國遺事云真興王代天嘉六年乙酉陳使劉思與釋明觀載送佛經論一千七百餘卷貞觀十七年慈藏法師載三藏四百餘函來安于通度寺興德大王代大和元年丁未入學僧高麗釋丘德賫佛經若干函來王與諸寺僧徒出迎于興輪寺前路大中五年入朝使元弘賫佛經若干軸來羅末普耀禪師再至吳越載大藏經來即海龍王寺開山祖也大宋元祐甲戌有人真讚云偉哉初祖巍乎真容再至吳越大藏成功賜䘖普耀鳳詔四封若問其德白月清風又大定中漢南管記彭祖逖留詩云水雲蘭若住空王况是神龍穩一場畢竟名藍誰得似初傳像教自南方有跋云昔普耀禪師始求大藏於南越洎旋返次海風忽起扁舟出沒於波間師即言曰意者神龍欲留經耶遂呪願乃誠兼奉龍歸焉於是風靜波息既得還國遍賞山川可以安邀處至此山忽見瑞雲起於山上乃與高弟弘慶經營蓮社然則像教之東漸實始乎此漢南管記彭祖逖題寺有龍王堂頗多靈異乃當時隨經而來止者也至今猶有又天成三年戊子默和尚入唐亦載大藏經來本朝睿廟時慧照國師奉詔西學市遼本大藏三部而來一本今在定惠寺海印寺有一本許參政宅有一本大安二年本朝宣宗代祐世僧統義天入宋多將天台教觀而來此外方册所不載高僧信士往來所賫不可詳記大教東漸洋洋乎慶矣哉讚曰華月夷風尚隔煙鹿園鶴樹二千年風流海外真堪賀東震西乾共一天宋本藏經契丹本藏經及高麗本藏經如左新羅敬順王元年戊子後唐天成三年高麗太祖十一年八月沙門洪慶新羅僧也自唐閩府載大藏經一部至禮成江高麗王親迎之置帝釋院麗史高麗成宗八年己丑即宋端拱二年高麗遺僧如可賫表來覲請賜大藏經賜之仍賜如可紫衣歸國宋史高麗成宗十年辛卯宋淳化二年韓彥恭自宋還獻大藏經王迎入內殿邀僧開讀下教遣翰林學士白思柔如宋謝賜經以下麗史高麗穆宗七年甲辰宋景德元年契丹統和二十二年復遣使于宋求官本藏經將固有之前後二藏及契丹藏本校合而刊刻之此謂高麗藏本高麗顯宗十三年壬戌宋乾興元年契丹太平二年五月韓祚還自宋帝賜釋典一藏高麗文宗十七年癸卯宋嘉祐八年契丹清寧九年三月丙午契丹送大藏經王備法駕迎于西郊又三十七年癸亥宋元豐六年遼大康九年三月己丑命太子迎宋朝大藏經置于開國寺仍設道場高麗宣宗三年丙寅宋元祐元年遼大安二年六月釋煦祐世僧統還自宋煦獻釋典及經書一千卷又於興王寺教藏都監購書於遼宋日本多至四千卷悉皆刊行又四年丁卯二月甲午幸開國寺慶成大藏經三月己未王如興王寺慶成大藏殿甲戌宋商徐戩等二十人來獻新注華嚴經板四月庚子幸歸法寺慶成大藏經八年閏八月甲子設藏經道場于會慶殿十年夏四月設藏經道場于會慶殿高麗睿宗二年丁亥宋大覲元年遼乾統七年春正月庚寅遼遣高存壽來賀生辰仍賜大藏經高麗高宗三十八年辛亥宋淳祐十一年蒙古憲宗元年九月壬午幸城西門外江華大藏板堂率百官行香顯宗時板本燬於壬辰蒙兵王與羣臣更願立都監十六年而功畢高麗元宗十三年壬申宋咸淳八年元至元九年三月甲辰置鈿函造成都監以皇太后欲盛藏經而求之也時還都舊京才二年也高麗藏本造成之後尚求宋本藏經諸證如左東國輿地勝覽云江華傳燈寺在吉祥山元至元十九年忠烈王八年忠烈王元妃貞和宮主王氏囑僧印奇航海入宋印大藏來藏寺中輿地勝覽又云豐德報法寺在末訖山李穡記王城之南白馬山之北有大伽藍焉太祖妃柳氏所捨家也所施田民至今存焉中廢者久侍中漆原府院君尹公與禪源法蘊和尚同盟重營始於至正己未工役將訖又謀曰大藏經不可無於是取諸江浙戊子歲也撤所居西堂以庇經壬辰歲也殿宇既備梵唄之具日用之需無一闕設落成初會癸巳歲也歲辛丑設落成中會冬為沙賊所蹂躪殿宇器皿四經卷像設存者蓋鮮國家克復京城之後稍修葺之邀曹溪禪師行齋主席又取經江浙明年器皿又完白羊寺事迹中轉藏榜云王師覺儼尊者付囑門人等重新佛宇相國洪綏發願捨賄使覺儼門人心白智孚等航海入宋辦大藏經當至正元年辛巳之春忠惠王二年招集諸山碩德修轉藏之法會以落之云云等尚玄曰按此高麗藏經板本即自高宗二十四年經始雕造至十六年而後始畢其役蓋參酌北宋本及契丹本等為之而沙門守其奉敕校勘初置江華府禪源寺後至朝鮮太祖七年自禪源寺移置京城之支天社又自支天移于海印而但不知第在何年耳日本人文學士高橋亨嘗述海印寺大藏經板本來歷余得其本縮譯如左按高麗大藏經板本緣起有二焉其一則成於顯宗時藏于符仁寺在天公山不幸於高宗十九年壬辰為蒙古兵亂燒燬其二則雕造始於高宗二十四年丁酉終於三十八年辛亥前後費了十六年而完成高麗史高宗三十八年辛亥九月壬午幸城西門外大藏板堂率百官行香顯宗時板本燬於壬辰蒙兵王與羣臣更願立都監十六年而功畢李相國奎報集丁酉年分高宗二十四年大藏刻板君臣祈告文曰國王諱謹與太子公侯伯宰樞文虎百寮等熏沐齋戒祈告于盡虛空界十方無量諸佛菩薩及天帝釋為首卅三天一切護法靈官甚矣獺狚之為患也其殘忍凶暴之性已不可勝言矣至於癡暗昏昧也又甚於禽獸則夫豈知天下之所敬有所謂佛法者哉由是凡所經由佛像梵書悉撲滅之於是符仁寺之所藏大藏經板本亦掃之無遺矣嗚呼積年之功一旦成灰國之大寶喪矣雖在諸佛多天大慈之心是可忍孰不可忍耶因竊自念弟子等知昏識淺不早自為防戎之計力不能完護佛乘故致此大寶喪失之災實弟子等無狀所然悔可追哉然金口玉説本無成毀其所寓者器耳器之成毀自然之數也毀則改作亦其所也况有國有家崇佛法固不可因循姑息無此大寶則豈敢以役巨事殷為慮而憚其改作耶今與宰執文虎百僚等同發弘願已署置旬當官司俾之經始因考厥初草創之端則昔顯宗二年契丹主大舉兵來征顯祖南行避難丹兵猶屯松嶽城不退於是乃與羣臣發無上大願誓刻成大藏板本然後丹兵自退然則大藏一也先後雕鏤一也君臣同願亦一也何獨於彼時丹兵自退而今獺狚不爾耶但在諸佛多天鑒之何如耳苟在至誠所發無愧前朝則伏願諸佛聖賢三十三天諒懇迫之祈借神通之力使頑戎醜俗厥蹤遠遁無復蹈我封疆干戈載戢中外晏如母后儲君享壽無疆三韓國祚永永萬世則弟子等當更努力益護法門粗報佛恩之萬一耳弟子等無任懇禱之至伏惟照鑒此則高宗丁酉藏經板本雕造始役之事也又李奎報之嗣孫李益培撰李相國集跋文有曰嗣孫益培言祖文順公全集四十一卷後集十二卷年譜一軸行于世者尚矣多有訛舛脫漏之處今者分司都監騅海藏告畢之暇奉敕鏤板豫幸守此郡以家藏一本讐校流通耳辛亥歲高麗國分司大藏都監奉敕雕造校勘河東部監務管句學事將仕郎良醞令李益培副使晉州牧副使兵馬鈐轄試尚書工部侍郎金光宰此則高宗辛亥藏經板本雕造告畢之證也海印寺所藏大藏經板本每於卷尾有云自丁酉至辛亥由是觀之事實尤確又於本藏裝函有書云高麗國新雕大藏經校正別録三十卷海東沙門守其編守其之事迹出於崔滋之破間集開泰寺僧守其學博識精奉敕勘大藏經正錯如素所親譯云云則守其之為高宗朝人也明矣尚玄曰守其或作守真見別本大藏經板本既成之後藏于何處史無明文但知忠肅王五年尚在江華島按忠肅王元年天台宗僧國統無畏為靈鳳山龍巖寺住持五年王重創此寺以舊大藏經腐蝕之故有更新印出奉納之事朴全之龍巖寺重創記曰其大藏之補也向之場李公方別受上命造雪箋三萬餘幅漆函一百四十副以助之師之門人大禪師承淑中德日生等就江華板堂印出闕函闕卷闕張而來新舊并六百餘函皆衣以黃紙幅以黃絹合安于新殿藏中輿地勝覽龍藏寺在江華府西四里大藏經板堂亦在西門外雖然忠定王二年庚寅四年壬辰恭愍王元年之頃大藏經板本不能留藏于江華島也何則按牧隱集戊午辛禑王四年秋作砥平縣彌智山龍門寺大藏殿記曰大藏一部某官某之所施也始置于江華府龍藏寺避不虞也自庚寅歲忠定王二年倭人犯濱海郡邑而江華當要衝尤被其害具氏孫女卒萬戶印璫妻率宰臣吳子淳室謀曰吾大父歸依大法而施大藏不幸為賊所躪亡失者幾半盍補正之於是移之敬天寺豐德籤題函藏完舊若新又按高麗史則自庚寅年倭寇漸劇翌翌年壬辰焚喬桐甲山倉當是之時藏經板本若在江華必不得安全矣故移安板本於海印寺應在此前而大都要不出於六十三年間自忠肅王五年戊午至辛禑王七年辛酉之事也辛禑王七年辛酉李牧隱為其亡父李稼亭名穀之立願藉沙門無及琇峯普濟國師懶翁門人之力而募緣於慶尚忠清平安等道印出大藏經一部奉納于驪州神勒寺李崇仁神勒寺大藏閣記曰至辛酉辛禑王七年洪武十四年四月印出經律論九月粧褙十月覺珠泥金題目覺峯造黃復十二月性空造函壬戌正月於華嚴靈通寺轉閲靈通寺在長湍郡五冠山牧隱集雪牛説曰乳上人者普濟即懶翁也之徙也印大藏經與焉讀大藏經亦與焉李崇仁陶隱集有睡菴長老印藏經于海印寺戲呈詩已上高橋天室所考據者尚玄曰據上諸證則藏經板本自江華移置海印寺似在麗朝然又有一疑問即如朝鮮歷代實録云太祖七年戊寅五月丙辰幸龍山江大藏經板輸自江華禪源寺戊午雨令隊長隊副二千人輸經板于支天寺按支天寺近於太平館即古慕華館見太宗八年實録雖然太祖二年癸酉七月重營古塔于海印寺願成大藏以安于塔見太祖御製跋文則成此大藏之時江華經板非在海印寺也明矣然則分司雕造之經板置于海印寺亦未可知也殿庭飯僧數盈萬人尚玄曰高麗時伐世世列王無不飯僧或於殿庭或於寺院其數動盈千人萬人乃至三萬人若忠宣王特又立願飯百八萬僧點百八萬燈日飯二千僧點二千燈五日可滿僧一萬燈一萬期以畢願謂之萬僧會其費不資今俗有萬釋僧之諺蓋自麗代飯僧故事而流傳者也高麗光宗廣設齋會無賴之徒詐為出家以求飽丐飫者坌至云云推此可知萬釋僧之語也佛説四十二章經云佛言飯惡人百不如飯一善人飯善人千不如飯一持五戒者五戒謂不殺生不偷盜不邪不妄語不飲酒飯持五戒者萬不如飯一須陀洹須陀洹此云入流謂預入聖人之流也飯五萬須陀洹不如飯一斯陀含此云一來謂更來欲界一度受生飯千萬斯陀含不如飯一阿那含此云不來謂不來欲界受生也飯一億阿那含不如飯一阿羅漢義翻殺賊亦曰不生亦云應供飯千億阿羅漢不如飯一辟支佛此云圓覺即緣覺也飯百億辟支佛不如飯一三世諸佛飯千億三世諸佛不如飯一無念無住無修無證者云云若使麗代所飯之僧個個無念無住無修無證則其功德有不可稱量者也雖然吾恐詐為出家以求飽飫者多而無念無住無修無證者少則不過費巨資而施小惠而已不為功德反招怨咎也寺門行香親率百官高麗文宗二十一年興王寺成凡二千八百間十二年而功畢王命擇有戒行僧一千赴會仍令常住特設燃燈大會五晝夜敕令百司及安西都護開城府廣水楊東樹五州江華長湍二縣自闕庭至寺門結綵棚櫛比鱗次連亘相屬輦路左右又作燈山火樹光照如晝是日王備鹵簿率百官行香施納財嚫佛事之盛曠古未有尚玄曰親率百官寺門行香高麗之代無王不行非徒為崇敬三寶而已蓋亦有祖先真影故也至于朝鮮太祖行之於三角山津寬寺水陸道場追福祖宗及戰亡將卒是也即位六年丁丑事也又世祖行之於俗離山福泉寺率宗勳政府六曹百僚將相入極樂殿法場供養三寶是也天順八年二月二十八日事也蓋時君既以佛為宗教則其行香拜敬者情禮所必然之事也君王拜孔人以為常君王拜佛人以為變者何也所奉宗教之觀念則然也雖然高麗王氏之拜佛猶朝鮮李氏之拜孔也觀乎麗季安珦之香燈處處皆祈佛絲管家家盡禮神獨有一間夫子廟滿庭春草寂無人之句則可知也朝鮮儒家於孔子廟春秋釋奠朔望焚香蓋其禮俗沿自高麗見忠宣王即位之戊申十一月在梨峴新宮下教及忠肅王元年之下教也佛家則於每月之十齋日有戒殺及一食等事而今俗效倣西人每於日曜説法布教蓋因其日公私人員多休息故也附七曜日之出處按大藏經中宿曜曆經七曜直日曆品第八云夫七曜者所謂日月五星下直人間一日一易七日周而復始其所用各各於事有宜者不宜者請細詳用之忽不記得但當問胡及波斯并五天竺人總知尼乾子末摩尼印度外道之名常以密日持齋亦事此日為大日此等事持不忘故今列諸國人呼七曜如後日曜太陽胡名蜜波斯名曜森勿天竺名阿儞泥以反底耶二合月曜太陰胡名莫波斯名婁禍森勿天竺名蘇上摩火曜熒惑胡名雲漢波斯名勢森勿天竺名糞盎聲哦囉迦盎水曜辰星胡名嘻丁逸反波斯名掣森勿天竺名部引陀木曜歲星胡名鶻勿波斯名本森勿天竺名勿哩訶娑跛底丁以反金曜太白胡名那歇波斯名數森勿天竺名戌羯羅土曜鎮星胡名枳院波斯名翕森勿天竺名賒乃以室折囉由是觀之七曜之名肇自西域由波斯而輾轉及於小亞細亞以至希臘羅馬仍用其名瞭然可知今世之人皆信七曜出自西人不亦誤乎山寺燃燈乃為年例高麗顯宗元年庚戌閏二月甲子復燃燈會國俗自王宮國都以及鄉邑以正月望燃燈二夜此即上元觀燈自成宗以來廢而不舉至是復之又二年辛亥二月乙未設燃燈會于行宮是後例以二月望行之德宗元年壬申二月燃燈幸王輪寺靖宗四年戊午二月燃燈王如奉恩寺光宗二年創此寺于城南為太祖願堂謁太祖真燈夕必親行香真殿以為常自是以後高麗諸王每年二月一遵常例奉而行之蓋燃燈所以事佛也行香所以拜祖也至恭愍王始以佛誕日燃燈火戲麗史恭愍王元年壬辰夏四月庚戌王以佛生日燃燈禁中飯僧一百設火山雜戲奏妓樂以觀尚玄曰至于朝鮮例以四月八日燃燈見慵齋叢話是日也宮中命多造紗燈或作塔形或八角形不等分送各處寺院燃燈祝福蓋其俗自高麗時相沿而來耳閭巷呼旗便成國俗麗史云恭愍王十三年甲辰夏四月辛丑燃燈觀呼旗戲於殿庭賜布國俗以四月八日是釋迦生日家家燃燈前期數旬羣童剪紙綴竿為旗周呼城中街里求米布為費謂之呼旗朝鮮成俔慵齋叢話有曰四月八日燃燈俗言釋迦如來誕生辰也春時兒童剪紙為旗剝魚皮為鼓爭聚為羣巡閭巷乞燃燈之具名曰呼旗至是日家家樹竿懸燈豪富者大張彩棚層層萬盞如星排碧落都人終夜遊觀無賴少年或仰而彈之以為樂今者不崇佛教雖或設之不如昔時之盛云云尚玄曰呼旗之俗未知廢在何時而樹竿張彩懸燈遊觀距今四五十年前猶盛行於漢城鍾路四街市井六房京城鍾樓四街有六房商棧俗名賣紬緞之房曰立廛賣綿布之房曰白木廛賣麻布之房曰布廛賣紙物之房曰紙廛賣苧布之房曰苧布廛賣絹布之房曰綿紬廛此為鍾路六矣廛而可謂專賣壟斷之處爭奢競侈頗屬壯觀吾年今四十八歲雖不能目睹之在鄉曲時猶耳聞之矣家家燃燈今猶行之每年四月八日於鍾樓大道賣紙造紗製之各鍾燈并與小形傀儡及其他種種兒戲之具又滿城士女著新鮮衣裳奔波寺廟遊戲一日此乃自古流傳慶讚佛誕之俗也又慵齋叢話七月十五日俗呼為百種僧家聚百種花果設盂蘭盆會京中尼舍尤甚婦女坌集納米穀唱亡親之靈而祭之往往僧人設卓於街路而為之今則痛禁而少戢云云此等風俗今亦有之七月十五日在京城則婦女出往佛寺假設靈牌燒香上供以祭父母祭畢燒牌多有泣者依俗家行祭之例以七月十四夜為之非也是日之夜輕薄無賴之徒成羣作隊調戲善女醉驅香徒之事比比有之至於近年因有巡警之紏察其斃少止也在鄉曲則是日也農夫牧子皆為休息定集會之場為相撲之戲以為樂俗所謂過百種名日也諸如此類可見習俗因佛事而成者居多也百種亦或云百終謂百日之終皆俗稱也按佛制以年之四月十五日陰曆僧衆結制禁足謂之休夏亦云安居蓋即坐禪研教工夫修養之謂也至七月十五日陰曆始得解制謂之解夏自恣有疑則稟決於師有得則吐露於衆故亦謂之白衆日蓋僧以是日計臘也所謂盂蘭盆義譯救倒懸佛有第子摩訶此云大也目犍連稱為神通第一以天眼觀察其母在世時做惡業故入地獄中受倒懸之報目連尊者欲救其母乃於解制日辦至誠心供養僧衆以是功德因緣其母得解倒懸之苦今人效尊者故事乃以是日薦度父母供佛施餓因以成俗云爾或云三元上元正月十五日中元七月十五日下元十月十五日本屬道家之物而被竊於佛家若爾則三元之中奚獨取中元耶可知其非有實也羅禪師綾首座得批高麗忠烈王七年夏四月丙寅朔幸合浦庚辰王至合浦六月癸未王次慶州下僧批僧輩以綾羅賂左右得職人謂羅禪師綾首座娶妻居室者居半麗史昔西漢之末劉更始為人懦弱濫授官爵長安語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯高麗之羅禪師綾首座亦此之比也可謂天下無不對也按高麗有僧職下批之法而不經諫官之署告身則不得施行之例即如忠肅王元年甲寅曹溪宗僧景麟景聰俱有寵於上王上王即忠惠王也出入禁闥授大禪師諫官不署告身上王怒召右獻納李朝隱右思補禹儞左思補尹頎誚讓諫官猶不署又召朝隱等出御別殿南門歷問其由欲杖之儞廷辨慷慨王悟怒稍解然以朝隱主僧批流祖忽島既而召還削職左遷頎儞等又有寺社住持注擬下批特別之例即如恭愍王五年丙申夏四月癸酉封普愚為王師王邀愚于延慶宮行師弟禮時僧徒求住寺者皆附愚干請王曰自今禪教宗門寺社住持聽師注擬寡人但下除目耳於是僧徒爭為門徒不可勝計至於封拜王師國師禮甚鄭重先遣重臣三請不讓然後王必親詣拜為師今舉五例一坦文王師高麗光宗十九年冬十月王以大師釋門宗主險道導師乃遣緇素重使奉疏請為王師大師之讓曰心珠靡瑩月鏡無懸猥為王師即僧豈敢王乃言曰高山仰止何日忘之將聞混法之源實切崆洞之請大師乃言僧唯有心於歸佛苟無力於致君尚以過沐末由膠讓乃使太相金遵巖等奉徽號為王師弘道三重大師翌日王躬詣內道場拜為師二圓空國師智宗開寶二年高麗光宗二十年春有詔曰朕聞上從軒皇下逮周發皆資師保用福邦家所以崇德象賢亦不敢倚一慢二者也今觀大禪師識超卷內心出環中灑甘露於敬田融寶光於實際總持至理開悟衆迷朕何不師之乎羣臣罔有異辭僉云可矣乃遣亞相庾方密使張延祐執憲李昉等續奉九重之命往扣玄闕纍伸三返之儀斳開絺帳師以月讓雖固天心不移安能道隱無名止合趣時貴近遂因循而應之然後王親詣拜為王師三大鑑國師坦然嘗寫所作四威儀頌并上堂語句附商舶寄大宋育王山介諶禪師印可諶乃復書極加歎美又有道卿膺壽行密戒環戒環注楞嚴經及法華經慈仰時大禪伯也乃致書通好約為道友仁宗二十四年乙丑王尊師道德四月七日右副承宣李輔豫傳宣以致師事之意師不從又遣知奏事金永寬繼傳上意師復牢讓至于再三然王亦勤請不已五月六日始降請封王師書是日封王師時大旱天乃大雨王謂封崇耆德所致益加信嚮厥明就金明殿行北面摳衣之禮造赤黃羅地繡帖袈裟上之四普覺國尊忠烈王九年春王謂羣臣曰我先王皆得釋門德大者為王師又大者為國師在否德獨無可乎今雲門和尚名見明號一然道尊德盛人所共仰豈宜寡人獨蒙慈澤當與一國共之於是遣右承旨廉承益奉綸旨請行闔國尊師之禮師上表固讓上復遣使牢請至三仍命上將軍羅裕等册為國尊號圓徑沖照册訖四月辛卯迎入大內躬率百僚行摳衣禮改國師為國尊者為避大朝國師之號也五太古國師至若恭愍王封普愚為王師立圓融府置寮屬長官正三品其儀衛擬於鹵簿此又尊崇之至也尚玄曰夫道高德尊則職位自至上五人者皆悟法者故禮遇隆贄此所謂應供天人之師也今羅禪師綾首座為其土田奴婢及聚妻居生之欲納賂而得批何其行之鄙也此等僧徒非徒佛氏之罪人抑亦民天之害蠹也尚玄按高麗李相國集有授禪師首座僧統及封册王師國師之教書官誥等文録之于左以供參考禪師益莊元伊淡靈大歇各為禪師官誥云云至道居標的之外真人非寵辱所驚譬若純白守真不期黼黻之賁其色大音本寂勿貴笙簧之鼓其聲然己自貶者人必褒焉况實固充則名之召也不有沖虛之奧曷當懿顯之稱某職某崖岸峻高機關沉邃早晚名韁之拘束遂投巖竇之晦藏廣心地莫若泛觀故凡諸聖諦無不探源見自性必由懸解故獨於禪法尤若合契回靈光於本分得覺照之常存如茲僧寶之奇當與天下而共鴻冥萬里雖若避於網羅龍襲九淵無奈吝其雲雨顧自為計則尚可其將澤物也如何肆豫嘗敦諭而徵來此亦徇衆情之痛仰果符物望克荷宗乘佛日為之重輝祖燈於焉更耀是所謂肉身菩薩者歟宜峻空門之品級用增梵德之尊嚴可特授禪師嗚戲國君之迎禮高人也蓋期霑丐餘膏法王之出顯當世也固必紹明正眼勉膺訓命永福邦家云云李相國集大禪師按真覺國師碑文有云今上高宗即位制授禪師又加大禪師今此綸音即其制書也雖然文理多有不續處想必有脫誤姑存之以備考綸音王若曰自漢明以下秦始此疑姚秦弘始崇佛待以師禮隋皇重靈幹定禪空召主此疑唐主之誤於道場惟識尊僧在古今而同軌苟有超倫開土盍須進律必有異恩禮戒德冰清襟靈玉潔早脫煩惱之縛高參覺苑之遊拈花傳法眼藏不暇立雪傳自心燈拭明鏡之光無塵可侵觀止水之淵波浪不動專提祖印開示妙門法深薝葍之林行副苾芻之範淡泊如瀉水洋洋乎盈耳哉待問而撞鍾循循然誘人也實謂三劫之鴻願豈唯一世之儀鐫雖真人無名焉遠在兒孫之香火遺命依必有尊也特加緇秩之丕模可授大禪師於戲崇真所以為邦示賞所以納善尊行慕道朕盡禮以命師弘法利人師乃竭力而護朕往諧乃職永孚于法主者施行貞祐四年正月日金紫光祿大夫門下侍郎同中書門下平章事修文殿大學士監修國史判兵部事臣崔胤朝散大夫尚書兵部侍郎充史館修撰官知制誥臣李得根門下侍郎平章事給事中玄君等言制書如右奉請制附外施行謹言貞祐四年正月日制可禮部尚書兵部侍郎尚書左承告大禪師奉被制書如右符到奉行禮部侍郎中王事朴令史韓書令史黃乙亥九月十三日下浣首座律業首座都行官誥云云儒以禮而約敕人倫如帛之邊幅釋用律而維持佛教猶水之隄防有得究毗尼而守焉斯可謂苾芻之高者宜加厥號以寵若人某官某戒行圓熟機根猛利痛慕東林之遺迹敻追南嶽之高風謂縱披三善之衣得參釋子如不假四分之藏曷蹈聖門遂窮經論而深造乎微旁貫誥訓而增潤其識登壇度衆付餘膏於幾人傳法利生霑甘露者纍紀弘益多矣褒優歉然想爾謙卑雖不欲卓居於人上以師德望其無奈合處於席端茲徇僉言特加高品嗚戲斯五部之文即知之若易其一字之義則行也甚難無怠爾修永光于道云云李相國彙僧統華嚴業僧統都行教書官誥教書云云夫國家所以設釋門之階品者其意以為若時乎有僧中龍鳳魁然挺出其德也望也皆為人之所莫抗對而無稱謂以別之則其與庸流有何等級耶是以其德之宜居席上則謂之首座德與望之合統沙門則謂之僧統此其極選也雖本於尊道所稱而未嘗關於名利也然亦有高下差等故其浸也稍如朝堂班爵之例則固不可不澄汰其人然後授之也師以法王洪闡圓教為衆所歸久矣朕何惜其選以孤福利邦家之效歟云云大官誥云云道隱冥筌唯碩德乃傳於正法名為重選雖空門莫尚於休稱衆所尊而奉之禮當區而別矣盍崇極品以表英標某官某慧解疏通心機沉邃蓄無盡藏雖胸吞萬法之源由最上根獨吻合十玄之味以荷擔大乘而自任其陶鑄後學者甚多常居講席之主盟可謂教家之司命國奉戴為大和尚身約敕猶貧浮圖歷住名藍其室若懸磬再登批筆於己如浮雲境地自如褒寵所絶雖然梁唐有國師大師之號齊宋置法主僧主之呼望苟稱於表儀位宜居於首領肆徇公論俾躡巍階於戲珠玉錢貝易耗也不若僧寶之為足支城支溝塹易危也莫如法力之為足恃體茲眷注勗爾精勤云云李相國集國師故寶鏡寺住持大禪師贈諡圓真國師教書官誥追贈教書云云夫至人之境生不以為樂死不以為戚褒之不以為榮貶之不以為辱希夷湛寂非強名所到也然昔者佛氏之出也為世所尊故曰世尊為天人所師故曰天人師且師之德非以此豐替而其稱謂如此者蓋名隨實著出於自然故也師則道全德備表儀當世故追崇以國師之名夫王師者特一王之攸範國師者乃一國之所資實既充中名可逃外宜揚厥號永耀方來云云官誥門下脫觀披禪服迹禪門口談佛祖之源亹亹然可聽胸括人天之際浩浩乎無窮斯若僧中之傑也然似是而非捨真即妄以至將佛覔佛騎驢覔驢者何哉蓋心本自淨客塵斯覆照之惟難悟之不易故耳其能昭然獨照迢爾直悟者求之當世唯我禪公一人而已盍册鴻名以孚輿論故寶鏡寺住持大禪師承逈慧解踈朗法器泓深早業宗乘欻飛揚於選席忽懷高想壓羈絆於名韁猶恐入山之不深進嗟避世之不早拂衣長往枕石自誤身唯骨而兀坐於巖巔名無翼而飛落於人世越從先代纍降徵書業已退藏故雖勿欲反心義不獨善故亦難於強項火煨黃燭初不領於銀鉤杯駕滄流俄忽回於金錫法王鼎至僧寶益尊王公皆跪膝而追風士女猶布髮而藉足或赴法筵於禁殿或受檀施於侯門縻之以僧職而不力辭處之以名藍而勿固拒一彼一此適往適來是達人應萬物之大權豈曲士泥一隅之細節所居成市請益如林伏卵傅翼者咸得翱翔於釋林霑乳分甘者莫不飽飫於道味人不卜景星而見公為之瑞朕不保長城而倚公為之防鄰敵之不復窺窬國步之幾至帖泰未必不由於法力也其或開話則病牛奮迅説法則旱雨雱霈朕耳尚聞人言豈飾頃者托以遊方而騰裝南國曾不為朕而暖席上都脫袴期來登床坐逝巖石裂草木焦枯嗟法棟之云摧在禪林而安仰來也如雲出而澤周天下去忽若月側而光掩人間朕早逢緒餘久勤翹仰何以酬於梵德但追贈於懿稱是豈私恩實惟公議可特授云云鳴戲以公之得法眼藏以師之傳佛心燈決成萬德之身已躡一真之境幸推餘蔭永祐丕基云云李相國集王師王師封册修製受敕述已下李相國集初度讓封王師表沙門臣某言伏蒙聖慈今月十一日特差降某官奉傳國書一道將册臣為王師者禪棲僻陋忽迎使者之華聖訓丁寧將致師哉之禮顧僭踰之已甚豈冒昧以敢當守以力辭期於頷可中謝伏念臣性靈至淺戒行素虧早業宗乘心未傳於祖髓歷持名寺口徒費於土毛每緣國土之眷恩至躡僧門之峻品虛蒙雨露無補涓埃挂想山林常有拂衣之志貪恩輦轂尚稽飛錫之遊豈意宸衷遹遵舊典過録朽殘之質欲崇禮貌之儀自顧孱資福本微於盈眥如當大任禍可畏於生胎茲益為憂罔知所措况疾病老而彌劇故身體日以益衰雖欲勉從實難耐處伏望聖上陛下廓乾坤之度回日月之明知臣非矯飾之詞諒臣實誠心之請追還成命更擇異能世不乏人當有彌天之德臣能安分免貽代匠之譏臣無任祈天俟命戰灼兢懼之至今因使回謹附表陳讓以聞臣某云云三度謝表云云囊奏緘詞期寢已行之命泥函降詔繼宣曲諭之辭凌兢失圖殞越為懼中謝伏念臣早捐俗纍粗襲祖禪摘埴索塗學未臻於窮理刻舟求劒性不解於徇時固甘陸海之平沈絶覬僧門之遠致偶緣厚幸屢玷大名病樹逢春優荷九天之澤間雲出岫訖微一雨之功合斂迹以退藏猶強顏而冒處敢圖異眷敻出常鈞頻紆綸綍之言將展几筵之敬自惟缺爾益用赧然昔者漢帝設杖於桓榮燕王擁篲於鄒衍茲乃崇儒而下士宜其屈體而忘尊如臣之愚無德可取豈敢以鶴骨枯稿之態而坐受龍顏禮貌之儀情所未安理當固避然念居君之土受國之恩苟執意以違天即容身之無地勢不得已雖從訓敕之嚴老無能為曷副師資之重但當益勵戒行無怠熏修仰憑千佛之慈永祝一人之壽云云五度謝封崇狀除臣後以狀行云云命出楓宸光生奈苑撫分涯而非祿封形影以猶慙伏念某生稟悾恫幼從剃度禪門遊刃本未至於恢恢選席吹竽僅免逃於一一徒以因緣之幸纍叨優渥之私上不能荷擔宗乘下不能諭掖後學動有啞羊之愧方思疲馬之休豈意聖衷復崇師禮特降褒封之典遽加懿太之名帑賜便蕃天香薰馥仰揆推尊之意第深感戴之誠山重之恩一生難報嶽呼之懇萬歲為期無任云云謝物狀云云華袞示褒既加優禮漏泉垂澤復辱多儀前件物等製作精奇名般繁浩奉玩忽驚於溢目感銘有至於淪肌云云李相國集王師封册客主往來狀受勑述王師呈册使狀鳳闕深嚴親奉泥函之命雞園寂寞將紆玉樹之光其所欣榮實難宣剖册使答狀祗承上命將詣下風未成丈室之參先辱尺書之問其為心感曷可舌宣上册使屈實狀榮承芝檢辱臨容膝之居略備茶筵將代銷腸之飲幸回高躅暫許清歡贈物狀使華方戾幸攀河目之姿宴貨是將聊奉沚毛之薦別箋所具粗品曷言三度册使上遠狀肅持玉節嚴騶哄以遄行淨掃金沙喜光塵之漸邇傾心所切覿面粗陳册使答狀宸闈受命將趨庭柏之蔭禪榻占書首辱溪藤之問感藏良極頌詠奚殫屈宴狀光奉芝函忽枉惠然之顧肅張草具佇成衎爾之歡庶許從容以孚傾渴贈物狀車騎甚都幸接清揚之表篚筐又實粗輸懇悃之誠物薄良慚情深可貴五度册師先呈王師狀已封崇後册使先呈狀承命宸居將布春溫之詔嚮風禪榻想瞻月朗之儀拜稽匪遐欣歡罔既副使行同前狀久聆禪韻猶傾髮藉之心叨奉王言將展膝行之禮努加鞭策亡即門扃王師答册使狀玉轡金韉降自九天之路華箋寶墨首貽十部之賢賞味至三銘藏倍萬答副使狀鷃函持詔將臨十笏之房螺墨濡毫先辱千金之翰過承慰藉第切兢榮册使上屈宴狀乘車擁節特宣詔命之溫掘井蓋柴粗備饌羞之潔庶回玉趾以副棗誠副使上同前狀八尺僑居之室幸枉皇華一杯大道之漿庶資歡緒肯焉母拒喜可能言使上贈物狀幸攀清裁獲成雲霧之披續奉薄儀誠愧芹暄之獻庶乎無棄廓爾有容副使上同前狀禪居僻陋幸攀簪履之光宴侑薄微愧欠襜褕之贈仰惟大度勿賫輕千教長丈室受記高麗忠烈王三十年甲辰江南僧紹瓊來王迎于壽寧宮聽説禪麗史按智異山大華嚴寺事迹中觀大師名海眼西山門人也有云瓊師於壽寧宮説禪禪罷授記東僧濫觴之兆魚魯丈室豕亥教長鬪諍鋪梟獍黨八人契隴斷契之評品皆其授記者也云云又海東名將韓希愈傳洪良浩撰王召僧紹瓊于宮中點眼畫佛讀華嚴經王與淑昌院妃受菩薩戒希愈與承旨崔崇言祕記有國君敬南僧必致覆亡之語願殿下慎之不聽云云蓋紹瓊之來説禪而授濫記受戒而應祕讖其亦不名譽之甚也按紹瓊住此三年辭歸支那其所傳法則有圓明國師諱沖鑑者見于沙門宏演所撰碑文曰師拂衣遊方聞鐵山瓊禪師道行甚高迎之東還執侍三載瓊公甚期待之及瓊公辭歸師主龍泉寺銘曰瓊公飛錫來此都圓明國師侍起居曹溪正宗須力扶一言妙契萬念除謂有非有無非無死生一致不可渝按輿地勝覽圓明國師後住林川郡聖住山普光寺其徒有紹珠等按瓊禪師係是臨濟嫡傳仰山祖欽之嗣高峯原妙之弟宗派既正門風亦峻其機緣語句見於續指月録袁州慈化鐵山瓊禪師十八出家首參雪巖欽和尚即仰山祖欽也一日室中舉那吒太子析骨還父析肉還母因緣有省述偈曰一莖草上現瓊樓識破古今間話頭拈起集雲峯頂月人前拋作百華毬欽深然之謁東巖東問心不是佛智不是道上座作麼生會師曰抱贓呌屈東曰不是心不是佛不是物是什麼師曰眉間迸出遼天鶻潭州大溈行禪師上堂云不是心不是佛不是物且道是個什麼不在內不在外不在中間畢竟在什麼處苦苦有口説不得無家何處歸上堂冬在月頭賣被買牛冬在月尾賣牛買被卓拄杖者裏無尾無頭中道齊休行也休休坐也休休住也休休臥也休休睡眼豁開五雲現瑞光風霽月無處不周梅綻枯枝古渡頭風前時復暗香浮雖然到此向上一路萬里崖州何以見得靠拄杖休休後示寂塔於觀音閣後江上油餅龍吐瑞氣高麗仁宗十年閏三月甲午王至自西京赦初王之幸西京也妙清僧也白壽翰鄭知常等密作大餅空其中穿一孔盛熱油沉于大同江油浮出水面望若五色令父老檢校太師致仕李齊挺等五十人上表請稱尊號建元因説王曰大同江有瑞氣此神龍吐涎千載罕逢請上應天心下順人望以壓金國王以問李之氏對曰金國強敵不可輕也况兩府大臣留守上都不可偏聽一兩人之言以決大議王然之至是壽翰等又奏曰大同江神龍吐涎作五色雲此非常之嘉瑞也請百官表賀王遺平章事文公仁參知政事李俊陽等審視之時有業油韂者告曰熟油泛水則有異色於是使善泅者索得乃知詐也塔下陶瓦龜書怪語高麗忠烈王二十六年庚子五月辛丑有僧天固陶瓦龜一雙朱書怪語于瓦龜背理惠宿寺石塔下尋自掘曰此龜甚神異以眩惑衆人濶里吉思元官來駐者執而杖之又以東京留守羅允不行禁理反信妖術囚于行省尚玄曰惠宿寺新羅高僧惠宿之所居故名見三國遺事曰釋惠宿沉光於好世郎徒郎既讓名黃卷師亦隱居赤善村今安康縣有赤谷村二十餘年時國仙瞿旵公嘗往其郊縱獵一日宿出於道左攬轡而請曰庸僧亦願隨從可乎公許之於是縱橫馳突裸袒相先公既悅及休勞坐數炮烹相餉宿亦與啖囓略無忤色既而進於前曰今有美鮮於此益薦之如何公曰善宿屏人割其股置盤以薦衣血淋漓公愕然曰何至此耶宿曰始吾謂公仁人也能恕己通物也故從之爾今察公所好唯殺戮之耽篤害彼自養而已豈仁人君子之所為非吾徒也遂拂衣而行公大慚視其所食盤中鮮胾不減公甚異之歸奏於朝真平王聞之遣使徵迎宿示臥婦末而寢中使陋焉返行七八里逢師於途問其所從來曰城中檀越家赴七日齋席罷而來矣中使以其語達於上又遣人檢檀越家其事亦實未幾宿忽死村人輿葬於耳峴一作刷峴東其村人有自峴西來者逢宿於途中問其何往曰久居此地欲遊他方爾相揖而別行半許里躡而逝其人至峴東見葬者未散具説其由開冢視之唯芒鞋一隻而已今安康縣之北有寺名惠宿乃其所居云亦有浮圖焉甘露舍利僧言見性高麗忠宣王五年癸丑二月下妖僧曉可于巡軍獄可自言見性以妖術衒惑士女嘗持蜜水米屑示人曰此甘露舍利皆吾身所出也人莫知其詐至有飲且藏者又嘗得一窟可容身者積薪其上而登之謂其徒曰吾欲茶毗後七日當化為法身遂爇薪煙焰四起遂自薪中投入窟食柿栗至期撥灰而出憲司覺其詐按問遂服至是又以罪見囚尚玄曰慵齋叢話云有僧名遠心者為人滑稽無私無欲嘗謂其徒曰我欲燒骨化身其徒積薪為臺遠心踞坐其上見火光漸迫不勝其苦潛隨煙燼而遁還至方丈其徒意師已滅相泣而返見遠心儼然坐禪室拜問其故遠心曰我從西天來四大雖已化去法身常住不滅遂抵掌大笑云云觀此兩人所為相似而一以詐偽一以滑稽固不可同年而語也遠心之行大有諷世之意其亦普化之流歟至若自言見性近世禪侶誰非曉可未得謂得佛所謂第一大妄語也自言見性猶云可欺甚至有言悟後再迷飲酒食肉無妨般若行盜行不礙菩提是皆末法邪禪自掩其過之魔説也旭日庭焰人謂放光高麗忠肅王四年丁巳元延祐四年春閏正月壬申元流魏王阿木哥于耽羅尋移大青島乙酉魏王館庭磚日照霜潤光彩爛斑有人白王曰魏王館庭中光彩皆成牧丹諸花卉狀豈天降祥以表聖德王甚喜厚賞其人乃命畫工圖其狀恭愍王十七年戊申夏四月有氣如煙生演福寺佛殿二日辛旽白王曰佛放光戊午幸演福寺設文殊會凡九日尚玄曰臨濟玄禪師云佛者心清淨是法者心光明是道者處處無礙淨光是若是真佛真法真道六根門頭常放大光明十方世界常放大光明設使魏王之館演福之寺真為放光何貴之有但因時君好求有相之佛法道故姦人佞僧用投其機耳獻草為芝文士譏王高麗忠肅王四年先是彌勒寺僧獻異草以為靈芝王重祕之令文士賦詩有一人獻詩曰安得仙人培養術更和甘露種庭心蓋譏之也尚玄曰蓋靈芝者即朝鮮人所謂三神山不老草也以人餌之則可得長生不死故世謂三神山皆在朝鮮蓬萊者金剛山是也方丈者智異山是也瀛洲者濟州島之漢拏山是也昔秦始皇遣方士徐市一名徐福率童男童女五百人入海求三神山不死藥漢武帝時方外之士亦皆指燕齊海上為神仙之住處所以老杜亦有方丈三韓外之句者此也蓋徐市者往日本國因居不返日本龜野有徐市村云故朱明某帝酬贈日本使臣詩有龜野峯前徐福祠松根琥珀也應肥之語也今濟州島漢拏山南濱海巖壁上刻有古篆其篆曰徐市過此四字云云所謂三神山不死藥果在何處蓋屬虛無孟浪之説余聞諸人謂於江原道通川郡東海邊叢石高臺之上人迹不可及處有靈芝一莖生在危巖倒懸之下時有仙鶴翱翔其處昔有一人試欲架梯攀登忽見雲霧來遮亦有雷雨震作懼而遂止云云此不過山僧野老誇奇之談而世傳朝鮮中葉楊士彥棄官入金剛山為仙故稱號楊蓬萊金剛山萬瀑洞石上刻有蓬萊楓嶽元化洞天八個大字者即士彥之筆而又有石上所畫碁局三仙局亦士彥與同伴仙侶圍碁之所云而恨無爛斧柯之人一來作證也楊士彥題楓嶽鉢淵云白玉京蓬萊島浩浩煙霞古熙熙風日好碧桃花下間來往笙鶴一聲天地老又楓嶽真珠潭石壁刻有一詩車天輅詩楊士彥書朝玄圃暮蓬萊明月鉢淵寺清風桂樹臺暮揖滄海接麻姑六六壺天歸去來通川叢石即是蓬萊楓嶽元化洞天之外府則或有靈芝仙草亦未可知余因賦一絶云先天雨露長靈芝笙鶴三清歲月遲採藥仙人何處去秦宮白髮不勝悲尚玄又曰芝秀蘭芳世必并稱而我海東非徒芝不可採蘭亦不可見所以近世儒業李亮淵號臨淵堂又號山雲者有詩曰東土無真蘭只有似蘭者世人錯相愛不得老林下蓋自况也往在乙卯歲余偶於京東之舊元興寺見種真蘭二本問其所從來寺僧答云其友有自東萊梵魚寺來者移植此處而曰金井山梵魚寺之山生此草土人皆尋常見之不之重有一支那詩人來遊梵魚始發見之極口賞歎曰真蘭也蓋其葉硬而細長帶微黃色花開則有幽香遠聞云云余乞得一本携家來盆栽之因憶往年明治四十年余觀風日本東京拜觀新宿御苑曾見真蘭於花廣溫室之中今此蘭與彼同則其為真蘭無疑也於是有感追和山雲詠蘭詩仍步原韻而反其意云東土有真蘭幽谷無知者世人忽相見芳名滿天下後余之同學友馬相學因遊長城白巖山白羊寺及順天曹溪山於此兩處發見其蘭知余愛故採寄數本白巖蘭余同教友梁建植見之乞求一本余分而贈之梁君轉與其友林青栽之陶盆置溫突中時方冬月見一莖秀拔且蓓蕾而室中溫度稍薄竟不花而萎焉云惜哉余家金井蘭及白巖蘭因冬藏之不善亦皆枯死可憾也蓋漢城氣候稍寒非其宜土歟古人云菊花之隱逸者也牧丹花之富貴者也蓮花之君子者也今余則云芝草之神仙者也蘭草之隱逸者也茶草之賢聖即禪者也以有玄微之道清和之德故支那唐時趙州從諗禪師尋常接人輒云喫茶去自爾趙州茶盛稱於世茶之一道遂屬于禪也按朝鮮之茶自唐來新羅史云興德王三年戊申唐文宗太和二年入唐使大廉得茶種來王命植智異山日本之茶自宋來按日本佛教史後鳥羽天皇文治三年宋淳熙十四年沙門榮西再入宋承臨濟正宗建久三年宋紹熙三年歸朝弘布是為日本禪宗之開祖榮西自宋持來茶種種於築前背振山後栂尾明惠將背振山之茶分種栂尾及宇治且創製茶之法云云又千利休禪師為日本茶道之元祖云云日本茶道京都最盛京都之人凡開茶會必須張挂大德寺管長之手澤然後方為盡其趣日本茶道亦屬于禪也雖然日本茶今盛行而朝鮮茶無聞焉以朝鮮水土甲於天下不須茗飲故也近世洌水丁若鏞謫居康津著有東茶記又自號茶山蓋於茶道有深造焉又大芚寺草衣意恂禪師有茶詩及東茶頌備述茶之為德按茶頌注智異山花開洞茶樹羅生四五十里東土茶田之廣料無過此者洞有玉浮臺臺下有七佛禪院坐禪者常取煮飲又頌云東土所産元相同色香氣味論一功陸安之味蒙山藥古人高判兼兩宗注云東茶記云或疑東茶之效不及越産以余觀之色香氣味少無差異茶書云陸安茶以味勝蒙山茶以藥勝東茶蓋兼之矣若有李贊皇陸子羽其人必以余言為然也又云波盡瀼瀼清夜露三昧手中上奇芬注云茶書云採茶之候貴及時太早則茶不全太遲則神散以穀雨前五日為上後五日次之然驗之東茶穀雨前後太早當以立夏前後為及時也其採法徹夜無雲浥露採者為上日中採者次之陰雨下不宜採東坂送謙師詩道人晚出三屏山來試點茶三昧手又草衣禪師奉和山泉道人謝茶之作云古來賢聖俱愛茶茶如君子性無邪人間草茶差嘗盡遠入雪嶺採露芽法製從他受題品玉壜盛裹十樣錦水尋黃河最上源具含八德美更甚深汲輕軟一試來真精適和體神開粗穢除盡精氣入大道得成何遠哉持歸靈山獻諸佛煎點更細考梵律閼伽梵語閼伽華言茶真體窮妙源妙源無著波羅蜜大般若經云於一切處無所執著故名波羅蜜嗟我生後三千年潮音渺渺隔先天妙源欲問無所得長恨不生泥洹前泥洹涅槃義同從來未能洗茶愛持歸東土笑自隘錦纏玉壜解斜封先向知己修檀稅又申承旨白坡居士題東茶頌云草衣新試緑香煙禽舌初纖穀雨前莫數丹山雲澗月滿鍾雷笑可延年由是觀之唐茶之種猶自繁延于智異山而知茶道者惟禪衆耳尚玄曰朝鮮之長白山出茶名曰白山茶乾隆時清人採貢宮庭為御用之茶金海白月山有竹露茶世傳首露王妃許氏自印度持來之茶種云濟州島出橘花茶味甘而香已上三種茶皆屬名産貴品而人罕知之謂木結穀妖僧誣民高麗辛禑王八年壬戌五月誅妖民伊金伊金固城民自稱彌勒佛惑衆曰我能致釋迦佛凡禱祀神祇者食馬牛肉者不以貨財分人者必死若不信吾言至三月日月無光矣又曰吾為作用則草發青花或木結穀實或一種再刈愚民信之爭施米帛金銀牛馬死則棄之不食尚玄曰雖云迷信頗知衛生有貨財者悉以與人伊金又曰吾敕山川之神悉送日本倭賊可易擒也於是巫覡尤加敬信城隍祠廟撤去其神敬伊金如佛以祈福利無賴之徒從而和之自稱弟子轉相誣誑所至州郡守令或有出迎館之上舍者清州牧使權知誘致之縛其渠首五人囚之於是都堂移牒諸道皆捕斬之前判事楊元格素信奉其説及是逃匿窮搜獲之杖流道死尚玄曰朝鮮時代亦有與此倣佛之事肅宗大王十四年戊辰八月妖僧呂還不知所自出其妻遠香文化縣民女也以妖言惑衆無識愚氓爭相輻湊自稱為龍女婦人自文化轉通黃海諸縣入江原至楊州所過無不尊奉徒黨實繁朔寧郡守李世弼移牒於楊州使之踉捕牧使崔奎瑞捉致呂還及遠香還噤口不言遠香辨若懸河而皆怪誕無倫之言間多不道之語即受原情呈報方伯又呈于廟堂領相金壽興等詣闕請對崔奎瑞以本邑賊徒正刑之故罷職按星湖僿説云今數年前英祖三十四年海西村婦忽稱彌勒降臨言多幻妄四方風動官不能禁自稱彌勒與釋迦為讐敵凡域內神祠皆誕妄非真於是處處毀破其信從如此朝廷遣近臣按誅之然東峽中尚有餘燼云大明律文有曰凡師巫假降神書符呪水扶鸞禱聖自號端公太保師婆及妄稱彌勒佛白蓮社明尊教白雲宗等會一應左道亂正之術或隱藏圖像燒香集衆夜聚曉散佯修善事煽惑人民為首者絞為從者流其立法嚴矣後此必有繼起者宜一以此斷之李太王三十一年甲午春東學黨始起於報恩郡其首魁崔時亨稱號法憲先生聚徒誦呪文曰侍天主造化定永世不忘萬事知以此十三字相傳授謂之布德其法蒸白米為餅又用清水一碗供桌上祭天誦呪則身自然跳動離地寸許禁食狗肉爭相謂曰若行此道則敵炮之耳門自然生水不能用其愚迷如此所在郡縣不能禁全羅忠清兩道尤多無賴之徒蜂屯蟻聚有布所接所之名稱金開南在南原嘯聚屯集朝家遣招討使洪啓薰討剿招安未能盡平之請清兵來牙山日本亦動兵入漢城竟為日清之戰端秋冬之間東學黨全琫準又起古阜郡上犯公州竟為官軍所擒解京斬之盲聾視聽日嚴誑人高麗明宗十七年丁未九月全羅道按察使吳敦信奏有僧日嚴者在全州能使眇者復視死者復生王遣內侍琴克儀迎之在道冒綵㲲巾乘駁馬以綾扇障其面徒衆遮擁人不得正視來寓普賢院都人無貴賤扶老携幼奔走謁見里巷一空凡盲聾躄啞有廢疾者狼藉於前僧以扇揮之迎入天壽寺宰輔大臣亦趨下風御史大夫林民庇拜於樓下平章事文克謙以微服致禮又移居弘法寺士女競布髮於前藉嚴足嚴令唱阿彌陀佛聲聞十里凡其盥漱沐浴之水苟得之雖涓滴貴如千金無不掬飲稱為法水能理百病男女晝夜雜處或祝髮為徒者不可勝數時無一人諫止者王漸驗其詐放還其鄉初嚴誑人曰萬法唯一心汝若勤念佛曰我病已愈則病隨以愈慎勿言疾之不愈也以是盲者妄言已視聾者亦言已聞所以人易惑至於如此尚玄曰朝鮮文宗元年有妖僧自言有神術能使死者復生試之虛偽往年於高陽地有蔡同知者不知所從來常露宿又多食謂有能力知人疾病京城士女輻湊匝繞日以萬計爭携餅果食物以供饋之彼即選一餅果塗以口涎而還之如得日嚴之法水無不掬食不以為耻如是誑惑愚夫愚婦終被警吏之遠逐不知下落又於公州地有車千字者黃海道人性不知書但謂常讀天地玄黃四字則能通萬理故號千字也有辟穀術能不食與蔡同知正相反對徒衆追隨皆讀千字聚黨亦為逐散矣陰陽吉凶山甫惑衆高麗肅宗六年平州妖僧覺真妄言陰陽眩惑衆人詔流谷州高宗四年丁丑有郎將金德明者嘗以陰陽之説阿附崔忠獻數興徭役侵耗諸寺故僧徒怨之毀其家又攻忠獻不克僧徒八百餘人為其所殺血流成川又後十年森溪縣人崔山甫曉陰陽術數削髮為本縣金剛寺主與表姪倉正光孝等奪掠為事光孝竊人牛宰而食之縣官捕之光孝逃山甫亦變姓名曰周演之流寓他方後至京以占術惑人崔瑀忠獻之子召與語稱賞日益親信事皆咨之勢焰日熾能禍福人人皆畏之爭遺賄賂遂致巨富以術僧道一為弟子與相密謀自言察聲觀色能辨人貧富壽夭因多引婦女之美者而人畏威莫有言者一日演之被告謀奉前王復位前王即熙宗被忠獻廢移江華瑀即遷前王于喬桐沉演之于海夷其族捕道一殺之尚玄曰高麗一代陰陽術數盛行於世一則曰術僧二則曰術僧皆自道詵圖讖屆之而後人亦多假託附會術者亦有幸有不幸覺真言陰陽而竟被流竄山甫道一等以術數而暫得勢力雖然終不免誅夷之禍妄言欺人之報現於目前可不鑒戒至於僧徒謀誅執政非徒此時與崔獻忠戰也明宗四年甲午春正月歸法寺僧百餘人犯城北門殺宣諭僧録彥宣李義方率兵千餘擊殺數十僧餘皆散去兵卒死傷者亦多重光弘護歸法弘化諸寺僧二千餘人集城東門門閉乃燒城外人家欲延燒崇仁門入殺義方兄弟義方知之徵集府兵逐之斬僧百餘府兵亦多死者乃令府兵分守城門禁僧出入遺府兵破重光弘護歸法龍興妙智興福等寺焚其寺取貨財器皿以歸僧徒要擊於路還奪之府兵死者甚衆遂使王舍之城化成修羅之場自有僧史以求絶無僅有之事也按日本佛教史後朱雀天皇長曆年間睿山天台宗僧徒來襲關白賴通之第賴通遣平直方討之執其巨魁是時諸山僧徒擐甲帶仗宛若兵營云云百寮齋米收斂有差高麗仁宗八年夏四月辛丑門下侍中李公壽與兩府大臣會議令百寮出米有差設齋于現聖靈通二寺為國家禳炎祈福尚玄曰佛法固云付囑國王大臣國王大臣外護佛法賴有功德之一方便門即祈福禳災之事也已古德云若一向舉揚宗教法堂前草深一丈須倩人看院始得蓋高麗朝百寮抽斂儒教之中亦有一例按忠烈王三十年五月置國學贍學錢初贊成事安珦憂庠序大毀儒學日衰議兩府曰宰相之職莫先於教育人材今養賢庫殫竭無以資教養請令六品以上各出銀一斤七品以下出布有差歸之養賢庫存本取息永為教養之資兩府從之事聞王出內庫錢穀以助之時有密直高世者自以武人不肯出錢珦謂諸相曰孔子之道垂憲萬世臣忠於君子孝於父弟恭於兄者是誰之教耶若曰我為武人何苦出錢以養爾生徒則是不為孔子也而可乎世聞之甚慚即出錢今俗閭巷亦出齋米每當歲初上元前後凡乞糧僧作小紙袋朱書功德二字名曰功德袋周行閭里挂置民家之門扉上而去其家主饋之婦每炊飯時先除一掬米入其袋中待僧來給之蓋此齋米沿自麗俗也謹按佛制托鉢乞糧謂之化緣亦稱募緣令諸衆生多作功德以是因緣見佛聞法離苦得樂速登彼岸此俗所謂十匙一飯亦佛所云汝飯不減我供自足者也萬佛香徒聚集無賴高麗肅宗六年六月禁男女僧尼羣聚作萬佛會仁宗九年六月陰陽會議所奏近來僧俗雜類聚集成羣號萬佛香徒或念佛讀經作為詭誕或內外寺社僧徒賣酒鬻蔥或持兵作惡踴躍遊戲可謂亂常敗俗請令御史臺金吾衛禁止從之尚玄曰佛徒之中優婆夷信女較多於優婆塞信男長者子富而有德者亦多於貧窮者吾嘗潛思其所以然蓋功德福樂之説易入於女子之心故多信仰之者男子則因斷見常見及其他種種見解無上妙法難入其耳釋迦牟尼棄王位而登佛地又其諸大弟子誰非婆羅門印度貴族長者子乎故須知富貴多福之人亦多佛種因緣但貧窮者無緣救度是為最可憐愍者雖有法華常不輕菩薩之忍辱法華經云威音王如來時有一菩薩比丘名常不輕得大勢以何因緣名常不輕是比丘凡有所見若比丘比丘尼優婆塞優婆夷皆悉禮拜讚歎而作是言我深敬汝等不敢輕慢所以者何汝等皆行菩薩道當得作佛而是比丘不專讀誦經典但行禮拜乃至遠見四衆亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛四衆之中有生瞋恚心不淨者惡口罵詈言是無智比丘從何所來自言我不輕汝而與我等授記當得作佛我等不用如是虛妄授記如此經歷多年常被罵詈不生瞋恚常作是言汝當作佛説是語時衆人或以杖木瓦石而打擲之避走遠住猶高聲唱言我不敢輕於汝等汝等皆當作佛以其常作是語故增上慢比丘比丘尼優婆塞優婆夷號之為常不輕日本空也和尚之願力空也醍醐天皇之皇子也剃髮為僧遍遊國內常以念佛為口號抃手舞蹈以勸老幼時人呼為踊念佛所謂六齋念佛是也亦難普傳於下流社會也吾觀基督教救世軍傳教之法遊行街路擊鼓集衆演説福音勸入教會不得不謂好個方便也則今萬佛會及萬佛香徒不必禁止而設一機關如救世軍以誘導之可謂慈悲度生之一道也藏經道場春十秋十高麗靖宗七年辛巳夏四月癸丑設藏經道場于會慶殿春秋二季例設此會春六日秋七日忠宣王三年三月癸卯設藏經道場于本闕舊例春六日秋七日今以王旨俱改十日尚玄曰夫轉經者讀經之謂也與講經會旨趣不同其即所謂功德佛事也茲録湖南長城郡白巖山淨土寺今禪教兩宗大本山白羊寺事迹以供參考轉藏經第三會榜繄我王師覺儼尊者駐錫曹溪之日與江寧君洪公綏同發願許各捨帑儲成就大藏全部之因由慶落初會之記榜載之縷詳粵戊子春傾倒檀施之物命門人之牧等廣化衆緣迎集諸山苾芻再轉一遍歲在庚寅年八十一惓於課衆切有謝院安心之志辭衆歸老于白嵓山淨土寺前朝主上嚮師道德特由師禮以茣城佛岬寺為下山所暨今上即祚仍册為王師并下國書繒綵等物益加欽敬師每曰老僧何德纍蒙上恩思報罔極敬備種種供具肆展第三會屈曹溪大和尚為主盟招致諸山長老千餘至正癸巳三月十一日為始約十日張皇佛事晝則轉三藏夜則談祖教或禪或講六時修法以答上恩厥誠厥美不可喑默粗書始末昭示于后門人月生山人演昷拜手謹志按演昷即柳拙菴見勝蓮寺李穡記至正十三年三月日上板堂佐慧曉達桓首堂佐祖宣紹寬記事日益了員維那靈泉社道人居訥主法曹溪十四代和尚復菴淨慧功德主王師大曹溪宗師前佛岬寺住持一印正令雷音辨海弘直廣濟都大禪師覺儼尊者連聲法席晝三夜三高麗毅宗十一年丁丑春正月戊辰朔風自乾來太史奏曰國有憂王懼卜者內侍榮儀因進禳禬之説王信之命於靈通敬天等五寺自是月至歲終恆作佛事禳之初儀父尚嘗配島娶島內逆民之後生儀形貌怪異性姦猾常言國家基業之遠近人君壽命之修短只在禳禱勤怠巡御踈數王頗惑之儀每伺王憂懼輒奏云某年月有禍災依法禳之則無患矣置司祈禳幸而無事即曰咸我力也又奏如欲延壽須事天帝釋及觀音菩薩王多畫其像分送中外寺院廣設梵采號曰祝聖法會發州郡倉廩以支其費儀乘傳巡示守令僧徒皆畏苛酷爭遺賄賂又於安和寺塑置帝釋觀音須菩提聚僧晝夜連聲唱諸菩薩名號稱為連聲法席儀陽示勤苦終宵禮拜王時幸觀之特加褒賞又信儀言遍祀遠近神祠使者絡繹或取閭巷名第以為離宮別館或勞民以營山齋野墅巡幸無時又於諸寺皆張法會至有千日萬日為限者京外府庫傾渴人皆怨之花紋苧布尼婢織成高麗忠烈王二年有一尼獻白苧布細如蟬翼雜以花紋公主即元成公主也以示市商皆云前所未覩也問尼何從得此對曰吾有一婢能織之公主曰以婢遺我尼愕然不得已納焉尚玄曰布細如蟬翼即今之所謂韓山所産十二成細苧布歟其云花紋者浣濯細苧布用尉斗尉之則自生紋理如花枝杈牙然也市商皆云前所未覩則其細工之特異可知也南山之下漢江之上豆毛浦有一尼舍名曰彌陀寺尼姑等皆以織極細綿布為業又北道六鎮各郡之在家僧妻等織造麻布極輕極細俗呼鉢內布謂可容一匹布於一鉢之內故名琉璃土瓦僧侶燔造高麗忠烈王三年五月壬辰遺僧六然于江華燔琉璃瓦其法多用黃丹乃取廣州義安土燒作之品色愈於南商所賣者云云尚玄曰蓋琉璃瓦者其即今之所見青瓦歟又或如今之釉藥煉瓦歟京城皇壇之迹今建巨大華麗之館舍名曰朝鮮好太樓用釉藥煉瓦築成甚有光澤朝鮮世祖大王九年甲申建圓覺寺用青瓦以蓋法堂世祖實録云瓦窑提調仁山君洪允成議圓覺寺法堂所蓋青瓦八萬張燔造所入甚巨琉璃瓦及青瓦燔造之法尚矣勿論今雖尋常煉瓦朝鮮之人無能精製者工業之退步一何至此究厥所然必因後世儒論鴟張崇儉黜奢禁止製造之故也高麗琉璃瓦朝鮮青瓦其燔造之法無人知之今俗諺謂獨造專利之業曰青瓦商由是推測當時燔造青瓦之人已為稀貴可知也已今則永絶遂與高麗燒磁之法皆作廣陵散是為遺憾也高麗磁器之見於史者忠烈王十五年元至元二十六年己丑八月元中書省牒求青砂甕盆瓶磁窑則聞遼陽撫順有高麗人燒磁之遺迹高陽郡三角山道詵菴洞口亦有古時磁窑之迹近於湖南之康津郡大口面尾山發見高麗之青磁窑朝鮮初葉所用磁器不遜於高麗稀貴更甚世人不知也慵齋叢話廣州分院人之所用陶器最緊今麻浦鷺梁等處皆以陶埴為業此皆瓦器缸甕之類至如磁器須用白土精緻燔造然後可中於用外方各道多有造之者惟高靈所造最精然不若廣州之尤為精也每歲遣司甕院官分左右邊各率書吏從春至秋監造而輸納于御府録其功勞而等第之優者賜物世宗朝御器專用白磁至世祖朝雜用彩磁求回青於中國畫樽罍杯觴與中國無異然回青罕貴求之中國亦未多得朝廷議曰中國雖窮村茅店咸用畫器豈皆回青所畫應有他物可畫者訪於中國則皆曰此土青也然所謂土青者亦未求得由是朝鮮畫磁器鮮少朝鮮磁器自開國二百年以後已形粗惡確有證據何以知之吾之十二世祖諱陽元卜居鷺梁故號鷺渚壬辰兵亂時以右鐺政為留都大將以下纍世墳墓在鷺梁本洞念佛峯仁川水道貯水池處之北麓而塋域之區入於仁川水道之用地故往年掘移山之西麓開舊壙而多得雛形磁器日用諸具其品質粗惡與今鄉曲磁窑燒造者無少異焉一家三子制許度僧高麗靖宗二年五月創凡有四子者許子出家又文宗十三年秋八月制兩京及東南州郡一家有三子者許一子年十五剃髮為僧尚玄曰按高麗崇佛寺院僧徒有諸便宜故出家者多一信仰思想自三國以來遺傳宗教惟佛而已由是人民宗教信仰思想範圍要不出此二門閥觀念王室貴子儒林名士皆依佛教故人民見之以為榮光三名譽勢力顯達之人出家為僧多得國師王師僧統住持大禪師等之職位身依白業名流青史一言以蔽之曰麗代之高僧碩德即朝鮮之山林隱逸為世推仰同一名譽四師表待遇國師王師僧統住持尚矣雖尋常僧徒享有特遇之禮五徭役免避凡為僧者免除一切徭役山水名區逍遙自在人間世無有如是之便宜六田産受用各寺例有土田奴婢皆歸住持管理受用臚列證憑以供參考慵齋叢話云我東崇奉佛教久矣新羅故都招提多於閭𨶒松都亦然王宮甲第皆與佛宇相連王與後宮詣寺燒香無虛月設八關燃燈大禮皆依於佛王之第一子為太子第二子則削髮為僧雖儒林名士亦皆效之寺剎皆有藏獲多者或至千百為住持者或擁婢妾其豪富勝於公卿僧多有封君辟除者高麗國制宮人侍幸而有子則祝髮為僧稱為小君麗史訂通國師太祖第五王子祐世僧統拯世僧統聰生僧統聰惠首座皆文宗子鏡智國師沖明國師皆熙宗子等皆王親貴骨也韶顯僧統覺儼尊者雲澄清叟柳拙菴及覺雲禪師等皆係赫赫衣冠之胄也金剛居士尹彥頤金剛居士李䫨清平居士李資玄法喜居士閔漬白雲居士李奎報夢庵居士權溥等皆以宰臣而篤好佛法者也又按麗史忠宣王元年五月教曰僧人既已出家固當上不拜君王下不拜父母况其餘乎自今僧俗相拜重論如法雖居家庸僧勿差官役入于朝鮮一切相反一信仰思想自麗末以來儒教始興下自太學儒生上至宰輔諫官無不斥佛目以無父無君之教由是人民信仰佛教之思想自然減退二門閥觀念無論朝野名士大夫以信佛教為羞耻何况出家乎除却幾個大士自是宿植善根外他則貧賤家無衣食無教育之兒出家得度者居多佛教衰退之原因實在乎是三名譽勢力守伊及俊和尚之於世宗信眉之於世祖普雨之於明宗休靜之於宣祖覺性之孝宗實有師表之資格而猶吝封拜之命蓋畏儒論之攻擊而置之也令聞雖彰而勢力則無也四奴隸待遇朝鮮一代直以奴隸待遇僧侶諸山緇流殆無人權示以乞丐呼以爾汝拜於庭下逐於京內五徭役苦侵朝鮮以還各寺僧徒徭役苦况人間世無其比造陵祭需之豆泡納宮供物之香炭徵入營僧軍之布錢擔遊山官人之轎輿乃至庭前柏樹子之糖果洞山麻三斤之繩鞋多死馬之腿腳海菜用油煎之者俗名多死馬腿腳寺僧善為之大活虎之眉毛俗呼難得之物曰活虎之眉毛無不責納但諸陵齋社各宮願堂則特下敕令勿侵徭役六田産僅保寺中所有若干財産公共保管以供香火間有不良之僧亦多盜賣之斃矣寺剎令後盡歸於正五教兩宗祈禱平賊高麗元宗二年六月設五教法席於內殿禱太子速還又十四年夏四月幸賢聖寺集五教兩宗僧徒設道場於男山宮以祈平賊忠惠王四年秋七月令五教兩宗亡寺土田及先代功臣田屬內庫恭愍王元年李穡上書曰我太祖化家為國佛剎民居參伍錯綜中世以降其徒益繁五教兩宗為利之窟川傍山曲無處非寺不惟浮屠之徒侵以卑陋亦是國家之民多於遊食云云又五年王師普愚言于王曰若九山統為一門重興祖風而五教各以其法弘之豈不暢哉云云又十九年九月設工夫選大會兩宗五教諸山衲子選其所自得請懶翁主盟王親幸觀之恭讓王三年成均博士金貂上書曰臣願回天聽決宸衷驅出家之輩還歸本業破五教兩宗補充軍士中外寺社分屬所在官司奴婢財用亦皆屬焉朝鮮李太祖元年封無學為王師妙嚴尊者兩宗五教諸山衲子皆在焉世宗三年辛丑秋設法華會薦元敬王太后冥福請涵虛和尚説法兩宗五教諸山衲子蒼蒼濟濟悉皆罔措尚玄曰由是觀之五教兩宗始見于高麗元宗時代是在大覺國師立天台宗普照國師創曹溪社之以後也大覺之時已有六宗按大覺國師墓志銘云當世之學佛者有戒律宗法相宗涅槃宗法性宗圓融宗禪寂宗即云禪宗也師於六宗並究至極普照之後始有曹溪宗按升平府曹溪山松廣寺嗣院事迹碑云曹溪山松廣寺為東方第一道場如蔥嶺之雙林震旦之廬阜則未有不居此而為名僧者十六國師故不説在勝國時至借山名設曹溪始興兩宗然則元宗以後稱五教者疑即戒律宗法相宗法性宗圓融宗天台宗是也稱兩宗者疑即禪寂宗及曹溪宗是也或人問大覺之時涅槃宗固已存在者也大覺之後本宗何為泯滅無聞而不入於五教之列乎答初智者大師得法華三昧創立教觀以法華經為宗骨以涅槃經為扶翼矣大覺立宗之後涅槃宗應當為彼所攝也故有法華宗則無涅槃宗之可言也問高麗之五教兩宗傳至朝鮮何又忽變而為曹溪總持天台疏字天台法事華嚴道門慈恩中道神印南山始興等十一宗此十一宗沿革何如答朝鮮太宗之六年或七年中道宗即入不中道之三論法性宗也神印宗結印密宗合為中神宗必因此兩宗之性質相近故合併之矣則中神宗者即高麗法性宗之沿革者也總持宗總持陀羅尼也疑即真言宗南山宗律宗也合為總南宗亦必因此兩宗性質相近故合併之矣則總南宗者即高麗戒律宗之沿革者也天台疏字宗天台法事宗合為天台宗華嚴宗道門宗合為華嚴宗即高麗圓融宗也慈恩宗即高麗法相宗也或云唯識宗亦云瑜珈宗已上諸宗即與高麗五教其數相當也問始興宗何如答始興宗疑即天台而別設宗名如禪宗之有曹溪也何以知之朝鮮太宗六年丙戌定全國中可留置之寺剎天台疏字宗法事宗合四十三寺始興宗十寺則天台始興雖似各別至七年丁亥諸州資福寺皆代以名剎有始興宗屬三寺而天台宗屬寺全闕可見當時天台一宗有名無實世宗六年甲辰合七宗為兩宗以曹溪天台可見尚有其名總南三宗合為禪宗華嚴慈恩中神始興四宗合為教宗雖然世宗三年辛丑尚有兩宗五教之文見涵虛行狀蓋此五教兩宗者實指當時佛教全體舉成數而言者也至於始興疑為天台別設之宗已有附述於前見大覺求法始興台教或人又問曰華嚴五教亦有一説按麗末權近撰法王寺祖師堂記法王之西丈室之南有隙地頽落破礎鞠為茂草久矣及判華嚴砧公義砧也見鄭道傳送友雲詩序駐錫之明年豫往觀之則突然而堂搆矣不數月又往觀之則煥然而丹雘矣及三往觀之則中揭毗盧文殊普賢會圖新繪者也左右分挂華嚴諸祖遺像修舊者也豫歎其成之速因謂豫曰吾以無能濫荷上恩領袖宗門即是華嚴宗門總五教似是華嚴五教為國一即是國一都大師也位已極矣祝釐圖報慮無致力去秋八月佛祖合饗之辰乃見諸祖之軸布裹而庫藏之霾侵蠹損殆至腐爛吾甚惻然謀諸宗門且抽私褚為搆是堂自癸未夏五月而始至冬十月訖功云云由是觀之義砧大師為判華嚴宗事自言領袖宗門總五教為國一此即華嚴五教不其明證乎尚玄答曰非也華嚴五教本以理言非分派也則砧師之總五教為國一者即不過高麗瑜珈宗師普慈國尊弘真國師惠永以道高故為五教都僧統之一例也然則五教者即總當時存在之各教而言殆無疑義也或又問曰兩宗之中曹溪宗則已詳知其創立由緒而禪寂宗之歷史或有可聞乎答曰有九山禪門來歷如左高麗李齊賢撰寶鑑國師混丘碑銘云敻彼心宗逾海而東厥派惟九繩繩仍昆代有哲人此是我東新羅諸師入唐得法還傳心印共為九派即是九山遞于麗末相傳不衰與曹溪宗並立為兩形成禪宗九山禪門其過半數見于諸書即如高麗李奎報撰龍潭寺叢林會榜云夫祖駕西來心法之行乎中國尚矣然猶未及於三韓暨新羅王子道義國師航海入唐求法於地藏智藏之誤和尚得而東還遂入定陳田寺傳心印新羅金薳撰武州迦智山寶林寺普照禪師靈塔碑銘云初道儀大師者受心印於西堂後歸我國隱於山林付法於廉居禪師居於雪山信聖寺傳祖心闢邪教我禪師往而事焉師授法印我師後居迦智山寺故以儀大師為第一祖居禪師為第二祖成師為第三祖然後禪轍始輾于東土矣及我太祖肇基王業篤崇禪法於是創五百禪宇于中外以處衲子間歲設談禪大會於京師所以鎮北兵也九山釋子先其會一年各以其門占斷外方之伽藍而開法會涉冬節是謂之叢林由是可知九山禪門皆在京師松京為大本山而占斷外方之伽藍者即如所屬同派之末寺也龍潭寺叢林會榜又云叢林所嚮其主人所以應接供奉繁夥浩大似不堪支故凡住其寺者皆難之况迦智於九山為大而衲子之輩林會霧集濟濟如也哉又有談禪會迦智山參學等拜祖師文邈離雲嶂方蹈玉京足重趼而來未息倦遊之步首再至曰稽共勤敬拜之誠云云是知迦智山門為松京九山之一而屬道義禪派者也又李相國集李奎報集有談禪會須彌山參學等謁祖師真文傳心曰祖師派曰孫白月朗然遺影宛存於紈素高山仰止羣髠共造於庭階第勤拜扣之誠覬荷恩靈之庇云云是知須彌山亦為九山之一而屬真徹禪派者也海州須彌山神光寺又談禪會聖住山參學等拜祖師文拂三事衲出從雲水堀中拈一瓣香來拜丹青影下仰惟道鑑曲護山門云云是知聖住山亦為九山之一而屬無染禪派者也高麗金丘撰臥龍山慈雲寺贈諡真明國師碑國師諱混元年甫十三投舅氏品日雲孫禪師宗軒披剃受具聰慧絶人學通內外遂為崛山藂席之首中禪選上上科策杖遊方初謁雙峰辨青牛雙峰南雲禪𣲖服勤數載得其閫奧次詣曹溪無衣堂下大為器許又嘗師事清真國師所至稟受盡得骨髓柱國晉陽公嚮師道德奏加三重大師又奏請住定慧社高宗丙午加大禪師大禪源寺在江華王京開堂升座嗣清真壬子八月清真臨滅以院門事屬師王於是命住曹溪為第四世仍命中使陪往曹溪以冬十二月入院再扇牧牛之風是知曹溪別於九山己未册為王師不能行禮俄而上仙元宗即位禮遇殊加以臥龍寺為下山所又云王舅大禪師鏡智小投陽山曦陽山鳳巖寺智證國師禪派圓真國師祝髮敬重於師師謂真明事以門人之禮因受朝旨移籍崛山為品日孫住斷俗寺常來禮覲其為尊勝敬重類如此云云是知崛山亦云孤山雙峰陽山皆可列於九山然則九山之中已知其六所未知者唯三山焉而崔致遠撰智證國師碑中所云南嶽陟智異山洪陟國師按智異山實相寺白月楞伽之塔碑銘云秀徹國師祖西堂藏父南嶽陟大安徹桐裏山惠徹國師雙溪昭雙溪寺真鑑國師新興彥忠彥禪師湧巖體覺體禪師珍丘休鳳林國師玄昱覺林等師之法脈不斷者則可相當而未得確證姑俟後考法眼宗派慧矩國師道峰山靈鑑禪師及圓空國師師法諱智宗住原州賢溪山居頓寺及高麗僧三十一人皆永明禪派等之法派亦應遺傳而無可考妙清衒術欺君謀逆高麗仁宗五年三月甲辰西京妖僧妙清日者白壽翰説王設灌頂道場于常安殿其術詭誕不可知六年八月乙亥王幸西京九月丙午命行從宰樞與妙清白壽翰相定新宮于林原驛地僧妙清分司檢校少監白壽翰自稱知陰陽之術以詭誕不經之説眩惑衆人鄭知常亦西京人深信其説以為上京基業已衰宮闕燒盡無餘西京有王氣宜移御為上京乃與近臣金安謀曰吾等若奉王上移御西都為上京則當為中興功臣非獨富貴一身亦為子孫無窮之福遂騰口交譽近臣洪彛敘李仲孚大臣文公仁林景清從而和之遂上奏曰妙清聖人也壽翰亦其次也國家之事一一問而後行其所陳請無不容受則政成事修國家可保也乃歷請諸官署名平章事金富軾參知政事任元敱承宣李之氏獨不署名書奏王雖持疑而以衆口力言不得不信於是妙清等上言臣等觀西京林原驛地是陰陽家所謂大花勢若立宮闕御之則可并天下金國報贄自降三十六國皆為臣妾故有是命十一月戊申移林原驛作新宮命內侍郎中金安督役時方沍寒民甚怨咨七年春二月西京新宮成幸西京入御新宮時或者上表勸王稱帝建元或請約齊國夾攻金滅之識者非之而妙清之徒喋喋不已王竟不聽三月御新宮乾龍殿受羣臣賀妙清白壽翰鄭知常等言方上坐殿聞空中有樂聲此豈非御新闕之瑞遂草賀表請宰樞署名宰樞不從曰吾儕雖老耳尚未聾空中之樂所不曾聞人可欺天不可欺也知常憤曰此非常之嘉瑞宜書青史昭示後來而大臣如此深可嘆也表竟不得上八年九月命置呵吒波拘神道場于弘慶院般若道場于選軍廳皆二七日從妙清之言也西京重興寺塔災或問妙清曰師之請幸西都為鎮災也何故有此大災妙清慙赧不能答九年八月遣內侍李仲孚築西京林原宮城置八聖堂于宮中一曰護國白頭嶽太白仙人實德文殊師利菩薩二曰龍圍嶽六通尊者實德釋迦佛三曰月城嶽天仙實德大辨天神四曰駒麗平壤仙人實德燃燈佛五曰駒麗木覔仙人實德毗婆尸佛六曰松嶽震主居士實德金剛索菩薩七曰甑城嶽神人實德勒叉天王八曰頭嶽天女實德不動優婆夷皆繪像從妙清妖説也金安仲孚知常等以為聖人之法利國延基之術十年春正月始修宮闕平章事崔弘宰及文公仁林景清董其役及開基妙清使弘宰等宰臣三四人及句當役事員吏皆公服序服將軍四人甲而劒立于四方卒百二十人槍三百人炬二十人燭而環立妙清在中以白麻繩四條長三百六十步四引作法自言此太一玉帳步法二月壬午幸西京時妙清白壽翰奏曰上京地勢衰故天降災孽宮闕焚蕩須數御西京禳災集禧以享無窮之業王問諸日官皆曰不可鄭知常金安及大臣等曰妙清所言即聖人之法不可違也王乃從之十三年春正月妙清柳旵趙匡等以西京反以金富軾為元帥討之斬金安鄭知常白壽翰西人斬妙清及柳旵請降十四年二月金富軾會諸軍攻西京城陷趙匡自焚死富軾奉表獻捷辛旽叶夢封侯弄權高麗恭愍王十四年乙巳五月以妖僧遍照為師傅賜號清間居士咨訪國政照靈山縣玉川寺奴也幼為僧不見齒於其類以母賤故王夢人拔劒刺己有僧救之得免明日以告太后會金元命以照見其貌惟肖王大異之與語聰慧辨給自謂得道詭為大言輒中旨王素信佛又惑夢由是屢密召入內與之談空照目不知書常遊京都勸緣誑誘諸寡婦售其姦自見王務矯飾枯稿其形雖盛夏隆冬常衣一破衲王益重之凡饋衣服飲食必潔淨至於足襪必頂戴致敬饋之李承慶見之曰亂國家者必此髠也鄭世雲以為妖僧欲殺之王密令避之二人既死乃長髮為頭陀復來謁王始入內用事言無不從人多附之秋七月癸未封遍照為真平侯十二月以遍照為守正履順論道燮理保世功臣壁上三韓三重大匡領都僉議使司判監察司事鷲城府院君提調僧録司事兼判書雲觀事始稱姓辛改名旽初王在位日久宰相多不稱意嘗以為世臣大族親黨根連互為掩蔽草野新進矯情飾行以取名望及其貴顯自耻門地單寒連姻大族盡棄其初儒生懦而少剛又有門生座主同年之號黨比徇情三者皆不足用也思得離世獨立之人以革因循之斃者久矣及見旽以為得道寡欲且出於賤微更無親比任之大事則必徑行而無所顧籍故拔於髠緇授以國政而不疑也王請旽屈行以救世事旽陽不肯以堅王意王強之旽曰嘗聞國王大臣多信讒間慎毋如此乃可福利世間也王乃手寫盟辭曰師救我我救師死生以之無惑人言佛天證明於是旽與議國政用事三旬罷逐親勳名望冢宰臺諫皆出其口領都僉議久虛其位至是自領之始出禁中寓奇顯家百官詣門議事旽以辰巳聖人出之讖昌言曰所謂聖人豈非我歟旽貪日甚貨賂輻湊居家飲酒啖肉恣意聲色謁王則清談齕菜果茗飲罷密直提學李達衷達衷嘗於廣坐謂旽曰人謂公酒色過度旽不悅罷之十五年夏四月王以無嗣選宗室德豐君義女及右常侍安克仁女為妃高麗王氏娶同姓之事乃驗於此與辛旽共觀之旽據胡床自若甲子左司議大夫鄭樞右正言李存吾上疏曰辛旽嘗騎馬出入紅門與殿下并據胡床其在家宰相拜庭下旽皆坐待之雖崔沆金仁俊亦未有如此云云王大怒命焚其疏召存吾面賫之時旽與王對床存吾目旽叱之曰老僧何得無禮旽惶駭不覺下床王愈怒下樞等巡軍獄旽黨必欲殺之李穡救免自是旽之桀驁尤甚宰相臺諫皆附旽而言路塞矣乙亥旽以其黨黃裳李壽山等十一人為禁衛提調官於是內外之權悉總於旽辛旽與宰樞延廣州天王寺佛舍利置之王輪寺戊寅王率百官往觀之施黃金綵帛又賜僧布八百匹宰樞以下冠帶立庭旽著半臂衣手圓扇並御床坐王拜舍利旽亦拜旽袖緣化文立授王王受之愈謹五月置田民推整都監以辛旽為判事令曰比來綱紀大壞貪墨成風宗廟學校倉庫軍須田及國人世業田民豪強之家奪占幾盡或已決仍執或認民為隸州縣驛吏官奴百姓之逃役者悉皆漏隱大置農莊病民瘠國感召水旱癘疫不息今設都監推整其知非自改者勿問過限事覺者糾治妄訴者反坐令出權豪多以所奪田民還其本主中外欣然旽間一日而至都監李仁任李春富以下聽決焉旽外假公義實欲市恩於人凡賤隸訴良者一皆良之於是奴婢之背主者蜂起曰聖人出矣八月旽髠李龜壽置于松廣寺金貴于廬山寺朴椿于裂岩寺後二人遣人皆沉于江殺之設文殊會於宮中凡七日王憂無嗣或至泣下辛旽説王曰開文殊會則必誕元良王從之欣然有得子之望前會一日別建淨殿於宮內覆以白茅為道場吹螺擊鼓如三軍鼓角都人初聞以為宮中有變皆驚駭久之乃定旽入道場終會而出緇黃雜流填咽宮掖糜費不資九月幸洛山寺辛旽願剎也左右爭言於王曰今歲大稔實由僉議之燮理也王敬旽稱僉議而不名旽以洛山觀音靈異令吳一鶚密書願狀曰願令弟子分身牟尼奴福壽住國牟尼奴旽婢妾般若所生是為禑或云初旽納私婢般若有娠屬伴僧能祐使就産於其母家七日而般若還能祐母收而養之未幾年其兒死能祐恐被旽讓竊取他人兒置諸他所請於旽曰兒有疾移養城外何如旽許之比及一年旽取養于家般若亦未知非其兒也王常求嗣謀所以立後一日微行至旽第旽指其兒曰願殿下為養子以立後王睨而笑之不答然猶心許之十六年二月元以辛旽為集賢殿太學士賜衣酒旽受宣于家置之座傍曰安用此物為但他所與不可棄也五月丙戌命重營國學令中外儒官隨吊出布以助其費先是旽與李穡等會崇文館相舊址旽免官扣頭誓先聖曰盡心重營左右曰少捐舊制可易成旽曰文宣王天下萬世之師也可靳小費虧前代之規乎八月以僧千禧為國師禪顯為王師二僧皆旽所善者也王九拜禪顯立受百官朝服就班旽獨戎服立殿上每王一拜輒嘖嘖稱歎私語宦者曰主上禮容天下稀有史官尹紹宗在傍旽顧謂曰母妄書國事吾將取觀之元使乞徹至問曰聞爾國有權王何在時中國謂旽為權王故云冬十月王步幸辛旽家置酒落成初旽在奇顯家由奉先寺松岡出入王宮岡之西南有隙地旽白王曰幸就此搆小房則庶便老僕進退王許之旽令其黨督役不日而成又於北園作別室重門深幽明窗淨几焚香獨坐蕭然若無欲者知都僉議吳仁澤與前侍中慶千興三司左使金元命等密議曰辛旽邪佞陰狡好讒毀人斥逐勳舊殺戮無辜黨與日盛道詵記有非僧非俗亂政亡國之語必是此人將為國家大患宜白王早除之判書辛貴聞以告旽旽入告于王曰旽山水間一衲者也上勒令至此不敢違命思欲去姦惡用賢良使三韓百姓粗得平安然後將一衣鉢還向山林今國人將殺旽願上哀矜王驚問之旽具以貴語對乃命繫仁澤等巡軍獄鞫之杖流于外十七年九月始賜辛旽妾般若米月三十石十八年夏四月丁卯辛旽設文殊會於演福寺王往觀之賜僧布五千五百匹九月辛酉王幸王輪寺設天兵神衆道場七日乃還王手書疏賜僧布一千五百匹辛旽亦施千五百匹十一月設八關會辛旽攝王受羣臣朝于儀鳳樓十九年夏四月戊辰設文殊會于演福寺命辛旽先往乃令承宣及衛士衛旽遂親幸觀之二十年六月丙辰選部議郎李韌上匿名書告辛旽謀逆鞫其黨奇顯崔思遠鄭龜漢陳允儉奇仲修等誅之己未流辛旽于水原辛酉辛旽伏誅兩府臺諫理部上書論旽大逆之罪請置旽極刑王從之遣大司成林朴判書金斗誅旽于水原初王與旽春富等同盟至是授朴盟書使示旽曰數曰爾嘗謂近婦女所以導引養氣非敢私之今聞至生兒息是在盟書者歟城中甲第至七是在盟書者歟如是者數事數罪訖可焚此書朴至水原使人詐報宣召旽喜曰今日召還蓋為阿只思我也阿只方言小兒之稱旽當刑束手乞哀於朴曰願公見阿只活我乃誅之旽性畏畎犬惡射獵且縱淫常設烏雞白馬以助陽道時人謂旽為老狐精尚玄曰妙清之於仁宗辛旽之於恭愍寵幸一也而妙清專用詭誕之術數欲達其志終不得意但取滅亡其計也拙其志也愚而已至於辛旽崛起於寺奴之家專權於國王之朝得叶夢之機會邀封侯之榮寵其為人也狡猾其行事也敏給相舊址立誓而重營聖廟用正言鉗制儒者之口判都監發令而推整民田以惠政市得平民之心呂不韋之奇貨可居公孫弘之布被是詐於此諸事可知其決非庸流人物也况恭愍王有為之主也環顧一世無可與議不委之世臣獨拔於山僧自為如魚之得水不知教猱而升木旽乃信道詵之記勸遷王都而固其寵疾普愚之賢讒逐遠地而欲其死搆第松岡欲老境之行樂竄死花城乃現世之淫報元帝出傍為護佛法尚玄曰按輿地勝覽高靈縣盤龍寺在美崇山有元世祖時榜文云皇帝聖旨裏行中書省照得軍馬俱到合浦已上船征進外有落後屯住正軍濶端赤人等於義安上下丹城村寨牧放頭匹誠恐屯守各處寺院踏踐搔擾有礙祝延聖壽善事擬令出榜省諭禁約若有不畏公法之人於寺院內踏踐搔擾以致不安仰所在官司捉拿前來依條斷罪施行今行榜示者右榜付盤龍寺張挂省諭諸人各令通知云云又按高麗史元宗十四年元世祖至元十年二月乙酉黃鳳州經略使差人賫元詔來令僧徒出迎其詔云禁軍士搖擾僧舍損毀經像使之安心作法云云盤龍寺榜文疑即因此詔揭示者也高麗高宗十九年壬辰蒙古太宗四年顯宗時大藏經板本燬於蒙兵二十五年庚子蒙古太宗十年夏閏四月蒙兵至東京燒皇龍寺塔蒙古即元也至于世祖深信佛法以西藏喇嘛宗僧發思八為國師專心興隆三寶印大藏經頒布諸國建寺設齋譯經講道度僧等事不可枚舉今此下詔出榜禁軍士搖擾僧舍損毀經像亦可見其護法之心也元世祖非徒崇佛亦能崇儒按高麗忠宣王即位之初在梨峴新宮下教有曰先於至元十二年欽蒙世祖皇帝遣阿禿因來傳聖旨又於至元二十八年豫與鄭可臣柳清臣等詣紫檀殿裏親奉世祖皇帝聖旨云同姓不得通婚天下之通理况爾國識會文字行夫子之道不應要娶同姓時有李守丘傳説柳清臣又傳譯鄭可臣本國因循未還遽革耳自今若宗親娶同姓者以違背聖旨論宜娶纍世宰相之女為室宰相之男可聽娶宗親之女若家世卑微不在此限云云自是高麗不娶同姓變蠻風而守禮義乃元世祖之賜也恭王迷信朱帝賜書麗史云恭愍王十九年庚戌五月成準得還自京帝帝謂明太祖朱元璋賜璽書曰近者使歸問國王之政言王惟務釋氏之道中略歷代之君不問華夷惟行仁義禮樂可以化民成俗今王舍而不務日以持齋守戒為事望脫愆冤以求再生之福佛經之説雖有然不崇王道而崇佛道失其要矣朕幼嘗為僧禪講亦曾參究惟聞有佛而已度死超生未見盡驗古今務釋氏而成家國者實未之有梁武之事可為明鑑今王能舉先王之道與民興利除害使父母妻子飽食暖衣各得其所生齒日繁此道若舉則福德之應王子必生於宮中此則修行之大者也云云尚玄曰昔梁武帝創寺度僧麵代犧牲崇奉佛法可謂至矣而達磨謂無功德後世諫人主信佛者輒以梁武為口實今朱帝亦佛者也觀其書意可謂知大體而固不害其崇佛之德也劉宋文帝嘗問於求那跋摩三藏印度之迦濕彌羅國人也曰朕欲齋戒不殺以御天下未得所志對曰帝王所修與匹夫異匹夫身賤名微言令不威倘不克己苦節何以濟用帝王以四海為家兆民為子出一嘉言則士民咸悅布一善政則神人以和刑不夭命役不勞力則風雨應時百穀滋茂以此持齋持齋亦大矣以此不殺不殺亦至矣寧在輟半日之餐全一禽之命然後為弘濟耶帝撫几嘆曰俗迷遠理僧滯近教如法師之言可謂盡天人之際矣新羅文聖大王問無染國師曰禪教高下為寡人辨釋師答曰百僚阿衡各職其職帝王拱默廟堂之上萬姓以安王聞之大悅恭愍王問法于普愚禪師師曰為君之道在修明教化不必信佛若不能理國家雖致勤於佛有何功德無已則但修太祖所置寺社慎勿新創又曰君王去邪用正則為國不難矣云云等語蓋帝王之不信佛法非獨不信者之過也亦論佛法者未盡其妙也如上三師者義正而語圓辭善巧而不反於道與明帝之意不謀而相同為帝王家信佛者之龜鏡也法華經偈曰是法住法位世間相常住吾今活用而倒置之曰世間相常住是法住法位愚公密告紅賊應記麗史云恭愍王六年二月己酉命李齊賢相宅于漢陽築官闕僧普愚以讖説王曰都漢陽則三十六國朝王惑其説故有是命按太古普愚禪師之門人維昌撰師行狀有曰玄陵恭愍王也問曰為國何如師曰只這睿聖仁慈之心是萬化之本出治之源請回光一鑑而又時之弊數之變尤不可不察昔聖朝會三歸一垂裕後昆者賴佛之力也是故開半千禪剎弘揚祖道龍天佑之祖佛加之或曰本京是三陽之地禪為一本配陽之德而九為三陽數故以九祖之道可以裨之若夫九山參學各作其隊規令演福明堂之地敷暢厥由則天祥降地嘏生矣爾後如其言尚矣雖然今也九山禪流各負其門以為彼劣我優閧鬪滋甚近者益益以道門持矛盾作藩籬由是傷和敗正噫禪是一門而人自闢多門烏在其本師平等無我之道列祖格外清揚之風先王護法安邦之意也此時之弊也而九為老陽一為初陽老而衰也理之常而又立都之時九山之來既久不如反其初為新陽之為愈也此數之變也當是時也若統為一門九山不為我人之山名道存同出一佛之心水乳相和一槩齊平於是乎俾百丈大智禪師禪苑清規熏陶流潤其日用威儀精嚴真淨參請以勸鍾魚以時重興祖風而五教各以其法弘之以奉萬歲聖祚延而佛日明矣豈不暢哉然而嘗觀王氣不在此都以復古初全盛之時難矣哉若南遷漢陽行向所陳之言則自化孚六合澤彼萬靈矣玄陵曰大哉言乎敕戒左右從而行之不幸譣詖間作師之志未滿惟緇林鬱鬱耳其扶宗教贊王化之實如是又云戊戌春悲愍王七年玄陵敕修城郭師上書密告紅賊之記己亥秋師觀苞桑之象入彌智山預搆草堂曉諭凡民曰可作逃難之具也辛丑十一月賊陷京應前所記云云尚玄曰普愚禪師知時之弊察數之變統九為一期圖白足之融和盈千纍萬預知紅頭之來侵故陳遷都之利益實出為國之誠心蘆江秋風乃作飛鴻之色舉草堂春日誰知臥龍之足睡蓋師本駐錫於北漢山之重興寺抑或有意于擇取地德者歟妙清欲遷平壤辛旽欲遷忠州普愚欲遷漢陽其信讖則一而有賢愚邪正之別不可同年而語也檜巖寶鳳指空來遊西天第二十二祖摩拏羅尊者傍出左陀瞿頗尊者傳至提納薄陀尊者海東高僧求法天竺者具載僧傳而天竺沙門傳法海東者高句麗有順道阿道百濟有摩羅難陀及倍達多三藏新羅有墨胡子煙起師毗摩羅真諦辰伽陀佛陀僧伽諸三藏高麗有弘梵大師與達磨悉太古語録中有送達磨悉歸天竺國詩曰西天真佛子身與白雲間寄語山山水須開青眼看及指空禪師師為西天百八代祖師師自元國來遊高麗卓行芳名千秋不泯楊州天寶山之檜巖寺長湍寶鳳山之華藏寺皆其所創師又付法於懶翁禪師西天心印直傳東土為我禪史放一異彩也輿地勝覽楊州檜巖寺在天寶山金守溫重修記我東山川之勝名於天下而佛廬之處于其間者又不知其幾百十至於極仁祠制度之備而具法王行化之體則未有如檜巖者也昔天曆間西天薄伽納提尊者見此寺基以為酷似西天阿蘭陀寺且曰迦葉佛時已為大道場於是執繩量地以定其位時得劫前礎砌當時暫庇屋宇以識其處而已有玄陵王師普濟尊者懶翁受指空三山二水之記遂來居此乃欲大之分授棟梁奔走募緣功未及半而王師亦逝矣其徒倫絶澗絶澗倫公見於白羊寺雙溪樓記等念王師未究之志踵其遺矩以畢其績牧隱文靖公記之輿地勝覽又云懶翁始建寺未畢而死其徒覺田等訖工為屋凡二百六十二間成化壬辰春大王大妃殿下傳懿旨于河城府院君臣鄭顯祖若曰豫一婦人承祖父餘休佑我世祖大王誕育聖子神孫雖皇天眷佑東方亦未必非夙世植德本於佛乘也自古慈母欲保於其孫忠臣欲壽於其君莫不惟三寶是歸檜巖東國大伽藍也三和尚相繼開山三山兩水之記肇於指空實壽君福國之地也云云按三和尚相繼開山者即謂指空懶翁無學三世也蓋檜巖寺太古禪師亦曾出家于此千峰和尚名卍雨亦曾住錫于此涵虛和尚亦曾修道于此本寺實為麗末鮮初之第一禪剎也輿地勝覽又云長湍郡華藏寺在寶鳳山寺初為繼祖菴指空始相地大搆蘭若遂為大叢林其他如靈山縣靈鷲山在縣東北七里鎮山西域僧指空到此云山與天竺靈鷲同其形故名定林寺在靈鷲山寺有般若樓高麗金倫為合浦萬戶時為指空建此樓三日而畢空登之説般若經因名焉太古懶翁臨濟嫡孫支那蕭梁元魏之時達磨祖師自西域來創立禪宗是為初祖傳授心法衣鉢為信至于六祖慧能大士鉢止不傳兒孫滿地於是二派五宗並峙分布而南嶽下之臨濟青原下之曹洞傳之最遠二派五宗盡傳新羅雖然新羅僧史之中未有特立宗名之事但傳九山門之禪派非徒禪宗為然其他諸宗莫不皆然不彼我之分無優劣之爭新羅佛教極寬廣者蓋以此也至于高麗始設僧科按其朝家認定之宗派試其宗門系屬之僧徒諸宗之名於是乎立大覺國師墓志銘中所云六宗戒律宗法相宗涅槃宗法性宗圓融宗禪寂宗及大覺後之天台宗普照後之曹溪宗等即是也高麗佛教極完備者亦以此也今若單提禪宗而言之高麗九山禪門泛稱禪寂宗以禪寂為宗名者即是新羅諸師入唐傳心歸國弘通共為九派者也及普照國師崛起松廣曹溪之宗又別立焉蓋因飲水思源海東禪派無不發源於曹溪故朝家用此名詞以矜式之也後之太古懶翁兩禪師雖得法於臨濟之派仍未免曹溪宗師之法稱矣非徒普照國師以後臨濟法孫仍稱曹溪宗也普照國師以前臨濟法孫亦有稱曹溪宗者高麗國曹溪宗崛山下斷俗寺大鑑國師之碑銘並序守太保門下侍郎平章事判吏部事修國史兼太子大師致仕臣李之茂奉宣撰普賢寺住持大悟重大師臣機俊奉宣書並題額詳夫佛法流入震旦厥惟久矣然自漢永平以來歷魏晉齊梁世之號為浮圖氏者率皆梏于經律滯於名相莫知有所謂教外別傳之妙理直指人心固可以見性成佛也逮乎菩提達摩自西土以大衣寶鉢親付神光然後正法眼藏方傳于世祖祖相授燈燈不熄東漸于海爰及我邦惟是如來大光明藏寥廓無邊含攝諸法大無不包細無不入非思念擬議之所能及語言文字之所能詮不可以知知不可以識識非具爍迦羅眼者孰能得與於此哉其有探最上乘了第一義橫截衆流直超彼岸十方吐廣舌之相一吸盡西江之流開甘露門作獅子吼大事之因緣興起群生之利益直與諸佛齊肩而使天下後世不可跂而及者豈不卓然奇特歟惟我大鑑國師即其人也以宗派考之師乃臨濟九代孫也師諱坦然俗姓孫氏其先陽縣人也父肅以軍功為校尉母則安氏女也師生有異質志氣不群年甫八九歲解屬文作詩有驚人語又工於書時以為千里駒十三學六經粗通大義十五補明經生有聲於世老儒無不推重肅王在藩邸雅聞其賢招致宮中俾侍世子不令一日離去世子即睿王也師蚤有出塵之志視身世如浮雲棄名利若弊屣嘗與師安保玄二高士遊洎聞師安先已披剃則潛出宮徑往京北山安寂寺從寺主落髮時年十九也師素慕禪悅乃就廣明寺依慧照國師服勤承事遂傳心要於是遊歷諸方遍參禪肆藂林學者咸以母老不忍違去左右求得外山小寺奉養不復遠遊肅王踐祚徵赴輦轂十年大遼乾統四年甲申赴大選復中是年命住中原義林寺睿王即政尤加愛重元大師三年丁亥遷住開頓寺四年戊子加重大師十年甲午特受三重大師仍賜法服十三年丁酉住禪巖寺十六年庚子制加禪師仁王元年壬寅特賜帖繡袈裟五年丙午詔住天和寺六年丁未移住菩提淵寺七年戊申春師奏請於所住開張法會此山素多蛇虺頗為行旅所患自法會後莫知去處至今山下人相傳以為異事寺是年秋上幸是寺詔師從容問道親以金剛子數珠授之師即口占一首奏謝上歎其敏妙十年辛亥制加大禪師續金襴袈裟十四年乙卯住普濟帝釋院兼住瑩原寺九月師詣瑩原寺十六年丁巳被詔還京闕十八年己未移住廣明寺師之德行道譽為世所仰每國大事上必以御筆咨問于師由是名嘗寫所作四威儀頌併上堂語句附商舶寄大宋四明阿育王山廣利寺禪師介諶印可諶乃復書極加歎美僅四百餘言文繁不載又有道膺膺壽行密戒環慈仰時大禪伯也乃致書通好約為道友自非有德者豈能使人響慕如此哉二十四年乙丑上尊師道德四月七日右副承宣李鋪豫傳宣以致師事之意席不遣知奏事金永寬繼傳上意師復牢讓至于再三然上亦勤請不已是時彗星出已經二十餘日而又大旱朝野憂懼五月六日始降請封王師書是王師即於是日天乃大雨上謂封崇耆德所致益加信嚮厥明就金明殿行北面摳衣之禮九月七日師入普濟寺十一月五日宸駕幸於寺以致謁造赤黃羅地繡帖袈裟上之敬仰歸重之意實有加而無已也今上繼志禮待彌厚特遣臣上金襴袈裟以表其德二年丁卯師乞歸老于晉州斷俗寺留京而師意益堅上不得已暫許歸休師既得請三月五日出寓天和寺上又欲瞻禮乃迎入于廣明寺師浩然之志不能自己至七月十三日潛發便抵上知不可以勸留乃遣中貴人金存中右街僧録翰周陪行九月三日入寺師雖退處山林祝聖之誠日益彌篤上心眷顧亦不少衰頻遣王人以致之禮以其天性好善誨人不倦故玄學之徒雲臻輻湊所至不減數百人其升堂入室傳心得髓為時宗匠者亦多矣遂以大振宗風光揚祖道重興東國之禪門師有實力焉在人口流傳四方札翰精妙出古人得者以為至寶九年甲戌嘗病起有偈云廓落十方界同為解脫門休將生異見坐在夢中魂十三年戊寅六月四日復示疾至十五囑門人曰吾之歸處我自知之汝等各自務全道力慎勿隨世俗例煩飾冥齋仍説偈言聖辰獨玩心宗廓然快樂遊泳清風偈畢端坐叉手而化顏色如平日春秋九天無雲氣唯此一洞忽然大雨俄頃雨止有五色氣橫亘洞中門人奉遺狀印寶乘驛來奏上聞訃悲悼即遣內臣韓就日者陰仲寅等往護葬事七月十五日備禮加大鑑十六日茶毗于晉州少男驛之北岡二十八日葬骨于斷俗寺北獨立山顛門人等以立碑事上請上命臣之茂以銘臣不材曷足以形容大師之美躅以詔後世嚴命既下不獲固辭姑據門人所録行狀強為序而銘之銘曰正法眼藏不可思議如來付囑舉花以示二十七祖繼繼相承達磨西來傳印暨能自茲以往有百千燈不須衣鉢各闡宗乘道被天下惟上之機克紹真風偉我大師早依慧照針水相投密傳心要遍遊藂席拔萃離倫屢遷名剎説法度人高提佛印重行祖令人天眼目名聲遠布達于中國如彼禪伯馳誠慕德道尊德貴為萬乘師大雲普被甘露均滋厭喧京輦纍乞歸休虛舟不繁飛錫難留退處山林隨緣放曠一無所求年至九十俄然示疾跏趺入寂顏如平日藹藹清芬巍緣高躅刊石為碑揭于斷俗大金大定十二年壬辰正月日門人住持虛淨三重大師臣淵湛奉宣立石普照國師以後臨濟法孫亦稱曹溪宗其證如左太古懶翁俱為臨齊十八代嫡孫除李牧隱穡撰碑外散見於他文者如高麗李陶隱崇仁撰太古語録序云學有師友淵源之正乃可為傳也雖釋氏亦然瞿曇氏歿迦葉氏得其宗相傳至達磨氏入中國厥後大寂氏一再傳分而為五𣲖大圓為溈仰惠照為臨濟匡真為雲門智藏此指地藏桂琛為法眼無際為洞下而惠照之學獨傳今天下之言禪學者一則曰吾臨濟也二則曰吾臨濟也可謂盛矣近世太古蓋人豪也橫拈一錫遊遍江湖至吳興之霞霧山參見石屋珙禪師目擊妙契及其告皈授以伽梨所以傳心也石屋即臨濟十八世之嫡孫而太古之傳得為大宗焉鄭道傳撰圓證國師石鍾銘師生於楊根郡大元里遊學中國嗣臨濟十八代孫石屋清珙之法則於臨濟為十九代之孫也石屋贈法衣禪杖以表相契東還玄陵禮以為王師尋加國師云云李月沙廷龜撰普濟登階尊者西山清虛堂休靜大師碑銘序吾東方太古和尚入中國霞霧山嗣石屋而傳之幻庵幻庵傳之龜谷龜谷傳之正心正心傳之智嚴智嚴傳之靈觀靈觀傳之西山此實臨濟之正派而惟西山獨得其宗云云張溪谷維撰清虛大師碑銘序臨濟十八傳而為石屋清珙麗朝國師太古普愚得石屋之傳自是六傳而至吾師其源流之遠如此云云終南山松廣寺事迹碑銘序宣祖大王第八子義昌君珖書并篆高麗僧普愚入中國霞霧山參石屋清珙禪師清珙即臨濟十八代嫡傳也中略普愚傳之幻庵混修混修傳之龜谷覺雲覺雲傳之碧溪正心正心傳之碧松智嚴智嚴傳之芙蓉靈觀靈觀之上足弟子其名曰善修自號浮休云云李白軒景奭撰碧嵓大師碑自芙蓉靈觀接臨濟之遺緒浮休與清虛俱事觀虛傳之松雲休傳之碧嵓云云懶翁王師以扶起臨濟正宗為己任恭愍王十九年庚戌九月設工夫選師為主盟禪講諸德江湖衲子悉皆集會師升座云正法眼藏作麼生扶起臨濟正宗作麼生扶起三玄三要四料揀四賓主四喝耶且喝是粥飯氣誰人不會如何喚作臨濟正宗縱使道一喝分賓主照用一時行會得箇中意日午打三更這説話只瞞得諸人瞞不得山僧諸仁者細點檢看良久喝一喝云此喝未形已前賓主照用是有是無此喝既消之後照用賓主是有是無正當喝時賓主照用在喝裏在喝外在不裏不外耶又一喝云却將箇中意一時説破了山僧與麼批判還扶得臨濟正宗起麼既扶不起臨濟正宗決定不在照用處四料揀四賓主四喝三玄三要處既不在一切處畢竟在什麼處只在諸人分上諸人當知自己分上一著子煩天共地三世諸佛歷代祖師天下善知識不敢正眼覷著只貴直下承當便了前輩尊宿為爾不肯直下承當不得已曲垂方便教爾參個無義味話只如僧問趙州狗子還有佛性也無州云無早是和盤托出爾若看得分曉即是扶起臨濟正宗時節也當此之時世法佛法了無縫罅便見三玄三要四料揀四賓主四喝以至四大五蘊六根六識山河大地萬象森羅無一法不是臨濟正宗不待扶而自起也西山大師述禪家龜鑑論五宗家風置臨濟宗於首列又作成佛圖置臨濟宗於上位佛祖宗派之圖無學王師所定月渚和尚所録釋迦文佛迦葉尊者卅一祖師六祖大鑑大師南嶽大慧大師馬祖大寂禪師百丈大智禪師黃蘗斷際禪師臨濟慧照禪師興化存獎禪師南院顒禪師風穴沼禪師首山念禪師汾陽昭禪師慈明圓禪師楊岐會禪師白雲端禪師東山演禪師佛果勤禪師虎丘隆禪師應菴華禪師密菴傑禪師破菴先禪師無準圓照禪師雪巖慧朗禪師高峰廣濟禪師斷崖義禪師及菴信禪師平山處林禪師懶翁慧勤禪師妙嚴無學禪師石屋清珙禪師太古普愚禪師幻淹混修禪師龜谷覺雲禪師登階正心禪師碧松智嚴禪師芙蓉靈觀禪師清虛休靜禪師松雲惟致禪師玩虛圓俊禪師浮休善修禪師朝鮮王師妙嚴尊者無學持先師普濟尊者懶翁勤禪師挂真塔名祖派等事奏奉王旨於洪武二十六年九月九日廣明寺挂真次年甲戌三月三日天寶山檜巖寺浮圖雕塔名六月二十五日録載祖派于平山林禪師之下重刊佛祖宗派之圖留板難陀寺也今者妙香山是清虛靜禪師所恆居道場故又録載清虛於及菴信分枝七葉更重刊宗派圖於普賢寺云康熙戊辰幹事清虛三世門人月渚道安尚玄曰佛祖宗派無學禪師録載懶翁而不及於太古月渚禪師添録太古以下至於玩虛圓俊而不及於鞭羊彥機及碧嵓覺性自派之外他所不管雖然以今觀之清虛之下當以鞭羊彥機為嫡承浮休之下當以碧巖覺性為嫡承也蓋高麗時之曹溪之稱號實為極該當極圓滿之名詞也一以除彼我之別一以祛優劣之想何以然也今不見夫太古普愚國師獻言于恭愍王曰今也九山禪流各負其門以為彼劣我優閧鬪滋甚近者益益以道門持矛看作籓籬由是傷和敗正禪是一門而人自闢多門烏在其本師平等無我之道列祖格外清𫾻之風也若統九山為一門水乳相和一槩齊平然後遵百丈清規以薰陶之五教各以其法弘之則佛日明矣云云若由人天眼目等書觀之則五宗之中臨濟家風最高且峻他莫與比今普愚禪師臨濟嫡孫也何不自負其門傲視一切乃反不分禪教汲汲於統一調和哉比如儒教之人但知崇拜程朱而忘孔子可乎西教之人但知崇拜保羅彼得而忘耶穌可乎彼我之別優劣之想其弊之在乎鮮末則如雪竇炯和尚禪源溯流云如來悟底名如來禪祖師傳底名祖師禪也是故如來禪劣於祖師禪是即謂雪山真歸祖師即文殊菩薩化身優於釋迦如來也其解釋則曰文殊為七佛祖師佛佛成道必訪祖師傳持祖印法如是故按真歸祖師之説至清虛禪教釋始盛傳又禪源溯流引臨濟頌三句作配對圖曰第一句此句下薦得為佛祖師臨濟語傳持心印名祖禪師南嶽一物不中南嶽懷讓禪師詣曹溪參六祖祖問什麼處來曰嵩山來祖曰什麼物恁麼來師無語遂經八載忽然有省乃白祖曰某甲有個會處祖曰作麼生師曰説似一物即不中祖曰還可修證否曰修證即不無污染即不得祖曰只此不污染諸佛之所護念汝既如是吾亦如是得祖師禪活人劒消息第二句此句下薦得為人天師臨濟語如來見星悟道名如來禪青原不落階級青原行思禪師參曹溪問曰當何所務即不落階級祖曰汝曾作什麼師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之得如來禪殺人刀消息第三句此句下薦得自救不了臨濟語荷澤作本源佛性荷澤神會禪師侍曹溪祖告衆曰吾有一物無頭無尾無名無字無背無面諸人還識否師乃出曰是諸佛之本源神會之佛性祖曰向汝道無名無字汝便喚作本源佛性師禮拜祖曰此子向後設有把茅蓋頭也為知解宗師為義理禪已上諸説皆自古來宗門流傳而雪竇和尚亦善知識應當見地已能到得故標示禪格宣揚大法雖然後之末學新參拘泥於文字知見未能脫灑胸中先藏優劣之想負臨濟之門蔑視他宗祖師之門五尺之童羞稱荷澤乃至羞稱釋迦如來此所謂權門托鉢也圭峯禪源集都序推荷澤為性宗正派試言之今之禪家能有知見超越於圭峯者乎况古德必以都序節要節要即法集別行録普照國師撰多用都序之言為講學初基之指針皆深有意焉凡今之人宜深究朝鮮禪祖太古愚公所云不彼我之分無優劣之爭之言可也吾非為尊荷澤而抑臨濟也若不知荷澤焉知臨濟惟願諸佛子打破荷澤禪打破臨濟禪打破如來禪打破祖師禪然後不被天下老和尚所瞞也今夫碧巖録者雲門下老宿雪竇顯禪師頌古百則臨濟下老宿佛果勤禪師講義從容庵録者曹洞下老宿天童覺和尚頌古百則曹洞下老宿萬松老人評唱蓋此二書今世禪門奉為圭臬者也試取看之無分二派五宗皆各有玄妙深奧之旨何嘗有祖佛與五宗門戶優劣之評哉海東禪書多言優劣天頙禪師禪門寶藏録諸講歸伏西山大師禪教釋喚醒大師五宗綱要白坡和尚禪門手鏡雪竇尚尚禪源溯流等是也今若有人於此拾舊卷紙墨之陳言以明宗襲古人牙齒之餘慧以説禪例如問如何是如來禪曰天地地天天地轉水山山水水山空問如何是祖師禪曰天天地地何曾轉水水山山各宛然問如何是臨濟宗曰晴天轟霹靂平地起波濤明機用問如何是曹洞宗曰全超空劫不落今時明向上問如何是雲門宗曰劒峰有路鐵壁無門明截斷問如何是溈仰宗曰斷碑橫古路鐵牛眠少室明唯心問如何是法眼宗曰風柯月渚現露真心翠竹黃花宣明妙法明唯心云云則此以死句教人也夫人亦有眼亦能見我所見之書人亦有口亦能説我所説之言然則不過是以眼傳眼以口傳口而已以心傳心則吾未敢十分相信也朝鮮禪宗名雖臨濟非專提唱臨濟語録而以傳燈拈頌皆為教科朝鮮教宗雖主華嚴亦能兼修法華涅槃楞嚴圓覺維摩彌陀諸經所以今日朝鮮佛教稱名禪教兩宗而亦以臨濟一派之兒孫總為禪教兩宗之主人矣太古禪師之所願望者不實行於當時之高麗而得成就於今日之朝鮮也鄭習因被鄰使拒絶恭愍王十五年廢知榮州事鄭習因為庶人州有佛塔習因訊其名曰無信習仁曰異哉惡木不息盜泉不飲惡其名也烏有巍然其形為一邑所瞻視而以無信表之者乎乃令州吏刻日夷之用其甎以修賓館辛盹聞而怒令繫雞林府獄閲五月移繫典法獄困苦之時習因持母服旽必欲置死地廷臣憐之多為白王者乃得免廢為庶人令就州復搆其塔辛禑王時授典校會日本來聘命習因報聘日本使佛者聞習因名乃曰斥佛者吾輩所不與請易之不果行尚玄曰高麗時代夤緣佛法與日本人公私交際頗不冷落見于諸書者如文宗三十年丙辰冬十月有司奏日本國僧俗二十五人到靈光郡告曰為祝國王壽雕成佛像請赴京以獻制許之麗史文宗王子僧統義天寄日本國諸法師求集教藏疏曰敬白諸善友緣本國崇奉佛教日已久矣其開元釋教録智升所撰貞元續關元釋教録圓所撰兩本所收經律論等洎大宋新翻經論總六千卷並已雕鏤施行訖以下缺大覺國師集高宗三年日本國僧來求法麗史恭愍王十七年日本遣僧梵蕩梵鏐偕金逸來報憑麗史辛禑王三年日本遣僧信弘來報憑書云草竊之賊是逋逃輩不遵我令未易禁焉麗史恭讓王三年冬十月日本國僧玄教遣僧道本等四十餘人來獻土物麗史四年壬申六月日本遣使求藏經麗史太古普愚禪師示日本志性禪人偈云白日出扶桑請君須見當返觀明明了腳下即是菩提場寄日本石翁長老云吾以恁麼寄師亦恁麼通吾誠無得失師豈有為功海東山嶽秀扶桑一點紅可憐立雪子幾乎喪家風送日本雄禪人遊江南云日本松風爽新羅月色多若遇南方三伏節為人和唱武陵歌中菴壽允日本允禪人以其號求頌余時年七十六辛禑王二年也目暗放筆久矣其請勤勤強下老筆云千重碧山裏萬丈蒼崖邊回溪流泉細嗚咽深林雜樹空芊綿中有小庵若無有朝晡但見祝君煙花落花開鳥不到白雲時復訪門前誰識主人日用事長年不夢塵間緣寂滅境中伴寂滅緑蘿松上清風月已上並太古和尚集李牧隱穡跋黃蘗語録云黃蘗傳心要訣宛陵録共三十又八紙唐裴休撰日本釋允中菴思欲廣布手刻之既徵豫言為跋豫於是學蓋不暇不敢措辭獨書知允者允年二十五以歲己亥携是録航海西學中原為風所搖遂來王京道梗志不果中遭兵厄失其所携本今所刻者報法齊禪師之舊藏也禪話如麻斤屎橛電掣霆擊令人愕眙惟是録明白易曉觀允所好如是其心可知也其師見龍山與道長老同師中峯有得住持江南兜率寺既而歸國道由燕京諸山尊敬之皆自以為不及豫在燕時熟聞之故知龍山亦非庸衆人允之淵源又可見已觀遠臣以其所主允之館於人元政堂廉密直也遊山則必於人迹所罕至其於墨戲也蕭散有奇趣尤喜為白衣仙傳神最妙其為人無可議者豫故樂為之書李穡撰息牧叟贊并序略云中庵日本人也號息牧則絶學無為間道人矣豫甚慕焉豫甚敬焉乃作贊曰彼何人斯蓑笠于牧麾之以肱牛耳濈濈既馴以升豐草平麓太平風月童子短笛懶翁和尚至正十四年甲午在檜巖寺宴處一室晝夜長坐時日本石翁和尚寓茲寺一日下僧堂擊禪床云大衆還聞麼大衆無語師呈偈云選佛場中坐惺惺看眼著見聞非他物元是舊主人李崇仁送日本釋大有天祐上人還國序云成均大司成鄭君達可圓德之字奉使日本其還也有大有者同舟而來達可亟稱其為人且使豫見之其貌灑落如瑤林之月其言鏘然若出金石其詩令人讀之不厭殊無蔬荀之氣豫甚愛之大有之言曰吾之來山川形勝之觀庶幾矣薦紳先生之片言緒論願有聞焉且吾名大有字天祐其訓詁義理之歸幸見教焉權近陽村送日本釋大有還國六韻詩曰林濟遺芬遠不窮扶桑釋子振宗風一龕靜坐心灰冷萬里遊觀眼界空馬島雲光鄉樹外鵠峯秋色客窗中情懷每向詩篇富言語須憑象譯通海濶蓬壺連浩蕩天低星斗漾沖融故人刮目知多少舊壑松枝盡指東鄭以吾送日本天祐上人還歸序云己亥之夏日本國遣使來憑沙門祐公隨至蓋欲托行事而實訪乎名山者也其為人也端潔有道氣字畫詩律俱有可觀殿下命有司館待既隆及將還也祐上人進言於朝曰金剛山靈異之迹擅名於天下吾禪而遊者以不到是山為慊願留錫以觀之仍賦詩達其志使轉告於吾君於是命禮官從其願留又特賜鞍馬而待之益隆其年秋使乘傳以訪金剛山極其遊觀之美隨遇隨記其為文無慮萬言矣豫借一讀之詞綵曄然溢目非禪寂者所能也留二載又進言曰吾道雖曰辭親割愛然有老母而無他兄弟願得歸覲朝之文士咸嘉其志皆詩之贈其行權採送日本國使齡上人松泉幽卷詩序云日本氏國於扶桑之域政簡民淳故其俗多尚浮屠參訪之人因奉使而遊列國者前後相望唐宋以來有若炯然寂恕及榮睿之徒我殿下即位之初有倪上人祐文溪之徒繼踵而來亦皆韻釋也今齡上人亦因求法自歲壬寅至乙巳四年之中奉使於我國者三矣殿下嘉其義命攸司郊勞館穀加等焉上人年芳而學碩神清而形𦡱粲粲清立望之如出壑之氷盛之玉壺也一日以其所編松泉幽卷請於縉紳先生曰歲在壬寅特蒙篆書之賜余固珍藏願贈一言以終惠焉於是朝中文士咸詩之矣俾余序徐居正四佳秋山圖為日本誾上人作云秋風嫋嫋江水波前山後山霜葉多穿林石棧相紆縈時見樓閣誇崢嶸野外風簾高百竿小橋倒影臨清灣蹇驢孤客何所之吟鞭指點行較遲別浦寒潮漲半篙漁郎隨意移輕舠長天渺渺煙茫茫重洲落日蘭芷香當時畫史好事者想見丘壑藏膏肓披圖忽此心神融起我遠興遊江東江東蓴鱸正無恙目斷天涯半帆風至于朝鮮以佛法與日本僧有交際者莫如松雲大師也師在日本唱酬頗多具録于左九月九日以登高意示仙巢去年九月九閉門高臥嵩山陽今年九月九布帆萬里鯨波長遙思月照啼猿樹桂子雲外飄天香黃花緣橘總無賴感物思歸空斷腸贈馬島僧萬室正中偏與偏中正正去偏來理事全更向正中來上看依前還入正中偏次仙巢韻二黃蘗老人轟霹靂白拈臨濟捲風雲固知佛法無多子八兩原來是半斤城市曾聞大隱在老師方丈正依然點茶示我宗門句知是西來格外禪家康子德川氏有意禪學求語再勤仍示之大空間無盡藏寂知無臭又無聲只今聽説何煩問雲在青天水在瓶仙巢以達磨忌日求語老去思歸始拂衣獨行蔥嶺路熹迷傳家清白無恆産隻履流沙懡㦬歸有一老倭僧持以蒙頭達磨畫幀徵讚書之云萬里西來惟傳不識懡㦬渡江九年向壁清白家風自買自賣衲被蒙頭當面忌諱雖然不露頂眼光爍破三千界有一倭僧求語二棒喝交馳格外旨才隨語會昧神機瞥然回首知端的獨把龍泉定是非無住真人沒形段尋常出入面門中倘能一念回機了踏斷電光流水聲五山三倭僧來見因問禪宗綱領以無頭話贈之人人腳下活獅子誰怕南山鱉鼻蛇一口倘能吞海盡珊瑚帶月出滄波張拳活把惡鉗鎚打破野狐精靈窟㘞地驚天動地來肉團即是黃金骨此事從來不思議固知無臭又無聲吾今省得巖頭喝驢糞逢君換眼睛贈松源宗長老僧這一物甚麼樣本無聲臭那容思為君通一線路得個入處莫遲疑毫釐有差千里謬一念回機即在茲看來看去沒巴鼻肯用中書描畫伊君不見三街村裏兄兄禮閙市廛頭父父知又不見飢來思飯渴思飲坐臥動靜常相隨鯨怒飲乾滄海水月明露出珊瑚枝宗門古調作麼唱石子中宵捻玉吹贈承兌雨餘庭院淨沙塵楊柳東風別地春中有南宗穿耳客世間皆醉獨醒人次承兌韻碧雲湯惠住琳宮係出同宗血脈通迷翻發省知無我道至忘言不計功芳草漸長流歲月碧桃開盡老東風蒼生普濟無窮意只在南禪轉手中倭僧悟初持達磨幀來見仍以徵讚書之十萬里來青眼少九年虛度少林春不逢末後神光拜也是流沙浪走人有一倭僧持西竺中原諸祖派軸來示求讚書之靈鷲拈花飲光微笑齴齲東來重彈古調一燈分千千家互照咦阿耨池中一派來四海魚龍以為命次元佶韻江草江花處處奇旅遊春恨但吟詩孤舟別意明朝在回首東風是去時正月十二日雨雪松源宗長老釋折繁花一枝使仙巢來示曰此花之名未知詳也以鄙意稱之紅雨桃紅雪櫻是意如何願聞印可也余以一絶示之尚玄曰疑即櫻花也藝藝萬物本無情物豈稱吾某姓名觀物只應觀美惡肯將紅紫定桃櫻次承兌韻世間何處覔藏舟天外仙山去路修一片孤帆滄海遠白頭空恨此生浮贈日本圓耳教師歸家活路莫遲留直透威音那畔休鑑物沖虛無所住回機寂照有來由頂門具眼如天主肘後懸符似國侯浮世度生遊幻海駕船無底任波頭參禪須破祖師關縛虎拿龍莫等間直得驚天動地去此時方得到家山贈倭僧兼用旅情春去芳菲緑滿庭舊遊松柏夢中青遙知萬二千峯夜海月依前照玉屏深院寥寥閉小庭客愁春盡草青青等間得此飛來句吟罷相思倚錦屏別仙巢聞飽聲名已十年浮雲聚散各悽然禪窗雨過花如霰客舍春深柳似煙人事每違真夢幻浮生一會好因緣他時倘遂重遊計皓月金沙奏沒絃贈日本僧本自無生無滅時阿誰下棒又誰治春深紅入桃花發更向高枝笑展眉次元佶韻聚散皆因宿有緣海東那料此同筵春亭烹進仙茶飲青草煙花滿眼前欲把黃庭問神訣遠勞桑海款仙扃喚沙彌進茶三碗東院宗風古典型次宿蘆韻赤肉團前無面目誰將臭骨裏間皮看來已是不著忍况用中書描畫伊鯨怒飲乾滄海水月明露出珊瑚枝翻身直把露刃劒三世佛祖誰敢窺贈參玄人對馬州東夜馬臺客船明月遠帆開梅花公案提持去北野祠前請益來贈義智調信仙巢三老聲名滿海東相忘已在形骸外莫言兩地不相逢興來相與精神會次承兌韻江樓院裏惠休師利物多方語帶悲馬祖豈迷山鬼泣德雲能散野狐疑對機舒卷如雷震濟世翻經比繹絲退席空慚遠遊子寸心留待再參期贈日本僧圓光元佶書西來一曲子曾與兄吹之瞥然如昨再換春秋無情歲月如石火電影長吁耳奈何遙想老兄於無位真人面目上能發大光明度脫諸島生靈高哉高哉向者余以先師諦南遊馬島前至貴國得見圓光老兄西笑長老五山諸德盛論臨濟狂似是家字之誤風別明宗旨不亦多乎余之本願只要盡刷赤子以副先師普濟生靈之訣願莫之遂空手而還無任缺然余自西還衰病已深仍入妙香山自守待盡矣適來聞有使行即以寒暄二字遠驚老兄靜中春睡去也唯兄無違本志當以度生願前告大將軍盡刷生靈無冷舊盟幸甚不腆薄物統希笑領不宣贈仙巢書別來如昨再換星霜相思一念未嘗暫忘只以百草頭上祖師意自寬耳餘何足道哉古德或以望州亭相見或以烏石嶺相看以是道眼看來則長老之眼松雲之見松雲之眼長老之見云何以別商量去也余乃西還衰病侵尋西入妙香山自守待盡矣適來聞有使臣之行為寄相思字以問老兄安否萬一也向者余以先師遺訣南遊至貴島與兄及柳川前至日本得見西笑老兄圓光長老五山諸德盛論宗旨具明所從來佳則佳矣未遂本願而回無任缺然唯兄更為盡心盡刷生靈無落前期幸甚不腆薄物統希笑領不宣贈宿蘆禪師書道無形何自所隔心無迹誰敢去留無形迹興來獨與精神會然則在萬里長相見師與我耳又何容聲於其問哉師亦以此眼照之星湖僿説云仁祖己巳夏日本僧玄方請詣京師朝廷許之玄方乘轎而行至則設迎慰宴於兵曹玄方曰朝鮮為山戎所侵義不可不援因欲通貢於天朝又云舊時送人日本教以文教以樂樂則稱以高麗樂至今用之於天皇宮音律變訛朝鮮與上國為父子之國佛法亦必盛傳欲得傳授禮官開諭曰今朝專尚儒教棄廢禪道玄方又云向見松雲禪師真大師也禮官答松雲已死無繼續者玄方發怒不受餞宴而皈智雄繼利雄為國師利雄尊者者圓證國師太古普愚也智雄尊者者普覺國師幻庵混修也智雄為利雄之嗣法按洪武十八年乙丑韓山君李穡奉教撰利雄尊者塔銘而碑之後陰記有云門徒國師智雄尊者混修王師圓應尊者粲英內願堂妙巖尊者祖異內願堂國一都大禪師元圭都大禪師廣化君玄嚴以下略又太古門人維昌撰利雄尊者行狀有云其推為上首輩者曰幻庵和尚今為國師正辨智智雄尊者曰古樗和尚今為王師妙辨智圓應尊尊者是幻庵為太古之嗣法也明矣又按蒼龍己未即洪武十二年韓山君李穡撰驪興郡神勒寺普濟懶翁王師諡禪覺號普濟舍利石鍾記而碑之後陰記有云門生前住松廣廣通無礙圓妙大智普濟大禪師修幻庵又按懶翁和尚語録云侍者覺璉録廣通普濟住釋幻庵校正又按陽村權近奉教撰普覺國師碑有云師入五臺山居神聖菴時懶翁勤和尚亦住孤雲菴數與相見咨質道要翁後以金襴袈裟象牙拂山形杖遺師為信又於工夫選時問答契合是則幻菴亦為懶翁之嗣法也但利雄之碑成於前普濟之碑成於後則幻菴之嗣承當以後者為準也雖然所未可知者普覺之碑成於最後何不一言道及於太古耶懶翁集中有送幻菴長老謁師翁頌曰餘疑要決謁師翁倒握烏藤活似龍徹底掀翻明白後大千沙界起清風然則幻菴別有一師翁而此師翁疑即太古也且懶翁稱幻菴以長老則此亦非師資間之用語也覺雲書成珠落筆端高麗真覺國師慧諶號無衣子撰拈頌集三十卷又覺雲撰拈頌説話覺雲有二人焉一為真覺國師之弟子名覺雲一為幻菴國師弟子亦名覺雲號龜谷皆高麗人而年代懸隔世人皆以後者為撰説話之覺雲然不無疑端焉以龜谷覺雲為撰拈頌説話者如左重刊拈頌説話序往在勝國國朝以禪法為干城禦寇兵延國祚當時禪學之盛不在中國之下是以散聖牧牛翁普照國師之嗣法無衣子諶公裒其禪門諸傑之或拈或頌或代或別於本師所説及乎迦葉以下所示者散在諸語録底編録為三十卷文目之曰拈頌大別略也以貽學者而其語隱略又多出於內外諸書反使管見者未免謗蒼蒼之愆故龜谷覺雲公憫焉別為説話而明之下略戊午仲夏曹溪山人無用秀演謹序撰拈頌説話者似是真覺弟子之覺雲誤添龜谷二字便成訛混者如左重刊拈頌説話序閔昌道撰號天隱子亦號三教了父蓋自赤烏吳孫權時白馬漢明帝時緣起而淨土之教遂彌滿震旦説者謂臨濟之宗被之我東於勝國真覺大師慧諶而有徵焉師以大知識近獲佛日師遠紹牧牛子佛日牧牛即一人而今何疊引云近獲遠紹之正宗始於十二部終以諸家雜記對道原傳燈録而集成一編有曰拈曰頌曰上堂曰哄曰話曰代曰別之分而取振綱宣義之意而命曰拈頌上自七佛下逮諸祖種種心種種法若現若滅引無方之喻而使自得於不出不入之際其例則史而其義則經也書成而傳之龜谷覺雲禪師師受業以來如得少林別傳之妙法瑜珈祕密之方便者有不可覩奧而覔緒者故思所以羽翼而發明之遂覃思研精闡妙張幽此説話之所以作也云云按真覺與龜谷相距稍遠何能書成而傳之受業故疑真覺所傳之者非龜谷覺雲而乃自己之弟子覺雲也至如下文又是龜谷覺雲之事也閔序又云竊觀牧老之記雲乃衣冠之胄以達磨心普賢行受知玄陵賜折蘆渡江圖六牙白象圖及御題名號四大字龜谷覺雲四字且奏於朝請刊景德所録之書恭愍王二十一年判曹溪宗事覺宴上言重刊其人其事蓋可知也釋義之業即其餘事猶且揮灑之間筆端時現舍利世傳覺雲在智異山上無住菴作拈頌説話筆端時現舍利菴下作小塔藏之眼底悉證菩提其為功德必不唐捐而數百年來未曾有知而好而顯之者今遇一安釋安釋謂月渚道安即重刊拈頌説話者而始乃大行然則諸佛祖之法由諶而布諶之書由雲而明雲之説由安而傳雖然拈頌説話中所引者多無衣子之言非親承教誨者莫能如是則覺雲之為真覺弟子也明矣無學詳夢勸羅漢齋朝鮮太祖化家為國多行佛事普愚混修神照祖丘等名僧碩德皆為師友而其得無學又如高麗太祖之得道詵也際遇機緣具載釋王寺記釋王寺朝鮮太祖記文東北面都元帥完山府院君李成桂太祖舊諱上元帥判密直司事薑筮副元帥唐城君洪徵助戰元帥前簽書密直司事商議柳源前知密直司事商議鄭夢周前密直副使李和太祖之胞弟義安大君等於洪武十年辛禑王三年夏受命以來次于清州聞大藏一部及佛像法器在海陽吉州廣積寺兵火之餘僧亡寺毀大寶幾於盡失心實惻然遣中郎將金南連舟載以來補其所失若干函軸以成全部置于安邊府雪峯山釋王寺永為壽君福國之資云芝峯類説及藥泉集俱云僧無學居安邊雪峯山下土窟中上龍潛時訪而問之曰夢入破屋中負三椽而出此何祥也無學賀曰身負三椽乃王字也又問夢花落鏡墜此則何祥即答曰花飛終有實鏡落豈無聲上大喜即其地創寺因以釋王名之西山大師雪峯山釋王寺記云我太祖康獻大王洪武十七年辛禑十年甲子遠自金馬來寓鶴城結草為屋為人性度寬弘行止非凡里人以寬厚大人稱祖一夕假寐夢見萬家雞一時鳴又聞千家砧一時鳴又入破屋中負三椽而出又見落花落鏡忽驚悟不知夢兆之吉凶傍有一老婆欲向説夢婆止之曰女人安知大丈夫方來事從此西去四十里雪峯山土窟中有異僧遁世逃名食松被葛言行非凡但形貌黯然故目為黑頭陀者坐不動今九年矣宜可問彼祖即布衣藜杖尋土窟見僧坐禮而進曰草屋塵人欲決疑事願慈悲垂答僧舉頭曰何事耶祖曰昨夜夢見萬家雞一時鳴千家砧亦一時鳴又見落花落鏡又身入破屋負三椽而出此等夢將有何驗耶僧改容曰此皆將作君王之夢非常夢也曰萬家雞聲者賀高貴位也千家砧聲者報御近當也落花何無實落鏡豈無聲負三椽者乃王字也花鏡亦促王業之夢也僧又舉頭熟視曰公有滿面君王態也公今日事慎不出於口此一片地建一剎名曰釋王寺至佳至佳又曰大事不可速成限三年設五百聖齋潛祈則聖僧必助王業耳公若不信吾教則非徒事不成禍必滅身望須十分謹之祖退席執師禮曰敬受教矣願和尚慈悲助我大事僧點頭惟惟祖一年內建釋王寺畢又三年內設五百齋畢鄉人皆不知所以也至洪武戊辰辛禑十四年使太祖為將攻遼東四月初祖統軍于義州渡鴨緑江及至威化島祖舉義回軍至洪武二十五年壬申七月十六日祖即位于松京壽昌宮即尋雪峯土窟僧封王師此無學也於是無學出為太祖遷先慕定王都吁草屋中起君王土窟中作王師其大因緣偉哉其解夢日乃釋王之始也其即位日乃釋王之終也然則釋王釋王乃聖祖化家為國之願剎也宜歷聖之敬護也然綿歷傳記中為兵火被蕩惜哉余今日適過此不忍泯迹拔筆略記釋王寺之始終耳涵月海源和尚後跋云康獻聖祖潛邸時神僧無學既釋吉夢又告冥驗於是遂起應真殿因設五百聖齋所謂天真真歇二堂仁智寮龍飛樓等皆一時之營繕也登極之後命創巨剎樓殿寮舍宏麗輝煌甲於一道焉建文辛巳車駕親臨植松于洞種梨于園至今松木之禁斷玄梨之進御者亦由其時之聖教也且夫藏護佛像印送經文至於奴婢之畫給田地之折授皆出曠世之殊典則其聖意眷戀于此者亦不尋常也惜乎屢經兵燹文迹蕩然正統以後興廢成毀未知其幾許而古迹幾盡茫昧往事不可追認然則所可詳審而不使闕漏者其惟近日事乎蓋崇禎紀元後回祿釀災而碧嵓覺性大師鳩財重建役自壬午至甲申而訖厥後琳宮寶殿羅絡山岑碧瓦朱甍照耀溪潭禪居之壯於是極矣聖祖親筆刻板獨能保完於蕩殘之餘無乃天神地靈愛惜呵護而然耶肅宗戊子寺僧行淨奉持板函往納內司仍請鐫石肅廟喜其筆迹之猶存且嘉壽傳之誠心手自補缺因題跋文遂令並刊一石矣訖隆戊寅春今聖上英祖又述追慕之記刊於二聖御筆之下下略世傳太祖聽僧無學之勸告建釋王寺於雪峯山將設三年之齋自吉州廣積寺奉五百聖衆十大弟子十六羅漢及獨聖羅漢等像舟載而來泊元山浦自元山浦至釋王寺躬親背負每一尊像安于應真殿至最後忽生懶怠之心並負二像明日檢之亡失其一不知去處心切怪之其夜祖夢尊者告曰我怒並負有欠禮敬故今來妙香山上毗盧峯云云使人往香山視之果驗遂負之而來安于厥座又亡去不得已設一虛位題曰南無天台山上獨修禪定那畔尊者之位至今釋王寺應真殿中闕一羅漢之像者以是之故云云青野集五山説林俱云太祖開國後下教求無學三方伯一時共路索之至谷山聞高達山有一屋數椽只有高僧獨居三方伯捨其騶從入其洞挂三印于松枝芒鞋走步而行抵其草庵有一僧著犢鼻褌手鉏菜田三方伯就前問曰此庵誰所創也曰老僧手搆之曰何所見而卜居耶曰為彼三印峯也曰何以謂之三印峯曰當前三峯是謂三印若築室於此當有三道方伯挂印於洞中樹上是其應也三方伯躍進而執其手曰此必無學也與同歸而狀聞太祖大喜事以師禮尚玄曰謹按釋王寺諸録太祖夢身負三椽無學以王字釋之皆以此為創寺得名之實事誰然據卞季良所撰王師妙嚴尊者塔碑則無學禪師之出處年分歷歷可數始遊燕都初參指空而決疑又從懶翁得其印可乃於恭愍王五年丙申東還故國復從懶翁於元曉庵恭愍王八年己亥又從懶翁於神光寺以後入高達山卓庵自守云云則雪峯山土窟中暫住則可也安坐九年之説實屬無據又按麗史恭愍王十年元至正草一年辛丑三月庚戌李桓祖太祖之父以東北面兵馬使薨王悼甚遣使吊慰致賻士大夫咸驚曰東北面無人矣是年九月太祖以金吾衛上將軍東北面上萬戶率兵一千五百人擊斬叛賊朴儀于江界自是以後長在行陳南征北伐名聲赫然云云西山記我太祖康獻大王洪武十七年辛禑十年甲子遠自金馬來寓鶴城結草為屋夢負三椽往問雪峯異僧之説亦屬無稽况於洪武十年太祖已為顯達官至東北面都元帥乎書之不可盡信若是然則太祖寓鶴城而結屋時有大人之稱無學師自燕都而還國已彰道僧之譽或在雪峯之山土窟之庵風雲際會機緣湊合見其人氣知為君王之相勸以佛事潛祈聖僧之助也又或如五山説林桓祖之喪太祖在咸興欲得福地而葬之未得卜兆之人一日家僮樵於山潛聞二僧相地當世出王侯之語走告太祖馳騎追回卜得其地今咸興之定陵是也長者懶翁和尚也少者無學上人也云云計其年分正在無學入高達山卓庵自守之後則或者師弟二人作伴雲遊至于咸興有此奇遇亦未可知也太祖得夢欲聞老婆之説太涉不經古之文人作詩而令老嫗解之者有之然豈有蓋世之英雄得夢而欲令村婆解之者耶王字之夢吾雖不敢説而至於雞鳴高貴位砧聲御近當之夢此乃高麗顯宗為奈良君時為太后所逼被剃為僧隱居山寺偶得如是之夢術者作如是之解見于麗史今忽附會於李太祖束為一篇夢話編成受命之符應好事者又敷張之後世之人不敢稍有異議雖然不知正史所述李太祖受命之符乃是夢金尺即龍飛御天歌太祖夢神人執金尺而授之曰慶侍中復興清矣而老崔都統瑩直矣而少戇持此正國非子而誰故朝鮮以夢金尺為廟庭之正樂耳或問曰然則釋王寺不因無學釋王字之夢而得名者乎余答曰太祖御製記文洪武十年自海陽廣積寺載來藏經置于安邊府釋王寺永為壽君福國之資云云據此文意則釋王寺名高麗之時固已有之寺名釋王似是依佛姓而錫之者也疑非為王夢而名之者也而安置藏經因作佛事為國祝福故當時受命諸臣具職列名以示鄭重之意者也初太祖視本寺為願堂而恨其規模狹小未免土窟之觀及其得志之後始創巨剎嚴飾佛像印送經文畫給奴婢折授田地矣又太祖潛邸時嘗讀書于咸興之淨水寺太宗即位元年辛巳重修其寺榜曰歸州寺作祝聖之願堂太宗之時京外七十寺外諸寺土田奴婢盡行屬公而惟歸州釋王兩寺則以太祖願堂之故還為莊嚴之保護之又其兩寺之山皆以雪峯為名李氏朝鮮一代安邊府雪峯山釋王寺及咸興府雪峯山歸州寺為最尊重之願堂寺剎而釋王寺則特奉指空懶翁無學三世之位加以法號祭以師禮至于今日此之兩寺俱為禪教兩宗大本山實為朝鮮追本報效之事也廣積寺之羅漢尊像疑亦洪武十年與大藏經一時移安于釋王寺御製本文聞大藏一部及佛像法器在海陽廣積寺舟載以來置于釋王寺之語足為明證雖然獨聖羅漢之飛去香山甚屬可怪今余試依本來流傳之言作詩以讚歎其事云雪嶽尋僧境自佳夢中王字好安排如非獨聖飛空去虛設三年五百齋無學禪師見其師翁被放密城示寂甓寺遂遊諸山志在晦藏不欲人知師之晦藏則在辛禑三年洪武九年以後矣自是事實雖然按高麗史恭讓王四年壬申王與順妃引見僧自超而李太祖亦以其年七月十六日受禪即位冬十月十一日封自超為王師是時師在高達山故命使往請下山特示尊敬之意也非因不知蹤迹而使三伯一時共索者也則三印挂樹云云等説料不過好奇者附會詭張耳寺院營産法孫犯戒朝鮮太祖即位三年命都堂曰佛氏之道當以清淨寡欲為宗今住寺院者務營産業至犯其所謂色戒恬不知愧身死之後其弟子有以寺社及奴婢稱為法孫相傳以至相訟豫自潛邸思革其斃其令有司勘究以聞尚玄曰朝鮮太祖崇信佛法為國祝福之心不下於高麗太祖然王太祖御世之後內廷十訓保護寺院遂為半千載奉佛之模範李太祖即位之初都堂一命勘究僧徒亦為五百年崇儒之傾向蓋因新羅之末佛法方盛他教無勢故王氏欽仰其盛者之威力而莊嚴之高麗之末佛法方衰儒教有力故李祖鑑戒其衰者之弊害而除祛之高麗之人好依竺典而窮究玄理多間曠而少齷齪其弊也流於陰陽禍福之説賣術數而惑人心朝鮮之儒專務宋學而崇尚虛禮多保守而少發明其弊也入於迂腐偏僻之見起黨爭而釀士禍廟堂籌餉田奴屬公朝鮮太宗二年壬午書雲觀上言曰高麗太祖統三之初或者進言曰背山逆水之地置寺安佛設某道場則可以鎮安國家乃命有司隨地置寺量給田民後之君臣益信而創大伽藍各稱願堂施納田民由是五百年間京外寺社不可勝記於是禪教各宗爭執有田民之寺肥馬輕衣甚者溺於酒色靡所不至寺雖數千僧雖數萬其所行如此雖其道儻有福國之理何有一毫之補哉古人有言曰國無三年之積國非其國又曰暴師久則國用不足以今之蓄積觀之數萬之兵一年之餉尚且不足萬一興師動衆將何以應之伏願其付密記京外七十寺外諸寺土田之租永屬軍資奴婢分屬諸司上從之又據實録則太宗六年正月議政府啓文請定全國中可留置之寺剎即曹溪宗總持宗合七十寺天台疏字宗天台法事宗合四十三寺華嚴宗道門宗合四十三寺慈恩宗三十六寺中道宗神印宗合三十寺南山宗十寺始興宗十寺當時規定有田二百結之寺剎常時養僧百人有田百結之寺剎常時養僧五十人或云此條規定在於太宗十六年由此觀之太宗二年書雲觀之所請京外七十寺外諸寺土田之租永屬軍資者未即實行矣又於世宗六年春大司憲河演上書曰肆以寺社土田之數考核居僧之額靈通之田二百結而居僧才七靈巖之田二百餘結而居僧才四興德之田二百五十結而居僧才二十興福之田一百四十結而居僧十一由是觀之其他寺社亦是類此是則中外寺社分屬一萬一千一百餘結之良田委之何故誠可慨念伏望殿下善繼太宗之志恢弘斯道排斥異端其於京師只留三所留後司開城一所諸道不過二三所餘皆革除其餘諸所擇僧中之練行者俾主之貪利粗行者母或與焉仍罷試選之法勿下僧職之批僧録之司並宜革之以修清淨之道以明如來之教非惟國家之幸亦於僧道幸甚云云又按星湖僿説星湖李瀷英祖朝人寺剎度牒太宗朝書雲觀上言願將密記付京外七十寺外其餘裨補所載京外各寺土田屬軍資奴婢分屬各寺與州郡則兵食足矣於是中外密記付諸寺皆革今時八道寺剎不可殫記僧徒繁夥兵食安得不窘國制有度牒之法今亦蕩掃齊民任自出家余昔過南州路上僧徒殆三分居一問之則皆云賦役煩苛民有三子一必與僧便成俗例也以方千有餘里之地而寺七十亦足矣寺一而僧百足以守之合七十寺而七千人矣以一世三十年為率一歲度僧二百三十有餘而已犯者有罪則庶乎民寧而用裕矣見龍飛御天歌尚玄曰麗末以來儒教方興敵視佛法而又因僧行鄙劣乘機攻之言正理順量定田結制限僧額漸加而上減寺減宗廢司廢科朝鮮五百年佛教衰退之真相如是而已薦福道場建水陸社我海東之有水陸佛事古矣按惠居國師碑云開寶三年庚午高麗光宗二十一年春國師奏曰水州府葛陽寺今水原龍珠寺山明水麗為國家萬代福址願以劃為祝釐之所上可之賜帑金函既厥事國師承命使門人前住廣明寺住持普昱監之修緝像塔殿樓輪焉奐焉明年辛未秋竣功因設水陸道場上命太子往而落之云云又成宗元年壬午上柱國崔承老上書曰光宗或設水陸社於歸法寺云云以此推之水陸法之沿自新羅不難知也高麗宣宗七年正月普濟寺水陸堂火先是嬖人攝戶部郎中知太司局事崔士謙入宋求得水陸社儀文請王作此堂功未畢而火忠穆王四年戊子十一月癸巳朔公主以王疾遣前贊成事李君賅設水陸會於天磨山禱之懶翁和尚語録中有國行水陸齋起始六道普説之文朝鮮太祖四年乙亥為前朝王氏施田百五十結于南海郡見巖寺每年二月十月降內香行水陸齋又於六年丁丑建社于津寬寺歲設水陸道場以追祖宗冥福且利羣生魚變甲疏曰今水陸之設雖云從簡朝家未能頓除忌辰之追福舊習尚存誕日之祝釐諛風未斷况卿士大夫乎卿士大夫猶不能免况庶民乎開其為此而禁其為彼民不信矣是以無貴賤貧富皆曰家禮之法善矣然行家禮則人將議我曰異於常矣水陸之法簡矣然行水陸則人將鄙我曰吝其財矣奔走寺院供佛齋僧召致親友競事奢華麋費不資富者罄竭財産貧者稱貸公私修七既畢葬送力微葬送才畢則公私交徵其債矣是故典賣田宅以償其財而民不聊生此殿下之所未及知而臣等之所痛心也云云又普雨禪師著有水陸夢幻問答則水陸之盛行於當時推此可知也近世或行水陸而於船上讀經施食而已無儀文之可言耳一代文章多撰僧史新羅崔致遠奉王命撰無染國師碑西學也彼此俱為之而為師者何人為役者何人豈心學者高口學者勞耶故古之君子慎所學抑心學者立德口學者立言彼德也或憑言而可稱是言也或倚德而不朽可稱則心能遠示乎來者不朽則口亦無慙乎昔人為可為於可為之時復焉敢膠讓乎篆刻云云蓋佛者專事內究故云心學世稱佛書曰內典儒書曰外典儒者雖不無心性之學而終不免皮相故崔文昌謂之口學者自是千古至論又文昌撰智證國師碑銘麟聖依仁乃據德鹿仙知白能守黑二教徒稱天下式螺髻真人難角力云云麟聖謂孔子也拾遺記云孔子未生之前麒麟吐玉書於闕里人家曰水精子繼衰周而素王天下孔母徵在以繡紱係其角後獲其麟絶春秋之筆故云麟聖鹿仙謂老子也燉隍實迹云老子父韓虔夢日光敷野而一仙人駕鹿入室與上洋朱氏牧豬婢子合懷而孕住胎八十一年生故云鹿仙生於李樹之下故以李為姓云螺髻真人謂佛也佛根本無明已斷故頭髮繞旋如螺髻此亦千古定評也然而心學者之德行每憑口學者之文與言以垂不朽自古已然也佛法東漸以來三國六朝唐宋元明文章學士撰述僧史者不可勝記至我海東則新羅之崔孤雲致遠高麗之李夢遊崔彥撝崔沖金富軾金剛居士李䫨法喜居士閔漬白雲居士李奎報牧隱李穡朝鮮之權陽村近卞春亭季良金乖崖守溫成慵齋俔李月沙庭龜四世李白軒景奭鄭東溟斗卿蔡希菴彭胤蔡樊巖濟恭等皆一時之文章名士也或奉王命而撰塔碑銘或因佛事而製疏記文健筆如椽亘古不泯今余撰朝鮮佛教通史若非諸公之遺文則無所考據也三國古記三國遺事及其他諸書之出於沙門之手者往往虛張太過或有違實反不如儒者居士之撰述猶能保其真面目雖然儒文或有不分宗派者如許端甫之序泗溟堂集此又不可不知也百戰英雄能知佛法新羅金庾信每欲出兵行陳必先參禪禱佛高麗薑邯瓚立塔而祝國福松都府內北部兵部橋西南解慍樓北有浮屠三級在田中高才及肩刻有菩薩戒弟子平章事薑邯瓚奉為邦家永泰遐邇常安敬造此塔永充供養時天禧五年五月日也三十八字尹瓘建寺而禱兵捷雖然莫如朝鮮李之蘭既英雄之姿質亦菩薩之心腸以百戰之奮揚乃三寶之歸依實是朝鮮之劉秉忠姚廣孝也李之蘭青海人本姓佟氏名豆蘭佐太祖開國賜姓名李之蘭命為都兵馬使鎮朔方風諭女真而綏來之皆願為國民服納土賦無敢後期數百年被髮之俗始襲冠帶由長白抵訓春江千餘里皆入版圖之蘭之功也初策功臣賜鐵券之蘭稱疾不出上疏乞骸曰臣遭遇聖明誤泰司命南征北伐濫殺甚多鐵券之寵雖極地獄之禍可懼伏願祝髮為僧以免冥報即日上寺被剃謝絶家事太宗屢召不來乃斷髮以示不可用其志微人莫之識也年七十二卒遺命火葬立浮圖明崇禎丙子秋大風雷浮圖自開邑人驚往視之則石灰中有金來二字是冬金人果來聞者神之道衍致孝復事李氏元禎國師或曰道衍國師姓曹氏世仕麗朝兄弟五人曰景龍應龍漢龍變龍見龍而漢龍乃國師名也恭愍朝乙未試景龍及漢龍俱擢甲科後丁酉試其他兄弟三人又登高第王稱之曰曹氏五龍相繼登科此乃古事之所希也命賜白米酒肉遊街三日而罷及麗亡入朝鮮景龍官至右台應龍官至判書漢龍變龍官至參議見龍官至監司而以漢龍稱保義將軍保義上國官名也明太宗永樂甲申即朝鮮太宗即位之四年也立保義將軍孝子碑碑在南平鳳凰山下孝子洞也初漢龍嘗書忠臣六字於衣帶間與高麗前掌令徐甄隱於襟川相與有詩曰千載神都隔渺茫忠良濟濟佐明王統三為一功安在只恨前朝業不長漢龍又相與和之曰天時人事兩茫茫更向那邊拜聖王莫道此間真趣寡山高處處水聲長臺官欲治之上曰伯夷之流何必治之一日皈其母母始知其為僧大驚而泣曰汝雖為前朝之忠臣今汝母尚在忍能削髮而不念父母之遺體耶家門滅矣吾誰依焉漢龍跪拜而謝曰生為臣子已為不忠之臣亦為不孝之子其罪甚矣與其不忠而又為不孝孰若不忠而獨能奉母之為孝於是和顏柔聲終止其母涕泣之懷命侍婢取沐髮之水一器而來引髮而束則即地長者二尺矣是日正其衣帶赴入京師過數日官至承旨復拜參議以母老乞由歸里則有一老僧來訪曰聞有洗染師在此矣今安在哉蓋洗染漢龍為僧變名者也參議笑曰爾能不知乎洗染即我而以老母之故不忍變其心也汝速皈之我當有更見之日矣其後母喪三年致孝又三年始復逃入於伽倻山矣持一瓢曳氅衣轉向湖南來接于道甲山下後又托迹于南平佛會寺始營重建有詩一絶曰千年王業一朝塵白首孤臣淚滿巾借問首陽何處在吐含明月自相親蓋向日之事真所謂為親屈而今日之舉不事二姓之志也遊心禪門寄心玄道嗚呼其不受我朝之爵祿也信矣中略湖南巡察使行到錦城道遇一僧當前不避從者呵之詰其姓名曹漢龍也巡使曰汝何至此答曰此果非吾名乃元禎僧也元禎其為後號也巡使不聞襟川之事乎巡使大驚聞于京師驛送赴京上曰汝胡名僧也元禎正色曰吾乃老佛道也上命賦詩元禎應聲曰謫下人間八十秋無情白髮已盈頭乾坤有恨家何在日月生輝世更休東出嶺邊皆觸感南皈湖上定消愁君王莫道為僧苦不肖孤臣髮不留上嘉尚其意賜以束帛洛中士大夫多賻錢財仍成佛會寺世祖大王贈國師元禎國師碑文師於乙未入寂賜號清簡大師立碑于鳳凰山下刻麗忠鮮孝四字於碑陰志崇感夢重創松寺曹溪山松廣寺重創祖高峯和尚行迹師諱法藏俗姓金氏慎川人也母林氏丱歲投佛出家妙年登選席未幾舍名利入山修道謁普濟尊者懶翁大和尚為師受法僧名志崇號高峯髮長數寸單瓢行善吹草笛人不知其賢否師於安東府清涼菴手以成庵或緑水青山或紅塵紫陌任適逍遙三十餘年長養聖胎焉洪武乙亥遊南州樂安郡金薪止宿夜夢見梵剎經營勝境殊特翌日乃入曹溪山松廣寺舊基俳徊四顧宛如前夢師慨然再歎謂門弟子曰梱庭於此豈無先祖勝像也某等須以重新更就禪剎然非我獨力所辦建文己卯詣闕啓聞臣僧志崇願欲重創先師普照普濟諸祖大道場上定宗大王許之下王旨庚辰七月受王旨兼受書雲觀裨補案傳準而來勸諸緇素或化或施倩大木雲疵尚濟等三十餘人施工木之長短基之濶狹皆以量之與古無差矣僅成佛法僧殿堂三四所以老辭退焉於甲申年間金海府神魚山覺庵居時忽夢見普濟尊者尊者如大倫物以刃截之飲之以半倫物許之問曰飲之何如師撒手答曰一虛樣一虛樣又癸卯夏住慶州鳳棲山遠源寺居時又夢見尊者師曰願為證明尊者曰後必證明焉既覺幻化難及又甲申春居蔚州佛光山太元庵時亦夢見尊者願為證明尊者曰我家疑小破之救於大家師即禮三拜云弟子大家非一非二亦非三我不常疑望和尚證明故也久而又告和尚玩珠枯骸白衲等三種歌擬南明泉繼證道歌弟子亦擬和尚三種歌隨句繼頌若符聖意流通于世尊者覽書答曰如是師曰弟子不識字畫焉能善書諸人賢之胡不善書以留之既去之三月十五日夜子丑也又甲午夏還松廣寺夢見尊者同住説法之時尊者説法弟子義武通知口鈍故不能助揚但默然聽焉即四月初八日月隱時也如斯慶夢非世量也但書于小卷乃師之手筆也又著三種歌繼頌并投贈雜詠一百餘首成稿囑于門人又庚子年曹溪宗大禪師中印得任茲寺亦效師之志願兼慕普照普濟等歷代諸祖住錫之所乃因院宇陜隘故叢席未足倩師之門弟洪修尚濟等十餘輩兼倩自己之門徒尚愚等十餘輩增崇堂宇始自庚子至戊申年諸事幾訖印公移錫京華師自著榜文命洪修等庚戌冬設慶讚落成會兼設坐禪祝上法席此印公與君等已前二十餘年間功就大道場九十餘間之慶讚也師於戊申七月十一日得疾如常坐臥不闕一時展鉢二十一日寅時倩古堂雄法師書臨終偈二首曰清淨本然極玲瓏山河大地絶點空毗盧一體從何起海印能仁三昧通七十八年歸故鄉大地山河盡十方剎剎塵塵皆我作頭頭物物本真鄉偈畢曰我沒而後骸骨待三年然後置于安處遺囑儼然而逝門徒與寺衆闍維收骨之函安于寢室逾年己酉三月二十八日門人信俊等五人聞異香開函視之得舍利二粒精瑩因是慶躍庚戌三月二十四日合山精勤又得舍利十二粒是月晦日精勤得舍利十五粒又十二月佛成道日合山精勤又得舍利八粒都算三十七粒內門人與寺衆三十粒奉持隨處供養其中大者四粒并骨盛水晶筒入于白銅榼青紬包裹之門人信贊惠性尚濟洪仁洪延等十餘輩庚戌秋始工刻石造浮屠終于季冬樹之于寺之北岡安邀焉門人洪修信淡信珠等十餘人承師之遺囑獎諸檀越是年冬十月十五日首設彌勒會次設無遮會連設坐禪安居供養二百八十員祝上作法百日期畢山人六眉為謁尊師本寺堂頭大和尚自闍屈而來於是尊者謂弟子曰爾聞不見乎是寺重創祖高峰於寺有功抑亦寂滅之後遺舍利生平之時著歌辭實季運之奇事爾可記之弟子拜答曰古文章學士奉宣旨然後為述撰焉豈弟子荐序其由乎弟子且非黃絹幼婦外孫虀臼之才故難為之堅免尊師謂曰於此之時儒家厭我浮屠之奇事其記之爾不可以能否免師之教故謂言人能弘道非道弘人於戲藏公之夢與夫子夢見周公乎遺舍利同佛祖遺風也是以謹稽首讚曰海東佛日之將殘兮普濟再耀松廣祖風之幾墜兮高峯更布創立梵網兮擬若天堂之妙訓導後生兮亞乎百丈之道繼先祖三種歌頌兮無異於南明之頌著諸百首之詩兮即同乎雪竇之句臨終遺囑兮齊乎普化之欵告處世密行兮似乎豐干之癡老闍維得舍利兮粒粒又堅好收抬為浮屠兮年年益固識師之真迹兮非凡度了起師之所宗兮寧無直路皇明宣德六年辛亥春正月日志住持前判事宗師都大禪師雲谷侍者前修證寺住持大禪師六眉記高峯弟子大禪師尚濟入室前金洞寺住持大禪寺海禪上室前白雲寺住持大禪師覺雄至近世則有龍雲大師重創松廣寺有碑文可考其迹海東曹溪山修禪社大功德主臨濟三十四代嫡孫龍雲大禪師碑銘并序通訓大夫行茂朱府使赤裳鎮守城將兼討捕使咸安趙性喜撰上略師諱處益字警庵龍雲其號也俗姓完山李氏孝寧大君後自南原移寓于谷城父諱春弼母密陽朴氏師以純廟癸酉十月七日生今上戊子五月五日示寂世壽七十六僧夏六十一初朴氏夢一梵僧著金襴袈裟踵門而敬禮遂有娠師生而骨相已不類凡眼爛爛如巖下電甫髫齔聰悟絶倫學書無不立誦十五出家於曹溪山松廣寺以南日長老為本師十七剃染稟具戒於奇峯大師受禪懺於霽峯法座參枕溟印波從惺庵遊即知有向上事二十七拈花於寶峯室己亥赴海南表忠祠享役聞大人病報馳還斫指得延時日及壬寅春夜半融風為災鬱攸告警自大雄寶殿暨佛宇五所僧寮八屋公舍十一處二千一百五十餘間蕩為煙塵人天忉怛僧俗傷𪫻師時年三十痛象設之靡瞻憫具衆之失庇鋭意復舊蚤夜自誓法力所到檀施歙集凡係周章靡不用極自同年夏至甲辰春未盡三年寶宮法堂次第輪奐暨于冬而各僧寮盡復舊觀諸公舍之未就者至乙巳丁未而無不畢舉其餘八庵七殿凡諸樓閣遊觀之舊補毀興廢指不勝據暨夫海南表忠祠之御筆閣碑閣山陽之竹原谷城之吉祥天台雲峯之百丈金溝之金山丈六佛全州之松廣三尊佛鍍金皆有放光現瑞之異梁山通度之戒壇法堂陝川海印之藏經閣廣州奉恩寺暨海印寺之經板改印前後建修願法隨緣己未以海南表忠總攝再赴時以道內都僧統之弊言于觀察營銷印祛害丙寅秋洋舶震京師朝野戒嚴本道直指使以義僧將督招辭不得行將有日尋以舶退而止中略丙戌復修東方殿為三殿祝釐之所此皆師之苦心苦行以真實相而報佛恩中略師嘗有句曰清涼雨下三千界寂寞燈燃四五機率爾宣唱已契宗旨云云下略黃儼來迎濟州銅佛朝鮮太宗六年丙戌明永樂四年帝遣太監黃儼迎銅佛于濟州佛像至使館儼欲上先拜佛像然後行禮上曰銅佛自天朝而至則豫當拜之以致敬朝廷之意今不然何拜之有河崙趙英武曰皇帝崇信佛道遠求銅佛且黃儼無狀天下所知願從權禮拜上曰豫之羣臣無一守義者畏儼如此其能救君難乎高麗忠惠被執如元國人無肯救者我雖危難殆亦如此矣人主舉動不可以輕豫之拜佛於禮何如遂謂儼曰藩國禍福在天子不在銅佛當先見天子使臣豈容拜吾土銅佛儼仰天良久微笑許行禮竟不拜佛尚玄曰昔宋太祖幸相國寺佛像前燒香問當拜與否僧贊寧曰拜現在佛不拜過去佛太祖笑而不拜謹按朝鮮太宗及趙宋太祖俱不拜佛各守其理吾有一頌曰太宗不拜吾土佛宋祖不拜過去佛十方塵剎是誰土三世一時亦何佛金漸奏留興天舍利朝鮮世宗元年己亥明永樂十七年帝求興天寺所藏舍利金漸啓曰僧竺丘為臣言石塔所藏舍利四枚自新羅以來世世寶藏且有靈異願得留鎮法門上曰僧徒容有是言然於國體則不可天子求舍利當以本國寶藏者進獻以表至誠况石塔舍利天子所知豈可以是靈異舊物匿不以獻上欺天子乎中宗五年庚午三月二十八日興天寺舍利閣災寺本新羅古剎我太祖悼神德王后之薨命厝寺內仍創舍利閣嵽高五層嵬立都中且藏寶物佛經于其中自燕山朝廢為分司僕寺中廟即位因為公廨先是火焚其寺只遺舍利閣至是火陰崖雜記法華佛事追福太后開慶寺朝鮮太祖康獻大王健元陵願堂也觀音殿行法華法席疏卞季良選何怙何恃但知銜恤於終天載寢載興永慨酬恩之無地宜憑釋教用薦幽關切念康獻父王神懿母后艱難草創乃遽催於仙遊鞠育長成顧未享於榮養惟豫心之所痛愈久而不忘時又逼於諱辰念益切於哀慕徒羹墻之若見悵聲貌之難尋仰惟覺皇之運悲能資冥府之追福佛寶滿十方三世觀音加被最號神通經論有萬軸千函妙法靈詮實為管轄嘗書二部以金字且營一殿於山陵以安慈尊而置祕典令爇名香而參禮仍集淨流以演揚水月真容剎剎塵塵之普現蓮華實相言言字字之分明影響感通河沙功德伏願頓除宿障超證本原極樂堂中蒙彌勒勒疑陀誤之接引菩提樹下與摩耶以逍遙佑後人於無窮綿景祚於罔極見聞所及饒益悉周此即太宗大王為父王及母后追資冥福而行法席者也按神懿王后韓氏明洪武二十四年辛未高麗恭讓王三年朝鮮太祖登極前一年九月二十三日升遐又太祖明永樂六年戊子即太宗八年五月二十四日崩卒誠寧大君太宗第四男諱種法華法席疏卞季良撰佛天濟人求則必應父母薦子久而益勤肆竭頳悰冀霑白報嗟音容之永隔無復見聞慮精爽之猶存或滯冥漠復何益於痛悼第自勉於追修是用亡兒之財俾圖三佛之像庶幾陰佑以導冥遊且法華所以明心而梵網專論受戒俱為濟沉之寶訓故茲刻日以金書就墳側新搆之庵集山中久參之衲均施衣鉢嚴備香花瞻禮尊容即西方之勝會談揚祕典實上乘之真宗雖能所之皆空乃感通之不誣可憐身世十四年之甫經俄頃齋晨一百日之已屆且念亡子溫恭其稟孝悌其心蓋無今作之妄緣容有難逃之宿障伏願諸經擁護大聖加持俾令魂氣昭明性靈超悟戒定慧之具足謝多生塵業之勞法報化之依歸登九品蓮臺之座凡為苦類等蒙餘波尚玄曰孰謂太宗大王不好佛法若不好佛法安能新創觀音殿金書法華經以薦其父母之冥福乎又安能創寺於墳側圖挂三佛金書二經以薦亡子之靈魂乎史氏之書亦不可信類如此也國朝寶鑑等書皆言太宗不好佛法故世宗大王三年辛丑上謂近臣曰佛氏之道無益於禍福父王既不崇信豫若崇信則當母后元敬王太后閔氏也賓天哀慕之時豈不大設佛事以修冥福乎須令民庶審知豫意國史尚玄曰雖然今有與王言相反之事按涵虛堂得通和尚語録中有云薦元敬王太后仙駕法華第三會據座拈香云此一瓣香採取無影樹頭收來不萠枝上山僧今日奉為元敬王太后仙駕信手拈來爇向爐中伏願元敬王太后仙駕位高摩耶之聖后證同無垢之教主此一瓣香根透空輪葉覆有頂山僧今日奉為王上殿下信手拈來爇向爐中伏願王上殿下永為九五之所宗長作億兆之所賴此一瓣香天地以之為根万物以之為體山僧今日奉為王上殿下信乎拈來爇向爐中伏願王上殿下金枝茂於三千界玉葉芳於億萬春此一瓣香其根也深深不測厥苗也杳杳難知山僧今日奉為恭妃殿下信手拈來爇向爐中伏願恭妃殿下道高王母功齊妙德此一瓣香言其體則體備羣芳語其用則用周沙界山僧今日奉為焚香閣下信手拈來爇向爐中伏願焚香閣下災消障盡福足慧圓普願茫茫沙界翻為蕩蕩蓮華國蠢蠢四生盡作巍巍調御師升座良久喝一喝云山僧杖不發臺山早為元敬王后仙駕洎一會道俗説破此事了也更教我説黃道黑何啻白雲萬里大衆且請散去便下座為元敬王后仙駕下語生也一片浮雲起死也一片浮雲滅浮雲自體徹底空幻身生滅亦如然就中一箇長靈物幾經劫火常湛然所以道湛湛有同香水海深深無異補怛山元敬王后仙駕及法界諸有情普願齊開向上眼佛剎天堂任遨遊又涵虛堂得通和尚行狀門人野夫録惟我聖上存心三寶留意福田是以聞師道風美其令聞辛丑秋命住大慈御剎為薦先妣殿下大設靈山勝席宗室諸王駙馬諸君承命奉香濟濟親臨請師説法師強謝不已高升法座肇開法要其聲清亮理致玄奧自然成律風行水文遠近見聞無不悅服云云尚玄曰由是觀之世宗大王固信佛之主也又謏聞餘録謂世宗末年頗好佛造內佛堂云云世宗非於末年始信佛而從初已信佛以上文為證其所斥佛之説皆儒臣史官故為修飾者也至後世又有以法華經追薦太后之事見學祖大師跋其文如左維成化十九年春二月我大行大王大妃殿下身纏宿恙數載不豫靈藥無效諸醫拱手不獲已而乃幸溫陽溫泉疾彌留越三月晦日奄棄宮壼于行殿我仁粹王大妃殿下侍側痛悼哀傷凡追度之方靡所不舉於是捐私財願成法華經大彌陀懺六經地藏等經各三十三部又畫成靈山會圖西方會圖藥師會圖千手觀音地藏十王幀於五六七之間點眼披讀於彌智山龍門寺而薦拔冥遊恭惟我大行大王大妃殿下聖知天縱拔聖主於襁褓之中拯蒼生於危疑之際中外又安人樂太平德加於人功著於國皈政以來退處深宮禮念自娛而竟日間間為善為樂而率下慈仁及其升遐之日雖飯婦樵夫如喪考妣功德之盛雖三代之聖后無以加焉至於臨終禮念之力既專淨土之業已成安然陟遐如入禪定如是而較不費追修已登極樂邦然我仁粹王大妃殿下思念莫極哀痛何窮幽明路隔苦樂安知耳目不接難遣猶疑所以敷衍上乘展開禮懺仗諸佛之提携承地藏之救苦仰薦仙遊以報劬勞莫大之恩嗚呼至哉成化十九年癸卯四月日山人臣學祖謹跋尚玄曰朝鮮之初凡追薦亡靈者必用法華經以法華於諸經中為最第一書寫流通其功德不可稱量故雖然自世祖大王以後金書法華寥寥無聞焉最近三十八年前仙巖寺沙門元奇俗姓金氏法號擎雲於梁山郡鷲棲山通度寺之白蓮社書寫金字法華共七軸粧成十四卷留藏于通度寺以為法寶而其寫經緣起亦屬奇聞具録如左嶺左東萊府金井山梵魚寺釋正真蔚山人孫悠庠之子也早喪其父入山剃髮者十有餘年歲戊寅五月二十八日夜忽得一夢有老僧呼與俱去行至一處顧眄之間不見老僧駐足之地變成海島雲際無涯忽有一人來立于前詰其鄉貫姓名真以實對那人太息曰汝是吾兒別汝多年幽顯路殊逢著無由今日相見實是大幸言畢痛哭真情雖悽惻疑其容音有異於生時更問平生所業及別世日時歷歷符而其迹則為儒性又好酒未知擎雲師之不棄而取焉者倘其許余心之或不縱而使徒弟求言準其入社歟余於是以廁名為幸不可以無言略書此以附願文之末若夫溪山之美與植物之標異乃色相之外現者茲不贅贊云是歲中秋節荷亭居士呂圭亨跋西山嫡派九世傳霜月之宗師嘗示余以六十一初度自壽詩余步其韻和之曰升仙巖擬給孤園如雨如雲演法門兩感白蓮多弟子九傳霜月有兒孫無生始説無窮壽大德方知大報恩百八捻珠隨手轉焚香夜夜誦真言按下雲頭身雖在乎覺皇寺內師自乙卯歲因三十本山聯合事務所委員長薑大蓮和尚之邀請主法于覺皇寺思歸山中夢常繞於升仙橋邊仙巖寺洞門有虹霓橋名曰升仙係是二百年前架設者而工藝甚美般若經行走汗老郎朝鮮世宗四年壬寅罷經行自高麗時每春秋仲月令僧徒誦般若經鳴螺執幡蓋香火前導巡行街巷以禳災厄二品以上受命行香謂之經行至是命罷之國史雖然如是經行之法復設於世祖之時慵齋叢話云世祖朝行轉經法即高麗古俗也其法幡蓋前導黃屋輿安黃金小佛前後伶人奏樂兩宗僧人數百分左右隨之各擎名香誦經小僧升車擊鼓經止則樂作樂止則經作奉佛自闕而出上御光化門送之終日巡行市街或於慕華館太平館設晝供各司官吏趨走供物惟恐得譴設六法供養簫鼓梵唱之聲振于太空士女奔波聚觀禮曹佐郎金九英年老體肥踉蹡步行流汗如水飛塵滿面人皆笑之經行之法始于高麗靖宗十二年丙戌三月辛丑命侍中崔齊顏詣毬庭行香拜送街衢經行分京城街衢為三道各以綵樓子擔般若經前行僧徒具法服步行讀誦監押官亦以公服步從巡行街衢為民祈福名曰經行自是歲以為常讓寧對孝寧稱佛兄朝鮮讓寧大君名禔孝寧大君名補皆太宗大王之子讓寧序居第一孝寧第二初讓寧為世子知太宗意在世宗忠寧大君序居第三陽狂放浪孝寧見其將廢深自謹飭危坐讀書蓋意其讓寧若廢以次當立也讓寧過而蹴之曰騃矣汝不知忠寧有聖德耶補聞而大悟遂隨後跳出至山寺以兩手打一鼓竟日鼓皮盡鬆至今俗稱物之柔而有力者曰孝寧大君鼓皮讓寧天姿倜儻平生自奉甚厚酒食遊獵之外一不著手孝寧佞佛嘗作佛事請讓寧讓寧率畋人射士臂蒼鷹牽黃犬載獵具陰使擊兔伐狐往詣佛事俄而畋人進獸庖人進灸御人進酒補方拜佛叩頭讓寧撮灸飲酒自若補正色請曰大兄今日姑止酒肉兄過去世多種福故今享富貴現在世若不修善將於未來世受惡報何讓寧笑曰吾於過去世種福與否不可知而生為王兄故得亨富貴今雖不修善死則又將為佛兄豈不消滅吾惡報乎兩宗禪教宗趣和會尚玄曰按自高麗元宗以後至朝鮮太宗之時即有五教兩宗共為佛教全體所屬之部衆此中包含十有一宗曰曹溪宗曰總持宗曰天台疏字宗曰天台法事宗曰華嚴宗曰道門宗曰慈恩宗曰中道宗曰神印宗曰南山宗曰始興宗此以朝鮮太宗七年議政府啓文為據越明年議政府請以名剎為諸州資福寺從之今若舉其宗派而臚列所屬之名剎則實有六宗曰曹溪宗曰華嚴宗曰慈恩宗曰中神宗中道神印合為一宗曰總南宗總持南山合為一宗曰始興宗是時天台一宗宗勢雖微宛然尚在而本宗寺剎一不言及疑與始興宗一而二二而一也然則從前之十一宗至是減為七宗就實録之本條而觀之事屬無疑而慵齋叢話所云至我太宗革十二宗只置兩宗之兩字疑即七字之誤也又據歷代實録世宗六年春大司憲河演上書極論寺多僧少之狀况請減寺社之數罷試選之法停僧職之批革僧録之司以此啓文至開廷議宰臣許倜主漸圖故不果行之然而後日議論再起遂於四月禮曹啓文曰釋氏之道禪教而已厥後正宗旁傳各以所業分而為七宗傳誤承訛源遠末益分實有愧於其師之道且中外多建寺社分屬各宗其數猥多緇流四散曠廢莫居修葺不繼漸致頽敗乞以曹溪天台總南三宗合為禪宗華嚴慈恩中神始興四宗合為教宗擇中外堪寓僧徒之處量宜置三十六寺分隸兩宗優給田地酌定居僧之額羣居作法俾之精修其道仍革僧録司以京中興天寺為禪宗都會所興德寺為教宗都會所揀取年行俱高者以為兩宗行首掌務令察僧中之事於是減七宗為禪教兩宗以三十六寺分隸之付屬田地結數增加并有他寺之田故廢僧録司以其所屬奴婢三百八十四口分給禪教兩宗都會所然則世宗六年減宗之事不在於廢止宗門亦不在於禁止教派而但朝家不容認其為一宗而已從來天台慈恩諸宗所屬之僧依然講其教義修其儀式並無妨害但以天台宗僧某慈恩宗僧某呼之則諸宗名雖廢而實猶存焉及至規定僧科禪宗則試傳燈録拈頌集教宗則試華嚴經十地論故他諸宗之經典儀式遂至真廢永絶矣朝鮮法侶莫不兼修禪教禪以傳燈及拈頌為本課教以華嚴及十地為極則故近世高僧見其碑文則書曰華嚴宗主某禪師碑銘并序者甚多禪教相兼以此為例雖然朝鮮初中之世則禪以兼教中末之世則教以兼禪何以然也禪以因其宗祖之愈遠家風亦漸趨下流為文字之禪比如朝鮮兩班力言以貴紳為兩班兩班者文班武班即仕宦者之稱號負其名祖誇其門閥炫其譜牒耳余所謂文字禪者即如拈頌説話拈頌私記等已犯禪家説破之忌而又有説話之説話私記之私記此多出於華嚴宗主之手有時乎杜撰之禪客避讓于知解之宗師也從前以來朝鮮僧侶次第講修經論科目謂之履歷十戒誦呪般若心經禮懺初心文發心文自警文已上沙彌科也大慧書狀高峯禪要禪源諸詮集都序法集別行録即節要已上四集科也楞嚴經起信論金剛般若經圓覺經已上四教科也華嚴經禪門拈頌傳燈録已上大教科也余嘗以是遍問諸人履歷科目始自何時惟張錦峯陳震應兩和尚言有所據具録于左以供參考錦峯和尚云昔行僧科禪試傳燈拈頌教試華嚴則履歷科目應自其時始震應和尚答來書承問履歷科目始自何時吾亦未詳然從文字考之則碧溪正心禪師傳禪傳燈録于智嚴碧松傳教法華經于法俊白霞其時則但以法華傳燈教授學者也西山大師自抄行狀中傳燈拈頌華嚴圓覺楞嚴法華維摩般若等數十本經論受於芙蓉大師云云其時散講諸經而別無四教大教一定科目斷可知也以愚料之始自柏庵大師教則定四教大教之科目禪則定拈頌何以知之柏庵以前華嚴經但有疏本無有演義抄又未有起信論筆削記般若經刊定記四教大教未得全完康熙辛酉海舶忽自至荏子島滿載佛書其中得演義抄本華嚴經八十卷及筆削記刊定記柏庵大師刊于木板印刷流布四教大教始克全完自柏庵上首弟子無用以後始設大會講堂之法無用霜月影海諸大師大會録講目中四教大教拈頌等科目始為現出二百年前文字中無四教大教科目也愚則如是杜撰請更問高明再淨餘塵焉云云余今綜合諸説試折衷而判斷之蓋僧科存在之當時禪自禪教自教猶為判然兩途為禪宗僧者單習傳燈録拈頌集而無關於教書之華嚴經也為教宗僧者單習華嚴經十地論而無要於禪書之傳燈録拈頌集也然則僧科廢止之後禪教宗趣始得和會而其外來之趨勢在乎清虛浮林碧巖白谷等諸大師以一人而總攝禪教兩宗之僧兼判禪教兩宗之事故自然不分禪教和會而融通之其內容之機關在乎履歷科目以一人而必使兼修禪教兩宗之書即所謂四集四教大教等科也柏庵以後始為完備誠如震應和尚之言確不可易但其先後次第則從碧松和尚教人之方法先使立如實知見即四集科四教科是也次令掃除知解之病而指示活路即大教科是也要皆即教明宗捨教入禪等之方便也清虛禪師禪家龜鑑學者先以如實言教委辨不變隨緣二義是自心之性相頓悟漸修兩門是自行之始終然後放下教意但將自心現前一念參詳禪旨則必有所得所謂出身活路云云是即余所謂碧松之遺法也禪教合一蓋在清虛鞭羊之時今有明證按金剛山楓潭大師碑經云金剛住曇無竭臨濟之東心傳諸佛逮至虛羊禪教合一師承其授非肉非骨百八寺燈萬千峰月真如自性常照不滅華嚴妙解闡揚化元法輪所轉廣度羣昏朝鮮佛教稱號宗旨曰禪教兩宗禪為一宗應稱禪宗教為一宗應稱教宗兩宗各有獨立名詞今乃稱號禪教兩宗獨立名詞乃轉變為併合名詞必須分析其名與實自其外面以觀之則僧侶之中有參禪者屬於禪宗有講經者屬於教宗可泛稱曰朝鮮佛教禪教兩宗合成者也自其內容以觀之則僧侶之中禪者自禪教者自教門戶各殊宗旨不同必須稱號禪宗教宗然後始得名實相符不相混淆假如一僧只知參禪不知講經稱彼謂禪宗僧則可稱彼謂教宗僧則不可况復稱彼為禪教兩宗僧乎又如一僧只知講經不知參禪稱彼為教宗僧則可稱彼為禪宗僧則不可况復稱彼為禪教兩宗僧乎故曰禪宗教宗獨立稱號名實相符禪教兩宗併合稱號名實混淆禪教來歷列舉于左禪新羅之世盡傳支那禪宗各派而宗旨稱號無見明文高麗之世有禪寂宗九山禪派也普照以後有曹溪宗是為禪宗別立名詞也太古懶翁雖傳臨濟之法脈而不立宗名仍曹溪宗之舊稱至于朝鮮世宗六年教新羅之世盡傳支那教下諸宗而亦不立宗派之名高麗之初始設僧科按其認定之宗派各試系屬之僧侶諸宗之名於是乎立大覺當時有戒律宗法相宗涅槃宗法性宗圓融宗等五宗之名見於大覺國師墓志銘爾後又有總持宗天台疏字宗天台法事宗華嚴宗道門宗慈恩宗中道宗神印宗南山宗始興宗共合十宗麗史每稱五教綜合已上十宗而總括之則其實不過華嚴天台慈恩南山真言五宗而已朝鮮世宗大王六年禪曹溪宗則改號禪宗教十一宗則統稱教宗禪宗僧則試以傳燈録及拈頌集教宗僧則試以華嚴經及十地論禪雖一宗兼學五家傳燈拈頌包含五宗教雖十宗單講華嚴世宗朝時之併合諸宗也但以華嚴為試科本經故此宗獨存他宗自滅也禪宗教宗各自獨立門戶宗旨俱得分明矣禪宗教宗獨立名詞轉變而為禪教兩宗併合名詞始於碧溪成於清虛何以然也朝鮮初世陸行而聚徒千餘講經者信眉弘濬虛應普雨皆失法系而惟獨碧溪大師一人上承太古下傳碧松而曰教傳法俊法俊猶稱禪師禪傳碧松云云則以一人兼禪教也至于清虛總攝八道禪教兩宗兼判禪教兩宗事其實乃顯也朝鮮僧侶禪者占十之二三教者占十之七八莫不以太古普愚禪師為宗祖然則太古是禪宗乎是教宗乎禪教兩宗九百寺剎八千僧尼若能個個如碧溪碧松芙蓉清虛浮休禪教兼修即教明宗捨教入禪則禪教兩宗宗旨稱號亦自無妨亦不愧為太古兒孫諺文字法源出梵天尚玄曰昔秦焚詩書以愚黔首然我海東則有詩書而黔首反愚何也蓋因鄙棄本土之方言而崇從他方之漢文故一切人民難於學習能讀書者不過是上級社會屬極少數其他多數之下級社會愚夫愚婦皆不識字甚至官民不能通情所以新羅薛聰制吏讀以用簿牘作口訣以釋經書朝鮮世宗大王始制諺文以便人民之日用譯釋儒録三綱行實録五倫行實録以期人倫之大明譯釋梵經法華圓覺楞嚴金剛般若彌陀等經及禪宗永嘉集大陀羅尼等以圖佛教之普遍運智創物之聖功德千代之下不窮不泯至崔萬理等之反對上疏自是代表當時腐儒之思想亦無責備之價值者也余今略述諺文歷史以供大方之參考焉一製作諺文一訓民正音世宗大王二十四年癸亥十二月是月上親制諺文二十八字其字倣古篆分為初中終聲合之然後乃成字凡干文字及本國俚語皆可得而書字雖簡要轉換無窮是謂訓民正音實録二十五年甲子二月辛巳朔丙申命集賢殿校理崔恆副校理朴彭年副修撰申叔舟李善老李塏敦寧府注簿薑希顏等詣議事廳以諺文譯韻會黃公紹撰蒙古韻會東宮即文宗與晉陽大君瑈即世祖安平大君瑢監掌其事皆稟睿斷賞賜稠重供億優厚矣實録二十八年丙寅頒布御制訓民正音于中外訓民正音御製序云國之語音異乎中國與文字不相流通故愚民有所欲言而終不得伸其情者多矣豫為此憫然新制二十八字欲使人人易習便於日用耳訓民正音原始字體韓牙音如君韓今亦韓字初發聲並書如虯韓今韓字初發聲韓牙音如快韓今韓字初發聲韓牙音如業韓今韓字初發聲韓舌音如斗韓今韓字初發聲並書如覃韓今韓字初發聲韓舌音如吞韓今亦韓字初發聲韓舌音如那韓今韓字初發聲韓脣音如彆韓今韓字初發聲並書如步韓今韓字初發聲韓脣音如漂韓字初發聲韓脣音如彌韓今韓字初發聲韓齒音如即韓今亦韓字初發聲並書如慈韓今韓字初發聲韓齒音如侵韓今亦韓字初發聲韓齒音如戌韓今韓字初發聲並書如邪韓今韓字初發聲韓喉音如挹韓今韓字初發聲韓喉音如虛韓今韓字初發聲並書如洪韓今韓字初發聲韓喉音如欲韓今亦韓字初發聲韓半舌音如閭韓今韓字初發聲韓半齒音如穰韓今韓字初發聲韓如吞韓字中聲韓如即韓字中聲韓如侵韓字中聲韓如洪韓字中聲韓如覃韓字中聲韓如君韓字中聲韓如業韓字中聲韓如欲韓字中聲韓如穰韓字中聲韓如戌韓字中聲韓如彆韓字中聲義例細聲復用初聲連書脣音之下則為脣輕音初聲合用則並書終聲同韓一韓韓韓韓附書初聲之下韓韓韓韓韓附書於右凡字必合而成音左加一點則去聲二則上聲無則平聲入聲加點同而促急漢音齒聲有齒頭正齒之別韓韓韓韓韓字用於齒頭韓韓韓韓韓字用於正齒牙舌脣喉之字通用於脣音已上見月印千江之曲韻學本源黃胤錫撰黃號西溟散人又號頤齋英祖朝人云按正音本文韓韓韓韓韓五字左右股齊長而無或長或短之法今三韻聲彙以此別之齒頭音則左股長右股短正齒音則右股長左股短蓋本申叔舟四聲通考凡例耳尚玄曰余得前記之訓民正音于釋譜詳節第一卷聞其板本今在榮州郡喜方寺釋譜詳節者世祖大王為首陽大君時承父王世宗命撰進以資昭憲王后冥福世宗命名曰月印千江之曲蓋自世宗丙寅即頒訓民正音之年至天順己卯撰進月印午江之曲之年不過為十四年則此為原始字體也無疑矣况申叔舟四聲通考撰於世宗己巳是為頒訓民正音後第三年則其凡例以左右股之長短分別齒頭正齒之音不亦相符乎西溟散人不及見此故其言如是也西溟散人又云按本朝世祖朝圓覺經諺解實本于正音而崔世珍四聲通解亦本于正音云圓覺經諺解凡東冬江陽庚青蒸之類並用韓其無終聲之支微魚虞齊佳灰隊歌麻之類用韓為終聲蓋若終聲而實非終聲也今不用圓覺經諺解印本平聲上聲去聲之勞音作韓教音作韓標音作韓頭音作韓流音作韓又入聲自谷至郭凡十二格內今呼終聲韓者并作韓如結音韓今呼韓而作韓又閉口韓終聲并作口與今同云圓覺經諺解印本既本乎正音則與前記之字體節節符合也一反對諺文世宗甲子二十六年二月辛巳朔庚子集賢殿副提學崔萬理等上疏略曰臣等伏覩諺文制作至為神妙創物運智敻出千古然以臣等區區管見尚有可疑者敢布危懇謹疏于後伏惟聖裁一我朝自朝宗以來至誠事大一遵華制今當同文同軌之時創作諺文有駭觀聽儻曰諺文皆本古字非新字也則字形雖倣古之篆文用音合字盡反於古實無所據若流中國或有非議之者豈有不愧於事大慕華哉一新羅薛聰吏讀雖為鄙俚然皆借中國通行之字施於語助與文字元不相離者雖至胥吏僕隸之徒必欲習之先讀數書粗知文字然後乃用吏讀用吏讀者須憑文字乃能達意故因吏讀而知文字者頗多亦興學之一助也中略而况吏讀行之數千年而簿書期會等事無有防礙者何用改舊行無斃之文別創鄙諺無益之字乎若行諺文則為吏者專習諺文不顧學問文字吏員歧而為二苟為吏者以諺文而宦達則後進皆見其如此也以為二十七字諺文足以立身於世何須苦心勞思窮性理之學哉前此吏讀雖不外於文字有識者尚且鄙之思欲以吏文易之而况諺文與文字暫不干涉專用委巷俚語者乎借使諺文自前朝有之以今日文明之治變魯至道之意尚肯因循而襲之乎必有更張之議者此灼然可知之理也厭舊喜新古今通患今此諺文不過新奇一藝耳於學有損於治無益反覆籌之未見其可也一若曰刑殺獄辭以吏讀文字書之則不知文理之愚民一字不差容或致冤今以諺文直書其言讀使聽之則雖至愚之人悉皆易曉而無抱屈者然自古中國言與文同獄訟之間冤枉甚多借以我國言之獄囚之解吏讀者親讀招辭知其誣而不勝捶楚多有枉服者是非不知招辭之文意而被冤也明矣若然則雖用諺文何異於此是知刑獄之平不平在於獄吏之如何而不在於言與文之同不同也欲以諺文而平獄辭臣等未見其可也中略今不博採羣議驟合吏輩十餘人訓習又輕改古人已成之韻書附會無稽之諺文聚工匠數十人刻之劇欲廣布其於天下後世何如云云下略上覽疏謂萬理等曰汝等云用音合字盡反於古薛聰吏讀亦非異音乎且吏讀制作之本意無乃其便民乎如其便民也則今之諺文亦不為便民乎汝等以薛聰為是而非其君上之事何哉且汝知韻書乎字母有幾乎四聲七音有幾乎若非豫正其韻書伊誰正之乎實録二記録方言慵齋嚴話東閣雜記俱云昔新羅薛聰始作吏讀官府民間至今行之然皆假字而用或澀或窒非但鄙陋無稽而已上以為諸國各制字而記國語獨我國無之御製字母二十八名曰諺文設廳禁中命申叔舟成三問崔恆等撰定名曰訓民正音初終聲八字韓韓韓韓韓韓韓韓初聲九字韓韓韓韓韓韓韓韓韓中聲十一字韓韓韓韓韓韓韓韓韓韓韓其字體倣古篆梵字為之諸語音文字所不能記者悉通無礙洪武正韻諸字亦皆以諺文書之遂分五音而別之曰牙舌脣齒喉脣音有輕重之殊舌音有正反之別字亦有全清次清全濁次濁不清不濁之差雖無知婦人無不瞭然曉之中朝翰林學士黃瓚時謫遼東命三問等見瓚質問音韻凡往返遼東十三度三音釋漢文世宗己巳命崔恆譯洪武正韻命申叔舟撰四聲通考東國正韻序申叔舟撰聲韻之學最為難精蓋四方風土不同而氣亦從之聲生於氣者也故所謂四聲七韻隨方宜異自沈約著譜雜以南音有識病之而歷代未有釐正之者洪惟皇明太祖皇帝愍其乖舛失倫命儒臣一以中原雅音定為洪武正韻實是天下萬國所從我世宗莊憲大王留意韻學窮研底蘊創制訓民正音若干字四方萬物之聲無不可傳吾東方之士始知四聲七音自無所不具非特字韻而已也於是以吾東方世通中華而語音不通必賴傳譯首命譯洪武正韻令今禮曹參議臣成三問典農少尹臣曹燮安知金山郡事臣金曾前行通禮門奉禮郎臣孫壽山及臣叔舟等稽古證閲首陽大君臣諱即世祖也桂陽君臣璔監掌出納而悉親臨課定叶以七音調以四聲諧之以清濁縱橫經緯始正罔決然語音既異傳訛亦甚乃命臣等就正中國之先生學士往來至于七八所與質之者若干人燕都為萬國會同之地而其往返途道之遠所嘗與周旋講明者又為不少以至殊方異域之使釋老卒伍之微莫不與之相接以盡正俗異同之變且天子之使至國而儒者則又取正焉凡謄十餘藁辛勤反核竟八載之久而向之正罔缺者似益無疑文宗恭順大王自在京邸以聖輔聖參定聲韻及嗣寶位命臣等及前判官臣魯參今監察臣權引副司直臣任元濬重加讎校夫洪武韻用韻併折悉就於正而獨七音先後不由其序然不敢輕有變更但仍其舊而分入字母於諸韻各字之首用訓民正音以代反切其俗音兩用之音又不可以不知則分注本字之下若又有難通者則略加注釋以示其例且以世宗所定四聲通考別附之頭面復著凡例為之指南恭惟聖上即位亟命印頒以廣其傳以臣嘗受命於先王命作序以識顛末切惟音韻衡有七韻縱有四聲四聲肇於江左七音起於西域至于宋儒作譜而經緯始合為一七音為三十六字母而舌上四母脣輕次清一母世之不用已久且先輩已有變之者此不可強存而泥古也四聲為平上去入而全濁之字平聲近於次清上去入近於全清世之所用如此然亦不知其所以至此也且有始有終以成一字之音理之必然而獨於入聲世俗率不用終聲甚無謂也蒙古韻與黃公紹韻會韻會舉要入聲亦不用終聲何耶如是者不一此又可疑者也往復就正既多而竟未得一遇精通韻學者以辨諧聲紐攝之妙特因其言語讀誦之餘溯求清濁開闔之源而欲精夫所謂最難者此所以辛勤歷久而僅得者也臣等學淺識庸曾不能鈎探至賾顯揚聖謨尚賴我世宗大王天縱之聖高明博遠無所不至悉究聲韻源委而斟酌裁定之使七音四聲一經一緯竟歸于正吾東方千百載所未知者可不浹旬而學苟能沉潛反覆有得乎是則聲韻之學豈難精哉古人謂梵音行於中國而吾夫子之經不能至跋提河者以字不以聲也夫有聲乃有字寧無有聲之字耶今以訓民譯之聲與韻諧不待音和類隔正切回切之繁且勞而舉口得音不差毫釐亦何患乎風土之不同哉我列聖制作之妙盡善盡美超出古今而殿下繼述之懿又有光於前烈矣二語族研究朝鮮語日本語蒙古語文法同一研究語族者曰蒙古語日本語朝鮮語文法同一按東京帝國大學理科大學講師鳥居龍藏氏之講演演題朝鮮語研究韓蒙古語韓比較列舉蒙古語日本語朝鮮語中單語類似共通之例又曰蒙古語與日本古典的言語原是同一而其後日本語則隨時代而漸變化蒙古語則無變化故也又舉文法同一之例曰如日本語私車乘行蒙古語則私車乘行尚玄曰若以朝鮮語比較則我韓車韓乘韓韓行韓韓推此可知蒙古日本朝鮮同一語法也鳥居氏又曰蒙古語自是入于烏拉亞爾泰語族而日本語朝鮮語滿洲語好相類似恰如兄弟之關係然而與近鄰之支那語全然無關真不思議之事也又曰若有人欲以學術的研究朝鮮語者必將烏拉