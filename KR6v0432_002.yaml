body:
  text: 完山李能和尚玄居士輯述東州崔南善六堂學人校閱三寶源流釋迦如來應化記實釋迦牟尼佛賢劫第四佛也然燈佛所為善慧仙人嘗買蓮華供佛又見地濕脫衣布地解髮覆之佛記善慧汝過阿僧祇劫於五濁惡世當得成佛號釋迦牟尼佛賢劫第三尊迦葉佛時為護明菩薩命終往生兜率陀天為諸天主說補處行亦於十方國土現種種身為諸眾生隨宜說法乃至成佛期運將至即觀閻浮提眾生皆我初發心來所成熟者堪受妙法餘國邊地皆不應生此世界迦毘羅國最為處中往古諸佛出興皆生於此諸族種姓剎帝利為第一瞿曇苗裔聖王之後淨飯王過去因緣具足清淨性行夫妻真正堪為父母既作此觀遂集諸天子告言我今不久捨此天宮生閻浮提出家學道成一切種智設大法會廣利人天汝等亦當同受法食諸天子歡喜踊躍各心念言菩薩不久當成正覺時菩薩乘六牙白象發兜率宮降神母胎淨飯王夫人摩耶於寤寐間見菩薩騰空來從右脇入影現於外如處琉璃顯見自身如日月照菩薩在胎晨朝為色界諸天說法日中為欲界諸天說法晡時為諸鬼神說法夜三時亦復如是成熟無量眾生甲寅四月八日日初出時世尊生時震丹國昭王二十六年甲寅此方江河泛漲泉井溢出天地震動有五色光貫太微宮王問羣臣是何祥瑞太史蘇繇奏曰西方有聖人生王曰於此何如繇曰此時無他一千年後聲教被及王令刻石埋於南郊誌之云摩耶夫人將諸綵女遊藍毗尼園攀無憂樹枝菩薩從右脇出時樹下生七莖七實蓮華菩薩墮蓮花上自行七步舉其右手而言天上天下惟我獨尊無量生死於今盡矣此生利益一切天人說是言已四天王接置寶几九龍王吐清淨水灌太子身身紫金色具三十二相八十種好圓光一尋王以太子生時諸瑞吉祥瑞應有三十四文煩不錄遂名薩婆悉達此言頓吉時有梵仙名阿私陀具足五通能斷疑惑以神通力騰空而來相太子已忽然悲泣王驚問故仙人答曰太子具三十二相年十九為轉輪聖王若出家者成一切種智然相好明了太子決定成一切種智轉無上法輪我今年已百二十不久命終不覩佛興不聞經法故自悲耳太子生七日摩耶夫人命終生忉利天王囑姨母波闍波提養育太子年七歲王令學書訪國中第一聰明娑羅門名曰選友為太子師婆羅門授以梵書佉留書太子問閻浮提中有幾種書師默然又問阿字何義師又默然即從座起問曰太子初生時自言天人之中最尊最勝此言不虛惟願為說閻浮提凡有幾種太子曰閻浮提中梵書佉留書護眾書疾堅書龍鬼書捷沓和書阿須倫書鹿輪書天腹書轉數書轉眼書觀空書攝取書具有天地八部四洲鳥獸等書音聲諸書有如是等六十四種又阿字是梵音聲此字義是不可壞亦是無上真正之道義凡如此義無量無邊婆羅門白王太子是天人第一之師云何欲令我教耶復令忍天教兵法太子自能通達忍天反禮太子佛年十七王娶婆羅門女耶輸陀羅為太子妃復增二妃一名瞿夷二名鹿野太子雖有三妃不受欲塵於靜夜中但修禪觀一日白王游觀初出東門淨居天化作老人頭白背傴拄杖羸步太子乃念日月流邁時變歲移老至如電身安足恃我雖富貴豈獨免耶云何世人而不怖畏復游南門淨居天化作病人兩人扶掖在於路側太子又曰如此身者是大苦聚云何世人不知覺悟王聞切責諸臣有婆羅門子名優陀夷聰辯絕倫王令與太子友具說世間樂事令其心動太子復出城西門淨居天心念先現老病舉眾皆見令王嗔責我今現死惟令太子及優陀夷見耳即化死人四人轝之室家大小號哭共送太子與優陀夷二人獨見太子問此為何人優陀夷先受王敕默然不答如是三問淨居天威神之力不覺答言是死人也何謂為死答曰死者刀風解形神識去矣四體諸根無復所知此人在世貪著五欲不識無常一旦捨之而死又為父母親戚愛念命終之後恩情好惡不復相關誠可哀也問惟此人死餘亦當然答曰一切世人皆應如是無有貴賤得免者太子曰世間乃復有此苦云何於中而行放逸又出北門到彼園所止息樹下除去侍衛端坐思惟時淨居天化作比丘法服持鉢手執錫杖視地徐行太子前問汝是何人答曰沙門何謂沙門答曰三界兮擾擾六趣兮昏昏識心達本源故名為沙門又曰一切皆無常惟我所修聖道永得無為到解脫岸言訖騰空而去太子喜曰天人之中惟此為勝我當決定修學是道佛紀一九年太子年十九自知出家時至詣王言曰父王恩愛集會必有別離惟願聽我出家學道一切眾生愛別離苦皆使解脫王流淚曰汝今宜息此意國未有嗣而便委我曾不懷顧太子遂還時有相師白王太子今不出家過七日已必得轉輪王位王即往告太子我聞阿私陀說汝必不樂處世惟願為我生一子然後不復相違太子答曰如勅即以左手指其妃腹耶輸陀羅便覺有娠二月七日淨居天人白太子曰無量劫來修行今正成熟太子曰如汝等語但內外嚴衛欲去無從諸天白言我等自設方便即以神力悉令熟臥至於後夜諸天充滿虛空同聲白言今者正是出家時太子往至車匿所語之曰汝為我牽犍陟來犍陟馬名車匿泣曰後夜之中欲何所之太子曰我今欲為一切眾生降伏煩惱汝不應違我車匿號哭欲令王宮覺知以天神力昏臥如故於是諸天捧馬四足並接車匿帝釋執盖從北門出其門無聲自開太子乃曰我若不斷八苦終不還宮我若不得阿耨多羅三藐三菩提不轉法輪終不還與父王相見我若不盡恩愛之情終不還見波闍波提及耶輸陀羅行至天曉已三繇旬諸天便沒不現太子至閑靜林即便下馬撫犍陟背而言所難為事汝作已畢又語車匿世人富貴競隨奉事我捨國來惟汝一人獨能隨我甚為希有我今既至汝與犍陟俱可還宮車匿悲不自勝犍陟屈膝䑛足淚落如雨太子即就車匿取七寶劒自剃鬚髮而發願言願共一切斷除煩惱及諸習障淨居天又化獵師身服袈裟太子喜曰汝所著衣是寂靜服我今以此寶衣與汝貿易吾服此衣為欲攝救一切眾生斷其煩惱答言善哉遂脫寶衣貿之太子前行車匿即還太子入檀特山修道始於阿羅邏迦藍處三年復至鬱頭藍弗處三年又至象頭山於尼連河側靜坐思惟宜六年苦行以度眾生天獻麻米淨心守戒或日一食或七日一食不避風雨不起經行鵲巢糞污亦不棄去佛示六年苦行自念非正解脫我當受食而後成佛即沐浴於尼連河天為偃樹挽之而出時彼林外有二牧牛女一名難陀二名波羅見地中生千葉蓮花上有乳糜取奉菩薩即便受食復念過去諸佛以草為座成無上道帝釋因化凡人執淨軟草菩薩問汝何名答曰吉祥菩薩喜曰我破不吉以成吉祥即便受草向菩提樹下而取正覺菩薩坐閻浮樹下四十八日觀察思惟眉間白毫光蔽魔宮魔王波旬恐懼召會諸魔及道未成當往亂之長子商主泣諫不聽乃率眾作難悉現可怖諸境時菩薩身心寂然不動以指按地地大震動魔聞怖懼還歸本宮菩薩乃於二月七日之夕入正三昧二月八日明星出時廓然大悟成正等覺嘆曰奇哉一切眾生具有如來智慧德相但以妄想執著不能證得佛自二月八日成道後三七日內為寂塲智入三世悉皆平等其身充滿一切世間其音普順十方國土有無量無邊法身大士普賢文殊觀音彌勒等及宿世根熟天龍八部一時圍繞如雲籠月爾時世尊現毘盧遮那身說大方廣佛華嚴經又如是思惟一切眾生處五濁世三毒所覆薄福鈍根無有智慧云何能解我所得法今我若轉法輪彼必不信生誹謗心當墮惡道受無量苦我寧不說入於涅槃時大梵天王心懷憂惱眾生長夜沈沒生死今當往請轉大法輪欲界六天亦同勸請世尊默然受之即詣波羅奈國行至阿闍波羅水側日暮止宿入定風雨大至有大龍王名目真隣陀以其大身七重圍繞龍有七頭羅覆佛上以為障蔽至三月六日四七日滿雨止出定龍王化作年少婆羅門稽首問訊受三歸五戒諸旁生中最先見佛三月七日受提謂長者食八日至鹿野苑憍陳如等五人初太子入山父王思念乃命家族三人謂阿鞞䟦提拘利舅氏二人謂憍陳如十力迦葉尋訪住止隨侍動靜二人著五欲太子初食麻麥遽爾退席三人著苦行太子後受乳糜亦復遠去佛成道果先度此五人見佛歡喜求佛出家佛為說四諦法輪成阿羅漢於是世間始有三寶如來是佛寶四諦是法寶阿羅漢是僧寶尋念過去佛所行方便應說三乘遂以五時設教第一華嚴時第二鹿苑時第三方等時第四般若時第五法華涅槃時有長者子名曰耶舍中夜睡覺見諸妓女不淨生厭離心於不淨中生淨想忽見空中光明尋光而去趣鹿野苑佛為說法成阿羅漢天明耶舍父為尋子故跡至佛所佛授三歸為最初優婆塞又耶舍朋類五十人共詣佛所俱成沙門迦毘羅國有婆羅門子名富樓那具解韋陀等論與佛同日生本性厭離世間見佛出家即與朋友三十人往雪山專心學道獲四禪五通以天眼遙見世尊在鹿野苑說法遂共三十人來到佛所求佛度脫說法人中最為第一大迦旃延南天竺國婆羅門子習韋陀諸論得四禪五通因龍王問偈不能解了乃詣佛所佛為開解說法生大歡喜遂求出家論議第一優樓頻螺迦葉兄弟三人摩竭提國人學古仙道王臣歸信佛詣彼住處現諸神通種種調伏先度優樓頻螺迦葉及五百弟子又度那提迦葉迦闍迦葉各有二百五十弟子俱證阿羅漢有一外甥螺髻梵志名優波斯那在阿修羅山共二百五十弟子修學仙道亦投佛出家成阿羅漢王舍城頻婆娑羅王見三迦葉為佛弟子嘆曰嗚呼如來有大神力智慧深遠不可思議乃能伏如此之人以為弟子佛為說法得法眼淨王勅諸臣於竹園起諸堂舍請佛及僧住彼竹園諸王見佛頻婆娑羅為首諸僧伽藍竹園為始王舍城有二婆羅門具大智慧一名舍利弗一名目犍連各有一百弟子往詣竹園佛為說法成阿羅漢舍利弗智慧第一目犍連神通第一須菩提初生之日家室皆空相師占云既善且吉見佛聞法成阿羅漢解空第一摩竭提國有婆羅門名曰迦葉具大智慧誦四韋陀論日夜勤求無上道法旋復出家修杜多行會空中有神告曰佛已出世請往師之迦葉便趣竹園佛知其當來躬自往迎到多子塔前相逢迦葉合掌言曰世尊實是一切種智實是慈悲濟眾生實是一切所歸依即五軆投地而白佛言世尊是我大師我是弟子如是三說佛言如是迦葉我是汝師汝我弟子若人實非一切種智而欲受汝為弟子者頭裂為七分復為說法成阿羅漢以此迦葉有大威德天人所重故名大迦葉淨飯王聞佛得道已經六年思欲一見令梵志優陀夷請佛還國優陀夷見佛為諸天釋梵歸化亦願為沙門佛為說法得羅漢道即遣優陀夷先現神變發起道心於是神足飛行經遊虛空往到本國現十八變報言却後七日佛當來降王出四十里迎佛見佛大喜選宗族五百人為沙門侍佛左右斛飯王二子一名摩訶男一名阿那律摩訶男言諸釋多出家而我一門獨無當一人營家一人出家那律以家事煩碎遂與釋種跋提各白其母懇求出家過七日釋子等八人出迦毘羅城說其寶衣象馬付所使優波離令還優波離思惟人身難得佛法難值諸尊貴者皆棄世榮我身卑賤何所貪樂即以寶衣等懸著樹上遂便共至佛所白言我父母已許願聽出家乞先度優波離以除我等憍慢心故於是世尊先度優波離次度那律等世尊從弟阿難以成道日生故名阿難此云歡喜舉國欣慶又名慶喜八歲出家弟子中多聞第一年三十一佛命給侍左右佛子羅睺羅年已九歲佛遣目連往迦毘羅城白父及耶輸陀羅放羅睺羅出家修習聖道目連受命到彼以種種方便曉諭耶輸不聽時佛起化人空中告言耶輸陀羅汝頗憶念往古世時誓願事不我當爾時為菩薩道以五百銀錢從汝買得五莖蓮花上定光佛時汝求我世世所生共為夫妻我不欲受即語汝言我為菩薩累劫行願一切布施不逆人意汝能爾者聽為我妻汝立誓言世世所生國城妻子及與我身隨君施與誓無悔心而今何故愛惜羅睺不令出家學聖道也耶輸聞已霍然還識宿業因緣事事明了如昨所見愛子之情自然消歇時淨飯王即集國中豪族各遣一子有五十人隨從出家佛使阿難剃頭舍利弗為其和尚目連為阿闍梨授十戒法便為沙彌舍衛國王波斯匿有一大臣名須達多家巨富賑貧乏時號給孤獨因欲為兒娶婦躬往王舍城中大臣護彌家既到已見其家內大張供具須達多問故答言請佛及僧問云何名佛云何名僧護彌具告所以須達多聞之毛髮俱竦尋到佛所見佛相好過於護彌所說心大歡喜佛為說法成須陀洹須達多願起精舍請佛降舍衛國度彼眾生佛許之辭佛還家佛命舍利弗與俱至舍衛國案行諸地惟王太子祗陀有園正得處所須達多乃白太子太子不肯須達多慇懃再三太子曰若能以黃金布地令無空者便當相與答曰諾乃使人眾負黃金八十頃中須臾欲滿略欠少地太子念言佛必大德能使斯人輕寶乃爾遂令止勿更出金園地屬卿樹木屬我共立精舍須達多共舍利弗經地已竟起立精舍啟知國王請佛及僧佛言須達買園樹木祗陀所有可名祗樹給孤獨園佛再還迦毘羅國王問云何修行當得諸佛之道佛言一切眾生皆即是佛父王當念西方世界阿彌陀佛常勤精進當得佛道王言一切眾生云何是佛佛言一切法無生無動搖無取捨無相貌無自性王當於此佛法中安住其心勿信於他王與七萬釋種聞說是法信解歡喜悟無生忍初佛還國姨母大愛道即波闍波提白佛出家三請不許及佛再還國如前重請佛亦不許佛既出國大愛道與諸老母等追佛頓止河上復求出家又亦不許退住門外歔欷而啼阿難自外回問故答曰我以女人故不得出家自悲傷耳阿難乃白佛大愛道以至心欲受法律願佛聽之佛言止止若聽女人出家者令正法不得久住阿難復曰過去諸佛具有四部眾如來獨不具耶佛言若大愛道修八敬法盡壽行之可入法律阿難出告大愛道便受大戒為比丘尼遂得應真樓至菩薩請立戒壇為比丘結戒受戒於是創立三壇佛院門東名佛為比丘結戒壇佛院門西佛為比丘尼結戒壇外院東門南僧為比丘受戒壇戒壇從地而立三重為相以表三空我法俱為入佛法初門時天帝施以覆釜置於壇上大梵王施無價寶珠置釜上供養舍利是為五重表五分法身戒定慧解脫解脫知見壇時十方諸佛無量菩薩天龍八部悉皆雲集諸佛登之共議結戒輕重持犯等相及度尼滅正法相諸佛通議曰古有四部今何獨無初雖正法減半今尼行八敬還住千年故此二壇惟佛所登共量佛事外院戒壇乃僧為四眾受戒壇也佛說法華經凡二處三會始在靈山次升虛空後復還靈山有大梵王以金色波羅花獻佛請佛說法世尊登座拈花示眾人天百萬悉皆罔惜獨有迦葉破顏微笑世尊曰我有正法眼藏涅槃妙心實相無相微妙法門付囑與汝汝當護持流通令斷絕聽吾偈曰法本法無法無法法亦法今付無法時法法何曾法說偈已復告迦葉吾將金縷僧伽黎衣傳付與汝轉授補處慈氏勿令朽壞并勅阿難副貳傳化迦葉禮足白佛言善哉善哉我當依勅恭順佛故佛念四眾懈怠不將侍者如屈伸臂頃獨至忉利天歡喜園三月安居辛未十月既望佛告文殊汝詣母所道我在此摩耶既至佛言身所經歷與苦樂俱當修涅槃永離苦樂摩耶聞法得須陀洹果是時人間久不見佛優填王等至阿難所問佛所在阿難報曰我亦不知時優填王渴仰如來遂敕奇巧工匠作如來形像毘首羯摩天化身為匠不日而成三月將盡佛令鳩摩羅告閻浮提如來將下欲入涅槃於是佛化寶階從天而下優填王載像來迎為佛作禮佛三喚三應乃云無為真佛實在我身又語像言汝於來世大作佛事佛紀七九年二月十五日周穆王五十三年壬申二月十五日此方暴風忽起損舍折樹地動天陰西方有白虹十二道南北通貫連夜不滅穆王怪問羣臣太史厲多對曰西方聖人入滅之相耳佛在拘尸那城力士生地跋提河邊娑羅雙樹間臨涅槃時說涅槃經告大眾言我以甚深般若遍觀三界根本性離畢竟寂滅同虛空相一無所有法相如是其知是者名出世人是事不知名生死始時諸比丘勸請如來惟願久住不入涅槃佛言汝等不應作如是語我今所有無上正法悉已付囑摩訶迦葉是迦葉者當為汝等作大依止猶如如來世尊以手摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子佛又三入禪定三出三告乃云以是因緣我今安住常寂滅光名大涅槃乃於寶床右脇而臥於其中夜寂然無聲便般涅槃復從棺起為母說法并說無常偈曰諸行無常是生滅法生滅滅已寂滅為樂迦葉遠來奔訃金棺自開即現雙足出於棺外眾禮足已還自入棺爾時諸弟子即以香薪竸茶毘之燼後金棺如故大眾即於佛前以偈讚曰凡俗諸猛熾何能致火𤑔請尊三昧火闍維金色身時金棺從座舉高七多羅樹往返空中化火三昧須臾灰生得舍利八斛四斗諸王爭取有婆羅門以石瓶塗蜜即共三分一分諸天一分龍王一分八國各還起塔供養劉敬鍾居士年今已週甲號伊齋以重聽故亦號梵聾築室于高陽郡之延禧坊麻其衣草其食尋常接人必依經說尤酷好宗鏡錄不移易一絲毫以其為末法之未得謂得未證謂證者垂鑒戒故嗚呼士其今之龐蘊歟余囑代撰釋迦如來應化記實先生慨諾博考羣經撮要成篇以惠之以是因緣將來可多得發菩提心者是足為先生賀也亦為佛教通史幸也三藏結集諸論紛地紀錄教義遺事于方冊非佛時學者之所尚也世尊在時說法唯隨所聞依而行之可矣世尊入涅槃後有不正比丘出且恐妙法因而散逸有結集三藏之舉結集有大乘小乘之別小乘之中又有上座部大眾部之異上座部結集是大阿羅漢摩訶迦葉于羅閱祗城洞中會五百賢聖於聖眾前令阿難陁集修多羅藏經藏優波離集毗那藏律藏迦葉自集阿毗達磨藏論藏安居三月始畢其功名為上座部者迦葉為僧中上座約僧中首座之號而立名也次大眾部結集者其時有阿羅漢婆師迦於畢波羅洞外別結僧界延諸凡僧為洞內之結集分別誦出五藏五藏者三藏加雜集藏梵咒藏是也名為大眾部者以凡聖大眾同會一處約僧集而立號也如斯二部雖別處結集於佛宗義未嘗異計大乘之結集者義林章舉二說一西域相傳云與小乘同處結集一大智度論云彌勒菩薩將阿難於鐵圍山間集大乘三藏結集既成迦葉持法藏二十年傳之於阿難阿難傳之于末田地迦末田地迦傳之于商那和修商那和修傳之于優婆毱多百年之間五師瀉瓶法海無風是云異世五師世尊滅後百年吠舍離國之比丘肯離佛法於戒律出十非法事有長老耶舍陁者生大悲愍遂于吠舍離城請七百聖眾重復結集毗那耶藏是為第二結集時尊者優婆毱多道標孤高秀出世人稱為無相好佛言尊者雖無相好具德與佛均也普持三藏化益甚多有高足弟子五人於毗那耶各執一見遂將律藏分為五部曰曇無德部曰薩婆多部曰彌沙塞部曰迦葉遣部曰婆麤富羅部是也是為律藏分泒之同世五師世尊滅後百餘年阿輸迦王即阿育王應世尊之懸記出世王為摩伽陁國王頻婆沙羅之曾孫當時於五天竺最富強而有威勢王即位之始凶逆無道大虐國民甚為佛法之害及中年有比丘為海者化度之王乃翻然改心深皈佛法自是王之所為非佛無事非仁無政時有比丘目犍連子帝湏者更結集三藏是為第三結集又派傳道使佛教能弘通於異方者阿輸迦王為之嚆矢也今錫蘭佛教即其王子西域記云王之弟也摩訶因陁羅之所弘布起多數之浮圖立巨大之伽藍或樹道標以記佛經或削崖壁而刻聖傳等王於佛教最極盡力歐人五十年已前於印度及阿富汗斯坦諸處陸續發現此等古蹟大王之弘業至是益昭昭乎照於世人之耳目矣盖王於佛教恰如罔斯丹丁帝之於耶穌教然王所信唯小乘教當此之時有大天者始唱小乘中異義遂分小乘為二派佛教中分宗義此其濫觴也二派者一上座部長老宿德比丘保守舊義之徒也二大眾部小壯豪傑比丘推大天為上首以主張新義之徒也此二部之名雖襲前結集舊名而立其實非如前之一味一相而判然異其宗義者也二派之部上座部偏於萬物皆有之義大眾部偏於諸法皆空之義阿輸迦王潛助大眾部上座部比丘遂盡棄摩伽陁國移住北方迦濕彌羅國是迦濕彌羅國有部宗獨盛之故也有部者具說一切有部是上座部之分派其所謂大天之異義者以有五事之妄語也自是以後小乘中頻分支派至於四百年頃大眾部派分為九上座部析為十一二部合為二十派曰大眾部曰一說部曰說出部曰鷄胤部曰多聞部曰說假部曰制多山部曰西山住部是大眾部之分派也曰說一切有部說一切有律藏分派中薩婆多名也曰雪山部曰犢子部曰法上部曰賢胄部曰正量部曰密林山部曰化地部曰法藏部曰飲光部曰經量部是上座部之分派也此時小乘最盛之聲臭轉微其二十泒之異義見於宗輪論世尊滅後三百年有阿羅漢名迦旃延子在迦濕彌羅國造發智論是為有部宗之本論是後羅漢依以造論者甚多二十部之中此宗最盛也世尊滅後四百年始健駄羅國王迦膩色迦深信佛法專崇弘布之事一日問脇尊者曰佛教同源諸德所言何人人異也尊者答曰世尊去世歲月已久師資各據見聞共為矛盾王曰諸部宗義孰最善也尊者答曰無過有義於是王於迦濕彌羅國以世友菩薩為上首請五百聖眾結集有部宗之三藏王造鍱以鏤寫之埀後世是為第四結集脇尊者是付法藏第十祖也世尊滅後六百年之始馬鳴菩薩造起信論復興大乘是大乘中興之祖也菩薩為付法藏第十一祖其著書雖多今所有者起信論大宗地玄文及大莊嚴論等數部而已自此大乘漸盛小乘稍衰世尊滅後七百年之始龍樹菩薩紹馬鳴而起作中觀十二門智度十住諸論益顯揚大乘是為付法藏第十四祖又印度大乘空宗真言密宗之開祖也龍樹菩薩有弟子二人一曰龍智一曰提婆提婆菩薩著百論二十品盡力破邪顯正龍智菩薩專持密藏宏兩界大法於是大乘顯密皆盛於世時有堅惠菩薩造法界無差別論祖述馬鳴起信論之旨世尊滅後九百年無著菩薩踵龍樹菩薩而出於阿輸陁國誦出彌勒菩薩瑜珈論莊嚴論等五部大乘論且述作攝大乘顯揚金剛般若諸論大乘益振訶梨跋摩之成實論亦造於此時訶梨跋摩為鳩摩羅多之弟子鳩摩羅多者付法藏十八祖薩婆多宗之學者也訶梨跋摩以薩婆多眾見解淺劣乃取諸部之長別立空宗造成實論二百二品是為成實宗之鼻祖也無著之弟子二人曰世親亦云天親曰師子覺世親菩薩始學小乘有宗造數十部論後習經部意簡有宗乃攝大毘婆沙論著俱舍論以非議薩婆多部時眾賢論師亦著顯宗正理二論以正理論破俱舍義眾賢之論間有違婆沙論處由此薩婆多宗遂分新舊即婆沙論稱舊薩婆多顯宗正理稱新薩婆多而俱舍論雖潛依經部亦可屬舊薩婆多宗也世親菩薩承無著之誨入於大乘造惟識十地涅槃淨土等諸論贖先誹謗大乘之罪世遂稱為千部論師於印度為大乘有宗之開祖然所謂有空兩宗實後世所分在當時大乘法海尚為一味也故佛地論曰菩薩藏千歲已前清淨一味無有乖論千歲已後乃興空有二種之異論也與世規同時有無性菩薩二人各釋無著菩薩所著攝大乘本頌名攝大乘論然兩師見解殊不同也世尊滅後一千一百年護法清辯二論師同時出世清辯者龍智菩薩之高弟也龍智壽七百歲既弘密乘亦保守龍樹之空宗傳於清辯清辯承之造大乘掌珍論以破護法之有宗護法論師承世親之旨造惟識釋論以駁清辯之空宗於是大乘法海始生波瀾歧分有空二宗曰中觀宗是為空宗以龍樹中觀論為主曰瑜珈宗是為有宗以彌勒菩薩瑜珈論為主印度大宗止此二宗矣造惟識釋論非唯護法總有十師曰清勝曰火辨曰德惠曰安惠曰淨月曰護法曰難陁曰勝友曰勝子曰智月是稱唯識十大論師就中初二人與世親同時餘八人皆世親滅後出世十人中以護法為正統云此時有陳那菩薩者著作甚多造因明正理論定論理之元則其弟子商羯羅主造入正理論祖述正理論義由是因明生新舊之別陳那以前曰古因明陳那以後曰新因明是時大乘宗義甚盛小乘學徒因之生隙與相反背殆如水火盖大乘非佛說之語興於此時矣世尊滅後千五百七十八年即西洋紀元後六百二十九年唐玄奘三藏跋涉五天竺之時也當時摩伽陁國那蘭陁寺有戒賢智光兩大論師各提撕數千徒眾三學甚盛戒賢論師精習瑜珈宗護法菩薩之徒也奘法師就之學瑜珈及因明智光論師者清辯菩薩之弟子也傳法于日照三藏日照三藏後於唐則天武后時航海來支那是時摩伽陁國戒日王甚崇佛法或修無遮會或起塔造像概無虛歲又尊重勝軍論師請以為師至封以八十大邑勝軍者十六論師中難陁之弟子也然閱玄奘之記行累累多記空殿廢寺豈當此年代婆羅門教徒已大得權勢歟印度之佛日漸即西山而支那之佛日中天方麗兩域大教之盛衰可以推其故矣其後支那來遊天竺之僧凡五十六人義淨三藏亦航海來至事見其記錄並南海寄歸傳其後三百年至支那之宋代或有支那僧遊於印度或有印度僧來遊支那互相往來甚為繁夥由是觀之西域佛教猶未絕其喘涎也世尊滅後二千年西洋紀元後一千一百年土耳其突厥遺種亞剌非亞之回回教徒侵入印度百餘年內殺戮人民破碎塔像兇暴橫蠻無所不至於是乎僧徒漸捨南部移住北方至西洋紀年後千四百年元太祖帖木兒侵入印度席卷全土崇奉佛教矣其後百餘年蒙人再侵入於印度此蒙古人雖同為元朝然已異前蒙崇奉回回教故印度佛教益以衰矣其後不久歐人亦以接踵而至布基督教於是婆羅門教火教回回教基督教等四教雜糅蔓延至西洋紀元後一千六百年印度半島之中全絕佛教之聲跡獨雪山之麓不丹尼波爾迦濕彌羅之諸國僅存其餘喘而南印度之錫蘭全島及孟加拉灣以東暹羅安南諸國乃至北方西藏伊犂等處猶崇尚佛教如故也傳譯經論撰述章疏東漢明帝永平十年丁卯西紀六十七年西域佛法始通支那先是帝夢見金人飛行殿庭遣中郎將蔡愔博士王遵等往西域求佛法愔等至月支國遇迦葉摩騰竺法蘭二師得佛像及梵經以白馬駄之與二師共歸洛陽帝大喜起伽藍請騰蘭居之名曰白馬寺是為漢地建寺之始也於是騰蘭譯出四十二章經是為漢地佛經之始帝乃以梵漢二經藏於蘭臺石室之中又圖繪佛像於西陽城門及顯節陵上以示萬姓此時騰蘭所譯共有六部十四卷皆小乘經也盖大法始來根機未熟大乘妙理難遽發矣按漢明以前佛跡已來摘舉四事證之如左第一秦始皇之時沙門室利防等十八人齋佛經來化始皇以其異俗囚之咸陽獄朱士行經錄第二漢武帝元狩年中伐凶奴得金人帝香華禮拜祭之於甘泉宮漢武故事第三漢劉向校書天祿閣往往見有佛經又考自古得仙者百四十六人其中七十四人已見佛經劉向列仙傳序第四漢哀帝元壽元年博士景漢等使月支國受浮圖經魏畧西戎傳桓帝建和元年佛紀一一七四年月支國沙門支讖來洛陽譯出般舟三昧阿閦佛等經二十一部建和二年佛紀一一七五年安息國三藏安世高到洛陽專事譯經凡出三十九部此中始見大乘經自永平弘傳佛教以來臣民雖代有奉佛者然天子則除明帝外未有好之至桓帝始尊信禁中鑄造黃金佛像親祭之靈帝光化二年佛紀一二六年西天竺沙門竺佛朔至洛陽譯出道行般若經獻帝初平二年佛紀一二一八年蒼梧儒士牟子者因世亂無仕宦志銳意佛道世多非之乃製理感篇以解謗儒者歸佛始於牟子興平二年下邳相笮融起佛寺課人誦經會者五千餘人是為民間建佛祠行佛事之始時支婁迦讖支曜等譯師軰出佛教漸盛及漢末譯經共有三百餘部吳主孫權建寺以居康僧會江南佛法自是而盛僧會康居國沙門也以遊化為任至建康行道感得舍利以示孫權權大嗟嘆為建寺塔名曰建初寺魏主曹丕黃初五年佛紀一二五三年月支國優婆塞譯云居士支謙來洛陽謙授業支亮亮授業支讖世稱天下博士無過三支既而謙去洛陽入吳拜博士譯出經凡一百二十部魏陳思王曹植魏主之弟每讀佛經輒嗟賞感歎嘗遊魚山聞空中天樂響寫其聲節作梵唄今梵唄中魚山流者即其遺奏也魏齊王嘉平二年佛紀一二七七年西天竺三藏曇摩迦羅至洛陽制受戒之法入漢土一百八十餘年戒律始興魏嘉平四年佛紀一二七九年天竺沙門康會江至洛陽譯無量壽經魏高貴鄉公甘露五年佛紀一二八七年頴川未士行講道行般若經是為講經之始士行每歎翻譯未週乃發長安至于闐得放光般若經而皈晉武帝泰始二年侍中荀勗於洛陽造佛菩薩金像十二軀太康二年西天竺沙門婁至來廣州譯十二經太康七年月支國沙門竺法護到長安譯出正法華等經二百十部惠帝永寧元年西天竺沙門竺叔白蘭法祖支法度法立法矩等至長安共譯經百六十五部懷帝永嘉四年西天竺沙門佛圖澄至洛陽時後趙石勒據洛陽多害沙門澄有神異石勒遂敬之如神勒死弟季龍襲尤傾心事澄衣以綾錦乘以雕輦朝會引見常侍御史悉升殿護輿太子諸侯扶翼而進澄專事化度弟子數千萬人國人於其所在之方不敢涕唾每相戒曰忽起惡心勿為惡事大和尚知汝其感化道俗如此永嘉六年武邑太守盧歆請沙門道安於郡城講經閤城人士來聽如崩厥角初道安受業於佛圖澄學成住襄陽檀溪寺襄陽高士習鑿齒以書通好詣安自稱曰四海習鑿齒安應聲曰彌天釋道安二人相得如是秦王符堅攻破襄陽得安喜曰吾以十萬之師取襄陽所得盖一人半耳左右問其故堅曰一人安公半人習鑿齒也東晉成帝咸康元年沙門支道林譯方等法華經咸康六年右軍王羲之為西天竺達磨多羅建皈寧寺於廬山哀帝熙寧三年詔竺潛于禁中講般若經既而辭還剡山乃詔支遁續講一時名士爭與結方外交廢帝太和二年支遁上表請還山詔建沃州寺居之支遁講經多會宗遺文為守文者所陋謝安聞而嘆曰是如九方皐之相馬略玄黃而取神駿者也支遁嘗貽書于高句麗僧某云上座竺法深中州劉公之弟子體性貞峙道俗綸綜往在京邑維持法綱內外具瞻弘道之匠也此見海東高僧傳而高句麗僧失名惜哉按竺法深即竺潛之字也太和三年洛陽東寺之尼道馨為眾講法華維摩聽者如市孝武帝太元六年沙門法正譯出千佛名經等百十一部太元九年沙門惠遠避秦亂歸晉惠遠鴈門人受業於道安及關中擾亂安散其徒惠遠自襄陽至廬山九江刺史桓伊為建東林寺居之初東土未有涅槃常住之說但云壽命長遠惠遠曰佛者覺至極也至極則無變無變之理豈有窮哉乃著法性論十四篇羅什三藏入關見之嘆曰晉人未見經乃暗能會理如是時晉室微弱天下奇材多隱居不仕劉遺民雷次宗等悉從惠遠遊號廬山十八賢惠遠復與僧俗百二十三人結白蓮社專修念佛是為漢地淨土宗之濫觴太元二十年佛紀一四二二年迦濕彌羅國三藏僧伽跋澄來長安譯雜阿毘曇論安帝隆安二年佛紀一四二五年長安沙門法顯往天竺求經時桓玄輔政勸上沙汰僧尼惠遠力辨事遂寢是年北魏太祖拓拔珪始即帝位改元天興下詔曰夫佛法之興其來遠矣濟益之功冥及存沒神蹤遺法信可依憑其建飾容像修整佛殿自是一國翕然歸佛隆安六年佛紀一四二九年龜茲國三藏鳩摩羅什至洛陽時姚秦弘始三年也秦王姚興迎羅什居逍遙園遇之以國師禮敕集沙門八百餘人共譯經論三百餘卷羅什持梵本秦主自執舊經相讎校金剛般若經一卷及仁王般若經二卷皆譯於是時什師門下有八傑曰道生僧肇道融僧叡道桓僧影惠觀惠嚴是也此中生肇融叡號稱關中四聖佛教東漸為三百年其間隆盛者傳譯之業而已就中雖有大乘經論弘通未廣如道安惠遠僅啟端緒及羅什三藏來大乘之宗三論宗成實宗方始蔚興是為支那佛教第一變也安帝元興元年天竺佛多羅尊者至秦義學沙門數百人從之於中寺出十誦律梵本共什師翻譯及半而佛多羅卒會天竺沙門曇摩流支又至亦善毘尼廬山遠公喜之走書關中勸流支足成此律流支乃與什師續成宏業律儀之事至此始備元興二年佛紀一四三年桓玄重申庚氷議曰沙門可拜王者成帝咸康六年庚氷輔政議令沙門拜王者尚書令何充議為不可䟽三上氷議遂寢尚書桓謙中書王謐互共爭之不聽惠遠乃致書曰袈裟非朝廷之服鉢盂非廊廟之器沙門塵外之人不應致敬王者玄得書即停其令惠遠復著不拜論五篇以警當世義熙二年佛紀一四三三年迦濕彌羅國三藏佛陁耶到凉州誦出四分律與竺佛念共譯之惠遠所居東林流泉遶寺下入於溪惠遠每送客逾此輒有虎號吼因稱虎溪嗣後送客未嘗過此獨陶淵明陸修靜到語道契合每不覺過虎溪致虎號吼因相與大笑世傳為三笑圖義熙四年佛紀一四三五年惠遠遣弟子支法領等往天竺領等至于闐國訪求梵本遇三藏佛駄跋陁羅與之東還義熙六年佛紀一四三七年法顯三藏遊歷天竺三十餘國至是泛南海達青州而到楊都譯經數部先是沙門西遊僅達葱嶺之東至于于闐唯法顯深入天竺是為漢土沙門入印度之嚆矢義熙九年佛駄跋陁羅至廬山入蓮社遠公請譯禪經江東自是始有禪法義熙十四年內史孟顗請佛駄跋陁羅於建業譯出華嚴經六十卷惠觀惠嚴為之筆受是為晉本六十華嚴時有二青衣每從地出灑掃研墨供給譯事惠觀嘗與謝靈運等詳定大涅槃經頗增損其辭夢神呵曰妄以凡情輕凌聖典觀等惶懼乃止是為南本涅槃劉宋高帝永初元年車騎范泰於宅西建祗洹寺謝靈運於石壁山建招提寺少帝景平元年迦濕彌羅國佛陁什於楊都龍光寺譯五分律是年曇無讖三藏於北凉譯出涅槃經是為北本涅槃時北涼高祖元始十年也文帝元嘉元年迦濕彌羅國三藏曇摩密多至建康譯觀音普賢等經十部自袁皇后皇子以下悉傾身禮敬又畺量耶舍譯觀無量壽經元嘉四年沙門智儼譯瓔珞本業等經十四部時沙門惠琳以才學幸於文帝與顏延之同參朝政時人稱為黑衣宰相元嘉七年帝聞迦濕彌羅國求那跋摩名遣沙門道敏航海迎之跋摩欣然至廣州帝復遣使迎至金陵居於祇洹寺師講華嚴經帝率公卿日詣座下聽講元嘉十一年求那跋摩於南林寺立戒壇為僧尼授戒是為支那戒壇之始元嘉十二年沙門惠珣善十誦律製䟽敷講此為講十誦律之始元嘉二十三年北魏太武帝惑於司徒崔皓道士寇謙之之言下詔沙汰佛法孝武帝大明六年沙門惠簡等譯經二十部明帝泰豫元年五臺山北寺沙門法聰講四分律門人道覆錄義作䟽是為講四分律之始蕭齊高帝建元三年沙門曇摩耶舍譯無量義經武帝永明六年僧伽跋摩於廣州竹林寺譯善見論蕭梁武帝天監六年帝註大品般若經命沙門法雲為百僚講之雲最善法華嘗講法華感雨天花是時光宅寺法雲開善寺智藏莊嚴寺僧旻為梁之三大法師天監七年北魏宣武帝永平元年佛紀一五三五年詔菩提流支及勒那摩提諸三藏於太極殿譯十地論帝親筆受經四年始譯竣天監十一年佛紀一五三九年勅沙門寶亮撰涅槃經䟽帝為製序天監十三年佛紀一五四二年特進沈約甚精佛理嘗著中食論發其蘊奧又精音律嘗撰聲律定四聲例天監十七年佛紀一五四五年北魏沙門僧祐示寂祐大弘律法孝明帝深加禮敬賜肩輿入內殿命為六宮授戒祐著有出三藏記釋迦譜弘明集等並行於世天監十八年佛紀一五四六年會稽沙門惠皎著高僧傳普通二年佛紀一五四八年北魏主遣宋雲等往西域求經經二年還獻佛經一百七十部大通元年佛紀一五五四年南天竺菩提達磨泛海到廣州帝迎而問曰朕即位以來造寺寫經度僧等事不可勝數有何功德達磨曰並無功德帝曰何謂真功德達磨曰聖諦第一義帝曰如何是聖諦第一義達磨曰廓然無聖帝曰對朕者誰達磨曰不識帝不能領會玄旨達磨遂渡江往魏止嵩山少林寺終日面壁武帝後舉問志公志公即寶誌也天監十三年已示寂矣今忽有此問彼此必有一誤者志公云陛下還識此人否帝曰不識志公云此是觀音大士傳佛心印帝悔遂遣使去請志公云莫道陛下發使去取闔國人去他亦不回帝後追憶自撰碑文云嗟夫見之不見逢之不逢遇之不遇今之古之怨之恨之復讚云心有也曠刧而滯凡夫心無也剎那而登妙覺大清三年佛紀一五七六年西天三藏真諦來勅於法雲殿譯金光明經十部簡文帝大寶元年北齊文帝受東魏禪建元天保文帝甚信佛法從僧稠受菩薩戒大興三寶初金陵道士陸修靜之徒為梁武帝所棄走入魏地其道稍盛及齊文事佛甚厚修靜忌之詣闕請與釋氏角法文帝詔沙門法上當之法上舉曇顯勝其術於是詔禁道教道流遂絕跡於齊境高句麗沙門義淵入北齊見法上和尚質問佛法東來始末還國宣布時北齊尊者惠文獨步河南發中論三諦之理是天台智顗之法祖也元帝承聖元年佛紀一五七九年真諦三藏以侯景之亂將欲西歸達廣州受刺史歐陽頠之請於制止寺譯經論至陳代時凡出五十部先是東土諸士未聞真如隨緣之說真諦三藏譯起信論始盛提唱自是天台華嚴等諸宗屨談真如隨緣是支那佛教第二變也陳文帝天嘉四年真諦三藏譯出攝大乘論是攝論宗所依本論也真諦三藏又譯俱舍論作䟽記五十卷弘通之是名俱舍宗也惜乎其疏記之不傳也宣帝大建六年周武帝下詔沙汰佛法沙門清嵩靈偘等三百餘人相率皈南朝先是北周受西魏禪至武帝信道士張賓士言甚惡佛教迺下是詔時惠遠智炫等抗辯不止遂將寺觀四萬餘區並賜王公僧道四百萬人悉充軍民惠遠知時不可濟隱居於青蓮山作涅槃等經䟽後隋文帝於洛陽建淨影寺請遠居之所著數部皆行於世沙門智周等十一人往西天求經大建七年沙門智顗入天台山顗初謁南岳惠思禪師惠思從惠文學得法受觀心之法南岳嘆曰昔在靈山同聞法華宿緣所追而今復來顗行法華三昧經三夕有所得見靈山一會儼然未散南岳曰非爾不證非我不識是法華三昧之前方便也於是智解泉湧學徒影從是年秋九月入天台山命為終身道塲隋文帝開皇十七年翻經學士費長房上開皇三寶記十五卷長房先為沙門周武廢釋時乃反俗矣及隋興預於翻經之業故有此作仁壽元年帝謂天下一統是由佛力乃詔諸州名藩建靈塔而分送舍利以安之帝在位凡寫佛經四十六藏十三萬卷造佛像六十餘萬軀營造寺塔五千餘所譯師二十餘人所出經論垂五百餘卷時文中子王通下帷講道世稱大儒房玄齡杜如晦等皆集其門通嘗作中說有曰詩書盛而秦世亡非孔子之罪也玄虛長而晉室亂非老莊之罪也齋戒修而梁國亡非釋迦之罪也易不云乎苟非其人道不虛行煬帝大業五年沙門靜腕恐藏經變滅欲刻於石傳之不朽遂於房山縣之西天山削巖壁刻涅槃經爾後僧徒削刻相續歷唐宋遼金大藏經始完備人因名之曰石經山唐高祖武德六年嘉祥大師吉藏示寂初當陳隋革命僧徒多舍寺奔走吉藏乃率徒眾往詣寺中收聚經籍為之保存凡吉藏之所以引註宏博者以此故也武德九年太史令傅奕七上疏請廢佛帝頗惑之以奕䟽頒示諸僧于是法琳作破邪論惠乘著辨正論或云亦法琳作明槩撰决對論李師政述內德論並奏之帝覽諸論悟奕黨道毀佛太宗貞觀元年詔沙門光智於大興善寺譯寶星經五部命左僕射房玄齡等監護之貞觀五年佛紀一六五八年波斯國蘇魯支以景教即今之基督教來帝勅於京師建大秦寺貞觀七年佛紀一六六年玄奘三藏遊天竺達王舍城先是三藏慨前代譯經之多誤謬誓遊西土訪求梵本以資參訂三年秋上途自原州出玉關至是達中天竺從戒賢論師學大小經論時新羅高僧阿離耶跋摩惠業玄照惠輪玄恪大梵玄遊等亦求法入西竺皆不還貞觀十一年佛紀一六六四年以國姓李氏詔尊老子貞觀十三年佛紀一六六六年詔京官刺史普頒遺教經以戒僧尼業行貞觀十四年佛紀一六六七年沙門杜順示寂順有神迹對於病者病即愈對於啞者啞即言而人初不介意通達華嚴玄旨造華嚴法界觀五教止觀等書顯法界圓頓之理帝嘗召見之賜帝心尊者之號寂年八十有三貞觀十六年佛紀一六六九年帝幸弘福寺為追薦穆太后自製䟽稱菩薩戒弟子謂寺主道懿曰朕頃以老子居釋氏前為朕之先宗故朕初未創立道觀凡有功德並歸僧舍卿等以是可知朕心矣貞觀十九年佛紀一六七二年玄奘三藏從西域還獻梵本經論六百五十部詔就弘福寺與沙門道宣南山律師等同譯自是玄奘所出新譯之經論甚多及高宗之世總出七十四部一千三百三十八卷新譯舊譯之名自是而生是為支那佛教第三變也貞觀二十二年佛紀一六七五年勅有司寫新譯經論頒賜九道總管帝親製三藏聖教序冠之帝一日在玉華宮詔玄奘曰法師罷道可康庶政也奘固辭之于是於北闕紫微殿之西南剏弘法寺詔奘居之晝則陪御談論夜則就院翻經高宗永徽六年佛紀一六八二年玄奘譯因明論呂才作解頗毀之沙門惠玄致書於左僕射于志寧斥呂才太常博士柳宣亦劾才妄舉於是有旨命公卿學士領才詣慈恩寺就奘悔禮迦濕彌羅國三藏佛陀多羅譯圓覺經顯慶二年佛紀一六八四年勅建西明寺大殿十三所樓臺廊廡四千區詔沙門道宣為上座神泰為寺主懷素為知事道宣居西明寺作續高僧傳龍朔元年佛紀一六八八年天竺沙門般剌密帝譯首楞嚴經烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事房融筆受麟德元年玄奘三藏示寂壽六十有三帝哭之廢朝三日謂左右曰朕失國寶勅準佛之故事斂以金棺銀槨凡五下御札褒恤喪事四方會塟者可百餘萬人送葬之盛前後無比乾封二年南山道宣律師示寂宣從智首學毘尼戒行甚嚴日惟一食武德七年居終南山之紵麻蘭若製行事鈔貞觀四年行般舟三昧感天童給侍貞觀十九年隨奘公為譯經筆受之上首宣敷講四分律大振律宗咸亨二年義淨三藏往天竺求經咸亨三年禪宗五祖黃梅弘忍傳法於居士惠能是為第六祖儀鳳元年印度沙門日照至京師勅譯經論永隆二年終南大師善導示寂導初誦法華維摩忽自思曰教門非一若不契機必無有功於是投大藏信手探經得觀無量壽經歡喜誦習後謁西河道綽禪師益喜曰入證津要莫過於是於是至京師啟發四眾三十餘年寫彌陀經十萬餘卷畵淨土變相三百餘壁長安道俗並從其化永淳元年慈恩寺沙門窺基示寂基從奘師稟瑜珈唯識宗旨著疏百部時稱為百部䟽主而性豪蕩每出必治三車因復號三車法師永淳二年西明寺沙門道世著法苑珠林一百卷分門類事覽者便之道世道宣之俗弟也延載元年勅沙門法朗等九人譯大雲經並封縣公賜紫袈裟此為賜紫之始證聖元年以晉譯華嚴經猶有所缺遣使往于闐國迎實叉難陀勅於東都大徧空寺興菩提流支共事再譯法藏復禮惠沼等預其事譯成凡八十卷名為八十華嚴聖歷元年五月義淨三藏自西竺還車駕親御上東門迎勞之詔以所齋佛像梵經置於佛授記寺集眾翻譯淨在南海錫閩島也著有寄歸傳三卷與玄奘之西域記共為觀印度之雙眼鏡也聖歷二年以新譯華嚴經成勅沙門法藏於佛授記寺講演尋召藏于長生殿重宣其義藏即指殿隅金獅子為喻喻法界無盡之理武后大有所悟更賜號賢首菩薩戒師華嚴宗於是大興睿宗景雲二年佛紀一七三八年勅菩提流支與法藏等於北苑甘露寺譯大寶積經宰相張說右承盧藏用博士賀知章等監護之玄宗開元四年佛紀一七四三年天竺善無畏三藏來傳密教真言宗帝悅飭內道塲居之尊為教主三藏譯出毘盧遮那等經開元八年佛紀一七四七年天竺金剛智三藏率不空三藏至京師勅居於慈恩寺金剛智傳龍樹之密教所至築壇度人時稱善無畏金剛智不空為開元三大士祈禱禁呪極影感驗於是真言宗蔚興開元十年佛紀一七四九年沙門智昇作開元釋教錄二十卷撰入大藏經典及聖賢論述凡詮次為五千四百八卷人稱之為大藏定數開元十五年佛紀一七五四年沙門一行示寂一行從善無畏三藏學密宗又善歷數玄宗甚尊重之數召對諮問政事嘗著大衍曆行之於世其術甚精及歿帝輟朝三日出內庫錢五十萬立塔諡曰大惠禪師開元十八年佛紀一七五七年李長者著華嚴論長者名通玄盖隱仙也最潛意華嚴大發玄旨所著數部皆行于世開元二十八年示寂壽五十有五代宗大歷元年佛紀一七九三年沙門良賁奉敕造仁王經䟽大歷二年佛紀一七九四年宰相杜鴻漸好佛嘗造起信論䟽薨時遺命家人從沙門法葬德宗建中三年佛紀一八九年荊溪大師湛然示寂自唐以來法相華嚴禪宗之徒各張其宗天台宗遂大衰師起復講述宗旨中興智者之業一代著作粲然可觀貞元十二年佛紀一八二三年詔西天三藏般若等於長安崇福寺譯烏茶國所進之華嚴經沙門圓照澄觀清凉國師等任潤文證義帝親臨譯塲勘文裁正越三年成四十卷即四十華嚴是也憲宗元和二年佛紀一八三四年沙門惠琳撰一切經音義一百三卷成詣闕進獻勅入大藏賜惠琳紫衣元和六年佛紀一八三八年般若三藏譯本生心地觀經諫議大夫孟簡為飾潤文辭帝親製序元和九年佛紀一八四一年百丈懷海示寂懷海始製禪苑規律名百丈清規柳子厚名宗元自幼信佛求道積三十年韓退之嘗遺書規之子厚答曰浮屠之教與易論語合雖聖人再生不可得而斥焉既而南遷與諸禪人遊處南方諸大德碑銘多出其手嘗著文曰東海若解大讚揚淨土元和十四年迎鳳翔法門寺佛骨入禁中禮奉三日又歷送于京中十寺士民競禮施捨如山刑部侍郎韓愈上論佛骨表以諫之帝怒黜愈為潮州刺史愈至潮州遇大顛寶通禪師顛曰子自謂內通四海異方之學而文章磅礡孰如姚秦之羅什哉知來藏往孰如晉之佛圖澄哉盡萬物之性而心不動孰如梁之寶誌哉愈默然良久曰皆不如也顛曰子知才不如彼而彼所從事反非之何也愈不能答由是排佛之氣少沮按指月錄云韓文公一日訪大顛禪師問師春秋多少師提起數珠曰會麼公曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何首座扣齒三下及見師理前問師亦扣齒三下公曰元來佛法無兩般師曰是何道理公曰適問首座亦如是師乃召首座問是汝如此對否首座曰是師便打趁出院文公又一日白師曰弟子軍州事繁佛法省要處乞師一語師良久公罔措時三平禪師為侍者乃敲禪床三下師曰什麼三平曰先以定動後以智拔公乃曰和尚門風高峻弟子於侍者邊得個入處附韓文公與大顛禪師三書三書皆從朱子大全摘錄愈啟孟夏漸熱惟道軆和安愈獘劣無謂坐事貶官到此久聞道德竊思見顏緣昨來未獲參謁倘能暫垂見過實為至幸已帖縣令具人船奉迎日久竚瞻不宣某白愈啟海上窮處無與話言側承道高思獲披接專輒有此咨屈倘惠能降諭惠字疑衍或下有然字而并在能字之下也非所敢望也至此三日却歸高居亦無不可朝夕渴望不宣某白愈啟惠勻至辱答問珍悚無已所示廣大深逈非造次可諭易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見耶如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙羞指此等處耳不如親顏色隨問而對之易了此旬來晴明朝夕不甚熱倘能乘閒一訪幸甚朝夕馳望愈聞道無凝滯行止繫縛苟非所戀着則山林閒寂與城郭無易大顛師論甚宏博而必守山林義不至城郭自激修行獨立空曠無累之地者非通道也勞於一水安於所識道固如是識當作適猶言便也雖適之安之語用字略同言一水雖勞而既來則當隨其所便無處不安也道固如是即所以結上文道無凝滯之意也不宣某頓首尚玄按朱子考韓文公與大顛書有曰以余考之所傳三書決為韓公之文而非他人之所能作無疑矣云云盖朱晦菴以是三書捉獲昌黎信佛之贜證也其意在於抹摋漢唐之諸儒而欲直紹自己之道統於孟子也文宗太和三年佛紀一八五六年沙門清晃等於姑蘇法華院石壁刊法華經刺史白居易助之武宗會昌三年佛紀一八七年勅廢諸大秦寺景教寺院也會昌五年佛紀一八七二年帝惑於道士趙歸真之言下詔廢毀佛寺四萬餘區勅僧尼二十六萬還俗寺塔改為官廨鍾罄銷為農器越二年帝服金丹崩趙歸真等皆棄市懿宗咸通十一年佛紀一八九七年相國裴休學禪法於黃蘗希運得其旨平居廢酒肉作勸發菩提心文激勵士人又作圓覺經法界觀禪源諸詮集序世服其精要是年卒後梁太祖開平二年佛紀一九三五年泉州沙門智泉往西竺求法還獻進貝葉經後唐末帝清泰二年佛紀一九六二年四明沙門子麟往高麗傳天台之教法高麗遣李仁日送麟還吳越王錢鏐於郡城建寺院安其眾後晉高祖天福四年佛紀一九六六年漢中沙門可供呈進大藏經音義四百八十卷勅入大藏後周世宗顯德元年佛紀一九八一年齊州開元寺沙門義楚獻所撰釋氏六帖敕付史舘頒行賜紫衣顯德二年佛紀一九八二年詔廢佛寺三萬餘所存者僅二千七百所又毀銅佛像鑄周通錢先有唐武焚燒經籍勒僧還俗後有周世銷毀銅像併省寺院當是時諸宗高僧皆已沒落諸𣲖章䟽皆悉散逸凡百餘年間佛教殆如拂地矣及五代亡趙宋興法運復啟凡前朝之廢絕一時蔚興宋太祖建隆元年佛紀一九八七年下詔修治廢寺聽民間立佛像吳越王錢俶天性敬佛慕阿輸迦王造塔故事以金銅精鋼造八萬四千塔布散部內凡十年而功竣初天台教卷經五代之亂殘毀不全吳越王使使求之於高麗至是高麗遣沙門諦觀持經論章䟽詣進螺溪義寂一宗教文始還支那螺溪以授寶雲寶雲以授法智法智大講說之遂成台宗中興之名建隆二年佛紀一九八八年杭州永明寺沙門延壽著宗鏡錄百卷成高麗王光宗聞師道風遙執弟子禮又遣僧三十六人師事永明皆承印記歸還本國分化各方乾德三年佛紀一九九二年沙門道圓遊西域往返十八年至是還獻舍利及貝葉經帝召見于便殿問西土風俗賜紫衣乾德四年遣沙門行勤等一百五十七人往印度求法開寶四年詔成都造金銀泥字佛經各一藏沙門建益從西竺還進貝葉經偕來梵僧曼殊室利者中天竺王子也持律甚精詔館于相國寺爾後梵僧接踵而來不暇枚舉開寶五年詔雕刻大藏經凡一十三萬版是為大藏刊本之嚆矢帝手書金剛經常自讀誦宰相趙普因奏事見之帝曰甲冑之士勿視但常讀兵書可也太宗太平興國五年置東都譯經院敕西來沙門天息災及施護三藏共譯經論帝作序賜之於是譯經之業復盛詔入新經于大藏開版流布端拱元年沙門贊寧上大宋高僧傳三十卷贊寧有文才僧中之翰林史官也端拱二年杭州昭慶寺沙門有常結社修淨業宰相王旦為首叅政蘇易簡等百二十人與一時名流爭入其社比丘預者千餘人廬山蓮社于是再見帝甚達佛理嘗著秘藏詮緣識等書入大藏刊行之真宗咸平元年製三藏聖教書置先帝所作聖教序後又著崇釋論曰奉彼十力輔此五常上法之愛下下遵之遷善帝亦深達佛理嘗註佛遺教經及四十二章經並行于世咸平二年禮部侍郎陳恕以譯經院費用多乞罷之帝不許為之益盛自先朝以來梵僧累齋經至凡所譯出有四百十三卷譯經使楊億字大年王欽若沙門惟靜等編次以入大藏景德二年吳僧道原上傳燈錄三十卷天禧三年沙門道成撰釋氏要覽三卷成乾興元年章懿太后請天竺沙門道式為國修懺師著金光明護國道場儀上之仁宗天聖四年詔許天台章䟽入于大藏慈雲侍者有思悟者焚身以報國恩初慈雲求以智者教卷入藏思悟曰是非常事也小子當可助乃畵大悲像唱呪誓曰如事成當焚身報國是年得敕克遂初志天聖六年以御製三寶讚賜宰輔及譯經院明道元年長水沙門子璿華嚴宗之人也學于瑯琊惠覺禪師惠覺曰汝宗不振久矣宜勵志扶持以報佛恩可也子璿奉教住長水學徒千數其所著楞嚴經疏及起信論筆削記等盛行于世慶歷元年佛紀二六八年沙門惟淨見執政人裁省譯經之務預上疏乞罷譯舘帝曰三聖所崇奉朕奚罷之哉未幾御史中丞孔道輔果乞罷譯舘帝出惟淨䟽示之道輔之論遂寢慶歷五年佛紀二六七年歐陽修自諫院左遷滁州遊廬山遇祖印禪師居訥討論儒佛與韓愈遇太顛相類皇祐二年佛紀二七七年宰相文彥博在京師與沙門淨嚴等僧俗十萬人結社念佛修淨業自周世宗毀佛寺江南湖北台教雖然稍行而京邑之間未盛至是內侍李允榮奏以汴京第宅創興禪院因賜額曰十方淨因帝方留意禪宗詔有道者居之歐陽修等以居訥應命居訥以病辭舉懷璉代由是禪風大振李泰伯名覯盱江人時稱大儒者著潛書務為排佛沙門契嵩即明教大士也雲門宗派携所有著輔教編謁之展轉辨明泰伯乃留意讀佛經喟然嘆曰吾軰議論未及一部般若心經佛道豈易知哉皇祐四年佛紀二七九年司馬光嘗讀文中子王通所著至云佛為西方聖人乃曰果如是乎則可以見佛心矣作禪偈六首言其意其一曰忿欲如烈火利欲如銛鋒終朝常戚戚是名阿鼻獄其二曰顏回安陋巷孟軻養浩然富貴如浮雲是名極樂國其三曰孝道通神明忠信行蠻貊積善來百祥是名作因果其四曰言為百世師行為天下法久久不可掩是名不壞身其五曰仁人之安宅義人之正路行之誠且久是名光明藏其六曰道義修一身功德被百物為賢為大聖是名佛菩薩公一日遊洛陽諸寺廊廡寂然行至齋堂見沙門端坐默默進箸公欣然謂左右曰不意三代禮樂在於緇衣中矣嘉祐元年佛紀二八三年杭州沙門允堪示寂允堪述會正記消釋南山律宗諸文行於世帝常於玉冠頂雕觀音像左右請易之帝曰三公百官下拜者皆天下英賢也豈朕所敢當哉特君臣之分不得不然是故朕戴此冠回羣下之禮以禮大士耳神宗熙寧四年佛紀二九八年明教大士契嵩示寂契嵩稟法洞山曉聰禪師至錢塘靈隱寺閉戶著書既成入京師上輔教編定祖圖正宗記帝讀感歎敕以其書入於大藏賜號明教大師以示參政歐陽修修覧文嘆曰不意僧中有此郎也由是宰相以下無不爭相延請名振海內歐陽修自致仕居于頴上日與沙門遊自稱六一居士息心危坐屏却酒肉臨終之前日問近士借華嚴經讀至八卷而卒尚玄按指月錄云歐陽文忠公詣浮山法遠禪師室與客碁師坐其傍文忠遽収局請師因碁說法師乃鳴鼓集眾陞座曰若論此事如兩家着碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底只解閉門作活不會奪角衝關硬節與虎口齊彰局破後徒勞逴斡所以道肥邊易得瘦肚難求思行則往往失粘心麤而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一着落在什麼處良久曰從前十九路迷悟幾多人文忠嘉歎久之熙寧十年荊國公王安石奏施金陵之舊第為寺請真淨克文禪師為住持勅賜額曰報寧荊公嘗問文定公張方平曰孔子去世百年孟子生此後誰及孔孟者乎何吾道之寥寥耶方平曰豈無人耶亦有過之者曰誰耶曰馬祖雪峰石頭雲門此輩驥騏孔孟之教勒束不得皆去歸于釋氏荊公深以為然後以語於張商英商英歎曰至哉論也神宗元豐五年沙門繼忠示寂繼忠稟法於廣智尚賢著有義成記十卷扶宗記一卷哲宗元祐三年晉水沙門淨源示寂淨源受楞嚴圓覺起信於長水子璿四方宿學推為義龍高麗王子僧統義天航海而來入淨源門初華嚴一宗䟽鈔散逸及義天齋來諮受遂復得全時稱淨源為華嚴中興祖也沙門元照普勸道俗發願往生西方翰林學士蘇軾乃賜其母遺留之簪珥采畵淨土佛像以薦父母之冥福並作頌讚曰佛以大圓覺充滿河沙海我以顛倒想出沒生死中云何以一念得往生淨土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓槖雖有大聖智亦不能分別願我先父母與一切眾生在處為西方所遇皆極樂人人無量壽無往亦無來元祐六年沙門從義示寂從義學於扶風繼忠專弘台宗然所提倡之義乃山外之遺志後世不尚之所著有大部補註集解纂要等並行于世諡曰神化大師太史黃庭堅字魯直號山谷謫居於黔安禁酒絕欲讀大藏經三年常曰利衰苦樂稱譏毀譽之八風常在於四威儀中未曾相離雖古之聖賢豈能得立于八風之外哉是苟非學道無能知之者山谷初謁圓通禪師自是遂著發願文痛戒酒色日惟朝粥午飯銳志叅求既依黃龍晦堂禪師乞指徑捷處晦堂曰祇如仲尼道二三子以我為隱乎吾無隱乎爾者太史居常如何理論公擬對晦堂曰不是不是公迷悶不已一日侍晦堂山行次時巖桂盛開晦堂曰聞木樨花香麼公曰聞晦堂曰吾無隱乎爾公釋然即拜之曰和尚得恁麼老婆心切晦堂笑曰祗要公到家耳元符三年佛紀二一二七年雲居了元示寂了元字曰佛印住廬山金山雲居等處凡四十年間緇素受其薰化朝野名士多與之遊東坡謫居黃州與之對岸而交遊殊密也徽宗建中靖國元年佛紀二一二八年據庵法師有嚴示寂有嚴生平篤於淨業有懷安養詩悽惋感人其一曰西方真淨本吾家今憶歸程十萬賒客路竛竮都已困風塵孤苦最堪嗟七重樹聳千般樂八德池開四色花莫怪近來歸夢切柰何榮辱事無涯時人爭傳誦之著有大部備檢及箋難等書行于世睿宗政和元年佛紀二一三八年元照律師示寂諡曰大智唐道宣造戒䟽業䟽即羯磨䟽事鈔以弘四分律流傳逾四百載釋義達六十家前有允堪律師作會正記其說盛行兹靈芝律師以法華開顯之圓意造資持記于是宗分為兩派政和七年佛紀二一四四年帝因信林靈素甚崇道教宣和元年佛紀二一四六年詔改佛為大覺金仙餘為仙人大士僧稱德士尼稱女德士寺改號宮院改號觀賜佛天尊服禁銅鈸鍾磬德士被道流之衣戴冠執笏于是京師左街沙門永道上書諫曰自古佛法與國運同盛衰元魏太武信崔皓滅佛法不五六年崔皓族死文帝大興之後周武帝信衛元嵩滅佛法不六七年元嵩貶死隋文繼興之唐武宗信李德佐趙皈真滅佛法不久背發癰疽殂我太祖皇帝恢復之且我國家列祖相繼譯經度僧流通佛法國家之成憲萬世不可廢也書奏帝大怒貶永道于道州靈素益專橫帝惡之放林靈素歸溫州尋賜死宣和四年佛紀二一四九年丞相張商英卒商英自稱無盡居士嘗遊一僧舍見藏經嚴整怫然而曰吾孔聖之教寧不如胡人之書哉乃歸家夜坐書室執筆至三更妻向氏問曰夜深何不睡公曰吾欲著無佛論向氏曰既言無佛何須作論公大可其言乃止後于同寮下見維摩經信手開之恰遇此病非地大亦不離地大之句倐然心會因借其經歸家讀之向氏曰君既讀經宜可著無佛論矣公聞大悟遂留心禪宗後謁東林常總禪師深達妙悟所著護法論行於世是年卒壽八十有一諡曰文忠宣和七年佛紀二一五二年詔永道還京師住昭光禪院賜名法道以旌護法之績詔罷黃老之學高宗紹興五年圓悟禪師克勤示寂克勤著有碧巖集行於世朝鮮昔曾刊行碧巖錄六卷延祐丁巳海粟老人馮子振題跋者紹興十三年沙門法雲著翻譯名義集七卷紹興二十三年給事中馮楫稱不動居士亦稱濟川居士問道于徑山宗杲頓悟心宗南渡之後所在經藏殘闕楫以俸資造大藏經及四大部之小藏華嚴涅槃寶積珠林為四大部各四十八所所至與高僧逸民結社時賢咸從其化是年卒指月錄云公以建炎後名剎教藏多殘燬施印凡一百二十八藏有語錄頌古行于世孝宗乾道四年龍舒王日休作六經訓解數十萬言一朝捐之曰是法非究竟吾其歸西方乎自是專心念佛日課千拜著有淨土文行于世淳熙十年帝註圓覺經以賜徑山沙門寶印刊行于世理宗淳祐三年元中書令耶律楚材卒楚材字晉卿仕于元軍國大計一取决之元得平定中原者楚材之力也楚材學無不窺尤傾心禪理嘗從萬松禪師得道稱湛然居士其後居重職日接萬務精神淡泊如居山中至是而卒度宗咸淳五年沙門志磐著佛祖統紀元國師發思八倣梵文制蒙古字世祖詔頌行天下咸淳十年元太保劉秉忠少為僧從海雲禪師臨濟下十六世謁世祖于王邸應對種旨自是每受顧問遂留侍帷幄定軍國大計其所施設多基于佛氏慈濟之意至元元年詔拜光祿大夫太保秉忠承命雖居坊第齋居蔬食終日澹然無異平昔是年卒贈儀同三司諡文定公端宗景炎元年元世祖敕學梵書又詔建大聖萬安寺元世祖至元十六年東亞全土皆為席卷版圖之廣振古無比崇敬三寶大事弘布三寶之聲光晃耀實以此時為最至元十七年帝師發思八示寂發思八西藏人也宗喇嘛二十二歲世祖尊為開教宣文輔治大聖至德普覺真智佑國如意大寶法王加以西天佛子大元帝師之號敕統天下之教門寂年四十二歲帝震悼為建大塔于京師寶藏舍利至元十八年詔除道德經外其餘皆焚燬之于是道士悉削髮為僧南天竺寺沙門蒙潤號玉岡著四教儀集註蒙潤尤精法華學徒千數宗風大振帝自平定天下專心興隆三寶印大藏三十六藏頒布歸化之諸國又詔天下每歲度僧讀大藏經宋之末年江南佛教久不流通帝精選碩德三十人往江南宣布弘化于是江南復霑法雨其餘建寺設齋譯經講道不可枚舉帝嘗曰朕以本覺不二之真心治天下國家武宗至大二年佛紀二三三六年內翰趙孟頫號松雪奉敕撰臨濟正宗碑仁宗延祐三年佛紀二三四三年敕建栴檀瑞像殿翰林承旨程鉅夫撰記英宗至治三年佛紀二三五年敕寫金字藏經學士吳澄為之序曰主上寫經為民祈福設廣教總管府統攝僧眾順帝元統元年佛紀二三六年沙門念常著佛祖通載至正十三年佛紀二三八年沙門覺岸著釋氏稽古畧元亡明興明太祖甚信佛法法運大啟凡立規律發條令措置僧尼護待佛法者無如明朝也明太祖洪武元年佛紀二三九五年施給釋道度牒設廣薦法會于蔣山車駕親臨祭軍人之靈文憲公宋濂為作記並頌以詩賦公佐太祖定天下最深于佛理嘗三閱大藏暇則玩禪理沒後雲棲寺宏公輯其文為護法錄就中有沙門塔銘三十九篇憨山清公德清也盛稱之以為當代之僧史其他所著有龍門子無相䞉語等命四方名德沙門校點藏經命沙門宗泐撰獻佛樂九章洪武六年佛紀二四年以故元帝師喃迦巴藏為熾盛佛寶國師洪武十年佛紀二四四年詔天下沙門講心經金剛楞伽三經命宗泐如玘等註三經頒行天下洪武十三年佛紀二四七年詔選高僧分侍諸王以沙門道衍侍燕王後燕王起靖難之兵皆衍之謀也洪武十八年佛紀二四一二年翰林待詔沈世榮撰續原教論洪武二十八年佛紀二四二二年命僧錄司考試天下沙門給以粮米及袈裟衣衾帝嘗曰佛氏之教幽贊王綱又曰天下無二道聖人無兩心太宗永樂四年佛紀二四三三年沙門道衍著道餘錄彈程朱非佛論道衍以首定禍亂帝擢為太子少保復姓姚賜名廣孝屢勸蓄髮道衍終不肯嘗賜一宮人亦不肯近淡泊禪誦倍於舊時永樂五年命西僧哈立麻於靈谷寺設正法壇薦祀皇考皇妃哈立麻率天下名僧大舉齋會十有四日加哈立麻為萬行具足十分最勝圓覺妙智慧善普應祐國如來大寶法王西天大自在佛之尊號領天下釋教賜金銀儀仗同於郡王其徒孛羅等皆封為大國師並賜印誥金幣等物永樂十七年命沙門道成一如等八人勘校藏經集僧寫錄沙門一如造法華科註又奉勅作大明三藏法數帝著神僧傳永樂十八年詔南北兩京各刻大藏南板六行行十七字北板五行行十五字又別造石刻一藏以字置于大石洞宣宗宣德五年沙門圓瀞著教乘法數武宗正德六年帝甚好佛自號太慶法王神宗萬曆十六年中郎袁宏道著西方合論勸導淨土袁氏兄弟三人皆信佛願生淨土世稱明之三袁李卓吾名贄萬歷初歷任南京刑部主事出為姚安知府卓吾風骨孤峻其學不守繩繳出入佛儒之間以歸于空宗後逢譖死盡焚其所著書萬曆二十八年赤水居士屠隆著佛法金湯編洞鄉居士莊廣還著淨土資粮論沙門僧可號達觀於燕京建大法幢後遇讒而沒著有紫柏老人集師曾刊刻方冊大藏經以便流通是為明本大藏即方冊藏經之權輿也雲棲沙門珠宏字佛惠號蓮池著書三十餘部修淨業精律儀萬曆四十五年沙門德清號憨山著楞伽通議法華通議等書並行於世毅宗崇禎十一年沙門幻輪著續釋氏稽古畧永明王永曆九年沙門智旭示寂智旭以萬曆二十七年生聞地藏菩薩本願遂起出家心常以興法為己任所著二十餘部巍然成為一家嘗曰吾雖究心台部而亦未肯為台宗之子孫又曰漢宋之註䟽盛聖人之心法晦如方木入於圓竅也此謂儒教隨機羯磨出而律學衰如水之添於乳也指月錄盛行而禪道壞如混沌之竅穿也四教儀流傳而台宗晦如取死方醫變症也嗚呼知我者其唯釋迦地藏乎罪我者亦唯釋迦地藏乎清朝繼明代奉佛教然偏重西藏之喇嘛教漢地諸宗殆不顧也清朝之佛教大別二派一黃衣派即喇嘛教也一青衣派即舊來諸宗也亦依服色以為名黃衣派為帝家所尊崇青衣派為國民所信仰故黃衣派位高職豐甚有威權青衣派反是而益衰弱然諸宗之典型依然尚存焉尚玄按喇嘛宗者西藏流傳之大乘教也當唐太宗時國王贊普始興之喇嘛者西藏語聖武記譯云無上盖來自佛十號之無上士也其宗旨純是真言秘密以祈禱禁呪為主元世祖并有全亞尊重西藏僧發思八喇嘛教因以大興至明有宗喀巴者別出一派於是一宗分作兩派舊派為紅教新派為黃教皆取服色為名亦云紅帽黃帽紅守密教黃主顯教紅教許有妻子黃教禁之至食肉則同今蒙古有活佛即清朝所奉之喇嘛宗也清朝僧史姑未有見至於縉紳護法則如近世之彭尺木紹升龔定庵自珍楊仁山文會皆大居士也隨喜禪理闡揚佛法不遜於唐之柳白柳宗元白樂天宋之蘇黃蘇東坡黃山谷印支淵源羅麗流派俱舍宗此宗在印度屬小乘二十部中之薩婆多部佛滅度後九百年世親菩薩依四阿含經增一阿含經中阿含經長阿含經及雜阿含經造俱舍論三十卷在聲聞對法藏中最為精妙印度僧侶婆羅門以及外道莫不誦習支那陳文帝時西域沙門真諦三藏譯於廣州并為作跋即所謂舊俱舍是也陳僧智顗唐僧淨慧皆有䟽釋及唐貞觀間玄奘法師親赴天竺從僧伽耶舍論師學俱舍奧義歸國後重譯為三十卷其弟子神泰普光法寶等競為䟽記稱三大家流通當世遂以立宗焉五代後禪宗學者耻言名相而此宗遂廢我海東則新羅時傳此宗以文昌侯崔致遠號孤雲所撰智證國師碑文為據其文有云毘婆娑先至則四郡馳四蹄之輪摩訶衍後來則一國耀一乘之鏡然後義龍雲躍律虎風騰洶學海之波濤蔚戒楚之柯葉日本俱舍宗自新羅傳之日本俱舍宗凝然大德傳通緣起曰大日本國習學俱舍昔通諸寺各立義門附法相宗研覈此論元興寺護命明詮等乃其人也護命僧正傳新羅智平法師義建立有為法體體不生滅義餘先德等多是有為法體生滅義也成實宗印度此宗之興盖與俱舍宗同時訶梨跋摩不慊於有宗之說乃博覽大小乘取諸部所長作成實論釋成三藏中之實義至姚秦弘始年間鳩摩羅什三藏始譯行之其弟子曇頴為之筆述僧叡為之註釋此義大明自晉迄唐風靡一世齊梁之間江南尤盛中唐以後遂成絕學盖久為三論附庸不能獨存孤立焉我海東則新羅圓光法師入陳求法得傳此宗見唐續高僧傳第十三卷元曉大師著有成實論䟽十卷見高麗大覺國師新編諸宗教藏總錄日本成實宗自百濟傳之本朝高僧傳即日本高僧傳百濟道藏東渡之後撰成實論䟽十六卷既垂齡九旬化于南京昔東大寺之學者法相宗論習俱舍三論兼學成實至講成實靡不據於藏䟽其講廢止者三百餘年不能無憾也贊曰藏師之事國史不記何宗見著論䟽則跋摩宗乎實為一家之宗祖也三論宗此宗一名性宗一名空宗一名破相宗佛法雖分菩薩聲聞兩藏而性相之說大小乘實互相表裏如三論之於成實法相之於俱舍其最顯者也三論者一中論二十二門論三百論也或加龍樹大智度論亦名四論宗前二為龍樹菩薩造後一為提婆菩薩造故本宗之祖為此二大士鳩摩羅什是提婆三傳之弟子也傳法東來專弘此諦四論翻譯皆出其手弟子道生僧肇道融僧叡曇影惠觀道恒曇濟等咸受大義濟傳道朗朗傳道詮詮傳法朗朗傳吉藏是為嘉祥大師三論至嘉祥而其宗極盛亦至嘉祥而其義畧變於是一宗分為新古嘉祥以前名古三論亦稱北地三論嘉祥以後名新三論亦稱南地三論般若為諸佛之母一切聖賢莫不由此門而得解脫故世謂達磨未來以前此土通達性宗者實由三論及禪宗大行人人執不立文字見性成佛之義此宗遂為所掩五季以後嘉祥教典蕩然無存三論之傳盖較諸宗為最古及其廢也亦較他宗為獨先在我海東則高句麗惠灌法師入日本弘傳三論宗新羅元曉大師著有三論宗要一卷百濟慧顯少誦法華講三論皆精詣有師法見于新修科分六學僧傳淛東沙門曇噩述又三國遺事云釋惠現百濟人少苦心專志誦蓮經為業祈禳請福靈應長稠兼攻三論染指通神初住北部修德寺有眾則講無則持誦四遠欽風戶外之履滿矣稍厭煩擁遂往江南達拏山居焉山極嵒險來往艱稀現靜坐求忘終于山中同學轝尸置石窟中虎啖盡遺骸惟髏舌存焉三周寒暑舌猶紅軟過後方變紫硬如石道俗敬之藏于石塔俗齡五十八即貞觀之初現不西學靜退以終乃名流諸夏立傳在唐聲著矣夫攝論宗支那陳文帝天嘉四年真諦三藏譯出攝大乘論三卷是為攝論宗之嚆矢攝大乘論者乃別釋阿毘達磨經之攝大乘品者是無着菩薩所撰也世親無性二菩薩更為作釋論以解本論宗義都合三部真諦所譯即無着所授天親釋論十五卷無性釋論十卷別稱梁論焉唐玄奘法師復更譯三論是為新論今宗所依者為梁論先是僧惠曠親從真諦受攝論大義同時有法常智儼等其後有道岳惠休等師資相承於陳隋間遂極一時之盛至新論法相宗乃別無更立今宗者若我海東則新羅圓光法師於開皇九年入隋傳得此宗而來元曉亦著世親釋論略記四卷涅槃宗此宗依經立名涅槃經有二本一北凉元始十年曇無讖三藏譯元本三本之一部一十三品是為北本一宋文帝時敕惠觀惠嚴及謝靈運等更就北本增補得二十五品是為南本天下緇素無不誦習自六朝以迄唐初勢力不衰及天台宗盛此宗遂屬於彼別無講涅槃宗者矣至我海東以一人而兼通諸宗有兩師焉圓光法師及元曉大師是也唐續高僧傳新羅皇隆寺皇龍寺之誤也僧圓光俗姓朴氏年二十五乘舶造于金陵有陳之世號稱文國故得諮考先疑詢猷了義初聽莊嚴旻公講素霑世典謂理窮神及聞釋宗反同腐芥虛尋名教實懼生涯乃上啟陳主請歸道法有敕許焉既爰初落采即稟具戒遊歷講肆具盡嘉謨領牒微言不謝光景故得成實涅槃蘊括心府三藏徧所披尋末又投吳之虎丘念定相沿無忘覺觀息心之眾雲結林泉並以綜涉四含此謂俱舍宗也切流八定明善易擬簡直難虧深副夙心遂有終焉之慮於是頓絕人事盤遊聖迹攝想青霄緬謝終古時有信士宅居山下請光出講固辭不許苦事邀延遂從其志創通成論末講般若皆思解佼徹嘉問飛移兼䋴以絢采織綜詞義聽者欣欣會其心府從此因循舊章開化成任每法輪一動輒傾注江湖雖是異域通傳而沐道頓除嫌郄故名望橫流播于嶺表披榛負槖而至者相接如鱗會隋后御宇威加南國曆窮其數軍入楊都遂被亂兵將加刑戮有大主將望見寺塔火燒走赴救之了無火狀但見光在塔前被縛將殺既恠其異即解而放之斯臨危達感如此也光學通吳越便欲觀化周秦開皇九年來遊帝宇值佛法初會攝論肇興奉佩文言振續微緒又馳慧解宣譽京庫續業既成道東須繼本國遠聞上啟頻請有敕厚加勞問放歸桑梓云云又按新羅史於皇龍寺設百高座請圓光講經云云則弘通其所學諸宗之奧義不言可想也按高麗大覺國師新編諸宗教藏總錄元曉大師著有大華嚴經䟽十卷是通華嚴宗也有大無量壽經疏一卷小阿彌陀經䟽及義記各一卷是通淨土宗也有梵網經䟽二卷略䟽一卷待犯一卷是通律宗也有成唯識論宗要一卷因明論䟽一卷判化量論一卷是通唯識宗也有中邊論䟽四卷三論宗要一卷是通三論宗也有成實論䟽十卷是通成實宗也有大涅槃部宗要二卷是通涅槃宗也元曉大師與義相大師俱學涅槃經于普德和尚故高麗崔滋補閒集云嘗讀文烈公集見大覺國師到飛來方丈禮普德聖師真有詩云涅槃方等教傳授自吾師兩聖橫經日本註云元曉義相受涅槃維摩經於師高僧獨步時隨緣任南北在道勿迎隨可惜飛房後東明古國危云云者即謂此也海東涅槃宗至高麗中葉尚有門派矣一自天台宗興盛以後遂更無聞焉如彼支那涅槃宗之屬於天台宗也天台宗此宗一名法華宗支那佛教有不必仰承印度而自創自守建立極其廣大流傳極其久遠者則天台一宗是也北齊惠文大師因讀中論悟三觀之理三觀謂空觀假觀中道觀以授其弟子慧思即南岳大師也時沙門智顗請謁之思曰昔日靈山同聽法華宿緣所追今復來矣乃授以法華經顗讀至藥王品曰是真精進是名真法供養如來即悟法華三昧獲一旋陀羅尼見靈山一會儼然未散思大師印可曰非爾莫證非吾莫識是法華三昧之前方便也自是智解泉湧學徒影從遂入天台山修身弘法師嘗謂道有傳行亦必有說遂說玄義以判教相文句以解名義摩訶止觀以資觀行是謂台宗三大部皆弟子章安灌頂筆記一宗典籍光輝日月矣章安以後有法華天宮左溪二師傳說不替中唐以後法相華嚴禪宗之徒各張其學台宗不絕如綫於是荊溪湛然崛起而振之八傳而至四明知禮作指要妙宗等書是時五代喪亂諸宗悉頹廢台宗亦垂泯絕四明出而一宗再興始分山家山外二派山家承四明之傳廣智南屏等猶世守勿失山外一派始於慈光悟恩流衍及於仁岳崇義等然而不久遂亡惟我海東神僧玄光熊州人往衡山親稟惠思大師證法華三昧高句麗釋波若入天台山受智者教觀以神異聞竟卒于天台之國清寺新羅法融禪師為荊溪之弟子而傳于理應理應傳于純英高麗僧諦觀持傳台宗教籍于吳越支那台宗由是復興矣海東台宗至于高麗大覺國師義天始極光大義天入宋求法傳得諸宗皈國後以松都之國清寺為台宗本寺大弘本宗旨義大覺國師嘗製國清寺啟講辭曰緬惟海東佛法七百餘載雖諸宗競演眾教互陳而天台一教明夷于代昔者元曉菩薩稱美於前元曉大師弘法華宗於師所撰法華經宗要序足以證之其文如下妙法蓮華經者斯乃十方三世諸佛出世之大意九道四生咸入一道之弘門也文巧義深無妙不極辭敷理泰無所不宣文辭巧敷華而合實義理深泰實而帶權理深泰者無二無別也辭巧敷者開權示實也開權者開門外三車是權中道寶城是化樹下成道非始林間滅度非終示實者四生並是吾子二乘皆當作佛塵數不足量其命刧火不能燒其土是謂文辭之巧妙也言無二者唯一大事於佛知見開示悟入無上無異令知令證故言無別者三種平等諸乘諸身皆同一揆世間涅槃永離二際故是謂義理之深妙也斯則文理咸妙無非玄則筆麤之軓乃稱妙法權花開敷寶果泰彰無染之美假喻蓮花然妙法妙絕何三何一至人至冥誰短誰長兹處怳惚入之不易諸子濁漫出之良難於是如來引之以權羨羊車於鹿苑示有待之危身駕白牛於鷲嶽顯無限之長命斯乃借一而破三三除而一捨假修而斥短短息而修亡是法不可示言辭相寂滅儻然靡據蕭焉離奇不知何以言之強號妙法蓮花是以分坐令聞之者尚受輪王釋梵之座經耳一句之人並得無上菩提之記况乎受持演說之福豈可思議所量乎哉舉是大意以標題目故言妙法蓮華經也諦觀法師傳揚於後爭柰機緣未熟光闡無由教法流通似將有待云云其所以自命者侈矣大覺之後有圓妙無畏等相繼闡宗至于朝鮮之初神照祖丘行乎等皆台宗之名僧也法相宗本宗一名惟識宗又一名慈恩宗無著菩薩請彌勒菩薩說瑜珈師記分別瑜珈大莊嚴辨中邊金剛般若五部大論既而無著復造顯揚對法等論其弟世親菩薩復造五蘊論百法明門論及惟識三十頌等此宗遂立其後難陁護法等十大論師皆䟽釋三十頌護法之弟子戒賢論師盡舉五大論十支論及因明入正理論諸書以授唐玄奘大法師玄奘歸國以授其弟子窺基是為慈恩法師本宗至此遂極光大五季以後禪宗既盛法相義解漸至廢亡若夫海東新羅圓測法師入唐求法時玄奘法師為慈恩基師講新譯唯識論及瑜珈論測皆盜聽遂通宗義所著唯識䟽鈔詳解經論天下分行宋高僧傳云新羅順璟重譯學聲教盖出天然况乎因明之學奘師精研華僧尚未多達璟克通之傳得奘師真唯識量乃立決定相違不定量璟在本國多所著述亦有傳來中原者其所宗法相大乘了義教也新羅瑜珈祖師大賢所著成唯識論學記八卷東土後進咸遵其訓支那學士亦作眼目高麗王師慧德其號韶顯其名者搜訪慈恩所撰法華玄贊唯識述記等章䟽三十二部共計三百五十三卷考正其本募工開板印造流通師碑文云唐文皇太宗也以新羅王表請宣送瑜珈論一百卷於是應理圓實之學漸盛于斯土及乎曉法師元曉也導之于前賢大統大賢也踵之於後燈燈傳熖世世嗣興然而去聖寢遠遺文訛舛師疚于懷以其章䟽大行於世使學者知本宗之有坦道惟師之力也高麗大覺國師著成唯識論單科三卷以明唯識之旨高麗瑜珈教師海圓應元帝命入居燕京之大崇恩福元寺凡二十九年大弘本宗至元庚辰卒于彼處嗣法高弟有玄印等三十餘人圓即圓空國師也高麗末季又有慈恩宗師諱子安者講唯識論諸宗耆師碩德咸執經座下一時學者以為標準是為俗離山法住寺之慈淨國尊也朝鮮之初尚有本宗惟名師無聞焉今世諸學莫不以義解為宗佛門法相之學最能與世適合雖然惜世無其人以興起之也地論宗此宗依華嚴經中之十地論而立者故名地論宗地論者世親菩薩釋華嚴經第六會十地品別行十地經而作也元魏永平元年菩提流支及勒那末提等始為譯出同時則有光統諸師隋有靈祐等唐有道宗等皆盛為講演迨及中唐華嚴宗勃興此宗屬之別無講地論宗者惟我海東諸宗之傳俱有其據獨地論一宗初無聞焉雖然朝鮮初葉行僧科教宗則試華嚴經及十地論矣則雖屬華嚴而別有所重者存故也真言宗本宗一名密宗如來一代時教廣大如海而大要不出顯密兩部顯謂諸乘經律論是也密謂諸部陀羅尼是也先是龍樹菩薩開南天竺鐵塔親禮金剛薩埵受兩部儀軌其法遂行於世而弟子龍智得其傳焉唐開元四年善無畏三藏始將梵夾至長安譯出密宗經論一行禪師從善無畏最久盡得其傳疏釋大毘盧遮那成佛神變加持經至六十餘萬言成本宗不刊之典同時龍智弟子金剛智三藏率其弟子不空三藏亦來自印度與善無畏並稱開元三大士盛弘密部當時君相士庶禮敬如佛真言一宗遂如日月經天江河緯地有唐末運諸宗盡衰持明軌則亦成市井歌詠趙宋受命此宗復興故當時施護法賢等繙譯經論悉在密部然志磬法師作佛祖統紀已謂唐末亂離經疏銷毀中華所謂瑜珈者但存法事云云則宋時真言一宗未能光大而久遠也然河朔關隴之間餘緒不墜元代入關挾蒙古之喇嘛教以俱來百年之間此宗極盛而支那固有之傳反不如彼矣惟我海東則新羅惠通和尚入唐謁善無畏三藏得其印訣以文武王四年還國是真言宗之開祖也大藏經新羅靈妙寺僧不可思議著有大毘盧遮那經供養次第法疏二卷此則為不空三藏之派其名既云不可思議則其神異可知也明朗法師入唐亦傳密教以神印行秘法遂謂神印宗文虎王即文武王時唐兵蔽海而來王召師開設道塲率瑜珈僧十二員作文豆婁秘密之法以禳之後剏寺其地名曰四天王寺焉新羅密本法師亦屬密宗多神異之迹神印派廣學大緣二大師為高麗太祖祈禳海賊太祖創現聖寺於開城作密教之根本道塲麗祖初年天竺沙門弘梵室哩縛日羅齋至梵經贊襄密宗高麗季世密教大藏刊行于世有九十卷見李齊賢金書密教大藏序朝鮮之初悉焚讖緯諸書密教之真經神呪亦在所禁真言一宗遂掃地矣淨土宗本宗一名蓮宗如來有勝方便三根普被萬善同歸屬大乘之極譚如涅槃之捷徑者則淨土一宗是已學者不可不深信而諦修也淨土事理諸經廣說而本宗所依蓋不出乎三經一論則無量壽經觀無量壽經阿彌陀經及天親菩薩往生論是也近代支那楊仁山居士以普賢大士為淨土宗初祖有觀於華嚴經之行願品而定之也支那則以廬山東林寺白蓮結社之惠遠法師為蓮宗初祖唐之善導承遠法照少康五代之永明延壽宋之省常元炤次第相承千年弗替信徒之盛證驗之多誠諸宗之所不逮云逮夫海東淨土一宗雖不專立究其實則通貫諸宗亘古及今始終不衰新羅之康州善士數十人及郁面妃白月山之弩肹夫得怛怛朴朴乾鳳寺之發徵和尚等三十一人發願往生皆屬本宗高麗大覺國師從宋僧元炤得淨土書鋟梓而流通之亦自發願往生西方見于大覺國師答大宋元炤律師書云承示及慈愍三藏淨土集一冊并新刪定尼戒本等已令印經所重雕流布也其淨土集自來未行而近有海客將到禪宗解謗書一卷始知慧日有淨土集方欲求本忽見流通誠所謂法王大寶自然而至也但恨纔獲半珠未窺全寶耳盛製大部律乘淨土文字切望寄示為幸資持記已令開板也此間亦有新行隨願往生集一部二十卷又有大无量壽小彌陀十六觀稱贊淨土等經新舊章䟽一十餘家續當附上據是則大覺國師為流通淨土文之初祖也大覺國師又嘗有詩曰二紀孜孜務講宣錦翻三百貫花詮憔勞愧乏傳燈力秪合匡廬種社蓮自註云仁睿太后昔曾發願結社之事所有宋本名畵廬山十八賢真容落在院門未有安置堂閣予欲仗此勝緣修西方之業用薦冥遊耳麗史門下侍中李穡與領三司事洪永通李茂方等結白蓮社於南神寺云云此効東林故事而求往生西方者也又麗季之太古國師懶翁王師朝鮮之涵虛得通清虛休靜雖屬禪宗皆有勸人念佛之法要近代乾鳳寺之碧梧大師成辦萬日念佛之會其弟子萬化和尚又繼之善成就朝鮮寺剎在在處處立萬日會修淨業者十居八九蓋有其實而無其名者朝鮮之淨土宗是也律宗如來一代教典統分三藏三藏謂何即經也律也論也律部之在教中亦蔚為大國矣如來當時十大弟子各擅一長舍利弗智慧第一目犍連神通第一大迦葉頭陀第一阿那律天眼第一須菩提解空第一富樓那說法第一迦旃延論義第一羅睺羅密行第一阿難陀多聞第一優波離持律第一故以優波離尊者為律宗之祖天竺律學諸部不一其傳於支那者則有四律五論四律者一十誦律二四分律三增祗律四五部律是也五論者一毘尼母論二摩得勒伽論三薩婆多論四善見論五明了論是也此外又有義淨三藏薩婆多宗諸律甚多稱為有部新律焉自曹魏嘉平二年曇摩迦三藏傳戒之後古德著述垂二十家而惠光之畧䟽四卷法礪之中䟽十卷智顗之大䟽二十卷為最精確故世稱三要䟽焉唐道宣法師始倡圓宗戒體作五大部以發明之集成之功遠邁西土道宣住終南山故律宗亦名南山宗焉其後十三傳而至宋之元照遂稱中興當南山盛時同時復有兩泒一曰相部宗法勵所創一曰東塔宗懷素所創與南山旗鼓相當並稱律宗三家云然彼兩宗不光大獨南山一泒得資持會正二家之延綿至元代而宗勢不衰若夫海東律部當以百濟為始聖王時沙門謙益入印度學律部齎梵本律文歸國譯成七十二卷曇旭惠仁兩法師著律疏三十六卷又威德王時送律師於日本日本善信尼等來百濟學戒律受十戒六法而歸是為日本戒律之始在于新羅則真平王時沙門智明入陳求法及其東還王欽風景仰推重戒律褒為大德雖然新羅戒律當以善德王時之慈藏律師為之祖也師之律學自是天性師初捨家為元寧寺獨居時王以台輔之職召之師屢徵不赴王乃敕曰不就斬之師聞之曰吾寧一日守戒而死不願百年破戒而生及入唐求法適與道宣同時師亦居終南山三年及還國為大國統之職統率僧尼大弘戒律築壇于通度寺說戒度眾至今尚有典型羅末麗初之法鏡大師碑大師於光啟四年新羅真聖王二年受具於通度寺靈宗律師云云則本寺尚有藏師餘烈藏師之後元曉大師著有菩薩戒本持犯要記一卷大賢大德著有菩薩戒本宗要一卷梵網經古迹記釋經上下四卷義寂大師述梵網經菩薩戒本䟽三卷新羅又有創見之律學則真表律師之占察法是也師全州碧骨堤郡人年十二往金山寺順濟法師處容染濟授沙彌戒法傳教供養次第秘法占察善惡業報經二卷曰汝持此戒法流傳於世師奉教遍歷名山年已二十七歲於上元元年庚子詣保安縣入不思議房今扶安郡來蘇寺也勤求戒法於彌勒像前三年於是地藏慈氏現前慈氏摩師頂曰善哉大丈夫求戒如是不惜身命懇求懺悔地藏授與戒本慈氏復與二栍一題曰九者一題曰八者告師曰此二簡子者是吾手指骨此喻始本二覺以此當知果報後師至高城郡皆骨山金剛山也始創鉢淵寺開占察法會住七年後俗離山大德永深融宗佛陀等詣師得法還歸俗離山創吉祥寺真表曾見吉祥草所生處指示之使創寺永深於此始設占察法會而傳法于桐華寺之心地和尚又高麗金富軾占察法會䟽佛說諸懺悔之儀軌示之發起之方便普賢之願具宣說於華嚴真表之勤終感通於彌勒教行永世澤洽恒沙云云由是觀之占察之法頗能久傳也高麗之代有開國律寺太祖所創也又李齊賢重修記都城東南有山焉清泰八年太祖用術家言作寺以處方袍之學律乘者名之曰開國律寺火于壬辰戒壇墟矣南山宗師木軒丘公修而新之云云高麗文宗王子僧統大覺國師入宋受律於元炤法師還國後講南山律鈔嘗作詩曰誠非明敏學非研予是何人輒講宣只為聖言無振發且圖先唱作良緣云云朝鮮世宗大王之時以南山律宗合于摠持宗稱曰摠南宗後遂併合于教宗而戒律之學衰退而淵源亦隨而中絕矣雖然近代諸方戒行清淨持律精嚴者不乏其人則曰龜巖寺之白坡大師師示寂後金侍郎正喜號阮堂亦號秋史作碑文有曰我東近無律師惟白坡可以當之故以律師書之云云白坡之門禪講與戒雙傳並授古之幻翁雪竇鏡潭今之幻應映湖諸和尚皆其人也幻應和尚傳禪戒于蔓庵宋宗憲也仙巖之枕溟亦傳坡公之禪戒轉授華山晤善以至擎雲元奇和尚云爾月出之大隱律師東師列傳師出家於月出山剃染於金潭禪師遍叅蓮潭白蓮義菴朗巖玩虎蓮坡諸大德道已成拈香於金潭禪師開堂提接物情猶隘云云則大隱始終為金潭之弟子也今據諸方叢林喧傳之說潭隱兩師將欲設戒患無師承遂共謀之先禱于智異山之七佛庵驗其瑞應即為戒師虞禱七日忽見自佛像放瑞光灌大隱頂金潭遂受戒于大隱如新羅朗智大師受戒于沙彌智通之故事焉按三國遺事歃良州阿曲縣之靈鷲山有異僧菴居累紀而鄉邑皆不識師亦不言名氏常講法華仍有通力龍朔初有沙彌智通伊亮公之家奴也出家年七歲時有烏來鳴云靈鷲去投朗智為弟子通聞之尋訪此山來憩於洞中樹下忽見異僧出曰我是普大士欲授汝戒品故來爾因宣戒訖乃隱通神心豁爾智證頓圓遂前行路逢一僧乃問朗智師何所住僧曰奚問朗智乎通具陳神烏之事僧莞爾而笑曰我是朗智今茲堂前亦有烏來報有聖兒投師將至矣宜出迎故來迎爾乃執手而歎曰靈烏警爾投吾報予迎汝是何祥也殆山靈之陰助也傳云山主乃辨才天女通聞之泣謝投禮於師既而將與授戒通曰予於洞口樹下已蒙普賢大士乃授正戒智歎曰善哉汝已親稟大士滿分之戒我自生來夕惕慇懃念遇至聖而猶未能昭格今汝已受吾不及汝遠矣反禮智通因名其樹曰普賢云云故以法系言之金潭為大隱之師以戒脉言之金潭為大隱之資而以戒法傳于大興寺之草衣禪師草衣傳之梵海和尚又梵海授戒之弟子曰大興之翠雲仙岩之錦峯海印之霽山等諸和尚是也霽山禪師又傳于本寺之龍城應海南泉等諸和尚及龍門之虎隱律師虎隱律師傳于七佛之起龍雙溪之冠城宗炫及華嚴之震應等諸和尚慶南一帶及全羅道各寺法侶皆受大戒或比丘戒于虎隱和尚大隱律宗至是昌大清華寺之石橋律師師湖南人所生地曰石橋村因以號焉師出家于南海郡龍門寺遍歷五臺金剛諸山後至聞慶郡清華寺以為終皈之所師之戒律淵源支那潭柘山岫雲寺惠寬律師傳之朝鮮八公山普曇和尚普曇和尚傳之于師師一平生持律甚嚴如佛所戒毫無違犯其傳戒弟子曰龍虛和尚現住安城郡青龍寺師身軆瘦弱若不勝衣亦以戒行聞于叢林今奉恩寺住持晴湖和尚即其受戒弟子也九月山之荷隱和尚師道譽既高律行又精西道之善知識也凌虛和尚受律於支那南京律師以傳之性月和尚性月和尚傳之荷隱大師荷隱大師傳于今貝葉寺住持九峯和尚及今傳燈寺住持蓮月和尚梁山郡通度寺故律宗本寺也往年寺眾共謀勿墜海東律宗迺以新羅慈藏律師為初祖新羅三學律師高麗拙庵律師為中祖而設戒壇海曇和尚為其主盟自後以時任本寺住持者承之著為規式今住持九河和尚為第一世也平昌郡五臺山月精寺亦以慈藏律師為初祖繼之以順支律師本寺戒牒順支作煩支疑誤也傳燈錄新羅五觀山順支禪師即海東佛祖源流謂五臺順支者似是也信義律師有緣律師無染律師九鼎律師近世之蓮坡律師前孤雲寺住持李萬愚律師今本寺住持洪莆龍律師焉近年龍淵寺之萬下和尚長安寺之漢波和尚入支那受戒于昌濤律師昌濤為古心律祖十二傳之弟子按其牒文古心律祖禮拜五臺求見文殊菩薩親授加黎中興戒法隨所建壇傳授千佛大戒云云還歸東土傳授諸方銀海晦應桐華南坡梵魚惺月海印晦光等諸和尚皆萬下泒也長安震虛龍珠大蓮皆漢波泒也榆岾寺之靈峰和尚入支那北京拈花寺受戒于德明律師來傳于榆帖寺東宣和尚寶盖山之月運和尚入北京圓廣禪寺受菩薩戒于慶然和尚法住寺之震河和尚入支那寧波府天童寺受戒于寄禪敬安律師現今朝鮮法侶傳授之戒律源流要不出上述諸泒之外也華嚴宗本宗一名賢首宗又一名法界宗昔世尊成道後從菩提樹下起即現千丈盧舍那報身為深位菩薩說圓滿修多羅即大方廣佛華嚴經是也一代時教最尊最勝無盡教海皆從此流故為諸經之王佛滅度後七百年南天竺國龍樹菩薩入龍宮中見華嚴經共有三本上本有十三千大千世界微塵數偈一四天下微塵數品中本有四十九萬八千八百偈一千二百品並非閻浮提人心力能持乃誦出下本十萬偈四十八品流通於世東晉時天竺三藏佛陀跋陀羅譯華嚴前分三萬六千偈凡六十卷是為舊經唐武后時實叉難陀重譯四萬五千偈成八十卷是為新經陳隋之間杜順和尚摠括奧旨作法界觀是為東土華嚴初祖其弟子智儼通十地中六相之義作搜玄記是為二祖弟子法藏賢首國師作探玄記發揮盡致復造章疏多種一乘教義至斯大備是為三祖藏公沒後弟子慧苑私逞臆見刊落師說於是澄觀清凉國師遙承賢首遺義作心經大疏精博淵深遂成千古極唱是為四祖同時有圭峰宗密禪師獨秉深旨著述弘富是為五祖本宗遂極光大唐武宗會昌三年沙汰之厄遺風掃地至宋長水子璿及其弟子晉水淨源出而保存之餘緒賴以不墜惟我海東華嚴一宗從初至今極其昌大新羅元曉大師著䟽以弘通之義湘大師入唐師智儼得華嚴旨義歸國傳授於十剎勝詮法師入唐學於賢首講下皆學有淵源智通法師著華嚴錐洞記大弘圓頓之旨義相以後太白山浮石寺為華嚴宗剎故無染國師及惠哲國師皆就本寺學華嚴經智異山華嚴寺本緣起祖師率三千弟子弘圓教之處亦係義相傳大教之宗剎故道詵國師初就本寺讀習大經學徒百千駭服稱神賢俊大德亦結華嚴經社當時又刻華嚴經諸本于覺皇殿之石壁高麗以還講華嚴者代不乏人法印國師坦文圓融國師決凝智光國師海麟及王師爛圓等皆其選者也大覺國師入宋詣晉水淨源講下稟受大經歸國住興王寺講演雜花周於十遍師以馬鳴龍樹帝心雲華賢首華嚴及定慧定為華嚴七祖盖大覺當時有圓融宗即華嚴宗也大覺國師製圓宗文類亦即弘通華嚴宗之事也後有無碍智國師戒膺和尚大弘本宗佛日普照國師著圓頓成佛論亦弘華嚴麗末有友雲義諶皆華嚴宗師也朝鮮世宗大王六年以後教宗之中惟存華嚴碧松以下師資傳授兼治禪教皆以華嚴為教門之指歸極則本宗名師不可勝記但錄其有所著述者霜峰淨源精於大經經有四科逸其三師緣文究義遂定三科俾讀者不遺其旨後得唐本叅校乃無差違學者驚服以為清凉轉世云栢菴性聦得華嚴經并與疏鈔刊板流布雪坡尚彥深究清涼䟽鈔摘抉隱科著述一卷并著鈎玄記一卷蓮潭有一著有華嚴遺忘記四十卷默菴最訥纂集華嚴品目仁岳義沼著有華嚴私記究皆闡明圓頓之教安義郡靈覺寺之華嚴經板本是雪坡尚彥大師之所成辦者也廣州郡奉恩寺之華嚴經板本是南湖永奇大師之所造成者也賴此兩處板本大教易於流通兩師之功吁亦大矣近以華嚴講主名者四佛山有龍湖九月山有荷隱曹溪山有枕溟函溟等諸師禪宗禪宗者以禪那為宗故有此名梵語禪那此譯定慧此宗師資相承甚嚴釋迦世尊在靈山會上拈花示眾在會人天悉皆茫然唯金色頭陀破顏微笑世尊曰吾有正法眼藏教外別傳今付於汝汝當護持乃賜僧伽黎法衣也為表信金色頭陀者即摩訶迦葉也是為禪宗第一祖自迦葉以來師資相承衣法傳授至菩提達磨是為天竺相承付法之二十八祖達磨東來支那開立禪宗磨傳惠可可傳僧燦燦傳道信信傳弘忍五代純一未分支泒忍下始分南北二支大鑑惠能禪師開創南宗大通神秀禪師開創北宗北宗者行於北地不久消息南宗者盛於南地漸及於北有五宗之別所謂五宗者臨濟曹洞雲門溈仰法眼也今畧示分泒之次第六祖後出二支一為南岳懷讓一為青原行思懷讓傳馬祖道一道一傳百丈懷海此下又分二流一為黃檗希運一為溈山靈祐希運之弟子名臨濟義玄是臨濟宗之開祖也靈祐之弟子曰仰山慧寂承此溈仰二師之風者是名溈仰宗也行思下出石頭希遷遷傳藥山惟儼儼傳雲巖曇晟晟之法嗣名洞山良价价之法嗣即曹山本寂是為曹洞宗也道悟之下荊州天皇寺道悟為石頭希遷之法嗣荊州天王寺道悟為馬祖道一之法嗣有龍潭崇信據傳燈錄則為天皇悟闕據詣月錄則為天王悟嗣德山宣鑑雪峯義存此下又分二流一為雲門文偃是雲門宗之開祖也一為玄沙師備羅漢桂琛清涼文益文益即法眼宗之開祖也附兩道悟辨一人天眼自覺夢堂重校五家宗派序粵山晦巖述景德年間吳僧道原集傳燈三十卷自曹溪下列為兩派一曰南岳讓讓出馬大師一曰青原思思出石頭遷自兩派下又分五宗馬大師出八十四員善知識內有百丈海出黃檗運溈山祐二人運下出臨濟玄故號臨濟宗祐下出仰山寂故號溈仰宗馬大師下八十四人又有天王悟悟得龍潭崇信信得德山鑑鑑得雪峰存存下出雲門宗法眼宗石頭遷出藥山儼天皇悟二人悟下得惠真真得幽閒閒得文賁便絕惟藥山儼得雲嵒晟晟得洞山价价得曹山寂是為曹洞宗今傳燈却収雲門法眼兩宗歸石頭下誤矣緣同時道悟有兩人一曰江陵城西天王寺道悟者渚宮人崔子玉之後嗣馬祖元和十三年四月十三日化正議大夫丘玄素撰塔銘文幾千言其畧云馬祖祝曰他日莫離舊處故還渚宮一曰江陵城東天皇寺道悟婺州東陽人姓張氏嗣石頭元和二年丁亥化符律師所撰碑所載生緣出處甚詳但緣道原採集傳燈之日非一一親往討尋不過宛轉托人捃拾而得其差誤可知也自景德至今天下以傳燈為據雖列剎據位立宗者不能略加究辨惟丞相無盡居士宋張商英及呂夏卿二君子每會議宗門中事嘗曰石頭得藥山得曹洞一宗教理行果言說宛轉且天皇道悟下出個周金剛德山鑑呵風罵雨雖佛祖不敢嬰其錄恐自天皇或有誤差寂音尊者亦嘗疑之云道悟似有兩人無盡後於達觀穎處得唐符載所撰天皇道悟塔記又討得丘玄素所作天王道悟塔記賷以徧示諸方曰吾嘗疑德山洞山同出石頭下因甚垂手處死活不同今以丘符二記証之朗然明白方知吾擇法驗人之不謬耳寂音曰圭峯答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下注曰兼禀徑山今妄以雲門法眼二宗竸者可發一笑畧書梗概以傳明達者庶幾五家之正派如是而已二指月錄荊州天皇道悟禪師嗣石頭住城東弟子三人慧真文賚幽閒協律郎符載撰碎傳燈所錄悉同符碑而誤以龍潭列師法嗣荊州天王道悟禪師嗣馬祖住城西弟子一人龍潭崇信荊南節度使丘玄素撰碑又唐聞人歸登南岳碑圭峯答襄相國宗趣狀皆以天王為馬祖嗣佛國白達觀穎呂夏卿張無盡皆著論辨證傳燈之誤獨其時同其地同其叅謁石頭馬祖同故猶不能不闕疑且藥山叅石頭頭謂因緣當在馬祖處山旋於馬祖處大悟而竟嗣石頭皆釋迦之胤何彼此足分析耶附支那楊仁山居士禪宗一名心宗畧說達磨西來不立文字直指人心見性成佛歷代相傳人皆稱為禪宗其實非五度之禪