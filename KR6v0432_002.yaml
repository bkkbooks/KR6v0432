慧鑑國師萬恒第十三世覺真國師復丘皆本宗之名僧相繼闡法由是宗勢歷久不衰曹溪遂為禪宗之總名詞凡屬禪僧雖是他宗皆曹溪宗師之徽號焉此曹溪宗實為海東自創之最特色者也高麗之末禪有二派一為曹溪派一為臨濟派至是臨濟之宗托於曹溪之名曹溪之實掩於臨濟之派即臨濟嫡傳石屋珙下之太古普愚及平山林下之懶翁慧勤是也勤得妙嚴無學學得涵虗得通遂止不傳愚得幻庵混修修得龜谷覺雲雲師於恭愍王廿一年判曹溪宗事奏請重刊景德傳燈錄板本有功於禪宗雲得碧溪正心心得碧松智嚴嚴得芙蓉靈觀觀得清虗休靜浮休善修有似曹溪六祖下之南岳讓青原思矣特書臨濟宗之源流敘七佛古佛應世緜歷無窮不可以周知而悉數也故近譚賢刧有千如來暨于釋迦但紀七佛按長阿含經云七佛精進力放光滅暗冥各各坐諸樹於中成正覺又曼殊室利即文殊師利也為七佛祖師金華善慧大士梁傅大士名翕登松山頂行道感七佛引前維摩接後今之撰述斷自七佛而下毘婆尸佛過去莊嚴刧第九百九十八尊偈曰身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住長阿含經云人壽八萬歲時此佛出世種剎利姓拘利若父槃頭母槃頭婆提居般頭婆提城坐波波羅樹下說法三會度人三十四萬八千神足二一名騫茶二名提舍侍者無憂子方膺尸棄佛莊嚴刧第九百九十九尊偈曰起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性長阿含經云人壽七萬歲時此佛出世種剎利姓拘利若父明相母光曜居光相城坐分陀利樹下說法三會度人三十五萬神足二一名阿毘浮二名婆娑侍者忍行子無量毘舍浮佛莊嚴劫第一千尊偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅長阿含經云人壽六萬歲時此佛出世種剎利姓拘利若父善燈母稱戒居無喻城坐婆羅樹下說法二會度人一十三萬神足二一扶遊二多摩侍者寂滅子妙覺拘留孫佛現在賢刧第一尊偈曰見身無實是佛身了心如佛是佛幻得身心本性空斯人與佛何須別長阿含經云人壽四萬歲時此佛出世種婆羅門姓迦葉父禮得母義枝居安和城坐尸利沙樹下說法一會度人四萬神足二一薩尼二毘樓侍者善覺子上勝拘那含牟尼佛賢刧第二尊偈曰佛不見佛知是佛若實有知別無佛智者能知罪性空坦然不怖於生死長阿含經云人壽三萬歲時此佛出世種婆羅門姓迦葉父大德母善勝居清淨城坐烏暫婆羅門樹下說法一會度人三萬神足二一舒槃那二鬱多樓侍者安和子導師迦葉佛賢刧第三尊偈曰一切眾生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福長阿含經云人壽二萬歲時此佛出世種婆羅門姓迦葉父梵德母財主居波羅奈城坐泥俱律樹下說法一會度人二萬神足二一提舍二婆羅婆侍者善友子集軍幻寄曰始予錄指月錄七佛第書其偈阿含化跡皆削焉既見世之人粗聞即心即佛者率多撥無報化乃悟昔人載此之妙密盖偈闡法身之極致阿含示化跡之大略可謂斷常俱遣事理兩融者矣傳燈成於道原而裁定於楊大年其旨不苟也因具錄之此錄稍錄神通亦以此釋迦牟尼佛在靈山會上拈花示眾是時眾皆默然唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉世尊至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告曰吾以正法眼藏密付於汝汝當護持并勅阿難副貳傳化無令斷絕而說偈曰法本法無法無法法亦法今付無法時法法何曾法爾時世尊說此偈已復告迦葉吾將金縷僧伽黎衣傳付於汝轉授補處至慈氏佛出世當來龍華會主彌勒尊佛勿令朽壞迦葉聞偈頭面禮足曰善哉善哉我當依勑恭順佛故世尊在娑羅雙樹入般涅槃已經七日大迦葉後至遶棺三匝世尊槨示雙趺迦葉作禮大眾罔措已上依指月錄佛入滅即周穆王壬申歲二月十五日也尚玄按禪門拈頌集先書分座公案此朝鮮禪家所謂世尊第一處傳心即殺人刀消息也次書拈花公案所謂第二處傳心即活人劒消息也末書示趺公案所謂第三處傳心即殺活並示也云云讀者詳之第一祖摩訶迦葉尊者梵語迦葉波此云飲光盖以身有金色為名也摩竭陀國人也姓婆羅門父飲澤母香至世尊滅度後結集三藏畢尊者自念衰老宜入定於鷄足山以待彌勒乃召阿難言我今不久世間今將正法付囑於汝汝善守護聽吾偈言法法本來法無法無非法何於一法中有法有非法說是偈已阿難作禮奉命尊者念如來舍利皆在諸天凌虛徧至塔廟禮已而還乃持僧伽黎衣入雞足山俟慈氏下生即周孝王五年丙辰歲也佛紀一二三年第二祖阿難尊者王舍城人也姓剎利帝父斛飯王實佛之從弟也梵語阿難陀此云慶喜以如來成道日生故名也多聞博達智慧無礙世尊以為摠持第一嘗所讚歎加以宿世有大功德受持法藏如水傳器佛乃命為侍者常隨侍奉焉尊者後於恒河中流將入寂滅是時山河大地六種震動雪山有五百仙人覩兹瑞應飛空而至禮足願度須臾五百羅漢從空而下為諸仙人出家授具其仙眾中有二羅漢一名商那和修二名末田底迦阿難知是法器乃告之曰昔如來以正法眼付大迦葉迦葉入定而付於我我今將滅復付於汝汝受吾教當聽偈言本來付有法付了言無法各各須自悟悟了無無法阿難付法眼藏竟踊身虛空現十八變入風輪奮迅三昧而分身四分一分惠忉利天一分惠娑竭羅龍宮一分惠阿闍世王一分惠毘舍離王各造寶塔而供養之乃周厲王十一年癸巳歲也佛紀一六年第三祖商那和修尊者亦名舍那婆斯摩突羅國人也父林勝母憍奢耶在胎六年而生梵云商諾迦此云自然服即西域九枝秀草名出則聖人降生尊者生而此草出尊者化緣既久思付法者尋於吒利國得優波毱多以為給侍因問毱多曰汝年幾耶答曰我年十七尊者曰汝年十七性十七耶答曰師髮已白為髮白耶心白耶尊者曰我但髮白非心白耳毱多曰我身十七非性十七也尊者知是法器後三載遂為落髮授具乃告曰昔如來以無上法眼付囑迦葉展轉相授而至於我我今付汝勿令斷絕汝受吾教聽吾偈言非法亦非心無心亦無法說是心法時是法非心法說偈已即隱於罽賓國南白象山中後於三昧中見弟子毱多有五百徒眾常多懈慢尊者乃往彼現龍奮迅三昧以調伏之而說偈曰通達非彼此至聖無長短汝除輕慢意疾得阿羅漢五百比丘聞偈已依教奉行皆獲無漏尊者乃現十八變火光三昧用焚其身毱多收舍利建塔於梵迦山乃周宣王二十二年乙未歲也佛紀二二二年第四祖優波毱多尊者吒利國人也亦名優波崛多又名鄔波毱多姓首陀父善意十七出家二十證果隨方行化至摩突羅國得度者甚眾由是魔宮震動波旬天魔王名愁怖遂竭其魔力以害正法尊者即入三昧觀其所由波旬復伺便密指瓔絡縻尊者頸尊者出定乃取人狗虵三屍化為華鬘軟言慰諭波旬曰汝與我瓔絡甚是珍妙吾有花鬘以相酬奉波旬大喜引頸受之即變為三種臭屍蟲蛆壞爛波旬厭惡大生憂惱盡己神力不能移動乃昇六欲天告諸天王又詣梵王求其解免彼各告言十力弟子所作神變我輩凡陋何能去之波旬曰然則柰何梵王曰汝可歸心尊者即能除斷乃為說偈令其迴向曰若因地倒還因地起離地求起終無其理波旬受教已即下天宮禮尊者足哀露懺悔毱多曰汝自今歸於如來正法更不作嬈害否波旬曰我誓迴向佛道永斷不善毱多曰若然者汝可口自唱言歸依三寶魔王依教合掌三唱花鬘悉除乃歡喜踊躍作禮尊者而說偈曰稽首三昧尊十力聖弟子我今願回向勿令有劣弱尊者在世化導證杲最多每度一人以一籌置於石室其室縱十八肘廣十二肘充滿其間最後有一長者子名曰香眾來禮尊者志求出家尊者問曰汝身出家心出家答曰我來出家非為身心尊者曰非為身心復誰出家答曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心無形相其體亦然尊者曰汝當大悟心自通達宜依佛法僧紹隆聖種即為剃度授具足戒仍告之曰汝父嘗夢金日而生汝可名提多迦復謂曰如來以正法眼藏次第傳授以至於我今復付汝聽吾偈言心自本來心本心非有法有法有本心非心非本法付法已乃踊身虛空呈十八變却復本座跏趺而逝提多迦以室內籌用焚其軀收舍利建塔供養即周平王三十年庚子歲也佛紀二八七年第五祖提多迦尊者摩伽陀國人也初生之時父夢金日自屋而出照耀天地前有大山諸寶嚴飾山頂泉涌滂沱四流後遇毱多尊者為解之曰寶山者吾身也泉涌者法無盡也日從屋出者汝今入道之相也照耀天地者汝智慧超越也尊者本名香眾因為易今名焉梵云提多迦此云通真量也尊者後至中印度彼國有八千大仙彌遮迦為首以有夙緣願求度脫尊者乃告彌遮迦曰昔如來以大法眼藏密付迦葉展轉相授而至於我我今付汝當護念之乃說偈曰通達本法心無法無非法悟了同未悟無心亦無法說偈已踊身虛空作十八變火光三昧自焚其軀彌遮迦與八千比丘同收舍利於班茶山中起塔供養即周莊王五年己丑歲也佛紀三三六年第六祖彌遮迦尊者中印度人既傳法已遊化至北天竺國見雉牒之上有金色祥雲歎曰斯道人氣也必有大士為吾法嗣乃入城於闤闠間有一人手持酒器逆而問曰師何方來欲往何所尊者曰從自心來欲往無處曰識我手中物否尊者曰此是觸器而負淨者曰師還識我否尊者曰我即不識識即非我又謂曰汝試自稱名氏吾當後示本因彼人說偈答曰我從無量刧至于生此國本姓頗羅墮名字婆湏蜜尊者曰我師提迦多說世尊昔游北印度語阿難言此國中吾滅後三百年有一聖人姓頗羅墮名婆須蜜而於禪祖當獲第七世尊記汝汝應出家彼乃置器禮師側立而言曰我思往刧嘗作檀那獻一如來寶座彼佛記我云汝於賢刦釋迦法中宣傳至教今符師說願加度脫尊者即與披剃復圓戒相乃告之曰正法眼藏今付於汝勿令斷絕乃說偈曰無心無可得說得不名法若了心非心始解心心法尊者說偈已入獅子奮迅三昧踊身虛空高七多樹却復本座化火自焚婆湏蜜收靈骨貯七寶凾建浮圖置于上級即周襄王十五年甲申歲也佛紀三九一年第七祖婆湏蜜尊者北天竺國人也常服淨衣執酒器遊行里閈或吟或嘯人謂之狂及遇彌遮迦尊者宣如來往誌自省前緣投器出家受法行化至迦摩羅國廣興佛事於法座前忽有智者自稱我名佛陀難提今與師論義尊者曰仁者論即不義義即不論若擬論義終非義論難提知師義勝心即欽伏曰我願求道霑甘露味尊者遂與剃度而授具戒復告之曰如來正法眼藏我今付汝汝當護持乃說偈曰心同虛空界示等虛空法證得虛空時無是無非法尊者即入慈心三昧時梵王帝釋及諸天眾俱來作禮而說偈言賢却眾聖祖而當第七位尊者哀念我請為宣佛地尊者從三昧起示眾云我所得法而非有故若識佛地離有無故說此語已還入三昧示涅槃相難提即於本座起七寶塔以葬全身即周定王十七年辛未歲也佛紀四三八年第八祖佛陀難提者迦摩羅國人也姓瞿曇氏頂有肉髻辯捷無礙初遇婆須蜜尊者出家受教既而領徒行化至提迦國城毗舍羅家見舍上有白光上騰謂其徒曰此家當有聖人口無言說真大乘器不行四衢知觸穢耳言訖長者出致禮問何所須尊者曰我求侍者曰我有一子名伏駄蜜多年已五十口未曾言足未曾履尊者曰如汝所說真吾弟子伏駄聞之遽起禮拜而說偈曰父母非我親尚玄曰此非爺娘之親乃切近之親也猶曰父母雖生我而不能親見我心也誰是最親者尚玄曰我亦自不能見我心故問也諸佛非我道誰是最通者尊者以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏駄蜜多聞師妙偈便行七步尊者曰此子昔曾值佛悲願廣大慮父母愛情難捨故不言不履耳長者遂捨令出家尊者尋授具戒付法說偈曰虛空無內外心法亦如此若了虛空故是達真如理伏駄蜜多承師付囑以偈讚曰我師禪祖中當得為第八法化眾無量悉獲阿羅漢爾時尊者佛陀難提即現神變却復本座儼然寂滅眾興寶塔葬其全身即周景王十年丙寅歲也佛紀四九三年第九祖伏駄蜜多尊者提迦國人行化至中印度時有長者香盖携一子而來瞻禮尊者曰此子處胎六十歲正作宗十六歲因號難生嘗有一仙謂此兒非凡當為法器今遇尊者可令出家尊者即與落髮授戒羯磨之際祥光燭座仍感舍利三七粒現前自此精進忘疲既而尊者告之曰如來大法眼藏今付於汝汝護念之乃說偈曰真理本無名因名顯真理受得真實法非真亦非偽尊者付法已即入滅盡三昧而般涅槃闍維收舍利建塔於那爛陀寺即周敬王三十三年甲寅歲也佛紀五四一年第十祖脇尊者中印度人本名難生後值伏駄尊者執侍左右未嘗睡眠謂其脇不至席遂號脇尊者焉初至華氏國憩一樹下右手指地而告眾曰此地變金色當有聖人言訖即變金色時有長者子富那夜奢合掌前立尊者問曰汝從何來夜奢曰我心非往尊者曰汝何處住曰我心非止尊者曰汝不定耶曰諸佛亦然尊者曰汝非諸佛曰諸佛亦非尊者因說偈曰此地變金色預知有聖至當坐菩提樹覺華而成已夜奢復說偈曰師坐金色地常說真實義廻光而照我令入三摩諦尊者知其意即度出家復具戒品付法說偈曰真體自然真因真說有理領得真真法無行亦無止尊者付法已即現神變而入涅槃化火自焚四眾各以衣裓盛舍利隨處興塔而供養之即周貞王二十七年己亥歲也佛紀五八六年第十一祖富那夜奢尊者華氏國人姓瞿曇氏父寶身既得法於脇尊者尋詣波羅柰國有馬鳴大士迎而作禮因問曰我欲識佛何者即是尊者曰汝欲識佛不識者是曰佛既不識焉知是乎尊者曰既不識佛焉知不是曰此是鋸義尊者曰彼是木義復問鋸義者何曰與師平出又問木義者何尊者曰汝被我解馬鳴豁然省悟稽首歸依遂求剃度尊者謂眾曰此大士者昔為毗舍離國王以其國有一類裸人如馬裸露王運神通分身為蠶彼乃得衣王後復生中印度馬人感戀悲鳴故號馬鳴如來記云吾滅度後六百年當有賢者馬鳴於波羅柰國摧伏異道度人無量繼吾傳化今正是時即告之曰如來大法眼藏今付於汝即說偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二尊者付法已即顯神變湛然圓寂眾興寶塔以閟全身即周安王十九年戊戌歲也佛紀六四五年第十二祖馬鳴大士者波羅柰國人也亦名功勝以有作無作諸功德最為殊勝故名焉既受法於夜奢尊者後於華氏國轉妙法輪忽有老人座前仆地師謂眾曰此非庸流當有異相言訖不見俄從地涌出一金色人復化為女子右手指師而說偈曰稽首長老尊當受如來記今於此地上宣通第一義說偈已瞥然不見師曰將有魔來與吾較力有頃風雨暴至天地晦冥師曰魔之來信矣吾當除之即指空中現一大金龍奮發威神震動山岳師儼然於座魔事隨滅經七日有一小蟲大若蟭螟潛形座下師以手取之示眾曰斯乃魔之所變盜聽吾法耳乃放之令去魔不能動師告之曰汝但歸依三寶即得神通遂復本形作禮懺悔師問曰汝名誰耶眷屬多少曰我名迦毘摩羅有三千眷屬師曰盡汝神力變化若何曰我化巨海極為小事師曰汝化性海得否曰何謂性海我未嘗知師為說偈海曰山河大地皆依建立三昧六通由兹發現迦毘摩羅聞言遂發信心與徒眾三千俱求剃度師乃召五百羅漢與授俱戒復告之曰如來大法眼藏今當付汝汝聽偈言隱顯即本法明暗元不二今付悟了法非取亦非離師付法已即入龍奮迅三昧挺身空中如日輪相然後示滅四眾以真體藏之龍龕即周顯王四十二年甲午歲也佛紀七一年第十三祖迦毘摩羅尊者華氏國人也初為外道有徒三千通諸異論後於馬鳴尊者得法領徒至西印度彼處深山有大樹蔭覆五百大龍其樹王名龍樹常為龍眾說法尊者遂與徒眾詣彼龍樹出迎曰深山孤寂龍蟒所居大德至尊何枉神足尊者曰吾非至尊來訪賢者龍樹默念曰此師得決定性明道眼否是大聖繼真乘否尊者曰汝雖心語吾已意知但辦出家何慮吾之不聖龍樹聞已悔謝尊者即與度脫五百龍眾俱受具戒復告龍樹曰今以如來大法眼藏付囑於汝諦聽偈言非隱非顯法說是真實際悟此隱顯法非愚亦非智付法已即顯神變化火焚身龍樹收五色舍利建塔瘞之即周赧王四十六年壬辰歲也佛紀七五九年第十四祖龍樹尊者西天竺國人也亦名龍勝始於毗摩羅尊者得法後至南印度彼國之人多信福業聞尊者為說妙法遞相謂曰人有福業世間第一徒言佛性誰能覩之尊者曰汝欲見佛性先須除我慢彼人曰佛性大小尊者曰非大非小非廣非狹無福無報不死不生彼聞理勝悉回初心後告上首弟子迦那提婆曰如來大法眼藏今當付汝聽吾偈言為明隱顯法方說解脫理於法心不證無嗔亦無喜付法已入月輪三昧廣現神變復就本座凝然入寂及七日天雨舍利尊者復於座指空語眾曰昔拘那含佛弟子摩訶迦尊者有三願一為佛時凡有聖士化度則天澍雨及其身皆為舍利二大地所生皆堪為藥療眾生病三凡有智者皆得所知微妙以通宿命今雨舍利摩訶迦神力也言已復寂迦那提婆與眾建塔閟其全身即秦始皇三十五年己丑歲也佛紀八一六年第十五祖迦那提婆尊者南天竺國人也姓毘舍羅初求福業兼樂辯論後謁龍樹大士將及門龍樹知是智人先遣侍者以滿鉢水置於座前尊者覩之即以一針投之而進欣然契會正法眼藏云西天禁斷鍾鼓謂之沙汰經於七日祖運神通登樓撞鍾諸外道眾一時共集至鍾樓其門封鎻乃問撞鍾者誰祖曰天曰天者誰祖曰我曰我者誰祖曰伱曰伱者誰祖曰狗曰狗者誰祖曰爾曰爾是誰祖曰我曰我是誰祖曰天如是往返七度外道一眾知自負墮奏聞國王再鳴鍾鼓大興佛法尊者告羅睺羅多而付法眼偈曰本對傳法人為說解脫理於法實無證無終亦無始付法已入奮迅定身放八光而歸寂滅學眾興塔而供養之即漢文帝十九年庚辰歲也佛紀八六七年第十六祖羅睺羅多尊者迦毘羅國人也行化至室羅筏城有河名曰金水其味殊美中流復現五佛影尊者告眾曰此河之源凡五百里有聖者僧伽難提居於彼處佛誌一千年後當紹聖位語已領諸學眾泝流而上至彼見僧伽難提安坐入定尊者與眾伺之經三七日方從定起尊者問曰汝身定耶心定耶曰身心俱定尊者曰身心俱定何有出入曰雖有出入不失定相如金在定金體常寂祖源通錄云如金在井如金出井世相去來若約金體都無去來尊者曰若金在井若金出井金無動靜何物出入曰言金動靜何物出入言金出入金非動靜尊者曰若金在井出者何物若金在井在者何物曰金若出井在者非金金若在井出者非物尊者曰此義不然曰彼理非着尊者曰此義當墮曰彼義不成尊者曰彼義不成我義成矣曰我義雖成法非我故尊者曰我義已成我無我故曰我無我故復成何義尊者曰我無我故故成汝義曰仁者師於何聖得是無我尊者曰我師迦那提婆證是無我曰稽首提婆師而出於仁者仁者無我故我欲師仁者尊者曰我已無我故汝湏見我我汝若師我故知我非我我難提心意豁然即求度脫尊者曰汝心自在非我所繫語已即以右手擎金鉢舉至梵宮取彼香飯又以右手漸展入地至金剛輪際取甘露水以琉璃器持至會所以齋大眾大眾見之欽慕作禮於是尊者命僧伽難提而付法眼偈曰於法實無證不取亦不離法非有無相內外云何起尊者付法已安坐歸寂四眾建塔此當漢武帝二十八年戊辰歲也佛紀九一五年第十七祖僧伽難提尊者室羅筏城寶莊嚴王之子也得法受記行化至摩提國與大眾遊歷山谷至一峯下謂眾曰此峯頂有紫雲如盖聖人居此矣即與大眾徘徊久之見山舍一童子持圓鑑直造尊者前尊者問尊幾歲耶曰百歲尊者曰汝年尚幼何言百歲曰我不會理正百歲耳尊者曰汝善機耶曰佛言若人生百歲不會一作善諸佛機未若生一日而得決了之尊者曰汝手中當何所表曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似彼父母聞子語即捨令出家尊者携至本處授具戒訖名伽邪舍多他時聞風吹殿鈴聲尊者問曰鈴鳴耶風鳴耶舍多曰非風非鈴我心鳴耳尊者曰心復誰乎舍多曰俱寂靜故尊者曰善哉善哉繼吾道者非子而誰即付法眼偈曰心地本無生因地一作種從緣起緣種不相妨華果亦復爾尊者付法已右手攀樹而化大眾議曰尊者樹下歸寂其垂蔭後裔乎將奉全身於高原建塔眾力不能舉即就樹下起塔當漢昭帝十三年丁未歲也佛紀九五四年第十八祖伽邪舍多尊者摩提國人也姓鬱頭藍父天盖母方聖嘗夢大神持鑑因而有娠凡七月而誕肥體瑩如琉璃未嘗洗沐自然香潔幼好閒靜語非常童持鑑出遊遇難提尊者得度領眾至大月氏國得婆羅門鳩摩羅多尊者謂曰昔世尊記曰吾滅後一千年有大士出現於月氏國紹隆玄化今汝值吾應斯嘉運於是鳩摩羅多發宿命智投誠出家授具訖付法偈曰有種有心地因緣能發萌於緣不相礙當生生不生尊者付法已踊身虛空現十八種神變化火光三昧自焚其身眾以舍利起塔當漢成帝二十年戊申歲也佛紀一一五年第十九祖鳩摩羅多尊者行化至中天竺國有大士名闍夜多問曰我家父母素信三寶而嘗縈疾瘵凡所營作皆不如意而我鄰家久為旃多羅行旃多羅譯云殺者即屠膾而身常勇健所作和合彼何幸而我何辜尊者曰何足疑乎且善惡之報有三時焉凡人但見仁夭暴壽逆吉義凶便謂無因果虛罪福殊不知影響相隨毫氂靡忒縱經百千萬刼亦不磨滅時闍夜多聞是語已頓釋所疑尊者曰汝雖已信三業而未明業從惑生惑因識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻闍夜多承言領旨即發宿慧懇求出家既受具尊者告曰吾今寂滅時至汝當紹行化迹乃付法眼偈曰性上本無生為對求人說於法既無得何懷決不決又云此是妙音如來見性清淨之句汝宜傳布後學言訖即於座上以指爪剺面面如紅蓮開出大光明照耀四眾而入寂滅闍夜多起塔當新室王莽十四年壬午歲也佛紀一四九年第二十祖闍夜多尊者北天竺國人也智慧淵冲化導無量後至羅閱城敷揚頓教彼有學眾唯尚辯論為之首者名婆修盤頭此云徧行常一食不臥六時禮佛清淨無欲為眾所歸尊者將欲度之先問彼眾曰此徧行頭陁能修梵行可得佛道乎眾曰我師精進何故不可尊者曰汝師與道遠矣設苦行歷於塵刼皆虛妄之本也眾曰尊者蘊我德行而譏我師尊者曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道時徧行聞已發無漏智歡喜讚歎尊者又告曰汝久植眾德當繼吾宗聽吾偈曰言下合無生同於法界性若能如是解通達事理竟尊者付法已於其座上以首倒植象娑羅樹枝奄然而化眾欲闍維百千人舉之不能乃至諸羅漢以神力舉之亦不能動眾乃炷香祝之遂頹然委地闍維收舍利建塔當漢明帝永平十七年甲戌歲也佛紀一一一年初月氏國王聞師德風躬詣問法修敬已請開演尊者曰大王來時好道今去亦如來時王歎服第二十一祖婆修盤頭尊者羅閱城人也姓毗舍佉父光盖母嚴一家富而無子父母禱于佛塔而求嗣焉一夕母夢吞明暗二珠而生焉尊者行化至那提國謂其國王常自在曰佛記第二五百年有一神力大士出家繼聖即王之次子摩挐是也王曰誠如尊者所言當捨此子作沙門尊者曰善哉大王能遵佛旨即與授具付法偈曰泡幻同無礙如何不了悟達法在其中非今亦非古尊者付法已踊身高半由旬屹然而住四眾告曰願尊者無為神通我輩欲收舍利遂復座跏趺而逝茶毗得舍利建塔當漢安帝十一年丁巳歲也佛紀一一四四年第二十二祖摩拏羅尊者往月氏國鶴勒那比丘問曰我有何緣而感鶴眾尊者曰汝第四刼中嘗為比丘當赴會龍宮汝諸弟子咸欲隨從汝觀五百眾中無有一人堪任妙供時諸子曰師嘗說法於食等者於法亦等今既不然何聖之有汝即令赴會坐是濫食報為羽族師弟宿緣故今相隨鶴勒那曰以何方便令彼解脫尊者曰吾有無上法寶汝當聽受化未來際乃說偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂鶴眾聞偈飛鳴而去尊者即踊身空中呈十八變返座指地發一神泉復說偈曰心地清淨泉能潤於一切從地而涌出徧濟十方世一作十方際偈已泊然寂滅鶴勒那與寶印王建塔以奉全身當漢桓帝十九年乙巳歲也佛紀一一九二年第二十三祖鶴勒那尊者月氏國人也姓婆羅門父千勝母金光以無子故禱于七佛金幢即夢須彌山頂一神童持金環云我來也覺而有孕年七歲遊行聚落覩民間淫祀乃入廟叱之曰汝妄興禍福幻惑於人歲費牲牢傷害斯甚言訖廟貌忽然而壞由是鄉黨謂之聖子年二十二出家三十遇摩拏羅尊者付法眼藏行化至中印度為其王無畏海說法感日月天子禮拜其前王目見之乃問尊者曰日月國土總有多少尊者曰千釋迦佛所化世界各有百億迷盧日月我若廣說即不能盡王聞忻然時尊者演無上道度有緣眾婆羅門弟子師子歸依尊者問曰我欲求道當何用心尊者曰汝欲求道無所用心曰既無用心誰作佛事尊者曰汝若有用即非功德汝若無作即是佛事經云我所作功德而無我所故師子聞是語已即入佛慧時尊者忽指東北問云是何氣象師子曰我見氣如白虹貫乎天地復有黑氣五道桓亘其中尊者曰其兆云何曰莫可知矣尊者曰吾滅後五十年北天竺國當有難起嬰在汝身吾將滅矣今以法眼付囑於汝汝善護持乃說偈曰認得心性時可說不思議了了無可得得時不說知師子比丘聞偈欣愜然未曉將罹何難尊者乃密示之言訖現十八變而歸寂闍維畢分舍利各欲興塔尊者復現空中而說偈曰一法一切法一切一法攝吾身非有無何分一切塔大眾聞偈遂不復分就駄都之場而建塔焉即漢獻帝二十年己丑歲也佛紀一二三六年第二十四祖師子比丘尊者中印度人也姓婆羅門得法游方至罽賓國方求法嗣遇一長者引一子問尊者曰此子名斯多當生便拳左手今既長矣終未能舒願尊者示其宿因尊者覩之即以手接曰可還我珠童子遽開手奉珠眾皆驚異尊者曰吾前報為僧有童子名婆舍吾嘗赴西海齋受䞋珠付之今還吾珠理固然矣長者遂捨其子出家尊者即與授具以前緣故名婆舍斯多尊者即謂之曰吾師密有懸記罹難非久如來正法眼藏今當附汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即于今尊者說偈已以僧伽黎衣密付斯多俾之他國隨機演化斯多受教直抵南天尊者以難不可以苟免獨留罽賓時本國有外道二人一名摩目多二名都落遮學諸幻法欲共謀亂乃盜作釋子形像潛入王宮且曰不成即罪歸佛子妖既自作禍亦旋踵事既敗其王彌羅崛果怒曰吾素歸心三寶何乃搆害一至于斯即命破毀伽藍祛除釋眾又自秉劒至尊者所問曰師得蘊空否尊者曰已得蘊空曰離生死否尊者曰已離生死曰既離生死可施我頭尊者曰身非我有何恡於頭王即揮刃斷尊者首白乳湧高數尺王之右臂旋亦墮地七日而終太子光首歎曰我父何故自取其禍時有象白山仙人者深明因果即為光首廣宣宿因解其疑網遂以尊者報體而建塔焉當魏廢帝齊王二十年己卯歲也佛紀一二八六年第二十五祖婆舍斯多者罽賓國人也姓婆羅門父寂行母常安樂初母夢得神劒因而有孕既誕拳左手遇師子顯發宿因密受心印後適南天至中印度彼國王名迦勝設禮供養有外道無我尊先亦為王禮重乃於王前論義冀勝謂尊者曰我解默論不假言說尊者曰孰知勝負彼曰不爭勝負但取其義尊者曰汝以何為義彼曰無心為義尊者曰汝既無心豈得義乎彼曰我說無心當名非義尊者曰汝說無心當名非義我說非心當義非名彼曰當義非名誰能辨義尊者曰汝名非義此名何名彼曰為辨非義是名無名尊者曰名既非名義亦非義辨者是名當辨何物如是往返五十九番外道杜口信伏于時尊者忽然面北合掌曰我師師子尊者今日遇難斯可傷焉即辭王南邁至南天潛隱山谷時彼國王名天德迎請供養王有二子長曰德勝凶暴而色力充盛次曰不如蜜多和柔而常嬰疾苦王以問尊者為陳因果王即釋疑後六十載德勝即位惑外道說致難于尊者太子不如蜜多以進諫被囚王問尊者曰予國素絕妖訛師所傳者當是何宗尊者曰王國昔來實無邪法我所得者即是佛宗王曰佛滅已千二百載師從誰得邪尊者曰飲光大士親受佛印展轉至二十四世師子尊者我從彼得王曰予聞師子比丘不能免於刑戮何能傳法後人尊者曰我師難未起時密授我信衣法偈以顯師承王曰其衣何在尊者出衣示王王命焚之五色相鮮薪盡如故王乃追悔致禮師子真嗣既明乃赦太子太子遂求出家尊者問太子曰汝欲出家當為何事蜜多曰我若出家不為其事尊者曰不為何事曰不為俗事尊者曰當為何事曰當為佛事尊者曰王子智慧天至必諸聖降迹即度出家六年侍奉後於王宮受具羯磨之際大地震動乃付法偈曰聖人說知見當境無是非我今悟真性無道亦無理不如蜜多受偈已問衣可傳乎尊者曰此衣為難故假以證明汝身無難化被十方何假傳衣蜜多作禮尊者現神變化三昧火自焚平地舍利可高一尺德勝王建浮圖閟之當晉明帝太寧三年乙酉歲也佛紀一三五二年第二十六祖不如蜜多尊者姓剎帝利南印度王子得法後至東印度其王堅固信奉外道長爪梵志尊者至王問曰師來何為曰將度眾生曰以何法度曰各以其類度之梵志即化一大山於尊者頂上勢且下壓尊者指之山遽移在彼眾頂上復以手按地地動五百外道皆不能立梵志怖懼懺禮尊者復按地地靜指山山滅王異日大治齋集諸外道懇請尊者預會尊者初不欲行而知其所會之地將陷乃往王曰師肯來耶尊者曰吾非應供來救死耳此地已為龍窟須臾當下陷王恐與其眾登高原反顧其地已淵然成湫矣王益敬信尊者為演說法且曰王國有聖人當繼我法先是東印有婆羅門子年二十幼失父母不知名氏或自言瓔珞人遂名曰瓔珞童子丐行閭里有問汝行何急即曰汝行何緩問何姓即曰與汝同姓人莫測之一日王與尊者同車而出瓔珞童子稽首於前尊者曰汝憶往事否瓔珞曰我念往刧中與師同居師演摩訶般若我演甚深修多羅今日之事盖契昔因尊者顧王曰此大勢至菩薩也繼後出二人一人化南印度一人緣在震旦九年却返此方即以昔因故名為般若多羅付法偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智付法已即辭王曰化緣已終將歸寂滅願王於最上乘無忘外護即還本座現形如日少頃復呈十八變出三昧火自焚雨金色舍利王以金塔閟之東晉孝武帝太元十三年戊子歲也佛紀一四一五年第二十七祖般若多羅尊者東印度人也既得法已行化至南印度彼王名香至崇奉佛乘尊重供養度越倫等又施無價寶珠時王有三子其季開士也尊者欲試其所得乃以所施珠問三王子曰此珠圓明有能及此否第一子月淨多羅第二子功德多羅皆曰此珠七寶中最勝尊固無踰也非尊者道力孰能受之第三子菩提多羅曰此是世寶未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上此珠光明不能自照要假智光光辨於此既辨此已即知是珠既知是珠即明其寶若明其寶寶不自寶若辨其珠珠不自珠珠不自珠者要假智珠而辨世珠寶不自寶者要假智寶以明法寶然則師有其道其寶即現眾生有道心寶亦然尊者歎其辯慧乃復問曰於諸物中何物無相曰於諸物中不起無相又問於諸物中何物最高曰諸物中人我最高又問於諸物中何物最大曰諸物中法性最大尊者知是法嗣以時尚未至且默而混之及香至王厭世眾皆號絕唯第三子菩提多羅於柩前入定經七日而出乃求出家既受具戒尊者告曰如來以正法眼付大迦葉如是展轉乃至於我我今囑汝聽吾偈曰心地生諸種因事復生理果滿菩提圓花開世界起尊者付法已即於座上起立舒左右手各放光明二十七道五色晃耀又踊身虛空高七多羅樹火化自焚空中舍利如雨收以立塔當宋孝武大明元年丁酉歲也佛紀一四八四年第二十八祖東土第一祖菩提達磨大師南天竺國香至王第三子也姓剎帝利本名菩提多羅後遇二十七祖般若多羅至本國受王供養知師密迹因試令與二兄辨所施寶珠發明心要既而尊者謂曰汝於諸法已得通量夫達磨者通大之義也宜名達磨因改今名師乃告尊者曰我既得法當往何國而作佛事願垂開示尊者曰汝雖得法未可遠遊且止南天待吾滅後六十七載當往震旦設大法藥直接上根慎勿速行衰於日下師又曰彼有大士堪為法器否千載之下有留難否尊者曰汝所化之方獲菩提者不可勝數吾滅後六十餘年彼國有難水中文布自善降之汝至時南方勿住彼唯好有為功業不見佛理汝縱到彼亦不可久留聽吾偈曰路傍跨水復逢羊獨自棲棲暗度江日下可憐雙象馬二株嫩桂久昌昌復演八偈皆預讖佛教隆替師恭稟教義服勤左右垂四十年未嘗廢闕迨尊者順世遂演化本國時有二師一名佛大先一名佛大勝多本與師同學佛陁跋陀小乘禪觀佛大先既遇般若多羅尊者捨小趣大與師並化時號二甘露門矣而佛大勝多更分途而為六宗第一有相宗第二無相宗第三定慧宗第四戒行宗第五無得宗第六寂靜宗各封己解別展化源聚落崢嶸徒眾甚盛師喟然歎曰彼之一師已陷牛跡況復支離而分六宗我若不除永纏邪見遂至彼處一一闢破各各折服令其歸依由是化被南天聲馳五印經六十餘載度無量眾後值異見王欲毀佛法王故師之姪也師憫之欲開其蒙而六眾亦各念佛法有難師將何所匡濟師遙知眾意彈指應之六眾悉聞云此我師信響也皆至師所師曰一翳蔽空孰為剪之前無相宗宗勝欲行師曰汝雖辯慧道力未全且與王無緣宗勝辭祖竟至王所廣陳法要王曰汝今所解其法何在宗勝曰如王治化當合其道王所有道其道何在王曰我所有道將除邪法汝所有法將伏何人師不起於座懸知宗勝義墮召波羅提曰宗勝不稟吾語與王論屈汝急往救波羅提曰願假神力言訖雲起足下遂乘以見王王正問宗勝忽見愕然忘其所問而顧波羅提曰乘空來者是正是邪波羅提曰我非邪正而來正邪王心若正我無邪正王雖驚異而驕慢方熾即擯宗勝令出波羅提曰王既有道何擯沙門我雖無解願王致問王怒而問曰何者是佛提曰見性是佛王曰師見性否提曰我見佛性王曰性在何處提曰性在作用王曰是何作用我今不見提曰今現作用王自不見王曰於我有否提曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現提曰若出現時當有其八王曰其八出現當為我說波羅提即說偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟悔謝前非咨詢法要王復問波羅提師承為誰提曰大王之叔菩提達磨也王聞遽勅近臣迎師至王宮師為王懺悔往非王聞泣謝隨詔宗勝皈國師念東震旦國佛記後五百歲般若智燈運光於彼遂囑弟子不若蜜多羅住天竺傳法而躬至震旦乃辭祖塔次別同學且謂王曰勤修白業護持三寶吾去非晚一九即迴王聞師言涕淚交集曰此國何罪彼土何祥叔既有緣非吾所止唯願不忘父母之國事畢早迴王即具大舟實以重寶躬率臣僚送至海壖師汎重溟凡三周寒暑達于南海實梁普通元年庚子歲九月二十一日也傳燈錄為大通九年丁未指月錄為普通七年庚子而皆誤故正之佛紀一五四七年廣州刺史蕭昂具禮迎供表聞武帝帝遣使齎詔迎請以十月一日至金陵帝問曰朕即位以來造寺寫經度僧不可勝記有何功德師曰並無功德帝曰何以無功德師曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德師曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義師曰廓然無聖帝曰對朕者誰師曰不識帝不領悟師知機不契是月十九日潛迴江北十一月二十三日屆于洛陽當後魏孝明帝孝昌三年也寓止崇山少林寺面壁而坐終日默然人莫之測謂之壁觀婆羅門時有僧神光者曠達之士也久居伊洛博覽羣書善談玄理每歎曰孔老之教禮術風規莊易之書未盡妙理近聞達磨大士止住少林至人不遙當造玄境乃詣彼晨夕叅承師常端坐面壁莫聞誨勵光自惟曰昔人求道敲骨取髓刺血濟饑布髮掩泥投崖飼虎古尚若此我又何人其年十二月九日夜天大雨雪光堅立不動遲明積雪過膝立愈恭師顧而憫之問曰汝久立雪中當求何事光悲淚曰惟願和尚慈悲開甘露門廣度羣品師曰諸佛無上妙道曠刼精勤難行能行非忍而忍豈以小德小智輕心慢心欲冀真乘徒勞勤苦光聞師誨勵潛取利刀自斷左臂置于師前師知是法器乃曰諸佛最初求道為法忘形汝今斷臂吾前求亦可在師遂因與易名曰慧可慧可曰諸佛法印可得聞乎師曰諸佛法印匪從人得光曰我心未寧乞師與安師曰將心來與汝安可良久曰覓心了不可得師曰我與汝安心竟後魏孝莊帝聞師異跡遣使齎詔徵之前後三至師不下少林帝彌加欽尚就賜摩衲袈裟二領金鉢銀水瓶繒帛等師牢讓三返帝意彌堅師乃受之自爾緇白之眾倍加信向迄九年已欲返天竺乃命門人曰時將至矣汝等盍各言所得乎時門人道副對曰如我所見不執文字不離文字而為道用師曰汝得吾皮尼摠持曰我今所解如慶喜見阿閦佛國一見更不再見師曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得師曰汝得吾骨最後慧可禮拜依位而立師曰汝得吾髓乃告慧可而告之曰昔如來以正法眼付迦葉大士展轉囑累而至於我我今付汝汝當護持并授汝袈裟以為法信各有所表宜可知矣可曰請師指陳師曰內傳法印以契證心外付袈裟以定宗旨後代澆薄疑慮競生云吾西天之人言汝此方之子憑何得法以何證之汝今受此衣法却後難生但出此衣并吾法偈用以表明其化無礙至吾滅後二百年衣止不傳法周沙界明道者多行道者少說理者多通理者少潛符密證千萬有餘汝當闡揚勿輕未悟一念迴機便同本得聽吾偈曰吾本來兹土傳法救迷情一花開五葉結果自然成師又曰吾有楞伽經四卷亦用付汝即是如來心地要門令諸眾生開示悟入吾自到此凡五度中毒我常自出而試之置石石裂吾本離南印來此東土見赤縣神州有大乘氣象遂踰海越漠為法求人際會未諧如愚若訥今得汝傳授吾意已終別記云師初居少林寺九年為二祖說法秪教曰外息諸緣內心無喘心如墻壁可以入道慧可種種說心性道理未契師秪遮其非不為說無念心體可忽曰我已息諸緣師曰莫成斷滅去否可曰不成斷滅師曰何以驗之云不斷滅可曰了了常知故言之不可及師曰此是諸佛所傳心體更勿疑也言已乃與徒眾往禹門千聖寺止三日有期城太守楊衒之早慕佛乘問師曰西天五印師承為祖其道如何師曰明佛心宗寸無差誤行解相應名之曰祖又問此外如何師曰須明他心知其今古不厭有無於法無取不賢不愚無迷無悟若能是解故稱為祖又曰弟子歸心三寶亦有年矣而智慧昏蒙尚迷真理適聽師言罔知攸措願師慈悲開示宗旨師知懇到即說偈曰亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同躔超然名之曰祖衒之聞偈悲喜交并曰願師久住世間化導群有師曰吾即逝矣不可久留根性萬差多逢患難衒之曰未審何人弟子為師除得師曰吾以傳佛秘密利益迷塗害彼自安必無此理衒之曰師若不言何表通變觀照之力師不獲已乃為讖曰江槎分玉浪管炬開金鎻五口相共行九十無彼我衒之聞語莫究其端默記于懷禮辭而去師之所讖雖當時不測而後皆符驗時魏氏奉釋禪雋如林光通律師流支三藏者僧中之鸞鳳也覩師演道斥相指心每與師論議多與相違師遐振玄風普施法雨而偏局之量自不堪任彼徒生嫉數加毒藥莫能中傷至第六度以化緣已畢傳法得人遂端居而逝即魏孝靜帝天平三年丙辰歲十月五日也佛紀一五六三年其年十二月二十八日葬熊耳山起塔定林寺其年魏宋雲奉使西域迴遇師于葱嶺見手擕隻履翩翩獨逝傳燈錄以宋雲之使西域迴在師入寂後三歲指月錄則其年云云方與一九即迴之語相符雲問師何往師曰西天去雲歸具奏其事帝令啟壙惟空棺隻履存焉詔取遺履於少林寺供養至唐開元十五年丁卯歲為信道者竊在五臺山華嚴寺今不知所在初梁武帝遇師因緣未契及聞行化魏邦遂欲自撰師碑而未暇也後聞宋雲事乃成之有云嗟夫見之不見逢之不逢遇之不遇今之古之怨之恨之復讚云心有也曠刧而滯凡夫心無也剎那而登妙覺唐代宗諡曰圓覺大師塔曰空觀第二十九祖東土第二祖慧可大師武牢人姬氏子父寂以無子祈禱既久一夕有異光照室母遂懷妊故生而名之曰光自幼超然博極群書善談老莊後覧佛乘遂盡棄去抵洛陽龍門香山依寶靜禪師出家受具於永穆寺浮遊講肆遍學大小乘義年三十二却返香山終日宴坐又經八年於寂默中忽見一神人謂曰將欲受果何滯於此大道匪遙汝其南矣翌日覺頭痛如刺欲治之忽聞空中有聲曰此換骨也非常痛也往見靜述其事靜視之見頂骨嶢然如五峯秀出以有神異更名神光靜謂曰汝相吉祥當有所證神令汝南者斯則少林達摩大士必汝之師也可遂造少室得法自少林託化西歸大師繼闡玄風博求法師至北齊天平一年有一居士年踰四十不言名氏聿來設禮而問曰弟子身纏風恙請師懺罪師曰將罪來與汝懺士良久云覔罪不可得師曰我與汝懺罪竟宜依佛法僧住曰今見尚和已知是僧未審何名佛法師曰是心是佛是心是法佛法無二僧寶亦然曰今日始知罪性不在內不在外不在中間如其心然佛法無二也大師深器之即為剃髮云是吾寶也宜名僧璨其年三月十八日於光福寺受具自滋疾漸愈執侍經二載大師乃告曰菩提達磨遠自竺乾以正法眼藏密付於吾吾今授汝并達磨信衣汝當守護無令斷絕聽吾偈曰本來緣有地因地種華生本來無有種華亦不曾生祖付衣法已又曰汝受吾教宜處深山未可行化當有國難璨曰師既預知願垂示誨師曰非吾知也斯乃達磨傳般若多羅懸記所謂心中雖吉外頭凶是也吾校年代正在于汝當諦思前言勿罹世難然吾亦有宿累今要酬之善去善行俟時傳付大師付囑已即往鄴都化導四眾歸依如是積三十四載遂韜光混跡變易儀相或入酒肆或過屠門或習街談或隨廝役或問之曰師是道人何故如是祖曰我自調心何關汝事後至筦城縣匡救寺說法有辨和法師正於其寺講涅槃經學徒聞師闡法稍稍引去辨和憤嫉興謗于邑宰翟仲侃仲侃惑其邪說加師以非法師怡然委順識真者謂之償債時年一百七歲即隋文帝開皇十三年癸丑歲三月十六日也佛紀一六二年皓月供奉問長沙景岑禪師曰古德云了即業障本來空未了應須償宿債只如師子尊者二祖大師為甚却償債去岑曰大德不識本來空月曰如何是本來空岑曰業障是曰如何是業障岑曰本來空是月無語岑以偈示之曰假有元非有假滅亦非無涅槃償債義一性更非殊葬磁州滏陽縣東北七十里唐德宗諡大祖禪師第三十祖東土第三祖僧璨大師者不知何許人也初以白衣謁二祖既得度傳法隱于舒州之皖公山屬後周武帝沙汰佛法師往來太湖縣司空山居無常處積十餘載人無能知者至隋開皇十二年有沙彌道信年始十四來禮師曰願和尚慈悲乞與解脫法門師曰誰縛汝曰無人縛師曰何更求解脫乎信於言下大悟統要云信於是有省又問如何是古佛心師曰汝今是什麼心曰我今無心師曰汝既無心諸佛豈有耶信于是頓息其疑服勞九載後於吉州受戒侍奉尤謹師屢試以玄微知其緣熟乃付衣法偈曰華種雖因地從地種華生若無人下種華地盡無生師又曰昔可大師付吾法後往鄴都行化三十年方終今吾得汝何滯此乎即適羅浮優遊二載却旋舊址逾月士民奔趨大設檀供師為四眾廣宣心要訖於法會大樹下合掌立終即隋煬帝大業二年丙寅十月十五日也佛紀一六三三年唐玄宗諡鑑智禪師覺寂之塔師著有信心銘曰至道無難惟嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識玄旨徒勞念靜圓同太虛無欠無餘良田取捨所以不如莫逐有緣勿住空忍一種平懷泯然自盡止動歸止止更彌動惟滯兩邊寧知一種一種不通兩處失功遺有沒有從空背空多言多慮轉不相應絕言絕慮無處不通歸根得旨隨照失宗須臾返照勝却前空前空轉變皆由妄見不用求真惟須息見二見不住慎莫追尋纔有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能由境滅境逐能沉境由能境能由境能欲知兩段原是一空一空同兩齊含萬象不見精麤寧有徧黨大道體寬無易無難小見狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絕惱繫念乖真昏沈不好不好勞神何用踈親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空花何勞把捉得失是非一時放却眼若不寐諸夢自除心若不異萬法一如一如體玄亢爾忘緣萬法齊觀歸復自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作俱息狐疑盡淨正信調直一切不留無可記憶虛明自照不勞心力非思量處識情難測真如法界無他無自要急相應惟言不二不二皆同無不包容十方智者皆入此宗宗非延促一念萬年無在不在十方目前極小同大忘絕境界極大同小不見邊表有即是無無即是有若不如是必不須守一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今第三十一祖東土第四祖道信大師者姓司馬氏世居河內後徙於蘄州之廣濟縣師生而超異幼慕空宗諸解脫門宛如宿習既嗣祖風攝心無寐脅不至席者僅六十年隋大業十三年領徒眾抵吉州值群盜圍城七旬不解萬眾惶怖師愍之教念摩訶般若時賊眾望雉堞間若有神兵乃相謂曰城內必有異人不可攻矣稍稍引去唐武德甲申歲師却返蘄春住破頭山學侶雲臻一日往黃梅縣路逢一小兒骨相奇秀異乎常童師問曰子何姓答曰性即有不是常姓師曰是何姓答曰是佛性師曰汝無姓耶答曰性空故師默識其法器即使侍者至其母所乞令出家母以宿緣故殊無難色遂捨為弟子以至付法傳衣偈曰華種有生性因地華生生大緣與性合當生生不生迄唐高宗永徽二年辛亥歲閏九月四日師忽垂誡門人曰一切諸法悉皆解脫汝等各自護念流化未來言訖安坐而逝佛紀一六七八年壽七十有二塔于本山明年四月八日塔戶無故自開儀相如生爾後門人遂不敢復閉焉代宗諡大醫禪師慈雲之塔第三十二祖東土第五祖弘忍大師者蘄州黃梅人也先為破頭山栽松道者嘗請於四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶儻若再來吾尚可遲汝廼去行水邊見一女子浣衣揖曰寄宿得否女曰我有父兄可往求之曰諾我即敢行女首肯之遂廻策而去女周氏季子也歸輒孕父母大惡逐之女無所歸日傭紡里中夕止於眾館之下已而生一子以為不祥因拋濁港中明日見之泝流而上氣體鮮明大驚舉之成童隨母乞食里人呼為無姓兒逢一智者歎曰此子闕七種相不逮如來後遇信大師得法嗣化於破頭山咸亨中有一居士姓盧名慧能自新州來謁機緣契合大師告慧能曰諸佛出世為一大事故隨機大小而引導之遂有十地三乘頓漸等旨以為教門然以無上微妙秘密圓明真實正法眼藏付于上首大迦葉尊者展轉傳授二十八世至達磨届于此土得可大師承襲以至于吾今以法寶及所傳袈裟用付於汝善自保護無令斷絕聽吾偈曰有情來下種因地果還生無情既無種無性亦無生能居士跪受衣法啟曰法則既受衣付何人祖曰昔達磨初至人未之信故傳衣以明得法今信心已熟衣乃爭端止於汝身不復傳也且當遠隱俟時行化所謂受衣之人命如懸絲也能曰當隱何所師曰逢懷即止遇會且藏能禮足已奉衣而出即夜南邁大眾莫知大師自此不復上堂凡三日大眾疑怪致問祖曰吾道行矣何更詢之復問衣法誰得耶祖曰能者得於是眾議廬行者名能尋訪既失潛知彼得即共奔逐祖既付衣法復經四載忽告眾曰吾今事畢時可行矣即入室安坐而逝壽七十有四建塔於黃梅之東山代宗諡大滿禪師法雨之塔第三十三祖東土第六祖慧能大士姓盧氏父行本范陽人唐武德中左官于南海新州遂居焉母李氏感異夢覺而異香滿室因有娠六年乃生毫光騰空黎明有僧來語兒之父曰此子可名慧能父曰何謂也僧曰惠者以法惠濟眾生能者能作佛事語畢不知所之兒不飲母乳遇夜神人灌以甘露三歲喪父其母守志鞠養及長家尤貧窶師樵採以給一日負薪至市中聞客讀金剛經至應無所住而生其心有所開悟而問其客曰此何法也客曰此金剛經黃梅東山五祖忍大師恒教人誦此經師聞語勃然思出家求法乃乞于一客為其母備歲儲遂辭母抵黃梅叅禮五祖祖問曰汝自何來師曰嶺南祖曰欲須何事師曰唯求作佛祖曰嶺南人無佛性若為得佛師曰人即有南北佛性豈然祖知是異人乃訶曰著槽厰去師禮足而退便入碓坊服勞於杵臼之間晝夜不息經八月祖知付授時至遂告眾曰正法難解不可徒記吾言持為己任汝等各自隨意述一偈若語意冥符衣法皆付時會下七百餘僧上座神秀者學通內外眾所宗仰咸共推稱云若非尊秀疇敢當之神秀竊聆眾譽不復思惟乃於廓壁上書一偈云身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃祖因經行忽見此偈知是神秀所述乃讚歎曰後代依此修行亦得勝果其壁本欲令盧珍繪楞伽變相及見題偈在壁遂止不畵各令誦念師在碓坊忽聆誦偈乃問同學是何章句同學曰汝不知和尚求法嗣令各述心偈此則秀上座所述和尚深加歎賞必將付法傳衣也師曰其偈云何同學為誦師良久曰美則美矣了則未了同學呵曰庸流何知勿發狂言師曰子不信耶願以一偈和之同學不答相視而笑師至夜密告一童子引至廊下師自秉燭令童子於秀偈之側寫一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖夜見此偈云此是誰作亦未見性眾聞祖語遂不之顧迨夜祖乃潛詣碓坊問曰米白也未師曰白也未有篩祖以杖擊其碓三下師以三鼓入室祖遂密傳衣法法偈見五祖章祖又囑曰汝須速去恐人害汝師曰甚處去祖曰逢懷則止遇會則藏其夜五祖送師至九江驛邊令師上船師隨即把櫓祖曰合是吾渡汝師曰迷時師渡悟時自度度名雖一用處不同能蒙師傳法今已得悟只合自性自度祖曰如是如是以後佛法由汝大行師禮辭南行至大庾嶺僧惠明本將軍同數百人來欲奪衣鉢明先趁及師擲衣鉢於石曰此衣表信可力爭耶明舉衣鉢不能動乃曰我為法來不為衣來師曰汝既為法來可屏息諸緣勿生一念吾為汝說明良久師曰不思善不不思惡正與麼時那個是明上座本來面目惠明言下大悟復問曰上來密語密意外還更有密意否師曰與汝說者即非密也汝若返照密在汝邊明曰惠明雖在黃梅實示省自己面目今蒙指示如人飲水冷煖自知今行者即惠明師也師曰汝若如是吾與汝同師黃梅善自護持明又問曰惠明今向甚處去師曰逢袁則止遇蒙則居明禮辭還至嶺下謂眾曰向涉崔嵬杳無蹤跡當別道尋之趁眾遂散後惠明居袁州蒙山避師諱更名道明師回至韶州曹侯村人無知者他本云師去時至曹侯村住九月餘然師自言不經三十餘日便至黃梅且求道之切豈有逗留作去時者非是有儒士劉志略禮遇甚厚志略有姑為尼名無盡藏常誦大涅槃經師暫聽即知妙義遂為解說尼乃執卷問字師曰字即不識義即請問尼曰字尚不識焉能會義師曰諸佛妙理非關文字尼驚異之遍告里中耆德云此是有道之士宜請供養有魏武侯玄孫曹叔良及居民競來瞻禮時寶林古寺自隋末兵火已廢遂於古基重建梵宇延師居之俄成寶坊師住九月餘日又為惡黨尋逐師乃遁于前山被其縱火焚草木師隱身挨入石中得免石今有師趺坐膝痕及衣布之紋因名避難石師憶五祖懷會止藏之囑遂行隱于二邑焉他本云師後至曹溪又被惡人尋遂乃於四會避難獵人隊中凡經一十五載時與獵人隨宜說法獵人常令守網每見生命盡放之每至飯時以菜寄煑肉鍋或問則對曰但喫肉邊菜此非避難藏踪之人所可行之事疑是後人附會畵虎成狗至儀鳳元年正月八日師忽念說法時至遂出至廣州法性寺值印宗法師講涅槃經師寓止廊廡間時有風吹幡動一僧曰風動一僧曰幡動爭論不已師進曰可容俗流輒預高論否不是風動不是幡動仁者心動一眾悚然印宗竊聆此語邀師入室徵詰奧義見師言簡理當不由文字宗曰行者定非常人久聞黃梅衣法南來莫是行者否師曰不敢宗於是執弟子之禮請受禪要問曰黃梅付囑如何指授師曰指授即無惟論見性不論禪定解脫宗曰何不論禪定解脫師曰為是二法不是佛法佛法是不二之法宗乃告四眾曰印宗具足凡夫今遇肉身菩薩即指座下盧居士云即此是也因請出所傳信衣悉令瞻禮至正月十五日會諸名德為師剃髮二月八日就法性寺智光律師受滿分戒其戒壇即宋朝求那跋陀三藏之所置也跋陀記云後當有肉身菩薩在此壇受戒又梁末真諦三藏於壇之側手植二菩提樹謂眾曰却後一百二十年有大開士於此樹下演無上乘度無量眾師具戒已於此樹下開東山法門宛如宿契明年二月八日師謂眾曰吾不願此居要歸舊隱時印宗與緇白千餘人送師歸寶林寺韶州刺史韋璩與官僚入山請於城中大梵寺轉妙法輪師陞座次刺史官僚三十餘人儒宗學士三十餘人僧尼道俗一千餘人同時作禮願聞法要師次第說行由般若疑問定慧坐禪懺悔等諸品并授無相心地戒一眾聞法歡喜奉行門人記錄目為壇經盛行于世然後返曹溪雨大法雨學者不下千數中宗神龍元年降詔云朕請安秀二師宮中供養嵩嶽慧安禪師北宗神秀大師皆得法于黃梅而為國師萬機之暇每究一乘二師並推讓云南方有能禪師密受忍大師衣法可就彼問今遣內侍薛簡馳詔迎請願師慈念速赴上京師上表辭疾願終林麓薛簡曰京城禪德皆云欲得會道必湏坐禪習定若不因禪定而得解脫者未之有也未審師所說法如何師曰道由心悟豈在坐也經云若見如來若坐若臥是行邪道何故無所從來亦無所去若無生滅是如來清淨禪諸法空寂是如來清淨坐究竟無證豈况坐耶簡曰弟子之廻主上必問願和尚慈悲指示心要師曰道無明暗明暗是代謝之義明明無盡亦是有盡簡曰明喻智慧暗况煩惱修道之人儻不以智慧照破煩惱無始生死憑何出離師曰若以智慧照煩惱者此是二乘小兒羊鹿等機上智大根悉不如是簡曰如何是大乘見解師曰明與無明其性無二無二之性即是實性實性者處凡愚而不減在賢聖而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師說不生不滅何異外道師曰外道所說不生不滅者將滅止生以生顯滅滅猶不滅生說無生我說不生不滅者本自無生今亦無滅所以不同外道汝若欲知心要但一切善惡都莫思量自然得入清淨心體湛然常寂妙用恒沙簡蒙指教豁然大悟禮辭歸闕表奏師語有詔謝師并賜摩衲袈娑絹五百匹寶鉢一口十二月十九日勅改古寶林為中興寺三年十一月十八日又詔韶州刺史重加崇飾賜額為法泉寺師新州舊居為國恩寺一日師謂眾曰諸善知識汝等各各淨心聽吾說法汝等諸人自心是佛更莫狐疑外無一物而能建立皆是本心生萬種法故經云心生種種法生心滅種種法滅若欲成就種智須建一相三昧一行三昧若於一切處而不住相彼相中不生增愛亦無取捨不念利益成壞等事安閒恬靜虛融澹泊此名一相三昧若於一切處行住坐臥純一直心不動道塲真成淨土名一行三昧若人具二三昧如地有種能含藏長養成就其實一相一行亦復如是我今說法猶如時雨溥潤大地汝等佛性譬諸種子遇兹霑洽悉得發生承吾旨者決獲菩提依吾行者定證妙果先天元年告諸徒眾曰吾忝受忍大師衣法今為汝等說法不付其衣盖汝等信根淳熟决定不疑堪任大事聽吾偈曰心地含諸種普雨悉皆生頓悟華情已菩提果自成師說偈已復曰其法無二其心亦然其道清淨亦無諸相汝等慎勿觀淨及空其心此心本淨無可取捨各自努力隨緣好去師說法利生經四十載其年七月六日命弟子往新州國恩寺建報恩塔仍令倍工有蜀僧名方辯來謁云善塑師正色曰試塑看辯不領旨乃塑師真可高七寸曲盡其妙師觀之曰汝善塑性不善佛性酬以衣物僧禮謝而去有僧舉臥輪禪師偈云臥輪有伎倆能斷百思想對境心不起菩提日日長師聞之曰此偈未明心地若依而行之是加繫縛因示一偈曰慧能沒伎倆不斷百思想對境心數起菩提作麼長先天二年七月一日謂門人曰吾欲歸新州汝速理舟楫時大眾哀慕乞師且住師曰諸佛出現猶示涅槃有來必去理亦常然吾此形骸歸必有所眾曰師從此去早晚却廻師曰葉落歸根來時無口又問師之法眼何人傳受師曰有道者得無心者通問後莫有難否曰吾滅後五六年當有一人來取吾首聽吾記曰頭上養親口裏須餐遇滿之難楊柳為官又云吾去七十年有二菩薩從東方來一在家一出家同時興化建立吾宗締緝伽藍昌隆法嗣言訖往新州國恩寺沐浴訖跏趺而化異香襲人白虹屬地即其年八月三日也佛紀一七四年時韶新兩郡各修靈塔道俗莫決所之兩郡刺史共焚香祝云香煙引處即師之欲歸處時鑪香騰湧直貫曹溪以十一月十三日入塔壽七十六時韶州刺史韋璩撰碑文門人憶念取首之記遂先以鐵葉漆布固護師頸塔中有達磨所傳信衣西域屈咰布也紡木綿華心織成後人以碧絹為裹中宗所賜摩衲寶鉢方辯塑真道具等主塔侍者尸之開元十年壬戌八月三日夜半忽聞塔中如拽索聲僧眾驚起見一孝子從塔中走出尋見師頸有傷具以賊事聞於州縣縣令楊侃刺史柳無忝得牒切加擒捉五日於石角村捕得賊人送韶州鞫問云姓張名淨滿汝州梁縣人於洪州開元寺受新羅僧金大悲錢二十千令取六祖大師首歸海東供養柳守聞狀未即加刑乃躬至曹溪問師上足令韜曰如何處斷韜曰若以國法論理須誅夷但以佛教慈悲冤親平等况彼求欲供養罪可恕矣柳守嘉歎曰始知佛門廣大遂赦之憲宗諡大鑑禪師塔曰元和靈照六祖下第一世南嶽懷讓禪師姓杜氏金州人也唐儀鳳二年四月八日降誕白氣應於玄象在安康之分太史瞻見奏聞高宗皇帝乃問是何祥瑞太史對曰國之法器不染世榮帝傳勑金州太守韓偕親往存慰其家家有三子唯師最小炳然殊異性唯恩讓父乃安名懷讓年十歲時唯樂佛書時有三藏玄靜過舍告其父母曰此于若出家必獲上乘廣度眾生至垂拱三年方十五歲往荊州玉泉寺依弘景律師出家受具之後習毘尼藏一日自歎曰夫出家者為無為法天上人間無有勝者時同學坦然知師志氣高邁勸師謁嵩山安和尚安啟發之乃直詣曹溪叅六祖祖問什麼處來曰嵩山來祖曰什麼物恁麼來師無語遂經八載忽然有省乃白祖曰某甲有個會處祖曰作麼生師曰說似一物即不中祖曰還可修證否師曰修證即不無污染即不得祖曰只此不污染諸佛之所護念汝既如是吾亦如是西天般若多羅識汝足下出一馬駒蹋殺天下人病在汝心不須速說師豁然契會執侍左右一十五載唐先天二年始往衡岳居般若寺開元中有沙門道一住傳法院常日坐禪師知是法器往問曰大德坐禪圖什麼道一曰圖作佛師乃取一塼於彼庵前石上磨道一曰作什麼師曰磨作鏡道一曰磨塼豈得成鏡耶師曰坐禪豈得作佛耶道一曰如何即是師曰如人駕車車不行打車即是打牛即是道一無對師又曰汝為學坐禪為學坐佛苦學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理道一聞示誨如飲醍醐拜禮問曰如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問曰道非色相云何能見師曰心地法眼能見乎道無相三昧亦復然矣道一曰有成壞否師曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萠三昧華無相何壞復何成道一蒙示開悟心意超然侍奉十秋日益玄奧師入室弟子摠有六人師各印可云汝等六人同證吾身各契一路一人得吾眉善威儀常浩一人得吾眼善顧盻智達一人得吾耳善聽理坦然一人得吾鼻善和氣神照一人得吾舌善譚說嚴竣一人得吾心善古今道一又曰一切法皆從心生心無所生法無能住若達心地所作無礙非遇上根宜慎辭哉有一大德問如鏡鑄像像成後鏡明向什麼處去師曰如大德為童子時相貌何在曰只如像成後為什麼不鑑照師曰雖然不鑑照謾他一點不得後馬大師闡化於江西師問眾曰道一為眾說法否眾曰已為眾說法師曰摠未見人持箇消息來眾無對因遣一僧去云待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨迴謂師曰馬師云自從胡亂後三十年不曾少鹽醬師然之天寶三年八月十一日佛紀一七一七年圓寂於衡岳勑諡大慧禪師最勝輪之塔六祖下第二世江西馬祖道一禪師漢州什邡縣人姓馬氏故俗稱馬祖或云馬大師容貌奇異牛行虎視引舌過鼻足下有二輪文幼歲依資州唐和尚落髮受具於渝州圓律師唐開元中習禪定於衡岳傳法院同參六人惟師密受心印始居建陽佛迹嶺遷於臨川次至南康龔公山大曆中連帥路嗣恭請師開法四方學者雲集座下僧問離四句絕百非請師直指西來意師曰我今日勞倦不能為汝說問取智藏去僧問西堂西堂智藏堂云何不問和尚僧云和尚教來問堂云我今日頭痛不能為汝說問取海兄去僧又問百丈百丈懷海丈云我到這裏却不會僧却回舉似師師曰藏頭白海頭黑師一日謂眾曰汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又引楞伽經文以印眾生心地恐汝顛倒不自信此一心之法各各有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界惟心森羅萬象一法之所印凢所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈曰心地隨時說菩提亦秪寧事理俱無礙當生即不生僧問如何修道師云道不屬修若言修得修還成壞即同聲聞若言不修即同凡夫曰云何即得達道師云自性本來具足但於善惡事上不滯喚作修道人取善捨惡觀空入定即屬造作更若向外馳求轉踈轉遠但盡三界心量一念妄想即是三界生死根本但無一念即除生死根本經云但以眾法合成此身起時惟法起滅時惟法滅此法起時不言我起此法滅時不言我滅前念後念中念念念不相待念念寂滅喚作海印三昧攝一切法如百千異流同歸大海都名海水住於一味即攝眾味住於大海即混諸流如人在大海中浴即用一切水所以聲聞二乘人也悟迷凡夫迷悟聲聞不知聖心本無地位因果階級心量妄想修因證果住其空定八萬刧二萬刧雖即已悟却迷諸菩薩觀如地獄苦沈空滯寂不見佛性若是上根眾生忽遇善知指示言下領會更不歷於階級地位頓悟本性故經云凡夫有反覆心而聲聞無也對迷說悟本既無迷悟亦不立一切眾生從無量刧來不出法性三昧常在法性三昧中著衣喫飯言談祗對六根運用一切施為盡是法性不解返源隨名逐相迷情妄起造種種業若能一念返照全體聖心汝等諸人各達自心莫記吾語縱說得河沙道理其心亦不增總說不得其心亦不減說得亦是汝心說不得亦是汝心乃至分身放光現十八變不如還我死灰來淋過死灰無力喻聲聞妄修因證果未淋過死灰有力喻菩薩道業純熟諸惡不染若說如來權教三藏河沙刼說不可盡猶如鈎鎻亦不斷絕若悟聖心總無餘事一日示眾云道不用修但莫污染何為污染但有生死心造作趣向皆是污染若欲直會其道平常心是道何謂平常心無造作無是非無取捨無斷常無凡聖故經云非凡夫行非聖賢行是菩薩行只如今行住坐臥應機接物盡是道道即是法界乃至河沙妙用不出法界若不然者云何言心地法門一切法皆是心法一切名皆是心名萬法皆從心生心為萬法之根本種種成立皆由一心也建立亦得掃蕩亦得盡是妙用妙用盡是自家非離真而有立處立處即真盡是自家體若不然者更是何人一切法皆是佛法諸法即是解脫解脫者即是真如諸法不出於真如行住坐臥悉是不思議用不待時節心生滅義心真如義心真如者喻如明鏡照像鏡喻於心像喻於法若心取法即涉外因即是生滅義不取於法即是真如義聲聞耳聞佛性菩薩眼見佛性了達無二名平等性性無有二用則不同在迷為識在悟為智順理為悟順事為迷迷則迷自本心悟則悟自本性一悟永悟不復更迷如日出時不合於暗智慧日出不與煩惱暗俱了心境界妄想即除妄想既除即是無生法性本有有不假修禪不屬坐坐即有著若見此理真正合道隨緣度日坐起相隨戒行增薰積於淨業但能如是何慮不通師於貞元四年正月中登建昌石門山於林中經行見洞壑平坦謂侍者曰吾之朽質當於來月歸兹地矣及歸遂示疾院主問和尚近日尊候如何師曰日面佛月面佛二月一日佛紀一八一五年沐浴跏趺入滅世壽八十僧臘六十元和中追諡大寂禪師塔曰大莊嚴今海昏縣影堂存焉高僧傳云諡大覺禪師六祖下第三世洪州百丈山懷海禪師福州長樂人王氏子兒時隨母入寺拜佛指佛像問母曰此為誰母曰佛也師曰形容與人無異我後亦當作佛丱歲離塵三學該練參馬大師為侍者檀越每送齋飯來師纔揭開盤盖馬大師便拈起一片胡餅示眾云是什麼每每如此經三年一日侍馬祖行次見一羣野鴨飛過祖曰是什麼師曰野鴨子祖曰甚處去也師曰飛過去也祖遂把師鼻扭鼻痛失聲祖曰又道飛過去也師於言下有省却歸侍者寮哀哀大哭同事問曰汝憶父母耶師曰無曰被人罵耶師曰無曰哭作什麼師曰我鼻孔被大師扭得痛不徹同事曰有甚因緣不契師曰汝問取和尚去同事問大師曰海侍者有何因緣不契在寮中哭告和尚為某甲說大師曰是伊會也汝自問取他同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭今何笑師曰適來哭如今笑同事罔然次日馬祖陞座眾纔集師出卷却席祖便下座師隨至方丈祖曰我適來未曾說話汝為甚便卷却席師曰昨日被和尚扭得鼻頭痛祖曰汝昨日向甚處留心師曰鼻頭今日又不痛也祖曰汝深明昨日事師作禮而退師再參侍立次祖目視繩牀角拂子師曰即此用離此用祖曰汝向後開兩片皮將何為人師取拂子竪起祖曰即此用離此用師掛拂子於舊處祖振威一喝師直得三日耳聾未幾住大雄山以所處巖巒峻極故號百丈四方學者至一日謂眾曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗希運聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之之覺作大用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜師每上堂有一老人隨眾聽法一日眾退唯老人不去師問汝是何人老人曰某非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人於言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧津送師令維那白椎告眾食後送亡僧大眾聚議一家皆安涅槃堂又無病人何故如此食後師領眾至山後巖下以杖挑出一死狐乃依法火塟師至晚上堂舉前因緣黃檗便問古人錯秖對一轉語墮五百生野狐身轉轉不錯合作個甚麼師曰近前來向汝道檗近前打師一掌師笑曰將謂胡鬚赤更有赤鬚胡時溈山在會下作典座司馬頭陁舉野狐話問典座作麼生座撼門扇三下司馬曰太粗生座曰佛法不是這個道理師有時說法竟大眾下堂乃召之大眾回首師曰是什麼藥山目之為百丈下堂句上堂靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛僧問如何是大乘頓悟法門師曰汝等先歇諸緣休息萬事善與不善世出世間一切諸法莫記憶莫緣念放捨身心令其自在心如木石無所辨別心無所行心地若空慧日自現如雲開日出相似但歇一切攀緣貪嗔愛取垢淨情盡對五欲八風不動不被見聞覺知所縛不被諸境所惑自然具足神通妙用是解脫人對一切境心無靜亂不攝不散透過一切聲色無有滯碍名為道人善惡是非俱不運用亦不愛一法亦不捨一法名為大乘人不被一切善惡垢淨有為無為世出世間福德智慧之所拘繫名為佛慧是非好醜是理非理諸知見情盡不能繫縛處處自在名為初發心菩薩便登佛地問對一切境如何得心如木石去師曰一切諸法本不自言空不自言色亦不言是非垢淨亦無心繫縛人但人自虛妄計著作若干種解會起岩干種知見生若干種愛畏但了諸法不自生皆從自己一念妄想顛倒取相而有知心與境本不相到當處解脫一一諸法當處寂滅當處道塲又本有之性不可名目本來不是凡不是聖不是垢淨亦非空有亦非善惡與諸染法相應名人天二乘界若垢淨心盡不住繫縛不住解脫無一切有為無為縛脫心量處於生死其心自在畢竟不與諸妄虛幻塵勞蘊界生死諸入和合逈然無寄一切不拘去留無碍往來生死如門開相似夫學道人若遇種種苦樂稱意不稱意事心無退屈不念名聞利養衣食不貪功德利益不為世間諸法之所滯碍無親無愛苦樂平懷粗衣遮寒糲食活命兀兀如愚如聾稍有相應分若於心中廣學知解求福求智皆是生死於理無益却被知觧境風之所漂溺還歸生死海裏佛是無求人求之即乖理是無求理求之即失若著無求復同於有求若著無為復同於有為故經云不取於法不取非法不取非非法又云如來所得法此法無實無虛若能一生心如木石相似不為陰界五欲八風之所漂溺即生死因斷去住自由不為一切有為因果所縛不被有漏所拘他時還以無因縛為因同事利益以無著心應一切物以無碍慧解一切縛亦云應病與藥師於唐元和九年正月十七日佛紀一八四一年歸寂壽九十五長慶勅諡大智禪師塔曰大寶勝輪六祖下第四世洪州黃檗希運禪師閩人也幼於本州黃檗山出家額間隆起如珠音辭朗潤志意冲澹後遊天台逢一僧與之言笑如舊相識熟視之目光射人乃偕行屬澗水暴漲乃捐笠植杖而止其僧率師同渡師曰兄要渡自渡彼即褰衣躡波若履平地回顧曰渡來渡來師曰咄這自了漢吾早知當斫汝脛其僧歎曰真大乘法器我所不及言訖不見師往參百丈丈問巍巍堂堂從何方來師曰巍巍堂堂從嶺南來丈曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜問曰從上宗乘如何指示丈良久師曰不可教後人斷絕去也丈曰將謂汝是個人乃起入方丈師隨後入曰某甲特來丈曰若爾則他後不得孤負吾丈一日舉再參馬祖被喝語師遂領旨見百丈章丈一日問師甚麼處去來曰大雄山下采菌子來丈曰還見大蟲麼師便作虎聲丈拈斧作斫勢師即打丈一摑丈吟吟而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口師曾散眾在洪州開元寺裴相國休一日入寺行次見壁畫問寺主這畫是什麼寺主曰高僧真儀公曰真儀可觀高僧何在寺主無對公曰此間有禪人否曰近有一僧投寺執役頗似禪者公遂請相見曰休適有一問諸德吝辭今請上人代酬一語師曰請相公垂問公舉前語師朗聲曰裴休公應諾師曰在什麼處公當下知旨如獲髻珠延入府署執弟子禮裴休一日請師至郡以所解一編示師師接置於座略不披閱良久曰會麼裴曰未測師曰若便恁麼會去猶較些子若也形於紙墨何有吾宗裴休乃贈詩一章曰自從大士傳心印額有圓珠七尺身掛錫十年棲蜀水浮盃今日渡漳濱一千龍象隨高步萬里香花結勝因擬欲事師為弟子不知將法付何人師亦無喜色唐大中年師終於本山勅諡斷際禪師塔曰廣業六祖下第五世臨濟宗初祖鎮州臨濟義玄禪師曹州南華邢氏子幼負出塵之志及落髮進具便慕禪宗初在黃檗會中行業純一時睦州為第一座乃問上座在此多少時師曰三年州曰曾參問否師曰不曾參問不知問個甚麼州曰何不問堂頭和尚如何是佛法的的大意師便去問聲未絕檗便打師下來州曰問話作麼生師曰某甲問聲未絕和尚便打某甲不會州曰但更去問師又問檗又打如是三度問三度被打師白州曰早承激勸問法累蒙和尚賜棒自恨障緣不領深旨今且辭去州曰汝若去須辭和尚了去師禮拜退州先到黃檗處曰問話上座雖是後生却甚奇特若來辭方便接伊已後為一株大樹蔭覆天下人去在師來日辭黃檗檗曰不須他去秪往高安灘頭參大愚必為汝說師到大愚愚曰甚處來師曰黃檗來愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來這裏問有過無過師於言下大悟乃曰元來黃檗佛法無多子愚搊拄曰這尿牀鬼子適來道有過無過如今却道黃檗佛法無多子爾見個甚麼道理速道速道師於大愚肋下築三拳愚拓開曰汝師黃檗非干我事師辭大愚却回黃檗檗見便問這漢來來去去有甚了期師曰秖為老婆心切便人事了檗問甚處去來師曰昨蒙和尚慈旨令參大愚去來檗曰大愚有何言句師舉前話檗曰大愚老漢饒舌待來痛與一頓師曰說甚待來即今便打隨後便掌檗曰這風顛漢來這裏捋虎鬚師便喝檗喚侍者曰引這風顛漢參堂去溈山舉問仰山曰臨濟當時得大愚力得黃檗力仰山云非但騎虎頭亦解把虎尾師在僧堂裏睡黃檗入堂見以拄杖打板頭一下師舉首見是檗却又睡檗又打板頭一下却往上間見首座坐禪乃曰下間後生却坐禪汝在這裏妄想作麼座曰這老漢作甚麼檗又打板頭一下便出去溈山舉問仰山秪如黃檗意作麼生仰云兩彩一賽師栽松次檗曰深山裏栽許多松作甚麼師曰一與山門作境致二與後人作標榜道了將钁頭𡎺地三下檗曰雖然如是子已喫吾三十棒了也師又𡎺地三下噓一噓檗曰吾宗到汝大興於世師後住鎮州臨濟學侶雲集一日謂普化克符二上座曰我欲於此建立黃檗宗旨汝且成褫我二人珍重下去三日後普化却上來問和尚三日前說甚麼師便打三日後克符上來問和尚三日前打普化作麼師亦打至晚小參曰有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪克符問如何是奪人不奪境師曰煦日發生鋪地錦嬰兒垂髮白如絲符曰如何是奪境不奪人師曰王令已行天下徧將軍塞外絕烟塵符曰如何是人境兩俱奪師曰并汾絕信獨處一方符曰如何是人境俱不奪師曰王登寶殿野老謳歌僧問如何是真佛真法真道乞師開示師曰佛者心清淨是法者心光明是道者處處無碍淨光是三即一皆是空名而無實有如真正作道人念念心不間斷自達摩大師從西土來祇是覔個不受人惑底人後遇二祖一言便了始知從前虛用工夫山僧今日見處與祖佛不別若第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧便問如何是第一句師曰三要印開朱點窄未容擬議主賓分曰如何是第二句師曰妙解豈容無着問漚和爭負截流機曰如何是第三句師曰但看棚頭弄傀儡抽牽全藉裏頭人乃曰大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會禪師曰有時一喝如金剛王寶劒有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議師便喝師應機多用喝會下參徒亦學師喝師曰汝等總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲這裏分得賓主麼汝且作麼生分若分不得已後不得學老僧喝上堂次兩堂首座相見同時下喝僧問師還有賓主也無師曰賓主歷然師召眾曰要會臨濟賓主句問取堂中二首座上堂僧出作禮師便喝僧曰老和尚莫探頭好師曰你道落在什麼處僧便喝又僧問如何是佛法大意師便喝僧作禮師曰你道好喝也無僧曰草賊大敗師曰過在什麼處僧曰再犯不容人天眼目有師便喝一句師曰大眾要會臨濟賓主句問取堂中二禪客師會下有同學二人相問一云離却中下二機請兄道一句子一云擬問則失一云與麼則禮拜老兄去也一云這賊師聞乃陞堂云要會臨濟賓主句問取堂中二禪客便下座示眾云參學之人大須仔細如賓主相見便有言論往來或應物現形或全軆作用或把機權喜怒或現半身或乘獅子或乘象王如有真正學人便喝先拈出一個膠盆子善知識不辨是境便上他境上作模作樣便被學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物秖隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一個清淨境出知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識更與安一重枷鎖學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正示眾云我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子上堂赤肉團上有一無位真人常從汝等面門出入未證據者看看時有僧出問如何是無位真人師下禪狀把住云道道其僧擬議師托開云無位真人是甚麼乾屎橛便皈方丈後雪峰聞乃曰臨濟大似白拈賊咸通八年丁亥傳燈錄云咸通七年丙戌四月十日將示寂乃說傳法偈曰沿流不止問如何真炤無邊說似他離相離名人不稟吹毛用了急須磨復謂眾曰吾滅後不得滅却吾正法眼藏三聖出曰爭敢滅却和尚正法眼藏師曰已後有人問爾向他道甚麼聖便喝師曰誰知吾正法眼藏向這瞎驢邊滅却言訖端坐而逝佛紀一八四九年塔全身于府西北隅諡慧照禪師塔曰澄靈臨濟下第一世魏府興化存獎禪師在三聖會裏為首座常曰我向南方行脚一遭拄杖頭不曾撥着一個會佛法底人三聖聞得問曰爾具個什麼眼便恁麼道師便喝聖曰須是爾始得後大覺聞舉遂曰作麼生得風吹到大覺門裏來師後到大覺為院主一日覺喚院主我聞爾道向南方行脚一遭拄杖頭不曾撥著一個會佛法底爾憑個甚麼道理與麼道師便喝覺便打師又喝覺又打師來日從法堂過覺召院主我直下疑爾昨日這兩喝師又喝覺又打師再喝覺又打師曰某甲於三聖師兄處學得個賓主句總被師兄折倒了也願與某甲個安樂法門覺曰這瞎漢來這裏納敗缺脫下衲衣痛打一頓師於言下薦得臨濟先師於黃檗處喫棒底道理師後開堂日拈香曰此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師僧問四面八方來時如何師曰打中間底僧便禮拜師曰昨日赴個村齋中途遇一陣卒風暴雨却向古廟裏躲避得過禪師謂眾曰我只聞前廊下也喝後架裏也喝諸子汝莫盲喝亂喝直饒喝得興化向半天裏住却撲下來氣欲絕待興化蘇息起來向汝道未在何故我未曾向紫羅帳裏撒真珠與汝諸人虛空裏亂喝作甚麼師謂克賓維那曰汝不久為唱導之師賓曰我不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賓維那法戰不勝罰錢五貫設饡飯一堂次日師自白椎曰克賓維那法戰不勝不得喫飯即便出院示眾曰若是作家戰將便請單刀直入更莫如何若何有旻德禪師出禮拜起便喝師亦喝德又喝師亦喝德禮拜歸眾師曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用師見同叅來纔上法堂師便喝僧亦喝師又喝僧亦喝師近前拈棒僧又喝師曰儞看這瞎漢猶作主在僧擬議師直打下法堂侍者請問適來那僧有甚觸忤和尚師曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到這裏却去不得似這般瞎漢不打更待何時僧禮拜後唐莊宗車駕幸河北回至魏府行宮詔師問曰朕收中原獲得一寶未曾有人酬價師曰請陛下寶看帝以兩手舒幞頭脚師曰君王之寶誰敢酬價莊宗大悅賜紫衣師號師皆不受乃賜馬師乘馬忽驚墜傷足師喚院主與我做個木拐子主做了將來師接得遶院行問僧曰汝等還識老僧麼曰爭得不識和尚師曰𨁸脚法師說得行不得又至法堂令維那聲鍾集眾師曰還識老僧麼眾無對師擲下拐子端然而逝諡廣濟大師塔曰通寂臨濟下第二世汝州南院慧顒禪師亦曰寶應上堂云赤肉團上壁立千仞時有僧問赤肉團上壁立千仞豈不是和尚道師曰是其僧乃掀禪牀師曰這瞎驢便棒師問僧近離什麼處曰襄州師曰來作什麼曰特來禮拜和尚師曰恰遇寶應老不在僧便喝師曰向汝道不在又喝作什麼僧又喝師乃棒之其僧禮拜師曰這棒本分汝打我我且打汝三五棒要此話大行思明和尚未住西院時到叅禮拜後白曰別無好物人事從許州買得一口江西剃刀來獻和尚師曰汝從許州來什麼處得江西剃刀明把師手掐一下師曰侍者收取明拂袖而去師曰阿剌剌上堂曰諸方只具啐啄同時眼不具啐啄同時用時有僧便問如何是啐啄同時用師曰作家不啐啄啐啄同時失僧曰此猶未是某甲問處師曰汝問處又作麼生僧曰失師乃打之其僧不肯後於雲門會下聞別僧舉此語方悟旨却回參省師已圓寂遂禮風穴穴問汝當時問先師啐啄話後來還有省處也無僧曰已見個道理也曰作麼生僧曰某甲當時在燈影裏行照顧不著穴云汝會也臨濟下第三世汝州風穴延沼禪師餘杭人也姓劉氏幼不茹葷習儒典應進士一舉不遂乃出家依本州開元寺智恭披削受具習天台止觀年二十五謁鏡清未臻堂奧尋詣襄州華嚴院遇守廓侍者從南院來師心奇之因結為友遂默悟三玄旨要歎曰臨濟用處如是耶廓使更見南院師叅南院入門不禮拜院曰入門須辨主師曰端的請師分院於左膝拍一拍師便喝院於右膝拍一拍師又喝院曰左邊一拍且置右邊一拍作麼生師曰瞎院便拈棒師曰莫盲枷瞎棒奪打和尚莫言不道院擲下棒曰今日被黃面浙子鈍置一塲傳燈作上門羅織師曰和尚大似持鉢不得乍道不饑院曰闍黎曾到此間麼師曰是何言歟院曰老僧好好相借問師曰也不得放過便下叅眾了却上堂頭禮謝院曰闍黎曾見什麼人來師曰在襄州華嚴與廓侍者同夏院曰親見作家來院問南方一棒作麼商量師曰作奇特商量師却問和尚此間一棒作麼商量院拈拄杖曰棒下無生忍臨機不見師師於言下大徹玄旨遂依止六年一日南院請師曰汝乘願力來荷大法非偶然也問曰汝聞臨濟將終時語否曰聞之院曰臨濟曰誰知吾正法眼藏向這瞎驢邊滅却渠平生如獅子見即殺人及其將死何故屈膝妥尾如此師對曰密付將終全主即密又問三聖如何亦無語乎師對曰親承入室之真子不同門外之遊人南院頷之後唐長興二年師至汝水風穴寺時寺已摧殘惟草屋數椽師入駐錫日乞村落夜燃松脂單丁者七年檀信乃為新之遂成叢林後晉天福二年上元開法上堂祖師心印狀似鐵牛之機去即印住住即印破秖如不去不住印即是不印即是還有人道得麼時有盧陂長老出問學人有鐵牛之機請師不印師曰慣釣鯨鯢澄巨浸卻憐蛙步𩥇泥沙陂注思師喝曰長者何不進語陂擬議師便打一拂子曰還記得話頭麼陂擬開口師又打一拂子時有牧主曰信知佛法與王法一般師曰見什麼道理主曰當斷不斷反招其亂師便下座上堂若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安帖於此明得闍黎無分全是老僧於此不明老僧卻是闍黎闍黎與老僧亦能悟卻天下人亦能瞎卻天下人欲識闍黎麼右邊一拍曰這裏是欲識老僧麼左邊一拍曰這裏是示眾先師曰欲得親切莫將問來問會麼問在答處答在問處雖然如是有時問不在答處答不在問處汝若擬議老僧在汝脚跟底大凡參學眼目直須臨機大用現前勿自拘於小節設使言前薦得猶為滯殼迷封句下精通未免觸途狂見應是向來依他作解明昧兩歧與汝一切掃卻直教個個如獅子兒吒呀地對眾證據哮吼一聲壁立千仞誰敢正眼覷著覷著即瞎卻渠眼僧問如何是清淨法身師曰金沙灘頭馬郎婦僧問如何是佛師曰杖林山下竹根鞭真淨文頌云杖林山下竹根鞭水在深溪月在天良馬不知何處去阿難依舊世尊前宋開寶六年八月旦日登座說偈曰道在乘時須濟物遠方來慕自騰騰他年有叟情相似日日香煙夜夜燈至二十五日跏趺而化佛紀二年前一日手書別檀越閱世七十有八坐五十有九夏臨濟下第四世汝州首山省念禪師萊州人也姓狄氏受業於本郡南禪寺纔具尸羅徧游叢席常密誦法華經眾目為念法華也晚於風穴會中充知客一日侍立次穴乃垂涕告之曰不幸臨濟之道至吾將墜於地矣師曰觀此一眾豈無人耶穴曰聰敏者多見性者少師曰如某者如何穴曰吾雖望子之久猶恐耽着此經不能放下師曰此亦可事願聞其要穴遂上堂舉世尊以青蓮目顧視大眾乃曰正當恁麼時且道說個甚麼若道不說而說又是埋沒先聖且道說個甚麼師乃拂袖下去穴擲下拄杖歸方丈侍者隨後請益曰念法華因甚不祗對和尚穴曰念法華會也次日師與真園頭同上問訊次穴問真曰作麼生是世尊不說說真曰鵓鳩樹頭鳴穴曰汝作許多癡福作麼何不體究言句又問師曰汝作麼生師曰動容揚古路不墮悄然機穴謂真曰汝何不看念法華下語又一日穴陞座顧視大眾師便下去穴即歸方丈白兆楚和尚至汝州宣化風穴令師往傳語纔相見提起坐具便問展即是不展即是兆曰自家看取師便喝兆曰我曾親近知識來未嘗輒敢恁麼造次師曰草賊大敗兆曰來日若見風穴和尚待一一舉似師曰一任一任不得忘卻師乃先回舉似風穴穴曰今日又被伱收下一員草賊師曰好手不張名兆次日纔到相見便舉前話穴曰非但昨日今日和贓捉敗師於是名振四方學者望風而靡開法首山師示眾曰識得拄杖子行脚事畢嘗作綱宗偈曰咄哉拙郎君巧妙無人識打破鳳林關著靴水上立咄哉巧女兒攛梭不解織看他鬪雞人水牛也不識背陰山子向陽多南來北往意如何若人問我西來意東海東面有新羅淳化三年十二月四日午時上堂說偈曰今年六十七老病隨緣且遣日今年記卻來年事來年記著今朝日至四年月日佛紀二二年無爽前期上堂辭眾仍說偈曰諸子謾波波過卻幾恒河觀音指彌勒文殊不柰何良久曰白銀世界金色身情與無情共一真明暗盡時都不照月輪午後示全身日午後泊然示寂闍維得五色舍利塔于首山臨濟下第五世汾州太子院善昭禪師太原俞氏子剃髮受具杖策游方所至少留隨機叩發歷叅知識七十一員後到首山問百丈卷席意旨如何山曰龍袖拂開全體現曰師意如何山曰象王行處絕狐蹤師於言下大悟拜而起曰萬古碧潭空界月再三撈摝始應知有問者曰見何道理便爾自肯師曰正是我放身命處淳化四年首山歿西河道俗千餘人遣僧契聰迎請住持汾州太平寺太子院師既至宴坐一榻足不越閫者三十年天下道俗仰慕不敢名皆曰汾州龍德府尹李侯與師有舊請師主承天使者三至不赴使者受罰復至曰必得師俱往不然有死而已師曰老病業已不出山偕往當先後之何必俱耶使者曰師諾則先後惟所擇師乃令設饌俶裝告眾曰老僧去也誰人隨得一僧出曰某甲隨得師曰汝日行幾里曰五十里師曰汝隨我不得又一僧出曰某甲日行七十里師曰汝亦隨我不得侍者出曰某甲隨得但和尚到處即到師曰汝乃隨得老僧復顧使者曰吾先行矣停箸而化侍者即立化於側閱世七十有八坐五十六夏臨濟下第六世潭州石霜楚圓慈明禪師出全州清湘李氏少為書生年二十二依城南湘山隱靜寺得度其母有賢行使之遊方至汾湯經二年昭公未許入室師詣昭昭揣其志必詬罵使令者或毀詆諸方及有所訓皆流俗鄙事師一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事不明失出家之利語未卒昭公熟視罵曰是惡知識敢裨販我怒舉杖逐之師擬伸救昭公掩其口師大悟曰乃知臨濟道出常情服侍七年辭去永首座與師同辭汾湯永未盡其妙從師二十年終不脫灑一夕圍鑪深夜師以火筯敲炭曰永首座永首座永咄曰野狐精師乃指永曰訝郎當漢又恁麼去也永乃豁然示眾以拄杖擊禪牀一下云大眾還會麼不見道一擊忘所知更不暇修治諸方達道者咸言上上機香嚴恁麼悟去分明悟得如來禪祖師禪猶未夢見在且道祖師禪有甚長處若向言中取則誤賺後人直饒棒下承當孤負先聖萬法本閑惟人自鬧所以山僧居福嚴只見福嚴境界晏起早眠有時雲生碧嶂有時月落寒潭音聲鳥飛鳴般若臺前娑羅花香散祝融峯畔把瘦笻坐盤陀石與五湖衲子時話玄微灰頭土面住興化只見興化家風迎來送去門連城市車馬駢填漁唱瀟湘猿啼岳麓絲竹歌謠時入耳復與四海高人日談禪道歲月都忘且道居深山住城郭還有優劣也無試道看良久云是處是慈氏無門善財上堂道吾師所住院名打鼓四大部洲同叅拄杖橫也挑括乾坤大地鉢盂覆也盖却恒沙世界且問諸人向甚麼處安身立命若也知得向北俱盧洲喫粥喫飯若也不知長連上喫粥喫飯示眾一切聖賢皆以無為法而有差別前是按山後是主山那個是無為法良久云向下文長付在來日師平生以事事無礙行心凡聖所不能測室中晏坐橫刀水盆之上旁置草鞋使來叅扣者下語無有契其機者寶元戊寅李駙馬遵勗遣使邀師曰海內法友惟師與楊億字大年耳大年棄我而先僕年來頓覺衰落忍死以一見公仍以書抵潭帥敦邀之師惻然與侍者舟而東下舟中作偈曰長江行不盡帝里到何時既得凉風便休將艣棹施至京師與李公會月餘而李公果歿臨終畫一圓相又作偈獻師世界無依山河匪礙大海微塵須彌納芥拈起幞頭解下腰帶若覔死生問取皮袋師曰如何是本來佛性公曰今日熱如昨日隨聲便問師臨行一句作麼生師曰本來無罣礙隨處任方圓公曰晚來倦甚更不答話師曰無佛處作佛公於是泊然而逝仁宗皇帝尤留神空宗聞李公之化與師問答嘉歎久之師哭之慟臨壙而別有旨賜官舟南歸中途謂侍者曰我忽得風痺疾視之口吻已喎斜侍者以足頓地曰當柰何平生呵佛罵祖今已爾師曰無憂為汝正之以手整之如故曰而今而後不鈍置汝遂以明年至興化正月初五日佛紀二六六年沐浴辭眾跏趺而逝閱世五十有四坐夏三十有二李公之子銘志其行於興化而藏全身於石霜師初在汾陽陽一日托以夢亡父母命庫堂設酒肉為祀祀畢集眾僧令食咸不聽陽因獨自飲啖眾曰酒肉僧豈堪師法盡散去惟師與大愚六七人存陽翌日上堂云許多閒神野鬼秖消一盤酒肉斷送去了也法華經云此眾無枝葉惟有諸真實下座臨濟下第七世袁州楊岐方會禪師宜春冷氏子少警敏不事筆硯及出家閱經典輒自神會折節叅老宿慈明自南源徙道吾石霜師皆佐之總院事依之雖久然未有省發每咨叅明曰庫司事繁且去他日又問明曰監寺異日兒孫徧天下在何用忙為一日明適出雨忽作師偵之小徑既見遂搊住曰這老漢今日須與我說不說打爾去明曰監寺知是般事便休語未卒師大悟即拜於泥塗問曰狹路相逢時如何明曰爾且躲避我要去那裏去師歸來日具威儀詣方丈禮謝明呵曰未在慈明飯罷恒山行禪者問道多失所在師闞其出未遠即撾鼓集眾慈明怒數曰少叢林暮而陞座何從得此規繩乎師曰汾陽乃晚叅也一日明上堂師出問幽鳥語喃喃辭雲入亂峯時如何明曰我行荒艸裏汝又入深村師曰官不容針更借一問明便喝師曰好喝明又喝師亦喝明連喝兩喝師禮拜明曰此事是個人方能擔荷師拂袖便行一日慈明問師馬祖見讓師便悟去且道迷在甚麼處師曰要悟即易要迷即難圓悟勤頌云要悟即易要迷即難絲毫透不盡咫尺隔千山說食終不飽著衣方免寒憶昔五臺曾有語前三三與後三三問如何是佛師曰三脚驢子弄蹄行曰莫秖這便是麼師曰湖南長老師室中問僧栗棘蓬爾作麼生吞金剛圈爾作麼生透一日七人新到師問陣勢既圓作家戰將何不出陣與楊岐相見僧以坐具便打師曰作家僧又打師曰一坐具兩坐具又作麼生僧擬議師背面立僧又打師曰爾道楊岐話頭落在甚麼處僧指面前曰在這裏師曰三十年後遇明眼人不得錯舉好且坐喫茶師於皇祐改元示寂佛紀二七六年塔於雲盖洪覺範曰臨濟七傳而得石霜圓圓之子一為黃龍南一為楊岐會南之設施如坐四達之街聚珍怪百物而鬻之遺簪墮珥隨所探焉駸駸末流冒其氏者未可一二數也會乃如玉人之治璠璵珷砆廢矣故其子孫皆光明照人克世其家盖碧落碑無贗本也臨濟下第八世舒州白雲守端禪師衡陽葛氏子幼事翰墨冠依茶陵郁禪師披削往叅楊岐岐一日忽聞受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎻今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不寐黎明咨詢之適歲暮岐曰汝見昨日打敺儺者麼曰見岐曰汝一籌不及渠師復駭曰何謂也岐曰渠愛人笑汝怕人笑師大悟示眾若端的得一回汗出來也向一莖草上便現瓊樓玉殿若未端的得一回汗出縱有玉殿瓊樓却被一莖草盖却且道作麼生得汗出去良久云自有一雙竆相手不曾容易舞三臺僧問智不到處切忌道著道著時如何師曰風吹日炙曰恁麼則無處容身去也師曰碓擣磨磨曰官不容針私通車馬師曰可貴可賤僧彈指一下師曰恰是僧吐舌師曰家貧猶自可路貧愁殺人僧呵呵大笑師曰放過一著臨濟下第九世蘄州五祖法演禪師綿州鄧氏子年三十五始棄家祝髮受具往成都習惟識百法論因聞菩薩入見道時智與理冥境與神會不分能證所證西天外道嘗難比丘曰既不分能證所證却以何為證無能對者外道貶之令不鳴鍾鼓及披袈裟唐三藏玄奘法師至彼救此義曰如人飲水冷煖自知乃通其難師曰冷煖則可知矣如何是自知底事遂往質本講曰不知自知之理如何講師莫䟽其問但誘曰汝欲明此當往南方扣傳佛心宗者師即負笈出關所見尊宿無不以此咨决所疑終不破洎謁圓照本禪師古今因緣會盡惟不會僧問興化四面八方來時如何化云打中間底僧作禮化云我昨日赴個村齋中途遇一陣卒風暴雨却向古廟裏避得過請益於本本云此是臨濟下因緣須是問他家兒孫始得師遂謁浮山遠禪師請益前話遠云我有個比喻說似爾爾一似個三家村裏賣柴漢子把個匾擔向十字街頭立地問人中書堂今日商量什麼事師默計云若如此大故未在遠一日語師曰吾老矣恐虛度子光陰可往依白雲此老雖後生吾未識面但見其頌臨濟三頓棒話有過人處必能了子大事臨濟三度問黃檗佛法的的大意三度被打話具見臨濟章白雲端頌云一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時忝意氣不風流處也風流師然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事一日有僧見磨轉遽指以問師曰此神通耶法爾耶師褰衣旋磨一匝僧無語未幾雲至語師曰有數禪客自廬山來皆有悟入處教伊說亦說得有來由舉因緣問伊亦明得教伊下語亦下得祗是未在師於是大疑私自計曰既悟了說亦說得明亦明得如何未在遂叅究累日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師亦一笑而已師後曰吾因兹出一身白汗便明得下載清風雲一日示眾曰古人道如鏡鑄像像成後鏡在甚麼處眾下語不契舉以問師師近前問訊曰也不較多雲笑曰須是道者始得乃命分座開示方來問如何是臨濟下事師曰五逆聞雷曰如何是雲門下事師曰紅旗閃爍曰如何是曹洞下事師曰馳書不到家曰如何是溈仰下事師曰斷碑橫古路僧禮拜師曰何不問法眼下事曰留與和尚師曰巡人犯夜問如何是佛師曰露胸跣足曰如何是法師曰大赦不放曰如何是僧師曰釣魚船上謝三郎徑山宗杲云此三轉語一轉具三玄三要四科揀四賓主洞山五位雲門三句百千法門無量妙義若人揀得許你具一隻眼圓悟一日請益臨濟四賓主怎生師曰也祗是個程限是什麼閑事又云我這裏却似馬前相撲倒便休師謂圓悟爾也儘好只是有些病悟再三請問不知某有甚麼病師云只是禪忒多悟云本為叅禪因甚麼却嫌人說禪師云只似尋常說話時多少好時有僧便問因甚嫌人說禪師云惡情悰三佛佛果克勤佛鑑慧懃佛眼清遠一日相謂曰老和尚秪是乾爆爆地往往說心說性不得因請益佛身無為不墮諸數師曰譬如清淨摩尼寶珠映於五色五色是數摩尼是佛身圓悟佛果禪師謂二老曰他大段會說我輩說時費多少工夫他秪一兩句分明是個老太蟲師聞之乃曰若說心說性便是惡口又曰猫有歃血之功虎有起屍之德所謂驅耕夫之牛奪饑人之食若不如是盡是弄泥團漠三佛侍師於一亭上夜話及歸燈已滅師於暗中曰各人下一轉語佛鑑曰彩鳳舞丹霄佛眼曰鐵虵橫古路佛果曰看脚下師曰滅吾宗者克勤耳開聖覺初叅長蘆夫鐵久無所得聞師法道徑造席下一日室中問云釋迦彌勒猶是他奴且道他是阿誰覺云鬍張三黑李四師然其言時圓悟和尚為座元師舉此語似之悟云好則好恐未實不可放過更於言下搜看次日入室垂問如前覺云昨日向和尚道了師云道甚麼覺云鬍張三黑李四師云不是不是覺云和尚為甚昨日道是師云昨日是今日不是覺於言下大悟覺後出世住開聖見蘆法席大盛乃嗣夫不原所得拈香時忽覺胷前如搗遂於痛處發癰成竅以乳香作餅塞之久而不愈竟卒示眾佛祖生冤家悟道染泥土無為無事人聲色如聾瞽且道如何即是恁麼也不得不恁麼也不得恁麼不恁麼總不得忽有個出來道恁麼也得不恁麼也得恁麼不恁麼總得秪向伊道我也知爾向鬼窟裏作活計小叅舉陸亘大夫問南泉弟子家中有一片石也曾坐也曾臥擬鐫作佛得麼泉云得陸曰莫不得麼泉云不得大眾夫為善知識須明擇為甚麼他人道得也道得他人道不得也道不得還知南泉落處麼白雲不惜眉毛與汝注破得又是誰道來不得又是誰道來汝若更不會老僧今夜為汝作個樣子乃舉手云將三界二十八天作個佛頭金輪水際作個佛脚四大洲作個佛身雖然作此佛兒子了汝諸人又在那裏安身立命大眾還會也未老僧作第二個樣子去也將東弗於逮此下並四洲名作一個佛南贍部洲作一個佛西瞿耶尼作一個佛北鬱單越作一個佛草木叢林是佛蠢動含靈是佛既恁麼又喚甚麼作眾生還會也未不如東弗於逮還他東弗於逮南贍部洲還他南贍部洲西瞿耶尼還他西瞿耶尼北鬱單越還他化鬱單越草木叢林還他草木叢林蠢動含靈還他蠢動含靈所以道是法住法位世間相常住既恁麼汝又喚甚麼作佛還會麼忽有個漢出來道白雲休寐語大眾記取這一轉示眾將四大海水為一枚硯須彌山作一管筆有人向虛空裏寫祖師西來意五字太平太平師自謂也下座大展坐具禮拜為師若寫不得佛法無靈驗有麼有麼便下座大眾散師高聲云侍者侍者應諾師曰收取坐具復問侍者云收得坐具麼侍者提起坐具師曰我早知汝恁麼也上堂說佛說法拈搥竪拂白雲萬里德山入門便棒臨濟入門便喝白雲萬里然後恁麼也不得不恁麼也不得恁麼不恁麼總不得也則白雲萬里或有個漢出來道長老爾恁麼道也則曰白雲萬里這個說話喚作矮子看戲隨人上下三十年後一好笑且道笑個什麼笑白雲萬里上堂汝等諸人見老和尚鼓動脣吻竪起拂子便作勝解及乎山禽聚集牛動尾巴將作等閒殊不知簷聲不斷前旬雨電影還連後夜雷上堂山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了仔細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓長史即弄傀儡之人他道老和尚看便了問什麼姓大眾被他一問直得無言可對無理可伸還有人為山僧道得麼昨日那裏落節今日這裏拔本示眾云吾本來兹土傳法救迷情一花開五葉結果自然成達磨大師信脚來信口道後代兒孫多成計較要會開花結果處麼鄭州梨青州棗萬物無過出處好示眾云真如凡聖皆是夢言佛及眾生並為增語引盤山禪師語或有人出來道盤山老聻但向伊道不因紫陌花開早爭得黃鶯下柳條若更問五祖老聻自云諾惺惺着師云三乘人出三界獄小果必藉方便如穴地穿壁及自天窓中出惟得道菩薩從初入地獄先與獄子不相疑一切如常一日寄信去覔得酒肉與獄子喫至大醉取獄子衣服行纏結束自身却將自己破衣服與獄子移枷在獄子項上坐在牢裏却自手捉獄子藤條公然從大門出去叅禪人須是恁麼始得師云我這裏禪似個什麼如人家會作賊有一兒子一日云我爺老後我却如何養家須學個事業始得遂白其爺爺云好得一夜引至巨室穿窬入宅開櫃乃教兒子入其中取衣帛兒纔入櫃爺便閉却復鎻了故於廳上扣打令其家驚覺乃先尋穿窬而去其家人即時起來點火燭之知有賊但已去了其賊兒在櫃中私自語曰我爺何故如此正悶悶中却得一計作鼠聲其家遣婢點燈開櫃櫃纔開了賊兒聳身吹滅燈推倒婢走出其家人趕至中路賊兒忽見一井乃推巨石投井中其人却於井中覔賊兒直走歸家問爺爺云爾休說爾怎生得出兒具說上件意爺云爾恁麼儘做得師垂語曰譬如水牯牛過窓欞頭角四蹄都過了因甚尾巴過不得高峰妙頌云等閑放出這牛兒頭角分明舉似誰若向尾巴尖上會新羅鷂子過多時師一日持錫遶廊曰莫有屬牛人問命麼眾皆無語師乃曰孫臏今日開鋪更無一人垂顧可憐三尺龍鬚喚作尋常破布師常展手問僧曰如何喚作手師室中常問僧倩女離魂那個是真的崇寧三年六月二十五日上堂辭眾曰趙州和尚有末後句爾作麼生會試出來道看若會得去不妨自在快濶如或未然這好事作麼說良久曰說即說了也秪是諸人不知要會麼富嫌千口少貧恨一身多珍重時山門有土木之役師躬往督之誡曰汝等好作息吾不復來矣歸方丈淨髮澡浴旦日吉祥而逝佛紀二一三一年年八十餘先是五祖弘忍遺記曰吾滅後可留真身吾手啟而舉吾再出矣師住山時塑手泥淶中裂相去容匕眾咸異之師嘗拜塔以手指云當時與麼全身去今日重來記得無復云以何為驗以此為驗遂作禮及將亡之夕山摧石隕四十里內巖谷震吼闍維設利如雨塔於東山之南臨濟下第十世成都府昭覺寺克勤佛果禪師彭州駱氏子世宗儒師兒時日記千言偶遊妙寂寺見佛書三復悵然如獲舊物曰予殆過去沙門也即去家依自省祝髮從文照通講說又從敏行受楞嚴俄得病濱死歎曰諸佛涅槃正路不在文句中吾欲以聲求色見宜其無以死也遂棄去至真覺勝禪師之席勝方創臂出血指示師曰此曹溪一滴也師瞿然良久曰道固如是乎即徒步出蜀遍叅諸方最後見五祖盡其機用祖皆不諾乃謂祖強移換人出不遜語忿然而去祖曰待爾著一頓熱病打時方思量我在師到金山染傷寒困極以平日見處試之無得力者追繹五祖之言乃自誓曰我病稍間即歸五祖病痊尋歸祖一見而喜令即叅堂便入侍者寮方半月會部使者觧印還蜀詣祖問道祖曰提刑少年曾讀小艷詩否有兩句頗相近頻呼小玉元無事秪要檀郎認得聲提刑應喏喏祖曰且仔細師適歸侍立次問曰聞和尚舉小艷詩提刑會否祖曰他秪認得聲師曰秪要檀郎認得聲他既認得聲為什麼却不是祖曰如何是祖師西來意庭前柏樹子聻師忽有省遽出見鷄飛上闌干鼓翅而鳴復自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香銷錦繡幃笙歌叢裏醉扶歸少年一段風流事秪許佳人獨自知祖曰佛祖大事非小根劣品所能造詣吾助汝喜祖徧謂山中耆舊曰我侍者叅得禪也由此所至推為上首僧問如何是初日分以恒河等身布施僧問初中後日分以恒河沙等身布施者即金剛經語也師曰大海若不納百川應倒流曰如何是中日分以恒河沙等身布施師曰現成公案曰如何是後日分以恒河沙等身布施師曰盡未來際一時收僧問最初威音王佛末後樓至佛未審威音叅見什麼人師曰叅見無面目底僧云只如無面目人復見阿誰師云狂狗趁塊僧云爭柰拄杖子在學人手裏師云爾試用看僧云到這裡直得無言可說無理可伸師云只得七成僧云可謂師承不立遞代相傳師云一刀截斷僧云既然如是和尚何用更覔白雲師云爾道威音樓至佛即今在什麼處僧云一串穿却師云頂𩕳上更添一隻眼始得祈雨上堂僧問萬里不掛片雲時如何師曰老僧也怪伊曰青天也須喫棒又作麼生師曰行遣早遲也曰過在什麼處師曰彼此住山人更不重註破曰好雨下時却不下不天晴處却天晴師曰適來爾向什麼處去來曰乍捲乍舒去也師曰脚跟下更與一棒直得雨似盆傾曰總不與麼時如何師曰捩轉鼻孔曰忽然應時應節又作麼生師曰山前禾麥熟盡唱太平歌示眾云通身是眼見不到通身是耳聞不及通身是口說不著通身是心鑑不出通身即且置或若無眼作麼生見無耳作麼生聞無口作麼生說無心作麼生鑑若向這裏撥得一線路便與古佛同叅且道叅甚麼人示吳教授祖佛以神道設教惟務明心達本况人人具足各各圓成但以迷妄背此本心流轉諸趣枉受輪廻而其根本初無增減諸佛以為一大事因緣而出盖為此也祖師以單傳密印而來亦以此也若是宿昔韞大根利智便能於脚跟直下承當不從他得了然自悟廓徹靈明廣大虛寂從無始來亦未曾間斷清淨無為妙圓真心不為諸塵作對不與萬法為侶常如十日並照離見超情截却生死浮幻如金剛王堅固不動乃謂之即心即佛更不外求惟了自性頓時與佛祖契合到無疑之地把得住作得主可不是徑截大解脫耶探究此事要透生死豈是小緣應當猛利誠志信重如救頭然始有少分相應多見叅問之士世智聦明只圖資談柄廣聲譽以為高上趣向務以勝人但增益我見如以油救火其𦦨益熾直到臘月三十日此謂死日茫然謬亂殊不得纖毫力良由最初已無正因所以末後勞而無功是故古德教人叅涅槃堂裏禪誠有旨也生死之際處之良不易惟大達超證之士奮利根勇猛一徑截斷則無難然此段雖由自己根力亦假方便於常時些小境界中轉得行打得徹不存解不立見凜然全軆現成踐履將去養得純熟到緣謝之時自然無怖畏只有清虛瑩徹無一法可當情如懸崖撒手棄捨得無留戀一念萬年萬年一念覔生了不可得豈有死也是故古德坐脫立亡行化倒蛻能得勇健皆是平昔淘汰得淨潔香林四十年得成一片湧泉四十年尚有走作石霜勸人休去歇去古廟裏香爐去永嘉云體即無生了本無速業業兢兢念兹在兹方得無碍自在既捨生之後得意生身隨意而生曰意生身隨自意趣後報悉以理遣不由業牽所謂透脫生死耶示尼修道者云究竟佛亦不立喚甚麼作眾生菩提亦不立喚甚麼作煩惱翛然永脫應時納祜欲得親切第一不用求求而得之已落解會休歇到一念不生處即是透脫不墮情塵不居意想逈然超絕則徧界不藏物物頭頭渾成大用一一皆從自己胷襟流出古人謂之運出自己家財一得永得受用無窮似大死人已絕氣息到本分地上大休大歇口鼻眼耳初無相知手足項背各不相到然後向寒灰死火上頭頭上明枯木朽株間物物斯照示蔣待制云若具大根器不必看古人言句公案但只從朝起正却念靜却心凡所指呼作為一番更提起審詳看從何處起是個甚物作為得如許多當塵緣中一透一切諸緣靡不皆是何待撥剔即此便可超宗越格法華經云佛子住此地即時佛受用經行及坐臥常在於其中解制小叅師云收因結果慎末護初一段因緣此時周備聖賢窠窟生死根株一鎚擊碎一刀截斷若是通方作者舉著知歸後進初機如何湊泊秪如生佛未分空刼已前威音王那邊還有結制解制也無雖然到這裏直饒千聖出頭來也須目瞪口呿那邊即且置只如今燈燭交光坐立儼然高者是天厚者是地山是山水是水有是有無是無長是長短是短正當恁麼時與威音王已前空刦那畔是同是別若向個裏倜儻分明目前無法胸中無心上不見諸聖下不見諸凡夫外不見一切境界內不見眼耳鼻舌身意便能通同一切說甚麼結制解制一鎚擊碎聖賢窠窟一刀截斷生死根株設使臨濟德山文殊普賢乃至無量無邊具大解脫有大威神無數河沙浩浩地來不消一揑且憑個什麼若不藍田射石虎幾乎誤殺李將軍示眾天堂地獄草芥人畜六類四生纖洪近遠無不皆真但為未徹根源底居常生心動念皆在塵勞業識中流轉未曾回光返照所以枉受輪迴不得受用示眾直下如懸崖撒手放身捨命捨却見聞覺知捨却菩提涅槃真如解脫若淨若穢一時捨却令教淨躶躶赤灑灑自然一聞千悟從此直下承當却來反觀佛祖用處與自己無二無別乃至閙市之中四民浩浩經商貿易以至於風鳴鳥噪皆與自己無別然後佛與眾生為一煩惱與菩提為一心與境為一明與暗為一是與非為一乃至千差萬別悉皆為一方可攪長河為酥酪變大地作黃金都盧渾成一片而一亦不立然後行是行坐是坐著衣是著衣喫飯是喫飯如明鏡當臺胡來胡現漢來漢現初不作計較而隨處現成示眾世尊三昧三昧譯云正定或云正受迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知商那和修三昧優波毱多不知既是各各不知何故却相傳授到這裏不妨誵訛處直是誵訛綿密處直是綿密師云父母未生已前淨躶躶赤灑灑不立一絲毫及乎投胎既生之後亦淨躶躶赤灑灑不立一絲毫然生於世墮在四大五蘊中多是情生翳障以身為礙迷却自心若是明眼人明了四大空寂五陰本虛知四大五陰中有個輝騰今古迥絕知見底一段事若能返照無第二人脚跟下淨躶躶赤灑灑六根門頭亦淨躶躶赤灑灑乃至山河大地窮虛空界盡無邊香水海亦淨躶躶赤灑灑恁麼說話莫是撥有皈無麼且喜沒交涉若撥有皈無杳杳冥冥墮在豁達空撥無因果處則永刧出他地獄三塗因果不得若真實徹澄到真淨明妙實際理地則四聖六凡三世諸佛天下祖師有情無情悉於是中流出顯現所以孚上座問鼓山晏國師道父母未生前鼻孔在什麼處山云即今生也在什麼處孚上座不肯云爾問我來山如前問孚但搖扇大凡叅請叅湏實叅見湏實見用湏實用父母未生前鼻孔在什麼處孚上座只搖扇莫是弄精魂麼須知有奇特事始得只如文殊初生見十吉祥異相須菩提初生室現空相善財初生湧出萬寶藏皆在此一大寶光中淨躶躶赤灑灑流出若只在杳杳冥冥墮在空空寂寂豈有如是奇特所以古人於生處見大奇特如世尊分手指於天地自云天上天下唯我獨尊若逢雲門大師尚不以為奇特直行衲僧正令後來老宿云雲門知恩方解報恩既知了方以衲僧本分事向逆順境界中行且道還當得麼若是平展商量則有向上事若據衲僧本分事上不直半文錢何故自家通霄路紹興五年八月己酉示微恙趺坐書偈遺眾投筆而逝佛紀二一六二年茶毘舌齒不壞設利五色無數塔于昭覺寺之側臨濟下第十一世平江府虎丘紹隆禪師初謁長蘆信禪師得其大略有傳圓悟即克勤禪師也語至者師讀之歎曰想酢生液雖未澆腸沃胃要且使人慶快第恨未聆警欬耳遂由寶峯依湛堂客黃龍扣死心禪師次謁圓悟一日入堂悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見悟曰頭上安頭師聞脫然契證悟叱曰見個甚麼師曰竹密不妨流水過悟肯之尋俾掌藏教有問悟曰隆藏主柔易若此何能為哉悟曰瞌睡虎耳臨濟下第十二世慶元天童應庵曇華禪師蘄之黃梅江氏子年十七投邑之東禪出家十八為大僧首叅隨州遂禪師染指法味徧歷江湖所至與諸老宿激揚無不投契後上雲居謁圓悟勤老人一見拊勞痛與提策迨勤入蜀命師往依彰教隆和尚於宣及隆移虎丘師為先馳未至半載通徹大法頓悟圓悟為人處機關深固運用恢廓言句超越道洽叢林師住歸宗時大慧杲在梅陽有僧傳師垂示語句杲見之極口稱歎後以偈寄師云坐斷金輪第一峯千妖百怪盡潛踪年來又得真消息報道楊岐正脉通其望重如此隆興改元六月十三日師臨示寂猶挂入室牌鉗錘大眾至夜分區處院事纖悉不遺門人以辭世偈為請師曰吾常笑諸方所為豈自為之耶奄然趺坐而逝佛紀二一九年塔全身於天童太白峯臨濟下第十三世慶元天童密庵咸傑禪師閩之福州人族姓鄭母夢廬山老僧入舍而生自幼頴悟出家後究心禪理不憚遊行徧叅知識後謁應庵華和尚於衢之明果華孤硬難入屢遭訶一日華問如何是正法眼師遽答曰破沙盆華頷之未幾辭回省親華送以偈曰大徹投機句當陽廓正門相從今四載徵詰洞無痕雖未付鉢袋氣宇吞乾坤卻把正法眼喚作破沙盆此行將省覲切忌便垛根吾有末後句待歸要汝遵師晚年退居天童之太白峯鉗錘訓誨學者雲集後無疾坐逝門人建塔於山之中峯臨濟下第十四世夔州臥龍破庵祖先禪師蜀之廣安王氏子從羅漢院德祥出家出峽依澧州德山涓公祝髮受具徧叩諸方叅密庵傑和尚傑即命師典客一日傑對旁僧舉不是風動不是幡動話師聞豁然大悟次日傑遇師於寮前謂師曰總不得作伎倆試露箇消息來師應聲曰方丈裏有客傑呵呵大笑傑遷蔣山師侍行親炙凡五載盡得旨要辭還蜀傑送以偈曰萬里南來川藞苴奔流度刃叩玄關頂門𣤩瞎金剛眼去住還同珠走盤嘉定四年六月九日師將示寂作手書別交游復書偈曰末後一句已成忉怛寫出人前千錯萬錯書訖端坐而逝佛紀二二三八年時客寓徑山遺命散骨林間住持石橋建塔於別峯之右壽七十六臘四十九臨濟下第十五世臨安徑山無準師範禪師生於蜀之梓潼雍氏九歲出家長遊成都坐夏請益坐禪之法於老宿堯首座堯首座曰禪是何物坐底是誰師晝夜體究一日如廁提前話有省明年往謁佛照光於育王光問曰何處人師曰劒州光曰帶得劍來麼師隨聲便喝光笑曰這烏頭子也亂做貧甚無貲剃髮人皆以烏頭子呼之久之復至靈隱時破庵居第一座同游石筍庵庵之道者請益曰胡孫子捉不住願垂開示先曰用捉他作麼如風吹水自然成紋師侍傍有省師奉朝命主徑山二十年大闡宗風為東南法席第一淳祐戊申秋師築室明月池上榜曰退耕明年三月十五日集兩序區畫後事親書遺表言笑如平時其徒以遺偈為請乃執筆疾書曰來時空索索去也赤條條更要問端的天台有石橋移頃而逝佛紀二二七六年停龕二七日上遣中使降香賜幣奉全身塟於正續之側師曾於徑山築室接待雲水額曰萬年正續塔曰圓照臨濟下第十六世袁州仰山雪巖祖欽禪師婺州人或云閩之漳州人初叅天目禮令看臨濟三頓棒話一日纔上蒲團忽覺有省後叅無準範和尚於徑山因鑄鍾令着語師呈偈曰通身只是一張口百煉爐中輥出來斷送夕陽歸去後又催明月上樓臺準即俾居侍司每遇入室舉起衲僧巴鼻佛祖爪牙更無下口處經十年偶佛殿前行擡眸見一枝古柏觸著向來所得境界和底一時颺下方始見無準老人立地處後舉示人曰正好與三十拄杖師住袁州仰山世稱法窟第一咸淳己巳元帝賜賚尊禮至元丁亥寄竹篦麈拂及綠水青山一同授記與高峰原妙以讚示曰上大今已無人雪巖可知禮也虛名塞破乾坤分付原妙侍者臨濟下第十七世湖州道塲及庵宗信禪師無機緣語句臨濟下第十八世湖州福源天湖石屋清珙禪師蘇州常熟人族姓溫首叅高峯示萬法歸一話萬法歸一一歸何處服勤三年無所發明因至建陽庵叅信和尚及庵宗信問何來師曰天目信曰有何指示師曰叅萬法歸一話信曰汝作麼生會師無語信曰此是死句什麼害熱病底教汝與麼師拜求指的信曰有佛處不得住無佛處急走過意旨如何師不契信曰這也是死句師不覺悚栗汗下一日入室信再理前話師曰上馬見路信呵曰汝在此幾多時猶作這個見解師發憤而去中途忽舉首見風亭豁然有省遂返語信曰某甲今日會得活句也信曰汝作麼生會師曰清明時節雨初晴黃鶯枝上語分明庵頷之後辭去信門送之曰他日與汝同龕廣教府馳檄請住當湖福源師堅臥不起往返至再師勉就入院上堂把住也鋒鋩不露放行也十字縱橫水雲深處相逢卻在千峰頂上千峰頂上相逢卻在水雲深處今朝福源寺裏開堂演法昨日天湖庵畔墾土耕烟所以道法無定相遇緣即宗可傳真寂之風仰助無為之化正與麼時如何拈拄杖卓一下九萬里鵰纔展翼十千年鶴便翱翔上堂一身清淨則多身清淨一世界清淨則多世界清淨東司頭臭氣佛殿裏蓬塵且道從什麼處得來以手掩鼻曰又是一點也上堂所聞不可聞所見不可見昨夜五更風吹落桃花片蒼苔面上生紅霞百鳥不來春爛漫至正間朝廷降香幣皇后賜金襴法衣有聞天湖之風吟天湖之詩者莫不心爽神慕以為真得古先德遺型一日示微疾遂集眾訣眾請後事師索筆書偈曰青山不着臭屍骸死了何須堀土埋顧我也無三昧火光前絕後一堆柴書畢擲筆而逝闍維舍利五色塔於天湖之原及庵塔右麓果符同龕之讖高麗國師太古愚公嘗侍師得旨王聞欽渴表達朝廷勑諡佛慈慧照禪師仍乞移文浙江請師舍利皈國供養臨濟下第十八世杭州淨慈平山處林禪師本郡仁和王氏子十七受具辭母叅方母為治裝越數日復還母誡之曰大凡學道當持不退轉心何趦趄乃爾耶師遂痛自警策遡濤江謁及庵信於金華信一見器之留居侍司一夕信撚紙沁膏以代燭舉示師曰龍潭吹滅汝作麼生師方擬答信遽以手掩其口從此悟入澧州德山宣鑑禪師簡州周氏子丱歲出家依年受具精究律藏於性相諸經貫通旨趣常講金剛般若時謂之周金剛常謂同學曰一毛吞海海性無虧纖芥投鋒鋒利不動學與無學惟我知焉後聞南方禪席頗盛師氣不平乃曰出家兒千刧學佛威儀萬刼學佛細行不得成佛南方魔子敢言直指人心見性成佛我當摟其窟穴滅其種類以報佛恩遂擔青龍䟽鈔出蜀至澧陽路上見一婆子賣餅因息肩買餅點心婆指擔曰這個是甚麼文字師曰青龍疏鈔婆曰講何經師曰金剛經婆曰我有一問爾若答得施與點心若答不得且別處去金剛經云過去心不可得現在心不可得未來心不可得未審上座點那個心師無語遂往龍潭至法堂曰久嚮龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭師無語遂棲止焉一夕侍立次潭曰更深何不下去師珍重便出却回曰外面黑潭點紙燭度與師師擬接潭吹滅師於此大悟便禮拜潭曰子見個甚麼師曰從今向去更不疑天下老和尚舌頭也至來日龍潭陞座謂眾曰可中有個漢牙如劒樹口似血盆一棒打不回頭他時向孤峯頂上立吾道去在師將疏鈔堆法堂前舉火炬曰窮諸玄辯若一毫置於太虛竭世樞機似一滴投於巨壑遂焚之於是禮辭信遷道場命與藏鑰未幾秉拂陞座機如缾瀉眾咸慴伏洎信示寂往依虛谷陵於仰山居第二座臨終更衣沐浴集眾說偈而化勅諡普惠性悟禪師朝鮮禪宗臨濟嫡派臨濟下第十九世高麗國師楊州三角山太古普愚禪師族姓洪氏洪州人父延母鄭氏生有異相年十三投檜巖寺廣智禪師出家訪道於迦智下叢林十九叅萬法歸一話二十六中華嚴選既而棄去入龍門山上院菴禮觀音發誓願後寓城西甘露寺苦行精進若有神助之者焉至元丁丑冬十月於松都之蔡氏栴檀園結冬舉狗子無佛性話戊寅正月七日五更豁然有省至正元年辛巳因檀信之請住三角山重興寺玄學之徒雲集師於寺之東搆一蘭若扁曰太古逍遙自適凡五載丙戌春入燕都明年七月到江南湖州霞霧山叅石屋清珙禪師通所證且獻太古菴歌石屋乃問曰牛頭未見四祖時因甚百鳥銜花師曰富貴人皆仰屋曰見四祖後因甚百鳥銜花覔不得師曰清貧子亦踈屋又問空刼已前有太古耶無太古耶師曰空生太古中屋微笑云佛法東矣遂以袈裟表信曰衣雖今日法自靈山流傳至今今付於汝汝善護持毋令斷絕拈拄杖囑云是老僧平生用不盡底今日付爾爾將這個善為途路又云智過於師千載難逢若遇個者即當分付只貴從上佛祖命脉不斷耳師拜受十月回燕京道譽遠播元順宗請師開堂說法二皇后及皇太子皆賜法衣香幣戊子春東還高麗恭愍王封為王師恩遇隆摯丁酉二月師乞骸歸楊根小雪山恭愍王知師志送法服印章于師所時有古潭寂照玄明禪師浙人也客迷原隱聖寺看太古歌頂戴加歎叅訪小雪師方重腿古潭熟視曰師豈不是勞瘵也師曰是潭曰請放下勿慮師曰諾乃命侍者過金襴禪棒來付之曰野狐兒便打殺獅子兒則長養潭跪受披衣拈棒鶚立喝一喝齊聲作打勢師曰天然有哉潭禮拜而退已而師疾愈後妖僧幸旽用事忌師欲殺之譖于王錮師于俗離山及旽伏誅王遣禮使進封國師加法號洪武壬戌夏師自陽山寺歸小雪山十二月廿四日沐浴更衣端坐說偈曰人生命若水泡空八十餘年春夢中臨路如今放皮袋一輪紅日下西峯聲盡而逝佛紀二四九年壽八十二臘六十九闍維舍利無筭厝靈骨于三角山重興寺之東峰諡圓證塔曰寶月昇空高麗國國師大曹溪嗣祖傳佛心印行解妙嚴悲智圓融贊理王化扶宗樹教大願普濟一國大宗師摩訶悉多羅利雄尊者諡圓證塔銘并序推忠保節同德贊化功臣三重大匡韓山府院君領藝文春秋館事臣李穡奉教撰前奉翊大夫判典校寺事進賢館提學臣權鑄奉教書并丹篆額上之十一年正月十日左代言臣仲容傳旨若曰國師太古浮屠汝其銘之臣謹按國師諱普愚號太古俗姓洪氏洪州人也考諱延贈開府儀同三司上柱國門下侍中判吏兵部事洪陽公妣鄭氏贈三韓國太夫人夫人夢日輪入懷既而有娠以大德五年辛丑九月二十一日生師師成童穎悟絕倫十三投檜巖廣智禪師出家十九叅萬法歸一話元統癸酉寓城西甘露寺一日疑團剝落作頌八句佛祖與山河無口悉吞却其結句也後至元丁丑師年三十七冬寓栴檀園叅無字話明年正月初七日五更豁然大悟作頌八句打破牢關後清風吹太古其結句也三月還楊根草堂侍親也師嘗看千百則至嵒頭密啟處過不得良久忽然捉敗冷笑一聲云嵒頭雖善射不覺露濕衣辛巳春住漢陽三角山重興寺卓菴於東峯扁曰太古傲永嘉軆作歌一篇至正丙戌師年四十六遊燕都聞竺源盛禪師在南巢往見之則逝矣至湖州霞霧山見石屋珙禪師具陳所得且獻太古菴歌石屋深器之問日用事師答訖徐又啟曰未審此外還更有事否石屋云老僧亦如是三世佛祖亦如是遂以袈裟表信曰老僧今日展脚睡矣屋臨濟十八代孫也留師半月臨別贈以拄杖曰善路善路師拜受迴至燕都道譽騰播天子聞之請開堂于永寧寺賜金襴袈裟沉香拂子皇后皇太子降香幣王公士女奔走禮拜戊子春東歸入迷源小雪山躬耕以養者四年歲壬辰夏玄陵邀師不應再遣使請益勤師乃至秋力辭還山未幾日新亂作丙申三月請師說法于奉恩寺禪教具集玄陵親臨獻滿繡袈裟水晶念珠及餘服用師陞座闡揚宗旨天子賜雜色縀匹袈娑三百領是日分賜禪教頌德法筵之盛古所未有師請還山玄陵曰師不留我倍道矣四月二十四日封為王師立府曰圓融置寮屬長官正三品尊崇之至也留居廣明寺明年辭位不允師夜遁玄陵知師志不可奪悉送法服印章于師所壬寅秋請住陽山寺癸卯春請住迦智寺師皆應命丙午十月封還印章仍乞任性養真玄陵從之辛旽用事故也先是師上書論旽曰國之治真僧得其志國之危邪僧逢其時願上察之遠之宗社幸甚戊申春寓全州普光寺旽必欲置師死地百計莫能中後以師將遊江浙故白玄陵曰太古蒙恩至矣安居送老是渠職也今欲遠游必有異圖請上加察其言甚急玄陵不得已從之旽下其事推訊誣服師之左右錮于俗離寺己酉三月玄陵悔之請還小雪辛亥七月旽誅玄陵遣使備禮進封國師請住瑩源寺師以疾辭有旨遙領寺事凡七年戊午冬被今上命始至寺居一年而還辛酉冬移陽山寺入院之日上再封國師先君之思也壬戌夏還小雪冬十二月十七日感微疾二十三日召門人曰明日酉時吾當去矣可請知郡封印口占辭世狀數通時至沐浴更衣端坐說四句聲盡而逝訃聞于上上甚悼癸亥正月十二日降香茶毗其夜光明屬天舍利無筭進百枚于內上益敬重焉命攸司諡曰圓證樹塔于重興寺之東峰曰寶月昇空作石鍾藏舍利者凡三所加恩陽山楊根舍那是寺浮屠之傍所入是已作石塔以藏之者迷源小雪也臣穡窃伏惟先王崇信釋教可謂極矣而讒說行于其間太古扶持宗教亦可謂至矣而患難及于其躬此所以因緣果報雖聖人有所不能免也歟至於聲名洋溢華夏舍利照耀古今豈多見哉臣穡再拜稽首而銘曰惟師之心海濶天臨惟師之跡浮盃飛錫歸而遇知王者之師躬耕小雪隱現維時時維鷲城辛旽為鷲城君竊弄刑名如雲蔽日無損於明月墜崑崙餘光之存舍利晶瑩照耀王門惟三角山翠倚雲端樹塔其下與國恒安惟師之風播于大東臣拜作銘庶傳無窮洪武十八年乙丑九月十一日門人前松廣寺住持大禪師釋宏立石門徒國師智雄尊者混修王師圓應尊者粲英內願堂妙嚴尊者祖異內願堂國一都大禪師元珪都大禪師廣化君玄嚴大禪師守西祖宏慈袑旋軫一寧定柔尚聦惠廉慧深慶敦等九十人禪師信規晶皎德齊義瓊壽凡乃由乃圭省岑天亘維昌等百七人雲水法空定乳幻如達生省明中哲卜南定一祖行省如省因法慈法淳達心希儼明會覺明善見希悟可信可生止川雪仍宣正可雲可印雪祥雪岡雪思雪棲了幻雪珍可松可淳乃寧若無等一千三人漆原府院君尹桓領三司事李仁任判門下崔瀅門下侍中林堅味門下侍中李成林判三司事李成桂朝鮮太祖初諱鐵原府院君李琳三司左使廉興邦贊成事禹仁烈延興君朴形開城君王福命門下評議潘益淳政堂文學李仁敏金海君金師幸密山君朴成亮知申事廉廷秀典工判書崔敬萬金海都使李希桂三韓國太夫人李氏比丘尼妙安典工判書金仁貴備考高麗國國師大曹溪嗣祖傳佛心印行解妙嚴悲智圓融贊理王化扶宗樹教大願普濟一國大宗師摩訶悉多羅利雄尊者諡圓證行狀門人維昌撰賢刧第四尊大覺能仁五十七代孫人天師者曰三朝兩朝國師利雄尊者諱普愚始名普虛號太古姓洪洪州人考諱延世家楊根以師貴贈開府儀同三司上柱國門下侍中判吏兵部事洪陽公妣鄭氏三韓國太夫人夫人夢日輪貫懷而有娠以大德五年辛丑九月二十一日生師幼而頴悟氣骨神俊相者謂之法王兒年甫十三投檜巖廣智禪師薙髮未幾訪道於迦智下叢林十九叅萬法歸一話眾莫知焉性倜儻語谷應同梵忌之旋棄去倡佯自若二十六歲寅綠入華嚴選既中探索經義窺其壼奧一日歎曰此亦筌蹄耳古之大丈夫其所立卓爾豈鹵莽為哉予獨不夫乎即斬斷眾緣苦硬清約工夫日進天曆三年庚午春入龍門山上院菴禮觀音發十二大願竭誠瀝肺泣涕然自後伶俐現前如一口劒元統改元癸酉秋寓城西甘露寺僧堂慨然奮曰氣質孱懦大事未辦不如死於苦行改頭方畢乃端坐七日至夕假寐有青衣二童或携瓶或擊杯細斟白湯以勸師接飲則甘味既而忽然有省作頌八句曰一亦不得處踏破家中石回看沒破跡看者亦已寂了了圓陀陀玄玄光爍爍佛祖與山河無口悉吞却至元丁丑秋在佛脚寺獨占一室看圓覺經至一切盡滅名為不動所知剝落靜也千般現動也一物無無無是什麼霜後菊花稠後忽舉趙州無字話下口不得如嚼鐵團驀向鐵團處挨去冬十月蔡中庵以第北栴檀園為儲靈蓄異可以助道之地請師結冬師於是到寤寐一如之境尚猶無字上破疑不得如大死人焉至戊寅正月七日五更豁然大悟當下有頌曰趙州古佛老坐斷千聖路吹毛覿面提通身無孔竅狐兔絕潛蹤翻身獅子露打破牢關後清風吹太古忽與中菴相見下數語菴泣謝曰佛法驗矣菴問向什麼處見趙州師云波前水後申之以偈曰古磵寒泉水一口飲即吐却流波波上趙州眉目露是後咨詢不已卒然問曰雪山牧牛事如何師接聲答八句曰肥膩葉葉軟一嚼辨甘苦盛夏雪猶凝寒冬春不老要傾則便傾要倒則便倒拾得笑呵呵寒山張大口相與話別長揖而去任緣山水間有雲山青山二吟三月還楊根草堂侍親也嘗看千七百公案至巖頭密啟德山處過不得良久忽然捉敗冷笑一聲云巖頭雖善射不覺露濕衣又云會得末後句天下有幾人其二十年苦心於是乃歇師年三十八矣己卯春辭庭園往逍遙山白雲庵高閒踈野自樂天常作白雲歌一篇有唐僧無極航海而至宏才博辯勘諸方一日與師偶話肅然心服曰某甲所見只此耳烏可企也南朝有臨濟正脉不斷可往印可其某與某為唱導師其某為本分作家在某山待其人久矣其所謂作家者盖指臨濟直下雪巖嫡孫石屋珙等數人也師聞而悅之越至正元年辛巳欲往江南時蔡侯河冲金侯文貴欽師風槩邀至于三角山重興寺玄學雲臻而寺幾陁然師乃率籲厥眾謀諸二公豐其材壯其屋襟溪帶岳鬱為叢林土田增闢百廢俱興謂師為重新祖者是耶是已小東而占松巒結蘭若扁曰太古蕭灑邁越發為長歌泠泠然雅調彌高知音益寡有時松聲自和而已如是者霜將五矣丙戌春入燕都寓大觀寺道譽聞于天子冬十一月二十四日太子令辰天子請演般若丁亥四月聞竺源盛禪師在南巢往則逝矣其門人弘我宗月東白將盛三轉語其一曰出家學道只圖見性且道性在什麼處其一曰三千里外定誵訛對面因甚不相識其一曰展兩手云此是第二句還我第一句來請下語師若接而眄若眄而應一偈透三關曰坐斷古佛路大開獅子吼還他老南巢手脚俱不露不露也明如日黑似漆我來適西歸餘毒苦如蜜二人齊出禮謝曰此方衲子幾千萬個到此三關總不柰何長老始與老和尚相見也願許少留師辭且曰吾涉遠途要見其人其人在何處二人曰先師嘗言江湖眼目只在石屋時方七月師拂衣向湖州霞霧山到天湖庵果見所謂石屋和尚烟霞道貌崚崚如也師具威儀卓然於前屋開眼視之師亦開眼對之設禮而退明日詣方丈通所證且獻太古庵歌屋奇之姑試之曰子既經如是境界更有祖關知否曰何關之有屋曰據汝所得工夫正而知見白矣然宜一一放下若不爾也斯為理障碍正知見矣師曰放下久矣屋云且歇去明日具儀而前屋云佛佛祖祖唯傳一心更無別法迺舉馬祖令僧問大梅常因緣云纔有些子光明以為實者墮在光影裏作活計矣故從上諸祖見此人病無奈何於清平境上設關去縛了若真正徹去盡是閒家具也且子於無人之境奚辨得歧路若是其明乎師云佛祖垂示方便具在故也屋云良哉非宿植正因亦未免罹邪網矣老僧雖在窮山常說祖門待爾兒孫久矣師云善知識者浩刧難逢誓不離左右矣不覺拜手屋云老僧亦要與你同甘寂寥恐他日無去路於法值難不如留半月相與打話而歸之得也師之歸也屋申之以問云何是日用涵養事云何是向上巴鼻師答瓶瀉趨而前曰未審此外還更有事否屋愕然曰老僧亦如是三世佛祖亦如是長老說別有道理烏得無說耶師作禮云古有父子不傳之妙故爾耳弟子何敢辜負和尚大恩乎頓首叉手屋呵呵大笑云長老汝之三百六十骨節八萬四千毛孔今日盡打開了老僧亦七十餘年做家事與伱奪了也又曰老僧今日放下三百斤擔子遞伱擔了且展脚睡矣師亦留一留屋跋所獻歌以授乃問牛頭未見四祖時因甚百鳥銜花曰富貴人皆仰曰見後因甚百鳥銜花覔不得曰清貧子亦踈又問空刧前有太古耶無太古耶曰空生太古中屋微笑云佛法東矣遂以袈裟表信曰衣雖今日法自靈山流傳至今今付於汝汝善護持毋令斷絕拈拄杖囑云此是老僧平生用不盡底今日付爾爾將這個善為途路師拜受啟云即今不問來後如何屋云智過於師千載難逢若遇個者即當分付只貴從上佛祖命脉不斷耳師拜受而尚有眷眷之色屋施從數十步喚云長老我家中本無別離莫作別離看好若作別離便不是勗哉勗哉師唯唯而退八月哉生而發湖州十月既望而抵燕京遊大方名播中原時永寧寺長老如鐵船功德主院使郭木的立請館本寺南北兩城諸剎長老等賷䟽遍告右丞相禿兒赤宣政院使濶濶思八奏聞天子適丁太子令辰資政院使姜金剛吉奉御香太醫院使木的立宣政院使知列剌禿資政院同知定住怯薛官人答剌海等奉聖旨開堂于所舘之寺帝師正宮皇后二宮皇后太子皆降香幣師披二宮皇后金襴大振雷音時玄陵為世子嘉歎久之曰小子若新政於高麗則當師吾師矣戊子春師東還掛錫重興寺夏制滿欲韜光道過迷原莊有老吏善大其名者號泣遮留師與吏尋流到龍門山北麓有林深秀菲烟掩映乃相山結茅額之曰小雪與世邈然若將終焉有山中自樂歌一篇壬辰春玄陵遣大護軍孫襲徵之師不應尋再遣襲強而後起玄陵邀入宮中請譚玄清音流入璜聰天顏有慶曰願屈德於敬龍寺師應命玄陵若曰德哉迷原莊吏知師貴奉之惟勤乃革莊為縣命賢司平于時京城飡師法音奔走禮拜既徂一夏師知國之有機變辭退入小雪山俄日新亂作丙申二月遣門下評理韓可貴請師臥益堅申命判典校李挺又請師不屏雲蹤三月初六日勅有司以眾寶巖獅子座請開堂于奉恩寺禪教俱集玄陵奉太后率天眷以臨獻滿繡袈裟水晶念珠沉香拂子及餘服用師陞座大開獅子吼御手行親拜先是聞于天子賜雜色緞匹袈娑三百事是日頒俵福田象筵之盛古所未有玄陵願金字大藏師助宸襟以所嚫金為經財不歸私貯望雲有巖叢之志上書乞歸玄陵曰寡人宿慕和尚道風願海奪寡人之志師不留則倍道矣四月廿四日封為王師是日久旱而雨玄陵大悅曰王師雨翰林皆獻賀章師不有皈之上數日有勅立府於廣明寺曰圓融置僚屬長宮正三品以上以金玉器之百用俱備是時洪州登為牧盖旌旃尊德之至也然師處之恬淡於我如浮雲玄陵邀請曰世俗之諦恐塵法王之鑑然隨機曲應是聖者之能事姑有所問師曰惟命之從玄陵曰為國何如師曰只這睿聖仁慈之心是萬化之本出治之原請迴光一鑑而又時之蔽數之變尤不可不察昔祖聖會三歸一垂裕後昆者賴佛法之力也是故開半千禪剎弘揚祖道龍天佑之祖佛加之或曰本京是三陽之地禪為一本配陽之德而九為三陽之數故以九祖之道可以裨之若夫九山叅學各作其隊規令演福明堂之地敷暢厥猷則天祥降地嘏生矣爾後如其言尚矣今也九山禪流各負其門以為彼劣我優閧闘滋甚近者益益以道門持矛盾作藩籬由是傷和敗正噫禪是一門而人自闢多門烏在其本師平等無我之道列祖格外清歇之風先王護法安邦之意也此時之弊也而九為老陽一為初陽老而衰也理之常而又立都之時九山之來既久不如反其初為新陽之為愈也此數之變也當是時也若統為一門九山不為我人之山山名道存同出一佛之心水乳相和一槩齊平於是乎俾百丈大智禪師禪苑清規薰陶流潤其日用威儀精嚴真淨叅請以勸鍾魚以時重興祖風而五教各以其法弘之以奉萬歲聖祚延而佛日明矣豈不暢哉然嘗觀王氣不在此都以復古初全盛之時難矣哉若南遷漢陽行向所陳之言自化孚六合澤被萬靈矣玄陵曰大哉言乎敕戒左右從而行之不幸譣詖間作師之志未滿唯緇林鬱鬱耳其扶宗教贊王化之實如是丁酉二月師知幾如神作偈乞骸宸衷益懇師抽身入小雪山玄陵知師志送法服印章于師所時有古潭寂照玄明禪師浙人也古潭亦見懶翁集住龍門山云客迷原隱聖寺看太古歌頂戴加歎參訪小雪師方重腿潭熟視曰師豈不是勞瘵也師曰是潭曰請放下勿慮師曰諾乃命侍者過金襴禪棒來付之曰野狐兒便打殺獅子兒則長養潭跪受披衣拈棒鶚立喝一喝齊聲作打勢師曰天然有哉潭禮拜而退已而師疾愈戊戌春玄陵敕修城郭師上書密告紅賊之記己亥秋師觀苞桑之象入彌智山預搆草堂曉諭凡民曰可作逃難之具也辛丑十一月賊陷京應前所記玄陵駕幸安東師在嘗所結搆之草堂土人賴以避亂壬寅春賊敗是年秋行在在清州遣使下錫陽山師莅眾蚤夜屹屹皆轍舊而重新田莊復舊魚鼓鳴焉癸卯正月大駕還京遣成均祭酒韓藏移迦智寺大闡宗風時辛旽假僧儀寵幸諂諛賢良重足師慨然思危上書論旽曰國之治真僧得其志國之危邪僧逢其時願上察之遠之宗社幸甚後旽冒據阿衡殲朝臣師以遂事不言逮丙午冬知旽薑毒還印章辭位入兜率山雲遊至全州普光寺寓錫戊申夏旽流言欲置師死地陰謀詭計無所不至其言甚急玄陵不得已從之旽用事錮于俗離山師木食怡然無怨色一夕起定曰死矣夫辛旽可憐愍者己酉三月玄陵悔之遺僧錄司員惠琪請還小雪洪武四年辛亥七月辛旽覬覦非分玄陵誅之曰我師豈妄語哉命禮部尚書洪尚載內侍李榑備禮進封國師加法號而楊根師之母鄉本益和縣陞之以郡焉於是請住瑩原寺師以疾辭有旨遙領寺事者七年戊午冬被今上命始至寺居一年而還辛酉冬移陽山寺入院之日上再封國師先君之思也壬戌夏師曰歸歟歸歟還小雪眾罔測是年池蓮枯八松四株槁冬十二月十七日示微疾二十三日召門人曰明日酉時吾當去矣可請知郡封印時李陽生守楊根師口占遺奏并與宰樞辭世狀凡六通翌日昧爽沐浴更衣時至端坐說偈曰人生命若水泡空八十餘年春夢中臨路如今放皮袋一輪紅日下西峯聲盡而逝壽八十二臘六十九訃聞于上上命內侍典農副正田沮降香致賻以禮闍維于方丈之前其夜光明爍天舍利無筭或舉顱骨昱如星羅癸亥正月十二日也田沮進百粒于內上益敬重命攸司諡曰圓證樹塔于重興寺之東峯曰寶月昇空以厝靈骨門人長老者僉曰吾師雖逝舍利在世烏忍草草與其眾勞筋苦骨慘目傷心伐石為鍾藏舍利者凡四所曰陽山曰舍那曰青松曰太古菴而又塔于小雪云師平時喜營菴利人數者幾一十所增損地理出自生知慈悲警眾發於天性然其正令也門風高峻學者難湊惟鴻名碩德多之其推為上首輩者曰幻菴和尚今為國師正辯智智雄尊者曰古樗和尚今為王師妙辯智圓應尊者其報應悠久督身後大事者曰哲峯和尚侁侁禪傑恐煩不書維昌竊伏惟師之為人有如扶桑昢日照于六合入于蒙谷然曰何謂也彼天之日高則高矣明則明矣其生也人夢其住也曰曦陽其終也下西峯奇歟異哉是何瑞也智日之晦明可以徵也至若標以神光表以舍利者其必曰寶月昇空之驗也歟其諡圓證是天與之歟人與之歟嗚呼誠哉又自惟師是一國之師非吾所私而維昌胷中慧闕筆下談鈍藉其不腆之文以記巍蕩之德實可叨靦然濫登高山職在秉筆无辭以辭而况義之所在讓非所容掇其萬一為行狀以備采覽焉洪武十六年癸亥十月日謹狀太古語錄序學有師友淵源之正乃為可傳也雖釋氏亦然瞿曇氏歿迦葉氏得其宗相傳至達磨氏入中國厥後大寂氏一再傳分而為五派大圓為溈仰惠照為臨濟匡真為雲門智藏為法眼無際為洞下而惠照之學獨傳今天下之言禪學者一則曰吾臨濟也二則曰吾臨濟也可謂盛矣吳僧道原所錄凡一千有七百家間有吾東人其師友班班可考近世太古盖人豪也橫拈一錫遊徧江湖至吳興之霞霧山叅見石屋珙禪師目擊妙契及其告歸授以伽黎所以傳心也石屋即臨濟十八世之嫡孫而太古之傳得為大宗焉太古之還國也我玄陵執摳衣之禮甚盛甚謹太古處之若固有不數月挺身走久之知還舊隱也卓庵小雪山飯盂蔬盤淡然自守不妄接人一夕示寂設利之異大有以駭人矣今王師古樗公名粲英其上首也裒集平日函丈所聞成如千卷題曰太古語錄俾予序之予於太古之學所不敢知也片言半句未暇研其旨焉第以淵源之正已可以模楷其徒又其行己本末揆諸其道無可議故書其卷端歸之噫是錄之傳於世也奚待予言哉奚待予言哉奉翊大夫密直提學上護軍藝文舘提學同知春秋舘事京山李崇仁書于所居之陶隱齊予為古樗公作太古語錄序明年朝京師遊天界寺僧言石屋名動江湖間語錄盛傳于世予雖不得見石屋見太古此錄則其師友淵源信不可誣也洪武蒼龍丁卯秋七月二十又七日崇仁識太古語錄侍者雪棲編師住三角山重興寺之六年至丙戌春有求法於天下之志遂入燕都丁亥秋尋往湖州霞霧山謁石屋和尚嗣法傳衣是年十月廻大都諸山長老齋䟽告諸臣僚右丞相朵兒赤宣政院使闊闊思八奏聞聖聰於十一月廿四日太子千秋令辰資政院使姜金剛吉太醫院使郭木的立宣政院同知列剌禿資政院同知定住怯薛官人答剌海等奉傳聖旨住持永寧禪寺開堂是日御香金襴袈裟沈香拂子帝師香三殿皇后香皇太子香齎到師據室卓拄杖一下云這裏烹佛烹祖大爐韛鍛生鍛死惡鉗鎚當鋒者喪膽亡魂莫恠老僧無面目又卓一下云百千諸佛向這裏水銷瓦解又卓一下拈起拄杖云這個聻鯨飲海水盡露出珊瑚枝拈傳衣云這一片牛皮佛佛祖祖血脉不斷之標信釋迦老子四十九年三百餘會受用不盡末後靈山會上傳付金色老頭陁云代代相傳傳至末世毋令斷絕灼然灼然又拈金襴法衣云此金縷僧伽黎因甚今日從王宮出來不見道此法遺囑國王大臣又拈傳衣云這個是父子親傳的私物又拈金襴云這個是王宮宣賜的公物私不及公先公後私即披金襴拈起一角召大眾云還見這個麼非但永寧歡喜受之頂戴披之早與塵沙佛祖包裹了也喝一喝拈傳衣云大眾還證明這個麼此是霞霧山傳來的惡物即搭臂指法座云毗盧頂𩕳上一路甚分明大眾還見路頭麼上胡梯云一二三四五陞座拈香云此香無去無來冥通三際非中非外洞徹十方奉為祝延大元世主今上皇帝聖躬萬歲萬歲萬萬歲伏願金輪統御三千界玉葉芬芳億萬春次拈香云此香潔而清含眾德靜而逸鎮千祥恭為祝延三宮皇后各保康寧伏願與天齊壽見其龍子之榮長春不老享其王母之樂次拈香云此香舉起也天高地厚放下也海晏河清恭為祝延阿由室利太子千載千載復千載伏願優游玉境千載之樂奉孝天顏萬歲之歡次拈懷香云此香佛祖不知鬼神莫測非天之所生亦非自然而得昔在新羅行脚時到栴檀園向無影樹下觸著得個無稜縫沒巴鼻地逗到萬仞崖頭通身放下全無氣息忽然再活輕輕颺下卻被諸人疑殺將謂無人證明藏之愈固欲隱彌露惡聲醜氣徧滿天下今日欽奉聖旨當陽拈出對人天眾前爇向爐中供養前住浙西嘉興路福源普禪慧師退臥霞霧山頂尖頭石屋大和尚用酬證明之恩就座興化報恩禪寺湛堂長老白槌云法筵龍象眾當觀第一義師提綱拈拄杖卓一下云第一義這個杖子已與白槌明明說破了也個中還有知恩報恩者麼出來證據時有僧問禮拜即人人有分不禮拜即師資闕禮作麼生即得師云何得自起自倒進云今日聖旨開堂高陞寶座人天普集賓主相參未審師唱誰家曲宗風嗣阿誰師云霞峰千古月來照大明宮進云伊麼則釋迦後彌勒前正法眼藏涅槃妙心盡在和尚手裏放行則三賢十地遞相慶賀把住則二三四七仰望無門未審今日和尚放行去也師云天上有星皆拱北人間無水不朝東進云伊麼則畢竟水隨朝海去到頭雲必覔山歸師云好個師子兒猶作野牛鳴進云如來身或作梵王身或作帝王身今上皇帝未審什麼佛現身師云威音王佛進云此是第二句如何是第一句師便喝進云昔日靈山會上今日永寧堂中是同是別師云爾看是同是別進云今上皇帝萬機之餘留心禪旨興揚正法法門有賴未審師將何法報皇恩師云橫拈倒用無文印上祝吾皇億萬春進云本使功德主院使相公洎諸位官人宰相敬重法門作此勝緣有何祥瑞師云麟鳳呈祥瑞龜龍降丕都又有一僧才出師以拂約云問話且住直饒百千萬億阿僧秪諸佛一時出興各出無礙廣長舌相一一舌相出無盡音聲語言海一一語言具無量辯才一時雲興百千問難也不消得永寧咄之一聲盡答了也如是問如是答乘時無有間斷直至彌勒下生只是業識邊事於本分事上了沒交涉况復鉤章棘句展露言鋒非唯埋沒向上宗乘亦乃打失孃生鼻孔所以從上以來佛佛祖祖不立文字不立語言以心傳心以法印法代代相承傳之不已猶是至今不乏其人此則且置作麼生是向上宗乘良久云我若舉揚此事恐後無人承當雖然如是到此田地佛之名字也用不著祖師名字也用不著衲僧名字也用不著四果四向三賢十地等覺妙覺名字也用不著涅槃名字也用不著生死名字也用不著八萬四千波羅蜜名字也用不著八萬四千塵勞名字也用不著一大藏教是甚閒言千七百葛苴是甚寐語臨濟喝德山棒是甚兒戲不見古老道閉門瞌睡時接上上機顧瞰嚬呻曲為中下那堪向曲祿木床上弄鬼眼睛雖是庸言猶較些子永寧伊麼舉唱大似青天白日无夢說夢割肉成瘡點檢看來合喫拄杖即今莫有毒手者麼若有堪報不報之恩共助無為之化如無倒行此令去也驀拈拄杖卓一下云天下太平又卓一下云佛日重興連卓兩下喝一喝謝辭不錄復舉保壽開堂三聖推出一僧壽便打聖云伊麼為人瞎却鎮州一城人眼去在壽便歸方丈師云這兩個老古錐一人如娑竭羅大龍王振動須彌取妙翅卵相似一人如金翅鳥王擘大海取龍子相似各各逞盡神通具殺活之機具賓主之禮拳踢相應唱拍相酬向十字街頭打筭飯錢普施一切無有遺漏一絲毫許善則善妙則妙點檢將來猶有這個在保壽開堂禍胎生也三聖推出一僧雪上加霜壽便打依前弄精魂聖云伊麼為人瞎却鎮州一城人眼去在自過也不知壽便過方丈燒尾大蟲且道永寧還有遭人點檢處也無聽取一頌借屋南城裏陶然臥醉鄉忽聞天子詔祝罷對殘缸凜凜寒生骨蕭蕭雪打窓地爐深夜火茶熟透缾香以拂子擊禪床角三下白槌云諦觀法王法法王法如是師便下座至正十六年丙申三月初六日玄陵為大元皇帝請師於奉恩禪寺師入院別祝聖上堂指三門云大道無門諸人擬向何處入咄圓通普門八字打開佛殿云二千年前我為爾二千年後爾為我幾乎漏洩便三拜大祖殿云爾是三韓之祖我是萬法之王昔日相逢論個事如今再會暗商量喝方丈云這裏閒神野鬼窟穴今日忽有動地雷聲不知散向何處去以拄杖卓一下云人散汀洲後沙鷗作主來據室拈拄杖卓一下云這裏佛來也打祖來也打又卓一下門下侍中李相國齊賢度䟽與師師接得呈示大眾云還知國王護持正法護國護人入善知眾爇三昧否不見却煩維那為眾拈出維那宣䟽了師拈滿繡衲衣云這一繡衲衣是我仁王赤心之裏撥揮智刃以裁作瀝盡霞誠而做來五雲交橫義天星象之光輝燦爛七室繚繞智海波瀾之浩澣澄清赤城霞氣之氤氳玉液香烟之鬱嵂珍禽奇獸兮呈我君之萬代嘉祥瑞草巖花兮開我后之長年春色不是舍那珍御之服不是釋迦蔽垢之衣且道是什麼人分上即披着乃云頓驚謝康樂詩與生我衣襟前林壑斂暝色袖上雲霞收夕霏咄拈法衣云這滿繡僧伽梨從上佛祖所傳的无上福田大解脫之服是我本師釋迦和尚傳付摩訶迦葉代代相傳至三十三祖大鑒尊者因爭即止因甚今日從王宮出來到吾山僧手裏人不云乎野火燒不盡春風吹又生召大眾云隨我頂戴披之一時披着拈起一角召大眾云還見麼非但大眾與吾披之盡十方世界虛空大地萬象森羅聖凢情非情之頭頭物物一時披着了也咄指法座云百千佛祖向這裏屙潑大臭氣徧滿娑婆今日山僧未免傾四大海水洗教淨潔去也大眾莫道狼藉轉多陞座拈香云此香根盤於大千沙界葉覆於萬億彌盧奉為祝延大元天子今上皇帝萬歲萬歲萬萬歲伏願德臨萬邦長輝太平之舜日恩沾四海永扇無為之堯風此香聖也從茲而起凡也從茲而生奉為祝延皇后殿下與天齊壽伏願日日時時長承上天之恩露生生世世常為諸佛之聖后此香聖云神中含萬德之威力明乎妙外現群龍之畏儀奉為祝延皇太子殿下千載千載復千載伏願日益長孝理之理上報天恩時復增德猷之猷下濟民苦此香巍巍蕩蕩而為萬法之王歷歷明明而作六凡之主奉為祝延本國今大王不昧前約再請之命於奉恩寺裏須彌臺上對人天眾前為未見聞者重新拈出𤑔向爐中供養南方大宗師石屋大和尚用酬法乳之恩若道是稱金以黃若道不是麟唯一角一任錯商量就座行首白槌云法筵龍象眾當觀第一義提綱向上一路千聖不傳且道不傳個什麼這裏若涉一毫即差萬里解問者與三十棒不觧問者與三十棒問答不錄釋迦老子道諸佛菩提遠離一切文字言說况我最上宗乘中事安可以作用言語乎作用是弄精魂言語是糟粕若真正舉揚三世諸佛口掛壁上歷代祖師身潛草裏臨濟入門便喝德山入門便棒是甚兒戲山僧早知如此強將空手雲遊天下尋師訪道大似頭上安頭徒被人疑冷地看來慙惶殺人故來本土藏身巖谷不與世人賤賣佛法埋沒祖風只恁麼閒閒地蕩蕩地逍遙快濶平生虛名漏逗今日濫受國王重請登于此座目視雲漢無如之何直得口吧吧地諸人將謂今日善知識出現於世好一塲笑具山僧恁麼道已是寐語大眾因甚開眼瞌睡卓拄杖一下云萬化之源萬物之母德被河沙量包法界聖中之聖大元天子賢中之賢本國大王慶會一時恩流一代以道為懷月朗太虛以仁為政白日卓午正恁麼時金爐香靄靄玉殿漏遲遲太古小僧更將何法祝贊又卓一下云道泰不傳天子令時清休唱太平歌敘謝不錄昔梁武帝以禮迎達磨祖師乃問如何是聖諦第一義祖師云廓然無聖帝云對朕者誰祖師云不識大眾此是東土最初宣揚禪旨榜樣今日本國大王請吾小僧舉揚宗乘上祝皇帝皇后皇太子中為人天大眾下為臣僚百姓施大法施吾今不說一字大王不問一字梁帝與祖師問答是同別若辨得許你一隻眼若辨不得聽取一曲太古音最親切可憐時節落花春勸君更進一盃酒西出陽關無故人至正十七年丁酉正月十五日王宮鎮兵上堂陞座祝香畢就座拈䟽云諸佛三昧諸佛不知今上國王護持佛法三昧總在這裏誰能諦悉若未諦悉却煩維那宣白宣䟽了拈起拂子云從上宗乘還有人諦當麼五教三乘十二分教只是老胡遺溺佛佛祖祖只是夢中說夢的漢若作道理商量埋沒宗乘若作世諦商量辜負先王恁麼也不得不恁麼也不得不得不得也亦不得若是本分衲僧四句百非外可以相見問答不錄橫拈拄杖云三世諸佛也恁麼歷代祖師亦恁麼若不是本國之請不曾恁麼說破國王大臣若向這裏信得恁麼感得諸佛護念諸天降福國王長壽文經武緯翊贊王化賢臣宰輔壽祿彌增化及黎席比屋可封千妖百怪潛消暗爍姦魂冤賊閉影潛形乾坤更化日月增明山河益固社稷重興有時雨有時暘百穀登萬民樂祥麟彩鳳爭呈瑞應若其然則前朝聖賢之所云云如言如言信佛順天則自然成其大國矣向下言長付囑拄杖重為國王公主王后大臣將相內外臣僚百官明明說破去也卓拄杖一下拈起拄杖云這個杖子既無情識那有是非請國王大臣善攝心聽且莫漏洩又卓一下云若涉擬疑不成美事又卓一下云至公無私天所護念又卓一下云敬佛畏天孰不安泰又卓一下云反是為則有口難言又卓一下云聖君如赫怒雷動萬人心又卓一下靠拄杖謝辭不錄復拈拄杖云昔在小雪山中渾无一法與人說了今寓舍那堂中又無一法對人說與徒受國恩無德小報只恁麼忽忽忙忙日與閒禪野鬼魑魅魍魎打交雜去只聽個謀利資生顛倒妄想計較浮生如是應對不得小歇斯非宿業使之然乎卓拄杖一下云這杜撰自罵胡為又云太古命值王政之月十有五日請赴王宮高陞寶座人天一會問道也好問禪也好理則然矣事則未在是月也寒氣已退朝陽騰輝是我大君登于明堂飛聰馳明無遠不察發政施仁賞善罰惡是王者之大政也國家有事則須憑佛法之力乃鎮其偽是以先須正其佛法中事賞其有道者主於伽藍領眾勤修福利邦家此乃先王之行法王政之始也所以出家為道者不求名不求利不要住持不謀衣食不求人之恭敬讚歎甘心守節惡衣惡食藏身巖谷不圖現身是可名為出家學道者之所為也只如今者非但自求依他勢求者吾末如之何也已矣卓拄杖一下云虎不食斑恐傷其類又云白衣人中亦有忠於君孝於親懷才抱德見棄於草莽者尚有憂時憂國救世救民之心太古雖愚而未賢不忍忉忉縷縷以薦之於上矣賞賢良而罰邪侫則人誰不忠人誰不孝人誰無道人誰不學人誰不修己德也哉然當此之時有拔山之力盖世之氣者不妨出來相與太古角力爭雄亡身為國樹立大功則奚啻封侯如無是人太古老僧匹馬單槍親征邊塞去也且道去則不無作麼生樹立大功的一句良久云橫按莫邪全正令太平寰宇斬痴頑卓拄杖兩下三角山重興禪寺再入院至山門云昔日不出此門今日不入此門中間亦無住處大眾向什麼處見太古老僧遊戲處卓拄杖一下良久云此嶺閑花紅似錦前溪流水綠如藍又卓兩下曦陽山鳳巖禪寺入院至山門云三世諸佛莫不皆從此門出入且道今日山僧出耶入耶老僧不出不入作麼生是不出不入的道理卓拄杖三下迦智山寶林禪寺入院至山門云釋迦老子道我此法門遺囑國王大臣是真實語也今日太古老僧與一行眾等始自曦陽山下終止迦智門前至中間相去一千餘里登途一十四日步步南行日日時時路途無難到了致個圓通普門八字打開專賴王臣護助恩力召大眾云到則到矣如何進步上報如是重恩卓拄杖一下云溪聲最親切山色亦依俙又卓兩下佛殿云趙州古佛道佛之一字吾不喜聞太古即不然不喜的亦不喜昔日我是你今日你是我便燒香禮拜方丈云鎔凡煆聖發大爐韛且道今日誰是當鋒者咄慈氏山瑩原禪寺入院至山門云盡大地是解脫門眾等還見麼若也不見利雄為眾開示去也卓拄杖一下云解脫門大開眾等切莫擬疑大家隨我來便入門方丈云這裏好個一所空王之室昔時名利雲容崛今日清貧道人居佛來祖來都不相與明眼衲僧近傍不得且道誰是當陽坐斷對佛揚化對機接物咄是甚閒言上堂拈香罷橫按拄杖云白的的青寥寥赤條條空索索過去諸佛已當如是住現在諸佛今當如是住未來諸佛亦當如是住利雄伊麼舉唱已是寐語大眾因甚立地瞌睡卓拄杖三下便下座示眾陞座舉僧問趙州狗子還有佛性也無州云無這個無字如一粒還丹相似點鐵即成金才舉個無字三世諸佛面目掀翻出來爾等諸人還肯也無若未肯信於此大疑之下放下身心如墮萬仞崖下時相似無計較沒商量如大死人相似放下如何若何之念單單提個無字於十二時中四威儀內只與話頭為命根常常不寐時時檢察提撕話頭帖在眼前如鷄抱卵使暖氣相續如猫捕鼠身心不動目不暫捨不覺身心有之與無心眼話頭攝在一處但伊麼惺惺歷歷歷歷惺惺密密叅詳譬如嬰兒憶母相似如飢思食如渴思水休而不休思復深思豈是做作底心也若如此真實用功則便到省力處此是得力處也話頭自然純熟打成一片身心忽空凝然不動心無所之這裏只是個當人當人若起他念則决定被影子惑矣千萬切忌絲毫異念正好回看渠何面目又趙州道無意作麼生即此言下打破無明則如人飲水冷暖自知若透不得則更着精彩只要話頭聯綿不斷不論有疑無疑有味無味即此大疑之下提撕話頭單單不昧捱來捱去行也但伊麼坐也但伊麼喫粥喫飯時但伊麼對人打話時但伊麼一切施為動靜境上皆悉如之則無有不辦矣爾等諸人還知四恩深厚麼還知四大醜身念念衰朽麼還知汝命在呼吸麼值遇佛祖出世麼生來及聞無上宗乘麼得聞此最上乘生希有心麼僧堂裏切忌雜話看語錄麼不離守節麼行住坐臥之際點檢話頭十二時中無有間斷麼喫粥喫飯時點檢麼對人接話時不昧麼顛沛造次時有話頭麼坐堂時不與隣卓耳邊說話麼時中不與人閒言雜話鼓扇是非麼不見他過不說他非麼時時着力進步麼見聞覺知時明明不昧打成一片麼若到好時返觀自己麼自己面目如何捉得趙州麼趙州道無意作麼生此生續佛慧命麼上中下座互相恭敬麼起坐便宜時還見地獄苦麼此是參禪人日用中點檢底道理真實參禪者須如此學隨問程節一一下語來看下語不得處不得放過法語玄陵請心要國王命曰為我慈悲垂法語流恩某敬心奉旨畧露其端云太古這教本無一法何語之有哉然不可無答國王重請以非言為語直指心地而言有一物明明歷歷無偽無私寂然不動有大靈知本無生死亦無分別亦無名相亦無言說吞盡乾坤盖盡天地盖盡聲色具大體用言其體則包羅盡廣大而無外收攝盡微細而無內言其用則過佛剎微塵數智慧神通三昧辯才即顯即隱縱橫自在有大神變雖大文王莫之能窮此一物常在人人分上舉足下足時觸境遇緣處端端的的的的端端頭頭上明物物上顯一切施為寂然昭著者方便呼為心亦云道亦云萬法之王亦云佛佛言經行及坐臥常在於其中堯舜亦曰允執厥中無為而天下大治堯舜豈非聖人乎佛祖豈異人乎只明得個此心故從上以來佛佛祖祖不立文字不立語言但以心傳心更無別法若此心外別有一法便是魔說元非佛語所以名此心者非是凡夫妄生分別之心正是當人寂然不動底心也如是自心不能自守不覺妄動忽忽然被境風動亂埋沒六塵之裏數起數滅妄造無窮生死業苦是以佛祖聖人乘宿願力出現世間以大悲故直指人心本來是佛今其只悟心佛耳殿下應觀自佛萬機之暇正坐殿上一切善惡都莫思量身與心法一時都放下一如金木佛相似則生滅妄念盡滅滅盡的亦滅閴爾之間心地寂然不動無所依止身心忽空如倚太虛相似這裏只個明明歷歷歷歷明明底現前此時正好詳看父母未生前本來面目才舉便悟則如人飲水冷暖自知拈與人不得說與人不得只是個靈光盖天盖地如上所言境界自然顯現時即不疑生死不疑佛祖言句即與佛祖相見了也此是從上佛祖不傳之妙切須在意慎毋忽焉臨政新民之時亦只如是亦以斯道普警羣機勸諸臣民同樂太平無為之理則諸佛龍天豈不歡喜祐其邦國乎國王公主非但此生多生以來遇佛聖人於此最上宗乘中深種般若之因乘本願力今為國王公主自然無為而樂問斯義如撥宿火相似成辦大事必無疑也國人之有福智者奉順國王之意敬之如佛中心喜悅而現於色曰我后是佛心國王佛心公主讚揚無已此人必是昔與國王公主同種善根而來今又長之者歟其或聞見而生疑者與不聞見者何足論之哉答芳山居士吳提學倕山僧亦因業疾不得入城相會某雖在野外真吾無日不造閤下矣閤下還肯麼今日忽逢來書已諳閤下尊體動止安穩留心此事以道用為日用某亦歡喜無已書中來云念念瞥起看個話頭此功尤妙古德云不怕念起唯恐覺遲又云念起即覺覺之即無又云念念攀緣一切境心心永斷諸分別此語皆作家為人之端也又老龐云但願空諸所有且勿實諸所無閤下善分緇素察其得失以至究竟幸甚承書中請意至切再下葛藤念起念滅謂之生死當生死之際須盡力提起話頭純一則念頭起滅即盡起滅盡處謂之寂寂中無話頭謂之無記寂中不昧話頭謂之靈知即此空寂靈知無壞無雜如是用功則不日成功身心與話頭打成一片無所依倚心無所之此時只是個芳山居士若起他念則决定被影子惑矣這裏仔細參看居士在那裏耶趙州道無意作麼生若捉敗則已不用安排如人飲水冷暖自知千疑萬疑一時透了也若未透徹則千萬切忌如何之念只要話頭聯綿不斷切切提撕於動靜語默一切施為一如不昧但恁麼惺惺歷歷提個話頭時時點檢看一日之內間斷有幾度耶若記知間斷則更發勇猛之心加功着力使無間斷若知一日一度也無間斷則添些精彩時時點檢日日無間斷若三日如法無間斷動靜一如語默一如話頭常現在前猶急流灘上月華相似觸不散撥不去蕩不失寤寐一如大悟時近矣到此時節切忌求人穿鑿又不與閒人打話但十二時中四威儀內如愚若訥放下身心如同死人相似內不放出外不放入這裏忘却話頭則大錯大疑未破已前千萬不昧話頭一如吾說實到此田地則驀然無明破豁然大悟矣悟後湏見本色宗匠决擇究竟若不見宗師則十個五雙成魔至禱至禱示無際居士張海院使僧問趙州狗子還有佛性也無州云無這個無字不是有無之無不是真無之無畢竟如何即是到這裏直得通身放下一切不為不為底也不為直到閒閒地蕩蕩地切無擬思前念已滅後念不起當念即空空亦不守不守亦忘忘亦不立不立亦脫脫亦不存到恁麼時只是個惺惺寂寂底靈光卓爾現前切莫妄生知解但舉話頭十二時中四威儀內單單不昧切切參詳如是參去捱來捱去逗到好時宜細回詳看趙州道無意作麼生猶老鼠入牛角相似便見到斷利根者到此豁然打破漆桶捉敗趙州不疑天下人舌頭雖如是了悟無智人前切忌道着須遇見本色宗師示崔進士公自問云那個是父母未生前本來面目才舉起一聲便了則已不然則行住坐臥之際十二時中心心不昧念念相續如鷄抱卵如猫捕鼠相似便直下如此不過三日及至七日之內必有相應則此路正是先生徑直發明之端也論其方便則公作念云是我色質灼然父母所生底不定某時必然散壞去也那個是父母未生前本來面目千萬參不昧叅不昧如是無間斷則自然工夫純熟身心清爽如秋天氣肅相似到這裏利根者豁然大悟如人飲水冷暖自知但明明了了自肯而已矣方信道照盡體無依方見本來人示思齋居士既知無常迅速生死事大特來問道此真大丈夫之所為乎然恁麼知無常生死的是阿誰特來問道的又是阿誰居士若向這裏諦當分明則曰容韻甚奇妙光明照十方我適曾供養今復還親近然於此四句中切不可將心意識停機佇思則轉踈轉遠矣然則不如向活句上參究不見僧問趙州狗子還有佛性也無州云無這個無字不是有無之無亦不是真無之無且道畢竟作麼生道理若舉起便知則已若擬疑不破則但舉無字參看四威儀內十二時中常常不昧但恁麼參詳看若透徹則即與趙州相見了也於時宜見本色宗師咄示廉政堂興邦僧問趙州狗子還有佛性也無州云無這個無字不是有無之無亦不是真無之無畢竟什麼道理耶即有此疑時切切參詳看自然逗到百不知百不會這裏便是好處利根者到此豁然大悟若大疑未破則切忌如何若何之念亦莫生求悟之心但向疑情上單提話頭切切參詳於一切施為動靜千萬不昧若一日二日乃至七日如法參詳無間斷夢中亦記得話頭如是則大悟時近矣若破疑如人飲水冷暖自知拈與人不得說與人不得到此時節須遇見本色宗師切不向無智人前說破勉之勉之太古因賢相請意勤勤不覺縷縷復為詞曰趙州道無意正好切參看參到百不會便是露團團疑盡情忘處趙州是何顏若也別生念面前蜀道難示樂菴居士念佛略要阿彌陁佛梵語此云無量壽佛佛者亦梵語此云覺是人人個個之本性有大靈覺本無生死亘古今而靈明淨妙安樂自在此豈不是無量壽佛也故云明此心之謂佛說此心之謂教佛說一大藏教指示人人自覺性之方便也方便雖多以要言之則唯心淨土自性彌陁心淨即佛土淨性現即佛性現正謂此耳阿彌陁佛淨妙法身徧在一切眾生心地故云心佛及眾生是三無差別亦云心即佛佛即心心外無佛佛外無心若相公真實念佛但直下念自性彌陁十二時中四威儀內以阿彌陁佛名字貼在心頭眼前心眼佛名打成一片心心相續念念不昧時或密密返觀念者是誰久久成功則忽爾之間心念斷絕阿彌陁佛真體卓爾現前當是時也方信道舊來不動名為佛示白忠信居士佛言過十萬億佛土有世界名曰極樂其土有佛號阿彌陁今現在說法云云佛之此語中深有密意忠信居士還知麼阿彌陁佛名當在心頭常常不昧念念無間切切參思切切參思若思盡意窮則返觀念者是誰又觀能恁麼返觀者又是阿誰如是密密參詳密密參詳此心忽然斷絕即自性彌陁卓爾現前勉之勉之示無能居士朴相公成亮僧問趙州狗子還有佛性也無州云無只這個無字不是有無之無亦不是真無之無且道畢竟什麼道理參詳去既疑情未破時但單單提個無字行住坐臥千萬不昧參到百不知百不會忽然心無所之時莫怕落空這裏便是好處切忌如何若何若透得趙州關則如人飲水冷暖自知不疑天下人舌頭去在到此時節千萬無智人前莫說宜見本色宗師示當禪人古之出家之士一聞此事生大希有發大勇猛直截而去誓不退轉故有慧命不絕心燈無窮佛祖門下不乏其人今之出家之類十個五雙無不自有自劣之障人多懈怠於此事上高推聖境甘為下劣又似不信形同朝露命速西光孜孜矻矻傯傯忙忙自好為之者皆是三途業因也縱此七情而使其三業故造妄業雖易他時刀山劍樹鑊湯烊銅受六交報苦苦最難汝既出家爭似今日是事具足十分便宜時發勇猛心立决定志放捨情念一刀兩段參究此事一念悟破則生死即絕更不疑天下舌頭佛祖柰何你不得豈不是究竟無事安樂者哉示真禪人汝既出家須立丈夫之志發勇猛心深信無常迅速生死事大行住坐臥一切時中單單不昧此事切切參詳如人墮在千尺井中千思萬想只是個單單求出之心不日內必有相應分如是用功若未成辦佛法無靈驗矣昔日香嚴聞竹聲而悟道靈雲見桃花而明心如此則當人但十二時中四威儀間只伊麼惺惺歷歷不昧此事純一無雜動靜時但伊麼語默時但伊麼寤寐一如則聞聲見色豈無香嚴靈雲參禪人須時時自責自點看自己功力與古人侔與不侔若有敗闕處則千萬自責便發丈夫之志時時念念一切善惡都莫思量正當恁麼時那個是我父母未生前本來面目單單不昧切切參詳忽然心無所之打成一片利根者到這裏打破無明向後須見本色宗師示宜禪人本師世尊語阿難曰汝雖復憶持三世如來十二部經不如一日修無漏學是四實語中真赤心之語乎諸佛諸祖授受相傳的妙義不在文字語言之上然佛祖以大悲故對機不得已而乃以文字語言只這文字語言偏為中下之機借其方便而直指心地然則大凡學人借其方便以為實法不捨則豈不是大病譬如窮子捨父逃逝寄托旅亭妄謂自家則非但失家那有到家之日嗟夫惜哉執指為月者也公今不然定知佛祖語言皆直指心地之方便從前學解文字語言便一刀兩段宜參心地一生須辦大事可以斷生死可以報四恩也人之心地至微至妙不可以語言解不可以思想得不可以寂默通但一切時中單提此事千萬不昧千千萬不昧自然打成一片了也到百不知百不會時切忌如何但惺惺歷歷一切施為動靜語默時節但能相續如一得力則便有如此時無智人前切忌道着向後須遇見本色宗師密密决擇此是大丈夫之平生事業也答湛堂淑長老敬奉開天堂上司法老禪翁問慰之書其中云以老病緣小有傷歎之志求一轉語以為末後資粮此語豈徒然哉余亦歎之感矣古今世間人人到臈月三十日謂言舊年已終新歲到來但伊麼互相慶賀以當人情禪翁既是個中人亦以個中事警其時流而乃發真實語也禪翁豈不知自己靈明嵬嵬堂堂露裸裸赤灑灑沒可把者也這個豈有古今之異新舊之別本無聖凡之見何關生死之妄耶古人喚作無位真人尚亦不中如今喚作什麼如人飲水冷暖自知請下笑一聲看趙州古佛道個無字以開天下衲僧眼迦智未知開天堂中有數衲子眼即今如何其中若有未開的今為頌曰放下萬事端須度趙州關參到百不會便是露團團直截如斯去須臾破疑團衲僧家中事如是乃安閒臘月三十日亦可為精飱對人相慰賀何以自怡看赤足踏氷雪方知徹骨寒士豈不預備予亦助其間示文禪人君既知非去名利此生須報佛祖恩若也今日三明日四幾時了斷無明根君今已發丈夫志時復提起吹毛利常持如是做將去有甚魔外亂其理直到路窮當鐵壁緣慮妄念都永寂功如透水皎月華漸至寤寐一如域塵將息而光將發到此莫生悲悅懌亦莫生知覺心才生知覺失功力但但提撕眼惺惺反復看渠渠何形忽然捉敗佛祖關只消得個一笑聲向後宜尋參本色决擇巴鼻兮同條生示紹禪人佛說戒定慧淨身口意業身三口四意三業一一莫作持淨戒念念提起趙州無一切時中不昧無行住坐臥二便時着衣喫飯常提無如猫捕鼠鷄抱卵千萬不昧但舉無如是話頭不間斷起疑參因甚道無疑未破時心頭悶正好單提這話頭話頭聯綿正念成參復參詳看話頭疑與話頭成一片動靜語默常提無漸到寤寐一如時只要話頭心不離疑到情忘心絕處金烏夜半徹天飛於時莫生悲喜心須參本色永决疑示可禪人勸君須立丈夫志此生了報大師恩如今正法將欲墮早續明燈度迷津踏碎天下羣邪網切須要見明眼人眼裏莫着黃金屑心田頓發煩惱根苦海常泛般若艇二利功業日日新丈夫功業只如是如是之義誓不容易示祥禪人汝初依吾落髮時雙親感歎便垂泣父母恩愛重如山放汝出家情何及汝知如是父母恩勤修精進如火急汝求名利踈道行便是無間黑業習人生誰是久長生可憐浮命在呼吸是以於我本師尊捨其王位出城邑入山苦行示六年蛛網於眉雀巢肩蘆芽穿膝任從容有甚毫釐利名顛汝今依師學此行雙親九族必生天汝違師教還作無髮俗自累師親同墮無間獄示安山郡夫人妙幢參禪須透祖師關學道要窮心路斷心路斷時全體現如人飲水知冷暖到此田地莫問人須參本色呈機看示乳禪人汝既依吾斷髮根此生須報四深恩若非精進修行力何以明心徹無極示日本志性禪人白日出扶桑請君須見當返觀明明了脚下即是菩提場示宜禪人古今大智人念念知幻身知幻便離幻當當現本真警侍司八十人生命一塲春夢間汝曹參此事坐臥志如山歌吟銘太古庵歌吾住此庵吾莫識深深密密無壅塞函盖乾坤沒向背不住東西南與北珠樓玉殿未為對少室清規亦不式爍破八萬四千門那邊雲外看山碧山上白雲白又白山中流水滴又滴誰人解看白雲容晴雨有時如電擊誰人解聽此泉聲千回萬轉流不息念未生時早是訛更擬開口成狼藉經霜經雨幾春秋有甚閒事知今日麤也飡細也飡任爾人人取次喫雲門胡餅趙州茶何似庵中無味食本來如此舊家風誰敢與君論奇持一毫端上太古庵寬非寬兮窄非窄重重剎土個中藏過量機路衝天直三世如來都不會歷代祖師出不得愚愚訥訥主人公倒行逆施無軌則着却青州破布衫藤蘿影裏倚絕壁眼前無法亦無人旦暮空對青山色兀然無事歌此曲西來音韻愈端的徧界有誰同唱和靈山少室謾相拍誰將太古沒絃琴應此今時無孔笛君不見太古庵中太古事只這如今明歷歷百千三昧在其中利物應緣常寂寂此庵非但老僧居塵沙如來同風格决定說君莫疑智亦難知識莫側回光返照尚茫然直下承當猶滯跡進問如何還大錯如如不動如頑石放下着莫妄想即是如來大圓覺歷刧何曾出門戶暫時落泊今時路此庵本非太古名乃因今日云太古一中一切多中一一不得中常了了能其方亦其圓隨流轉處悉幽玄君若問我山中境松風蕭瑟月滿天道不修禪不參水沉燒盡爐無烟但伊騰騰恁麼過何用區區求其然徹骨清兮徹骨貧活計自有威音前閑來浩唱太古歌倒騎鐵牛遊人天兒童觸目盡伎倆曳轉不得徒勞眼皮穿庵中醜拙只如許可知何必更重宣舞破三臺歸去後青山依舊對林泉附石室珙禪師書高麗南京重興禪寺長老諱普愚號太古向曾為此一段大事立志去下苦硬工夫來見處透脫絕意路出思惟非言像之所能拘欲潛隱遂結庵寺之三角山以自號扁其庵亦名太古以道自適放意於泉石間述太古歌一章丙戌春出鄉至大都不憚路途勞役尋跡而來丁亥七月到余山石菴寂寞相忘道話半月觀其動靜聽其言語諦實將別前出示向者所作太古歌余乃晴窓展翫老眼增明誦其歌也淳淳昧其句也閒湛直得空刼已前消息非今時尖新錐釘者而可方比則太古之名不謬也余久絕酬應管城子忽焉𨁝跳不覺書于紙尾復為詞曰先有此庵方有世界世界壞時此庵不壞庵中主人無在不在月照長空風生萬籟至正七年高麗忠穆王三年丁亥八月旦日湖州霞霧山石室老衲七十六歲書雜華三昧歌大方廣佛華嚴經是誰言語無音聲本師瞿曇老知識所證境界重重明汪洋乎冲融乎雄雄乎落落圓音如雷霆菩提塲中開演日海印定中無說說聞之傳之者是誰文殊普賢大人舌文殊普賢二大士從何途路聞此訣深深入此三昧海毘盧遮那藏身三昧文殊普賢何甚愚外揚家醜漏人知哀哀乎慼慼乎末世人尋行數墨徒勞神聞之無限定中說背之不聞如何因此中消息何富貴千花百草爭含春後來看經大君子菩提大路莫問津休休乎何必巡南方脚下即是菩提塲君看老胡默然處不以言語能承當深而深黑而黑妙用恒沙也無極吁嗟乎古今權小人單單直指信不得徒聞未證無智者是即名為如聾似啞見也見不及聞也聞不及如是等機為之集之出蒙山知識三昧業燒香散花惺惺靈利禮佛誦經惺惺靈利因此惺惺會作觀即漸成就三昧理三昧三昧明遮那法體現象成好也好也三昧多好好也三昧三昧三昧成頓現華藏世界海華藏世界重重無盡我曾聞見今乃信行也遊也踏也看裟婆世界水水山山華藏界中不動尊上無父兮下無孫陁陁乎爍爍乎三七斤吞吐三身無口痕喫盡甘辛百草頭常在岸上在中流中流一葉舟子大萬邦人物載無礙寒山拾得大冤讐造次弗離長相隨極親還踈鬪海裏打破舟子散真珠魚龍蝦蟹得此寶深深海底皆藏收或行或臥或衣食承此寶德不知羞啊㖿啊㖿如是如是還恐今人作意求此花不逐溪流出爭識秦人桃源遊愁人莫向愁人說說向愁人愁復愁我今親提無盡筆供養十方無盡佛山中自樂歌不翦鬚不翦髮好個鬼頭羅剎憨憨痴痴也似石頭愚愚魯魯也似木橛踏盡草鞋參祖師惡聲虛說如機發囉囉哩哩囉囉獨唱此曲來休歇大元天子聖中聖賜居巖谷消日月無人共我山中樂吾獨憐吾疎轉拙寧同水石長自樂不與世人知此樂但願聖壽萬萬歲萬歲長為萬歲樂然後可以吾無憂巖阿澗谷甘蕭索巖隈小庵足庇身也任白雲相依托君不見太古老僧歌一曲曲中還有無窮樂自樂自歌何所為樂天知命無為樂胡為自歌還自樂吾亦不知何樂樂中有意君知否人雖日用難摸着淵明中酒弄無絃普化入市搖鈴鐸布袋閒僧太無事紅塵酒肆重醩𨠘古來聖賢之樂只如此空留虛名聲韻何寂寞知之好者尚難得況其樂之行之作君看太古此中樂頭陁醉舞狂風生萬壑自樂不知時序遷但看巖花開又落白雲庵歌逍遙山上多白雲長伴逍遙山上月有時清風多好事來報他山更奇絕白雲無心徧太虛其如烘爐一點雪行雨四方無彼此是處是物皆欣悅剎那歸來此山裏山光着色水嗚咽古庵依俙非霧間連雲畏道蒼苔滑左傾右傾住復行誰其侍者惟楖栗路窮庵門向東開賓主同會無言說山默默水潺潺石女喧嘩木人咄汲汲西來碧眼胡漏洩此意埋佛日傳至曹溪盧老手又道本來無一物可笑古今天下人不惜眉毛行棒喝我今將何為今人春秋冬夏好時節熱向溪邊寒向火閒截白雲衣半結困來閒臥白雲樓松風蕭蕭聲浙浙請君來此保餘年飢有蔬兮渴有泉雲山吟山上白雲白山中流水流此間我欲住白雲為我開山區白白雲話盡心中事有時行雨難久留又被清風便行盡三千歷四洲我亦隨君駛清風江山處處相追遊追遊為何事堪與白鷗戲波頭却來共坐松下月松聲動啾啾此心共誰話恒沙佛祖盡悠悠懶臥白雲裏青山笑我大無憂我即笑而答汝山不識吾來由平生睡不足愛此水石為衿裯青山亦笑我何不早歸來吾儔君若愛青山藤蘿影裏大休休我從青山語放身大臥青山樓有時夢有時覺夢覺元無拘夢裏却尋來時路長安酒肆騎木牛木花化作春風意綻花開柳如琳球桃花紅似火柳絮白如毬中有李花白又白無言引得幽言求珍禽啼罷剎那夢睡味猶甘身不動參禪吟日月似電光光陰良可惜生死在呼吸難以保朝夕行住坐臥間寸景莫虛擲勇猛加勇猛如我本師釋精進復精進心地等惺寂深信佛祖意須要辨端的心即天真佛何勞向外覔放下萬事看路窮如鐵壁妄念都滅盡盡處還抹却身心如托空寂然光達赫本來面目誰纔舉箭沒石疑團百雜碎一物盖天碧莫與無智說亦莫生悅懌須訪見宗師呈機復請益然後名繼祖家風不偏僻困來展脚眠飢來信口喫人問是何宗棒喝如雨滴偈頌古鼎龍泉溫長老號威音那畔却空前有個一物硬如鐵張大口默無語跨三秖行已輟通身放下火坑中肚裏珍羞香滿室無心轉脚冷湫湫倒腹傾塲吐禪悅衲僧於此飽𮩃瞿曇兒孫今不絕節庵霞霧山侍者霞山之阿老此君不知霜雪經霜雪月來也從他影風來也任蕭瑟蕭瑟聲最親切聽得好莫漏洩清虛影裏須抹過薦取中間無一物放下着莫存知眼裏那着黃金屑亦不存知不知方得見好時節折却德山棒粉碎臨濟喝到處逢人不被瞞然後可以對風月有風無月無好明有月無風無好說有好風有好月儂家法戲無斷絕鐵牛癸卯春宗西堂訪余于迦智山結夏觀其動靜微密安詳宛爾受道之資至秋告別仍求號以鐵牛稱之所以然者先解制問眾日用工夫西堂云昔日以佛聲佛色為解自到會中得業本分示誨如上伎倆都盡但冷地上參看趙州無字如蚊子上鐵牛相似故用其語而為號因作偈以贈之茲於鐵牛上痛鞭出汗則便與趙州相見了也勉旃只麼痴頑不顧後無知豈怕獅子吼不眠而眠長臥天地間大千沙界無去住幾度春風幾度秋一如如體無今古刼火洞然不燒伊頭角依俙芳草雨君不見痴痴兀兀此牛行舉世無人拘牽去可憐牧牛子放却繩頭兮末如之何已久吾今勸盡牧牛子進步驀騎鞭徹髓痛徹髓出汗血嘉州大像來乞救救不得沒奈何寒山拊掌笑呵呵於斯須訪見宗師决了巴鼻莫閑唱太平歌慧庵松廣聰長老太古國師門徒有大禪師尚聰朝鮮初住持曹溪宗興天寺上疏願用松廣普照之遺法者即是長風吹幽松凉月照虗碧無遮攔沒門戶青寥寥白的的中間空索索外境亦如如普眼當時無覔處白雲堆裏一茆屋芳草落花春日雨鷓鴣聲送竹蕭踈南詢遊子竟何往塵塵盡是此人居重重無盡華藏世界都盧只在此庵內個中微妙義本不容知解主中王只如斯長年不出庵門外洒洒然無偽無私落落然自由自在蕩盡纖毫凡聖見百不知百不會呵呵呵是甚麼庵外松柏歲寒終不改哲峯廣明公宏長老智不及慧莫窮撑天地出有空獨立那邊殘照外善財徒勞問別峯萬古白雲飛不到一朝紅日漏先通幾經刧火只如此千古嵬嵬振祖風中庵壽允日本允禪人以其號求頌余時年七十六目暗放筆久矣其請勤勤強下老筆云千重碧山裏萬丈蒼崖邊迴溪流泉細嗚咽深林雜樹空芊緜中有小庵若無有朝晡但見祝君烟花落花開鳥不到白雲時復訪門前誰識主人日用事長年不夢塵間緣寂滅境中伴寂滅綠蘿松上清風月寄日本石翁長老吾以恁麼寄師亦恁麼通吾誠無得失師豈有為功海東山岳秀扶桑一點紅可憐立雪子幾乎喪家風寄無極和尚江南人西來一曲沒人知雖有伯牙無子期獨坐寥寥向深夜透簾殘月徹禪衣送達磨悉歸乾竺國西天真佛子身與白雲閒寄語山山水須開青眼看送日本雄禪人遊江南日本松風爽新羅月色多若遇南方三伏節為人和唱武陵歌送珦禪和之江南將此新羅語閒時莫費情南方火雲裏說與寒松聲辭石室和尚弟子普愚久嚮道風不遠萬里尋此霞霧山頂果參函丈若窮子逢其父然於是侍留半月决擇心要飽受法乳如斯大恩雖碎身實難為報今於辭也豈無情義哉謹頌德兼發志願作偈獻之以表寸誠云吾觀本師大圓鏡亦觀弟子平等性同是一體徧十方廓然瑩徹了無影無生無佛絕能所虗通皎潔常寂照萬象森羅現其中吾師水月形亦露亦有弟子空華身淨穢苦樂皆現了今以吾師大和尚大圓鏡中弟子某歸命禮弟子鏡中本師古佛老發誠願語冀加被世世生生亦如是師為華藏世界主我為長子助其利或住兜率演法時我為天主常衛侍或坐菩提樹下時我為國王行法施如我今日本誓願種種莊嚴悉圓備供養十方無盡佛大乘菩薩及一切普與法界諸佛子同證如來常寂理滅除煩惱無餘垢一切妙行皆成就當來佛佛會會中互為賓主須常遇師為主我為伴師為伴我為主盡未來際作佛事度盡眾生歸去後同遊無上大涅槃一如今日遊霞霧吾雖幻質分彼此此心終不離左右辭王師出家何所為永斷世緣務我今辭王師且問何處去我本山中人宜入山中住不愛碧山行不厭紅塵走但為適性情修德報明主世間榮辱事看來如沫聚我若久留連聲名多錯誤不如忘是非林壑藏毛羽誰憐吾拙直林泉有幽趣聖君如護我賜放青山老山中何所有蒼蒼但烟霧於斯修道業於國垂法雨專心祝聖壽朝暮香一炷讚跋釋迦住山相讚也你無德毀也你無過割愛忘親不孝甚六年冷坐飢寒餓咄釋迦出山相人言是釋迦又道悉達陁莫莫莫休說夢渠非眼中花嵬嵬落落兮赤灑灑密密恢恢兮淨裸裸春風爛熳水悠悠獨步乾坤誰伴我若也山中遇子期豈將黃葉下山下咄德高無上讚不及慈深又重毀不得經無量刼勤修微妙行以恒河沙等恒河沙不測乃至如今出家入雪山親姻痛哭爛心肝爛心肝痛徹骨豈知真慈救世間休休休莫懵懵非夢說夢似夢非夢只這牟尼佛寂然無為常不動赤灑灑露裸裸的了了沒可把活釋迦是何聲夕陽沙鷗自呼名文殊提起吹毛利家風妙奇絕逍遙千聖外月映蘆花雪魚籃觀音幻化空身色轉新只宜着眼不容親金沙灘畔春風後狼藉深紅愁殺人愁殺人莫瞞盰缺齒重來誰愛看咦誰不識你醜多般達磨玄陵請拶破虛空儼然獨出坐斷毘盧頂上兮眼前無法亦無佛無佛無法兮天高地平非心非物兮水綠山青且將此曲渡海來對梁王兮彈一聲一聲復一聲幽澗湫兮流泉鳴勸君側耳莫與心暗恐傍人作意會得聽咄相識滿天下知心有幾人航海西來十萬里只為將傳一事耳對於梁王調不同如秋滿月處虛空一葦渡江向魏時清風護送平波中堪恨江邊釣翁老當時見伊不推倒若也推倒無去來後免神光斷臂苦十萬里來何所為人人盡有一雙眉獨携隻履還西去空使雲孫說是非非不非是不是重陽黃菊倚東籬你不來也天下平你還去也海河清熊耳白雲藏不得千古萬古傳虛名九年冷坐默無語多少人疑不奈何立雪有人傳密意春風無處不開花碧眼師未來前人人鼻孔撩天携隻履還西去個個眉目雙全恁麼去來為甚事冷地看來一笑緣神頭鬼面眉尨齒豁咄獨坐少林含毒氣隻履西歸真快活西來的的意正好默無陳怒目瞋何事佛是眼前塵乘蘆達磨嵬嵬乎沒巴鼻蕩蕩乎無與敵智不到處安用問如何至今無奈何云不識不識個什麼物梁王不肯這裏黑這裏黑兮妙用恒沙也無極黃葦蕭蕭起清風平波白浪連天千古色闔國人追喚不回誰道觀音再出來咄對梁王道不識好個西來曲調舉世人和不得青蘆故泛清波路布袋非僧非俗大閒人青山紫陌自由身有時橫行酒肆裏春風滿面忘天真咦紅顏慘別後白髮始相親藥王藥王藥王開大悲扃不忘前誓救眾生若未救我業病故何云菩薩大悲行五祖童形昔日栽松老道者再來端妙換童真無姓童時逢道信問去答來驚四隣祖師深知其法器便付衣鉢化如春後遇南方盧行者燈燈續燄至今新無端聽換却眼睛尊重法故不憚路程謁彼黃梅將欲老桃紅李白柳青青可憐負石踏碓日豈有毫釐可勞疾米熟久矣半夜入室親傳法衣命若懸絲因茲暗渡西江月誰識當時當別離羅漢玄陵請這鬼頭漢有些神力奇異貌稜稜聖凡也難測昔天台烟雨裏相對面目今不識不識個什麼物半文錢也不直呵呵呵汝與吾誠實人同心祝聖萬年春自讚張海院使請海東身竺西骨肚裏黑眼似漆且撚一隻蓬蒿箭橫行天下意不展忽然撞着霞峯老十分惡毒過愈露莫將些氣賣西東歸去來兮舊山中不與世人爭是非長年無事聽松風燕都永寧禪寺開堂日徒弟等請惟茲天下生此太古如芥中藏百億剎土咄這村僧是什麼鹵莽受聖旨兮誤揚家醜呵佛祖兮故作業苦呵呵呵從今且莫如此行直入青山伴猿虎玄陵勅刊百丈清規跋佛佛祖祖授受相傳之妙不在乎繩墨然人無禮儀則不得整其心行是以從上諸聖莫不兼行而垂訓於無窮者矣聖君矜信於斯命使流通豈非宿植般若光而行普賢大願行也哉大家遇斯聖化而可不自慶而修之歟重刊緇門警訓序盡大地人誰無佛性誰無信心然不遇聖教則不發無上菩提之心長沉苦海頭出頭沒虛生浪死實可悶也是以佛祖聖賢作不請友行無緣慈為說種種方便教化調伏令其生淨信心成就天上佛果菩提佛果菩提豈異事乎正是當人本覺心也大經亦云欲知如來大涅槃者須了知根本自性若人深信此語忽然反顧則知自心中無量妙義百千三昧本自具足分毫不謬此是正信心也三世聖賢出現於世無言語中而起言說正謂此耳大古南遊求法時幸遇斯警訓將歸本土意欲廣宣流布利國利人有年矣今有勝士明會發大誓願鏤板印施俾國人一見一聞皆結勝因畢竟同成无上正覺此斯警訓之大義歟太古語錄終附石室和尚書記七月間長老不憚萬里崎嶇求決己事來余峯頂此時相見老僧無一法可說長老無一字可問是真相見若有毫端許言之本末皆為見刺此是從上古人相見底道理長老當自保養轉示將來免墮邪見臘月十七日海門洪長老來山喜聞長老已回大都不審歸鄉去留如何便中畧此記達萬萬以大法為重是禱是禱至正丁亥臘月廿九日湖州霞霧山居石室老衲清珙手啟太古愚長老上石室和尚書弟子高麗國重興禪寺普愚九拜謹啟本師霞霧山石屋大和尚座下自八月一日為辭無日不瞻企善路行行十月十五日迴大都囊錐稍露諸山碩德朝廷大臣奏聞聖旨住持永寧禪寺十一月廿四日太子千秋令辰賜金襴拂子若香天使令嚴諸方四眾僅百千萬人聲鼓圍繞不得已陞座首爇祝釐之香次為老和尚拈出懷香一瓣開演宗乘扶揚末法此豈法乳之大恩也哉不敢不告家醜一塲狼藉卑辭謹以寫呈某願明春再參終身服勤倘業緣所拘不果歸鄉一依所教隨分二利不賤賣佛法以至後生不斷種子然此豈獨吾之所能正是佛佛祖祖本願提持也向者遇謁和尚所嗣承大事此日奉詔開堂亦有其使然豈敢以拙言了陳鄙懷伏惟照詳重復再拜祝願本師大和尚起居萬福萬福鄉人有便慈悲垂問以慰區區附石室和尚答書啟復別後老病日增掩關自養苟遣朝夕戊子十月十三日忽淨慈傳人遞至長老書誦間且知大古時緣俱稔諸山宿德大臣宰官奏聞聖旨住持永寧禪院開堂演法光揚宗教此乃長老情真契聖行實感人豈偶然哉又知開堂日辦香為老拙拈出且拙者退席從閒少歇狂妄耳焉敢妄想為人之師今長老乃如是豈非多生緣契也然而出世為人要以本分事激引來蒙慎勿以機境上遞相狐媚大家草裏輥斯何圖哉當自勉旃果然如此始終不異則皇恩佛恩一時報畢吾復何言路途雖千萬里之遙由目擊耳老倦且答不謹可恕可恕至正八年十一月初七日露峰石室啟復燕都諸山長老告朝廷請開堂䟽道非弘人人能弘道是故佛佛授受祖祖相傳禪燈無窮慧命不絕今太古庵悉宗門可者於一機上豁明星眼尋往南方湖州霞霧山謁石室和尚和尚一見如舊便知其器以本分手段不鎚成金一印印破太古放下重擔決返擲機佩印還都若不是上根烏能爾也光現祖燈重興佛日只在皇天臣僚伏望大檀越身心正直稱揚正法福利皇圖者切以少林室九年默神光斷臂覔心石室堂半月談太古放身卸擔古聖今聖之榜樣先祖後祖之規模不犯機絲透脫關棙兩行書兩家影為血脉之連枝一條杖一領衣但法印之標信爰一世之罕遇實萬刼之難逢雪巖風及庵寒天湖月太古色上國皇天之德望於斯益高本朝人寰之喜心夫復何語擁護是神部諸將弘揚實帝王大臣扣擊玄關䟽通密意所冀金輪共法輪常轉物阜民豐聖日將佛日恒明河清海晏和南謹䟽開堂榜江西袁州路清泉山延壽禪寺長老善南詢仲作大元國大都永寧禪寺伏值太子千秋令辰欽奉聖旨高麗國重興萬壽禪寺住持太古和尚開演宗乘之榜右伏以五色雲車駕彩龍式瞻瑞氣一縷香烟騰法界大振雷音花雨繽紛風雲慶會大地拔山河之秀一暘甦草木之萠杖屨南詢行役豈勞於萬里因緣北就闡揚方遂於平生老石室針芥相投太古庵鉗鎚本分稱師據位竪拂降魔水陸霑潤澤之功人天協昇騰之勝書同文車同軌共樂昇平河出圖洛出書咸歌治化一人有慶萬福攸同右恭惟三寶洞知龍天昭鑒至正七年丁亥十一月二十四日臨濟下第十九世高麗王師楊州天寶山檜巖寺懶翁慧勤禪師舊名元慧所居室曰江月軒俗姓牙氏寧海府人也父瑞具母鄭氏夢見金色隼墜卵人懷因而有娠以延祐庚申正月十五日生骨相異常既長機神英邁即求出家父母不許年至二十見隣友亡問諸父老曰死何之皆曰所不知也中心痛悼遂投功德山妙寂菴了然禪師所而祝髮了然問汝為何事剃髮師曰超出三界利益眾生請開示了然曰汝今來此是何物耶師曰此能言能聽者能來耳欲見無體可見欲覔無物可覔未審如何修進了然曰吾亦如汝猶未之知可往求之有餘師師於是辭退游歷諸山至正十四年甲午到檜巖寺宴處一室晝夜長坐時日本石翁和尚寓茲寺一日下僧堂擊禪牀云大眾還聞麼大眾無語師呈偈云選佛塲中坐惺惺着眼看見聞非他物元是舊王人勤修四載一日忽開悟欲往支那尋師訪道丁酉十一月發足向北戊戌三月十三日行到燕京法源寺初叅西天指空和尚空云汝從甚處來師云高麗來空云船來耶陸來耶神通來耶師云神通來空云現神通看師近前叉手而立空又問汝從高麗來東海那邊都見來也未師云若不見爭得到這裏空云十二個房子將得來否師云將得來空云誰教你來師云某甲自來空云為何事來師云為後人來空然之乃令隨眾二十年庚子三月師發燕都到通州上船四月八日到平江府休休菴結夏八月到淨慈禪寺蒙堂老宿問云你國還有禪法也無師以偈答曰日出扶桑國江南海岳紅莫問同與別靈光亘古通老宿無語即參見平山處林禪師山適在僧堂師直入堂內東西信步山云大德從何方來師云大都來山云曾見什麼人來師云曾見西天指空來山云指空日用何事師云指空日用千劒山云指空千劍且置將汝一劒來師以座具打山山倒在禪床大呌云這賊殺我師便扶起云吾劒能殺人亦能活人山呵呵大笑即把手歸方丈請茶留數月一日手書囑云三韓慧首座來見老僧看其出言吐氣便與佛祖相合宗眼明白見處高峻言中有響句句藏鋒茲以雪巖所傳及菴先師法衣一領拂子一枝付囑表信作偈曰拂子法衣今付囑石中取出無瑕玉六根永淨得菩提禪定慧光皆具足明年辛丑二月初二日辭退山又書一紙送行云三韓慧首座遠來湖上相依復欲徧參需語勇進拈起兔角杖向千巖大圓鏡裏一擊列祖機關必然於無分付處有所分付矣頌曰檜巖板首罵雲門百萬人天一口吞更向明師叅透了回家說法怒雷奔師禮辭去叅千巖元長禪師巖問大德從甚處來師云淨慈來巖云父母未生前從甚麼處來師云今朝四月初二日巖云明眼人難瞞師東還恭愍王封為王師洪武丙辰師卒于驪興神勒寺壽五十七臘三十七諡曰禪覺普濟尊者諡禪覺塔銘并序李穡奉教撰玄陵在位之二十年庚戌秋九月十日召師入京十六日就師所寓廣明寺大會兩宗諸山衲子試其所自得號曰功夫選上親幸觀焉師拈香畢陞法座迺言曰破却古今之窠臼掃盡凡聖之蹤由割斷衲子命根抖擻眾生疑網操縱在握變通在機三世諸佛歷代祖師其揆一也在會諸德請以實答於是以次入對曲躬流汗皆曰未會或理通而礙於事或狂甚而失於言一句便退上若有不豫色然幻庵修禪師後至師歷問三句三門會罷還檜巖辛亥八月二十六日遣工部尚書張子溫賷書降印法服鉢盂皆具封為王師大曹溪宗師禪教都摠攝勤修本智重興祖風福國祐世普濟尊者謂松廣寺東方第一道塲廼命居之壬子秋偶念指空三山兩水之記欲移錫檜巖會以召赴是寺法會得請居焉師曰先師指空盖嘗指畫重營而燬于兵敢不繼其志迺謀於眾增廣殿宇工既告畢丙辰四月大設落成之會臺評以謂檜巖密邇京邑士女往還晝夜絡繹或至廢業禁之便於是有旨移住瑩源寺逼迫上道師禁疾作輿出三門至池邊自導輿者從涅槃門出大眾咸疑失聲號哭師曰努力努力無以余故中輟也吾行當止於驪興耳至漢江謂護送官卓詹曰吾疾劇乞舟行泝流七日方至驪興又謂卓曰欲少留俟病間即行卓勉從之寓神勒寺五月十五日卓又督行急師曰是不難吾當逝矣是日辰時寂然而逝郡人望見五彩雲盖山頂既火之洗骨無雲而雨者方數百步得舍利一百五十五粒禱之分為五百五十八四眾得之灰中以自秘者莫知其數神光照耀三日乃已釋達如夢見龍盤燒臺下其狀如馬及以喪舟還檜巖無雨水漲皆驪龍之助云八月十五日樹浮圖於寺之北崖頂骨舍利厝于神勒寺示其所終也覆以石鍾戒其無敢訛也事聞于朝諡曰禪覺命臣穡為文臣仲和書丹篆額臣穡謹按師諱慧勤號懶翁初名元惠享年五十七法臘三十八寧海府人也俗姓牙氏考諱瑞具膳官令母鄭氏靈山郡人也鄭夢見金色雀飛來啄其頭忽墜卵五彩爛然入懷中因而有娠以延祐庚申正月十五日生年甫冠鄰友兦問諸父老死何之皆曰所不知也中心痛悼走入功德山投了然師祝髮師曰汝為何事出家對以超三界利羣生且請開示曰汝之來此是何物耶曰此能言能聽者能來爾但未知修進之術曰吾亦如汝猶未知可往求之有餘師至正甲申至檜巖晝夜獨坐忽得開悟尋師中國之志決矣戊子三月至燕都叅指空答問契合十年庚寅正月空集眾下語無能對者師出眾吐數語三拜而出空西天百八代祖師也是春南遊江淛秋八月叅平山山問曾見何人師曰西天指空日用千劒山云且置指空千劒將汝一劒來師以坐具打山山倒在禪床大呌賊殺我師曰吾劒也能殺人也能活人乃扶起山以雪巖祖欽禪師所傳及菴衣拂子表信辛卯春抵普陀洛迦山拜觀音壬辰至伏龍山叅千巖元長和尚適集江湖千餘人選入室巖問所自師既答巖云父母未生前從甚麼處來師曰今朝四月初二日巖許之是歲北還再叅指空空授以法衣拂子梵書於是游涉燕代山川蕭然一閒道人也名聞于內乙未秋奉聖旨住大都廣濟寺丙申十月望設開堂法會帝遺院使也先帖木兒賜金襴袈裟幣帛皇太子以金襴袈裟象牙拂子來賜師受袈裟問眾曰湛然空寂本無一物燦兮爛兮從何而出眾無對徐曰九重宮金口中乃披拈香祝聖陞座橫按拄杖下數語便下戊戌春辭指空得授記東還且行且止隨機說法庚子入臺山居焉辛丑冬上遣內詹事方節迎入京請說心要賜滿繡袈裟水晶拂子公主獻瑪瑙拂子太后親施布施請住神光寺因辭上曰於法吾亦退矣不得已即行十一月紅賊蹂躪京畿舉國南徙僧徒震懼請避賊師曰惟命是保賊何能為數日請益急是夕夢一神人面有黑誌具衣冠作禮曰眾散賊必滅寺願固師志明日至土地神座視其貌則夢所見也賊果不至癸卯入九月山上遣內侍金仲孫請還乙巳三月詣闕乞退始得夙願游龍門元寂諸山丙午入金剛山下未秋住清平寺其冬猊寶巖以指空袈裟手書授師曰治命也乙未再入臺山庚戌春司徒達睿奉指空靈骨來厝于檜巖師禮師骨因赴召結夏廣明寺秋初還檜巖九月即工夫選也師所居室曰江月軒平生未嘗習世俗文字有請願詠操筆立書若不經意理趣深遠晚好墨戲山水逼道權嗚呼道既通多能也宜哉臣穡謹拜手稽首而為之銘銘曰展也禪覺惟麟之角王者之師人天眼目滿衲宗之如水赴壑而鮮克知所立之卓雀夢赫靈在厥初生龍神護喪終然允臧矧曰舍利表其靈異江之濶矣皎皎明月空耶色耶上下洞徹邈哉高風終古不滅高麗國王師大曹溪宗師禪教都摠攝勤修本智重興祖風福國祐世普濟尊者諡禪覺懶翁和尚行狀門人覺宏錄師諱慧勤號懶翁舊名元慧所居室曰江月軒俗姓牙氏寧海府人也父諱瑞具官至膳官署令母鄭氏夢見金色隼飛來啄其頭墜卵入懷中因而有娠以延祐庚申正月十五日生骨相異常兒既長機神英邁即求出家父母不許年至二十見鄰友亡問諸父老曰死何之皆曰所不知也中心痛悼遂投功德山妙寂菴了然禪師所而祝髮然問汝為何事剃髮師曰超出三界利益眾生請開示然曰汝今來此是何物耶師曰此能言能聽者能來耳欲見無體可見欲覔無物可覔未審如何修進然曰吾亦如汝猶未之知可往求之有餘師於是辭退游歷諸山至正十四年甲午到檜巖寺宴處一室晝夜長坐時日本石翁和尚寓茲寺一日下僧堂擊禪床云大眾還聞麼大眾無語師呈偈云選佛場中坐惺惺着眼看見聞非他物元是舊主人勤修四載一日忽開悟欲往中國尋師訪道丁酉十一月發足向北戊戌三月十三日行到大都法源寺初叅西天指空和尚空云汝從甚處來師云高麗來空云船來耶陸來耶神通來耶師云神通來空云現神通看師近前叉手而立空又問汝從高麗來東海那邊都見來也未師云若不見爭得到這裏空云十二個房子將得來否師云將得來空云誰教爾來師云某甲自來空云為何事來師云為後人來空然之乃令隨眾師一日作偈呈似云山河大地眼前花萬象森羅亦復然自性方知元清淨塵塵剎剎法王身空云西天二十等人東土七十二等人這一等人指空這裏都無前無人後無人將指空出世法王也再那裏有師云法王身法王身三天為主利群民千劒單提斬佛祖百陽指空方丈名普遍照諸天吾今識得這消息猶是儂家弄精魂也大奇也大奇扶桑日月照西天空云爺也是狗娘也是狗爾亦是狗師即禮拜而退是月梅花開蕚空見之作頌云葉青花發一樹一十方八面無對一前事不問後事長香氣到地吾常喜師云年年此樹雪裏開蜂蝶忙忙不知新今朝一個花滿枝普天普地一般春又一日空垂語云禪無堂內法無外庭前栢樹認人愛清涼臺上清涼日童子數沙童子知師云入無堂內出無外剎剎塵塵選佛塲庭前栢樹更分明今日夏初四月五又一日空喚師云這僧堂裏達摩有耶無師云無空云外有齋堂爾見也未師云不見不見便歸僧堂空即令侍者問云善財歷叅五十三善知識末後叅彌勒彌勒一彈指下閣門遂開善財即入爾為什麼道無內外師答云善財其時未到這裏侍者舉似指空空云這僧高麗奴婢一日空云爾見普慶寺也未師云已見來空云文殊普賢有耶無師云好在空云說什麼話師云自那麼說空云喫茶去後一日師作偈呈似云迷則山河為所境悟來塵塵是全身迷悟兩頭俱打了朝朝鷄向五更啼空答云我亦朝朝聽錚聲空知是法器即俾居板首十年庚寅正月初一日空披皇后所賜紅衣裳於方丈內集眾云明然法王巍巍福國天上日下有祖不問大小有智慧者盡得對看眾無對師出眾云明然猶是那邊事巍巍福國是虛聲天日下祖俱打了到這般底是什麼空提起衣角云內外都紅師禮三拜而退是年三月離大都到通州上船四月八日到平江府休休菴結夏七月十九日將行長老請留師題一頌贈之鐵錫橫飛到休休得休休處便休休如今捨却休休去四海五湖任意遊八月到淨慈禪寺蒙堂老宿問云爾國還有禪法也無師以偈答曰日出扶桑國江南海岳紅莫問同與別靈光亘古通老宿無語師即叅見平山處林禪師山適在僧堂師直入堂內東西信步山云大德從何方來師云大都來山云曾見什麼人來師云曾見西天指空來山云指空日用何事師云指空日用千劒山云指空千劒且置將汝一劒來師以座具打山山倒在禪床大呌云這賊殺我師便扶起云吾劍能殺人亦能活人山呵呵大笑即把手歸方丈請茶留數月一日手書囑云三韓慧首座來見老僧其出言吐氣便與佛祖相合宗眼明白見處高峻言中有響句裏藏鋒茲以雪菴所傳及菴先師法衣一領拂子一枝付囑表信作偈曰拂子法衣今付囑石中取出無瑕玉六根永淨得菩提禪定慧光皆具足十一年辛卯二月初二日辭退山又書一紙送行云三韓慧首座遠來湖上相依復欲徧叅需語勇進拈起兔角杖向千巖大圓鏡裏擊列祖機關必然無分付處有所分付矣頌曰檜巖板首罵雲門百萬人天一口吞更向明師叅透了回家說法怒雷奔師禮辭詣明州補陀洛迦山親見觀音回來育王寺瞻禮釋迦像是寺長老悟光以頌讚云當陽挂起眉間劍殺活臨機摠自由恰似韶陽見靈樹肯將大法付常流又見雪窓和尚到明州見無相和尚又見枯木榮和尚對座良久木問首座坐禪不知如何用心師云無心可用木曰既無心可用十二時中誰將這個去來師舉目視之木云這個父母所生底眼父母未生前將什麼看師喝一喝云說什麼生與未生木便把手云誰道高麗隔海師拂袖便出壬寅四月初二日到婺州伏龍山叅見千巖長和尚元長禪師是日適集江湖千餘人試選入室師作頌呈似云擊擊雷音震羣龍盡豁開豈限靈山會瞿曇無去來便隨例而入巖問云大德從甚處來師云淨慈來巖云父母未生前從甚處來師云今朝四月初二日巖云明眼人難瞞即許入室因留同飯過夏至夏末辭去巖手書一紙送行云釋迦老子說一大藏教都是閒言長語末後迦葉微微一笑百萬人天悉皆罔措達磨面壁二祖立雪六祖蹋碓南嶽磨甎馬祖一喝百丈耳聾黃檗吐舌且不曾做長老首座來信之此事名不得狀不得讚不得毀不得只要爾廓然如太虛空相似不見有佛有祖有凡有聖有生有死有汝有我到得個般分際了無分際之量亦無虛空之相無種種之名所以道離相離名人不稟吹毛用了急須磨吹毛要用便用更磨個什麼爾若用得老僧性命在爾手裏爾若用不得爾性命又落在老僧手裏師喝便辭去到松江見了堂和尚泊巖和尚不敢羅籠是歲三月還到大都法源寺再叅指空和尚空迎入方丈請茶遂以法衣一領拂子一枝并梵草信書一紙付囑云百陽喫茶正安果正安指空方丈名也年年不昧一通藥東西看見南北然明宗法王給千劍師答云奉喫師茶了起來即禮三只這真消息從古至于今因留一月辭退游歷燕代山川數載道行聞于帝乙未秋奉聖旨住大都廣濟禪寺丙申十月十五日設開堂法會帝遺院使也先帖木兒賜金襴袈裟并幣帛皇太子亦以金襴袈裟象牙拂子賜之是日千官僚佐及士庶諸山長老江湖衲子俱會師受袈裟乃披拈香祝聖罷又拈香云此一瓣香奉為西天一百八祖指空大和尚平山大和尚用酬法乳之恩陞座普說見語錄十七年丁酉退院游燕薊名山還到法源寺問指空云弟子當往何處空云汝還本國擇三山兩水間居之則佛法自然興矣戊申三月二十三日禮辭指空還於遼陽平壤東海等處隨機說法至庚戌秋入壺山象頭庵居焉時浙僧古潭來住龍門山通信書師以頌答曰臨濟一宗當落地空中突出古潭翁把將三尺吹毛劒斬盡精靈永沒蹤潭以白紙一丈答之外封書君子千里同風六字師受之笑而擲之侍者開坼乃空紙也師以筆墨二物答之辛丑冬上遺內詹事方節以內乘馬迎入城中十月五日入內三殿修敬已請說心要師普說作三頌進呈上歎曰聞名不如見面賜滿繡袈裟水晶拂子公主亦以瑪瑠拂子施之太后親賜布施因請住神光寺師辭云山僧只欲還山專心祝上伏望聖慈上曰若然則於法吾將退矣即遣近臣金仲元為輔行師不得已是月二十日到于是寺十一月紅賊突入京都國家播遷惟師自領徒眾如常演法一日賊輩數十騎到寺師儼然對之賊首以沉香一片獻之禮拜而退自後大眾疑懼勸師避亂師止之曰惟命是保賊輩何關汝事後一日大眾復請師不得已許之以明日為期是夕夢一神人具衣冠而禮告曰眾散則賊必滅寺願固師志言訖而退師明日至七神座視其貌即夢所見也神眾諷經化之終不移動賊騎往返雖數然常住錢粮與其人戶不被所掠癸卯七月再三上書辭退上不允師自抽身而出到九月山金剛菴上遺內侍金仲孫特降內香又敕西海道指揮使朴曦按廉使李寶萬海州牧使金繼生強師復住師不獲已十月還山留二載乙巳三月詣闕上書辭退遊龍門圓寂諸山隨緣任運丙午三月入金剛山住正陽菴丁未秋上命交州道按廉使鄭良生請住清平寺是年冬普菴長老親受指空遺囑袈裟一領手書一紙到寺授之師乃披拈香普說己酉九月以疾辭退又入壺山住靈感菴洪武庚戌春元朝司徒達睿奉指空靈骨舍利到檜巖三月師因禮骨出山上遣近臣金元富迎之禮骨已入城結夏於廣明寺八月初三日赴內齋齋畢普說十七日上遣近臣安益祥為輔行請住檜巖寺九月設工夫選大會兩宗五教諸山衲子選其所自得請師主盟十六日開選席上率諸君兩府文武百僚親幸臨觀禪講諸德江湖衲子悉皆集會時雪山國師千禧和尚亦赴是會師與國尊相見初入方丈提起座具云和尚國尊擬議師以座具打頭便出舍那堂中排設法座師拈香罷陞座垂問在會大眾以次入對皆曰未會或理通而礙於事或狂甚而失於言一句便退上若有不豫色然幻菴修禪師後至師歷問三句三關師之前在金經寺也上使左街大師慧深問師曰以何言句試取工夫師答云先問入門等三句次問工夫十節後問三關可驗功行淺深眾皆未會故不及十節三關會罷上使天台禪師神照請問工夫十節師手書進獻十八日上遣知申使廉興邦安下金經寺翌日又遣代言金鎮迎入內庭勞慰賜鞍馬遣內侍安益祥送至檜巖師既到寺已還送鞍馬辛亥八月二十六日遣工部尚書張子溫賷書降印并賜金襴袈裟內外法服鉢盂封為王師大曹溪宗師禪教都摠攝勤修本智重興祖風福國祐世普濟尊者太后亦獻金襴袈裟謂松廣寺為東方第一道塲乃命居之遣內侍李士渭為輔行二十八日發檜巖九月二十七日到松廣壬子秋師偶念指空三山兩水之記請移錫檜巖上又遣李士渭迎來檜巖九月二十六日將指空靈骨舍利安塔于寺之北峰癸丑正月遊於瑞雲吉祥復興諸山八月還松廣九月上又遣李士渭請主檜巖消災法席甲寅春又遣近臣尹東明仍請住是寺師曰此地是吾初入道處亦先師安骨之地况先師曾授記於我烏得無心哉即令眾重搆殿閣九月二十三日上薨師躬詣殯殿對靈小叅修書還印于朝今上即位遣內臣周彥邦降內香并送印寶再封為師至丙辰春修營已畢四月十五日大設落成會上遣具官柳之璘為行香使京外四眾雲臻輻湊莫知其數會臺評以為檜巖密邇京邑四眾往還晝夜絡繹或至廢業於是有旨移住瑩原寺逼迫上道師適疾作輿出三門至南池邊自導輿者還從涅槃門出大眾咸疑失聲號哭師顧謂眾曰努力努力毋以予故中輟也吾行當止驪興耳五月初三日到漢江謂護送官卓詹曰吾今病劇願欲舟行即與門徒一十餘人泝流七日方到驪興語卓曰吾疾益篤不可過此請以此申聞于朝卓既馳聞師寓神勒寺留數日驪興守黃希直道安監務尹仁守受卓命篤行急侍者以告師曰是不難吾當逝矣時有僧問正當伊麼時如何師竪起拳頭僧又問四大各離向什麼處去師交拳當心云只在這裏又問在這裏時如何師云別無奇特又僧問如何是無奇特底道理師瞪目視之曰吾與爾相見時有什麼奇特又有僧纔舉不病者話師敕云爭問什麼乃告眾云汝等諸人各宜諦看老僧今日為汝等作涅槃佛事畢矣到辰時寂然而逝五月十五日也驪興道安兩官同封印寶師顏色如常驪興守申報按廉按廉傳聞于朝當示寂時郡人望見五彩雲盖山頂又師所騎白馬預前三日不喫草垂首悲泣茶毗已訖頭骨五片牙齒四十皆不燒以香水洗之時無雲雨其地其舍利不知其數四眾撥灰燼沙土而得之者亦不可勝數也時郡人咸見山上神光瑩澈寺僧達如夢見神龍蟠繞焚臺還入于江其狀如馬門人陪靈骨舍利將舟還檜巖患旱久水淺忽無雨而水漲與久滯眾船一時順流而下則神龍之助可知也二十九日到檜巖安于寢堂八月十五日樹浮圖於寺之北岸往往有神光照耀粘舍利頂骨一片安于神勒寺造石鍾以覆之師壽五十七臘三十七諡曰禪覺塔曰師常自言曰山僧不解文字然其歌頌法語若不經意皆極其妙今分為二秩行于世先師德行固已偉然實非弱辭所能稱述粗記始末以傳不朽謹記懶翁和尚語錄侍者覺璉錄廣通普濟住釋幻菴校正附普濟尊者語錄序玄陵高麗恭愍王之師普濟尊者嗣法於西天指空浙西平山大闡宗風故其片言半句為世所重語錄所以述也師之道之行之與否也固在於後之人後之人之知師之道也非語錄無由宜其弟子之區區於此也予以非才奉旨撰銘又引語錄吾之幸也歟吾之不幸也歟後之來者尚監之哉弟子名覺玕覺然覺卞校讎舊本將繡之梓求予序故畧序如此蒼龍己未八月既望韓山君李穡序師自江南行脚畢還大都游涉燕代山川道行聞于內乙未秋奉聖旨住廣濟禪寺丙申十月望設開堂法會賜金襴袈裟象牙拂子是日諸山長老江湖衲子及諸文武官僚無不集會師受袈裟提起問中使云山河天地草木叢林盡是一個法王身未審這個向什麼處披中使云不識師指左肩云向這裏披師又問大眾云湛然空寂本無一物燦兮爛兮從何而出眾無對師曰九重宮金口中乃披拈香祝聖罷陞座橫按拄杖云利劒全提正令當行擬議之間喪身失命還有當鋒底麼有麼有麼正好一帆風過夏此中不遇駕舟人世謝不錄竪起拂子云三世諸佛歷代祖師天下老和尚盡在山僧拂子頭上放大光明異口同音奉祝我皇帝大眾還見麼若道不見有眼如盲若道有見且作麼生見還會麼見與不見會與不會拈向一邊畢竟是個什麼擲下拂子云犛牛拂子也不識便下座神光卷入院師到三門以手指云盡大地是個解脫門大眾還曾入門麼若也未入隨我向前至普光明殿云蹋着毗盧頂上猶是染足底漢且道禮拜個什麼以手指像云因我得禮爾次到據室云此室是烹佛烹祖底大爐拈拄杖云這個是殺佛殺佛底利劒大眾還有劒下翻身底麼不妨出來不妨出來卓拄杖一下云除是我家親嫡子誰人敢向裏頭行喝一喝便下座次上堂拈香祝聖罷陞座云山僧未離壺山已前早為諸人說破今日事了也即今賓主相參坐立儼然已成多事更山僧拋沙撒土白雲萬里雖然如是官不容針私通車馬還有知音者麼問答了乃云塵塵剎剎沒一纖毫日日堂堂現成活計看時不見暗昏昏用則無窮明歷歷三世諸佛立在下風歷代祖師退後三千且道是什麼物得恁麼奇特還委悉麼若能委悉於一切處離名離相摧邪顯正橫拈倒用殺活自在將一莖草作丈六金身將丈六金身作一莖草驀拈拄杖左邊卓一下云這個是一莖草那個是丈六金身右邊卓一下云這個是丈六金身那個是一莖草若向這裡提得去皇恩佛恩一時報足其或未然各歸堂子細看結制上堂師到法座前以手指云這一着子多少人登不到蹋不着山僧到來等閒蹋斷流水聲縱觀寫出飛禽跡拈香云堯仁廣被齊日月之盛明湯德彌新並乾坤之久固山僧信手拈來爇向爐中端為祝延聖上陛下萬歲萬歲萬萬歲陞座云努發機而眼判箭破的而手親莫有眼判手親發機破的底麼出來有僧便出從東過西從西過東却立中間問云和尚陞座學人上來未審是甚時節師云一任東西馳走問和尚自方丈裏來到寶座學人從寂默堂中來到這裏未審彼處還更有身不師云有學人云莫是毛端藏剎海芥子納須彌麼師云是進云宗門中事即不問如何是北崇峯前境師云山門依舊向南開問如何是境中人師云眼橫鼻直皆相似進云人境已蒙師指示向上還有事也無師云有進云恁麼則向上一路作麼語至言妙理是何宗蕩盡此言千里外是則吾宗第一機作麼生是第一義師云爾問底是第二義進云恁麼則丈夫自有衝天志不向如來行處行師云非爾境界問今日諸官僚士庶特請上堂來到這裏發言吐句舉香祝香上床就座橫拈倒用底莫是和尚為人處也無師云不是進云如何是和尚本分底事師竪起拂子進云胡亂三十年不曾少醬師云莫說閒言語進云學人承聞和尚親見平山是否師云是進云如何是天竺山親傳底一句師以拂子擊禪床一下進云千古嶺南好消息今日清風吹匝地此則且置今日高陞寶座非為他事祝聖一句請師道着師云萬年聖日裏福長文武四法隨大陽進云四海五湖王化裏不勞野老賀昇平退禮三拜又有僧出問云一切即不問如何是明了底心師舉起拂子進云向上一路千聖不傳如何是不傳底事師云爾問我答僧即禮而退又有僧問見色明心聞聲悟道如何是明底心師竪起拂子進云如何是悟底道師便喝僧禮拜而退師乃云本來無結何須解無觧隨時示道流打破虛空成片片一條毒棒毒難收有時肩擔向山去直入千峯萬嶺頭佛祖相逢當怖走縱橫殺活總無虧興波作浪非他物振動乾坤也是他驀地一聲親蹋着不移一步便還家拈拄杖云還見麼卓一下云還聞麼若能見得徹聞得通山河大地萬像森羅草木叢林四聖六凡情與無情便見氷消瓦解到這裏是禪耶是道耶是凡耶是聖耶是心耶是性耶是玄耶是妙耶是異耶是不異耶又卓一下云禪也不可得道也不可得凡也不可得聖也不可得心也不可得性也不可得玄也不可得妙也不可得異也不可得不異也不可得只這不可得亦不可得既摠不可得畢竟是個什麼還會麼若也會得皇恩佛恩一時報足其或未然更舉一着真性絕攀緣真見不由境真智本無礙真慧本無邊上合諸佛本源下合眾生心地所以道處處真處處真塵塵盡是本來人真實說時聲不現正體堂堂沒却身大眾作麼生是堂堂正體卓一下云這個是堂堂正體那個是拄杖子又卓一下云這個是拄杖子那個是堂堂正體遂擲下云貪他一粒米失却半年糧眾慈久立珍重下座解制上堂師陞座云四月十五當結制七月十五方觧結衲子聚之還復散春去秋來新舊變驀拈拄杖云且道這個是結耶是觧耶是聚耶是散耶是去耶是來耶是新耶是舊耶是變耶是不變耶卓一下云結也不可得解也不可得聚也不可得散也不可得去也不可得來也不可得新也不可得舊也不可得變也不可得不變也不可得既摠不得畢竟是個什麼擲下云剔起眉毛親見徹堂堂的信是烏藤珍重入內普說佛真法身猶若虛空應物現形如水中月竪拂子云釋迦老子來也在山僧拂子頭上現妙色身放大智光明開大解脫門全為我聖上陛下萬萬歲百千法門無量妙義世出世間一切諸法盡在裏許諸人還見麼若也見得徹去山河大地萬象森羅草木叢林四聖六凡情與無情不銷一捏便見氷消瓦解到者裏也無禪也無道也無心也無性也無玄也無妙淨倮倮赤灑灑沒可把便恁麼去更買草鞋行脚三十年未夢見衲僧氣息且道衲僧氣息有什麼長處良久云夜靜子規知此意一聲聲在翠微中小參進一步則天地平沉退一步則虛空撲落不進不退有氣死人摠不恁麼畢竟如何還有道得者也無若有道得者出來良久云擬議之間十萬八千以棒打床一下下座除夜小參虛明獨露絕對絕緣自古今難為話會所以靈山會上拈花示眾少林夜半立雪安心發揮刧外光明照見本來面目拈起拂子云這個是本來面目那個是拂子又竪起云者個是拂子那個是本來面目諸人還會麼於是驀得無疑臘月三十日免得手忙脚亂若也有疑臘月三十日今正是時諸人作麼生折合去舉起拂子云這一絡索過去也只恁麼未來也只恁麼現在也只恁麼逗到今夜舊歲君未去新歲君未來正當與麼時且道不涉新舊底一句作麼生擲下拂子云舊歲今宵盡新年明日來珍重下座自恣日趙尚書請普說覺性如虛空地獄天堂自何而有佛身徧法界傍生鬼趣甚處得來汝等諸人曰僧曰俗曰男曰女從生至死日用之中所作所為或善或惡皆謂之法也何者為心心在諸人分上喚作自己又喚作主人公十二時中受他主使一切處聽他差排頂天立地也是他負海擎山也是他使汝開口動舌也是他使我舉足動步也是他此心常在目前視之不見聽之不聞着意求之轉求轉遠顏子有云仰之彌高鑽之彌堅瞻之在前忽焉在後便是這個道理當其一念未生之際一真無妄之時皎皎然如古鏡之光明無染無污昭昭然如止水之澄潭不動不搖胡來胡現漢來漢現照天照地鑑古鑑今無一絲毫隱蔽無一絲毫障礙這個是諸佛諸祖境界亦是諸人自古至今受用不盡底本有之物今日追薦趙氏之靈法界先亡及滿堂四眾還無疑也未若也有疑更起一端舉竹篦子云還見麼打一下云還聞麼既聞畢竟是個什麼於斯的的無疑兼承吾佛盂蘭之力便拔其苦即與其樂輕則生於天宮重則生於佛國今日辦會施主趙氏為先亡父母作種種佛事如此功德何罪而不滅何業而不消何福而不生何善而不長以下似有闕漏庚戌九月於檜巖寺設工夫選師為主盟禪講諸德江湖衲子悉皆集會時雪山國師亦赴是會師與國尊相見初入方丈提起坐具云正法眼藏作麼生扶起臨濟正宗作麼生扶起三玄三要耶四料揀四賓主四喝耶且喝是粥飯氣阿誰不會如何喚作臨濟正宗縱使道一喝分賓主照用一時行會得箇中意日午打三更這說話只瞞得諸人瞞不得山僧諸人子細點檢看良久喝一喝云此喝未形已前賓主照用是有是無此喝既消之後照用賓主是有是無正當喝時賓主照用在喝裏在喝外在不裏不外耶又一喝云却將個中意一時說破了山僧與麼批判還扶得臨濟正宗起麼既扶不起臨濟正宗决定不在照用處四料揀四賓主四喝三玄三要處既不在一切處畢竟在什麼處只在諸人分上諸人當知自己分上一着子煩天共地三世諸佛歷代祖師天下善知識不敢正眼覷着只貴當人直下承當便了前輩尊宿為爾不肯直下承當不得已曲垂方便教爾參個無義味話只如僧問趙州狗子還有佛性也無州云無早是和盤托出爾不能得領略不得已而如死馬醫又教爾草草捏一個無字先將四大五蘊六根六塵乃至目前所見山河大地明暗色空森羅萬象情無情等都盧并作一個無字一舉舉起行也恁麼舉乃至坐臥睡夢喫飯一切處只如此舉綿綿密密無間無斷打成一片針剳不入銀山鐵壁相似不知不覺一拶拶透自己一着子不待承當而自然分曉矣父母未生前面目也分曉四大各散後落處也分曉山僧說話瞞爾處也分曉從上祖師千差萬別誵訛處也分曉既一一分曉即是扶起臨濟正宗時節也當此之時世法佛法了無縫罅便見三玄三要四料揀四賓主四喝以至四大五蘊六根六識山河大地萬象森羅無一法不是臨濟正宗不待扶而自起也然後剗除也得建立也得我為法王於法自在者也下座浴佛上堂師拈香罷陞座舉世尊初生下來一手指天一手指地周行七步目顧四方云天上天下唯我獨尊師云大眾還會麼見恠不恠其恠自退悉達纔生於此日指天指地起風波做模打樣多般恠添得兒孫眼裏沙每到年年今八日一盆香水洗痕瑕洗來洗去塵何盡洗到驢年又更差以拂子敲床三下隨後云大眾各具威儀同時灌佛便下座結制上堂師拈香祝聖罷又拈香云此一瓣香得之久矣前來未曾拈却今因普庵長老傳信衣來所以爇向爐中令不見者見不聞者聞奉為西天一百八祖指空大和尚用酬法乳之恩便插陞座云今日是天下叢林結制之晨清平山比丘懶翁將得無名無字無形無狀無迷無悟無修無證明如日黑似漆底一物散在諸人面前打鼓普請看諸人還會麼若也未會更露个消息去也拈拄杖云還見麼卓一下云還聞麼既見既聞是個什麼於斯驀得無疑曰僧曰俗曰男曰女曰存曰亡不歷階梯透過那邊更有什麼長期短期結制解制其或未然三月安居九十日內縫却拄杖頭結却布袋口向三條椽下七尺單前跳出金剛圈吞却栗棘蓬作夢中佛事降鏡裏魔軍三業清淨六根明潔四威儀內無諸過患紹隆祖位永不斷絕豈非大丈夫真出家兒若能如是今日申氏追薦申君平洎諸靈魂等蒙此功德何罪而不免何苦而不脫十方佛剎隨意往生隨處快樂豈不暢哉雖然如此竪起拂子云這一着子屬修證耶不屬修證耶擲下云具眼衲僧試自斷看下座達磨開光祝筆師舉筆云既是迦葉二十八代祖又能具眼降伏大賊為什麼却要他人點眼還有道得底麼若也道得非但為達磨吐氣亦使徧法界眾生悉霑利益若道不得聽取一頌良久云直指人心明見性老胡知放不知收從茲眼病空花發徧界紛紛翳亂墜翳亂墜兮自不休杳杳冥冥路轉遙以筆點云今日添渠舊先彩碧眸瑩瑩徹青霄指空和尚誕生之辰師至真前云驀面相逢親見徹機鋒嶮峻骨毛寒諸人欲識西天面一片香烟起處看插香良久云且道西天面目與東土面目是同是別雖然黑白東西異鼻孔堂堂却一般入寂之辰師云來無所來如朗月之影現千江去無所去似澄空之形分諸剎且道指空畢竟在什麼處燒香云一片香烟隨手起個中消息幾人知又生來一陣清風起滅去澄潭月影沉生滅去來無罣礙示眾生體有真心有真心休埋沒此時蹉過更何尋又師拈香云千劒全提常活用皇王罵動作奴之平生氣壓東方老今日等閒轉一機何處在插香云欲識真去處請看這裏更休疑又師拈香云碧雙瞳穿兩耳髭須胡兮面皮黑但恁麼來恁麼去不露奇相及神通預期獨往家鄉路傳語今知輪帝宮臨行垂示無人會痛罵門徒不解宗儼然遷化形如古徧體溫和世不同不孝子無餘物獻茶一盌香一片便插示眾師一日集眾各問日用工夫畢示眾云若如此則須發丈夫心立决定志將平生悟得底解會得底一切佛法四六文章語言三昧一掃掃向大洋海裏去更莫舉着把八萬四千微細念頭一坐坐斷却將本參話頭一提提起或萬法歸一一歸何處或那個是本來面目或那個是我性或僧問趙州狗子還有佛性也無州云無蠢動含靈皆有佛性因甚狗子無佛性只將末後一句着力提起提來提去公案現前不提自提靜中閒中不舉自舉却來這裏好起疑情行住坐臥着衣喫飯屙屎放尿於一切處通身并作一個疑團疑來疑去拶來拶去凝定身心討個分曉不可向公案上卜度語錄經書上尋覔直須晬地斷爆地絕方始到家若是話頭提不起冷冷淡淡全無滋味低低出聲連舉三徧話頭便覺有力到這裏正好着力不可放捨諸人各各立志抖擻精神挪挲眼睛精進中更加精進勇猛處更加勇猛忽然踢着磕着千了百當到這裏正好見人不問二十年三十年水邊林下長養聖胎天龍推出敢向人前開大口說大話金剛圈吞吐自在荊棘林中掉臂經過於一念中吞却十方世界吐出三世諸佛若到這裏方許爾頂廬舍冠坐報化佛頭其或未然晝參夜參高着蒲團急着眼睛看他是個什麼道理便下座張相國請對靈小參邊崇靈魂這一點靈眼自無始時來至于今日無煩惱可斷無菩提可求也無去來也無真妄也無生死在四大時也恁麼離四大時也恁麼今乙卯臘月十四夜在天寶山檜巖禪寺了了明明聽我言說且道聽法底是屬煩惱耶是屬菩提耶是屬來耶是屬去耶是屬真耶是屬妄耶是屬生耶是屬死耶既摠不得是個什麼畢竟向什麼處安身立命以竹篦擊香臺一下云還會麼若也不會更聽末後一句云欲識堂堂真去處一輪孤月正當天再擊香臺下座國行水陸齋起始六道普說師陞座良久云承懿公主為首諸佛子等還會麼於斯驀得迴光一鑒不問地獄餓鬼畜生修羅人道天道便能蹋着本地風光其或未然說小葛藤諦聽諦審公主三十六年前此個不曾生承宿善因遊戱人間為萬民之慈母施諸良德因小宿債寂默翻身三十六年後此個不曾死緣盡離別別立生涯承懿公主四大成時這一點靈明不隨成四大壞時這一點靈明不隨壞生死成壞等空花冤親宿業今何在今既不在覓無蹤坦然無礙若虛空剎剎塵塵皆妙體頭頭物物摠家翁有聲有色明明現無色無聲默默通隨時應節堂堂現自古至今玄又玄橫拈倒用非他物殺活臨機摠是渠承懿公主還了徹也未其或未撤山僧又為公主打撤去也以竹篦子打一打喝一喝云於斯驀得洞徹透過玄關徹見三世諸佛歷代祖師天下善知識骨髓與三世諸佛歷代祖師天下善知識把手共行又打一下云以此超度多生父母歷刧冤親以此超度生生世世妄作子相害母冤親以此超度他方此界古往今來一切冤親以此超度地獄道中種種受苦一切眾生以此超度餓鬼道中一切飢渴眾生以此超度畜生道中一切酸苦眾生以此超度修羅道中一切瞋恚眾生以此超度人道中我慢貢高一切眾生以此超度天道中着在快樂一切天眾擲下云到岸捨舟常式事何須更問渡頭人迴向師陞座祝香罷以竹篦子打香臺一下云承懿仙駕為首諸佛子等從無始已來至于今日背覺合塵枉入諸趣或在地獄或在餓鬼或在畜生或在修羅或在人道或在天道昇沉不等苦樂不同只為汝等無量刧來昧却本來面目承懿仙駕欲免冤親欲免生死欲渡苦海無過迴光返照識得公主本來面目承懿公主人間出來降誕王宮三十餘年遊戱人間作一國公主利諸萬民是父母所生底面目作麼生是父母未生前面目即今四大分散靈識獨露虛明獨照不問遠近山河石壁不能留礙請則便到今這裏歷歷明明聽我言說者是個甚麼是個甚麼於斯徹見的的無疑十方佛剎隨意自在其或未然山僧又為公主說小水陸因緣諦聽諦審水陸冥陽大道場塵塵剎剎盡宣揚三途聞法皆離苦六趣承恩法體康有恨有冤心易斷無涯無候性難量滿堂兄弟還知未明月清風處處彰佛佛降臨來此會三賢十聖盡歸依安心受供生歡喜漸入金剛妙覺衣眾生具造恒沙罪一句能消轉一機如斯功德無邊量承懿仙駕淨土歸且道承懿仙駕在淨土耶在穢土耶在佛界耶在眾生界耶在此界耶在他界耶又打一下云淨土也不可得穢士也不可得佛界也不可得眾生界也不可得此界也不可得他界也不可得既摠不得畢竟在什麼處擲下云細惑盡除無一物大圓鏡裏任優遊殯堂對靈小參師喚云承懿公主三十六年扶持四大火風先去地水獨存山僧毒手徹底掀翻驀的一聲隨意悟入隨意受用喝一喝云承懿仙靈掇轉虛空無背面一塵不立露堂堂翻身直透威音外落落真風沒處藏以拄杖打棺三下又喚云承懿公主驀蹋澄潭秋夜月普天匝地結氷霜喝一喝正朝六道普說師云諸佛子汝等洗心諦聽諦聽即今四大各離靈識獨露雖然似隔山河石壁即此靈知往返無礙遊歷十方塵剎絕跡不問遠近瞬目之頃請則便到或在地獄者或在餓鬼者或在畜生者或在修羅者或在人道者或在天道者今癸卯臘月三十日盡在這裏歷歷明明聽我言說且道即今說話底能聽底是生耶是死耶是滅耶是不滅耶是來耶是去耶是有耶是無耶咄云生也不可得死也不可得滅也不可得不滅也不可得來也不可得去也不可得有也不可得無也不可得只這不可得底亦不可得畢竟是個什麼良久云驀得翻身超刧外鑊湯從此却清涼師陞座良久云諸佛子等還委悉麼於斯若能委悉不問地獄餓鬼畜生修羅人道天道便與佛祖為師其或未然山僧為汝等說些葛藤諦聽諦聽汝等自無始已來至于今日妄執四大為自身體妄想分別為自真心從朝至暮終年竟歲身口意三造諸惡業輕重不等或入地獄者或墮餓鬼者或墮畜生者或墮修羅者或在人道者或在天道者今甲辰正月初一日摠在這裏汝等各各放捨諸緣休息萬事懺除多生重罪歸依自心三寶佛法僧寶可以為汝等之善知識為汝等之大導師三世諸佛歷代祖師天下善知識皆依此而成正覺十方世界廣度眾生皆令成佛未來諸佛菩薩不依此而成正覺者無有是處若要種智圓明十號俱彰須是歸依自心三寶始得歸依者捨妄取真之義也即今了了覺悟虛明靈妙天然無作者是汝佛寶永離貪愛雜想不生心光發明照十方剎者是汝法寶清淨無染一念不生前後際斷獨露堂堂者是汝僧寶諸佛子是為汝等真歸依處是為一心三寶汝等還了徹也未若能了徹法法圓通塵塵解脫三途六趣不復輪迴其或未然更舉古聖入道因緣令汝開解三祖璨大師初參二祖云某甲罪重請和尚懺罪二祖云將罪來與汝懺三祖良久云覔罪不可得二祖云與汝懺罪竟宜依佛法僧住三祖云我見和尚是僧未審如何是佛法二祖云是心是佛是心是法佛法無二僧寶亦然三祖云今日始知罪性不在內不在外不在中間佛法無二也二祖云如是如是諸佛子既云罪性不在內不在外不在中間畢竟在什麼處良久云若窮起處不得是為罪性本空還無疑也無於斯的的無疑不妨正眼豁開其或未然又舉一段令汝除疑古云見色便見心眾生只見色不見心竪起拂子云這個是色那個是汝等心又竪起云這個是汝等心那個是色擲下云即色即心當處現時人撥象覔空心崔尚書請對靈小參師陞座喚云羅氏靈魂羅氏靈魂還會麼若也不會為汝破疑羅氏靈魂六十三年前四緣假合假名為生生不曾生六十三年後至于今日四大離散假名為死死不隨死既不隨死又不曾生生死去來本自無實生死去來既無實則虛明獨照刼刼常存羅氏靈魂為首諸佛子等這一點虛明三世諸佛說不及歷代祖師傳不到既說不及又傳不到四生六道一切眾生各各本來具足既本具足喚什麼作生喚什麼作死喚什麼作來喚什麼作去喚什麼作苦喚什麼作樂喚什麼作古喚什麼作今既無生死去來苦樂古今這一點虛明淨倮倮赤灑灑沒窠臼如是則盡十方世界無內無外是可淨妙佛土是可無上佛土是可無量佛土是可不思議佛土是可不可說佛土既有如是佛土辦會施主崔氏等今請山僧舉揚此段大事因緣追薦亡母羅氏靈駕且道在那個國土中良久云一塵一佛土一葉一釋迦下座趙尚書請對靈小參師陞座以竹篦打香托一下云蔡氏靈駕還會麼於斯會去驀然蹋着本地風光若也不會且聽葛藤蔡氏靈駕五十餘年遊於幻海作諸幻事今朝不覺四大離散各歸本處唯一點虛明朗然獨照不問遠近請則便到山河石壁不能障礙只此光明十方剎海逗塞虛空頭頭物物晝夜六時熾然常現所以云山河及大地全露法王身草木叢林盡作師子吼一處現身千處萬處同時出現一處說法千處萬處同時演說一身現多身多身現一身一法為萬法萬法為一法如帝網珠互相攝入如大圓鏡影像交參其中一切眾生不問僧俗不問男女不問有智無智有情無情來者去者存者亡者悉皆成佛蔡氏靈駕還會麼於斯的的無疑透過玄關便與三世諸佛歷代祖師天下善知識把手共行他方此界任自逍遙其或未然且聽末後一句以竹篦打香托一下云驀地一聲翻一擲大圓覺海任優遊喝一喝下座長興寺願堂主請六道普說師良久以竹篦打托一下云承懿公主仙駕李氏靈駕諸佛子等還會麼四聖六凡從此而分四聖六凡從此而合汝等還會麼若也不會為說一言今汝等歸家諦聽諦審承懿仙駕李氏靈魂若論此段大事因緣不問在地獄道者在餓鬼道者在畜生道者在修羅道者在人道者在天道者各各本來具足從朝至暮從暮至朝行住坐臥運轉飢寒或善或惡或苦或樂於一切處用之千般但是迷悟有殊所以長受快樂者長受極苦者兩境不同諸佛子一點靈明在聖不增在凡不減解脫無依活鱍鱍地無所滯礙雖無形狀雖無處所而能通貫十方世界徧入諸佛法界頭頭上明物物上現取之不得捨之常存自從無量廣大刧來生不隨生死不隨死他方此界往返無蹤在眼曰見在耳曰聞六根互現了了分明諸佛子還無疑也未於斯的的無疑不妨正眼豁開續佛慧命超師機用大振玄風若更有疑又舉一着除去餘疑着眼着眼舉起棒云還見麼打一下云還聞麼既見既聞是個什麼便下座為申白大禪師對靈小參諸法從緣生緣盡法還滅六十二年遊幻海收因結果渾歸真根塵脫盡無餘物撒手便行刧外身喚云申白尊靈還果如此出生入死得大自在其或未然且聽末後一句夜靜不勞重借月玉蟾常掛大虛中解制上堂太后送袈裟一領師拈法衣云大庾嶺頭提不起處爭之不足放下便相應時讓則有餘熏香云豈是千聖不傳爭乃一子親傳大眾會麼卷舒雖在我收放亦由君披衣師指法座云這個多少人登不到蹋不着山僧不動步不轉身便登去也大眾看看師拈香祝聖罷斂衣敷坐良久云只這個是主句耶賓句耶把住句耶放行句耶大眾還辨得麼若能辨得便請散去若辨不得且聽葛藤最初一句末後一機三世諸佛不知歷代祖師不會拈向諸人面前打鼓普請看千年無影樹今時沒底籃二千年前也伊麼二千年後也伊麼九十日前也伊麼九十日後也伊麼上無諸佛可仰下無眾生可度說甚長期短期說甚結制解制拈拄杖卓一下云截斷兩頭不居中間空手把鋤頭步行騎水牛人從橋上過橋流水不流喝一喝云珍重便下座對上昇大王殯殿小參師拈香云信手拈來爇向爐中奉為上昇大王覺瓊仙駕豁開千聖之耳目徹證自己之靈源便插師據座良久拈拄杖云大王會麼四十五年游戱人間作三韓王利益羣氓今朝緣盡風火先去地水猶存大王諦聽這一點虛明也不屬地水也不屬火風也不屬古也不屬今也不屬去也不屬來也不屬生也不屬死既摠不屬一點子即今向什麼處去也舉拄杖云還見麼卓三下云還聞麼良久云擊碎虛空無內外一塵不立露堂堂翻身直透威音後滿月寒光照破床擊香臺一下下座臘月八日晚參師陞座兩班問訊畢拈竹篦乃云山僧自方丈出來陞于此座侍者問訊首座問訊維那問訊畢更有什麼事僧出云今日臘八師云入眾去也舉竹篦云家中一個物上見無頭下看無尾明如日黑似漆世界未興前山河滅盡後衝塞大虛中三世諸佛也柰何他不得歷代祖師也柰何他不得天下老和尚也柰何他不得汝等諸人還有柰何得底麼良久以竹篦打卓一下云百雜碎了也珍重便下座庚戌九月十六日國試工夫選塲垂語師陞座良久云破却古今之窠臼掃盡凡聖之蹤由割斷衲僧之命根奪却眾生之情解變通殺活總在臨時號令權衡都歸掌握三世諸佛也只如是歷代祖師也只如是天下老和尚也只如是山僧只將如是之法奉祝我主上殿下萬歲萬歲萬萬歲色身與法身無窮壽命與慧命無盡伏請諸人各須實答切莫妄通消息學者到門師又云行到說不到未時能行說到行不到未時能說直饒說到行到總是門外事入門一句作麼生學者皆無語而退入門三句入門句分明道當門句作麼生門裏句作麼生三轉語山何嶽邊止水何到成渠飯何白米造十七日垂語師拈香罷陞座良久云疑團落處終無兩樣風光眼孔開時別有一壺春色始信斬新日月方知時地乾坤更須蹋着上頭關打破祖師關棙子頭頭物物縱橫得妙句句言言超宗越格將一莖草作丈六金身用將丈六金身作一莖草用建立亦在我掃蕩亦在我說道理亦在我不說道理亦在我為甚如此我為法王於法自在以拄杖卓一下云還有這般底衲僧麼出來道看學者到門師又云進一步則大地平沈退一步則虛空撲落不進不退有氣死人且作麼生進步學者皆無語而退工夫十節目盡大地人見色不超色聞聲不越聲作麼生超聲越色去既超聲色要須下功作麼生下個正功既得下功須要熟功正熟功時如何既能熟功更加打失鼻孔打失鼻孔時如何鼻孔打失冷冷淡淡全無滋味全無氣力意識不及心路不行時亦不知有幻身在人間到這裏是甚時節工夫既到動靜無間寤寐恒一觸不散蕩不失如狗子見熱油鐺相似要䑛又䑛不得要捨又捨不得時作麼生合殺驀然到得如放百二十斤擔子相似啐地便折嚗地便斷時那個是你自性既悟自性須知自性本用隨緣應用作麼生是本用應用既知性用要脫生死眼光落地時作麼生脫既脫生死須知去處四大各分向甚處去王師封崇日普說辛亥八月二十六日師陞座拈拂子良久云汝等諸人還會山僧深深意旨麼只恁麼散去已是多事在更待山僧開兩片皮說黃道黑白雲萬里所以云言無展事句不投機承言者喪滯句者迷擬心即差動念即乖不擬不動水沉石頭故我祖師門下驀路相逢無你轉身處舉令而行無你開口處跨一步云鐵壁銀山眨得眼來電光石火三世諸佛出現也只是望崖而退歷代祖師出頭也只是屈伏藏身若是生鐵鑄就底漢等閒一着抹過大虛直得南山鼈鼻吞却東海鯉魚陝府鐵牛撞倒嘉州大像三界拘繫不得千聖羅籠不住從前萬別千差當下七通八達一一圓成一一明妙還有這般底麼若果如此王恩佛恩一時報足拈拄杖云其或未然且聽杖子下個註脚便擲下甲寅臘月十六日敬孝大王水陸法會對靈小參師敷座良久拈竹篦打卓一下云上昇大王覺瓊仙駕還會麼若也不會聽我一言這一星兒從無量刧以至于今昭昭靈靈湛湛澄澄歷歷巍巍恢恢瑩瑩種種法門種種智慧種種方便種種殊勝種種行願種種莊嚴盡從這一點子裏出來這一點子雖在六凡而不減雖處四聖而不增四大成時而不增四大壞時而不減如今在此檜巖寺了了明明聽我言說且道這聽法底是凡耶是聖耶是迷耶是悟耶是生耶是死耶是無耶是有耶畢竟在甚麼處良久打卓一下云不離當處常湛然覔則知君不可見遂擲下竹篦下座六道普說師敷座橫拈竹篦良久乃云若人欲識佛境界當淨其意如虛空遠離妄想及諸趣令心所向皆無礙上昇大王覺瓊仙駕為首六道中諸佛子等還當淨其意如虛空麼其或未然更聽註脚此正覺之性自古至今上至諸佛下至六凡一一堂堂一一具足塵塵上通物物上現不待修成了了明明或在地獄中者或在餓鬼中者或在畜生中者或在修羅道者或在人道者或在天道者今蒙諸佛加被總在座下覺瓊仙駕洎諸佛子等遂舉竹箟子篦還見麼擊一下云還聞麼既了了見既歷歷聞且道畢竟是個甚麼良久云佛面猶如正滿月亦如千日放光明以竹篦擊香臺一下便下座丙辰四月八日結制上堂師拈香祝聖畢陞座竪起拂子良久云家中一個物無奇無特無頭無尾明如日黑似漆常在諸人動用中動用中收不得山僧今日等閒收得來拈向諸人面前汝等諸人還會這個麼只恁麼會得猶是鈍根更若遲疑驢年夢見傳禪傳教正是好肉剜瘡談論談經亦是眼中着屑山僧今日無禪可說無教可傳只以三世諸佛說不及底歷代祖師傳不到底天下老和尚參不透底今日一時拈出橫按拄杖云還會麼不唯直節虛心亦解興雲致雨擲拄杖下座示勝宗禪和這一點子都無巴鼻三世諸佛說不及歷代祖師傳不到既說不及又傳不到向什麼處下筆向什麼處着言欲言言不及林下好商量示一珠首座欲决了此叚大事須發大信心立堅固志將從前所學所解佛見法見一掃掃向大洋海裏去更莫舉着把八萬四千微細念頭一坐坐斷但向二六時中四威儀內提起僧問趙州狗子還有佛性也無州云無末後一句盡力提起提來提去拶來拶去靜中動中不舉自舉寤寐二邊不疑自疑驀到這裏只待時刻其或舉起冷冷淡淡全無滋味無插觜處無着力處無分曉處無柰何處切莫退之正是當人着力處省力處得力處放身失命之處也示宏藏主這醜皮袋子裏有一個物上拄天下拄地常在人人動用中動用中收不得喚作毗盧師法身主宏上人爾會麼會來也喫三十棒不會來也喫三十棒畢竟如何懶翁也合喫三十棒且道過在甚麼處速道速道示覺成禪和真實决定欲成此段大事因緣立决定信生堅固志於二六時中四威儀內提起本叅話頭提來提去疑來疑去不覺參到話頭不提自提疑團不疑自疑之地翻身一擲更無閒言長語其或未然話頭或時明白或時不明白或現或不現或有或無或間斷或不間斷是為信心不堅立志不固如此虛送日月空受信施他時後日未免閻羅老子打筭飯錢是謂空來世上打一遭耳何暇更求閒言長語長句短句東指西指者也思之思之因雲禪者有疾示之汝得於重病未審是何病也是身病耶是心病耶若身病者地水火風四緣假合四大各有其主誰是病者若心病者心如幻化雖有假名其體實空病從何起若窮起處不得現今痛苦者從何處來又能知痛者是個什麼請如此審察看來看去驀然省得是予所願也至囑至囑示志得侍者你真實欲求此段大事因緣二六時中四威儀內提起燒了散了那個是我性話提來提去疑來疑去靜中閙中切莫間斷或寤或寐須要一般一切處一切時歷歷明明有時喜有時怒話頭不再舉而自現若能實到這個田地疑團破正眼開近矣其或未然日日夜夜隨波逐浪隨羣逐隊昏散相半念念差違被諸善惡聲色所牽今年也恁麼過明年也恁麼過你若如此則直待彌勒下生也未有入手底時節示睦相國仁吉此事不在在家出家亦不在初參後學又不在多生熏煉忽得開發只在當人一念真實的的信字裏所以佛云信為道源功德母長養一切諸善法信能增長智功德信能必到如來地諸公或在家中指揮雜事時或在上官判斷公事時或迎接或語言談笑或喫飯或喫茶或行住或坐臥畢竟是個什麼但恁麼參參來參去看來看去不覺大笑時始知此段大事本不在剃染出家苦行持戒蒲圃竹倚裏示得通居士你若欲究這般事不在僧之與俗不在男之與女不在初參後學亦不在多生舊習只在當人一念真實决定字裏你既如此信得及但於二六時中四威儀內提起僧聞趙州狗子還有佛性也無州云無末後一句盡力提起提來提去靜中閙中公案現前或寤或寐話頭明明話頭不提自提疑團不疑自疑正如急水灘頭月觸不散蕩不失真實到此田地不待年月驀得一迴通身汗流則默默自點頭矣至囑至囑答李相國齊賢承諭相國臨別面稟藥病之言不輕故山僧不惜口業揚於家醜此事不在僧俗不在老少不在初參後學只在當人决定信心耳三世諸佛歷代祖師皆以决定信心而成道果若不依此而成正覺者無有是處是以佛言信為道源功德母長養一切諸善法又云信能增長智功德信能必到如來地相國年少時高登科第作一國政丞作一國文中之王為國重寶又能留心此法門中若比古今賢人勝於他百千萬倍雖能留心此個法門中今生打未徹恐道力不能勝業力百年之後處處不得自在若果未徹則伏請起大决定之志二六時中着衣喫飯語言談笑於一切處參個本來面目或云今生出來作此形體是父母所生面目那個是父母未生前本來面目但只如此參參來參去參到心思路絕意識不行沒滋味沒摸索肚裏悶時莫怕落空正是相國得力處省力處正是相國安身立命處也至囑至囑又前進嶺梅分付信物及廻言內曾於無字話提撕山僧未審相國曾參無字話故親傳消息今聞相國更求之言如此做又却忉怛幸望留心古人留下一言半句令諸人立定脚頭不為移易常於日用間雖有千差萬別之事志在上面不隨他變則何必改參也况舉起別話頭時曾參無字不離則必然無字上有少熟也切莫移動切莫改參但於二六時中四威儀內舉起僧問趙州狗子還有佛性也無州云無末後一個無字盡力提起切莫待幾時悟不悟莫管有滋味無滋味亦莫管得力不得力只單單提個無字驀然拶到話頭不舉自舉疑情不疑自疑心思不及意識不行百無滋味如蚊子上鐵牛時莫怕落空此是從上諸佛諸位祖師放身捨命處亦是老相國得力處省力處成佛作祖之處也於此忽得翻身一擲始知道一不造二不休一拳拳倒黃鶴樓一蹋蹋翻鸚鵡洲有意氣時添意氣不風流處也風流示知申使廉興邦若欲真實究明此段大事不問僧之與俗男之與女亦不問上中下根亦不問初參舊學只在當人立决定信生堅固志佛不云乎信為道源功德母長養一切諸善法又云信能增長智功德信能必到如來地公妙年登高第遇知今上事務煩劇之時又向此個門中的信無疑要求修心方便這個豈非世出世間第一等有大力量底人也然而修心之要更莫別求吾在廣明時曾為公說底是個什麼話頭常於一切處一切時切莫放捨提來提去參來參去不得有小間斷行也只是是個什麼住也只是是個什麼坐也只是是個什麼臥也只是是個什麼着衣喫飯屙屎放尿迎賓對客乃至判斷公事時上前進退時把筆作書時畢竟是個什麼但恁麼提但恁麼參參來參去提來提去驀然到得話頭不提自提不疑自疑喫飯不知飯喫茶不知茶亦不知幻身在人間身心如一寤寐一般處翻身一擲到得這個田地始知不改官職不改俗形不離火宅西天四七東土二三天下善知識傳不到說不及底本有之事也至囑至囑指空和尚起骨一點虛明了無所礙一擲翻身多少自在以棒打托一下喝一喝云起入塔師擎骨云西天一百八代祖指空大和尚三千威儀不顧八萬細行那管身上常穿渾金口裏痛罵佛祖平生氣壓諸方鶻眼難能插觜元朝默坐多年感得人天打供一朝傳語還鄉去八部龍天歎不還故我今朝誠立塔三韓境內鎮常安法身徧法界且道還收入這塔中也未若收不入這個骨頭向什麼處安着還有道得者麼出來道看出來道看如無山僧自道去也喝一喝良久云須彌納芥猶容易芥納須彌有甚難示覺悟禪人念起念滅謂生死當生死之際須盡力提起話頭話頭純一則起滅即盡起滅盡處謂之靈靈無話頭則謂之無記靈中不昧話頭則謂之靈知即此空寂靈知無壞無雜如是用功不日成功為智如上座下火三緣和合暫時成有四大離散忽得還空三十七年遊於幻海今朝脫殼慶快如蓬大眾智如上座向什麼處去還會麼木馬倒騎翻一轉大紅燄裏放寒風為二僧下火慧澄首座志因上座這一點靈明生來的的不隨生死去堂堂不隨死生死去來無干涉正體堂堂在目前以矩畫圓相云大眾這二上座畢竟向什麼處去也五十七年遊幻界今朝撒手便歸鄉個中消息誰能識同入火光無處藏為申白大禪師撒骨灰飛大野骨節何安驀地一聲始到牢關咄一點靈光非內外五臺空鎻白雲閒為志普上座下火返本還源今正時莫於中路滯狐疑一星揮處翻身轉九品蓮臺任自歸示淑寧翁主妙善若欲成此一段大事不在僧之與俗男之與女初機後學只在當人究竟一念真實耳我見翁主天性與他有異本無邪心本無疑心本無惑心只有全心欲求無上菩提之心豈非過去無量刧來親近善知識熏習般若正法也古云丈夫者非是男形女相論之只具四法而丈夫何等四法一親近知識二聽聞正法三思惟其義四如說修行具此四法真名丈夫無此四法雖是男形不名丈夫伏請翁主的信此語但於日用二六時中行住坐臥四威儀內全精提起本參話頭提來提去疑來疑去靜中閙中不提自提或語或默不疑自疑或寢或悟話頭現前要忘不忘要起不起到此不覺翻身一擲只此便是轉女成男轉男成佛之處也至囑至囑答妹氏書自小出來不記年月不念親踈以道為念已到今日於仁義道中不無親情及與愛心我佛道中纔有此念便乃大錯也請知此意千萬斷除親見之心常常二六時中着衣喫飯語言相問所作所為於一切處至念阿彌陁佛念來念去持來持去到於不念自念之地則能免待我之心亦免枉被六道輪迴之苦至囑至囑頌曰阿彌陁佛在何方着得心頭切莫忘念到念窮無念處六門常放紫金光代語梁武帝問達磨云對朕者誰磨云不識帝無語保寧代云吐舌示之師云天地一統宋太宗問僧甚處來僧云臥雲來帝云臥雲深處不朝天因甚到此保寧代云遇明即現師云至化難逃寂大師進三界圖帝問朕居何界寂無對保寧代云陛下何處不稱尊師云叉手鞠躬誰不仰望高舍人問僧十方總是佛那個是報身那個是法身保寧代云僧云舍人更問阿誰師云師姑是女做雪峯問德山從上宗乘中事學人還有分也無山打云道甚麼峯無語保寧代云搥胷便出師代云蹋足出去南泉問良欽空刧中還有佛不欽云有泉云是阿誰欽云良欽泉云居何國土欽無語保寧代云繞禪床一匝出去師云居何國土勘辦蓋地蓋聲蓋色西乾四七自此忘機東震二三從茲失口鬧浩浩處明皎皎明皎皎處鬧浩浩直下如王寶劒擬犯吹毛伏屍萬里更說什麼似地擎山不知山之高峻如石含玉不知玉之無瑕更說什麼香象渡河徹底徹流而過更說什麼三玄三要四料揀四賓主全殺全活全明全暗雙放雙收為而不為不為而為真不掩偽曲不藏真拈拄杖卓一下云諸人會麼撲落非他物縱橫不是塵遂擲下云既已撲落又非他物畢竟是個甚麼喝一喝云虎踞龍盤勢山形雲影像舉龐居士問靈照女云明明百草頭明明祖師意你作麼生會照云這老漢頭白齒黃作這個見解士云爾作麼生道照云明明百草頭明明祖師意乃云居士句到意不到靈照意到句不到直饒句意俱到懶翁門下未免一塲埋却且道過在什麼處良久云明明百草頭明明祖師意珍重下座解制日上堂陞座良久云只這個是主句耶賓句耶把拄句耶放行句耶大眾還辨得麼若能辨得便請散去若辨不得且聽葛藤最初一句末後一機三世諸佛師問座主教家說一時佛即今在何處主擬議師喝出復召主主回首師云會麼主云不會師云更要打在主禮拜師見三僧來禮問云三人同行必有一智智不到處道將一句來僧無語師云智不在語第二個如何僧又無語師云第三個漆桶如何僧亦無語師云老僧被汝勘破且坐喫茶師問道士從甚處來士云亳州來師云汝從亳州來還見老君麼士云不見師云要汝眼作麼士禮拜師云老君拜釋迦着語古云山前一片閑田地師云物見主眼卓竪叉手叮嚀問祖翁師云自家本來契券何在幾度賣來還自買師云磬聲斷後不得翻悔為憐松竹引清風師云利動君子結制上堂普說師陞座拈拂子云大眾卷席散去也是無事生事無風起浪雖然如是法無一定事無一向且聽山僧葛藤湛然本無變異虛徹自有靈通妙盡空忘功處還歸寂照之中這一句子聲前露裸裸蓋天二關會罷還檜巖詩歎世四首世事紛紛何日了塵勞境界倍增多迷風刮地搖山嶽業海漫天起浪波身後妄緣重結集目前光景暗消磨區區役盡平生志到地依先不柰何眨眼光陰飛過去白頭換却少年時積金候死愚何甚刻骨營生事可悲捧土培山徒自迫持蠡酌海諒非思古今多少貪婪客到此應無一點知幾多汩沒紅塵裏百計縈心正擾攘五蘊稠林增蓊鬱六根冥霧競飄颺沽名苟利蛾投燄嗜色聲蟹落湯膽碎魂亡渾不顧細思端的為誰忙死死生生生復死狂迷一槩不曾休只知線下貪香餌那識竿頭有曲鈎喪盡百年重伎倆搆成久遠刧愆尤翻思業火長燃處寧不教人特地愁三歌此倣永嘉證道歌體裁而太半殘缺甚憾俟異日得刻本補足已上缺漏若能一念了無生錯錯元來終不錯麤也着細也着着着來來元不覺驀得一聲急翻身滿目虛空當撲落或在非或在是是非坑裏常憂喜不覺亡身白骨堆到了堂堂不自在這枯髏忽悟來廣刧無明當下灰從此恒沙諸佛祖百千三昧也不猜也不猜有何過無量擬議便為過若能運用似盤珠刧石徒為彈指過也無法也無佛也無心兮也無物到此灼然似什麼寒時向火燒柮榾懶翁三歌後珠隨方映色人之所迷也而其清淨則表佛性枯髏氣散肉敗人之所遺也而往生存則行佛道百衲卻錦綺綴破爛掩𦘺膚禦耳然非此無以莊嚴威儀安處徒眾入佛道見佛性矣三歌首尾相應脉絡相通所以示後人也深且切矣懶翁文字信手未嘗立思吐出實理粲然寫出韻語琅然師於世俗文字不甚解亦可見焉至於三歌如出二人之手必其研精覃思而作者也不然何以倣永嘉句法哉異日流傳西域當有賞音者師弟子某等請予書其尾予既訓題而又考其體以塞其請若其精微之奧非魚焉知魚乎前朝列大夫征東行中書省左右司郎中文忠保節同德贊化功臣重大匡韓山君藝文舘大提學知春秋館事兼成均大司成知書筵事李穡書頌送幻庵長老謁師翁餘疑要决謁師翁倒握烏藤活似龍徹底掀翻明白後大千沙界起清風送通禪人皈江南叅方問道別無他只要當人直到家跬步不擡親蹋着何勞海外覔嘍囉送蘭禪者之江南此處虛空彼處空明明似有覔無蹤驀從空外翻身轉放出死蛇吞活龍送杲山昇首座之江南四句百非俱說破杖頭挑日往江南趙州八十重叅去遺跡分明直到今唐道元求偈叅禪只在起疑團疑去疑來似火團不覺全身都放下大千沙界一毫端唐智全禪者求頌叅禪學道信為根信得能超碧眼胡自在縱橫全殺活惡名從此滿江湖答上問妙淨明心上謂恭愍王下倣此妙淨明心是何物應須切忌就言詮山河日月兼星宿物物和融體歷然上復請讚平山和尚胸中極毒氣衝天佛祖無能敢向前臨濟狂風吹海外三韓御室萬年傳示永昌大君一念忘時明了了彌陀不在別家鄉通身坐臥蓮花國處處無非極樂堂示廉侍中興邦本自圓成不在言何勞開口為君宣未興一念先提起驀蹋威音更那邊示李侍中巖體徧河沙淨妙身應緣能屈又能伸面門出入無蹤跡隨聖隨凡作主人示尹侍中桓一片虛明絕妙玄個中那有正兼偏威音刧外靈芝草不待春風色自鮮示黃二相石奇言前無句擬何伸妙語從來眼裡塵欲識毘耶金粟意不勞開口對賢人示威福相公本地虛然一物無人人向外妄區區也無定法傳持得何事神光立雪求示南窓田相公一掌揮開向上關還如桶底脫塵歡又能一擲翻身轉普地普天霜雪寒示李尚書重修寺院接方來南北禪和去再回又向西心勤念佛蓮花上品自然開示李少卿誤聽虛明遠遠來誠心極處免輪迴莫分僧俗與男女一擲翻身正眼開示洪相國仲元屈尊忘倦遠登山更歷深菴道者看向道誠心勤又重必當叅透祖師關世利功名能幾年筭來只是百年前一朝驀蹋真空地越聖超凡透劫先示辛相國廉一別神光再不逢多年相億在心中今朝驀面相看笑深意誰能敢得通示諸念佛人深沈無語意彌長妙理誰能敢度量坐臥行來無別事心中持念最堂堂自性彌陀何處在時時念念不須忘驀然一日如忘境物物頭頭不覆藏彌陀憶念不須間二六時中子細看驀得一朝親憶着東西不隔一毫端人人錯步不還鄉山野殷勤又發揚忽憶念頭真熱處翻天覆地覺花香念念無忘憶自持切忌求見老阿彌一朝忽得情塵落倒用橫拈常不離幾刧勞勞六道迴今生人道最為稀勸君早念彌陀佛切莫閒遊失好時示杏村李侍中巖大地春迴剎剎融杏花村裏最無窮南來燕語通閒室北往鴻聲透靜空雨洗桃紅宣妙理風吹梨白振玄風塵塵齊唱西來意何處勞勞覔祖翁示金按廉堂堂寶器在家中價直裟婆現有蹤三角高超三界外一身徧剎一真空通天大口霜花白滿肚寒灰發燄紅便是堅剛玄妙體恒河沙刧用無窮示朴判書成亮提起話頭末後句翻來覆去起疑情疑來疑去無疑處掇轉虛空笑一聲贈洪侍中帝化旁分現妙真三秋四法利羣民當陽那肯纖機露氷雪重重絕點塵和圓定國師頌東海幽巖畔孤高有一峯圓通觀自在悲願戶何封松韻塵塵掃潮音處處逢補陁山上士無物不真容和高城安尚書韻千古高風各在人何須今日始為珍通身徹骨無餘物此個元來絕妄塵禮江南洛伽窟妙相元無相觀音處處通我來看石洞却是一窟窿謝空都寺惠刀殺人刀活人劍只在當人一手中忽得今朝來惠我尖尖利刃出霜風警世百年只是暫時間莫把光陰當等閒努力修行成佛易今生差過出頭難無常忽到教誰替有債元來用自還若要不經閻老案直須叅透祖師關金烏東上月沈西生死人間死不齊口裏吐將三寸氣山頭添得一堆泥塵緣擾擾誰先覺業識茫茫路轉迷要脫輪迴無別法祖師公案好提撕寒暑催人日月流幾多讙喜多幾愁終成白骨堆青艸難把黃金換黑頭死後空懷千古恨生前誰肯一時休聖賢都是凡夫做何不依他樣子修題利嚴尊者塔徧歷諸方咨决了至今唐漢有遺蹤我來禮塔非他意只為三韓振祖風幻庵傳寫五位註頌來看因以題前曹洞宗風事若何崑崙白鷺兩交加君臣偏正能回互不坐那邊是作家住清平山偶題江湖歷盡十餘年驀得胸中自豁然有問清平成底事飢飡渴飲困安眠讚指空摩竭陀中看般若忽然三處頓忘形當時若負衝天志何必南天見普明咦大元默坐無人識罵動皇天振地聲自讚打破虛空出骨閃電光中作窟有人問我家風此外更無別物叅見指空喪亡自宗咄這瞎漢反入羅籠臨濟下第二十世太古下第一世高麗忠州青龍寺普覺國師師諱混修字無作號幻庵本姓趙氏廣州豐壤縣人考諱叔鴒妣慶氏父宰龍州以延祐庚申三月十三日生師于治所嘗一日出獵見一鹿走且止而顯視者再欲發矢異而顧之有其兒鹿追母而來乃歎曰獸之念母與人何別即罷獵不數月病終妣奉喪提孩而皈師少嘗嬰疾卜之曰此兒出家終不病作大和尚矣年甫踰一紀妣謂師曰汝生之初汝父以憐汝故感鹿母兒以休其獵是汝慈仁護生之道已現於襁褓之日矣况卜者言然令投大禪師繼松祝髮訓習內外典至正紀元辛巳赴禪選登上上科戊子秋入金剛山攝心不寐脇不暫衡工夫日進後往忠州之青龍守西麓搆一菴扁曰宴晦盖自表其心迹也又入五臺山居神聖菴時懶翁勤和尚亦住孤雲菴數與相見咨質道要翁後以金襴袈裟象牙拂山形杖遺師為信洪武三年秋國設工夫選懶翁主試翁下一語諸衲無能對者師最後至具威儀立堂門陛下翁問如何是當門句師上陛答曰不落左右中中而立問如何是入門句師入門曰入已還同未入時問如何是門內句師曰內外本空中云何立翁又以三闕問曰山何岳邊止答曰逢高即下遇下即止問水何到成渠答曰大海潛流到處成渠問飯何白米做答曰如蒸沙石豈成嘉餐翁乃肯之辛禑王時冊為國師洪武壬申九月十八日佛紀二四一九年命作遺書又謂門人曰吾行在今晚可請州官封印至晚坐曰如今臘除已到吾當逝矣即說偈儼然示寂茶毗于宴晦之北麓骨色白如雪門人紹安奉遺書以聞上命攸司賜諡曰普覺塔曰定慧圓融差遣內臣監其厝骨又敕工造浮圖以其年後十二月甲申窆于青龍寺之北岸壽七十三臘六十師與王師圓應尊者粲英俱為太古門徒之首焉臨濟下第二十世懶翁下第一世朝鮮王師妙嚴尊者師諱自超號無學所居曰溪月軒世壽七十九法臘六十一俗姓朴氏三岐郡人也父仁一母蔡氏夢日射懷有娠生師年十八依慧鑑國師上足弟子小止禪師薙髮具戒至龍門山咨法于慧明國師名法藏國師示法已乃曰得正路者非汝而誰遂令居浮圖菴一日菴中失火師獨靜坐如木偶人眾異之至正丙戌冬因看楞嚴經有悟歸而告其師師加稱歎廢寢忘飡專於叅究己丑秋至鎮州吉祥寺居焉壬辰夏住妙香山金剛窟功益進或睡則若有擊鍾磬以警焉者是時釋然了悟汲汲有求師就質之意癸巳秋挺身入燕都叅西天指空拜起云三千八百里親見和尚面目空云高麗人都殺了也盖許之也眾乃大驚次年甲午正月到法泉寺叅懶翁懶翁一見而深器之遊霧靈歷五臺再見懶翁於西山靈巖寺留數載其在定也至有當食而不知者翁見之曰汝却死了耶師笑而不答翁一日與師坐階上問曰昔趙州與首座看石橋問是什麼人造首座答云李膺造州云向甚麼處先下手首座無對今人問爾如何秪對師即以兩手握階石以示之翁便休去其日夜分師入翁室翁云今日乃知吾不汝欺也後謂師曰相識滿天下知心能幾人爾與我一家矣又曰道之在人如象之牙雖欲藏之不可掩也他時爾豈為人前物乎師之質其所得殆無可疑丙申夏欲東還告辭翁手書一紙送行曰觀其日用全機與世有異不思善惡聖邪不順人情義理出言吐氣如箭鋒相拄句意合機似水皈水一口吞却賓主句將身透過佛祖關俄然告行予以偈送云已信囊中別有天東西一任用三玄有人問爾叅尋意打倒面門更莫言師既還懶翁亦還住天聖山元曉菴己亥夏師往見翁翁以拂子與之翁在神光寺師亦往焉翁之徒有忌師者師知而去之翁謂師曰衣鉢不如言句以詩遺師云閒僧軰起人我心妄說是非甚不然也山僧以此四句之頌永斷後疑分襟別有商量處誰識其中意更玄任爾諸人皆不可我言透過刧空前師入高達山卓菴自守辛亥冬高麗恭愍王封懶翁為王師翁住松廣以衣鉢付師師以偈謝洪武壬申五月高麗恭讓王與順妃引見欲封為王師師辭七月朝鮮太祖受麗氏禪即位于松京召師至以十月十一日封為王師戊寅辭退入金剛山真佛菴乙酉四月移金藏菴師謂眾曰不久吾逝矣師示疾僧問四大各離向甚處去師云不知僧又問和尚病中還有不病者也無師以手指傍僧僧又問色身是地水火風摠皈磨滅那個是真法身師以兩臂相拄云這個是一個答已寂然而時則九月十一日夜半也佛紀二四三二年越三年丁亥冬十二月庴骨于檜巖塔曰慈智洪融文臣卞季良奉教撰銘臨濟下第廿一世太古下第二世龜谷覺雲禪師湖南龍城今南原郡人尹紹宗諫斥粲英按高麗史恭讓王二年春正月王御經筵鄭夢周進言曰佛氏之教辭親戚絕男女獨坐巖穴草衣木食觀空寂滅為宗豈是平常之道時王欲迎僧粲英為師故夢周語及此然王方惑佛不納二月王欲迎曹溪僧粲英為師大司憲成石璘左常侍尹紹宗伏閤諫之王勉從之粲英至崇仁門不得入而還云故隱避不市或曰小隱云云玄陵恭愍王也畵達磨折蘆渡江圖普賢六牙白象圖賜之又手書龜谷覺雲四字兼賜二十二字法號大曹溪宗師禪教都摠攝崇信真乘勤修至道都大禪師李牧隱為之讚已上海東佛祖源流曰達磨折蘆渡江圖童子普賢六牙白象圖龜谷覺雲大字共四幅高廣如一皆上親筆也今大曹溪宗師禪教都摠攝崇信真乘勤修至道都大禪師雲公携以過韓山李穡曰侈上之賜莫如文盖示當今傳來世非此無由故將求之搢紳間子盍先之且曰折蘆白象所以警夫不當者惠固罔極也至若覺雲吾名也龜谷吾號也今夫出家學道者有萬其眾能以名號上徹幾何人哉又况銘諸心注之手發揮奎璧絢耀一世其為幸之幸何如也此吾所以必托之子也臣穡謹俯伏展閱既退而言曰浮屠氏重於世久矣徒以因果罪福者其末也高虛玄默獨坐乎萬物之表則雖吾儒高尚者亦莫能少之恭維聖上深契妙旨所以取之者得其道也是以一斥近世之陋將以復太祖之舊而龜谷獨蒙知遇既賜廿又二字褒崇之號又於清讌之餘念茲在茲親紆翰札寵賚如此則其人可知也盖龜谷衣冠之胄氣質已非庸眾之比養之以道者又熟故達磨心而普賢行顧其名也以無心為羣有之宗顧其號也以藏六為羣動之本其跡脩然其中湛然固已不物於物矣受今日之賜非幸也宜矣讚曰達磨是身虛空天水一色眇然而逝風清月白芥乎其間惟一不識普賢六牙白象布衣大野富貴風流貝此粲者衰哉兔逕方憑吾駕龜谷和氣在天靈靈在物惟蕆神用不或夭閼疇均此施六合為一覺雲無心為心出入太虛友風子雨亦曰勤渠妙悟所以非師誰歟叅考南原府萬行山勝蓮寺李穡記曰南原府山水之勝人多稱之浮圖氏屋於其間者大抵皆據其絕特之境而勝蓮寺又為之冠康君好文與余言如是且以住持大禪師覺雲狀求記其本末余於佳山水每恨不能往遊掛名其間固有所願雲師之賢又佘之所嘗慕焉者故樂敘之寺距府理東北一舍舊名金剛不知創於何代弘慧國師諱中亘者自願堂退老居之屋宇卑陋嘗欲增廣而不能也既歿大禪師拙菴諱衍昷者為曹溪之老弘慧之徒所推讓合辭立券契俾拙菴主之拙菴即審工度財其募合眾緣則有宗閒者實幹之改其額曰勝蓮經始於乙丑之歲訖功於辛未之春佛殿僧廡膳堂禪室賓客之次庫廚之所以間計者合一百一十至於梵唄之具日用之需無不完備此皆由拙菴橐鉢之儲宗閒奔走之力以成者也像無量壽居之殿中央拙菴之所獨辦而印大藏經厝之殿左右郡人之所同施也捨奴婢若干口即拙菴所得於父母者也戊戌之秋其將示寂也以雲師於族為甥於法為嗣付以寺事外垣尚缺雲師築之癸卯之夏山門之事於是畢矣予曰浮屠氏不惟侈其居又謀所以傳之後者盖其常也今夫金剛勝蓮其名義何重何輕而必取彼捨此哉然拙菴之必改其額者示自我始也自我為一代再傳而為二代以至百千代無可替也其志可謂遠矣其傳之雲師也以親以法亦可謂無嫌矣但未知雲師之得人以傳也亦能如其師乎不也吾懼其愈傳而愈不可保也雖然自今以往更歷百千代勝蓮之境無使荊棘生焉則足矣族乎嗣法乎嗣吾不敢知之矣拙菴姓柳氏文正公璥之曾孫監察大夫靖之母弟判密直司李公尊庇之外孫叅學首四選赴試中甲科歷住名山道譽藹然雲師柳氏之甥學邃行高筆法妙一時人謂其青出於藍矣云云又長城郡白巖山淨土寺今白羊寺事蹟云王師覺儼尊者付囑門人等重新佛宇相國洪綏發願捨賄使覺儼門人心白智孚等航海入宋辦大藏經當至正元年辛巳之春招集諸山碩德修轉藏法會以落之其誌曰功德主兼主法曹溪第十三代大和尚覺儼尊者赴會禪流眾目中有衍昷拙菴者時為甘露社主又轉藏經第三回榜云繄我王師覺儼尊者駐錫曹溪之日與江寧君洪公綏同發願許各捨帑儲成就大藏全部之因由慶落初會之記榜載之縷詳越戊子春傾倒檀施之物命門人之牧等廣化眾緣迎集諸山苾蒭再轉一遍歲在庚寅年八十一倦於𨽻眾切有謝院安心之志辭眾歸老于白岩山淨土寺前朝主上嚮師道德特由師禮以䇺城佛岬寺為下山所暨今上即祚仍冊為王師并下國書繒綵等物益加欽敬師每曰老僧何德累蒙上恩思報罔極備種種供具肆展第三會屈曹溪大和尚復庵淨慧為主盟招致諸山長老千餘指以癸巳三月十一日為始約十日張皇佛事晝則轉三藏夜則談祖教或禪或講六時修法以答上恩厥誠厥美不可喑哩粗書始末昭示于后門人月生山人衍昷拜手謹誌至正十三年三月日上板堂佐慧晚達桓首堂佐祖宣紹寬記事日益了貞維那靈泉社道人居訥主法曹溪十四代和尚復庵淨慧眾目月南長老衍昷下畧功德主王師大曹溪宗師前佛岬寺住持一印正令雷音辯海弘直廣濟都大禪師覺儼尊者覺儼尊者諡覺真國師法諱復丘自號無能叟固城郡人判密直右常侍文翰學士承旨李尊庇之季子也具見覺真國師碑尚玄曰朝鮮僧史皆以龜谷為幻庵之嗣法而其見於文字者絕無僅有惟按東文選李崇仁號陶隱送兩千峯上人千峯名卍雨龜谷弟子也遊方序幻庵龜谷曹溪之儀表云云則其為禪宗之望僧可知也已但據上文則龜谷之於拙菴於族為甥於法為嗣迺有蓮寺之傳付又拙菴之於覺儼於族為甥於法為嗣共為松社之系脈曹溪山松廣社即佛日普照國師之所立而遂為曹溪宗之本社至覺儼尊者為十三代故具錄所見以資叅考臨濟下第廿一世懶翁下第二世涵虛得通禪師諱已和號得通舊名守伊號無準所居室曰涵虛堂俗姓劉氏忠州人也父諱聽母方氏以洪武九年丙辰生年二十一志求出家割愛親戚行到冠岳山義湘菴薙髮越明年丁丑早春到檜巖寺初叅王師無學妙嚴尊者親聞法要於是辭退本師遊歷諸山戰戰勤修又甲申仲春再到檜巖獨居一室杜絕視聽動靜食息無少滅裂因調睡魔永夜經行次不覺口自詠曰行行忽迴首山骨立雲中又一日入廁還出放下洗桶云唯此一事實餘二則非真此言豈徒然哉自是歷住功德山之大乘寺天磨山之觀音窟及佛禧寺所至化眾甲午春到慈母山烟峯寺占一小室名涵虛堂勤修三載曾無少息庚子秋入五臺山誠備香羞供養五臺諸聖詣靈鑑菴薦羞於懶翁真影信宿其菴夜夢有一神僧從容謂師曰卿名已和厥號得通師拜手祗受翛然夢覺身氣清爽若登太清翌日下月精寺宴處一室消遣日月於是囊錐已露道譽遠播世宗大王存心三寶留意福田是以聞師道風美其令聞辛丑秋初命住大慈御剎為薦元敬王太后世宗大王母后閔氏設法華會請師主法宗室諸王駙馬諸君承命奉香濟濟親臨師陞法座肇開法要其聲清亮理致玄奧兩宗五教諸山衲子悉皆罔措自爾仍閱四載甲辰秋上書辤退游吉祥功德雲岳諸山辛亥秋歸曦陽山鳳巖寺重葺以居宣德八年癸丑三月二十五日佛紀二四六年故示徹疾至四月一日卓然靜坐曰湛然空寂本無一物靈光赫赫洞澈十方更無身心受彼生死去來往復也無罣礙少選又曰臨行舉目十方碧落無中有路西方極樂聲盡而逝茶毗得設利光潤孝寧大君親啟宸聰命諸徒弟樹浮圖於四處世壽五十八法臘三十八師所著圓覺疏三卷金剛經五家說誼一卷顯正論一卷般若懺文二帙綸貫一卷皆盛行于世臨濟下第廿二世太古下第三世碧溪正心禪師海東佛祖源流獅巖采永撰云釋淨心號碧溪金山崔氏遠嗣龜谷又入明傳臨濟宗下總統和尚法印而來恭讓時辭退後因沙汰長髮蓄妻孥入黃岳山隱居于古紫洞物罕里晦迹焉將啟手足傳禪于碧松傳教于淨蓮又東師列傳大與寺沙門梵海覺岸撰云師名正心號碧溪金山人也當太宗朝鮮太宗沙汰之時長髮蓄妻子入黃岳山在黃澗郡居物罕里禪傳于碧松智嚴教傳于淨蓮法俊禪教二派不絕而蕃衍無常哉時運也丁洌水其名若鏞曰我下山後為碧溪正心莫作北山之移追念南溟之徙乎門人碧松智嚴妙覺守眉淨蓮法俊等具如行狀尚玄曰若如海東佛祖源流碧溪既是高麗恭讓王時人則與龜谷同時也然則其云遠嗣龜谷之遠字非謂年代先後之遠也即謂居地距離之遠也臨濟下第廿二世太古下第三世千峰卍雨禪師東文選李牧隱千峰說云曹溪雨上人龜谷弟子也問其號於韓山子穡穡曰龜谷善名人豈於上人蘄之乎請以一雲如何上人曰吾徒事師如子事父吾師名也其師龜谷名覺雲故云也請易之穡曰吾於龜谷遊亦久矣而忘之吾有罪也請易以千峰上人曰可矣願畢其說上人既可之矣予何辭云云又慵齋叢話云釋卍雨者幻庵之高弟慵齋以千峰為幻菴之弟子非是當從牧隱千峰說自幼力學內外經典無不探討精究其意又能於詩詩思清絕與牧隱陶隱諸先生相唱酬我朝不崇釋教名家子弟不得祝髮以故緇徒無知書者而師名益著四面學者如雲集賢之士皆就問塔下蔚為儒釋士林之表人皆敬之我伯仲氏慵齋名成俔其伯氏名任仲氏名侃皆讀書于檜巖寺見師年九十餘容貌清癯氣體尚強或併日不食不甚飢餒人若饋之飯則或喫盡數鉢亦無飽意雖至數日未嘗如廁恒兀坐虛室懸玉燈張清几徹夜看書絲毫細字一一研究未嘗交睫偃臥辟人不許在傍若有所召則手擊小錚門下隨而應之未得高聲大喚也日本國使僧文溪求詩縉紳作者數十人師亦承命賦詩詩曰水國古精神灑然無位人火馳應自息柴立更誰親楓岳雲生屐盆城月滿闉風帆海天闊梅柳故園春時春亭卞季良也主文改灑然無位之句為蕭然絕世人師曰卞公真不知詩者蕭然豈如灑然絕世豈如無位是斲喪自然無位之趣耳每見文士悵悵不已今有千峰集行於世臨濟下第廿三世太古下第四世智異山碧松智嚴禪師號埜老所居堂曰碧松俗姓宋氏扶安人父福生母王氏以天順八年甲申三月十五日生焉為人骨相奇秀雄武過人幼好書劒尤善將鑑弘治四年辛亥五月野人寇北邊成宗大王命許琮帥師討之師亦仗劒從之大竪戰功既罷征嘆曰大丈夫生斯世也不守心地役役馳勞縱得汗馬之功徒尚虛名耳即入鷄龍山臥草菴叅祖澄大師投簪落䰂時年二十八矣厲志修禪又訪衍熙教師問楞嚴深義次尋正心禪師擊傳燈密旨俱振玄微多所悟益後入智異山今碧松寺是師駐錫處也風鑒益明律儀清淨為一時緇林之宗闡揚佛法不諂於世故泛學叅禪者望崖而退多以倨慢譏之若導初學則先以禪源集別行錄立如實知見次以禪要語錄掃除知解之病而指示活路也凡接人機鋒大畧若此有時與門人靈觀圓悟一禪等六七十之徒講諸大乘經論嘉靖十三年甲午冬命諸門人會壽國菴講法華經至方便品忽然歎曰眾生自蔽光明甘受輪轉久矣勞他世尊一光東照至於苦口開示皆為眾生設方便爾非實法也盖諸法寂滅相不可以言宣今汝等諸人若信佛無言直下悟入自家心地則可謂開寶臧報佛恩也今日老僧亦為諸人示寂滅相去也諸人莫向外求努力珍重遂喚侍者點茶來啜茶訖閉門端坐良久默然開窓視之已入寂矣乃十一月初一日也佛紀二五六一年茶毘得頂骨一片舍利黏黏瑩若真珠焉弟子崇仁雪𡷾真一圓悟鐫石鍾以安于義神南麓壽七十一臘四十四臨濟下第廿四世太古下第五世芙蓉靈觀禪師嶺南晉州人也名靈觀號隱菴一曰蓮船道人身雖寄世想在西方故以芙蓉堂稱之家世犯賤人家奴故云也富而無禮成化二十一年乙巳成宗大王十六年也七月初七日生年才八歲父携而釣魚使負魚籃師擇其生命者而盡放之父大怒撻之師拜而泣曰人與物愛命則同忍痛則一也伏望垂恕父聞而弛怒師年至十三丁巳之秋夜深人靜出門獨行入德異山投苦行禪子依止三年學其法而落髮焉十七辛酉叅信聰法師探教綱又禮威鳳大師入禪樞因入九泉洞手結茅廬度九春秋脇不至席影不出山論教義則洋洋焉波瀾萬頃轉禪旨則嶷嶷然崖岸千尋己巳入龍門山訪祖愚大師討禪餘暇涉盡莊老甲戌又向清平山投學梅禪子扣擊禪微法無異味己卯到金剛山大尊菴與祖雲大師結二夏又深入彌勒峯內院菴默坐九年庚寅秋還歸故鄉覲其老父及其故主納田宅以贖身即向頭流山智異山之一名扣智嚴大師碧松之門曰靈觀自遠趨風願一攝受嚴曰靈且不敢觀從何來師近前叉手曰請師鑑嚴笑曰堪為雕琢翌日嚴為師碎蕩心霧陶瀉佛海師之二十年宿疑忽如層氷之泮巨壑也即頂禮連聲歎曰此真吾師也執侍三年師後或居黃龍山或居八公山或住大乘洞或住義神洞或住燕谷洞不覺夢過四十一年至隆慶五年辛未四月十四日入寂焉佛紀二五九八年世壽八十七法臘七十二侍者法融靈應大選淨源信翁禪德真機道義軰收靈骨竪浮屠于燕谷之西麓臨濟下二十四世太古下第五世妙香山慶聖堂禪師諱一禪號休翁一曰禪和子其先張氏蔚山人也父鳳韓母林氏母夢吞明珠覺而有娠弘治元年戊申十二月十二日生焉幼失雙親泣血三年觀世無常意志清虛年至十三入斷石山投海山法師服勤三年十六薙髮二十四入妙香山專習苦行頃之南入智異山叅智嚴長老嚴一見深器之示一偈曰風颼颼月皎皎雲冪冪水潺潺欲識這個事須叅祖師關師即深得密旨樂而忘憂東入金剛山十王洞志存大乘冥心虛寂不覺失笑曰趙州露刃劒寒霜光𦦨燦擬議問如何分身作兩段喝夢中說夢漏逗不少自此詠於口者必徑截門言句也頃入表訓結一夏厥後遍歷天磨五臺白雲楞伽諸山嘉靖甲辰春還入妙香山棲普賢寺觀音殿碩德高士八表雲趨可謂海東折床會也有時深夜喚諸門人曰大抵學者不答活句徒將聰慧口耳之學衒耀於世不踏實地言行相違關西湖南討山討水徒費粥飯被經論賺過一生終未免虛生浪死又一般漢習閒成性不求師範野鬼窟中徒勞坐睡如到寶山空手去來深可憐愍又曰汝等諸人自己靈光盖天盖地不拘文字軆露真常夜繩不動汝疑之為蛇闇室本空汝怖之為鬼心上起真妄之情性中立凡聖之量請將智慧之嘴啄破無明之殼幸甚隆慶戊辰二月三十日特命檜巖住持茂卞普賢住持元珪禪德暉晶學玄禪燈義淨一精之徒曰界有成住壞空念有生住異滅身有生老病死凡有始必有終物之常也今日老僧欲示無常諸仁者須攝正念勿懷眷戀亦莫隨俗為譸張不益事也昔者莊子以天地為棺槨之語實自有理莊子尚爾況道人乎吾常欲向不思議之嶺作佛事須露屍骸飼于鳥獸可也言已即拔筆大書曰八十人間命迅如一電光臨行忽舉目活路是家鄉亦繼吟於口而書於紙曰年逾八十似空花往事悠悠亦眼花脚未跨門還本國故園桃李已開花放筆端坐泊然而逝佛紀二五九五年及至七日門人遵命奉色身輦于不思議之嶺以天竺法闍維之神光奪夜天地洞然百里之外有見之者望拜焉乃四月十八日亥時也銀色舍利鐫石鍾以安之師壽八十一臘六十五臨濟下第廿五世太古下第六世西山大師法名休靜字玄應自號清虛子以多在香山故又號西山俗姓完山崔氏安州人父世昌母金氏以正德十五年庚辰中宗大王十五年也三月生師九歲母兦十歲父歿伶仃無依隨州官來京就學泮齋鬱鬱不適意與同學數人南遊智異山窮覽形勝探賾諸經每愴早失怙恃益感生死之義忽得禪家頓悟法剃髮於崇仁長老七八年間遍踏名山嘉靖庚子師年廿一歲矣叅靈觀大師得印可後因遊行村落聞午鷄忽然有悟題落葉曰髮白心非白古人曾漏洩今聞一聲鷄丈夫能事畢年三十中禪科自大選陞至兩宗判事即解綬入金剛山作三夢詞主人夢說客客夢說主人今說二夢客亦是夢中人登香爐峯在金剛山作詩曰萬國都城如垤蟻千家豪傑等醯鷄一窓明月清虛枕無限松風韻不齊己丑鄭汝立之獄妖僧無業以此詩為證誣引師被逮供辭明剴宣祖大王知其冤立釋之徵詩稿覽之嘉歎賞賚焉壬辰之亂大駕播遷西幸龍灣師自香山仗劍進謁宣祖教曰世亂如此爾可弘濟耶師泣而拜命請曰國內緇徒之老病不任行伍者臣令在地焚修以祈神助其餘臣皆統率悉赴軍前以效忠赤宣祖義之命為八道十六宗八道之禪教兩宗故共為十六宗也都摠攝於是分遣弟子各起義僧助戰成功護駕還都明提督李如松送帖賀之贈以詩曰無意圖功利專心學道禪今聞王事急摠攝下山巔師以年老奏請以軍事屬於弟子惟政及處英納印還山宣祖賜號國一都大禪師禪教都摠攝扶宗樹教普濟登階尊者自是義益高名益尊往來於楓岳頭流妙香諸山常隨者千餘人出世者七十餘人甲辰正月二十三日師會弟子於妙香山圓寂菴焚香說法取自家影幀書其背曰八十年前渠是我八十年後我是渠作書付松雲惟政雷默處英歇趺坐而逝佛紀二六三一年壽八十五臘六十七異香滿室三七日後始歇弟子圓峻印英等闍維奉靈骨一片舍利三枚樹浮圖於妙香山安心寺又一片弟子惟政自休等奉來金剛山得神珠數枚窆石于榆岾寺之北禪家龜鑒清虛休靜禪師退隱著禪家龜鑑序古之學佛者非佛之言不言非佛之行不行也故所寶者惟貝葉靈文而已今之學佛者傳而誦則士大夫之句乞而持則士大夫之詩至於紅綠色其紙美錦粧其軸多多不足以為至寶吁何古今學佛者之不同寶也今雖不肖有志於古之學以貝葉靈文為寶也然其文尚繁藏海汪洋後之同志者頗不免摘葉之勞故文中撮其要且切者數百語書于一紙可謂文簡而義周也如以此語以為嚴師而研窮得妙則句句活釋迦存焉勉乎哉雖然離文字一句格外奇寶非不用也且將以待別機也嘉靖甲子夏清虛堂白華道人序有一物於此從本以來昭昭靈靈不曾生不曾滅名不得狀不得一物者何物古人頌云古佛未生前凝然一相圓釋迦猶未會迦葉豈能傳此一物之所以不曾生不曾滅名不得狀不得也六祖告眾云吾有一物無名無字諸人還識否神會禪師即出曰諸佛之本源神會之佛性此所以為六祖之孽子也懷讓神師自嵩山來六祖問曰什麼物伊麼來師罔措至八年方自肯曰說似一物即不中此所以為六祖之嫡子也三教聖人從此句出誰是舉者惜取眉毛佛祖出世無風起浪佛祖者世尊迦葉也出世者大悲為體度眾生也然以一物觀之則人人面目本來圓成豈假他人添脂着粉也此出世之所以起波浪也虛空藏經云文字是魔業名相是魔業至於佛語亦是魔業是此意也此直舉本分佛祖無功能乾坤失色日月無光然法有多義人有多機不妨施設法者一物也人者眾生也法有不變隨緣之義人有頓悟漸修之機故不妨文字語言之施設也此所謂官不容針私通車馬者也眾生雖曰圓成生無慧目甘受輪轉故若非出世之金钁誰刮無明之厚膜也至於越苦海而登樂岸者皆由大悲之恩也然則恒沙身命難報萬一也此廣舉新熏感佛祖深恩王登寶殿野老謳歌強立種種名字或心或佛或眾生不可守名而生解當體便是動念即乖一物上強立三名字者教之不得已也不可守名生解者亦禪之不得已也一擡一搦旋立旋破皆法王法令之自在者也此結上起下論佛祖事體各別九旱逢佳雨他鄉見故人世尊三處傳心者為禪旨一代所說者為教門故曰禪是佛心教是佛語三處者多子塔前分半座一也靈山會上舉拈花二也雙樹下槨示雙趺三也所謂迦葉別傳禪燈者此也一代者四十九年間所說五教也人天教一也小乘教二也大乘教三也頓教四也圓教五也所謂阿難流通教海者此也然則禪教之源者世尊也禪教之派者迦葉阿難也以無言至於無言者禪也以有言至於無言者教也乃至心是禪法也語是教法也則法雖一味見解則天地懸隔此辨禪教二途不得放過草裏橫身是故若人失之於口則拈花微笑皆是教迹得之於心則世間麤言細語皆是教外別傳禪旨法無名故言不及也法無相故心不及也擬之於口者失本心王也失本心王則世尊拈花迦葉微笑盡落陳言終是死物也得之於心者非但街談善說法要至於鷰語深談實相也是故寶積禪師聞哭聲踊悅身心寶壽禪師見諍拳開豁面目者以此也此明禪教深淺明珠在掌弄去弄來吾有一言絕慮忘緣凢然無事坐春來草自青絕慮忘緣者得之於心也所謂閒道人也於戲其為人也本來無緣本來無事飢來即食困來即眠綠水青山任意逍遙漁村酒肆自在安閒年代甲子摠不知春來依舊草自青此別歎一念迴光者將謂無人賴有一個教門惟傳一心法禪門惟傳見性法心如鏡之體性如鏡之光性自清淨即時豁然還得本心此秘重得意一念重重山與水清白舊家風評曰心有二種一本源心二無明取相心也性有二種一本法性二性相相對性也故禪教者同迷守名生觧或以淺為深或以深為淺遂為觀行大病故於此辨之然諸佛說經先分別諸法後說畢竟空祖師示句迹絕於意地理顯於心源諸佛為萬代依憑故理須委示祖師在即時度脫故意使玄通迹祖師言迹也意學者意地也胡亂指注臂不外曲諸佛說弓祖師說弦佛說無礙之法方歸一味拂此一味之迹方現祖師所示一心故云庭前栢樹子話龍藏所未有底說弓曲也說弦直也龍藏龍宮之藏經也僧問趙州如何是祖師西來意州答云庭前栢樹子此所謂格外禪旨也魚行水濁鳥飛毛落故學者先以如實言教委辨不變隨緣二義是自心之性相頓悟漸修兩門是自行之始終然後放下教意但將自心現前一念參詳禪旨則必有所得所謂出身活路上根大智不在此限中下根者不可躐等也教義者不變隨義頓悟漸修有先有後禪法者一念中不變隨緣性相體用元是一時離即離非是即非即故宗師據法離言直指一念見性成佛耳放下教義者以此明歷歷時雲藏深谷深密密處日照晴空大抵學者須參活句莫參死句活句下薦得堪與佛祖為師死句下薦得自救不了此下特舉活句使自悟入要見臨濟須是鐵漢評曰話頭有句意二門參句者徑截門活句也沒心路沒語路無摸索故也參意者圓頓門死句也有理路有語路有聞解思想故也凡本參公案上切心做工夫如鷄抱卵如猫抱鼠如飢思食如渴思水如兒憶母必有透徹之期祖師公案有千七百則如狗子無佛性庭前栢樹子麻三斤乾屎橛之流也鷄之抱卵暖氣相續也猫之捕鼠心眼不動也至於飢思食渴思水兒憶母皆出於真心非做作底心故云切也參禪無此切心能透徹者無有是處參禪須具三要一有大信根二有大憤志三有大疑情苟闕其一如折足之鼎終成廢器佛云成佛者信為根本永嘉云修道者先須立志蒙山云參禪者不疑言句是為大病又云大疑之下必有大悟日用應緣處只舉狗子無佛性話舉來舉去疑來疑去覺得沒理路沒義路沒滋味心頭熱悶時便是當人放身命處亦是成佛作祖底基本也僧問趙州狗子還有佛性也無州云無此一字子宗門之一關亦是摧許多惡知惡覺底器仗亦是諸佛面目亦是諸祖骨髓也須透得此關然後佛祖可期也古人頌云趙州露刃劒寒霜光燄燄擬議問如何分身作兩段話頭不得舉起處承當不得思量卜度又不得將迷待悟就不可思量處思量心無所之如老鼠入牛角便見倒斷也又尋常計較安排底是識情隨生死遷流底是識情怕怖慞惶底是識情今人不知是病只管在裏許頭出頭沒話頭有十種病曰意根下卜度曰揚眉瞬目處垛根曰語路上作活計曰文字中引證曰舉起處承當曰颺在無事匣裏曰作有無會曰作真無會曰作道理會曰將迷待悟也離此十種病者但舉話時畧抖擻精神只疑是個什麼此事如蚊子上鐵牛更不問如何若何下觜不得處棄命一攢和身透入重結上意使參活句者不得退屈古云參禪須透祖師關妙悟要窮心路絕工夫如調絃之法緊緩得其中勤則近執着忘則落無明惺惺歷歷密密綿綿彈琴者曰緩急得中然後清音普矣工夫亦如此急則動血囊忘則入鬼窟不徐不疾妙在其中工夫到行不知行坐不知坐當此之時八萬四千魔軍在六根門頭伺候隨心生設心若不起爭如之何魔者樂生死之鬼名也八萬四千魔軍者乃眾生八萬四千煩惱也魔本無種修行失念者遂派其源也眾生順其境故順之道人逆其境故逆之故云道高魔盛也禪定中或見孝子而斫股或見猪子而把鼻者亦自心起見感此外魔也心若不起則種種伎倆翻為割水吹光也古云壁隙風動心隙魔侵起心是天魔不起心是陰魔或起或不起是煩惱魔然我正法中本無如是事大抵忘機是佛道分別是魔境然魔境夢事何勞辨詰工夫若打成一片則縱今生透不得眼光落地之時不為惡業所牽業者無明也禪者般若也明闇不相敵理固然也大抵參禪者還知四恩深厚麼還知四大醜身念念衰朽麼還知人命在呼吸麼生來值遇佛祖麼及聞無上法生希有心麼不離僧堂守節麼不與隣單雜話麼切忌鼓扇是非麼話頭十二時中明明不昧麼對人接語時無間斷麼見聞覺知時打成一片麼返觀自己捉敗佛祖麼今生决定續佛慧命麼起坐便宜時遙思地獄苦麼此一報身定脫輪迴麼當八風境心不動麼此是參禪人日用中點檢底道理古人云此身不向今生度更向何生度此身四恩者父母君師施主恩也四大醜身者父之精一滴母之血一滴者水大之濕也精為骨血為皮者地大之堅也精血一塊不腐不爛者火大之煖也鼻孔先成通出入息者風大之動也阿難曰欲氣麤濁腥臊交遘此所以醜身也念念衰朽者頭上光陰剎那不停面自皺而髮自白如云今既不如昔後當不如今此無常之體也然無常之鬼以殺為戲實念念可畏也呼者出息之火也吸者入息之風也人命寄托只在出入息也八風者順逆二境也按八風者即利衰毀譽稱譏苦樂也地獄苦者人間六十刼泥犂一晝夜鑊湯爐炭劒樹刀山之苦口不可形言也人身難得甚於海中之鍼故於此愍而警之評曰上來法語如人飲水冷暖自知聰明不能敵業乾慧未免苦輪各須察念勿以自慢學語之輩說時似悟對境還迷所謂言行相違者也此結上自謾之意言行相違虛實可辨若欲敵生死須得這一念子爆地一破方了得生死爆打破漆桶聲打破漆桶然後生死可敵也諸佛因地法行者只此而已然一念子爆地一破然後須訪明師决擇正眼此事極不容易須生慚愧始得道如大海轉入轉深慎勿得小為足悟後若不見人則醍醐上味翻成毒藥古德云只貴子眼正不貴汝行履處昔仰山答溈山問云涅槃經四十卷總是魔說此仰山之正眼也仰山又問行履處溈山答曰只貴子眼正云云此所以先開正眼而後說行履也故云若欲修行先須頓悟願諸道者深信自心不自屈不自高此心平等本無凡聖然約人有迷悟凡聖也因師激發忽悟真我與佛無殊者頓也此所以不自屈如云本來無一物也因悟斷習轉凡成聖者漸也此所以不自高如云時時勤拂拭也屈者教學者病也高者禪學者病也教學者不信禪門有悟入之秘訣深滯權教別執真妄不修觀行數他珍寶故自生退屈也禪學者不信教門有修斷之正路染習雖起不生慚愧果級雖初多有法慢故發言過高也是故得意修心者不自屈不自高也評曰不自屈不自高者畧舉初心因該果海則信之一位也廣舉菩薩果徹因源則五十五位也迷心修道但助無明悟若未徹修豈稱真哉悟修之義如膏明相賴目足相資修行之要但盡凡情別無聖解病盡藥除還是本人不用捨眾生心但莫染污自性求正法是邪捨者求者皆是污也斷煩惱名二乘煩惱不生名大涅槃斷者能所也不生者無能所也須虛懷自照信一念緣起無生此單明性起諦觀殺盜妄從一心上起當處便寂何須更斷此雙明性相經云不起一念名為永斷無明又云念起即覺知幻即離不作方便離幻即覺亦無漸次心為幻師也身為幻城矣世界幻衣也名相幻食也至於起心動念言妄言真無非幻也又無始幻無明皆從覺心生幻幻如空花幻滅名不動故夢瘡求醫者寤來無方便知幻者亦如是眾生於無生中妄見生死涅槃如見空花起滅性本無生故無生涅也空本無花故無起滅也見生死者如見空花起也見涅槃者如見空花滅也然起本無起滅本無滅於此二見不用窮詰是故思益經云諸佛出世非為度眾生只為度生死涅槃二見耳菩薩度眾生入滅度又實無眾生得滅度菩薩只以念念為眾生也了念體空者度眾生也念既空寂者實無眾生得滅度也此上論信解理須頓悟事非頓除文殊達天真普賢明緣起解似電光行同竆子此下論修證帶修禪蒸沙作飯帶殺修禪如塞耳呌聲帶偷修禪如漏巵求滿帶妄修禪如刻糞為香縱有多智皆成魔道此明修行軌則三無漏學也小乘稟法為戒粗治其末大乘攝心為戒細絕其本然則法戒無身犯心戒無思犯也者斷清淨殺者斷慈悲盜者斷福德妄者斷真實也能成智慧縱得六神通如不斷殺盜妄則必落魔道永失菩提正路矣此四戒百戒之根故別明之使無思犯也無憶曰戒無念曰定莫妄曰慧又戒為捉賊定為縛賊慧為殺賊又戒器完固定水澄清慧月方現此三學者實為萬法之源故特明之使無諸漏也靈山會上豈有無行佛少林門下豈有妄語祖無德之人不依佛戒不護三業放逸懈怠輕慢他人較量是非而為根本一破心戒百過俱生評曰如此魔道末法熾盛惱亂正法學者詳之若不持戒尚不得疥癩野干狐也之身况清淨菩提果可冀乎重戒如佛佛常在焉須草繫鵝珠以為先導欲脫生死先斷貪欲及除愛渴愛為輪迴之本欲為受生之緣佛云心不除塵不可出又云恩愛一縛着牽人入罪門渴者情愛之至切也無礙清淨慧皆因禪定生超凡入聖坐脫立亡者皆禪定之力也故云欲求聖道離此無路心在定則能知世間生滅諸相虛隙日光纖埃擾擾清潭水底影像昭昭見境心不起名不生不生名無念無念名解脫戒也定也慧也舉一具三不是單相修道證滅是亦非真也心法本寂乃真滅也故曰諸法從本來常自寂滅相眼不自見見眼者妄也故妙首思量淨名杜默此下散舉細行貧人來乞隨分施與同體大悲是真布施自他為一曰同體空手來空手去吾家活計有人來害當自攝心勿生嗔恨一念嗔心起百萬障門開煩惱雖無量嗔慢為甚涅槃云塗割兩無心嗔如冷雲中霹靂起火來若無忍行萬行不成行門雖無量慈忍為根源忍心如幻夢辱境若龜毛守本真心弟一精進若起精進心是妄非精進故云莫妄想莫妄想懈怠者常常望後是自棄人也持呪者現業易制自行可違宿業難除必借神力摩登得果信不誣矣故不持神呪遠離魔事者無有是處禮拜者敬也伏也恭敬真性屈伏無明身口意清淨則佛出世念佛者在口曰誦在心曰念徒誦失念於道無益阿彌陁佛六字法門定出輪迴之捷徑也心則緣佛境界憶持不忘口則稱佛名號分明不亂如是心口相應名曰念佛評曰五祖云守本真心勝念十方諸佛六祖云常念他佛不免生死守我本心即到彼岸又云佛向性中作莫向身外求又云迷人念佛求生悟人自淨其心又云大抵眾生悟心自度度佛不能度眾生云云如上諸德直指本心別無無方便方將一法便逗諸根理實如是然迹門實有極樂世界阿彌陁佛有四十八大願凡念十聲者承此願力往生蓮胎徑脫輪迴三世諸佛異口同音十方菩薩同願往生又况古今往生之人傳記昭昭願諸行者慎勿錯認勉之勉之梵語阿彌陁此云無量壽亦云無量光十方三世第一佛號也因名法藏比丘對世自在王佛發四十八願云我作佛時十方無央數世界諸天人民以至蝟飛蝡動之流念我名十聲者必生我剎中不得是願終不成佛云云先聖云唱佛一聲天魔喪膽名除鬼簿蓮出金池又懺法云自力他力一遲一速欲越海者種樹作船遲也比自力也借船越海速也比佛力也又曰世間穉兒迫於水火高聲大呌則父母聞之急走救援如人臨命終時高聲念佛則佛具神通决定來迎爾是故大聖慈悲勝於父母也眾生生死甚於水火也有人云自心淨土淨土不可生自性彌陁彌陁不可見此言似是而非也彼佛無貪無嗔我亦無貪無嗔乎彼佛變地獄作蓮花易於反掌我則以業力常恐自墮於地獄况變作蓮花乎彼佛觀無盡世界如在目前我則隔壁事猶不知况見十方世界如目前乎是故人人性則雖佛而行則眾生論其相用天懸地隔圭峰云設實頓悟終須漸行誠哉是言也然則寄語自性彌陁者豈有天生釋迦自然彌陀耶須自忖量人豈不自知臨命終時生死苦際定得自在否若不如是莫以一時貢高却致永却沈墮又馬鳴龍樹悉是祖師皆明垂言教深勸往生我何人哉不欲往生又佛自云西方去此遠矣十萬十惡八千八邪此為鈍根說相也又云西方去此不遠即心眾生是佛彌陀此為利根說性也教有權實語有顯密若行解相應者遠近俱通也故祖師門下亦有或喚阿彌陀佛者惠遠或喚主人公者瑞巖聽經有經耳之緣隨喜之福幻軀有盡實行不亡此明智學如食金剛勝施七寶壽師云聞而不信尚結佛種之因學而不成猶盖人天之福看經若不向自己上做工夫雖看盡萬卷猶無益也此明愚學如春禽晝啼秋蟲夜鳴密師云識字看經元不證悟銷文釋義唯熾貪嗔邪見學未至於道衒耀見聞徒以口舌辯利相勝者如廁屋塗丹雘別明末世愚學學本修性全習為人是誠何心哉出家人習外典如以刀割泥泥無所用而刀自傷焉門外長者子還入火宅中出家為僧豈細事乎非求安逸也非求溫飽也非求利名也為生死也為斷煩惱也為續佛慧命也為出三界度眾生也可謂衝天大丈夫佛云無常之火燒諸世間又云眾生苦火四面俱焚又云諸煩惱賊常伺殺人道人宜自警悟如救頭燃身有生老病死界有成住壞空心有生住異滅此無常苦火四面俱焚者也謹白參玄人光陰莫虛度貪世浮名枉功勞形營求世利業火加薪貪世浮名者有人詩云鴻飛天末迹留沙人去黃泉名在家營求世利者有人詩云採得百花成蜜後不知辛苦為誰甜枉功勞形者鑿永雕刻不用之巧也業火加薪者麤弊色香致火之具也名利衲子不如草衣野人唾金輪入雪山千世尊不易之軌則末世羊質虎皮之軰不識廉耻望風隨勢陰媚取寵噫其懲也夫心染世利者阿附權門趨走風塵返取笑於俗人此衲子以羊質證此多行以懲也夫結之此三字文出莊子佛云云何賊人假我衣服裨販如來造種種業末法比丘有多般名字或鳥鼠僧或啞羊僧或禿居士或地獄滓或被袈裟賊噫其所以以此裨販如來者撥因果排罪福沸騰身口送起愛憎可謂愍也避僧避俗曰鳥鼠舌不說法曰啞羊僧形俗心曰禿居士罪重不遷曰地獄滓賣佛營生曰被袈裟賊以被袈裟賊證此多名以此二字結之此二字文出老子於戲佛子一衣一食莫非農夫之血織女之苦道眼未明如何消得傳燈一道人以道眼未明故身為木菌以還信施故曰要識披毛戴角底麼即今虛受信施者是有人未飢而食未寒而衣是誠何心哉都不思目前之樂便是身後之苦也智論一道人五粒粟受牛身生償筋骨死還皮肉虛受信施報應如響故曰寧以熱鐵纏身不受信心人衣寧以洋銅灌口不受信心人食寧以鐵鑊投身不受信心人房舍等梵網經云不以破戒之身受信心人種種供養及種種施物菩薩若不發是願則得輕垢罪故曰道人進食如進毒受施如受箭幣厚言甘道人所畏進食如進毒者畏喪其道眼也受施如受箭者畏失其道果也故曰修道之人如一塊磨刀之石張三也來磨李四也來磨磨來磨去別人刀快而自家石漸消然有人更嫌他人不來我石上磨實為可惜如此道人平生所向只在溫飽故古語亦有之曰三途苦未是苦若袈裟下失人身始是苦也古人云今生未明心滴水也難消此所以袈裟下失人身也佛子佛子憤之激之此章始起於一於戲終結於一古語中間細繹許多故曰字亦一段文法也咄哉此身九孔常流百千癰疽一片薄皮又云革囊盛糞膿血之聚臭穢可鄙無貪惜之何况百年長養一息背恩上來諸業皆由此身發聲叱咄深有警也此身諸愛根本了之虛妄則諸愛自除如其耽着則起無量過患故於此特明之以開修道之眼也評曰四大無主故一為假四冤四大背恩故一為養四蛇我不了虛妄故為他人也嗔之慢之若二鬼之爭一屍也一屍之為體也一曰泡聚一曰夢聚一曰苦聚一曰糞聚非徒速朽亦甚鄙陋上七孔常流涕唾下二孔常流屎尿故須十二時中潔淨身器以參眾數凡行麤不淨者善神必背去因果經云將不淨手執經卷在佛前涕唾者必當獲廁蟲報文殊經云大小便時狀如木石慎勿語言作聲又勿畵壁書字又勿吐痰入廁中又云登廁不洗淨者不得坐禪床不得登寶殿以下入廁呪洗淨呪等并略之此登廁洗淨之法亦是道人日用行實故引經附此有罪即懺悔發業即慚愧有丈夫氣象又改過自新罪隨心滅懺悔者懺其前愆悔其後過慚愧者慚責於內愧發於外然心本空寂罪業無寄道人宜應端心以質直為本一瓢一衲旅泊無累佛云心如直絃又云直心是道塲若不耽着此身則必旅泊無累凡夫取境道人取心心境兩忘乃是真法取境者如鹿之趁空花也取心者如猿之捉水月也境心雖殊取病則一也此合論凡夫二乘天地尚空秦日月山河不見漢君臣聲聞宴坐林中被魔王捉菩薩遊戲世間外魔不覔聲聞取靜為行故心動心動則鬼見也菩薩性自空寂故無迹無迹則外魔不見此合論二乘菩薩三月懶遊花下路一家愁閉雨中門凡人臨命終時但觀五蘊皆空四大無我真心無相不去不來生時性亦不生死時性亦不去湛然圓寂心境如一但能如是直下須了不為三世所拘繫便是出世自由人也若見諸佛無心隨去若見地獄無心怖畏但自無心同於法界此即是要節也然則平常是因臨終是果道人須着眼看怕死老年親釋迦好向此時明自己百年光影轉頭非凡人臨命終時若一毫毛凡地情量不盡思慮未忘向驢胎馬腹裏托質泥犂鑊湯中煑煠乃至依前再為螻蟻蚊䖟白雲云設使一毫毛凡聖情念淨盡亦未免入驢胎馬腹中二見星飛散入諸趣烈火茫茫寶劍當門評曰此二節特開宗師無心合道門權遮教中念佛求生門然根器不同志願亦異各各如是兩不相妨願諸道者平常隨分各自努力最後剎那莫生疑悔禪學者本地風光若未發明則孤峭玄關擬從何透往往斷滅空以為禪無記空以為道一切俱無以為高見此冥然頑空受病幽矣今天下之言禪者多坐在此病向上一關措足無門雲門云光不透脫有兩種病透過法身亦有兩種病須一一透得始得不行芳草路難至落花村宗師亦有多病病在耳目者以瞠眉努目側耳點頭為禪病在口舌者以顛言倒語胡唱亂暍為禪病在手足者以進前退後指東畫西為禪病在心腹者以窮玄究妙超情離見為禪據實而論無非是病殺父母者佛前懺悔謗般若者懺悔無路空中撮影非為妙物外追蹤豈俊機本分宗師全提此句如木人唱拍紅爐點雪亦如石火電光學者實不可擬議也故古人知師恩曰不重先師道德只重先師不為我說破不道不道恐上紙墨箭穿江月影須是射鵰人大抵學者先須詳辨宗途昔馬祖一喝也百丈耳聾黃檗吐舌這一喝便是拈花消息亦是達磨初來底面目吁此臨濟宗之淵源識法者懼和聲便打杖子一枝無節目慇勤分付夜行人昔馬祖一喝也百丈得大機黃檗得大用大機者圓應為義大用者直截為義事見傳燈錄大凡祖師宗途有五曰臨濟宗曰曹洞宗曰雲洞宗曰溈仰宗曰法眼宗臨濟宗本師釋迦佛至三十三世大祖慧能大師直傳曰南岳懷讓曰馬祖道一曰百丈懷海曰黃檗希運曰臨濟義玄曰興化存獎曰南院道顒曰風穴延沼曰首山省念曰汾陽善昭曰慈明楚圓曰楊岐方會曰白雲守端曰五祖法演曰圓悟克勤曰徑山宗杲禪師等曹洞宗大祖下傍傳曰青原行思曰石頭希遷曰藥山惟儼曰雲巖曇晟曰洞山良价曰曹山耽章曰雲居道膺禪師等雲門宗馬祖傍傳曰天王道悟曰龍潭崇信曰德山宣鑒曰雪峰義存曰雲門文偃曰雪竇重顯曰天衣義懷禪師等溈仰宗百丈傍傳曰溈山靈祐曰仰山慧寂曰香嚴智閒曰南塔光涌曰芭蕉慧清曰霍山景通曰無著文喜禪師等法眼宗雪峰傍傳曰玄沙師備曰地藏桂琛曰法眼文益曰天台德韶曰永明延壽曰龍濟紹修曰南臺守安禪師等臨濟家風赤手單刀殺佛殺祖辨古今於玄要驗龍蛇於主賓操金剛寶劒掃除竹木精靈奮獅子全威震裂狐狸心膽要識臨濟宗麼青天轟霹靂平地起波濤曹洞家風權開五位善接三根橫抽寶劒斬諸見稠林妙協弘通截萬機穿鑿威音那畔滿目烟光空刧已前一壺風月要識曹洞宗麼佛祖未生空刧外正偏不落有無機雲門家風劒鋒有路鐵壁無門掀翻露布葛藤剪却常情見解迅電不及思量烈焰寧容湊泊要識雲門宗麼拄杖子𨁝跳上天盞子裏諸佛說法溈仰家風師資唱和父子一家脇下書字頭角崢嶸室中驗人獅子腰折離四句絕百非一搥粉碎有兩口無一舌九曲珠通要識溈仰宗麼斷碑橫古路鐵牛眠少室法眼家風言中有響句裏藏鋒髑髏常干世界鼻孔磨觸家風風柯月渚顯露真心翠竹黃花宣明妙法要識法眼宗麼風送斷雲歸嶺去月和流水過橋來別明臨濟宗旨大凡一句中具三玄一玄中具三要一句無文綵印三玄三要有文綵印權實玄照用要三句第一句喪身失命第二句未開口錯第三句糞箕掃三要一要照即大機二要照即大用三要照用同時三玄體中玄三世一念等句中玄徑截言句等玄中玄良久棒喝等四料揀奪人不奪境待下根人奪境不奪人待中根人人境兩俱奪待上根人人境俱不奪待出格人四賓主賓中賓學人無鼻孔有問有答賓中主學人有鼻孔有主有法主中賓師家無鼻孔有問在主中主師家有鼻孔不妨奇特四照用先照後用有人在先用後照有法在照用同時驅耕夫之牛奪飢人之食照用不同時有問有答四大式正利少林面壁類平常禾山打鼓類本分山僧不會類貢假達摩不識類四喝金剛王寶劒一刀揮斷一切情解踞地獅子發言吐氣眾魔膽裂探竿影草探其有無師承鼻孔一喝不作一喝用具上三玄四賓主等八棒觸令返玄接掃從正靠玄傷正苦責罰捧順宗旨賞棒有虛實辨棒盲枷瞎棒掃除凡聖正棒此等法非特臨濟宗風上自諸佛下至眾生皆分上事若離此說法皆是妄語臨濟喝德山棒皆徹證無生透頂透底大機大用自在無方全身出沒全身擔荷退守文殊普賢大人境界然據實而論此二師亦不免偷心鬼子凜凜吹毛不犯鋒鋩爍爍寒光珠媚水寥寥雲散月行天大丈夫見佛見祖如冤家若着佛求被佛縛若着祖求被祖縛有求皆苦不如無事佛祖如冤者結上無風起浪也有求皆苦者結上當體便是也不如無事者結上動念即乖也到此坐斷天下人舌頭生死迅輪庶幾停息也扶危定亂如丹霞燒木佛雲門喫狗子普曜經云世尊初生下時周行七步目顧四方一手指天一手指地曰天上天下唯我獨尊雲門拈云我在當時一棒打殺與狗子喫却貴國天下太平老母不見佛皆是摧邪顯正底手段然畢竟如何常憶江南三月裏鷓鴣啼處百花香神光不昧萬古徽猷入此門來莫存知解神光不昧者結上昭昭靈靈也萬古徽猷者結上本不生滅也莫存知解者結上不可守名生解也門者有凡聖出入義如荷澤所謂知之一字眾妙之門也吁起於名狀不得結於莫存知解一篇葛藤一句都破也然始終一解中舉萬行如世典之三義也知解二字佛法之大害故特舉而終之荷澤神會禪師不得為曹溪嫡子者以此也因而頌曰如斯舉唱明宗旨笑殺西來碧眼僧然畢竟如阿咄孤輪獨照江山靜自笑一聲天地驚禪家龜鑑終禪教釋西山大師清虛病老在西山金仙臺一日行珠惟政寶晶三德士持金剛經五家解問曰般若教中亦有禪旨以般若為宗可乎病老引古答曰只聞世尊以正法眼藏付囑摩訶迦葉不聞以金剛般若付囑摩訶迦葉也大抵百草頭上有活底祖師意至於鶯鷰常談實相法况我金剛一句乎不着文字則可讀一卷經也然洗佛光明非其機莫能窺今日為君禪教二道對辨而釋其釋也乃古也非今也世尊未離兜率已降王宮未出母胎度人已畢此禪門最初句也古德頌云釋迦不出世四十九年說達磨不西來少林有妙訣是此意也華嚴十種訣世尊從兜率降王宮住胎出胎出家成道降魔轉法至於入泹槃此禪門末後句也有云如月在天影含眾水時無礙處無礙始終一貫則末後句亦是最初句最初句亦是末後句然我禪門中本無如是商量商量則識法者懼也拈頌說誼世尊初入摩耶胎直與三十三人摠授玄記云吾有正法眼藏密付於汝各傳一人勿令斷絕頌曰摩耶肚裏堂法界體一如卅三諸祖師同時密授記般若多羅付法傳世尊在雪山六年因星悟道既知是法之未臻極遊行數十日歲在壬午特尋訪于真歸祖師始傳得玄極之旨是乃教外別傳之源也梵日國師集世尊在靈山法會上為迦葉分半座舉花枝示雙趺對眾密付文殊普賢八萬菩薩眾海罔知迦葉入處是乃教外別傳之派也梵王决疑經及宗道者傳訣曰自迦葉阿難二尊者至六祖慧能大師所謂卅三也教外別傳之旨逈出青霄之外非徒五教學者難信亦乃當宗下根茫然不識問迦葉阿蘭位在聲聞豈堪教外別傳之旨乎答迦葉阿難應化大聖百千三昧無量功德與如來不異况已授密記者耶正宗記世尊偈云始從鹿野苑終至跋提河於是二中間未曾說一字此固教外別傳之謂也智度論諸佛說弓諸祖說弦教家無礙之法方歸一味拂此一味之跡方現禪家一心故云無盡性海合一味一味相沉是我禪順正錄及真正錄問圓教中性海則自體雖不可思不可說始修法界之因終證法界之果若海印則自是訂體離因離果與禪門正宗心印可和會否答相似而不相似也華嚴雖明無盡法界坐在因果域內證之者須經見聞生觧行生然後證入故未透義路之窠臼亦未脫十種之病源豈比別傳禪旨耶海印者雖離因離果自從因果處歸亡因果處有因者始迹有果者終迹也禪門密傳之旨本無法界之因更無亡因本無法界之果更無亡果本無因故無萬行之路本無果故無證果之門况學者所參話頭沒語路沒義路沒滋味不滯十種病不涉全提見亦不渉破病解忽然噴地一發則自然洞明一心法界亦洞明不思議境界所謂一聞千悟得大總持者也况宗師所示手叚據法離言殺活臨時或作青天霹靂或起平地干戈劒刃上能撲人電光中能穿針雖上根大智不容思議於其間也問頓教中一切法離心緣相離名字相一念不生訂時亦無能入者可與禪門密旨合否答相似而不相似也頓教一念不生泯絕無寄故坐在死句坑中然若不洞明一念不生之解則無以攝此行也圓覺云得法界淨者即被淨解為自障礙此之謂也若論所訂真如則必有能訂智體若有不生妄念則必有所生正念又有從信而至佛地之迹也禪門密旨則本無一念不生何念念既本無信位何立信位不立佛地何有雖說最上乘本無最上乘况學者所參活句如一團火近之則燎却面門無佛法措着之處只有大疑如烈𦦨亘天忽若打破漆桶則百千法門無量妙義不求而圓得也然則雖證理成佛只得素法身者可與同論也故云祖師傳心處如鳥飛空永無蹤迹也華嚴䟽云圓頓之上別有一宗此禪門之謂也竪禪章及决疑論訣曰圓教有無礙緣起之解頓教有離名絕相之解禪門無摸索沒巴鼻問楞伽經性宗之法達磨帶來要證據心地法門故歷世分付云云可乎答此亦不可也佛為大慧菩薩大海隔絕處談佛性義意欲激發二乘捨小慕大而已止可在方等部中安可證據禪門耶引古辨今錄重峰祖師云達磨初來以正法眼藏密付慧可只觀僧那禪師可師傍傳執筏堅固不得祖師正法將恐以愚惑情破滅正法故假設方便云楞伽經四卷是我心要付慧可兼傳之然則祖門傳楞伽者為僧那止啼之黃葉耳海東七代錄問般若經云諸佛從此經出故稱般若為佛母然則以般若為宗可乎答亦不可也般若此翻智慧若是智慧則舍利弗為宗主也般若以前所說法皆為戱論故經云蠲除戱論之糞也是故當知般若是聲聞䑛痔破癰之良藥耳安可為禪門之宗主也鑑昭錄聖住和尚常扣楞伽經知非便舍入唐傳禪法道元和尚常究華嚴經一日乃曰圓頓之旨豈如心印之法即舍之亦入唐傳祖印七代錄訣曰周金剛之舉火亮西山之氷釋孚太原之聞鼓角海越州之得寶藏至於靈默之回頭良遂之稱名凡以此也新羅文聖大王問無染國師曰禪教高下為寡人辨釋答百僚阿衡各其職帝王拱默廟堂之上萬姓以安王聞之大悅無染國師別集講華嚴座主問螺磎國師曰教之三種根機與禪之別傳一機請為我辨釋答世尊向生死海中張三種網摝人天魚豈將三網所摝之魚比况雲外注甘露之神龍耶螺磎別集訣曰禪門正傳之機一似三網之上雲外之神龍一似百僚之上廟堂天子其尊其貴不辨可知於是教學者五六軰憤然作色問清虛曰禪家發言越分過度無乃有其眼而無其足乎清虛正色而對曰禪家具眼具足寧可永刧沉淪不慕諸聖解脫者禪家之眼也不見他人非常見自己過者禪家之足也於戱世降聖遠魔強法弱視正法如土塊我之此語正如持盃水救輿火也五祖和尚云守我本心勝念十方諸佛因指天詛盟曰若我誑汝我被世世虎狼所食學者到此若不生悲感可謂與木石無異也故古德云重教輕心雖歷多刼盡作天魔外道禪教訣示惟政大師今禪者曰此吾師之法也今教者曰此吾師之法也一法上同於同異於異而指馬交諍嗚乎其孰能訣之然禪是佛心教是佛語也教也者自有言至於無言者也禪也者自無言至於無言則人莫得而名焉強名曰心世人不知其由謂學而知思而得是可愍也教者曰教中亦有禪也云者出於非聲聞乘非緣覺乘非菩薩乘亦非佛乘之語也然此禪家入門之初句非禪旨也世尊一代所說之教也譬如將三種慈悲之網張三界生死之海以小網摝蝦蜆如人天小乘教以中網摝魴鱒如緣覺中乘教以大網摝鯨鰲如大乘圓頓教俱置於涅槃之岸焉此教之序也其中有一物鬣如朱火爪如鐵戟眼射日光口吐風雷者翻身一轉白浪滔天山河震動日月晦暝超出乎三網之外直上乎青雲之端注甘露而益羣生焉正如祖門教外別傳之機此禪之別於教者也此禪之法吾佛世尊亦別傳乎真歸祖師者也非古佛之陳言也今錯承禪旨者或以頓漸之門為正脉或以圓頓之教作宗乘或引外道書說密旨或以弄業識為本分或以認光影為自己者至於恣行盲聾棒喝無慚無愧者是誠何心哉其謗法之愆余何敢言吾所謂教外別傳者非學而知思而得者也須窮心路絕然後始可知也須經自肯點頭然後始可得也師不聞乎自釋尊拈花示眾迦葉破顏微笑乃至於口而傳之後曰達磨廓然無聖六祖善惡不思讓師車滯鞭牛思師廬陵米價馬祖吸盡西江石頭不會佛法至於雲門胡餅趙州喫茶投子沽油玄沙白紙雪峯輥毬禾山打鼓神山敲鑼道吾作舞斯等皆先佛先祖同唱教外別傳之曲也思量得麼擬議得麼可謂蚊子之上鐵牛也今當末世多是劣機非別傳之機也故只貴圓頓門以理路義路心路語路生見聞信解者也不貴徑截門沒理路沒義路沒心路沒語路沒滋味無摸索底上打破漆桶者也然則如之何而可也今師對八方衲子之軰下刃要緊不得穿鑿直以本分徑截門活句教伊自悟自得方是宗師為人體裁也若見學人不薦便與拖泥說教瞎人眼不少若宗師違此法則雖說法天花亂墜總是痴狂外邊走也若學人信此法則雖今生未得徹悟臨命終時不被惡業所牽直入菩提正路也昔馬祖一喝也百丈耳聾黃檗吐舌此臨濟宗之淵源也師必擇正脉宗眼分明故如許縷縷莫辜負老僧也若辜負老僧則必辜負佛祖之深恩也詳悉詳悉又示別紙千里之驥豈假鞭影曠野春風想必如流然古人云見道易而守道難也師居常勉護毘尼法勿相違解行勿說他人過勿議朝廷事勿看外書勿視邪色勿聽甘言也衾枕之所畏况外人乎勿近諂笑也塵人之所病况道人乎勿以聰慧貢我勿以文字慢人至道無人也真理無我也須常守己事常省己過以質直為體以慈忍為用以青山白雲為棲息處以水月松風為知心友也則庶幾乎道人也臨濟下第廿五世太古下第六世弘覺登階禪師堂號浮休法諱善修俗姓金氏古帶方獒樹人也父積山母李氏以嘉靖癸卯二月戊子生師焉師丱歲啟父母曰浮生滾冗吾將出世辭入智異山從信明長老剃髮謁芙蓉大師盡得心法師善書法與松雲政公齊名漢人能書者見師所書之字以為筆精健勁古不易得云云壬辰之亂師隱身於德裕山巖穴中以避之亂平師如伽倻明將李宗城入海印寺見師忘皈臨別贈詩以寓眷眷之意無何移九千洞宴晦一日瞑目誦圓覺經有一大蟒來聽夜夢一老翁拜謝曰蒙和尚說法已離苦矣萬歷甲寅師自松廣之七佛庵翌年秋七月示微疾召上足碧巖大師付法曰吾意在汝汝欽哉至十一月初一日日纔中晡沐浴歇喚侍者索紙筆書一偈曰七十三年遊幻海今朝脫殼返初源廓然空寂元無物何有菩提生死根偈畢泊然而逝佛紀二六四二年報年七十三坐夏五十七門人闍維收靈骨樹浮圖凡四處海印松廣七佛百丈也後五年光海主追加弘覺登階附青梅禪師祭五大聖師文維萬曆丁巳智異山弟子某等謹告于故大聖師尊靈性身非色真說無聲於非身顯相分形千億於真說顯言教演河沙惟我五大聖師從真淨界入生滅藏稀有稀有如曇花次第而開奇哉奇哉似覺樹隨時而秀開三門於鐵壁撈摝魚龍拔一刃於霜天沉埋佛祖空中撮影隨機之化曲盡火裏生蓮為人之心徹困如非大光明藏中親見聞必是摩耶肚堂裏同授記者登階尊者肉身菩薩降跡同塵逢塲作戲暗撒真珠登階謂碧溪正心也碧松國老嘆世無常脫入空門當機揮刃劈空電影芙蓉大士博取及人眾聖同規橫拈倒用無不得皈清虛摠判身一片雲志千里鶴空諸法藏碎萬祖骨浮休大士聰明天縱道洽真空具體作家海內蒙光嗚呼塵非常住永歸寂滅悲風動樹愴月臨軒弟子等追慕無窮奉命寫真祖堂重開奉安于茲瞻仰慈容壁上生風聊備香花恭陳一奠伏惟尚饗智異山青梅禪師法諱印悟燕谷寺僧奉命定祖位如此今我亦從梅師之舊止于虛休兩師而兩師以下各有派譜此不具錄但取其有碑狀者入之編年云爾青梅大師十無益頌一心不返照看經二不達性空坐禪三不信正法苦行四不折我慢學法五欠人師德濟眾六內無實德外儀七心非信實巧言八輕因望果求道九心腹無識我慢十一生乖角處眾跋尚玄居士儒而好佛者博通乎內外典參究有年妙解釋氏真詮若宿世因果之契焉蓋香山老坡諒亦默證於三生之緣業者也吾東佛教自羅迄今迨數千年之久而或隆或替與儒教相消長名師悟禪代不乏出惜其徒無能有綜合撰述以作我東之傳燈實錄而所傳不過憑寒山片石而已然陵谷變遷石亦磨滅則羅麗碑碣已剩缺而不可讀者亦八九矣此尚玄所以慨然興感而佛教通史之所由作也或疑佛之法亘于無際無所處而不現何事乎史夫史所以瀹時代疏源流證以古眎以今印吾心奉佛恩此乃通史之不得不作其作之也又益于無際耳然其隆替無常固古也今適丁振興之運而時代之最莫今若也則普濟彼岸得真成道者必接踵而起矣通史之有功於佛顧無量矣是為之跋世尊降生二千九百四十五年一月十日嵩陽山人張志淵跋朝鮮佛教通史下編目次二百品題頁頁出西域三千年歷史二四禪源流派皆自曹溪七四二入東方二百句品題四七教林結果迺於雜花四二五五月氏金人乘來鐵鍾五七六一元曉義相華嚴初祖二九一二五露王玉后載到石塔六二七太古懶翁臨濟嫡孫五五一四順道阿道傳經創寺七七七胡僧難陀度僧漢山九一一二涵虛清虛扶宗樹教八一三八一四台宗法融稟宗荊溪一一六一一九梁傳曇始宣教句驪七七八一謙益齎梵本之律部一三一四吳音法明誦經對馬一四一六義信駄竺經於法寺一二五一三二扶桑佛教始自百濟一六一一五五臺佛宮山中明堂一三二一三八芙蓉法脈恰似六祖八一三雙溪祖塔海東福田一三八一四二普陀洛山大士聖窟一四三一四八金剛壇戒律宗威儀一四九一五一耽沒羅洲尊者道場一四八一四九華嚴壁經教家事業一五一一五七惠通印訣真真言宗一五八一六三黃龍壁松率居神畵一七八一八一大賢學記唯唯識師一六八一七八白月碑字金生名筆一八二一八三月師作歌怪日即滅二二二二三二世俗五戒光師隨機二一六二一七龍王獻舞迷雲盡散二三二二三四新羅三寶麗王寢謀二一七二二二水渡七僧誘敗隋兵八一八五雪山真歸是佛祖師二三四二三八山造萬佛驚嘆唐帝一九七一九八檀國桓因迺天帝釋二三八二四四金馬人雅善梵唄聲二四五二五並立三教寵臣進策八五九玉龍子權弄堪輿術二五一二七二特垂十訓麗祖護法二八九二九四山碑銘伉儷之文二七二二七五僧遺魚及變化金蛙二七八二八一兩街僧錄左右其司二七六二七七仙飛花洎長生枯樹二八一二八二創寺金山甄萱信佛二八三講百座設獅子據地二九二二九四定都鐵原弓裔稱尊二八四二八九齋八關事龍神及天二九二九二高麗選佛初設僧科二九四二九五高麗初多傳法眼派三三三三三六大覺求法始興台教二九七三七七普照後始設曹溪宗三三六三七七越王求書以復台教二九五二九七羅禪師綾首座得批四三六四五一元帝出榜為護佛法四九三四九四豕亥教長魚魯丈室受記四五一四五三悲院施眾惜乎不廣三八三八四甘露舍利僧言見性四五五四五六道場媚神失之太多三八四四一二旭日庭燄人謂放光四五六四五七殿庭飯僧數盈萬人四三四三一獻草為芝文士譏王四五七四六一寺門行香親率百官四三一四三三謂木結穀妖僧誣民四六一四六三山寺燃燈迺為年例四三三四三四盲聾示聽日嚴誑人四六三四六四閭巷呼旗便成國俗四三四四三六陰陽吉凶山甫惑眾四六四四六六聖燈寶幢㦸巖禳鎮三七七三七八百寮齋米抽斂有差四六六四六七灌燭巨像湧石琢成三七九三七九萬佛香徒聚集無賴四六七四六八大法寶海印藏經板四二四三藏經道場春十秋十四六八四七美工術石窟刻佛像一八三一九七連聲法席晝三夜三四七四七一江上油餅龍吐瑞氣四五三四五四花紋苧布尼婢織成四七一四七二塔下陶瓦龜書怪語四五四四五五琉璃土瓦僧侶燔造四七二四七四一家三子制許度僧四七四四七七寺院營產法孫犯戒五三九五四五教兩宗祈禱平賊四七七四八四廟堂籌餉田奴屬公五四五四二恭王迷信朱帝賜書四九五四九八道衍致孝復事李氏五四六五四八愚公密告紅賊應記四九六四九六志崇感夢重創松寺五四八五五四葱嶺毒龍無漏去度一九八二七智雄繼利雄為國師五二七五二八檜巖寶鳳指空來遊四九八五讓寧對孝寧稱佛兄五六五五六六妙清衒術欺君謀逆四八四四八七法華佛事追福太后五五六五六四辛盹叶夢封侯弄權四八五四九三般若經行走汗老郎五六四五六五浮雪功熟水懸空中二一二一五黃儼來迎濟州銅佛五五四五五五覺雲書成珠落筆端五二八五三金漸奏留興天舍利五五五五七三無學詳夢勸羅漢齋五三五二八諺文字法源出梵天五七三六四震默指影稱釋迦真八三七八三九正樂曲譜名稱靈山六四一六五四一代文豪多撰僧史五四四五四一薦福道場建水陸社五四二五四三百戰英雄能知佛法五四五五四六刊經都監用漢諺文六九七平州僧遁為金國祖四一三四一五鄭習因