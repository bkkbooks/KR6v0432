front:
  text: 朝鮮佛教通史序朝鮮之有佛教也尚矣羅麗之際保國安民之方概出乎此其浸漸人心之深可知也恭惟今上宵旰圖治每軫念斯土屢賜德音然則佛教亦豈容忽諸哉當是時李君能和淵覃幽眇刻苦為志輯述朝鮮佛教通史兩編携來索序予受而讀之上編則逐年紀實以明原委下編則按事立題以資博聞其卷帙浩瀚節目詳備朝鮮佛教之消長興廢歷歷如指諸掌噫是可謂善襲阿難之芳躅者歟予已勞君之勤注又喜此書之出於此際因樂成而序焉大正六年三月朝鮮總督府內務部長官宇佐美勝夫識序古今天下之書名無慮累數千百究其實不過經與史二者而已今以摩尼法王之教論之凡所以載道者經也如華嚴法華圓覺金剛等經言體用一源顯微無間經中之經而事未始不紀焉法藏澄觀智顗宗密諸賢踵增其䟽鈔皆經之屬也凡所以紀事者史也如普曜本行阿含悲華等經言本末雙明因果昭晰經中之史而道未始不章焉龍樹無著陳那提婆諸尊撰述其傳論皆史之屬也然載道之書後人雖精博講究不過恢張餘蘊佐翼經䟽而已至於紀事之書則不然日異月新千態萬狀非大聖人已然之書所可盡也故經則不能增益而史固不可不日以敷衍者也噫大教東漸半島以來不惟賢哲代作賁鬯宗乘而已若五臺之佛骨雙磎之祖頂海印之藏經元曉之角乘懶翁太古之心印無衣覺雲之禪頌亦足自豪於世界雖謂東西佛氏之宗祊未為過論也至於紀事之書上下千載作者寥寥佛門事功磊落軒天者怳兮惚兮如鏡光雲影過於眼睫曷不慨惜哉况乎今日佛運載回亟亟然稽往圖監前轍修明慈悲翊襄聖化培養民粹促進文華事最繁賾縱有史材而非惟無成書之可沿襲即搜求材料於斷爛古籍片鱗殘甲大不易易尚玄李先生慨然有志於是著朝鮮佛教通史三編一曰佛化時處二曰三寶源流三曰二百品題或用編年綱目之書法或用傳記敘志之書法或用演義稗官之書法隨意補截聯絡成文無劈空架虛之撰有倒樹尋根之法真覺路之金繩迷川之寶筏也麗鮮以來儒家者流承襲江左鳴道之說動輒觝罵佛氏瞽䏊學者以為正鵠何其蕪謬哉先生自是簪纓詩禮之家然天姿高明慧學淹博既作百教會通繼成是書會羣聖人理性蘊奧之妙緝二千載興廢存兦之跡要終指歸於佛祖寔切啟迪於人天而已張天覺所謂大孔聖者莫如莊周先生能擴充無涯涘豈直不叛于名教亦乃發輝孔聖幽隱不揚之道將攀附類龍駸駸乎吾佛五乘之俗諦疆隅韙歟盛哉金天佛子銀地法臣猊雲散人惠勤書于晚香山房自序佛者覺也教者以先覺覺後覺也先覺者誰也佛也後覺者誰也眾生也佛與眾生覺則一也先後而已唐相國裴休曰終日圓覺而未嘗圓覺者凡夫也具足圓覺而住持圓覺者佛也宋禪師慈辯曰終日圓覺而未嘗圓覺者佛也具足圓覺而住持圓覺者凡夫也一宿覺永嘉玄覺禪師謁六祖能曰生死事大無常迅速祖曰何不體取無生了無速乎師曰體即無生了本無速然則佛也凡也凡也佛也先之後之後之先之先既無先後亦無後無凡可凡無佛可佛生亦無生速本無速無體可體無了可了本自無迷今亦無悟開示者誰悟入者誰如是西域無為之法入我東方有緣之土金剛名山自是菩薩之住處海印藏經亦為世界之法寶禪僧法侶之得道者如麻國王大臣之護法者若林十二宗派之沿革九百寺剎之由緒埋沒於斷爛之中委棄於塵堆之裏有耳者無所聞有目者無所見不佞于是患之冒昧而始事焉鉛槧無少暇星霜亦多費考據諸書咨質大方以為通史三編之書庶作宗教一覽之表名雖藉乎歷史之體實兼寓於布教之用雷霆眾聾勿墻壁而通虛空日月羣盲出溝坑而登大道人自擇焉吾所望也化日共佛日恒明仁風與禪風永扇海晏河清時和歲稔物物各得其所家家純樂無為區區之心切切於此是昔時真覺國師之言亦今日尚玄居士之心也時大正六年一月一日歲次丙辰佛成道日書于京城府鳳翼洞之無無堂著者識凡例本書三編上為編年佛化時處中為宗派三寶源流下為雜項二百品題本書編纂用綱目法按年逐事摘其要領以為之綱旁係備考及參考以為之目備考證明綱文引用出處者也參考比類屬事列舉證案者也釋迦如來誕降年時既有數十種之異說難以考正今因此方舊慣斷以周昭王一十六年甲寅為佛誕紀元佛史每以佛滅度後幾何年為紀本書特變其例以佛降生為始耳表題書頭以便參照佛化年時云爾三國史高麗史及前朝史乘諸書皆先書支那歷代紀年次書本土紀年今本書則變其例首書本史國之紀年而排次夾書餘國紀年以明主客近遠之別云爾本書註脚凡新增者概用括弧以別原註本書用純漢文為存本來面目雖然如是至於近今寺剎令三十本寺本末寺法及其他法令規則等文仍用諺漢交雜之件以示尊重律法且令讀者不費解釋新羅南解王時之月氏金人駕洛首露王時之阿踰玉后可為印度佛跡直輸入之證案雖然年代最遠難以確信設或事實但有聲跡而無教化故特附以存疑且其書行低下一字以示非正史云爾三國佛教初入時代舉多神異荒誕之說不避冗𤨏一槩収之以驗宗教進化之程度信仰思想之因由云爾大凡教主事蹟信徒所當先究朝鮮人民信奉佛教坊間雖有諺文八相錄等書俚褻已甚不可以為訓詁之用若欲流通釋氏正傳諸經之書汗牛充棟即如普曜經本生經處胎經瑞應經因果經佛本行集經等無慮為數百卷遂令讀者有望洋之歎而各人又有各說難以得其要領余懇劉伊齋居士述釋迦如來應化記實既已集狐腋而成裘何須透牛皮而看經今於三寶源流首先引用此文以當一部佛本行經不費半晌讀書之工夫能知一佛出世之事蹟也又釋迦如來應化記實之釋迦是表經教之主也特書臨濟宗之源流之釋迦是表別傳之禪也朝鮮禪宗始自迦葉阿難少林曹溪以至清虛浮休而其宗派實傳臨濟故特書源流虛休兩師以下既難逐派具錄但取有碑狀者入于編年之中云爾朝鮮佛宗雖屬臨濟前朝以來只存禪教兩宗之名現代宗旨仍其舊慣共為卅寺各行寺法遂為朝鮮佛教全體成憲故詳錄所屬寺剎傳燈之通規及本寺住持之遞代庶幾一覽便知始終也本書下編二百品題不可逐一陳說其由而雜項考據辨論之件宗教消長盛衰之事盡在乎是讀者詳之二百品題八字打開兩句聯對令我讀者便於記取下附數字索引頁葉朝鮮古代固有之神教後代輸入之儒教道教回回基督等教及近今新出之雜教以至巫瞽等流錄其源委以藉宗教信仰上參考現代法令之關於佛教者即如寺剎令僧侶編籍聯合制規教育施設等諸事項沒収並錄以重時宜李東武先生創四象學說係是儒家窮理盡性格物致知千古未曾有之大發明金月窓居士述百章夢言亦是佛者借事明理達觀慧照一時不可無之好參考也弊一言此兩書出自朝鮮人之研究可為世界的之哲學故茲特錄公諸同好餘緒短篇宗教小說擬仿傳記未免杜撰而敷演本有之實事以敘述巧遇之奇緣云爾朝鮮佛教通史上編目次佛化時處別目參照頁高句麗時代一二附參考高句麗僧寶關係日本者二一三一百濟時代三一三七附參考百濟僧寶關係日本者三七四六新羅時代四七一九六附存疑榆岾寺月氏金像一九一一九六附存疑金官城婆娑石塔一九六二五附參考新羅僧寶關係日本者二五二一高麗時代二一一三三八朝鮮前韓時代三三八六二朝鮮總督府時代現代六二一六二七朝鮮寺剎禪教兩宗三十本寺并其所屬末寺六二八六七四佛化時處歷代別目高句麗頁頁頁東明王高朱豪故國川王高男武小獸林王高邱夫一一琉璃王高類利山上王高延優故國壤王高伊連大武神王高無恤東川王高憂位廣開土王高談德一一一四閔中王高觧邑朱中天王高然弗長壽王高巨連一五慕本王高觧爰西川王高藥盧文咨王高羅雲一六太祖王高宮烽上王高相夫安藏王高興安次大王高遂成美川王高乙弗安原王高寶延新大王高伯固故國原王高釗陽原王高平成一六平原王高陽城一六一七榮留王高建武嬰陽王高元一八寶藏王高臧一八二高句麗起始祖東明王元年甲申至寶藏王末年戊辰凡二十八王共七百五年百濟頁頁頁始祖溫祖王高氏責稽王辰斯王多婁王汾西王阿莘王己婁王比流王腆支王蓋婁王契王久尒辛王肖古王近肖古王毗有王仇首王近仇首王蓋鹵王高餘慶古尒王枕流王文周王三斤王聖王高明穠三三三四法王高宣三五三六東城王高牟大威德王高昌三五武王高璋三六三七武寧王高斯磨惠王高季明義慈王三七百濟起始祖溫祚王元年癸卯至義慈王末年庚申凡三十王共六百七十八年新羅頁頁頁始祖朴赫居世阿達羅王金氏儒禮王昔氏南觧王朴次次雄一九一伐休王昔氏基臨王昔氏脫解王昔氏柰解王昔氏訖解王昔氏婆娑王金氏助賁王昔氏柰勿王金氏祗摩王金氏沾解王昔氏實聖王金氏逸聖王金氏味鄒王金氏訥祇王金氏慈悲王金氏孝昭王金理洪九九二神武王金祐徵一三焰智王金氏聖德王金興光九二九四文聖王金慶磨一三一一二智證王金智太路孝成王金承慶九五憲安王金誼靖一一二一一八法興王金原宗四七五景德王金憲英九五九八景文王金膺廉一一八真興王金彡麥宗五一五三惠恭王金乾運九八九九憲康王金晸一一八一三四真智王金金輪五三五六宣德王金良相九九定康王金晃真平王金伯淨五六六六元聖王金敬信九九真聖王金曼一三四一四八善德王金德曼六七六九昭聖王金俊邕孝恭王金嶢一四八一六八真德王金勝曼七七六哀莊王金重熙九九一二神德王朴景暉一六八一七四武烈王金春秋七六七七憲德王金彥昇一三景明王朴昇英一七四一八四文武王金法敏七七八七興德王金秀宗一三景哀王朴魏膺一八五神文王金政明八七九僖康五金悌隆敬順王金溥一八五新羅起始祖朴赫居世元年甲子至敬順王末年乙未凡五十五王朴氏十王昔氏八王金氏三十七王共九百九十二年附駕洛頁頁頁首露王一九七二四伊尸品王鉗知王居豋王坐知王仇衡王麻品王吹希王居叱彌王銍知王二四二五駕洛起始祖首露王元年壬寅至仇衡王末年壬子凡十王共四百九十年高麗頁頁頁太祖王王建二一一二一三光宗王王昭二一三二一四穆宗王王誦二一八二一九惠宗王王武景宗王王伷二一四顯宗王王詢一一九二二二定宗王王堯二一三成宗王王治二一四二一八德宗王王欽一二二靖宗王王亨二二三二二四明宗王王晧二六一二六八忠惠王王禎三七三八文宗王王徽二二四二三二神宗王王晫二六八忠穆王王昕三八三九順宗王王動熙宗王王韺二六九忠定王王㫝三九三一宣宗王王運二三二二三五康宗王王二七恭愍王王顓三一三二六獻宗王王昱二三五高宗王王暾二七二八二辛禑廢王三二六三二七肅宗王王顒二三六二四元宗王王二八二二八八辛昌廢王三二八睿宗王王俁二四二四七忠烈王王昛二八六二九八恭讓王王瑤三二八三三八仁宗王王楷二四七二五三忠宣王王璋二九八三二毅宗王王睍二五三二六忠肅王王槖三二三六高麗起太祖神聖王天授元年戊寅至恭讓王四年壬申凡三十二王辛氏二王共四百七十五年朝鮮前韓頁頁頁太祖王李旦初諱成桂三三八三七二中宗王李懌四四八四五一英祖王李