座仁王道場戊辰九年宋咸淳四年蒙古至元五年佛紀二二九五年二月戊戌設消灾道場於內殿夏四月丁酉還御本闕設華嚴神衆道場己酉親設道場于內亭鎮兵祈福己巳十年宋咸淳五年蒙古至元六年佛紀二二九六年春正月丙辰設消灾道場於本闕夏四月甲申設百座仁王道場於內殿辛卯幸普濟寺設五百羅漢齊六月癸未設消灾道場於本闕十一月丁卯親設佛頂道場十二月丁丑親設消灾道場己卯又設灌頂道場於內願堂庚午十一年宋咸淳六年蒙古至元七年佛紀二二九七年五月還都舊京九月癸亥設藏經道場於本闕王始備法駕然侍從甚少樂官未具文武百官多有步行者冬十月戊辰設百座道場於本闕辛未十二年宋咸淳七年蒙古至元八年佛紀二二九八年二月乙卯設消灾道場於本闕六月丁未王受菩薩戒於內殿八月丁巳蒙古吐蕃僧四人來王出迎於宣義門外冬十月己亥王以天變設金光法席於內殿十二月己亥蒙古遣使告建國號曰大元癸卯親設消灾道場於本闕壬申十三年宋咸淳八年元至元九年佛紀二二九九年春正月丁亥門下侍中李藏用卒藏用美風儀性聰明恭儉沈重博覽經史陰陽醫藥律曆靡所不通又好浮屠書著禪家宗派圖潤色華嚴錐洞記三月甲辰置鈿函造成都監以皇太后欲盛藏經而求之也夏四月庚戌設消灾道場於本闕五月乙丑設金經道場於本闕以禳星變甲戌設消灾道場於本闕六月辛丑王微行受菩薩戒八月辛丑設消災道場於本闕庚戌大府注簿姜謂贊文習圭等以大府虛竭不堪徵責祝髮而逃冬十月甲午移御堤上宮設百座道場庚戌幸堤上宮設金光道場十二月甲午設消災道場於內殿癸酉十四年宋咸淳九年元至元十年二月乙酉黃鳳州經略使差人責元詔來令僧徒出迎其詔云禁軍士搖擾僧舍損毀經像使之安心作法丁亥置寺院造成別監夏四月丙申王以天文屢變設消災道場於本闕命放囚丙午幸賢聖寺集五教兩宗僧徒設道場於男山宮以祈平賊五月庚午親設消災道場三日冬十月甲子設消災道場於內殿甲戌十五年宋咸淳十年元至元十一年六月癸亥王薨甲子百官會於本闕遙尊太子為王太子十三年如元十五年尚元世祖女忽都魯揭里迷失公主八月戊辰王至自元九月遣使逆公主于元忠烈王王距在位三十四年九月甲午親設灌頂道場於本闕戊戌以堤上宮中書省為史館還都以來未營史館奉實録假藏本闕佛堂庫冬十月大府注簿卓之琪以府藏虛竭供費煩重不堪其苦祝髮為僧十一月乙酉幸本闕設八關會翌日大會公主幕於儀鳳樓側觀之乙亥元年宋孝恭帝德祐元年元至元十二年二月大府卿朴褕上疏曰我國男少女多而尊畀止於一妻其無子者亦不敢畜妾異國人來娶妻無定限臣恐人物皆將北流令臣僚許娶庶妻隨品降殺其數至於庶人得娶一妻一妾其庶妻所生之子得仕於朝皆比適子怨曠以消人物不流戶口日增矣婦女聞者咸怨且懼時宰相有畏其妻者寢其議不行按國制官人侍幸而有子則祝髮為僧又按崔瑀孽子萬宗萬全為僧則王侯貴族之外不許蓄妾者歟三月乙未親設藏經道場夏四月己酉王及公主時冊為元成公主矣如賢聖寺為帝祝釐五月甲戌王聞詔使來率侍臣時服迎於西門外乃五僧也王既尚主雖詔使未嘗出城而迎舌人金台如元省官語之曰駙馬王不迎詔使不為無例然王是外國之主也詔書至不可不迎至是始行十一月乙亥畫浮屠觀世音菩薩像十二軀設法席於宮中為帝祝釐丙子二年宋端宗景炎元年元至元十三年春正月乙亥設法席於普濟寺為帝祝釐每值聖甲日行之時謂之乙亥法席三月飯僧二千於毬庭王以小君中郎將湑驕恣剃髮為僧初王為太孫時納崔婢生湑公主亦愛之如嫡出入禁中嘗賂康守衡欲襲王宿衛於元閏月吐蕃僧自元來自言帝師遣我為公主國王祈福宰樞備旗蓋迎於城外其僧食肉飲酒常言我法不忌酒肉唯不邇女色無何潛宿娼家又請王作曼陀羅道場令備金帛鞍馬雞羊用麵作人長三尺坐之壇中又作小麵人麵燈麵塔各各百八列置其傍吹螺擊鼓凡四日僧戴花冠手執一箭繫皂布其端周麾而雀躍車載麵人令旗者二甲者四弓矢者三十曳棄城門之西公主施錢甚厚其徒爭之訴曰僧非帝師所遣佛事乃其僞作公主詰之皆服遂黜遣之五月乙巳王與公主幸本闕設仁王道場壬戌王與公主如興王寺公主取黃金塔入內其裝嚴多為忽剌歹三哥等所竊公主將毀用之王禁之不得但涕泣而已後王與公主如興王寺僧乞還金塔公主不許又令忽剌歹括大府寺銀入內八月丁亥飯僧千四百於毬庭王及公主親臨侑飯僧宗悟升座說法王賜宗悟銀瓶十五九月甲午幸本闕設藏經道場十一月甲辰設八關會幸儀鳳樓行般若道場十二月丙子夜有人投匿名書於達魯花赤石抹天衢館又呼於道曰有衣則衣有食則食勿為他人所得明日達魯花赤以告王及公主其書誣曰貞和宮主失寵使女巫呪咀公主又齊安公淑金方慶等四十三人謀不軌於是囚貞和宮主及淑方慶等柳璥涕泣力諫公主感悟皆釋之後方慶又被誣告謀反且又有談禪法會事王如元辨之有一尼獻白苧布細如蟬翼雜以花紋公主以示市商皆云前所未覩也問尼何從得此對曰吾有一婢能織之公主曰以婢遺我尼愕然不得已納焉丁丑三年宋景炎二年元至元十四年佛紀二三四年二月甲戌王輪寺丈六塑像成王與公主親設法會五月壬辰遣僧六然於江華燔琉璃瓦其法多用黃丹乃取廣州義安土燒作之品色愈於南商所賣者庚子親設消災道場於康安殿秋七月觀候署言謹按道詵密記稀山為高樓多山為平屋多山為陽稀山為陰高樓為陽平屋為陰我國多山若作高屋必招衰損故太祖以來非唯闕內不高其屋至於民家悉皆禁之今聞造成都監用上國規模欲作層樓高屋是則不述道詵之言不遵太祖之制者也天地剛柔之德不備室家唱隨之道不和將有不測之災可不慎乎昔晉獻公欲作九層之臺荀息纍十二博碁更纍九雞子其上以諫曰一失社稷危於此也遂壞其臺唯王察之王納其言伍允孚又言於公主曰天變屢見加以亢旱請弛營繕修德弭災後如有悔恐被不言之罪故言之是日王暴得疾至夕彌劇宰樞請停營繕縱鷹鷂又曰凡可以禬禳者臣等無不盡心惟興王寺金塔在宮中請還之公主皆許之王大喜使承旨李尊庇還金塔於興王寺王疾稍間移御天孝寺王先行公主以陪從寡少怒還王不得已亦還公主以杖迎擊之王投帽其前逐印侯罵曰此皆汝曹所為豫必罪汝公主怒稍弛至天孝寺又以王不待而先入且詬且擊欲還竹坂宮時正郎廉承益以浮屠神呪得幸於王侍疾進謂公主曰王疾之愈幸賴佛力而公主之怒若有魔障使之以間兩主之歡也公主乃止承旨李槢曰廉郎中無實之言亦有可用文昌裕謂薛公儉曰辱豈有大於此者乎槢即汾成也庚戌設消災道場於康安殿王捨宮為旻天寺將上額百官皆不欲裴挺阿旨揭額人皆非之丙辰內竪梁善太守莊等告慶昌宮主與其子順安公琮謀令盲僧終同呪咀上命中贊金方慶訊之不服九月庚戌王與公主幸普濟寺飯僧戊寅四年宋帝昺祥興元年元至元十五年三月韋得儒盧進義言於茶丘元官之來駐者曰國家設談禪法會所以咀上國也茶丘以語石抹天衢遣人報中書省王亦遣將軍盧英中郎將李仁如元平章哈伯曰此何足上聞汝其歸矣王來自奏耳六月己巳王及公主如元謁帝帝設宴慰之戊寅王上書都堂辨方慶事及談禪法會九月乙巳王與公主至自元百官班迎於郊是行也凡國家騷擾之事一切奏除國人頌德感泣十二月王又如元己卯五年宋祥興二年元至元十六年二月丁亥王至自元夏四月乙未遣王子滋於忠清道牙州東深寺避世子也冬十月丁丑飯僧五百於新宮己丑親設消災道場於本闕壬寅親設消災道場於新殿庚辰六年元至元十七年春正月乙丑以德泉寺住持益藏擊殺永春縣吏又與妓生玉真通流於海島益藏寵姬子也二月戊戌王與公主如玄化寺命承旨廉承益作佛事三月丙辰幸本闕設藏經道場戊辰將軍曹允通還自元中書省許復設談禪法會辛巳七年元至元十八年三月設消災道場於壽康宮承旨廉承益請以其家一區為金字大藏寫經所許之夏四月丙寅朔幸合浦庚辰王至合浦六月癸未王次慶州下僧批僧輩以綾羅賂左右得職人謂羅禪師綾首座娶妻居室者居半壬午八年元至元十九年三月己巳王與公主親設消災道場於新殿夏四月乙卯王與公主幸本闕設百座法席五月庚申詔曰道詵國師文昌侯弘儒侯並加封爵秋七月庚申遣散員高世如元諸醫巫辛酉以公主病設法華道場八月丙戌朔高世還自元帝曰病非巫所能已醫則前已遣諫德新何必他醫惟賜藥物靈僧通寺洪坦以私憾告中贊致仕柳璥上將軍韓希愈將軍梁公績林庇等有異謀王下巡馬所鞫之坦坐誣流海島九月甲申王與公主世子幸吉祥寺設五百聖齊冬十月壬寅迎僧見明一然禪師于內殿乙酉設仁王道場于崇慶堂王與公主行香十二月乙未王與公主幸廣明寺訪僧見明癸未九年元至元二十年佛紀二三一年春正月癸酉設消灾道場于本闕甲戌宰樞以王疾設法會于廣明寺三月以僧見明為國尊令諸王百官及工商奴隸僧徒出軍糧有差夏四月乙酉命判密直金周鼎閲軍於燃燈都監六月王與公主幸孝信寺觀畫佛秋七月命廉承益孔愈修玄化寺又修南溪院王輪寺石塔時廉承益每勸以浮屠法於是遊畋稍踈八月丙午王托供佛遣人除道三角山其實為遊畋也九月己未王與公主飯僧于金字大藏院甲申十年元至元二十一年佛紀二三一一年二月庚寅飯僧于禁中己酉王與公主幸吉祥寺齊五百羅漢閏五月辛巳設消灾道場于大內十二月丙午王與公主幸妙蓮寺設華嚴法會乙酉十一年元至元二十二年佛紀二三一二年六月己酉元遣李熙載來詔曰除法物鐘罄銅鏡古銅瓶鼎熟銅器物外其餘應有銅錢生銅器物以聖旨到限百日悉納所在官尋命停罷乙丑幸龜山寺視九齊夏課諸生進歌謠賜果酒秋七月癸未幸神孝寺設盂蘭齊十一月丁丑王及公主幸妙蓮寺設慶讚會賜行香使洪子藩紅鞓十二月丙辰王及公主幸興王寺拜金塔遂幸妙蓮寺丙戌十二年元至元二佛紀二三一三年三月庚寅王行香于藏經道場十二月甲子親設靈寶道場于康安殿丁亥十三年元至元二十四年佛紀二三一四年二月戊寅親設消灾道場于大殿夏四月癸未宰樞施私財禱雨于普濟寺戊子十四年元至元二十五年佛紀二三一五年五月辛未幸福靈寺又幸靈通寺賜白銀十兩米一百石庚戌王及公主幸金經社冬十月丙辰副知密直司事監察大夫林貞杞死貞杞雖以科第進然昧於文學嘗掌監試不能命題人笑之為王旨別監務聚斂媚權貴驟遷擢至是暴死時有宰相洪休女寡為尼性喜言人短公主欲問民間事令出入臥內公主聞貞杞死有悽愴色尼在側謂曰貞杞之死不足怪也以血成身其死宜速謂割民血以立其身也公主勃然變色戊午親設靈寶道場于康安殿己丑十五年元至元二十六年佛紀二三一六年五月世子聞前博士康煦死問左右曰莫是燃頭燃臂以救王疾者歟對曰然世子曰凡人臣事上之道在忠勤盡節燃頭燃臂乃浮屠之事非君子之所為也而煦乃媚上敢行非禮雖死何惜聞者歎服八月丁巳親設消災道場于外院閏十月乙酉幸金字院慶讚大藏經庚寅十六年元至元二十七年三月庚申帝以寫金字經徵善書僧乃遣僧三十五人如元夏四月丁酉遣寫經僧六十五人如元八月癸酉遣將軍趙瑊押寫經僧如元九月元遣使修補藏經壬辰十八年元至元二十九年冬十月己酉冊僧惠永為國尊癸巳十九年元至元三十年冬十月癸巳親設靈寶道場于康安殿甲午二十年元至元三十一年六月乙亥元遣吃折思八八哈思責護沙門詔來百官具袍笏率僧徒出迎于門外館於肅陵寺非肉不食吃折思八者蕃僧之名八哈思蕃師之稱師本珍島郡人歲辛未討南賊時被虜而西遂投帝師剃髮離鄉久不知父母存歿至是得於西林縣貧不能自存為人家傭王賜米與田令家于喬桐縣聚其族而復其役乙未二十一年元成宗元貞元年三月丁巳親設消灾道場于外院辛未親轉藏經于康安殿閏四月己酉元遣王敬塔失不花責香幣來轉藏經王敬本國宗姓也五月辛巳以僧景宜為國尊丙申二十二年元元貞二年二月中贊致仕韓康召對條陳上略放生活命可致增壽請自今嚴禁屠宰止遊畋之樂節肥甘之奉當祈寒盛暑設施漿粥以賑行路飢渴命有司掩骼埋胔以修陰德王獵于西郊國師僧獻書曰殿下換甲之年宜小心修德不可荒于遊畋王曰非敢好獵欲逐虎也其實憚公主妬悍因獵而出私諸嬖也五月庚寅幸神孝寺壬辰公主又幸是寺燃燈皆以珠玉織成燈籠巧妙奢華不可勝言秋七月辛巳王與公主幸廣明寺設盂蘭盆齊丁酉二十三年元大德元年五月庚午公主不豫設法席王燃臂癸酉王與公主幸賢聖寺發內庫米一百石賜窮民為公主祈福壬午公主薨於賢聖寺六月壬子元遣火魯忽孫來吊公主喪太后賜賻楮幣轉藏追福秋七月己巳幸神孝寺薦福公主戊子世子殺閹人陶成器宮人無比等無比寵幸橫恣世子甚疾之及自元來奔喪白王曰殿下知公主之所以致疾乎比必內寵妬媚者為之請鞫之王曰且待服闋世子使左右捕鞫無比等巫蠱事巫女術僧皆服稍得呪詛狀斬之八月癸巳元遣使徵寫經僧附忠宣王戊戌二十四年元大德二年佛紀二三二五年春正月丙申世子至自元庚子世子妃寶塔實憐公主來是為韓國長公主丙午傳位于世子世子即位於康安殿是為忠宣乙卯奉箋上尊號曰光文宣德太上王王傳剛後王復位凡七月在忠宣世家秋八月元帝詔前王依前統理國政十一月壬辰親設消灾道場于外院己亥二十五年元大德三年佛紀二三二六年春正月幸外院設藏經道場五月乙巳幸壽康宮設宴娛樂王分遣幸臣諸道選官妓有色藝者又選城中官婢及巫善歌舞者籍置宮中衣羅綺戴馬尾笠別作一隊稱為男粧教以新聲其歌云三藏寺裏點燈去有社主兮執吾手儻此言兮出寺外謂上座兮是汝語又云有蛇含龍尾聞過太山岑萬人各一語斟酌在兩心其高低緩急無不中節秋七月以將軍金儒為慶尚全羅楊廣三道採訪使前王惡儒祝髮置之八巔寺及王復位儒長髮拜將軍貪婪傾巧漁奪民利逞欲固寵靡所不至九月己亥以宋玢監修國史安珦修國史閔漬同修國史閔漬於佛法多所記録庚子二十六年元大德四年佛紀二三二七年冬十月癸酉密直副使致仕李承休卒承休性正直無求於世酷好浮屠法十一月辛酉幸外院設消灾道場十二月己亥王與伯顏忽篤不花幸妙蓮寺轉藏經庚子幸慈雲寺轉藏經辛丑二十七年元大德五年佛紀二三二八年春正月甲辰王與元使如興王寺轉藏經丙辰王率百官幸妙蓮寺為皇帝祝釐諸路行省以下官皆以正月朔望行香祝釐蓋元朝之禮也乙丑王率行省官及羣臣幸妙蓮寺為帝聖甲日祝壽也九月丁酉朔幸外院設星變祈禳法會戊申親設龍華會于廣明寺壬寅二十八年元大德六年佛紀二三二九年二月癸酉幸壽寧宮設百座道場辛卯幸廣明寺設龍華會三月庚戌中贊廉承益棄官為僧承益酷信浮屠法剃髮被袈裟置炭火掌上焚香念佛顏色不變夏四月辛未元遣別帖木兒等徵寫經僧六月乙亥命僉議參理閔漬知密直司事金台鉉聚及第二十人試以賀聖節表上丞相國書祝聖壽佛疏白仁壽卜祺權暉金芝等連中之皆授文翰署令癸卯二十九年元大德七年佛紀二三三年二月辛巳僉議中贊致仕韓康卒康性佞佛王嘗問享國長久之道悉以浮圖之言對丁亥元遣怯里馬赤月兒忽都以官素一十五表裏坫經裏兒絹三百匹黃香十五斤鈔六百一十一錠二十五兩來轉藏經三月甲午百官備儀奉御香轉藏經冬十月壬子幸外院設消灾道場甲辰三十年元大德八年秋七月己卯江南僧紹瓊來遣承旨安于器迎于郊瓊自號鐵山八月丁亥王率羣臣具禮服邀紹瓊于壽寧宮聽說禪海東名將韓希愈傳云王召僧紹瓊于宮中點眼畫佛讀華嚴經王與淑昌院妃受菩薩戒希愈與承旨崔崇言祕記有國君敬南僧必致覆亡之語願殿下慎之不聽乙巳三十一年元大德九年夏四月癸未元遣突烈來轉藏經甲午設藏經道場于壽寧宮五月丙午幸廣明寺轉藏經丁巳幸興王寺轉藏經十二月庚寅元遣忽都不花來求寫經僧選僧一百以遣之丁未三十三年元大德十一年五月乙酉幸梨峴宮設消灾道場戊申三十四年元武宗至大元年三月庚申幸梨峴宮設消灾道場七月己巳王薨忠宣王二年元賜諡忠烈史臣贊忠烈使僧祖英等昵近左右世子璋即位是為忠宣王是年正月丙午受內禪即位於康安殿戊申下教上略一諺曰僧多批職亡國敗家今批職之數過多令有司褒貶申聞今後有法德殊職者方加法號二月親設消灾道場于康安殿三月親設功德天道場于康安殿與宰臣崔冲紹及翰林四學士論三教業四月庚寅親設仁王道場于康安殿五月癸巳教僧人既已出家固當上不拜君王下不拜父母况其餘乎自今僧俗相拜者重論如法雖居家庸僧勿差官役乙卯王與公主受戒于蕃僧六月丙辰朔太上王及國王公主受戒于蕃僧壬申幸壽寧宮飯蕃僧祓呪詛乙亥王受菩薩戒七月己亥王與公主幸神孝寺設盂蘭盆齊乙巳幸三大藏所命寫五部大經九月戊寅幸神孝寺遂幸王輪寺住持仁照進茶繼以肉膳癸未飯僧二千二百餘人於壽寧宮十月丁亥又飯僧尼于壽寧宮己丑貼榜中門曰除王輪住持仁照龍巖住持用宣仙巖住持若宏及崔湍權漢功金之謙金士元崔實桓頤吳玄良姜邦彥李珍姜融趙通曹頔曹碩崔玄鄭子羽崔仲公文坫李伯謙外餘人非特召不得入又飯僧于壽寧宮庚寅樂浪君金琿邀王享于男山書齊於是宰樞僧徒日進膳爭極豪侈辛丑親設消灾道場于外院丁未王如神孝寺設大行王百日齊十一月辛未王在金文衍家百官會梨峴新宮王下教曰上略一大成至聖文宣王百代之師春秋釋奠朔望祭享諸儒聚會宜加精潔一地理國師道詵儒宗弘儒侯薛聰文昌侯崔致遠並宜加號下略忠宣王王璋在位五年己酉元年元至大二年佛紀二三三六年三月甲辰元宣政院遣人來督造船時皇太后欲營佛寺洪福源之孫重喜重慶等奏白頭山多美材若發瀋陽軍二千代之流下鴨緑江使高麗舟載以輸便於是遣遼陽省宣使劉顯等來令造船百艘輸米三千石斃不可言西海交州楊廣民尤受其害夏四月辛巳元遣使來求佛經紙九月甲辰王命飯僧一萬於壽寧宮遂捨其宮為寺追福母后賜額曰旻天庚戌二年元至大三年佛紀二三三七年六月壬子元遣宦者方臣祐來監書金字藏經皇太后送金薄六十餘錠秋七月庚辰元封寶塔實憐公主為韓國長公主十一月丁亥王以資贍司銀一百斤分施諸寺飯僧十二月甲寅贊成事裴挺以王旨如元獻畫佛辛亥三年元至大四年佛紀二三三八年春正月丁丑王命月飯僧三千於旻天寺卒歲為期時王在元故曰命三月癸卯設藏經道場于本闕舊例春六日秋七日今以王旨俱改十日八月癸巳元皇太后遣鎖魯花來賜鈔五千八百錠賞寫經九月壬子元遣宦者院使李信來以護興天寺也晉王以是寺為願剎故奏遣之十一月壬子贊成事權溥等責藏經如元十二月丁卯僉議贊成事致仕權㫜卒㫜嘗有遁世之志父韙強留之請於朝為門下録事傾家資供其費㫜不得已就職㫜性耿介不苟合酷信浮屠斷薰肉四十年自號夢庵居士既老一夕遁入禪興社剃髮子溥馳馬夜至大哭㫜曰將復鬚髮我耶此豫素志也癸酉淑妃如興天寺飯僧壬子四年元仁宗皇慶元年佛紀二三三九年春正月以王命集僧徒於延慶宮轉藏經卒歲為期時王在元八月甲戌命書金字藏經于旻天寺追福母后癸丑五年元皇慶二年佛紀二三四年春正月辛卯朔王在元己未始鑄旻天寺佛像三月丁酉以僧用宣為壽福君甲寅王以長子江陵大君燾見于帝請傳位帝乃策燾為高麗國王是時元欲王歸國王無以為辭乃遜其位又以姪延安君皓為世子王嘗封瀋王故時稱瀋王忠肅王元年甲寅上王如元留京師搆萬卷堂于燕邸招致大儒閻復姚燧趙孟俯虞集等與之從遊以考究自娛時有鮮卑僧上言帝師八思巴製蒙古字以利國家乞令天下立祠比孔子有詔公卿耆老會議國公楊安普力主其議王謂安普曰師製字有功於國祀之自應古典何必比之孔氏孔氏百王之師其得通祀以德不以功後世恐有異論言雖不納時論韙之忠肅王六年己未三月上王請于帝降御香南遊江浙至寶陀山而還權漢功李齊賢等從之命從臣記所歷山川勝景為行録一卷忠肅王七年庚申四月上王復請於帝降香江南蓋以時事將變冀以避患也六月王行至金山寺帝遣使急召令騎士擁逼而行侍從臣僚皆奔竄九月王還至大都帝命中書省護送本國安置王遲留顧望不即發十月帝下王于刑部既而祝髮置之石佛寺十二月戊申帝流上王于吐蕃撤思吉之地忠肅王十年癸亥八月泰定皇帝即位太赦天下召還上王忠肅王十二年乙丑五月辛酉上王薨于燕邸忠肅王王燾在位二十五年夏四月丙戌王侍上王忠宣王也及公主發燕京六月甲戌上王及王次西普通寺百官出迎是日兩王宿是寺癸未上王幸旻天寺會百官宣帝策王之詔甲申王即位於延慶宮八月戊午朔王親設消災道場于外帝釋院以禳天變九月乙未上王飯僧五百于旻天寺二日冬十月丙子上王飯僧二千燃燈二千于延慶宮五日施佛銀瓶一百手擎香爐使伶官奏樂邀禪僧冲坦教僧孝楨說法各施白金一斤餘僧二千施白金二十斤上王嘗願飯百八萬僧點百八萬燈至是日飯二千僧點二千燈五日可滿僧一萬燈一萬期以畢願謂之萬僧會其費不可勝紀十一月戊子以王師丁午為國統國一大禪師混丘為王師戊戌上王幸蔡洪哲旃檀園施白金三十斤戊申上王飯僧點燈于廷慶宮五日浮屠之數布施之費比前有加十二月丁巳王訪混丘于廣明寺翊日又訪丁午于妙蓮寺庚午上王飯僧二千點燈二千于延慶宮二日召松廣寺僧萬恆赴會及還賜所御軺子遣之壬申上王飯僧點燈于延慶宮又與萬恆同輦幸溟福寺點燈凡八日萬恆設酌王歡甚自歌甲寅元年元延祐元年春正月庚寅王訪僧萬恆于銀字院辛卯轉般若經于延慶宮七日為皇太后祈福上王下右獻納李樛右思補禹儞左思補尹頎于巡軍獄明日釋之時僧俗多有濫受職者諫官不肯暑告身故也庚子上王如演福寺點二千燈曹溪宗僧景麟景聰俱有寵於上王出入禁闥授大禪師諫官不署告身上王怒召右獻納李朝隱思補禹儞尹頎誚讓諫官猶不署又召朝隱等出御別殿南門歷問其由欲杖之儞廷辨慷慨王悟怒稍解然以朝隱主僧批流祖忽島既而召還削職左遷頎儞等癸卯上王飯僧二千于延慶宮五日甲辰上王自記其德十餘條密下式目令上箋陳賀上略箋曰顧惟本國元自肇基弘揚佛法以維持馴致邦家之帖泰今承遺範益發至心絲毫不費於下民錢穀特傾於內分飯僧玉饌盛如雲委以氤氳照佛蘭燈列似星分而燦爛數期百萬八萬誠遍三千大千蔚然龍象之駢闐殷若鼓鍾之禪講因祝皇靈之永久兼祈懿算之遐長豈唯二聖之康寧亦是三韓之慶賴云云乙巳命政丞致仕閔漬贊成事權溥略撰太祖以來實録丁未上王如元道入延慶宮萬僧會以白金百三十斤施僧萬恆王餞于金郊驛奉上而進上王流涕三月癸丑幸內願堂次板上詩命尹碩僧戒松及大小文臣生徒釋子和進閏月庚午王施白金十斤于禪源寺以資世子鑑冥福壬申上王諭王專斷國政兼崇佛法戒秋七月癸丑朔公主飯僧于永安宮丙辰三年元延祐三年佛紀二三四三年五月潘氏弒其夫黃州牧使李緝上王赦之潘尚書永源之女也緝嘗在任與衛身金南俊通遂弒緝讞部究理將置極刑會潘族僧宏敏有寵於上王常侍左右以故數下旨沮之尋有赦得免國人切齒至是大司憲趙延壽執之祝髮置淨業院秋七月戊申王娶營王女亦憐真八剌公主乙卯十二月公主薨是年三月王如元以上王請婚于帝帝許之至是始娶冬十月丁酉王與公主至自元丁巳四年元延祐四年佛紀二三四四年冬十月丁未親設靈寶道場于康安殿戊午五年元延祐五年佛紀二三四五年冬十月壬寅親設靈寶道場于內願堂庚申七年元延祐七年佛紀二三四七年十二月戊午王大集僧徒于旻天寺為上王祈禱時元帝以學佛經為名流上王于吐蕃故辛酉八年元英宗至治元年佛紀二三四八年五月甲午前益城君洪瀹奉敕來求藏經紙杖前直郎鄭瑈流于島初王聞柳清臣吳潛訴王于上王王頗疑之二人詣行宮請與白元恆辨元恆指鄭方吉及僧祖倫祖倫指前執義徐諲諲指鄭瑈乙丑十二年元泰定二年佛紀二三五二年五月辛酉上王薨于燕邸九月辛酉以僧祖衡為王師冬十月乙未教曰上略國內名山大川載諸祀典者各加德號修葺祠宇圓丘籍田社寢園佛宇道觀修營以祭先代陵墓官禁樵牧毋令踐蹂箕子始封本國禮樂教化自此而行宜令平壤府立祠以祭其祭文宣王十哲七十子本國文昌侯弘儒侯務致蠲潔丁酉公主薨于龍山行宮年十八甲子十一年八月王娶魏王阿木哥女金童公主時有飛書云禪師祖倫師傳王三錫誘引主上久留龍山濱海畀濕地至使公主免身氈幕八月公主生子於龍山行宮遘疾莫救若達帝聰二人之罪在所不赦祖倫諂事李宜風遂得近幸頗與朝政逞私撓法人皆疾之戊辰十五年元文宗天曆元年秋七月庚寅胡僧指空說戒於延福亭士女奔走以聽雞林府司録李光順亦受無生戒之任令州民祭城隍不得用肉禁民畜豚甚嚴州人一日盡殺其豚庚午十七年元至順元年春二月壬午朔元策世子禎為王秋閏七月甲申如王元忠惠王王禎在位六年辛未元年元至順二年二月壬戌以僧乃圓為王師八月丙辰以朴連為典理判書連居母喪娶妻每入見王不之咎嘗有僧白王曰宮寺之奴或有拜高官大職者不可與士族齒王怒曰以吾愛朴連耶連聞之涕泣曰他日豈念吾等功乎王賜酒慰諭之忠肅王壬申後元年元至順三年二月甲子元遣使來命上王復位戊寅七年元至元四年秋七月丙辰元遣使來求佛經紙己卯八年元至元五年春三月癸未王薨忠惠王夏四月戊午王遣三司右尹金永煦如元獻畫佛五月癸未夜黃氏邀前王宴其家黃氏王之舅三司左使洪戎之繼室萬戶元吉之女也王命醫僧福山治黃氏淋疾王常餌熱藥所幸婦人多有是疾庚辰後元年元至元六年春正月癸亥順天君蔡洪哲卒為人精巧於文章技藝皆盡其能尤好釋教嘗守長興府棄官閒居凡十四年以浮屠禪旨琴書劑和為日用忠宣王素知其名召用之遂至為相於其第北溝栴檀園養禪僧又施藥人多賴之又於第南作中和堂邀國老八人為耆英會作紫霞洞新曲今樂府有譜壬午三年元至正二年六月甲寅幸神孝寺燈燭輩結香徒設祝壽齊於是寺王押座齊筵辛酉幸洪法寺見僧翯仙因問長生訣翯仙對曰人有定分無過限之理但不可為惡以促之時王信術士言欲撤崇教寺翯仙問其故王曰書雲觀云此地有寺逆臣必生豫恐曹頔復生是以毀之對曰自穆宗時已有此寺其間逆臣有幾癸未四年元至正三年佛紀二三七年三月丙子罷習射場屬東西大悲院聚城中病人救藥贍衣食從僧翯仙之請也夏四月庚子下僧翯仙獄翯仙善琴畫醫術亦解漢蒙語王敬重稱為師傅上殿不拜時人疾之至是矯旨放囚王怒命監察司鞫之流濟州秋七月令五教兩宗七寺土田及先代功臣田屬內庫八月庚子元使監丞吾羅古請享王王曰今日須往妙蓮寺為樂吾羅古先至候之王率二宮人及晡乃至登寺北峯張樂天台宗僧中照起舞王悅命宮人代舞王亦起舞又命左右皆舞或作處容戲李藝曹益清奇轍等在元上書中書省極言王貪不道請立省以安百姓初藝兄儼與僧波哥景有隙波哥景譖王曰儼常叱臣以為汝王何等人吾不畏也王怒命囚儼奴儼見於王欲自明王驅之儼厲聲曰王何辱我王之初立伊誰之功王雖激怒於波哥景實惡藝也丁未幸妙蓮寺以寺僧辦宴請幸也甲申五年元至正四年佛紀二三七一年春正月丙子王薨于元嶽陽縣癸未四年十二月元帝以監車流王于陽縣在中途薨忠穆王王昕在位四年冬十月丙子幸內院設靈寶道場乙酉元年元至正五年佛紀二三七二年春正月壬寅親設百高座道場於康安殿丙戌二年元至正六年佛紀二三七三年五月壬辰親設祈雨道場於內殿丁亥三年元至正七年佛紀二三七四年秋七月壬戌親設星變祈禳道場於內殿八月乙亥以星變設祈禳道場於內殿九月丁未親設藏經道場於康安殿丁卯飯僧四千一百於旻天寺冬十月癸未親設靈寶道場於康安殿戊子四年元至正八年佛紀二三七五年六月己巳以雨設消灾法席於內殿十一月癸巳朔公主以王疾遣前贊成事李君賅設水陸會於天磨山禱之吳王遣完者帖木兒來獻佛經鷹犬十二月乙丑杖流僧宗範于濟州宗範判事任瑞生子欲刃其父其弟琦救之以劍擊割琦鼻忠定王王在位三年己丑元年元至正九年佛紀二三七六年冬十月癸丑親設靈寶道場于康安殿庚寅二年元至正十年佛紀二三七七年二月壬寅親設倭賊祈禳法席于延慶宮冬十月庚寅親設靈寶道場于康安殿辛卯三年元至正十一年佛紀二三七八年冬十月壬午元以江陵大君祺為國王王尚魯國公主遣斷事官完者不花封倉庫收國璽以歸王遜於江華是月德興君塔思帖木兒奔於元忠宣王孽子嘗為僧者也十二月辛卯祝忠惠王孽子釋器髮置萬德寺庚子王及公主至自元壬寅即位於康安殿恭愍王王顓初諱祺在位二十四年壬辰元年元至正十二年二月丙子宣諭境內曰上略祖王代創置禪教寺院所以裨補地德以利國家今多頽圮只有遺基其有土田者收其租有臧穫者收其庸以備重修又遵太祖信書諸人毋得擅起寺舍為僧者必須度牒不許居家夏四月庚戌王以佛生日燃燈禁中飯僧一百設火山雜戲奏妓樂以觀是月李穡服中上書言時事曰上略抑異端曰佛氏入中國王公士庶尊而事之自漢迄今日新月盛肆我太祖化家為國佛剎民居參伍錯綜中世以降其徒益繁五教兩宗為利之窟川傍山曲無處非寺不唯浮屠之徒浸以卑陋亦是國家之民多於遊食識者每痛心焉佛大聖人也好惡必與人同安知已逝之靈不耻其徒之如此也哉臣伏乞明降條禁已為僧者亦與度牒而無度牒者即充軍伍新創之寺並令撤去而不撤者即罪守令庶使良民不盡髠緇臣聞殿下奉事之誠尤篤於列聖其所以祈永國祚者甚盛甚休然以臣之愚竊惟佛者至聖至公奉之極美不以為喜待之甚薄不以為怒况其經中分明有說布施功德不及持經聽政之餘怡神之暇注目方冊留心頓法無所不可但為上者人所則效虛費者財所耗竭防微杜漸不可不慎孔子曰敬鬼神而遠之臣願於佛亦宜如此東國通鑑云臣等徐居正等按昔傅奕論佛氏之非蕭瑀曰佛聖人也非聖人者無法不免後世之譏今穡之疏名曰抑異端一則曰佛大聖人也一則曰佛至聖至公也似抑而實揚諷一而勸百欲免佞佛之誚得乎五月癸酉朔命放生于西江戊寅以誕日設道場于內殿三日宰樞欲上壽王曰宴必殺生其以宴錢飯僧一千于地藏寺王方信佛百官皆為王設祝壽齊己丑王遣使召僧普虛于益和縣普虛號太古歷諸方入江南自言傳衣鉢于石屋和尚寓廣州迷元莊聚親戚遂家焉虛白王升迷元為縣置監務虛主號令監務但進退而已廣占田園牧馬滿野皆以內乘稱雖害禾穀人不敢逐虛既至王引入內問法虛曰為君之道在修明教化不必信佛若不能理國家雖致勤於佛有何功德無已則但修太祖所置寺社慎勿新創又曰君王去邪用正則為國不難矣王曰豫非不知邪正但念其從我于元皆效勤勞故不能輕去耳尚玄曰觀乎普愚之進諫則决非廣占田園牧馬害稼者也讀者諒之六月丙辰王受菩薩戒于康安殿設金光道場于內殿以禳星變十一月丙子親設仁王道場于內殿癸巳二年元至正十三年佛紀二三八年三月甲午幸旻天寺設仁王道場元賜寶鈔一百錠設道場以鎮兵十一月設消災道場于康安殿甲午三年元至正十四年佛紀二三八一年五月丁丑設雲雨道場于康安殿又禱于羣望佛宇九月丁丑親設仁王道場于康安殿冬十月己酉親設靈寶道場于康安殿十二月壬寅設消灾道場于延慶宮乙未四年元至正十五年佛紀二三八二年六月乙丑召臺官諭曰僧禪近所犯不須窮治禪近內願堂僧也素有寵於王至是通士人妻為憲府所鞫故王命釋之時僧徒恣慈恩宗英旭犯邪罪臺官鉤致欲罪之旭曰若欲罪我須罷宗門今宗門僧誰非我乎秋七月丁亥設消災道場於康安殿以禳地震八月甲戌親設百高座道場於康安殿王手書疏文丙申五年元至正十六年佛紀二三八三年二月丙子飯僧普愚于內佛堂普愚即普虛三月丙戌王及公主奉大妃如奉恩寺聽普愚說禪頂禮施幣帛銀鉢繡袈裟積如丘山其徒三百餘僧皆施白布二匹袈裟一領士女奔波猶恐不及夏四月癸酉封普愚為王師立府曰圓融置官屬左右司尹丞舍人注簿左右寶馬陪指諭行首戊寅王邀普愚于延慶宮行師弟禮其儀衛擬於鹵簿五月乙酉王以誕日邀普愚于內殿飯僧百八大妃公主喜慶泣下侑茶果公主遺琉璃盤及瑪琉匙等物時僧徒求住寺者皆附愚干請王曰自今禪教宗門寺社住持聽師注擬寡人但下除目耳於是僧徒爭為門徒不可勝計癸卯設鎮兵道場于康安殿及諸佛宇五日六月乙丑王聞前護軍林仲甫欲奉釋器忠惠王孽子圖不軌繫巡軍按治放釋器于外秋七月癸巳設盂蘭盆齊於內殿冬十月戊午遣政堂文學李仁復如元上表曰中略朝廷使臣及府寺院監司所差人吏多是小邦之人不務宣上德意專務誇耀鄉閭威福自恣恩讎必報屈辱宰相陵犯國主經年不還增娶妻妾無惡不為金剛山諸寺歲再降香勞民生事反戾陛下求福之意亦宜停罷祖王以來庶孽之子必令為僧所以明嫡庶之分杜覬覦之萠今有塔思帖木兒自謂忠宣王孽子亦嘗剃髮及長還俗奔于京師誘致本國羣不逞之徒扇起訛言眩惑人心若此人者其於朝廷豈有小益乞將此人及其黨與發還本國丁酉六年元至正十七年二月己酉命李齊賢相宅於漢陽築宮闕僧普愚以讖說王曰都漢陽則三十六國來朝王惑其說故有是命開城尹致仕尹澤上言妙清惑仁廟幾至覆國厥鑒不遠矧今四境有虞訓兵養士猶懼不給興工勞衆恐傷本根六月下蔡河中獄自殺先是僧達禪自河中流所訪全贊曰蔡相欲與公謀大事語泄繫禪巡軍按問贊逃逮捕河中命李仁復等鞫之河中誣服自縊斬于市仁復嘆曰知人無辜不能申理而獄成吾其無後乎踰月獲贊斬之閏九月乙巳司天少監于必興上書言玉龍記云我國始于白頭終于智異其勢水根木幹之地以黑為父母以青為身若風俗順土則昌逆土則災風俗者君臣百姓衣服冠蓋樂調禮器什用是也今後文武百官黑衣青笠僧服黑巾大冠女服黑羅又於諸山栽松茂密凡器用鍮銅瓦器以順風土從之冬十月諫官李穡等請行三年喪從之戊戌七年元至正十八年秋七月丁未親設百高座道場以禳星變十一月庚子親設仁王道場于內殿以禳灾異己亥八年元至正十九年十二月辛巳發諸司吏胥補西北面戰卒令承宣以上各出馬一匹又括禪教各寺僧人馬以充軍用時紅頭賊來侵故戊子以李嵒懦不能軍遣平章事李承慶代之命前僉議贊成事權適帥僧兵赴征辛丑十年元至正二十一年夏四月辛卯設百高座道場于康安殿五月御史臺啓曰釋教本尚清淨而其徒以罪福之說誑誘寡婦孤女祝髮為尼雜處無別恣其欲至於士大夫宗室之家勸以佛事留宿山間醜聲時聞污染風俗自今一切禁之違者論罪又鄉役之吏公私之隸規避賦役托迹桑門手持佛像口作梵唄橫行閭里消耗資産其害匪輕並令捕捉悉還本役從之八月癸巳王邀僧普愚于內殿日講傳燈録冬十月遣使點諸道兵令境內僧寺出戰馬有差集都人修城門壬寅十一年元至正二十二年八月丁亥幸俗離寺時王避紅賊南幸取觀通度寺所藏佛骨設利袈裟甲子設星變道場于內殿冬十月監察大夫金續命右獻納黃瑾等上書曰上略治國之道專在經史未聞以佛書致治者也殿下過信佛法羣髠緣此千謁濟私自今願斷緇流出入禁闥復開經筵日訪治道常觀聖賢之書勿雜異端之說癸卯十二年元至正二十三年佛紀二三九年三月庚申親設華嚴三昧懺道場于時御宮甲辰十三年元至正二十四年佛紀二三九一年夏四月辛丑燃燈觀呼旗戲於殿庭賜布國俗以四月八日是釋迦生日家家燃燈前期數旬羣童剪紙注竿為旗周呼城中街里求米布為其費謂之呼旗秋七月丁丑設百高座道場于康安殿十二月戊申贊成事李龜壽棄官至瑞原高領寺欲祝髮王聞之遽使人追還復其職乙巳十四年元至正二十五年佛紀二三九二年二月甲辰公主薨設懺經會於殯殿王素信釋教至是尤酷信大作佛事五月以妖僧遍照為師傅賜號清間居士咨訪國政照靈山縣玉川寺奴也幼為僧不見齒於其類以母賤故王夢人拔劍刺己有僧救之得免明日以告太后會金元命以照見其貌惟肖王大異之與語聰慧辨給自謂得道詭為大言輒中旨王素信佛又惑夢由是屢密召入內與之談空照目不知書常遊京都勸緣誑誘諸寡婦售其奸自見王務矯飾枯槁其形雖盛夏隆冬常衣一破衲王益重之凡饋衣服飲食必潔淨至於足襪必頂戴致敬饋之李承慶見之曰亂國家者必此髠也鄭世雲以為妖僧欲殺之王密令避之二人既死乃長髮為頭陀復來謁王始入內用事言無不從人多附之貶贊成事崔瑩為雞林尹時照住密直金蘭家蘭以二處女與之瑩責蘭照疾之會瑩與慶復興率私兵大獵東郊時方旱蝗識者譏之照因是譖于王而貶之六月照又譖流陽川君許猷前典工判書邊光秀判事洪仁桂僉議評理金貴春城君朴曦秋七月照分遣其黨上護軍李得林巡軍經歷吳南季鞫問崔瑩李龜壽梁伯益石文成朴椿等交結內臣金壽離間上下斥去賢良大為不忠羅織成獄瑩等皆誣服請即速刑乃削爵流之辛巳王親設文殊會癸未封遍照為真平侯十二月以遍照為守正履順論道燮理保世功臣壁上三韓三重大匡領都僉議使司判監察司事鷲城府院君提調僧録司事兼判書雲觀事始稱姓辛改名旽初王在位日久宰相多不稱意嘗以為世臣大族親黨根連互為掩蔽草野新進矯情飾行以取名望及其貴顯自恥門地單寒連姻大族盡棄其初儒生懦而少剛又有門生座主同年之號黨比徇情三者皆不足用也思得離世獨立之人以革因循之斃者久矣及見旽以為得道寡欲且出於賤微更無親比任之大事則必徑行而無所顧藉故拔於髠緇授以國政而不疑也王請旽屈行以救世事旽陽不肯以堅王意王強之旽曰嘗聞國王大臣多信讒間慎毋如此乃可福利世間也王乃手寫盟辭曰師救我我救師死生以之無惑人言佛天證明於是旽與議國政用事三旬罷逐親勳名望冢宰臺諫皆出其口領都僉議久虛其位至是自領之始出禁中寓奇顯家百官詣門議事旽以辰巳聖人出之讖昌言曰所謂聖人豈非我歟旽貪日甚貨賂輻湊居家飲酒啖肉恣意聲色謁王則清談齕菜果茗飲以金元命為鷹揚軍上護軍掌八衛四十二都府元命以旽故大用罷密直提學李達衷達衷嘗於廣坐謂旽曰人謂公酒色過度旽不悅罷之丙午十五年元至正二十六年夏四月乙卯鷹揚軍上護軍金元命鑿溝于市北街自言將以壓朝廷也術家曰經市鑿溝武勝文衰時元命黨辛旽恐臺諫文臣發其奸用術家語以壓之戊午王觀呼旗童戲於殿庭賜布百匹丁亥以誕日飯僧七百于內殿賜布千餘匹甲午百官會于辛旽家地大震六月乙丑以辛旽黨李得霖為全羅道按廉使憲司劾得霖嘗盜廣州貢紬王命勿治督令之任秋七月己酉王步至佛福藏訪僧千禧八月德寧公主享太后于文睿府王侍宴辛旽從往入見太后不賜坐旽趨出王白太后曰僉議國之柱石何不賜坐太后正色曰未亡人安敢與外僧共坐耶王默然由是旽深銜之時公卿舊臣皆為所逐旽所憚者獨太后故讒間百計十一月侍中柳濯享王王安兩妃在東辛旽在西旽謂王曰二妃年少而愚王曰不愚旽又戲王曰聖體不已勞乎王曰勞矣哉設北帝天兵護國道場于內殿丁未十六年元至正二十七年二月庚午元以辛旽為集賢殿太學士賜衣酒旽受宣于家置之座傍曰安用此物為但他所與不可棄也三月辛卯幸演福寺大設文殊會七日王手擎金爐逐僧行香略無倦容五月丙戌命重營國學令中外儒官隨品出布以助其費先是旽與李穡等會崇文館相舊址旽免冠扣頭誓先聖曰盡心重營左右曰少損舊制可易成旽曰文宣王天下萬世之師也可靳小費虧前代之規乎以判開城府事李穡兼大司成增置生員又擇經術之士金九容鄭夢周朴尚衷朴宜中李崇仁等皆兼學官先是館生不過數十穡更定學式每日坐明倫堂分經授業講學論難忘倦於是學者坌集程朱性理之學始興時經書至東方者唯朱子集注耳夢周講說發越超出人意聞者頗疑及得胡炳文四書通無不吻合諸儒尤加嘆服穡亟稱之曰夢周論理橫說竪說無非當理推為東方理學之祖八月以僧千禧為國師禪顯為王師二僧皆旽所善者也王九拜禪顯立受百官朝服就班旽獨戎服立殿上每王一拜輒嘖嘖稱嘆私語宦者曰主上禮容天下稀有史官尹紹宗在傍旽顧謂曰毋妄書國事吾將取觀之初禪顯之未封也紹宗族僧夫目謂紹宗曰旽之貪暴犬豕不若必誤國家禪顯附之吾不忍見遂逃入山元使乞徹至問曰聞爾國有權王何在時中國謂旽為權王故云知都僉議吳仁澤與前侍中慶千興三司左使金元命等密議曰辛旽邪佞陰狡好讒毀人斥逐勳舊殺戮無辜黨與日盛道詵記有非僧非俗亂政亡國之語必是此人將為國家大患宜白王早除之判書辛貴聞以告旽旽入告于王曰旽山水間一衲者也上勒令至此不敢違命思欲去姦惡用賢良使三韓百姓粗得平安然後將一衣鉢還向山林今國人將殺旽願上哀矜王驚問之旽具以貴語對乃命繫仁澤等巡軍獄鞫之杖流于外十二月王幸辛旽家自是數幸戊申十七年元至正二十八年明太祖高皇帝洪武元年佛紀二三九五年春正月戊子日本國遣僧梵蕩梵鏐偕金逸來報憑夏四月壬子幸九齊賜李詹等七人及第初王之寵辛旽也李齊賢白王曰臣嘗一見旽其骨法類古之凶人請上勿近旽深銜之毀之百端以其老不得加害乃謂王曰儒者稱座主門生布列中外互相干謁恣其所欲如李齊賢門生門下見門生遂為滿國之盜儒者之有害如此時藝文館再以三館員少請行科舉王重違旽意不許至是乃行親試有氣如烟生演福寺佛殿二日旽白王曰佛放光戊午幸演福寺設文殊會凡九日五月乙亥以誕日飯僧三千於王輪寺壬辰以王輪影殿佛宇狹小不能容僧三千欲改營幸福源宮相之乙未撤王輪影殿改營于馬巖秋七月乙巳幸奉先寺設消灾道場九月始賜辛旽妾般若米月三十石十一月辛旽殺趙璘金元命于貶所以嘗通書愈思義也凡為旽殺者妻子不敢訴廷臣無敢言旽欲盡殺流人訴於王遣其黨孫演于慶尚全羅道洪永通謂旽曰多殺人何益佛氏罪福報應之說亦可畏願公更思之旽感悟召還演己酉十八年明洪武二年佛紀二三九六年夏四月丁卯辛旽設文殊會於演福寺王往觀之賜僧布五千五百匹五月己亥以誕日飯僧三千於影殿秋七月甲辰下教曰昔我太祖每當四仲之年巡駐三蘇豫亦將幸平壤巡金剛山駐駕忠州先是辛旽密令侍中李春富請移都忠州王怒旽托言松京濱海海寇可畏以解之乃下是令旋因司天監奏星變故遂停議八月設功德天道場于康安殿雲巖寺僧詣都堂請給餉客之米宰樞議給轉輸都監米五十石三宰李成瑞方在告録事請署其案成瑞嘆曰今頒祿不給而雲巖僧惟其所欲請養居僧則與之請食役夫則與之今又給餉客之費以有限之財供無益之用國用焉得不匱遂不署九月辛酉王幸王輪寺設天兵神衆道場七日乃還王手書疏賜僧布一千五百匹幸旽亦施千五百匹冬十月甲子王在王輪寺宴淮王吳王使二使各獻黃金佛一軀時王方惑浮屠故因所好為贄十一月行八關會辛旽攝王受羣臣朝于儀鳳樓辛旽祝高仁器髮放于金剛山仁器本僧釋溫也附旽拜判少府監事至是泄旽逆謀旽自辨於王髠而逐之實陰護之也庚戌十九年明洪武三年春正月甲寅幸王輪寺觀佛齒及胡僧指空頭骨親自頂戴遂迎入禁中夏四月作觀音殿於影殿凡九楹制甚高廣戊辰設文殊會於演福寺命辛旽先往乃令承宣及衛士衛旽遂親幸觀之甲戌又幸演福寺飯僧千四百餘庚辰明帝遣道士徐師昊來祭山川五月丁未置守正陵戶納田民于雲巖寺以資冥福王與羣臣同盟曰後代君臣不遵此盟侵奪盜用者神必殛之成準得還自京師帝賜璽書曰近者使歸問國王之政言王唯務釋氏之道朕不可不諭王知之歷代之君不問華夷惟行仁義禮樂可以化民成俗今王舍而不務日以持齊守戒望脫愆冤以求再生之福佛經之說雖有然不崇王道而崇佛道失其要矣朕幼嘗為僧禪講亦曾參究惟問有佛而已度死超生未見盡驗古今務釋氏而成家國者實未之有梁武之事可為明鑒今王能舉先王之道與民興利除害使父母妻子飽食暖衣各得其所生齒日繁此道若舉則福德之應王子必生於宮中此則修行之大者也云云下略十二月戊寅幸辛旽家問疾辛亥二十年明洪武四年春正月己丑幸影殿飯僧八百己亥幸演福寺設談禪會二月己未幸魂殿飯僧己亥王以公主忌日幸王輪寺飯僧千餘三月丁亥幸雲巖寺飯僧閏月辛旽傔人宴旽于穿坂自侍中以下時散各品皆與焉凡二百餘人都人聚觀謂之僉議餞送夏四月幸演福寺設文殊會五月丁巳以誕日幸魂殿飯僧八百六月丙辰選部議郎李韌上匿名書告辛旽謀逆鞫其黨奇顯崔思遠鄭龜漢陳允儉奇仲修等誅之己未流辛旽于水原辛酉辛旽伏誅兩府臺諫理部上書論旽大逆之罪請置旽極刑王從之遣大司成林朴判事金斗誅旽于水原初王與旽春富等同盟至是授朴盟書使示旽數曰爾嘗謂近婦女所以道引養氣非敢私之今聞至生兒息是在盟書者歟城中甲第至七是在盟書者歟如是者數事數罪訖可焚此書朴至水原使人詐報宣召旽喜曰今日召還蓋為阿只思我也阿只方言小兒之稱旽當刑束手乞哀於朴曰願公見阿只活我乃誅之旽性畏畎犬惡射獵且縱常殺鳥雞白馬以助陽道時人謂旽為老狐精戊辰召牟尼奴納太后殿先是流旽王謂近臣曰豫嘗至旽家幸侍婢生子毋令驚動善保護之子即牟尼奴也至是召納乃屬守侍中李仁任曰元子在吾無憂矣因言有美婦在旽家聞其宜子遂幸之乃有此兒初林朴與上將軍李美冲侍王目美冲曰汝知阿只事矣對曰臣知之矣朴怪之及出以問美冲美冲曰上嘗鑄金錢授臣往旽家賜阿只阿只大喜旽謂余曰上數幸吾家非為我也余具以聞故上有是言至是朴謂史官閔由誼李至曰上幸宮人生子今已七歲旽潛養之不使國人知是亦當誅也史官宜知之八月丁亥以僧惠勤為王師懶翁也壬子二十一年明洪武五年佛紀二三九九年春正月癸丑飯僧于宮中二月乙未王以公主忌日幸王輪寺聽法賜僧布三百餘匹五月癸丑以旱放辛旽黨人妻妾沒為官婢者惟旽妻妾不赦從王太后之言九月戊申王使僧唱無常歌聽至夜分癸丑二十二年明洪武六年佛紀二四年春正月壬子幸魂殿飯僧三百二月丁亥以公主忌辰幸王輪寺飯僧三百赦二罪以下王朝太后欲以牟尼奴為嗣請就學以成均直講李崇仁授書太后不欲乃托辭曰兒尚幼稍長就學未為晚王曰臣今數窮當死今不立嗣社稷誰托夏四月設仁王道場於康安殿七日以禳天變秋七月乙巳賜牟尼奴名禑封為江陵府院大君百官賀甲寅二十三年明洪武七年佛紀二四一年春正月辛未幸仁熙殿飯僧丁丑幸演福寺設談禪會九月有胡僧自北元來謂康舜龍曰元以瀋王孫為高麗國王王聞之囚僧及舜龍按治僧曰聞諸某甲執其人鞫之曰此前贊成事禹磾家奴行販北元時所聞也欲訊其奴奴逃釋僧與舜龍囚磾于巡衛府甲申王暴薨宰相李仁任以僧神照常在禁中有膂力多詭計疑謀作亂下獄既而知其無罪釋之前一日宦者萬生從王如廁密啓曰益妃有身已五月矣王喜曰豫嘗慮影殿無所付囑妃既有身吾何憂乎少選問誰與合萬生曰妃言洪倫也王曰豫明日謁昌陵佯使酒殺倫輩以滅口汝知此謀亦當不免萬生懼是日夜與倫等謀乘王醉手刃之呼曰賊自外至矣衛士股栗莫敢動宰相百執事聞變無一人至者黎明王太后率江寧大君禑祕不發喪李仁任疑僧神照謀作亂下獄既而見屏障及萬生衣上泄血痕於是下萬生獄鞫之悉得其狀遂繫倫等丁亥李仁任立禑誅崔萬生洪倫等辛禑府王在位十四年乙卯元年明洪武八年徵諸寺住持戰馬各一匹又取諸寺田租以充軍費丙辰二年明洪武九年二月辛旽妾般若夜潛入太后宮啼號曰我實生主上何母韓氏耶太后出之仁任下般若獄令臺諫巡衛府雜治之般若指新創中門呼曰天若知吾冤此門必頽司議許時才入門門自頽時僅得免人頗異之竟投般若于臨津夏四月放僧懶翁于密城郡時懶翁於楊州檜嵓寺設文殊會中外士女無貴賤爭賫布帛果餅施與猶恐不及寺門填咽故放之五月十五日王師惠勤示寂于驪興之神勒寺丁巳三年明洪武十年三月令諸道募僧作戰艦五月以旱雩且遍禱於佛宇九月李成桂太祖舊諱在海州戰場下馬據胡床張樂僧神照割肉進酒壬戌八年明洪武十五年十二月二十三日國師普愚示寂癸亥九年明洪武十六年九月大設鎮兵法席於中外佛寺共一百五十一所供備不可勝計而赴防軍士自備糧馬戊辰十四年明洪武草一年禑與崔瑩決策攻遼發中外僧徒為兵夏四月乙巳朔禑與崔瑩决策攻遼丁未禑次平壤督諸道兵作浮橋于鴨緑江使大護軍裴矩督之船運林廉等家財於西京欲充軍賞又發中外僧徒為兵加崔瑩八道都統使以曹敏修為左軍都統使以李成桂為右軍都統使壬戌各領軍發平壤衆號十萬時有僧稱道詵讖曰設文殊會則敵兵自屈瑩信之乃設會於穴洞海東名將傳崔瑩傳五月李成桂自威化島回軍渡鴨緑江僧神照與定大策焉時霖潦數日水不漲師既渡大水驟至全島墊溺人皆神之時童謠有木子得國之語軍民無老少皆歌之六月庚戌放禑於江華辛亥曹敏修立禑子昌十二月斬崔瑩以謝决策攻遼之罪辛昌廢王在位半年十二月典法判書趙仁沃等上疏曰佛氏之教以清淨寡欲離世絶俗為宗固非所以治天下國家之道也近世以來諸寺僧徒不顧其師寡欲之教土田之租奴婢之傭不以供佛僧而以自富其身出入寡婦之家污染風俗賄賂權勢之門希求巨利其於清淨絶俗之教何願自今選有道行無利欲者住諸寺院其土田之租奴婢之傭令所在官收之載諸公案計僧徒之數而給之禁住持竊用凡留宿人家之僧以犯奸論貴賤婦女雖父母喪毋得詣寺違者以失節論其為尼者以失行論敢祝婦人髮者加以重罪鄉吏驛吏及公私奴婢勿許為僧尼僧徒恆留宿人家者俾充軍籍其主家亦論罪恭讓王王瑤在位四年己巳元年明洪武草二年十一月以前為辛昌元年佛紀二四一六年秋七月門下侍中李穡乞解職舉李琳自代以穡為判門下府事琳為侍中洪永通領三司事穡嘗與永通李茂方等設白蓮會於南神寺佛者以穡藉口益肆其說十一月己卯放昌於江華立宗室定昌君瑤為王恭愍王定妃教曰恭愍薨逝無嗣權臣李仁任以逆賊辛旽之子禑冒名恭愍王後殺所生母以滅其口嫁以姪女以固其寵禑舉兵猾夏得罪天子此正王氏復祀之秋而大將曹敏修以仁任之親為上相繼仁任之邪謀立禑子昌以惡繼惡其禑及昌廢為庶人云云十二月左司議吳思忠門下舍人趙璞等上疏論劾李穡以儒宗侫佛毀人心術敗亂風俗云云庚午二年明洪武草三年佛紀二四一七年春正月王御經筵鄭夢周進言曰儒者之道皆日用平常之事飲食男女人所同也至理存焉堯舜之道亦不外此動靜語默之得其正即是堯舜之道初非甚高難行彼佛氏之教則不然辭親戚絶男女獨坐嵓穴草衣木食觀空寂滅為宗豈是平常之道時王欲迎僧粲英普愚嗣法為師故夢周語及此然王方惑佛不納演福寺僧法猊說王曰寺有五層塔殿及三池九井頽廢已久今復建塔殿鑿池井則國泰民安王悅以上護軍沈仁鳳大護軍權緩為造成都監別監營之是月王置仁王佛於別殿每朝夕禮拜凡有災異輒行祈禱二月王欲迎曹溪僧粲英為師大司憲成石璘左常侍尹紹宗等伏閣諫之又聯章上疏曰三代帝王以論道經邦變理陰陽者為師故湯師伊尹伐夏救民以開六百祀之商武王師太公鷹揚以開八百年之周姚秦以胡僧鳩摩羅什為師不旋踵而亡前元以蕃僧婆羅跋蹄為師及其季世以天子之尊奴事指空冀其福壽卒致應昌之敗佛之為教無父無君而姚秦前元以五胡北狄之俗不法帝王之治以毀綱常得罪於天以速亂亡今殿下中興方將作法垂範為聖子神孫億萬世之所遵今乃復襲胡狄之失乃以胡教為師有國家者立政立事當循其名當責其實所謂師者師其道也釋氏以臣子而背君父逃入山林寂滅為樂若師其法必髠三韓之民必絶九廟之祀然後稱其名耳願殿下勿以無君無父者為師尊堯舜孔孟之道以開三韓太平之業王勉從之英至崇仁門不得入而還夏四月録回軍諸臣功下教曰僞主辛禑恣行不道歲戊辰乃與崔瑩欲犯遼陽將使國家得罪天朝社稷存亡間不容髮守門下侍中李成桂前侍中曹敏修首倡大義定策回軍以安社稷功勞重大帶礪難忘其同心協力者某官某人等奉福君僧神照某官某人等等四十五人皆賜功臣有司啓聞施行特賜奉福君僧神照功牌使主水原舞鳳山萬義寺仍給奴婢土田傳于恭孫見輿地勝覽秋七月書雲觀上書曰道詵密記有地理衰旺之說宜幸漢陽以休松都地德王謂朴宜中曰卿以遷都為何如對曰古昔人君以讖緯術數保其國家臣未之聞也且動衆則擾民之斃供億之費可勝言哉王曰吾非不知其斃陰陽之說亦豈妄哉乃遣評理裴克廉往修宮闕左獻納李室上疏曰殿下信讖緯之說欲遷漢陽既為不可况今秋成未穫而人馬蹂踐必召民怨王詰之曰祕録云苟不遷廢君臣爾何獨執不可耶八月刑曹總郎尹會宗上疏曰國祚之長在乎人君積德纍仁培養邦本而已夫豈恃都城地勢之旺氣哉昔盤庚之去耿以有河决之患太王之去豳以有狄人之侵平王之東遷以有犬戎之亂今無此數事將遷漢陽物議驚駭殿下特以江水赤沸太白晝見乃信讖緯之言欲移蹕而避之久惑浮屠法猊之說修演福寺盡毀四傍人戶失所者多臣願殿下罷移都黜法猊恐惶修省以答天心無徒惑於邪說九月遣內侍於演福洛山王輪等寺設齊祈福王自即位以來每月朔望必於宮中招僧講經每四時必於十三所祈恩曰道場曰法席曰別祈恩諂事神佛大臣臺諫每論不聽十二月刑曹判書安瑗上言曰向者術士以災異請遷都避禍今遷都已久猛虎傷人變怪不息術士之言既無驗矣乞速還都以應天意以慰人望王納之辛未三年明洪武草四年春正月設帝釋道場於報平廳二月己未王發南京辛酉次檜巖寺大張佛事窮極奢侈飯僧千餘使伶官奏鄉唐樂王手執香爐巡東西僧堂以侑食順妃亦隨之又與妃及世子禮佛徹夜壬子王及世子手施僧布一千二百匹賜講主僧段絹各三匹衣一襲仍御寺門受誕日朝賀三月流池湧奇於遠地王益富與湧奇妻為再從兄弟出入湧奇家自謂忠宣王孽曾孫定陽君瑀知之以告遂捕鞫之絞益富及子孫十三人憲府上疏論湧寄陰庇益富潛謀不軌郎舍亦請置極刑幸僧神照素善湧奇密白王曰援立之功專在湧奇王特宥憲府復請誅湧奇乃杖流遠地命納弘福都監布二千匹于演福寺以資修塔夏四月禁婦女往來佛寺代言柳廷顯請停演福寺之役不聽五月成均大司成金子粹上書曰上略唐韓愈言於憲宗曰自黃帝堯舜至于三代皆享壽考百姓安樂當此之時未有佛法自漢永平始有佛法其後亂亡相繼宋齊梁陳元魏以降事佛漸謹年代尤促殿下即位之始修廣演福寺塔破民家三四十戶今又大起浮屠而交州一道斫木輪材人畜盡瘁欲徼未可必得之冥福以貽現在生靈之實禍乞申降明敕以寢其役云云成均博士金貂上書曰上略釋氏潔身亂倫逃入山林此亦一道也然其禍福之說妖妄尤甚其曰張皇梵采能厭妖異而降香絡繹供億浩廣未見天災地怪之消弭也其曰我以祈福能使人壽而不惜萬錢俾之祝壽未見百齡之驗也其曰賴我接引破地獄生樂土然死無復生者其見樂土與地獄者誰歟其曰地鉗之應置金剎寶塔以鎮之然三代以上未有釋氏不知何物以鎮之而致雍熙之治歟且其法曰禁而相生養之道以求所謂清淨寂滅者然其徒也寄食吾民無所愧耻可笑之甚也嗚呼為此道者辟穀居山與禽獸同羣然後可也來入民間毀傷風俗亦獨何哉殿下中興雖在先王之法猶有所損益之者而况此誤世之大怪尤好而不黜之可乎奈何造塔之役農民勞憊禪僧之養錢穀虛耗上所好者下必有甚焉恐斯民駸駸然入于釋氏棄恆産而背君父矣昔梁武二捨身於同泰寺殫府庫事浮屠卒之呵呵之聲為千古笑玄陵師懶翁惑辛旽終未獲福此則殿下之所親見也中略臣願回天聽决宸衷驅出家之輩還歸本業破五教兩宗補充軍士中外寺社分屬所在官司奴婢財用亦皆屬焉嚴立禁令剃髮者殺無宥王覽疏不悅郎舍許應等上疏曰上略殿下即位以來中外未知殿下所好及創演福既廢之塔臣民之望多有所缺釋氏之道無父無君戎裔之教三代之盛所未有也殿下有志於三代之理而反行裔夷之教乎願殿下罷可已之役以副民望云云政堂文學鄭道傳上疏曰上略臣問三司會計佛神之用居多焉財用之妄費莫斯若也然佛神之害自古難辨也為其徒者曰此好事也善事也歸我者國可富也民可壽也為人君者聞是說而樂之殫其財力諂事佛神人有言之則以為我事佛而彼非之我善而彼惡也我道而彼魔也我之事佛神為富國也為壽國也非為我也持是說以固其心而人之言莫得而入也殿下即位以來道場高峙於宮禁法席常設於佛宇道殿之醮無時巫堂之事煩瀆此殿下以為善事而不知其實非善事雖有言之者舉皆不納不自以為咈諫是臣所謂為善福壽之說先入之也昔梁武帝屈萬乘之尊三舍身為寺家奴殫江南之財力大起佛塔其心豈以為非利而苟為之也匹夫作亂身遭羈辱子孫不保而國家隨之佛氏所謂修善得福者果安在哉此猶異代也玄陵崇尚佛教親執弟子之禮於髠禿之人宮中之百高座演福之文殊會無歲無之雲巖之金碧輝映山谷影殿之棟宇聳于霄漢財殫力竭怨讟並興而皆不恤事佛可謂至矣卒不獲福豈非明鑑乎周末神降于有莘太史過曰國家將興聽於人國家將亡聽於神周果以亡由是言之事佛事神無利而有害可知矣云云吏曹判書鄭總上書曰上略浮屠之教敗倫滅理非人主之所尚也佛圖澄不能存趙鳩摩羅什不能存秦齊襄梁武未免禍殃殷鑑昭然可以為戒而殿下崇信太過營搆普濟之塔而又多張梵采殆無虛月何為此無益之費以取識者之譏乎云云罷修演福寺塔六月前典醫副正金琠上書曰太祖創業觀山水之逆順察地脉之續斷創寺造佛給民與田祈福禳災此三韓基業之根本也比來無識僧徒不顧創業之義收民土之産自營其業而上不供佛下不養僧嗚呼其徒之自滅其法也甚矣今狂儒之淺見薄識者不顧三韓之大體徒以破寺斥僧為意噫聖祖創業之深智反不如竪儒之計乎伏望殿下上順聖祖之弘願重營佛寺加給田丁以興釋教前戶曹判書鄭士倜亦上書以為佛法福利國家宜當崇奉王嘉納其言時言者多斥王好佛之斃琠及士倜以此中王心成均生員朴礎等上疏曰上略佛本夷狄之人與中國言語不類衣服殊制不知夫婦父子君臣之倫僞啓三途謬張六道遂使愚迷妄求功德不憚科禁輕犯憲章且死生壽夭由於自然威福刑政關之人主貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力塗生民之耳目溺天下於污濁醉生夢死不自覺也惟我太祖統三之初深懲積弊禁後代君臣私立願剎於是太師崔凝請除佛法太祖以為神羅之季佛氏之說入人骨髓人人以為死生禍福悉佛所為今三韓甫一人心未定若遽革佛氏必生駭心乃作訓曰宜鑑新羅多作佛事以至於亡然則太祖之垂訓於後世者至深切矣歷代君臣不能體聖祖之遺意因循苟且營菴立塔無代無之式至于今其弊滋甚為人心世道計者可不痛心哉殿下以英明之資惑於浮屠讖緯之說往遷于南以國君之尊親幸檜巖以倡無父無君之教以成不忠不孝之俗以毀我三綱五常之典臣等為殿下中興之美惜也且誕降之辰宜率百官上壽大妃以示殿下中興孝理之盛德於三韓臣庶也此之不為反尊胡教區區於飯僧供佛以沮臣庶中興至理之望可乎至若窮人之力斂人之怨督立演福塔廟之役中外嗷嗷士民缺望昔後周毀經像而修甲兵齊崇塔廟而弛刑政一朝合戰周興齊滅然則佛氏之不能作禍福於人世者可知也伏惟殿下法堯舜三代之所以興鑑齊陳梁蕭之所以亡上繼聖祖之遺意下副吾儒之素望使彼佛者勒還其鄉人其人以充兵賦廬其居以增戶口焚其書以永絶其根本而所給之田使軍資主之以贍軍餼奴婢使都官掌之以分各司各官其銅像銅器屬於軍器寺以修甲兵其所用器皿屬於禮賓寺以分各司各官然後教之以禮養之以道德不數年間民志定而教化行倉廩實而國用周矣今侫臣金琠阿意順旨變亂是非欲興無父無君之教以廢古今聖賢之道以為太祖開國皆蒙佛力以指闢佛者為太祖之罪人我國家自庚寅癸巳以上通儒名士多於中國故唐家以為君子之國宋朝以為文物禮樂之邦題本國使臣下馬所曰小中華之館自庚癸以後不死兵亂則逃入山林通儒名士百無一二存者彼學佛者始倡邪說上誣君臣下誑愚民乃作太祖九世之像曰某生為某院主某生作某塔某經某生為某寺之牛至某生乃得王位上賓之後今為某菩薩成書開板藏于深山以欺萬世玄陵見之深加敬信嗚呼正學不明人心不正不修德而惟福之是求不知道而惟怪之欲聞豈不惜哉豈不痛哉自孟子闢楊墨尊孔氏以來漢之董子唐之韓子宋之程朱子皆扶斯道抑異端為天下萬世之君子也王安石張天覺等興佛教易風俗而為天下萬世之小人也殿下若遵安石天覺之所好髠三韓之民棄國家斃屣王位入山求佛則納金琠之言可也若遵董韓程朱之學以正人心明人倫去民之蟊賊以興堯舜三代之理以光中興之業則彼金琠者當轘諸都市以示三韓萬世中興大聖人之不惑於邪說可也云云王覽疏大怒礎等將上書生員徐復禮不署名博士金貂等鳴鼓而黜之又司藝柳伯淳力止礎等上書不得言於知申事成石瑢曰礎等疏請勿上聞礎等知之共議將不受業大司成金子粹等惡其無禮且怒貂等不告長官擅出生徒囚貂等家奴召復禮還入學及子粹赴衙貂等不庭迎子粹上箋辭不允下貂等于巡軍庚辰復修演福寺塔八月王御經筵謂兼禮曹判書閔霽曰聞禮曹定服色刪佛事然乎不貴異物實是良法豫亦衣綿布矣若佛事乃先王所為豫何敢擅罷耶發京畿交州西海道民丁及諸道僧築京都內城命判三司事裴克廉監之冬十月日本國僧玄教遣僧道本等四十餘人來獻土物十一月丙申設八關會如法王寺壬申四年明洪武草五年五月癸巳演福寺塔成壬寅王與順妃引見僧自超懶翁法嗣無學也于解慍亭六月日本遣使求藏經秋七月辛卯十六日王禪位于李侍中是為朝鮮太祖王遷于原州尋移杆城郡封恭讓君後三年甲戌薨于三陟府後追封恭讓王朝鮮時代太祖高皇帝追崇李旦初諱成桂在位七年壬申元年明洪武草五年先是高麗辛禑廢王十一年乙丑明洪武十八年韓山君李穡奉教撰太古普愚諡圓證國師之碑首書門徒曰國師智雄尊者混修又有判三司事李成桂太祖初諱之聖諱焉太祖在潛邸嘗與混修願成大藏置瑞雲寺至是年九月十有八日丙申混修入寂太祖惻悼賜諡曰普覺塔曰定慧圓融命花山君權近作碑銘以記其德備考朝鮮普覺國師碑銘并序花山君權近撰上肇位春二月己亥即位之明年癸酉春也駕幸檜巖寺命臣近若曰修國師在前朝道行高一世逮豫蒞祚之初而奄逝豫甚悼焉今其徒礲石厝骨又欲勒碑以示後爾宜為銘臣近承命悸恐不敢以不文辭師諱混修字無作號幻菴本姓趙氏廣州豐壤縣人考諱叔鴒憲部散郎妣慶氏本清州皆士族也憲部出宰龍州以延祐庚申三月十三日生師于治所嘗一日出畋見一鹿走且止而顧視者再欲發矢異而顧之有其兒追母而來乃歎曰獸之念母與人何別即罷獵不數月病終于外妣奉喪提孩而歸師少嘗嬰疾卜之曰此兒出家終不病作大和尚矣年甫踰一紀妣謂師曰汝生之初汝父以憐汝故感鹿母兒以休其獵是汝慈仁護生之道已現於襁褓之日矣况卜者言然令投大禪師繼松祝髮訓習內外典聰慧異常月開日益卓然有聲終不為屈下第二座至正紀元辛巳赴禪試登上上科儒釋朋遊日以親附每歎身命幻化靡常超然有脫棄名韁之想忽聞鄰有暴亡者益自感决意入山辭母將行夢見日輪照師面既覺欣慶徑往金剛山即八年戊子秋師年二十有九歲也攝心不寐脅不暫衡功夫日進既二稔聞其母戀望不置即來覲省寓止京山不敢遠遊凡五六年及母卒倩寫大字法華經以資冥福謁息影鑑于禪源學楞嚴深得其髓故宰相趙公雙重新結休休菴迓師講演楞嚴要旨辨才清發令人怡喜因住三年往忠州之青龍寺西麓沿溪而上峯回境靜有屋舊址躬搬土石經營無憚既成扁以宴晦蓋自表其心迹也玄陵高師行誼請住檜巖寺不就乃入金鰲山又入五臺山居神聖菴時懶翁勤和尚亦住孤雲菴數與相見咨質道要翁後以金襴袈裟象牙拂山形杖遺師為信辛丑秋江陵道按廉使起師赴闕俾主登壇之戒師於中途遁走晦迹山水間遍歷名山操守益固己酉白城郡人金璜邀師以願剎瑞雲寺師至開僧堂葺廊廡大張釋會四衆聞之造謁者衆洪武三年庚戌秋七月上設工夫選瑒大集禪教山門衲子命懶翁試之上親臨觀翁下一語諸衲無一能對者上不懌將罷師後至具威儀立堂門陛下翁問如何是當門句師即上陛答曰不落左右中中而立問入門句師入門曰入已還同未入時問門內句曰內外本空中云何立翁又以三關問曰山何嶽邊止答曰逢高即下遇下即止問水何到成渠曰大海潛流到處成渠曰飯何白米做曰如蒸沙石豈成嘉䬸翁乃肯之上敕收司制入格文留宗門師知上欲命住院不告出城隱於圍鳳山五年壬子壓於上命住佛護寺越明年有旨徵入內佛堂師用夜半潛出直往平海之西山敕諸道搜之不已乃出應命甲寅正月始入院上屢咨法要王大妃尤加敬重及九月上賓于天康宣君立賜以廣通無礙圓妙大智普濟之號乙卯秋移住松廣社丙辰三月上書辭院歸瑞雲寺戊午自雉嶽還宴晦忽一日有賓及門師即入室托疾不出賓果中使請師主光巖寺師以疾辭不獲乃起以來僅閲三霜請退不報即以遁抵于原州之日雲菴自後歷徙龍門清平雉嶽諸山誓不復作住持癸亥三月朝議欲遵舊制擇立釋門名德以為師範時咸注于師師聞謀欲隱避門人甘露長老慶觀曰此自安之計耳方今國主尊崇我法欲舉斯事意甚盛也願師為法少安無躁師果不行夏四月朔甲戌王遣相臣禹仁烈等奉御書印章法服禮幣就所寓宴晦菴冊為國師大曹溪宗師禪教都總攝悟佛心宗興慈運悲福國利生妙化無窮都大禪師正遍智雄尊者以忠州之開天寺為下山所其秋往瑞雲山王又遣正郎朴元素獻鞍馬邀還明年甲子海賊深入寇忠州界廟謀慮開天林壑將為賊藪師住于彼能安乎以聞于王遣使邀至光巖寺既至上言曰老僧未辭開天且住光巖雖得一寺尚過素志况可兼乎殿下若能俾老僧全心以追先君冥福願以開天兼付別人王曰開天是師終住資蔭之地光巖是豫請來演法之場兼領何害師不得辭乙丑秋命設五十日白傘蓋道場以禳天地災變名儒韻釋多詣聽講會末王亦駕幸而致禮丙寅大妃安氏為導玄陵請蒞佛頂會于輔國寺王又請於壽昌宮主消災法席及還命代言李稷伴送用表尊敬戊辰夏王遜于外幼君襲位師乞歸開天今主上之在潛邸嘗與師願成大藏辛未秋粧校訖功置瑞雲寺大設慶會恭讓君命內臣降香邀師為證壬申秋七月我主上革命啓統師乃表賀俄以老病乞解其位與寺修箋送印遂移錫于青龍侍者湛圓奉書印詣闕上意欲仍師事即還其印湛圓來報師蹙額曰吾老且病逮將不久明主如何阻吾之願未幾痢作旬日彌留雖數起便不令人扶困不尸臥必以支脅至九月十有八日丙申命作遺書又謂門人曰吾行在今晚可請州官封印至晚坐曰如今臘除已到吾當逝矣即說偈儼然示寂床坐八日貌若平時至草五日癸卯門人積薪茶毗于宴晦之北麓是夜有雨崇朝不止方下火雲開天霽若有神助厥明檢骨色白如雪其頂骨尤厚且淨門人紹安奉遺書以聞上情惻悼命攸司賜諡曰普覺塔曰定慧圓融差遣內臣監其厝骨又敕工造浮圖以其年後十二月甲申窆于青龍寺之北岸春秋七十三夏臘六十師貌清而秀氣淑而和禮恭言切人皆敬愛持律必堅守道乃勤位高而心益謙年高而行益勵禪教諸典靡不研窮率多不師自通誨人不倦講解詳明所至弟子彌衆入其室者多聞人碩德不喜綴文苟下筆則辭語精微尤工於簡牘識者稱之臣近竊維佛氏之道莫高於禪然其言多誕怪莫測若麻斤屎橛之類尤可駭愕其傳愈遠其說益誕惟曹溪鑑師心行平直等語典實平易其道益高故能獨高諸祖至今學禪者皆宗之今觀吾師選場答語事理融徹的實且其平日訓迪學者必以真常使之易入與大鑑同軌非若他誕幻可駭之比是知道本坦而師之所造者深矣銘曰攝心著力不擬不衡不落左右中道斯征附幻庵記李穡撰豫之未冠也喜遊山中與釋氏狎聞其誦四如偈雖不盡解要其歸無為而已夢者悟則已幻者法則空泡歸於水影息於蔭露晞電滅皆非實有也非實有焉而不可謂之無非實無焉而不可謂之有釋氏之教蓋如此稍長縫掖十八人結契為好今天台圓公曹溪修公與焉相得之深相期之厚復何言哉及余宦學燕京修公亦入山今三十年矣間或相值信宿則別回思前日詩酒淋漓何可復得信乎其如夢矣信乎其如幻矣玄陵欽公之風再請住持大寺公皆辭之雖逼迫入院不久棄去蓋視世如幻久矣嘗一典十員法席一年未竟而玄陵賓于天公於幻之味益親嘗矣青龍惠禪師之來京也公以書索豫記曰身之幻四大是已心之幻緣影是已世界之幻空華是已然既曰幻矣是可見也是可修也見其可見修其可修非如指月指矣是吾平日所立之地也夫豈入於斷滅哉又有所謂三觀者單復以成清淨定輪而起幻銷塵之術貫乎其中則幻之益於末學也非淺淺矣此吾所以表之居室而使聞吾風入吾室者皆得以自省也不然閴寂蕭灑間居之境何必立名立言以架屋下屋哉豫固知公久又於功夫選獨公開口的答問意又知公名不虛得出於衆萬萬矣今觀名菴之義非以自表將使游其門者有所據依為其用力之地故不以文拙辭又作歌以寄之曰白雲兮行大虛長風兮卷滄海其來兮何從其去兮安在菴中高臥兮閒道人月作燈兮松作蓋重為告曰後之讀吾記者當學幻人心識然後知修公之為人矣知吾作記之意矣請高著眼戊午夏五月二十又六日記冬十月沙門自超以召至松京太祖以是月十一日誕辰具法服若器封為王師大曹溪宗師禪教都總攝傳佛心印辨智無礙扶宗樹教弘利普濟都大禪師妙嚴尊者癸酉二年明洪武草六年佛紀二四二年王幸雞龍山為相土建都也王師無學從焉備考妙嚴尊者塔碑云癸酉太祖欲相土建都命師隨駕師辭太祖謂師曰古今相遇必有因緣世人所卜豈若道眼巡幸雞龍山及新都漢陽也師皆扈從夏四月重創演福寺塔成設文殊會以落之備考演福寺塔重創記權近撰佛氏之道以慈悲喜捨為德以報應不差為驗其言極濶大譯傳中國覃及四海綿歷千愈久而愈熾上自王公大臣下逮夫婦之愚希望福利靡不崇信寺院塔廟之設巍嶪相望彌天之下吾東方自新羅氏之季奉事尤謹城中僧廬多於民屋其殿宇之宏峻凌特者至于今尚存一時崇奉之至可想見矣高麗王氏統合之初率用罔替以資密佑乃於中外多置寺社所謂碑補是已演福實據城中闉闠之側本號唐寺方言唐與大相似亦謂大寺為屋最巨至千餘楹內鑿三池九井其南又起五層之塔以應風水其說備載舊籍茲不贅陳王氏享國五百年屢更喪亂寺之興廢殆非一次此塔之壞不知的在何時至恭愍王欲營之而未就後有狂僧長遠心者夤緣權貴擾民伐財卒亦罔成恭讓君賴將相之力復祖宗之緒即位以來事佛益力爰命僧天圭等募工興役辛未二月始事掘舊址填木石以固厥基迄今乃竪縱橫六楹克壯且廣纍至五層覆以扁石將訖厥功憲臣有言而中轍惟我主上殿下以神武之資獲天人之應奄應大寶誕主民社至仁好生大德育物羣賢勵翼治道熙隆百斃皆革萬化俱新凡可以裕國惠民之政靡有不舉以佛之道慈悲愛物可利邦國崇揚之法因守不廢其所以創始而樹鴻規貽謀而垂後裕者可謂宏且備矣於是董工益勤功乃告成實壬申冬十有二月也癸酉之春塗溉丹雘翬飛雲表鳥翔天際金碧眩耀輝映半空上安佛舍利中庋大藏下置毗盧肖像所以資福邦家永利萬世也夏四月設文殊會以落厥成上命臣記其始末臣聞浮屠之說樹塔所以表德隨其層數多寡以明德之高下也五層以上是佛塔也其言功德報應之說極為宏博故自阿育王而後歷代尊信締搆之無已也然梁達摩答武帝造寺造塔之問以為片無功德蓋為武帝不修心而費財力廢也今則財不編戶力不煩農民其為功德豈易量哉功德既勝報應益彰天人交慶幽明共賴推利澤於無窮綿景祚於罔極與國咸休萬世彌固信可期也臣拜手稽首獻詞曰浮屠之說興西域流傳四海因華譯其言報應甚宏博上下靡不勤祈福塔廟之談何巍嶪彌天之下遍六合新羅奉事最誠篤王氏遵守更無斁演福寺在闤闠經中有三池九井鑿其南有塔五層閣不知何代乃頽壓纍世重營竟不克運祚將衰焉可得惟我聖君大有德天與人歸膺曆服萬化俱新百弊革亦資佛教利邦國五層復建畢功役經營不擾農民力崢嶸突兀配松嶽輝映雲霞耀丹碧上安佛骨厥靈赫中庋大藏具萬軸下置毗盧備嚴飭功德最勝堪饒益聖君萬代奉宗祐景祚綿延千世億普令羣生霑利澤命臣作詞刻諸石臣詞蕪拙不可讀但願此塔無顛覆與國鞏固垂罔極太祖以即位之初重營古塔于伽倻山海印寺本塔之遺蹟在十王殿前今尚有破塔片莊嚴畢備仍與羣臣願成大藏以安于塔為福國利民之資此與高麗太祖建塔西京之事遙遙相對備考願成大藏御製文蓋聞經律論通名大藏佛教雖有方便萬殊要之指歸則不過乎戒定慧三學而已原其三學只在乎一心然則心與大藏三一俱圓矣况佛教妙理通三際亘十方其功德豈易量哉寡人蒙天地之祐祖宗之德獲膺推戴以即寶位惟念否德不克負荷尚賴佛教方便之力庶可以福先世而利羣生也肆於即位之初重營古塔莊嚴畢備仍與羣臣願成大藏以安于塔冀因密護法雲廣布羣物咸蘇福國利民兵韜世治萬世永賴此寡人之願也朝鮮國王李旦洪武二十六年癸酉七月日跋同願王顯妃王世子芳碩鎮安君芳雨永安君兼義興親軍衛節制使芳果定宗益安君芳毅懷安君芳幹靖安君芳遠太宗撫安君兼義興親軍衛節制使芳蕃寧安君良祐純忠佐命功臣興安君兼義興親軍衛節制使知壽筵事李濟特進輔國崇祿大夫判門下府事洪永通特進輔國崇祿大夫領三司事集賢殿太學士安宗源同德奮義佐合開國功臣特進輔國崇祿大夫門下左侍中判都評議使司吏曹事兼判尚瑞司事修文殿太學士監藝文春秋館事領經筵事世子師平壤伯食邑一千戶食實封三百戶趙浚同德奮義佐命開國功臣輔國崇祿大夫門下右侍中判都評議使司兵曹兼判尚瑞司事領經筵上洛伯食邑一千戶實封三百戶金士衡推忠協贊開國功臣崇祿大夫判三司事同判都評議使司上將軍尹虎純忠佐命開國功臣崇祿大夫商議門下府事同判都評議使司事兼判義興親軍衛事義安伯李和奮義佐命開國功臣崇政大夫門下侍郎贊成同判都評議使司事判戶曹事兼判尚瑞司事寶文閣太學士知經筵藝文春秋館事兼義興親軍衛節制使世子二師奉化君鄭道傳崇政大夫三司左僕射同判都評議使司事集賢殿大學士提點書雲觀事權仲和崇政大夫判開城府事同判都評議使司兼判司農寺司上將軍禹仁烈崇政大夫門下侍郎贊成事同判都評議使司判刑曹事上將軍崔永沚崇政大夫藝文春秋館大學士同判都評議使司事兼判司農寺事金湊正憲大夫參贊門下府事同判都評議使司事判禮曹事慶儀純忠佐命開國功臣正憲大夫參贊門下府事同判都評議使司事判工曹事兼兵曹典書鷹揚衛上將軍判衛事雞林君鄭熙咸正憲大夫參贊門下府事同判都評議使司事上將軍李居仁寶文閣學士知經筵事世子右賓客宜城君南玉嘉靖大夫中樞院副使都評議使司事上將軍具成孝嘉靖大夫商議中樞院事都評議使司事上將軍郭忠輔嘉靖大夫商議中樞院事都評議使李仁壽推忠翊戴開國功臣嘉靖大夫司憲府大司憲都評議使司事寶文閣學士安景恭嘉靖大夫中樞院副使司事兼工曹典書寶文閣學士柳亮輔國崇政大夫檢校門下侍中載寧伯康舜龍輔國崇政大夫檢校門下侍中成汝完輔國崇政大夫檢校門下侍中李茂芳輔國崇政大夫檢校門下侍中南乙蕃輔國崇政大夫檢校門下侍中李崇前同知密直司事金受益翊戴開國功臣通政大夫中樞院都承旨經筵集賢官寶文閣直學士充春秋館修撰官知吏曹事李稷翊戴開國功臣通政大夫中樞院左承旨經筵集賢官知兵曹事李勤翊戴開國功臣通政大夫中樞院右承旨經筵集賢官兼尚瑞莊知製教戶曹事韓尚敬通政大夫中樞院左副承旨經筵集賢官知禮曹事崔遠通政大夫中樞院右副承旨經筵集賢官知工曹事柳原之嘉靖大夫判內侍府事李得芬嘉靖大夫判內侍府事金師幸嘉善大夫同判內侍府事尹祥嘉善大夫同判內侍府事李匡通政大夫敬興府左司尹曹恂中訓大夫同知內侍府事金珖檢校判內侍府事李忠檢校判內侍府事孟天祿通訓大夫判內侍府事趙禾前濟州牧使呂禰平海郡夫人黃氏樂安郡夫人金氏竹山郡夫人全氏純忠佐命開國功臣正憲大夫參贊門下府事同判都評議使司事兼義興親軍衛節制使青海君李之蘭正憲大夫參知門下府事同判都評議使司事金立堅資憲大夫三司左僕射同判都評議使尹師德資憲大夫商議門下府事同判都評議使司事寶文閣大學士兼判內侍府寺事李恬奮義佐命開國功臣資憲大夫判中樞院事吏曹典書宜寧君南誾嘉靖大夫知中樞院事上將軍趙琳推忠協贊開國功臣嘉靖大夫知中樞院事都評議使司事趙胖純忠佐命開國功臣嘉靖大夫知中樞院事都評議使司事兼義興親軍衛同知節制使化寧君張思吉嘉靖大夫同知中樞院事都評議使司事上將軍朴永忠推忠佐贊開國功臣嘉靖大夫商議中樞院事都評議使司事兼義興親軍衛知節制使黃希碩嘉善大夫刑曹典書金希善楊廣道按廉使佐命開國功臣嘉善大夫禮曹典書趙瑛慶尚道按廉使翊載開國功臣保功將軍千牛衛大將軍沈孝生資憲大夫完山府尹柳珣通政大夫知陝州事李鞅中訓大夫南原府使尹會宗通德郎草溪郡事李洽承議郎高靈監務鄭淑道通德郎昌寧監務金潤德宣教郎溫水監務李虔奉直郎時興驛丞趙湖前禪教都總攝統判僧録司事海印寺住持國一都大師敬南奉翊大夫商議上護軍李宥星山郡夫人李氏棟梁禪德信源禪林寺住持萬雄香山中德覺蘇志寶天圭信成志禪信宗戒願達禪希志佛心海樞覺海志傳宗淵希全信連覺正王師妙嚴尊者以其先師指空懶翁掛真塔名祖派等事奏奉王旨以九月九日大設掛真佛事於廣明寺以次年甲戌三月三日於楊州天寶山檜巖寺浮圖雕塔名六月二十五日録載祖派于平山處林禪師之下重刊佛祖宗派之圖留板于難陀寺參考西天提納薄陀尊者浮圖銘并序前奉翊大夫知密直司事商議會議都監事右文館提學同知春秋館事上護軍臣韓修奉教書并篆額前朝列大夫征東行中書省左右同郎中推忠保節同德贊化功臣三重大匡韓山君領藝文春秋館事兼成均大司成臣李穡奉教撰迦葉百八傳提納簿陀尊者華言禪賢號指空見天子難水之上論佛法稱旨命有司歲給衣糧師曰吾不為是也去而東遊高句麗禮金剛山法起道場有旨趣還燕天曆初詔與所幸諸僧講法內庭天子親臨聽而諸僧恃恩頡頏作氣勢惡其軋已沮不得行未幾諸僧或誅或斥而師之名震暴中外至正皇后皇太子迎入延華閣問法師曰佛法自有聖者專心御天下幸甚又曰萬福萬福萬中缺一不可為天下主所獻珠玉辭之不受天曆以後不食不言者十餘年既言時時自稱我是天下主又斥后妃曰皆吾侍也聞者怪之不敢問所以久而聞于上上曰渠是法中王宜其自負如此何與我家事耶中原兵將興師於廣坐語衆曰汝識吾兵馬之多乎某地屯幾萬師所居寺皆高麗僧一日忽語之曰汝何故叛耶欲鳴鼓攻之而止數日遼陽省馳奏高麗兵犯界京師者衆之聚也每語其人曰速去之既而天子北狩中原兵入城立府曰北平師豈偶然者哉師自言吾曾祖諱獅子脅吾祖諱斛飯皆王伽毗羅國吾父諱滿王摩竭提國吾母香至國公主吾二兄悉利迦羅婆悉利摩尼吾父母禱于東方大威德神而生吾吾幼也性樂清淨不茹酒葷五齡就師受國書及外邦之學粗通大義棄去父病醫莫效筮者曰嫡子出家王病可痊父詢三子吾即應父大喜呼吾小字曰婁怛囉哆婆乃能如是耶母以季故初甚難之割愛願捨父疾立愈八歲備三衣送那蘭陀寺講師律賢所剃染受戒學大般若有得問諸佛衆生虛空三境界師云非有非無是真般若可往南印度楞伽國今之錫蘭島也吉祥山普明所研窮奧旨時年十九奮發獨行禮吾師于頂音庵師曰從中竺抵此步可數否吾不能答退坐石洞六閲月吾乃悟欲起兩腳相貼其王召醫圭藥立愈告吾師曰兩腳是一步吾師以衣鉢付之摩頂記曰下山一步便是獅子兒我座下得法出身二百四十三人於衆生皆少因緣汝其廣吾化其往懋哉號曰蘇那的沙野華言指空吾以偈謝師恩已語衆曰進則虛空廓落退則萬法俱沉大喝一聲初吾之尋吾師也歷囉囉許國有講法華者吾說偈解其疑且囉國男女雜居祼形吾示以大道香至國王聞吾至喜曰吾甥也扳留不肯華嚴師廣說二十種菩提心吾喻一即多多即一迦陵伽國海岸龜峯山梵志居之其語曰万丈懸崖投身而死當得人天王身吾曰修行在心何與於身令修六度十地等法結夏摩利支山乃至楞伽國焉既辭吾師而下山也無縫塔主老僧半路相迓知吾有得也請吾演法吾頌塔而去于地國主信外道以吾有殺盜邪淫之戒召妓同浴吾怗然如亡人王歎曰是必異人也其外道以木石作須彌山人於頭胸腿安立一山以酒膳祀山男女合於此名陽陰供養吾舉人天迷悟之理勘破邪宗泥理國主信佛吾以偈白之王答以偈吾復偈之主施以珍珠數珠會中有尼越衆問曰彼師此第中間是誰吾一喝尼大悟有針眼中象王過之頌師子國有如來鉢佛足跡一鉢飯能飫萬僧佛跡時放光明吾皆瞻禮麼哩囉國信梵志吾不入哆囉縛國正邪俱信吾據座下語有尼默契迦羅那國亦信外道其王見吾喜甚吾示以大莊嚴功德寶王經摩醯首羅王因地品王曰法外更有正法外道欲害吾吾即出城日已黑有虎至侍者知鳥音升木以避吾曰汝既知禽語吾所說法能知否侍者無語痛行三十棒乃悟神頭國流沙茫茫不知所適有樹其實如桃飢甚摘食二枚未竟空神勾到空居廣殿老人正座云賊何不作禮吾曰吾佛徒也何得禮汝老罵既稱佛徒何偷果為吾曰飢火所逼老人曰不與而取盜也今且放汝其善護戒使閉目須臾已至彼岸煎湯臥木之上乃大蟒也的哩囉兒國女求合以飢欲求食若將許之而問其馬良者以實告吾即騎之而走果如飛便至他境忽一人縛吾去使牧其羊會大雪入洞入定七日夜白光出洞其人除雪而入見吾趺坐大喜施以衣寶不受男女俱發心示吾正路行且久未見人忽遇諸途心甚悅其人捉吾至王前面跪曰天旱必此奴也請殺之王曰且縱之三日不雨殺何遲吾燒香一祝大雨三日嵯楞陀國有顛僧見人來以牛頭三列於地置蒲團其上默而坐吾一見火之彼曰山河大地成一片矣阿耨池僧道巖居其傍以草作小庵人來則焚之呌曰救火救火吾至呌救火踢倒淨瓶道巖曰可惜來何遲末羅娑國事佛佛勤而邪正雜糅吾說破邪論外道皈正矣城東寶和尚墾其所居四面為田置菜種一器人至則治田而已無一言吾以菜種從而下之僧呌曰菜生矣菜生矣其城中有織紗者人至不言織不撤吾以刀斷之其人曰多年之織畢矣阿耨達國僧省一居窑中見人來以煤烟塗面出舞而復入吾以偈相喝早沙國僧納達居道傍數年見來者曰好來見去者曰好去吾便與三棒彼回一拳的哩喉的國婆羅門法盛行吾縮手而去挺佉哩哩國真邪同行遇盜裸剝禰伽羅國王迎入內請說法有寶峯者說經吾與之互相宣說東行數日有高山曰鐵山無土石草木日照朝陽其熱如火又名火𦦨行十八日可達山頂有國土凡十七八所橫接天其北不知其幾千萬里其東河水出焉兩岸高聳架橋以渡冰雪不消故號雪山孤身飢窮啖野菜以達西蕃之境焉吾之行化于中國也遇北印度摩訶班特達於西蕃偕至燕京居未久西遊安西王府與王傅可提相見提請留學法吾志在周遊語之曰我道以慈悲為本子之學背是何也提言衆生無始以來惡業無算我以真言一句度彼超生受天之樂吾云汝言妄也殺人者人亦殺之生死相讎是苦之本提曰外道也吾云慈悲真佛子反是真外道王有獻却之西蕃摩耶提城其人可化呪師疾吾以毒置茗飲適使臣至自都請吾同還欲師班特達互為揚化不契又去伽單呪師欲殺吾吾乃去蝦城主見吾大喜外道妬之打折吾一齒及將去欲要於路必殺之其主護送蜀禮普賢巨像坐禪三年大毒河遇盜又赤立而走羅羅斯地界有僧施一禪被有女施一小衣乃應檀家供同齊僧得放生鵝欲烹而食之吾擊其婦婦哭僧怒見逐吾聞土官塑吾像水旱疾疫禱必應金沙河關吏見吾婦人衣髮又長怪而問奚自吾言語不通書西天字又非所知也於是留之晚隈石隙而臥不覺少間至彼岸渡子異吾禮拜雲南城西有寺正門樓入定居僧請入城至祖變寺坐桐樹下是夜雨既明衣不濡赴其省立應坐夏龍泉寺書梵字般若經衆聚乏水吾命龍引泉濟衆大理國吾却衆味但食胡桃度日金齒烏撤烏蒙一部路也禮吾為師塑像廟之吾聞無賴子以吾像禪棒擲之地而不能舉悔謝取安如故安寧州僧聞昔三藏入唐伙土知香時吾已會雲南語應曰古今不同聖凡異路請說戒經燃頂焚臂官民皆然中慶路諸山請演法凡五會太子禮吾為師羅羅人素不知佛僧吾至皆發心飛鳥亦念佛名貴州兄帥府官皆受戒猫蠻猺獞青紅花打牙獦狫諸洞蠻俱以異菜來請受戒鎮遠府有馬王神廟舟過者必肉祭不然舟損吾一喝放舟行常德路禮金剛白鹿二祖師觀音自塑之像洞庭湖靈異頗多能作風雨吾行適風作浪湧為說三皈五戒唐梵互宣先時祭者夜獻絲屨明則屨皆破後皆却其獻從素祭湖廣省參政欲逐吾去吾曰貧道西天人也遠謁皇帝助揚正法汝不欲我祝皇帝壽耶過廬山東林寺見前身塔猶巋然骨猶未朽淮西寬問般若意吾曰三心不可得楊州太子以舟送吾至都大順丞相之室韋氏高麗人也請於崇仁寺施戒既已至濼京泰定之遇是已嗚呼師之游歷如是哉信乎其異於人也師自天曆褫僧衣大府大監察罕帖木兒之室金氏亦高麗人也從師出家買宅澄清里闢為佛宮迎師居之師題其額曰法源寺蓋天下之水自西而東取以自比焉師辮髮白髯神氣清瑩服食極其侈平居儼然人望而畏之至正二十三年冬內侍至師曰為我奏爾主我生日後去耶生日前去耶章佩卿速奇帖木兒回旨留師少住一冬又曰天壽寺吾影堂是歲十一月二十九日示寂于貴化方丈師所搆而師所名也有旨省院臺百司具儀衛送龕于天壽寺明年御史大夫圖堅帖木兒平章伯帖木兒函香謁師用香柒泥布梅桂水團塑肉身戊申秋兵臨城茶毗四分達玄清慧法明內正張祿吉各持而去其徒達玄航海大司徒達睿從清慧得之俱東皈壬子九月十六日以王命樹浮屠於檜巖寺將入塔灌骨得舍利若干粒師自西天携文殊師利無生戒經二卷而來參政危大朴序其端手書圓覺經歐陽丞旨跋其尾師之偈頌甚多別有録者行于世雲南悟無見能言七歲投師出家時已云師年甲子一周矣悟七十五而師乃寂以吉文釋仁杰云門人前林觀寺住持達蘊謀載道行愈久而愈廑司徒達睿間關數千里奉師骨如事存以致送死無憾焉懶翁弟子覺鋒曰吾師嘗師師師吾祖也與師之弟子精業院住持比丘妙藏買燕石將樹之檜巖之崖揆諸天屬不曰孝子順孫歟事聞于內有旨臣穡銘臣修書臣仲和篆額臣穡曰師之身既火而四分之矣未知其餘立塔於何地而求銘以謀其傳者誰歟又未知指空師在此歟在彼歟無亦視為禪蛻不復顧籍而為其徒者思報其恩強而為之歟臣於是不能無憾祇栗承教系之以銘銘曰維師之迹發軔西域滿王之子普明之嫡濼京遇知允也其時延華之訪云何其遲回視我轍靡國不歷屋建之瓴水投之石天曆幸僧拂我以增服今之服道譽愈騰狂言戲謔匪人收測談兵未釁如析白黑先見之明乃道之精或疑或謗師心則平舍利既赫罔不竦息孰謂人性不協于極胥斯檜巖樹石以劖無敢或訛于永厥監宣光八年戊午五月日立甲戌三年明洪武草七年佛紀二四二一年定都于漢陽建宮闕王師無學相之也備考五山說林車天輅號五山太祖得無學待以師禮仍問定都之地無學乃卜漢陽以仁王山作鎮白嶽南山為左右龍虎堪輿家謂在左之山曰青龍在右之山曰白虎鄭道傳難之日自古帝王皆南面而治未聞東向也無學曰今不從則垂二百年當思吾言王命都堂曰佛氏之道當以清淨寡欲為宗今住寺院者務營産業至犯其所謂色戒恬不知愧身死之後其弟子有以寺社及奴婢稱為法孫相傳以至相訟豫自潛邸思革其斃其令有司勘究以聞王為王氏宗族發誓願俾以金書妙法蓮花經三部令薦冥福備考別願法華經跋語權近撰上即位三年秋八月有日都承旨臣尚敬傳旨于臣近若曰豫以否德迫於羣情推戴代王氏以有國兹不獲已慚德是多將欲保全其族與國咸休不期小腆反生疑懼潛謀不軌自速覆亡臣寮耆舊咸請舉法豫不敢違深用悼焉斯豈豫本心哉既不得並生於斯世宜當導冥遊於彼岸爰發誓願俾以金書妙法蓮花經三部欲令王氏宗族普及法界含靈俱仗真庥速證妙果又念茲經之成所費雖小皆出民力不可不慮冀推餘澤以利臣民而已非敢為寡躬祈福也爾筆豫之意以志卷末以天台宗僧祖丘為國師飯僧百人于內殿行國師封崇禮仍賜鞍馬乙亥四年明洪武草八年王為前朝諸王氏施田百五十結於南海郡牛頭山見巖寺每年二月十日降內香行水陸齊輿地勝覽尚玄曰南海者必是諸王氏登舟移岸之處秋七月初七日沙門智泉入寂備考彌智山龍門寺諡正智國師碑銘并序資憲大夫花山君臣權近奉教撰洪武二十八年乙亥秋七月初七日高僧泉公示寂于天磨山之寂滅菴茶毗既有日夢于其徒志修曰爾何棄舍利不收即驚起告其徒奔往茶毗之所得舍利無算光甚明瑩山中諸衲競集來禮頂戴感冒嘆未曾有上聞而異之追贈正智國師門人祖眼等就彌智山龍門寺置浮圖安骨又欲立碑紀德戊寅之夏乃奉狀以聞上命臣近文之近退而詢諸祖眼師諱智泉俗姓金氏載寧人考諱延司宰副令妣尹氏義城府士族以元泰定甲子生年十九祝髮于長壽山懸菴寺初不學文字直參禪旨後學楞嚴不甚曉又學南明文若有得於是更究嚴大義了然質諸講師往往有學解所未到處講師乃服至正癸巳與今王師無學俱入燕京謁指空于法源寺時懶翁先入燕受指空印可道譽既著二師皆投師之同遊參訪所造益高又往五臺山謁碧峯和尚有名士趙氏仲穆為書竺源古篆二大字以贈師之號也丙申還國遊歷諸大名山所至必獨屏一室不隨衆會常寡言笑謹重而已或有咨其道要則隨問而應言希以究不問則不言衆頗以老故敬之而已未嘗知有異德也懶翁無學相繼有重聲為王者師大振宗風四衆奔波靡無趨向而公獨韜光晦迹潛隱雲山未嘗一領衆會一主講席事修內朗至老無倦示寂之夕與侍者訣趺坐而逝及顯舍利之然後衆服其德以為真得道者也春秋六十二臘五十四豫嘗聞浮屠氏既覺來者聖解俱泯混迹塵凡異類中行師真其人歟佛法以寂滅為宗以清淨寡欲為道而世所稱法師者顧乃廣張罪福誘集士女僵然以受供施而不辭紛闌侈靡罔有紀極於是寂滅寡欲之道如何惟公不然高絶自守隱默不彰是真得於其道者也祖眼事師三十年今觀其人質愨無文其言甚訥是亦其師之徒歟浮圖有碑自唐已然其師必大顯於世其徒亦大盛於時者之所為也師而不耀徒亦單寡尚欲光昭其師之德拳拳致力而不辭如祖眼者古蓋未有焉是可嘉臣承上命敢不敬銘銘曰卓彼泉公默契其妙跡泯外彰智融內照始訪于遠終晦于隱匪覺其覺無聞之聞鳥絶含花人孰知德惟舍利存厥靈以赫伐石以藏于山之陽密護邦國永鎮無疆洪武三十一年戊寅十二月日立丙子五年明洪武草九年佛紀二四二三年正月始築都城九月乃畢十一月移都漢陽參考八域志云無學傳云欲築外城未定周圍遠近一夜天下大雪如城周而外積內消太祖命從雪立城即今城形也丁丑六年明洪武三十年佛紀二四二四年正月甲寅葬神德王后于皇華坊北原即今京城貞陵洞英國總領事館又創興天寺於塋域之東追冥福也役告成及期而小祥張皇法采以落厥成賜田千結用充供費以為禪宗備考貞陵願堂曹溪宗本寺興天寺造成記權近撰惟洪武丙子秋八月戊戌我小君顯妃康氏薨上心傷悼命有司追諡尊號曰神德王后卜葬得王宮之西南數里之近岡巒朝抱風水應吉越明年丁丑正月甲寅葬于貞陵於塋域之東創寺曰興天追冥福也未期年而役告成佛殿僧寮門廊庖湢凡以楹計者一百七十餘間榱棟輪奐金彩炳耀及期而小祥張皇法采以落厥成賜田千結用充供費俾為曹溪宗本社置僧堂坐禪永為恆規九月丁丑上命召臣近若曰豫在潛邸勞勤中外暨化家為國之日惟神德內助實多及蒞萬機亦勤規益奄爾遷逝針言莫聞如失良佐豫甚悼焉冀其利往創立兹寺又欲推擇福國利物永世無窮宜昭此意垂示於後爾其文之臣近拜手稽首言曰自昔王者受命造邦亦莫不有配匹之賢以助其德故王化之行咸繇內妃夏之塗山商之有莘周之妊姒籣策稱美輝映千古恭惟我神德王太后天賦貞嘉躬行節儉夙彰坤順克配乾剛孝敬盡於宗祀禮式著於閨門正妃基關睢之化逮下得樛木之仁夙夜匪懈警戒無違不溺宴安不聽私謁裨贊王業篤生元良以興一代之溺以立萬世之本淑行懿範誠無愧於古之賢后奚宜享斯祐而遽然棄世玉貌永閟香魂莫追宸心慟壼政之虧臣庶歎母儀之缺褘褕韜光山陵掩耀雲愁月慘滿目而悲嗚呼痛哉竹帛之編金石之勒實可與塗莘妊姒之烈比賢並德流耀罔極顧臣詞拙不足以模寫萬一承命戰悸罔知攸措若夫崇佛建寺果報之勝所願之欲莫不響應普利人天饒益無垠如佛所說豈臣言語文詞所能形容故不贅及參考建寺之越明年戊寅興天寺主尚聰尚聰乃太古門人見于圓證國師碑在大禪師之列上疏曰禪是佛心教是佛語其所以壽君福國安民則一恭維殿下以宿願力相地建都百廢既修庶職已和於都城之內創立佛寺寺號興天修禪本社其敬信佛祖望報龍天之意至深切而爰命山野僧尚聰住錫臣敢不精白此心弘揚正法以盡祝釐之職哉夫佛寺門中人參禪為最若上根人不日成功發明大智其或未然正舉話頭之際佛祖歡喜龍天敬信前朝之季禪與教利名是叨爭占名剎其修禪衍教處僅存一二豈邦家創立裨補之本意祖師真覺有言曰禪道延國祚智論鎮鄰兵夫豈無徵而欺我哉願殿下届自今於禪教之中擇有道德才行可為領袖者主諸名剎而使宗禪者說禪秉拂主教者講經談律令其後進禪則傳燈教則經律論疏追節講習積以年月宏才碩德無寺無之雖然既定本寺則其中外名剎宜仿松廣之制皆本寺之屬互相紏察則其於作法祝釐雖欲陵夷不可得爾比來作法之規皆慕華僧而不得其全所謂畫虎不成反類狗者也臣謹按松廣祖師之遺制講而行之著為常法且使僧徒薰修朝夕庶幾上報殿下弘道之恩伏望頒於中外垂於不朽則不萬萬利於邦家者乎王從之津寬寺水陸社成九月二十四日癸酉王親幸觀之備考水陸社造成記權近撰報本追遠王政之所先濟物利生釋教之所重二者雖殊皆人心之發而慈孝之誠所不能自已者也昔者聖帝明王之道尊祖敬宗以廣其孝博施濟衆以廣其仁其所以報本者可謂至而利物者可謂弘矣佛氏之說以為人死不滅隨其所成善惡輪轉受生而佛能以慈悲拔苦與樂濟其淪溺生者若為事佛飯僧以導其和則死者之靈飢可得飽苦可得樂以至成佛永免輪轉之報而生者亦蒙饒益於是孝子慈孫以至愚夫愚婦莫不靡然而歸於佛猶恐不逮舉世滔滔是崇是尚水陸無遮平等之會尤其法之最勝者也洪武丁丑正月乙卯上命內臣李得芬沙門臣祖禪等若曰豫有邦家惟賴祖宗積慶圖報先德靡所不力又念臣民或死王事或自殞命而無主祀飢餓顛倒於冥冥之中而莫之救豫甚愍焉欲於古剎為建水陸道場歲設以追祖宗冥福且利羣生爾往相之越三日丁丑得芬等與書雲觀臣尚忠達沙門臣志祥等相自三角山至道峯山復命曰諸剎不及津寬寺之勝於是上令置道場於是爰命大禪師德惠志祥等召集僧徒以事營作內臣金師幸尤致力焉以其月庚辰始興其役二月辛卯上親臨定其三壇位次三月戊午又幸觀之至秋九月功乃告訖三壇為屋皆三間中下二壇左右各有沿室三間下壇左右別置祖宗靈室各八間門廊廚庫莫不備設凡五十有九間不侈不陋以中厥度是月二十四日癸酉上又親臨命召臣近記其始末以示後世戊寅七年明洪武三十一年佛紀二四二五年五月丙辰幸龍山江大藏經板輸自江華禪源寺戊午雨令隊長隊副二千人輸經板于支天寺秋撫安君芳蕃死時年十八上悼念二殤二殤謂芳蕃及芳碩屢幸僧舍以資冥福托安君墓碑慶順公主嫁興安君李濟芳碩之亂濟亦死上親臨剃公主髮泫然流涕海東樂府參考燃藜室述記神懿王后韓氏誕六男定宗序居第二太宗居第五神德王后康氏生芳蕃芳碩及慶順公主王以愛故立芳碩為世子鄭道傳南誾等附芳碩忌諸王子謀欲去之太宗知之率武士覘鄭道傳等方會于南誾妾家明燈歡笑使人縱火焚其屋道傳走匿其鄰軍人搜出執詣太宗前太宗曰爾既負王氏又欲負李氏耶立斬之誾潛匿隱於彌勒院圃幕追兵殺之翌日百官啓道傳誾等之罪且請改封世子芳蕃芳碩皆誅死李太宗行唐太宗故事也是年太祖傳位于定宗駐蹕咸興五山說林云芳蕃芳碩之亂太祖遜于咸興有一老夫乃太祖鄉舊也手携隻雞斗酒來慰太祖醉後口占一絶曰休道騰鱗北海間莫言今日錦衣還我行不是歌豐沛却愧明皇蜀道難太祖始遜于德源又如咸興恭定大王遣使問候冠蓋相望太祖見必殺之時謂一去而不復還者曰咸興差使便成俗諺死者相續時人不痛無辜而傷太祖無以為心也恭定欲請回駕不知所出有人曰無學得能之恭定物色求之固請無學曰父子之間寧有是耶余將何言不以介意久之無學不得已從之太宗資以行至咸興謁見太祖怒曰汝為某也遊說耶無學笑曰殿下何不亮耶貧道與殿下相識幾年今日特為殿下一慰耳太祖顏色稍和因留與宿無學語未嘗不言太宗之短如此數十日太祖以無學為不與太宗者益信之後數十日無學侍太祖同宿夜半無學說太祖曰某也誠有罪過然殿下愛子盡已殲矣只有此人若棄絶之殿下平生辛苦之大業將託之誰也與付他人無寧我之血屬乎願三思之太祖頗然其言遂有回鑾之意無學因勸急還然太祖不欲入城初戾于逍遙山留數月遂幸豐壤因築宮而居之參考逍遙山記許穆記逍遙山楊州治北四十里不及大灘津二十里為王方西麓別山谷口內外山下人相傳王宮遺墟二處荒草中有石砌數重而已此永樂間太上太祖也行宮云去京城百里豐壤宮又百里谷口有廢井石欄入山中山皆石為石巒為石洞為石磴為石梁山木多松多楓多躑躅宮墟南山石極高峻最上有白雲臺少下有中白雲又少下東北下白雲在中臺上宮墟上有瀑布高八九仞其下從陰崖上中臺最大剎今皆墟矣瀑布傍當石絶十餘仞橫木為梯上元曉臺過元曉臺有逍遙寺逍遙壁記云新羅僧元曉住此山後三百年甲戌麗僧覺圭奉太上旨築精舍二百年癸酉精舍燬明年甲戌關東僧覺玲重作佛殿僧寮牧庵記云元曉當新羅太宗文武之世曆年紀自新羅太宗至我康獻大王太祖也甲戌七百六十七年又至萬歷甲戌百八十年記曰三百年何也東隅觀瀑布其上有大石起立臨壁五六丈巖壁間石竇石泉涓涓元曉并也李奎報詩曰循山渡危橋疊足行線路上有百仞巔曉聖來結宇靈蹤渺何處遺影留鵝素茶泉貯寒玉酌飲味如乳此地舊無水釋子難棲住曉公一來寄甘液湧巖竇登臨巖壁循絶壑石上望九峯皆山石奇處從中峯石竇出懸庵東南登義相臺最高為絶頂其北獅子庵從谷口遇瀑布緣崖上義相臺九千丈十月山深谷陰朝雨後溪石緑苔如春風葉不枯四年癸卯十月己亥孔巖眉叟記尚玄曰觀乎新羅聖僧創寺之古蹟朝鮮太祖行宮之遺墟及夫高麗李相國之題詩朝鮮許文正之撰記逍遙山洵海東之一名所也但近來山之諸寺皆廢而獨於大石起立五六丈處石竇流泉即元曉井傍數畝之地舊有靈源寺向因土匪焚燒殆盡有水落山德寺僧姓李名濟菴者得檀越尚宮申氏之施助重建之而額曰逍遙山自在菴今濟菴已化而居僧尚有五六人鍾魚以響焚修不怠山木以養風致菀然自京元鐵道成寺距東頭驛僅十里自是來遊者相續不絶焉丙辰秋東頭川金常侍漢宗招余與李杞堂居士熙穆遊逍遙山共賦矗矗巖巒造化痕曉公臺上訪靈源山回北角藏深寺驛指東頭隔遠村雲想翠華成舊夢風吹黃葉動秋魂茲遊勝似楊州鶴不覺逍遙趁夕昏定宗恭靖王李曔初諱芳果在位二年己卯元年明建文元年佛紀二四二六年王命重新長湍郡五冠山聖燈菴納田百結奴婢十六口菴之重新已在戊寅孟春至是年十一月命權近為文以記之文見別録太上王命重建五臺山中臺之獅子菴冬十有一月親臨以落成之備考權近記云建文三年春正月辛巳啓運神武太上王殿下令內臣判內侍府事李得芬命召參門下府事臣權近傳旨若曰豫嘗聞江陵府五臺山奇秀之稱自古而著思置願剎以植勝果久矣去年夏有老衲雲雪嶽自是山來告曰山之中臺有菴曰獅子國之裨補也據臺之陽上下是臺者所共由歷創久而廢遺基尚存觀之歎傷苟是之重營衆心欣處必倍他所矣豫聞而悅遣工起三楹所以安佛寓僧也下置二間所以為門與洗閣也規模雖小形勢宜欲其稱而不侈大也功既告訖冬十有一月親臨之以落其成蓋為追福先逝推利後世物我均霑幽冥共賴云爾卿宜為文以示永久臣近竊維佛氏之道慈悲濟物其說甚博自漢以來時君世主靡不尊信恭維我太上王殿下以神武之資應運開國奄有東方以布維新之政深仁厚澤貽謀垂裕可謂至矣厭煩萬機傳付聖嗣專心佛乘孜孜奉信以至窮山絶項之上亦且訪問舊址以建精藍不遠千里親勞玉趾以賜巡臨林壑增輝烟蘿動色自有此山以來所未嘗有也昔新羅二王子來入此山至今傳道為美談况今殿下以創業之主太上之尊遠駕乘輿以親臨幸哉自今以往山翁野叟稱道洋洋以增此山之重當與軒轅之遊具茨穆王之到瑤池儷美並稱於無窮矣尚玄按果川郡今始興郡冠嶽山戀主臺羅漢法堂重修記洪武壬申太祖親臨冠嶽山頂築臺祈福作圓覺戀主二寺又按俗離山法住寺記太祖龍潛時親設百日祈禱於上歡菴任實郡上耳菴亦有太祖親臨所禱之事蹟則權近所謂窮山絶頂訪問舊址以建精藍等語其殆有所據也太宗恭定王李芳遠在位十八年辛巳元年明建文三年改號咸興府淨水寺寺在石茸峯下有太祖龍潛時讀書之堂為雪峯山歸州寺見歸州寺事蹟秋太上王捨德安殿為興德寺是為教宗備考輿地勝覽漢城府興德寺在東部燕禧坊是為教宗又德安殿記權近撰建文三年夏太上王命相地於潛龍舊邸之東別搆新殿秋功告訖乃命臣近若曰高麗太祖統一三韓以其私第為廣明奉先二寺圖利國也豫以否德代有邦家仰惟前代時若將以此殿捨作精藍永作世世圖福之所思以上福先世下利羣生宗社永固埀統無疆故於正殿揭釋迦出山之影又於北楣為庋其上中安密教大藏一部東置新造大字楞嚴板本西藏新雕水陸儀文板本開庶左右以便禪講傍起小閣俯臨方沼廚庫門廊具置宜處功雖劣於側金願則周於轉輪冥冥沾益昭昭獲利推福無限傳祚圓極竟脫凡塵證明正覺是所期也爾宜作記傳示後世俾萬世子孫守而勿替臣近承命稽首而退謹記是歲太上王親臨雪峯山釋王寺備考西山大師雪峯山釋王寺記太祖在潛邸時訪見異僧無學于雪峯山土窟中問曰夢入破屋中身負三椽而出又夢花落鏡墜此何祥也無學賀曰此皆將作君王之夢非常夢也身負三椽者乃王字也花飛終有實鏡落豈無聲花鏡亦促王業之夢也僧熟視曰公有君王之相公今日事慎不出口此一片地建一剎名曰釋王至佳至佳芝峯類說及藥泉集皆同此說又曰大事不可速成限三年設五百聖齊潛祈則聖僧必助王業耳太祖從其言而行之云云涵月海源和尚後跋云康獻聖祖潛邸時神僧無學既釋吉夢又告冥驗於是遂起應真殿即羅漢殿因設五百聖齊所謂天真真歇二堂仁智寮龍飛樓等皆一時之營繕也登極之後命創巨剎樓殿寮舍宏麗輝煌甲於一道焉建文辛巳車駕親臨植松于洞種梨于園至今松木之禁斷玄梨之進御者亦由其時之聖教也且夫藏護佛像印送經文至於奴婢之晝給田地之折授皆出曠世之殊典則其聖意眷戀于此者亦不尋常也云云尚玄按李太祖有釋王寺記文曰東北面都元帥完山府院君李成桂太祖初諱上元帥判密直司事姜筮副元帥唐城君洪徵助戰元帥前簽書密直司事商議柳源前知密直司事商議鄭夢周前密直副使李和太祖之胞弟義安大君也等於洪武十年辛祇王三年夏受命以來次于清州今北青郡聞大藏一部及佛像法器在海陽今吉州郡廣積寺兵火之餘僧亡寺毀大寶幾於盡失心實惻然遣中郎將金南運舟載以來補其所失若干函軸以成全部置于安邊府雪峯山釋王寺永為壽君福國之資云則太祖之尊重本寺於斯可知蓋因無學之言崇佛護法以冀冥助矣太祖微時有君王之相非但無學知之沙門惠澄亦已知之龍飛御天歌云太祖潛龍時相命師惠澄私謂其所親曰吾相人之命多矣無如李諱成桂者或曰賦命雖善位極於冢宰耳澄曰若冢宰何足道哉吾之所相者君長之命也其代王氏而必興乎太祖非但有君王之相命亦有君王之氣象嘗與崔瀅作聯句崔先呼曰三尺劒頭安社稷太祖即應之曰一條鞭末定乾坤壬午二年明建文四年佛紀二四二九年書雲觀上言曰高麗太祖統三之初或者進言曰背山逆水之地置寺安佛設某道場則可以鎮安國家乃命有司隨地置寺量給田民後之君臣益信而創大伽藍各稱願堂施納田民由是五百年間京外寺社不可勝記於是禪教各宗爭執有田民之寺肥馬輕裘甚者溺於酒色靡所不至寺雖數千僧雖數萬其所行如此雖其道儻有福國之理何有一毫之補哉古人有言曰國無三年之積國非其國又曰暴師久則國用不足以今之蓄積觀之數萬之兵一年之餉尚且不足萬一興師動衆將何以應之伏願其付密記京外七十寺外諸寺土田之租永屬軍資奴婢分屬諸司上從之乙酉五年明永樂三年佛紀二四三二年王師無學入寂于金剛山之金藏菴備考朝鮮王師大曹溪宗師禪教都總攝傳佛心印辨智無礙扶宗樹教弘利普濟都大禪師妙嚴尊者塔銘并序嘉善大夫藝文館提學同知經筵春秋館事兼判內瞻寺事臣卞季良奉教撰嘉靖大夫檢校漢城尹寶文閣提學臣孔俯奉教書并篆額我太祖之元年冬十月師以召至松京太祖以是月十一日誕辰具法服若器封為王師大曹溪宗師禪教都總攝傳佛心印辨智無礙扶宗樹教弘利普濟都大禪師妙嚴尊者兩宗五教諸山衲子皆在焉師升座拈香祝釐已竪起拂子示大衆曰這箇是三世諸佛說不到歷代祖師傳不及底大衆還會麼若以心思口舌計較說話者何有吾宗復於上曰儒曰仁釋曰慈其用一也保民如赤子乃可為民父母以至仁大慈蒞邦國自然聖壽無疆金枝永茂社稷康寧矣今當開國之初陷於刑法者非一願殿下一視同仁悉皆宥之俾諸臣民共臻仁壽之域此我邦家無疆之福也上聞而嘉之即宥中外罪囚時韓山牧隱李文靖公以詩贈師有聖主龍飛天王師佛出世之句上以檜巖寺懶翁所居大道場命師入焉丁丑秋命造塔于寺之北崖師師指空浮屠所在也戊寅秋師以老辭歸居于龍門壬午五月今我主上殿下又命入檜巖明年正月又辭入金剛山以乙酉九月十一日示寂越三年丁亥冬十有二月厝師骨于檜巖之塔又四年庚寅秋七月上王以太祖之志言於上上命臣季良名其塔且為銘臣季良謹按其弟子祖琳所撰行狀師諱自超號無學所居曰溪月軒壽七十九法臘六十一俗姓朴氏三岐郡在嶺南人也考諱仁一贈崇政門下侍郎母固城蔡氏夢見初日射懷中遂有娠以泰定丁卯後九月二十日生始免襁褓便行掃除及就學人莫敢先年十八脫然有出世之志依慧鑑國師上足弟子小止禪師剃髮具戒至龍門山咨法于慧明國師法藏國師示法已乃曰得正路者非汝而誰遂令居浮圖菴一日菴中失火師獨靜坐如木偶人衆異之丙戌冬因看楞嚴經有悟歸以告其師師加稱歎自是廢寢忘餐專於參究己丑秋抵鎮州吉祥寺居焉壬辰夏住妙香山金剛窟功益進或睡則若有擊鍾磬以警焉者是時釋然了悟汲汲有求師就質之意癸巳秋挺身走燕都參西天指空禮拜起云三千八百里親見和尚面目空云高麗人都殺了也蓋許之也衆乃大驚次年甲午正月到法泉寺參懶翁懶翁一見而深器之遊霧靈歷五臺再見懶翁於西山靈巖寺留數載其在定也至有當食而不知者翁見之曰汝却死了耶師笑而不答翁一日與師坐階上問曰昔趙州與首座看石橋問是什麼人造首座答云李膺造州云向什麼處先下手首座無對今有人問爾如何秪對師即以兩手握階石以示之翁便休去其日夜分師入翁室翁云今日乃知吾不汝欺也後謂師曰相識滿天下知心能幾人爾與我一家矣又曰道之在人如象之牙雖欲藏之不可得也他時爾豈為人前物乎師之質其所得殆無可疑然而游歷山川參訪師友之志蓋未已也將遊江浙適南方有變路梗乃止丙申夏欲東還告辭翁手書一紙送行曰觀其日用全機與世有異不思善惡聖邪不順人情義理出言吐氣如箭鋒相拄句意合機似水皈水一口吞却賓主句將身透過佛祖關俄然告行豫以偈送云已信囊中別有天東西一任用三玄有人問爾參尋意打倒面門更莫言師既還懶翁亦以指空三山兩水授記還國住天聖山元曉菴己亥夏師往見翁以拂子與之翁在神光寺師亦往焉翁之徒有忌師者師知而去之翁謂師曰衣鉢不如言句以詩遺師云間僧輩起人我心妄說是非甚不然也山僧以此四句之頌永斷後疑分襟別有商量處誰識其中意更玄任爾諸人皆不可我言透過劫空前師入高達山卓菴自守辛亥冬前朝恭愍王封懶翁為王師翁住松廣以衣鉢付師師以偈謝甲辰夏翁移錫檜巖大設落成會馳書召師以充首座師力辭翁曰多管不如多退臨濟德山不做首座來俾居便室翁逝矣師遊諸山志在晦藏不欲人知前朝之季召以名利至欲封為師師皆不至卒有壬申之遇師之去就豈偶然哉歲癸酉太祖欲相土建都命師隨駕師辭太祖謂師曰古今相遇必有因緣世人所卜豈若道眼巡幸雞龍山及新都新都謂漢陽也師皆扈從其年九月師以先師指空懶翁二塔名及掛懶翁真事奉塔名於檜巖大設掛真佛事於廣明寺自製真讚云指空千劒平山喝選擇工夫對御前最後神光遺舍利三韓祖室萬年傳十月國設轉藏佛事於演福寺命師主席師自戊寅辭退之後倦於待衆雖以上命復住檜巖旋入金剛山真佛菴乙酉春有微疾侍者欲進醫藥師却之曰八十有疾何用藥為夏四月移于金藏菴師其示寂處也八月義安大君致書師答書有山居邈亦會謁無期他時異日佛會相逢之語謂大衆曰不久吾逝矣已而果然始師疾革僧問四大各離向甚處去師云不知又問師厲聲云不知又僧問和尚病中還有不病者也無師以手指傍僧又問色身是地水火風總歸磨滅那個是真法身師以兩臂相拄云這個是一個答已寂然而逝夜半也時華嚴釋贊奇在松京法王寺夢見師立空中佛頂蓮花之上佛與蓮花其大彌天覺而心異之與寺衆說其夢聞者疑其非常未幾訃至即其夢時也師所著曰印空吟文靖公李牧隱也序其端印成大藏安于龍門文成公跋其尾師性尚質不喜文飾自奉甚菲餘輒施捨嘗自言曰八萬行中嬰兒行為第一凡所施為無不相若者且接人之恭愛物之誠出於至心非有所勉蓋其天性然也臣季良謹拜稽首而名其塔曰慈智洪融且系以銘銘曰師之道卓匪夷所思禪覺之嫡聖祖之師師在平居嬰兒之如具眼之遇箭鋒相拄一鉢一衣謙謙自卑尊崇無對若固有之或去或就先見不苟天錫佛壽七旬有九來也何從日射懷中去也何向蓮花之上處處其徒圖表厥跡兩間之堅無久惟石刻此銘章垂示罔極丙戌六年明永樂四年正月議政府啓請定全國中可留置之寺剎曹溪宗總持宗合七十寺天台疏字宗法事宗合四十三寺華嚴宗道門宗合四十三寺慈恩宗三十六寺中道宗神印宗合三十寺南山宗始興宗各十寺實録明帝遣太監黃儼迎銅佛于濟州佛像至使館儼欲上先拜佛像然後行禮上曰銅佛自天朝而至則豫當拜之以致敬朝廷之意今不然何拜之有河崙趙英武曰皇帝崇信佛道遠求銅佛且黃儼無狀天下所知願從權禮拜上曰豫之羣臣無一守義者畏儼如此其能救君難乎高麗忠惠被執如元國人無肯救者我雖危難殆亦如此矣人主舉動不可以輕豫之拜佛於禮何如遂謂儼曰藩國禍福不在銅佛當先見天子使臣豈容拜吾土銅佛儼仰天良久微笑許行禮竟不拜佛丁亥七年明永樂五年議政府啓曰去年寺社革祛之時三韓以來大伽藍反在汰去之例亡廢寺社差下住持者容或有之僧徒豈無怨愁之心若擇山之勝處大伽藍以代亡廢寺院則庶使僧徒得居止之處於是諸州資福寺皆代以名剎實録曹溪宗梁州通度寺松生雙巖寺昌寧蓮花寺砥平菩提岬寺義城氷山寺永州鼎覺寺彥陽石南寺義興麟角寺長興迦智寺樂安澄光寺谷城桐裏寺城陰靈覺寺軍威法住寺基川淨林寺靈巖道岬寺永春德泉寺南陽弘法寺仁同嘉林寺山陰地谷寺沃川智勒寺耽津萬德寺青陽長谷寺稷山天興寺永平白雲寺廣州青溪寺寧海雨長寺大邱龍泉寺道康無為寺雲峯原水寺大興松林寺文化區業寺疑即貝葉之誤金山真興寺務安大崛寺長沙禪雲寺提州長樂寺龍駒瑞峯寺華嚴宗長興金藏寺密陽嚴光寺原州法泉寺清州原興寺義昌熊神寺江華栴香寺襄州成佛寺安邊毗沙寺順天香天寺清道七葉寺新寧功德寺慈恩宗僧嶺觀音寺楊州神穴寺開寧獅子寺楊根白巖寺藍浦聖住寺林州普光寺宜寧熊仁寺河東陽景寺棱城公林寺鳳州成佛寺驪興神異寺金海甘露寺善州原興寺咸陽嚴川寺水原彰聖寺晉州法輪寺光州鎮國寺中神宗任實珍丘寺咸豐君尼寺牙州桐林寺清州菩慶寺奉化太子寺固城法泉寺白州見佛寺益州彌勒寺總南宗江陰天神寺監津昌和寺三陟三和寺和順萬淵寺羅州普光寺昌平瑞峯寺麟蹄玄高寺雞林天王寺始興宗漣州五峯寺連豐霞居寺高興寂照寺天台宗闕漏疑有誤也參考慵齊叢話海東崇奉佛教久矣新羅故都招提多於閭閻松都亦然王宮甲第皆與佛宇相連王與後宮詣寺燒香無虛月設八關燃燈大禮皆依於佛王之第一子為太子第二子則削髮為僧雖儒林名士亦皆效之寺剎皆有臧穫多者或主千百為住持者其豪富勝於公卿置十二宗以掌釋教僧多有封君辟除者至我太宗革十二宗只置兩宗盡革寺社之田尚玄曰若由太宗六七兩年實録觀之自來之宗不滿十二而現存者共有七宗參照世宗六年實録慵齊叢話所記數字十二宗之十二字兩宗之兩字也疑有誤也戊子八年明永樂六年佛紀二四三五年太上王崩因山于健元陵以開慶寺為陵之齊社備考慵齊叢話云陵室之傍有齊社自昔然也如健元陵顯陵有開慶寺齊陵有衍慶寺厚陵有興教寺光陵有奉先寺敬陵昌陵有正因寺遷英陵於驪州改神勒寺為報恩寺以為齊社獨獻陵無社蓋因太宗遺教也七月以興天社元屬田民屬公議政府啓曰各宗寺社當初詳定自有其額今以所創開慶寺加屬曹溪乞將曹溪宗屬興天社移屬華嚴宗其華嚴屬支天社近於太平館古羣華館今獨立館不宜僧徒聚居乞以田民並屬於興天社以備使臣伴人館會之所興天社元屬田民屬公從之實録庚寅十年明永樂八年命印大藏經于海印寺傳旨于豐海京畿忠清道觀察使遞輸其道所造經紙二百六十七束于慶尚道又傳旨于慶尚道觀察使曰今遞輸經紙宜轉輸于海印寺印大藏經其印出時諸緣及僧二百朔料並皆給之實録癸巳十三年明永樂十一年傳于政院曰自古水旱之災皆人君否德所召今聚僧巫禱雨無乃有愧乎豫以為罷禱祀而修人事可也豫粗讀聖經知僧巫誕妄今反憑左道以希天澤可乎金汝知曰雖非古昔聖王之道靡神不舉亦古事也今緇徒已集供辨亦具從俗行之似無害也上曰旱極必雨若雨則人必以為釋氏之力此後卿等不復詆佛矣世宗莊憲王李祹在位三十二年己亥元年明永樂十七年明帝求興天寺所藏舍利金漸啓曰僧竺丘為臣言石塔所藏舍利四枚自新羅以來世世寶藏且有靈異願得留鎮法門上曰僧徒容有是言然於事體則不可天子求舍利當以本土寶藏者進獻以表至誠况石塔舍利天子所知豈可以是靈異舊物匿不以獻上欺天子乎雖無此物於此土保無灾怪卿其勿疑漸慙赧無以對辛丑三年明永樂十九年每歲初遣人祈福于佛宇山川謂之年終還願至是禮曹啓其狀王目參贊卞季良曰年終還願祈福之事崇佛之端凡干佛事罷之幾盡惟先王先后忌齊未忍卒革此則為寡人祈福雖有獲福之理猶為鄙陋况斷無是理乎罷之如何季良默不以對元肅對曰臣等固知無理為上祈福未敢言耳王遂命罷祈禱佛宇王謂近臣曰佛氏之道無益於禍福父王既不崇信豫若崇信則當母后元敬王太后閔氏也賓天哀慕之時豈不大設佛事以修冥福乎須令民庶審知豫意秋大設法會請沙門得通亦名守伊追薦元敬王太后冥福備考涵虛和尚集聖上心存三寶留意福田是以聞師道風美其令聞辛丑秋命住大慈御剎為薦先妣大妃殿下大設靈山勝席法華會也宗室諸王駙馬諸君承命奉香濟濟親臨請師說法師強謝不已高升法座肇開法要其聲清亮理致玄奧自然成律風行水文遠近見聞無不悅服兩宗五教諸山衲子蒼蒼濟濟悉皆罔措壬寅四年明永樂二十年罷經行自高麗時每春秋仲月令僧徒誦般若經鳴螺執幡蓋香火前導巡行街巷以禳災厄二品以上行香謂之經行至是命罷之癸卯五年明永樂二十一年佛紀二四五年七月日本前將軍義持來求高麗本大藏經遣使送之甲辰六年明永樂二十二年佛紀二四五一年春大司憲河演上書曰肆以寺社土田之數考核居僧之額靈通之田二百結而居僧才七靈巖之田二百餘結而居僧才四興德之田二百五十結而居僧才二十興福之田一百四十結而居僧十一由是觀之其他寺社亦是類此是則中外寺社分屬一萬一千一百餘結之良田委之何故誠可慨念伏望殿下善繼太宗之旨恢弘斯道排斥異端其於京師只留三所留後司開城也一所諸道不過二三所餘皆革除其餘諸所擇僧中之練行者俾主之貪利粗行者毋或與焉仍罷試選之法勿下僧職之批僧録之司並宜革之以修清淨之道以明如來之教非唯邦家之幸亦於僧道幸甚河演上書中善繼太宗之旨云云者蓋太宗滅寺額削田民增加田民於大寺名剎定居僧之數有二百結之寺養僧百人有一百結之寺養僧五十人故今勸王亦行減削之政時宰臣許稠主議漸行河演之議暫沮四月禮曹啓曰釋氏之道禪教而已厥後正宗旁傳各以所業分而為七宗傳誤承訛源遠末益分實有愧於其師之道且中外多建寺社分屬各宗其數猥多緇流四散曠廢莫居修葺不繼漸致頽敗乞以曹溪天台總南三宗合為禪宗華嚴慈恩中神始興四宗合為教宗擇中外堪寓僧徒之處量宜置三十六寺分隸兩宗優給田地酌定居僧之額羣居作法俾之精修其道仍革僧録司以京中興天寺為禪宗都會所興德寺為教宗都會所揀取年行俱高者以為兩宗行首掌務令察僧中之事於是減七宗為禪教兩宗以三十六寺分隸之付屬田地加增結數廢僧録司以其所屬奴婢三百八十四口分給禪教兩宗癸丑十五年明宣德八年佛紀二四六年四月一日沙門己和入寂備考涵虛堂得通和尚行狀門人野夫録師諱己和號得通舊名守伊號無準所居室曰涵虛堂俗姓劉氏中原人也尚玄曰或云師是支那人元末避世來于江華者非也海東佛祖源流及東師列傳中原俱作忠州師係朝鮮人也明矣其父或祖自支那則未可知也今觀此狀師之父聽官至典客寺事典客寺事高麗官名也且師生於洪武九年幼入泮宮又年至二十有一剃髮於冠嶽山義湘菴又到檜岩寺參無學云云等豈非朝鮮人之明證乎考諱聽官至典客寺事母方氏方因無子頌禱慈悲大聖夜夢忽見大聖手提孩童納其懷中因以有娠以洪武九年丙辰十一月十有七日生焉為兒嬉戲凡所動靜異於常流幼入泮宮日記千餘言少長深達一貫之唯明經講學擅其嘉聲制述文詞理致幽微百爾出言鏗鏘婉麗錦上添花未足為喻人之言曰將北面而對揚休命則致君澤民經緯人倫必無愧於周召矣年至二十有一見同館友生之亡知世無常觀身虛幻誓出二種生死志求一乘涅槃弘道以報四恩育德以資三有即求出家未凝其志皇皇反側無日不心乎山水間手携韋經趦趄歧路邂逅一釋栖栖獨行割愛親戚徐行杖後到冠嶽山義湘菴其僧與一老山人名覺寶者同心剃髮尚玄曰按涵虛堂顯正論云余未出家有釋曰海月者讀論語於豫至博施濟衆堯舜其猶病諸注云仁者以天地万物為一己之言置卷而問豫曰孟子仁者乎曰然曰雞豚狗彘万物乎曰然曰仁者以天地万物為一己此真稱理之談也孟子苟為仁者而雞豚狗彘又為万物則何以云雞豚狗彘之蓄無失其時七十者可以食肉乎余於是辭窮而未能答考諸經傳而無有殺生稱理之論博問先知而無有釋然决疑之者常蘊此疑久未能决越丙子許遊三角山到僧伽寺與一老禪夜話話次禪云佛有十重大戒一不殺生余於是釋然心服自謂此真仁人之行也而深體仁道之語也從此不疑於儒釋之罔而遂有詩云素聞經史程朱毀未識浮圖是與非反覆潛思年已遠始知真實却歸依越明年丁丑早春到檜巖寺初參王師無學妙嚴尊者親聞法要於是辭退游歷諸山戰戰勤修又甲申仲春再到檜巖獨居一室杜絶視聽動靜食息無所滅裂因調睡魔永夜經行次不覺口自詠曰行行忽回首山骨立雲中又一日入廁還出放下洗桶云惟此一事實餘二則非真此言豈徒然哉丙戌夏歸于功德山大乘寺是年為始至於己丑四歲之間三設般若講席庚寅夏到天磨山觀音窟大振覺樹玄風普使有緣皆化辛卯仲秋到佛禧寺結制三年重新院宇集諸檀越引揚祖風甲午春三月到慈母山烟峰寺占一小室名涵虛堂勤修三載曾無少息又自丁酉至戊戌一冬兩夏五家講席三設是寺自是以後不約繫境長修而乃任心自運逍遙乎山川之阿放曠乎人間之世或出或處何有局於方隅固請固留咸謂私我知識話行湖海望重人心故因人請庚子秋季入于江陵五臺山誠備香羞供養五臺諸聖詣靈鑑菴薦羞懶翁真影信宿其菴夜夢有一神僧從容謂師曰卿名己和厥號得通師拜手只受翛然夢覺身氣清爽若登丈清翌日下月精寺放杖脫鞋宴處一室以終平生長養道胎飢餐渴飲消遣日月於是囊錐已露括難禁止道德昭著播於遐邇惟我聖上存心三寶留意福田是以聞師道風美其令聞辛丑秋初命住大慈御剎為薦先妣大妃殿下大設靈山勝席宗室諸王駙馬諸君承命奉香濟濟親臨請師說法師強謝不已高升法座肇開法要其聲清亮理致玄奧自然成律風行水文遠近見聞無不悅服兩宗五教諸山衲子蒼蒼濟濟悉皆罔措自爾仍閲四載甲辰秋上書辭退於吉祥功德雲嶽諸山隨緣度日忽思張皇三學大闡一乘普令七衆咸到如來正覺之域挽回真風扶樹末運於辛亥秋歸于嶺南曦陽山鳳巖寺重葺頽落修營已畢師更以妙淨宿知靜觀時態時方末葉去聖愈遠機教陵夷法不可弘還收前日之所期未遂所懷之三事宣德八年癸丑三月二十五日故託微恙身心不豫至四月一日申時初刻卓然靜坐曰湛然空寂本無一物靈光赫赫洞徹十方更無身心受彼生死去來往復也無罣礙少選又曰臨行舉目十方碧落無中有路西方極樂此乃最後永訣也語聲才盡蕭然而逝留寺五日顏色如常曾無少異茶毗已訖拾取齒骨香水洗之黏骸設利羅赫然光潤當是時也異香滿洞行者皆聞拜手低頭罔不敬信者矣孝寧大君閣下親啓宸聰命諸徒弟樹浮屠於四處不日之間七衆子來造石室以安厝設嘉會以展禮人之皈附受道佩戒者雲屯輻湊尤於前日屈指成胝不可勝數所謂現壽量以存存示生滅而化化者矣師壽五十八臘三十八先師平生所著經論注疏詩賦篇章固不為不多矣然散在諸處未能盡求但以手書圓覺疏三卷般若五家說誼二卷顯正論一卷船若懺文二帙綸貫一卷對靈小參下語等校正之書之數本留鎮願剎示之於後然先師德行固已偉矣實非弱辭所能稱述然余強為記之垂於後世者所以崇孝故也是孝子孝孫之至誠也又况職在秉筆何敢固讓肆不獲已粗記始末以傳不朽云爾記行之言雖已窮而慕師之意實難盡敘故係之以詩一首露之以情悰法乳恩深天廣大哀哉無力報先師毛錐記德真兒戲萬世人人口是碑壬戌二十四年明正統七年佛紀二四六九年揀集賢殿儒臣申叔舟等數人賜暇讀書于津寬寺備考墉齊叢話世宗揀集賢殿儒臣申高靈等數人賜暇讀書于津寬寺其後洪益城徐達城李明憲等數人讀書于藏義寺又叔度放翁藩仲伯勝四李嘗讀書于驪興神勒寺又云有詩僧與縉紳酬唱者頗多儒生讀書者皆上寺雖或有毀瓦劃墁之斃而儒釋相賴者亦不少丙寅二十八年明正統十一年佛紀二四七三年始製諺文頒訓民正音備考慵齊叢話云世宗設諺文廳命申叔舟成三問等製諺文初終聲八字中聲十二字其字體依梵字為之東閣雜記云諺文字體倣古篆梵字為之芝峯類說云諺文字體全倣梵字本土及諸國語音文字所不能記者悉通無礙洪武正韻諸字亦皆以諺文書之區分五音而別之曰牙舌脣齒喉脣音有輕重之殊舌音有正反之別字亦有全清次清全濁次濁不清不濁之差雖無知婦人無不瞭然曉之聖人創物之智有非凡力之所及也東閣雜記云中朝翰林學士黃纘字公紹時謫遼東命三問等見纘質問音韻凡往返遼東十三度尚玄曰按諺文發音之法皆倣蒙古韻會質問黃纘者即此也申叔舟洪武正韻序見其端緒矣又所謂諺文字體倣梵字為之者即亦蒙古字也此蒙古字製於元世祖國師發思八發思八西藏喇嘛僧也依梵字製蒙古字頒行天下大有功於國年二十二歲元世祖尊為開教宣文輔治大聖至德普覺真智佑國如意大寶法王加以西天佛子大元帝師之號敕統天下之教門支那之愛新覺羅清朝亦用元制尊喇嘛僧今之蒙古活佛是也高麗末季自忠烈王以後世世娶元公主為后以蒙古字與語用于宮中舊韓宮中御用之飯膳名曰水剌御用之樂工名曰卒花赤俗音讀卒兒治等皆蒙古語而即自麗代流傳之宮中用語也所以朝鮮初葉尚置蒙譯又申叔舟善蒙古語即此可以想見當時尚須蒙語而諺文為蒙字之脫體不難思也庚午三十二年明景泰元年王建內佛堂又好釋典命二王子往受俊和尚經律而入啓備考靜菴筵奏及重峯疏云上造內佛堂大臣諫不聽集賢殿學士諫不聽學士皆退歸其家集賢殿一空上墜淚召黃喜謂曰集賢殿諸生棄我而去將若之何喜曰臣請往諭遂遍往諸學士家懇請以來慵齊叢話云世宗創內佛堂公卿大夫臺諫儒生三館諸生皆上書極諫判院事李順業亦詣政院論啓傳曰文士闢佛宜矣宰臣何知佛之是非而駁之順業對曰人皆以為非故臣亦非之人皆論諫故臣亦論諫舉國所非之事殿下何獨為之謏聞瑣録云世宗末年好釋典時俊和尚最名經律以萬機之暇難於觀講使世祖及安平安平大君名瑢世宗三男善畫往受而入啓由是安平與世祖深通內典尚玄曰按俊和尚即弘濬也俊濬通用東文選姜碩德寄濬和尚書子明碩德之字和南五冠山興聖濬和尚座下息慈雪峯之至承念誦無恙遙賀遙賀前者想空山幽獨聊奉荒句以獻一笑初非敢相報慈辱法語辭旨欵密云云正統戊辰念一日松陽外史晉陽姜子明和南姜碩德亦聞人而其所欽重乃如是則可知濬和尚非凡僧也且正統戊辰即世宗三十年其時與人皆相合又於世祖二年丁丑弘濬時為演慶寺住持與慧覺尊者信眉奉命校正涵虛堂金剛經說義入之五家解為一書又與於刊經都監譯經之役若非深通經律安得如是故知俊和尚即弘濬殆無疑也又按涵虛堂集有云小師弘俊問佛法僧所以為寶師即應聲答曰世之所寶金與玉也夫金玉為世之所重而人人所慕者也僧也者具五德修六和解行超羣容儀挺特知人之所未知能人之所未能人中之標準諸方之眼目道俗同歸人天共尊以佛為師弘法為任得與佛法並稱為寶又勸俊上人住摩利山淨水菴詩云摩利為山絶海東有菴臨海壓蒼穹一軒風月千峯裏千里江山一望中煥目奇觀奚啻入開懷勝景渺無窮當年廬嶽堪為對請子於焉繼遠公是故又知弘濬即弘俊而為涵虛之門人也文宗恭順王李晌在位一辛未元年明景泰二年佛紀二四七八年世宗初喪有妖僧來獻策曰有神術能使死者復生試於他尸無驗虛僞無理王不之罪端宗恭懿王李弘暐在位三年乙亥三年明景泰六年佛紀二四八二年琉球使臣倭僧道安上其國王尚恭久書契獻花錫蘇木願得藏經許之閏六月十一日王禪位于世祖降封為魯山君安置于寧越世祖惠莊王李瑈在位十三年丙子元年明景泰七年佛紀二四八三年十月二十四日賜魯山君死夫人宋氏出處于淨業院備考松窩雜記魯山死後棺斂不具只藁草為殯一日有年少僧來哭甚哀自言有通名蒙恤之分留連數日一夕負尸而逃或云焚之山谷或云投之江中今之冢墓乃虛假之葬也二說未詳孰是若以占𠌫齊之文觀之則投江之說無疑然則僧乃胡僧楊璉之類而其為奸臣等所指揮者乎天長地久恨其可既孤魂至今飄蕩誠可哀哉又嶺南野話丙子録云戶長郡吏嚴興道備棺翌日率吏民營瘞葬于郡北五里即今之莊陵也備考海平家傳魯山夫人宋氏出家于淨業院時侍女三人同時落髮尼名希安智心戒智也一人侍側二人乞假以供薪水及思陵薨以海平君鄭眉壽鄭即魯山之甥姪也為侍養移處其家三尼姑隨之及其死葬思陵宋氏之陵在楊州乾川面至近地又璿源譜略云英祖辛卯九月御筆書淨業院舊基五字竪小碑于燕尾貞洞東望峯下今京城東大門潁尾亭尼院是也魯陵志云夫人生時不欲居城內願處東郊瞻望魯陵故自朝家營室于東門外號英嬪貞洞而夫人別搆草屋而居焉素衣素食以終天年參考禁夢菴重修記關東之寧越即我莊陵遜位之地也粵昔端廟在禁中發夢於此地占基而建寺命曰禁夢寺在魯陵之左遂為願堂萬曆壬辰燬於兵庚戌郡守金侯募僧改搆更名曰魯陵菴崇禎壬寅童土尹公宰是郡捐俸鳩財付霽雲大師名應岑者重建而易其額曰旨德蓋避陵號而取地名也肅廟戊寅端廟復位墓升為陵拓寺基成大剎名曰報德寺而禁夢菴遂廢英廟乙丑參奉羅侯蔘慨然曰禁夢者端廟感夢而肇建者也豈可廢而不傳乃出私財募諸緣還搆菴於舊址於是乎魯陵之故事無闕而先王之遺跡不泯羅侯之志若功可傳於後世矣自今此邦之人望松柏之鬱蓊瞻衣冠之出遊草緑花明月冷雲愁鵑聲上下與鍾梵相應其有不悽然而傷汪然而涕者乎余嘗撰子規樓兒郎之詞一唱一噫殆不忍讀今於夢菴之記重為之於邑也菴凡三十一楹與報德寺同修於壬子正月訖事於八月發願者僧漢溟董役者載燁請記於余者知添云上正宗也之二十年乙卯孟冬崇祿大夫原任吏曹判書弘文館大提學藝文館大提學洪良浩述參考成三問遺集雞龍山東鶴寺即祖宗朝為冤死人施供之設故寺有招魂籍記首書端宗御諱弘暐次書瑢安平大君瑜錦城大君友直瑜之子鄭悰皇甫仁金宗瑞及其他一切死難之人云云按東鶴寺東有鶴巖故名或云東學寺寺故祭圃隱鄭公鄭公為東方理學之祖故名本寺初創在百濟時新羅敬順王時重創並失其蹟或云高麗初道詵國師重建為高麗太祖願堂也故高麗革世後朝鮮開國三年甲戌吉再號冶隱特來茲寺祭高麗諸王又招鄭公夢周號圃隱之魂而祭之開國八年己卯柳方澤號琴軒又來茲寺亦如吉再故事祭高麗諸王又招牧隱李穡圃隱冶隱三先生魂而祭之開國九年庚辰李貞幹諡孝靖公來按公州又慕其事於其設壇招魂之地建一閣以祭之備其享需使年年享祀是為三隱閣開國六十四年乙亥端宗遜位後金時習號梅月堂便削髮為僧放浪江湖偶來兹寺見三隱閣而感慕之開國六十五年丙子朴彭年諡忠正公成三問諡忠文公河緯地諡忠烈公李塏諡忠簡公柳誠源諡忠景公俞應孚諡忠穆公已上六人謂之死六臣金時習號梅月南孝溫號秋江李孟專號耕隱趙旅號漁溪元昊號觀瀾成聃壽號文斗謂之生六臣等謀復上王事覺以死金時習逐夜暗葬六臣遺體于鷺梁即來茲寺於三隱閣傍設壇以招六臣之魂而祭之其翌年丁丑九月世祖大王自俗離山幸行溫陽溫泉次歷臨茲寺見三隱閣並燭金時習之心事盡然興感以錦縀八幅書賜丙子冤籍內列六臣及其父子兄弟連坐死者姓名合百餘位又感三隱故事書賜高麗魂記內列諸王姓諱及麗末冤死者姓名亦百餘位祝願薦度其年十月端宗薨于寧越人皆畏禍莫敢收葬郡吏嚴興道獨往臨哭收襲玉體葬于郡北冬乙旨後齎奉御袍逃隱遊行因逢金梅月同來茲寺於六臣壇上又設一壇形如品字奉御袍不寶不榜暗哭祭之梅月製招魂辭曰水麗兮山深兮月午兮陟降王靈來臨兮感思洪恩兮效左徹取帝衣冠几杖而廟祀兮引會稽上大禹祠之祭儀兮山果川魚之屬兮哭秋賦淚招魂兮禮雖未盡義在茲兮敢請尚饗又其翌年戊寅世祖書賜追付記內列端宗御諱與安平錦城諸宗室諱及癸酉三相皇甫仁領議政忠定公金宗瑞左議政忠翼公鄭苯右議政忠莊公及其連坐死者姓名丁丑死事諸臣姓名合百餘位賜下結卜與印信又命建閣曰招魂使年年十月祭之其後世祖十三年丁亥金時習曹尚治號靜齊鄭之産號逋翁宋侃號西齊成熺號仁齊趙旅號漁溪李蓄號望越菴等會議又設享祭其文曰維歲次丁亥三月戊子朔十五日壬寅前行參判臣曹尚治敢昭告于王殿下之靈遙望越岑有淚無辭取儀會稽建祠于斯引左徹事奉杖屨祀茲敢節辰敢薦菲禮尚饗自是為年年定式春祭則二月十五日秋祭則十月草四日至今不廢丁丑二年明天順元年佛紀二四八四年秋九月王世子薨王為追冥福手書金剛般若經正文以為字本親率永膺大君琰桂陽君璔密城君琛河城尉鄭顯祖僉知中樞院事金守溫藝文館直提學韓繼禧等讐校楞嚴法華等經又命僧弘濬信眉等校正涵虛堂金剛經說義入之五家解為一書校正永嘉集諸本同異又集證道歌彥琪注宏德注祖庭注為一書下於鑄字各印一百件又印法華經楞嚴經翻譯名義各百件且模木板大藏一部注華嚴一件地藏經懺法各十四件又命戶曹參議姜希顏判司宰監事成任行司憲掌令趙瑾行校書郎任擇行前副司直安惠前津寬寺住持大禪師文炯前長安寺住持大禪師克仁金書法華經一件墨書法華經地藏經梵網經起信論行願品各一件以義昌君玒右承旨韓繼美監掌皆親製跋語係于經後粧潢既訖散于大衆沙門守眉奉命重新道岬寺塑藥師佛像三軀以安之備考靈巖郡月出山道岬寺妙覺和尚碑銘并序海東沙門柏菴性聰撰夫海之所以稱大者由無皎潔之清道之所以難名者以無赫然之觀也若乃得難名之道游戲佛門三昧舟航苦海為世所重者蓋指不多屈而近古於妙覺王師見其人焉師諱守眉古朗州人也生於崔氏母夢異人遺珠孕生時異香滿室幼時英爽有邁俗之志十三投州西月出山道岬寺出家既冠受具翱翔講肆抵俗離山法住寺遇沙彌信眉同歲同名與之俱琢磨磋切讀大藏習毗尼并慈容道骨眉彩燁然詞氣朗潤辨才無礙學者皆推之為二甘露門浸浸已露頭角矣居無何謂同學曰我所負者其猶僧繇畫人物雖曰妙畫終非活者遂棄所學擔簦躡屩出入禪窟初參龜谷不契晚入登階碧溪正心之家然值晦冥否塞之秋禪席荒虛寥落稀若晨星師被選判禪宗事防橫决之波回既倒之瀾宗門有賴焉尋還道岬以示不忘本也慨先國師道詵也裨補道場幾至荒廢乾沒落在涼烟茂草中謂衆曰吾儕其忍坐視而不復耶况聖上有命使其徒洪月幹其事重新復舊貫莊嚴之妙疑絳闕清都而從空墮也且以永膺大君作大檀越敬塑藥師如來三軀安于紺殿時天順紀元之元年也由是四事駢集六和至以至千指圍繞龍象蹴踏宗風遂大振焉嗣後元廟元廟疑即世廟之誤備禮奉迎冊封王師錫以妙覺師號及紫伽梨一襲象毛拂子琉璃數珠又頻下手札以慰問縉紳縫掖自公卿以至墨綬銅符西向而問北面而禮者不可殫述其為一時所重從可知矣某年某月某日即召門弟子囑以宗門大事泊然蟬蛻閲世六十三坐臘五十一塔于寺之東麓紀德有碑而已沒字而不可讀今住持清信欲重鑱而圖存不朽書其事來乞銘銘曰月嶽穹窿鎮南海濱孕靈育秀篤生異人前有詵公號為國老後曰王師妙覺是已禪風既熄王師重扇且復起廢鍾鼓大振一則妙覺二則妙覺永備無忘宜乎勒石崇禎己巳二月始癸酉六月日立戊寅三年明天順二年下教印出大藏經五十部板在陝川海印寺遺敬差官尹贊鄭垠董其事且使僧信眉竹軒等監督諭旨于各道觀察使助其費二月始役四月畢印分藏于各道名山巨剎凡入紙地三十八萬八千九百餘貼役糧五千石他物稱是東閣雜志備考印大藏經五十件金守溫跋云云上略天順紀元丁丑之冬上傳旨于桂陽君臣璔領中樞院事臣尹師路議政府左贊成臣申叔舟判中樞院事臣李仁孫臣權攬吏曹判書臣韓明澮承政院都承旨臣曹鍚文等若曰余以否德承天地祖宗之靈位於臣民之上幸與卿等而共際會亦非小種善根惟佛教之流於震丹其來已久其說之載于文又莫若藏經之專幸其刊板具在於海印寺近歲士民之好善者印成全部間被國家賜於日本存者無幾豫欲印就若干部分置於名山福地上為先王先后暨祖考之靈以資福吉於冥冥下為法界含靈以至昆蟲草木之微幽明共利普及無際且凡事始厥為難今因肇功成至五十部將遍鎮於我東僧藍之大處卿等其措置當務之次第以聞臣璔等奔走惟謹其經畫本末巨細悉謀於慧覺尊者臣信眉判禪宗事臣守眉禪師臣學悅隨即啓於上下承政院移於各道分其地之廣狹以定出紙之多寡命副知通禮門事臣尹贊宗簿注簿臣鄭垠往慶尚道預為區辦與判禪宗事臣守眉海印住持臣竹軒仍督其務且諭監司臣李克培總監之遂用明年春閏二月創役至其年四月告訖下略命禁閭巷之間托以招魂邀僧徒設餅果幢幡于街上犯者僧徒及家長并罪王命內需司創寺于高陽郡蜂峴之東名曰正因以為敬陵之願堂正因寺後為守國寺備考金守溫記云寢園有寺何也蓋嗣王宮追孝先王側近陵寢制為仁祠以崇三寶以導冥遊也自漢唐以來英君誼辟莫不皆然乃帝王報本追遠無所不用其極之道也天順紀元秋八月我懿敬大王薨逝葬于高陽郡東蜂峴之原既葬之明年世祖大王傳旨于內需司若曰我子懿敬不幸天嗇其壽奄至於斯喪葬事巨不欲重煩朝家爾內需其距玄室不遠造寺一區毋或告斃以迄于成遂以其年月日攻位於坐地之東闢地肇設閲十有二朔而畢己卯四年明天順三年佛紀二四八六年初王受世宗命撰成釋譜詳節譯以諺文乃進賜覽輒製讚頌名曰月印千江之曲至是益研精增減以成之備考釋譜詳節序佛為三界之尊弘度羣生無量功德人天所不能盡讚世之學佛者鮮有知出處始從雖欲知者亦不過八相為止頃因追薦爰采諸經別為一書名之曰釋譜詳節既據所次繪成世尊成道之迹又以正音訓民正音即諺文也就加譯解庶幾人人易曉歸依三寶焉正統十二年世宗大王二十九年七月二十五日首陽君諱諱瑈序御題月印釋譜序夫真源廓寥性智湛寂靈光獨耀法身常住色相一泯能所都亡既無生滅焉有往來只因妄心瞥起識境競動攀緣取著恆繫業報遂昧真覺於長夜瞽智眼於永劫輪回六道而不暫停焦煎八苦而能解脫我佛如來雖真淨妙身居常寂光土以本悲願運無緣慈現神通力降誕閻浮示成正覺號天人師稱一切智放大威光破魔兵衆大啓三乘廣演八教潤之六合沾之十方言言攝無量妙義句句含恆沙法門開解脫門納淨法海其撈摝人天拯濟四生功德可勝讚哉天龍所誓願以流通國王所受囑以擁護昔在丙寅照憲王后奄棄榮養痛言在疚罔知攸措世宗謂豫薦拔無如轉經汝宜撰譯釋譜豫受慈命益用覃思得見祐宣二律師祐即南齊律師僧祐也宣即唐律師道宣也各有編譜而詳略不同爰合兩書撰成釋譜詳節就譯以正音俾人人易曉乃進賜覽輒製讚頌名曰月印千江其在于今崇奉曷弛頃丁家厄長嗣夭亡父母之情本乎天性哀戚之感寧殊久近豫惟欲啓三途之苦要求出離之道捨此何依轉成了義雖則既多念此月印釋譜先考所製依然霜露慨增悽悵仰思聿追必先述事萬幾縱浩豈無閒暇廢寢忘食窮年繼日上為父母仙駕兼為亡兒速乘慧雲逈出諸塵直了自性頓證覺地乃講劘研精於蒼卷櫽括更添於新編出入十二部之修多羅曾靡遺力增減一兩句之去取期致盡心有所疑處必資博問庶幾搜剔玄根數究一乘之妙旨磨礱理窟疏達萬法之深源蓋文非為經經非為佛詮道者是經體道者是佛讀是典者所貴回光以自照切忌執指而留筌嗚呼梵軸崇積觀者猶難於讀誦方言謄布聞者悉得以景仰肆與宗宰勳戚百官四衆結願軫於不朽植德本於無窮冀神安民樂境靜祚固時泰而歲有福臻而災消以向所修功德回向實際願共一切有情速至菩提彼岸天順三年己卯七月七日序冬十一月鑄銅鍾一口施砥平龍門寺願剎也備考龍門寺鍾記天順己卯仲冬豫與中宮議鑄銅鍾一事施奉龍門寺上為祖宗考妣靈駕中為懿敬世子下為法界一切亡魂為息苦之願伏惟三寶訂知弟子謹念南無釋迦牟尼佛南無阿彌陀佛南無地藏菩薩承天體道烈文英武朝鮮國王李瑈慈聖王妃尹氏貞嬪韓氏世子臣晄通政大夫判內侍府事臣李存通政大夫同判內侍府事臣申雲承奉為出納保義將軍行義興衛攝護軍兼軍器副正臣金石梯監鑄奉承大夫掖庭署司鑰臣張重同奉教書龍門寺記砥平縣西有山號彌智盤回百里雄據千重峯巒峻秀溪澗深邃中有一派長川出自上峯之間回作龍溪之水下有兩石峯屹然相對于左右自作石門者號龍角石也其下五里之陽有大伽藍巋然獨存者曰龍門寺也創於新羅時為國中名剎矣入我朝為昭憲王后願剎崇奉異於他寺至正統丙寅昭憲王后賓天于首陽大君宮大君哀痛罔極丁卯春王后現夢于大君曰為我造二佛八菩薩像安于龍門寺大君益不勝哀痛廣問緇流時有僧信眉及學祖等俱告曰佛經云最有緣於此界衆生度脫苦海導生極樂世界者娑婆教主釋迦如來極樂導師阿彌陀佛文殊菩薩普賢菩薩觀世音菩薩大勢至菩薩金剛藏菩薩除障礙菩薩地藏菩薩彌勒菩薩也聖后所現二佛八菩薩即此也大君召集名僧造二佛八菩薩像于宮中文宗大王在東宮時奉安于景福宮清宴樓設齊供養丁卯七月移安于龍門寺命僧改搆寶殿本來所安佛像移安于他殿明年戊辰四月初八日設慶讚法會大君與府夫人即貞熹王后寺下有宮基俱親往祈祝大君立誓于佛前曰此會若無靈應於法吾將退矣與僧十員立于佛前限七日一心精勤至第六夜卓上有鏗然之聲學祖曰吾佛降靈矣大君不勝驚喜親開香盒中有六枚舍利晃然放光時夜將半猶如白晝渾界作金色三日乃歇大君泣淚曰吾佛慈悲靈應果若是乎遂又為願剎其護念崇奉之緣不可盡記至景泰乙亥閏六月遂登寶位復增修殿閣寺剎之名益顯於是為東國第一道場舍利後置佛腹藏云原夫大覺圓滿理照空有至聖虛應義無生滅故得形分千億而有感必應體散塵剎而無處不現今我大聖積因曠劫宿證菩提降迹人王護持世界遠承諸佛之付囑近獲舍利之靈應國祚永固於磐石傳之無窮法鼓再振於大千將至万世區宇之內咸為淨土生靈之類盡蒙恩澤自非至德精誠道合真智豈能神功妙相致此奇特靈應不勝抃欣之至謹記天順戊寅十月日年久紙蔽失作者名庚辰五年明天順四年正雅樂始製靈山會上曲並作蓮花臺舞初世宗以處容舞之曲折改撰歌詞名曰鳳凰吟至是遂增其制大合樂而奏之備考慵齊叢話云音樂處容之戲肇自新羅憲康王時有神人出自海中始現於開雲浦來入王都其為人奇偉倜儻好歌舞益齊高麗人詩所謂貝致赬顏歌夜月鳶肩紫袖舞春風者也初使一人黑布紗帽而舞其後有五方處容世宗以其曲折致撰歌詞名曰鳳凰吟遂為廟庭正樂世祖遂增其制大合樂而奏之初倣僧徒供佛羣妓齊唱靈山會上佛菩薩自外庭回匝而入伶人各執樂器雙鶴人五處容假面十人皆隨行縵唱三回入就位而聲漸促撞大鼓伶妓挺身動足良久乃罷於是作蓮花臺戲先是設香山池塘周插彩花左右亦有畫燈籠而流蘇掩映於其間池前東西置大蓮蕚二雙小妓排蕚而出或相向或相背跳躍而舞是謂動動也於是雙鶴退處容入初奏縵機處容成列而立有時彎袖而舞次奏中機處容五人各分五方而立拂袖而舞次奏促機繼為神房曲婆娑舞終奏北殿處容退列于位於是有妓一人唱南無阿彌陀佛羣從而和之又唱觀音讚三周回匝而出每於除夜則一白夜分入昌慶昌德兩宮殿庭昌慶用妓樂昌德用歌童達曙奏樂各賜伶妓布物為闢邪也壬午七年明天順六年興天寺新鑄鍾成備考興天寺新鑄鍾銘并序嘉靖大夫吏曹參判臣韓繼禧奉教撰宣教郎守吏曹佐郎藝文奉教兼承文院副校理臣鄭蘭宗奉教書恭惟我承天體道烈文英武殿下誕膺天命握符開運疆宇妥帖風雨時順於是端居清穆恭默思道至聖之德景瑞以應乃於七年辛巳此以世祖即位之年計之夏五月壬子釋迦如來舍利分身於檜巖寺祥光瑞氣熏灼于天異香勃鬱遍滿山谷孝寧大君補在寺進二十五枚上與慈聖王妃禮於內殿又分身安于含元殿又分身越丙辰大君又得又進王妃禮於內殿又分身丁巳上親製伽陀被之管絃偕王妃供養於含元殿又分身前後所得分身舍利總一百又二檜巖會中人自取去又不知其幾上大歡慶肆赦發大誓願親自翻譯楞嚴經率宗親政府六曹臺省將為祖宗及一切含靈造如來像一軀又為中宮世子造一軀又夢觀音地藏二菩薩相對之異乃造二像各安舍利於中妥靈于禪宗興天寺之舍利閣上同王妃禮拜於寶座燎香供養命鑄鍾以警六時以導幽滯刻此緣起昭示無窮焉銘曰惟我聖神夙受佛記手執金輪繼天出治嚴恭寅畏不遑假寐神人協和靈貺駢至仰惟大覺廣攝緣類設利分身現稀有事驚動耳目晃耀天地靈瑞震動曠劫罕比天心悅豫弘誓發誠像設晬容演了義經福我列祖延及含靈宗圖永固彌億萬齡惟佛道弘普拔幽滯惟聖體佛大悲廣濟冶金鑄鍾開覺一切息苦警昏盡未來際天順六年壬午十月日監鑄都提調孝寧大君臣臨瀛大君臣璆永膺大君臣琰提調推忠佐翼功臣正憲大夫戶曹判書總中外度支事昌寧君臣曹錫文正憲大夫中樞院使臣金溉嘉靖大夫中樞院副使京畿都觀察黜陟使兼兵馬都節制使監倉安集轉輪勸農管學事提調刑獄公事知招討營田事兼開城府留守臣金從舜推忠靖難功臣嘉靖大夫中樞院副使筽城君臣柳子煥嘉善大夫兵曹參判臣金國光副提調通政大夫承政院都承旨兼尚瑞尹知製教充春秋館修撰官兼判奉常寺事知吏曹內直司樽院事臣洪應嘉善大夫行同判內侍府事臣申雲嘉善大夫行同判內侍府事臣李存承命出納郎廳折衝將軍行忠佐衛大護軍幹辦內直司樽院事臣金石梯奉正大夫行戶曹正郎臣禹垓顯信校尉行忠佐衛中部司勇臣金石山承義校尉行忠武衛左部同房臣趙嶟圖畫院別座折衝將軍行義興衛護軍崔徑監役奉承大夫掖庭署司鑰金德生衛前軍器監權知直長金貴同俞得海學生吳孟孫鑄成匠鄭吉山李長守李山安盛老方內隱山白山守爐冶匠金蒙寵注匠李萬張吾斤知洪福重朴孝仇知金雕刻奉承大夫梁春奉張金同羅德中梁吾斤知木手智尚金尤吉秦莫同水鐵匠李得芳朴千吉朴口春梁生車永守刻字典樂金貴生典事劉者古未李則三姜命山金寶代鄭春發金今才吳吾乙未使令金三河貴同金渚興小斤吾乙未癸未八年明天順七年十月刊經都監都提調尹師路等上進新雕印御譯妙法蓮華經一部七卷備考進經箋文略曰恭惟我主上承天體道烈文英武殿下睿智日新多能天縱飛金輪而御宇調玉燭以綏邦治踰六代之隆德跨九皇之盛聽朝政之多暇崇釋典以凝神究七覺之幽微洞三空之邃奧經兹七軸之記實為百部之冠羅什受筆於五天初擇梵本溫陵掩關於一世獨抱遺經縱斯道之賴存尚蒙士之未曉委翻寶偈專事宸襟分語絶意絶之間句讀既正核喻合法合之別科判畢陳演伽陵之仙音妙暢密義敷貝多之真諦穩播玄猷心譯直據於漢文口訣曲宣於邦諺雖萬幾之沓至恆一志之不分契理彌深覃思備至發揮妙賾若瑞景之麗高穹祛釋宿疑類層氷之泮巨壑香河縱其辨帝網重其輝諸儒博考於書林人肆講喙開士繼討於芮院各寫蘊腸言言務契於佛心句句易曉於俗耳闡揚祕藏誘掖羣迷甲申九年明天順八年正月刊經都監都提調黃守身等上進新雕印御譯禪宗永嘉集一部二卷備考上進禪集箋文略曰恭惟主上承天體道烈文英武殿下卓冠羣倫光膺寶曆慈悲在念九類咸入於度門利樂為心四境共躋於壽域克廣唐虞之化載崇乾竺之宗乃茲靈編首徹英眄逈通真際聿暢微言淬刃離硎盤錯之根迎解明銅出匣妍媸之貌自分赫舉五輪之指端點成兩卷之口訣遂使希有之妙集重為不朽之聖經爰命儒臣載加於宣譯并置釋子亦得以討論闢梵館於春坊飫天厨於日下言語曲循於氓俗清濁要叶於宮商出入百千之所詮闡明卅三之直旨重重一一若帝網衆寶之交輝剎剎塵塵如玄曦瑞景之普照誠指南於來學不迷北於販禪永惟大法之流旋入貞材之鏤二月二十八日王幸俗離山法泉寺見信眉斯智學悅學祖等諸禪師大設法會三日而罷傳教於戶曹給田二百結米三百石又令刑曹屬臧穫奴婢也三十口俾為香火之資四月刊經都監都提調黃守身等上進新雕印翻譯金剛經一卷心經一卷備考進經箋文略曰恭惟主上承天體道烈文英武殿下夙資德本洞達真乘等福慧於世雄配聖哲於大梵十善施物則之懿多能彰天縱之才兼覺悟於羣迷用發揮於祕義特垂口訣責委翻筵要因口以曉心遂轉華以為諺云云天順八年四月初七日又跋文略曰自譯此經逮唐迄今造疏著解代各有人法藏之注獨得其宗上命孝寧大君臣補率臣繼禧就為宣譯又得大宋沙門仲希所述顯正記科分章疏逐句消釋極為明備據疏分節釐入各文之下但希所據本非今所行時有不同大君與名緇詳加讐校既克脫稿亟令入梓模印廣布云云天順八年二月仲浣嘉靖大夫仁順府尹臣韓繼禧謹跋五月甲寅初二日命永順君溥傳于承政院曰近日孝寧大君於檜巖寺設圓覺法會如來現相甘露降黃袈裟僧三繞塔精勤其光如電又有放光如晝彩霧滿空舍利分身數百即以舍利供奉於含元殿又分身數十枚如此奇祥實為難遇豫欲復立興福寺為圓覺寺承政院啓曰允當仍請行賀禮從之孝寧大君補奉佛甚篤自少至老尤甚以檜巖寺為願剎常往來齊施至是如來現相神僧繞塔人皆不得見而惟補自言見之尚玄曰天順六年壬午十月吏曹參判韓繼禧奉教撰興天寺新鑄鍾銘并序有七年辛巳夏五月壬子釋迦如來舍利分身於檜巖寺孝寧大君補進二十五枚云云等說與今實録所載年分不同則舍利之分身已在於三年之前而但如來現相神僧繞塔之事在于是時者歟乙卯初三日幸興福寺與王世子及孝寧大君補臨瀛大君璆永膺大君琰永順君溥領議政申叔舟左議政具致寬雲城府院君朴從愚南陽府院君洪達孫領中樞府事沈澮兵曹判書尹子雲戶曹判書金國光中樞院副使金溉商山君黃孝源議創圓覺寺以璆琰溥叔舟致寬從愚河城尉鄭顯祖等為造成都提調禮曹判書元孝然及子雲國光溉為提調以僉知中樞院事尹涔崔善復都承旨盧思慎等為副提調初興福寺廢為樂學都監人呼為大寺慵齊叢話云圓覺寺是古大寺之基初有大殿及東西禪堂而已慣習都監寓大殿禮葬都監為東禪堂大殿之北為中部儒生所會世祖皆命毀撤更創大伽藍名曰圓覺寺六月丁亥初五日幸圓覺寺時軍士赴役者二千一百餘人凡撤傍近人家二百餘戶癸巳十一日瓦窰提調仁山君洪允成議圓覺寺法堂所蓋青瓦八萬張燔造所入甚巨同日以銀川君穳玉山君躋為圓覺寺監役督察官儀物一如臺憲戊戌十六日戶曹啓圓覺寺大鍾造成之銅可五萬斤除京外現銅二萬四千一百六十四斤八兩三錢其餘不足之銅請於開城府一萬四千七百十四斤五兩八錢京畿一千二百斤十兩五錢忠清道一千五百九十一斤六兩一錢慶尚道六千六百五十四斤十五兩九錢全羅道一千六百七十二斤一兩四錢以時直貿易上送從之辛丑十九日孝寧大君補啓今月十三日圓覺寺上覆黃雲天雨四花異香滿室又瑞氣自檜巖寺連亘京都寺之役人及都人士女無不見之七月癸亥十二日初圓覺寺匠人常餉九十人是日傳于承政院曰力多事慢為斃滋甚可汰四十人只餉五十人責之成功如不就當加重罪可以是意諭圓覺寺提調八月癸未初二日幸圓覺寺觀開基十二月壬寅二十三日以圓覺寺有異香瑞氣百官陳賀乙酉十年明成化元年正月甲子十六日圓覺寺大鍾成己巳二十一日幸鑄鍾所命撞新鍾其聲雄遠上嘉之即賜孝寧大君補鞍具馬一匹其餘提調如馬一匹如馬謂畫馬也備考大圓覺寺鍾銘并序崔恆撰略云恭惟承天體道烈文英武殿下念能仁氏之道慈以與樂悲以拔苦隨機普度厥教莫弘庶可憑依福利邦家越踐祚十載龍集甲申命建圓覺大叢林于都中遂鎔精金五萬斤鑄大鍾懸于雲雷之閣昭法器也三月丙辰初九日孝寧大君嘗讐校圓覺經至是事訖十九日刊經都監都提調黃守身等上進新雕印御定口訣翻譯大方廣圓覺修多羅了義經一部十一卷備考進經箋文略云恭惟主上承天體道烈文英武殿下握符御極記莂臨朝丕闡徽猷欽崇至教既博綜於羣籍獨深達於竺墳思廣甘露之門更布慈雲之廕煥日新之盛德發天縱之多能楷定口訣於契經發揮心法於了義特降斯典俾導靈詮臣守身等香海微漚儒林末葉叨將寡昧獲預選掄愧齷齪之塵容敢對揚於金地譯筆始迄於出藁刊板已得以成編奉進燕間用資乙覽翻華作諺續佛慧於無窮頌聖瞻天祝堯曆於罔極四月癸未初七日圓覺寺成設慶讚會赴會僧一百二十人披覽御定口訣翻譯圓覺經飯外護僧二萬甲申初八日幸圓覺寺命召諸山韻釋大設法會轉新譯圓覺經以落之備考圓覺寺碑銘并序金守溫撰略云龔惟我主上殿下在位甲申功成治定禮秩樂化邦家閒暇民物阜康上乃遊神至道恭默玄教思與億兆羣生共植德本同躋壽域如來一代所說三藏十二部中唯大圓覺真頓教真詮萬機之餘親定口訣漢諺交宣將使國人皆得聞大乘之道是年夏四月庚戌孝寧大君於檜巖東岡竪石鍾厝釋迦舍利仍設法會講圓覺經是夕如來現相空中神僧經行壇上瑞氣彌布放光照耀甘泉普洽舍利分身八百餘粒五月甲寅具靈蹟奉舍利以聞殿下與王妃頂禮于含元殿舍利又分身四百餘粒百官上箋稱賀乃大赦中外傳旨議政府若曰仁賢劫千聖迦文氏為第四道冒十方智周一界說法度生其道流至支那八萬四千餘部而圓覺一經乃本起究竟之果豫就譯名句發揮其義將以流布適伯父孝寧大君開闡法會諸佛如來現顯神變至於如此五濁像季遇此稀有宜乎重營興福舊剎名之圓覺用寓最上法文之義何如羣臣拜手稽首曰敢不秪若王之休命寺在國都慶幸坊周圍二千餘步初我太祖康獻大王定鼎漢陽寺為曹溪宗本社宗既共罷寺亦尋廢為公廨者垂四十年矣越六月乙卯殿下親幸于兹周覽白嶽鎮北木覔拱南厥位面陽厥址爽塏宜建大剎即命臣等提調監蒞其役先搆假屋於艮隅始造佛像忽見黃雲覆于屋上空花繽墜五色咸備等馳啓殿下御勤政殿受羣臣賀肆赦賜百官爵一級九月甲子寺之正殿上瑞氣騰湧上薄青霄屬于含元殿羣臣又上箋稱賀殿下大赦於是役徒坌集勿亟而勤四衆施捨惟恐或後至十月乙卯告訖以楹計者總四百有奇佛宇中峙賜額大光明殿左為禪堂右為雲集有門曰寂光之門次外曰般若之門次外曰解脫之門捿鍾有宇曰法雷之閣供辦有廠曰香積之寮鑿沼東偏植之芙蕖西開園苑樹以花卉正殿之後庋置藏殿曰海藏之殿又建窣覩婆此云塔也十有三層安分身舍利及新譯圓覺經殿堂寮舍倉庫厨𣞺各得位序規模宏敞金碧焜煌壯麗輪奐之美鮮有其儷至於楗椎道具恆用什器悉瞻悉備明年四月八日命召諸山韻釋大設法會轉新譯圓覺經落之殿下親詣道場令侍從臣僚及殊方來聘者皆入瞻禮于時五雲紛郁天花交雨白龍夭嬌雙鶴翩躚于雲際休祥遝至萬目咸覩特賜寺僧米布又明年四月八日以窣覩婆成設法會殿下親幸又有天花瑞氣舍利之異又有白氣騰上分為數道橫亘空中宛轉成輪重疊無盡日光黃薄僧尼道俗瞻仰膜拜者以億萬計及還宮學生耆老教坊皆獻歌謠都人士女填街咽巷抃舞踊躍歡聲如雷殿下降赦賜百官爵一級是年欲印圓覺經命鄭蘭宗書之名曰乙酉字以為鑄字之用慵齊叢話丙戌十一年明成化二年四月壬子十二日以圓覺寺有舍利甘露須陀味之異百官陳賀七月甲申十五日圓覺寺白玉佛像成迎入含元殿設點眼法會丙戌十七日以法會之日有瑞氣放光雨花舍利之異百官上箋陳賀十月甲寅十六日圓覺寺有舍利分身五彩瑞氣之異百官奉箋陳賀是年王巡幸江原道大王大妃及王世子從焉幸上院寺為落成其重創也備考五臺山上院寺重創勸善文惟我聖上誕膺天命再造東夏兆民乂安四域寧謐無小無大共被天地之私若蒙若釋疇無報效之志顧丘山恩重毫髮力微江陵五臺天下名山文殊住處靈異現顯上院寺尤其勝地某等竭衣鉢之貯重創於是寺以為祝釐之所兩殿聞之特降綸命若曰僧等為我欲創伽藍豫當補助與國人廣利出御衣若干襲命輸米布土木之費以某等特承殊遇區區涓埃之誠欲裨岡陵之算幸徹宸聰有此大施三寶以之增崇法輪以之重轉普願諸善檀那見聞所及悉生歡喜同發菩提共植德本上祝聖壽於無疆下延洪祚於億載福利無邊現未俱益云天順八年臘月十八日備考御製文世間有七重三寶及父母君善知識三寶為出離之宗父母為育命之宗君為保身之宗善知識為導迷之宗自豫潛邸以來我慧覺尊者信眉早相知遇道合心和每提攝於塵路使我恆懷淨念不沉欲坑致有今日非師之功耶非多劫之宿因安能如是契合耶今聞我違和力疾下床晝夜奔來數百里外雖不事之高尚若度生之大悲豫聞驚動感淚無窮又聞師與悅學悅祖師學祖為我盡賣衣資重創靈剎師之為我用心我之為師感恩非人所述我故為師等隨喜略助所費為究竟之正因所謂直心菩提者也於是付囑世子永垂後嗣云佛弟子承天體道烈文英武朝鮮國王李慈聖王妃尹氏彩色米五百石綿布五百匹正布五百匹正鐵一萬五千斤備考五臺山上院寺重創記臺山在江原之境盤根三百餘里其雄深高大與楓嶽相甲乙枕山而邑者州若郡縣無慮十數官山有五峯高下均敵大小相侔望之若芙蓉之出水臺閣之浮空故號五臺其中臺之南有寺曰上院再罹鬱攸之灾時則有幹善之士從而創造隨廢隨起然其制厄挾而卑塞僧不樂居天順建元之八年四月我世祖惠莊大王不豫彌留浹旬大王大妃殿下憂懼遣內官咨於慧覺尊者信眉大禪師學悅等雖中外寺社作法祝上所在皆然豫欲於名山勝地創一伽藍以為別願之所如有國家祈請則就之於此卿等遊歷四方必知其處其以實聞信眉等對曰臺山我邦名山而中臺上院地德尤奇僧徒結制必有警枕之異不幸厨人失火化主力寡急於取辦僅得庇人若因其舊基改搆廣其規制以為一山名剎當其祈祝別降香幣作佛事無如此寺便大王大妃殿下傳旨僧言允當即啓世祖命僧學悅主營締之務諭慶尚監司舟米五百石運于江陵府濟用監出帛布一千匹以資經始既而世祖疾間有漸至平善大王大妃殿下且驚且喜疑其山靈佛化默感於一言之頃世祖親制功德之疏頒示宗親宰樞欽承盛旨占出所有仁粹王大妃殿下承兩殿注意之隆益施租五百石以濟其乏於是悅公早作夜思躬加督勉始於乙酉三月告訖在於翌年丙戌先是佛殿東西皆置上室公則別寓巧智撤上室兩壁代以障子若大精進則揭其兩障與佛殿通為一場南廊之間起樓五間以捿鍾磐道具仍門其下通其出入東上室之東立羅漢殿西上室之西立青蓮堂青蓮室之西又有齊廚室僧堂禪堂廚庫泡湢之處無不各得其宜以楹計者總五十有六於槽廠之傍鑿石為槽刳木為筒冷泉激射取用不渴以至日用什器之屬悉贍悉具江陵舊有葑田數百結慧覺尊者請屬於寺治為水田播種數百石歲收其熟以為常住之資仁粹王大妃殿下為寺有願成幀佛又納租一百五十石為先考妣每名施食納租六十石世祖聞寺功已畢又賜米五百石布一千匹使衣鉢坐具湯藥四事咸備聚韻釋五十二員大設落成會是年世祖巡幸江原駐蹕於山下省烏之原與大王大妃殿下及王世子扈從文武羣僚幸上院寺是日適落成開堂山水秀麗洞壑清幽殿舍靚密僧徒濟濟法器齊鳴梵唄偕作世祖躬詣佛殿三爇香行禮拜令侍從羣僚亦許膜拜仍公召對移時公舉山中故蹟且本寺興廢與始末與夫佛祖東西密付心法之要訣談鋒迅利理致邃奧言皆稱旨世祖大悅即賜內帑布帛以賁其會御駕還駐次明日學悅等率徒衆詣行宮謝恩成化五年庚寅今我主上殿下以上院為世祖大王願剎且以疇昔駐蹕臨覽之地持賜內需奴婢雜徭及屬寺田地稅外常斂與夫鹽盆之稅並下王牌皆得永免後八年公啓寺事已完願賜骸骨髓意臥雲特依允公衲衣飄然南邁請作記傳遠於是命臣筆其事臣聞仁聖之君之治天下國家也莫不躬仁義之德以立大化之原亦莫不崇清淨之道以致無為之治惟我世祖惠莊大王身定大難克靖國家檢身修德力於為善立經陳記垂訓萬世大化之本已立而為治之具已張遂致東方所無之太平間念釋氏域外之大聖其道以慈悲清淨為貴而推其利澤又可以福邦家而壽君親縱聖學首出庶物其於三藏九部之文一心萬法之宗莫不研究其微而心領神會臺山雖遠上院雖僻以道衆所集則必為之改造特賜其費以營其始暨其告訖命施內帑之珍設會落成弘揚梵采普與法界含靈同霑利樂於無邊爰舉玉趾照臨山谷風雲動色草木生輝自有天地即有此山前乎千百載之既往後乎千百載之方來而未知有此盛事與否不寧惟是遐陬僻壤山顛水涯之民何幸見車馬之音羽旄之美得以蒙二天之澤而留為美談傳于億載是宜付鴻儒巨筆作為雅頌托于巖石以垂不朽而臣之愚昧誠不足以發揚大美然光奉聖旨不敢以文拙辭純誠佐理功臣輔國崇祿大夫領中樞府事永山府院君臣金守溫拜手稽首奉教謹撰成化十一年正月日幸金剛山長安寺禮曇無竭真身備考金剛山長安寺新鑄鍾銘序西山大師撰山之根東連日本水之源西接天竺吾東方山水之美未有如金剛者焉也禪剎之精且潔者亦未有如長安剎也剎左山之西爽塏居最屋宇壯麗清修苦節之徒如八表雲之從龍焉常住衆數不下二百自新羅為山之本社至於我世祖大王親幸是山禮法起真身爐香鍾梵極為隆盛也下略幸洛山寺瞻禮觀世音大士相備考洛山寺新鑄鍾銘序金守溫撰太上大王在位之十二年自乙亥登極之年計之者也東巡登金剛山禮曇無竭並海而南親幸是寺與王大妃及我王上殿下睿宗也瞻禮觀世音大士相於時舍利分身五彩晶炯太上王發大誓願命禪德學悅重創以為我殿下資福之剎下略成化五年己丑四月日撰幸乾鳳寺駐蹕五日定為願堂賜田結以為供佛作法之所備考乾鳳寺事蹟記惟成化元年乙酉四月十一日此誤也故今考正之我世祖大王東幸時駐蹕五日定願堂賜田結以為供佛作法之所御製御筆其發願文曰凡我同契之人既生淨信勿作妄惑妄惑生處皆是緣塵緣塵之聚重濁成山畢竟限礙輕清無日若欲除之畚鍤并用猶如大海羅蚊同飲悉得充足勿為自棄欲蠲漂沈菩提結誓其在兹焉署曰承天體道烈文英武朝鮮國王李御諱安玉璽奉安于本寺願堂勿侵徭役尚玄按世祖大王於成化元年乙酉四月十一日幸圓覺寺御製誡文與此發願文一字不錯也五年乙丑睿宗大王仰體先聖之志又定願堂下教敦諭又命勿侵徭役六年丙寅成宗大王特遣孝寧大君臣補領議政高寧府院君臣申叔舟上黨府院君臣韓明澮進勇校尉臣趙興洙等備考先王之蹟特賜奴婢採藿船壚盆等環寺山四方十里封標定界又命勿侵徭役嘉靖三十一年壬子鳳林齊安兩大君入啓承教曰乾鳳寺列聖朝願堂寺剎也所重自別本郡也非吝坪十結田劃給以助香火之資萬曆三十年壬寅十月懿仁王后朴氏給復戶五結順治六年孝宗大王又定願堂重建御閣又命勿侵徭役康熙二十二年癸亥三月明聖王后金氏賜千金並賜寢帳卓衣什物雍正三年甲寅又賜千金重修釋迦如來齒牙奉安之九層石塔乾隆十九年甲戌貞聖王后徐氏建八相殿定願堂秋八月英宗大王賜肅宗朝御製折檻圖奉安御筆閣又命願堂寺剎勿侵徭役遣別提臣李仁培監其齊嘉慶四年己未巡察使南公徹製泗溟堂大師紀績之碑丁亥十二年明成化三年佛紀二四九四年四月壬寅二十七日以圓覺寺有舍利分身之異百官陳賀癸卯十二八日圓覺寺塔成設燃燈會以落之尚玄按圓覺寺碑文四月八日窣覩成波設法會云云今據此實録則塔成於四月二十八日未知孰是兩存之睿宗襄悼王李晄在位一年己丑元年明成化五年佛紀二四九六年經國大典成頒度僧及寺社條例備考禮典度僧為僧者三朔內告禪宗或教宗試誦經心經金剛經薩怛陀報本曹私賤則從本主情願啓聞收丁錢正布三十匹給度牒過三朔者族親鄰近告官還俗當差知而不告者並罪度牒借者與者依懸帶關防牌面律論禪教兩宗每三年選試禪宗則傳燈拈頌教宗則華嚴經十地論各取三十人諸寺住持兩宗擬數人薦望本曹移文吏曹磨勘差遣三十朔而遞如有所犯兩宗報本曹核實治罪犯奸者并坐薦僧住持遞代時傳掌有破失物懲納寺社凡寺社勿新創唯重修古基者告兩宗報本曹啓聞創寺於楊州雲嶽之原賜額曰奉先寺備考奉先寺記金守溫撰奉先寺者我大王大妃殿下為世祖而創之者也成化紀元之四年我世祖大王升遐羣臣擇地於楊州之地東距州治三十有餘里山曰注葉原曰雲嶽以其年十二月有日奉葬世祖玄宮于此禮也大王大妃殿下懿旨以為我大行大王躬遭大亂克正大憝聖德隆功自有東方莫之與京邦家不造奄棄羣臣嗚呼痛哉稽諸古制先王陵寢之所必有精藍之設今大事已畢卿等其相造寺之基以聞於是上命河城府院君臣鄭顯祖上黨府院君臣韓明澮綾城府院君臣具致寬等為提調陵室之南有一奧區山回水洌允宜佛宇之壤臣顯祖等奏蒙允可經紀於己丑六月造訖於秋九月以楹計者總八十有九間塗溉黝雘極其鮮明佛殿僧寮輝映明達鈴鐸琴筑風至自響以至薦席簦榻無不精麗楗椎道具什器之類悉贍悉備諸山寺剎無與為比其土田奴婢錢穀常住之資之數永為佛僧供養則別有文簿茲不及焉以其年九月初七日大設薦世祖法會以落成懿旨又以為寺則既立然距陵寢岡巒相隔宜搆真殿于寺側使大行在天之靈亦得遂皈依之敬以和樂冥遊乃立影殿于寺東名曰崇恩殿設參奉二員以備晨昏之謁朔望必遣獻官與陵室同禮於是提調臣鄭顯祖等還奏事畢睿宗大王賜額奉先寺參考奉先寺鍾銘姜希孟撰恭惟承天體道烈文英武殿下龍飛九五光御金輪神化所屆邇安遠肅民物熙皡積十有四年不幸有漏緣盡大數難逭羣臣無祿奄爾禮陟今我主上殿下孝思通神瞻號罔極欲報恩深終天慕遠乃於光陵之傍營大梵剎曰奉先寺爰命有司鎔鑄洪鍾於是該官奉旨載稽鳧氏量定金錫合成六劑模範將成命臣作銘臣竊惟鍾之為器於金最巨厥聲春容警遠懼邇其妙至於上徹三天下該六塗吒王受輪夢求長擊提婆再嗚大興真教因緣功德詎可勝言今以是鍾警于六府豈特道侶發其深省迷倫息其苦趣哉必將冥達玄宮聞于左右頓增佛智速登彼岸者矣而况世祖大王盛德隆功所以輝映萬古與夫我嗣王殿下報本追遠之誠所以際天極地者不可不托諸鍾鼎以垂不朽謹拜稽首而銘曰園陵開寶剎金碧聳崢嶸法樂震人天妙香諧幽明中有大楗椎鯨吼冠羣聲有具須撞鳴有耳方可聽法不離諸塵二合而後成有聞無所聞當有實聞性能聞者詎是本來實清淨清淨無垢穢是名大圓鏡人人具是理一聞便蘇醒上徹阿伽尼橫遍恆河沙度盡無邊生福利成自他列聖登正覺諸有入三摩三光咸順軌萬姓無札瘥塵墨并瑤圖磐石固邦家山平海可竭功德終不磨成宗康靖王李娎在位二十五年庚寅元年明成化六年佛紀二四九七年四月初六日王親筆賜榆帖寺蠲免田地及鹽盆等稅俾資香火之供備考榆帖寺事蹟成宗大王親紆御筆賜之其文曰教榆帖寺段段字朝鮮吏讀字義如云者也世祖大王憫其頽廢乃命重修睿宗大王賜田畓奴婢以為奉佛之資今豫恭承世祖睿宗兩聖之志其所耕田地稅納雜徭并皆蠲免寺中所煮鹽盆亦令免稅俾全香火之供成化六年四月初六日辛卯二年明成化七年佛紀二四九八年六月禁都城中念佛所驅逐巫覡於城外王大妃命購佛經于明侍講官金季昌執義孫舜孝言其不可竟寢其事以仁粹王妃命重修正因寺備考金守溫正因寺重修記云歲辛卯春我仁粹王妃殿下以為寺因當時務於速就材木未甚修良締搆未甚精微設使未久即腐壞何以示後世乎乃命判內侍府臣李孝智掌出宮中嘗所約損供御之物以米布計者若干授內需司將剋日撤舊創新大王大妃殿下以為懿敬大王睿宗大王兩陵玄室密邇一寺鍾鼓可以相聞若因仁粹王妃改造之願并力共財以助正因之事功亦易集而豫所以為懿敬睿宗薦福之誠亦庶幾有遂乃別敕內需司益出錢穀仍命苟有不給隨即奏聞以續其用其年二月起始命母使國人募民賞役適畿甸歲侵無問老幼爭先雇食荷鍤成雲挽絙蟻附不示扣朴人樂赴功至冬十月有日考成總一百十九間碓磴溷湢皆各有處塗溉丹雘輝煌炫耀殿堂廊廡通豁崇麗房舍軒戶鮮明靚密棟宇嶙峋像設嚴煥寺剎之美與奉先寺相甲乙其殿堂制度間閣廣狹皆前判華嚴大禪師雪崚之奏允也仁粹王妃殿下以為有寺無穀僧無所資特施禾穀並五百石存本用息不絶食輪凡什器之類悉贍悉備歲癸巳四月初八日大設落成會又成大乘諸經是日雲有五色異香滿洞瑞氣燭天遠近緇素數萬餘人瞻仰膜拜嘆未曾有臣伏惟母子之恩夫婦之倫本乎天之經地之義而自天子達于庶人者也惟我懿敬大王睿宗大王春秋鼎盛聖德方新而奄棄羣臣此大王大妃殿下仁粹王妃殿下所以悲憐感慕之意發於至情雖窮天地亙萬世而不渝者也雖然一國臣民徒知兩聖為先王冥福而崇信三寶莊嚴法會之盛至於如此而不知兩聖所以敦子母之恩謹伉儷之義以明民彝物則之道為億兆羣生觀感之機至於大役畢矣而猶恐一事之勞於民大功完矣而猶慮尺布之費於國其愛民憂國兢業戰懼之懷則又豈臣民之所知哉今我主上殿下承兩聖之至意念先王之至恩時節親舉玉趾躬奠牲幣於陵上宸情依依不勝霜露怵惕之感以寺在寢園之側乃降明旨曰我仁粹王妃所納田地奴婢稅外諸徭並皆除免安處徒衆無有惱害恩賜便蕃不一而足是蓋嗣王追念先王報本反始之至德誠千載未有之聖也是蓋孝理之極通於神明格於佛乘受天百祿時萬時億享子孫萬世無疆之慶也吁其盛矣哉壬辰三年明成化八年王讀綱目至朝錯上書生穀之土未盡墾遊手之民未盡歸農侍講官李孟賢曰臣謂今亦如此矣僧徒規避軍役遊手之民坐食不知其幾雖難盡舉請申明禁僧之法王曰令司憲府紏察以大王大妃命重創楊州牧天寶山檜巖寺備考檜巖寺重創記金守溫撰東土山川之勝名於天下而佛廬之處于其間者又不知其幾百十至於極仁祠制度之備而具法王行化之體則未有如檜巖者也昔天曆間西天薄伽納提尊者見此寺基以為酷似西天阿蘭陀寺且曰迦葉佛時已為大道場於是執繩量地以定其位時得劫前礎砌當時暫庇屋宇以識其最而已玄陵王師普濟尊者受指空三山兩水之記遂來居此乃欲大創分授棟梁奔走募緣功未及半而王師亦逝矣其徒倫絶澗等念王師未究之志踵其遺矩以畢其績牧隱文靖公記之曰普光殿五間南面殿之後說法處五間又其後舍利殿二間又其後正殿三間廳之東西方丈二所各三楹東方丈之東羅漢殿三間西方丈之西大藏板三間由普光殿東西分左右諸殿南起衆寮差參鍾樓沙門厨庫之所賓客之位秩乎有序棟宇連亙廊腰蔓回高低冥迷不知東西凡為屋二百六十二間自是之後幹善之士世不乏人然或始佛殿而未及於僧寮或稱鍾樓而不建客室於東而西已傾更南而北又墮蓋寺大故功巨功巨故人不能遍搆而盡緝遂使一國大叢林幾如曠宇成化壬辰春大王大妃殿下傳懿旨于河城府院君臣鄭顯祖若曰豫一婦人承祖父餘休佑我世祖大王誕育聖子神孫是雖皇天眷佑東方亦未必非世祖夙植德本於佛乘也自古慈母欲保於其孫忠臣欲壽於其君莫不惟三寶是歸檜巖東方大伽藍也三和尚相繼開山三山兩水之記肇於指空實壽君福國之地也頗聞築基不固殿舍階砌積以雜石故創造未久而屋已老今欲門閣制度罔改于舊庭除所履悉易熟石計其功課倍於初創卿亦必有種善之因得尚公主卿其用力俾遂豫弘願顯祖對曰世皆言重創之績難於肇興財穀雖多苟不得人罔有以成今正陽住持處安勤敏通達幹事之材鮮有及者懿旨允可遂以安移住檜巖財穀所費內需司專掌隨乏隨給以濟其用府院君亦傾其私蓄以供其缺安奏募僧俗自願計功以償日役萬有餘指不督自勸始於其年月日閲幾十有三朔而告訖殿舍間閣無所更改欄墻廣狹無所增損而房櫳門闥益為之洞豁塗溉丹雘益為之絢煥百餘年頽敗之舊寺一朝變為重新之寶剎云云癸巳四年明成化九年佛紀二五年大王大妃命有司重創驪州鳳尾山古神勒寺賜額曰報恩寺備考奧地勝覽驪州報恩寺在驪江東岸鳳尾山古神勒寺有甓浮圖故俗呼甓寺睿宗朝遷丘陵于寺之西十里遂改搆為巨剎因賜今額寺有江月軒高麗僧懶翁所居懶翁死其徒弟藏舍利于石鍾仍建真堂李穡為記又有大藏閣李崇仁為記金守溫撰神勒寺重創記云驪之為州居國上流山明水麗號稱樂土而神勒寺正圖形勝之中昔玄陵王師懶翁韓山牧隱李公兩人相繼來游由是寺遂為畿左名剎越成化九年大王大妃殿下命有司因舊更創賜額報恩為先王陵寢之道場焉初世祖大王夢見世宗大王昵奉晤旨歡如平昔世祖追感益切為世宗大王后欲於英陵之側創建佛寺以為薦福之所乃命有司伐材流桴積于江岸一夕潦漲盡為狂濤所逸明年世祖晏駕朝家多故不遑經始會日宮上言英陵坐局所直之宿有不應古經者宜改建玄宮以膺丕休睿宗下羣臣議皆曰改葬古矣葬故有闕則尚且改葬况今風水之司有言必有所稽不可不從睿宗分遣宰相求擇厥地羣臣啓曰驪典之北有一大洞岡巒列勢主對粲然法曰山頓水曲子孫千億以臣等所相陵寢所安無右於此睿宗傳旨于朝曰可以成化五年己丑遷世宗梓宮于驪州襄事既訖大王大妃殿下懿旨若曰先王見父王于夢將欲創寺英陵之下仙馭遄回奄棄臣民未及營締今先王在天而我等不亟從事於遺旨其何以奉先王於地下乎即命上黨府院君臣韓明澮西平君臣韓繼禧等令母遠寢園擇定置寺之處臣明澮等啓曰陵室坐地之內無可立宇之地神勒一寺一名甓寺古賢游賞之迹宛然且去先王塋域甚邇鍾鼓之聲可達若即而修之則因舊為新事半功倍莫此為便壬辰二月懿旨傳曰今陵室甫畢不可又使齊民今刊經都監已罷所用錢穀尚多其餘其內需司專掌出納償役遊手無或造斃命臣明澮臣繼禧為提調驪州牧使臣李慎孝原州牧使臣金春卿內侍府尚膳臣李孝智為監役官以其年二月始役告訖於冬十月因舊而修葺者幾間新創而改舊者幾間總二百有餘間鍾鼓道具與夫日用什器之類悉皆新鑄臣惟寺剎之興廢固有待於此時而又有數關其間神勒風景之美聞於我東而士大夫風帆往來舳艫相銜未有一人就而興創之今黃驪千百年山川磅礡之氣潛藏伏乃發於聖明之日先王之玄宮載營厥邑大事已定大慶已始開我億萬年無疆之基於是府升為州寺亦為之一新是乃時之所待而數之所關者然也我大王大妃殿下不以時有古今地有彼此而盡念先王之遺旨陵屋既遷亟創佛寺其善繼善述丕承丕顯之美光于前聖卓越前古臣雖老昧敢不拜手稽首敬書于冊明示後世乎乙未六年明成化十一年毀撤城內外尼寺凡二十三所參考傭齊叢話云城中尼舍曾已毀撤而惟存淨業院驅出於東大門外安巖洞等處有三四舍南大門外種藥山南舊有一舍其後兩尼各搆小舍於其傍而居之至今有十餘舍尼姑化得檀那各作棟宇奠飾丹艧如四月八日燃燈七月望日盂蘭盆臘月八日成道爭施茶果餅物供佛邀僧紅粧繡裳坌集山谷丙申七年明成化十二年復設弘文館命蔡壽等六人讀書于藏義寺後以龍山佛寺給弘文館分番讀書名曰讀書堂備考慵齊叢話云復設弘文館蔡耆之壽許獻之琛權叔強懺楊斯行熙止俞克己好仁曹大虛偉等受命讀書於藏義寺舊有僧舍在湖南歸厚署後岡世稱十六羅漢有靈驗香火不絶有僧尚雲居其舍娶妻生子憲府鞫之罰僧還俗移佛像于興天寺遂以其舍給弘文館分番讀書名曰讀書堂又有一本云王即位首開弘文館選文臣蔡壽等六人讀書于藏義寺後修龍山廢佛寺為其所未有名號命曹偉作記並額讀書堂三字賜酒賜樂遣承旨落成丁酉八年明成化十三年佛紀二五四年先是國王誕辰勳舊之臣就僧舍設齊祝釐王曰詩不云乎求福不回豈可佞佛而求福乎其罷之時朱溪正深源宗室也上書請罷祝壽齊王手書答曰爾力陳正道排斥異端欲使我為堯舜之君吾雖寡昧實嘉爾誠今從所言時有人以田民施佛子孫貧窮與僧訟纍屈擊鼓訴之王親筆判曰納田于佛以求福也佛者不靈子孫貧窮田還于主福還于佛戊戌九年明成化十四年佛紀二五五年王親行養老禮於國學金守溫以好佛故命勿與於禮庚子十一年明成化十六年佛紀二五七年貞熹王后命僧處安重修龍門寺備考龍門寺重修記龍門山在砥平縣西盤回百里奇秀可覽寺居其陽為畿旬名剎久矣正統丙寅昭憲王后賓天我世祖惠莊大王在潛邸哀痛罔極欲薦冥福丁卯秋造二佛八菩薩像安于是寺設搆寶殿越明年戊辰設慶讚法會親往祈祝有舍利靈應語在其記寺之名益顯事往時遷守失其人寺隨頽圮貞熹王后以是寺乃世祖為先后創修之願剎造安佛像親受含利之地留念不已命揀緇徒得檜岩寺住持處安以付當度之責木石之費多出於內帑成化庚子春始事於工踰朞而告訖凡為屋以楹計者若干其規模濶狹悉遵其舊層樓廣廈隆棟厚磔雕繪之工視昔愈侈遂以安兼住是寺安自正陽移檜岩為重創也以檜岩兼住龍門亦為重創也則安之為人可知而我聖后追念先王丕纘舊緒得其人委其事以圖興復將以付教道於無盡種福田於不第未知後安以住是寺者能以安之心為心安之事為事仰體聖后紹述之意範垂千百載而不之贊乎顧後居是寺者當時成之昭陽赤奮之秋七月七夕折衝將軍行忠武衛上護軍西河任士洪記壬寅十三年明成化十八年佛紀二五九年王幸光陵仍拜影殿于奉先寺魚世謙以大司憲扈從寺僧欲饋百官公諫曰以堂堂扈從之臣受僧施食於國體何况百官皆自責飯不患無食王曰任爾不食公與臺諫皆不食久邊國主李獲日本薩州人遣使獻燒香胡椒鑞銀絹淪具溘素等物上書願得大藏經以無佛經謝命優禮送之甲辰十五年明成化二十年副提學李命崇等上疏言唐太宗武定禍亂文致太平而貞觀之治不能擬三代者納諫之心始勤終怠也殿下於異端固無崇信之心而度僧之門一開異端之流漸熾至於僧徒亂入學宮是由殿下從諫之志怠也上御書疏尾曰驕侈生於安富紀綱廢於舒肆卿等規諫正中我病時大妃頗信釋教諸臣屢請王從中導達王雖屢以為言而尚未得懿旨故至是受以為過丙午十七年明成化二十二年冬十一月王教曰金宗直常言宰相不可試以詞章然中朝文士奉帝命而來必與之酬唱可不預習乎於是以食為民天論試朝參文臣二品以上魚世謙居第一王曰此佳作也但耗損民天者僧也而論不及焉此可缺也仍賜世謙段匹戊申十九年明弘治元年仁粹王大妃命僧學祖重修海印寺備考海印寺重修記伽倻之山最秀東南峻絶峭壁如畫山之陽有巨剎曰海印新羅哀莊王時高僧順應所創也寺前有蓬萊方丈瀛洲等峯衆壑之水繞出前洞奔流激石萬雷轟豗俗號紅流洞自武陵橋抵寺十有餘里丹崖翠壁愈深愈佳古記山形絶於天下地德隻於海東者信不誣矣文昌公崔致遠晚年掛冠卜隱於此讀書堂廢而題詩石尚在高麗時藏國乘又藏大藏經板山之著於圖志寺之額於東方者尚矣我世祖惠莊太王中興王業萬機之暇留意釋道思欲洪揚竺教普濟羣生天順戊寅命僧竹軒等就本寺印大藏五十件又命慧覺尊者信眉燈谷學祖等往視之藏經之堂隘且陋因命本道監司稍增舊制措四十餘間越十二年戊子世祖上賓貞熹王后克定大義寧濟東民深仁厚澤浹于遠近念維世祖之尊崇篤信者琅函祕典曾幾何時藏經之堂已為傾陊可不動念於是乎慨然有重營之志而歲辛丑始停住持命學祖主其寺屬因歲侵國家之多事未遑舉也癸卯貞熹升遐仁粹王大妃仁惠王大妃殿下遹追先志凡所以嗣徽音而薦冥福者無不盡其心而悼貞燾之有志而未就也則又命學祖往董其役戊申春施內需司米布若干石匹遣都料匠朴仲石等改搆板堂三十間扁曰普眼堂又撤板堂中佛殿三間移搆於寂光殿西扁曰真常殿又撤祖堂三間移搆於真常殿側扁曰解行堂明年己酉春又施米布又明年亦如之搆窮玄探真鑑物雙運等堂及一源谷應總持倒瓶等寮修講堂曰無說食堂曰滿月改營毗盧殿曰大寂光主佛補處皆改飾黃金起鍾樓曰圓音建中門曰不二撤舊大藏殿移營於寂光殿東扁曰含虛寮莊銀字大藏經幾卷又營解脫蕭然玄鑑圓融雙割浩然逗遠緣起冥真玄根達俗省行重營轉生作𤍨等寮又起東西樓庫東曰無盡藏西曰式盈凡為屋百六十間或增或損皆因舊制而宏麗精彩倍之庖湢廄溷之所鍾魚鐃鼓之類亦莫不畢具而一新金碧焜煌照曜山谷乃於秋九月望招集法侶數千大設法會以落之於是乎山門之事畢矣燈谷以偉曾遊是地粗識其槩走書求記甚勤偉本儒者徒於釋教蓋懵然者也修善種福之理輪回因果之說未之學也其餘功德何足論之有無哉雖然崔文昌吾東方文士之祖此是終焉之所則不可不致意於此而况兩殿為先後之誠終始彌篤在所當書垂之罔極而能奉慈旨孜孜靡遑程功授成不使小怠搡述要而收功速在乎董役之得其人也可不記其勝蹟與古順應同傳不朽乎噫盛衰數也成毀亦數也寺創於有唐貞元十八年歷新羅高麗巍然獨存於兵火之餘至于今日遇太平之世逢妊姒之聖殿堂寮宇煥然一新豈非有數乎其間而海印之一大幸耶抑不知成毀之數一係於天耶一係於人耶盛衰成毀之理無窮於人世則寺之長如今日亦安可保耶使後之主此寺者恤念兩殿篤孝之誠燈谷營搆之勤謹守不毀母徒諉於盛衰成毀之數則可矣弘治四年龍集辛亥上浣通政大夫承政院同副承旨兼經筵參贊官春秋館修撰官昌寧曹偉記己酉二十年明弘治二年佛紀二五一六年春正月兼掌令李承健承命設鄉試於黃海道還言臣發策問本道惡疾救治之方永柔訓導權季同對策曰供佛則可救此言有害名教故不取也王乃教曰季同之辭豫甚憤焉當朝家舉賢之日不陳堯舜之道鼓唱浮屠之法是欲使豫如梁武之捨身唐宗之膜拜而後已乎仍命憲府拿致季同竄于極邊又飾該曹勿復度僧仁粹大妃造佛像送于淨業院儒生李鼊等取而焚之王不之罪癸丑二十四年明弘治六年佛紀二五二九年頒經國大典續録禮典曰度僧續軍額敷盛間勿許度僧違者囚一族督現參考慵齊叢話云成宗嚴度僧之禁州郡推刷無牒者長髮還俗中外寺剎皆空燕山君廢王李㦕在位十一年戊午四年明弘治十一年黨禍作時釋陸行設教其徒千餘人或止之曰禍患可畏行曰使先覺覺後覺先知覺後知以吾所知者告人耳禍福天也吾何與哉庚申六年明弘治十三年春印海印寺大藏經王妃慎氏之命也備考印成大藏經跋原夫妙湛圓明虛徹靈通包羅四維綿絡十方出乎萬衆之表超乎兩儀之先非今非古無始無終昭昭動靜之間歷歷視聽之際本無凡聖之殊安有利鈍之異秪為衆生日用而不知識浪內湧業風外湊翳天性於三惑瞽慧日於重昏長奔苦趣無有休期故我大覺隨其根機演無言言開經律論普使羣迷均沾法雨等證菩提復此妙湛之域還一真之境矣弘治十有三年春我王妃殿下宿種內薰善根外發奉為主上殿下睿算天長元子寶體椿年地久命臣就板本所海印寺做紙八千餘卷印此三藏部法粧潢畢備琅亟緗帙眩輝人目越明年孟夏製道具集韻釋百八期三日轉讀以落之臣竊惟理絶名言強演教者機分小大認玄源者夫因指以見月執指以為月終無見月之理因詮以得意執詮以為意寧有得意之時必也詮指兩忘月可見而意可得矣雖然如是直得意月亦忘忘其所忘然後本地風光自然呈露要知四十九年橫說竪說盡是黃葉止啼空拳誑小若是過量漢憑斯法門從粗入精沂流窮源直破虛空入佛覺海則雖曰彌天葛藤換成菩提淨樹滿口雌黃還同般若靈詮如斯功德塵墨難窮恆沙莫喻以是勝緣聖壽無彊儲齡罔極八方無警四民有樂宗圖永固於磬石瑞氣長騰於魏闕斷無疑矣然則我殿下之弘願圓成非心思口議所能髣佛也詎不韙歟皇明弘治十三年六月日黃嶽山人臣學祖謹跋甲子十年明弘治十七年以圓覺寺為妓坊以成均館為宴樂之所備考燃黎室記述時分遣諸道採妓女入京號曰興清曰運平曰斷平曰續紅分置各院以圓覺寺為聯芳院處續紅又以成均館為宴樂之所撤移孔聖位版置於高山庵逐諸生空太學聚巫覡淫祀其中中宗恭僖王李懌在位三十九年己巳四年明正德四年佛紀二五三六年自廢朝以後都城寺剎皆廢為公府兩宗托虛名於清溪寺號為禪宗冬十二月有狂儒數人到寺持經帖而來寺僧日精令寺奴告訴儒生多取寺物捕盜廳將入啓搜其家只有佛經數帖而已具以實啓命致儒生於政院責諭放之還其經於寺庚午五年明正德五年佛紀二五三七年三月二十八日興天寺舍利閣災命推鞫儒生及傍近居民寺本新羅古剎太祖悼神德王后之薨命厝寺內仍創舍利閣嵽高五層嵬立都中且藏寶物佛經于其中自燕山朝廢為分司僕寺中宗即位因為公廨先是火焚其寺只遺舍利閣至是大妃命中使移佛經于內需司儒生尹衡等本無賴或劫奪凌辱之翌日夜初鼓火始起光焰蔽天王初疑奸人欲藉以作亂久而乃定王大怒指為儒生所為命治尹衡等罪壬申七年明正德七年佛紀二五三九年毀撤圓覺寺以其材分賜燕山時毀家諸人實録留考或傳中宗命移圓覺寺塔于楊州檜巖寺及撤下三層忽有白雲繞塔之異有司以聞王乃命止之云云未知其事倘在是時者歟庚辰十五年明正德十五年佛紀二五四七年春命僧學祖印海印寺大藏經一部四月集百八法師轉讀三日甲午二十九年明嘉靖十三年佛紀二五六一年十一月初一日沙門智嚴入寂備考碧松堂野老行録云大師法諱智嚴號野老所居堂曰碧松俗姓宋氏父曰福生扶安人也母王氏夢一梵僧設禮寄宿因以有娠以天順八年甲申三月十五日生焉為人骨相奇秀雄武過人幼好書劍尤善將鑑弘治四年辛亥五月野人寇朔方殺鎮將成宗大王命許琮帥師二萬討之師亦仗劍從之舉鞭一揮大竪戰功焉既罷征喟然嘆曰大丈夫生斯世也不守心地役役馳勞縱得汗馬之功徒尚虛名耳即拂衣入雞龍山臥草菴參祖澄大師投簪落䰂時年二十八矣自爾志行卓厲樂修禪定若隋郎將智嚴之儔焉一日思欲參稟遠挹風猷先訪衍熙教師問楞嚴深義次尋正心禪師擊傳燈密旨俱振玄微多所悟益數五年間或之楓嶽或之楞伽游戲諸山居無定止厥後入智異山性度益弘風鑑益明身無再衣日不再食杜門冥寂不修人事其儀範緇林者可謂一時之最而後學之宗也然不修人事故不諂於世不諂於世故不賤賣佛法不賤賣佛法故泛參禪學者望崖而退多以倨慢譏之古人云非魚安知魚此之謂也若導初學則先以禪源集別行録立如實知見次以禪要語録掃除知解之病而指示活路也凡接人機鋒大略若此有時與門人靈觀圓悟一禪等六七十之徒講諸大乘經論則圓音落落若翻大海之波瀾焉嘉靖十三年甲午冬命諸門人會壽國菴講法華經至方便品忽然太息曰衆生自蔽光明甘受輪輪久矣勞他世尊一光東照至於苦口開示皆為衆生設方便爾非實法也蓋諸法寂滅相不可以言宣今汝等諸人若信佛無言直下悟入自家心地則可謂開寶藏報佛恩也今日老僧亦為諸人示寂滅相去也諸人莫向外求努力珍重遂喚侍者點茶來啜茶訖閉門端坐良久默然開窗視之已入寂矣乃十一月初一日辰時也顏色不變屈伸如生茶毗之夜祥光洞天薦齊之辰瑞雲盤空頂骨一片舍利黏黏瑩若真珠焉弟子崇仁雪訔真一圓悟鐫石鍾以安于義神南麓師壽七十一臘四十四吁薪火無窮識性不停則劫海茫茫陳迹杳杳何年月而可記乎大抵已往者悉皆幻化則方來者獨非幻化耶三世諸佛皆以幻化莊嚴開示幻化衆生則佛與衆生亦是一幻化耳何獨吾師也雖然幻性非幻覽者忽真贊曰震旦之皮天竺之骨華風夷風如動生髮昏衢一燭法海孤舟嗚呼不泯萬歲千秋嘉靖三十九年五月上浣判教宗事兼判禪宗事都大禪師行奉恩寺住持休靜謹撰乙未三十年明嘉靖十四年七月領議政金謹思左議政金安老與六曹同議啓曰釋教之衰至今時極矣而僧徒之多比舊最甚其故以堤防禁戢之方不可不急究在昔則有名寺剎官差住持一切定役赴功供力者官給度牒且不經官差者不得擅住故為僧者稍有禁防今則不差住持官不給度牒其闢之之意至矣而寺剎猶舊重修新創者亦多為僧者亦不奉其法逋罪逃役偷盜無賴者以寺剎為之窟穴其土著良丁亦聚莫就農僧俗混淆良盜雜糅連結為姦出沒行劫靡所不至其窘反甚於崇奉之時云云明宗恭憲王李峘在位二十二年己酉四年明嘉靖二十八年文定王后尹氏方崇佛事命搆新仁壽宮于舊淨業院基庚戊五年明嘉靖二十九年攝政文定王后尹氏以備忘録示領議政尚震曰良民日漸減縮軍卒困苦之狀莫甚於此時此非他故民有四五子則厭憚軍役之苦盡逃為僧以此僧徒日繁軍額日縮至為寒心大抵僧徒之中無所統領則難禁雜僧祖宗朝大典設立禪教宗非崇佛之事乃所以禁防為僧之道近來革廢故斃將難救以奉恩奉先寺為禪教宗依大典大選取才條及為僧條件申明舉行可也辛亥六年明嘉靖三十年佛紀二五七八年復立兩宗禪科給僧度牒時江原監司鄭萬鍾引進麟蹄郡雪嶽山百潭寺僧普雨法號虛應大張佛法以靖陵奉恩寺為禪宗光陵奉先寺為教宗自明年壬子始為禪科初試而會試講經製述賜牒略倣文武科八道寺剎一時鼎新參考慵齊叢話云其試法禪宗講傳燈拈頌教宗講華嚴經各取三十人前者內侍別監奉命而往今則禮曹郎廳往禪宗與判事掌務傳法三人證義十人同坐試取入格者謂之大禪禪宗則自大禪升為中德自中德升為禪師自禪師升為大禪師拜判事者謂之都大禪師教宗則自大禪升為中德自中德升為大德自大德升為大師拜判事者謂之都大師兩宗分掌內外諸寺各十五許升中德者注差住持禪教宗備三望呈于禮曹禮曹移于吏曹入啓受點受點謂下批也大臣三司廷論普雨之罪不從館學儒生請誅妖僧普雨屢疏未得請空館出去王日遣承旨史官招諭儒生令就食堂儒生無就者朝廷招朝官之父兄者使各勸喻子弟就館如此幾月餘壬戌十七年明嘉靖四十一年佛紀二五八九年九月四日遷靖陵于廣州宣陵之東移建奉恩寺于修道山備考靖陵志奉恩寺事蹟奉恩寺即造泡寺寺造豆泡以供陵寢之祭需故云豆泡豆腐之俗名而亦稱兩陵願堂揭額云修道山首禪宗奉恩寺即白下尹淳筆寺舊在宣陵東麓之內明廟壬戌遷本陵移建于此自朝家設都監創建殿宇寮舍比前宏傑冠於京山諸剎梅花堂今圮舊說西山大師得錢塘梅盆種于堂之西庭因稱梅花堂或云西山門人泗溟惟政入日本得梅而來未詳孰是寺創於明廟朝燬於丙子虜亂有禪華大師廣募重建以復舊觀其後乙巳又被回祿之變僧徒鳩財重葺閲歲未就肅廟展拜兩陵駐蹕寺前觀覽其工役草創特命厚賜錢帛俾完其役云明廟創寺首置判事一人擇國內名僧為之普雨禪師最初為奉恩寺住持兼判禪宗事使掌八道禪教謂之首禪宗清虛休靜泗溟惟政相繼為判事判事先生案惟政名下官銜以兵曹判書書之丁壬之亂朝廷屢遣惟政出入倭營又黃秋浦名允吉也奉使日本時以兵判假銜往來故判事先生案以此書之歟未可知也妖僧普雨嘗居此寺久帶判事之任又云虛應集詩一卷禪偈雜著一卷文一卷普雨所著已上出靖陵志大正年間奉恩寺住持羅晴湖請于朝鮮總督府得兩陵外垓字內未墾地數十町步而開拓之并前所有歲收租可五百餘石又得山林十五萬坪付之本寺自是常住之支供有賴無憂此可謂政府護法之恩亦可見湖師奉佛之誠也乙卯春晴湖上人見招賦詩奉恩禪寺出人間勝向三清煉九還殿裏梅花王后澤寺之佛殿掛有文定王后尹氏所賜之玉版梅花一對庭前柏樹祖師關醉時心病原非病靜處身閒不是閒十里烟波歸棹晚數聲飛笛落空山越明年丙辰秋再遊奉恩寺千山的歷萬林疏霜落天清鴈去初宿草陵園尋舊志拜觀靖陵偶閲舊志見奉恩寺來歷及普雨和尚事蹟雜花樓閣見飛書寺之華嚴經板殿額字是金秋史書筆勢如飛鶴橋明月仙人宅寺之南方有放鶴橋相傳仙人舊居之處雞店孤煙野老居寺之東隅有雞店村亦云三成里或楮島靜聽晴湖和尚語不將車馬換鍾魚丁巳春奉恩寺設行開山祖師遠忌齊會滿城士女簇擁奔波自京城之黃金町至纛島江岸首尾相連余時從往隨喜見數百船隻往來如梭而猶不足不得到彼岸者太半遂賦詩云寺中齊向日中開簇簇香車得得來十萬善人成海會三千信女作花臺慈悲縱有迷津筏神異今無渡水杯寶所不知何處在紛紛更向化城回時每日申報社為設數千點寶探之戲以助會衆之餘興矣乙丑二十年明嘉靖四十四年文定王后薨臺諫與太學生金忠甲等連章請誅普雨命流于濟州牧使邊協殺之備考撮要云初普雨廣張佛法居處僭擬又設無遮會于檜巖寺其費萬計至是因臺啓儒疏命黜于外令出入京山乃竊鋪馬而逃被獲於麟蹄命流于濟州又苔泉日記云普雨恣為譸張異教大盛四月八日將行無遮大會於檜巖寺所供幾竭國力八道僧俗奔走嗔咽時四月初七日也文定王后遽以是日薨僧俗驚惶潰散當初粉米數千餘斛作飯其色赤如血染人甚怪之事竟不成丙寅二十一年明嘉靖四十五年兩司啓罷兩宗禪科宣祖昭敬王李昖在位四十一年戊辰元年明隆慶二年佛紀二五九五年以李珥為弘文館校理珥以曾為僧故上疏自引請解職不允備考李公行狀云珥字叔獻號栗谷早失所恃日夜號泣一日偶閲釋氏書深感死生之說且悅其學簡便清淨有欲謝人事之意十九歲入金剛山貽書留別諸友仍棲山寺戒定堅固至忘寢食又涪溪記聞云公十餘歲文章已成有重名父惑於嬖妾不得於父出家雲遊禪號義菴緇徒尊之以為生佛以竹兜子肩擔而行年二十長髮應舉為一時儒林領袖嘗自吟云前身定是金時習今世仍為賈浪仙沙門一禪入寂備考慶聖堂休翁行録略云師諱一禪號休翁一曰禪和子其先張氏蔚山人也父曰鳳韓母朴氏母夢吞明珠覺而有娠弘治元年戊申十二月十二日辰時生焉年才七八聰黠明利似有老成之風洎失雙親泣血三年觀世無常意志清虛年至十三入斷石山投海山法師服勤三載十六剃髮二十四西入妙香山坐文殊菴一瓢一衲專習苦行正心佛理以命自期頃之忽興遊方之志南入智異山參智嚴長老嚴一見深器之示一偈曰風颼颼月皎皎雲冪冪水潺潺欲識這個事須參祖師關師即深得密旨樂而忘憂東入金剛山十王洞志存大乘冥心虛寂不覺失笑曰趙州露刃劒寒霜光𦦨燦擬議問如何分身作兩段喝夢中說夢漏逗不少自此詠於口者必徑截門言句也俄入表訓僧堂結一夏厥後雲鳥活計鶉居不定天磨五臺白雲楞伽遊歷諸山嘉靖甲辰春還入妙香山棲普賢寺觀音殿碩德高士八表雲趨可謂海東折床會也或登座講諸經論則吐納問辨辭清珠玉聞者見者若換骨洗腸焉且結會道場非普賢則必內院非內院則必普賢巡遞兩處坐二十餘夏矣古人云方丈雖寬物情自隘此之謂也師欲報四恩未嘗撤懷恆曰男兒處世為子則死孝為臣則死忠然出家之人不能兼行者矛盾相觸功不雙勝水火同器勢不俱全故也暨戊午秋命義雄宗敏法心法真性俊性一慧玉智文祖行之輩俾創上禪工訖庵之東特起一堂以慶聖安名焉於是師執香爐日祝聖壽則能證難證之智既如此其不墮不忠之坑又如此有時深夜喚諸門人曰大抵學者不答活句徒將聰慧口耳之學衒耀於世不踏實地言行相違關西湖南討山討水徒費粥飯被經論賺過一生終未免虛生浪死又一般漢習間成性不求師範野鬼窟中徒勞坐睡如到寶山空手去來深可憐愍又曰汝等諸人自己靈光蓋天蓋地不拘文字體露真常夜繩不動汝疑之為蛇暗室本空汝怖之為鬼心上起真妄之情性中立凡聖之量請將智慧之嘴啄破無明之殼幸甚凡啓發迷蒙若此之類也至隆慶戊辰二月三十日特命檜巖住持茂卞普賢住持元圭禪德暉晶學玄禪燈義淨一精之徒曰界有成住壞空念有生住異滅身有生老病死凡有始必有終物之常也今日老僧欲示無常諸仁者須攝正念勿懷眷戀亦莫隨俗為譸張不益事也昔者莊子以天地為棺槨之語實自有理莊子尚爾况道人乎吾常欲向不思議之嶺作佛事須露尸骸飼于鳥獸可也言已即拔筆大書曰八十人間命迅如一電光臨行忽舉目活路是家鄉亦繼吟於口而書於紙曰年逾八十似空花往事悠悠亦眼花腳未跨門還本國故園桃李已開花放筆端坐泊然而逝及至七日門人遵命奉色身輦于不思議之嶺緇白數千人塞路點茶號慕悲惋之聲動噎山谷以天竺法闍維之神光奪夜天地洞然百里之外有見之者望拜焉乃四月十八日亥時也銀色舍利鐫石鍾以安之師壽八十一臘六十五隆慶戊辰良月下浣判大華嚴宗事判大曹溪宗事休靜謹書辛未四年明隆慶五年四月十四日沙門靈觀入寂備考先師芙蓉大師行狀先師嶺南晉州人也名靈觀號隱菴一曰蓮船道人身雖寄世想在西方故以芙蓉堂稱之家世犯賤富而無禮成化二十一年成宗大王十六年乙巳七月初七日生年才八歲父携而釣魚使負魚籃擇其生命者而盡放之父大怒撻之師拜而泣曰人與物愛命則同忍痛則一也伏望垂恕父聞而弛怒家近神龍之窟雲蒸檻外樂出虛堂父老相傳曰此蟄龍之管絃也師以杖擊床則樂聲忽止有時龍出水面麟鬣輝日人不敢近師舉頭一喝則龍形忽沒以是里人稱奇童有異僧來謂父曰此童乃出世之寶非煙火之物請出家俄而僧忽不見師竹馬之年或立石為佛或獻沙為供或偃松為菴合眼危坐不知日之西也日厭世綱深想空門年至十三丁巳之秋夜深人靜抽身出門似有人引去行十餘里及渡沙川則師所養一狗子已追之矣顧謂狗子曰善護尊堂勿追我也我今永作雲水人矢不歸也汝速還珍重狗子低頭聽其語似有惜別之態發啾唧聲而去於是蹁躚隻影隔江回望則落月正在西峰也黎明即入德異山尋苦行禪子投三年學其法而落髮焉十七辛酉參信聰法師探教綱又禮威鳳大師入禪樞因入九泉洞手結茅廬已度九春秋長坐不臥詎脅安眠之席笻無出山寧過酒肆之門論教義則洋洋焉波瀾萬頃轉禪旨則嶷嶷然崖岸千尋己巳遠入龍門山訪祖愚大師討禪餘暇涉盡莊老甲戌又向清平山投學梅禪子扣擊禪微法無異味己卯到金剛山大尊菴與祖雲大師結二夏又拂瓢衲深入彌勒峯內院菴吟一律拔筆大書其門曰空費悠悠憶少林因循衰鬢到如今毗耶昔日無聲臭摩竭當年絶響音似杌能防分別意如癡必禦是非心故將妄計飛仙外終日忘機對碧岑於是燒筆硯杜默而坐經九年若遊客到門則指此詩而已庚寅秋忽然反省思報罔極之恩爰發南行漸向本城漸近家山夕陽江村悵然而立忽見一老翁牽牛而出師拜而問曰此晉州耶翁怪而問曰何故問之師曰此我所生之地也不知我父母存歿故當欲問之翁曰汝父姓名誰耶師曰我父姓名袁演我之兒名九彥也翁忽放牛執手曰今日父子的矣汝名我子我名汝父汝捨我逃走三十餘年求索不得憂愁年邁今忽自來甚適我願定父子後各不堪悲欣一場痛哭翁良久拭淚曰汝母十年前棄世汝主七年前喪室惟汝之田宅猶在爾師曰袁氏安在翁曰汝妹從汝出家之夕閉門而臥汝狗子亦視日而坐至七日袁與狗俱死葬於德山之西麓爾師聞之痛念無常尤為落淚及黃昏到家則昔之羣童盡作翁婆也亦與之連床夜語不覺雞之已曉矣明朝父携覲於老主主驚曰此九彥耶不覺然俄而主進席許坐師逡巡辭退曰小賤背主背親罪不容天今欲盡納田宅以贖身出家修道以報也主曰出家何能報恩耶師引古答曰出家者遁世以求其志變俗以達其道變俗則不與世典同禮遁世則宜高尚其迹達三乘開人天拯五族拔六親猶如反掌也是故雖內乖天屢之重而不違其孝雖外闕奉主之恭而不失其敬也主儒者也聞而嘉之起立携手而上階曰沙門物外人也宜刪世禮矣因連寢而請留之師強不從明日呈文券納田宅再拜而退又告別老父即向頭流山扣智嚴大師碧松之門中宗二十五年曰靈觀自遠趨風願一攝受嚴曰靈且不敢觀從何來師近前叉手曰請師鑑嚴笑曰堪為雕琢翌日嚴為師碎蕩心霧陶瀉佛海師之二十年宿疑忽如層氷之泮巨壑也即頂禮連聲歎曰此真吾師也執侍三年嚴亦厭世吁厥師經之厥資營之非斯柱石孰此棟梁哉師平生叶性溫雅情絶愛憎念專平等至於一匙之飯見人則分之其夙植慈悲之種亦可見矣兼又文字允正義理明晰凡教學者亹亹不倦凡七曜九章天文醫術莫不通焉至於懷中庸挾莊子者亦莫不决疑焉是故溢門英儒俱懷生別之恨盈庭法席共鯁去留之心是故湖嶺兩南以白衣通三教者乃師之風也可謂栴檀移植異物同薰也師自從一踏碧松之門或居黃龍山或居八公山或住大乘洞或住義神洞或住燕谷洞不覺夢過四十一年至隆慶五年辛未四月十四日入寂焉世壽八十七法臘七十二侍者法融靈應大選淨源信翁禪德真機道義輦收靈骨竪浮屠于燕谷之西麓贊曰高居覺地先引三車張羅八海撈摝羣魚金鎚擊碎虎穴魔宮人亡世寂月落天空萬曆丁丑秋門人楓嶽休靜撰甲戌七年明萬曆二年五月慈壽宮尼以內命往金剛山作佛事為有司所糾囚于淮陽獄於是館學儒生上疏請廢淨業院且言黃蠟所用不正上手書答曰在首善之地講論者道義也期待者程朱也宜益動心忍性切磋琢磨敬義夾持表裏交養為他日真儒上輔寡君下澤斯民治隆俗美則吾道之衰異端之盛不足慮也何必如太武之誅沙門毀佛寺之為哉且曰黃蠟非用於佛事以前日入內之黃蠟還下于該司壬辰二十五年明萬曆二十年置僧統募僧行朝時日本兵已入京而王播遷在外故云行朝招香山舊僧官休靜使募僧為兵休靜招聚諸寺得數千餘人以弟子義嚴為總攝領屬元帥為聲援又檄弟子關東惟政松雲大師湖南處英雷默大師為將各從本道起兵亦得數千人惟政有膽智數使倭陳倭人信服僧軍雖不能接戰而善警備勤力役諸道賴之國朝寶鑒備考賜國一都大禪師禪教都總攝扶宗樹教普濟登階尊者西山清虛堂休靜大師碑銘并序大匡輔國崇祿大夫議政府右議政月沙李廷龜撰云師法名休靜字玄應自號清虛子以多在香山故又號西山俗姓完山崔氏名汝信外祖縣尹金禹得罪燕山朝謫居安陵遂為安州人父世昌鄉舉為箕子殿參奉不就詩酒自娛母金氏老無子一日夢一婆來曰胚胎丈夫子故為阿㜷來賀云明年庚辰中宗大王十五年明正德十五年三月果誕師三歲父於燈下醉臥有老翁來謂曰委訪小沙門耳遂以兩手舉兒呪數聲摩其頂曰雲鶴名此兒言訖出門莫知所之以故小字稱雲鶴與羣兒遊戲或立石為佛或聚沙成塔稍長風神英秀力學不懈事親至孝主倅愛之九歲母亡十歲父歿伶仃無所依主倅携至京就學於泮齊鬱鬱不適意與同學數人南遊智異山窮覽形勝探賾諸經每愴早失怙恃益感死生之義忽得禪家頓悟法遂聽法於靈觀大師剃髮於崇仁長老七八年間遍踏名山年三十中禪科自大選升至兩宗判事即解綬還金剛作三夢詞曰主人夢說客客夢說主人今說二夢客亦是夢中人登香爐峯作詩曰萬國都城如垤蟻千秋豪傑等醯雞一窗明月清虛枕無限松風韻不齊己丑之獄時有鄭汝立之逆獄妖僧無業誣引師被逮供辭明剴宣廟知其冤立釋之徵詩稿覽之嘉歎畫墨竹賜之命賦詩以進師即進絶句瀟湘一枝竹聖主筆端生山僧香燕處葉葉帶秋聲宣廟亦賜御製一絶葉自毫端出根非地面生月來無見影風動不聞聲賞賚甚厚壬辰大駕西幸龍灣師即杖劍進謁宣廟教曰世亂如此爾可弘濟耶師泣而拜命請曰國內緇徒之老病不任行伍者臣令在地焚修以祈神助其餘臣皆統率悉赴軍前以效忠赤宣廟義之命為八道十六宗八道之禪教兩宗故為十六宗都總攝諭方嶽禮遇之於是松雲率七百餘僧起關東處英率一千餘僧起湖南師率門徒及自募僧一千五百合五千餘名會于順安法興寺與天兵後先以助勢出戰牧丹峯斬獲甚多天兵遂克平壤復松都京城賊宵遁師以勇士百人迎大駕還京都天朝提督李如松送帖嘉獎題詩贈之曰無意圖功利專心學道禪今聞王事急總攝下山顛諸將官爭先送帖贈遺賊退師啓曰臣年垂八十筋力盡矣請以軍事屬於弟子惟政及處英臣願納總攝印還香山舊棲宣廟嘉其志憫其老賜號國一都大禪師禪教都總攝扶宗樹教普濟登階尊者自是義益高名益尊往來於楓嶽頭流妙香諸山常隨者千餘人出世者七十餘人續義僧靈奎率僧軍助趙憲號中峰也有功竟死錦山陳中備考義兵僧將前面碑額崇禎紀元後四己亥五月日昌寧尉金炳疇書有明朝鮮國壬辰義兵僧將騎虛堂靈圭大師殉義碑銘奮干戈以護邦國曰勇冒鋒鏑以委原野曰烈具斯二者又得其義之正曰忠若是者洵我名教中人難能也而可得之於祝髮被緇外倫理而淪空寂者乎此騎虛堂靈圭大師卓然獨尊於叢林而若古忠臣顏常山張雎陽輩視諸師常事也師俗姓朴氏密陽人也西山大師高足也常住公州之青蓮庵有神力好以禪杖演武技及島夷之變聖駕播越師憤甚三日哭自薦為將州牧許頊壯而許之乃糾義僧數百人與防禦諸將擊清州倭官軍潰師獨與賊粗義兵將趙文烈公憲馳赴之聯營壓州西門倭大衄宵遁趙公將進擊錦山倭師諫不從師曰不可使趙公獨死因偕焉抵郡十里會天雨壘未立師曰兵有備無患姑徐乎趙公曰此賊非我能敵我徒以忠義激士心欲乘其鋭也翌曉賊來薄我師無後繼趙公死之或曰賊驟至何不去諸師喝曰死耳豈可生鬪益疾亦死實萬曆壬辰八月十有八日也嗚呼師之得趙公死固幸于趙公又益有光矣朝家念師死王事不用浮屠法茶毗之葬如禮蓋柳山有圭師冢云竊聞佛以正法眼傳付之後閲纍世至達摩西來始闡微旨法嗣古德不啻如阿僧祇恆河沙而類皆說心說性求其道於幽眇恍惚之地其下焉者不過因果之幻緣募之末耳歷考內典諸品傳燈所録烏有所謂勇而烈而忠如師者否乎雖以師謂之名教中最難能人可也然其倡義旅者慈悲也摧強敵者勇猛也勝而慮其敗者智慧也知必死而不忍獨生者善信也存百世之綱捐七尺之命者割捨也能辦此苦行者覺悟也能成此竗諦者解脫也具足之相自在真如之體不壞則即此是佛即此是無上菩提也彼小乘之聲香以為障戒律以為拘者曷足議也郡有從容祠享趙公配以師後二百有餘年當寧乙未有法徒大仁者建閣于郡南進樂山之西麓以師真影妥之扁曰毅禪將伐石以志之此又香火供養之也主其事者邑守趙最永而仁禪以余為趙侯堂從繭足抵都門介以請文余嘉其募義之誠遂為之銘曰嗟一切衆生不了死生原金棺非真詮非妙言我聞摩訶薩實實現世尊遺四恩當報佛恩亦君恩師惟乘震土偉器蘊夙根摩頂參古宿西山即祗園發誓救倒懸是謂盂蘭盆人天慟白乳蟒獅竟迷昏圓光既不滅法身引香幡莊嚴有七寶永鎮不二門上之六年庚子流月上浣大匡輔國崇祿大夫議政府右議政兼領經筵監春秋館事豐壤趙寅永撰通訓大夫前行錦山郡守趙最永書嘉善大夫忠清道觀察使兼兵馬水軍節度使巡察使公州牧使趙獻永建閣復戶二結毅禪閣殉義碑創建化主樂峯大仁春潭太演都監春坡載沾碧潭快一正能斗信刻手俞弼柱崔光魯俞大柱甲辰三十七年明萬曆三十二年佛紀二六三一年三月二十三日沙門休靜入寂備考休靜大師碑續月沙李廷龜撰甲辰正月二十三日師會弟子於妙香山圓寂菴焚香說法取自家影幀書于其背曰八十年前渠是我八十年後我是渠作書付松雲處英歇趺坐而逝壽八十五法臘六十七異香滿室三七日後始歇弟子圓峻印英等闍維奉靈骨一片舍利三枚樹浮圖於普賢安心寺又一片弟子惟政自休等奉來蓬山得神珠數枚窆石于榆岾寺之北吾東方太古和尚入中國霞霧山嗣石屋而傳之幻菴幻菴傳之龜谷龜谷傳之正心正心傳之智嚴智嚴傳之靈觀靈觀傳之西山此實臨濟之正派而惟西山獨得其宗云師所著禪家龜鑑禪教釋雲水壇各一卷清虛堂集八卷行于世崇禎三年歲庚午九月日建參考海南縣大興寺清虛大師碑銘并序弘文館大提學溪谷張維撰西山清虛大師滅後三十有八年法嗣葆真彥機雙仡海眼等將樹石于妙香楓嶽月沙李相公為銘之既而又相與謀曰吾師靈骨之藏雖在是乃其發迹得法實自南方而天冠諸庵頭輪大興寺又嘗休錫之地不可以無識也於是海眼為之狀雙仡踵門而請余文其言曰臨濟十八傳而為石屋清珙麗朝國師太古普愚得石屋之傳自是又六傳而至吾師其源流之遠如此請以是銘焉余曰而師之道吾固未暇學也授受之說吾將何所徵而言之仡又進曰世出世法外內不相及自昔空門耆宿鮮有致力王事者吾師以窮衲子一言受知于聖朝蒙宸翰之寵及倭亂之作卒能奮義聚衆協助天討克贊恢復之烈名聞華夏夫吾師之心何嘗有所作也隨緣應跡功用卓然心冥乎空有而事光乎忠義敢藉是以請余曰善遂諾而發其狀師法名休靜字玄應清虛堂其號也亦稱西山俗姓崔氏其先完山坐法徙安州父世昌箕子殿參奉母金氏娠師有異夢生三歲忽有老叟來曰委訪小沙門耳遂提兒呪數聲摩其頂曰宜名以雲鶴言訖出門不知所之兒時嬉戲必以佛事稍長風神穎秀出語驚人為州牧所愛稱以奇童十歲喪怙恃伶仃無所依州牧携至京就學于泮齊屢試輒屈鬱鬱不得意遂南遊入頭流窮巖洞之勝遍閲內典忽有出世之志辭訣同伴有詩云汲水歸來忽回首青山無數白雲中遂投崇仁長老落髮從一禪和尚受戒時嘉靖庚子師年二十一歲矣尋參靈觀大師印可後因遊行村落聞午雞忽然有悟歎曰寧作一生癡呆漢不欲作鉛槧阿師拈筆題落葉曰髮白心非白古人曾漏泄今聽一聲雞丈夫能事畢自是雲遊關東諸名山偶入京師赴禪科中選升至禪教兩宗判事無何拂衣入楓嶽作三夢吟一禪師臨滅留讖云單衣有債木人爭青不是無脛來自南溟會師自某所至為禱舍利靈應赫然師雖藏蹤晦彩而道譽益隆虛憍我慢之徒望風心醉爭就北面己丑逆獄起為妖僧所誣被逮對獄明暢宣廟素聞其名即命釋之引見賜御製一絶及御畫墨竹障子師立進詩謝恩上益稱賞厚賚還山壬辰之難宣廟西幸師出山訪行在上謁上曰國有大難山人其能自安乎師揮涕對願效死上嘉之命授八道禪教都總攝分命諸上足糾聚義徒於是惟政起關東處英起湖南與權公栗合兵鏖賊于幸州師自率門徒千五百人隨天兵進克平壤天朝經略宋應昌提督李如松及三協總兵以下諸將佐聞師名爭送帖致敬或贈詩稱美辭禮甚虔京城既復上將旋軫師率徒數百扈駕還都請於上曰臣老且死請以兵事屬弟子惟政等乞骸骨歸上嘉其志許之賜號國一都大禪師禪教都總攝扶宗樹教普濟登階尊者師既歸妙香翛然一閒道人耳甲辰正月二十三日將示寂于圓寂庵是日肩輿衝雪遍訪近山諸庵拜佛說法還方丈頮盥具威儀焚香佛前取筆自題畫像曰八十年前渠是我八十年後我是渠又寄書訣惟政處英二門人訖趺坐就化世壽八十五禪臘六十五異香滿室纍日及歇闍維日得靈骨一片舍利二粒就普賢安心寺建窣堵波惟政自休等又奉頂骨一片來楓嶽得舍利數顆窆于榆岾寺之北岡師少宗靈觀得法而宗風之振近代無比弟子千餘人知名者七十餘人能領袖後學為一方宗主不下四五人可謂盛矣晚節通脫自在皮相之流或疑其越戒識者不以病焉所著禪家龜鑑禪教釋雲水壇三家一指各一卷清虛堂集八卷行于叢林詩偈爽朗多警語筆跡踈徑有致云狀之所述如是其亦備矣噫師之幻身既已化為灰塵矣其非幻者未嘗隨而變滅一片之石數紙之文何足為師不朽計雖然尊其道則不忍淺其迹而欲永其傳于來世此固其徒用心之勤而亦世教之所宜許也莊周有言曰莫足為也而不可不為其是之謂歟遂銘之其詞曰諸佛之心祖師傳之祖師之傳清虛延之清虛之學得乎天全一絲不罣如魚在淵半偈徹聞默契聖心宸翰寵賚光動叢林遘難奮義贊成中興錫號國一莫之與京殺活自由隱現無纍世出世間兩盡能事緣盡而逝譬彼薪火茫茫三界誰渠誰我幻化雖滅非幻自如名山石龕永閟神珠眷兹靈區實維覺場鑱珉紀蹟昭示無疆崇禎四年辛未撰後十六年丁亥立命僧總攝惟政聘于日本修和好也師於三月三日自京城將發備考國朝寶鑑云春橘智又來請通信命僧總攝惟政往探倭情又泗溟大師紀績碑碑在杆城郡乾鳳寺江原道觀察使南公轍撰萬曆二十年倭寇朝鮮休靜自妙香山募僧徒為義兵與明提督李如松大破倭兵于平壤昭敬王宣祖也召見行在仍命為八道都總攝義兵將及車駕還都執政大臣多主和議休靜請於上曰臣老且病願以兵事付弟子惟政乞骸骨歸昭敬嘉其志許之命惟政乘馹至京師遂率其衆朝廷謂日本人素好佛道宜遣惟政以成和遂賜一品命服以使臣禮送之師至日本乃以三途五戒說之其言皆以清淨不殺為宗於是和事成乙巳三十八年明萬曆三十三年佛紀二六三二年惟政還自日本刷還被虜男婦三千餘口參考按泗溟堂集師有贈日本僧圓光元佶書云西來一曲子曾與兄吹之瞥然如昨再換春秋無情歲月如石火電影長吁耳奈何遙想老兄於無位真人面目上能發大光明度脫諸島生靈高哉高哉向者余以先師諦南遊馬島前至貴國得見圓光老兄西笑長老五山諸德盛論臨濟狂風別明宗旨不亦多乎余之本願只要盡刷赤子以副先師普濟生靈之訣類莫之遂空手而還無任缺然余自西還衰病已深仍入妙香山自守待盡矣適來聞有使行即以寒暄二字遠驚老兄靜中春睡去也唯兄無違本志當以度生願前告大將軍盡刷生靈無冷舊盟幸甚不腆薄物統希笑領不宣又贈仙巢書云別來如昨再換星霜相思一念未嘗暫忘只以百草頭上祖師意自寬耳餘何足道哉古德或以望州亭相見或以烏石嶺相看以是道眼看來則長老之眼松雲之見松雲之眼長老之見云何以別商量去也余乃西還衰病侵尋西入妙香山自守待盡矣適來聞有使臣之行為寄相思字以問老兄安否萬一也向者余以先師遺訣南遊至貴島與兄及柳川前至日本得見西笑老兄圓光長老五山諸德盛論宗旨具明所從來佳則佳矣未遂本願而回無任缺然唯兄更為盡心盡刷生靈無落前盟幸甚不腆薄物統希笑領不宣又按南原故進士柳夢寅號於于堂勘亂録有松雲先斬東萊府使後啓草云萬曆三十四年四月十五日申時末酉時一點正憲資憲大夫守兵曹判書兼知八道僧義兵都總攝行講和接伴使臣惟政再拜啓聞于龍灣行在所為白去乎吏讀也小臣魯鈍微命猥被國恩濫叨重任夙夜憂懼心常戚戚罔知所措是白良沙去吏讀也三月二十日良中分付據良知舉行時付諭吏讀也猶云恭奉上諭付與全權等也教諭此實率軍越境之際生殺之權專任於爾者萬分之惶悚而越境東萊府使宋象允鎮守防禦鍊兵繕甲兺除良吏讀也猶云不為也觀日樓風樂日有四矣則今月十二日即英陽大君諱日而先朝悲惜禁樂之日也此臣之來元無門外結陳兺不喻吏讀也猶云不管其事也聞臣之來嘲以前朝亡國之說自諭而使本府軍官代行者于何法律而以至於斯也萬里之去病不能送萬里之來病不能迎何其病之長於萬里之長乎非但送迎之道於此闕矣分付教諭之道於此又闕是白去乎生害人物臣實矜憐是白沙乎乃猶云雖然也不依教諭先斬後啓不勝惶悚待罪待罪尚玄曰師之渡日也假以節鉞卑以特權克成和事刷還捕虜東萊府使去時不送來時不迎心有驕嫉語涉譏諷獨不見捕虜之還乎彼其之子少無人心其罪正合先斬後啓師之在日本也氣象舒暢如春風師之還朝鮮也威稜森嚴如秋霜可見其將材亦見其道力觀其與日本諸禪師談道論交不藉朝命之講和乃託師訣之普濟使之周旋於大將軍謂關白也全賴交際手段始得克奏厥功也光海君廢王李琿在位十四年庚戌二年明萬曆三十八年佛紀二六三七年八月二十六日沙門惟政入寂賜諡慈通弘濟尊者備考慈通弘濟尊者泗溟松雲大師石藏碑銘并序許筠撰筠字端甫號蛟山也自象教之東被三韓也教律並倡圓漸分門數千年來蒙伽黎者人人各自誇握牟尼之寶矣惟牧牛高麗佛日普照國師別號江月懶翁所居之軒名也獨得黃梅支那禪宗第五祖黃梅山弘忍大師宗旨蔚為禪門之冠鉗鎚一震萬人皆廢俾涅槃妙心正法眼藏祕傳於青丘之域豈不异哉普濟懶翁五傳為芙蓉靈觀而清虛老師稱入室弟子其慧觀妙悟有出於前輩實近代之臨濟曹洞也厥後嗣法者不無其人而緇門盛推泗溟大師謂可繼西山之傳或庶幾乎哉師名惟政字離幻泗溟其自號也其先妣娩日夢駕白雲携黃幘金人躋萬仞高臺則仙老距其上即頂禮覺而誕師生而聰穎嶷然不類常兒稍大不喜弄偕羣童嬉遊川上則或團沙為塔竪石為佛或採花拾石為蒲供一日見罟者或捉大鱉聚粟償之放諸淵中羣童感之咸以所收栗置師前師分餉甚均空手以歸鄉諸老見而異之七歲其王父誨以史師問曰學者之業貴歟賤歟若貴則當學之不倦乎王父曰世間事無貴於學古今聖賢皆由學就其敢忽諸曰若以聖賢之心為業則貴矣違是則賤也世所學多害人之說而少成人之訓槩可謂貴乎曰成人害人不在空言唯係心之善否汝言至哉師力學不懈十三學孟子於黃柳村汝獻一夕廢卷歎曰俗學賤陋世緣膠擾豈若學無漏之學乎即投黃嶽山直指寺禮信默和尚被剃初閲傳燈録未熟已悟奧旨諸老宿皆就質焉辛酉中禪科華聞漸彰一時學士大夫詩人如朴思菴淳李鵝溪山海高霽峯敬命崔駕運慶昌許美叔篈號荷谷林子順悌號白湖李益之遠號蓀谷之輩咸與之歡唱和詩翰傳播詞林人以為美談嘗與荷谷約一覽韓文最巨篇誦之不錯荷谷亟以手寫本償之奇高峯曰恃此自足則學必不進可惜虛費枉功矣師竦神受教勤苦不少懈因受四子於蘇齊相又學李杜詩自是文章日益進而內典千函亦盡涉獵方袍習竺墳者雲集山門乙亥歲以空門衆望住持禪宗苦辭拂錫而去入妙香山始受益於清虛座下老師提醒心地直授性宗言下大悟即掃剃羣言斷除間習從前游戲詞家懺為綺語一志於安心定性苦行二載盡得其正法戊寅別老師向楓嶽結三夏於報德寺南遊八公山清涼太伯諸山丙戌春到沃川山上東菴一夜驟雨庭花盡落師忽悟無常招門人語之曰昨日開花今日空枝人世變滅亦復如是浮生若蜉蝣而虛度光陰實為矜悶汝等各具靈性盍反求之以了一大事乎如來在我肚裏何必走外求而蹉過日時耶即散門徒獨入禪室杜口結跏或旬日不出窺之則兀若塑人己丑住五臺山靈鑑蘭若誤絓逆獄拘于江陵府儒士輩訟其冤得釋庚寅遊楓嶽又結三夏壬辰夏倭賊闌入嶺東至榆岾寺時或云我人為導師曰若賊難以書諭倘有我人則亦可譬解率十餘徒直入山門賊悉縛之獨師至中堂則頭倭知其非常待以賓主解其徒師書以往復諸倭敬服指送山深處師語門徒曰如來出世元為救護衆生此賊張甚恐肆殘害吾當往諭狂賊俾戢胸鋒則庶不負慈悲教也即飛錫入高城則賊將三人俱加禮遇師以書勸其勿嗜殺則二將皆拱手受戒挽三日設供出城祖之九郡之得免虔劉者蓋師功也宣廟西幸抗義慷慨語諸僧曰我等生居此土食息優游閲有年紀者秋毫皆上力也值此艱危其忍坐視即募數百僧亟赴順安則諸義僧皆來會有衆數千矣時清虛以朝命總攝諸道僧兵辭以耗薦師自代遂統大衆從體察使柳公成龍協同天將明年正月破平壤走行長因隨都元帥權公栗下嶺南駐札宜寧頗多殺獲上嘉之授堂上階甲午春劉總兵綎命師入釜營諭清正凡三返盡得其要領正問朝鮮有寶乎師應聲對曰無有寶在日本曰何謂也曰方今我國以若頭視寶是在日本也正乃驚歎上招詣內闥備問平生下教曰昔劉秉忠姚廣孝俱以山人建立殊勳名流後世今國勢如此爾若長髮則當任之百里之寄授以三軍之命矣師謝不敢而退上以武庫鎧仗給之師返嶺南留兵抄擊連築龍起八公金烏諸山城屹為保障各飭儲胥然後即上印綬戰馬以尺籍納于備局抗章乞閒朝廷敦諭不許丁酉冬從麻提督貴入島山戊戌又從劉提督入曳橋皆有首功前後備餉四千餘石器甲萬計上嘉之特升嘉善同知中樞府事辛丑築釜山還內隱山癸卯承命來京甲辰奉國書往日本諸倭相謂曰此說寶和尚耶自馬島抵其都諸大帥皆信受約束緇流至願受教師一一指迷即皆頂禮稱佛及見家康德川氏代豐臣秀吉執政備言兩國生靈久陷塗炭吾因普濟而來康亦歸心釋教者聞而發信心敬之如佛克成和好而歸因括回被虜男女三千五百自備穀餔之還渡海乙巳復命上嘉其勞就加嘉義階賜御馬紵絲表裏以獎之時清虛已示寂師便入妙香山禮其影塔仍守制普賢寺丙午春領營繕軍赴法宮役結茅三江洞丁未秋乞骸還雉嶽山戊申聞宣廟諱音抵洛拜哭因得病甚苦今上欲令備胡西陲不獲應命入伽倻山調治上屢賜御藥庚戌秋上念之欲其就醫京山令方伯敦遣八月二十六日師大會諸禪告曰四大假合今將返真何用屑屑往來勞此幻軀吾將入滅以順大化也遂趺坐悠然而逝十一月二十日門徒舁蛻骨茶毗於寺之西麓祥光燭天飛鳥驚噪於是輦頂珠一具鑿石鍾藏之樹窣堵坡於其地云師俗姓任氏豐川望族也曾大父孝昆文科官掌樂院正曾守大丘因以家密陽生幼學宗元宗元生校生守成娶達城徐氏以嘉靖甲辰十月十七日生師享世壽六十七法臘五十七賜諡曰慈通弘濟尊者師少日多所著述在我仲氏荷谷所失於兵火門人裒其傳誦者為七卷以傳知者賞其清贍云嗚呼師之生當俶擾之代逼側戎馬間與邦家捍強賊其於宣揚法寶振刷迷徒蓋未之暇淺之乎知師者或病其乏津筏而徒區區救世為夫豈知誅魔濟難是渠家功德而摩詰無言直入不二法門又奚用嘵嘵立訓乎不佞雖儒家者流以弟兄之交知師最深論問今世續牧牛江月之道脉者捨吾師其誰後必有辨之者仍係之以銘曰維薄伽梵倡法竺乾涅槃妙心燈以燈傳真丹即震旦也之東逖我三韓疇承永明江月獨圓嗣其末照西山最先慧炬晨明智鏡宵懸于于上足其指百千只詡鍾峰松雲亦號鍾峯堂能筏迷川鍾峯之教廣濟無邊備修衆善不染羣緣卷而懷之瓶鉢蕭然出而用之旄戟在前摧魔拔苦邦賴不癲獸袍金章寵若浮烟茫茫苦海東浸夷亹泛我慈航格彼苗頑環觀卉服如渴赴泉跪奉約束王略克宣國難甫野歸興愈翩思乞幻軀以養殘年法宮董旅因疢就便優遊紺宇偃息青蓮庶享大耄益演重玄云胡雙樹遽集人天嶽摧檀特何涸泥連瓊毫閟彩金相失妍寂滅為樂昧者涕漣蒸哉梵徒募化繒錢塔廟以報師恩佛恩虹流之隩象設興焉願力所弘銷劫不騫謳頌勿替琬琰斯鐫頭陀微笑摩詰無言立訓顯化二俱蹄筌無諍三昧可實可權明明日月萬古長鮮尚玄曰萬曆四十年壬子春即光海君四年也孟蛟山毗耶居士許端甫氏撰本碑序之初頭有曰惟牧牛普照國師江月懶翁王師獨得黃梅宗旨蔚為禪門之冠涅槃妙心正法眼藏祕傳於青丘之域普濟懶翁也五傳為芙蓉靈觀而清虛老師稱入室其慧觀妙悟有出於前輩實近代之臨濟曹洞也厥後嗣法者不無其人而緇門盛推泗溟大師謂可繼西山之傳或庶幾乎哉序之末尾又曰今世續牧牛江月之道脉者捨吾師其誰後必有辨之者銘之初頭又復重說曰維薄伽梵倡法竺乾涅槃妙心燈以燈傳真丹之東逖我三韓疇承永明江月獨圓嗣其末照西山最先慧炬晨明智鏡宵懸于于上足其指百千只詡鍾峰泗溟也能筏述川又於同年春許端甫氏撰清虛堂集序有云惟道峰靈照國師入中原得法眼永明之傳宋建隆間返本國大闡玄風以救末法祖師西來之旨始有所宣揚而東土蒙伽𪏭者乃獲習臨濟曹洞之風其有功於禪宗也詎淺鮮哉師之正法眼藏傳于道藏神範歷清凉道國龍門天隱平山崇信妙香懷瀣玄鑑覺照頭流信修凡六世而得普濟懶翁公久在上國博參諸善知識圓通即詣蔚為禪林之師表傳其法者南峯修能為嫡嗣而正心登階實繼之即碧松智嚴之師也碧松傳于芙蓉靈觀得其道者唯稱清虛老師為最杰云觀此兩文所載師法相傳之迹實無條理有時混稱臨濟曹洞之風有時並稱法眼永明之傳亦稱靈照亦稱牧牛又引許多生面禪師入乎其間如持亂絲難尋其緒也懶翁以上且置勿問必以清虛泗溟為懶翁之法統不無可疑者存蓋許端甫師清虛而友泗溟泗溟臨終囑其門人請許氏之文以辨於清虛集一疑也許氏作清虛集序云鍾峯政公聞師之訓而興起者傷智幢之已折悼戒實之久沉裒集遺文以寓永慕未災木而公亦怛化入涅槃之夕招囑門人曰吾師之遺草吾不獲繡梓而遽爾淪逝將負初心爾等忘我誡俾卒其事則吾亦瞑目於九泉矣且謂居十於此教有微勝因以辨文為托其門人惠球來踵居士之門道亡師言為請居士曰果哉亦有由焉吾先子視清虛猶執友不肖壯少日蓋嘗於簡札覩之矣頃歲西遊獲見老師於逆旅親耹妙諦頓豁蓬心師以身後碑文屬於僕僕襟裾士也於竺教衲鑿焉何足模其行乎你師之託其聞乎是歟感念光故不敢固辭因敘其師法相傳之迦而略述師之梗概以歸之若其法統既已失實則惠球何不即請許氏改正之而乃竟刻之辨於文集必俟後日海眼丹獻等之相議耶二疑也南峯修能上承懶翁下傳碧溪正心登階三疑也雖然幸賴方丈智異山也山人海眼撰慈通廣濟尊者泗溟堂松雲大師行蹟曰只如小弟子海眼烏石嶺望洲亭邊末席下穢滓者也而大師之室中節適弟子惠球丹獻等與八表黌侶相為之議曰清虛是能仁六十三代臨濟二十五世直孫也永明則法眼宗也牧牛子則別宗也江月軒則分派於平山本碑中吾師之傳於臨濟昭穆失次若後世盲聾乎智者愈久而愈傳無乃有駭耳目者乎以海眼雖乏外孫虀臼且有董狐直筆持其本碑再三為請故越三十一年蒼龍龍集白龍龍月射兔日謹書乙卯七年明萬曆四十三年佛紀二六四二年十一月初一日沙門善修入寂備考追加弘覺登階碑銘并序白谷山人處能撰臨濟後二十四世有嫡孫曰浮休浮休號也法名善修俗姓金氏古帶方獒樹人也父積山先世為新羅大姓羅亡遂沒家為庶初母李悶無胚胎相誓言生子當捨出家即禱于路傍古石無竭彌旬不怠一夕合眼間有神僧授一圓珠吞之有妊以癸卯二月戊子生焉孩提時母飼肉輒不戾侑則暫唼鱉䱜之薄脊不𦧟膟膋之膏腴非歲啓父母曰浮生滾冗吾將出世辭入頭流山智異山之一名從信明長老髠剃謁芙蓉大師盡得笆籬邊物為人皤腹修眉長身豐頰惟左手失適得法之後借盧相國守慎號蘇齊也家藏書七閲寒暑書無所不讀筆亦遒媚效鍾王法與松雲政公齊名時號二難嘗會下一衲索書數字撩過王都遇漢人能書者出示之注目久之曰筆精健在古不易得雖然點畫必手瘢道人所揮也宣廟壬辰島夷侵疆大鞣山野師時棲德裕隱身谼礜中避鋒日晚慮賊已過緣澗路還菴有倭十數輩從林麓出師叉手而立賊作揮刃勢師怡然不動賊大奇之皆羅拜而散賊平師如伽倻屬天將李大人宗城受皇帝命來封關白間道入海印寺一見師輒忘歸留語數日侃侃如也臨別贈詩一章期為千里面目無何師移九千洞宴晦一日瞑目誦圓覺經讀未及終似有窸窣聲開目視之有一巨蟒偃暴階除下師輟誦跂一足疐其尾蟒俯首蚴蟉而去追之不見其夜夢翁致拜曰蒙和尚說法已離苦矣其神異皆此類光海時師住頭流為狂僧所誣拿繫獄理官覿其氣宇軒輊言說璀璨以白光海光海洞其非罪翌明召入內詢問道要大悅賜紫襴方袍一領碧綾長衫一袗緣綺重襦一襲金剛數珠一串其餘珍玩厚賚逮不可記即又設齊於奉印寺遣師為證鞴出內騕馬一匹俾騎而使圉人前導之都人望風趍拜耻居後齊畢師辭還道俗爭先遞夫輿歸師平生峻德四遠獻貨者轠轤隨即散之不偫一物器量沉毅滉漾不可𣂏與毳徒有緣憧憧坌集衆盈七百萬曆甲寅師年七十二自曹溪之松廣之方丈之七佛擬啓手足翌年秋七月示微疾召上足碧嵒大師付法曰吾意在汝汝欽哉至十一月初一日日才中晡沐浴訖喚侍者索紙筆書一偈曰七十三年遊幻海今朝脫殼返初源廓然空寂元無物何有菩提生死根偈畢泊然而逝報年七十三坐夏五十七門人闍維收靈骨樹浮屠凡四處海印松廣七佛百丈也後五年光海追加弘覺登階銘曰臨濟草四有嫡統龍生龍兮鳳生鳳石像抱送不齰身不僬僥書亦誦挈手揮毫何技癢秋蛇春蚓互引控海獠敿干呈劒光視若蛜蜮心無恐天將東來破賊艘為師踟蹰乍停鞚閉目暗哄修多羅虺自何心忝侍從狂狠魔僧謬訴訐南冠誰也氣屢霧君王對諶笑囅然敕賜珍奇禮頗重婕妤嬪嬙親鼎俎妙味絶勝噉蘆䎫機盡翩然隻履逝傳衣付法留偈頌百級四建窣屠波嗚呼哀贈真一夢丙辰八年明万曆四十四年春建仁慶宮於仁王山下術僧性智言有王氣創是宮壓之備考象村集云先是僧性智以風水出入士大夫家看山剋擇終乃為主所悅寵幸無比占一第於新闕近地畜沙彌方外遊髠出入無恆宛然一伽藍也乃獻議營建新闕設營建都監作慶德慈壽宮撤民家數千區徵八路之民結以供材木時宮役疊劇民窮財盡怨詈朋興脅民賣官納金銀鐵家基者並通仕籍金腰玉頂連續道路時人謂之五行堂上三品官以上腰其金頂其玉者謂之堂上壬戌十四年明天啓二年三月追加沙門善修法號九月又賜沙門覺性法號備考禮曹職牃牒在智異山大華嚴寺禮曹浮休堂扶宗樹教辨智無礙追加弘覺大禪師善修登階者天啓二年三月日判書參判參議正郎佐郎禮曹扶宗樹教行解圓妙悲智雙運辨才無礙大禪師覺性天啓二年九月日判畫參判參議正郎佐郎光海君之庶妃柳氏嘗崇信佛道於宮中刻木範土造佛像以賜內外寺剎常祝曰願後世更勿為王家婦元宗宣祖第五子仁祖追冊為元宗初明宗晚而無嗣文定大妃憂之甚一夕夢異人告之曰尚州李某有女子納之則吉覺而使人物色之不能得忽有一僧指其所居遂得之納于後宮是為李淑儀李淑儀竟無子而仁嬪姓金氏監察漢佑女宮號儲慶母李氏忠義衛孝性之女儲慶宮在今朝鮮銀行之後園以其表娣謂仁嬪為李淑儀之表娣取養于宮中仁順王后見而異之屬宣宗備後宮時年十四後育四男五女元宗亦其誕生溪谷集仁祖憲文王李儜在位二十七年癸亥元年明天啓三年佛紀二六五年夏五月申禁僧尼入城及市井騎馬毀仁慶宮其納石納基而升資者悉削其資甲子二年明天啓四年佛紀二六五一年始築南漢山城移廣州邑治於城內以田二千餘結屬之設守禦營置使一人又設僧軍以城內之開運寺為緇營隸于守禦營置八道都總攝即僧大將一人以僧覺性為八道都總攝領率緇徒監築山城丙寅四年明天啓六年佛紀二六五三年南漢築城役告訖八道都總攝覺性以功為報恩闡教圓照國一都大禪師特賜衣鉢備考教旨本在智異山大華嚴寺教旨都總攝覺性南漢山築城時董率緇徒盡心完役其有功於邦家固大至為可嘉為報恩闡教圓照國一都大禪師特賜衣鉢者天啓六年十一月日癸酉十一年明崇禎六年佛紀二六六年臘月二十六日沙門敬軒入寂備考虛間居士敬軒大師碑銘并序光德大夫東陽尉申翊聖撰我東之有佛法昉於羅而盛於麗入本朝文教休明稍闢而絀之而宗風不泯祖派相禪至清虛堂休靜大師受法於靈觀續中國臨濟之統也八方比丘奔走聽講會上恆數十百人久之其弟子之行滿德充者各自分門受徒而有虛間者以戒律禪解尤著於山門而法臘最久其示寂也多靈異之跡其門人道一弘敏雪菴密雲曇元等精心虔禱涉旬匪懈後先得舍利珠分厝於寶蓋之深源寺金剛之表訓寺持提山之天冠寺大海山之妙喜菴並建石鍾以安之道一輩記虛間事行乞銘於余凡再往返而始屬筆為序曰敬軒其法名自號虛間居士署其居曰霽月堂俗姓曹氏湖南人母李氏夢一梵僧覺而有娠以嘉靖甲辰正月十四日生骨法奇秀性靈脫凡在孩提作佛事為戲嬉十歲喪怙恃十五入天冠山從玉珠禪師祝髮遍讀子史通古今事物之理喟然嘆曰此世法也非出世法也亟謁圓哲大禪尋參玄雲中德涉盡羣經淹貫三藏之教又從熙悅割斷疑網萬歷丙子策杖赴西山道場聞西來密旨言下大悟無有滯礙戊寅投金剛內院洞寒兌內觀却吹啖株坐者數年廓然有所得自是人有叩者以都序節要決擇之禪要書狀參證之操縱在握變通在機入門者莫不虛往實皈焉壬辰之亂清虛募僧徒倡義殲賊宣廟授師以左營將師暫詣軍門遽辭而去宣廟高其節特命判禪教兩宗事師讓而不受萬里長江水惡名洗不去遂晦跡韜光深居不出學者雲集師乃遐遁或之楓嶽或之五臺或之雉嶽或之寶蓋最喜楓嶽搆菴隱仙洞結七夏癸亥春忽欲出山有止之者書一絶示之曰好在金剛山長青不起雲簞瓢宜早去風雪夜應紛移錫五臺其後師言果驗崇禎壬申自雉嶽輿還寶蓋曰此有緣之山也居未幾微感示倦門人強請留偈輒應曰泥牛入海渺茫然了達三世一大緣何事更生煩惱念也來齊閣乞陳篇倐然而化癸酉臘月二十六日也是夜祥光燭天杉栝變白灌骨之夕暴風拔樹雷雹交轟飛禽墜落走獸悲吼與會者無不驚歎推慕以為稀有之異事云余昔東遊與法堅性淨應詳彥機諸禪宿論近世老德皆以軒公為宗南僧太能覺性亦極推伏一國空門之論蓋無間然矣噫若師者生於羅麗必不免王師國師之稱榮耀於一時而乃會右文之世逃身於荒寂之境能成其道使其徒誦義不衰其與榮耀一時者得失亦有辨矣銘曰而暌於人而合於天而恆而行萬古常鮮崇禎九年八月日立丙子十四年明崇禎九年清舉兵來長驅直入京城王播遷于南漢山城時沙門覺性在智異山華嚴寺聞變即戎衣而起檄召南僧來赴者數千號降魔軍相率而北中道聞敵退而還見碑文妙香山僧明照領義僧募義粟優佐軍餉朝廷嘉之賜嘉善大夫國一都大禪師扶宗樹教福國佑世悲智雙運義僧都大將登階之牒備考賜嘉善大夫國一都大禪師扶宗樹教福國祐世悲智雙運義僧都大將登階虛白堂大師碑銘并序原任大匡輔國崇祿大夫議政府領議政兼領經筵春秋館弘文館藝文館觀象監事世子師李景奭撰輔國崇祿大夫行知中樞府事兼判義禁府事藝文館提學吳竣書崇憲大夫朗善君兼五衛都總府都總管俁篆昔余承恩東浴歷怾怛始知虛白為禪林所宗蓋松月祥師之法師云後數年奉教薄往嶺西時虛白自寶蓋山來訪經宵共剪寒燈未解右軍之帶先飛隱峰之錫又後數年自南而西也戾洛款吾門未嘗迹于城市而為我枉躅要記香嶽之新庵久而未就諾責可怍逖矣杳然心焉來往昨歲末其徒弟三印雪海等走千里而來言師入寂狀其迹徵銘余為之驚號嗟乎生未副其求死何忍不銘遂据其狀而敘之大師俗名希國法諱明照姓李洪州人虛白其堂號也考春文通政大夫家江東妣新平韓氏訓諫院主簿承武之女夢異徵而娠生於萬歷癸巳十一月初九日骨相甚奇大耳豐下幼不食葷戲輒禮佛讀書一閲數行才齓已有出家志十三隨養育師普英于香山仍事泗溟與八百法侶為羣心甚樂之祝髮受戒泗溟被朝命入京師於是始從玄賓堂印映遊絶祛六塵探研兩宗聞教於玩虛堂學禪於松月堂久之之頭流質疑於無染堂乃返香嶽丙寅春為關西伯所致有朝旨授以八道義僧都大將之號領僧軍四千餘名協守安州窫窳充斥龍象無賴爰處古林未幾閔公聖徽按西關又招師將義僧單心募粟優佐軍餉事聞朝廷嘉之賜嘉善大夫國一都大禪師扶宗樹教福國佑世悲智雙運義僧都大將登階之牒慧珠增耀慈航普濟名業既隆緇俗咸仰國步底定妙境冥搜浡杯振策絶流越崿東自蓬萊南登方丈至于溟渤之漘金田玉室勝踐殆遍大闡真詮徒弟雲集動至數百松蹊為曀西抵九月山住錫于貝葉寺趨風者如前妙香普賢寺羣僧迎師以皈為師就史閣舊址別築佛影臺以為面壁之所身依秪樹舌欲蓮花三歷凉燠矣一日逍遙於旁近諸菴又與釋子輩臨觀井泉獨先還而遙謂曰吾今去矣聽者以為皈寺而然矣師意明知其將逝也未嘗示疾搦管書偈曰劫盡燒三界靈心萬古明泥牛耕月色木馬掣風聲是夕合眼坐悠然而化即辛丑九月初八日也世壽六十九禪臘五十七弟子攀慕含哀澡雪齊心越月而闍維于淨界祥雲靉靆層飈倐起忽有舍利琤然墮空共造石鍾于普賢寺之西麓以藏之又將分奉于金剛寶蓋九月及海南大興寺等山管其役者義欽等十數人其為師之誠良勤矣其徒之言曰上遡能仁迄于臨濟凡七十餘代代有相承歷數挽近石室太古幻庵皆表表可考芙蓉清虛泗溟松月即在人耳目者師得松月之衣鉢讓而不獲七衆之望益皈云銘曰休哉慧心夙自丱兮在醜逈拔莫之與齊早啓明鐍得師師之遍參覺苑法雲日垂香嶽梵住瓶錫淹蹤清江之上有屹其墉承命協守義何敢辭金湯失險雲鳥不枝再登將壇重建牙旗精虔效勞優以竣秩震蕩甫定畦帔旋拂隻履翩翩浮游四方皈來故岑嗒然新堂六時蓮漏三乘細繹疑條盡釋惑網洞開日夕示寂跏趺坐結大弟羣號松泉共咽寶珠斯得輝映瑩徹視八除二在五加一于以奉之寶坊之中普賢之西安心之東豈獨此專亦將分藏浮雲攸衛明月含光千秋不泯有彼妙香參考虛白堂詩集序昔余與虛白堂素相善不啻若謫仙之貫休東坡之於佛印也然而儒釋殊途閒忙異路中間未能會面者將二十有餘年矣頃於戊戌年自九月山名也還香嶽也過余而訪焉一接容顏萬重舊情自是音塵不絶常自寄問而已後辛丑秋九月聞虛白升化之奇驚號痛悼徒費夢想去十月日虛白門下禪南印袖出虛白詩文若干卷示余曰今欲刊此集將印布而所乏者惟序文耳上舍與吾師曾有相厚之義故敢此來控幸勿以吾師為幽明之隔而或慳焉余即應之曰虛白乃釋氏之徒也道眼既高學術且精余以汩沒村學何足以序其集乎况文已老矣才又薄焉非徒買笑於他人亦必見哂於虛白之靈何不往求於京華之宏儒碩士乎掉頭固辭印等更進曰吾師之行迹顯晦學術精粗踐履得失詩文巧拙上舍曾已詳悉幸勿辭焉再三欵懇余不得已遂据其狀記以敘之夫虛白為人天性異凡計慮深遠學術高明動靜合度視之清虛四溟松月先後一揆也觀其詩文則冥著玄契探賾奧旨風雲月露詞指勤懇強柔高健氣象豪放不拘聲律不雜排比而意趣超邁句法新奇此所謂悠然流出自成一家者也一閲是集可知虛白之胸襟也嗚呼釋氏之道虛白受之於松月松月受之於泗溟泗溟受之於清虛清虛受之於靈觀靈觀受之於智嚴智嚴受之於正心正心受之於幻菴幻庵受之於太古太古受之於石屋則上下凡千有餘年繼繼承承連綿不絶者豈非道不泯而傳其學者乎况我虛白不但有功於佛家亦有勳勞於王國丁卯之變領僧軍四千餘名協守於安州丙子之亂募義粟數百餘石優佑於軍餉是以朝廷嘉之賜嘉善大夫國一都大禪師扶宗樹教福國佑世悲智雙運義僧都大將登階之牒於是慧劒增耀慈航普濟名業既隆道俗咸仰由是而道益明德益邵則虛白乃緇徒之領袖而東方之大宗師也遂乃提瓶振策冥搜妙境東自蓬萊謂金剛山南登方丈謂智異山金田玉室勝踐殆遍而徒弟雲集動至數百則可謂善繼石屋之遺道而能傳松月之衣鉢者也然則刊其集而永於後豈不宜哉噫余皓首林泉蠖屈村墟蓋亦有年適因南印之請覽此詩集略記顛末辨其卷端焉時康熙八年歲次己酉暮春日前進士宣城後人盧夢修序虛白詩丁卯正月初八日入安州鎮聞龍旌西指江華島痛哭而作金鑾西幸江華島千載王基一夕空百萬阿衡悲路側三千宮女泣途中陳雲舒卷愁無盡角唄高低恨不窮願抱龍泉誅賊藪宸襟回復大明宮丁卯正月元日領義僧入安州大鎮接戰論說飛來募義兵壯丁糾合四千名江邊只見旌旗色城上唯聞羽檄聲溝壑填委誰最恨道塗狼狽我深驚百祥樓下清川水長帶餘悲徹夜鳴丙寅七月受大將印領義僧在平壤館習陳書懷髫年剃髮入雲扃元帥璽書趣利聲全體揚名全孝義安民保國切忠情雖然不作山林客也是難悛佛淨行何日手傾滄海水一洗真僧大將名此詩有兩全字必有一誤在安州大陳見邊報入城點軍而作羽檄傳馳星火速義僧招集次第行長旗幟影掀山嶽角唄高低動江城精鍊習操連九旬巡更木鐸過三更同盟歃血抽寶劒斬盡胡兵報聖明壬午二十年明崇禎十五年佛紀二六六九年命沙門覺性使日本行到中途以老病謝請還山許之見碑文甲申二十二年明崇禎十七年佛紀二六七一年五月初十日沙門彥機入寂備考鞭羊彥機大師碑銘并序碑在金剛山資憲大夫去任吏曹判書兼弘文館大提學知春秋館成均館事同知經筵事李明漢號白洲撰鞭羊堂大師既滅于香山內院其弟子義諶釋敏說清等即具師始卒行蹟為狀冒風雪南走千里至京謁余曰吾師西山之法嗣也吾師為西山請先相國文已銘之楓嶽矣謂月沙李廷龜撰西山大師碑今公又銘吾師即吾空門世受相國家賜於結無窮也吾師法諱彥機鞭羊堂其號也俗姓張竹州人珀之子母李夢懷日月而妊吾師以萬曆辛巳七月生幼從玄賓大師受具戒稍壯皈西山盡得心法遂南游遍參諸禪長老以充其學或住楓嶽或住妙香開堂講法廣演禪教從而悟解修持者不可勝記甲申五月初十日感微疾而化法臘五十三臨化付囑門徒既化顏色不變異香滿室越七日茶毗得頂骨火叢外弟子等悲慕涕泣齊誡三晝夜獲銀色舍利五枚已於普賢南麓藏之石鍾又將即楓嶽對刻于西山碑前既具石矣敢請仍跪起不已噫汝等亦可謂隆於所師者也記余侍先府君時見汝師來乞銘瑩眼秀眉神彩溢發聆其言知其行後十餘年余受關東節入山長安表訓間有一寺名曰白華即汝師為西山新創也寺之北有碑若塔相向立與衆香諸峯爭秀拔皆汝師為西山建而碑則先府君文也又五年而至于今余又為汝而銘汝師將與汝師所建者而參焉似此非人事之偶然而難者余故不得辭焉銘曰內院之菴兮師與師之師同入寂也白華之石兮師與師之師同記蹟也香山楓嶽亘萬古而長存兮師與師之師同流名於無窮丙戌二十四年清順治三年沙門敬悅入寂備考東師列傳云茶山翁丁若鏞曰海運禪師之歿今已百六十九年矣其姓氏鄉里皆無可考惟蓮坡惠藏嘗見師門古記曰青蓮圓徹大師大芚今海南大興寺大會之時逍遙太能亦至芚寺海運敬悅以是年受衣鉢於太能時年二十八至六十七而寂今考青蓮大會之年乃萬曆三十六年丁亥之冬也然則敬悅以萬曆八年庚辰生崇禎甲申之越三年丙戌寂其受衣也逍遙之年四十六其歸寂也逍遙之年八十五逍遙八十八而終則敬悅其先逝矣其師弟二人相與之際猶如見賢其小事雖逸奚傷焉逍遙門徒數百餘人惟敬悅獨得其宗故號之曰海運海運者鵬徒也鵬徙者逍遙也逍遙之傳非海運乎故其傳心傳法之偈曰飛星爆竹機鋒峻裂石崩崖氣像高對人殺活如王劍凜凜威風滿五湖又曰金鎚影裏裂虛空驚得泥牛過海東珊瑚明月冷相照今古乾坤一笑中拈花微笑顧不在是乎敬悅有詩逍遙必和之其詩曰胸中法海幽難測篇內玄樞遠莫酬又曰禪綱教骨誰能敵華月夷風孰莫酬又曰水泡大地遺塵起春夢空身妄識興又曰威音那畔更那畔滿目煙光入水皆生死涅槃迷夢隔劣形殊相病眸乖其全篇皆載逍遙集中斯可以徵海運也海運有法嗣曰醉如三愚三愚之嗣曰華嶽文信文信之嗣曰雪峯懷淨懷淨之嗣曰松坡覺暄覺暄之嗣曰晶巖即圓即圓之嗣曰蓮坡惠藏噫宗在是矣銘曰大翼南徙水擊三千匪運曷遊是受是傳星飛竹爆光燭長天六燃其燈遂至晶蓮苟求真諦視彼梓鐫門人十七人醉如居首丁公追記而論之己丑二十七年清順治六年佛紀二六七六年十一月二十一日沙門太能入寂備考逍遙禪師碑弘文館大提學白軒李景奭撰師俗姓曰吳法諱太能湖南潭陽人也生於嘉靖之四十一年時乃壬戌之高秋九月依真師於白羊十三祝髮服玄旨於黃蘗億兆知名歷參南國受大藏於浮休再訪西山悟本源之清淨己丑十一月二十一日行年九旬少二禪臘七秩加三得其禪宗者曰枕肱懸辨傳其教宗者曰海運敬悅孝宗宣文王李湥在位十年庚寅元年清順治七年佛紀二六七七年以智異山華嚴寺為禪宗大伽藍備考禮曹文牒禮曹湖南求禮地智異山華嚴寺為禪宗大伽藍者順治七年六月日判書參判參議正郎佐郎九月初九日沙門學璘入寂備考寶蓋山深源寺翠雲堂大師碑銘并序通訓大夫行弘文校理鄭斗卿撰寶蓋山翠雲禪師弟子法慧六行雪玄等為其師立碑乞銘曰師之將化弟子等請曰師今化矣獨無一偈耶師曰死生一理恆寂恆照有何生死既無生死何以偈為余曰來偈之不為何以碑為曰師之無偈弟子之立碑並行不相悖願一言曰諾師姓孫氏名學璘江華人也父名義連母金氏夢日生師萬曆乙亥十三月初九日也兒時不茹葷聚沙作佛供人稱孫居士云十五從印淨師祝髮即入金剛山謁西山若青蓮在青蓮門凡十餘年青蓮器之傳其衣鉢嘗讀華嚴經渡卷喟然歎曰求諸經不如志心即入竺修窟面壁九年後入雲達山居五年其後遍歷名山甲戌入寶蓋終焉庚寅九月初九日也住寶蓋十六年矣師十五出家七十七入寂苦行一如竺修時晚年益精進臨寂謂弟子曰爾等棄父母出家虛過一生不如還俗之為愈爾其勉哉其教亦可知已闍維靈光燭天舍利自出弟子法慧等立浮屠于深源寺之東麓安舍利銘曰佛法自西入中國又自中國來于東西山青蓮為象為龍師繼厥緒其派實臨濟之正宗壬辰秋八月日立壬辰三年清順治九年三月沙門太浩入寂備考海東佛祖源流云師姓張氏以嘉靖甲子生年十五就天冠山一宗禪師落髮三十轉入俗離依靜觀得法壬辰三月年八十九手書一偈曰八十人間事猶如一夢漚願親無量壽常樂遂忘憂遂瞑然入寂舍利一個安于錦城之雙溪寺顯宗彰孝王李棩在位十五年庚子元年清順治十七年禁良民之削髮為僧尼者犯者令所在官一一還俗違者科罪沙門覺性入寂備考賜報恩闡教國一都大禪師碧巖碑銘并序原任大匡轉國崇祿大夫議政府領議政兼領經筵弘文館藝文館春秋館觀象監事世子師李景奭撰崇祿大夫行議政府左參贊兼知經筵春秋館事弘文館提學五衛都總府都總管吳竣書嘉義大夫行承政院都承旨兼經筵參贊官春秋館修撰官藝文館直提學尚瑞院正趙啓遠篆夫儒釋二致道不相謀而夷考行業亦關觀感鏟采空谷義猶歉於獨善布惠秪園功則茂於廣濟永埀穹石實愜禪林碧巖大師之上足跋涉千里謁余於西湖手狀請銘纍日益切余不忍孤其誠遂据狀而序之其狀曰大師法諱覺性碧巖其號湖西報恩人俗姓金海之金其先有衣冠云師之父嘗卜居于縣西相者曰生子必為大沙門母曹無子相與齊潔禱北斗夢古鏡有娠生師萬曆乙亥十二月丁亥也風骨霜凝眼珠電耀篤孝于親幼不嬉戲九歲失怙過毀僅全既沒喪忽遇過僧傾心學禪阿娘重離旋有感悟遂之華山禮雪默而師之十四落髮受具于寶晶老師浮休到華山大異之勉以真筌乃從休師入俗離山轉歷德裕伽倻金剛等山日閲貝葉自是相隨不暫離壬辰之難松雲政大師倡義旅軍關東為休往問避寇于山必手經問難癸巳松雲薦休于朝檄致陳上師亦仗劒從天將破賊于海中漢人見師盛讚之尚玄按當時又有沙門從軍海戰者如東師列傳曰信海普淨者明國聳劍山玉泉寺僧也其寺有木像關羽廟二師守護又有守僕洪氏雲長生時家臣之後孫也壬辰之難宣廟使使求救於明帝遣將軍邢玠都督陳璘等率軍救之是時神宗皇帝夢雲長自請同往救之帝許之覺而敕諸將載與俱救二師一僕亦陪隨之到古今島前洋逢倭師大戰勝之三人下陸建祠奉安以避風雨以古玉泉例守直西來諸將北向王城平亂班師云云京城平壤及星州等地皆有關王廟極崇奉之蓋自壬辰明兵之來為始也庚子結夏于七佛蘭若休病輟講於師師辭不獲登座討論玄風丕振丙午秋喪母謝徒衆修齊薦福於俗離之迦葉窟能堪人所不堪蓋業于休門二十餘年入室傳法戒行絶高隨緣泊如絶粒而不飢通宵而不睡常衣消瘦結跏丈室負笈者雲集甘露遍灑自撰三針以戒徒弟蓋思不妄面不愧腰不屈也神珠一照定水涵光華嚴肅倡大厲退却淨地埋胔妖魅頓絶至有猛虎護路馴鴉集肩雞獲活而知報魚燒網而銜感飛走猶化况在最靈諸山衆園或創或修如雙溪之東剎華嚴之宏制松廣之伽藍乃其大者餘可略也光海時獄事興休師為妖僧所誣師偕入京光海見兩師奇之放休還山留師於奉恩寺為判禪教都總攝卿士大夫多與之東陽尉申翊聖特相善未幾南歸仁祖朝城南漢議者白上徵師為八道都總攝領緇徒監築三年而告訖賜報恩闡教圓照國一都大禪師號衣鉢并錫焉丙子在智異山聞車駕幸南漢乃鳴鼓泣諭衆曰吾屬亦王民况以普濟為宗國事急矣其忍坐視即衣戎衣而起檄召南僧來赴者數千相率而北道聞敵退痛哭而南後命使日本不敢辭行到中途以老病謝懇請還山孝宗龍潛時致手札賜以物及即位用朝議授以總攝之印俾衛赤裳史閣坐化南僧廣演真乘居無何雲遊諸名嶽上扶安之邊山俯南海還棲方丈之華嚴寺己亥夏孝宗賓天奉諱哀叫秋九月微感勗門徒以力白業酬國恩戒勿封碑庚子正月十二日弟子等見其將寂請偈於是搦管手寫曰大經八萬偈拈頌三十卷是則兼二利何欲別為頌既悠然而化寄世八十六歲禪臘七十二共奉而闍毗之三南傾寺七衆填谷舍利騰出即寺之西麓藏諸石鍾大師之承竺教厥有所自芙蓉靈觀接臨濟之遺緒浮休與清虛休靜俱事觀靜傳之松雲休傳之碧巖云其所著有禪源集圖中决疑一卷看話决疑一篇釋門喪儀抄一卷其弟子多闡玄關請銘者律戒也余嘗圖南碧巖來見於求禮縣贈余以拄杖戒隨之數年前戒又訪余於洛下今為師來良甚勤矣名曰師之高行本於孝親師之捨俗得師之真慧刃斷疑覺苑冠倫慈航濟衆寶筏通津衆迷頓豁如夜得晨海帖長鯨山伏猛虎魚樂于潭鳥馴于樹想遍大千義著急難功存堞壘道高峯巒迹是禪林心猶國耳孤雲不駐遊波未止鶴失近錫鷗驚斷杯山川變色龍象興哀頻伽遺韻尚繞雲隈眼有餘照神不俱寂維巖屹立終古獨碧備考故俗離山賜報恩闡教圓照國一都大禪師兼禪教十六宗都總攝悲智雙運辨才無礙扶宗樹教福國祐世特賜衣鉢碧巖大師碑銘并序碑在報恩郡俗離山之法住寺通政大夫承政院同副承旨知製教兼經筵參贊官春秋館修撰官記注官鄭斗卿撰崇憲大夫朗善君兼五衛都總府都總管俁書崇憲大夫福昌君兼五衛都總府都總管楨篆和尚姓金氏諱覺性字澄圓碧巖其號也報恩人母曹氏無子祈北斗夢古鏡有身萬曆乙亥十二月二十三日生九歲失怙十四從雪默長老落髮浮休一見師奇之引為上足乙未歲天將李公宗城以冊使來遇師於海印寺歎曰圖澄道安復見於海外矣師嘗與數沙門夜行有大虎咆哮諸僧大恐師笑曰此特為吾行二十里許虎隨之至寺門師顧語虎曰遠來相送汝亦勞矣虎繞三匝再吼而去寺僧莫不驚異松雲政寄書付休賀法嗣得人云師忘機烏鳶取食於掌上撫之不驚光海壬子浮休為狂僧所誣拿致京師與偕繫獄顏色固自若光海親鞫見而異之即解纏繳出錦襖二襲分賜之仁祖反正之甲子城南漢山命師為八方都總攝功訖賜報恩闡教圓照國一都大禪師號又賜衣鉢因遣中使賜內醞師膜拜曰山僧持戒飲酒此是聖賜敢不一歃中使報其言上稱之丙子冬清兵猝至師募南僧三千號降魔軍與官軍為猗角上聞益嘉之壬午朝廷薦為日本信使休師如京謝以老病孝宗大王龍潛時師謁於安州論核華嚴宗旨義孝宗大王稱賞嚫以龍眉畫管𤥭璖數珠琉璃圖書塗金獅子及即位問李尚書時昉曰覺性老師無恙否今安在其眷遇如此至己亥十二月示微疾越明年庚子一月集衆告訣題一偈曰拈頌三十篇契經八萬偈何須打葛藤可笑多事在即擲筆而坐蛻年八十六臘七十二茶毗之日會葬者萬餘方火也祥飈忽起鳥獸悲噪得舍利三粒皆白色分靈骨建方墳者凡四處曹溪之松廣頭流之華嚴終南之松廣俗離之法住也師為人容貌端正氣像清高見者無愚智貴賤莫不敬重目光射人齒牙三十九少清涼一亦異相也所製有圖中决疑參商禪旨等語録東陽都尉申公翊聖序之行于世處能大師師之傳鉢弟子也來請銘遂為之銘銘曰粵自麗季有太古愚公入中國得佛旨以還于東自是以來大振禪風到師八葉為象為龍作舟苦海以濟羣蒙窺厥本源實惟臨濟之正宗俗離嵓嵓惟師所宮刻之于石以記始終甲辰四月日清康熙三年六月三日沙門守初入寂備考海東佛祖源流云翠微守初禪師字太昏姓成我朝名臣三問之旁裔也萬曆庚寅六月三日生于京城髫年依敬軒長老落髮入頭流謁浮休浮休一日謂上足碧巖曰異日大吾道者必此沙彌汝須將護之云云庚子六月乙酉靧浴更衣鳴楗訣衆曰吾將息矣後三日丁亥結趺向西合掌而逝壽七十九臘六十餘舍利二枚安于五峯曹溪辛丑二年清順治十八年佛紀二六八八年春正月命罷城內慈壽仁壽兩尼院因副提學俞綮之疏也領議政鄭太和曰此是歷代帝王所未有之舉然自前後宮之老而無依者多住尼院先朝後宮亦有出居者此難處也王曰今則無有也仍命禮官詣慈壽院奉出列聖位牌依奉恩寺例即令埋安于淨地右參贊宋浚吉入賀兩尼院撤毀之舉且曰朱子以毀僧寺作書堂為一舉兩得尼院一處乃北學舊基以毀院材瓦仍設北學則好矣王從之壬寅三年清康熙元年五月全羅監司李泰淵啓言道內諸寺佛像出汗大司諫閔鼎重號老峯奏曰佛像皆用木為質加漆塗金故每當潦節濕氣陰結點滿或冬節不寒收斂不嚴則霧露所蒸鬱而成此深山老僧之所常談而今乃強為之出汗惑亂民聽請泰淵重推所汗佛像破碎乙巳六年清康熙四年沙門義諶入寂備考金剛山楓潭堂大禪師碑銘并序通訓大夫前行弘文館典翰知製教兼經筵侍講官春秋館編修世子侍講院輔德李端相撰皇明丁未秋不佞屏居于維楊之靈芥洞中一日金剛山人俊機一如三覆等踵門而請曰亡師楓潭子即清虛之嫡孫鞭羊之法嗣也願得公一言以圖不朽不佞謾應之曰吾儒經世佛氏出世其道之不同不啻若風馬牛之不相及先儒有言佛不為謀而傳或為佛謀蓋譏之也若之何其謀之以犯聖人之訓也况佛氏塵芥六合夢幻人世又何必區區於此耶機等進而拜曰先月沙相國嘉其仗義之蹟既銘清虛先相國因世有託又銘鞕羊則公之於亡師有三世之誼焉是以固請不佞始作而對曰而今空門三世代有所托者其事尤奇有不可得以終辭者按狀師法名義諶楓潭其號也俗姓柳通津人母鄭氏貞氏云者誤也夢含寶珠而妊生於萬歷壬辰十六從性淳老師落髮受戒初參圓徹大師仍入鞭羊之室盡得清虛之傳遂南遊遍參奇巖逍遙諸長老住錫於金剛寶蓋兩山日把華嚴等經百數十卷正其差謬著其音釋然後三乘奧義煥然復明前後開度悟解者指不勝屈乙巳春示寂于金剛之正陽寺病劇吟一偈曰奇怪這靈物臨終尤快活死生無變容皎皎秋天月俄而坐化法臘五十八留寺九日顏色如常茶毗之夕弟子等奉靈骨獲銀色舍利五枚已建浮屠於金剛云噫昔我考亭夫子嘗見諸祖師傳有人才聰明被他引去之歎今不佞三復斯旨亦有所感於心者遂為之銘銘曰經云金剛住曇無竭臨濟之東心傳諸佛逮至虛羊禪教合一師承其授非肉非骨百八寺燈萬千峯月真如自性常照不滅華嚴妙解闡揚化元法輪所轉廣度羣昏錕兹貞石紀迹山門代峙而三與不崩焉雖世有壞遺光無垠天龍人鬼呵護長存甲寅十五年清康熙十三年佛紀二七一年創奉國寺於廣州星浮山以資明善明惠兩公主冥福備考奉國寺新創記見白谷大覺登階録云惟我主上殿下即祚以來儲嗣外有女若帝堯之皇英者二長曰明善公主次曰明惠公主才議伉儷未及于飛而一年之間相繼云亡上痛悼之慈殿尤哀傷不已思所以資福於冥路者莫如佛氏故葬畢之明年慈殿命金剛山僧曰竺尊創寺於雙墳之外里許而遣中使而督成額曰奉國以供香火即廣州治之西十里星浮山之下也時甲寅仲秋日兼八道禪教十六宗都總攝臣僧處能拜手記處能號白谷佛祖源流云性甚敏捷文章卓越於書無不涉獵縉紳章甫亦皆趨風依碧巖大師受法有遺集肅宗元孝王李焞在位四十六年己未五年清康熙十八年佛紀二七六年三月發諸道僧兵築江華墩臺前水使李藕領其役見桐巢漫録癸亥九年清康熙二十二年佛紀二七一年王下教曰豫嘗讀韓文之佛骨表因見何蕃傳又見宋之陳東歐陽修之事蹟即排佛事蹟也千載之下令人起敬豫欲以此三人立小祠於成均之傍欲令今日諸生有所觀感大臣儒臣皆無異辭甲子十年清康熙二十三年佛紀二七一一年四月十二日沙門懸辨入寂備考海東佛祖源流云枕肱懸辨禪師字而訥號枕肱羅州人姓尹氏萬歷四十四年丙辰六月十二日生初隨葆光法師零染于天風山塔菴後入方丈見逍遙堂得法業經課二十餘紙一續輒誦平生不浴而無垢日洗足雖折膠不廢甲子四月十二日面西坐逝奉靈龕于金華第二峯疊卷石而封全身鳥獸不侵顏色不變樵童菜女以點心簟食供養如如來云師嘗一日手書遺囑付受律弟子若休曰若我死後火浴者與我為百代冤須裸暴林野以充烏鳶之腹斯可矣壽六十六臘五十七已上佛祖源流順天郡曹溪山仙巖寺搆內之毗盧菴懸板有文曰投身憂虎餓割肉濟鷹飢之言豈徒然哉吾亦效之我死後置之水邊林下使烏鳶食之若茶毗實百代之怨也師有文集自投于火門弟子若休等聚集若干篇付之剞劂隱巖清狂子朴世亨為之序又撰師行狀六月五日沙門三愚入寂備考醉如大宗師碑藝文提學韓致應撰曰師法名三愚俗姓鄭氏康津縣寶嵒坊九亭里人也幼年出家落髮於萬德山之白蓮社歷參諸師淹通內典拈香於海運敬悅之室敬悅逍遙太能之親徒也師顏如渥丹故海運錫號曰醉如子蓋戲之也顧善談論聽者心醉嘗於大芚之上院樓演說華嚴宗旨聽者數百人有一僧負田器歇樓板下竊聽一二句立地頓悟捨擔升堂泣涕如雨陳其罪悔請受妙詮師撫而誨之卒傳衣鉢是為華嶽文信昔陸象山於鵝湖講席講義利二字四座垂泣六祖慧能本於槽廠下春米卒受五祖衣鉢斯足以匹美也師生於天啓二年壬戌卒於康熙二十三年甲子壽僅六十三寂在六月五日有影幀二本一在白蓮社一在大芚寺今大與寺丙寅十二年清康熙二十五年佛國天主教師自清國入京城從事布教王嚴禁之驅逐宣教師等於國外戊辰十四年清康熙二十七年八月妖僧呂還不知所自出其妻遠香文化縣民女也以妖言惑衆無識愚氓爭相輻湊自稱為龍女婦人自文化轉通黃海道諸縣入江原至楊州所過無不尊奉徒黨實繁楊州牧使崔奎瑞捕斬之己巳十五年清康熙二十八年沙門有文入寂備考海東佛祖源流云秋溪有文禪師字煥乎姓金氏鷲城人也以萬曆甲寅十一月十六日生十三依大芚山國隆梵唄落髮就東林受具參圓應得法丙寅移入于崷崒之雙溪至己巳九月二日命侍者三唱茗茶泊然而逝茶毗超一片頂骨頭陀圓蓋乞舍利於雞龍山五松臺得白色一顆樹塔于終南山松廣寺寺在全州郡附圓應志勤禪師海東佛祖源流云師姓鞠氏高山人初從任性涉獵禪教後隨震默大師問疑決難晚年兀入禪寂一日命侍者浴身坐化茶毗之日門人收得靈骨立塔于北辰寺附任性冲彥禪師海東佛祖源流云師姓金全州人母崔感瑞入夢覺而有娠以丁卯十二月十九日生十八從天定剃髮受具於誕衍二十四參靜觀得法戊寅三月二十九日乃索筆書偈曰七十餘年遊夢宅幻身幻養未安寧今朝脫却歸圓寂古佛堂前覺月明即投筆而臥四月初吉合掌端坐而逝壽七十二臘五十五門人覺敏等收靈骨建塔于九千洞甲戌二十年清康熙三十三年佛紀二七二年沙門圓輝入寂備考妙香山松溪堂大師碑銘并序雪巖積鵬撰妙香山大禪師曰松溪沒年六十六既沒九年壬午春正月其大弟子錦華慮先師道風之墜地乞一言欲銘塔石余按師姓崔氏名圓輝字會魄連城豪族也父應俊母咸氏夢蓮生師崇禎庚午十月十八日也慧性天至父鍾愛之常呼曰阿只一夕師即白曰業同是我名父深異之志學從智運長老剃度即入龍門山謁楓潭大師叩榻求證潭示以玄閟於是針芥相投既佩心印履歷講肆探得諸家三昧蔚為西嶽大宗匠為人𦟛肥牛行虎視道機沉默發言亦稀族姓家仍謂之無言僧晚自白雲遷至七葉將化病革侍者請留一偈師即吟曰携手一生將養底舉頭物物非他物臨行付與丙丁童莫向人前輕漏泄咄雪夜泥牛走入海雲中芻狗吠天明詰旦泊然而逝即康熙甲戌十一月二十九日也師之去儒為釋者五十一祀拈槌竪佛者三十六歲矣浩入性海洞開真源他家尚白而蒙化玄玄者其衆亦無追抑之懷其得不二門中一頭地位槩可知也都馱場得黃金頂骨忐忑三日得銀色舍利一粒樹石鍾于妙香山普賢寺之東麓以安之銘曰師之來兮名是自名師之去兮物非他物誘塵品兮化化玄玄轉玉機兮了了別別空耶有耶萬古清風中秋霽月己卯二十五年清康熙三十八年佛紀二七二六年沙門性真入寂備考松巖堂大師碑銘并序雪巖秋鵬撰師諱性真松巖其號姓則方成都人也以年十四出家初依洛松暮霞禪師未入堂奧晚參楓潭法席心契神會壽登七十有二化身于昭陽之松谷社時己卯二十三日也越明年春二月以遺命舁入于妙香山白雲洞連夜歸見白虹屬丹旌分為兩道光燭昏衢及茶毗獲靈骨呪得舍利二粒分建浮屠一藏于綾城之九龍山一藏于香山之普賢東皆師之宴晦處也師天資淳古業行清真不以世利動其慮不以人我早其計不以飢寒易其地此三者人之所不能而師獨能之可謂守志篤而見道深也其神足文悅等為先師圖不朽乞一言欲文言其與世之師死而遂背之者遠矣余深嘉其志諾而序之又為之銘其詞曰成都磅礡檀關西淑氣蜿蜒産法耀春依霞室客情多晚沐楓潭塵態少半世宣傳魯叟語四衢頒布如來詔西歸葱嶺隻履翩北舁香峯雙珠妙分藏兩地鎮山川專媺千年開塔廟鐫其短碣頌其風千古萬古仰末照庚辰二十六年清康熙三十九年七月二十五日沙門性聰入寂備考柏菴大禪師碑銘并序大匡輔國崇祿大夫議政府左議政兼領經筵事監春秋館事世孫傳金相福撰輔國崇祿大夫原任判中樞府事兼吏曹判書致仕奉朝賀洪啓禧篆通訓大夫工曹正郎金相肅書余於釋氏之道未嘗有聞焉其所稱功與德何由以知之今其徒之言曰佛氏本以廣垂慈悲普濟衆生為功德其要在乎明遺經以覺後進若近世柏菴大師即其人云大師法名性聰俗姓李氏南原人麗朝安乎府院君之十世孫父諱棡母河氏以崇禎辛未十一月望日申時生大師十三出家十六受法戒十八入方丈山謁翠微大師學九年盡傳其法自三十歲遍遊名山往來居升平順天舊號曰升平府松廣樂安澄光河東雙溪諸剎常以喚醒迷濁開闡教道為心自注緇門三卷兼通外典善為詩當時名士大夫若金文谷壽恆鄭東溟斗卿南壺谷龍翼吳西坡道一諸公皆許與為空門友嘗於浦海邊見大船來泊時則肅宗七年清康熙二十年地則荏子島視其所載即大明平林葉居士所校刊華嚴經疏鈔及大明法數會玄記金剛記起信記四大師所録與淨土寶書等一百九十卷也師乃大驚異暨其徒衆頂禮虔奉發信心刊諸經數年內而備行于世自是四方之學佛者莫不靡然尊敬推以為宗師焉以庚辰七月二十五日示寂于雙溪神興菴壽七十火浴之夕有光氣如匹練亘空數日不滅乃得頂骨二枚分為塔于松廣七佛二寺其法孫以世傳至于八晶最訥懼其師之功德世久則泯與其法族七十餘人將刻石以示其弟子二人來乞文于余余曰異哉自古求經之士或不惜身命踰越山海入異域萬里而得之然未聞有慈航寶傳非求而自至若斯之異者也我東佛教莫盛於羅麗時若海印之八萬藏經非不富有而又未聞焉直指要歸如華嚴疏鈔之比者是其冥緣在斯有非人力所可致者也豈可謂之適然而已也哉師之與佛教有大功德亦可也此其平日必有奇卓之行而無礙滯之見其斯所以為一世名士大夫之所愛重也歟余故不辭而為之文銘曰叔季英才多出禪門心全念呪志不歧分護法傳教有矢無諼維兹聰師其衆所尊海航獲經道於斯存龍猛傳祕寶月疏論乃今得之覺迷醒昏於其法中業大功敦思永厥聲有是嗣孫鐫珉壽蹟我與之言本碑後陰記略云按釋迦氏心傳正脉六祖已下無出臨濟右者臨濟乃釋迦三十八代嫡孫也臨濟之道歷十餘世而被海東太古為鼻祖傳幻庵龜谷碧溪碧松浮休碧巖翠微九傳而至柏庵師受生帶方出家于淳昌鷲巖二十七住庵于谷城神德輿地勝覽云神德菴以我神德王后康氏願堂故名自此遍遊名山化被千億至康熙辛酉得經於泊岸虛舟中後乙亥十五年間分刊五千板子為澄光雙溪兩藏寶所大設千燈佛事以落之曾未百年舉國之印閲法寶者捨舊從新如渴赴河影綴巖溪中間辛未仙巖寺設華嚴大會八表雲奔猗歟盛事去來時順俱放異光師著述則私集二卷經序九首淨土讚百詠行于世此其大較也師以是傳之無用用傳之影海海傳之楓巖巖之後咬人者多而獨最訥長遊於板藏之側因其神人之望一朝奮然與七十餘同門庭鞭石於京洛旋功於先祖道場吁先師之法遍於華藏今以娑婆從事之先師之功布於一國今以片碣收斂之且道先師之道果在是不在是後之有墮淚之感者試下一轉語玄法孫最訥謹記宜璘書崇禎紀元後三丙戌六月日立辛巳二十七年清康熙四十年佛紀二七二八年以智異山大華嚴寺為禪教兩宗大伽藍備考禮曹文牒本在大華嚴寺禮曹湖南求禮地智異山大華嚴寺為禪教兩宗大伽藍者康熙四十年二月日判書參判參議正郎佐郎尚玄曰碧巖大師既具出家成佛之道德且有築城勤王之功勞故孝宗大王待之以師禮又以師所住之華嚴寺為禪宗大伽藍特示優渥之典肅宗大王又升寺格加一大字而兼為禪教兩宗大伽藍蓋華嚴之為寺原係緣起祖師所創之最古寺剎而始弘圓教繼有義湘道詵兩國師弘通大法在我朝鮮佛宇之中不愧首屈一指又以碧巖大師駐錫之故蘭若芳名輝映青史地因人顯於此驗矣甲申三十年清康熙四十三年正月初四日沙門雪霽入寂備考月潭堂雪霽大師碑銘并序大提學姜鋧號白閣撰釋迦氏涅槃之後迦葉為西域祖師達磨為中國禪宗太古老師得之傳燈海東而幻庵小隱龜谷碧溪碧松若清虛鞭羊上人踵得三昧傳于楓潭大師說經談玄清衆四至而惟月潭禪師得其宗云其狀曰師法諱雪霽其本昌化其系金傅後裔其父嘉善太仁其母清州韓氏崇禎壬申十二月十五日師肇錫之辰也其母夢二梵僧以勿茹葷勿茹腥戒仍指贈二明璧俄而變為日月光照地遂感而乳自是持齊師自孩提遊戲作佛事十三出家投雲嶽山崇揖長老十六煎髮受戒與同志僧一如發心請業于寶蓋山說清大師未幾從楓潭大師於永平白雲潭一見大異之曰爾異日必為緇林宗匠遂加提獎相從遊於金剛妙香禪教宗旨觸處剖析文藝亦出入開口成章每入名區輒設道場優婆緇髠環侍法席鍾魚交互千偈瀾翻慈雲花雨宛一西天諸經肯綮融會貫通尤愛華嚴拈頌口不轍誦大開後學迷途聞其旨而傳其妙者蓋數十百人名山勝區無不遍跡常住楓嶽之正陽寺晚年南釋嚮慕移錫于金華山澄光寺影不出山講授不輟湖海之間經教大闡甲申正月初四日詰朝集門人曰人間世鳥過隙如也汝曹勉㫋即吟一偈曰道死道生擔板漢非生非死豈中途說破兩重生死字殺人劒與活人刀俄而怡然示寂世壽七十三法臘五十七其逝也祥光繞空茶毗之日大風作瑞靄樣虔禱三日得舍利二顆翌年乙酉塔于澄光寺之陽師性傑梧形俊爽如寒松雪鶴超然於煙霞之表自幼聰穎絶人襟懷誕率平生不設畦畛待人一以誠面壁之暇率意吟咏語輒驚人蓋其天才然也不厭惡衣糲飯刻意求道俚語俗談不出于口惟孜孜於三車大教而銖視軒冕真所謂一鉢足以輕萬鍾者矣余乃聞其風而悅之恨未為支許之殿其上首弟子義天裒狀草泣而扣余曰吾師乎吾師乎拔俗之奇氣賾玄之勤工其可泯滅而已乎塔前之銘非公伊誰噫吾衰也甚久廢筆硯且困於簿書而終不能虛其請就其狀而略加刪潤如左云銘曰雪受楓家惟衣惟鉢照夜之燭渡海之筏一心如如一夢蘧蘧霜降水落白月空虛丙戌三十二年清康熙四十五年佛紀二七三三年八月沙門秋鵬入寂備考雪巖禪師碑弘文館大提學李德壽撰師法名秋鵬姓金氏江東縣人師纖癯無威儀而雙眸炯炯射人其戒行甚高其接人無貴賤平等其談鋒若火焱至泉湧而不可窮也初從宗眼長老剃落遂參碧溪九二禪師躬執井臼淹通經論往禮月諸道安大師針芥相役無不吻合安公深加器異授以衣鉢乃游南方南方諸釋望風心醉焉丙戌八月示寂距其生辛卯孝宗二年世壽五十六茶毗得舍利五顆分塔於樂安澄光及海南大芚大芚寺有華嚴講會録雪巖大師嘗於大芚之白雪堂設會丁亥三十三年清康熙四十六年佛紀二七三四年六月二十六日沙門文信入寂備考華嶽禪師碑成均館大司成韓致撰師姓金氏法名文信海南華山人也幼年出家於大芚寺落髮顧椎鹵不識字為貿田器行且鬻以取飽一日憊甚至上院樓下捨擔而休焉時醉如三愚禪師集大衆講華嚴宗旨師在樓板下竊聽之立地頓悟悉以所負田器付其伴升而跽涕簌簌請受課程略學既成遂於醉如室中拈香於是沙彌輻湊芚寺講會之日學者數百人時北方月渚禪師南遊至芚寺師與論禪旨知其為宗悉以所領大衆讓于月渚自掃一室杜門面壁俾終其會月渚歸曰吾至南方見肉身菩薩云師生於崇禎二年己巳以康熙丁亥六月二十六日示寂壽七十九方示寂頭輪雷鳴既茶毗得舍利二粒戊子三十四年清康熙四十七年佛紀二七三五年王摹刊釋王寺太祖手筆為文以記之備考肅宗御製鶴城雪峯山釋王寺即我太祖大王潛邸時所建吉夢休徵莫非天啓景運之祥非尋常寺剎比也况此鏤板一百五十有八字俗傳是我太祖大王手筆也既無標識未敢必然而寺中寶藏于今三百餘年亦得完全於兵火尤可異哉適會寺僧欲治石移刻以圖永久而以其有太祖初諱賫持上洛具呈內司蓋以此剎本屬內司也再三披玩之餘遂摹刊作軸文以記于下方歲戊子夏四月燈夕自書己丑三十五年清康熙四十八年二月八日沙門淨源入寂備考霜峯堂大師碑銘并序李德壽撰世之學者口耳之流而章句之溺反而內求身心了無所得考其所為乃或出於閭巷凡民之所羞道余甚病焉儒者既然矣佛之徒尤甚其標名叢林者率皆尋行數墨如縛柱之猿如抽繭之蠶纏繞其間不能解脫無論世出世學其為斃均也大鑑不曾解文而為人說法懸契佛心江西大梅惟以即心即佛為極則亦在乎忘言默悟而已安事夫誇多鬪富如今之為者哉夫知者不言言者不知誠使參禪之流移其講誦之功以永嘉惺寂荷澤覺念為藥病曹溪一切無心少林了了自知為準的以求至於生滅滅已寂滅為樂則方為世間大自在人而可與議於終日為而未嘗為之妙矣若近世之霜峯師其亦夙熏多聞者歟師法名淨源俗姓金氏父係先祖世哲俱業儒母南陽洪氏夢感海月以天啓丁卯十一月誕師於寧邊府之重陽里肌膚香潔不藉洗沐為兒戲嬉皆作佛事既長魁碩重厚背有七紅點早從善天長老落髮受戒參玩月秋馨二大士習通經論至年三十始扣楓潭之室潭與語異之盡以所學告焉於是以一鉢一錫歷探國內諸勝自關而海自海而畿嶺東之金剛湖南之頭流靡不窮幽剔深參禮知識拈鎚竪拂者皆避座摳衣問法者常滿室定涅槃等三百餘部口訣於伽倻之海印寺造都序節要科文於曦陽之鳳巖寺尤精華嚴大經經有四科逸其三師緣文究義遂定三科俾讀者不遺其旨後得唐本參校乃無差違學者驚服以為清凉轉世云己丑師在砥平龍門山偶示微疾至二月八日忽謂門人曰夫界有成住壞空身有生老病死有始無終無常之體也汝等宜持正念勿生煩惱遂書偈曰雪色和雲白松風帶露青投筆恬然而逝世壽八十三僧臘六十四于時緇白號慕聲振山谷茶毗得靈骨一片靈株一雙舍利二枚分建浮屠於大丘桐華寺清州菩薩寺砥平醴泉二龍門寺開場之日雙虹指路虔禱之夕風雲變彩其靈奇恍惚信有不可思議者矣嘗聞師於詩文操筆如飛有叩問經義者必傍據互證曰此在第幾板行後考良然其聰明絶人如此夫謂師已證三空吾所未知若其淹貫三藏為一世經師之雄則蓋亦信而有徵矣余於數十年前曾見師於龍門時年甚少其得師於目未若後之得師於耳用是為恨今師之大弟子玄信來求師銘遂不辭而為之並著余平日之見豈獨以警其徒而已哉師而有靈其必彈指稱善之相屬歟其銘曰維師發跡爰在重陽海月盈盈啓其奇祥其祥伊何法門是昌既生而孤謝緣被緇舅祝其髮楓則吾師西經千函我腹其笥有來穰往我應靡窮鼓舌翻瀾揮麈生風幻質非真去來皆空雪雲俱白松露逾青咄彼闍梨焚香祈靈我尚非我矧有其名屹彼曦陽山骨是斫龜毛有筆鏡像載躅有欲知師斯其筌筏乙未四十一年清康熙五十四年佛紀二七四二年沙門道安入寂備考月渚道安禪師碑弘文館大提學李德壽撰碑在大興寺師法名道安俗姓劉氏箕都人也父輔仁母金氏其生在崇禎戊寅十一年其終在肅廟乙未世壽七十八僧臘六十九初依天信長老受戒參楓覃盡得西山之密傳甲辰入妙香山講究華嚴大義世稱華嚴宗主每舉揚宗風座下聽衆常不下數百人法席之盛近世所未有也刊大乘諸經印布道俗丁丑之獄為人所誣上素聞其名特命釋之自是益自韜晦然其名殷殷動一國望門而趨者如渴赴河莫不滿腹而歸歸真之夕祥光燭天百里之外無不見者茶毗得舍利三顆塔于普賢寺之西麓又分藏於箕城海南海南釋法明師之高足也訪余濱陽求為師銘略師之傳法弟子秋鵬嘗為余言師於解經不拘細節瑣目而善括其大旨其於諸子百家兼包并貫巨細不遺斯其所以為師也己亥四十五年清康熙五十八年佛紀二七四六年十月沙門秀演入寂備考海東佛祖源流無用禪師法名秀演姓吳氏高麗太尉文襄公延寵之裔父暹夢一黃章大蟲蜿蜒上空少選還墜繞屋數匝因以有娠以順治八年辛卯三月十三日生十三奄違考妣偶入曹溪依惠寬長老出家受具東師列傳云師受具於惠空大師二十二謁枕肱枕肱曰圓頓法全在汝矣二十六承枕肱之囑謁柏菴于曹溪隱寂菴也一見大奇之因為住錫執經問難無不吻合己亥冬十月跏趺而逝壽六十九坐五十一夏也東師列傳云師有文集二卷行于世珍島雙溪寺事蹟文靈岩道甲寺守眉王師碑文全州松廣寺事蹟碑皆師手撰門人影海若坦頭輪清性等二十一人英祖顯孝王李吟在位五十二年己酉五年清雍正七年佛紀二七五六年七月初七日沙門志安入寂于耽羅今濟州島備考喚醒堂大禪師碑銘并序崇祿大夫原任吏曹判書南陽洪啓禧撰耽浮羅世稱瀛洲其山曰漢拿上有古石佛不知何代所立有文在其背曰三聖入寂處今上己酉志安大師配于其地到七日而為七月之七忽示寂焉山鳴三日海水沸騰人天衆生莫不頂禮讚歎曰三聖之讖驗矣蓋自中國正法菩薩至于師涅槃于此者三嗚呼其然乎其亦靈怪矣哉余嘗入金剛見月沙李公所撰清虛休靜碑白洲李公所撰鞭羊彥機碑靜觀李公所撰楓潭義諶碑皆東方名宿而於師為祖師也師沒後其法孫軌弘上人以師狀來求碑余勸晉菴李相國宜述之蓋以晉菴為月沙白洲之後也晉菴許之文未及成而遽捐館軌弘來見余曰公宜卒其事余素不喜作禪家文字而亦不可以拒之乃按其狀師俗姓鄭氏春州人也以顯宗甲辰生十五出家落髮於彌智山龍門寺受具於霜峰淨源十七求法於月潭雪霽楓潭之嫡傳也師骨相清嚴音韻靈朗言簡而色和月潭大器之蓋以衣鉢托焉師精研內典寢息俱忘二十七聞慕雲言大士設法會於金山直指寺往從之慕雲大敬服語其衆數百人曰吾今可以輟獅子座矣汝等禮師之乃潛出居他山師遂進大衆橫說竪說毫分縷析浩然若江河之决也衆皆豁然開悟宗風大振由是四百緇徒靡然雲集嘗於大芚山中設淨供自空中三呼其名應亦如之遂字曰三諾號曰喚醒師演教牗衆辭旨幽妙或以未之前聞不無疑焉初樂安澄光寺有虛舟自來泊岸中有六祖以來所注解諸經不啻千百函至是出以證之與師所言若合符契乃大驚歎師遊國內諸名山殆遍而無一布袋隨身行遇蒼松流水垂簾趺坐左珠右錫翛然也住智異山恍惚見一道人前言願師速去非久有災後數日寺果大火在金剛正陽寺一日天甚雨師促裝去衆莫能挽山下有富家翁請師舍辭不入一投矮舍其夜寺及富家俱為大水所沒住春州清平法寺樓下有影池淤塞已久師濬之池中得短碑刻曰儒衷冠婦千里來解之曰儒衷志也冠婦安也千里重來也乙巳設華嚴大法會於金溝金山寺衆凡千四百人登堂竪拂為衆說法衆皆歡喜得未曾有己酉竟以會事有誣搆者自智異逮繫于湖南之獄未幾蒙宥道臣執不可竟流于耽羅師嘗曰生靡檀施死煩衆力非吾所安無寧沒齒於絶域殊境竟如其言世壽六十六法臘五十一嗚呼東方山高水麗自古稱多高僧名釋羅麗之際義湘道詵懶翁無學之徒最著焉靈躅異事有非俗見所可窺測者而抑未知其地位階級果造如何境界能不落於傍門小乘否也若師之演繹宗旨開悟衆迷真不愧於法門龍象無妄之縲絏非其罪也於師何損焉銘曰清虛之後四傳其燈具我智慧伏我師承虛舟泊岸經在其中衆取以證師已先通瀛海空明天風飛錫險夷不滯解脫無跡蓬萊方丈夙昔桑下氣無不之千百億化影池之碣拏山之佛如是我聞既恍以惚姑書其事以喚衆聽空山明月永劫心靈癸丑九年清雍正十一年佛紀二七五九年沙門法宗入寂備考虛靜堂法宗大師碑銘并序始香山僧覺性與余遇於慶源及佩符寧邊性亦反香山十六年後二千里外得再遇奇矣間袖示其師虛靜集且具狀丐銘石余有感而許之然禪家貴寂滅焉用文得無見矧於大方歟師名法宗號虛靜全姓出完山籍于關西三和母盧夢龍而妊降以庚戌歲浴佛日稟質邁凡年十二投玉岑長老祝髮謁道正大師言下即悟師曰圓頓法界今在汝矣入香山參月渚大師涉盡藏經時年二十餘遂從月渚高足雪巖聽玄旨蒙印可歷住真常內院祖院徒侶雲集晝設講夜入禪篦刮衆曚者有年戊子春赴請海西九月山扶策隨者常百數已復還香山癸丑四月十七日留偈示寂于南精舍俗壽六十四僧臘五十二火三昧際祥光燭天獲靈骨一片舍利三顆建窣堵波分厝于香山九月暨湖南之大芚寺又為立碑蓋師之學泝雪巖以上直紹西山而丕揚臨濟宗焉師嘗自警云守志堅石凝神潔水善保虛靜亦如水澄噫聖人之道靜虛動直惜其晰於靜虛之體而閉於動直之用也考其詩若疏多致意於君親師朋則本善之感發亦不可誣其與冠章甫而趨利敗倫者何如哉乃作銘曰指發琴音眼現燈花是指是眼有迹無迹性根之露厥妙叵測攝万于一師乎歸宅通政大夫司諫院大司諫知製教李重協撰梅村居士楊萬元書并篆崇禎紀元後再回辛酉紀元丁巳十三年清乾隆二年沙門信和入寂備考慈應堂大禪師塔銘并序資憲大夫吏曹判書兼弘文館大提學知成均館事李德壽撰并書篆丁巳冬余屏居濱陽之觴深村杜門息機罕與人接有僧叩門求見進而問之曇源其名其發跡乃自關西之妙香山余曰師來遠矣亦有求於余乎曰匪求奚來來斯有謁自佛法東流燈燈相傳至西山宗風益振承之者鞭羊堂鞭羊之後為楓潭楓潭之後為月渚月渚之後為雪巖吾師慈應堂則繼雪巖者也吾師法諱信和俗姓李氏晉州人後移寧邊之沙川父泗男母趙氏平居喜施捨人謂修善業感異夢生師於戊戌之冬為兒戲皆作佛事十歲從碧雲長老祝髮參雪巖秋鵬大師盡究三乘竗旨化法流行四十餘年乘緣而來緣盡而逝丁巳二月十一日也闍維得二舍利其一不呪自出其一呪而得者并塔而奉之願賜之銘俾有以傳其跡今之來也意蓋在是余曰余踈筆研久矣然雪巖吾方外契也於其高足惡得無情况師之勤有如此者乃為銘曰西山嶽嶽峻其廊廡雪公承之重規疊矩逮師繼作慧日增輝法雨所被海衆有歸我緣既盡薪飛火傳舍利自躍色相炯然渡闕慈航幢摧大法瑑石碣銘用垂永劫上即位之十四年戊午七月日建戊午十四年清乾隆三年六月八日沙門懷淨入寂備考雪峯懷淨禪師碑弘文館副提學俞鎮商撰師字曰允中懷淨其法名也俗姓曹氏朗州人九歲投達磨之照明長老落髮就華嶽文信大師受法性不飾外巾衲襤褸而不補綴髭髮有時不剪髼鬆如也人或譏之輒朗吟生平踈逸無拘檢酒肆茶坊信意遊漢地不收秦不管又騎驢子過揚州之詩而不少變歲戊午師周甲也六月八日示寂前夕吟一偈曰浮雲來無處去也亦無蹤細看雲來去只是一虛空闍維得舍利一粒靈珠一枚就美黃寺建塔王以相臣之請命給復戶於密陽之表忠祠以資守護備考有明朝鮮國賜紫國一都大禪師禪教都總攝扶宗樹教普濟登階尊者西山清虛休靜大師碑銘并序嘉善大夫戶曹參判李雨臣撰嘉善大夫司憲府大司憲尹得和書通政大夫吏曹參議知製教曹命教篆粵在萬曆壬辰島夷犯京宣廟西幸西山大師休靜率其弟子惟政等倡義募兵樹中興大功宣廟嘉其功命立表忠祠于嶺南之密陽並腏休靜惟政所以褒忠獎義也逮我當寧十四年戊午以相臣之請有給復守護之命師之法裔南鵬改創祠于密之靈鷲山三綱洞奉二師遺像名其堂曰弘濟涉千里走京師訪余而屬文曰吾法祖西山之碑是文忠公月沙先生之文也厥後師之法派四世碑文皆出於公之門列樹於金剛之百和菴百華疑是白華之誤中儒釋之交至於四世者斯儘古之所無公乃文忠公之嫡孫今將竪石于師之祀記師功烈來請于公者意非偶然公於斯文惡可辭乎於戲余嘗讀先生之文知師之為禪門中奇傑人而先生之文至今爀爀然照人耳目逾久而逾光則其於不朽師也奚待余言然余於鵬之言竊有所感于心不揆僭妄泚筆為文曰師法名休靜字玄應自號清虛子又稱西山俗姓完山崔氏名汝信外祖縣尹金禹父世昌箕子殿參奉母金氏有異夢生師於庚辰三月三歲燈夕有一老翁來撫其頂曰此兒名以雲鶴仍忽不見幼與羣兒遊輒以佛事為戲而及長風骨秀異頓悟禪法受經于靈觀大師剃度于崇仁長老三十中禪科選至禪教兩宗判事已而解其印入金剛作三夢詞曰主人夢說客客夢說主人今說二夢客亦是夢中人登香爐峯作詩曰萬國都城如垤蟻千家豪傑若醯雞一窗明月清虛枕無限松風韻不齊觀其發於辭者可稔其韜光匿影妙契於禪宗也己丑之獄為妖僧無業誣引被逮供辭明剴宣廟即命釋之取覽詩稿賜御畫墨竹命賦詩即進絶句宣廟又賜御製而賞賚甚厚仍許還山壬辰之亂師仗劒赴行在宣廟教曰世難至此爾為出力弘濟耶師泣而拜命曰臣統率緇徒悉赴軍前殫效忠赤宣廟命為八路十六道道疑宗字之誤總攝師分部沙門惟政領七百義僧起關東處英率一千起湖南師自率門徒及所募僧一千五百會于順安與天兵或先或後助援聲勢進戰于牧丹峯斬醎甚夥天兵乘勝擊之賊遂空城宵遁師乃迎鑾還都李都督如松送帖嘉獎曰為國討賊誠忠貫日不勝敬仰又題詩贈之諸將莫不欽贊於是師請曰臣老不足當事軍旅之務屬之惟政處英即還舊棲以守本分臣之願也宣廟嘉其志許之仍賜號曰國一都大禪師禪教都總攝扶宗樹教普濟登階尊者甲辰正月會弟子於妙香圓寂菴開道場說曇法題自家影幀曰八十年前渠是我八十年後我是渠書訖修然坐化時年八十五法臘六十五異香滿室所著文稿行于世師為人法顏魁梧慧智聰悟在家事親至孝入山清淨守法而忠君衛國之誠亦根天性遇患難乃能結主知於縲絏之中而至于國難倡起義旅羽翼王師收復三京氛祲載靖便即納印飄然一衲遂返舊寺身雲心月復照於金沙淨界倬倬英風有足以䟪頽俗而立懦頑求諸往牒無與匹休明之廣孝齊之秉忠名雖義釋志在功利心跡不明亦奚足論也嗚呼當今之世開僧聞釋抱奇俊之才而淪於異教甘自棄於虛無寂滅之中者凡幾人哉苟能當宗社岌嶪之時不縶其法而自勵大義倬然所樹立如師之為則其有補於邦國將如何而又何以異教少之哉師之示寂于今數百載而朝廷之特軫表異之典者亦所以樹風聲而激人心也南鵬勉乎哉師之文章造詣傳鉢法派詳載文忠公所撰碑文中故只敘其生卒出處始終倡義靖亂顛末如石銘曰巖瀆育精異人挺形仙婆告夢神翁錫名字雖阿胎性則佛英神秀氣淑髓緑骨青金鎞放光玉拂奏靈道悟那羅理感死生遂登法席摩尼照晶無妄縲絏詩達天庭恩隆御畫榮耀千齡口呪梵音志在葵傾逮國屯步先倡義聲登壇誓衆雲集其兵羽翼天戈掃彼穢腥鼓勇迎鑾復我王京忠義炳日華夷皆驚功成納印歸錫雲扃曇雲生鉢法月在瓶三夢舊偈玄契叮嚀人間榮辱幻如夢醒舍珠靈骨寶塔崢嶸太古法派不滅光明靈鷲立祠表揚忠貞一體同祭師弟共享功紀麟臺道尊龍堂一片貞珉万代留芳辛酉十七年清乾隆六年五月二十日沙門定慧入寂備考佛靈山雙溪寺定慧大師碑銘并序議政府右議政豐原府院君趙顯命撰定慧大師聰明淵廣講說瀾翻所在生徒雲集稱西教大宗師殆四十年而終其徒彩晴以狀來請銘師與吾弟東溪居士相善余按嶺節來見余於澄清閣中時余與客為詩酒歡聲妓滿前師處其間油油然言笑而目若無睹也耳若無聞也余心敬之不為浮屠文字雖有吾儒法門義不可辭也其狀曰師俗姓金氏昌原人生九歲自投於梵魚寺自守禪師禪師異其聰慧授冲虛長老入伽倻山參葆光和尚和尚始授具遊湖南參雪巖既已復歸和尚自是聲聞大彰從學者日衆遂登壇竪拂時年二十七既又歷參諸老宿益有發明一日歎曰數他寶何益哉入金剛山坐禪未幾還講授於釋王鳴鳳青巖碧松諸名剎而卒亦示寂於青巖師晚年常欲遣講生專心內究顧諸講生不肯捨故師亦不能轍講席然其意則未嘗不以禪為歸也闍維時有雨雹光怪建塌安頂骨於佛靈智異山中師以乙丑五月初二日生辛酉五月二十日歿壽五十七師性溫雅有弘度不拘小節嘗云口舌騰而心學荒教宗崇而禪旨晦儒釋殊途而其末斃蓋略同也師能有見於此有以反之吾黨之支離鶩外者可以知所戒矣銘曰與其生枝上之枝曷若培根中之根四郊之牛羊不反嗟吾儒有愧乎爾禪崇禎紀元後再甲子八月日建壬戌十八年清乾隆七年佛紀二七六九年沙門宏濶入寂備考有明朝鮮國幻夢大師碑銘并序歸鹿山人趙顯命撰通政大夫吏曹參議知製教曹命教書并篆百年疆場事有不可勝憂者向余按關西節入妙香山於古寺中見西山大師真像慨然想慕英風若或遇之也余為話頭問於山之僧曰爾家西山祖不食魚肉食是什麼義諦未有能對之者聞西山六世孫宏濶者方聚徒講學於安州之隱寂庵隱然稱西方大宗師余即馳書問之師為著說以辨之其文甚奇其論甚偉其歸眷眷於君臣大義以為上乘法門要以不背於普濟慈悲之仁蓋於西山心法之傳如印潭月而與余發問之微意沕然有相感者若師者真可謂西山之肖孫而余之所以托知音於方外者亦不為過矣師以辛酉十二月七日告寂于黃州之道觀寺其徒體仁持狀走千里謁碑記於余其狀云師俗姓安氏密城人也父機俊母魯氏其生有異夢十三出家受經於秋鵬大師既又遍謁南方諸宗匠晚而卒業月渚和尚之門而其發端入頭得於秋鵬者為多師既篤志精進法海深廣然雅不喜著述有來問者則誦之而已言已則端坐念一佛四菩薩如是者三十年前入寂數日告死期至期祥光燭天火中出靈珠七頂骨出舍利七體仁等將建塔以安之俗壽六十二堂號幻夢云余學儒者未諳佛理師之造詣淺深誠不足以與論然若其獨得西山心法將以納衆生於忠義之塗以擬國家緩急之用則其心皎然焉可誣也余獨發揮此一事以為浮屠記凡為師之學者皆不可不知此意也銘曰惟十四枚珠皆西山祖心心心相傳傳者如林則南氛西祲霧消而烟沉崇禎紀元後再壬戌八月日丁卯二十三年清乾隆十二年禁巫覡淫祀戊辰二十四年清乾隆十三年沙門體淨入寂備考虎巖堂體淨大師碑龜溪洪啓禧撰釋教視死生甚輕而最以傳道為重蓋曰道不死則身猶不死也謂之衣鉢相傳謂之護法金湯師以是傳弟子以是護焉東方之禪清虛大師實為龍象清虛傳之鞭羊鞭羊傳之楓潭楓潭傳之月潭月潭傳之喚醒喚醒傳之虎巖考其源流虎巖之為善知識可知也虎巖名體淨俗姓金氏興陽人丁卯生戊辰歿世壽六十二法臘四十七得法於喚醒多住於陝川之海印梁山之通度東西南北之緇徙往從之常數百人咸以清虛之統歸之老而捨衆習定宴坐觀心而終於金剛之表訓內圓通書一偈曰講法多差失指西喚作東今朝大笑去楓嶽衆香中擲筆而逝共為之立碑紀其蹟余聞師僅學步家失火四面皆焚而無引自出得不死稍長涉大江沒而涌得不死又於山路逢猛虎隱巖穴間得不死豈偶然歟抑有佛力救之歟此世界欲火苦海魔障者其焚灼人蕩潏人吞嚙人不特為三不死獲保性命開悟心靈蓋無幾耳若師之超三灾而牖大衆自在於名山法剎之中者苟非妙法蓮花涌現園繞將以傳喚醒之衣鉢護清虛之金湯豈能臻此哉銘曰炎炎大火之聚而不能焚爍汹汹洪流之奔而不能陷溺耽耽猛獸張牙舞爪而我已方便於巖之側金剛海印灑脫於住錫之場雷音落伽恍惚於墜花之席西方東土實無二致何師之自笑自懺於示寂之偈庚午二十六年清乾隆十五年沙門演初入寂備考雪松堂演初大師碑銘并序晉菴李天輔撰昔我五代祖月沙公銘清虛大師高祖白洲公銘鞭羊大師從曾祖靜觀公銘楓潭大師從祖芝村公銘月潭大師自清虛至月潭為四世其銘皆出於吾家四世甚奇也嶺南僧南鵬以其師雪松大師銘來謁於余蓋清虛之後分而為二派焉有曰惟政應祥雙彥釋霽即教派也有曰彥機義諶雪霽志安即禪派也師初師釋霽後參志安皆傳其法於是清虛之派至師而始合而為一師俗姓白號雪松慈仁縣人年十三剃髮於雲門寺為人貌浻而心淳博觀內典探其源而窮其妙登壇講說從學者翕然宗之及老謝遣其徒兀然面壁一日喚侍者點茶來飲一杯書偈訖誦佛而化師以丙辰五月初一日生庚午五月初一日化世壽七十五法臘六十三既火得舍利分藏于通度雲門二寺余不喜為浮圖文字而於師有五世誼何可辭遂為銘銘曰定即是慧慧即是定莫曰禪教道無動靜如月印水分照西東惟師心法二門一宗戊寅三十四年清乾隆二十三年佛紀二七八五年王親製釋王寺太祖手筆追慕之記備考英祖御製追記噫本寺我太祖大王御筆即為東北面都元帥時與文忠公鄭夢周等諸公次于北青以吉州寺中舊物舟載以來置于此寺而記之者而義安大君之名在其中吁亦奇矣戊子夏四月因寺僧之責板上京我聖考作小識而添刻焉此即小子昔年仰覩者而豈意五十一年戊寅同月復見于北道陵殿志中乎三復敬玩愴慕深切我聖祖創業垂後聖考繼述光前一隅青丘禮義燦然八路蔀屋黎民被澤而弗肖弗德莫述先業禮義之俗日下蔀屋之民日困思之及此不覺悚然噫聖考之親作小識小子之續成此記俱由於感舊而追先非以其寺為可懷為後王者覽此仰體我聖祖創業之烈我聖考繼述之德克勤克儉保民恤民釋王舊日之休祥當永垂於萬矣敢將數行之文仍作海東之祝云爾洪武壬申後三百六十六年夏盥水敬書黃海道有妖女自稱生佛鄉民尊信諸巫從命王聞之以為非尋常妖人遣御史李敬玉斬其首傳示一道庚辰三十六年清乾隆二十五年佛紀二七八七年王親製三角山太古寺圓證國師碑閣懸板記文命有司奉安于閣中備考御製懸板文北漢太古寺後有碑而碑文中有聖祖開創前御諱其宜致敬故令總廳度支建閣仍記其槩盥水敬書鐫揭于閣梁庚辰仲冬八日謹識即小子踐祚三十六年也與北道釋王寺聖考追記偶然同符罙切追慕焉乾隆二十六年辛巳五月二十四日戶曹郎廳奉懸板安于閣梁壬午三十八年清乾隆二十七年六月二十七日沙門慥冠入寂備考智異山泉隱寺龍潭大禪師行狀門人惠菴玧藏撰和尚法諱慥冠字無懷龍潭其號俗姓金氏南原人也母曰徐氏徐夢一龍升天因以有娠以康熙庚辰四月初八日生骨相靈秀鋒頴峻鋭九歲入學目所覽則無遺誦十五歲前儒業已成時入翰墨場纍中日課第鄉稱奇童十六先失所怙泣血三年觀世無常深有出籠之志十九以出家請于慈母母知不可強而許之遂投甘露寺尚洽長老仍以祝髮受具於大虛堂就侃大德鄉黨儒士聞之歎曰虎入空林將有大咆二十二發足向華嚴寺初參霜月大師大師一見深器之服役數年而二十肆遍遊嶺湖歷參名師曰影海洛菴雪峯南嶽晦庵虎巖諸大和尚也禪教無不臻妙則到處扣決聲名大彰是謂麝過春山馨香難掩也行腳既了唯以返照為己業收筆硯刷石上在見性庵讀誦起信一日夜忽悟諸佛說只是這個地神心豁然黎明諸經信手拈看則言言果如中夜所悟底也越三日夢中神童以冊一函書十張擎授和尚而書面曰震谷意其振東方之徵耶和尚自覺後益有明徹宜褰緇帷納來學而不以得少為足愈求前進湖有冥真堂守一大師即月渚之高弟宗眼明白見處高峻言中有響句裏藏鋒者也師聞而欲趨謁矣冥真亦聆師之風猷先至師所師喜曰適我宿願也問曰華藏遍一切處現今天堂地獄當在何處一老答曰懷州牛喫草益州馬腹脹又問曰此是格外相見實不頓入更乞一轉語答曰天下人求醫炙猪左膊上師於是覷其奧而服膺之可謂神機相投也三十三直入靈源菴深以遠公十年影不出山之誓為誓而手築土窩於庵之東隅又創一社於庵之西麓名之曰佳隱以為終年宴息之所而益務克己工夫噫劒靈光射果熟香飄硯德高士八表爭趨可謂海東折床會也然師恆以自貶為基故拒雖膠固其五里霧市終難喝散因衆紛擁自登化門可不謂之無為而成者耶被人所牽竟未遂本誓遍遊於回門之深源動樂之道林智異之諸庵普開化市而以拈頌之旨牢籠龍象以圓頓之法掀翻叢林者二十餘年其臨壇講法則聲韻雄浪說河如懸言言句句令人搆取立地見者聞者若換骨洗腸焉而且於經論中只要明宗不巧釋文純尚筌蹄者或以提接無味譏之己巳冬霜月和尚傳托鉢衣以前後五侍多所悟益辛未春告徒曰知命過二文字工夫豈不愧哉遂作偈一律曰強吐深懷報衆知講壇虛弄說玄奇看經縱許年青日念佛偏宜髮白時生死若非憑聖力升沉無計任渠持況復世間頗閙閙白蓮幽谷有歸思揭示大衆仍罷講焉戊寅夏門徒復請講授故再開化場於臺庵翌年冬還撤之又作一律曰閲經何歲月空費鬢邊春托病知人蔭藏縱厭世紛谷風時至友松月自來賓定中知己在於道喜相親蓋前後退衆均習定慧者頗同古人也師之形儀魁岸性度泓洋處事以柔臨衆以寬若無所礙其卷舒機變孰能思議耶雖遊門之伍未窺其墻凡僧俗間來謁者退且唶曰面倍于耳聞至乾隆壬午六月二十七日入寂焉世壽六十三法臘四十四臨終時命侍者寫一句偈曰先登九品蓮臺上仰對彌陀舊主人次手書遺囑云人生起滅如雲起長空元無所實何可以不實為實願道友等即時闍維云云門人等一遵遺教焉闍維之夜神光周亘於內院洞天在外者先見門人輩收五個舍利於第五齊夕乃感夢也分塔於三處即甘露寺之剃髮處波根寺之熟遊所實相寺之入寂地也又師所詠歌頌若干篇曾散失之而今僅得百餘首刊行焉然文章乃道人之餘事凡有請則不經意而信筆揮之若荊山之人以玉抵鵲也故或不中音律於戲敦碩神宇仰不可窺涵湧法海俯不可測實非弱辭所能稱述而為傳不朽略記始末耳戌子仲秋日癸未三十九年清乾隆二十八年佛紀二七九年春沙門聖訥入寂備考華月聖訥禪師碑銘并序弘文館大提學徐命膺撰儒拒釋釋譏儒道之不一久矣然釋為銘必求於儒儒亦喜為釋之銘而不辭何也其為道不一其為道之心則一故拒之者拒其道之非吾所謂道也為之銘者與其能力於道不懈使移之於儒其升堂入室亦不異矣惜不能然也余於華月法師之銘有感矣法師聖訥其名華月其號又號斧巖以其生于平康剃髮于平康之寶月寺而平康舊稱斧壤故號也師本李氏世為完山人母慶州之李夢大斧盤桓自空下以手擎之於是有娠生師自年七八不喜腥葷與羣兒嬉聚纍石趺坐於中為佛之受供狀十四出家于雲磨山依玉心長老又從燕雲堂坦圭大師聞其道喜曰鳥之將息必擇其林人之求學乃選師友此吾儒之志道真切也遂飛錫雲游於東南見松藕大師又見南嶽和尚又見喚醒大禪師喚醒與語道大異之携入丈室傳以心印此吾儒之博學無方也喚醒設華嚴大會於湖南之金山寺法衆千有四百禪家稱說法之盛祗園以後未有也師登講座論道若河决風生法衆潛聽閴然無聲焉喚醒大加歎賞即席誦一偈贈之曰入院寒燒佛看經轉覺魔出門行大路赤腳唱山歌當是時遊喚醒之門者如雪松堂演初虎巖堂體淨醉真堂處林朗然堂信鑑涵月堂海源後先聞道俱得精髓至其妙有物之先乎天地悟無形之本乎寂寥則咸推諸師同門執筳者輒於師就質焉此吾儒之獨得其宗也師鍊業煥醒悉闡宗教然後復周遊清海花江東州入金剛山間往來寶蓋雲磨五聖徒衆四至講道幾三十年復還寶月散遣徒衆專精於定慧時年六十此吾儒之由博反約也癸未春甲子朔丙寅師召門弟子告示寂弟子坦慶請十念合掌師舉手微笑曰小乘著於念句坦慶復請留偈師索筆書曰翻身轉一擲凉月碧峯西遂化去法臘六十一此吾儒之啓手啓足也東方佛法始自太古和尚太古傳之幻庵龜谷登階碧松芙蓉西山鞭羊楓潭月潭至于喚醒遂大以蕃獨華月得其衣鉢云坦慶與徒衆藏靈骨為塔於寺南來求銘嗚呼釋之道非吾所謂道而能有傳焉如此儒之道至於今亦有傳否其弟子之尊其師有如坦慶之於華月也乎此余所以有感而為之銘曰佛有真詮止觀參請參請吾知止觀吾敬暨其有分此實彼空毫芒之差千里不同雖則不同各道其道有誰真踐高步深造卓哉華月禪家之英知行終始乃底于成達磨袈裟遂歸慧可有以觀空空亦幻些法身歸土慧骨在阿屹屹浮圖衆孫之我排其道而取其能留銘高岡以警不勝六月沙門大愚入寂備考碧霞大愚禪師碑世子翊衛司副率李敬毅撰師法名曰大愚靈巖人俗姓朴母李夢青鳥集肩碧霞入懷娠而生師後來聞鳥鳴聲發出家心且以碧霞為號剃髮于喚醒大師懺悔于孤鴨禪師皆於西山為五世孫也氣岸高峻人不得攀援遇事直傳無回撓雖猛虎當前心不少動經教之外旁通子史晚喜禪頌手不釋卷嘗言龜谷間有誤處自為筆記至老不輟喚醒老師贈詩曰東土大宗匠碧霞長老其西江萬里水一口能吞之眉間有白毫見者異之面貌稜稜瞻望悚然諸參問者不自覺妄念之消落師生於丙辰以乾隆癸未六月歸寂壽八十八偈曰生來寄他界去也歸吾鄉去來白雲裏且得事平生放筆泊然坐逝荼毗得頂骨一片舍利一顆丁亥四十三年清乾隆三十二年佛紀二七九四年十月沙門璽封入寂備考禪教都總攝國一都大禪師霜月大師碑銘并序譏政府左議政李溵撰余養疾于東岡丙舍鄰庵有智異山人春坡義珀大師者時時來款其師惠庵玧藏法祖師霜月竪碑經營矣一日袖應雲澄悟所撰霜月堂行蹟請銘甚懇余於浮圖之學無聞焉只為遣間試閲其卷師諱璽封字混遠霜月其號也俗姓孫氏順天人母金氏夢明珠而娠以丁卯正月十八日生幼時嬉戲聚沙石為窣堵坡十一歲投曹溪山之仙巖寺極峻長老十五剃髮又明年受具於洗塵堂文信大師十八參雪巖道既通遍參于碧虛南嶽蓮花癸巳歸覲本鄉四方負笈者日益衆無用一見歎曰涉安後一人也師白而中身圓面大耳聲若洪鍾坐如泥塑受衣鉢於雪巖蓋臨濟嫡傳也凡國內名山瓶錫殆遍子夜必拜北斗常以講明直解心賤智證為法門嘗曰學者如無返觀工夫雖日誦千言無益於己又曰一日念頭不著實功便對食愧飯戊辰自春曹署禪教兩宗都總攝國一都大禪師庚午主表忠院長丁亥十月有微疾口授一偈曰水流元去海月落不離天怡然順世壽八十一法臘七十紫雲翳空七日乃滅羣弟子加其號曰平真大宗師及茶毗奉寒瓊至妙香而三珠迸出邃藏其一於石鍾又分安于順天之仙巖海南之大芚云嗚呼師誠學禪而有其實者也對食愧飯等語有足以警醒衰俗於是乎不以老朽辭而輒為之銘曰繫師修道亦自喫苦單心力踐高步玄壺嗟今之人觚而不觚徒占儒名夷考則殊若比於師寧不愧恧我感于斯題之貞石戊子四十四年清乾隆三十三年沙門粲淵入寂備考江源道洪川縣孔爵山水墮寺瑞谷堂大禪師舍利塔碑銘并序大匪輔國崇祿大夫領中樞院府事金相福撰通訓大夫前行工曹正郎金相肅書并篆有學佛人再明者狀其師瑞谷大師法號粲淵之戒行來謁余求為舍利塔碑文者其言曰吾師之入寂也放光三日其茶毗也有二舍利一超骨出示人以異是可以為文乎曰世之釋子死而火之種種有若是者又其言曰近世有若思岸長老潭月覺惠寬坡斗玉箕城快善萬化圓悟五大師者吾師莫不參謁而受其法是可以為文乎曰出世之士雲游四方歷參諸師是固其常也再明曰吾師少游名山澗飲木食博通內典廣化善緣及其晚歲捨教歸禪穢名利而等物我安苦寂而樂湛靜混迹隨順潛德葆光以是而終焉曰嗚呼是可以為文者也吾聞佛氏之道有禪有教蓋皆出於其祖師之法然以其道而論之必先悟其心而後乃可以令人悟也余觀世所稱大教師者多聚徒衆廣設法筵演說經旨終日矻矻不知休就考其心跡頑根迷塵或多有不能祛者真大慧所謂一盲引衆盲以入火坑中者也夫以太陽之明雲霧蔽而晦其景雲霧薄而漏其光雲消霧撤太陽乃復其明今夫學禪者其猶是歟晦其景不如漏其光漏其光不如復其明雖或不能復其明漏其光者固有愈於晦其景者也造塔講經并無功德面壁觀心直指路徑若爾師者真可謂知所學矣然則其游名山參諸師及其現足之後是舍利子者果其真如之種子也歟是可以銘也謹按師俗姓金氏貫慶州父曰業尚母姓完山之李李年幾七七而夫婦禱于觀音夢星落于懷孕而生師壬午三月十七日丑時也以戊子十一月三日巳時示寂於洪川孔爵山水墮寺法臘五十有一明年己丑春其徒再明等百餘人以其一舍利塔于鳳腹寺舍利超骨塔于水墮寺是師之所常游居云銘曰我心有得可以悟人我無心得其說不真是以古佛先禪後教嗚呼瑞釋其是之效歟崇禎紀元後三己丑七月日立庚寅四十六年清乾隆三十五年下教禁創寺於陵寢近地備考大典會通禮典寺社增陵寢至近之地創寺剎者嚴禁陵官不禁者重勘英宗庚寅下教冬十一月二十三日沙門軌泓入寂備考玩月堂大師軌泓碑銘并序大提學黃景源撰玩月堂大師軌泓姓韓氏清州人也生于甲午三月七日終于庚寅十一月二十三日壽五十有七年大師始生十二歲入平康縣寶月寺削髮為僧從涵月大師海源學浮圖遂得其宗海源嘗居安邊府釋王寺大師從焉及沒之夜得舍利其徒煥雄建浮圖以葬之來請為銘銘曰雪峯之陽有巋其塔舍利攸藏神光四闔師之初降星發母夢幼事禪宗教行山衆天花擁坐弟子稽首洋洋講說惟空是牖山河大地不盈一眺死生憂樂悉歸之笑翛然而化神遊六虛靈明不滅翕于真如師師海源後師而歿玩月堂真讚領相李福源撰浮圖氏以一切色相皈之幻妄然而自如來以來皆有圖相何也尊其道者慕其人慕其人則思其形大衆之誠師何與焉余嘗遵海北游一見玩月於雪峯寺中俯仰之頃三十五臘師已了萬法脫四大嵬然為大衆所慕思而我猶不離舊日知見悲歡榮辱種種煩惱愧於師多矣玩月之徒煥雄遠來見訪求師真讚余之所見者昔日之師也不知師年邵道圓後英風秀氣尚如沙彌時否其既蒼梗虛湛有枯木止水之容歟衰病杜門雲山遼絶恨無由一見法像澄此塵根聊為數語以償宿緣贊曰雲皈太虛者神月印萬川者像皈者印者孰真孰妄貌有盛衰質有起滅師與衆生一也無盛衰無起滅而超然於貌質之外者可以意求難以筆盡玩月堂真讚領議政蔡濟恭撰謂師不滅也雪中之虹崇朝無跡謂師示寂也西峯之月流照浩劫吾不知其生與滅切切於幻化之中者妄也龍象奔走悲慕欲以壽幻化之真者妄中之妄也沙門海源入寂備考涵月海源禪師碑銘并序議政府領議政金相福撰自法祖東來大闡象教臨濟之宗流至清虛休靜又五世而得釋海源也是惟煥醒志安衣鉢嫡傳也敏而信慈而達入室四十餘年精進不怠落牙而出舍利茶毗而獲頂骨其徒尊奉微間生死建塔并藏于釋王寺東麓狀其蹟來乞銘於余師國姓咸興人母趙夢大魚而孕過期而乳年十四出家于道昌寺字曰天鏡號稱涵月歷參諸名宿後事喚醒堂盡得其宗門妙詮夫其修持朝夕起居先乎雞時是敏也行化南北來往暨于雁候是信也見人之飢寒者以己之衣食衣食之是慈也疾病召大衆書偈唱佛恬然而逝是達也其有諸己者如此故入寂之辰雙虹示異火浴之夜六花呈瑞遠近知識莫不讚歎師生於辛未卒於庚寅俗壽八十禪臘六十有五記余宰鶴城時師與其徒軌泓住錫釋王寺講經旨修戒行余見而不能忘其後泓一再來京師致師之書于今二十年間泓已先死師亦亡矣佛氏以斯世為泡幻余固不能為師而悲然師之於余實有舊焉銘於何辭遂演師之偈語以為之銘銘曰身與雲來來從何方心與月去去落何鄉有來有去即惟其常無來無去亦惟其藏英英在虛炯炯在空彼二物者無時已窮有穹斯碑天真之東百歲在後師名與終壬辰四十八年清乾隆三十七年命祭義僧靈奎及冢即壬辰之亂殉節於錦山者也甲午五十年清乾隆三十九年五月十三日沙門泓宥入寂備考秋波集後敘臨濟下三十二世秋波宥公與愚有好曾於同山居或經路遇穩接打話則學博解邃愚敬畏之摯遽然貪程失老境之勝友其歸也未十載門人慣拭成塔碣像集了又請足一言卷尾於愚於是念昔相誼悲且羡不敢謬讓謹據其袖來草而書之曰我宣廟朝有尊者浮休修公而休門出碧巖性公巖門出暮雲言公此下有葆光旻公晦堂定公寒巖岸公秋波即寒巖之高弟也波始於龍潭冠公勤事之潭公一日執手而勉之曰而不聞先哲之三登投子九到洞山乎華嚴善財所參五十五善知識莫非善財之師也女行矣勿滯遍參可矣波公服其言周流諸山參扣名師而末頭投寒巖之門承法受衣波為宗師者殆卅餘稔提誨方來衲子而志在言筌之表恆慨汩於講授未專定業觀其臨終之偈衲子平生慷慨志時時竪起般若刀好從一念彌陀佛直往西方極樂橋居然可知其往生蓮國也肅廟戊戌五月二十日生于廣州墨洞完山李氏先世望族還源當英廟甲午五月十三日也其集文古健閒雅人多求覽紙已貴矣至於公之性情雖多年執侍者莫愚所知如也愚則必曰所稟直遜二字也聖上四年庚子菊秋伽倻雲人有璣識前承旨申景濬秋波集序云大師入方丈山祝髮坐禪四十年慣拭傳師之衣鉢者也年草五入室號鏡巖云正祖宣皇帝追崇李禪在位二十四年丙申元年清乾隆四十一年佛紀二八三年下教革罷京外各司各宮房願堂備考大典會通禮典寺社增京外各司各宮房願堂一切革罷已建者毀撤未建者嚴禁正宗丙申下教戊申十二年清乾隆五十三年佛紀二八一五年海南大芚寺今名大興寺沙門天默等立休靜祠請額于朝王特命賜額曰表忠粵明年四月遣禮官齎香祝而祭之備考大芚寺志厥明年四月祠既妥靈聖朝特遣禮官賜祭西山賜額致祭文弘文館修撰宋翼孝撰維乾隆五十四年歲次己酉四月丁亥朔二十七日癸丑國王遣臣禮曹正郎鄭基煥諭祭國一都大禪師禪教都總攝扶宗樹教普濟登階尊者加贈表忠禪師休靜之靈若昔壬辰倭寇有警空門忠義曰惟休靜髮剃身緇不墜彝秉慧劒西赴義徒從影協助天兵狂寇遂靖還陪鸞駕勳業愈炳聖朝褒嘉寶墨暉映如何表忠先以惟政新祠翼然住錫故境樹風獎功特光羣請宜額降香便蕃寵命聳我南陬雖釋可敬尚饗獻官禮曹正郎鄭基煥大祝景陽察訪朱重翁贊者長興府使沈鳳淳謁者興陽縣監禹拓夏齊郎海南縣監申處文祝史珍島郡守尹岬都預差樂安郡守宋觀休備考海南縣大興寺西山大師紀續碑銘并序弘文館提學徐有鄰撰大師法名休靜西山其號或稱清虛子俗姓崔安州人性至孝生十歲孤悽悵悲慕因讀浮屠書有感於死生之說忽若有悟遂落髮出家遍遊名山有能詩聲往往出語警策宣廟聞其名徵詩稿以入既脫縲絏之厄繼賜御詩御畫墨竹以寵之倭寇之猘也大駕西狩龍灣師杖劒進謁于行在上曰寇深矣若何以助豫師泣曰國中緇流臣幸知之其羸病不堪任者令焚修祈福其餘丁壯悉備編伍惟上所令於是命為八道十六宗都總攝退則與其徒惟政處英等糾合義徒得五千餘兵惟政即松雲也會于順安之法興寺常與天兵為猗角進與賊遇躁牧丹掀平壤復開城選勇士七百扈駕還都都人咨嗟天將加敬願師則退然不伐其能既已喟然曰吾老矣莫以筋力為禮盍屬兵于政英反真于妙香之舊棲丐益力上憫而許之於是賜號國一都大禪師禪教都總攝扶宗樹教普濟登階尊者而禮遣之可謂識去就之分矣語具在月沙李先生廷龜溪谷張相國維碑中今取其關於大節者而著之師以甲辰孟春示寂壽八十五法臘六十五師臨歿囑其徒曰我死衣鉢之託必以海南為歸是州之地有山曰頭輪有寺曰大芚南瞻達磨北瞻月出東有天冠西有仙隱吾誠樂之且海南荒陬也王化未霑氓俗愚迷吾之為此冀其有觀感而興於忠也庶幾其有瘳乎師之涅槃後一百八十五年當今上即祚之十二年戊申師七世法孫天默等將立祠于大芚之陽揭師像而妥師靈相率繭足而來請額于朝上思中興功烈之美嘉休靜忠誠之美特命賜額曰表忠贈秩有加粵明年四月遣禮官齎香祝而祭之先是嶺之南有祠以表忠名之祠在密陽郡今於師之祠亦云表忠嗚呼忠美名也盛節也為人臣者孰不蹈其美居其盛而恆莫能至至矣而或不遇遇矣而或不見知於後世若師者雲林之一衲耳遭時一奮遂名無窮前被聖朝之殊遇後興明主之嘉獎師弟二人赫然廟食相望於嶺湖千里之內自古人臣之得比者蓋寡矣而師能得之豈不偉哉或曰師西山人也其所提兵斬級立功之地亦在於西州則其歿而建祠亦不于彼而于此何居嗚呼此不解隨緣住方之義者也烏足以知師之微意也天默等以余聞其事請載于石遂繫之以詩曰西嶽金精鬱磅礡千尋名材當不得爰有神人起白足鳳羽麟毛稟其德朅遊香爐振金錫俯笑豪傑醯雞窄日南蠻酋動戈戟東土時丁百六厄遂滅慈悲誓滅賊灑泣龍灣披忠赤震撞鯨魚會緇白雷動風馳滿山谷汛掃城闕京觀築旋迎鑾輿舊都復法水金剛呪海舶鐵火馬𦦨隨手熄普濟羣生躋極樂拂衣香山返真朴法身圓滿無南北方丈蓬萊皆我宅海南之墟新月麓翼翼其祠天默作何以藏之衣與鉢𤥭璖琉璃疊碧玉繚繞天香隨冊祝輝煌朝日射榜額額以表忠侑英魄榮于華袞彰五色撐拄天柱盤地軸永樹風聲警遐俗嗟汝南陬視此刻釋猶然矣矧儒服乾隆五十六年辛亥月日立尚玄按寺乘表忠祠置都總攝都僧統都有司都院長而自禮曹給牃例如釋某為海南表忠祠守護兼八道禪教十六宗都糾正都總攝華嚴大講主扶宗樹教大覺登階者釋某為海南表忠祠守護兼八道僧風糾正都僧統者釋某為海南表忠祠守護兼八道僧風糾正扶宗樹教傳佛心印禪教兩宗都有司者釋某為海南表忠祠守護兼八道僧風糾正禪教兩宗華嚴講主大覺普濟尊者都院長者庚戌十四年清乾隆五十五年佛紀二八一七年創龍珠寺於水原花山葛陽寺之舊基為顯隆園資福之齊社置都總攝一人以釋寶鏡為都總攝又命造佛像沙門義沼仁嶽作佛腹藏願文王稱賞之備考創寺勸善文李德懋炯菴撰伏以創梵宇而衛仙寢募緇徒而護珠丘肆有本朝故事實為桑門大願粵若奉國寺名而西守國寺名募建諸寺所以左禪宗而右教宗虔奉兩陵謂靖陵之奉恩寺光陵之奉先寺也今此隋城舊基即是顯隆新園神護鬼祕爰占吉地龍飛鳳舞仰瞻佳城顧以浮屠者流亦切守護之誠如無衆檀越功德即何大伽藍經紀春官度牒仰八路邑鎮之共助雪山飛錫佇十方世界之同施諸佛諸天已所印可善男善女想惟照證役糧材瓦丹雘等節隨其多寡普施普捨菩薩金剛羅漢諸佛可以次第或望或畫兹皆所重者存抑亦為惠甚大伏願僉位大施主俯察千萬至禱至祝備考龍珠寺大施主縉紳案序伏惟我正宗大王光御十三年己酉遷奉顯隆園仙寢于吉岡明年庚戌創建龍珠寺於花山之陽所入物資上自宮房暨于四都八道牧伯守宰誠心施捨厥數將近八萬餘兩乃命振威縣令曹公允植監董是役另選南北漢總攝獅馹哲學兩先師主掌於兹寺以至訖功何其偉哉小僧等雲師事哲學師追隨下風承聆盛舉矣其後猥以無狀再忝北城總攝十年不返故山而歲庚辰瓜熟歸依舊巢乙酉復涖本寺總攝閲覽寺中舊藏槩其時不遑啓處使偉功巨績或不無踈略寺舉能不悵悵于中乎適值田土厘正之事友人李君成尹聖中自鳳城至挑燈共討事蹟謹掇數行于卷首以考此寺設始之顛末俾使後賢共覿無量大施主不吝物之宏舉其又可忘乎時道光五年乙酉十二月七日都總攝等雲再拜謹識按號寶鏡堂八道都化主也哲學號城月堂八道副化主也備考龍珠寺都總攝教旨教旨猶云敕誥教旨釋寶鏡為資憲大夫護宗演教普慧正覺嚴淨毗尼圓融法界總持諸方大法師兼八路都僧統京畿水原府華山龍珠寺都總攝者乾隆五十五年十月日寶鏡湖南長興郡迦智山寶林寺僧也寶林寺今住持金鶴傘和尚考其存蹟示余備考仁嶽和尚行狀云歲庚戌自朝家新置龍珠寺命造佛像上曰選擇當時之名僧以主厥事可矣時師為證師作佛腹藏願文上取而覽之稱善不已曰豈意釋而有能文者乎乃以恩旨錫之備考龍珠寺大雄殿上梁文天浩奉教書伏以仙楸密邇於九五祥雲美哉相土梵宇輪奐於三千寶界扁曰造泡造泡謂造豆腐以供陵室祭需豈徒資福之方兼為工需之所惟漢南勝地隋東別天諸佛之往蹟荒凉巍然石堛一壑之佳氣蟠蔚截彼花山云云下略備考高麗國葛陽寺辨智無礙圓明妙覺興福祐世惠居國師法諱智光諡弘濟尊者寶光之塔碑銘并序內史門下平章事監修國史太子少師臣崔亮奉宣撰開寶三年庚子春國師奏曰水城郡葛陽寺山明水麗為國家萬代之福址願永以劃為祝釐之所上可之云云上謂光宗王也沙門最訥入寂備考東師列傳云默菴宗師名最訥號默菴楓巖世察之嗣而柏菴性聰之法裔也門風高峻碩德草偃遍參義龍藍茜失色提接衆人老婆心切總括華嚴大義分合品目一篇博採四教行相編集會要一篇此是識數之肯綮學者之眼目又與蓮潭共論性理之大義獅吼震天六十之年吟一律曰衰暮頽齡耳又鳴流光六十減神清律儀因病成踈逸禪學多思未發明虛說脫空消百歲耽眠昏黑過三更願將出得瓶鵝藥分施刀圭起死生蓮潭次韻和之曰竹裏寒泉月下鳴獨憑禪几耳根清鳶飛魚躍天機動水緑山青祖意明至道無難皆可學斯言有玷急須更默翁近日耽佳句或恐愁旰太瘦生七十四示寂蓮潭挽曰七十星霜又四年講經吟病遞相連平生博覽兼聰慧那個宗師敢比肩師有文集二卷行于世門徒十五人八月傳曰釋王寺古蹟載於國乘而國初御筆鏤板奉安肅廟先朝皆有御製御筆碑文仁穆大妃戊申仁元大妃戊申王大妃殿戊申重修本寺以豫追述古事之意欲撰記竪碑碑文當親撰建閣立碑依先朝近例令該道措備凡係貽弊之端各別嚴飭正宗朝記事二十二辛亥十五年清乾隆五十六年佛紀二八一八年正月三日沙門尚彥入寂備考雪坡大師碑銘并序上之二十年丙辰大匡輔國崇祿大夫原任議政府領議政兼領經筵弘文館藝文館春秋館觀象監事檢校奎章閣提學樊巖蔡濟恭撰并書余因事偶出郭門外有斃衲僧如不聞呵道突黑衣卒伏於前其色若有悶急者然余怪問曰若何為者對曰僧乃湖南沙門名聖淵者為法師雪坡和尚願得大人一言之重以詔十方衆生有邦禁也僧不可以入都城相門又不可私情導達乞城外旅店食夏以秋秋以冬僵死在朝暮然不得所願欲死無歸余油然感其誠許令進所為狀其狀曰大師法名尚彥湖南茂長縣人國朝孝寧大君十一世孫也父泰英母坡平尹氏早失怙恃家甚貧無以自資年十九投禪雲寺剃髮于希暹長老受偈於蓮峯虎巖兩和尚又參晦菴丈室以禪系言之於西山為七世孫於喚醒孫也三十三因大衆固請升座於龍湫板殿師自幼頴悟甚及參諸名師三乘五教無不言下即會其妙契神解於華嚴尤篤反覆則恆河計沙講誦則迦陵遍音率能正其訛一其歸以滌近世癡人說夢之見願學者日以坌集各示金繩覺路其說纚纚不窮在昔清涼大師有所撰抄中疏科其義多隱晦講解者病之師一覽圈以表之曰疏曰科各有攸主如客得歸焉頃之勝濟扶頴等白師曰大經抄中所引亦不無衍誤盍移錫海印證諸本以補同異師往留之考校乃已自是遊金剛者再妙香者一頭流常面壁焉庚寅澄光寺火所藏華嚴八十卷板一無遺師歎曰於斯而不盡心其敢頂禮如來於是鳩財剖劂人天助力春始夏訖其晦䵝者惟師之口誦是賴焉板既完新建閣峙諸靈覺寺傍前數日有虎咆僧又夢神人告曰此可藏如來大經云方經之安於閣也有瑞光蟠空會者咸異之師目為此偶然也已是後寓靈覺一日謂寺主曰寺不移建必圮於水盍圖之無何水大至寺果圮僧亦有胥溺衆乃服其神及老入靈源立死關以念佛為課日輪千念十周者十有餘年庚戌臘示微恙辛亥正月三日怡然入寂壽八十五臘六十六是日也弟子二十有七人奉以涅槃諸龍象奔走號哭雖下界衆生亦莫不相告齎咨師嘗論近世火浴舍利之出有不慊于心者及涅槃雖祥光七夜不滅竟不以一舍利顯靈釋氏觀理有固未始不為無也無亦未始不為有也有而謂之無可也無而謂有亦無不可真有真無又誰能辨之羣弟子無以寓其誠竪塔靈源禪雲僧亦如之此不忘舊時剃髮也嗚呼師一言以蔽之曰華嚴之忠臣也若聖淵又師之忠臣也盡心所事儒與釋道未嘗不同余不銘何以勸在後之千劫也乃作銘銘曰佛有華嚴正法眼藏誰其抱持雪坡心長鬱攸何物敢爾跳踉移諸腹笥登彼文梓如來色笑曰余嘉爾雪坡功德我聞如是時天主教大熾左議政蔡濟恭上疏斥邪學王教曰異端者非徒老佛楊墨荀莊申韓為然凡諸子百家之書少正經違常道非先王之法言者皆是也闡發闢廓之責非吾黨之小子乎欲禁西洋之學宜先禁稗官雜記欲禁稗官雜記宜先禁明末清初之文集翌年教諭赴清之使臣曰稗官小說姑勿論雖經書史記凡係唐板者切勿持來尚玄曰當時儒學界之有識見者蓋厭程朱學說之絮煩湖洛理氣之支離者久矣一自天主教書輸入以後李星湖丁茶山等諸名士見其說多新奇遂愛讀之而不覺浸浸然沾染於其中矣壬子十六年清乾隆五十七年下教加贈指空懶翁及無學三師法號備考教諭書本在釋王寺王師大曹溪宗師禪教都總攝傳佛心印辨智無礙扶宗樹教弘利普濟都大禪師妙嚴尊者加贈開宗立教普照法眼廣濟功德翊命興運持世護國東方第一大法師無學大師書王若曰法輪廣傳卜九五之昌期華誥遙宣鎮三千之界疇非大雄大慈之力吾知不生不滅者心粵聖祖肇造我家賴尊師襄贊洪業寶籙凝鼎發昔夢於興龍土窟班荊拭慧眼於靈鷲須看雪峰之下寺曰釋王始識草昧之中功最開國適宗伯之自北寄曠感於專祠舊址依然尚想趺坐之日遺像宛在遂副頂香之誠有漏衆生聽此第一法號無量功德長護於萬宏基故茲教示想宜知悉乾隆五十七年月日教旨迦葉百八傳提納薄陀尊者禪賢號指空加贈開宗演教萬行圓融六度嚴淨西天三昧東土一祖大法師者教旨高麗王師大曹溪宗師禪教都總攝勤修本旨重興祖風福國祐世普濟尊者諡禪覺號懶翁加贈修宗崇教證道悟契應真延貺讚運資福大法師者教旨王師大曹溪宗師禪教都總攝傳佛心印辨智無礙扶宗樹教弘利普濟都大禪師妙嚴尊者號無學加贈開宗立教普照法眼廣濟功德翊命興運持世護國東方第一大法師者癸丑十七年清乾隆五十八年佛紀二八二年沙門泰屹入寂備考朝鮮天峯大禪師塔碑銘并序水觀居士李忠翊撰并書余多見所謂大禪師者矣竦肩垂睫敷座而坐人之見之不問而知其為大禪師矣其竦肩垂睫敷座而坐也亦自以為我是大禪師也若夫目與人天同示心與凡聖同界四大與畜生餓鬼同生同死念慮與墻壁瓦礫同起同滅萬二千人同所禮敬而不能名其一德乃為萬二千人同所禮敬而無一念我是大禪師也是乃天峯大禪師所以為大禪師者也教有半滿大小文句義趣我唯有一理禪有捶拂拳踢殺活豫奪我唯有一性人有諂曲愚鈍誠實智慧我唯有一慈無殊勝奇特相無解脫悟入相若然者雖謂於佛法中無所得可也何也本無是相故也言即是心心即是性行住坐臥著衣喫飯即是心是性全體發現中間無有一毫或添或棄諸所有為若然者雖謂之純是佛心性可也何也佛心佛性本如是故也師名泰屹字無等天峯其號也海西瑞興人金斗弼之子母趙氏十六披削於有德寺明琢長老受具戒於道圓師二十受業於隱月雨霑師遍遊方內參問知識晚歸白川護國寺辭衆入禪嗣法於楓溪海淑師即白月玉慧師之高弟而清虛之五世孫也俗壽八十有四乾隆癸丑之歲示有微疾僧問師恆說苦空無常亦為生死所使而不坐化師曰坐不必是坐臥不必是臥又問師今示滅不滅安在師良久點頭而逝顏色如平日入定時火浴頂骨不壞者二片設利六十四枚建塔于護國及文化之月精楊州之望月諸寺分藏之道臘六十有八弟子得宗旨者幻悅妙一朗奎等十餘人受戒律者數百人余始見師時年已八十餘高頰權方口大耳目如曙星顧眄有彩與之語悃幅無華信乎其為福慧具足人也今幻悅等來謁銘余以余所觀於師者舉似悅曰子以無所觀觀吾師故能知吾師也銘曰師入有德窟至誠發願誓忽於所汲井三條水高揭結為璀璨氷嚼之甘寒口時當夏節始衆歎未曾有師默如不見氷水兩性空融結峙流際我見無不同問師養生具今皆何所在唯有一木鉢盛飯擎作禮但知鉢盛飯不知米作飯但知米作飯不知將錢換一朝飯熟後受享腹為飽餘分及飯天無人不道好是法不思議不離凡夫事若離凡夫事法非不思議垢濁盡遠離仍現是凡夫欲識天峯旨是義自勝殊甲寅十八年清乾隆五十九年王命安休靜惟政處英等三人真影于表忠在大興寺酬忠在妙香山兩祠官給祭需歲祀之備考三師影題行大匡輔國崇祿大夫議政府領議政吏曹判書兵曹判書僧義兵大將賜紫國一都大禪師兼八道禪教都總攝大覺登階尊者西山清虛堂大和尚諱休靜之真影行大匡輔國崇祿大夫議政府領議政兵曹判書兼六軍門都總攝領義兵大將軍泗溟堂松雲禪師諱惟政之真影邦家柱石禪門木鐸同時臨亂功存社一體舉義普濟羣生義兵副將嘉義大夫中樞府使雷默堂大禪師諱處英之真影御製西山大師畫像堂銘并序禪家之通稱曰沙彌沙彌者息慈也謂安息於慈悲之地也故佛有三藏而修多羅為首佛有十回向而救衆生為首槩戒律也禪定也智慧也無一不慈悲乎究乘而法界之功德在此恆沙之福田在此無上哉慈悲之為教也後世之沙彌則不然雲天水瓶遊心於實相之外翠竹黃花比身於無性之物而吾儒遂以枯木死灰譏之非吾懦譏之後世沙彌自貽其譏也若西山大師休靜之為沙彌也其亦不愧于息慈之義乎始焉腰包杖錫遍參諸方樹法幢為人天眼目則雲章寶墨寵賚優異至今與貞觀永樂之序爭耀於兜率蘭若間中焉顯發宗風弘濟國難倡義旅為勤王元勳則腥羶妖氛應手廓清至今使方便度世之功永賴於閻浮提無量劫終焉隨緣現身像過攝身尋因果為上乘教主則梅熟蓮香倐到彼岸至今有望儼即溫之像受頂禮於西南香火之所如此然後方庶幾乎濟大千惠塵境曾面壁數珠磨甎作鏡之謂慈悲乎豫因西南道臣之請其影堂賜額南曰表忠西曰酬忠命官給祭需歲祠之今歲甲寅追洪武甲寅賜詩善世之故禪師之事為之序若銘俾揭諸堂豫雖未習佛諦而嘗聞法華之義解矣曰偈之義如此方之序後銘則此之銘固梵之偈也銘曰佛日初照慈雲為經浩劫單傳囑付丁寧問其誓願孰非施舍義海茫范津逮者寡福國多佑高僧應期卓錫一喝魔軍難披天晶月朗波恬浪平優曇鉢華涌現東瀛歸慶赤縣返真青蓮肅穆鍾魚禪燈孤懸名流竹簡道存貝葉寂鄉鉢寺交映眉睫報祀伊何蒲饌自官倘布靈貺長蔭栴檀麻稻竹葦匝域若匹周富庶唐耕鑿八萬四千子孫同樂豫即祚之十有八年甲寅四月初八日安于表忠酬忠之祠中崇祿大夫行禮曹判書兼知經筵事弘文館大提學藝文館大提學知成均館事臣洪良浩奉教書尚玄按大芚志云遺書遺器之傳於本院者亦多寶玩金字蓮華經一卷第四卷賾性法號袖龍案金字蓮華經一卷明是安平大君瑢手筆也豈非山門之至寶乎聞于茶山丁若鏞曰昔見安平大君所書佛經其字體正與此同內賜日本黃金屏風一賾性案此金屏曾於畫像堂銘下來時同被恩典八疊連裝畫倭軍奮劒游擊之狀即關白所獻於主上者也先師有伏敵降魔之功而今以此圖為遺像衛護之具豈不異哉丙辰二十年清嘉慶元年佛紀二八二三年五月十五日沙門義沼入寂備考仁嶽和尚行狀門人聖岸撰和尚諱義沼字子宜號仁嶽高麗壁上功臣大匡司空星山府院君李公諱能一之二十三世孫也英廟丙寅九月九日生於達州仁興村八歲入鄉學讀小學深奧其旨一聞則透百行其書三讀𠊳誦才聞及於鄰邑非直其才也人也尤奇鄉人爭資之惟恐不成至十五讀盡詩書易善屬文為時名下士噫非天才豈能如是乎十八歲與鄉客諸子就於龍淵寺肄業見僧之濟濟心忽有感依嘉善軒公落紺受具戒于碧峯和尚和尚深器之教之以金剛楞嚴等經而使之轉參西嶽秋波聾巖諸名師益明其學又以戊子春再會於和尚受信具而登堂時年二十三其系派則於臨濟三十四世於西山八世霜峯之五世孫也一日曰吾聞雪坡和尚東土華嚴宗也而未及進參是吾所憾遂執贄而往拜於靈源精舍和尚輒手而悅曰吾亦欲與師久矣何晚也仍講雜花八閲月而見終繼之以禪頌消融其渣滓既而願為禪弟和尚曰諾且曰唯師珍重當今之棟梁後世之規矩吾道其幸哉歸而行化於瑟山公山鶴山龍山佛靈等諸山而煩不能盡録師賦性渾厚動靜常見舒泰少無戚戚之容見者莫不心悅而口誦至於日用之篤實誨人之不倦雖比於古賢師可也何者夜而參禪就寢只一更而已晝則說講隨其高下諄諄告之令易入而無未達之斃甚之於俗儒之以羲易來學者多而亦無厭色也是孰使之然歟方今佛道寢微世幾無學佛者而諸路之欲鍊磨經旨不謀同聚者常百餘人倣佛然靈山故跡惜乎其時之不遭若使生於全盛之時化衆豈止今日而已哉歲庚戌自朝家新置龍珠寺命造佛像上曰擇選當世之名僧以主厥事可矣時師為其證師作佛腹藏願文主上取而覽之稱善不已曰豈意釋而有能文者乎乃以恩旨錫之此則松雲碧巖以後所未有之事貴重當復何如其後夢對天顏數矣詳見詩集豈深感聖恩無時敢望而然歟沒於聖上丙辰五月旬五日報年五十一法臘三十四嗚呼有如是之德而如是其不壽也豈天欲使吾道不振耶行路相謂曰仁嶽師逝山中已矣甚者至涕泣不能言此其大略至若寄歸之靈瑞異跡不欲盡述命造佛說大報父母恩重經木鐵石三板本領議政蔡濟恭書之藏于華山之龍珠寺備考恩重經板本尾書柔兆執徐協洽此云丙辰六月藏板于花山龍珠寺尚玄按正祖為思悼世子之第二男思悼世子又為英祖之第二男而於乙卯英祖十一年正月二十一日誕生丙辰冊封王世子壬戌入學癸亥行冠禮己巳承命代理壬午閏五月二十一日升遐春秋二十八賜諡思悼思悼世子之諡恰如漢武帝思戾太子作歸來望思之臺之故事也初葬楊州拜峯山號永祐園正祖十三年己酉十月七日移葬于水原之花山號顯隆園前韓光武三年己亥追尊為皇帝後進號隆陵自是正祖數幸水原展拜山陵一日幸行次因天雨大駕歷臨于鷺梁吾先祖之私第在鷺梁江頭念佛峯之下吾先祖仍獻其第為龍驤鳳翥亭特下教褒美之具載國史中其事如左正宗朝紀事二十二庚戌十二月傳曰為園幸設舟橋聞橋邊晝停大次以鷺梁李承默世居之家定之買而葺治且聞於筵臣此故相李陽元於我為十二世祖郊亭而卜居於鷺梁自號以鷺渚有至今傳稱之事蹟云取見遺集果然昔在宣廟朝廷議有歧異之漸惟故相獨立不偏倚時有東西黨結故云宣廟嘉之嘗夜覿前席命觴用作歌以賜之有鴉黑鷺白之句其居其號蓋云托意於此今其亭舍屬于公家而無記舊之舉是豈仰述賜歌之寵遇亦有違於先朝乙酉起想於此亭特命賜祭宣諡之聖意令主家知此意則搆一亭於其傍無廢舊觀仍以題扁許令移揭正祖特造大報父母恩重經三板本藏于隆陵之願剎者蓋寓其追慕誠孝之深意也己未二十三年清嘉慶四年佛紀二八二六年二月初三日沙門有一入寂備考蓮潭大師碑水龍居士李忠翊撰師諱有一字無二蓮潭其號也湖南和順縣千氏子年十八從法泉寺性哲師出家受戒於安貧諶師投虎巖體淨於海印寺隨侍屢年盡得其密旨遍參尊宿又從同年雪坡尚彥振錫華嚴主講席三十餘年凡十五周常隨者恆近百人正宗己未二月初三日示寂于長興寶林寺三聖菴距其生肅宗庚子為八十春秋所述經論義七部共十八卷文集法語四卷并行於世東師列傳云師為後學述四集手記各一卷起信蛇足一卷金剛蝦目一卷圓覺私記二卷玄談私記二卷華嚴遺忘記五卷諸經會要一卷拈頌著柄二卷林下録四卷并行于世紫霞山人丁若鏞題蓮潭詩卷曰草木之將華也蓄乎根怒乎萠舒其枝葉莟其蓓蕾若將大有為者及其既華也能事畢矣藝其萎矣蓮潭大師有一者我東緇林之華也太古普愚之脉六傳而至西山厥有二徒曰機鞭羊彥機曰能逍遙太能大幹雙挺千條并茂至其末也有燁然其光斐然其文者出為之漱滌塵垢鞭笞衆駑使八方諸山之所謂據狻猊之榻者咸操掌記如奉手版卒之束萬殊而大一統則蓮潭是已蓮潭非緇林之華乎經既明矣門既大矣若將昌而熾矣自兹以降學者曰衰師者曰卑寥寥乎不可復振者三十餘年既華而萎其驗乎兒菴惠藏者能之裔也體短小而志骯髒心苟不然雖佛祖之言不苟順獨於蓮潭手劄屈首聽命時或捨清凉而趨之余以此知蓮潭之所造深也大芚寺十二宗師蓮潭居其末焉非末也華也又其後十二講師蓮坡居其末焉非末也華也蓮老大蓮也坡公小蓮也又金正喜號阮堂題碑曰蓮潭之碑有碑無字有是有一無是無二純祖肅皇帝追崇李玜在位三十四年辛酉元年清嘉慶六年天主教大為滋蔓信奉之者日益增加王命各道常加禁壓周文謨者清國蘇州人潛從宣教使來檀法傳教朝廷捉而梟首軍門以警庶民西教獄起尹行恁金健淳金伯淳黃嗣永李家煥丁若鍾丁若銓等皆被誅戮辛未十一年清嘉慶十六年秋沙門惠藏入寂備考兒菴本號蓮坡塔銘紫霞山人丁若鏞撰云兒菴本金氏惠藏其法名字曰無盡塞琴縣之華山坊人幼而出家落髮於大芚寺今大興寺受月松再觀具從春溪天默學天默淹貫外典而兒菴警慧出羣學之數年名噪緇林既長廣受佛書歷事蓮潭有一雲潭鼎馹年二十七拈香於晶嵒即圓即逍遙之宗華嶽文信之嫡傳也兒菴從師受經雖低首聽說及出戶覺口中有聲曰𠳝𠳝也者哂之也唯蓮潭手札口授則不𠳝也年甫三十主盟於頭輪之會會者百有餘人兒菴於外傳酷好周易論語究索旨趣期無遺蘊若朞閏之數律呂之度及性理諸書皆精校研磨非俗儒可及性不喜詩所作絶少又不能副急有贈必追和之乃驚人尤工駢儷律格精嚴於佛書篤好首楞嚴起信論而竈經廁呪未或掛脣髠者病之有二徒曰袖龍賾性騎魚慈弘既授衣鉢兒菴乃老辛未秋得疾以九月既望示寂于此菴其壽僅四十尚玄按海東自有佛教以來賢聖輩出綿綿相繼如曹溪山松廣寺蓋以佛日普照國師為始繼而有真覺清真冲鏡真明晦堂慈真慈靜圓鑑慈覺湛堂妙明慧鑑妙嚴慈圓慧覺覺嚴復菴淨慧弘真高峯和尚懶翁慧勤幻菴混修亦皆住錫本寺此謂曹溪山十六祖師亦有十六國師故松廣寺號為僧剎大本山也又海南郡頭輪山之大興寺乃西山大師歸托衣鉢之所而有十二大宗師十二大講師其十二宗師第一楓潭第二醉如第三月渚第四華嶽第五雪巖第六喚醒第七碧霞第八雪峯第九霜月第十虎巖第十一涵月第十二蓮潭其十二講師曰萬化圓悟曰燕海廣悅曰靈谷永愚曰懶菴勝濟曰影波聖奎曰雲潭鼎馹曰退菴泰灌曰碧潭幸仁曰錦洲福慧曰玩虎尹佑曰朗嵒示演曰蓮潭惠藏皆載在大芚志壬申十二年清嘉慶十七年七月二十七日沙門聖奎入寂備考禪教兩宗正事華嚴大講主影波大師碑學南公轍撰大師法名聖奎字晦隱俗姓金氏高麗玉山君永齡之十六世孫也父曰萬紀母凝川朴氏夢大星入懷而有娠以英廟戊申十一月十一日生兒時命名泰夢以表其異大師生標奇骨卓越凡流年十五讀書於清凉庵見供佛時諸僧回旋膜拜若有妙悟宿因忽發捨身之願越四年辭家至湧泉寺自投五體切願出家喚應長老愛而許之遂令削染遽授戒律是夜夢見披緇老釋立于階前鳴磬作禮者三自是四遠參尋雲遊訪道歷參海峯燕巖龍坡影虛諸名師服膺其教勤苦得力一日忽思曰釋門闡教者以頓悟為先乃於金剛臺設伊蒲盛供滌潔道場仰祈觀音法力既罷齊夢入一室見佛書滿架粧潢鮮淨盡是華嚴經傍有老僧指曰道在是矣越九年黃山退隱長老一見而心契以華嚴全部授之摩挲粧卷果符前夢讀之既熟仍探重玄之理究最妙之旨三十年如一日嘗謂禪工持誦為最以普賢觀音兩菩薩為願佛致齊尤勤又自戊戌至辛丑誦大悲呪十萬遍日以為課自甲戌以來參雪坡涵月二和尚盡得華嚴宗旨及禪教要領仍受信衣登壇蓋空門之淵源有自來矣東師列傳云師尚州人涵月之嗣也壬申七月二十七日以微疾示寂報齡八十五僧臘六十六丙戌二十六年清道光六年佛紀二八五三年十月初六日沙門展翎入寂備考海鵬講伯傳東師列傳師名展翎字天游號海鵬順天人出家於仙巖寺受默菴最訥禪師之法印中略師禪教刃迎文章珠聯德冠叢林名聞士路湖南七高朋之一也七高朋者一盧質字秀爾號荷亭居咸陽二李學傳字季朋號復齊居南原三金玨字大和號雲川居咸陽四沈斗永字七之號永橋居谷城五李三萬字十千號強齊居蒼巖六釋展翎字天游號海鵬居仙巖七釋意恂字中孚號草衣居大芚俗稱柏谷無用海鵬僧中文章云爾世傳萬里黃金國千層白玉樓混天地歌舞盡世界風流是鵬師之詩云憲宗哲孝王李奐在位十五年己亥五年清道光十九年佛紀二八六六年命申禁天主教西洋人佛國人也范世亨羅伯多祿鄭崖角博尹等三人傳道來京至是伏法辛丑七年清道光二十一年佛紀二八六八年三月二十五日沙門朗旿入寂備考大隱禪伯傳東師列傳師名朗旿號大隱姓裴氏朗州人乾隆庚子生出家於月出山剃染於金潭禪師師蓮潭之弟子也師參於蓮潭白蓮義菴朗巖玩虎蓮坡諸龍象道已成拈香於金潭禪師開堂提接物情猶隘日月精神松柏固節手書三藏分藏函籠左右分安時三禮拜供養摩器香爐茶器燭臺信心備辦坐臥向禮其所功力人所難行舍教入禪諸方蟻附克從一宿一食之戒有名之寺未請為罪轉山之時有自願背負之人我東方之大善知識南山道宣重興於世云道光辛丑三月二十五日頭輪山挽日菴說法已了泊然坐逝世壽六十二法臘四十七禪休失主法泉如咽有受法弟子慧洪洪之下有有真其餘受禪受教者甚多月出之上見頭輪之挽日達摩之地藏德龍之天竺般若無量迦智之內院曹溪之三日七殿桐裏之彌陀雙溪之佛日七佛之僧堂師之遺風欽欽餘規濟濟師三世孫聖演曰手書經藏傳於玉果寺門孫弟子處云戊申十四年清道光草八年三月沙門敬和入寂備考華潭大師碑判府事李裕元撰東方佛法始盛於太古和尚纍傳之西山鞭羊楓潭月潭喚醒涵月玩月漢巖至于華嶽遂大以蕃升堂者衆而得其衣鉢之一曰華潭法師敬和其名示衆禪號華潭教號也師本朴氏世為密陽人母南陽之洪夢得銀環於清溪中於是有娠生師乾隆丙午四月十八日也自幼不喜葷腥十八剃髮于楊州華陽寺月華長老既又從弄月栗峯而受戒受懺其受法華嶽堂知濯大師是已師性虛靈多慷慨淨潔無俗纍飛錫雲遊盡是華嚴大會師為之主肇自乙亥名山法場為五十五凡八十三會也晝宵不離袈裟脅不至席為四十年啜松饘亦如之湖南之智異山逢瑞鳳大師學得拈頌格外之法多住關東寶蓋山石臺庵閲華嚴涅槃諸經者纍而注八陽夢有嚼月之異嘗於金剛之摩訶衍夜說大教夢見文殊普賢大擊金鍾聲振萬瀑師之傳法萬衆實兆於此嶺南之海印寺坐禪得我今解了如來性如來今在我身中我與如來無差別如來即是我真如之語忽然大悟曰此非夢中作而我則已局局睡矣麻谷兩虎導前鷲山黃狗聽經脫殼事或誕而抑經之靈師之誠歟師鍊業既久讀經之暇演偈頌六十七品行于世涉獵儒家書奉父母神牌朝夕供養此師之性也周覽諸道名勝所憩處徒衆四至後人加平之懸燈寺散徒衆精於定慧時年六十三戊申季春丙戌朔之癸丑召門弟子告示寂弟子慧昭徒請十念合掌師舉手微哂曰小乘著於念句索筆書皈寂詩遂化去法臘四十八哲宗英孝王李升在位十四年辛亥二年清咸豐元年佛紀二八七八年領議政權敦仁啓給空名帖四百張于報恩郡俗離山法住寺以為修葺之資備考報恩郡法住寺判下完文云今三月初四日大臣備局堂上引見入侍時領議政權敦仁所啓內即見禮曹所報則以為報恩俗離寺本以大剎且有奉護所重此謂純祖大王胎室守護及列聖祖御筆奉安之事而年久頽敗若不及今重修勢將空虛空名帖七八百張請即劃給以為重修之地云矣本寺既有御筆奉安胎封守護之所重胎封者凡王子誕生則將其胎盤入于磁缸或石函封藏嚴密埋于名山勝地炮彈形之峯不可一任其頽廢且名山舊剎修繕之時朝家之許給空名帖亦已多例今亦以四百張成給之意分付該曹何如大王大妃殿答曰本寺所重異於他剎而所請既如是加給數百張可也事批下本寺修葺之物力伏承筵教有此特劃之舉而為念本寺守護之重及僧徒奠接之方恩澤曠絶山門增重其在營邑奉行之道何不極力助成乎空名帖分送各道以為拮据措施之地云云下略咸豐元年三月日行禮曹判書臣尹定鉉奉教尚玄曰朝家劃給空名帖以為修寺之費者自是天下最奇之歷史也蓋空名帖者即官誥即敕旨教旨帖旨如今之辭令書者而空其名者也其官名則如折衝將軍行龍驤衛副護軍或五衛將副司果副司勇及守門將等下級武職也朝鮮賤武故賣空名帖用武銜鄉里有富民或依願或強勒徵納金錢交給空帖填其名字許戴官帽官帽俗謂宕巾亦謂嵌套強勒賣帖令戴官帽方言謂之霹靂嵌套今禮曹完文所云營邑奉行極力助成空名帖分送各道以為拮据措施者即謂自觀察使郡守招募富民賣其空帖將錢劃寺之事也其云朝家之許給空名帖亦已多例蓋此規例行之已久但未知始自何時按金剛山榆岾寺續事蹟記懶隱保郁所述乾隆五十八年癸丑正宗十七年寺僧頓澄駕前上言正宗大王賜空名帖一百張建靈山殿重修御室御室謂御筆閣前後觀察使李勉兢李秉鼎二公實有力焉云云此豈非賣帖助成之一例乎壬子三年清咸豐二年佛紀二八七九年四月沙門亘璇入寂備考白坡大師略傳門孫映湖鼎鎬撰大師戒諱亘璇湖南茂長縣人也貫完山李氏母氏生於朝鮮英祖四十三年丁亥十二歲得度于本縣禪隱寺詩憲長老幼年頴悟參學大經了安居于楚山之龍門菴開通心地焉進方丈山靈源菴受西來宗旨於雪坡彥和尚歸靈龜山龜巖寺係法統于雪峯日和尚開堂于白羊山雲門菴講衆常百十也至純祖三十年庚寅移鉢于龜巖寺重創法宇大開禪講法會八表雲衲咸從聽誨儼然為禪門中興主哲宗壬子四月示寂年八十六臘七十五也大師出家已還謹持精律尤於華嚴法門格外禪詮得到古人未發地故阮堂金正喜撰碑大書華嚴宗主白坡大律師大機大用之碑其文略曰我東近無律師一宗白坡可以當之大機大用白坡大師八十年藉手著力處或有以殺活機用支離穿鑿見怪此蜉蝣撼樹也云云銘曰貧無卓錐氣壓須彌事親如事佛家風最真實厥號亘璇兮不可說轉轉支那雪峯老人所畫達磨像來入阮堂家深為崇奉人之見者咸謂逼肖大師像其門徒聞之不勝喜踊阮堂遂屬靈龜山中作白坡大師像又題孤起頌曰遠望似達磨近看即白坡以有差別入不二門流水今日明月前身大師於法門所著述多至等身而現行於世者有定慧結社文禪門手鏡法寶壇經要解五宗綱要記禪門拈頌記金剛八解鏡禪要記等皆有開後學真大師不滅者存焉甲寅五年清咸豐四年領議政金佐根啓賜空名帖一百五十張于榆岾寺為重修山映樓也備考金剛山榆帖寺續事蹟記道光乙巳夏山映樓為霖潦崩倒越咸豐甲寅禮曹判書金輔根北陵奉審歸路見此頽甚復命入侍時因奏哲宗大王上曰令廟堂稟處可也領議政金佐根啓賜空名帖一百五十張壬戌十三年清咸豐十二年沙門敬信入寂備考故自下禪師舍利塔銘并序禪教兩宗都大禪師離峯樂玹撰設利放光爰彰禪家之靈蹟窣堵湧勢式遵禮門之正規道照人天名垂宇宙於是感至人之典範作羣生之師標者實惟禪師是已於戲偉哉禪師法諱敬信自下道號也俗姓李氏考諱孔大母羅氏即湖南郎州松旨面鼠浦人也我正宗大王二十二年戊午誕于本邸其在幼育逈殊凡倫器宇淳正心性溫和稍長也孝親悌長動合禮節喜怒不形於色腥利不纍於心夙挺超塵之象素蘊入山之心年甫十四聞洞山辭親之事雲門欺傅之跡乃往同郡達摩山美黃寺剃染受具教涉筌蹄禪嘗醍醐效波侖之東遊慕善財之南巡遍歷名山飽參知識繼心燈於性潭之室竪法幢於海松之門仿康會之勸兒念佛若不輕之見人折腰其所敬恭克符名實或趺坐於金剛五臺或觀心於頭流雙溪或掛牌於瑞石曹溪或開單於頭輪德龍晚隱迦智之松臺內院恆修禪那之柏樹上乘譬神龍之潛海似文豹之隱霧韜光葆真蓄素茹精真是至人也焉能思議哉壬戌秋八月初三日於內院禪室示微疾而奄然歸寂異香盈室天樂鳴空應東身者六十五年服西戒者五十一臘及其闍維也洞林慘憺禽獸悲噪上佐普印收靈珠即舍利一枚於檀灰之中五色璀璨光射人目越三朔乃成層塔安于松臺之南麓乃為之銘曰師道貞固可較金剛師戒晶潔可譬氷霜師心靈徹舍利噴光無縫塔下神衛葆藏景行美德載綴銘章風清六合山高水長咸豐壬戌十一月日李太王殿下太皇帝李熙在位四十四年甲子元年清同治三年佛紀二八九一年命押送東學罪人崔福述先是福述在慶州聚徒黨曰東學惑世誣民故朝延命本道查究押送青柳南冥所著李朝五百年史三月十日在本道處刑時慶尚道觀察使乃徐憲淳也乙丑二年清同治四年佛紀二八九二年三月始建慶福宮權許僧徒入城凡三年為役使也丙寅三年清同治五年佛紀二八九三年申禁天主教其信徒洪鍾三南尚教李身逵等三萬餘人皆誅死李朝五百年史八月二日沙門意恂示寂備考草衣大宗師塔碑銘并序草衣恂公既示寂其徒善機梵雲等妥其像于室而求贊於余即樂應之又治珉而求銘于余始以不習內典辭十易霜而求益堅乃以所見聞於恂公者為之言曰宗風之不振於世久矣近時諸方叢林中幾無聞者厥咎安在由禪講之論歧而頓漸之辨混投機少而然也恂公奮于南服博究孤詣用能溯一真之源集衆論之粹而南方學者翕然從之豈不偉哉按師法名意恂字中孚務安張氏子方其身也母夢大星投懷以丙午四月五日來丙寅八月二日逝輒與佛瑞沸星出時僅差數日其亦異矣五歲時出遊江渚誤墮於悍流中若有挾而出者弱冠過月出山愛其奇秀不覺縱步獨躋其巔望見滿月出海恍若杲老之遇薰風去却礙膺之物自是以往所遇無所忤者殆其有宿氣而然歟緇其衣於碧峯聖公受信具於玩虎禹公草衣其拈花之號也演教之餘兼習梵字而通呿盧之旨又善神象而入道子之室從茶山承旨丁若鏞嘗謫居康津受儒書觀詩道而後精通教理恢拓禪境始有雲遊之奧入楓嶽登毗盧盡閲嶺東西山海之勝歸而歷京都諸山海居都尉洪爽周與紫霞申緯秋史金正喜兩侍郎命駕從遊與共唱酬皆以東林遠公西嶽貫休目之聲名噪於一時師乃斂跡韜光就頭崙山頂藤蘿陰中結一小菴扁曰一枝獨處止觀四十年餘或有問者曰子其專於禪者乎師曰機苟不利則專於禪與專於教無以異也吾何苦為此哉其意蓋以專教者未必無失而專禪者亦未為得也白坡璇公隱白羊山年八十餘自云從十六歲投禪未嘗一念退轉每演臨濟玄要句分貼機用以為悟徹師因辨坡誤處以寄示余余又辨師誤處師笑受之云不妨俱誤誤處即是悟處也師軀幹豐碩梵相奇古類古尊者象既耋艾而輕健如少年當奉恩寺有大教刊布之役邀師為證師達摩山建無量之會奉師主禪席皆暫膺即還示化於一枝菴中現世之年八十有一法臘為若干歲嚮余治舟師於湖南也師過焉或謂非余莫能致倘其然乎繼聞唁秋史於瀛洲風濤甚險而弗懾心甚偉之後余承恩譴居鹿苑海中師又再至焉余淤銘師也不宜辭銘曰初祖西來建第一義廓然無聖是亦文字弗即弗離始名不二槩云掃除殆非祖意惟師眼中有八萬藏是一字字皆放圓光千七百則四十二章約而觀之無短無長處世非染出世非淨惟有情人能見其性鯨濤眩轉履之如鏡何以無畏一於動靜頭崙之頂借棲一枝太白老胡復借之衣文佛慧命僅如懸絲宗風再振廣被諸機禪無可入講無可捨從容而至何事呵罵一喝而聾頑禪打坐是草衣人普濟尊者輔國崇祿大夫行判中樞府事兼兵曹判書判三軍府義禁府事申櫶撰壬申九年清同治十一年九月二十二日沙門永奇入寂備考南湖律師開刊華嚴碑銘并序輔國兼吏曹判書李宜翼撰大師法名永奇湖之南古阜人也俗姓鄭氏系出晉州愚伏即其鼻祖也考諱彥圭母潘氏早失怙恃年十四投僧伽寺大演老宿祝髮壬子入寶蓋山地藏菴遵省常故事寫彌陀經每字三稱佛三繞三拜盡是悲願中流出亦乃報答四恩之功矣絶筆夜夢感得彩幡自西方回癸丑夏入三角山刊其板繼刊十六觀經蓮宗寶鑑藏之水落山興國寺乙卯春至廣州奉恩寺與諸同志鳩緣刻疏鈔華嚴經八十卷別行一卷準提千手合璧一卷天台三隱詩集新建經藏之殿額金侍郎秋史筆也庚申憩足于石臺在鐵原寶蓋山喜峯巒之秀靈聖之跡為久住計重建菴藏地藏經觀心論六時精勤無替壬戌到沁都開無遮會十日夜利益水陸乙丑印海印大藏二帙藏之名山雪嶽之五歲五臺之寂滅自東萊航海達之祥飆徐動靈龜後先奉安訖二百日精勤詵詵紀夢二十五則皆精力中出來壬申改修深源三殿葛來寶塔經紀其事疾作歎曰幻體多病住世無益仍絶粒九月二十二日示寂且告門人曰欲投林獸無以應太息曰國風言訖逝壽五十三僧臘三十九噫師有心人也尊戒律持衰世其亦勤矣門人奭淨斗欽宥溪諸上人恐湮滅其跡無以起後進樹碑華嚴經殿傍銘曰事佛如親淨業穹崇誰回狂瀾毗尼之宗吁嗟護法人中之龍丙子十三年清光緒二年佛紀二九三年十月二日沙門翰醒入寂備考仙巖寺枕溟大師行狀云大師法諱翰醒軒號枕溟俗姓金氏貫慶州父通政大夫諱以爀母孟氏辛酉四月初九日生于興陽郡南陽面長潭村十五歲出家于本郡之八影山楞伽寺祝髮于叔父勸敏長老受具于春坡大師見東師列傳受經于雲興寺大雲禪師受禪于龜巖寺之白坡大師二十六歲建幢于影峯大師二十八歲開講于松廣寺之普照菴越明年移錫于仙巖寺之大乘菴自是主講凡三十餘年四方來學者如市傳授事畢靜處宴默深究禪旨焉師示疾門徒炷香誦經師搖手止之曰真誦無響真聽無聞遂以丙子十月初二日示寂世壽七十六法臘六十二師於未講之前祈禱于八影山西佛菴致誠百日見茶器水聳為雙條氷長半尺識者以為禪教兩派中興之像焉師持戒精嚴不與女人同室而坐衣不搗練食不美饌又不用盤鍮之進必展鉢於兩時或子夜起坐良久撲掌而歎曰古來佛佛祖祖必從此路而得入也而名相俱絶真所謂模索不得如空裏栽花水中撈月又每夜子時必鳴鐸大號彌陀連聲十念雖醉睡俗子皆驚起同聲念佛師曾自題真影云曲肱為枕臥南溟翰墨場中夢未醒名號終知非實事出門木像豈真形此師一生行李之大槩也師於法脈為浮休禪師之十一世孫而其傳法弟子則曰華山晤善曰普運應俊曰雪渚妙善曰影嵓尚欣曰萬嵓大淳傳講弟子則曰函溟太先傳禪弟子則曰雪竇奉聞後改有炯曰優曇洪基曰鏡潭瑞寬曰龍湖海珠曰應和等皆法門之龍象也己卯十六年清光緒五年命重建歸州寺給內帑錢三千五百緡及空名帖五百張備考歸州寺重建紀蹟碑咸興府尹金炳地撰昔我太祖康獻大王龍潛時讀書于咸山之東十五里歸州洞雪峯山下伊時緇徒亦闢羅而處焉噫兹山實基王跡國初建寺護衛聖址祇奉肅廟正廟兩聖御製宸翰尊以閣之佛家倚重即與釋王寺相甲乙者也洎戊寅臘月遽遭回祿一剎蕩燼讀書堂御筆閣幸賴獨存誠是王靈攸暨道啓業已上徹內司亦為懇至越明年春余承按使之命及其陛辭聖旨申申以重搆溫綸蒞茲未幾內帑錢三千五百緡空名帖五百張一時頒下自此董功至於十五箇月而告成新搆佛龕禪院為三百餘間云云庚辰十七年清光緒六年五月七日沙門善影入寂備考朝鮮曹溪宗師華嚴講伯映虛堂大禪師塔碑銘憲宗己酉春我先大夫文貞公以大宗伯承命奉審北陵憩安邊之釋王寺遇櫟山師見形貌古朴言論曠達且喜其為同庚托契甚厚時小子守灣府先大夫以年貢使留灣師專指馳函先大夫手書以答小子侍左右知師之賢後十四年余伯關北踰嶺公事促不得歷雪山甲子猥承非常之命馹召嚴急再過山門無暇尋真又十年退居鄉山遊奉先寺庸庵釋典愚以其師櫟山塔銘屬余余曰櫟山吾先大夫之空門交也安得無一言之贈乎師法名善影字無畏號映虛櫟山其初號也俗姓安東林氏父曰得元母曰漢陽趙氏有夢佛之異生師於王城之雲觀峴正廟壬子三月二十三日也年十二從龍雲勝行禪者祝髮于楊州鶴林庵受戒法于聖巖德函大師參禪于華嶽知濯大師二十一建幢于仁峯德俊之門溯其淵源乃清虛派而喚惺為五世祖此師之來歷也師早年由南土晚入釋王寺內院其學宗八萬諸經立於正法眼藏得單傳之統諸路沙門尊為曹溪宗師華嚴講伯庚辰五月二日示疾七日寅時北首正臥左手右手舉怡然寂化世壽八十九法臘七十八焉余於塔碑素靳為銘而映虛世交也粵在咸州不以名相間於此可知其為人而合於銘也偈曰一枝宗法海之東雲在青天水在中石虎抱兒眠正熟松風瑟瑟萬緣空聖上十年秋大匡輔國崇祿大夫領中樞府事原任奎章閣直提學月城李裕元撰通政大夫安邊郡都護府使全義李熙準謹書辛巳十八年清光緒七年佛紀二九八年九月八日沙門洪基入寂備考優曇大禪師行狀猊雲散人崔東植撰和尚初法名禹幸後改稱洪基優曇軒號也俗姓權氏安東人也世以簪纓早喪怙恃然天姿頴悟氣宇清秀好讀書年至弱冠遍遊名山忽有厭塵之想遂祝髮于小白山西遊曹溪山松廣寺為浮休門下碧禪和尚之玄法孫敬叩華嚴拈頌於先正之門不數三年慧解超凡又能沉潛默究洞透玄旨因竪幢開堂學來如市和尚平居對人接物常若言不出口至於公私財穀之消息盈朒漫不略省至於拈弄宗教演揚禪旨言詞波瀾滔滔亹亹水湧風激居常云為若氣不勝衣而恆以鼻嚏一言三吐三拭若不支終日至於整田衣據獅座氣湧如山儼若古先生一無嚏唾牢坐竟日未暫假作師精於華嚴尤邃於禪學晚年著禪門證正録以明佛祖傳心之奧旨其家風清白室中只有黃卷數帙軍持一袋而已衣不重衣食不珍味秪是蔬糲粗衫不知其他真是出格道人也至辛巳秋奄入涅槃世壽六十法臘四十五也備考曹溪山松廣寺優曇和尚行狀松廣寺來狀師諱洪基號優曇俗姓權氏嶺南安東郡人也父重國母趙氏以道光壬午三月三日生師師生而頴達夙成幼而敏悟好學誓心出家父母不許竊念踰城之緣遂往喜方寺依自信長老剃髮閲初發心自警之文與心友作伴抵八公山參渾虛大師學習數部經以不繫為志轉次南行跡高必尋人真必詣到曹溪山松廣寺因智峰和尚為世緣之主依蓮月禪師結法印之父受教於枕溟講伯受具於仁坡律師二十七歲拈香於真覺祖師之禪社傳鉢於碧潭大師之法會教眼澄於雪仁蓮默禪椎敲於真龍白草師於光緒七年辛巳九月八日入寂世壽六十僧臘四十五師所著禪門證正録一卷行于世師於世泒則為浮休之十一世孫浮休七傳有楓巖巖有四大弟子曰霽雲澄默庵訥應庵允碧潭仁潭傳于會溪輝宗溪傳于蓮月月傳于師癸未二十年清光緒九年佛紀二九一年十一月二十四日沙門敬淳入寂備考影山禪伯傳東師列傳師名敬淳號影山幼而出家染衣受具禪雲寺重現之善知識也雪坡靈谷白坡影山相繼重現也住於通度有自願近事者住於觀音有自續禪燈者住於松廣為貧窶者化主住於海印為觀玩者贊引至於梵海菴前三呼真佛入金秋史庭答道場來解衣與人身不寒推食施兒腹不飢宿不再宿桑下一宿之戒食不非時日中一食之齊天下太平春四方無一事非我而誰山霞朝作飯蘿月夜為燈指我而言觀音古寺端坐示寂夜光如火地動如雷光緒癸未十一月二十四日也仙巖寺有僧名景星者不識字者也一夕夢影山和尚傳授真贊曰影是影山影山是影山山山影俱融處都盧是影山仙巖寺之擎雲大禪師為余誦之丁亥二十四年清光緒十三年八月三十日沙門海珠入寂備考龍湖講伯傳東師列傳師名海珠號龍湖四佛山大乘寺之大講師也在家受趨庭之訓出家絶洗足之歎入山行道逢因結緣效祝氏之除草慕雪山之求法發德山之鋭憤作無著之參訪洛東洛西優遊質疑湖西湖南逍遙解結應召而往奉賚而歸請狀而赴選佛而寂時順事跡禪教故紙權現叢林空竪頑石受戒傳戒受法傳法一場春夢三生精魂求之歟與之歟碑以之纍塔以之玷口之傳之千世萬世尚玄曰世傳初洛下取仁和尚發願于阿度之真而得龍湖闡揚宗風云云戊子二十五年清光緒十四年十月十三日沙門德真入寂備考虛舟禪師傳東師列傳師名德真號虛舟夙植善根幼願出家投入曹溪獨守苦節學成道達受印行職退衆樂獨避人而人來匿跡而跡露或住松廣或住仙巖住於桐裏住於七佛住於佛日住楞伽住白雲住頭輪住達摩道甲之見性迦智之內院白羊之物外華嚴之九層燕谷之文殊龍興之普賢內藏之圓寂禪雲之兜率西方之上雲雲門金塘華嚴安心文殊再遊京山應雲峴之召大院君之宮號曰雲峴也於鐵原寶蓋山草菴及地藏菴作祈祝佛事乙亥於高山雲門寺又作祈祝佛事到處四衆雲集一食五觀泉湧不著之衣自生不食之供并臻受戒者受懺者受法者受業者不論比丘比丘尼優婆塞優婆夷沙彌沙彌尼式蹉摩那信男信女即從座起合掌啓請如在靈山拈華示衆泣笑者皆得寶歸信受奉行光緒戊子十月十三日示寂禪風寥寥己丑二十六年清光緒十五年八月二十九日沙門有炯入寂備考靈龜山雪竇大師行狀甲寅四月日三世法孫映湖鼎鎬謹志太古圓證國師入支那得法於臨濟嫡孫石屋清珙禪師而還是謂我東禪門初祖六傳而出清虛浮休兩大師為禪門中祖自清虛四傳而至喚醒大師以重來古聖示作沙門之傑再傳而得雪坡大師大師乃校刊華嚴細科義鈔厥業殊大故至稱華嚴菩薩之徽號三傳而為白坡大師大師之炯眼凡貫徹三學而最得意於禪學高竪一幟於近代叢林于斯而曷少有徒究論獨得宗旨者雪竇大師其人也詳分法系則於白坡大師實為四世法孫然親承指誨竟受講座故至於諸方多稱雪坡而白坡而雪竇而云爾似乎直傳三世而無間亦無足怪焉大師法諱有炯初諱奉聞雪竇其法號也俗姓完山李氏也考諱東馥妣朴氏朝鮮純祖二十四年甲申二月草四日大師生于湖南道玉果縣玉田里髫年夙悟略涉儒典至十九歲爰興出世之志投長城府白巖山白羊寺得度於正觀快逸大師越明年受具懺于曹溪山枕溟翰醒大師遍參諸山講老學內教畢業于靈龜山法會白坡為座主繼燈于白巖道圓大師仍登講壇教授諸衆十有餘年兼修西來祖意深達妙諦焉至太王七年庚午春因衆請移錫于母嶽山佛岬寺搆一草堂而養晦焉居之數年荒寺重開至今稱道及夫二十六年己丑春難違門老幻翁喚真大師敦請大開禪門講會於楊州牧天磨山奉印蘭若至七月而終會仲秋因疾還山傳鈯斧於門徒雪乳處明大師八月二十九日示寂于少林窟龜巖寺之搆內世壽六十六春法臘四十六夏其嗣曰詠月縞政曰步月萬益曰茶輪翼振曰玩性慧鑑曰龍隱皓恪曰犀月敬瑀曰清霞寵歡曰雪乳處明俱能繼家風而善述云爾附幻翁大師法名喚真白坡之法孫也發跡湖南淳昌靈龜山龜巖寺住錫京東楊州天磨山奉印寺離欲清淨言行無礙前韓光武八年甲辰在清涼寺端坐入寂附鏡潭大師法名瑞寬亦白坡之裔也與龜巖之雪竇仙巖之函溟年甲相同道學相等而其門徒又相埒世謂近代佛門三傑辛卯二十八年清光緒十七年佛紀二九一八年七月二十九日沙門達善入寂備考金剛山榆岾寺重創大化主愚隱大師行蹟金藕堂撰大師戒名達善法號愚隱俗姓金氏貫全州考諱德順妣密陽朴氏感異夢而有娠以嘉慶辛卯正月二十三日生師于江原道高城縣沙峴里天資英邁超然有非凡之氣象焉年未及齔父卒母寡師雖嬰孩深悼其命道之險崎嘗以出家之志告諸母母牢拒不諾使之就孰入學師莫敢違命遂荷笈從師然一片靈犀尋常往來於曇樹清風秪園流水之間矣年至十三又以出家之志泣而告于母母知師志不可奪遂許之師直往金剛山榆岾寺祝髮於緣菴長老稟戒於月峯和尚受禪於蓮月和尚嗣法於大雲座主師乃喚惺祖師之八世嫡孫也年才十九重望日隆全寺公務上凡肯綮盤錯者若不由師之游刃竊不得整其秩而奏其宜且師雖好學而能彈秕務實不可與嚙腐䑛爛之類同年而論也年至三十蒞當寺僧統之職三十五歲進為主管三十七歲被任妙香山普賢寺酬忠祠守護總攝五十歲再任本寺之主管前後數十年間管掌寺事糾正僧風惟以秉直公廉為本分且百務總攬專任隻手猶不廢化務彌精白業焉及至光緒壬午八月十六日夜失火本寺全部三千三百餘間忽被燒失烟雲慘淡鳥獸嗚咽現住梵侶皆罔知攸往矣於是師痛哭一場止哭而笑謂曰常傳本寺之火災必由五十三佛神變之所起云佛之神變何靈於不祥而不靈於祥乎若人不負願佛必有驗矣師矢心鳩財命匠始役閲三年而功告竣法殿之莊嚴衆寮之宏傑公産之富裕啞鍾之復鳴怯衆之安奠賜牌地之失而還推諸般苛役痼斃之革罷莫不由師之大願力之所成立者也所以遠近咸曰愚隱大師真五十三佛之命使也無疑云嗚呼有相示滅化門佛祖猶未免焉師亦踵此道因示微疾召諸門人囑之以護法報佛恩之事至光緒辛卯七月二十九日卯時遂坐化焉世壽六十一僧臘四十九甲午三十一年清光緒二十年沙門坦鍾入寂備考華嚴宗主大應堂大禪師之碑銘并序達磨東來佛法東來之誤其藏書八萬而華嚴一經為佛法所宗得其宗者曰大應禪師師法名坦鍾釋迦之七十六世法孫也其先漢陽人姓趙先世有顯官考鳳珏妣金氏俱賢以純廟庚寅五月十日生幼而慧習儒教九歲失怙恃孑然無依三霜畢入金剛之長安寺祝髮于雪月堂勝寬禪師受戒於松坡堂日敏禪師受禪於臥雪堂一禪禪師嗣教於明虛堂侖璇禪師皆沙門上乘也早入禪呪誦不輟供香之暇輒入南北講肆橫經請益辛亥登壇開講于普雲菴常住持諸伽藍或卓錫於五臺雪嶽京山之大小蘭若講道說法四方緇流從之如雲高足入室指不勝摟以其妙諦華嚴故稱華嚴宗主常自禱曰願我得遍法界六根傳法門度衆生稱無量福德光明藏菩薩白華道場夜夢三佛頂禮授以天水圓通禪會誦無量壽如來根本呪夢受金剛珠華藏古窟讀準提呪夢羣龍噴水洗浴全身又見車輪常轉自是心神益清得法輪轉化之妙余嘗以御史入楓嶽遇師為空門友二十年餘聞修禪益高不出山門者久矣奉元諸僧將修盂蘭會諗余曰須得大宗主主此會而非公一書無以致乃貽書勸之數月果幡然而至至則如真佛現世靈唄寶偈互發於白毫放光之中而令衆耳皆醒善男女受戒律奉懺悔者以千數當朝名碩多傾倒與語樂聞真詮小溪金公三隱李公拈香禪悅如東坡之於參寥也師既去徒弟景炘踵門而請曰吾師苦行惟公與二公可以發輝願得此三公文翰以為鐫石之具曰諾遂為之銘曰覿其容淡而靜聆其言諦而正三夢悟真萬灰入定無盡寶藏一片心鏡資憲大夫前行刑曹判書兼知經筵春秋館事同知成均館事靈川申獻求撰資憲大夫前行知敦寧府事兼知經筵春秋館事知義禁府事光山金九鉉書崇祿大夫前行吏曹判書兼判義禁府事知經筵春秋館事同知成均館事弘文館提學世子左賓客原任奎章閣直閣韓山李承五篆癸巳七月日立尚玄曰大應和尚之碑亦如金剛山懶雲大禪師之碑不可考其入寂年時今按立碑先於入寂之前一年蓋生營也且碑銘序云師既去徒弟景炘踵門請文此云自奉元寺皈去也非指化去也南北漢緇營年久解弛惟存其名都總攝之僧職尚依舊差出至是廢止兩漢總攝印章俱送于廣州奉恩寺收管乙未三十二年夏四月佛紀二九二二年命弛僧尼入城之禁先是日本日蓮宗僧佐野前勵來本國上書于內閣總理大臣金宏集請解其禁金宏集筵奏而有是命戊戌光武二年六月二十二日佛紀二九二五年沙門例珂入寂備考荷隱大師碑銘并序愚按荷師咸鏡道咸興人也父姓則朱氏而夢有一神僧來獻斗牛星感而脤之誕生此師其為孩提十分異常矣紀有一歲直入於阿斯達山九月山也剃髮于月渚之門聖月榻下參禪入道而四十餘年涅槃之誠見性之道流千載荷師一人而已中路天降此師亦以闡明斯道為己任故擇其清淨之地立此山寺而四十餘年長坐禪榻慧月寶光湛然圓明而一朵妙華隨緣挺出誰將斯道不泯於後世哉中路嗚呼秋天寒聲雲駕飛空之際瑞氣祥光三日不絶則形雖沒而道不沒也中路惟此涵溟追思荷師不泯之道與不世之蹟以銘於一片碣石焉銘曰天生荷師稟賦有則儲精孕仙及河維嶽始於無始終於無終此師之生山河有淨此師之皈山河無光不知何年復此胚胎秋天寒聲西駕蕭灑山哀浦咽雲慘風悲臨碑贈銘萬古長辭又東師列傳荷隱禪師傳云師名例珂號荷隱九月山貝葉寺大講師也聲滿海西溢流四山學人不知荷隱非學人隱士不參荷隱非隱士也開門弄如來禪者二十許春秋掩關究祖師禪者二十餘結解四衆圍繞五分演唱八彩掩身六銖穿肩傳印了閉門了道光戊子生光緒丁酉寂猿鶴失其盟主溪林咽其法王不朽者文高顯者塔師之語録藏在門人騎龍講師處己亥光武三年四月印成海印寺大藏經四部分藏各寺備考印經事實光武二年戊戌五月日敕令奉承宮內府大臣李載純侍從院奉侍姜錫鎬尚宮崔氏七月日劃下錢六萬二千五百金于化主僧梵雲二十五日到寺抱應自宮內府差下監董僧應海錢監僧玩虛米監僧海耕印監僧鳳城己亥三月日自宮內府奉敕差下印經都監董前營將俞鳳濬亦有訓令于本道觀察使曹始永三月初七日始役印經特賜自主通符武監金永澤同月二十一日到寺幹護特下十三道都總攝僧景明角牌二綬及封山禁松牌二雙四月二十日印成四部經二十一日尚宮崔氏到寺賜送佛輦一座具各色威儀各法堂佛殿佛坐服四十件寢帳十件卓衣十一件經衣錦各色一匱結絲一匱奉命前參奉金顯國同日到寺當日設齊七日轉讀一部經五月初二日回向畢齊觀察使病不進替送主事金永動及地方官朴起默來參所印經一部奉安法宗本寺一部奉安佛宗通度寺一部奉安僧宗松廣寺一部分布十三道各寺印經跋文如是我聞釋迦如來見星悟真理具六通道現三乘禪宗大法俱載於大藏經文儘一大光寶藏須彌極天業鏡無塵一心慈悲衆生普濟願雲廣大福海澄深惟兹海印寺創自羅代海左靈源嶠右名藍經有板而藏是寺千有餘載夙著靈異之跡實參機緘之化肆我列聖祖祈福植德必以印是經為符讖因果之證而經之顯晦亦有關於一時之氣數歟今又奉承敕教印成四部琅函緗帙藏諸名山福地使之弘揚竺教陰隲邦籙顧不休矣哉余於兹寺藏經文字之役竊有所辭不獲者以先祖之有記述故也經既竣印山谷林樾瑞氣騰空夜色移晝人謂之佛靈放光如是者五是果天地報應非偶然而然供齊之日十千乾闥婆五百阿羅漢轉經引唄北望稽首咸祝聖人萬年無疆百祿維新壽期于翼國安于碧南省士女與之舞蹈欣抃於蓮花道場之中可以見時代升平之象矣光武三年己亥四月日慶尚南道觀察使曹始永謹跋壬寅光武六年正月二十六日沙門太先入寂備考華嚴宗主函溟堂大禪師碑銘并序前承旨恆陽呂圭亨撰中華人諸葛璟子明書我佛弘典大教流布世界特盛于我東二千年間與竺乾脂那祠響方軌磊落相望宗風代振距今九十一年之前有若函溟大禪師降于湖南以華嚴宗主持講席五十六臘而示化其四世嗣法錦峯基林奉舊藏行録謁余銘余夙因師友嘗親聆法音者稔禪師名德如雷霆如河漢不可以辭謹按禪師諱太先函溟號也俗姓朴氏籍密陽父諱陽九母吳氏夢巨浸滉漾一寶函浮來覺而有娠以純祖甲申九月日生于和順之寂泉里既長頴慧秀朗眼如曙星聲若洪鍾略通經史年十四住依萬淵之豐谷麟禪師明年祝髮受戒于白羊之道菴定和尚後參枕溟醒和尚時醒和尚開堂仙巖一見禪師知為大乘法器諄諄啓迪五六年間博涉三藏蒸蒸日上醒和尚亟加嘆獎授大戒焉乃以己酉春建幢于瑞石紹豐谷法燈實臨濟嫡傳也受仙巖之請開堂于南北兩菴諸方來學躡履擔笈者道相屬也丙寅秋傳講緒于景鵬益運運傳于擎雲元奇并為禪門之鸞鳳克紹靈胄而錦峯其高足也禪師付法後三十餘年經卷戒律老而益精苦不衰見者咸謂真佛出世壬寅正月二十六日示微疾澡浴端坐而逝世壽七十九緇白遠近奔赴悲咷奉全身茶毗祥光燭天異香不滅余昔聞禪師示衆曰佛教三千年只行小乘以佛旨參乎世運則大乘宗旨應昌于後五百世不如是佛願無功不能使大地凡衆圓成正覺嗚呼豈易量哉姜慈屺文瑋訪禪師于南庵問盡大地毗盧遮那全身體向何處放屎禪師竪拂子觸慈屺帽曰好圊廁慈屺呵呵笑以偈贊之李學士建昌題其真曰氣宇堂堂貌如其心棒頭有眼舊無畏音取彼溟渤納之一函擬議便差潭北湘南庶可以形容氣像也惟我禪師禪教並隆福慧兩足巍巍乎莫可尚已而尤卓絶者旁通儒學性理及古今治亂得失嘗曰儒之知仁勇即佛之悲智願也佛有三寶而曾傳之三綱領近之佛有五戒而鄒經之四端與誠實之信近之淺見末學互相操戈是未知聖人真面故耳斯蓋前人所未發余儒而好佛者逾服膺讚頌而不能已銘曰尋思證修石頭遷博古融會丹霞然拳頭熱棒鎮州玄吾師挺生海東天打迸十方祖師禪片石嵯峨千萬年大正三年四月日朝家置管理署管理寺剎及僧徒又創元興寺于京城之興仁之門東大門外號大法山國內首寺剎置左右教正各一人大禪議及上講議各一人理務五人都攝理一人以奉恩奉先龍珠麻谷法住松廣金山海印通度桐華月精榆岾釋王皈州普賢神光等十六寺為中法山道內首寺剎置道教正副教正禪議講議各一人道內各寺剎置住職各一人越二年甲辰管理署及大法山並廢止甲辰光武八年八月佛紀二九三一年三角山重興寺灾丙午光武十年佛紀二九三三年春出內帑金六千圓命修補海印寺大藏經板釘裝并印佛經一千四百卷奉安金剛山正陽寺補充闕書始于春訖于夏化主僧龍城監董僧大蓮海印寺僧景明製跋文嘉善大夫前漢城判尹朴昌善署其名先是海印寺僧龍城夤緣建白于淳嬪嚴氏行此佛事輾轉入稟大內故有是命淳嬪聞楓嶽僧錦虛姜大蓮之前名重創長安寺海光殿頗有幹能命派尚宮林氏帶同錦虛前往海印寺主幹其役役告訖有餘財買田數結附局司壇歲收百斗米又其餘分施各僧寮云李王殿下前皇帝李坧在位四年庚戌隆熙四年佛紀二九三七年三月百潭寺僧韓龍雲獻議于中樞院九月又建白于統監府願令僧尼嫁娶自由并不報備考中樞院獻議書伏以人界之事莫善於變莫不善於不變一定而不知變人物之存在於天地間者不復睹於今日天地善變萬物生焉生生不盡生生不盡而善變焉則其進化之妙日繁一日雖欲窮盡其數上等之算百年之壽已不勝其任變與不變之比例如是故天下之人貴變焉有變千載之案者有變一世之議者有日月變者其變期之修短雖殊驟入於進化之域則一也故變者進化之不二法門不變何為今日之可變者何限但以與己有密接關係者而陳言之幸須察焉竊惟僧尼之自禁嫁娶生産實數千年不易之案何其蔽歟是有關於國計者不少則不宜一任自裁無所過問也現今世界問題之大者不一而足首屈一指則不可不以殖民當之惟我全國僧侶之現數槩為五六千後日之增加亦未可知一任前制而不之返有損於殖民界者有不可勝言者此智力水平線以上之所日夕懼然者矣安在其不圖改良也且佛教弘圓無事可禁但以淺根衆生故假設方便後人不知誤作金言沈面濡首不能更進一步嗚呼自此以往佛教之影響於衆生界者亦已遠矣數千年之僧侶不敢置一言於其間者則又可悲也若使佛教絶跡於天下而無憾焉則已苟若不然僧侶當任作嫁娶生産擴張其範圍樹旗於宗教竸爭之陳壘不亦保教之大計乎嫁娶之禁一變公而殖民私而保教無適而不宜何憚而不變哉此等禁戒初非法律所係則自禁自解靡所不可但千年積習一朝難改異議百出互相疑懼有志未達抑有所日暮道遠少不宜緩故敢陳愚言幸加三思若使此言無補於進化之今日固不容論少有可採幸提出閣議布令天下僧尼嫁娶與否任作自由無礙進化公私幸甚隆熙四年三月日中樞院議長金允植閣下統監府建白書伏以僧侶嫁娶之禁以佛戒其來久矣而不適於百度維新之今日則勿論若使僧侶一禁嫁娶而不知解其於政治的殖民道德的生理宗教的布教有百害而無一利此則盡人能言不必條晢不寧惟是參以佛教言之其深淵之真理廣大之範圍實非嫁娶與否之所能損益但佛欲衆生之轉迷為悟改惡作善而衆生根器若面無從一道而導之則勢不得不集天下送情節欲之事而演說之以冀其各從所好而利導也然則佛戒之禁婚固方便之一道佛教之究竟則邈哉解亦何傷且男女之欲智愚共有若終身禁婚因禁而生弊弊復滋矣良以朝鮮之僧侶非不知解禁之為愈但一朝之言不能闢千年之習滿心疑懼薄歲蹰躇以冀朝令之解禁故今三月舉實請願于前韓國中樞院矣尚無如何措處僧侶之疑懼轉深入俗日多傳道日縮孰若速解禁婚而保教也使多數之僧侶轉作嫁娶生産其影響於政治道德宗教界者顧不多多乎用是之故兹敢冒陳洞亮後僧侶嫁娶解禁事特以府令頒布一闕千年之習俾成不世之蹟政莫新焉此事雖小實大幸速圖焉無任祈懇之至明治四十三年九月日統監子爵寺內正毅殿諸山僧侶共謀協力創覺皇寺于京城之北部磚洞今壽松洞是為入城布教之始先是京山僧洪月初李寶潭等創立佛教研究會于城東元興寺以淨土為宗刻於銀章分給僧員而收實費丙午歲也自是諸方僧侶有志振興佛教者當時有志之僧侶今皆為大本山住持故不具録稍稍來集京輦之下共立宗旨稱號圓宗置宗務院推李晦光為宗正戊申歲也李晦光以圓宗宗務院宗正之資格赴日本東京與曹洞宗管長弘津說三締結聯合盟約共七個條陳震應朴漢永金鍾來韓龍雲等以為朝鮮僧侶本屬臨濟宗派若與曹洞聯合則是改宗易祖於是發起立臨濟宗庚戌歲也共設臨濟宗臨時宗務院于順天松廣寺置管長一人時仙巖寺之金擎雲當選為臨時管長以老故不出來而以韓龍雲為臨時管長代理行之年餘辛亥歲也蓋此會也惟全羅南道及智異一方應之而已後乃移設臨濟宗臨時宗務院于東萊梵魚寺未半年而罷壬子歲也詳見下編梵魚一方臨濟宗旨朝鮮總督府時代現代辛亥明治四十四年佛紀二九三八年六月三日頒布寺剎令七條制令第七號七月八日頒布寺剎令施行規則八條定三十本寺各置住持朝鮮總督府令第八十四號翌年為始三十本寺住持各定本末寺法申請于朝鮮總督次第承認而施行之從由來之舊慣皆稱禪教兩宗於是朝鮮寺剎宗旨定于一而區域分為三十矣癸丑大正二年佛紀二九四年八月二十一日南印度錫蘭島高僧達磨婆羅來到京城自言為朝鮮佛教全體特獻佛舍利一粒用祝將來之興隆云云于時海印寺住持李晦光捧受後遞傳于三十本山會議所院長榆岾寺住持金錦潭京畿三本山住持作證明以其為朝鮮佛教全體代表者故也時諸檀越施銀盒鐵匱奉安舍利于覺皇寺佛座之側留鎮海東福利人民甲寅大正三年佛紀二九四一年一月十三日禪教兩宗三十本山住持開第三回總會于會議所舊元興寺决議設立高等佛教講孰于京城舊元興寺朴漢永為孰師三十本寺起送留學生一人或二人來京聽講未滿一年以事散歸是年朝鮮僧侶留學日本者計十三人乾鳳寺之李智光龍珠寺之金晶海長安寺之李混惺雙溪寺之鄭晄震等皆入東京之曹洞宗大學海印寺之曹學乳入于真言宗之豐山大學玉泉寺之李鍾天入于東洋大學梵魚寺之金道源入于日本大學其他皆入西京之臨濟宗大學留學西京者後多罷皈十一月二十五日設立佛教振興會于覺皇寺於此會也海印寺住持李晦光法住寺住持徐震河乾鳳寺住持李雲坡法興寺住持鄭萬化桐華寺住持金南坡銀海寺住持朴晦應金龍寺住持金慧翁通度寺住持金九河龍珠寺住持姜大蓮麻谷寺住持張普明奉恩寺住持羅晴湖大興寺住持白翠雲孤雲寺住持李東旿月精寺住持洪莆龍松廣寺住持李雪月奉先寺住持洪月初永明寺住持李晦明成佛寺住持金抱應梵魚寺住持吳惺月貝葉寺住持姜九峯歸州寺住持鄭煥朝寶石寺住持朴徹虛威鳳寺住持李振聲釋王寺住持代金崙河白羊寺住持代宋宗憲祇林寺住持代朴海蓮普賢寺住持代羅晴湖傳燈寺住持代李智永仙巖寺住持代金相淑等其發起者也又海印寺住持李晦光其代表者也佛教振興會役員會主李晦光副會主姜大蓮幹事長金弘祚理務部長羅晴湖事務部長申羽均財務部長李命七已上三人皆兼幹事幹事張志淵尹泰興金相淑僧金榮鎮李能和李常和金永七李智永僧成𡎖尹稙求梁建植宋憲奭馬相學李喬永李舜夏朴海遠安必中洪鎮裕張鴻植吳在豐許萬弼金同圭趙命九柳錫晉沈禹澤韓榮浩李寶潭僧李碧峯僧金近永婦人幹事李淑李淑子是年以佛舍利故七千僧尼義捐金錢數百檀越善施財穀改建覺皇寺十二月役告訖二十九日行釋迦世尊舍利奉安禮式從東門外舊元興寺輦舍利入京城三十本寺住持具法服威儀乘腕車陪從佛教振興會員及善男善女無數千人填咽擁護幡蓋以行列鼓吹以前導滿城士女奔波瞻禮無不嘖嘖嘆未曾有乙卯大正四年二月二十五日置朝鮮寺剎三十本山聯合事務所于覺皇寺大本山龍珠寺住持姜大蓮為委員長三月十五日發行佛教振興會月報第一號附佛教雜志沿革朝鮮佛教月報發行十九號明治四十五年二月二十五日始大正二年八月二十五日終編輯兼發行者權相老海東佛報發行八號大正二年十一月二十日始大正三年六月二十日終編輯兼發行者朴漢永佛教振興會月報發行九號大正四年三月十五日始大正四年十二月十五日終編輯兼發行者李能和朝鮮佛教界發行三號大正五年四月五日始大正五年六月五日終編輯兼發行者李能和朝鮮佛教叢報發行繼續中大正六年三月二十日始編輯兼發行者李能和七月二日佛教振興會設行無遮大會于京城之獎忠壇追薦朝鮮五百年以來一切冤死之人冥福朝鮮總督寺內正毅命印海印寺藏板之大藏經三部自三月十五日始事每日用朝鮮人五十名朝鮮總督府事務官小田省吾監督其役至八月畢印蓋用強質紙在中央試驗所及其他製紙所應用化學而製造之紙也印之其表紙則用絹地繪畫麗代之瓦及蓮花與唐草等形其製本極精巧一部奉納于日本西京之泉湧寺以祈