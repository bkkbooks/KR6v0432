唯以呪噤得幸恩寵無比凡僧徒求職賞者皆趨附賄賂貪鄙無厭冬十月壬寅以大府寺油蜜告匱徵斂諸寺院以充齊醮之費丁酉飯僧三萬于毬庭三日十二月以鄭諴私第為慶明宮陰陽家以為犬輿頭吠主之勢不宜臨御不從道詵既相宅都之地於松嶽雲霧捲晴見東南三峯羅列即三角山以為盜峰使鑄鐵犬十二坐而吠之今松都有坐犬里與此相對戊寅十二年宋紹興二十八年金正隆三年佛紀二一八五年二月己未以仁宗忌日飯僧於太平亭時王好作佛事緇徒盈溢宮庭怙恃恩寵附託宦官侵擾百姓競造寺塔為害日甚己卯十三年宋紹興二十九年金正隆四年佛紀二一八六年二月丙午幸大安寺國子生李良平道謁上疏論事丁未王率百官飯僧三月戊辰設消災道場於宣慶殿七日乙亥幸玄化寺東西兩院僧各設茶亭迎駕競尚華侈庚辰十四年宋紹興三十年金正隆五年佛紀二一八七年春正月庚辰朔王在興國寺受中外朝賀壬辰還宮八月戊辰設消災道場於宣慶殿六日九月戊寅王如興王寺甲申幸新成藏堂後苑置酒賞菊冬十月丙辰幸普賢寺飯僧命造銀瓶十口重三十斤各盛五香五藥納于寺乙丑飯僧三萬于毬庭三日癸未十七年宋孝宗隆興元年金大定三年佛紀二一九年二月乙亥幸天壽洪圓二寺沈醉留宿從官衛士皆不得食甲申十八年宋隆興二年金大定四年佛紀二一九一年三月丙午將移御仁智齊法泉寺住持覺倪睿宗宮人之子備酒饌迎駕於獺嶺院王吟賞風月與諸學士唱和未已王被酒徑入歸法寺日已暮侍從失王所之夜半乃還乙酉十九年宋乾道元年金大定五年佛紀二一九二年春正月庚申出御玄化寺辛酉還宮設無遮大會夏四月庚辰幸觀瀾寺先是吏部侍郎韓靖別創佛宇於仁濟院中號祝釐之所內侍侍郎金敦中待制金敦時重修觀瀾寺亦以祝釐為稱王謂靖敦中兄弟曰聞卿等歸福寡人朕甚嘉之將往見之靖及敦中等以寺之北山童無草木聚傍民植松柏杉檜奇花異草築壇為御室飾以金碧臺砌皆用怪石至是敦中張宴於寺之西臺帷帳器皿珍羞極華侈王與宰輔近臣歡洽賜敦中敦時靖白金羅絹丹絲甚厚戊子移御奉靈寺即鄭諴祝釐之所諴饗王供辦過仁濟觀瀾遠甚王醉自吹笙因問知音者左右以及第李鴻升對即召至前命吹笙笛遂欣然以為相見之晚也命屬內侍丙戌二十年宋乾道二年金大定六年二月癸未幸普濟寺燃燈一萬於羅漢殿三月乙巳幸金身寺設齊夏四月白善淵宦者也准王行年鑄銅佛四十軀畫觀音四十幀以佛生日點燈祝釐於別院王乘夜微行觀之王與僧覺倪夜宴於聖壽院乃覺倪所創也戊子又召覺倪玩月賦詩秋七月乙卯王自普濟寺至闕門設帳微行入御修文殿翌日亦從帳中還御暫濟寺自後凡遊幸皆設帳於道冬十月戊戌飯僧三萬於毬庭庚子設百座會于修文殿幸歸法寺遂如玄化寺僧性文房十一月癸卯夜宴清寧齊寵宦李榮備奇玩之物以迎張女樂酣飲至四鼓還性文房丁亥二十一年宋乾道三年金大定七年三月己未王冒雨幸長興院與覺倪夜飲命右承宣金敦中賦詩辛酉王微行至金身窟設羅漢齊還玄化寺與李公升許洪材覺倪等泛舟衆美亭南池酣飲極歡亭之初作役卒私賫糧一卒貧甚不能自給役徒共分飯一匙食之一日其妻具食來餉且曰宜召所親共之卒曰家貧何以備辦將私於人而得之乎豈竊人所有乎妻曰貌醜誰與私性拙安能盜但剪髮買來耳因示其首卒嗚咽不能食聞者悲之夏四月壬午王弟僧冲曦享王於清寧齊召覺倪及侍臣同飲晚泛舟衆美亭南池遊賞至夜冲曦即玄曦也戊子二十二年宋乾道四年金大定八年二月乙未飯僧一千于宣慶殿三月丁亥飯僧于內殿戊子御觀風殿下教曰朕聞鎬京西京也萬世不衰之地後之王者臨御于此頒下新教則國風清明小民安泰朕即政以來萬幾實繁未暇巡御今以日官所奏來幸此都將欲革舊鼎新復興王化採古聖勸戒之訓及當時救弊之事頒布新令中略一崇重佛事時當末季佛法漸衰凡祖宗時開創裨補寺社及古來定行法席寺院與別祈恩寺社如有殘弊主掌官隨即修葺一歸敬沙門近來僧徒貪生謀利比比皆是今欲激濁揚清以救其弊其有清高僧徒復遁跡山林者所在官搜訪薦奏一保護三寶其佛舍珍寶米麵雜物近因內侍院及諸司奏取費用僧徒嘆怨自今憲臺遍令曉諭禁斷一遵尚仙風昔新羅仙風大行由是龍天歡悅民物安寧故祖宗以來崇尚其風久矣近來兩京八關之會日減舊格遺風漸衰自今八關會預擇兩班家産饒足者定為仙家依行古風致使人天咸悅一救恤民物國家特立東西大悲院及濟危寮以救窮民然近來任是官者率非其人故或有饑饉不能存者疾病無所依附者未能收集救恤於寡人愛民之心何如哉自今吏部擇能堪其任者委之使憲臺紏察能否以為勸懲教下百官庭賀己丑二十三年宋乾道五年金大定九年佛紀二一九六年春正月丁丑設消灾道場於宣慶殿二月乙卯設三界醮時齊醮之費實繁都祭都齊二庫未支其用又立館北奉香泉洞三宮各置員僚徵求諸道轉輸三宮者絡繹於道民皆愁嘆內侍劉邦義秦得文李竦金應和金存偉鄭仲壺希胤魏綽然等深結宦侍約為兄弟以剝民媚主為事創寺繪佛設齊祝聖又創別貢金銀鍮銅器皿山積由是得幸不次除官任言責者皆阿上意無一直諫者三月己未王以巡御西都親製疏文設羅漢齊于山呼亭己卯幸永明寺泛龍船於大同江置酒遂御浮碧樓壬午自永明寺泛舟至洪福寺遂幸仁王寺庚寅二十四年宋乾道六年金大定十年佛紀二一九七年春正月己卯王如靈通寺設華嚴會親製佛疏宣示文臣百官表賀明宗光孝王王晧在位二十七年辛卯元年宋乾道七年金大定十一年佛紀二一九八年五月甲申設消灾道場于宣慶殿五日六月戊午王受菩薩戒于大觀殿秋七月辛巳設消灾道場于大觀殿三日九月癸未以僧德素為王師冬十月甲辰設百高座于宣慶殿讀仁王經乙巳飯僧三萬壬子夜宮闕災諸寺僧徒及府衛軍人詣闕將救火鄭仲夫李俊儀等入直李義方兄弟恐有變走入于內閉紫城門不納諸救火者故殿宇悉火王出山呼亭痛哭壬辰二年宋乾道八年金大定十二年佛紀二一九九年二月有司請依太祖舊制以二月望燃燈王從之明年復用上元六月壬戌王受菩薩戒十二月乙巳設佛頂道場于明仁殿癸巳三年宋乾道九年金大定十三年佛紀二二年春正月己丑設帝釋道場于明仁殿己酉幸外帝釋院設羅漢齊二月甲戌幸王輪寺飯僧戊子幸妙通寺設摩利支天道場辛卯以仁考忌辰飯僧于樂賓亭三月庚辰兩府宰樞禱雨于普濟寺戊子宰樞禱雨于神衆院五月甲辰令文武三品抽祿設齊禱雨于普濟寺冬十月戊寅設消灾道場于崇文殿甲午四年宋淳熙元年金大定十四年佛紀二二一年春正月歸法寺僧百餘人犯城北門殺宣諭僧録彥宣李義方率兵千餘擊殺數十僧餘皆散去兵卒死傷者亦多重光弘護歸法弘化諸寺僧二千餘人集城東門門閉乃燒城外人家欲延燒崇仁門入殺義方兄弟義方知之徵集府兵逐之斬僧百餘府兵亦多死者乃令府兵分守城門禁僧出入遣府兵破重光弘護歸法龍興妙智福興等寺李俊儀止之義方怒曰若從爾言事不成矣遂焚其寺取貨財器皿以歸僧徒要擊於路還奪之府兵死者甚衆俊儀罵義方曰汝有三大惡放君而弒之取其第宅姬妾一也脅奸太后女弟二也專擅國政三也義方大怒拔劒欲殺之文克謙止之俊儀義方之兄也六月庚午王受菩薩戒冬十月丙子設百高座于天敷殿講仁王經三日十二月辛未李義方伏誅義方自納女東宮益擅威福濁亂朝政衆心憤怨時尹鱗瞻治兵西郊僧徒亦從軍義方偶出宣義門外鄭筠密諭僧宗旵等託有求訴從義方後伺隙斬之分捕俊儀兄弟及其黨高得元柳允元等皆殺之王慮軍中驚擾遣庾應圭諭之軍中皆疑文臣嗾僧徒為變欲殺麟瞻應圭還告仲夫遣人諭其意然後乃止僧徒以為賊臣之女不可以配東宮奏黜義方女遂聚普濟寺不發王遣知奏事李光挺左副承宣文克謙慰諭戊寅中書侍郎平章事崔惟清卒惟清性好浮屠日誦佛經有子六人二人為僧乙未五年宋淳熙二年金大定十五年夏四月丙寅詔曰上略華侈踰度宴飲過極其悉除之若金銀物飾畫佛像法寶外亦不得施用八月甲子設仁王道場于明仁殿三日冬十月壬辰飯僧一萬於宮庭三日十一月侍中鄭仲夫修普濟寺設落成會請王臨幸有司諫止之仲夫陰令僧録司奏請親幸具盛饌以進王不欲久留命宰樞承宣侍臣同時赴宴丙申六年宋淳熙三年金大定十六年二月戊戌設天帝釋道場于明仁殿三月辛亥幸王輪寺設羅漢齊乙卯兵馬使奏與南賊戰不利士卒請募僧以濟師夏四月壬寅親設五百羅漢齊於普濟寺摩利支天道場于妙通寺五月丙午親設帝釋齊于賢聖寺八月辛卯幸王輪寺設羅漢齊冬十月壬午親設齊于賢聖寺戊戌設佛頂道場于內殿丁酉七年宋淳熙四年金大定十七年二月興王寺僧上變僧統中曦潛結僧徒謀篡逆逮捕鞠之知其誣釋之三月甲申親設齊于神衆院戊子設帝釋道場于內殿丁酉設佛頂道場于內殿庚申幸妙通寺設摩利支天道場六月癸未王受菩薩戒八月癸巳幸外帝釋院設羅漢齊冬十月壬申幸王輪寺設羅漢齊甲午設佛頂道場于明仁殿戊戌八年宋淳熙五年金大定十八年春正月乙卯親設齊于神衆院戊午興王寺僧告重房曰寺僧有與德水縣人謀作亂者散員高子章實知之重房逮捕僧及子章流于遠島陰遣人投之江中子章性甚暴戾聞者相慶己未設帝釋道場于明仁殿二月設佛頂道場于內殿樞密院使李光挺同知院事崔忠烈副使文克謙等奏曰燃燈舊用二月望近因聖考諱朔改用正月有乖先王之本意比來三光告異二氣不調恐或由此請於二月望縱不設會作樂悉令公私隨分燃燈從之三月己酉幸普濟寺設五百羅漢齊夏四月庚辰幸王輪寺設羅漢齊八月壬辰朔設消灾道場于內殿九月癸未設藏經道場于明仁殿七日十月丙辰設仁王百座道場於大觀殿令中外飯僧三萬十二月壬子親設仁王道場于明仁殿五日己亥九年宋淳熙六年金大定十九年佛紀二二六年六月壬寅王受菩薩戒于明仁殿秋七月壬午設仁王道場于明仁殿十餘日以禳災變冬十二月辛酉設百座會於開國寺是年兵刃數起國家患之術僧致純奏曰舊制三年一設百座會前年十月雖已行之今宜別例復行以禳其灾從之丁丑設消灾道場于明仁殿五日庚子十年宋淳熙七年金大定二十年佛紀二二七年六月癸酉設法華會崇教寺八月戊戌親設消灾道場于明仁殿九月辛酉設消灾道場于大觀殿以禳天變冬十月己亥設佛頂道場於明仁殿庚子王如奉恩寺以重修落成也十二月乙未設消灾道場于內殿辛丑十一年宋淳熙八年金大定二十一年佛紀二二八年春正月辛亥寫經院火先是命寫成銀字藏經公私競納錢財而助之無賴輩欲盜其物因火之三月戊寅朔設帝釋道場于明仁殿五月辛卯設仁王道場於明仁殿六月辛亥設太歲道場于明仁康安二殿冬十月癸丑設消災道場于明仁殿壬戌設仁王道場于大觀殿飯僧三萬于毬庭命參知政事崔忠烈如西京行八關會舊制每當燃燈八關遣宰相攝行齊祭自甲午年西京有事詔停遣使比年以來只遣三品官忠烈以其贈賄奏言先王皆遣宰相為使蓋重翼京也乞依舊制王揣知其意從之及還多受饋遺輜重