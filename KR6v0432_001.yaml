body:
  text: 完山李能和尚玄居士輯述東州崔南善六堂學人校閲佛化時處高句麗時代小獸林王高邱夫在位十三年壬申二年新羅奈勿王十七年百濟近肖古王二十七年晉咸安二年佛紀一二九九年夏六月秦王苻堅遣使送浮屠順道及佛像佛經于高句麗王遣使謝以其書教子弟高句麗佛法始此三國史以下倣此參考釋順道不知何許人也邁德高標慈忍濟物誓志弘宣周流震旦移處就機誨人不倦高句麗第十七解味留王或云小獸林王二年壬申夏六月秦苻堅發使及浮屠順道送佛像經文於是君臣以會遇之禮奉迎于省門投誠敬信感慶流行尋遣使回謝以貢方物或說順道從東晉來始傳佛法則秦晉莫辨何是何非師既來異國傳西域之慈燈懸東暆之慧日示以因果誘以禍福蘭熏霧潤漸漬成習然世質民淳不知所以裁之師雖蘊深解廣未多宣暢自摩騰入後漢至此二百餘年後四年神僧阿道至自魏存古文始創省門寺以置順道古記云以省門為寺今興國寺是也後訛寫為肖門又創伊弗蘭寺以置阿道古記云興福寺是也此海東佛教之始惜乎之人也之德也宜書竹帛以宣懿績其文辭不少槩見何哉然世之使於四方不辱君命必待賢者而能之則特至他邦肇行未曾有之大事非其有大智慧大謀猷得不思議神通力其何以行之哉以此知其為異人斯亦法蘭僧會之流乎贊曰古者三韓鼎峙開國稱王彼佛聲教蔑有其兆及感應道交賢德聿來以赴機叩易曰感而遂通天下之故順道有之矣始豫躬詣所謂興國興福因有綴文記事之志無緣以發之今謬承景命以順道為傳首云耳海東高僧傳參考海東高僧傳京北五冠山靈通寺住持教學賜紫沙門臣覺訓奉宣撰論曰夫佛之教也性相常住悲願洪深窮三際遍十方雨露以潤之雷霆以鼓之不行而至不疾而速五目不能覩其容四辨不能談其狀其體也無去無來其用也有生有滅故我釋迦如來從兜率天乘旃檀樓閣入摩耶胎以周昭王甲寅四月初八日遂開右脅生於淨飯王宮其夜五色光氣入貫太微通於西方昭王問太史蘇由曰有大聖人生於西方問利害曰此時無他一千年後聲教被此土焉始處宮中示同世俗粵四十二年甲申四月八日佛年三十踰城出家他諸書皆作十九出家三十成道遂坐樹成道轉法利生如優曇花時一現耳初說華嚴次說小乘或般若深密或法華涅槃隨機普被任器方圓其猶一風而萬竅齊號孤月而千江皆現四十九年度脫羣品列子所謂西方有聖人者是也列子云吳太宰嚭學孔子者也問於孔子曰夫子聖人歟對曰丘博識強記非聖人也又問曰三王聖人歟對曰三王善用智勇聖非丘之所知又問曰五帝聖人歟對曰五帝善用仁信聖非丘之所知又問曰三皇聖人歟對曰三皇善用時政聖非丘之所知太宰嚭駭然曰然則孰為聖者歟孔子有間動容而對曰西方有聖人者不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉亦見史記是時文殊與目連為人示跡于震旦佛年七十九以穆王壬申二月十五日入滅於雙林白虹十二道連夜未滅王問太史扈多曰西方大聖人方滅度耳於是阿難等結集金言具載貝葉經律論戒定慧爰方啓行然雜華恆常之說隱于虬宮邪宗蚖肆異部蛙鳴既而馬鳴屹起挺生及陳那護法唱之和之摧邪顯正演義申宗廣大悉備乎西域將有待而東驅矣自佛滅一百十六年東天竺國阿育王收佛舍利役使鬼兵散起八萬四千寶塔遍閻浮提時當周敬王二十六年丁未也塔興周世經二十二王至秦始皇三十四年焚燒典籍育王寶塔由是隱亡當是時沙門利防室利防也十八賢者賫持佛經來化咸陽秦始皇不從而囚之夜有金剛丈人破獄出之而去蓋機緣未熟故也及後漢永平十三年攝摩騰竺法蘭來儀漢庭慈雲布於九州法雨灑於四海然按霍去病傳云得休屠王祭天金人則像設似先入於沙漠矣又前漢哀帝時秦景使月氐國來傳浮圖經教乃知前漢已行六十三年而後明帝方感金人夢耳若我海東則高句麗解味留王時順道至平壤城繼有摩羅難陀從晉來于百濟則枕流王代也後於新羅第二十三法興王踐祚梁大通元年丁未三月十一日阿道來止一善縣因信士毛禮隱焉屬有吳使者香道指其焚點之儀由是延致王宮然其教未闡舍人厭髑赤心面內勇决國人之疑噫微夫子吾當從何教也自爾圓光慈藏之徒西入傳法上下信敬內外奉行先呼而後應日益而月增遂使於三韓及我聖祖革舊鼎新尤尊佛教凡制度多用佛教守文繼體之君傳而不失惟太祖四代孫大覺國師於宣王三年乙丑四月航海求法東至于洋導其百派大小始終頓圓之五教各得其所復歸于正然源乎周派乎漢汪洋於晉魏汗漫於隋唐波瀾於宋而淵沄於海東也都算佛入滅至今乙亥高麗高宗二年二千一百六十四年滅後第一千一十四年入後漢至今一千一百五十一年自順道入高句麗至今八百四十四年矣且道不自弘弘之由人故著流通篇以示于後按古梁唐宋三高僧傳皆有譯經以我本朝無翻譯之事故不存此科也尚玄曰按此海東高僧傳著者覺訓即覺月首座高麗高宗王時僧也與李奎報交好有唱酬之作見李相國集又其行履見崔滋補間集李相國集訪覺月師用東坡詩韻各賦步步行隨入谷雲自然幽洞辟紅塵已將蚊雀觀鍾釜曾把螟蛉戲縉紳俯仰歸來推幻化死生得喪任天鈞多師雪裏猶賒酒借與山中一日春次韻文禪師哭覺月首座首座高麗時僧職也世喪彌天釋苑賢我方聞訃倍悽然空餘廬嶽裁蓮社無復華亭載月船聞有詩評嗟未覩師嘗著詩評不示豫早修僧傳僅終編師曾修高僧傳法門梁棟今頽折後學憑誰討十玄按此可知師為華嚴宗師崔滋補間集華嚴月首座餘事亦深於文章有草集傳士林嘗撰海東高僧傳時李東觀允甫言有默行者不知族氏年可五十或為髠或為頭陀不念經不禮佛終日宴坐瞑如也有候之者無貴賤不舉目改觀問其名不應問從甚處來亦不應故以默行者名焉居皈正寺別區時豫適在龜城道人存純為豫言行者嘗冬月敷一座具著一衲衣衲中無蟣虱坐氷堗上寒色不形學道後進抱冊往從質疑者無不委細開說方大寒恐其凍也候出時遣房子急爇柴頭溫其堗而去行者來觀之無喜慍色徐出戶拾石礫填堗口泥其灰塗隙而上宴坐如初自是不復遺溫也嘗齊時食菜不用醬又不禁午後食值幸則食之或至七八日不食自言凡名山有聖蹟無不遊觀豫往見不交一言後乙丑歲冬十月遊窟巖寺寺僧曰近默行者來陟鸇巖樂之就石窟搆一小庵躬負石築階新開磴道自山下至窟置三百餘層無一石動搖者時聞齊鼓下來飯食或至十餘日不下因往候焉片石上有七言頌是行者所作其言頗涉神仙事庚午歲以定戎分道乘傳復至龜城問行者今在何所城人云頃往奉州三角山門巖居焉去歲夏月住窟巖寺時謂寺僧曰有鬼自北方來萃此城因下山入城乘城上巡行而出城人皆見之後有鬼火晝伏昏起其色青尖不等或入人家或聚園樹或飛空中城人擊鳴器以噪之守夜不眠如是過數日方止時豫三妻息亦在是城問之果然後有僧益芬來告豫近往三角山見行者無小恙好在近旁村民恐行者之去相與修完所住草屋日夕供護焉將告別行者謂芬曰大都修行者不以寒苦易其志今之修行者必欲高樓屹殿庇其徒美食細服供其身出入公卿士大夫之門諭以造寺息利為得福多屠割平民烏在其為修行者歟汝勉之無忽也芬佩服焉東觀言如此因撰傳以補僧史之闕遺甲戌四年新羅奈勿王十九年百濟近肖古王二十九年晉寧康二年秦僧阿道來高句麗備考釋阿道或云本天竺人或云從吳來或云自高句麗入魏後歸新羅未知孰是風儀特異神變尤奇恆以行化為任每當開講天雨妙花始新羅訥祗王時有黑胡子者從高句麗至一善郡宣化有緣郡人毛禮家中作窟室安置於是梁遣使賜衣著香物君臣不知香名及與所用乃遣中使齎香遍問中外胡子見之稱其名目曰焚此則香氣芬馥所以達誠於神聖所謂神聖不過三寶一曰佛陀二曰達摩三曰僧伽若燒此發願必有靈應時王女病革王使胡子焚香表誓厥疾尋愈王甚喜餽贈甚厚胡子出見毛禮以所得物贈之報其德焉因語曰吾有所歸請辭俄而不知所去毗處王時有阿道和尚與侍者三人亦來止毛禮家儀表似胡子住數年無疾而化其侍者三人留住讀誦經律往往有信受奉行者焉然按古記梁大通元年三月十一日阿道來至一善郡天地震動師左執金環錫杖右擎玉鉢應器身著霞衲口誦花詮初到信士毛禮家禮出見驚愕而言曰曩者高麗此謂高句麗也僧正方來入我國君臣怪為不祥議而殺之又有滅垢玼從彼復來殺戮如前汝尚何求而來耶宜速入門莫令鄰人得見引置密室修供不怠適有吳使以五香獻原宗王王不知所用遍詢國中使者至問法師師曰以火燒而供佛也其使偕至京師王令法師見使使禮拜曰此邊國高僧何不遠而王因此知佛僧可敬敕許頒行又按高得相詩史曰梁氏遣使曰元表賚送沉檀及經像不知所為咨四野阿道逢時指法相注云阿道再遭斬害神通隱毛禮家則梁吳之使莫辨其詳又阿道之跡多同黑胡子何哉然自永平至大通凡四百餘年高句麗興法已百五十餘年而百濟已行一百四十餘年矣若按朴寅亮殊異傳云師父魏人崛摩母曰高道寧高麗人也崛摩奉使高麗私通還魏道寧因有身誕焉師生五稔有異相母謂曰偏孤之子莫若為僧師依教即於是日剃髮十六入魏覲省崛摩遂投玄彰和尚受業十九年歸寧於母母諭曰此國機緣未熟難行佛法惟彼新羅今雖無聲教爾後三千餘月有護法明王御宇大興佛事又其國京師有七法住之處一曰金橋天鏡林今興輪寺二曰三川岐今永興寺三曰龍宮南今皇龍寺四曰龍宮北今芬皇寺五曰神遊林今天王寺六曰沙川尾今靈妙寺七曰壻請田今曇嚴寺此等佛法不滅前劫時伽藍墟也汝當歸彼土初傳玄旨為浮圖始祖不亦美乎師既承命子之聲出疆而來寓新羅王闕西里今嚴莊寺是也時當味鄒王即位二年癸未矣師請行竺教以前所不見為怪至有將殺之者故退隱于續村毛祿家今善州也逃害三年成國官主疾病不愈遣使四方求能治者師應募赴闕為療其患王大悅問其所欲師請曰但創寺於天鏡林吾願足矣王許之然世質民頑不能歸向乃以白屋為寺後七年始有欲為僧者來依受法毛祿之妹名史侍亦投為尼乃於三川岐立寺曰永興以依住焉味鄒王崩後嗣王亦不敬浮圖將欲廢之師還續村自作墓入其內閉戶示滅因此聖教不行於斯盧新羅一名斯盧厥後二百餘年原宗果興像教皆如道寧所言自昧鄒至法興凡十一王矣阿道出現年代前却如是其差舛並是古文不可取捨然若當味鄒時已有弘宣之益則與順道同時明矣以其中廢而至梁大通乃興耳故並出黑胡子元表等敘而觀焉贊曰自像教東漸信毀交騰權輿光闡代有其人若阿道黑胡子皆以無相之法身隱現自在或先或後似同似異若捕風搏影不如執跡而定也但其先試可而後啓行始逃害而終成功則秦之利方漢之摩騰亦無以加焉易曰藏器待時阿道之謂矣海東高僧傳乙亥五年新羅奈勿王二十年百濟近肖古王三十年近仇首王元年晉寧康三年春二月高句麗創省門寺伊弗蘭寺以置胡僧順道阿道備考三國史高句麗始創肖門寺以置順道又創伊弗蘭寺以置阿道此海東佛法之始參考海東高僧傳順道來後四年神僧阿道至自魏存古文始創省門寺以置順道古記云以省門為寺今興國寺是也後訛寫為肖門又創伊弗蘭寺以置阿道古記云興福寺是也此海東佛教之始參考三國遺事云高麗本記高麗謂高句麗云小獸林王即位二年壬申乃東晉咸安二年孝武帝即位之年也前秦苻堅遣使及僧順道送佛像經文又四年甲戌阿道來自晉明年乙亥二月創肖門寺以置順道又創伊弗蘭寺以置阿道此高麗佛法之始僧傳作二道來自魏云者誤矣實自前秦而來又云肖門寺今興國伊弗蘭寺今興福者亦誤按麗時都安市城一名安丁忽在遼水之北遼水一名鴨緑今云安民江豈有松京之興國寺名廣開土王高談德在位二十一年壬辰元年新羅奈勿王三十七年百濟阿莘王元年晉太元十七年三月高句麗王下教崇佛求福又命有司立國社修宗廟癸巳二年新羅奈勿王三十八年百濟阿莘王二年晉太元十八年高句麗創九寺於平壤丙申五年新羅奈勿王四十一年百濟阿莘王五年晉太元二十一年晉僧曇始來化遼東備考釋曇始關中人也自出家多有異蹟足白於面雖涉泥水未嘗沾濕天下咸稱白足和尚以晉太元末年賫持經律數十部往化遼東乘機宣化顯授三乘立以歸戒梁僧傳以此為高句麗聞法之始時當廣開土王五年新羅奈勿王四十一年百濟阿莘王五年而秦苻堅送經像後二十五年也是後四年法顯西入天竺又二年羅什生來玄高法師生焉晉義熙初師復還關中唱道三輔長安人王胡之叔某死已數年矣一日夢中忽來現形接引王胡遊遍地獄示諸果報胡辭還叔謂胡曰既已知其因果要當奉事白足阿練用修白業胡敬諾寤已遍詢衆僧唯見始足白於面因即事之晉末凶奴赫連勃勃襲破關中斬戮無數師亦遇害力不能傷普赦沙門悉皆不殺而潛遁山中修頭陀密行未幾拓拔燾復剋長安擅威關洛時博陵崔浩少習左道猜疾釋教位居僞輔為燾所深信乃與天師寇氏寇謙之也說燾以謂佛教無益於世民利有傷勸令廢之燾惑其言以僞太平七年遂毀滅佛法分遣軍士燒掠寺社統內僧尼悉令罷遣其有竄逸者追捕梟斬之四境之內無復沙門時玄高等被害語在本傳師閉絶於兵革所不至處依隱閲世及太平末師算知燾死之將至乃於元會日手策金錫即到宮門有司奏云有白足道人從宮門徑入儀形可怪燾聞已即令猛卒斬之不傷燾大怒自以所佩利劒斫焉唯劍所著處有痕如紅線體無餘異時有北園養虎子檻燾驅令貽之虎皆潛伏終不敢近燾試遣天師近檻猛虎輒鳴吼直欲摶噬於是燾乃知佛教威神非黃老所及即奉師上殿頂禮其足悔責愆咎師為說因果報應不差指掌開示略現神異燾生大慙懼改往修來然禍惡已稔遂感厲疾而崔寇亦發惡病將入死門燾以為禍由彼作罪不可赦因族滅二家宣令國內光復竺教鍾梵相聞既而孫濬襲位深懲殷鑒洪闡真風寶㲲制度其興也勃焉師不知其所往贊曰火炎崑岡玉石俱焚霜嚴草野蕭蘭共悴師之艱難險阻誠曰殆哉雖伐樹削迹不足比也然隨時隱現若青山白雲之開遮遇害虧盈如碧潭明月之撈掍捐軀濟溺道之以興菩薩法護正當如此其來桑域决膜生盲亦乘夙願而至者耶海東高僧傳參考智證國師碑新羅崔致遠撰云西晉曇始始之貊如攝騰東入句驪阿度度于我我謂新羅如康會南行尚玄曰曇始之東化自是實事而疑當時貊與遼俱屬高句麗也但元魏太武沙汰佛法之後曇始尚無恙則其非西晉之僧也明矣參考三國遺事遼東城育王塔三寶感通録載高麗遼東城傍塔者古老傳云高麗聖王高句麗始祖曰東明聖王按行國界次至此城見五色雲覆地往尋雲中有僧執錫而立既至便滅退看還現傍有土塔三重上如覆釜不知是何更往覔僧惟有荒草掘深一丈得杖并履又掘得銘上有梵書侍臣識之云是佛塔王委曲問詰答曰漢國有之彼名蒲圖王本作休屠王祭天金人因生信起木塔七重後佛法始至具知始末今更損高木塔朽壞育王統一閻浮提洲處處立塔不足可怪又唐龍朔中有事遼左行軍薛仁貴行至隋主討遼古地乃見山像空曠蕭條絶於行往問古老云是先代所現便圖寫來京師具在若函按西漢與三國地理志遼東在鴨緑之外屬漢幽州高句麗聖王未知何君或云東明聖帝疑非也東明以前漢元帝建昭二年即位成帝鴻嘉壬寅薨于時漢亦未見貝葉何得海外陪臣已能識梵書乎然稱佛為蒲圖王似在西漢之時西域文字或有識之者故云梵書爾按古傳育王命鬼徒每於九億人居地九億人疑即今之九萬人立塔如是起八萬四千於閻浮界內藏於巨石中今處處有現瑞非一蓋真身舍利感應難思矣長壽王高巨璉在位七十八年乙卯六十三年新羅慈悲王十八年百濟文周王元年劉宋元徽三年秋九月高句麗王巨璉自將攻百濟殺其王餘慶用浮屠道琳之間牒也備考史紀初高句麗王陰求可以間百濟者浮屠道琳應募曰臣雖無能思有以報國願大王指使之王悅密遣之琳為得罪亡入百濟時百濟王好博奕琳詣王門告曰臣少而學碁頗入妙王召與碁果國手遂尊為上客甚昵之恨相見之晚琳一日侍坐從容言臣異國人上不疏外恩私甚渥未有分毫之益願獻一言王曰第言之琳曰大王之國四面山河天設之險四鄰莫敢覬覦奉事之不暇王當以崇高之勢富有之業竦人之視聽而城郭不葺宮室不修先王骸骨權攢露地百姓屋廬屢毀河流臣竊為大王不取也王曰諾盡發國人蒸土築城又起宮室樓閣臺榭無不壯麗取大石於郁里河作槨以葬父骨緣河樹堰自蛇城東至崇山之北由是倉庾虛竭人民困窮國勢甚危琳逃還以告高句麗王王喜伐之文咨王高羅雲在位二十八年丁丑七年新羅照智王十九年百濟東城王十七年齊建武四年佛紀一五二四年秋七月高句麗創金剛寺陽原王高平成在位十四年辛未七年新羅真興王十二年百濟聖王二十九年梁大寶二年佛紀一五七八年高句麗惠亮法師歸于新羅平原王高陽城在位三十一年丙申十八年新羅真智王元年百濟威德王二十三年陳大建八年佛紀一六三年高句麗大丞相王高德遣沙門義淵入鄴見前齊定國寺沙門法上問釋教始末緣由自西徂東年世帝代而還備考釋義淵高句麗人也世系緣致咸莫聞也自肄剃染善守律儀慧解淵深見聞泓博兼得儒賢為一時道俗所歸性愛傳法意在宣通以無上法寶光顯實難未辨所因聞前齊定國寺沙門法上戒山慧海肅物範人歷跨齊世為都統所部僧尼不減二百萬而上綱紀將四十年當文宣時盛弘釋典內外闡揚黑白咸允景行既彰逸響遐被是時高句麗大丞相王高德乃深懷正信崇重大乘欲以釋風被之海曲然莫測其始末緣由自西徂東年世帝代故件録事條遣淵乘帆向鄴啓發未聞其略曰釋迦文佛入涅槃來至今幾年又在天竺經歷幾年方到漢地初到何帝年號是何又齊陳佛法誰先從爾至今歷幾年帝請乞具注其十地智度持地金剛般若等諸論本誰述作著論緣起靈瑞所由有傳記不謹録咨審請垂釋疑上答云佛以姬周昭王二十四年甲寅歲生十九出家三十成道當穆王二十四年癸未王聞西方有化人出便即西入至竟不還以此為驗四十九年在世滅度至今齊世武平七年丙申凡一千四百六十五年後漢明帝永平經法初來魏晉相傳吳孫權赤烏年康僧會適吳方弘教法持地阿僧伽比丘從彌勒菩薩受得其本至晉安帝隆安年曇摩讖於姑臧為河西王沮渠蒙遜譯摩訶衍論是龍樹菩薩造晉隆安年鳩摩什波至長安為姚興譯十地論金剛般若論並是僧佉弟波藪槃豆造至魏宣武帝時菩提流支始翻上答指證由緣甚廣今略舉要淵服膺善誘博通幽奧辨高炙輠理究連環曩日舊疑渙然冰釋今茲妙義朗若霞開西承慧日東注法源望懸金而不刊傳羣玉而無朽所謂苦海津濟法門梁棟者其唯吾師乎既返國揄揚大慧導誘羣迷義貫古今英聲藉甚自非天質大拔世道相資何以致如斯之極哉史不敘所終故不書贊曰佛生年月傳記互出理難一定然淵親承法上口授而來乃與老法琳辨正論所據若合符節當以此為指南然巨儒吳世文援引古文特啓異論致有問對雖辭旨煩麗亦不足憑也海東高僧傳嬰陽王高元在位二十八年乙酉八年新羅真平王四十七年百濟武王二十六年唐武德八年高句麗王遣人入唐求學佛老教法帝許之寶藏王高臧在位二十六年壬寅元年新羅善德女主十一年百濟義慈王二年唐貞觀十六年高句麗僧德昌覘新羅備考史紀云新羅遣伊餐金春秋乞師於高句麗六旬不返金庾信請王將伐高句麗募兵三千已渡漢江高句麗諜者即德昌也奔告王遂厚禮春秋而歸之癸卯二年新羅善德女主十二年百濟義慈王三年唐貞觀十七年高句麗遣使于唐求道教先是蓋蘇文告王曰三教譬如鼎足闕一不可今儒釋並興而道教未盛請遣使於唐求之王奉表陳請帝遣道士叔達等八人兼賜老子道德經王喜館於佛寺庚戌九年新羅真德女主四年百濟義慈王十年唐永徽元年夏高句麗沙門普德以高句麗崇奉道教不信佛法遂南移百濟之完山孤大山備考三國遺事云本記云麗季武德貞觀之間國人爭奉五斗米教唐高祖聞之遣道士送天尊像來講道德經王與國人聽之即第二十七代榮留王即位七年武德七年甲申也明年遣使往唐求學佛老唐帝許之及寶藏王即位亦欲興三教時寵相蓋蘇文說王以儒釋並熾而黃冠未盛特使於唐求道教時普德和尚住盤龍寺憫左道匹正國祚危矣屢諫不聽乃以神力飛方丈南移于完山州今全州郡孤大山輿地勝覽作全州高達山而居焉即永徽元年六月庚戌也又本傳云乾封二年丁卯三月三日也未幾國滅今景福寺有飛來方丈是也高麗真樂公留詩在堂文烈王著傳行世大安八年辛未祐世僧統大覺國師義天到孤大山景福寺飛來方丈禮普德聖師之真有詩云涅槃方等教傳受自吾師可惜飛房後東明古國危跋云高麗藏王惑於道教不信佛法師乃飛房南至此山後有神人現於高麗馬嶺告人云汝國敗亡無日矣具如國史餘具載本傳與僧傳師有高弟十一人無上和尚與弟子金趣等創金洞寺寂滅義融二師創珍丘寺智藪創大乘寺一乘與心正大原等創大原寺水淨創維摩寺四大與契育等創中臺寺開原和尚創開原寺明德創燕口寺開心與普明亦有傳皆如本傳贊曰釋氏汪洋海不窮百川儒老盡朝宗麗王可笑封沮洳不省滄溟徙臥龍戊辰二十七年新羅文武王八年唐高宗總章元年佛紀一六九五年高句麗亡于唐唐以高句麗浮屠信誠為銀青光祿大夫先是唐帥李績與新羅兵合圍平壤城高句麗王高臧降大臣男建猶固守浮圖信誠遣諜內應城遂破備考史記云春正月唐將李績帥師伐高句麗以右相劉仁軌為遼東道副大總管以郝處俊金仁問副之使仁問徵兵於新羅合圍平壤城月餘高句麗王遣泉南産帥首領九十八人竪白幡詣績降績以禮接之男建猶固守頻遣兵出戰皆敗男建以軍事委浮屠信誠信誠密遣諜約內應後五日啓闔績縱兵鼓譟而入火其門灼𦦨四興男建急窘自刺不絶績執臧及子福男德男大臣男建等二十餘萬衆歸唐新羅金仁問等隨之唐置都護府於平壤以薛仁貴為都護分五部百七十六城六十九萬餘戶為九都督府四十二州百縣皆統於都護府附參考高句麗僧寶關係日本者惠便日本書記敏達十三年百濟威德王三十年高句麗平原王二十三年甲辰九月從百濟來鹿深臣闕名字有彌勒石像一軀佐伯連闕名字有佛像一軀是歲蘇我馬子宿禰請其佛像二軀乃遣鞍部村主司馬達等池邊直水田使於四方訪覔修行者於是唯於播磨國得僧還俗者名高麗惠便大臣乃以為師令度司馬達等女曰善信尼下略元亨釋書濟北沙門師鍊撰貞治三年刊元亨二年成釋惠便高麗國人敏達十三年蘇馬子奏取百濟彌勒石像於石川宅側創殿安置時無奉香火者使梁人司馬達等四方尋求沙門於播州得似比丘者問之對曰此方不敬沙門故我混俗耳乃便也馬子貴為師本朝高僧傳濃州成德沙門師蠻撰元祿十五年和州石川寺沙門惠便傳釋惠便高麗國人慕我風俗渡海而來是時佛法草昧不敬僧寶鏟光埋名混於民間敏達十三年秋九月百濟使鹿梁持彌勒石像而來蘇我馬子造精舍於石川宅側奏求石像安置殿裏時無奉香火者使梁人司馬達等尋求沙門於四方偶得便于播州某所而還蘇氏迎居精舍乃為崇師冬十月蘇氏令司馬娘善信及禪藏慧善就便得度一日便請僧尼設大會齊司馬達等在座忽於饌上感現舍利即獻蘇氏其舍利神異無方蘇馬子益厚其淨信矣又釋慧聰百濟人崇峻三年春三月偕國貢來精於律學蘇馬子受戒法贊曰用之則行舍之則藏此聖賢之行也凡愚之非所能也便本欲教化此國未得其時隱於草莽與農夫野人若將終身焉幸逢蘇氏之請住最初精藍素志云愜舍利發祥初夫用舍不與於己行藏又從于時論之圓二諦兼三學之人也矣日本佛教略史敏達十三年高句麗沙門惠便應蘇我馬子之請度善信尼禪藏惠善三比丘尼於石川精舍設大齊會是為日本度尼之始蓋是時蘇我馬子得百濟佛像一軀造殿奉之矣惠慈日本書記推古三年高句麗嬰陽王五年乙卯五月丁卯高麗僧惠慈皈化則皇太子廄戶師之是歲百濟惠聰來之此兩僧弘演佛教并為三寶之棟梁四年十一月法興寺造竟中略是日惠慈惠聰二僧始住於法興寺十年閏十月己丑高麗僧隆雲聰共來皈二十三年十一月癸卯高麗僧惠慈皈于國元亨釋書釋惠慈高麗人推古三年五月貢來皇太子豐聰師之與百濟惠聰同弘佛教四年冬法興寺成敕慈及聰同居二十二年皈本邦本朝高僧傳和州法興寺沙門惠慈傳釋惠慈高麗人推古三年夏五月貢來皇太子豐聰師之與百濟惠聰弘通佛教為三寶之棟梁四年冬十月法興寺成敕慈及聰同居二十二年慈皈本邦又釋僧隆釋雲聰高麗人推古十年冬十月來附聖德太子傳太子諱聖德用明帝第一子母穴穗部皇子之女也夢金色僧告曰有救世之願請託后胎問卿為誰曰我是救世菩薩家在西方曰后身垢穢豈其宜乎曰不厭垢穢但願度生飛入其口寤即有妊而及八月胎中有聲敏達二年正月初一后遊禁庭及至馬廄太子俄誕后身無惱時赤黃光西來照宮僅經四月乃能言語知人舉止體貌麗潔奇香襲然傅母嬪御彌月帶馥年甫二歲二月中旬向東合掌稱南無佛六年冬百濟國貢經論太子奏曰昔在陳國略見斯文諸惡莫作諸善奉行思其垂範今欲見之帝及羣臣拍手驚異從此每日燒香看讀至翼年冬終數百卷因奏曰每六齊日諸天檢察請令天下是日禁屠上制可十年春蝦夷寇叛議臣獻策顧問太子對曰國之大事小兒何知無以有一厚諭巨魁要盟放還恩祿制貪剪止後患帝從其言魁帥綾糟感恩來欵又召博士覺架外學理通用明帝崩大子初侍湯藥晝夜不寢及葬於河內科長山陵喪服徒行兩足流血距躍拊胸息絶更蘇推古元年登庸儲二布攝萬機仁如父母三年夏五月高麗惠慈百濟惠聰來深達內教太子師之聞一知十二僧相歎謂為真人也嘗謂慈曰法華某卷某句闕一字慈曰我本國經亦無此字太子曰吾所持之經有此字慈曰何在太子笑曰在隋國衡山寺慈大驚異五年夏四月百濟王子阿佐來朝私於館人請見太子曰久聞聖名拜觀意足矣乃召殿內佐見太子下庭跪地合掌說偈太子曰此人昔為我徒故來謝耳六年春正月娶膳大妃十二年四月肇製憲章十七條天下賴之十四年秋七月帝詔太子講勝鬘經命諸大德質問經義太子披袈裟秉玉麈尾據師子座講已天雨蓮華三尺許即其地建橘寺冬十月講法華於岡基宮王臣信聞七日而竟賜播州莊田一千畝即納法隆寺十五年秋七月命小野妹子先世所持法華在衡山般若臺當往取來且授衣三領曰昔友三人尚存在山以此畀之妹子入隋登南嶽遇三僧便遺伽梨陳太子旨三僧嘆久取一漆函副書以贈妹子還來太子開函曰老僧誤寄此非吾所持之經班鳩宮有夢殿一月三度沐浴而入製勝鬘法華維摩等經疏有滯礙則必有金人來自東方諭以深義是秋九月又入夢殿閉戶七日惠慈曰太子入三昧乃出定經在玉几以闕字示慈曰是我所持前取來者弟子經也十七年隋使裴清來曰去秋太子駕青龍車從數百人入南嶽舊坊取法華經凌虛而去正是入定時也二十年冬十二月巡遊河攝過和之片岡遇菩提達磨用明二年親討物部守屋之日以白膠木刻四天王像安攝之玉造岸上推古之物移於難波荒陵東今號四天王寺也二十五年入定觀皇統出奏曰後代多災患非佛法力難固帝祚請立梵剎以鎮護之帝從其奏於熊凝村創大安寺二十六年冬謂膳妃曰我在南嶽承達磨勸誘生此土居儲二一乘妙義遍金殿而不滿下凡思捨此身託生微家誓作沙門救濟衆生子從我乎妃曰三從之身豈得違命二十七年巡視畿內江州所建之寺給地植木置田闢園堀池終到蜂岡檢無戒僧即日擯出尋往科長召匠作墓設二床曰以辛巳春我來此處是冬十月特賜詔問奏聞興隆三寶慈憐四民因述意願進語四條二十九年二月五日太子謂妃曰流傳佛法吾事畢矣不樂久住今夜當行即同沐浴著新衣裳俱起就寢翼朝日高侍嬪揭幃二人長往壽算四十九妃壽未記之天地變現天皇臨哭大臣具位如離恃怙哀號之聲滿四衢道太子與妃顏容不變身輕如衣香氣發越宮僚持香華幡蓋梵衆鳴磬鈸諷梵唄引送靈輿葬于科長百姓如堵素服擎花太子有驪馬常駕遊嘗令調子麻呂執靶上富士山巡行甲斐信濃是日自馳負鞍從葬向廟大嘶數聲而斃異鳥止墳嚇逐烏鳶時人呼之為守墓鳥惠慈在高麗聞訃慟哭曰太子捨我我何獨存來歲二月同日逝矣至期果然太子有六名生於廄邊故曰廄戶用明帝愛敬居宮南上殿故曰上宮八人奏事一時聞別故曰八耳聰明仁恕故曰聖德豐聰耳聰者八耳之同稱也太子所造大伽藍九曰天王寺法隆寺元興寺中宮寺橘寺萬城寺日向寺且近江一州有四十八寺五畿梵剎可準而知其餘蕞寺不可枚數焉贊曰抱慧思之再身調熟此土時機之生酸而從襁褓之中克赫厥靈一戎衣剪滅凶頑儲二攝政聖謨洋洋布世之憲章講贊於真乘令各知所皈向焉於爍聖德吾國興法之洪基也論曰或人謂曰近儒撰書排斥佛法太子之聖暨傳教弘法諸師駁雜之譏無所不至子何居然視之耶余曰束於教者不知大方而管窺蠡測畫於局見不可以語於道宜乎為詆也吾佛之道大而無外尊之無對洋洋焉浩浩焉不能得而名焉天神護崇王臣承囑曾何毀譽之足纍吾道乎哉唐宋之間韓歐程朱力排之言滋繁而佛法愈盛力窮意消一參禪門及聽昌道性理之說陽儒陰禪悔先言欽後戒焉矧今堅執管測者拾珍韓朱之唾餘作屑屑之詞而僈神罔聖欲鑠佛法螢火須彌殊知其不及耳雖然澆漓之風僧階華美紛紜早進外於宗義癡慢塞路諫誨難容吾恐外侮之憂不在他人故舉先哲之言行以為逆耳之針矣吾子如何之思乎或人唯唯而退僧隆元亨報書釋僧隆高麗人推古十年高句麗嬰陽王十二年壬戌十月共沙門雲聰來曇徵日本書紀推古十八年高句麗嬰陽王二十年庚午三月高麗王貢上僧曇徵法定曇徵知五經且能作彩色及紙墨并造碾磑蓋造碾磑始于是時歟元享釋書釋曇徵推古十八年三月高麗國貢來沙門法定共之徵涉外學善五經又有伎藝造碾磑工彩畫贊曰云云中略年祀寢遠化迹不詳故豫於是併繫綴焉然慧慈摳上宮之衣觀勒始僧䂮之任不為無得矣嗚呼曇慧道深者此方之騰蘭也惜哉古記闕焉本朝高僧傳釋曇徵推古十八年春三月高麗國貢來涉外學善五經又有伎藝造碾磑工彩畫是時本朝未善繪事就徵受指教繫于和州元興寺沙門慧彌傳末慧灌元享釋書釋慧灌高麗國人入隋受嘉祥吉藏三論之旨推古三十有三年乙酉高句麗榮留王七年春正月本國貢來敕住元興寺其夏天下大旱詔灌祈雨灌著青衣講三論大雨便下上下大悅擢為僧正後於內州創井上寺弘三論宗贊曰騰蘭來漢漢人始得耳真乘焉然其道渾朴無宗派之稱矣羅什入關之後三論之宗聿煽諸家之割合皆殿之矣我欽明之聖統海藩不替於貢曇慧道深偕計來儀此時佛法草昧誘導惟微灌公因三韓句麗之賓起無畏提婆之唱夏旱降大雨於天下時渴灑甘露於井上藏公尋來系嗣繩繩嗚呼三論也為兩朝宗旨之先登異焉耳乎哉或曰曹魏嘉平二年中天竺曇摩迦羅至洛陽出戒本子何稱三論為宗之始乎曰魏之前比丘出家只剪髮而受三皈而已迦羅見東土之缺僧儀始行四分戒本羯磨法是又沙門之通儀也不必立為宗也以故其後承稟不續至李唐南山道宣建律宗遠取迦羅為祖耳矣雖儀法起於魏而宗趣成於唐豫之前言者宗派也本朝高僧傳釋慧灌高麗人入隋從嘉祥吉藏大師稟三論旨推古三十三年正月元日本國貢來敕住元興寺盛說空宗是歲夏旱詔灌祈雨灌著青衣演講三論大雨天皇大悅擢任僧正白鳳十年春二月和州禪林寺成請灌為落慶導師灌又河內志紀郡創井上寺弘通本宗年九旬而滅度為本朝三論宗始祖焉余至常州鹿鳴信宿根本寺歷觀殿裏有慧灌僧正之牌楞側獎朽字畫燦然主曰慧灌當時開山也問古記無有之按昔武雷命神護景雲元年出鹿島居奈良三笠郡好相接故移瓶錫諭化東民歟贊曰欽明推古之朝百濟高麗入貢之僧大槩提婆宗也而不說宗派又無統付暨灌師來始講三論上下仰風貽厥相序梁法朗者三論之祖也在興皇寺服青衣登講筵灌師之披青衣祈雨得徵亦有所據焉附道登本朝高僧傳釋道登不詳其許推古末年高句麗榮留王十年戊子自高麗入大唐隨嘉祥寺吉藏大師傳三論旨從遣唐使皈住元興寺專演空宗與道昭齊名孝德天皇大化元年秋八月詔登及福亮慧雲等十師曰宜令諸寺衆僧弘傳釋教二年丙午敕登道昭始架宇治川大橋帝命右史撰石上銘銘曰浼浼橫流其疾如箭修修征人停騎成市欲超重深人馬亡命從古至今莫知抗葦世有釋子名曰道登出自山尻慧滿之家大化二年丙午之歲搆之此橋濟渡人畜即因微善爰發大願結因此橋成果彼岸法界衆生普同此願夢裏空中導其昔緣白雉元年長戶國司草壁連醜經獻白雉道登奏曰昔高麗王欲建寺相攸見一白鹿遂於其地造營白鹿園寺佛法大興又白雀見于田莊僉云休祥也帝因紀元下略道顯本朝高僧傳釋道顯高麗人蠹巢竺墳漁獵魯誥聞日本君臣崇信佛法附貢船而來敕住大安寺教授之暇撰日本世記若干卷天智元年高句麗末年三月唐人新羅人代高麗高麗主乞援吾國朝廷徵兵發遣海外下略附行善本朝高僧傳釋行善姓堅部氏不記何許人志尚傳燈不憚險苦久留高麗習學求法養老二年得船歸來君臣崇信五年夏詔曰沙門行善負笈萬里普事遊學既經七代博積修練天下所過之寺院皆迎供養善在高麗行鄰里俄逢大水橋壞無舟獨立橋頭密念觀音須臾一老翁棹艇來載善登岸善將敘謝翁與艇俱隱乃知是大士應現因發誓刻大士像晝夜敬禮故彼國稱善為河邊菩薩歸朝時抱像而來安興福寺四衆瞻禮一日其像忽失所在善亦無何示寂云百濟時代枕流王高枕流在位二年甲申元年新羅奈勿王二十九年高句麗小獸林王四年晉太元九年九月胡僧摩羅難陀自晉至百濟王迎致宮內禮敬焉百濟佛法始此備考釋摩羅難陀胡僧也神異感通莫測階位約志遊方不滯一隅按古記本從竺乾入于中國附材傳身徵烟召侶乘危駕險任歷艱辛有緣則隨無遠不履當百濟第十四枕流王即位元年九月從晉乃來王出郊迎之邀致宮中敬奉供養稟受其說上好下化大弘佛事共贊奉行如置郵而傳命二年春創寺於漢山度僧十人尊法師故也由是百濟次高句麗而興佛教焉逆數至摩騰入後漢二百八十有年矣耆老記云高句麗始祖朱蒙娶高句麗女生二子曰避流恩祖即沸流溫祚音近相混也二人同志南走至漢山開國今廣州是也本以百家濟河故名百濟後於公州扶餘郡前後相次而立都三韓東南隅有倭國即日本也倭之東北有毛人國有文身國其國東二千餘里有大漢國其國東二萬里有扶桑國宋時有天竺五僧遊行至此始行佛法此皆在海中唯日本國僧往往渡海而來餘皆未詳夫三韓者馬韓辰韓卞韓是也寶藏經云東北方有震旦國或云支那此云多思惟謂此國人思百端故即大唐國也然則三韓在閻浮提東北邊非海島矣佛涅槃後六百餘年乃興中有聖住山名室梨母怛梨唐言三印山巉峯高聳觀世音菩薩宮殿在彼山頂即月嶽也此處聖住未易殫書然百濟乃馬韓之謂矣宋僧傳云難陀得如幻三昧入水不濡投火無灼能變金石化現無窮時當建中年代相距而不同恐非一人之跡也贊曰世之流民性多𢤱戾王命有所不從國令有所不順一旦聞所未聞見所未見即皆革面遷善修真面內以順機宜故也傳所謂出其言善則千里之外應者豈非是耶然攝機之道要在乘時故事半古人功必倍之海東高僧傳乙酉二年新羅奈勿王三十年高句麗故國壤王二年晉太元十年佛紀一四一二年春二月百濟創佛寺於漢山度僧十人聖王高明穠在位三十一年丙午四年新羅法興王十三年高句麗安藏王八年梁普通七年佛紀一五五三年百濟沙門謙益入中印度常伽那寺學梵文攻律部與梵僧倍達多三藏齎梵本律文歸國譯成七十二卷是為百濟律宗之始曇旭惠仁兩法師著律疏三十六卷備考彌勒佛光寺事蹟云百濟聖王四年丙午沙門謙益矢心求律航海以轉至中印度常伽那大律寺學梵文五載洞曉竺語深攻律部莊嚴戒體與梵僧倍達多三藏齎梵本阿曇藏五部律文歸國百濟王以羽葆鼓吹郊迎安于興輪寺召國內名釋二十八人與謙益法師譯律部七十二卷是為百濟律宗之鼻祖也於是曇旭惠仁兩法師著律疏三十六卷獻于王王作毗曇新律序奉藏于台耀殿將欲剞劂廣布未遑而薨辛酉十九年新羅真興王二年高句麗安原王十一年梁大同七年百濟遣使如梁表請毛詩博士涅槃等經義并工匠畫師等從之壬申三十年新羅真興王十三年高句麗陽原王八年梁承聖元年百濟王始以佛像經卷贈於日本且貽書曰是法於諸法中最為殊勝周公孔子尚不能知能生無量福德成就無上菩提云云日本佛教始此參考日本書記云欽明天皇十三年冬十月百濟聖明王遣西部姬氏達率斯致契等獻金銅釋迦像一軀彌勒石佛及幡蓋經論若干卷然群臣不信用之蘇我稻宿禰尊敬之因賜之作佛殿於石川家安置之置三尼一僧以供之蘇我馬子司馬達等皆崇佛此佛院道場之始也參考水鏡記云繼體天皇之時韓人持佛像等來崇奉云云又日本通證曰繼體十三年司馬達等由韓來朝云云若依此兩說而合觀之則彼水鏡所謂韓人殆即措司馬達等然則欽明已前日本早有佛教之聲迹矣甲戌三十二年新羅真興王十五年高句麗陽原王十年梁承聖三年百濟遣沙門曇惠道深等十六人於日本威德王高昌在位四十四年丁酉二十四年新羅真智王二年高句麗平原王十九年陳大建九年百濟送經論及律師禪師比丘尼呪禁師佛工寺匠等於日本詔置難波大別王寺參考和漢三才圖會云敏達六年始自百濟國佛工寺匠來又云初百濟送佛像聖德太子與馬子大臣同信佛法守屋大連摧破佛法太子誅之為造大王寺處處伽藍召土木瓦工於百濟國今攝州大坂瓦工其傳統也戊申三十四年新羅真平王十年高句麗平原王三十年陳至德六年百濟國寺工太良末太文賈古子三人畫工白如入日本和漢三才圖會蘇我馬子大臣請百濟僧等問受戒之法是日本僧之始也和漢三才圖會三月百濟復送佛舍利及僧寺匠瓦匠畫工等於日本四月善信尼等來百濟學戒律三年受十戒六法而歸是日本戒律之始日本佛教略中法王高宣在位二年己未元年新羅真平王二十一年高句麗嬰陽王十年隋開皇十九年佛紀一六二六年百濟下令禁殺生收民家所養鷹鷂放之又焚漁獵之具庚申二年新羅真平王二十二年高句麗嬰陽王十一年隋開皇二十年佛紀一六二七年春正月百濟創王興寺度僧三十人大旱王幸漆嶽寺祈雨參考三國遺事云百濟法王或云孝順王隋文帝開皇十九年即位詔禁殺生明年度僧三十人創王興寺時都泗泚城今扶餘也武王繼統父基子搆歷數紀而畢成其寺亦名彌勒寺武王高璋在位四十一年辛酉二年新羅真平王二十三年高句麗嬰陽王十二年隋仁壽元年佛紀一六二八年百濟僧觀勒至日本獻天文地理歷本方術書和漢三才圖會參考日本佛教略史云推古天皇十年百濟沙門觀勒高麗沙門隆雲等至於日本觀勒獻曆書及天文地理遁甲方術等書又云推古三十二年有僧以斧歐其祖父帝聞之詔置僧正僧都及法頭以檢校僧尼之不法者乃命觀勒為僧正鞍部德積為僧都阿曇連充法頭是日本僧官之始甲午三十五年新羅善德女主三年高句麗榮留王十七年唐貞觀八年佛紀二六六一年春二月百濟興王寺成寺臨水窮極壯麗創自法王時至是告成王每乘舟入寺行香參考三國遺事云泗泚崖有一石可坐十餘人百濟王欲幸王興寺禮佛先於此石望拜其石自暖因名突石義慈王高義慈在位十九年己未十九年新羅太宗王六年高句麗寶藏王十八年唐顯慶四年佛紀一六八六年百濟烏會寺亦云烏合寺有大赤馬晝夜六時繞寺行道三國遺事庚申二十年新羅太宗王七年高句麗寶藏王十九年唐顯慶五年佛紀二六八七年六月百濟興王寺僧皆見如船楫隨大水入寺門三國遺事七月又震天王道讓二寺塔及白石寺講堂唐兵與新羅兵合圍百濟都城拔之百濟義慈王降唐兵執之以歸於是百濟亡于唐唐分百濟故地置熊津馬韓東明金漣德安五都督府各統州縣命劉仁願以兵一萬留鎮泗泚城明年百濟宗室福信等立故王子扶餘豐為王豐嘗質於日本福信起兵與浮屠道琛據周留城叛西北諸部皆應引兵圍劉仁願於熊津城既而福信殺道琛扶餘豐又殺福信百濟遂亡附參考百濟僧寶關係日本者曇慧日本書紀欽明十五年百濟聖王三十一年甲戌二月百濟遣僧曇慧等九人代道深等九人元亨釋書釋曇慧百濟國人欽明十五年二月共道深本國貢來本朝高僧傳百濟國沙門曇慧傳釋曇慧百濟國人蚤入大唐陪時匠席綜大小乘遊化為志彼國聞此方崇佛法欽明十五年春二月慧及道深偕計貢來敕建精舍延以居之是本朝有沙門之始也但以士民未知所以皈嚮三寶時機難調不述宗乘國史亦不記所終贊曰慧深二師選擇外貢化導不著不知何宗余想不出跋摩提婆之宗羅什入關大唱三論成實自唐以前諸師習尚二論是以其法早傳於三韓耳延曆十五年官符稱成實論附三論二師為空宗也明矣且為此方之騰蘭故系冠于篇首焉日羅本朝高僧傳釋日羅百濟國人神異不測精博內外聲播吾國敏達帝聞之遣紀押勝招羅國王愛才不許應徵再使吉備羽島篤責王懼聽命十二年百濟威德王二十九年癸卯夏從羽島來館遇渥洽上殿對問聖德太子微服到館羅指曰神人也跪地再拜說半偈曰敬禮救世觀世音傳燈東方粟散國即出身光太子眉間放光欵談夜白太子謂曰子之命不久而盡羅後開攝之劒尾山不幾新羅人刺殺之太子曰日羅者聖人也我在南嶽時彼為弟子常拜日天故有身光余逢劒尾山主尋羅之事曰年代深遠塔牌不存寺志亦無然里民傳云肇開基者日羅上人也蓋撰記傳者不委真俗筆跨兩端故後世或謂俗人也夫放身光者豈纏人之所為乎其為沙門何疑之有太子親稱為聖人則縱非沙門實是化權之人也焉善信尼元亨釋書善信尼司馬達等之女也敏達十三年從慧便出家同伴二女共剃髮一禪藏梁人夜善之女二慧善錦織之女大臣蘇馬子營精舍迎三尼供養用明二年信白馬子曰出家之人以戒為地願赴百濟受戒學崇峻元年百濟威德王三十四年戊申馬子付信百濟使求法發遣三年春信等三尼自百濟歸住櫻井寺豐國日本書記用明二年百濟威德王三十三年丁未四月丙子天皇得病還入於宮羣臣侍焉天皇詔羣臣曰朕思欲歸三寶卿等議之羣臣入朝而議物部守屋大連與中臣勝海連違詔議曰何背國神敬他神也由來不議若斯事矣蘇我馬子宿禰大臣曰可隨詔而奉助詎生異計於是皇弟皇子皇弟皇子者穴穗部皇子即天皇庶弟引豐國法師闕名也入於內裏物部守屋大連睥睨大怒日本靈異記考證上豐國蓋謂韓國也非斥豐前豐後猶仲哀紀謂韓國為寶國神功紀云財寶國財寶國財國金銀之國應神紀云金銀蕃國也神代紀亦云韓鄉之鳥是有金銀用明二年紀云皇弟皇子引豐國法師入於內裏者亦蓋謂韓國僧也本朝高僧傳百濟國沙門豐國傳釋豐國百濟人史失其名以國呼之生資俊邁慕風化而來是時佛法未周寓豐後民間焉用明二年夏四月帝弗豫詔侍臣曰朕思歸三寶卿等議焉守屋勝海奏曰先皇以來未有此議何背本邦神奉異域佛乎蘇馬子曰已承睿旨何異謀之有乎於是皇弟穴穗王子聞豐國法師之名下書招請入內說法聖德太子建中山寺於攝之駒嶽落慶之日請豐國為供養尊師後任住持觀勒日本書記推古十年百濟武王二年壬戌十月百濟僧觀勒來之仍貢曆本及天文地理書并遁甲方術之書也是時選書生三四人以俾學習於觀勒矣陽胡史祖玉陳習曆法大友村主高聰學天文遁甲山背臣日并立學方術皆學以成業元亨釋書釋觀勒百濟人推古十年十月貢來有學術獻曆本及天文地理方術之書太子耳聰曰吾在衡山勒為弟子好星宿度數山河利害事我呵其涉藝術雜真乘夙因不竭追我而來猶言星曆三十二年四月有沙門殺祖父者朝廷初置僧正檢校僧尼勒當遴選為僧正本朝高僧傳百濟國沙門觀勒傳釋觀勒百濟國人研究三論旁通外學推古十年冬十月受選來朝勑居元興寺擇俊秀者就勒學書太子豐聰曰吾在衡山勒為弟子嗜天文地理學吾呵其涉藝術雜於真乘夙因不竭又追蹤來猶言星曆甲申年有比丘殺害祖父帝召羣臣曰夫沙門者歸敬三寶從事戒法何無慚慎作此惡逆朕甚愧之僧尼犯罪者悉捕刑之乃詔諸寺索惡比丘一時僧尼多逢稽疑勒上表曰佛法自至東漢經三百歲傳之百濟已一百年百濟先主聞日本天皇睿聖敏明貢上佛像經論未滿百歲是以僧尼不習法律所以作大逆職而斯由也今聞聖制惶懼不知所如伏顧除大逆者其餘悉赦勿罪是所憲章之正仁政之及也帝重詔曰道人犯法何以誨世俗自今以往應置僧正僧都檢校僧尼勒任僧正高麗德積為僧都是本朝立僧綱之始也贊曰在昔秦世僧尼衆夥或有愆漏姚興下書使僧䂮任僧正僧遷為悅衆以濟頽緒矣吾推古帝登庸勒積以匡法律異域異時王制之同塤箎相合蓋朝有護法之后則野有聯芳之僧佛法之感應何世何國而得不爾哉慧彌元亨釋書釋慧彌推古十七年百濟武王九年己巳四月百濟人赴吳國其船漂流至肥後州州吏告大宰府府以聞勑令其舟人送本邦時彌沙門道欣等慕國化上表請留詔居元興寺本朝高僧傳和州元興寺沙門慧彌傳釋慧彌百濟人與州人赴吳國其船被風吹推古十七年夏四月至肥後葦北津太宰府以聞詔送本州時慧彌道欣二沙門慕國化上表請留敕居元興寺義覺元亨釋書釋義覺百濟國人也本朝征彼國時伴軍士來身長七尺博究佛乘居難波百濟寺一夕誦摩訶般若心經同寺慧義夜半見覺室光曜赫如義怪自窗隙窺之覺誦經光從口出明朝義告衆衆大驚嘆覺語徒曰我閉目誦經百許遍開目視室四壁空洞庭外皆見起而觸之室戶盡關歸座誦經通洞如先是般若不思議之力也此事齊明帝之時也百濟義慈王時本朝高僧傳百濟國沙門義覺傳釋義覺百濟國人也此方征彼國時伴軍士來詔住難波百濟寺覺長七尺博綜梵學持般若心經同寺慧義夜半見覺室光明耀曜窗隙窺之覺端坐誦經光從口出義以驚悚明朝告衆覺語徒曰吾一夕閉目誦心經一百許遍開目視室四壁空洞庭外皆見吾為希有之想起而撲之壁戶皆關歸座誦經空廓如先是般若不思議之妙用也徒皆增精進焉贊曰定慧均等斷除煩惱與物一致有何窒礙菩薩羅漢往來於三千世界無他皆以由之也覺之洞見者殆乎躋聖地與道藏日本書紀天武十二年是時百濟已亡而當新羅神文王三年甲申七月是月始至八月旱之百濟僧道藏雩之得雨十四年十月丙子百濟常輝封三十戶是僧壽百歲庚辰遣百濟僧法藏優婆塞益田金鍾於美濃令煎白术因以賜施綿布續日本紀養老五年六月戊戌詔曰中略百濟沙門道藏實惟法門袖領釋道棟梁年逾八十氣力衰耄非有束帛之施豈稱養老之情哉宜所司四時施物絁五匹綿十屯布二十端元亨釋書釋道藏百濟人持統二年七月旱詔藏祈雨不崇朝普澍天下養老五年詔曰沙門道藏法門領袖釋家棟梁云云崇禮甚盛年逾八十取滅本朝高僧傳百濟國沙門道藏傳釋道藏百濟國人博且靈通白鳳年中百濟末頃觀光日國持統二年秋七月旱詔藏禱雨不崇朝而天下普潤帝貴法驗之速賚䞋甚膴養老五年六月元正帝詔曰沙門道藏釋家棟梁法門領袖年逾八十氣力羸衰若無綿帛之施何寄恤老之志有司四時領供藏東渡之後撰成實論疏十六卷既垂九齡化于南京昔東大寺之學者法相宗論習俱舍三論宗兼學成實至講成實靡不據於藏疏其講廢止者三百餘年不能無憾也贊曰藏師之事國史不記何宗見著論疏則跋摩宗乎實為一家之宗祖也夫成實論者東晉羅什譯出三千門人橫竪講敷自爾歷世名僧或著注疏或鈔釋藏師與先進并鑣而馳固不忝聖鑒者歟道寧元亨釋書釋道寧百濟人白鳳十二年秋八月天下大旱敕寧法雩效雨大注帝加優賞本朝高僧傳百濟國沙門道寧傳釋道寧百濟國人聞此方風俗之醇淑截海而來寓居南京究串經論靈感時著白鳳十二年秋八月旱詔寧法雩修中大雨帝悅優賞焉又同國沙門常輝久留幾內壽一百藏白鳳十四年賜封三十戶以養其老贊曰寧公想夫百濟國之選也芳躅之逸也史記法雨之一條亦可以為幸與王制曰九十曰有秩况乎百歲也帝賜封戶實合於禮矣輝公之德可知焉多常本朝高僧傳和州法器山沙門多常傳釋多常百濟國人也本朝太皇后天皇御宇慕聖化來住和州高市法器山寺誦大藏經神呪專事度生應死之人承驗再蘇病者盈門奇異其多嘗卓錫杖二條於阪上當其經行互用二物無作竗用如鑿而樹焉太皇后尊重供養斯乃修行之功獨留芳名慈悲之德長存愛敬也願覺與圓勢本朝高僧傳和州高官寺沙門願覺傳釋願覺初入三井就常照學教法後住南京葍上師高宮寺圓勢勢百濟國之師範解行兼備善覺讓房覺疏放無戒檢不嫌五辛而食朝出邑里昏黑回房率以為常有優婆塞短之師前勢曰莫言優婆塞夜竊往房鑿壁窺之見其室內放光照耀驚以白師勢曰然也不信吾言無何願覺俄然命終勢命火葬其後優婆塞有事往江州有人語曰願覺師在焉即往驗視實是願覺也見優婆塞曰此頃不謁戀思無間起居安不當知大聖變化也贊曰古德埋壙之後全身脫出者或有之世以為異焉如覺公火浴無餘而體質依然遊化他邦者未嘗聞之異中之異也非權化焉能有此妙舉乎放濟本朝高僧傳百濟國放濟傳釋放濟者百濟國人本國有鄰兵之難時備後三谷郡主奉詔救百濟發誓願曰若得軍功造立精藍功成凱旋多創諸寺將塑佛像屈濟上京需金丹等彩具回程買舟到難波津有賣大龜者贖放三尾舟過備前骨島至夜三更舟子利貨相謀思心以濟投海俄有三龜負濟登岸既而有人賣金丹具到郡主家濟偶歸家熟視之前舟子也見濟惶恐首伏還贓濟告檀越乞活其命焉濟後住海邊常化往來年八十餘而化新羅時代法興王金原宗在位二十六年戊申十五年高句麗安藏王十年百濟聖王六年梁大通二年新羅始興佛法初訥秪王時沙門墨胡子自高句麗至一善郡今善山郡郡人毛禮作窟室居之梁遣使賜王香君臣不知所用與名胡子曰焚此則香氣芬馥可以致誠於神聖所謂神聖未有過於三寶一曰佛陀二曰達摩三曰僧伽若燒此發願則必有靈應時王女病革胡子焚香祝禱病尋愈王喜施報甚厚胡子以所得與毛禮俄不知所之照智王時有阿道者與其徒三人亦來毛禮家無幾阿道死三人留讀經律往往有信奉者至是王亦欲興佛教羣臣以為不可王難之近臣異次頓曰請斬小臣以定衆議王曰欲興佛道而殺不辜可乎對曰若道之行雖死無憾王召羣臣議僉曰今僧徒童頭異服議論奇詭從之恐有後悔異次頓獨曰夫有非常之人然後有非常之事今佛教淵奧不可不信王曰衆人之言牢不可破而汝獨異言下吏將誅之異次頓臨死曰我為法就形佛若有神吾死必有異及斬血從斷處湧色白如乳衆怪之不復毀佛己酉十六年高句麗安藏王十一年百濟聖王七年梁中大通元年新羅禁屠殺庚申二十七年高句麗安原王十年百濟聖王十八年梁大同六年佛紀一五六七年秋七月新羅王原宗薨諡曰法興弟立宗之子彡麥宗立年七歲太后攝政參考釋法空新羅第二十三法興王也名原宗智證王元子母延帝夫人身長七尺寬厚愛人乃神乃聖彰信兆民三年龍現楊井中四年始置兵部七年頒示律令始制百官朱紫之秩即位以來每欲興佛法羣臣𠵩𠵩騰口舌王難之然念阿道之至願乃召群臣問曰聖祖味雛與阿道肇宣佛教大功未集而崩能仁妙化遏而不行朕甚痛焉當大立伽藍重興像設其克從先王之烈其如卿等何大臣恭謁等諫曰近者年不登民不安加以鄰兵犯境師旅未息奚暇勞民作役作無用之屋哉王憫左右無信歎曰寡人以不德叨承大寶陰陽不序黎民未安故臣下逆而不從誰能以妙法之術曉喻迷人者乎久無應者至十六年粵有內史舍人朴厭觸或云異次頓或云居次頓年二十六三國遺事作二十二匪直也人秉心塞淵奮義見之勇欲助洪願密奏曰陛下若欲興佛教臣請僞傳王命於有司曰王欲創佛事如此則羣臣必諫當即下敕曰朕無此令誰矯命耶彼等當劾臣罪若可其奏彼當服矣王曰彼既頑傲雖殺卿何服曰大聖之教天神所奉若斬小臣當有天地之異果若有變誰敢違傲王曰本欲興利除害反賊忠臣可無傷乎曰殺身成仁人臣大節况佛日恆明皇圖愈永雖死之日猶生之年也王大加嘆賞曰汝是布衣意懷錦繡乃與厭觸深結誓遂傳宣曰創寺於天鏡林執事者奉敕興功廷臣果面折廷諍王曰朕不出令髑乃昌言臣固為之若行此法舉國泰安苟有益於經濟雖矯國令何罪於是大會羣臣問之僉曰今見僧徒童頭毀服議論奇詭而非常道若忽從之恐有後悔臣等雖死罪不敢奉詔髑奮曰今羣臣之言非也夫有非常之人而後有非常之事吾聞佛教淵奧不可不行且燕雀安知鴻鵠之志哉王曰衆人之言牢不可破汝獨異言不能兩從遂下吏將誅髑告天誓曰我為法就刑庶興義利佛若有神吾死當有異事及斬其頭飛至金剛山頂落焉在慶州後人於此處建刺楸寺刺楸或云法楸白乳從斷處湧出高數十丈日色昏黑天雨妙花地大震動君臣士庶咸皆上畏天變下慟舍人重法隕命相向舉哀而哭遂奉遺體營葬金剛山禮也于時君臣盟曰自今而後奉佛歸僧有渝此盟明神殛之君子曰大聖應千百之年仁發於祥義動於瑞莫不應乎天地亙乎日月動乎鬼神而况於人乎夫其自信於道則天地不得為不應也然功貴成而業貴廣故苟有大賴則輕太山於鴻毛壯哉得其死所矣是年下令禁殺生按國史及古諸傳商量而述二十一年伐木天鏡林欲立精舍掃地得柱礎石龕及階陛果是往昔招提舊基梁棟之用皆出此林工既告畢王遜位為僧改名法空念三衣瓦鉢志行高遠慈悲一切因名其寺曰大王興輪寺以大王所住故也此新羅創寺之始王妃亦奉佛為比丘尼住永興寺焉自此啓興大事故王之諡曰法興非虛美也厥後每丁厭髑忌日設會於興輪寺以追其遠及太宗王時宰輔金良圖信向西方捨二女曰花寶曰蓮寶為此寺婢又以逆臣毛尺族類充賤故二種銅錫至今執役豫遊東都登金剛嶺見孤墳短碑慨然不能自止是日山人會食問其故即吾舍人諱日也亦可謂去滋久思滋深矣按阿道碑法興王出家法名法雲字法空今按國史及殊異傳分立二傳諸好古者請詳檢焉贊曰大抵國君與下舉事可與守成未可與慮始加有時之利不利信無信繫焉則原宗雖欲創興佛法固難朝令而夕行然承本願力位據崇高又賴賢臣啓沃能以美利利天下卒與漢明齊驅並駕偉矣哉夫何間言以梁武比之非也彼以人主為大同寺奴帝業墜地法空既遜讓以固其嗣自引為沙門何有於我哉經所謂王比丘殊身同體矣若乎掃迷雲放性空之慧日挾之以飛者惟厭髑之力乎海東高僧傳真興王金彡麥宗在位三十六年甲子五年高句麗安原王十四年百濟聖王二十二年梁大同十年春二月新羅興輪寺成三月王許度人為僧尼勤於奉佛廣興佛剎己巳十年高句麗陽原王五年百濟聖王二十七年梁大清三年梁遣使使臣名沈瑚也送佛舍利於新羅王使白官奉迎於興輪寺前路初新羅僧覺德入梁求法至是與梁使俱來備考釋覺德新羅人聰明廣博凡聖莫測也新羅既奉行佛教人爭歸信師以達智知世之可化謂曰遷喬必出谷學道務求師若安安而居遲遲而行非釋子報恩之本意即附舶人梁為求法之先鋒但不知第何年耳此新羅入學之始遂歷事明師備承口訣如除翳膜如去耵聹有始有終無荒無怠德高行峻道望彌隆以採寶者非但自用當還故國普振羣貧乃於真興王十年與梁使賫佛舍利還至舊都王遽命有司即遣百官備禮儀出迎于興輪寺前路此亦舍利之始也昔僧會適吳求伸七日方值神驗師當人主已信之際隨上國重使來儀本國了無艱礙又以法水普潤海表使惰夫立表皆懷欲往之志其功利復何勝道哉後二十六年陳遣使劉思及入學僧明觀送釋氏經論無慮二千七百餘卷初則新羅法化初張經像多闕至是班班將大備焉二師所終皆未詳聞矣海東高僧傳辛未十二年高句麗陽原王七年百濟聖王二十九年梁大寶二年佛紀一五七八年高句麗沙門惠亮來歸新羅王以亮為僧統始置百座講會及八關之法備考新羅遣將居柒夫等擊取高句麗十郡居柒夫奈勿王五世孫少有遠志初為僧欲覘高句麗強弱入其境聞法師惠亮開堂說經遂詣聽講一日亮問曰汝從何來柒夫曰新羅人也亮握手密言曰吾閲人多矣見汝容貌定非常流其殆有心乎柒夫曰我生於偏方未聞道理聞師德譽來趨下風願師不拒亮曰老僧不敏亦能識子此國雖小不可謂無人恐子見執宜速返柒夫將還亮曰汝燕頷鷹視必為將帥他日無貽我害柒夫曰果如所言所不與師相好者有如皎日遂還仕至波珍餐至是王命柒夫及大角餐仇珍等八將軍與百濟兵侵高句麗百濟先攻平壤破之居柒夫等乘勝取竹嶺以外高峴以內十郡於是亮率其徒見于道左柒夫曰夙蒙師恩得保性命今日何以為報亮曰我國政亂滅亡無日柒夫與之歸見於王癸酉十四年高句麗陽原王九年百濟聖王三十一年梁承聖二年佛紀一五八年春二月新羅捨新宮為皇龍寺初王命築宮於月城東黃龍見其地因捨為佛寺號曰皇龍乙酉二十六年高句麗平原王七年百濟威德王十二年陳天嘉六年佛紀一五九二年陳遣使劉思及入學僧明觀送釋氏經論二千七百餘卷見海東高僧傳中釋法雲傳法雲即真興王也丙戌二十七年高句麗平原王八年百濟威德王十三年陳天康元年佛紀一五九三年新羅皇龍寺成壬辰三十三年高句麗平原王十四年百濟威德王十九年陳大建四年佛紀一五九九年冬十月新羅為戰死士卒設八關會於佛寺七日甲午三十五年高句麗平原王十六年百濟威德王二十一年陳大建六年佛紀一六一年春三月新羅鑄皇龍寺丈六像用銅三萬五千七斤鍍金百二兩真智王金金輪在位三年丙申元年高句麗平原王十八年百濟威德王二十三年陳大建八年秋八月新羅王彡麥宗薨王幼年即位唯勤奉佛至末年剃髮披僧衣自號法雲王妃亦為尼住永興寺備考釋法雲俗名彡麥宗諡曰真興而法興王弟葛文王之子也母金氏生七歲即位克寬克仁敬事而信聞善若驚除惡務本七年興輪寺成許人出家為僧尼八年命大阿餐柒夫等廣集文史修撰國史十年梁遣使與入學僧覺德送佛舍利王使羣臣奉迎興輪寺前路十四年命有司築新宮於月城東黃龍見其地王疑之改為佛寺號曰黃龍二十六年陳遣使劉思及僧明觀送釋氏經論七百餘卷三十七年祗園實際二寺成而黃龍亦畢功三十三年十月為戰死士卒設八關齊會於外寺七日乃罷三十五年鑄黃龍寺丈六像或傳阿育王所泛船載黃金至絲浦輸入而鑄焉語在慈藏傳三十六年丈六出淚至踵三十七年始奉原花為仙郎初君臣病無以知人欲使類聚羣遊以觀其行義舉而用之遂簡美女二人曰南無曰俊貞聚徒三百餘人二女爭娟貞引南無強勸酒醉而投河殺之徒人失和而罷其後遂取美貌男子傅粉粧飾之奉為花郎即徒衆雲集或相磨以道義或相悅以歌樂娛遊山水無遠不至因此知人之邪正擇其善者薦之於朝故金大問世記云賢佐忠臣從此而秀良將猛卒由是而生崔致遠鸞郎碑序曰國有玄妙之道曰風流實乃包含三教接化羣生且如入則孝於家出則忠於國魯司寇之旨也處無為之事行不言之教周柱史之宗也諸惡莫作衆善奉行竺乾太子之化也又唐令狐澄新羅國記云擇貴人子弟之美者傳粉粧飾而奉之名曰花郎國人皆尊事之此蓋王化之方便也自原郎至羅末凡二百餘人其中四仙最賢且如世記中王幼年即祚一心奉佛至末年祝髮為浮圖被法服自號法雲受持禁戒三業清淨遂以終焉及其薨也國人以禮葬于哀公祠之北峯是歲安含法師至自隋至安含傳辨之贊曰風俗之於人大矣哉王者欲移易於當世如水之就下沛然孰禦哉始真興既崇像教設花郎之游國人樂從效倣如趨寶肆如登春臺要其歸在乎遷善徒義鴻漸於大道而已彼漢哀帝徒以色是愛故斑固曰柔曼之傾人意非特女徒蓋亦有男色焉評之不可同日而語矣海東高僧傳尚玄曰新羅花郎即名國仙其所尊敬可知也已今朝鮮人西南方言呼賣娼之婦曰花郎女稱賽神之巫曰花郎兒皆極可賤可耻之名詞也究其語源新羅流傳而以俊貞之悅人原花之聚徒為可耻之行而賤之者歟何其名則相類實則相反如是懸隔耶近世京城曾有所謂四處所外入場大殿別監禁府選將捕盜軍官大宮廳直時謂之四處所外入場或爭佳妓而起棒戰俗名便戰名曰外入場鬪或因美童而鬪腳法名曰擇其緣鬪要之皆尚義俠養豪縱之一種習俗雖然屬於儓社會之風流蕩子窩窟之行為末乃流於浮浪誤入與新羅之花郎不可同年而語也真平王金伯淨在位五十三年戊申十年高句麗平原王三十年百濟威德王三十五年陳禎明二年佛紀一六一五年新羅竹嶺西百里許有山屹然高峙忽有一大石四面方丈雕四方如來皆以紅紗護之自天墜其山頂王聞之命駕瞻敬遂創寺嵓側額曰大乘寺請比丘失名誦蓮經者主寺灑掃供石香火不廢號曰四佛山比丘卒既葬冢上生蓮三國遺史己酉十一年高句麗平原王三十一年百濟威德王三十六年陳禎明三年佛紀一六一六年春新羅高僧圓光入陳求法丙辰十八年高句麗嬰陽王七年百濟威德王四十三年隋開皇十六年佛紀一六二三年春新羅高僧曇育入隋求法庚申二十二年高句麗嬰陽王十一年百濟武王元年隋開皇二十年佛紀一六二七年新羅僧圓光曾入陳求法至是隨奈麻諸文大捨橫川還自隋為時人所重奈麻大捨皆新羅官職名壬戌二十四年高句麗嬰陽王十三年百濟武王三年隋仁壽二年佛紀一六二九年新羅高僧智明隨入朝使上軍還王欽風景仰推重戒律褒為大德以勸方來後加大大德備考釋智明新羅人神解超悟行止合度內蘊密行讚揚他德挽曲向己捨直與人顒顒昂昂動有可觀自竺教宣道於海東權輿之際未曾大集英俊間生奮臂而作或自悟以逞能或遠來而命駕新醫於舊醫邪正始分舊尹告於新尹師資相授於是西入中國飽參而來者繼踵而起師以命世之才當真平王七年秋七月問津利往入陳求法雲遊海陸梗轉西東苟有道而有名悉爰咨而爰詣如木從繩如金成器飄然一去忽爾十霜學既得髓心切傳燈以真平王二十四年九月隨入朝使還國王欽風景仰推重戒律褒為大德以勸方來師嶽立嵩華量含滄溟照之以慧月振之以德風緇素之德是彛是訓後加大大德蔚居峻秩不知所卒初師入陳後五年圓光法師入陳八年曇育入隋七年隨入朝使惠文俱還師與智明並以高德顯名於當代之才之美固不相上下者也海東高僧傳乙丑二十七年高句麗嬰陽王十六年百濟武王六年隋大業元年新羅高僧曇育隨入朝使惠文還曇育與智明並以高德顯名當代之才之美不相上下戊辰三十年高句麗嬰陽王十九年百濟武王九年隋大業四年新羅王患高句麗屢侵封疆欲請隋兵以征敵國命圓光法師修乞師表光曰求自存而滅他非沙門之行也然貧道在大王之土地費大王之衣食敢不唯命是從乃述以聞釋圓光傳癸酉二十五年高句麗嬰陽王二十四年百濟武王十四年隋大業九年秋七月隋使王世儀至新羅皇龍寺設百高座邀僧圓光等說經丁丑三十九年高句麗嬰陽王二十八年百濟武王十八年隋大業十三年新羅元曉大師生于押梁郡佛地村栗谷娑羅樹下師俗姓薛氏小名誓幢初母夢流星入懷因而有娠將産五色雲覆地生而穎異學不從師元曉傳備考聖師元曉俗姓薛氏祖仍皮公亦云赤大公今赤大淵側有仍皮公廟父談㮏乃末初示生于押梁郡南今章山郡佛地村北栗谷裟羅樹下村名佛地或作發智村俚云佛等乙村裟羅樹者諺云師之家本住此谷西南母既娠而月滿適過此谷栗樹下忽分産而倉皇不能歸家且以夫衣掛樹而寢處其中因號樹曰裟羅樹其樹之實亦異於常至今稱裟羅栗古傳昔有主寺者給寺奴一人夕饌栗二枚奴訟于官官吏怪之取栗檢之一枚盈一鉢乃歸判給一枚故因名栗谷師既出家捨其宅為寺名初開樹之旁置寺曰裟羅師之行狀云是京師人從祖考也唐僧傳云本下湘州之人按麟德二年間文武王割上州下州之地置歃良州則下州乃今之昌寧郡也押梁郡本下州之屬縣上州則今尚州亦作湘州也佛地村今屬慈仁縣則乃押梁之所分開也師生小名誓幢第名祈幢幢者俗云毛也初母夢流星入懷因而有娠及將産有五色雲覆地真平王三十九年大業十三年丁丑歲也生而穎異學不從師其遊方始末弘通茂跡具載唐傳與行狀不可具載唯鄉傳所記有一二段異事師嘗一日風顛唱街云誰許沒柯斧我斫支天柱人皆未喻時太宗聞之曰此師殆欲得貴婦産賢子之謂爾國有大賢利莫大焉時瑤石宮今學院是也有寡公主敕宮吏覔曉引入宮吏奉敕將求之已自南山來過蚊川橋沙川俗云年川又蚊川又橋名榆橋也遇之佯墮水中濕衣袴吏引師於宮褫衣曬因留宿焉公主果有娠生薛聰聰生而睿敏博通經史新羅十賢中一也以方音通會華夷方俗物名訓解六經文學至今海東業明經者傳受不絶曉既失戒生聰已後易俗服自號卜姓居士他本作小性居士偶得優人舞弄大瓠其狀瑰奇因其形製為道具以華嚴經一切無礙人一道出生死命名曰無礙仍作歌流于世嘗持此千村萬落且歌且舞化詠而歸使桑樞瓮牖玃猴之輩皆識佛陀之號咸作南無之稱曉之化大矣哉其生緣之村名佛地寺名初開自稱元曉者蓋初輝佛日之意爾元曉亦是方言也當時人皆以鄉言稱之始旦也曾住芬皇寺纂華嚴疏至第四十回向品終乃絶筆又嘗因訟分軀於百松故皆謂位階初地矣亦因海龍之誘承詔於路上撰三昧經疏置筆硯於牛之兩角上因謂之角乘亦表本始二覺之微旨也大安法師排來而粘紙亦知音唱和也既入寂聰碎遺骸塑真容安芬皇寺以表敬慕終天之志聰時旁禮像忽回顧至今猶顧矣曉嘗所居穴寺旁有聰家之墟云贊曰角乘初開三昧軸舞壺終掛萬街風月明瑤石春眠去門掩芬皇顧影空三國遺事宋高僧傳贊寧撰載唐新羅國黃龍寺元曉傳云釋元曉姓薛氏東海湘州人也卯䰂之年惠然入法隨師稟業遊處無恆勇擊義圍雄橫文陳仡仡然桓桓然進無前却蓋三學之淹通彼土謂為萬人之教精義入神為若此也嘗與湘法師入唐慕奘三藏慈思之門厥緣既差息心遊往無何發言狂悖示跡乖踈同居士入酒肆倡家若志公持金刀鐵錫或製疏以講雜華或撫琴以樂祠宇或閭閻寓宿或山水坐禪任意隨機都無定檢時國王置百座仁王經大會遍搜碩德本州以名望舉進之諸德惡其為人譖王不納居無何王之夫人腦嬰癰腫醫士絶驗王及王子臣屬禱請山川靈祠無所不至有巫覡言曰苟遣人往他國求藥是疾方瘳王乃發使泛海入唐募其醫術溟漲之中忽見一翁由波濤躍出登舟邀使人入海覩宮殿嚴麗見龍王名鈐海謂使者曰汝國夫人是青帝第三女也我宮中先有金剛三昧經乃二圓覺通示菩薩行也今托仗夫人之病為增上緣欲附此經出彼國流布耳於是將三十來紙重沓散經付授使人復曰此經渡海中恐羅魔事王令持刀裂使人腨腸而內于中用蠟紙纏藤以藥傳之其腨如故龍王言可令大安聖者銓次綴縫請元曉法師造疏講釋之夫人疾愈無疑假使雪山阿伽陀藥力亦不過是龍王送出海面遂登舟歸國時王聞而歡喜乃先召大安聖者黏次焉大安者不測之人也形狀特異恆在市擊銅鉢唱大安大安之聲故號之也王命安安云但將經來不願入王宮闕安得經排來成八品皆合佛意安曰速將付元曉講餘人則否曉受斯經正在本生湘州也謂使人曰此經以本始二覺為宗為我備角乘將案几在兩角之間置其筆硯始終于牛車造疏成五卷王請剋日於黃龍寺敷演時有薄徒竊盜新疏以事白王延于三日重録成三卷號為略疏洎乎王臣道俗雲擁法堂曉乃宣吐有儀解紛可則稱揚彈指聲沸于空曉復昌言曰昔日採百椽時雖不預會今朝橫一棟處惟我獨能時諸名德俯顏慙色伏膺懺悔焉初曉示跡無恆化人不定或擲盤而救衆或噀水而撲焚或數處現形或六方告滅亦杯渡志公之倫歟其於解性覽無不明矣疏有廣略二本俱行本土略本流入中華後有翻經三藏改之為論焉系曰海龍之宮自何而有經本耶通曰經云龍王宮殿中有七寶塔諸佛所說諸經深義別有七寶篋滿中盛之謂十二因緣總持三昧等良以此經合行世間復現大安曉公神異乃使夫人之疾為起教之大端者也庚辰四十二年高句麗榮留王三年百濟武王二十一年唐武德三年新羅義湘法師示生是年安弘法師與西域三藏毗摩羅真諦農伽陀佛陀僧伽等及漢僧二人至自唐住皇龍寺譯出栴檀香火星光妙女經鄉僧曇和筆受備考海東高僧傳云釋安含俗姓金詩賦伊餐之孫也生而覺悟性乃沖虛毅然淵懿之量莫窮涯畛嘗浪志遊方觀風弘化真平二十二年約與高僧惠宿為伴擬將乘桴泛泥浦津過涉島之下忽值風浪回泊此濱明年有旨簡差堪成法器者入朝學問遂命法師允當行矣乃與聘國使同舟涉海遠赴天庭天王引見皇情大悅敕配於大興聖寺居住旬月之間洞解玄旨中略越二十七年爰與于闐沙門毗摩真諦沙門農伽陀等俱來至此西域胡僧直到雞林蓋自茲也又崔致遠所撰義湘傳云湘真平建福四十二年受生是年東方聖人安弘法師與西國三三藏漢僧二人至自唐注云北天竺烏萇國毗摩羅真諦年四十四農伽陀年四十六摩豆羅國佛陀僧伽年四十六經由五十二國始到漢土遂東來住皇龍寺譯出栴檀香火星光妙女經鄉僧曇和筆受未幾漢僧上表乞還中國王許而送之則安含殆和尚是也又按新羅本記真興王三十七年安弘入陳求法與胡僧毗摩羅等三人回上楞伽勝鬘經及佛舍利自真興末至真平建福相去幾五十年何三藏來之前却如是或恐安含安弘實有二人然其所與三藏不殊而厥名不殊今合而立傳又未詳西國三藏去留所終和尚返國以後作讖書一卷中略皆懸言遙記的如目覩了無差脫善德王九年九月二十三日終于萬善道場享年六十二是月鄉使從漢而回邂逅法師敷座于碧浪之上怡然向西而去真所謂騰空步階坐水行地者矣翰林薛某奉詔撰碑其銘云后葬忉利建天王寺怪鳥夜鳴兵衆且殪王子渡關入朝聖顏五年為限三十而還浮沈輪轉彼我奚免年六十二終于萬善使還海路師亦交遇端坐水上指西以歸庚寅五十二年高句麗榮留王十三年百濟武王三十一年唐貞觀四年佛紀一六五七年新羅圓光法師入寂備考唐續高僧傳第十三卷載新羅皇隆寺釋圓光俗姓朴氏本住三韓卞韓辰韓馬韓光即辰韓人也家世海東祖習綿遠而神器恢廓愛染篇章校獵玄儒討讎子史文華騰翥於韓服博贍猶愧於中原遂割略親朋發憤溟渤年二十五乘舶造于金陵有陳之世號稱文國故得咨考先疑詢猷了義初聽莊嚴旻公弟子講素霑世典謂理窮神及聞釋宗反同腐芥虛尋名教實懼生涯乃上啓陳主請歸道法有敕許焉既爰初落采即稟具戒遊歷講肆具盡嘉謀領牒微言不謝光景故得成實涅槃蘊括心府三藏釋論遍所披尋末又投吳之虎丘山念定相沿無忘覺觀息心之衆雲結林泉並以綜涉四含功流八定明善易擬簡直難虧深副夙心遂有終焉之慮於是頓絶人事盤遊聖迹攝想青霄緬謝終古時有信士宅居山下請光出講固辭不許苦事邀延遂從其志創通成論末講般若皆思解佼徹嘉問飛移兼䋴以絢采織綜詞義聽者欣欣會其心府從此因循舊章開化成任每法輪一動輒傾注江湖雖是異域通傳而沐道頓除嫌郤故名望橫流播于嶺表披榛負橐而至者相接如鱗會隋后御宇威加南國曆窮其數軍入楊都遂被亂兵將加刑戮有大主將望見寺塔火燒走赴救之了無火狀但見光在塔前被縛將殺既怪其異即解而放之斯臨危達感如此也光學通吳越便欲觀化周秦開皇九年來遊帝宇值佛法初會攝論肇興奉佩文言振績微緒又馳慧解宣譽京庫績業既成道東須繼本國遠聞上啓頻請有敕厚加勞問放歸桑梓光往還纍紀老幼相欣新羅王金氏面申虔敬仰若聖人光性在虛間情多泛愛言常含笑慍結不形而箋表啓書往還國命並出自胸襟一隅傾奉皆委以治方詢之道化事異錦衣請同觀國乘機敷訓垂範于今年齒既高乘輿入內衣服藥食並王手自營不許佐助用希專福其感敬如此類也將終之前王親執慰囑纍遺法兼濟斯民為說徵祥被于海曲以彼建福五十八年少覺不念經于七日遺誡清切端坐終于所住皇隆寺中春秋九十有九即唐貞觀四年也當終之時寺東北虛中音樂滿空異香充院道俗悲慶知其靈感遂葬于郊外國給羽儀葬具同於王禮後有俗人兒胎死者彼土諺云當於有福人墓側埋之種胤不絶乃私瘞於墳側當日震此胎尸擲于塋外由此不懷敬者率崇仰焉有弟子圓安神志機穎性希歷覽慕仰幽求遂北趣九都東觀不耐又西赴燕魏後展帝京備通方俗尋諸經論跨轢大綱洞清纖旨晚歸心學高軌光塵初住京寺以道素有聞特進蕭瑀奏請住於藍田所造津梁寺四事供給無替六時矣安嘗敘光云本國王染患醫治不損請光入宮別省安置夜別二時為說深法受戒懺悔王大信奉一時初夜王見光首金色晃然有象日輪隨身而至王后官女同共覩之由是重發勝心克留疾所不久遂差光於辰韓馬韓之間盛通正法每歲再講匠成後學襯施之資並充營寺餘唯衣鉢而已善德女主金德曼在位十三年甲午三年高句麗榮留王十七年百濟武王三十五年唐貞觀八年新羅芬皇寺成乙未四年高句麗榮留王十八年百濟武王三十六年唐貞觀九年新羅靈妙寺成良志法師書其額高僧明朗自唐還丙申五年高句麗榮留王十九年百濟武王三十七年唐貞觀十年春三月新羅主疾病設百高座於皇龍寺講仁王經度僧百人是年高僧慈藏入唐求法參考善德王德曼遘疾彌留有興輪寺僧法暢應詔侍疾久而無效時有密本法師以德行聞於國左右請代之王詔迎入內本在宸仗外讀藥師經卷軸才周所持六環飛人寢內刺一老狐與法暢倒擲庭下王疾乃瘳時本頂上發五色神光覩者皆驚又丞相金良圖為阿孩時忽口噤體硬不言不遂每見一大鬼率羣小鬼來家中凡有盤肴皆啖嘗之巫覡來祭則羣聚而爭侮之圖雖欲命撤而口不能言家親請法流寺僧亡名來轉經太鬼命小鬼以鐵捶打僧頭仆地嘔血而死隔數日遣使邀本使還言本法師受我請將來矣衆鬼聞之皆失色小鬼曰法師至將不利避之何幸大鬼悔慢自若曰何害之有俄而有四方大力神皆屬金甲長戟來捉羣鬼而縛去次有無數天神環拱而待須臾本至不待開經其疾乃治語通身解具說件事良圖因此篤信釋氏一生無怠塑成興輪寺吳堂主彌陀尊像左右菩薩并滿金畫其堂本嘗住金谷寺又金庚信嘗與一老居士交厚世人不知其何人于時公之戚秀天久染惡疾公遣居士診衛適有秀天之舊名因惠師者自中嶽來訪之見居士而慢侮之曰相汝形儀邪侫人也何得理人之疾居士曰我受金公命不獲已爾惠曰汝見我神通乃奉爐呪香俄頃五色雲旋繞頂上天花散落士曰和尚通力不可思議弟子亦有拙技請試之願師乍立於前惠從之士彈指一聲惠倒迸於空高一丈許良久徐徐倒下頭卓地屹然如植橛旁人推挽之不動士出去惠猶倒卓達曙明日秀天使扣於金公公遣居士往救乃解因惠不復賣技贊曰紅紫紛紛幾亂朱堪嗟魚目誑愚夫不因居士輕彈指多少巾箱襲碔玞三國遺事癸卯十二年高句麗寶藏王二年百濟義慈王三年唐貞觀十七年佛紀一六七年春三月新羅高僧慈藏自唐還貞觀年中新羅高僧阿離那跋摩惠業玄泰求本玄恪惠輪玄遊及二失名僧等相繼入唐自唐轉入西域求法皆不得還海東高僧傳乙巳十四年高句麗寶藏王四年百濟義慈王五年唐貞觀十九年佛紀一六七二年新羅皇龍寺九層塔成從沙門慈藏之請也參考三國遺事云海東名賢安弘撰東都成立紀云新羅第二十七代女王為主雖有道無威九韓侵苦龍宮皇龍寺建九層塔則鄰國之災可鎮第一層日本第二層中華第三層吳越第四層托羅亦云乇羅第五層鷹遊第六層靺鞨第七層丹國第八層女狄第九層濊貊丁未十六年高句麗寶藏王六年百濟義慈王七年唐貞觀二十一年佛紀一六七四年新羅女主德曼薨葬于狼山主平日預言死期且曰葬我於忉利天謂後來四天王寺之地即狼山也主見畫牧丹而知其無香之花初唐帝賜牧丹花圖并花子真平王以示德曼德曼曰此花必無香氣王笑曰爾何以知之對曰此花絶艷而畫無蜂蝶是必無香種其子果如其言聞蛙聲而知有伏兵並為知幾三事真德女主金勝曼在位九年己酉三年高句麗寶藏王八年百濟義慈王九年唐貞觀二十三年春正月新羅始依華制為冠服從沙門慈藏之言也備考大德慈藏金氏本辰韓真骨蘇判三級爵名茂林之子其父歷官清要絶無後胤乃歸心三寶造于千部觀音希生一息祝曰若生男子捨作法海津梁母忽夢星墜入懷因有娠及誕與釋尊同日名善宗郎神志澄睿文思日贍而無染世趣早喪二親轉厭塵譁捐妻息捨田園為元寧寺獨處幽險不避狼虎修枯骨觀微或倦弊乃作小室周障荊棘裸坐其中動輒針刺頭懸在梁以祛昏瞑適台輔有闕門閥當議纍徵不赴王乃勑曰不就斬之藏聞之曰吾寧一日持戒而死不願百年破戒而生事聞王許令出家乃深隱岩叢糧粒不恤時有異禽含果來供就手而喰俄夢天人來授五戒方始出谷鄉邑士女爭來受戒藏自嘆邊生西希大化以仁平三年丙申歲即貞觀十年也受勑與門人僧實等十餘輩西入唐謁清凉山山有曼殊大聖塑相彼國相傳云帝釋天將工來雕也藏於像前禱祈冥感夢像摩頂授梵偈覺而未解及旦有異僧來釋云又曰雖學萬教未有過此文以袈裟舍利等付之而滅藏公初匿之故唐僧傳不載藏知已蒙聖莂乃下北臺抵大和池入京師太宗敕使慰撫安置勝光別院寵賜頻厚藏嫌其繁擁啓表入終南雲際寺之東崿架嵓為室居三年入神受戒靈應日錯辭煩不載智異山華巖寺藏本云師與門人僧實等十餘輩入唐謁終南山雲際寺圓香國師國師謂之曰汝國縱橫烽燧日役干戈黎氓塗炭無以為歸汝今此往可以立塔立寺以鎮東方山水之逆云云既而再入京又蒙敕慰賜絹二百匹用資衣費貞觀十七年癸卯本國善德王上表乞還詔許引入宮賜絹一領高僧傳絹作納蓋納衲音通雜綵五百端東宮亦賜二百端又多禮貺藏以本朝經像未充乞齎藏經一部洎諸幡幢花蓋堪為福利者皆載之既至洎舉國攸迎命住芬皇寺唐傳作王芬寺給侍稠渥一夏請至宮中講大乘論又於皇龍寺演菩薩戒本七日七夜天降甘澍僧傳澍作露雲霧暗暗奄音通靄覆所講堂四衆咸服其異朝廷議曰佛教東漸雖百千齡其於住持修奉軌儀闕如也非夫綱理無以肅清啓敕藏為大國統凡僧尼一切規猷總委僧統主之藏值斯嘉會勇邀弘通令僧尼五部各增舊學半月說戒冬春總試令知持犯置員管維持之又遣巡使歷檢外寺誡礪僧失嚴飾經像為恆式一代護法於斯盛矣如夫子自衛返魯樂正雅頌各得其宜當此之際國中之人受戒奉佛十室八九祝髮請度歲月增至乃創通度寺築戒壇以度四來又改營生緣里第元寧寺設落成會講雜花方偈感五十二女現身證聽使門人植樹如其數以旌厥異因號知識樹嘗以邦國服章不同諸夏舉議於朝僉允曰臧乃以真德王三年己酉始服中朝衣冠明年庚戌又奉正朔始行永徽號自後每有朝覲列在上藩藏之功也暮年謝辭京輦於江陵郡本溟州也創水多寺居焉復夢真僧狀北臺所見來告曰明日見汝於大松汀驚悸而起早行至松汀果感文殊來格咨詢法要乃曰重期於太白葛蟠地遂隱不現松汀至今不生荊棘而亦不棲鷹鷓之類云藏往太白山尋之見巨蟒蟠結樹下謂侍者曰此所謂葛蟠地乃創石南院今淨岩寺以候聖降粵有老居士方袍縷荷葛簣盛死狗兒來謂侍者曰欲見慈藏來爾門者曰自丱巾未見忤犯吾師諱者汝何人斯爾狂言乎居士曰但告汝師遂入告藏不之覺曰殆狂者耶門人出詬逐之居士曰歸歟歸歟有我相者焉得見我乃倒簣拂之狗變為獅子寶座升坐放光而去藏聞之方具威儀尋光趨登南嶺已杳然不及遂殞容而卒茶毗安骨於石穴中凡藏之締搆寺塔十有餘所每一興造必有異祥故蒲塞供填市不日而成藏之道具布襪并太和龍所獻木鴨枕別本以木鴨枕為西海龍所獻與釋尊由衣等合在通度寺又巘陽縣今彥陽有鴨遊寺枕鴨嘗於此現異故名之又有釋圓勝者先藏西學而同還桑梓助弘律部云贊曰曾向清涼夢破回七篇三趣一時開欲令緇素衣慚愧東國衣冠上國裁三國遺事海東佛祖源流云師有弟子三人僧實祖日穀成參考續高僧傳唐南山律師道宣撰釋慈藏姓金氏新羅國人其先三韓之後也中古之時辰韓馬韓卞韓率其部屬各有魁長案梁貢職圖其新羅國魏曰斯盧宋曰新羅本東夷辰韓之國矣藏父名武林官至蘇判異以本王族比唐一品既嚮高位籌議攸歸而絶無後嗣幽憂每積素仰佛理乃求加護廣請大捨歸心佛法并造千部觀音希生一息後若成長願發道心度諸生類冥祥顯應夢星墜人懷因即有娠以四月八日誕載良辰道俗銜慶希有瑞也年過小學神睿澄蘭獨拔恆心而於世數史籍略皆周覽情意漠漠無心染趣會二親俱喪轉厭世華深體無常終歸空寂乃捐捨妻子第宅田園隨須便給行悲敬業孑爾隻身投於林壑粗服草屩用卒餘服遂登峭隘獨靜行禪不避虎兕常思難施時或弊睡心行將徵遂居山室周障棘刺露身直坐動便刺肉懸髮在梁用祛昏漠修白骨觀轉向明利而冥行顯被物望所歸位當宰相頻徵不就王大怒敕往山所將加手刃藏曰吾寧持戒一日而死不願一生破戒而生使者見之不敢加刃以事上聞王愧服焉放令出家任修道業即又深隱外絶來往糧粒固窮以死為命便感異鳥各銜諸果就手送與鳥於藏手就而共食時至必爾初無乖候斯行感玄徵罕有聯者而常懷戚戚慈念含識作何方便令免生死遂於眠寐見天使告曰卿在幽隱欲為何利藏曰惟為利益衆生乃授藏五戒訖曰可將此五戒利益衆生又告藏曰吾從忉利天來故授汝戒因騰空滅於是出山一月之間國中士女咸受五戒又深思惟曰生在邊壤佛法未弘自非目驗無由承奉乃啓本王西觀大化以貞觀十二年將領門人僧實等十有餘人東辭至寺蒙敕慰撫置勝光別院厚禮殊供人物繁擁財事既積便來外盜賊者將取心戰自驚返來露過便授其戒有患生盲詣藏陳懺後還得眼由斯祥應從受戒者日有千計性樂栖靜啓敕入山於終南雲際寺東懸崿之上架室居焉旦夕人神歸戒又集時染少疹見受戒神為摩所苦尋即除愈往還三夏常在此山將事東藩辭下雲際見大鬼神其衆無數帶甲持仗云將此金輿迎取慈藏云復見大神與之共鬪拒不許迎藏聞臭氣塞谷蓬勃即就繩床通告訣別其一弟子又被鬼打躃死乃蘇藏即捨諸衣財行僧德施又聞香氣遍滿身心神語藏曰今者不死八十餘矣既而入京蒙敕慰問賜絹二百匹用充衣服貞觀十七年本國請還啓敕蒙許引藏入室賜衲一領雜綵五百段東宮賜二百段仍於弘福寺為國設大齊大德法集并度八人又敕太常九部供養藏以本朝經像雕落未全遂得藏經一部并諸妙像幡花蓋具堪為福利者賫還本國既達鄉里仰國來迎一代佛法於是興顯王以藏景仰大國弘持正教非夫綱理無以肅清乃敕藏為大國統住王芬寺此芬皇寺之誤寺即王之所造又別築精院別度十人恆充給侍又請入宮一夏講攝大乘論既又於皇龍寺講菩薩戒本七日七夜天降甘露雲霧奄靄覆所講堂四部興嗟聲望彌遠及散席日從受戒者其量雲從因之革厲十室而九藏屬斯嘉運勇鋭由來所有衣資并充檀捨惟事頭陀蘭若綜業正以青丘佛法東漸百齡至於住持修奉蓋闕乃與諸宰伯祥評紀正時王從上下僉議攸歸一切佛法須有規猷正委僧統藏令僧尼五部各增舊習更置綱管監察維持半月說戒依律懺除春冬總試令知持犯又置巡使遍歷諸寺誡勵說法嚴飾佛像營理衆業鎮以為常據斯以言護法菩薩即斯人矣又別造寺塔十有餘所每一興建合國俱崇藏乃發願曰若所造有靈希現異相便感舍利在諸巾鉢大衆悲慶積施如山便為受戒行善遂廣又以習俗服章中華有華義惟歸崇正朔義豈二心以事商量舉國咸遂通改邊服一惟唐儀所以每年朝集位在上藩任官遊踐並同華夏據事以量通古難例撰諸經戒疏十餘卷出觀行法一卷盛流彼國有沙門圓勝者本族辰韓清慎僧也以貞觀初年來儀京輦遍陶法肆聞持鏡曉志存定攝護法為心與藏齊襟秉維城塹及同返國大敞行道講開律部惟其光肇自昔東藩有來西學經術雖聞無行戒檢緣搆既重今則三學備焉是知通法護法代有斯人中濁邊清於斯驗矣武烈王金春秋在位七年乙卯二年高句麗寶藏王十四年百濟義慈王十五年唐永徵六年佛紀一六八二年新羅金歆運與百濟戰死之實際寺僧道玉亦從軍戰死歆運奈勿王八世孫少遊花郎文弩之門徒衆有言及戰死留名者歆運為之慨然流涕有激勵思齊之志同門僧轉密曰此人若赴敵必不還也有驟徒者嘗為僧即實際寺僧道玉也至是語其徒曰吾聞佛者上則精術業以復性次則起道用以益他我形桑門無一善可取不如從軍殺身以報國乃著戎服改名驟徒詣兵部請從軍及戰突陳力鬪亦死之己未六年高句麗寶藏王十八年百濟義慈王十九年唐顯慶四年佛紀一六八六年新羅創壯義寺於漢山州以資前戰士長春郎罷郎之冥福辛酉八年高句麗寶藏王二十年唐龍朔元年佛紀一六八八年春高句麗靺鞨合兵圍新羅北漢山城攻擊浹旬城中危懼新羅將金庾信曰人力既渴陰助可資詣佛寺設壇祈禱忽有大星落於賊營又雷雨震擊賊等疑駭解圍而遁皆謂至誠所感也金庾信傳金庾信奉新羅王命會唐兵伐高句麗行至縣鼓岑之岫寺齊戒閉門獨坐焚香纍日夜而出私自喜曰今行得不死矣海東名將傳古記云總章元年戊辰此誤也乃龍朔二年壬戌之事也斯羅王欲興師會唐兵時新羅所請之唐兵屯于平壤郊而通書徵糧金庾信金仁問等率兵入高句麗境輪糧庾信先遣人問其會期唐帥蘇定方紙畫犢鸞二物回之國人未解其意使問於元曉法師解之曰速還其兵謂畫犢畫鸞二切也於是庾信回軍三國遺事文武王金法敏在位二十年甲子四年高句麗寶藏王二十三年唐麟德元年佛紀一六七一年新羅禁人擅施財貨土田于佛寺乙丑五年高句麗寶藏王二十四年唐麟德二年佛紀一六七二年新羅高僧惠通入唐傳善無畏三藏印訣而還備考釋惠通氏族未詳白衣之時家在南山西麓銀川洞之口今南澗寺東里一日遊舍東溪上捕一獺屠之棄骨園中詰旦亡其骨跡血尋之骨還舊穴抱五兒而蹲郎望見驚異久之感歎蹰躇便俗出家易名惠通往唐謁無畏三藏請業藏曰嵎夷之人豈堪法器遂不開授通不堪輕謝去服勤三載猶不許通乃憤悲立於庭頭戴火盆須臾頂裂聲如雷藏聞來視之撤火盆以按裂處誦神呪瘡合如平日有瑕如王字文因號王和尚深器之傳印訣時唐時有公主疾病高宗請救於三藏舉通自代通受教別處以白豆一斗呪銀器中變白甲神兵逐崇不克又以黑豆一斗呪金器中變黑甲神兵令二色合逐之忽有蛟龍走出疾遂瘳龍怨通之逐己也來本國文仍林害命尤毒是時鄭恭奉使於唐見通而謂曰師所逐毒龍歸本國害甚速去除之乃與恭以麟德二年乙丑還國而黜之龍又怨恭乃托之柳生鄭氏門外恭不之覺但賞其蔥密酷愛之及神文王崩孝昭即位修山陵除葬路鄭氏之柳當道有司欲伐之恭恚曰寧慚我頭莫伐此樹有司奏聞王大怒命司寇曰鄭恭恃王和尚神術將謀不遜忤逆王命言斬我頭宜從所好乃誅之坑其家朝議王和尚與恭甚厚應有忌嫌宜先圖之乃徵甲尋捕通在王望寺見甲徒至登屋携砂瓶研朱筆而呼曰見我所為乃於瓶項抹一畫曰爾輩宜各見項視之皆朱畫相視愕然又呼曰若斷瓶項應斷爾項如何其徒奔走以朱項赴王王曰和尚神通豈人力所能圖乃捨之王女忽有疾詔通治之疾愈王大悅通因言恭被毒龍之污濫膺國刑王聞之心悔乃免恭妻孥拜通為國師龍既報冤於恭往機張山為熊神慘毒滋甚民多梗之通到山中諭龍授不殺戒神害乃息初神文王發疽背請候於通通至呪之立治乃曰陛下為宰官身誤决臧人信忠為𨽻信忠有怨生生作報今茲惡疽亦信忠所崇宜為忠創伽藍奉冥祐以解之王深然之創寺號信忠奉聖寺寺成空中唱云因王創寺脫苦生天怨已解矣或本載此事於真表傳中誤也因其唱地置折怨堂堂與寺今存先是密本之後有高僧明朗入龍宮得神印梵云文豆婁此云神印祖創神遊林今天王寺屢禳鄰國之寇今和尚傳無畏之髓遍歷塵寰救人化物兼以宿命之明創寺雲怨密教之風於是乎大振天磨之總持嵓母嶽之呪錫院等皆其流裔也或云通俗名尊勝角干角干乃新羅之宰相峻級未聞通歷仕之迹或云射得豺狼皆未詳贊曰山桃溪杏映籬斜一徑春深兩岸花賴得郎君間捕獺盡教魔外遠京華三國遺事已巳九年唐總章二年春正月以僧信惠為政官大書省唐帝遣僧法安來求磁石庚午十年唐咸亨元年佛紀一六九七年夏六月故高句麗大兄劒牟岑殺唐僧法安於浿江劒牟岑立高臧寶藏王外孫安勝為王欲圖興復收合殘民至浿江殺唐官人及僧法安等高僧義湘自唐還湘於永徽初年寓載唐使船入唐至終南山至相寺師智儼和尚學華嚴教觀至是始還辛未十一年唐咸亨二年佛紀一六九八年秋七月唐總管薛仁貴遣僧林潤致書於王甲戌十四年唐上元元年佛紀一七一年秋七月大風毀皇龍寺佛殿九月以僧義安為大書省丙子十六年唐儀鳳元年佛紀一七三年春二月王命僧義湘創浮石寺于太白山備考法師義湘考曰韓信金氏年二十九依京師皇福寺落髮未幾西圖觀化遂與元曉道出遼東邊戌邏之為諜者囚閉者纍旬僅免而還事在崔候本傳及曉師行狀等永徽初會唐使船有西還者寓載入中國初止楊州州將劉至仁請留衙內供養豐贍尋往終南山至相寺謁智儼儼前夕夢一大樹生海東枝葉溥布來蔭神州上有鳳巢登視之有一摩尼寶珠光明屬遠覺而驚異灑掃而待湘乃至殊禮迎際從容謂曰吾昨者之夢子來投我之兆許為入室雜花妙旨剖析幽微儼喜逢郢質克發新致可謂鉤深索隱藍茜沮本色既而本國承相金欽純一作仁問良圖等往囚於唐高宗將大舉東征欽純等密遣湘誘而先之以咸亨元年庚午還國聞事於朝命神印大德明朗假設密壇法禳之國乃免禍儀鳳元年湘歸太白山奉朝旨創浮石寺敷敞大乘靈感頗著終南門人賢首撰搜玄疏送副本於湘處并奉書勤懇曰西京崇福寺僧法藏致書於海東新羅華嚴法師侍者一從分別二十餘年傾望之誠豈離心首加以烟雲萬里海陸千重恨此一身不復再面懷抱戀戀夫何可言故由夙世同因今生同業得於此報俱沐大經特蒙先師授茲奧典仰承上人歸鄉之後開演華嚴宣揚法界無礙緣起重重帝網新新佛國利益弘廣喜躍增深是知如來滅後光輝佛日再轉法輪令法久住者其唯法師矣藏進趣無成周旋寡况仰念茲典愧荷先師隨分受持不能捨離希憑此業用結來因但以和尚章疏義豐文簡致令後人多難趣入是以謹録和尚微言妙旨勒成義記近因勝詮法師抄寫還鄉傳之彼土請上人詳檢臧否幸示針誨伏願當當來世捨身受身相與同於盧舍那聽受如此無盡妙法修行如此無量普賢願行儻餘惡業一朝顛墜伏希上人不遺宿昔在諸趣中示以正道人信之次時訪存歿不具文載大覺文類別幅云探玄記二十卷教分記三卷玄義章等雜義一卷華嚴梵語一卷起信疏兩卷十二門疏一卷法界無差別論疏一卷并因勝詮法師抄寫還鄉頃新羅僧孝忠遺金九分云是上人所寄雖不得書頂荷無盡今附西國澡罐一口用表微誠幸願檢領謹宣云云湘乃令十剎傳教太白山浮石寺原州毗摩羅伽倻之海印毗瑟之玉泉金井之梵魚南嶽智異山也華嚴寺等是也又著法界圖書印并略疏括盡一乘樞要千載龜鏡競所珍佩餘無撰述嘗鼎味一臠足矣圖成於總章元年戊辰是年儼亦歸寂如孔氏之絶筆於獲麟矣世傳湘乃金山寶蓋之幻有也徒弟悟真智通表訓真定真藏道融良圓相源能仁義寂等十大德為領袖皆亞聖也各有傳真嘗處下柯山鶻嵓寺每夜伸臂點浮石室燈通著錐洞記蓋承親訓故辭多妙詣按續藏經目録有華嚴經文義要决問答四卷新羅表員集蓋表員是表訓之訛也又有梵網經菩薩戒本疏三卷新羅義寂述訓曾住佛國寺常往來天宮按景德王傳王玉莖長八寸先妃無子廢之封沙梁夫人後妃滿月夫人諡景垂太后依忠角于之女也王一日詔表訓大德曰朕無祐不獲其嗣願大德請於上帝而有之訓上告於天帝還來奏云帝有言求女即可男即不宜王曰願轉女成男訓再上天請之帝曰可則可矣然為男則國殆矣訓欲下時帝又召曰天與人不可亂今師往來如鄰里漏泄天機今後宜更不通訓來以天語論之王曰國雖殆得男而為嗣足矣於是滿月王后生太子王喜甚至八歲王崩太子即位是為惠恭王幼冲故太后臨朝政條不理盜賊蜂起不遑備禦訓師之說驗矣小帝既女為男故自期睟至於登位常為婦女之戲好佩錦囊與道流為戲故國有大亂終為宣德與金良相所弒自表訓後聖人不生於新羅云源住皇福寺時與徒衆繞塔每步虛而上不以階升故其塔不設梯磴其徒離階三尺履空而旋湘乃顧謂曰世人見此必以為怪不可以訓世餘如崔侯所撰本傳贊曰披榛跨海冒烟塵至相門開接瑞珍采采雜花還故國終南太白一般春參考宋高僧傳釋義湘俗姓朴氏雞林府人也生且英奇長而出離逍遙入道性則天然年臨弱冠聞唐土教宗鼎盛與元曉法師同志往西遊行至本國海門唐州界計求巨艦將越滄波倐於中途遭其苦雨遂依道傍土龕間隱身所以避飄濕焉逮乎明朝相視乃古墳骸骨旁也天猶霡沐地且泥塗尺寸難前逗留不進又寄埏甓之中夜之未央俄有鬼物為怪曉公歎曰前之寓宿謂土龕而且安此夜留宵託鬼鄉而多崇則知心生故種種法生心滅故龕墳不二又三界惟心萬法惟識心外無法胡用別求我不入唐却携囊返國湘乃隻影孤征誓死無退以總章二年附商船達登州岸分衛到一信士家見湘容色挺拔留連門下既久有少女麗服靚粧名曰善妙巧媚誨之湘之心石不可轉也女調不見答頓發道心於前矢大願言生生世世歸命和尚習學大乘成就大事弟子女為檀越供給資緣湘乃徑趨長安終南山智儼三藏所綜習華嚴經時康藏國師為同學也所謂知微知章有倫有要德瓶云滿藏海嬉遊乃議回程傳法開誘復至文登舊檀越家謝其數稔供施便募商船逡巡解纜其女善妙預為湘辦集法服并諸什器可盈篋笥運臨海岸湘船已遠其女呪之曰我本實心供養法師願是衣篋跳入前船言訖投篋于駭浪有頃疾風吹之若鴻毛耳遙望徑跳入船矣其女復誓之我願是身化為大龍扶翼軸艫到國傳法於是攘袂投身于海將知願力難屈至誠感神果然伸形夭矯或躍蜿蜓其舟底寧達于彼岸湘入國之後遍歷山川於駒麗百濟風馬牛不相及地曰此中地靈山水真轉法輪之所無何權宗異部聚徒可半千衆矣湘默作是念大華嚴教非福善之地不可興焉時善妙龍恆隨作護潛知此念乃現大神變於虛空中化成巨石縱廣一里蓋于伽藍之頂作將墜不墜之狀羣僧驚駭罔知攸趣四面奔散湘遂入寺中敷闡斯經冬陽夏陰不召自至者多矣國王欽重以田莊奴僕施之湘言於王曰我法平等高下共均貴賤同揆涅槃經八不淨財何莊田之有何奴僕之為貧道以法界為家以盂耕待稔法身慧命藉此而生矣湘講樹開花談叢結果登堂覩奧者則智通表訓梵體道身等數人皆啄巨㲉飛出迦留羅鳥焉湘貴如說行講宣之外精勤修練莊嚴剎海靡憚暄涼又常行義淨洗穢法不用巾帨立期乾燥而止持三法衣瓶鉢之餘曾無他物凡弟子請益不敢造次伺其怡寂而後啓發湘乃隨疑解滯必無滓核自是以來雲遊不定稱可我心卓錫而居學侶蜂屯或執筆書紳懷鉛扎葉抄如結集録似載言如是義門隨弟子為目如云道身章是也或以處為名如云錐穴問答等數章疏皆明華嚴性海毗盧遮那無邊契經義例也湘終于本國號海東華嚴初祖也己卯十九年唐調露元年佛紀一七六年創四天王寺於狼山從瑜珈法師明朗之言以禳唐兵也備考金光寺本記云師挺生新羅入唐學道將還因海龍之請入龍宮傳祕法施黃金千兩一云千斤潛行地下湧出本宅并底乃捨為寺以龍宮所施黃金飾塔像光曜殊特因名金光焉僧傳作金羽寺誤也師諱明朗字國育新羅沙于才良之子母曰南澗夫人或云法乖娘蘇判茂林之子金氏則慈藏之妹也三息長曰國教大德次曰義安大德師其季也初母夢吞青色珠而有娠善德王元年入唐貞觀九年乙未來歸總章元年戊辰唐將李績統大兵合新羅滅高麗謂高句麗也後餘軍留百濟將襲滅新羅羅人覺之發兵拒之高宗聞之赫怒命薛邦興師討之文武王聞之懼請師開祕法禳之事在文武王傳中因茲為神印宗祖及我太祖創業之時亦有海賊來擾乃請安惠朗融之裔廣學大緣等二大德作法禳鎮皆朗之傳系也故并師而上至龍樹為九祖本寺記三師為律祖未詳又太祖為創現聖寺為一宗根柢焉又新羅京城東南二十餘里有遠源寺諺傳安惠等四大德與金庾信金義元金述宗等同願所創也四大德之遺骨皆藏寺之東峯因號四靈山祖師嵓云則四大德皆羅時高德按堗白寺柱貼注腳載慶州戶長巨川母阿之女女母明珠女女母積利女之子廣學大德大緣三重古名善會昆季二人皆投神印宗以長興二年辛卯隨太祖上京隨駕焚修賞其勞給二人父母忌日寶于堗白寺田畓若干結云云則廣學大緣二人隨聖祖入京者安師等乃與金庾信等創遠源寺者也廣學等二人骨亦來安于茲爾非四德皆創遠源皆隨聖祖也詳之三國遺事辛巳二十一年唐開耀元年秋七月朔王薨遺詔曰山谷遷貿人代推移昔日萬幾之英終成一封之土徒費資財空勞人力屬纊之後十日便於庫門外庭依西國之式以火燒葬服輕重自有常科喪制度務從儉約越七日太子政明立上諡曰文武羣臣以遺詔葬東海口石上國史王平時常謂智義法師曰朕身後願為大龍崇奉佛法守護邦家智義曰龍為畜報何王曰朕厭世間榮華久矣若得粗報為龍雅合朕懷矣時憬興大德望重一世王將崩顧命于神文曰憬興法師可為國師勿忘朕命神文即位封為國老興常騎馬出入王宮一日有一沙門形儀疏率負筐求憩于下馬臺視之乃乾魚也從者呵之曰被緇者豈可負行濁物乎僧曰生肉亦於兩股間挾而行之背負市上之枯魚何傷之有起去興使人追往至南山文殊寺隱而不現但所持杖在文殊像前視筐乃松皮也興聞之歎曰是大聖來戒我騎畜也遂終身不復騎馬文武王嘗築富山城三年乃畢安北河邊築鐵城又欲築京城時義相法師聞之致書報云王政教明則草丘畫地而為城民不敢踰可以潔災進福政教苟不明則雖有長城災害未消王於是止罷其役神文王金政明在位十一年壬午二年唐開耀二年永淳元年創感恩寺於東海邊備考寺中記云文武王欲鎮倭兵故始創此寺未畢而崩為海龍其子神文王立開耀二年畢排金堂砌下東向開一穴乃龍旋繞之備蓋遺詔之藏骨處名大王嵓寺名感恩寺寺後見龍現形處名利見臺三國遺事五月王幸感恩寺取東海中浮山上一竿竹作笛號萬波息藏于月城天尊庫三國遺事備考第三十一神文大王諱政明金氏開耀元年辛巳七月七日即位為聖考文武大王創感恩寺於東海邊明年壬午一本云天授元年誤也五月朔海官波珍餐朴夙清奏曰東海中有小山浮來向感恩寺隨波往來王異之命日官金春質一作春日占之曰聖考今為海龍鎮護三韓抑又金公庚信乃三十三天之一子今降為大臣二聖同德欲出守城之寶若陛下行幸海邊必得無價大寶王喜以其月七日駕幸利見臺望其山遣使審之山勢如龜頭上有一竿竹晝為二夜合一一云山亦晝夜開合如竹使來奏之王御感恩寺宿明日午時竹合為一天地振動風雨晦暗七日至其月十六日風霽波平王泛海入其山有龍奉黑玉帶來獻迎接共坐問曰此山與竹或判或合如何龍曰比如一手拍之無聲二手拍則有聲且竹之為物合之然後有聲聖王以聲理天下之瑞也王取竹作笛吹之天下和平今王考為海中大龍庚信復為天神二聖同心出此無價大寶令我獻之王驚喜以五色錦彩金玉酬賽之敕使斫竹出海山與龍忽隱不現王宿感恩寺十七日到祇林寺西溪邊留駕晝膳太子理恭即孝昭王守闕聞此事走馬來賀徐察奏曰此玉帶諸窠皆真龍也王曰汝何知之太子曰摘一窠沈水示之乃摘左邊第二窠沈溪即成龍上天其地成淵因號龍淵駕還以其竹作笛藏於月城天尊庫吹此笛則兵退病愈旱雨雨晴風定波平號萬波息笛三國遺事乙酉五年唐嗣聖二年佛紀一七一二年春三月奉聖寺成夏四月望德寺成壬辰十二年孝昭王元年唐嗣聖九年即武后長壽元年佛紀一七一九年高僧勝詮自唐還傳遞賢首疏鈔於義湘華嚴之學由是益彰備考釋勝詮未詳其所自也常附舶詣中國賢首國師講下領受玄言研微積慮惠鑒超穎探賾索隱妙盡隅奧思欲赴感有緣當還國里始賢首與義湘同學俱稟儼和尚慈訓首就於師說演述義科因詮法師還鄉寄示湘仍寓書云云師既還寄信于義湘湘乃目閲藏文如耳聆儼訓探討數旬而授門弟子廣演斯文語在湘傳按此圓融之教誨遍洽于青丘者實師之功也厥後有僧梵修遠適彼國求得新譯後分華嚴經觀師義疏言還流演時當貞元己卯斯亦求法洪揚之流乎詮乃於尚州領內開寧郡境開創精廬以石髑髏為官屬開講華嚴新羅沙門可歸頗聰明識道理有傳燈之續乃撰心源章其略云勝詮法師領石徒衆論議講演今葛項寺原本項作頃今據勝覽改其髑髏八十餘枚別本枚作板至今為綱司所傳頗有靈異其他事迹具載碑文如大覺國師實録中高僧道澄自唐還獻天文圖孝昭王金理洪在位十年癸巳二年唐嗣聖十年長壽二年王納田一萬頃於柏栗寺冊號神笛為萬萬波波息三國遺事備考雞林之北嶽曰金剛嶺山之陽有柏栗寺寺有大悲之像一軀而不知作始而靈異頗著或云是中國之神匠塑衆生寺像時并造也天授三年壬辰唐長壽元年九月七日孝昭王奉大玄薩餐之子夫禮郎為國仙珠履千徒親安常尤甚天授四年癸巳暮春之月領徒遊金蘭到北溟之境被狄賊所掠而去門客皆失措而還獨安常追迹之是三月十一日也大王聞之驚駭不勝曰先君得神笛傳于朕躬今與玄琴藏在內庫琴笛事具載別傳因何國仙忽為賊俘為之奈何時有瑞雲覆天尊庫王又震懼使檢之庫內失琴笛二寶乃曰朕何不幸昨失國仙又亡琴笛乃囚司庫吏金貞高等五人四月募於國曰得琴笛者賞之一歲租五月十五日郎二親就柏栗寺大悲像前禋祈纍夕忽香卓上得琴笛二寶而郎常二人來到於像後二親顛喜問其所由來郎曰豫自被掠為彼國大都仇羅家之牧子放牧於大烏羅尼野一云作都仇家奴牧於大磨之野忽有一僧容儀端正手攜琴笛來慰曰憶桑梓乎豫不覺跪于前曰眷戀君親何論其極僧曰然則宜從我來遂率至海壖又與安常會乃批笛為兩分與二人各乘一隻自乘其琴泛泛歸來俄然至此矣於是具事馳聞王大驚使迎郎隨琴笛入內施鑄金銀五器二副各重五十兩摩衲袈裟五領大綃三千匹田一萬頃納於寺用答慈庥焉大赦國內賜人爵三級復民租三年主寺僧移住奉聖封郎為大角干新羅家宰爵名父大玄阿餐為大角干母龍寶夫人為沙梁部鏡并宮主安常師為大統司庫五人皆免賜爵各五級六月十二日有慧星孛于東方十七日又孛于西方日官奏曰不封爵於琴笛之瑞於是冊號神笛為萬萬波波息慧乃滅後多靈異文煩不録世謂安常為俊永郎徒不之審也永郎之徒唯真才繁完等知名亦皆不測人也三國遺事丁酉六年唐嗣聖十四年佛紀一七二四年設望德寺落成會王親駕辦供有一比丘儀彩疏陋局束立於庭請曰貧道亦望齊王許赴床杪將罷王戲調之曰住錫何所僧曰琵琶嵓王曰此去莫向人言赴國王親供之齊僧笑答曰陛下亦莫與人言供養真身釋迦言訖湧身騰空向南而行王驚愧馳上東岡向方遙禮使往尋之到南山參星谷或云大磧川源石上置錫鉢而隱使來復命遂創釋迦寺於琵琶嵓下創佛無寺於滅影處分置錫鉢焉二寺至今存錫鉢亡矣三國遺事戊戌七年唐嗣聖十五年佛紀一七二五年夏六月震皇龍寺塔聖德王金興光在位三十五年癸卯二年唐嗣聖二十年佛紀一七三年秋九月靈妙寺災甲辰三年唐嗣聖二十一年佛紀一七三一年金思讓自唐回獻最勝王經壬子十一年唐太極元年佛紀一七三九年秋八月封金庚信妻金氏為夫人智照夫人時夫人落髮為尼王曰中外平安高枕無憂太大角干之賜也夫人警戒相成陰功亦多寡人未嘗忘于心思欲報之命歲賜南城租一千石戊午十七年唐開元六年佛紀一七四五年夏六月震皇龍寺塔己未十八年唐開元七年佛紀一七四六年秋九月震金馬郡彌勒寺庚申十九年唐開元八年佛紀一七四七年命修皇龍寺塔壬戌二十一年唐開元十年佛紀一七四九年唐洪州開元寺新羅僧金大悲賄張淨滿錢二十千取六祖大師首歸海東供養今河東郡雙溪寺六祖頂相塔是也備考傳燈録先天二年即開元元年七月一日師謂門人曰吾欲歸新州汝速理舟楫時大衆哀慕乞師且住師曰諸佛出現猶示涅槃有來必去理亦常然吾此形骸歸必有所衆曰師從此去早晚却回師曰葉落歸根來時無口又問師之法眼何人傳授師曰有道者得無心者通問後莫有難否曰吾滅後五六年當有一人來取吾首聽吾記曰頭上養親口裏須餐遇滿之難楊柳為官又云吾去七十年有二菩薩從東方來一在家一出家同時興化建立吾宗締緝伽藍昌隆法師或云此讖亦應在新羅人一在家品日一出家無染言訖往新州國恩寺沐浴訖跏趺而化異香襲人白虹屬地即其年八月三日也時韶新兩郡各修靈塔道俗莫决所之兩郡刺史共焚香祝云香烟引處即師之欲歸焉時爐香騰湧直貫曹溪以十一月十三日入塔世壽七十六時韶州刺史韋璩撰碑門人憶念取首之記遂先以鐵葉漆布固護師頸塔中有達摩所傳信衣西域屈眴布也紡木棉花心織成後人以碧絹為裏中宗賜摩衲寶鉢方辨塑真道具等主塔侍者尸之開元十年壬戌八月三日夜半忽聞塔中如拽鐵索聲僧衆驚起見一孝子從塔中走出尋見師頸有傷具以賊事聞於州縣縣令楊侃刺史柳無忝得牒切加擒捉五日於石角村捕得賊人送韶州鞫問云姓張名淨滿汝州梁縣人於洪州開元寺受新羅僧金大悲錢二十千取六祖大師首歸海東供養柳守聞狀未即加刑乃躬至曹溪問師上足令韜曰如何處斷韜曰若以國法論理須誅夷但以佛教慈悲冤親平等况彼欲供養罪可恕矣柳守嘉歎曰始知佛門廣大遂赦之云云尚玄曰新羅興德王代高僧慧昭真鑑國師入唐滄州謁神鑒大師得法而歸至康州今晉州郡智異山因於花開谷故三法和尚蘭若遺基纂修堂宇榜曰玉泉寺後獻康王賜額為雙溪寺崔致遠撰碑曰屈指法胤則禪師乃曹溪之玄孫是用建六祖影堂彩飭粉墉廣資道誘洪居士注曰六祖南嶽馬祖𪉩官滄州雙溪共為六祖師故建六祖影堂或云以上注南嶽等為六祖非也焉有自己亡影預建之理乎只是第六祖也以六祖所居堂故於是世人以雙溪為供養六祖頭骨之處近世居士金正喜號阮堂亦云秋史書額曰六祖頂相塔又題一聯曰世界一花祖宗六葉由來雙溪六祖之塔遂成一片九疑之山也據寺僧言古時谷中雪天葛花爛開故名花開擇此勝地奉安頂相頗著靈異從塔中時或放光明但不敢開掘以破人疑為避破塔外道之謗故也孝成王金承慶在位五年壬午六年唐天寶元年夏五月王薨太子憲英立上諡曰孝成以遺命燒柩於法流寺南散骨東海景德王金憲英在位二十三年乙酉四年唐天寶四年王施田於敏長寺又納財幣焉備考禺金里貧女寶開之子長春從海賈而征久無音耗其母就敏藏寺觀音前克祈七日而長春忽至王聞之施田納財三國遺事丙戌五年唐天寶五年佛紀一七七三年夏四月赦賜酺度僧一百五十人辛卯十年唐天寶十年佛紀一七七八年大相金大城創佛國寺及石佛寺請沙門神琳表訓各住焉三國遺事癸巳十二年唐天寶十二年佛紀一七八年夏大旱詔沙門大賢入內庭講金光明經祈雨備考瑜珈祖大德大賢住南山茸長寺寺有慈氏石丈六賢常旋繞像亦隨賢轉面賢惠辨精敏决擇了然大抵相宗銓量旨理幽深難為剖析中國名士白居易嘗窮之未能乃曰唯識幽難破因明劈不開是以學者難承稟者尚矣賢獨刊定邪謬暫開幽奧恢恢游刃東國後進咸遵其訓中華學士往往得此為眼目景德王天寶十二年癸巳夏大旱詔入內殿講金光明經以祈甘雨一日齊次展鉢良久而淨水獻遲監吏詰之供者曰宮井枯涸汲遠故遲爾賢聞之曰何不早云及晝講時捧爐默然斯須井水湧出高七丈許與剎幢齊闔宮驚駭因名其井曰金光井賢嘗自號青丘沙門贊曰繞佛南山像逐旋青丘佛日再中懸解教宮井清波湧誰識金爐一炷烟已上三國遺事大賢撰藥師經古迹二卷菩薩戒本宗要排科一卷梵網經古迹記釋經上下排科四卷起信論內義略探記一卷成唯識論學記現存八卷甲午十三年唐天寶十三年佛紀一七八一年夏王請沙門法海於皇龍寺講華嚴經駕幸行香備考夏王請大德法海於皇龍寺講華嚴經駕幸行香從容謂曰前夏大賢法師講金光經井水湧七丈此公法道如何海曰特為細事何足稱乎直使傾滄海襄東嶽流京師亦非所難王未之信謂戲言爾至午講引爐沉寂須臾內禁忽有哭泣聲官吏走報曰東池已溢漂流內殿五十餘間王罔然自失海笑謂之曰東海欲傾水脉先漲爾王不覺興拜翌日感恩寺奏昨日午時海水漲溢至佛殿階前晡時而還王益信敬之贊曰法海波瀾法界寬四溟盈縮未為難莫言百億須彌大都在吾師一指端三國遺事鑄皇龍寺鍾長一丈三寸厚九寸其重四十九萬七千五百八十一斤三國遺事云施主孝貞伊王三毛夫人匠人里上宅一典肅宗朝重成新鍾長六尺八寸乙未十四年唐天寶十四年佛紀一七八二年鑄芬皇寺藥師銅像重三十萬七千六百斤匠人本彼部強古乃未三國遺事康州今晉州善士數十人志求西方於州境創彌陀寺約萬日為契時有阿干貴珍家一婢名郁面隨其主念佛九年歲在乙未正月二十一日禮佛撥屋梁而去至小伯山墮一隻履就其地為菩提寺至山下棄其身即其地為二菩提寺榜其殿曰郁面登天之殿三國遺事望德寺塔戰動是年唐有安史之亂三國遺事云長壽元年壬辰孝昭即位始創望德寺將以奉福唐室後景德王十四年望德寺塔戰動是年有安史之亂羅人云為唐室立茲寺宜其應也新羅國記望德寺為唐立故以為名兩塔相對高十三層忽震動開合如欲傾倒者數日戊戌十七年唐乾元元年大雷電震佛寺十六所庚子十九年唐乾元三年四月朔二日並現挾旬不滅王召月明師作兜率歌以禳之三國遺事癸卯二十二年唐廣德元年大奈麻李純嘗有寵於王一日棄官為僧纍徵不出創斷俗寺居之在晉州今廢三國遺事則云直長李俊天寶七年戊子改創梧淵小寺為大剎名斷俗寺甲辰二十三年唐廣德二年靈妙寺丈六改金租二萬三千七百石三國遺事良志法師傳作像之初成之費真表律師鑄成金山寺彌勒丈六像復畫下降授戒威儀之相於金堂南壁像成於廣德二年甲辰六月九日大曆元年丙午五月一日安置金堂三國遺事惠恭王金乾運在位十五年辛亥七年唐大曆六年十二月十四日奉德寺巨鍾成備考景德王捨銅一十二萬斤為先考聖德王欲鑄巨鍾一口未就而崩其子惠恭大王乾運以大曆五年十二月今依海東金石苑所載鍾銘改正之命有司鳩工徒乃克成之安於奉德寺寺乃孝成王開元二十六年為先考聖德王奉福所創也故鍾銘曰聖德大王神鍾之銘朝散大夫兼太子司議郎翰林郎金弼奚奉教撰三國遺事本文兼作前奚作粵今亦依海東金石苑所載銘改正己未十五年唐大曆十四年王納田三十結於鷲仙寺寺乃金庾信平麗濟二國所營也以資金庚信冥福備考夏四月旋風起自庚信墓至始祖陵塵霧暗冥不辨人物人有聞其若有哭泣悲歎之聲王懼遣大臣金敬信就庚信墓致祭謝過又納田結以資冥福三國遺事宣德王金良相在位五年乙丑六年唐貞元元年王寢疾彌留遺詔死後依佛制燒火散骨東海越十三日乃薨諡曰宣德元聖王金敬信在位十四年戊寅十四年唐貞元十四年冬十二月王薨諡曰元聖太子俊雍立昭聖王也以遺命燒柩於奉德寺南己卯十五年唐貞元十五年沙門梵修入唐得新譯後分華嚴經澄觀義疏而還哀莊王金重熙在位九年壬午三年唐貞元十八年佛紀一八二九年秋創伽倻山海印寺初義湘法師自唐還傳教於十剎伽倻之海印居其一焉至是順應大德繼以創之利貞禪伯踵而成之至高麗朝王子僧統義天大覺國師愛其山水之佳麗久住茲寺著書頗多又自朝家貯藏國史奉安大藏經板焉備考崔致遠撰新羅迦耶山海印寺善安住院壁記略曰經云受持萬偈經不如一句義猶信後發前至其惟是山何則有若祖師順應大德效成覸於神琳碩德問老聃於大曆初年託窾木以忘軀尋住山而得髓窮探教海俊達禪河洎遂言歸光膺妙選乃歎曰人資琢玉世貴藏金既含天地之靈亦資山川之秀鳥能擇木吾盍誅芧越貞元十八年良月既望牽率同志卜築於斯山靈鈞妙德之名地體印清凉之勢分裝五髻競拔一毛于時聖穆王太后母儀四夷子育三學聞風敬悅誓日歸依捨以嘉蔬副之束帛是若自天獲佑實惟得地成因然屬生徒方霧擁嵓扉耆德遽露晞林宇利貞禪伯踵武興功依乎中庸盡住持之美取諸大壯煥營搆之奇雲矗霞舒日新月改自是伽耶勝景雅符成道之基海印殊珍益耀連城之價既見玉林皆拔實得珠岑不枯故得開剃則僅一百年徵躬者盈四七德以誦持同升者五由演暢別座者三是皆行不浮于言名克保于實巨唐光化三天一泰齊臘月霧日記海印寺事蹟云順應利貞兩大士入中國求法還國時新羅哀莊王王后患發背遣中使告之師授以五色線其使還報於王王依言試之患差王感之創立海印寺昔梁朝寶志公臨終以踏山記囑門徒曰吾沒後有高麗二僧求法而來以此記付之後果有順應利貞兩大士入中國求法志公門徒見之以踏山記付之并說臨終時語順應聞而問法師葬處而往尋之云人有古今法無前後七日七夜入定請法墓門自開志公出為之說法以衣鉢傳又賻蟒皮鞋仍囑曰汝國牛頭山酉有佛法大興處汝等還國可創立別裨補大伽藍海印寺言訖還入二師還國至牛頭山自東北踰嶺而西遇獵人問曰汝等因獵遍閲此山有可以創寺地否獵人答曰此去小下有一水泊處多有鐵瓦宜往觀之二師到水泊處見之甚叶其意藉草而坐入定頂門放光紫氣衝天時新羅第三十九王哀莊大王王后患發背良醫無效王患之遣使臣分往諸方冀得碩德異僧倘蒙扶救也中使於路上望見紫氣疑其有異人到山下披榛入洞至數十里許溪深峽束行不能前徘徊久之忽見一狐緣巖而去中使心異之隨之而後及見二師入定光從頂門出敬信禮拜因請邀還王宮二師不許中使乃以王后發背之患告之師授以五色線曰宮前有何物答曰有梨樹師曰持此線一頭繫於梨樹一頭接於瘡口即無患其使還報於王王依言試之梨枯患差王感之敬之使國人創立茲寺焉時哀莊王三年壬午順應贊曰東護大士南行童子身一片雲志千里水浮囊永思捨筏皈止彼岸此岸喻指非指天業受禪猶如覺賢牛頭垂夾象罔撢玄巖扃選勝海岸提圓地崇洲渚天授林泉化城口談學藪心傳景侔秋月感激春烟綻火中蓮利貞贊曰孤雲獨鶴儷影巖壑草創蓮剎混沌逢鑿願霈無礙人天有托二傑如生九原可作甲申五年唐貞元二十年高僧慧昭真鑒國師隨歲貢使入唐丙戌七年唐元和元年禁創佛寺只許修之又禁佛寺用金銀錦繡為器服憲德王金彥升在位十七年庚寅二年唐元和五年冬遣王子金憲章入唐獻金銀佛像及佛經等上言為順宗祈福甲午六年唐元和九年秋八月高僧惠哲入唐求法興德王金秀宗在位十年丁未二年唐太和元年春高句麗僧丘德入唐賫經至此時句麗已亡丘德疑即西土人也故云淨神太子寶叱徒與孝明太子同隱入五臺山結草菴而居禮念修道按三國遺事孝明太子後歸國為王庚戌五年唐太和四年高僧慧昭自唐還辛亥六年唐太和五年二月遣王子金能儒并僧九人使于唐神武王金祐徵在位一年四月己未元年唐開成四年春二月高僧惠哲自唐還文聖王金慶膺在位十八年庚申二年唐開成五年春二月高僧體澄自唐還乙丑七年唐會昌五年高僧無染自唐還丁卯九年唐會昌七年高僧品日一云梵日自唐還備考三國遺事崛山祖師梵日即品日也大和年中入唐到明州開國寺有一沙彌截左耳在衆僧之末與師言曰吾亦鄉人也家在溟州界翼嶺縣德耆房師他日若還本國須成吾舍既而遍遊叢席得法於鹽官事具在本傳以會昌七年丁卯還國先創崛山寺而傳教大中十二年戊寅二月十五日夜夢昔所見沙彌到窗下曰昔在明州開國寺與師有約既蒙見諾何其晚也祖師驚覺押數十人到翼嶺境尋訪其居有一女居洛山下村問其名曰德耆女有一子年才十八歲常出遊於村南石橋邊告其母曰吾所與遊者有金色童子母以告于師師驚喜與其子尋所遊水中有一石佛舁出之截左耳類前所見沙彌即正趣菩薩之像也乃作簡子卜其營搆之地洛山上方吉乃作殿三間安其像師所安正趣菩薩像與義相大師所安觀音像共為洛山二大聖也禪門寶藏録云溟州崛山梵日國師答新羅真聖大王宣問禪教兩義云我本師釋迦出胎說法各行七步云惟我獨尊後踰城往雪山中因星悟道既知是法猶未臻極遊行數十月尋訪祖師真歸大師始傳得玄極之旨是乃教外別傳也故聖住和尚無染國師常扣楞伽經知非祖宗捨了却入唐傳心道允和尚披究華嚴經乃曰圓頓之旨豈如心印之法亦入唐傳心此乃非其根未能信之別旨耳海東七代録尚玄按國師所言真歸祖師即禪門寶藏録引所謂達磨密録云唐土第二祖惠可大師問達磨今付正法即不問釋祖傳何人得何處慈悲曲說後來成規達磨曰我即五天竺諸祖傳說有篇而今為汝說示頌曰真歸祖師在雪山叢木房中待釋迦傳持祖印壬午歲心得同時祖宗旨者也庚午十一年唐大中四年佛紀一八七七年正月十九日沙門慧昭入寂備考有唐新羅國故康州智異山雙溪寺教諡真鑑國師碑銘并序前西國都統巡官承務郎侍御史內供奉賜紫金魚袋臣崔致遠奉教撰并書篆額夫道不遠人人無異國是以東人之子為釋為儒必也西浮大洋重譯從學命寄刳木言舟也心懸寶洲虛往實歸莊子云立不教坐不議虛而往實而歸先難後獲亦猶采玉者不憚崑丘之峻探珠者不辭驪壑見莊子之深遂得慧炬則光融五乘嘉肴則味飫六籍禮記云雖有嘉肴不食不知其味雖有至道不學不知其善競使千門入善能令一國興仁學者或謂身毒此云月邦謂印度也與闕里之設教也分流異體圜鑿方枘不可以相入之義互相矛盾言相違也守滯一隅嘗試論之說詩者不以文害辭不以辭害志禮所謂言豈一端而已夫各有所當故廬峯慧遠著論謂如來之與周孔發致雖殊所歸一揆體極不兼應者物不能兼受故也沈約有云孔發其端釋窮其致真可謂識其大者始可與言至道矣至若佛語心法玄之又玄名不可名說不可說雖云得月指或坐亡古云見月休觀指歸家罷問程莊子曰回益矣坐亡矣終類係風見馬史影難行捕見班史然陟遐自邇取譬何傷且尼父謂門弟子曰豫欲無言天何言哉則彼淨名之默對文殊善逝佛也之密傳迦葉不勞鼓舌而能叶印心言天不言捨此奚適而得遠傳妙道廣耀吾鄉豈異人乎禪師是也禪師法諱慧昭俗姓崔氏其先漢族冠蓋山東隋師征遼多沒穢貊有降志而為遐氓者爰及聖唐囊括四郡今為全州金馬人也父曰昌元在家有出家之行母顧氏嘗晝假寐夢一梵僧謂之曰吾願為阿㜷楚人呼母㜷李賀稱母曰阿㜷之子因以琉璃罌為寄未幾娠禪師焉生而不啼乃風挺銷聲息言之勝芽也既齔男子八月生齒八歲而齔從戲必燌葉為香采花為供或西嚮危坐移晷未嘗動容是知善本固百千劫前所栽植非可跂而及者自丱洎辨志切反哺跬步不忘而家無斗儲又無尺壤可盜天時者齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾盜也一年而給三年而足五年而大穰自此以往施及州閭向氏大喜喻其為盜之言不喻其為盜之道踰垣鑿室手目所及無不探也未及其時以贓獲罪沒其先居之財向氏以國氏謬己也往而怨之國氏曰若為盜何若向氏言其狀國氏曰噫若失為盜之道至此于今將告者矣吾聞天有時地有利吾盜天地之時利雲雨之芳潤山澤之産育以生吾禾植吾稼築吾垣建吾舍陸盜禽獸水盜魚鱉無非盜也夫稼禾土木禽獸魚鱉皆天地之所生豈吾所有然盜天時而無殃也出列子傳口腹之養惟力是視及裨販陬隅魚也為贍滑甘之業手非勞於結網心已契於忘筌網筌喻能詮魚兔喻所詮能豐啜菽之資禮記啜菽飲水能盡其歡允叶采蘭之詠暨鍾艱棘負土成墳乃曰鞠育之恩聊將力報希微之旨老子曰觀而不見名曰希聽而不聞名曰夷摶而不可得名曰微盍以心求吾豈匏瓜壯齡滯跡遂於貞元元年詣歲貢使求為榜人寓足西泛多能鄙事視險如夷揮楫慈航超截苦海及達彼岸告國使曰人各有志請從此辭遂行至滄州謁神鑑大師投體方半大師怡然曰戲別匪遙喜再相遇遽令削染頓受印契若火沾燥艾水注卑原然徒中相謂曰東方聖人於此復見禪師形貌黯然衆不名而目為黑頭陀斯則探玄處默真為漆道人後身豈比夫邑中之黔能慰衆心而已哉左傳云宋皇國父為平公築事子罕請俟農隙築者謠曰澤門之白實興我役邑中之黔能慰我心子罕色黑國父色白亦可與赤鬚青眼以色相顯示矣元和五年受具於嵩山少林寺琉璃壇側聖善詩云母氏聖善前夢宛若合符既瑩戒珠復歸橫海聞一知十茜絳藍青雖止水澄心而斷雲浪跡粵有鄉僧道義先訪道於華夏邂逅適願西南得朋四遠參尋證佛知見先歸故國禪師即入終南登萬仞之峯餌松實而止觀寂寂者三年後出紫閣當四達之道織芒屩而廣施憧憧者又三年於是苦行既已修他方亦已遊雖曰觀空豈能忘本乃於大和四年來歸大覺上乘照我仁域興德大王飛鳳筆迎勞曰道義禪師鄉已歸止上人繼至為二菩薩昔聞黑衣之傑今見褸褐之英強天慈威舉國欣賴寡人行當以東雞林之境成妙吉祥之宅也始憩錫於尚州雪嶽山長柏寺醫門多疾來者如雲方丈難寬物情自隘遂步至康州即今晉州也智異山有數於菟謂虎也哮吼前導避危從坦不殊俞騎從者無所怖畏豢犬如也牛馬曰芻犬豕曰豢則與善無畏三藏結夏靈山猛獸前路深入山穴見牟尼立像宛同事跡彼竺曇猷之叩睡虎頭令聽經亦不專微於僧史也因於花開谷故三法和尚蘭若遺基纂修堂宇儼若化城洎開成三年愍哀大王驟登寶位深託玄慈降璽書餽齊費而別求見願禪師曰在勤修善政何用願為使者復于王王聞之愧悟以禪師色空雙泯定慧俱圓降使賜號為慧照昭字避聖祖諱易之也仍貫籍于大皇龍寺徵詣京邑星使往復者交轡于路而嶽立不移其志昔僧稠拒元魏之三召云在山行道不爽大通棲幽養高異代同趣居數年請益者稻麻成列殆無錐地遂歷銓奇境南嶺之麓爽塏居最經始禪廬却倚霞岒俯壓雲澗清眼界者隔江遠嶽爽耳根者逆石飛湍至如春溪花夏徑松秋壑月冬嶠雪四時變態萬像交光百籟和吟千巖競秀嘗遊西土者咸愕視謂遠公東林移歸海表蓮花世界非凡想可擬壺中別有天地則可信也架竹引流環階四注始用玉泉為膀屈指法胤則禪師乃曹溪之玄孫是用建六祖影堂六祖南嶽馬祖𪉩官滄州雙溪為六師或云上注南嶽等謂之六祖誤也焉有亡影生前預建乎只是第六祖以雙溪是六祖所居堂故彩飭粉墉廣資導誘經所謂悅衆生故綺錯繪衆像者也大中四年正月九日詰旦告門人曰萬法皆空吾將行矣一心為本汝等勉之無以塔藏形無以銘紀迹言竟坐滅報年七十七積夏四十一于時天無纖雲風雷飈起虎狼號咽杉栝變衰俄而紫雲翳空空中有彈指聲會葬者無不入耳則梁史載褚侍中翔嘗請沙門為母疾祈福聞空中彈指聖感冥應豈誣也哉凡志於道者寄聲遠吊未亡情者銜悲以泣人天痛悼斷可知矣靈函幽隧預使備具弟子法諒等號奉色身不踰日而窆于東峰之冡遵遺命也禪師性不散朴言不由機服暖縕𢋫食甘糠麧茅菽雜糅蔬佐無二貴達時至曾無異饌門人以墋腹難進則曰有心至此雖糲何害尊卑耋稚接之如一每有王人乘馹傳命遙祈法力則曰凡居王土而戴佛日者孰不傾心護念為君貯積亦何必遠綸言於枯木朽株傳乘之輩飢不得齕渴不得飲吁可念也或有以胡香為贈者則以瓦載煻灰不為丸而焫之曰吾不識是何臭虔心而已復有以漢茗為供者則以薪爨石釜不為屑而煮之曰吾不識是何味濡腹而已守真忤俗皆此類也雅善梵唄金玉其音側調飛聲爽快哀惋能使諸天歡喜永於遠地流傳學者滿堂誨之不倦至今東國習魚山之妙者佛祖通載云陳思王曹植字子建武帝中子每讀佛經留連嗟玩以為至道宗極轉讀七聲升降曲折之響世皆諷而則之遊魚山聞有聲特異清麗哀婉因效其聲為梵唄競如掩鼻晉書云謝安能作洛下諸生詠有鼻疾故音濁名儒愛其咏或掩鼻效之效玉泉餘響豈非以聲聞度之之化乎禪師泥洹本出黃庭經云腦神精氣字泥洹注云丹中真人自尾閭上升過夾脊玉京髓海骨入泥洹宮則脫殼升天如佛之涅槃也當文聖大王之朝上惻仙襟將寵淨諡及聞遺誡愧而寢之越三紀門人以陵谷為慮扣不朽之緣於慕法弟子內供奉一吉干揚晉方宗門臺郎鄭詢一斷金為心勒石是請獻康大王恢弘至化欽仰真宗追諡真鑑禪師大空靈塔仍許篆刻以永終譽懿乎日出暘谷無幽不燭海岸植香久而彌芳或曰禪師垂不銘不塔之戒而降及西河之徒不能確奉先志求之歟抑與之歟適足為白圭之玷噫非之者亦非也不近名而名彰蓋定力之餘報與其灰滅電絶曷若為可為於可為之時使聲震大千之界而龜未戴石龍遽升天今上繼興𡎖箎相應義諧付囑善者從之以鄰嶽招提寺剎也有玉泉之號為名所纍衆耳致惑將俾棄同即異則宜捨舊從新使視其寺之枕倚則以門臨復澗為對乃賜額為雙溪焉申命下臣曰禪以行顯汝以文進宜為銘致遠拜手曰唯唯退而思之頃捕名中州嚼腴魚肥臠也咀雋鳥肥肉也于章句間未能盡醉衢樽唯愧深跧泥甃况法離文字無地措言苟或言之北轅適郢第以國主之外護門人之大願非文字不能昭昭乎羣目遂敢身從兩役扁蝠為鳥為鼠力效五能鼫鼠有五能五不能雖石或憑焉可慙可懼而道強名也何是何非掘筆藏鋒則臣豈敢重宣前義謹札銘云杜口禪那歸心佛陀根熟菩薩弘之靡他猛探虎窟遠泛鯨波去傳祕印來化斯羅新羅一名斯羅尋幽選勝卜築巖磴水月澄懷雲泉寄興山與性寂谷與梵應觸境無礙息機是澄道贊五朝威摧衆妖默垂慈蔭顯拒嘉招海自飄蕩山何動搖無思無慮匪斫匪雕食不兼味服不必備風雨如晦始終一致慧柯方秀法棟俄墜洞壑凄凉烟蘿憔悴人亡道存終不可諼上士陳願大君流恩燈傳海裔塔聳雲根天衣拂石永耀松門用近世洪居士注光啓三年七月建僧奐榮刻字辛未十三年唐大中五年佛紀一八七八年春入唐使阿餐元弘賫佛經并佛牙來王出郊迎之憲安王金誼靖在位四年辛巳五年唐咸通二年佛紀一八八八年沙門惠哲入寂備考武州桐裏山大安寺寂忍禪師碑頌并序入唐謝恩兼宿衛判官翰林郎臣崔賀奉教撰夫鍾也者叩之聲之聞之可能定慮鏡也者磨之光之照之足以辨形以物之無情猶妙用若此矧伊夙植閒氣生蘊靈願心非妄心行是真行空中說有色際知空方淨六塵自超十地所體大於虛空之大所量深於瀚海之深神通也不可以識識智慧也不可以知知者乎即禪師其人也禪師諱惠哲字體空俗姓朴氏京師人也其先少耽洙泗之迹長習老莊之言得喪不關於心名利全忘於世或憑高眺遠或染翰吟懷而已祖高尚其事不歷公門於朔州善谷縣間居則太白山南烟嵐相接左松右石一琴一樽與身相親之人也娠禪師之初母氏得夢有一胡僧儀形肅雅衣法服執香爐徐徐行來坐寢榻母氏訝而復異因茲而覺曰必得持法之子當為國師矣禪師自襁褓已來凡有舉措異於常流至如喧戲之中不喧安靜之處自靜觸羶腥則嘔血見屠殺則傷情遇坐結跏禮人合掌尋寺繞佛唱梵學僧冥符宿業斷可知矣年當志學出家止于浮石山聽華嚴有五行之聰罔有半字三餘之學何究本經以為鈎深索隱豈吾所能墻仞所窺不可不說於是編文織意積成卷軸决曩代之膏肓祛羣學之蒙昧同輩謂曰昨為切瑳之友今作誘進之師真釋門之顏子也洎二十二受大戒也一日前夢見五色珠令人可重忽在懷袖之中占曰我已得戒珠矣受戒初飄風亙天扶搖不散下壇了怡然而靜十師謂曰此沙彌感應奇之又奇也既統具戒修心潔行念重浮囊持律獲生身輕繫草不以諸緣損法不以外境亂真既律且禪緇流之龜鏡也竊念佛本無佛強以立名我本無我未嘗有物見性之了是了喻法之空非空默默之心是心寂寂之惠是惠惠慧音通筌蹄之外理則必然頃得司南是也仍嘆曰本師遺教海隔桑田諸祖微言地無郢匠乃以元和九載秋八月駕言西邁也時也天不違乎至誠人莫奪其壯志千尋水上秦橋迢遞而變換炎凉萬仞山邊禹足胼胝而犯霜雪步無他往詣龔公山智藏大師即第六祖付法於懷讓讓傳道一一傳大師也大師開如來藏得菩薩心久坐西堂多方誨爾來我者略以萬計莫非知十之學禪師曰某生緣外國問路天池遠不中華故來請益儻他日無說之說無法之法流於海表幸斯足也大師知志既堅禀性最悟一識如舊密傳心印於是禪師已得赤水所遺靈臺豁爾如大虛之寥廓也夫夷夏語乖機要理隱非伐柯執斧孰能與於此乎未幾西堂終乃虛舟莫留孤雲獨逝天南地北形影相隨所歷名山靈境略而不載也到西州浮沙寺披尋大藏經日夕專精晷刻無廢不枕不席至于三年文無奧而未窮理無隱而不達或默思章句歷歷在心焉以違親歲積宣法心深遂言歸君子之鄉直截乾城之浪開成四祀春二月方到國也是日也羣臣同喜里閈相賀曰當時璧去山谷無人今日珠還川原得寶能仁妙旨達磨圓宗盡在此矣譬諸夫子自衛反魯也遂於武州管內雙峯蘭若結夏時遭陽亢山枯川渴不獨不雨亦無片雲州司懇求於禪師師入靜室爇名香上感下祈小間甘澤微微而下當州內原隰滂沱既而大有又居理嶽默契谷忽有野火四合欲燒庵舍非人力之所救亦無路以可逃師端坐默念之中白雨暴下撲滅盡之渾山燎而一室獨存嘗住天台山國清寺預知有禍拂衣而去人莫知其由不久舉寺染疾死者十數入唐初與罪徒同船到取城郡郡監知之枷禁推得欵禪師不言黑白亦同下獄監具申奏准教斬三十餘人訖次當禪師師顏容怡悅不似罪人自就刑所監不忍便殺尋有後命而并釋放唯禪師獨免如此寂用不可思不可得也其回天駐日縮地移山禪師亦不病諸蓋以和光同塵不欲有聲矣谷城郡東南有山曰桐裏中有精舍名曰大安其寺也千峯掩映一水澄流路逈絶而塵侶到稀境幽邃而僧徒住靜龍神呈之瑞異蟲蛇遁其毒形傳云創寺之時舉洞皆是蚊虻之陳師以神力逐之飛踰於山之右嶺因為建寺厥後無一個蚊子故名其嶺曰逐虻峙松暗雲深夏涼冬燠斯三韓勝地也禪師擁錫來遊乃有懸車之意爰開教化之場用納資禀之客漸頓雲集於四禪之室賢愚景附於八定之門縱有波旬之黨梵志之徒安得不歸於正見悟吠堯之非斯乃復羅浮之古作曹溪之今也哉文聖大王聞之謂現多身於象末頻賜書慰問兼所住寺四外許入禁殺之幢仍遣使問理國之要禪師上封事若干條皆時政之急務王甚嘉焉其裨益朝庭王侯致禮亦不可勝言也時春秋七十有七乙丑年生辛巳年寂咸通二年春二月六日無疾坐化支體不散神色如常即以八日安厝於寺松峯起石浮圖之也嗚戲色相本空去來常寂不視生滅濟渡凡迷前渚未度忽先前緣已得後廢須達理者以為報盡形謝而痛惜者於焉輟斤絶弦也終前三位所居山北而令伐杉樹大可四圍曰有人死則將此作函子葬之歸於寺壁上教畫函子圖因告生徒曰萬物春生秋謝我則友之已後不得與汝輩說禪味道矣屬纊之初野獸悲號山谷盡動鴉集雀聚盡有哀聲近浮圖有一株松青鬱蔥茂山內絶倫從開隧後春夏白秋冬黃永有吊傷之色也上聞禪師始末之事慮年代久而其跡塵昧以登極八年夏六月日降綸旨碑斯文以鏡將來仍賜諡曰寂忍名塔曰照輪清淨則聖朝之恩遇足矣禪師之景行備矣其詞曰惟我大覺兮現多身性本空寂兮用日新既律且禪兮無我人高山仰止兮莫與鄰寶月常圓兮照圓津福河澄流兮蕩六塵漸頓如雲兮來為賓語默隨根兮求珠真雨撲山火兮救昆珍時患魃旱兮感龍神非罪臨刑兮後命臻預逃殃禍兮及無因遷化忽諸兮夭大椿門徒百其兮血染巾賜諡寂忍兮塔照綸斯恩永世兮何萬春中舍人臣克一奉教咸通十三年歲次壬辰八月十四日立沙門幸宗碑末福田數法席時在福田四十常行神衆法席本定別法席無本傳食二千九百三十九石四斗二升五合例食布施燈油無田畓柴田畓并四百九十四結三十九負坐地三結下院代四結七十二負柴一百四十三結豆原地盆一所奴婢奴十名婢十三口景文王金膺廉在位十四年戊子八年唐咸通九年夏六月震皇龍寺塔庚寅十年唐咸通十一年朗空禪師隨備朝使金緊榮入唐辛卯十一年唐咸通十二年春正月命改造皇龍寺塔癸巳十三年唐咸通十四年秋九月皇龍寺塔成九層高二十二丈憲康王金晸在位十一年丁酉三年唐乾符四年春二月皇龍寺齊僧設百高座講經王親幸聽之己亥五年唐乾符六年創望海寺亦名新房寺於靈鷲山東麓備考三月王出遊鶴城還至海浦忽雲霧晦冥迷失道路怪問左右日官奏云此東海龍所變也宜行勝事而解之於是敕有司為龍創寺近境施令已出雲開霧散因名開雲浦在今蔚山郡東海龍喜乃率七子現於駕前讚德獻舞奏樂其一子隨駕入京輔佐王政名曰處容王以美女妻之欲留其意又賜級干職王既還乃卜靈鷲山東麓勝地置寺曰望海寺亦名新房寺三國遺事庚子六年唐廣明元年四月沙門體澄入寂備考新羅國武州迦智山寶林寺諡普照禪師靈塔碑銘并序朝請郎守定邊府司馬賜緋魚袋臣金頴奉教撰儒林郎守武州昆湄縣令金薳奉教書聞夫禪境玄寂正覺希夷難測難知如空如海故龍樹獅子之尊者喻芭蕉於西天弘忍慧能之祖師談醍醐於震旦蓋掃因果之跡離色相之鄉登大牛之車入罔象之域是以智光遠照惠澤遐流灑法雨於昏衢布慈雲於覺路見空者一息而越彼邪山有為則永劫而滯于黑業矧乎末法之世像教紛紜罕契真宗平持偏見如劈水求月若提繩繫風徒有勞於六情豈可得其至理其於衆生為舍那舍那為衆生衆生既不知在舍那法界之中縱橫大業舍那亦不知衆生在包含之內湛然常寂豈非迷耶知此迷者大不迷矣知其迷者惟我禪師乎或謂此說為奚落之言吁道經云上士聞道崇而奉之中士聞道如存若亡下士聞道撫掌而笑不笑不足以為道也此之謂矣禪師諱體澄宗姓金熊津人也家承令望門襲仁風是以慶自天鍾德從嶽降孝義旌表於鄉里禮樂冠蓋於軒裳者也禪師託體之年尊夫人夢日輪駕空垂光貫腹因之警寤便覺有懷及逾朞月不之誕生尊夫人追尋瑞夢誓禱良因膳徹修飲斷醪胎訓降戒隲事福田由是克解分蓐之憂允叶弄璋之慶禪師貌雄嶽立氣潤河靈輪齒自然金髮特異閭里聲歎親戚咸驚已從褓襁之年宛有出塵之趣才登齠齔之歲永懷捨俗之緣二親知其富貴難留財色莫繫許其出家遊學策杖尋師投花山勸法師座下聽經為業摳衣請益夙夜精勤觸目無遺歷耳必記常以陶冶粗鄙藻鍊僧儀積仁順而煩惱蠲除習虛靜而神通妙用超然出衆卓爾不羣後以太和丁未歲至加良峽山普願寺受具戒一入壇場七宵行道俄有異雉忽然馴飛大稽古者曰向著陳倉用顯霸王之法今來寶地將興法主之徵者焉初道儀大師者受心印於西堂後歸我國說其禪理時人惟尚經教與習觀存神之法未臻其無為任運之宗以為虛誕不之崇重有若達摩不遇梁武也由是知時未集隱於山林付法於廉居禪師居於雪山偣聖寺偣或疑信字亦疑倍字之誤傳祖心闢師教我禪師往而事焉淨修一心求出三界以命非命以軀非軀禪師察志氣非偶素槩殊常付玄珠授法印至開成二年丁巳與同志貞育虛會等出滄波西入華夏參善知識歷三五州知其法界嗜欲共同性相無異乃曰我祖師所說無以為加何勞遠適心足意興五年春二月隨平盧師歸舊國化故鄉於是檀越傾心釋教繼踵百川之朝釐壑羣嶺之宗鷲山未足為喻也遂次武州黃壑蘭若時大中十三龍集于𭪤木之津憲安大王即位之後年也大王聆風仰道勞干夢魂願開禪扉請入京轂夏六月教遣長沙縣副守金彥卿茶藥迎之師以處雲巖之安兼屬結界之月託淨名之病陳六祖之辭冬十月教又遣道俗使靈巖郡僧正連訓法師奉宸馮瑄等宣喻綸旨請移居迦智山寺遂飛金錫遷入山門其山則元表大德之舊居也表德以法力施于有政是以乾元二年特教植長生標柱至今存焉宣帝十四年仲春副守金彥卿夙陳弟子之禮嘗為入室之賓減清俸出私財市鐵二千五百斤鑄盧舍那一軀以莊禪師所居梵宇教下望水里南利宅共出金一百六十分租二千斛助充裝餝功德寺隸宣教省咸通辛巳歲以十方施資廣其禪宇慶畢功日禪師蒞焉虹之與霓貫徹堂內分輝耀屋渥彩燭人此乃堅牢告祥娑迦表瑞也廣明元年三月九日告諸依止曰吾今生報業盡就木北成汝等當善護持無至隳怠至孟夏中旬二日雷電一山自酉至戌十三日子夜上方地震及天曉右脅臥終享齡七十有七僧臘五十二於是弟子英惠清奐八百餘人義深考妣情感乾坤逮慕攀號聲動溪谷以其月十四日葬於王山松臺疊塔安厝嗚呼禪師名留於此魂魄何之生離五濁超十八空樂寂滅而不歸遺法林而永秀豈惟濟生靈於沙界實亦傳禪聖於三韓禮云別子為祖康成注云子若始來在此國者則後世以為祖是以達摩為唐第一祖我祖國則以儀大師為第一祖居禪師為第二祖我師為第三祖矣中和三年春三月十五日門人義草等纂集行狀遠詣王居請建碑銘用光佛道聖上慕真空之理憫嚴師之心教所司定諡曰普照塔號彰聖寺額寶林褒其禪宗禮也翌日又詔微臣修撰碑贊垂裕後人臣兢惶承命直筆為詞但以供奉宸衷敢避文林嗤哂詞曰禪心不定兮至理歸空如淨琉璃兮在有無中神莫通照兮鬼敢守衝無不足兮施之無窮劫盡恆沙兮妙用靡終其一寥廓舍那道育萬物蠢蠢衆生連舍那律二既同體復誰是佛迷之又迷道乃斯畢其二大哉禪師生乎海域克鍊菩提精修惠德觀空離空見色非色強動為印難名所得其三有為世界無數因緣境來神動風起波翻須調意馬勤伏心猿以斯為寶施于後賢其四乘波若舟涉愛河水彼岸既登惟佛是擬牛車已到火宅任燬法相雖存哲人其萎其五叢林無主山門若空錫放衆虎鉢遣羣龍惟餘香火追想音容刊此貞石紀法將雄其六中和四年歲次甲辰季秋九月戊午朔旬有九日丙子建從頭至第七行禪字已下弟子前兵部侍郎入朝使殿中大監賜紫金魚袋金彥卿興輪寺僧釋賢暢刻字參考廉居禪師塔銘會昌四年歲在甲子季秋之月兩旬九日遷化廉居和尚塔去釋迦牟尼入涅槃一千八百四年矣當此土慶膺大王之時此塔本在原州興法寺今移置京城之塔公園中壬寅八年唐中和二年佛紀一九九年沙門智詵入寂備考有唐新羅國故㬢陽山鳳巖寺教諡智證大師寂照之塔碑銘并序入朝賀正兼延奉皇華等使朝請大夫前守兵部侍郎元瑞書院學士賜紫金魚袋臣崔致遠奉教撰序曰五常分位配動方者曰仁三教立名現淨域者曰佛仁心即佛佛目能仁則也導郁夷柔順性源達迦衛慈悲教海實猶石投水雨聚沙然矧東諸侯之外守者莫我大也而地靈既好生為本風俗亦交讓為先熙熙太平之春隱隱上古之化加以性參釋種遍頭居寐錦之尊語襲梵音彈舌足多羅之字實乃天彰西顧海印東流宜君子之鄉染法王之道日深又日深矣且自魯紀隕星漢徵佩日像蹟則百川含月法音則萬籟號風或緝懿縑緗或鐫花琬琰故濫觴𨿅宅懸鏡秦宮之事跡昭昭焉如揭合璧苟非三尺喙五色毫焉能措辭其間駕說于後就以國觀國考從鄉至鄉則風傳沙嶮而來波及海隅之始昔當東表鼎峙之秋有百濟蘇塗之儀蘇塗說文云佛塔謂之浮屠亦云蘇塗也若離釋木蘇泥塗也百濟時以土木為神像率百官祭之若甘泉金人之祀魏書佛考志云武帝元狩中霍去病入西域獲金人以還長丈餘帝以為大神奉于甘泉宮燒香禮拜也厥後西晉曇始始之貊如葉騰東入句驪阿度度于我如康會南行吳書赤鳥四年有康居國丞相子姓康名僧會棄俗歸緇以遊化為己任行至建康營立茅茨設像行道瓶中乞舍利吳主孫權因此建塔立寺度人為僧尼也時乃梁菩薩帝返同泰一春我法興王制律條八載也亦既海岸植與樂之根日鄉耀增長之寶天融善願地聳勝因爰有中貴捐軀上仙剔髮苾芻西學羅漢東遊因爾混沌能開娑婆遍化莫不選山川勝槩窮土木奇功藻宴坐之宮燭修行之路信心泉湧慧力風揚果使漂杵蠲灾鞬櫜騰慶昔之蕞爾三國今也壯哉一家鴈剎雲排將無隙地鯨桴雷震不遠諸天漸染有餘幽求不斁其教之興也毗婆姿小乘也先至則四郡驅四蹄之輪摩訶衍大乘也後來則一國耀一乘之鏡然能義龍雲躍律虎風騰洶學海之波濤蔚戒林之柯葉道咸融乎無外情或涉於有中抑止水停漪高山佩旭者蓋有之矣世未之知洎長慶初有僧道義西泛睹西堂之奧洪居士注云長慶己巳道義行化楓嶽雪嶽至文德二年智光侔智藏西堂法諱而還始語玄契者案始語云此師東還以前東人不知有禪故云始言玄契言直指人心見性成佛如馬祖一喝百丈得大機黃檗得大用等是也縛猿心而護奔北之短矜鷃翼而誚圖南之高既醉於誦言竸嗤為魔語是用韜光廡下斂跡壺中罷思東海東終遁北山北豈大易之無悶中庸之不悔者耶然秀冬嶺芳定林蟻慕者如山鷹化者幽谷道不可廢時然後行及興德大王纂戎宣康太子監撫去邪醫國樂善肥家有洪陟大師去西堂證心來南嶽休足陟師法嗣興德大王宣康太子鷩冕陳順風之請龍樓慶開霧之期顯示密傳朝凡暮聖變非蔚也興且勃焉試較其宗趣則修乎修沒修證乎證沒證其靜也山立其動也谷應無為之益不爭而勝於是乎東人方寸地靈矣能以靜利利海外不言其所利大矣哉爾後觴騫河筌融道無念爾祖實繁有徒或劒化延津或珠還合浦為巨擘者可屈指焉西化謂去中國則靜衆寺也無相無相大師燒香求法衣草食土唐玄宗禮敬殊甚柳宗元起影堂李商隱為碑銘其門人保唐無住亦名僧也常山慧覺馬和尚字慧覺金雲卿之弟益州金鎮州金者是禪譜云黃梅子金生石也東歸則前所敘北山義南嶽陟而降及太安徹國師惠徹也慧日育無可考智力聞智力寺名也雙溪照即慧照也新興彥即忠彥也湧巖體即覺體也珍丘休玄昱覺休也雙峯雲即覺雲也孤山日即品日也兩朝國師聖住染即無染也菩提之宗惠雲即無染嗣德之厚為父衆生道之尊為師王者古所謂逃名名我隨避聲聲我追者故得皆化被恆沙蹟傳豐石有令兄弟宜爾子孫俾定林標秀於雞林慧水安流於鰈水矣別有不戶不牖而見大道不山不海而得上寶恬然息意淡乎忘味彼岸也不行而止此土也不嚴而治七賢孰取譬十住難定位者賢溪山智證大師其人也始大成也發蒙于梵體大德稟具于瓊儀律師終上達也探玄于惠隱嚴君即法師受默于楊孚令子即禪師法胤唐四祖為五世父道信之旁出東漸于海遡流數之雙峯四祖號子法朗法朗恐是法明之誤孫信行曾孫遵範玄孫惠隱末孫大師也朗大師從大醫四祖法諡大證按杜中書正倫纂銘遠方奇士異域高人無憚險途來至珍所則掬寶歸止非師而誰第知者不言復藏于密能撢祕藏唯行大師然時不利兮道未亨也乃浮于海仍聞于天肅宗皇帝躬貽天什曰龍兒渡海不憑筏鳳子冲虛無認月師以山鳥海龍二句為對有深旨哉東還三傳至大師畢萬之後斯驗矣其世緣則王都人金姓子號道憲字智詵父贊瓖母伊氏長慶甲辰歲現于世中和壬寅曆歸于寂宴坐也四十三夏歸全也五十九年其具體則身仞餘面尺所儀狀魁岸語言雄亮真所謂威而不猛者也始孕洎滅奇跡祕說神出鬼沒筆不可記今撮其感應聳人耳者六異操履驚人心者六是而分表之初母夢一巨人告曰僕昔勝見佛季時為桑門以瞋恚故久墮龍報報既矣當為法孫故托妙緣願弘慈化因有娠幾四百日灌佛之旦誕焉事驗蟒亭夢符象室使佩韋者益誡擁毳者精修降生之異一也生數夕不咽乳㝅之則號欲嗄歘有道人過門誨曰欲兒無聲忍絶葷腥母從之竟無恙使乳育者加慎肉喰者懷慚宿習之異二也九歲喪父殆毀滅有追福僧憐之喻曰幻躬易滅壯志難城昔佛報恩大有方便子勉之因感悟輟哭白所生請歸道母慈其幼復念保家無主確不許耳踰城故事則亡去就學浮石山忽一日心驚坐屢遷俄聞倚閭成疾遽歸省而病隨愈時人方之阮孝緒居無何染沉疴謁醫無效枚卜之僉曰宜名隸大神母追惟曩夢試覆以方袍而泣誓言斯疾若起乞佛為子信宿果大瘳仰悟慈親終成素志使䑛犢者割慈飲蛇者釋疑孝感之異三也至十七受具始就壇覺袖中神光熠熠然探之得一珠豈有心而求乃無脛而至真六度經所喻矣使飢呼者自飽醉倒者能醒勵心之異四也坐雨竟將他適夜夢遍吉菩薩撫頂提耳曰苦行難行行之必成形開癢然默篆肌骨自是不復服繒絮焉條線之須用必麻楮不穿韃履矧羽翣毛茵餘用乎使縕黂者開眼衣蟲者厚顏律身之異五也自綺年飽老成之德加瑩戒珠可畏者競相從求益大師拒之曰人之大患好為人師強欲惠不惠其如模不模何况浮芥海鄉自濟未暇無影逐為必笑之態後山行有樵叟假礙前路曰先覺覺後覺何須吝空殼就之則無見焉爰愧且悟不阻來求森竹葦于雞藍山水石寺俄卜築他所曰不繫為懷能遷是貴使占𠌫者三省營巢者九思垂訓之異六也贈太師景文大王心融鼎教面謁輪工遙深爾思覬裨我則乃寓書曰伊尹大通宋纖小見以儒比釋自邇陟遐甸邑巖居頗有佳所木可擇矣無惜鳳儀妙選近侍中可人鵠陵昆孫立言姓金為使既傳教已因攝齊焉答曰修身化人捨靜奚趣鳥能之命善為我辭幸許安塗中無令在汶上上聞之益珍重自是譽四飛於無翼衆一變於不言咸通五年冬端儀長翁主未亡人為稱當來佛是歸敬為下生厚資上供以邑司所領賢溪山安樂寺富有泉石之美請為猿鶴主人大師乃告其徒曰山號賢溪地殊愚谷寺名安樂僧盍住持從之徙焉居則化矣使樂山者益靜擇地者慎思行藏之是一焉他日告門人曰故輔粲金公嶷勳度我為僧報公以佛乃鑄丈六玄金像傅之以銑爰用鎮仁宇導冥路使市恩者日篤償義者風從知報之是二焉至八年丁亥檀越翁主使茹金等持伽藍南畝暨贓獲本籍授之為壞袍傳舍永俾不易大師因念言王女資法喜尚如是矣佛孫昧禪悅豈徒然乎我家匪貧親黨皆沒與落路行人之手寧充門弟子之腹遂於乾符六年捨莊十二區田五百結隸寺焉飯孰譏囊粥能銘鼎民天是賴佛土可期雖曰我田且居王土始質疑於王孫輔粲繼宗執事侍郎金八元金咸熙及正法司大統釋玄亮聲九皋應千里贈太傅獻康大王恕而允之其年九月教南川郡僧統訓弼亦姓金氏標別墅劃生場斯蓋外佐君臣益地內資父母生天使續命者興仁賞歌者悛過檀捨之是三也有居乾慧地者曰沈忠聞大師刃餘定慧鑑透乾坤志確曇蘭術精安廩禮足已白言弟子有剩地在曦陽山腹鳳巖龍谷境駭橫目幸搆禪宮徐答曰吾未能分身惡用是忠請膠固加以山靈有甲騎為前趨之異乃錫杖挺樵蹊而相歷焉且見山屏四列則鸑翅掀雲水帶百圍則虬腰偃石既愕且唶曰獲是地也庸非天乎不為青衲之居其作黃巾之窟遂率先於衆防後為基起瓦簷四注以壓之鑄鐵像二軀以衛之至中和辛丑年教遣前安輪寺僧統俊恭司正史裴聿文標定疆界艿賜榜為鳳巖焉及大師往化數年有山氓為野寇者始敢拒轍終能食椹得非深𣂏定水預沃魔山之巨力歟使絶臂者標義掘尾者制狂開發之是四焉太傅大王以華風掃弊慧海濡枯素欽靈育之名渴聽法深之論乃注心雞足灑翰鵠頭以徵之曰外護少緣念踰三際內修大慧幸許一來大師感動琅函言及勝因通世同塵率土懷玉出山轡織迎途至憩足于禪院寺錫安信宿引問心于月池宮時屬纖蘿不風溫樹方夜適覩金波之影端臨玉沼之心大師俯而覬仰而告曰是則是餘無所言上洗然欣契曰金仙花月所傳風流固宜於此遂拜為忘言師及出俾藎臣譬旨幸且小停答曰謂牛戴牛所直無幾以鳥養鳥為惠不資請從此辭枉之則折上聞之喟然以韻語歎曰挽既不留空門鄧侯師是支鶴吾非趙鷗乃命十戒弟子宣教省副使馮恕行援送歸山使待兔者離株羡魚者學網出處之是五焉在世行無遠近險夷未嘗代勞以蹄角及還山氷雪梗跋涉乃以栟櫚步輿寵行謝使者曰是豈非井大春所云人車耶為顧英君所不須矧形毀者乎然命既至矣受之為濟苦具及移疾于汝樂蘭若杖錫不能起始乘之使病病者了空賢賢者離執用捨之是六焉至冬抄既望之後二日趺坐晤言之際泊然無常嗚乎星回上天月落大海終風吼谷則聲咽虎溪積雪榷松則色侔鶴樹物感斯極人悲可量信而假殯于賢溪期而遷窆于曦野太傅大王馳醫問疾降騋營齊不暇無偏無頗能諧有始有卒特教菩薩戒弟子建功鄉令金立言慰勉諸孤賜諡智證大師塔號寂照仍許勒石俾録狀聞門人性蠲敏休揚浮繼徽等咸得鳳毛者斂陳蹟以獻至乙巳歲有國民媒儒道嫁帝鄉而名掛輪中職攀柱下者曰崔致遠捧漢后龍緘賫淮王鵠幣雖慙鳳舉頗類鶴歸上命信臣陶竹陽授門人狀賜手教曰縷褐東師始悲西化繡衣西使深喜東還不朽之為有緣而至無吝外孫之作將酬太師之慈臣也雖東箭非才而南冠多幸方思運斧遽值號弓况復國重佛書家藏僧史法碣相望禪碑最多遍覽色絲試搜錦頌則見無去無來之說競抱斗量不生不滅之談動論車載曾無魯史新意或用周公舊章是知石不能言益驗道之云遠唯懊師化去早臣歸來遲靉靆字誰告前因逍遙義不聞真訣每憂傷手莫悟申拳歎時則露往霜來遽雕愁鬢談道則天高地厚僅腐頑毫將諧汗漫之遊始述崆峒之美有門人英爽來趣受辛金口是資石心彌固忍踰刮骨求甚刻身影伴八冬言資三復抑六異六是之屬辭無愧賈勇有餘者實乃大師內蕩六魔外除六斃行苞六度坐證六通故也事譬採花文難消藁雖同榛楛勿剪有慙糠粃在前跡追蘭殿之遊誰不仰月池佳對偈效柏梁之作庶幾騰日域高談其詞曰麟聖拾遺記云孔子未生之前麒麟吐玉書於闕里人家曰水精之子繼衰周而素王天下孔母徵在以繡紱係其角後獲其麟解紱而泣絶春秋之筆故云麟聖依仁乃據德鹿仙燉煌實跡云老子父韓虔夢日光敷野而一仙人駕鹿入室與上洋朱氏牧猪婢子合懷而孕住胎八十一年生故云鹿仙知白能守黑老子云知其白守其黑為天下式二教徒稱天下式螺髻真人佛根本無明已斷故頭髮繞旋如螺髻難捔力十萬里外鏡西域一千年後燭東國雞林地在鼇山側仙儒自古多奇特可憐曦仲不曠職更迎佛日辨空色教門從此分階城言路因之理溝洫身依兔窟心難息足躡羊岐眼還惑法海安流真叵測心傳眼詖包真極得之得類罔象得默之默異寒蟬默北山義與南嶽陟垂鵠翅與展鵬翼海外時來道難抑遠派禪河無壅塞蓬托麻中能自直珠探衣內休傍二湛若賢溪善知識十二因緣匪虛飾何用攀絙兼附杙何用䑛筆及含墨彼或遠學來匍匐我能靜坐降魔賊莫把意樹謾栽植莫把情田枉稼穡莫把恆沙論萬億莫把孤雲定南北德馨四遠聞簷蔔慧化一方安社面奉天花飄縷裓心憑水月呈禪栻霍副往綿誰入棘腐儒玄杖慙擲埴跡輝寶幢名可勒才輸錦頌文難織囂腹欲飫禪悅食來向山中看篆刻用洪居士注及別注乙巳十一年唐光啓元年高僧行寂自唐還丙午十二年唐光啓二年皇龍寺設百高座講經真聖女主金曼在位十年丁未元年唐光啓三年王幸皇龍寺設百高座聽法戊申二年唐文德元年春二月角干魏弘追封為大王諡惠成弘有寵於女主常入內用事仍命與僧大炬修集鄉歌十一月十七日無染國師入寂備考有唐新羅國故兩朝國師教諡大朗慧和尚即無染也麻谷徹嗣白月葆光之塔碑銘并序淮南入本國送國信詔書等使前東面都統巡官承務侍郎侍御史內供奉賜紫金魚袋臣崔致遠奉教撰從弟朝請大夫前守執事侍郎賜紫金魚袋臣崔仁渷奉教書帝唐揃亂以武功易元以文德之年暢月月缺之七日日蘸咸池之時海東兩朝景文獻康國師禪和尚盥浴已趺坐示滅國中人如喪左右目矧門下諸弟子乎嗚乎應東身者八十九春服西戒者六十五夏去世三日倚繩座儼然面如生門人詢又等號奉遺體假肂禪室中上聞之震悼使駛吊以書賻以穀所以資淨供而贍玄福越二年攻石封層冢聲聞玉京菩薩戒弟子武州都督蘇判鎰執事侍郎寬柔貝江都護咸雄全州別駕英雄皆王孫也維城輔君德險道賴師恩何必出家然後入室遂與門人昭玄即昭玄精署住持律法之司也大德釋通玄四天王寺上座五分律云上更無人名上座又毗尼母論云從一夏至九夏是下座自十夏至十九夏為中座自二十夏至四十九夏是上座五十夏以上一切沙門所尊敬故通名耆宿也釋慎符議曰師云亡君為慟奈何吾儕忍灰心木舌缺緣飾在三之義乎君師父也乃白黑相應請贈諡暨銘塔教曰可旋令王孫夏官二卿禹圭召桂苑行人侍御史崔致遠至蓬萊宮因得竝琪樹上瑤墀跽俟命珠箔外上曰故聖住大師真一佛出世昔文考康王咸師事福國家為日久余始克纘承願繼餘同先志而天不憗遺益用悼厥心余以有大行者授大名故諡曰大朗慧塔曰白月葆光乃嘗西官絲染錦歸崔致遠十二入唐二十八還故曰巫峽重峰之年絲入中國銀河列宿之歲錦還東土顧文考選國子命學之康王視國士禮待之若宜銘國師以報之謝曰主臣殿下恕粟饒浮秕桂飽餘香俾報德以文固多天幸第大師於有為澆世演無為祕宗小臣以有限麼才紀無限景行弱轅載重短綆深汲其或石有異言龜無善顧决叵使山輝川媚反嬴得林慙澗愧請筆路斯避上曰好讓也吾國風善則善矣然苟不能是惡用黃金榜為爾勉之遽出書一編大如椽者俾中涓授之乃門弟子所獻狀也復惟之西學也彼此俱為之而為師者何人為役者何人豈心學者高口學者勞耶故古之君子慎所學抑心學者立德口學者立言則彼德也或憑言而可稱是言也或倚德而不朽可稱則心能遠示乎來者不朽則口亦無慙乎昔人為可為於可為之時復焉敢膠讓乎篆刻始繹如椽狀則見大師西遊東返之歲年稟戒悟禪之因緣公卿守宰之歸仰像殿影堂之開創故翰林郎金立之所撰聖住寺碑敘之詳矣為佛為孫之德化為君為師之聲價鎮俗降魔之威力鵬顯鶴歸之動息贈太傅獻康大王親製深妙寺碑録之備矣顧腐儒之今作也止宜標我大師就涅槃之期及與吾君崇窣堵婆之號而已口將手議役將自適其適這有上足苾芻來趣音促虀臼語及斯意則曰立之碑立之久矣尚闕數十年遺美太傅王神筆所記蓋顯示殊遇云爾吾子口嚼古賢書面飲今君命耳飫國師行目醉門生狀宜廣記而備言之貽厥可畏謂後生也俾原始要終脫西笑者或袖之脫西人笑則幸甚吾敢求益子無憚煩狂奴態餘率爾而應之曰僕編苫者師買菜乎編苫者常以編索比前欲其短也買菜者常求益其小分比求其廣述也遂絆猿心強搖兔翰憶得西漢留侯傳尻云良所與上從容言天下事甚衆非天下所以存亡故不著則大師時順間事蹟犖犖者星繁非所以警後學亦不書自許窺一班於班史然於是乎管述曰光盛且實而有暉八紘之質者莫均乎曉日氣和且融而有孚萬物之功者莫溥乎春風惟俊風與旭日俱東方自出也則天鍾斯二餘慶嶽降于一靈性俾挺生君子國特立梵王家者我大師其人也法諱無染於圓覺祖師唐代宗追諡達磨云圓覺大師為十世孫俗姓金氏以武烈王為八代祖大父周川品真骨真骨有五品一曰聖骨二曰真骨三曰難得四曰生族五曰金骨位韓粲高曾出入皆將相戶知之父範清族降真骨一等曰難得晚節追蹤趙文業母華氏魂交覩修臂天垂授𪵒蓮也花因有娠幾踰時三月申夢胡道人自稱法藏授十護充胎教過期而誕大師哀莊王六年即唐德宗貞元十七年辛巳歲十二月二十八日午時生懷十三月而生也阿孩時行坐必合掌趺對至與羣兒戲畫墁聚沙必模樣像塔而不忍一日違膝下九歲始扣篋目所覽口必誦人稱曰海東神童跨一星終有隘九流意入道先白母母念已前夢泣曰䚷音偈應聲後謁父父悔其晚悟喜曰善遂零染零髮染衣于雪山五色石寺即雪嶽南麓襄陽五色洞口精嘗藥善解經意力鋭補天按補天補佛天也上句應雪山下句應五色石也有法性禪師亦云國師嘗扣騣伽門于中夏者騣伽門小乘法也法性於中夏黃屋山學看心法大師師事數年撢索無孑遺性歎曰迅足駸駸後發先至吾於子驗矣吾悏矣無餘勇可賈於子矣如子者宜西也大師曰夜繩易惑惑夜繩而為實蛇是偏計之情執指小乘法空縷難分羅什法師傳云什之師盤頭達多與什共論大小乘優劣達多謂什曰汝所謂大乘者豈非空裏之縷耶古有至愚者詣織師家求布之至細者織師以上品細妙之縷示之愚人猶以為織師不忿指空曰此縷如何愚人曰何以無見織師曰極細故無見若見則是非細云云愚人大喜汝大乘類是也魚非緣木可求兔非守株可待故師所教已所悟互有所長苟珠火斯來則蚌燧可棄凡志於道者何常師之有尋移去問驃訶健拿此云華嚴經也于浮石山釋澄大德日敵三十夫藍茜沮本色顧坳堂之譬莊子云覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也曰東面而望不見西墻論語云叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宮墻賜也之墻比肩窺見室家之美夫子之墻數仞不得其門而入不見宗廟之美百官之富得其門者寡矣彼岸不遙何必懷土遽出山併海覗西泛之緣會國師歸瑞節象魏下仛足而西及大洋中風濤歘顛怒巨艑壞人不可復振大師與心友道亮跨隻板恣業風通星謂通晝夜半月餘飄至劒山島即黑山島膝行之崎上悵然甚久曰魚腹中幸得脫身龍頷下庶幾攙手我心匪石其可退轉乎洎長慶初正朝使王子昕金陽字魏昕為武州都督太宗之後溟州郡主金周元之曾孫也艤舟唐恩浦請寓載許焉既達之罘山麓顧先難後易土揖周禮秋官司儀王南面見諸侯土揖庶姓時揖異姓天揖同姓注云土揖推手小下時揖平推手天揖推手小舉也海若水神也曰珍重鯨波好戰風魔行至大興城南山至相寺遇說雜花者猶在浮石時有一䃜顏耆年謂黑色老人也言提之曰遠欲取諸物孰與認而心而謂爾也大師舌底大悟自是置翰墨遊歷佛光寺問道如滿滿佩江西印為香山白尚書樂天空門友者而應對有慙色曰吾閲人多矣罕有如是新羅子矣他日中國失禪將問之東夷耶去謁麻谷寶徹和尚服勤勞無所擇人所難己必易衆目曰禪門庾異行徹公賢苦節嘗一日告之曰昔吾師馬和尚訣我曰春花繁秋實寡攀道樹者所悲吒今授若印異日徒中有奇功可封者封之無使剜復云東流之說蓋出鉤讖則彼日出處善男子根殆熟矣壇經六祖云吾去七十年有二菩薩一在家梵日二出家無染俱從東方來同時建立吾宗締構伽藍昌隆法嗣云云若若得東人可目語者謂以心傳心也畎導之俾慧水丕冒於海隅為德非淺師言在耳吾喜若徠今印焉冠禪侯于東土往欽哉則我當年作江西大兒後世為海東大父其無慙先師乎居無何徹師化去墨巾離首謂脫孝也乃曰筏既捨矣舟何繫焉自爾浪遊飄飄然勢不可遏志不可奪於是渡汾水登崞山跡之古必尋僧之真必詣凡所止舍遠人烟大要在安其危甘其苦役四體為奴虜奉一心為君主就是中顓以視篤癃恤孤獨為己任至祈寒酷暑且煩暍或皸瘃侵曾無倦容耳名者不覺遙禮囂作東方大菩薩其三十餘年行事也具如是會昌五年來歸帝命也國人相慶曰連城璧復還天實為之地有幸也自是請益者所至稻麻矣入王城省母社母大歡喜曰顧我疇昔夢乃非優曇之一顯耶願度來世吾不復撓倚門之望也已矣乃北行擬目選終焉之所會王子昕懸車為山中宰相邂逅適願謂曰師與吾俱祖龍樹乙粲則師內外為龍樹令孫真瞪若不可及者而滄海外躡瀟湘故事則新舊緣固不淺有一寺在熊川坤隅熊川今公州坤隅謂藍浦聖住寺是吾祖受封之所間劫燼流災金田半灰匪慈哲孰能興滅繼絶可強為朽夫住持乎大師答曰有緣則住大中初始就居且蠁肹飭之俄而道大行寺大成繇是四遠問津輩千里猶跬步其不億實繁有徒大師猶鍾待扣如鏡忘罷至者靡不以慧照導其目法喜娛其腹誘憧憧之躅變蚩蚩之俗文聖大王聆其運為莫非裨王化甚嘉之飛手教優勞且多大師答山相之四言王子昕為山中宰相故云山相有緣則住是四言也易寺榜為聖住寺舊名烏合寺仍編録大興輪寺大師酬使者曰寺以聖住為名招提此云別房施又云對回施也固所為榮至寵庸僧濫吹高籍實避風斯而隱霧可慚矣時憲安大王與檀越季舒發韓韓與翰同職名文聖大王十九年侍中金陽卒追諡舒發韓魏昕為南北相左右相也遙展攝齊禮贄以茗馞使無虛月至使名霑東國士流不識大師門為一世羞得禮足者退必唶曰面謁百倍乎耳聞口未出而心已入抑有猴虎而冠者亦息其躁革其暴而竟奔馳善道暨憲安王嗣位賜書乞言大師答曰周禮對魯公之語有旨哉著在禮經請銘座側逮贈太尉先大王即位欽重如先朝志而日加厚焉凡所施為必馳問然後舉咸通十二年秋飛鵠頭書以傳召曰山林何親城邑何踈大師謂生徒曰遽命伯宗深慚遠公然道之將行也時乎不可失念付囑故佛滅度時以佛法流通付囑國王大臣也吾其往矣歘爾至轂下及見先大王冕服拜為師君夫人世子暨太弟相國追奉尊諡惠成大王羣公子公孫環仰如一一古伽藍績壁面寫出西方諸國長侍勃陀即佛陀也樣式上曰弟子不侫少好屬文嘗覽劉協文心有語云滯有守無徒鋭偏解欲詣真源其般若之絶境則境之絶者或可得聞乎大師對曰境既絶矣理亦無矣斯印也默行爾上曰寡人固請少進爰命徒中錚錚者更手撞擊春容盡聲剖滯祛煩若商颷之劃陰靄然於是上大喜懊見大師晚曰恭已南面司南南宗舜何人哉豫何人哉既出卿相延迓與謀不暇士庶趨承欲去不能自是國人皆認衣珠鄰叟罷窺廡玉焉俄若樊籠中即亡去上知不可強乃降芝檢以尚州深妙寺不遠京師請禪那別館辭不獲往居之一日畢葺儼若化城乾符三年春先大王不豫命近侍曰亟迎我大醫王來使至大師曰山僧足及王門一之謂甚知我者謂聖住為無住不知我者謂無染為有染乎然顧與吾君有香火因緣忉利之行有期矣盍就一訣復步至王居設藥言施針戒覺中愈舉國異之既逾月獻康大王居翼室泣命王孫勛榮諭旨曰孤幼遭閔凶未能知政致君奉佛誧誨人與獨善其身不同言也幸大師無遠適所居惟所擇對曰古之師則六籍存今之輔則三卿在老山僧何為者坐蝗𡕎桂玉哉就有三言庸可留獻曰能官人翌日挈山裝鳥逝自爾騎置傳訊影綴巖溪遽人驛傳急卒知往抵聖住即皆雀躍叢手易轡慮帝王城猶尺寸地由是騎常侍倫俉軍卒得急宣為輕舉乾符帝錫命之歲令國內有可道者貢興利除害策別用蠻錢書言荷天寵有所自因垂益國之問大師引出何尚之獻替宋文帝心聲為對揚子法言曰言心聲也書心畫也注聲發成言畫紙成書書有文質言有史野二者之來皆由於心大傅王覽謂介弟南宮相曰三畏比三歸五常均五戒能踐王道是符佛心大師之言至矣哉吾與汝宜惓惓中和西狩之年秋上謂侍人曰國有大寶珠畢世櫝而藏之其可乎曰不可不若時一出俾醒萬戶眼醉四鄰心上珍匿曜在崇巖山脫闢祕藏宜照透三千界何十二乘之足道哉我文考懇迎當再顯矣昔酇侯譏漢王拜大將如呼小兒不能致商於有本作商山老人以此今聞天子蒙塵趣令奔問官守勤王加厚歸佛居先將邀大師必叶外議吾豈敢倚其一慢其二哉乃重其使畁其辭徵之大師云孤雲出岫寧有心哉有緣乎大王之風無固乃上士孔子之道遂來見見如先朝禮禮之加焯然可屈指者面供饌一也手傳香二也三禮者三三也秉鵲尾爐締生生世世因緣四也加法稱曰廣宗五也翌日命振鷺雁列賀六也教國中磋磨六義者賦送歸之什在家弟子王孫蘇判嶷榮首唱斂成軸侍讀翰林才子朴雍為序引而贈行七也申命掌次張淨室要敘別八也臨告別求妙訣乃眴從者舉真要有若詢乂圓藏靈源玄影四禪中得清淨者緒抽其慧表纖其旨注意無怠沃心有餘上甚悅擡拜曰昔文考為捨瑟之賢今寡人忝避席之子繼體得崆峒之請服膺開混沌之源則彼渭濱老翁真釣名者圯上孺子蓋履跡焉雖為王者師徒弄三寸舌也曷若吾師語密傳一片心乎奉以周旋不敢失墜太傅王雅善華言金玉其音不患衆咻聒而能出口成儷語如宿搆云大師即退且往應王孫蘇判鎰共言數返即歎曰昔人主有有遠體而無遠神者而吾君備人臣有有公才而無公望者而吾子全國其庶乎宜好德自愛及歸謝絶於是遣輶軒標放生場界則鳥獸悅紐銀鉤札聖住寺題則龍蛇活盛事畢矣昌期忽兮定康大王蒞阼兩朝寵遇師而行之使緇素重使迎之辭以老且病太尉王流恩表海仰德高山嗣位九旬馳訊七返俄聞腰之苦遽令國醫往為之至則請苦狀大師微破顏曰老病耳無煩治糜飱二時必聞鍾後進其徒憂食力虧陰戒掌枹者陽密擊乃目牖而命撤將化往命旁侍警遺訓于介衆曰已過中壽難逃大期我儂遠遊爾曹好住講若畫一守而勿失古之吏尚如是今之禪宜勉旃告訣裁罷慹然而化大師性恭謹不傷和氣禮所云中退然訥訥然者乎黌侶必目以禪師接賓客未嘗殊敬乎尊卑故滿室慈悲蒸徒悅隨五日為期俾來求者質疑諭生徒則曰心雖是身主身要作心師患不爾思道豈遠而設是田舍兒能擺脫塵霧我馳則心馳矣醫師謂佛也教父老子云吾將以為教父此通指孔老寧有種乎又曰彼所啜不濟我渴彼所噉不救我餒盍努力自飲自食如人上山各自努力或謂禪教為無同異吾未見其宗語本夥頤非吾所知大較同不與異不非晏坐息機斯近縷褐被者歟其言顯而順其旨奧而信故能使尋相為無相道者歟勤而行不見有歧中之歧始壯及衰自貶為基食不異糧衣必均服凡所營葺役先衆人每言祖師嘗踏泥吾豈暫安栖至運水負薪或躬親之且曰山為我為塵我安得安身其剋己勵物皆是類大師少讀儒家書餘昧在脣吻故酬對多韻語門弟子名可名者僅二千人索居而稱坐道場者曰僧亮曰普慎曰詢乂曰僧光諸孫詵詵厥衆濟濟實可謂馬祖育龍子東海掩西河焉論曰麟史不云乎公侯之子孫必復其始則昔武烈大王為乙粲時為屠穢貊乞師計將真德女君命陛覲昭陵皇帝唐太宗也面陳願奉正朔易服章天子嘉許庭賜華裝受位特進一日召諸蕃王子宴大置酒堆寶貨俾恣滿所欲王乃杯觴則禮以防亂繒綵則智以獲多洎辭出文皇太宗目送而嘆曰國器及其行也以御製并書溫陽晉陽二碑暨御撰晉書一部賫之時蓬閣寫是書裁竟二本上一賜儲君一為我賜復命華資官祖道青門外則寵之優禮之厚設聾盲乎智者亦足駭耳目自茲吾土一變至於魯八世之後大師西學而東化加一變至於道則莫之與京捨我誰謂偉矣哉先祖平二敵國俾人變外飾大師降六魔賊俾人修內德故得千乘主兩朝拜起四方民萬里奔趨動必而使之靜無腹非者庸詎非應半千仇池筆記云黃河五百年小清賢人出而顯大千者歟復其始之說亦何慊乎哉彼文成侯為師漢祖大誇封萬戶位列侯為韓相子孫之極則㑋矣假學仙有終始果能白日上升去於中止得為鶴背上一幻軀耳又焉望我大師拔俗於始濟衆於中潔己於終矣乎美盛德之形容古尚乎頌頌偈類也扣寂為銘其詞曰可道非常道如穿草上露即佛非真佛如攬水中月道常得佛真海東金上人本枝根聖骨瑞蓮資報身五百年擇地十三歲離塵雜花引鵬路木浮鯨津其一觀光堯日下巨筏悉能捨先達皆歎云苦行無及者沙之復汰之東流是天假心珠瑩麻谷目鏡燭桃野其二既得鳳來儀衆翼爭追隨試覷龍變化凡情那測知仁方示方便聖住強住持松門遍掛錫巖徑難容錐其三我非待三顧我非迎七步時行則且行為緣付囑故二王拜下風一國滋甘露鶴出洞天秋雲歸海山暮其四來貴乎葉龍去高乎冥鴻渡水愜巢父入谷超朗公一從歸島後三返遊壺中羣迷謾臧否至極何異同其五是道淡無味然須強飲食他酌不吾醉他飱不吾飽誡衆出心何糠名復粃利勸俗飾身何甲仁復胄義其六汲引無棄遺其實人天師昔在世間時舉國成琉璃自寂歸滅後觸地生蒺藜泥洹一何早今古所共悲其七甃石復刊石藏形且顯跡鵠塔點青山龜碑撑翠壁是豈向來心徒勞文字覓欲使後知今猶如今視昔其八君恩千載深師化萬代欽誰持有柯斧誰倚無絃琴禪境誰沒守客塵寧許侵雞峰待彌勒將在東雞林其九用洪居士注辛亥五年唐大順二年世達寺高麗金富軾云今之興教寺是也僧善宗弓裔叛投北原賊梁吉甲寅八年唐乾寧元年崔致遠挈家隱伽倻山與母兄浮圖賢俊及定玄師結為道友以終老焉乙卯九年唐乾寧二年初桐裏山祖師道詵史云道詵入唐得地理法而還此誤也故削之登白頭山至鵠嶺見王隆隆溪州松嶽郡人初名龍建字文明是為世祖貌魁偉美鬚髯器宇宏大有并吞三韓之志嘗夢見美一人約為室家後自松嶽往永安城道遇一女惟肖遂為婚不知所從來故號夢夫人或云以其為三韓之母遂姓韓氏是為威肅王后新搆第即松京之延慶宮奉元殿基也曰種穄之地何種麻耶言訖而去夫人聞而以告王隆倒屣追之及見如舊識遂與登鵠嶺究山水之脈上觀天文下察時故曰此地脉自壬方白頭水母木幹來落馬頭明堂君又水命宜從水之大數作宇六六為三十六區則符應天地之大數明年必生聖子宜名曰王建為書一封題其外云謹奉書百拜獻書于未來統合三韓之主大原君子足下書祕世莫知也王隆從其言築室而居及期果生建于其第神光紫氣繞室充庭竟日盤旋狀若蛟龍幼而聰明龍顏日角方頤廣顙器度雄深語音弘大寬厚有濟世之量建年十七道詵復至請見曰足下值百六之會三季蒼生待君弘濟因告以出師置陳之地望秩山川感通保佑之理至是投弓裔弓裔以王建為鐵圓郡太守孝恭王金嶢在位十五年戊午二年唐光化元年佛紀一九二五年三月十日道詵國師入寂備考道詵國師本碑高麗崔惟清撰師俗姓金氏新羅靈巖人也其世系則史失之或云太宗大王之孽孫也母姜氏夢人遺明珠一顆使吞之遂有娠既乳育敻異凡兒年十五穎悟夙成遂祝髮𨽻月遊山華嚴寺讀習大經學徒百千駭服稱神唐文宗開成十一年新羅文聖王八年丙寅年二十矣忽自念曰大丈夫當離法自靜安能兀兀守文字間耶于時惠徹大師傳密印於西堂智莊禪師開堂於桐裏山師摳衣請學凡所謂無說之說無法之法虛中授受廓爾超悟年二十三受具戒於穿道寺或於雲峰山下穿洞安禪或於太白巖前結茅坐夏又移曦陽縣白雞山玉龍寺愛其幽勝改葺堂宇灑然有終焉之志宴坐忘言三十五載憲康大王遣使奉迎留止禁中師每以玄言妙道開發君心未幾不樂京輦懇請還山忽一日召弟子曰吾將行矣乘緣而來緣盡則去理之常也何足悲傷言訖跏趺而寂時唐昭宗光化元年新羅孝恭王二年戊午三月十日也享年七十二時高麗太祖年三十一後至四士一乃天授元年四衆啼泣如慕如疑遂遷坐立塔于寺之北岡遵遺命也孝恭王贈諡曰了空禪師塔曰證聖慧燈門人珙寂等懼先師之景行不傳䘖涕奉表乞為紀述王乃命瑞書學士朴仁範為碑文竟未鐫于石始師之未卜玉龍也於智異山甌嶺卓庵止息有異人來謁座下曰弟子幽栖物外近數百歲矣緣有小技可奉尊師倘不以賤術見鄙他日於南海汀邊當有所授此亦大菩薩救世度人之法也因忽不見師奇之尋往所期之處果遇其人聚沙為山川順逆之勢視之顧見則其人已無矣其地在今求禮縣華嚴寺之下師夜宿華嚴晝見沙勢日日謄書祕録土人稱為沙島村云師自是豁然益研陰陽五行之術雖金壇玉笈幽邃之訣皆印在胸次於是為王太祖啓聖期於化元定成命於幽數其原皆自吾師發之蓋其功德宜在褒大而追崇之故顯王有大禪師之贈肅祖加王師之號仁宗追封為先覺國師毅宗又命刻碑以壽其傳若國師之於太祖其事甚偉蓋先識之於降生之前而施其效於身沒之後其神符冥契有不可思議者於戲師之道其詣於極者與佛祖合寓於迹者若張子房之受書於神寶志之預言未兆一行之精貫術數者耦歟即此一語可以知師非一行之弟子明矣師所傳陰陽說數篇世多有之後之言地理者皆宗焉其銘曰過去諸佛有微妙法非文字詮非思修攝超然直指一念千劫惟我國師優入其域善學無學真空不空具正法眼四闢六通惟其緒餘寓術數中不憑著筮懸解無窮舊邦俶擾新命猶閟先終知終未至知至撰書預獻國祚攸始作周興漢如掌斯指聖人聿起膺受圖乃眷所屬發之自吾人雖隔世事若今符殊功偉績與山河俱歷歲三百風流如在瞻仰高躅掀天磊磊勒碑舊祠揭示千載咨爾山君守護無怠己未三年唐光化二年高僧兢讓入唐備考靜真國師圓悟之塔碑銘并序高麗李夢游撰嘗聞八極之中括地貴者曰身毒三界之內推位尊者曰勃陀即佛陀也西顧之德天彰東流之教日遠是故伯陽著我師之論尼父發聖人之談矧復隕星紀於魯書金姿放耀佩日徵於漢夢玉牒傳聲傳四諦論說三乘法化緣已畢臨涅槃時告迦葉曰付其無上法寶欲令廣大宣流宜護念以常勤俾脫苦於生死由是大迦葉以所得法眼付囑阿難自此傳承未嘗斷絶中則馬鳴龍樹末惟鶴勒鳩摩相付以來二十七代後有達摩大師是謂應真菩薩南天辭國東夏傳風護心印以無刓授信衣而不墜東山之法漸獲南行至于曹溪又六代矣自爾繼明重跡嫡嗣聯綿曹溪傳南嶽讓讓傳江西一一傳滄洲鑒鑒猶東顧傳于海東誰其繼者即南嶽智異山也雙溪慧昭禪師真鑒國師焉揚孚即我大師嶽師也大師諱兢讓俗姓王氏公州人也祖淑長父亮吉並戴仁履義務存達己之心積德豐功貴播貽孫之業勞筋骨而服職抱霜雪以清心州里稱長者之名遠近聞賢哉之譽况自高曾之世咸推郡邑之豪戶不難知故無載此母金氏女功無敵婦道有規擬截髮以專情指斷機而勵節敬恭僧佛禮事舅姑俄夢流星入懷其大如瓮色甚黃潤因有娠焉由是味撤葷腥事勤齊護循胎教以無已幾過朞而誕生大師天骨特異神彩英奇自曳萊衣逮跨竹騎縱為兒戲猶似老成坐必跏趺行須合掌聚沙畫墁模像塔以依稀採葉摘花擬供具而陳列年至鼓篋日甚帶經訓詩禮於鯉廷聽講論於鱣肆頗勤三絶謂隘九流乃懇白於慈母嚴君固請許於出家入道投於本州南穴院如解禪師因為剃髮便以留身志在朝聞學期日益實由功倍誰曰行遲桴乍援之鍾遽仆焉於是知有赫曦之耀休窺灾奧之光出指四方行擇三友遂以乾寧四載於雞龍山普願精舍稟持犯然後坐雨心堅臥雲念切護戒珠而不類磨慧劒以無鈋能持繫草之心轉勵出塵之趣惟勤請益靡滯遊方遂謁西穴院揚孚禪師豁青眼以邀迎推赤心而接待於是持其由瑟鼓在孔門既多知十之能或展在三之禮服膺不怠就養惟勤俄歎曰急景如駒流年似箭若局牛涔之底未浮鼇海之波難詣寶洲焉窮彼岸乃以光化三年伺鷁舟之西泛逐鵬運以南飛匪踰信宿之間獲達江淮之境才越天塹將往雪峯到飛猿嶺上遇搬米禪徒同路而行一時共歇徙中有一僧指枯椿曰枯木獨占定春來不復榮大師接曰逈然塵境外長年樂道情於是衆皆歎伏無不吟傳縱煩鼓舌之勞頗叶傳心之旨遂濟子台嶺謁遍禪居或杖虎錫於雪嶠雲嶺或洗龍鉢於飛溪懸澗既多適願愈切尋幽詣於谷山謁道緣和尚是石霜之嫡嗣也乃問曰石霜宗旨的意如何和尚對云代代不曾承大師言下大悟遂得默達玄機密傳祕印似照秦皇之鏡如探黃帝之珠洞究一真增修三昧藍茜沮色珠火耀光標領袖於禪門占笙鏞於法苑何啻赳赳實錚錚者矣大師又製偈搦呈和尚曰十介禪子同及第榜頭若過總得間雖然一介不回頭自有九人出世間和尚覽之驚歎因造三生頌許令衆和大師養勇有餘當仁不讓搦兔毫而析理編鳳藻以成章莫不價重碧雲韻高白雪豈真理之究竟併綴緝之研精於是流傳故不載緣大師心澄止水疏奇斷雲異境靈山必盡覽游之興江南河北靡辭跋涉之勞以梁龍德四年春跳出谷山路指幽代將禮五臺聖跡遠履萬里險途届觀音寺憩歇之際晝夜俄經忽患面上赤瘡致阻參尋之便未逢肘後祕術莫資療理之功久不蠲除漸至危篤遂乃獨坐涅槃堂上暗持菩薩願心頃刻之間有一老僧入門問曰汝從何所所苦何如大師對曰來從海左久寓江南苦是毒瘡弗悆而已乃曰且莫憂苦宿冤使然便以注水如醴洗之頓愈謂曰我主此山暫來問慰惟勤將護用事巡遊辭而出歸豁如夢覺皮膚不損瘕癬無看大師躬踐清涼親瞻妙德由早承於龜氏宗旨果獲遇於龍種聖尊不可思議於是乎在厥後西經雲蓋南歷洞山境之異者必臻僧之高者必覲後唐同光二年七月回歸達于全州喜安縣浦口洎至維舟深詣捨筏是猶孟嘗之珠還在浦雷煥之劒復入池德既耀於寶身志蓋堅於高蹈矧屬天芒伏鼇地出蒼鵝野冠山戎各競奮爭之力嵓扇岫幌半罹焚燬之灾爰遵避地之機仍抗絶塵之跡效玄豹之隱霧畏鳴鶴之聞天庇影山中韜光廡下而乃雖曰烟霞之洞漸成桃李之蹊莫遂沈藏更議遷徒康州伯嚴寺是西穴故師所修創移住也以自先師謝世法匠歸真門人多安仰之悲信士發靡依之歎况又雲溪烟嶺四時之變態相高松韻竹聲百籟之和吟不斷宛秀東林之境堪傳西域之宗越以天成二年就以居焉大師擡法鏡以常磨照通無硋簾禪鏞而待扣響應有緣遂使歸萬彙之心拭四方之目訪道者雲蒸霧涌請益者接踵聯肩化編海隅聲振日域新羅景哀王遙憑玄杖擬整洪綱雖當像季之時願奉禪那之教乃遣使寓書曰恭聞大師早踰溟渤遠届曹溪傳心中之祕印探頷下之明珠繼燃慧炬之光廣導迷津之路禪河以之汩汩法山於是峨峨冀令雞嶺之玄風播在鳩林之遠地則豈一方之倚賴實千載之遭逢仍上別號曰奉宗大師焉大師方寸海納無所拒遠惟弘善誘之功益慎見機之道至清泰二年念言弘道必在擇山决計而已備行裝猶豫而未謀移發忽爾雲霧晦暗咫尺難分有神人降謂大師曰捨此奚適適須莫遠於是衆咸致惑固請淹遲大師確然不從便以出去有虎哮吼或前或後行可三十里又有一虎中路相接左右引導似為翼衛至于㬢陽山麓血餘印跡方始回歸大師既寓鳳嵓尤增雀躍是以陟彼峯巒視其背面千層翠巘萬疊丹崖屬賊火之焚燒致劫灰之飛撲重巒復澗固無遷變之容佛闥僧房半是荊榛之地屹爾者龜猶戴石禪德鐫銘巋然者像是鑄金靈光照曜既鋭聿修之志寧捨必葺之功追迦葉之踏泥效犍連之掃地營搆禪室誘引學徒寒煥未遷竹葦成列大師誘引不倦物利有功至使商人遽息於化城窮子咸歸於寶肆列樹而旃檀馥郁滿廷而菡萏粉數恢弘禪祖之風光闡法王之教恩均兼濟德瞻和光雖靜默於山中示威猛於城內潛振降魔之術顯揚助順之功遂使蟻聚凶徒蛇奔逆黨遽改愚迷之性勿矜強暴之心漸罷爭田各其安堵時清泰乙未歲也我太祖以運合夷凶時膺定亂命之良將授以全師指百濟之狡窟梟巢展六韜之奇謀異略桴鼓而山河雷振張旗而草樹霞舒我則鷹揚彼皆魚爛黜殷辛於牧野敗楚羽於烏江竭海跨鯨傾林斬凶四紀而塵芬有暗一朝而掃蕩無遺是用封墓軾閭繼周王之高躅重僧歸佛遵梁帝之遺風模五天而像飾爰崇闢四門而英賢是招於是道人輻湊禪侶雲臻爭論上德之宗高贊太平之業此際大師不待鵠板便出虎溪動白足而步如飛伸雪眉而喜可見路次中原府府有鍊珠院院主苪帛常誦楞嚴未嘗休息至是夜夢仙竪從窣堵波上合掌下來曰當有羅漢僧經過宜以豫辦供侍者翌早集衆言其所夢衆皆歎異灑掃門庭佇立以望至于日夕果大師來及詣京師太祖見而異之危坐聳敬因問傳法教自莫不應對如流懊見大師之晚乃從容相謂曰玄奘法師往遊西域復歸咸京譯出金言祕在寶藏降及貞元以來新本經論寢多故近歲遣使閩甌求購弘宣今幸兵火已潛釋風可振欲更寫一本分置兩都於意如何大師對曰此實有為功德不妨無上菩提雅弘經傳能詣佛心其佛恩與王化可地久而天高福利無邊功名不朽矣自爾一心敬仰四事傾勤或闢紫宸而懇請邀迎或詣紺宇而親加問訊而乃鶴情猶暮戀雲洞以日深鳳扆是辭出天衢而電逝是以命僧史以援送厚淨施以寵行缺略俄聞九天之鼎駕升遐四海之金絲遏密雖是忘言之者豈無出涕之哀暨惠宗纂承丕搆繼稟先朝遺乘軺之可使稱負扆之有因由是大師馳僧介以飛罷奏章慶王統之光嗣緒逮伸祈祐未暇締緣雖崆峒之請有期奈蒼梧之巡不返逮于光宗繼明御宇離隱統天常注意於釋門冀飫味於禪悅大師不辭跋履步至京華設醫國之藥言喻從繩則木正事如投水道冷補天沃心有餘書紳可驗乃以新製磨衲袈裟一領寄之及乎歸出以新寫義熙本華嚴經八帙送之蓋為大師色空無異語默猶同每於金言常披玉軸故也今聖騰輝虹渚育德龍淵顯膺千載之期光嗣九天之位功高立極業盛承基將安東土之人深奉西乾之教勤庶政於君道種多福於僧田𣂏定水於禪河泛慈波於宸澤欕伽之門大啓總持之苑廣開遂欲遠迓慈軒親瞻慧眼以聖朝光德二年春馳之馹騎寓以龍緘敘相遇之必請懇來儀之是望大師亦擬出東林將朝北闕催淨人之晨爨趣從者之行裝時寺有一面鼓架在法堂上忽然自鳴厥聲坎坎若山上之砰磕猶谷底之颼颼衆耳皆驚同心請住大師確不從請便以出行行至途中果遇中使禪侶則來經月嶽王人則去涉漢江既欣邂逅之逢不議逡巡之退洎乎路入圻甸禮備郊迎仍令諸寺僧徒滿朝臣宰冒紅塵而導從步紫陌以陪隨尋於護國帝釋院安下詰旦上高闢天闈別張淨室親迎雲毳特設齊筵伸鑽仰之素誠用咨諏於政道大師既諧就日必擬回天言忘言之言說無說之說豈獨資乎道味抑能導乎政風雅弘開濟之功終叶歸依之懇乃以其年四月移住舍那禪院仍送磨衲袈裟一領兼營齊設無不精勤上謂羣臣曰顧惟幼冲獲承基搆每當伺機務之暇討史籍之文昔自軒皇逮于周發僉有師保用匡不怠改曰君也師臣則王友臣則霸况師高尚者可謂其利博哉今見曦陽大師真為化身菩薩矣何不展師資之禮乎僉言可矣罔有異辭於是王命兩街僧統大德法輿內議令太相皇甫詣禪扃備傳聖旨續遣中使送錦緣磨衲袈裟一領並踵頂之飾等然後上領文虎兩班及僧官暫出珠宮親臨金地手擎鵲尾面對龍頤仍詔翰林學士太祖相守兵部令金嶽宣綸制曰昔晉主遇於遠公傾心頂戴吳王逢於僧會禮足歸依人天盛傳古今美事寡人雖德慙往哲而志敬空門勵行孜孜修心惕惕大師優曇一現慧月重明瞻蓮眼而煩惱自消覩果唇而塵勞頓息多生因果今世遭逢敢啓至心仰聞清德願展為師之禮冀成纍劫之緣躬詣松關面伸棗懇伏希慈鑑俯許誠祈請光師道敬加尊號為證空大師劫劫生生托慈航之濟渡在在處處攀慧幟以游揚頓首謹白於是道俗具寮一齊列賀禮無違者道益尊焉大師迹現四依功修萬劫言必契理行乃過人既交香火之緣有期忉利之行開示希夷之旨發揚清淨之風顯整王綱丕傅法寶實使金輪愈久益能玉戾光輝慈燈之熖透三韓甘露之澤均一國自栖輦轂屢換星霜化導之功已成肥遁之身是退越以周廣順三年秋還歸故山焉上以摳衣避席縱請益以匡虧遠致高情奈忘機之不輟躬攀法軟泣送山裝策杖徐行恣鶴步於三秋曠野拂衣輕舉尋鳥道於萬里舊山爾後軺騎聯翩王人往復交轡道路綴影巖磎贈之以香碗水瓶極雕鏤之工巧副之以鳩坑蠻海窮氣味之芳馨慶賴既多虔恭益切至顯德三年秋八月十九日忽告衆曰吾西學東歸將輸三紀擇山而住誘引後來借以青山白雲導彼迷津失路每或披尋王渴資國福緣今風燭水泡未能以久難將作矣吾欲焉往各執爾心勉遵佛訓又謂傳法之首逈超禪師曰爾宜搆室繼以傳燈惟事光前無墜相付者言訖而泊然坐滅享齡七十九歷夏六十是日也天昏雨黑地動山搖鳥獸悲鳴杉栝萎瘁於是緇素學流遠近耆幼覩變異之非常含悲憂而競集灑涕流於原野哀響振於山溪豈惟魯聖發壞木之歌闍王驚折梁之夢而已哉上聞之震悼哭諸寢焉乃遣使左僧維大德淡猷元尹守殿中監韓潤弼等吊以書賻以穀及茗馞又遣諡號塔名使元輔金俟嵓使副左尹前廣平侍郎金廷範等贈淨諡曰靜真大師圓悟之塔仍命有司寫真影一鋪錦緣金軸不日而成并題贊述仍令右僧維大德宗乂正輔金瑛正衛兵部郎金靈祐等充追真影使兼營齊遂使飾終之禮若矣尊師之道焯焉大師立性純朴抱氣英奇眼點珠明骨聯金細汪汪焉波澄萬頃磊磊若嶽聳千尋每以勸勵學徒語簡旨遠故或問曰不離左右猶不識者何師云我也不識闍梨問彼此不相識時如何師云東西不成一處活師云陽日轉高後代何憂其所謂簡遠多此類也豈土木之形骸無毫釐之差錯所稟護犯一無遺缺故得年漸逼於桑榆身轉輕於黍纍或當盥浴坐在盆中完若浮瓢未嘗潛沒又衲衣壞弊縱不浣濯體無所癢蟣虱不生若此已來殆餘四紀嘗於微時夢坐于三層石浮屠上者衆中有解者云大師必見三度加號為萬乘師事矣聽者歎驚來如墻進尋時致賀後實果焉今臨滅時寺之東峯西嶺蒼柏寒松色變慘凋侔於鵠樹又山之北面無故崩墜約百餘丈高亦有於菟從東南岡繞寺行過悲鳴長嘷聲動溪洞聯於晝夜靡有斷絶洎門下僧表請樹碑紀績耀于不朽許之乃為石版可者尤難命於南海之濱汝湄縣掘取以船運至算其勞費何啻千萬裁及使人到彼議役興功門人忽於本山之麓掘獲石版狀甚高濶色惟青白不煩琢磨苟無瑕玷無煩人功雅符神授具以表聞上乃悅許此者以今寺內有古禪師法碣是新羅末前進士姓崔名致遠者所撰文其石亦自南海而至今多說役使興譏故也大師在世之時奇祥祕說縱使書之竹竭南山研之波乾東海豈能備言而具載矣臣夢游謹奉綸言莫抗叩辭之禮覬彰碩德輒書直筆之詞而乃嚮碧沼以傾蠡雖迷深淺仰青天而測管莫究星辰語類寒蟬行同跛鱉苟任抽毫之寄翻招傷手之憂謹為銘曰無上之法不二而傳月影難掬露珠莫搴信衣爰授智炬乃燃光明有赫照曜無邊非動非靜何後何先誰其覺者我大師焉靈資太一誕叶半千志探龍頷身泛驪淵雲游華夏浪迹幽燕清涼山畔妙德堂前瞻龍種聖企雞足禪仰石霜緒承谷山緣入室覩奧問道探玄遊真如海扣般若船方回征棹偶值戎烟鶴歸有所遁迹多年暨平寇壘大闢僧田倚賴罔極鎖仰靡堅道贊四主名占一賢恩流朝野德及人天吾皇避席禮甚袒肩實供四事何暇九筵跳出京輦歸臥雲泉秋溪月浸曙洞霞填隨身瓶錫滿眼山川問訊往復傳驛聯翩法惟常住化乃俄遷慈室壞矣慧柯缺焉山變蒼柏池慘白蓮碑撑石巘塔聳嵓顛斯文不朽永耀蓬壖辛未十五年後梁乾化元年高僧利嚴自唐還備考有唐高麗國海州須彌山廣照寺故教諡真徹大師寶月乘空之塔碑銘并序門人元輔檢校尚書左僕射兼御史大夫權知元臣崔彥撝撰云云缺略大師法諱利嚴俗姓金氏其先雞林人也考其國史實星漢之苗遠祖世道凌夷斯盧多難偶隨萍梗流落熊川父章深愛雲泉因寓富城之野故大師生於蘇泰相表多奇缺略年十二往迦耶岬寺投德良法師懇露所懷求為師事自此半年之內三藏備探師謂曰儒室之顏生釋門之歡喜是知後生可畏於子驗之者矣則非久植夙因其孰能至於此然則母氏初於有娠夢神僧來寄青蓮永為徵信則知絶塵合契懷日同符中和六年受具足戒於本寺道堅律師既而調鉢無傾浮囊不漏乘門託位不唯守夏之勤草繫懸心寧止終年之懇其後情深問道志在觀風挈瓶下山飛錫沿海乾寧三年忽遇入浙使崔藝熙大夫方將西泛托跡而西所以高掛雲帆遽超雪浪不消數日得抵鄞江于時企聞雲居道膺大師禪門之法胤也不遠千里直詣玄關大師謂曰一別匪遙再逢何早師對云未曾親侍寧導復來大師默而許之潛愜玄契所以服勤六載寒暑彌堅大師謂曰道不遠人人能弘道東山之旨不在他人法之中興惟我與汝吾道東矣念茲在茲師不勞圮上之期潛受法王之印以後嶺南河北巡禮其六窣堵波湖外江西遍參其諸善知識遂乃北遊恆岱無處不遊南抵衡廬無山不抵謁諸侯而獻刺投列國而觀風四遠參尋遍於吳漢乃於天祐八年乘查巨浸達于羅州之會津此際大師一自維舟遍宜捨筏珍重屏翳邐迤東征爰有金海府知軍府事蘇公律熙選勝光山仍修堂宇傾誠願海請住烟霞桃李無言稻麻成列一栖真境四換周星大師雖心愛禪林遁世無悶而地連賊窟圖身莫安所以亂邦不居於是乎在十二年道出沙火得到遵岑永同郡南靈覺山北尋謀駐足乍此踟蹰緇素聞風歸心者衆矣今上聞大師道高天下聲蓋海東想對龍頤頻飛鶴版大師謂衆曰居於率土者敢拒綸言儻遂朝天者須霑顧問付囑之故吾將赴都所以便逐皇華來儀帝壤上重光大業仰止高山所以修葺泰興請停慈蓋粵以明年二月中特遣前侍中權說太相朴守文迎入舍那內院虔請住持無何逈餝蘂宮高敷蓮座待以師資之禮恭披鑽仰之儀猶如西域摩騰先陟漢皇之殿康僧居會始升吳王之車遂以麈尾發揮龍顏欣悅其於瞻仰遍動宸襟此時魚水增歡不可同年而語哉他時乘間之夕略詣仙扉問曰弟子恭對慈顏直申素懇今則國讎稍擾鄰敵交侵猶似楚漢相持雌雄未决至於三紀常備二凶雖切好生漸深相殺寡人曾蒙佛誡暗發慈心恐遺玩寇之愆仍致危身之禍大師不辭萬里來化三韓救爇崑岡昌言有待對曰夫道在心不在事法由己不由人且帝王與匹夫所修各異雖行軍旅且慜黎元何則王者以四海為家萬民為子不殺無辜之輩焉論有罪之徒所以諸善奉行是為弘濟上乃撫几歎曰夫俗人迷於遠理預懼閻摩至如大師所言可與言天人之際矣所以救其死罪時緩虔劉憐我生靈出于塗炭此皆大師之化也其後大師自棲京輦頻改歲時每以注目山川欲擇終焉之地隱霧之志懇到聞天上莫阻道情潛憂生別思惟良久久乃許焉大師臨別之間特披悲感云仁王弘誓護法為心遙垂外護之恩永蓄蒼生之福所以長興三年下教於開京西北海州之陽遽擇靈峯為搆精舍寺名廣照請以居之是日大師略領門徒就棲院宇學流盈室禪客滿堂若融歸北海之居疑惠結東林之社所以誨人不倦如鏡忘疲其衆如麻其門如市然則不資分衛唯免在陳此乃官藏則分錫三藏供事則具頒四事况復近從當郡傍及鄰州咸發深心並修淨行則知花惟薝蔔如投寶樹之園林是栴檀似赴菴蘿之會大師先於踏地備自銓山師至魂交神來頂謁獻粲輸玉泉之供披誠指廬阜之居其為神理歸依皆如此類大師謂衆曰今歲法緣當盡必往他方吾與大王曩有因緣今當際會須為面訣以副心期便挈山裝旋臻輦下此時上暫驅龍斾問罪馬津大師病甚虛羸任持不得詣螭頭留語入雞足有期豈惟昔在竺乾迦葉別闍王之恨曾於華夏伯陽辭關令之嗟而已矣哉明日肩輿到五龍山頤使招諸弟子云佛有嚴誡汝曹勉旃清泰三年八月十七日中夜坐化於當寺法堂俗年六十有七僧臘四十有八于時日慘風悲雲愁水咽門下僧等不勝感慕俱切攀號以其月二十日奉遷神座於本山窆于寺之西嶺去寺三百步雅奉遺教也士庶闐川香華溢谷送終之盛前古所無者矣上乃旋在省方忽聞遷化爰切折梁之慟亦增亡鏡之悲自此特命親官遙申吊祭大師風神天假智慧日新生知而衆妙會心宿植而玄機藏粹所以事唯善誘談以微言引彼蒙泉歸於性海其奈山輝川媚秀氣難逃故始自光山終於彌嶺可謂棲遲兩地各分韞櫝之珍戾止三河俱示摩尼之寶者矣傳業弟子處光道忍貞能慶崇並升上足皆保傳心或早牽尼父之悲或堅護卜商之業所恨寶塔雖聳洪銘未刊然則扣不朽之緣於在家弟子左丞相皇甫悌恭前王子太相王儒前侍中太相李陟良廣評侍郎鄭承休俱早調夏鼎常艤殷舟誠仁國之金湯亦法城之墻塹與昭玄大統教訓斷金相應深感法恩請贈大名以光禪教詔曰可故追諡真徹大師塔名寶月乘空之塔申命下臣式揚高躅彥撝才慙燕石學謝螢光以有限微才記無為景行杳猶行海難甚緣山潛測高深莫知涯際爰有門徒玄照上人夙傳金口親奉玉音因趣龜文數臨蝸舍所以得於無得聞所未聞譬凉月之遊空等清飈之掃靄唯以敢陳厚旨齊贊成功所冀翠碣披文感國主亡師之恨豐碑相質嗟門人絶學之愁言莫慎諸直書其事銘曰禪宗之胤代代堂堂人中師子世上法王玄關閫閾覺路津梁遠從天竺來化海鄉偉矣吾師生於遼左何陋之有豈論夷夏氷姿雪膚言說溫雅乘查兮雪浪中問道兮雲居下命之入室仍以傳心棲遲道樹偃仰禪林鯨津返棹忽遇知音便升金殿欽仰殊深卜地海壖曹溪接武惟我導師謂之慈父忽歎泥洹天收法雨贈諡兮感法恩流慈兮光禪宇清泰四年十月二十日立神德王朴景暉在位五年丙子五年後梁貞明二年佛紀一九四三年二月十二日朗空大師入寂備考新羅國故兩朝國師教諡朗空大師白月棲雲之塔碑銘并序門人翰林學士守兵部侍郎知尚瑞院事賜紫金魚袋臣崔仁渷奉教撰金生書釋端目集聞夫真境希夷玄津渺杳澄如滄海漠如太虛智舟何以達其涯慧駕莫能尋其際况復去聖逾遠滯凡既深靡制心猿難調意馬由是徇虛棄實者俱懷逐塊之情執有迷空者盡起趁炎之想若非哲人出世開士乘時高演真宗廣宣善諉何以爰析重玄之理得歸衆妙之方潛認髻珠密傳心印達斯道者豈異人乎大師是也大師法諱行寂俗姓崔氏其先周朝之尚父遐苗齊國之丁公遠裔其後使乎兔郡留寓雞林今為京万河南人也祖諱全避世辭榮幽居養志父諱佩常年登九歲學冠三冬長牽投筆之心仍效止戈之藝所以繫名軍旅充職戎行母薛氏夢見僧謂日宿因所追願為阿娘之子覺後感其靈瑞備啓所天自屏膻腴勤為胎教以太和六年十二月三十日誕生大師生標奇骨有異凡流遊戲之時須為佛事每聚沙而造塔常摘葉而為香爰自青襟尋師絳帳請業則都忘寢食臨文則總括宗源嘗以心信金言志遺塵俗謂父曰所願出家修道以報罔極之恩其父知有宿根合符前夢不阻其志愛而許之遂乃削染披緇苦求遊學欲尋學海歷選名山至於伽倻海印寺便謁宗師精探經論統雜花之妙義說貝葉之真文師謂學徒曰釋子多聞顏生好學昔聞其語今見其人豈與青眼赤髭同年而語哉大中九年於福泉寺官壇受其具戒既而浮囊志切繫草情深像教之宗已勞力學玄機之旨盍以心求所以杖策挈瓶下山尋路徑詣屈山謁通曉大師自投五體虔啓衷懷大師便許升堂遂令入室從此服膺數載勤苦多方雖至道目擊罄成山之志而常齊淡薄神疲增煮海之勞則知歷試諸難多能鄙事每於坐臥只念遊方遂於咸通十一年投入備朝使金公緊榮之心備陳所志金公情深傾蓋許以同舟無何利涉大川達于西岸此際不遠千里至於上都尋蒙有司特具事由奏聞天聽降敕宜令左街寶堂寺孔雀王院安置大師所喜神居駐足勝境捿心未幾降誕之辰來徵懿宗皇帝遽弘至化虔仰玄風問大師曰遠涉滄溟有何求事大師對敕曰貧道幸獲觀風上國問道中華今日叨沐鴻恩得窺盛事所求遍遊靈跡追尋赤水之珠還耀吾鄉更作青丘之印天子厚加寵賚甚善其言猶如法秀之逢晉文曇鸞之對梁武古今雖異名德尤同以後至五臺山投華嚴寺求感於文殊大聖上中臺忽遇神人鬢眉皓爾叩頭作禮膜拜祈恩謂大師曰不易遠來善哉佛子莫淹此地速向南方認其五色之霜必沐曇摩之雨大師含悲須別漸次南行乾符二年至成都府巡謁到靜衆精舍禮無相大師影堂大師新羅人也因謁寫真具聞遺美為唐帝道師玄宗之師同鄉唯恨異其時後代所求追其迹企聞石霜慶諸和尚啓如來之室演迦葉之宗道樹之陰禪流所聚大師殷勤禮足曲盡虔誠仍栖方便之門果得摩尼之寶俄而追流衡嶽參知識之禪居遠至曹溪禮祖師之寶塔傍東山之遐秀採六葉之遺芳四遠參尋無方不到雖觀空色豈忘偏陲以中和五年來歸故國時也至於崛嶺重謁大師大師云且喜早歸豈期相見後學各得其賜念茲在茲所以再託扉蓮不離左右中間忽携瓶鉢重訪水雲或錫飛於五嶽之初暫栖天柱或杯渡於三河之後方住水精至文德二年四月中崛山大師寢疾便經故山精勤侍疾至於歸化付囑傳心者唯在大師一人而已初憩席於翔州之建子菴才修茅舍始啓山門來者如雲朝三暮四頃歲時當死運世屬屯蒙災星長照於三韓毒露常鋪於四郡况於岩谷無計潛藏乾寧初至止王城薰簷葡於焚香之寺光化末旋歸野郡植旃檀於籬草之墟所恨正值魔軍將宣佛道孝恭大王驟登寶位欽重禪宗以大師獨步海東標天下遣僧正法賢等聊飛鳳筆徵赴皇居大師謂門人曰自欲安禪終須助化吾道之流於末代外護之恩也乃以天祐三年秋九月初忽出溟郊方歸京邑至十六日登祕殿孤坐禪床淨宸襟整冕服待以國師之禮虔申鑽仰之情大師辭色從容神儀自若尊道說羲軒之術治邦談堯舜之風鏡忘疲洪鍾待扣有親從上殿者四人曰行謙邃安信宗讓規讓規行超十哲名蓋二禪探玄鄉之祕宗論絶境之幽枝聖人見之頻回麈尾甚悅龍顏忽於明年夏末乍別京畿略遊海嶠至金海府蘇公忠子知府及第律熙領軍莫不斂袵欽風開襟慕道請居名寺冀福蒼生十師可以栖遲暗垂慈化掃妖烟於塞外灑甘露於山中神德大王光統丕圖寵徵赴朝至貞明元年春大師遽携禪衆來至帝鄉依前命南山實際寺安之此寺則先是聖上以黃閣潛龍禪附鳳尋師永為禪宇此時奉迎行所重謁慈顏爰開有待之心再聽無為之說辭還之際特結良因爰有女弟子明瑤夫人鼇島宗枝鳩林冠族仰止高山尊崇佛理以石南山寺請為收領永以住持秋七月大師以甚愜雅懷始謀栖止此寺也遠連四嶽高壓南溟溪澗爭流酷似金輿之谷岩巒鬪峻疑如紫蓋之峯誠招隱之幽居亦栖禪之佳境者也大師遍探靈未有定居初至此山以為終焉之所至明年春二月初大師覺其不舒稱染微疴至十二日詰旦告衆曰生也有涯吾將行矣守而勿失汝等勉旃趺坐繩床儼然就滅報齡八十五僧臘六十一于時雲霧晦冥山嶽震動有山下人望山頂有五色光氣衝於空中有一物上天宛然金柱豈智順則天垂花蓋法成則空斂雲棺而已哉於是門人等傷五情若亡天屬至十七日敬奉色身假𨽻于西峯之麓聖考大王忽聆遷化良惻仙襟特遣中使監護葬儀仍命吊祭至三年十一月中改葬於東巒頂去寺三百來步全身不散神色如常門下等重覩慈顏不勝感慕仍施石戶封閉大師資靈河嶽稟氣星辰居縷褐之英應黃裳之吉由是早棲禪境久拂客塵裨二主於兩朝濟羣生於三界邦家安泰魔賊歸降則知大覺真身觀音後體啓玄關而敷揚至理開慈室而汲引玄流生命示亡效鶴樹歸具之跡化身如在追雞峯住寂之心存歿化人始終弘道可謂定慧無方神通自在者焉弟子信宗禪師周解禪師林侃禪師等五百來人共保一心皆居上足常勤守護永切追攀每念巨海塵飛高風電絶纍趨魏闕請樹豐碑今上克纘洪基恭承寶籙欽崇禪化不異前朝贈諡曰朗空大師塔名曰白月棲雲之塔爰命微臣宜修韲臼仁渷固辭不免唯命是從輒課菲詞式揚餘烈譬如提壺酌海莫知溟渤之深執管窺天難測穹蒼之濶然而早蒙慈誨眷以宗盟唯以援筆有情著文無愧強名玄道將報法恩其詞曰至道無為猶如大地萬法同歸千門一致粵唯正覺誘彼羣類聖凡有殊開悟無異懿歟禪伯生我海東明同日月量等虛空名由德顯智與慈融去傳法要來化童蒙水月澄心烟霞匿曜忽飛美譽頻降佳召扶贊兩朝闡揚玄教瓶破燈明雲開月照哲人去世緇素傷心門徒願大國王恩深塔封巒頂碑倚溪潯芥城雖盡永耀禪林景明王朴升英在位七年戊寅二年後梁貞明四年高麗太祖天授元年夏六月泰封諸將立王建為王國號高麗建元天授弓裔走死斧壤初建年三十夢見九層金塔立海中至是年三月唐商客王昌瑾得東州勃颯寺熾盛光如來像前鎮星化身所賣之鏡文三水中四維下上帝降子於辰馬巳年中二龍見一則藏身青木中一則現形黑金東果應其祥也高麗史十一月高麗設八關會有司言前王弓裔也每歲仲冬設八關會以祈福乞遵其制麗王從之遂於闕庭置輪燈一座列香燈於四旁又結兩綵棚各高五丈餘呈百戲歌舞於前其四仙樂部龍鳳象馬車船皆新羅故事百官袍笏行禮觀者傾堵王御樓觀之歲以為常己卯三年後梁貞明五年高麗太祖二年春正月高麗移都松嶽郡三月創法王慈雲王輪內帝釋舍那天禪院即普膺新興文殊圓通地藏等十寺于都內兩京塔廟肖像之廢缺者並令修葺東國通鑒新羅四天王寺壁畫狗鳴說經三日讓之三國遺事辛巳五年後梁貞明七年龍德元年高麗太祖四年春正月王遣金律騁高麗麗王問曰聞三大寶丈六金像九層塔并聖帝帶也三寶未亡國亦未亡塔像猶存不知聖帶今猶存耶律對曰臣未嘗聞聖帶也麗王笑曰卿為貴臣何不知國之大寶律慚高麗創大興寺于五冠山迎入僧利言師事之洞真大師自唐還秋七月高僧璨幽自唐還備考高麗國廣州慧目山高達院故國師制贈諡元宗大師慧真之塔碑銘并序光祿大夫太丞翰林學士內奉令前禮部使參知政事監修國史臣金廷彥奉制撰奉議郎佐尹前軍部卿兼內議承旨舍人臣張端說奉制書并篆額觀夫日出扶桑作人間之瞻仰佛生天竺為世上之歸依俾君子之邦學法王之道所謂道非心外佛在身中故道之尊為導師德之厚為慈父爰因象跡遂示它心光如水上之蓮皎若星中之月實大師其人矣大師尊稱璨幽字道光俗緣金氏雞林河南人也孫孫著族代代名家尊祖清規敬宗芳蹟刪而不記道釋宗矣考諱容白虹英氣丹穴奇姿含霞綺之餘光振霜鍾之雅韵遂起家為倉部郎中無何出為長沙縣令百里行春之化花縣勝芬九重回日之心葵園著美朝野因以倚賴鄉閭所以瞻依妣李氏婦德聿修母儀富有夢有一神人告之曰願言為母為子為佛為孫故託妙緣敬敷慈化以為得殊夢因有娠慎出身文奉行胎教以咸通十年龍集己丑四月四日誕生大師善芽尚早妙果不遲年甫十三遂言於父曰雖乏惠柯祇期覺樹父因謂曰吾縱瞳者嘗見汝善根也汝宜孜孜培之移勝果而已大師以逅適願即落髮出家伏承尚州公山三郎寺融諦禪師論道玄玄化人赫赫願為弟子遙禮禪師禪師若曰格汝見今日之來儀認他時之利見吾宗禪和尚法號審希真一佛出世為東化主見在慧目山汝宜往師事之大師以是吾師也適我願兮得不時然後利有攸往便詣慧目允叶服膺增修學道之心倍勵習禪之志未幾精窮妙理高悟玄機行覺路以雖通仗律儀而斯在年二十二受具於楊州三角山莊義寺於是忍草抽芽之後戒珠瑩色之初尚以問道忘疲尋師靡懈時本師移住光州松溪書院大師遠携笻杖特詣松溪申禮足之素衷謝鑄顏之玄造師謂曰白雲千里万里猶是同雲明月前溪後溪嘗無異月爰因識識只在心心而已大師以為凡志於道者何常師之有乃告以遠遊泛覽師因謂曰他心莫駐迅足難留吾於子驗之笑而聽去大師以道之云遠行之則是乃出山並海覗西泛之緣景福元年春適有商舶入漢者遂寄載而西即以望雲水以從心指烟霞而抏跡僧之真者必詣跡之古者必尋遂往舒州桐城縣謁投子祥和尚法號大同是石頭山法孫翠微無學大師之嫡胤也見大師蓮目殊姿玉毫異相乃曰其有東流之說西學之求者則可以與言道者唯子矣大師於是悟微言於舌底認真佛於身中豈止於承善逝之密傳奉淨名之默對而已矣大師將辭投子和尚因謂曰莫遠去莫遠去大師答云雖然非遠近要且不停留和尚曰既驗心傳何須目語爾後旁求勝友歷謁高師或索隱於天台或探玄於江左入真如之性海得摩尼之寶珠也乃以鵬必變於天池鶴須歸於遼海有始有卒念茲在茲適值本國歸舟因而東棹貞明七年秋七月達康州德安浦徑詣鳳林歸覲真鏡大師師曰適當今日深喜相逢別飭禪堂俾升談座聽西訪之真法慶東歸之妙緣從容謂曰人有老少法無先後爾其佩如來之密印演迦葉之祕宗宜住三郎寺為禪伯矣大師應奉而住更三冬乃以為當寺誠樂道之清齊乃安禪之勝踐尚以鳥則擇木吾豈匏瓜伏聞我太祖神聖大王懷斗膺期握符啓聖華夏受顧天之命載周興出日之邦遂乃片月遊空孤雲出岫彼蒼龍濟浪本無憑筏之心丹鳳冲虛猶有栖梧之志遠携黎杖遙詣玉京遂入覲太祖大王大王以大師玄道周行法身圓對艿請住廣州天王寺遂從之住焉居則化矣而以慧目山乃霞嶠偏宜於宴坐雲溪甚愜於禪居移而住焉於是四達問津者視千里猶跬步如雲來者似海納之莫不奔馳善導以憧憧出入玄門而濟濟太祖方當際會欲表因緣送霞衲衣并坐具未幾太祖天崩杞國日入虞泉念善始之芳因列餝終之玄路惠宗大王踐阼思恭奉先追孝興仁化俗重佛尊僧贄以茗馞并紋羅法衣大師啓以佛心陳之神力越三年恭王升遐定宗大王統承寶業瞻仰真風送雲衲袈裟磨衲法衣大師深喜聖朝聿興佛事豈悟遽宮車於雲間俄脫屣於人寰今上當璧承基堊衣理國握鏡照龍邦之俗吹箎弘鷲嶺之風益顯聖功增崇佛化大師演心王之妙訣宣覺帝之微言朗鏡忘披洪鍾待扣衆學有稻麻之列朋來成桃李之蹊上乃信向心深欽承志至遂奉師號為證真大師仍遣道俗重使遽飛芝檢徵赴金城大師以為道之將行時不可失念付囑故吾其往矣遂出虎溪特詣龍闕於是雪眉清衆鷺序羣英瞻法眼以珠聯對璧顏以環仰送至王城舍那院翌日上幸舍那院謝曰弟子望東林以引領向南澗以傾心師尊隨機如飈谷之聲赴感似月潭之影瞻依更切鑽仰彌深越三日於重光殿開法筵及乎曳以金襴升於紫殿上覩華脣而禪悅奉蓮眼以精誠為其環球申避席之儀舉國展書紳之志三皈益切十善增修乃至芬一城空衣磨石盡必也見聖之良因不歇為師之美道無窮即以服冕奉為國師處處結香火之緣慥慥結師資之禮仍獻踏納袈裟磨衲襖并座具銀瓶銀香爐金扣瓷鉢水精念珠大師潭心有月嶽頂無雲一心宣妙覺之風千眼示大慈之化上乃大喜曰弟子聽玄言而達道承妙旨以知微奉以周旋不敢失墜乃於天德殿高敞法筵偕願海之千波爇心香之一炷大師才麾麈尾乍動龍頤有僧問如何是向上一路大師曰不從千聖得又問既不從千聖得從上相傳從何而有大師曰只為不從千聖得所以從上相傳又問與麼即二祖不望西天達磨不到唐土大師曰雖不從千聖得達磨不虛過來於是人天感心賢聖喜歡花雨飛空檀烟蔽日彼摩騰赴漢僧會遊吳其奉佛之大功歸僧之專媺無以加也所謂四方盛賓萬世永賴當慧日正中之際是仁方丕變之時大師乃言曰老僧年過桑榆齒衰蒲柳但願往松門而休足向金闕而歸心而已上雖戀慈顏秪遵玄旨望象軒而目送瞻鴈剎以心傾爾後馳星騎以傳情飛宸翰而寫懇乃製誦德詩寄獻曰慧目高懸耀海鄉真身寂寂現和光貝中演法開迷路鉢裏生蓮入定場一喝成音收霧淨二門離相出塵凉玄關遠隔山川外恨不奔波謁上房仍贄之以烏程芳荈丹徼名香用表信心遙祈法力大師自辭天闕却到雲山烟夢更叶於棲遲水石偏宜於枕瀨心無限矣志有終焉於是擁毳者風趨攝齊者雲萃大師色空雙泯定惠俱圓行至道於山中施玄功於宇內則何異佛者覺也神而化之矣顯德五年歲集敦祥秋八月月缺五日大師將化盥浴訖房前命衆悉至于庭乃遺訓曰万法皆空吾將往矣一心為本汝等勉旃心生法生心滅法滅仁心即佛寧有種乎如來正法其護之勗之哉言畢入房儼然趺坐示滅於當院禪堂於戲應東身者九十春服西戒者六十九夏虎溪聲咽鶴樹色憂門生銜安仰之悲山老起其萎之歎緇白士女躄踴慟哭聲振嵓谷翌日奉遷神座於慧目山顏色如生權施石戶封閇上聞之慨禪月之早沉嗟覺花之先落降之星使吊以鵠書追諡元宗大師塔號惠真敬造真影一幀仍令國工攻石封層家門人等號奉色身竪塔于慧目山西北岡遵像法也大師心燈有熖定水無波智惠海融慈悲雲覆學佛悟禪之德行降魔鎮俗之威稜西遊顯顯之功東化巍巍之法遂使盤桃潤色若木生光其聖功也不可以知知其神化也不可以識識然猶法身無像必因像而成功道體無言必因言而示教盍因妙有以驗真空厥有太弟子兩街僧統三重大師昕弘等法苑鯨鍾禪門龜鏡踵慈井之往轍繼法炬之餘輝喟然嘆曰雖然祕說銘心若不奇蹤刻石則何以表一真之法盡可有矣於是狀大師行覬大君恩請幼婦之文辭紀吾師之德業制曰可乃命翰林學士臣金廷彥曰故國師慧目大師行高雲水福潤人間汝宜鴻筆書勳玄碑紀茂臣顫汗四匝拜稽首曰臣夜繩易惑空縷難分以淺近之麼才紀玄微之景行其猶蟾宮攬月