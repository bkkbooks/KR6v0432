眠得其殊夢驚覺而靈光滿室未幾而娠大師焉生能言弱不好弄登九歲志切離塵父母不阻所求便令削染往無量壽寺投住宗法師初讀雜華屢經槐柳所貴半年誦百千偈一日敵三十夫廣明元年始其大成其於守夏草繫如囚然而漸認教宗覺非真實傾心玄境寓目寶林此時西向望嵩嚴山遠聞有善知識忽携瓶錫潛往依焉廣宗大師始見初來方聞所志許為人室數換星霜光啓三年冬宗師寂滅其後不遠千里邏迤行行至於靈覺山中虔謁深光和尚是大師師兄長老也早蘊摩居人中師子以為嵩嚴之嗣學者咸宗然則桃李成蹊其門如市朝三暮四虛往實歸大師師事殷勤服膺數歲由是擲守株之心拋緣木之志挈瓶下山沿其西海乘查之客邂逅相逢託足而西遄凌巨浸趁夷洲之浪直衝禹冗之穴此時江表假途次於洪府行行西上禮見雲居膺大師謂曰舊戲匪遙相逆於此運斤之際猶喜子來昔吾師問義不休為仁由己屢經星紀寒暑彌堅已抵驪淵得認探珠之契仍登鳥徑方諧採玉之符大師雖則觀空豈能忘本忽念歸歟之詠潛含暮矣之愁欲別禪扉先陳血懇膺大師謂曰飛鳴在彼且莫因循所冀敷演真宗以光吾道保持法要知在汝曹可謂龍躍天池鶴歸日域其於來往無失其時以此傳大覺之心佩雲居之印重超鯨水再至鯷岑此時天祐六年七月達于武州之升平此際捨筏東征抵于月嶽雖謀宴坐不奈多虞窺世路以含酸顧人間而飲恨雖攀依水石而漸近烟塵路出奈靈行臻佳境望孫峯而隱霧校小伯以棲霞爰有知基州諸軍事上國康公萱寶樹欽風禪林慕道竊承大師遠辭危國來致樂郊因傾蓋以祗迎每褶齊而問訊歸依禪德倍感玄風知是鳴鶴在陰衆翟相應白雲扶日佳氣表祥東望之時頻窺靈瑞寧踰數日謹具聞天陛今上聞大師道冠中華名高兩地遽飛鳳筆徵赴龍墀越翌年歘出巖扃來儀玉輦上忽披離日情在下風鑽仰之深異於他等蕭武之專崇釋教不可同年而語哉中間暫自歸山重循遺址不久特令貴使虔請入朝於是難拒芝泥再升蘭殿披雲之際奉對龍顏曰國富民安不讓於肯庭之境堯仁舜德唯侔於華夏之朝上對曰三五之時太平之運寡人虛薄何以當之仍念故山去京猶遠捨菩提寺請之住持此際深感聖恩往而停駕其寺也山川勝美志有終焉所以從善之徒不呼而集誨人不倦善誘孜孜有人問大師酌盡清流時如何答盡後事作麼生對曰豈同清流者大師乃許之以同光七年十一月二十八日示疾明年二月十七日善化於法堂春秋六十有九臘五十于時雨慘風悲雲愁水咽天人痛悼道俗摧傷况又紺馬騰空青鳥卜地歸寂之時瑞前古罕聞上歘聽泥洹增慟哭指令吊贈禮重國師門人僧等以其月十九日共舉龕入于之西隅三百餘步傳業弟子融闡昕政等五百來人恭敘遺德表以上聞諡曰大鏡大師璞玉呈祥輝金演慶終身著布衲之名後世欽蘊袍之譽遊方施化赴國觀光然則楚問江萍便引童謠之答齊咨海來方徵國語之訓缺略聊著斯文才陳梗槩東山之法遠傳雞林幾經年代來抵鰲潯雲居之子雷振法音天福四年歲次己亥四月十五日立弟子京內人崔文尹奉教刻壬辰五年後唐長興三年高麗太祖十五年佛紀一九五九年高麗前內奉卿崔凝卒王嘗謂凝曰昔新羅造九層塔遂成一統之業今欲開京建七層塔西京平壤建九層塔冀借玄功除羣醜合三韓為一家卿為我作發願疏凝黃州土山人通五經善屬文為弓裔翰林甚見重及麗王即位知元鳳省事俄拜廣評郎中凝曉達吏事時譽洽然凝恆齊素嘗寢疾王遣東宮問疾勸令食肉凝固辭不食王幸其第謂曰卿不食肉有二失不保其身不得終養其母不孝也不能永命使豫早喪良弼不忠也凝乃勉從方始食肉果平復至是十一月病卒王慟悼贈元甫賻甚厚纍徵大匡太子太保諡熙愷後配享太祖廟庭乙未八年後唐清泰二年高麗太祖十八年春三月甄萱子神劍幽其父於金山佛寺殺其弟金剛自立萱在金山寺三月飲醉守卒三十人與其子女愛妾等奔投高麗麗王待以厚禮復稱萱為尚父授館南宮位百僚上冬十月王降于高麗新羅亡王子徑入皆骨山金剛山也倚嵓為屋麻衣草食以終其身季子祝髮𨽻華嚴為浮圖名梵空後住法水海印寺王以四方土地盡為他有國弱勢孤不能自安乃與羣下謀降高麗羣臣議不一王子曰國之存亡必有天命當與忠臣義士收合民心以死自守盡力而後已豈宜以一千年社稷一旦輕以與人王曰孤危若此勢不能全既不能強又不能弱至使無辜之民肝腦塗地吾所不忍也乃使侍郎金封休賫書請降於高麗王既歸降高麗高麗王賜宮東一區以長女樂浪公主妻之改號神鸞公主拜金傅降王為觀光順化衛國功臣上柱國樂浪王政丞食邑八千戶位在太子之上歲給祿一千碩除新羅為慶州賜傅為食邑明年丙申高麗太祖自將討後百濟神劒降後百濟亡王以神劒僭位為人所脅非其本心且以歸命乞罪特原之甄萱憂悶發疽數日卒于黃山佛寺高麗王之二十年丁酉夏五月政丞金傅獻鐫金安玉排方腰帶長十圍六十二銙即新羅寶藏殆四百年世傳聖帝帶也王受之命元尹弋萱藏于物藏附存疑榆岾寺月氏金像甲子新羅南解王元年高句麗琉璃王二十三年百濟始祖溫祚王二十二年漢平帝元始四年釋迦如來金像五十三軀乘鐵鍾自來到泊安昌縣浦口又入金剛山縣宰盧偆奏其事創寺安之備考金剛山榆岾寺事蹟記高麗國平章事驪興府院君諡文正公閔漬撰閩汶字龍淵號默軒又號法喜居士金剛山者其名有五一曰皆骨二曰楓嶽三曰涅槃四曰金剛五曰怾怛前三出此方古記後二出華嚴於周本則云海中有菩薩住處名金剛山有菩薩名法起與其眷屬常住而演說於晉本則云海中有菩薩住處名怾怛有菩薩名曇無竭與其萬二千菩薩眷屬常為說法清凉疏云金剛言其體怾怛言其狀言金剛者其山之體如洗削立白金成一體故云言怾怛者梵語此云湧出其山之狀屹然湧出故云至於所住菩薩之名一云法起一云曇無竭者疏云曇無竭者梵語此云法起又山實在陸經云海中者可以理知耳何也山本出於白頭山白頭山者在肅慎舊界女真之地其山一脉來入海中初莖微細若瓜藤盤結而成三韓之地故非獨天竺為然耳中夏諸國亦指我邦以為海中則亦無疑矣國初道詵國師神通道眼明其地理言中蓍龜而百無一差題此山云聳雲沿海龍盤勢谷裏三軀特地平頷下一區為佛國腹中雙堰是人城今之摩訶衍正所謂頷下一區也新羅古記云義湘法師初入五臺山次入是山曇無竭菩薩現身而告曰五臺山有行有數人出世之地此山無行無數人出世之地也世傳云義湘是金剛寶蓋如來後身也若然則必不妄傳斯語矣果今山下有正陽長淵兩寺之臧獲與夫近地黔蒼不論老少男女勤怠賢愚臨終卒皆蕭然坐脫豈非目前之驗也山之東谷有寺曰榆岾有五十三佛尊像按古記云昔周昭王二十四年甲寅二十四年疑是二十六年之誤四月八日我釋迦如來誕降于中天竺迦毗羅國淨飯王宮年至十九踰城出家往入雪山苦行六年而成正覺住世七十九年以周穆王壬申二月十五日夜入涅槃佛住世時舍衛城中有九億家三億家見佛聞法三億家聞而不見三億家不聞不見我佛滅度後有文殊大聖受佛遺囑與諸大士化城中見如上不見佛三億家哀歎不已因教之曰汝慕誠我佛莫若鑄像供養於是勸三億家各鑄一像及乎聚金金之入火騰躍者受之否者還之各隨所出多少而成金既不等像有短長或有盈尺或不能尺既鑄像已復鑄一鍾擇諸像中相好全備者五十有三合安于鍾內又為文以記其事鑄蓋以覆其鍾泛于海而祝之曰惟我本師釋迦五十三像往住有緣國土我亦隨所住處說法度脫末世衆生耳泛訖即有神龍戴之而行至月氏國其國王名赫熾既得佛鍾發見尊相窮其志文相生敬重即營一殿以奉安殿忽成灰王又欲營佛即王夢曰我不住此王莫留我王驚悟復安舊鍾將泛于海因立誓言惟我佛鍾當向有緣國土豫與眷屬數千人當為護法善神常隨擁護於是以白金別作一蓋銘其願而置于鍾內復以舊蓋覆之躬臨泛海而送之由是今於是寺有月氏王祠鍾既泛海歷盡諸國來至于是山東面安昌縣前高城郡今杆城郡浦口時則新羅第二主南解王元年即漢平帝元始四年甲子也縣人見而異之馳告縣官其夕佛舁鍾下陸縣宰盧偆聞之率官隸而馳之其所但見所留蹤跡宛然印泥又見草樹之枝條皆向是山而靡則大異之望是山而行三十里許乃見盤跡藉草置鍾憩息之所今云憩房或云消房者是也至今路傍有歇鍾之石鍾痕宛存又行一千步許文殊大聖現比丘身指佛歸處今之文殊村是也又行千餘步前有一嶺嵯峨突兀未及嶺望見一尼踞石而坐問佛所在則指西曰驀即去亦是文殊化身也今之尼遊巖或云尼臺者是也又復前行萬仞峯頭線路盤回忽有白狗搖尾前引今之狗嶺是也過嶺而渴甚撥之得泉今之盧偆井是也又行六百許步狗失而獐出又行四百許步獐亦不見人亦困於犖確環坐小息忽聞鍾聲喜躍復進故見獐之地曰獐項聽鍾之地曰歡喜嶺既尋鍾聲踰小嶺緣溪西入洞門松柏森嚴中有一大池池北邊有一榆樹即掛鍾于樹枝佛則列於池岸于時異香芬馥瑞雲飛彩偆與官屬喜不自勝瞻禮無量遂以其事歸奏國王王乃驚異駕幸歸依即於其地創寺安之因榆樹以名其寺焉又於其地本無泉井齊廚日用之水艱於汲澗忽一日羣烏集于寺之東北隅噪而啄地靈泉流溢今之烏啄井是也後有一僧見其尊像久為香火所薰而黑庶乎洗露金容沸灰湯而洗之忽雷雨暴作五雲籠塞其五十三尊皆飛騰梁上而列焉於中三佛騰空去莫知所之其僧忽發狂疾而終厥後主社者淵冲歎佛數之缺缺特鑄三像而安焉舊佛皆斥而不容其夕告于冲師之夢曰莫以他像間於此坐後乃知向之所失三佛所在之處其二在九淵洞萬仞石壁上人力可及者下而還之其不可及者至今存焉其一在水精寺北絶壁上寺僧連梯以下之奉安于其寺後又移在船巖越二十四年丁亥襄州守裴裕奉安于舊列焉凡聞是事者雖樵童牧竪亦皆竦然况有識者哉抑又鍾之靈異則每遇大旱洗而得雨或生津液應國災祥近有山火風𦦨將及于時寺僧大驚但以水灌鍾俄而急雨滅火至於寺之廢興則但以所聞言之本朝毅廟二十二年戊子道人資順自妙香山來住是寺繼以比丘惠雙雙乃慨然有改創之志于時有西郡梁處士者善於術數因告于朝廷填其池而大開堂宇凡五百餘間處士云自茲厥後歲在己酉必有大弘正法者焉果於明廟朝曹溪大禪師益臧來住於此四方學者雲集于堂下是歲即己酉也康王末年癸酉上遣內侍司宰寺丞邵敬輿問法又以手詔賜茶香并納白銀一千斤修葺之邵寺丞因其舊蹟隨事題咏有詩十二首高廟丙子以來民罹兵火國步多艱僧殘屋老香火閴絶今化主行田愴其若是勸諸樂善之家不勞民力而重新棟宇多于前功者五十餘間以至元甲申而經始至甲午而畢功越乙未夏邀集道侶四千餘指大開象席而落之比年來兵寢歲豐糧道不絶衲子多歸而發明真性者比比有之由是中外士女益深敬信或因設供或修瞻禮而往來者如歸市焉噫是山本為大聖曇無竭真身住處名載大經實天下之名山也是佛亦為文殊大聖所鑄之像也遠自天竺來住此山靈奇之跡如彼則其所由來不可不傳於後世者也往自兵火以來山中久籍並皆消散可不痛哉恐後傳聞者又不可及今因廣覔遺文并採古老之相傳者俾余為記余亦然其所言不以不工為辭而勉從其請若夫所營堂宇辦善檀家同力共事者之名字則俱列于後大德元年丁酉十一月日日本工學博士關野貞調查報告書云榆岾寺本堂內發見佛像四十四軀皆是新羅時代之物云云附存疑二金官城婆娑石塔首露王金氏在位一百五十八年壬寅元年新羅儒理王十九年高句麗太武神王二十五年百濟多婁王十五年漢建武十八年佛紀一六九年駕洛國金首露王即位初創假宮而入御但要質儉越明年癸卯春正月王駕幸假宮之南新畓坪四望山嶽顧左右曰此地雖狹小而秀異可為十六羅漢住地何况自一成三自三成七七聖住地遂定京都築城建宮備考東國通鑒春三月駕洛國始祖金首露立初駕洛有九干曰我刀曰汝刀曰彼刀曰五刀曰留水曰留天曰神天曰神鬼曰五天各總其衆為酋長聚居山野無君臣位號九干修稧事適見龜峯有異氣且聞空中語得金盒開視之有金卵不日皆化為男奇偉長大衆皆驚異推立始生者為主因金卵姓金氏以始見名首露國號駕洛又稱伽倻餘五人各為五伽倻主曰阿羅伽倻今咸安郡曰古寧伽倻今咸昌郡曰大伽倻今高靈郡曰星山伽倻或碧珍伽倻今星州郡曰小伽倻今固城郡備考三國遺事駕洛國記高麗文宗朝大康年間金官知州事文人所撰也今略而載之開闢之後此地未有邦國之號亦無君臣之稱越有我刀干干貴稱也新羅之初稱王曰居西干亦與此同汝刀干彼刀干五刀干留水干留天干神天干五天干神鬼干等九干者是酋長總領百姓凡一百戶一百戶疑一萬戶之訛誤七萬五千人多以自都山野鑿井而飲耕田而食屬後漢世祖光武帝建武十八年壬寅三月禊洛之日所居北龜旨是峯巒之稱若十朋伏之狀故云也十明疑卜明之訛誤有殊常聲氣呼喚衆庶二三百人集會於此有如人音隱其形而發其音曰此有人否九干等云吾徒在又曰吾所在云何對云龜旨也又曰皇天所以命我者御是處惟新家邦為君后為茲故降矣你等須掘峯頂撮土歌之云龜何龜何首其現也若不現也燔灼而喫也以之蹈舞則是迎大王歡喜踴躍之也九干等如其言咸欣而歌舞未幾仰而觀之有紫繩自天垂而著地尋繩之下乃見紅幅裹金盒子開而視之有黃金卵六圓如日者衆人悉皆驚喜俱伸百拜尋還裹著抱持而皈我刀家置榻上其衆各散過浹辰翌日平明衆庶復相聚集開盒而六卵化為童子容貌甚偉仍坐於床衆庶拜賀盡恭敬止日日而大踰十餘晨昏身長九尺則殷之天乙顏如龍焉則漢之高祖眉分八彩則有唐之堯眼之重瞳則有虞之舜於其月望日即位也始現故諱首露國號大駕洛又稱伽倻國即六伽倻之一也餘五人各皈為五伽倻主東以黃山江西南以滄海西北以地理山今智異山東北以伽倻山南而為國尾俾創假宮而入御但要質儉茅茨不剪土階三尺二年癸卯春正月王若曰朕欲定置京都仍駕幸假宮之南新畓坪是古來間田新耕作故云也畓乃俗文也四望山嶽顧左右曰此地狹小如蓼葉然而秀異可為十六羅漢住地何况自一成三自三成七七聖住地固合于是托土托土與拓土同開疆終焉允臧歟築置一千五百步周回羅城宮禁殿宇及諸有司屋宇虎庫倉廩之地事訖還宮遍徵國內丁壯人夫工匠以其月二十日資始金陽暨三月十日役畢其宮闕屋舍俟農隙而作之經始于厥年十月逮甲辰二月而成涓吉辰御新宮理萬機而勤庶務參考三國遺事魚山佛影古記云萬魚寺者古之慈成山也又阿耶斯山當作摩那斯山梵語此翻為魚傍有呵囉國昔天卯天卯疑天卵之訛誤下于海邊作人御國即首露王當此時境內有玉池池有毒龍焉萬魚山有五羅剎女往來交通故時降電雨歷四年五穀不成王呪禁不能稽首請佛說法然後羅剎女受五戒而無後害故東海魚龍遂化為滿洞之石各有鍾磬之聲已上古記又按大定二十年庚子即明宗高麗十一年也始創萬魚寺棟梁寶林狀奏所稱山中奇異之迹與北天竺訶羅國佛影事符同者有三一山之側近地梁州界玉池亦毒龍所蟄是也二有時自江邊雲氣始出來到山頂雲中有音樂之聲是也三影之西北有盤石常貯水不絶云是佛浣濯袈裟之地是也已上皆寶林之說今親來瞻禮亦乃彰彰可敬信者有二洞中之石凡三分之二皆有金玉之聲是一也遠瞻即見近瞻不見或見不見等是一也尚玄曰佛影之事荒唐無稽難以置信而國名駕洛亦云呵羅又伽倻等名稱與竺語有關係故姑録之以備參考也戊申七年新羅儒理王二十五年高句麗慕本王元年百濟多婁王二十一年漢建武二十四年佛紀一七五年秋七月西域阿踰陀國公主許黃玉載石塔浮海來泊駕洛國海邊金首露王親迎立以為后誕生十子長子居登為嗣二子錫許后傳母姓其餘七子從寶玉仙人入伽倻山學道乘仙備考東國通鑒秋七月駕洛王金首露納許氏為妃備考三國遺事駕洛國記建武二十四年戊申七月二十一日九干等朝謁之次獻言曰大王降靈已來好仇未得請臣等所有處女絶好者選入宮闈俾為伉儷王曰朕降于兹天命也配朕而作后亦天之命卿等無慮遂命留天干押輕舟持駿馬到望山島立待申命神鬼干就乘岾望山島京南島嶼也乘岾輦下國也忽自海之西南隅掛緋帆張茜旗而指乎北留天等先舉火於島上則競渡下陸爭奔而來神鬼望之走入闕奏之王聞欣欣尋遣九干等整蕳橈揚桂楫而迎之旋欲陪入內王后乃曰我與汝等素昧平生焉敢輕忽相隨而去留天等返達后之語王然之率有司動蹕從闕下西南六十步許地山邊設幔殿祇侯王后於山外別浦津頭維舟登陸憩於高嶠解所著綾袴為贄遺于山靈也其地地疑他誤侍從媵臣二員名曰申輔趙匡其妻二人號慕貞慕良或臧獲并計二十餘口所賫錦繡綾羅衣裳匹段金銀珠玉瓊玖服玩器皿不可勝記王后漸近行在王出迎之同入帷宮媵臣已下衆人就階下而見之即退王命有司各各安置於是王與后共在御國寢后從容語王曰妾是阿踰陀國公主也姓許名黃玉年二八矣在本國時今年五月中父王與皇后顧妾而語曰爺娘一昨夢中同見皇天上帝謂曰駕洛國元君首露王者天所降而俾御大寶乃神乃聖惟其人乎且以新蒞家邦未定匹耦卿等須遣公主而配之言訖升天形開之後上帝之言其猶在耳你於此而忽辭親向彼乎往矣妾也浮海遐尋於蒸棗古字移天敻赴於蟠桃螓首敢叨龍顏是近王答曰朕生而頗聖先知公主自遠而届下臣有納妃之請不敢從焉今也淑質自臻眇躬多幸遂以合歡兩過清宵一經白晝於是遂還來船篙工楫師共十有五人各賜糧粳米十碩布三十匹令歸本國八月一日回鑾與后同輦入闕王后爰處中宮敕賜媵臣夫妻私屬空間二室分入餘外從者以賓館一坐二十餘間酌定人數區別安置日給豐羡其所載珍物藏於內庫以為王后四時之費一日王語臣下曰九干等俱為庶僚之長其位與名皆是宵人野夫之號非簪履職位之稱倘化外傳聞必有笑之耻遂改我刀為我躬汝刀為汝諧彼刀為彼藏五刀為五常留水留天之名不動上字改下字為留功留德神天改為神道五天改為五能神鬼之音不易改訓為臣貴取雞林職儀置角干阿比干級干之秩其下官僚以周判漢儀而分定之國人因號公主初來下纜渡頭村曰主浦村解綾袴高岡曰綾峴茜旗行入海涯曰旗出邊每以七月二十九日土人吏卒陟乘岾設帷幕酒食歡呼而東西送目壯健人夫分類以左右之自望山島駿蹄駸駸而競湊於陸鷁首泛泛而相推於水指古浦而相趨蓋此昔留天神鬼等望后之來急促告君之遺跡也備考金海金氏世譜駕洛國記上略王理國七年戊申七月命留天于望山島神鬼于乘岾以候之果有大船緋帆茜旗自西南指北而至有媵臣男女數十侍一善女並載石塔而到留天等馳奏以聞王乃於宮西設幔殿而迎之越二日同輦還宮立而為后后嘗從容語王曰妾是阿踰陀國公主也姓許名皇玉年十六同年五月父王母后夢見天帝云云略之覺而命之曰爾其往矣因載石塔曰可鎮風濤是故浮海遐尋而至耳既配為后誕生十子以元子居登為嗣賜其二子於許后為傳母姓於後焉王理國一百五十八年漢獻帝建安四年己卯三月二十四日薨葬龜旨峯南號曰納陵又云首陵后癸巳生漢靈帝中平六年己巳三月朔薨壽一百五十七葬龜旨東北號曰普州太后陵后之宗國曰阿踰陀或曰許皇國或曰南天竺不知其詳備考三國遺事金官城今金海郡婆娑石塔金官虎溪寺婆娑石塔者昔此邑為金官國時世祖首露王之妃許皇后名黃玉以東漢建武二十四年戊申自西域阿踰陀國所載來初公主承二親之命泛海將指東阻波神之怒不克而還白父王父王命載茲塔乃獲利涉來泊南涯有緋帆茜旗珠玉之美今云主浦初解綾袴於岡上處曰綾峴茜旗初入海涯曰旗出邊首露王聘迎之同御國一百五十餘年于時海東未有創寺奉法之事蓋像教未至而土人不信伏故本記無創寺之文逮第八代銍知王二年壬辰置寺於其地又創王后寺至今奉福焉兼以鎮南倭具見本國本記塔方四面五層其雕鏤甚奇石微赤斑色其質良脆非此方類也本草所云點雞冠血為驗者也金官國亦名駕洛國具載本記贊曰載厭緋帆茜斾輕乞靈遮莫海濤驚豈徒到岸扶黃玉千古南倭遏怒鯨備考駕洛國三王事蹟考首露王王配許后誕生十子后言于王曰妾悲吾姓之不傳於東土也王亦憐之乃錫二子許傳母姓於後東方之許氏原于此其餘七子志絶塵寰從寶玉仙人入伽倻山升仙云銍知王金銍知在位四十一年壬辰二年新羅訥祗王三十六年高句麗長壽王四十年百濟毗有王二十六年宋元嘉二十九年佛紀一四七九年駕洛國銍知王一云金銍王為世祖許黃玉王后奉資冥福創王后寺納田十結以為供億三寶之費備考三國遺事駕洛國記元君八代孫金銍王克勤為政又切崇真為世祖母許皇后奉資冥福以元嘉二十九年壬辰於元君與皇后合婚之地創寺額曰王后寺遣使審量近側平田十結以為供億三寶之費自有是寺五百步後置長遊寺所納田柴并三百結於是右寺三剛三剛難解在寺柴地東南標內罷寺為莊作秋收冬藏之場抹馬養牛之厩悲夫備考輿地勝覽王后寺舊址在長遊山首露王八代孫銍知王就幔殿合婚之地建寺名曰王后寺後罷寺為莊參考金海金氏世譜金海遺蹟云長遊寺一名佛母寺在府西二十五里許王后弟寶玉仙人卜幽長遊之處後銍知王建此寺以名曰長遊寺山以名曰長遊山山下有村曰長遊村載輿地勝覽附參考新羅僧寶關係日本者慧濟與智洗爾元亨釋書釋慧濟共沙門慧先入唐留學推古三十一年新羅真平王四十四年癸未七月從新羅大使智洗爾來皈初同志十數人皈朝只濟先二人而已或留唐或夭殂本朝之遠游濟等為始焉本朝高僧傳和州元興寺沙門慧濟傳釋慧濟不詳何許性穎敏好遊學嘗與同志慧先等十餘人同船入唐遍蹈名區尋知識晨昏研究經藏惟古三十一年從新羅大使智洗爾來皈其同學之僧或留唐或下世惟齊與先二人而已日本僧遊唐者以濟先為始也慧隱與新羅使元亨釋書釋慧隱入唐留學舒明十一年新羅善德王七年己亥九月從新羅使來歸白雉三年於宮中講無量壽經沙門慧資為問者智通與新羅船本朝高僧傳和州觀音寺沙門智通傳釋智通不詳何許國人稟性敏察學徒不倦齊明四年新羅武烈王四年戊午秋七月奉敕共沙門智達乘新羅船問脂那風謁玄弉三藏時弉公在洛陽玉華宮翻譯經論殷勤隨事切磋惟識業成通念回居和州開觀音寺專說法相此方義學以通親受弉師競詢教法名播四方白鳳元年三月敕為僧正是相宗入唐得法之第二番也新羅佛像元亨釋書釋道信蝦夷人持統三年新羅神文王八年己丑奏求出家與自得奉敕得度此歲新羅獻彌陀金像朝廷責失禮還其獻物新羅恐得奏求其像許而賜之智鳳本朝高僧傳和州元興寺沙門智鳳傳釋智鳳新羅國人不詳其姓氏神彩高遠早志于道某年航海來朝留學年久大寶三年新羅聖德王元年癸卯奉遠遊之敕與沙門智鸞智雄入唐謁濮陽智周大師稟法相而歸是相宗入唐得法之第三番也住元興寺大弘唯識名振當代慶雲三年十月十六日右僕射藤淡海公膺大織冠之遠忌修維摩會請南京英宿論說鳳為講師詞義清壯請益之賓常盈講席龍門寺僧義淵從鳳受法相或繫鳳於慈恩下者非也淨達求法新羅又釋淨達入新羅國尋師求法慶雲四年新羅聖德王五年丁未五月來和銅二年十月右僕射不比等就植槻場修維摩會延達為上首焉元亨釋書與此文同審祥本朝高僧傳和州大安寺沙門審祥傳釋審祥新羅國人觀光此國尋師求法又入唐從賢首國師傳華嚴還居大安寺鏟光混衆東大良辨興華嚴宗一夕夢著紫衣青裙僧告曰欲弘大教當請嚴智師開講於不空羂索前時元興寺有嚴智法師便往請之智曰我學解膚淺不與名合方今審祥禪師包蘊宗乘是即香象大師之上足真嚴智師也往請此師辨抵大安三請不起因聞於闕皇帝乃詔天平十二年新羅景德王時臘月十八日於金鐘道場始講大乘華嚴獅子吼經於是都下十六員名匠畿內學賓持卷據座開題之日帝率卿僚幸寺聞法祥振無礙辨竗解入神紫雲一片降覆春日山見者嘆異皇情大悅賜綵帛一千餘匹太上皇皇后及公卿已下檀䞋供給填委羅陳敕慈訓鏡忍圓證三大德為覆師歲講二十卷三年畢功從此專弘華嚴良辨為首弟子益多以十四年壬午終於所住不祥世齡法臘祥師之事不載國史及釋書今據凝然之記以立傳焉新羅明神元亨釋書新羅明神者天安二年新羅憲安王元年戊寅圓珍師泛舶自唐歸洋中忽有老翁現船舷曰我是新羅國之神也誓護持師教法至慈氏下生語已不見珍入京將傳來教籍藏尚書省時海上翁來曰此所不堪置經書是日域中有一勝地我已先相攸師聞官建院宇庋此典籍我鎮加護又佛法是王法之治具也佛法若衰王法亦衰語已形隱珍歸睿山至山王院時山王明神現形曰傳來經書宜藏此所新羅明神又出曰此地來世必有喧爭不可置也南行數里是為勝處珍乃與新羅山王二神及二比丘到滋賀郡園城寺寺僧教待說寺事既而山王回睿阜新羅明神語珍曰我卜居寺之北野時百千眷屬倐來圍繞唯珍獨見他人不知於是有乘輿人儀衛甚多以美膳饗新羅神教待來賀而後乘輿人形隱不見珍問明神執輿者為誰新羅神曰三尾明神也祠今在寺南自此新羅明神威靈益顯本朝高僧傳江州新羅明神新羅明神者天安二年圓珍歸自唐洋中忽有老翁現於舷上曰我新羅國之神也誓護持師教法至慈氏下生珍將傳來經論藏尚書省老翁來曰此所不可有一勝地我先相攸師聞朝建院宇納之我永護之佛法是王法之治具佛法若衰王法亦衰珍歸山王院時山王明神現形曰傳來經典宜藏此所翁復出曰此地後來必有喧爭自此南行數里有清絶處二神誘珍到滋賀郡園城寺新羅明神語曰我卜寺北時百千眷屬俄來圍繞唯珍獨見他人不知有乘輿人以美膳饗新羅神珍問明神執輿者為誰曰三尾明神也永承七年九月園城寺明尊始行祭禮神託和歌歡納三井慶耀為兒時有神託曰我新羅明神之屬宿王菩薩也當入園城之門者令我擁護焉元亨釋書釋教待不知何許人久居園城寺天安二年圓珍法師與新羅山王二神相勝區到園城寺待見珍如故舊時有檀越大友氏謂珍曰待師日者嘗曰當寺主者已生焉有時曰入唐焉又曰來何暮今朝曰寺主來也然則我奉待者久矣乃與待以寺券付珍及三尾神膳饗新羅神待來賀之然後形隱不見珍問新羅神老待沒而不見何神曰彌勒菩薩之應化也今已得師又何存乎珍還寺問大友氏待公本貫何所生平行業何如大友氏曰不知何人居此寺已百餘歲平居不赴堂齊有時往湖濱取魚鱉乾串當饌率為常今聞已隱痛哉乃共大衆詣其房見殘乾魚皆悉荷藕蓮之類無他種衆皆嘆異年一百六十二歲待嘗與清水寺行睿居士善其來清水著木屐欵話終日云贊曰善應無方者至人之化也何之不可哉而成公被待于仲算待公待珍師是吾法因緣之所生而時處之成就者乎然則因緣之與時處者吾佛之大訓矣哉高麗時代太祖神聖王王建在位二十六年戊戌二十一年後晉天福三年春三月西天竺僧弘梵大師室哩嚩日羅本摩竭陀國大法輪菩提寺僧來王備兩街威儀法駕迎之庚子二十三年後晉天福五年秋七月王師僧忠湛死樹塔于原州興法寺王親製碑文冬十二月開泰寺成設落成華嚴法會王親製疏文其略曰生遇百罹未堪多艱人莫聊生室無完堵某證天有誓剗平巨孽拯塗炭之生民恣農桑於鄉里上憑佛力次仗玄威二紀之水擊火攻身蒙矢石千里之南征東討親枕干戈丙申秋九月於崇善城邊與百濟兵交陳一呼而狂凶瓦解再鼓而逆黨氷消凱唱浮天歡聲動地答佛聖之維持酬山靈之讚助特命司宰創造蓮宮乃以天護為山號開泰為寺名所願佛威庇護天力扶持云云是歲重修新興寺置功臣堂畫三韓功臣於東西壁設無遮大會一晝夜歲以為常第五王子出家是為證通國師癸卯二十六年後晉天福八年夏四月王御內殿召大匡朴述熙親授訓要曰我聞大舜耕歷山終受堯禪高帝起沛澤遂興漢業豫亦起自單平謬膺推戴夏不畏熱冬不避寒焦身勞思十有九載統一三韓叨居大寶二十五年身今老矣第恐後嗣縱情肆欲敗亂綱紀大可憂也爰述訓要以傳諸後庶幾朝披夕覽永為龜鑒其一曰我國家大業必資諸佛護衛之力是故創立禪教寺院差遣住持焚修使之各治其業後世姦臣執政徇僧請謁各業寺社爭相換奪切宜禁之其二曰諸寺院皆是道詵推占山水順逆而開創者也道詵云吾所占定外妄有創造損薄地德祚業不永朕念後世國王公侯后妃朝臣各稱願堂或增創造則大可憂也新羅之末競造浮屠衰損地德以底於亡可不戒哉其三曰嫡子嫡孫傳國傳家雖曰常禮丹朱不肖堯禪於舜實為公心凡元子不肖者與其次子次子皆不肖者與其兄弟之中群下推戴者俾承大統其四曰惟我東方舊慕唐風文物禮樂悉遵其制殊方異土人性各異不必苟同契丹是禽獸之國風俗不同言語亦異衣冠制度慎勿效焉其五曰朕賴三韓山川陰祐以成大業西京水德調順為我國地脉之根本宜當四仲巡駐留過百日以致安寧其六曰燃燈所以事佛八關所以事天靈及五嶽名山大川龍神也後世姦臣建白加減者切宜禁止吾亦當初誓心會日不犯國忌君臣同樂宜當敬依行之其七曰人君得臣民之心為甚難欲得其心要在從諫遠讒而已從諫則聖讒言如蜜不信則讒自止又使民以時輕徭薄賦知稼穡之艱難則自得民心國富民安其八曰車峴以南公州江外山形地勢並趨背逆人心亦然彼下州郡人參與朝廷與王侯國戚婚姻得秉國政則或變亂國家或䘖統合之怨犯蹕生亂且其曾屬官寺奴婢津驛雜尺或投勢移免或附王侯宮院姦巧言語弄權亂政以致災變者必有之矣雖其良民不宜使在位用事其九曰百辟群僚之祿視國大小已為定制不可增減其十曰有國有家警戒無虞博觀經史鑑古戒今周公大聖無逸一篇進戒成王宜當圖揭出入覲省十訓之終皆結以中心藏之四字自是嗣王相傳為寶定宗文明王堯在位四年丙午元年後晉開運三年佛紀一九七三年春正月王備儀仗奉佛舍利步至十里所開國寺安之又以穀七萬石納諸大寺院各置佛名經室及廣學室以勸學法者光宗大成王王昭在位二十六年辛亥二年後周太祖廣順元年創奉恩寺于城南為太祖願堂又創佛日寺于東郊為先妣劉氏願堂冬十月西京重興寺九層塔灾癸丑四年後周廣順三年冬十月慶州皇龍寺九層塔灾庚申十一年宋太祖建隆元年遣沙門諦觀持天台教論疏諸文入宋戊辰十九年宋開寶元年創弘化遊巖三歸等寺以僧惠居為國師坦文為王師王信讒多殺內懷疑懼欲消罪惡廣設齊會無賴之徒詐為出家以求飽丐飫者坌至或以餅餌米豆柴炭施與京外道路不可勝數列置放生所就傍近寺院開演佛經禁斷屠殺至於內膳亦買市廛以進甲戌二十五年宋開寶七年西京居士緣可謀叛伏誅僧惠居示寂以坦文為國師景宗獻和王王胄在位六年辛巳六年宋太平興國六年秋七月丙午王薨堂弟開寧君治受內禪即位冬十一月王以八關會雜技不經且煩擾悉罷之幸法王寺行香還御球庭受羣臣朝賀成宗文懿王王治在位十六年壬午元年宋太平興國七年夏六月制曰后德惟臣朕新總萬幾恐有闕政其京官五品以上各上封事論時政得失正匡行選官御事上柱國崔承老上書略曰上略太祖尊釋教重儒術為君之令德斯備但以創業之初致平日淺宗廟社稷禮樂文物猶多闕乏忽遺弓劒深可惜也中略光宗酷信佛事常行之齊設既多別願之焚修不少專求福壽但作祈禱窮有涯之財力造無限之因緣自輕至尊好作小善又於出入宴遊莫不窮奢極侈以其目前無事將謂法力使然凡所作為不欲悛改中略竊聞聖上為設功德齊或親碾茶或親磨麥臣愚深惜聖體之勤勞也此斃始於光宗多殺無辜欲除罪業浚民膏血多作佛事或設毗盧遮那懺悔法或齊僧於毬庭或設無遮水陸會於歸法寺每值佛齊日必供乞食僧或以內道場餅果出施丐者或以新池穴口與摩利山等處魚梁為放生所一歲四遣使就其界寺院開演佛經又禁殺生御廚肉膳市買以獻至令大小臣民悉皆懺悔擔負米豆柴炭施與中外道路者不可勝紀然而既信讒訴視人如草芥誅殺者堆積如山常竭百姓膏血以供齊設佛如有靈豈肯應供當是時背父背主者變形為僧及遊行丐乞之徒來與諸僧相雜赴齊有何利益願聖上正君王之體不為無益之事一聖上以醬酒豉羹施與行路臣竊謂聖上欲效光宗消除罪業普施結緣之意此所謂小惠未遍也若明其賞罰懲惡勸善足以致福如此碎事非人君為政之體乞罷之一佛寶錢穀諸寺僧人各於州郡差人勾當逐年長利勞擾百姓請皆禁之一聖上遣使迎屈山僧如哲入內臣愚以為哲果能福人者其所居水土亦是聖上之有朝夕飲食亦是聖上之賜必有圖報之心每以祝釐為事何煩迎致然後敢施福耶曩者有善會者規避徭役出家居山光宗致敬盡禮卒之暴死道傍身且取禍何暇福人請放哲還山免致善會之譏一臣聞僧人往來郡縣止宿館驛鞭撻吏民責其迎候供億之緩吏民疑其銜命畏不敢言斃莫大焉自今禁僧徒止宿館驛一世俗以種善為名各隨所願營造佛宇其數甚多又有中外僧徒競行營造普勸州郡長吏徵民役使急於公役民甚苦之願嚴加禁斷一寫經塑像只要傳久何用珍寶為飾以啓盜賊之心古者經皆黃紙且以栴檀木為軸其肖像不用金銀銅鐵但用石土木故無竊毀者新羅之季經像皆用金銀奢侈過度終底滅亡使商賈竊毀佛像轉相賣買以營生産近代餘風未殄願嚴加禁斷以革其弊一崇信佛法雖非不善然帝王士庶之為功德事實不同若庶民所勞者自身之力所費者自己之財害不及他帝王則勞民之力昔梁武帝以天子之尊修匹夫之善臣聞人之禍福貴賤皆稟於有生之初當順受之況崇佛教者只種來生因果鮮有益於見報理國之要恐不在此且三教各有所業而行之者不可混而一之也行釋教者修身之本行儒教者理國之源修身是來生之資理國是今日之務今日至近來生至遠舍近求遠不亦謬乎人君惟當一心無私普濟萬物何用役不願之人費倉庫之儲以求必無之利乎昔唐德宗妃父王景先駙馬高恬為聖壽延長鑄金銅佛像獻之德宗曰朕以有為功德謂無功德還其佛像於二人是其情雖不實然令臣民不得作無利事者如此我朝冬夏講會及先王先后忌齊其來已久不可取舍其他可減者請減之乙酉四年宋雍熙二年佛紀二一二年冬十月禁捨家為寺戊子七年宋端拱元年佛紀二一五年依浮屠法以正五九月為三長月禁屠殺己丑八年宋端拱二年佛紀二一六年冬十二月丙寅教曰昔唐太宗每於皇考妣忌月禁屠殺敕天下僧寺限五日焚修轉念以為常式況寡人幼而即閔長又早孤未酬罔極之恩每軫追思之念盍遵往轍以伸豫懷可自今太祖忌齊王考戴宗忌齊期五日王妣宣義王后忌齊期三日焚修轉念仍於是月禁屠殺斷肉膳宋史云高麗遣僧如可責表來覲請賜大藏經賜之仍賜如可紫衣歸國辛卯十年宋淳化二年韓彥恭自宋還獻大藏經王迎入內殿邀僧開讀下教遣翰林學士白思柔如宋謝賜經穆宗宣讓王王誦在位十二年庚子三年宋咸平三年契丹統和十八年冬十月創崇教寺為影剎癸卯六年宋咸平六年契丹統和二十一年千秋太后皇甫氏逼大良院君詢為僧初洞州人金致陽太后外族性姦巧嘗詐祝髮出入千秋宮中略成宗杖配遠地成宗薨召授閣門通事舍人不數年貴寵無比百官豫奪皆出其手親黨布列勢傾中外起第至三百餘間臺榭園池窮極美麗日夜與太后遊戲無所畏忌洞州立祠額曰星宿寺又於宮城西北隅立十王寺其圖像奇怪難狀潛懷異志以求陰助凡器皿皆銘其意其鍾銘曰當生東國之時同修善種後往西方之日共證菩提王常欲黜之恐傷母志不敢也至是太后生子中略與致陽謀為王後忌大良君強令出家年十二初寓崇教寺有僧夢見大星隕寺庭變為龍又變為人即大良君也由是衆奇多之後寓居三角山神穴寺太后潛遣人謀害者屢矣寺有老僧穴地室中匿之而上置臥榻以防不測甲辰七年宋景德元年契丹統和二十二年復遣使于宋求官本藏經將固有之前後二藏及與契丹藏本校合而刊刻之此謂高麗藏本丙午九年宋景德三年契丹統和二十四年六月禪教僧徒大德以上加法號丁未十年宋景德四年契丹統和二十五年創真觀寺九層塔己酉十二年宋大中祥符二年契丹統和二十七年春正月庚午幸崇教寺及還暴風折傘蓋柄顯宗元文王王詢在位二十二年詢年十二千秋太后忌之逼令祝髮初寓崇教寺穆宗九年移于三角山神穴寺一日偶題溪水詩曰一條流出白雲峯萬里滄溟去路通莫道潺湲巖下在不多時日到龍宮詠小蛇曰小小蛇兒繞藥欄滿身紅錦自斑斕莫言長在花林下一旦成龍也不難又夢聞雞聲砧響問於術士以方言解之曰雞鳴高貴位砧響御近當是即位之兆也穆宗十二年二月己丑奉迎即位於延寵殿庚戌元年宋大中祥符三年契丹統和二十八年佛紀二三七年春正月乙丑廢上元道場閏二月甲子復燃燈會國俗自王宮國都以及鄉邑以正月望燃燈二夜自成宗以來廢而不舉至是復之十一月復八關會王御威鳳樓觀樂初成宗以雜技不經且煩擾悉罷之但於其日幸法王寺行香還御毬庭受文武朝賀而已廢之幾三十年至是政堂文學崔沆請復之癸丑丹兵至西京焚中興寺塔辛亥二年宋大中祥符四年契丹統和二十九年佛紀二三八年二月乙未設燃燈會于行宮是後例以二月望行之壬子三年宋大中祥符五年契丹開泰元年佛紀二三九年五月撤慶州朝遊宮以其材修皇龍寺塔禮官請令中外賀生辰王教曰寡人早值凶閔永違供養每及劬勞之日益切追感之心忍以悲懷而為慶會兩京諸道進賀一切禁之止置祝壽道場永為恆式十二月創重光寺丁巳八年宋天禧元年契丹開泰六年佛紀二四四年春正月復禁人捨家為寺婦女為尼五月西女真揩信擒契丹東京僧道遵以來戊午九年宋天禧二年契丹開泰七年佛紀二四五年奉太祖梓宮移安于負兒山香林寺重修開國寺塔安舍利因設戒壇度僧三千二百餘人庚申十一年宋天禧四年契丹開泰九年佛紀二四七年五月設一百獅子座於內講仁王經三日歲為常例秋八月以安西道屯田一千二百四十結施納于玄化寺兩省再三論駁不從九月親幸玄化寺鑄鍾以法鏡為王師辛酉十二年宋天禧五年契丹太平元年佛紀二四八年夏四月己巳講仁王經於毬庭三日夏五月命尚書左丞李可道往取慶州高仙寺金羅袈裟佛頂骨昌林寺佛牙並置內殿秋八月王如玄化寺親篆碑額命翰林學士周佇製碑文命修皇龍寺塔第四回重成壬戌十三年宋乾興元年契丹太平二年佛紀二四九年五月韓祚還自宋帝賜釋典一藏甲子十五年宋天聖二年契丹太平四年佛紀二五一年六月門下侍郎平章事崔沆卒沆彥撝之孫酷信浮屠嘗請復八關又請修皇龍寺塔身往監督頗傷農務又於私第造置經像竟捨為寺乙丑十六年宋天聖三年契丹太平五年佛紀二五二年圓空國師示寂丙寅十七年宋天聖四年契丹太平六年佛紀二五三年秋九月甲子幸海州神光寺丁卯十八年宋天聖五年契丹太平七年佛紀二五四年六月癸未楊州奏藏義三川青淵寺僧犯禁釀酒共米三百六十餘石請依律斷罪從之九月戊戌朔命創慧日重光寺徵發人夫工匠輔臣諫官皆奏百姓勞弊不宜興作左承宣李瓌獨奏曰為佛造寺功德無量勞民何傷時議譏之冬十月壬午講仁王經于毬庭己巳二十年宋天聖七年契丹太平九年夏四月庚子設藏經道場於會慶殿飯僧一萬于毬庭六月丙辰徵有妻僧充重光寺役徒辛未二十二年宋天聖九年契丹興宗景福元年夏四月王薨諡元文廟號顯宗太子即位秋七月侍中致仕姜邯贊卒海東名將傳云朝鮮正宗朝開城府得古塔有姜太師為國祈福銘邯贊之贊書以瓚十月幸毬庭飯僧三万德宗敬康王王欽在位三年壬申元年宋明道元年契丹重熙元年春正月丁亥幸外帝釋院二月乙卯然燈幸王輪寺三月甲午幸妙通寺夏四月以旱放奉恩重光兩寺役夫避殿減膳禁屠殺放輕繫五月丁未王以皇考諱辰道場如玄化寺六月辛丑王以太祖諱辰道場如奉恩寺甲寅王受菩薩戒於膺乾殿七月庚寅王以皇妣諱辰如奉恩寺八月癸丑幸妙通寺戊午王如奉恩寺以僧法鏡為國師九月乙未幸外帝釋院甲戌三年宋景祐元年契丹重熙三年十一月設八關會御神鳳樓賜百官酺幸法王寺翌日大會又賜酺觀樂中外上表陳賀宋商客東西蕃耽羅獻土物賜坐觀禮自後以為常靖宗容惠王王亨在位十四年乙亥元年宋景祐二年契丹重熙四年震皇龍寺九層塔丙子二年宋景祐三年契丹重熙五年三月戊子幸三角山癸巳還宮五月辛卯創凡有四子者許子出家於靈通嵩法普願桐華等寺戒壇試所業經律八月癸亥飯僧一萬於毬庭十一月己丑設八關會宋商及東女真耽羅各獻方物辛巳七年宋慶曆元年契丹重熙十年夏四月癸丑設藏經道場于會慶殿春秋二季例設此會春六日秋七日癸未九年宋慶曆三年契丹重熙十二年三月己丑設百座道場于會慶殿飯僧一萬乙酉十一年宋慶曆五年契丹重熙十四年二月戊子朔賜臨津課橋院號曰慈濟寺先是津無船橋行人爭渡多致陷溺命有司作浮梁自此人馬如履平地丙戌十二年宋慶曆六年契丹重熙十五年三月辛丑命侍中崔齊顏詣毬庭行香拜送街衢經行分京城街衢為三道各以綵樓子擔般若經前行僧徒具法服步行讀誦監押官亦以公服步從巡行街衢為民祈福名曰經行自是歲以為常夏四月丁卯王不豫丁丑移御大法雲寺丙戌百官禱于佛寺丁酉王薨樂浪君即位于梓宮前十二月百官詣乾德殿賀成平節宴宰樞給舍中丞以上侍臣于宣政殿成平節王之生日也僧録司奏自今每遇節日國家設祈福道場於外帝釋院七日百官於興國寺東西兩京四都護八牧於所在佛寺行之以為恆式從之文宗仁孝王王徽在位三十七年丁亥元年宋慶曆七年契丹重熙十六年佛紀二七四年三月癸未親設般若道場於乾德殿五日四月丁丑親設百座仁王經道場於會慶殿飯僧一萬於毬庭六月乙卯王率公卿大夫如奉恩寺以王師決凝為國師八月辛亥親設金剛經道場於文德殿五日戊子二年宋慶曆八年契丹重熙十七年佛紀二七五年三月庚子御史臺奏曰播穀伊始雨澤愆期今大雲大安兩寺之役方興丁匠廢農一夫不耕必有飢者三時之務安可奪焉況會降赦書云一切土木之役限三年停罷舉國欣欣皆感德音而竟不行之信者國之大寶不可棄也食言之謗恐由此起伏望兩寺之役須俟農隙從之辛亥設消災道場於內殿放輕繫蠲逋缺夏四月庚午幸外帝釋院聽軒欄說經故事行幸山林將駕還必駐是院命僧乘鳳輦軒欄講法以為常式秋八月庚午設金光明經道場於會慶殿九月丙辰設百座仁王道場於會慶殿三日飯僧一萬於毬庭二萬於外山名寺己丑三年宋皇祐元年契丹重熙十八年佛紀二七六年九月乙巳設百座仁王道場於會慶殿三日辛卯五年宋皇祐三年契丹重熙二十年佛紀二七八年春正月癸亥幸真觀寺轉新成華嚴般若經夏四月壬午幸普濟寺設五百羅漢齊庚子內史門下奏重興大安大雲等寺創新補舊土木興役凡所營為事非急切匠夫疲於日夜饋餉勞於轉輸妻還子去道路相繼春夏以來略無休息況去歲不稔生民乏食力不能堪應須興役請侯農隙從之八月辛丑親饗年八十以上僧俗男女一千三百四十三人廢疾僧俗男女六百五十三人孝子順孫節婦十四人于毬庭賜物有差壬辰六年宋皇祐四年契丹重熙二十一年佛紀二七九年三月丁未王如大安寺飯僧壬戌王如玄化寺飯僧夏四月丙戌幸大安寺以修葺功畢設落成道場六月乙亥設金光道場於文德殿禱雨大雨九月庚申設百高座道場於會慶殿三日飯僧三萬於毬庭及諸名寺癸巳七年宋皇祐五年契丹重熙二十二年六月癸未王受菩薩戒於乾德殿九月辛卯次北嵩山神光寺設羅漢齊冬十月丁巳次慈悲嶺彌勒院行香施衣行過岊嶺道有一婦抱兩孩兒王憐之賜米甲午八年宋至和元年契丹重熙二十三年六月丁未王受菩薩戒於內殿乙未九年宋至和二年契丹道宗清寧元年冬十月丙申制曰古先帝王尊崇釋教載籍可考況聖祖以來代創佛寺以資福慶寡人繼統不修德政災變屢見庶憑法力福利邦家其令有司擇地創寺門下省奏自古聖帝明王無有創起寺塔以致太平惟崇重法門慎省政教不傷民力則自然宗社靈長昔達摩對武帝言造寺造塔殊無功德是尚無為功德不尚有為功德也且聖祖創寺者一以酬統合之志願一以壓山川之違背耳今欲增創新寺勞民於不急之役怨讟交興毀傷山川之氣脈災害必生神人共怒非所以致太平之道也不允丙申十年宋嘉祐元年契丹清寧二年二月癸卯始創王興寺于德水縣移其縣於楊川知中樞院事崔惟善諫曰昔唐太宗神聖英武未有倫比不許度人為僧不許創立寺觀以遵述高祖之志史傳皆美之我太祖訓要曰國師道詵察國內山川順逆凡可以創造伽藍之地無所不為後世嗣王及公侯貴戚后妃臣僚無得爭修願宇以虧損地德今殿下承祖宗積纍之基升平日久固宣節用而愛民能持盈守成以傳後嗣奈何罄民財竭民力以供不急之費欲危邦本耶臣切惑焉王優答之異日入侍間宴王從容慰獎曰諫諍是忠從好佞惟善對曰創垂猶易守成難八月庚午飯僧三萬九月丙申制曰釋迦闡教清淨為先遠離垢陋斷除貪欲今有避役之徒托號沙門殖貨營生耕畜為業估販為風進違戒律之文退無清淨之約袒肩之袍任為酒罌之覆講唄之場割為䓤蒜之疇通商買賣結客醉娛喧雜花院穢臭蘭盆冠俗之冠服俗之服憑托修營寺院以備旗鼓歌吹出入閭閻搪揬市井與人相鬪以致血傷朕庶使區分善惡肅舉紀綱宜令沙汰中外寺院其精修戒行者悉令安住犯者以法論十一月壬午幸內帝釋院以僧海麟為王師侍中李子淵上言近因創造興王寺移德水縣於楊川由是百姓營葺廬舍未遑寧處男負女提道路相繼貧者有擠壑之憂富者無按堵之所請蠲一歲賦役制特蠲兩年作長源亭於西江餅嶽之南道詵明堂記云西江邊有君子御馬明堂之地自太祖統一丙申之歲至百二十年就此創構國業延長至是命太史令金宗允等相地搆之丁酉十一年宋嘉祐二年契丹清寧三年佛紀二八四年二月癸酉設消灾道場于乾德殿五日夏四月丙辰幸佛日寺飯僧五月丁丑設消灾道場于壽春宮三日秋七月戊子設消灾道場于乾德殿五日戊戌十二年宋嘉祐三年契丹清寧四年佛紀二八五年五月戊子王如奉恩寺冊海麟為國師爛圓為王師六月甲寅王受菩薩戒於乾德殿秋七月己卯中書門下省奏今以景昌院所屬田柴移屬興王寺其魚梁舟楫奴婢悉令還宮夫宮院者先王所以優賜田民貽厥子孫傳於萬世無有匱乏者也今宗枝彌繁若欲各賜宮院猶恐不足况收一宮田柴屬于佛寺乎請田民魚梁舟楫仍舊還賜制曰田柴已納三寶難可追還宜以公田依元數給之餘從所奏己亥十三年宋嘉祐四年契丹清寧五年佛紀二八六年秋八月丁亥制兩京及東南州郡一家有三子者許一子年十五剃髮為僧庚子十四年宋嘉祐五年契丹清寧六年佛紀二八七年春正月癸丑設天帝釋道場于文德殿七日辛丑十五年宋嘉祐六年契丹清寧七年佛紀二八八年六月癸丑王如奉恩寺遂詣國子監謂侍臣曰仲尼百王之師敢不致敬遂再拜壬寅十六年宋嘉祐七年契丹清寧八年佛紀二八九年八月乙酉幸興王寺制曰是寺鳩孱已久巨構將成今親觀厥功特申異數應內外重刑並降從流配公徒私杖以下咸赦除之董役官吏並加爵賞癸卯十七年宋嘉祐八年契丹清寧九年佛紀二九年三月丙午契丹送大藏經王備法駕迎于西郊甲辰十八年宋英宗治平元年契丹清寧十年佛紀二九一年三月甲寅設仁王道場于會慶殿三日飯僧一萬於毬庭夏四月庚午制大雲寺先王始創以福邦家其所給公田地瘠稅少齊供不周加賜良田一百頃是歲命修皇龍寺九層塔乙巳十九年宋治平二年契丹咸雍元年佛紀二九二年五月癸酉御景靈殿召王師爛圓祝子煦髮為僧先是王謂諸子曰孰能為僧作福田利益耶煦起曰臣有出世志惟上所命王曰善遂隨師出居靈通寺號祐世僧統煦王之第四子也丙午二十年宋治平三年遼咸雍二年佛紀二九三年九月庚辰幸妙通寺設摩利支天道場丁未二十一年宋治平四年遼咸雍三年佛紀二九四年春正月庚申興王寺成凡二千八百間十二年而功畢王欲設齊以落之諸方緇流坌集無算命兵部尚書金陽右街僧録道元等擇有戒行者一千赴會仍令常住戊辰特設燃燈大會五晝夜敕令百司及安西都護開城府廣水楊東樹五州江華長湍二縣自闕庭至寺門結綵棚節比鱗次連亘相屬輦路左右又作燈山火樹光照如晝是日王備鹵簿率百官行香施納財襯佛事之盛曠古未有六月辛酉王受菩薩戒于乾德殿九月丁酉國師海麟請老還山王親餞于玄化寺賜茶藥金銀器皿綵段寶物戊申二十二年宋神宗熙寧元年遼咸雍四年春正月癸巳幸興王寺設慶成會信宿乃還庚戌二十四年宋熙寧三年遼咸雍六年二月丙寅幸興王寺以新創慈氏殿設慶成大會經宿而還五月壬寅王出子竀于玄化寺剃髮為僧竀王之第五子是為道生僧統王之第十子璟亦出家是為聰惠首座癸丑二十七年宋熙寧六年遼咸雍九年二月丁酉王如奉恩寺特設燃燈會慶讚新造佛像街衢點燈兩夜各三萬盞重光殿及百司各置綵樓燈山作樂三月己酉設般若經道場于會慶殿五日以禳灾變九月戊辰設消灾道場于會慶殿五日甲寅二十八年宋熙寧七年遼咸雍十年夏四月乙酉設百高座於內殿講仁王經三日秋七月庚子設文豆婁道場於東京四天王寺二十七日以禳番兵丙辰三十年宋熙寧九年遼大康二年六月己亥王受菩薩戒于內殿冬十月戊戌有司奏日本國僧俗二十五人到靈光郡告曰為祝國王壽雕成佛像請赴京以獻制許之日本白河天皇承保三年丁巳三十一年宋熙寧十年遼大康三年三月甲寅幸興王寺轉新成金字華嚴經戊午三十二年宋元豐元年遼大康四年夏四月甲子以宋帝節日設祝壽齊于東林大雲二寺秋七月興王寺金塔成以銀為裏金為表銀四百二十七斤金一百四十四斤己未三十三年宋元豐二年遼大康五年冬十一月己巳日本商客藤原等來以法螺三十枚海藻三百束施興王寺為王祝壽庚申三十四年宋元豐三年遼大康六年三月壬申刑部奏戶部擅以興王寺田給萬齡殿請罪之制削戶部官吏職放還田里夏六月興王寺金塔外護石塔成赦癸亥三十七年宋元豐六年遼大康九年三月己丑命太子迎宋朝大藏經置于開國寺仍設道場秋七月癸丑百官設華嚴經道場于興國寺五日以祈風雨調順辛酉王薨太子即位是為順宗宣惠王冬十月癸酉朔設道場于會慶殿三日飯僧三萬乙未命母弟國原公運權㧾國事是日薨宣宗思孝王王運在位十一年丁酉設金光明經道場於乾德殿十一月丁卯翰林院奏凡內外州府郡縣寺院公私門館號及臣僚以下名犯御諱者及音同者請改之制從之十二月壬申設華嚴經道場于乾德殿五日甲子元年宋元豐七年遼大康十年佛紀二一一一年春正月己巳普濟寺僧貞雙等奏九山門參學僧徒請依進士例三年一選從之秋八月甲申宋遣祭奠使左諫議大夫楊景略副使禮賓使王舜封吊慰使右諫議大夫錢協副使西上閣門副使宋球等來辛卯祭奠使聚僧徒設道場於文宗魂殿三晝夜壬辰又設於順宗魂堂乙丑二年宋元豐八年遼大安元年佛紀二一一二年春二月丁卯設天帝釋道場于文德殿辛未設金光經道場于乾德殿七日乙亥始令駕幸時奉仁王般若經前導遵宋制也丁酉幸歸法寺飯僧三月戊申設佛頂道場于文德殿甲寅王如興王寺飯僧夏四月庚午王弟釋煦逃入宋初煦欲求法於宋文宗不許及王即位屢請會羣臣議皆以為不可至是率門徒二人潛隨林寧宋商客也而去庚寅以旱命有司講雲雨經於臨海院七日又禱于山嶽五月甲寅設金光明經道場于乾德殿七日禱雨六月丁丑王受菩薩戒於乾德殿冬十月乙亥設百高座道場於會慶殿講仁王經三日飯僧三萬丙寅三年宋哲宗元祐元年遼大安二年佛紀二一一三年六月癸卯詔曰朕承遺命叨居大位近來變怪屢作旱魃為灾庶賴佛神之陰護羣臣匡輔之力而使陰陽順序上下咸和省躬責己屢示恩宥尚不得雨此蓋涼德所致然恐羣下所行或不合義命世賢材棄不見用惟爾文武常參官致政舊德及散任三品以上員限今月二十六日各上封事朕之過失刑政之得失民庶之弊瘼直言不諱又舉忠直清廉有才德者各一人男女僧道篤行孝順及不孝悌者在官不守公道擾亂法度侵害小民者具録以聞是月釋煦還自宋初煦至宋帝引見于垂拱殿待以客禮寵數渥縟煦請遊方問法詔以主客員外郎楊傑為館伴至吳中諸寺皆迎餞如王臣禮王上表乞令還國詔許東還煦至禮成江王奉太后出奉恩寺以待其迎迓道儀之盛前古無比煦獻釋典及經書一千卷又於興王寺教藏都監購書於遼宋日本多至四千卷悉皆刊行丁卯四年宋元祐二年遼大安三年二月甲午幸開國寺慶成大藏經三月丙辰幸龜山寺飯僧己未王如興王寺慶成大藏殿甲戌宋商徐㦻等二十人來獻新注華嚴經板四月庚子幸歸法寺慶成大藏經乙巳設金光經道場于乾德殿七日禱雨五月戊辰設仁王道場於文德殿六月乙酉設消灾道場于會慶殿七日九月戊寅設燃燈道場于興國寺又點燈于宮城內外街衢十月設百座道場於上京會慶殿飯僧三萬于毬庭己巳六年宋元祐四年遼大安五年春正月乙亥發新興倉粟施京城諸佛寺設齊祈福戊戌設消灾道場于會慶殿五日三月庚寅設楞嚴道場于乾德殿七日十月辛亥講仁王經于會慶殿三日飯僧三萬戊午置新鑄十三層黃金塔于會慶殿設慶讚會辛酉王太后始創國清寺於西郊天台宗本寺也庚午七年宋元祐五年遼大安六年正月壬辰普濟寺水陸堂火先是嬖人攝戶部郎中知太史局事崔士謙入宋求得水陸儀文請王作此堂功未畢而火三月戊子夜大震電新興倉灾罷弘圓國清兩寺之役九月庚辰再宴遼使于乾德寺令三節人坐殿內左右有司奏再宴使者古無此例三節就坐殿內亦所未聞王曰使者賫御製天慶寺碑文以來宜加殊禮不從冬十月丙午王奉太后幸三角山庚戌幸僧伽窟遂幸藏義寺癸丑幸仁壽寺行香戊午幸神穴寺設五百羅漢齊辛未八年宋元祐六年遼大安七年閏八月甲子設藏經道場于會慶殿王行香且製詩以示歸崇之意壬申九年宋元祐七年遼大安八年春三月王不豫移御文德殿命內醫進養性方藥忽有感作古風長篇其末句云藥效得否何敢慮浮生有始豈無終唯應願切修諸善淨域超升禮梵雄見者驚怪六月丙寅王受菩薩戒於乾德殿壬申王太后設天台宗禮懺法于白州見佛寺約一萬日癸酉十年宋元祐八年遼大安九年夏四月癸丑設藏經道場于會慶殿六日王親製贊三寶詩五月王欲創寺命太史相地于城東又親往觀之遂創大寺賜名弘護獻宗恭殤王王昱在位十一年乙亥元年宋紹聖二年遼壽隆元年二月辛卯宋商黃冲等三十一人與慈恩宗僧惠珍來王命近臣文翼備軒蓋迎珍置于普濟寺珍常曰為欲見普陀落伽山聖窟而來請往觀之朝議竟不許六月己卯王受木叉戒於乾德殿八月甲申命修東京皇龍寺塔肅宗明孝王王顒在位十年丙子元年宋紹聖三年遼壽隆二年佛紀二一二三年五月戊申設金光經道場于乾德殿禱雨七月設消灾道場于會慶殿七日九月丁未御宣政殿引見宋僧惠珍賜食於翰林院戊申以宋僧省聰惠珍各為明悟三重大師癸丑講仁王般若經于會慶殿三日親飯僧一萬冬十月丁丑設道場于乾德殿三日轉仁睿太后願成華嚴經丁丑二年宋紹聖四年遼壽隆三年佛紀二一二四年二月國清寺成親設慶讚道場召門下侍中致仕李靖恭兩府宰臣宴六月戊子門下侍中李靖恭奉宣撰進興王寺碑文王賜詔獎諭兼賜匹段銀器茶布鞍馬等物九月乙亥設百高座於會慶殿講仁王經飯僧一萬戊寅三年宋元符元年遼壽隆四年佛紀二一二五年春正月甲戌幸外帝釋院設羅漢齊夏四月丁酉王如興王寺飯僧三千九月壬子設仁王道場于會慶殿七日是歲王子澄儼出家以祐世僧統為師己卯四年宋元